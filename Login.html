<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Diving Centers Management</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-card { background: white; border-radius: 30px; padding: 50px 40px; width: 100%; max-width: 420px; box-shadow: 0 25px 60px rgba(0,0,0,0.3); }
    .logo { text-align: center; margin-bottom: 35px; }
    .logo h1 { color: #1e2b4f; font-size: 26px; font-weight: 800; margin-top: 10px; }
    .logo p  { color: #666; font-size: 13px; margin-top: 5px; }
    .logo .icon { font-size: 60px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; color: #1e2b4f; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
    .form-control { width: 100%; padding: 14px 18px; border: 2px solid #e9f0fa; border-radius: 15px; font-size: 16px; transition: 0.3s; outline: none; }
    .form-control:focus { border-color: #ffd966; }
    .btn-login { width: 100%; padding: 15px; background: linear-gradient(135deg, #1e2b4f, #2c3e6b); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(30,43,79,0.4); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-redirect { display: none; width: 100%; padding: 15px; background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 12px; text-decoration: none; text-align: center; }
    .error-msg { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; border-radius: 12px; padding: 12px 16px; margin-bottom: 20px; font-size: 14px; display: none; text-align: center; }
    .loading { display: none; text-align: center; color: #666; margin-top: 15px; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #ddd; border-top-color: #1e2b4f; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success-msg { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; border-radius: 12px; padding: 12px 16px; margin-bottom: 15px; font-size: 14px; display: none; text-align: center; }
    .debug-info { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 10px; margin-top: 15px; font-size: 11px; color: #856404; display: none; word-break: break-all; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="icon">🤿</div>
      <h1>Diving Centers System</h1>
      <p>إدارة مراكز الغوص والألعاب المائية</p>
    </div>

    <div class="error-msg"   id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="form-group">
      <label>📧 Email</label>
      <input type="email" class="form-control" id="email" placeholder="user@example.com" autocomplete="username">
    </div>
    <div class="form-group">
      <label>🔒 Password</label>
      <input type="password" class="form-control" id="password" placeholder="••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">🚀 Login</button>

    <a class="btn-redirect" id="redirectBtn" href="#">
      ➡️ الدخول للوحة التحكم
    </a>

    <div class="loading" id="loadingDiv">
      <span class="spinner"></span> جارٍ التحقق...
    </div>

    <div class="debug-info" id="debugInfo"></div>
  </div>

  <script>
    // ============================================================
    // ⚙️ الإعدادات — ضع هنا رابط Web App الخاص بك
    // ============================================================
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyEXU9rrScCGTOcksiONNNznJ6vG0fdi4mA5CIbpXYmohsH2MFp4dqF8bQuSqm57c36/exec";

    // خريطة صفحات الداشبورد
    const DASHBOARD_PAGES = {
      Admin:      "Dashboard.html",
      Owner:      "OwnerDashboard.html",
      Sales:      "SalesDashboard.html",
      Accountant: "AccountantDashboard.html"
    };

    // ============================================================
    // تحقق: إذا المستخدم مسجّل دخول مسبقاً → توجيه فوري
    // ============================================================
    (function checkExistingSession() {
      try {
        const saved = sessionStorage.getItem('currentUser');
        if (saved) {
          const user = JSON.parse(saved);
          if (user && user.type) {
            const page = DASHBOARD_PAGES[user.type] || 'Dashboard.html';
            window.location.href = page;
          }
        }
      } catch(e) { sessionStorage.clear(); }
    })();

    // ============================================================
    // Enter key support
    // ============================================================
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const btn = document.getElementById('loginBtn');
        if (!btn.disabled && btn.style.display !== 'none') doLogin();
      }
    });

    // ============================================================
    // دالة تسجيل الدخول الرئيسية
    // ============================================================
    function doLogin() {
      hideMessages();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        showError('الرجاء إدخال البريد الإلكتروني وكلمة المرور');
        return;
      }

      setLoading(true);

      const url = WEB_APP_URL
        + "?action=login"
        + "&email="    + encodeURIComponent(email)
        + "&password=" + encodeURIComponent(password);

      // ── المحاولة الأولى: fetch عادي ──
      fetch(url, { method: 'GET', redirect: 'follow' })
        .then(res => {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(result => onLoginSuccess(result))
        .catch(err => {
          // ── إذا فشل fetch (CORS) → نجرب JSONP ──
          console.warn('fetch failed, trying JSONP:', err.message);
          doLoginJsonp(email, password);
        });
    }

    // ── JSONP fallback (يتجاوز CORS تماماً) ──
    function doLoginJsonp(email, password) {
      const cbName = 'loginCB_' + Date.now();
      const script = document.createElement('script');

      window[cbName] = function(result) {
        delete window[cbName];
        document.head.removeChild(script);
        onLoginSuccess(result);
      };

      script.onerror = function() {
        delete window[cbName];
        document.head.removeChild(script);
        setLoading(false);
        showError('تعذر الاتصال بالخادم. تحقق من رابط Web App.');
        showDebug('JSONP failed. URL: ' + WEB_APP_URL);
      };

      script.src = WEB_APP_URL
        + "?action=login"
        + "&email="    + encodeURIComponent(email)
        + "&password=" + encodeURIComponent(password)
        + "&callback=" + cbName;

      document.head.appendChild(script);
    }

    // ============================================================
    // معالجة نتيجة Login
    // ============================================================
    function onLoginSuccess(result) {
      setLoading(false);

      if (!result || !result.success) {
        showError(result?.message || 'بيانات الدخول غير صحيحة');
        return;
      }

      // حفظ بيانات المستخدم
      try {
        sessionStorage.setItem('currentUser', JSON.stringify(result.user));
      } catch(e) {
        console.warn('sessionStorage error:', e);
      }

      // تحديد الصفحة المناسبة
      const page = DASHBOARD_PAGES[result.user?.type] || 'Dashboard.html';

      // توجيه تلقائي
      window.location.href = page;

      // احتياطي: زر يدوي بعد ثانية
      setTimeout(() => {
        if (document.visibilityState !== 'hidden') {
          showSuccess('✅ تم تسجيل الدخول! اضغط للمتابعة.');
          document.getElementById('loginBtn').style.display = 'none';
          const btn = document.getElementById('redirectBtn');
          btn.href = page;
          btn.style.display = 'block';
        }
      }, 1000);
    }

    // ============================================================
    // دوال مساعدة
    // ============================================================
    function setLoading(show) {
      document.getElementById('loginBtn').disabled        = show;
      document.getElementById('loadingDiv').style.display = show ? 'block' : 'none';
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent   = '❌ ' + msg;
      el.style.display = 'block';
    }

    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent   = msg;
      el.style.display = 'block';
    }

    function hideMessages() {
      document.getElementById('errorMsg').style.display   = 'none';
      document.getElementById('successMsg').style.display = 'none';
      document.getElementById('debugInfo').style.display  = 'none';
    }

    function showDebug(msg) {
      const el = document.getElementById('debugInfo');
      el.textContent   = '🔍 ' + msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
