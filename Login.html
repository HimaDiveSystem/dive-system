<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Login - Diving Centers Management</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-container { background:white; padding:40px; border-radius:30px; width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
    h2 { color:#1e2b4f; margin-bottom:30px; text-align:center; }
    input { width:100%; padding:12px 20px; margin-bottom:20px; border:2px solid #e9f0fa; border-radius:15px; font-size:16px; }
    input:focus { outline:none; border-color:#ffd966; }
    button { width:100%; padding:15px; border:none; border-radius:40px; background:#1e2b4f; color:white; font-weight:600; cursor:pointer; transition:0.3s; }
    button:hover { background:#ffd966; color:#1e2b4f; }
    .loading-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:10000; }
    .loading-container { background:white; padding:20px 40px; border-radius:50px; box-shadow:0 10px 30px rgba(0,0,0,0.2); display:flex; align-items:center; gap:15px; }
    .hourglass { font-size:30px; animation: rotate 1.5s linear infinite; }
    @keyframes rotate { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }
    .loading-text { color:#1e2b4f; font-weight:600; }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>🔐 تسجيل الدخول</h2>
    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button id="loginBtn">تسجيل الدخول</button>
  </div>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-container">
      <div class="hourglass">⏳</div>
      <span class="loading-text" id="loadingMessage">جاري تسجيل الدخول...</span>
    </div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxuIYiURT-ucx1xV1hdwsCxUthi-CBrx-JqWJkSyaFxkkd07DaiHLxdZaGnMfFZUmA/exec';

    function showLoading(show, message='جاري تسجيل الدخول...') {
      const overlay = document.getElementById('loadingOverlay');
      document.getElementById('loadingMessage').innerText = message;
      overlay.style.display = show ? 'flex' : 'none';
    }

    function showAlert(message) {
      alert(message);
    }

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        showAlert('يرجى إدخال البريد وكلمة المرور');
        return;
      }

      showLoading(true);

      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify({
            action: 'login',
            email,
            password
          })
        });

        const data = await response.json();

        if (data.success) {
          sessionStorage.setItem('currentUser', JSON.stringify(data.user));
          window.location.href = 'SalesDashboard.html';
        } else {
          showAlert(data.message || 'فشل تسجيل الدخول');
        }

      } catch (error) {
        console.error('❌ خطأ:', error);
        showAlert('حدث خطأ أثناء الاتصال بالخادم');
      } finally {
        showLoading(false);
      }
    }

    document.getElementById('loginBtn').addEventListener('click', login);
  </script>
</body>
</html>
