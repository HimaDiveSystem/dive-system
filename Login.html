<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>&#1578;&#1587;&#1580;&#1610;&#1604; &#1575;&#1604;&#1583;&#1582;&#1608;&#1604; - &#1606;&#1592;&#1575;&#1605; &#1573;&#1583;&#1575;&#1585;&#1577; &#1605;&#1585;&#1575;&#1603;&#1586; &#1575;&#1604;&#1594;&#1608;&#1589;</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
    }

    body {
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: 
        url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2073&auto=format&fit=crop");
      background-size:cover;
      background-position:center;
      position: relative;
    }
    
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(255, 255, 255, 0.15);
      z-index: 1;
    }
    
    .container {
      display: flex;
      gap: 60px;
      align-items: center;
      justify-content: center;
      z-index: 2;
      position: relative;
      max-width: 1200px;
      width: 90%;
    }
    
    .illustration-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 30px;
      max-width: 400px;
    }
    
    .illustration-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(5px);
      border-radius: 30px;
      padding: 25px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      gap: 20px;
      transition: transform 0.3s;
    }
    
    .illustration-card:hover {
      transform: translateY(-5px);
    }
    
    .illustration-icon {
      font-size: 60px;
      background: #1e2b4f;
      color: #ffd966;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .illustration-text h3 {
      color: #1e2b4f;
      margin: 0 0 5px 0;
      font-size: 20px;
      font-weight: 600;
    }
    
    .illustration-text p {
      color: #4a5a72;
      margin: 0;
      font-size: 14px;
    }
    
    .card {
      width: 380px;
      background: rgba(30, 43, 79, 0.95);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 30px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 217, 102, 0.3);
    }
    
    .card h2 {
      text-align:center;
      margin-bottom: 30px;
      color: #ffd966;
      font-size: 28px;
      font-weight: 600;
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #ffd966;
      font-weight: 500;
      font-size: 14px;
    }
    
    .input-group input {
      width:100%;
      padding:15px;
      border:2px solid #3a4757;
      border-radius:15px;
      font-size:16px;
      transition: all 0.3s;
      box-sizing: border-box;
      background: #1a2634;
      color: white;
      font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
    }
    
    .input-group input:focus {
      border-color:#ffd966;
      outline:none;
      box-shadow: 0 0 0 3px rgba(255, 217, 102, 0.2);
    }
    
    .checkbox {
      display:flex;
      align-items:center;
      font-size:14px;
      margin:15px 0;
      color: #b0c4de;
    }
    
    .checkbox input {
      width: auto;
      margin-left:10px;
      transform: scale(1.2);
    }
    
    button {
      width:100%;
      padding:15px;
      margin-top:10px;
      border:none;
      border-radius:15px;
      background:linear-gradient(135deg,#ffd966,#d4a017);
      color: #1e2b4f;
      font-weight:bold;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
      box-shadow: 0 5px 15px rgba(255, 217, 102, 0.3);
      font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
    }
    
    button:hover {
      transform:translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 217, 102, 0.4);
    }
    
    .message {
      margin-top:20px;
      text-align:center;
      font-size:14px;
      color:#ff6b6b;
      min-height: 20px;
    }
    
    @media (max-width: 900px) {
      .container { 
        flex-direction: column; 
        gap: 30px;
      }
      .illustration-side { 
        max-width: 100%; 
        flex-direction: row; 
        flex-wrap: wrap;
        justify-content: center;
      }
      .illustration-card {
        width: calc(50% - 15px);
        min-width: 250px;
      }
    }
    
    @media (max-width: 600px) {
      .illustration-side { 
        flex-direction: column; 
        align-items: center;
      }
      .illustration-card {
        width: 100%;
        max-width: 300px;
      }
      .card { 
        width: 100%; 
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  
<div class="container">
  <div class="illustration-side">
    <div class="illustration-card">
      <div class="illustration-icon">💻</div>
      <div class="illustration-text">
        <h3>&#1606;&#1592;&#1575;&#1605; &#1573;&#1583;&#1575;&#1585;&#1577; &#1605;&#1578;&#1603;&#1575;&#1605;&#1604;</h3>
        <p>&#1578;&#1581;&#1603;&#1605; &#1603;&#1575;&#1605;&#1604; &#1601;&#1610; &#1575;&#1604;&#1605;&#1585;&#1575;&#1603;&#1586; &#1608;&#1575;&#1604;&#1601;&#1585;&#1608;&#1593; &#1608;&#1575;&#1604;&#1605;&#1608;&#1592;&#1601;&#1610;&#1606;</p>
      </div>
    </div>
    <div class="illustration-card">
      <div class="illustration-icon">🧾</div>
      <div class="illustration-text">
        <h3>&#1601;&#1608;&#1575;&#1578;&#1610;&#1585; &#1573;&#1604;&#1603;&#1578;&#1585;&#1608;&#1606;&#1610;&#1577;</h3>
        <p>&#1573;&#1589;&#1583;&#1575;&#1585; &#1608;&#1605;&#1578;&#1575;&#1576;&#1593;&#1577; &#1575;&#1604;&#1601;&#1608;&#1575;&#1578;&#1610;&#1585; &#1576;&#1587;&#1607;&#1608;&#1604;&#1577;</p>
      </div>
    </div>
    <div class="illustration-card">
      <div class="illustration-icon">📊</div>
      <div class="illustration-text">
        <h3>&#1578;&#1602;&#1575;&#1585;&#1610;&#1585; &#1608;&#1578;&#1581;&#1604;&#1610;&#1604;&#1575;&#1578;</h3>
        <p>&#1578;&#1602;&#1575;&#1585;&#1610;&#1585; &#1583;&#1602;&#1610;&#1602;&#1577; &#1604;&#1604;&#1605;&#1576;&#1610;&#1593;&#1575;&#1578; &#1608;&#1575;&#1604;&#1593;&#1605;&#1608;&#1604;&#1575;&#1578;</p>
      </div>
    </div>
  </div>
  
  <div class="card">
    <h2>🌊 &#1594;&#1608;&#1589;</h2>
    <div class="input-group">
      <label>&#1575;&#1604;&#1576;&#1585;&#1610;&#1583; &#1575;&#1604;&#1573;&#1604;&#1603;&#1578;&#1585;&#1608;&#1606;&#1610;</label>
      <input type="email" id="email" placeholder="example@domain.com">
    </div>
    <div class="input-group">
      <label>&#1603;&#1604;&#1605;&#1577; &#1575;&#1604;&#1605;&#1585;&#1608;&#1585;</label>
      <input type="password" id="password" placeholder="********">
    </div>
    <div class="checkbox">
      <input type="checkbox" id="showPass">
      <label for="showPass">&#1573;&#1592;&#1607;&#1575;&#1585; &#1603;&#1604;&#1605;&#1577; &#1575;&#1604;&#1605;&#1585;&#1608;&#1585;</label>
    </div>
    <button onclick="login()">&#1578;&#1587;&#1580;&#1610;&#1604; &#1575;&#1604;&#1583;&#1582;&#1608;&#1604;</button>
    <div class="message" id="msg"></div>
  </div>
</div>

<div id="customAlertModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 9999;">
  <div style="background: white; width: 400px; border-radius: 30px; padding: 30px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3);">
    <div style="font-size: 50px; margin-bottom: 20px;">ℹ️</div>
    <h3 style="color: #1e2b4f; margin-bottom: 20px;" id="alertMessage"></h3>
    <button id="alertOk" class="btn-primary" style="background: #1e2b4f; color: white; border: none; padding: 12px 30px; border-radius: 40px; font-weight: 600; cursor: pointer; font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;">&#1605;&#1608;&#1575;&#1601;&#1602;</button>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const showPass = document.getElementById('showPass');
  if (showPass) {
    showPass.addEventListener('change', function(){
      const pass = document.getElementById('password');
      if (pass) pass.type = this.checked ? 'text' : 'password';
    });
  }
});

function showAlert(message) {
  const modal = document.getElementById('customAlertModal');
  document.getElementById('alertMessage').innerText = message;
  modal.style.display = 'flex';
  
  const okBtn = document.getElementById('alertOk');
  const okHandler = function() {
    modal.style.display = 'none';
    okBtn.removeEventListener('click', okHandler);
  };
  
  okBtn.addEventListener('click', okHandler);
}

function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const msgDiv = document.getElementById('msg');
  
  if (!email || !password) {
    showAlert('&#1610;&#1585;&#1580;&#1609; &#1573;&#1583;&#1582;&#1575;&#1604; &#1575;&#1604;&#1576;&#1585;&#1610;&#1583; &#1575;&#1604;&#1573;&#1604;&#1603;&#1578;&#1585;&#1608;&#1606;&#1610; &#1608;&#1603;&#1604;&#1605;&#1577; &#1575;&#1604;&#1605;&#1585;&#1608;&#1585;');
    return;
  }
  
  msgDiv.innerText = 'جاري تسجيل الدخول...';
  
  // رابط Code.gs بعد النشر الجديد
  const scriptUrl = 'https://script.google.com/macros/s/AKfycbxLzFOU8R0-Mnsw3FrWZ5JjehU6VoepqlLkDo39dP2gAxF8PqOi7XpxMXrZQVBaQo27/exec';
  
  fetch(scriptUrl + '?action=login', {
    method: 'POST',
    mode: 'no-cors',
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ email, password })
  })
  .then(response => {
    // مع no-cors مش هينفع نقرأ response، هنفترض نجاح ونوجه
    window.location.href = 'Dashboard.html';
  })
  .catch(error => {
    console.error('خطأ:', error);
    msgDiv.innerText = '&#1581;&#1583;&#1579; &#1582;&#1591;&#1571; &#1601;&#1610; &#1575;&#1604;&#1575;&#1578;&#1589;&#1575;&#1604;';
  });
}

function logout() {
  window.location.href = 'Login.html';
}

window.showAlert = showAlert;
window.logout = logout;
</script>
</body>
</html>
