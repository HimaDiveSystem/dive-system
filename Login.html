<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل الدخول - نظام إدارة مراكز الغوص</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; height:100vh; display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative; background:#0b1a2e; }
    .dark-bg { position:fixed; inset:0; z-index:0; background-image:url('https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=1920&auto=format&fit=crop'); background-size:cover; background-position:center; filter:brightness(0.4) contrast(1.1); }
    .container { position:relative; z-index:2; width:95%; max-width:1100px; display:flex; gap:50px; align-items:center; justify-content:center; padding:20px; }
    .illustration-side { flex:1; display:flex; flex-direction:column; gap:18px; max-width:420px; }
    .illustration-card { background:rgba(255,255,255,0.85); backdrop-filter:blur(8px); border-radius:24px; padding:20px; border:1px solid rgba(255,255,255,0.3); box-shadow:0 15px 30px rgba(0,0,0,0.2); display:flex; gap:16px; align-items:center; transition:.25s; }
    .illustration-card:hover { transform:translateY(-4px); background:rgba(255,255,255,0.95); }
    .illustration-icon { width:60px; height:60px; border-radius:50%; background:linear-gradient(135deg,#0284c7,#0f2b4b); display:flex; align-items:center; justify-content:center; font-size:32px; color:white; }
    .illustration-text h3 { color:#0b1a2e; font-size:18px; font-weight:600; margin-bottom:4px; }
    .illustration-text p  { color:#1e2b4f; font-size:13px; line-height:1.5; }
    .card { width:420px; background:white; padding:42px 38px; border-radius:32px; box-shadow:0 30px 60px rgba(0,0,0,0.3); }
    .card h2 { text-align:center; margin-bottom:30px; color:#0b1a2e; font-size:32px; font-weight:700; }
    .input-group { margin-bottom:22px; }
    .input-group label { display:block; margin-bottom:6px; color:#0f2b4b; font-weight:500; font-size:14px; }
    .input-group input { width:100%; padding:16px 18px; border-radius:14px; border:1px solid #cbd5e1; background:#f8fafc; color:#0b1a2e; font-size:16px; transition:.2s; direction:ltr; text-align:left; }
    .input-group input:focus { outline:none; border-color:#0284c7; box-shadow:0 0 0 3px rgba(2,132,199,0.2); }
    .checkbox { display:flex; align-items:center; gap:8px; color:#1e2b4f; font-size:14px; margin:16px 0; }
    .checkbox input { accent-color:#0284c7; }
    #loginBtn { width:100%; padding:16px; border:none; border-radius:14px; background:linear-gradient(135deg,#0f2b4b,#0284c7); color:white; font-size:18px; font-weight:bold; cursor:pointer; transition:.25s; box-shadow:0 8px 20px rgba(2,132,199,0.3); }
    #loginBtn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 12px 28px rgba(2,132,199,0.5); }
    #loginBtn:disabled { opacity:0.6; cursor:not-allowed; }
    .custom-modal { display:none; position:fixed; inset:0; align-items:center; justify-content:center; z-index:10000; background:rgba(0,0,0,0.5); backdrop-filter:blur(5px); }
    .modal-content { background:white; border-radius:28px; padding:35px; max-width:400px; text-align:center; }
    .loading-overlay { display:none; position:fixed; inset:0; align-items:center; justify-content:center; z-index:10000; background:rgba(0,0,0,0.5); }
    .loading-box { background:white; padding:30px 40px; border-radius:60px; display:flex; gap:16px; align-items:center; }
    .spinner { width:28px; height:28px; border:3px solid #e2e8f0; border-top-color:#0284c7; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media(max-width:900px) { .container{flex-direction:column;} .illustration-side{order:2;flex-direction:row;flex-wrap:wrap;} .card{order:1;width:100%;} }
  </style>
</head>
<body>

<div class="dark-bg"></div>

<div class="container">
  <div class="illustration-side">
    <div class="illustration-card"><div class="illustration-icon">📊</div><div class="illustration-text"><h3>نظام إدارة متكامل</h3><p>تحكم كامل في المراكز والفروع والموظفين</p></div></div>
    <div class="illustration-card"><div class="illustration-icon">💰</div><div class="illustration-text"><h3>فواتير وميزانيات</h3><p>إصدار فواتير دقيقة ومتابعة الميزانيات</p></div></div>
    <div class="illustration-card"><div class="illustration-icon">📈</div><div class="illustration-text"><h3>تقارير وتحليلات</h3><p>تقارير مبيعات وعمولات وأرباح</p></div></div>
  </div>

  <div class="card">
    <h2>🌊 غوص</h2>
    <div class="input-group"><label>البريد الإلكتروني</label><input type="email" id="email" placeholder="example@domain.com"></div>
    <div class="input-group"><label>كلمة المرور</label><input type="password" id="password" placeholder="********"></div>
    <div class="checkbox"><input type="checkbox" id="showPass"><label for="showPass">إظهار كلمة المرور</label></div>
    <button id="loginBtn" onclick="login()">تسجيل الدخول</button>
  </div>
</div>

<div id="customAlertModal" class="custom-modal">
  <div class="modal-content">
    <div style="font-size:40px;margin-bottom:15px;">⚠️</div>
    <h3 id="alertMessage" style="color:#0b1a2e;margin-bottom:20px;line-height:1.5;"></h3>
    <button onclick="document.getElementById('customAlertModal').style.display='none'" style="background:#0284c7;color:white;border:none;padding:12px 36px;border-radius:40px;cursor:pointer;font-size:15px;font-weight:600;">موافق</button>
  </div>
</div>

<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <span style="color:#0b1a2e;font-weight:600;font-size:16px;">جاري التحقق...</span>
  </div>
</div>

<script>
  // ============================================================
  // رابط Apps Script — هذا الملف يعمل من GitHub مباشرة
  // لذلك نستخدم fetch() وليس google.script.run
  // ============================================================
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxy3i2tiKsZpTkFj0gljt0_LuXFzdOlZAU10AtIrVFdAi_n3gcQjvMxLKpWiV0EHPI2/exec';

  document.getElementById('showPass').addEventListener('change', function() {
    document.getElementById('password').type = this.checked ? 'text' : 'password';
  });

  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

  function showAlert(msg) {
    document.getElementById('alertMessage').innerText = msg;
    document.getElementById('customAlertModal').style.display = 'flex';
  }

  function setLoading(on) {
    document.getElementById('loadingOverlay').style.display = on ? 'flex' : 'none';
  }

  // التنقل عبر postMessage — يُبقي رابط GitHub ثابتاً
  function navigateTo(page) {
    window.parent.postMessage({ type: 'navigate', page: page }, '*');
  }

  async function login() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const btn      = document.getElementById('loginBtn');

    if (!email || !password) return showAlert('يرجى إدخال البريد الإلكتروني وكلمة المرور');

    btn.disabled = true;
    setLoading(true);

    try {
      // fetch مباشر لـ Apps Script — لا يحتاج google.script.run
      const url = GAS_URL + '?action=loginUser'
                           + '&email='    + encodeURIComponent(email)
                           + '&password=' + encodeURIComponent(password);
      const res = await fetch(url);
      const r   = await res.json();

      if (r && r.success) {
        try { sessionStorage.setItem('currentUser', JSON.stringify(r.user)); } catch(e) {}
        navigateTo(r.dashboardPage || 'Dashboard');
      } else {
        showAlert(r?.message || 'بيانات الدخول غير صحيحة');
      }
    } catch (err) {
      console.error('Login error:', err);
      showAlert('خطأ في الاتصال بالخادم.\nتأكد من اتصال الإنترنت وحاول مجدداً.');
    } finally {
      btn.disabled = false;
      setLoading(false);
    }
  }
</script>
</body>
</html>
