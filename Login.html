<!DOCTYPE html> <html dir="rtl"> <head> <base target="_top"> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1"> <title>تسجيل الدخول - نظام إدارة مراكز الغوص</title> <style> * { margin:0; padding:0; box-sizing:border-box; } body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; background: #0b1a2e; } .dark-bg { position: fixed; inset:0; z-index:0; background-image: url('https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=1920&auto=format&fit=crop'); background-size: cover; background-position: center; background-repeat: no-repeat; filter: brightness(0.4) contrast(1.1); } .container { position: relative; z-index:2; width: 95%; max-width: 1100px; display: flex; gap:50px; align-items: center; justify-content: center; padding: 20px; } .illustration-side { flex:1; display:flex; flex-direction:column; gap:18px; max-width:420px; } .illustration-card { background: rgba(255,255,255,0.85); backdrop-filter: blur(8px); border-radius:24px; padding:20px; border:1px solid rgba(255,255,255,0.3); box-shadow:0 15px 30px rgba(0,0,0,0.2); display:flex; gap:16px; align-items:center; transition:.25s; } .illustration-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.95); } .illustration-icon { width:60px; height:60px; border-radius:50%; background: linear-gradient(135deg,#0284c7,#0f2b4b); display:flex; align-items:center; justify-content:center; font-size:32px; color:white; } .illustration-text h3 { color:#0b1a2e; font-size:18px; font-weight:600; margin-bottom:4px; } .illustration-text p { color:#1e2b4f; font-size:13px; line-height:1.5; } .card { width:420px; background:white; padding:42px 38px; border-radius:32px; box-shadow:0 30px 60px rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.5); } .card h2 { text-align:center; margin-bottom:30px; color:#0b1a2e; font-size:32px; font-weight:700; } .input-group { margin-bottom:22px; } .input-group label { display:block; margin-bottom:6px; color:#0f2b4b; font-weight:500; font-size:14px; } .input-group input { width:100%; padding:16px 18px; border-radius:14px; border:1px solid #cbd5e1; background:#f8fafc; color:#0b1a2e; font-size:16px; transition:.2s; direction:ltr; text-align:left; } .input-group input:focus { outline:none; border-color:#0284c7; box-shadow:0 0 0 3px rgba(2,132,199,0.2); } .checkbox { display:flex; align-items:center; gap:8px; color:#1e2b4f; font-size:14px; margin:16px 0; } .checkbox input { accent-color:#0284c7; } button { width:100%; padding:16px; border:none; border-radius:14px; background: linear-gradient(135deg,#0f2b4b,#0284c7); color:white; font-size:18px; font-weight:bold; cursor:pointer; transition:.25s; box-shadow:0 8px 20px rgba(2,132,199,0.3); } button:hover:not(:disabled) { transform: translateY(-2px); box-shadow:0 12px 28px rgba(2,132,199,0.5); } button:disabled { opacity: 0.6; cursor: not-allowed; } .custom-modal, .loading-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; align-items:center; justify-content:center; z-index:10000; background:rgba(0,0,0,0.5); backdrop-filter: blur(5px); } .modal-content { background:white; border-radius:28px; padding:35px; max-width:400px; text-align:center; } .modal-btn { background:#0284c7; color:white; border:none; padding:14px 40px; border-radius:40px; cursor:pointer; } .loading-container { background:white; padding:30px 40px; border-radius:60px; display:flex; gap:20px; align-items:center; } .loading-text { font-size:18px; color:#0b1a2e; } @media (max-width:900px) { .container{flex-direction:column;} .illustration-side{order:2; flex-direction:row; flex-wrap:wrap;} .card{order:1; width:100%;} } </style> </head> <body> <div class="dark-bg"></div> <div class="container"> <div class="illustration-side"> <div class="illustration-card"><div class="illustration-icon">📊</div><div class="illustration-text"><h3>نظام إدارة متكامل</h3><p>تحكم كامل في المراكز والفروع والموظفين</p></div></div> <div class="illustration-card"><div class="illustration-icon">💰</div><div class="illustration-text"><h3>فواتير وميزانيات</h3><p>إصدار فواتير دقيقة ومتابعة الميزانيات</p></div></div> <div class="illustration-card"><div class="illustration-icon">📈</div><div class="illustration-text"><h3>تقارير وتحليلات</h3><p>تقارير مبيعات وعمولات وأرباح</p></div></div> </div> <div class="card"> <h2>🌊 غوص</h2> <div class="input-group"><label>البريد الإلكتروني</label><input type="email" id="email" placeholder="example@domain.com"></div> <div class="input-group"><label>كلمة المرور</label><input type="password" id="password" placeholder="********"></div> <div class="checkbox"><input type="checkbox" id="showPass"><label for="showPass">إظهار كلمة المرور</label></div> <button onclick="login()">تسجيل الدخول</button> </div> </div> <div id="customAlertModal" class="custom-modal"> <div class="modal-content"> <div style="font-size: 50px; margin-bottom: 20px;">ℹ️</div> <h3 id="alertMessage" style="margin-bottom: 20px;"></h3> <button id="alertOk" class="modal-btn">موافق</button> </div> </div> <div id="loadingOverlay" class="loading-overlay"> <div class="loading-container"> <div style="font-size: 30px;">⏳</div> <span class="loading-text">جاري التحميل...</span> </div> </div> <script>
  // ==================== المتغيرات العامة ====================
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxuIYiURT-ucx1xV1hdwsCxUthi-CBrx-JqWJkSyaFxkkd07DaiHLxdZaGnMfFZUmA/exec';

  // ==================== دوال مساعدة ====================
  function showAlert(message) {
    const modal = document.getElementById('customAlertModal');
    document.getElementById('alertMessage').innerText = message;
    modal.style.display = 'flex';
    document.getElementById('alertOk').onclick = () => modal.style.display = 'none';
  }

  function showLoading(show) {
    document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
  }

  // ==================== دالة تسجيل الدخول ====================
  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const loginBtn = document.querySelector('button');

    if (!email || !password) {
      showAlert('يرجى إدخال البريد الإلكتروني وكلمة المرور');
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = 'جاري تسجيل الدخول...';
    showLoading(true);

    try {
      // ✅ GET بدل POST - يتجاوز CORS تلقائياً
      const url = `${GAS_URL}?action=login&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`;

      const response = await fetch(url);
      const result = await response.json();

      if (result.success) {
        sessionStorage.setItem('currentUser', JSON.stringify(result.user));
        const userType = result.user.type;
        let dashboardPage = 'Dashboard.html';
        if (userType === 'Sales') dashboardPage = 'SalesDashboard.html';
        else if (userType === 'Accountant') dashboardPage = 'AccountantDashboard.html';
        else if (userType === 'Owner') dashboardPage = 'OwnerDashboard.html';
        console.log('✅ التوجيه إلى: ' + dashboardPage);
        window.location.href = dashboardPage;
      } else {
        showAlert(result.message || 'خطأ في تسجيل الدخول');
      }
    } catch (error) {
      console.error('❌ خطأ:', error);
      showAlert('خطأ في الاتصال بالخادم');
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = 'تسجيل الدخول';
      showLoading(false);
    }
  }

  // ==================== إظهار/إخفاء كلمة المرور ====================
  document.getElementById('showPass').addEventListener('change', function() {
    const passwordField = document.getElementById('password');
    passwordField.type = this.checked ? 'text' : 'password';
  });
</script>
</body> </html>
