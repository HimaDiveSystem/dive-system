<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Customer Invoice</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0f1f3d;--navy2:#1a3260;--gold:#f5c842;--gold2:#e6b800;
      --blue:#2563eb;--blue-lt:#3b82f6;--green:#16a34a;--red:#dc2626;
      --bg:#f0f4f8;--card:#fff;--border:#dde4f0;--text:#1a2540;--text-lt:#5a6a8a;
      --radius:16px;--radius-sm:10px;
      --shadow:0 4px 24px rgba(15,31,61,.10);--shadow-lg:0 8px 40px rgba(15,31,61,.16);
      --ticker-h:42px;--header-h:60px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;width:100%;overflow-x:hidden;}

    #stickyTop{position:fixed;top:0;left:0;right:0;z-index:1000;width:100%;background:linear-gradient(135deg,var(--navy),var(--navy2));}
    .header{height:var(--header-h);background:linear-gradient(135deg,var(--navy),var(--navy2));display:flex;justify-content:space-between;align-items:center;padding:0 20px;box-shadow:var(--shadow-lg);}
    .header-left{display:flex;align-items:center;gap:12px;}
    .header-left h2{color:var(--gold);font-size:18px;font-weight:900;display:flex;align-items:center;gap:8px;}
    .badge-customer{background:rgba(22,163,74,.2);border:1px solid var(--green);border-radius:40px;padding:4px 12px;color:var(--green);font-size:11px;font-weight:700;}
    .header-right{display:flex;align-items:center;gap:8px;}
    .user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:40px;padding:4px 13px;color:white;font-size:12px;font-weight:600;}
    .branch-chip{background:rgba(245,200,66,.2);border:1px solid rgba(245,200,66,.4);border-radius:40px;padding:4px 13px;color:var(--gold);font-size:12px;font-weight:700;}
    .back-btn{background:transparent;border:2px solid rgba(255,255,255,.3);color:white;padding:4px 13px;border-radius:40px;cursor:pointer;font-weight:700;font-size:12px;font-family:'Cairo',sans-serif;transition:all .2s;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}

    .page{padding-top:calc(var(--header-h) + 18px);padding-bottom:50px;width:100%;max-width:1100px;margin:0 auto;padding-left:15px;padding-right:15px;min-height:100vh;}

    .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
    .card-head{padding:11px 18px;background:linear-gradient(90deg,var(--navy),var(--navy2));display:flex;align-items:center;gap:8px;}
    .card-head h3{color:var(--gold);font-size:14px;font-weight:800;letter-spacing:.2px;}
    .ch-icon{background:rgba(245,200,66,.2);border-radius:7px;padding:3px 6px;font-size:13px;}
    .card-body{padding:15px;}

    .fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
    .fgroup{display:flex;flex-direction:column;gap:5px;position:relative;}
    .fgroup label{font-size:11px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px;}
    .fgroup label.req::after{content:' *';color:var(--red);}
    .fc{padding:9px 13px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:'Cairo',sans-serif;color:var(--text);background:#fafbfd;width:100%;height:43px;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;appearance:none;}
    .fc:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);outline:none;background:white;}
    .fc::placeholder{color:#b0bac9;}
    select.fc{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='13' height='13' viewBox='0 0 24 24' fill='none' stroke='%235a6a8a' stroke-width='2.5'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:left 11px center;padding-left:33px;}
    textarea.fc{height:auto;resize:vertical;}

    .hotel-row{display:grid;grid-template-columns:1fr 90px 68px 68px 68px;gap:11px;align-items:end;margin-top:12px;}
    @media(max-width:680px){.hotel-row{grid-template-columns:1fr 80px 62px 62px 62px;}}
    @media(max-width:480px){.hotel-row{grid-template-columns:1fr 70px 58px 58px 58px;}}
    
    .compact-num{padding:9px 5px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:'Cairo',sans-serif;font-weight:700;color:var(--text);background:#fafbfd;width:100%;height:43px;text-align:center;transition:border-color .2s;-webkit-appearance:none;appearance:none;}
    .compact-num:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);outline:none;background:white;}

    .time-btn-display{width:100%;height:43px;padding:9px 13px;border:2px solid var(--border);border-radius:var(--radius-sm);background:#fafbfd;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:14px;font-family:'Cairo',sans-serif;color:var(--text);transition:border-color .2s;}
    .time-btn-display:hover{border-color:var(--blue);}
    .time-btn-display .ph{color:#b0bac9;}

    .trip-table{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border);}
    .trip-table table{width:100%;border-collapse:collapse;}
    .trip-table thead th{background:linear-gradient(90deg,var(--navy),var(--navy2));color:var(--gold);padding:10px 11px;font-size:11px;font-weight:700;text-align:center;text-transform:uppercase;letter-spacing:.3px;}
    .trip-table thead th:first-child{text-align:left;}
    .trip-table tbody tr:hover{background:#f8faff;}
    .trip-table td{padding:9px 11px;border-bottom:1px solid #f0f4f8;font-size:13px;vertical-align:middle;}
    .trip-table td:not(:first-child){text-align:center;}
    .trip-table input[type="number"]{width:80px;padding:6px;border:2px solid var(--border);border-radius:8px;text-align:center;font-size:14px;font-weight:700;font-family:'Cairo',sans-serif;background:#fafbfd;transition:border-color .2s;}
    .trip-table input[type="number"]:focus{border-color:var(--blue);outline:none;}

    .total-card{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;}
    .total-card .card-head{background:transparent;}
    .total-card .card-head h3{color:var(--gold);}
    .total-strip{display:flex;justify-content:space-around;align-items:center;flex-wrap:wrap;gap:14px;padding:16px;}
    .total-tile{text-align:center;}
    .total-tile .tl{font-size:10px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
    .total-tile .tv{font-size:28px;font-weight:900;color:white;line-height:1;}
    .total-tile .tc{font-size:13px;color:var(--gold);font-weight:700;margin-left:3px;}
    .total-tile input{width:130px;padding:8px;border-radius:10px;text-align:center;font-size:16px;font-weight:700;background:white;border:none;color:var(--navy);}
    .total-tile input:focus{outline:2px solid var(--gold);}

    .action-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding-top:10px;}
    .btn{padding:12px 26px;border:none;border-radius:40px;font-weight:800;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;display:flex;align-items:center;gap:6px;transition:all .2s;}
    .btn:hover{transform:translateY(-2px);}
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none;}
    .btn-save{background:linear-gradient(135deg,var(--green),#15803d);color:white;box-shadow:0 4px 14px rgba(22,163,74,.3);}
    .btn-clear{background:#f1f5f9;color:var(--text);}
    .btn-new{background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);box-shadow:0 4px 14px rgba(15,31,61,.3);}

    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px);}
    .modal.open{display:flex;}
    .modal-box{background:white;width:90%;max-width:450px;border-radius:22px;padding:24px;text-align:center;box-shadow:0 25px 50px rgba(0,0,0,.3);animation:pop .25s ease;}
    .modal-icon{font-size:44px;margin-bottom:10px;}
    .modal-msg{color:var(--navy);font-size:15px;font-weight:700;margin-bottom:18px;white-space:pre-wrap;line-height:1.6;}
    .modal-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
    @keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}

    .pdf-ov{display:none;position:fixed;inset:0;background:rgba(10,22,40,.88);z-index:99999;align-items:center;justify-content:center;flex-direction:column;gap:18px;backdrop-filter:blur(4px);}
    .pdf-ov.show{display:flex;}
    .pdf-spin{width:60px;height:60px;border:5px solid rgba(255,255,255,.15);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
    .pdf-ov p{color:white;font-size:16px;font-weight:700;}
    @keyframes spin{to{transform:rotate(360deg)}}

    .loader-big{text-align:center;padding:60px;color:var(--text-lt);}
    .spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px;}

    .clock-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);align-items:center;justify-content:center;z-index:10000;backdrop-filter:blur(6px);}
    .clock-modal.open{display:flex;}
    .clock-box{background:white;width:90%;max-width:340px;border-radius:28px;overflow:hidden;box-shadow:0 30px 70px rgba(0,0,0,.5);animation:pop .3s cubic-bezier(.34,1.56,.64,1);}
    .ck-head{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:18px 20px;text-align:center;}
    .ck-head-title{color:var(--gold);font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;opacity:.8;}
    .ck-time-big{font-size:56px;font-weight:900;color:white;letter-spacing:4px;font-family:'Tajawal',monospace;line-height:1;margin-bottom:12px;}
    .ck-mode-row{display:flex;justify-content:center;gap:8px;}
    .ck-mode-pill{padding:4px 18px;border-radius:20px;font-size:12px;font-weight:700;border:2px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.5);cursor:pointer;}
    .ck-mode-pill.active{background:var(--gold);color:var(--navy);border-color:var(--gold);}
    .ck-face-wrap{padding:18px;background:#f5f7fb;display:flex;justify-content:center;align-items:center;}
    .ck-svg-wrap{width:230px;height:230px;cursor:crosshair;}
    .ck-svg-wrap svg{width:100%;height:100%;}
    .ck-foot{display:flex;gap:8px;padding:14px 16px;background:white;border-top:1px solid var(--border);}
    .ck-btn{flex:1;padding:11px;border:none;border-radius:40px;font-weight:700;font-size:13px;cursor:pointer;}
    .ck-clear{background:#f1f5f9;color:var(--text);}
    .ck-cancel{background:#fee2e2;color:var(--red);}
    .ck-set{background:linear-gradient(135deg,var(--green),#15803d);color:white;}

    @media(max-width:640px){.ck-svg-wrap{width:200px;height:200px;}.ck-time-big{font-size:44px;}}
  </style>
</head>
<body>

<div id="stickyTop">
  <div class="header">
    <div class="header-left">
      <h2>📋 فاتورة عميل</h2>
      <span class="badge-customer">🏢 للفروع والمراكز</span>
    </div>
    <div class="header-right">
      <span class="user-chip" id="userNameDisplay"></span>
      <span class="branch-chip" id="branchDisplay" style="display:none"></span>
      <button class="back-btn" onclick="goBack()">← Back</button>
    </div>
  </div>
</div>

<div class="page">
  <div id="mainContent"><div class="loader-big"><div class="spinner"></div>جاري التحميل...</div></div>
</div>

<!-- PDF Overlay -->
<div class="pdf-ov" id="pdfOv"><div class="pdf-spin"></div><p id="pdfMsg">جاري الحفظ...</p></div>

<!-- Clock Modal -->
<div id="clockModal" class="clock-modal">
  <div class="clock-box">
    <div class="ck-head">
      <div class="ck-head-title">SELECT TIME</div>
      <div class="ck-time-big"><span id="ckH">--</span>:<span id="ckM">--</span></div>
      <div class="ck-mode-row">
        <button class="ck-mode-pill active" id="modeHour" onclick="setClockMode('hour')">HOUR</button>
        <button class="ck-mode-pill" id="modeMin" onclick="setClockMode('minute')">MINUTE</button>
      </div>
    </div>
    <div class="ck-face-wrap">
      <div class="ck-svg-wrap" id="ckWrap">
        <svg id="ckSVG" viewBox="0 0 230 230" xmlns="http://www.w3.org/2000/svg">
          <circle cx="115" cy="115" r="112" fill="#eef2f8" stroke="#dde4f0" stroke-width="1.5"/>
          <circle cx="115" cy="115" r="64" fill="rgba(37,99,235,.04)" stroke="rgba(37,99,235,.12)" stroke-width="1" stroke-dasharray="4 3"/>
          <g id="ckTicks"></g>
          <g id="ckNums"></g>
          <line id="ckHandH" x1="115" y1="115" x2="115" y2="62" stroke="#0f1f3d" stroke-width="5" stroke-linecap="round"/>
          <line id="ckHandM" x1="115" y1="115" x2="115" y2="44" stroke="#2563eb" stroke-width="3.5" stroke-linecap="round"/>
          <circle cx="115" cy="115" r="7" fill="#0f1f3d"/>
          <circle cx="115" cy="115" r="3" fill="#f5c842"/>
          <circle id="ckDot" cx="115" cy="44" r="9" fill="#f5c842" opacity="0"/>
        </svg>
      </div>
    </div>
    <div class="ck-foot">
      <button class="ck-btn ck-clear" onclick="clearClock()">🔄 Clear</button>
      <button class="ck-btn ck-cancel" onclick="closeClockModal()">❌ Cancel</button>
      <button class="ck-btn ck-set" onclick="confirmClock()">✅ Set</button>
    </div>
  </div>
</div>

<!-- Alert Modal -->
<div id="alertModal" class="modal">
  <div class="modal-box">
    <div class="modal-icon" id="alertIcon">ℹ️</div>
    <div class="modal-msg" id="alertMsg"></div>
    <div class="modal-btns" id="alertBtns"><button class="btn btn-save" onclick="closeAlert()">OK</button></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   CONFIG & GLOBALS
═══════════════════════════════════════ */
const GAS_URL='https://script.google.com/macros/s/AKfycbyBfwHQQoHb9E2bq0l-u6FLMD2XFKu_d8rZuJLnIq5iko82Bn93Emki6-cvDF_XOyRp/exec';
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DASH={Admin:'Dashboard.html',Owner:'OwnerDashboard.html',Sales:'SalesDashboard.html',Accountant:'AccountantDashboard.html'};

let currentUser=null;
let allTrips=[];
let allCustomers=[];
let allNationalities=[];
let allHotels=[];
let currentTripItems=[];
let currentTripPrices=[];
let activitiesQuantities=[];

let ckHour=null,ckMin=null,ckMode='hour';
const CX=115,CY=115;

function roundTwo(n){return Math.round((n+Number.EPSILON)*100)/100;}
function dV(v){const n=Number(v);return(n===0||isNaN(n))?'':n;}

/* ═══════════════════════════════════════
   API
═══════════════════════════════════════ */
async function callGAS(action,params={}){
  const url=new URL(GAS_URL);url.searchParams.set('action',action);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,String(v??'')));
  const r=await fetch(url.toString(),{redirect:'follow'});if(!r.ok)throw new Error('HTTP '+r.status);return r.json();
}

/* ═══════════════════════════════════════
   MODALS
═══════════════════════════════════════ */
function showPDFOv(m){document.getElementById('pdfMsg').textContent=m;document.getElementById('pdfOv').classList.add('show');}
function hidePDFOv(){document.getElementById('pdfOv').classList.remove('show');}
function showAlert(msg,icon,btnHtml){document.getElementById('alertMsg').textContent=msg;document.getElementById('alertIcon').textContent=icon||'ℹ️';document.getElementById('alertBtns').innerHTML=btnHtml||'<button class="btn btn-save" onclick="closeAlert()">OK</button>';document.getElementById('alertModal').classList.add('open');}
function closeAlert(){document.getElementById('alertModal').classList.remove('open');}
function goBack(){window.location.href=DASH[currentUser?.type]||'AccountantDashboard.html';}

/* ═══════════════════════════════════════
   DATE / TIME HELPERS
═══════════════════════════════════════ */
function parseDate(str){
  if(!str)return null;
  const match = str.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if(match){
    const day = parseInt(match[1]);
    const monthStr = match[2];
    const year = parseInt(match[3]);
    const monthIndex = MONTHS.findIndex(m => m.toLowerCase() === monthStr.toLowerCase());
    if(monthIndex !== -1) return new Date(year, monthIndex, day);
  }
  const d = new Date(str);
  return isNaN(d) ? null : d;
}

function formatDate(d){
  if(!d)return'';
  return `${String(d.getDate()).padStart(2,'0')}/${MONTHS[d.getMonth()]}/${d.getFullYear()}`;
}

function dateToInput(s){
  const d=parseDate(s);
  if(!d)return'';
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function timeToInput(t){
  if(!t)return'';
  const m=String(t).match(/(\d{1,2}):(\d{2})/);
  return m?`${m[1].padStart(2,'0')}:${m[2]}`:String(t).substring(0,5);
}

function formatActivitiesText(items,quantities){
  const parts=[];
  items.forEach((item,i)=>{
    const qty=quantities[i]||0;
    if(qty>0) parts.push(`${item}×${qty}`);
  });
  return parts.join(' | ');
}

/* ═══════════════════════════════════════
   CLOCK (Analog)
═══════════════════════════════════════ */
function buildClockFace(){
  const tg=document.getElementById('ckTicks'),ng=document.getElementById('ckNums');
  if(!tg||!ng||tg.children.length)return;
  for(let i=0;i<60;i++){
    const a=(i*6-90)*Math.PI/180,maj=i%5===0,r1=maj?96:103,r2=109;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',CX+r1*Math.cos(a));line.setAttribute('y1',CY+r1*Math.sin(a));
    line.setAttribute('x2',CX+r2*Math.cos(a));line.setAttribute('y2',CY+r2*Math.sin(a));
    line.setAttribute('stroke',maj?'#0f1f3d':'#c5cfe0');line.setAttribute('stroke-width',maj?'2.5':'1');
    tg.appendChild(line);
  }
  for(let i=1;i<=12;i++){
    const a=(i*30-90)*Math.PI/180,r=82;
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',CX+r*Math.cos(a));t.setAttribute('y',CY+r*Math.sin(a));
    t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','central');
    t.setAttribute('font-size','14');t.setAttribute('font-weight','700');t.setAttribute('fill','#1a2540');
    t.textContent=i;ng.appendChild(t);
  }
  for(let i=1;i<=12;i++){
    const a=(i*30-90)*Math.PI/180,r=54;
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',CX+r*Math.cos(a));t.setAttribute('y',CY+r*Math.sin(a));
    t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','central');
    t.setAttribute('font-size','9');t.setAttribute('font-weight','600');t.setAttribute('fill','#94a3b8');
    t.textContent=(i+12)%24||12;ng.appendChild(t);
  }
}

function updateHandsDisplay(){
  const h=ckHour!==null?ckHour:0,m=ckMin!==null?ckMin:0;
  const ha=((h%12)*30+(m*0.5)-90)*Math.PI/180,ma=(m*6-90)*Math.PI/180;
  const hl=50,ml=68;
  const hx=CX+hl*Math.cos(ha),hy=CY+hl*Math.sin(ha),mx=CX+ml*Math.cos(ma),my=CY+ml*Math.sin(ma);
  const hh=document.getElementById('ckHandH');if(hh){hh.setAttribute('x2',hx);hh.setAttribute('y2',hy);}
  const hm=document.getElementById('ckHandM');if(hm){hm.setAttribute('x2',mx);hm.setAttribute('y2',my);}
  const dot=document.getElementById('ckDot');
  if(dot){if(ckMode==='hour'&&ckHour!==null){dot.setAttribute('cx',hx);dot.setAttribute('cy',hy);dot.setAttribute('opacity','1');}
  else if(ckMode==='minute'&&ckMin!==null){dot.setAttribute('cx',mx);dot.setAttribute('cy',my);dot.setAttribute('opacity','1');}
  else dot.setAttribute('opacity','0');}
  const hEl=document.getElementById('ckH'),mEl=document.getElementById('ckM');
  if(hEl)hEl.textContent=ckHour!==null?(ckHour<10?'0'+ckHour:''+ckHour):'--';
  if(mEl)mEl.textContent=ckMin!==null?(ckMin<10?'0'+ckMin:''+ckMin):'--';
  if(hEl)hEl.style.color=ckMode==='hour'?'var(--gold)':'white';
  if(mEl)mEl.style.color=ckMode==='minute'?'var(--gold)':'white';
}

function openClockModal(){
  buildClockFace();
  const ex=document.getElementById('tripTime')?.value;
  if(ex&&ex!=='--:--'){const[h,m]=ex.split(':');ckHour=parseInt(h);ckMin=parseInt(m);}
  else{ckHour=null;ckMin=null;}
  ckMode='hour';
  document.getElementById('modeHour').classList.add('active');
  document.getElementById('modeMin').classList.remove('active');
  updateHandsDisplay();
  document.getElementById('clockModal').classList.add('open');
  bindClockTouch();
}

function closeClockModal(){document.getElementById('clockModal').classList.remove('open');}
function clearClock(){ckHour=null;ckMin=null;updateHandsDisplay();}
function confirmClock(){
  if(ckHour===null||ckMin===null){showAlert('Please select both hour and minute','⚠️');return;}
  const t=(ckHour<10?'0'+ckHour:''+ckHour)+':'+(ckMin<10?'0'+ckMin:''+ckMin);
  document.getElementById('tripTime').value=t;
  const td=document.getElementById('timeDisplayText');if(td){td.textContent=t;td.classList.remove('ph');}
  closeClockModal();
}
function setClockMode(m){ckMode=m;document.getElementById('modeHour').classList.toggle('active',m==='hour');document.getElementById('modeMin').classList.toggle('active',m==='minute');updateHandsDisplay();}
function bindClockTouch(){
  const wrap=document.getElementById('ckWrap');if(!wrap)return;
  const nw=wrap.cloneNode(true);wrap.parentNode.replaceChild(nw,wrap);
  nw.addEventListener('click',onClockClick);
  nw.addEventListener('touchend',e=>{e.preventDefault();onClockClick(e.changedTouches[0]);},{passive:false});
}
function onClockClick(e){
  const wrap=document.getElementById('ckWrap');if(!wrap)return;
  const rect=wrap.getBoundingClientRect();
  const scaleX=230/rect.width,scaleY=230/rect.height;
  const svgX=((e.clientX||e.pageX)-rect.left)*scaleX,svgY=((e.clientY||e.pageY)-rect.top)*scaleY;
  const dx=svgX-CX,dy=svgY-CY,dist=Math.sqrt(dx*dx+dy*dy);
  let angle=Math.atan2(dy,dx)*(180/Math.PI)+90;if(angle<0)angle+=360;
  if(ckMode==='hour'){
    let h=Math.round(angle/30)%12;if(h===0)h=12;
    if(dist<65)h=(h===12?0:h)+12;
    ckHour=h%24;ckMode='minute';
    document.getElementById('modeHour').classList.remove('active');
    document.getElementById('modeMin').classList.add('active');
  }else{ckMin=Math.round(angle/6)%60;}
  updateHandsDisplay();
}

async function loadData(){
  try{
    const [tripsRes, customersRes, nationalitiesRes, hotelsRes] = await Promise.all([
      callGAS('getUniqueTrips'),
      callGAS('getAllCustomers'),
      callGAS('getNationalities'),

    ]);

/* ═══════════════════════════════════════

═══════════════════════════════════════ */
async function onTripChange(){
  const tripName = document.getElementById('tripName')?.value;
  if(!tripName) return;
  
  showPDFOv('جاري تحميل بيانات الرحلة...');
  try{
    const tripData = await callGAS('getTripData',{tripName, currency:'$'});
    if(tripData && tripData.items){
      currentTripItems = tripData.items;
      currentTripPrices = tripData.prices || [];
      renderTripTable();
    } else {
      currentTripItems = [];
      currentTripPrices = [];
      document.getElementById('tripItemsContainer').innerHTML = '<div class="no-data" style="padding:20px">لا توجد بيانات للرحلة</div>';
    }
  }catch(e){
    showAlert('خطأ: '+e.message,'❌');
  }finally{
    hidePDFOv();
  }
}

function renderTripTable(){
  if(!currentTripItems.length){
    document.getElementById('tripItemsContainer').innerHTML = '<div class="no-data" style="padding:20px">اختر رحلة لعرض بنودها</div>';
    return;
  }
  
  let rows = '';
  currentTripItems.forEach((item, i) => {
    rows += `<tr><td style="font-weight:600">${item}</td>
      <td><input type="number" id="qty_${i}" min="0" placeholder="0" value="${activitiesQuantities[i]||0}" oninput="updateActivitiesText()" onfocus="this.select()" class="fc"></td>
    </tr>`;
  });
  
  document.getElementById('tripItemsContainer').innerHTML = `
    <div class="trip-table">
      <table>
        <thead>
          <tr><th style="text-align:left;padding-left:14px">النشاط</th><th>العدد</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function updateActivitiesText(){
  const quantities = [];
  currentTripItems.forEach((item, i)=>{
    quantities[i] = parseFloat(document.getElementById(`qty_${i}`)?.value) || 0;
  });
  const activitiesText = formatActivitiesText(currentTripItems, quantities);
  document.getElementById('activitiesTextDisplay').value = activitiesText;
}

/* ═══════════════════════════════════════
   SAVE INVOICE
═══════════════════════════════════════ */
async function saveInvoice(){
  // التحقق من الحقول المطلوبة
  const customer = document.getElementById('customer')?.value;
  const guestName = document.getElementById('guestName')?.value;
  const contactNo = document.getElementById('contactNo')?.value;
  const nationality = document.getElementById('nationality')?.value;
  const hotel = document.getElementById('hotel')?.value;
  const activeDate = document.getElementById('activeDate')?.value;
  const tripTime = document.getElementById('tripTime')?.value;
  const tripName = document.getElementById('tripName')?.value;
  const restAmount = parseFloat(document.getElementById('totalPrice')?.value) || 0;
  const currency = document.getElementById('invoiceCurrency')?.value || '';
  
  if(!customer){showAlert('الرجاء اختيار العميل','⚠️');return;}
  if(!guestName){showAlert('الرجاء إدخال اسم السائح','⚠️');return;}
  if(!contactNo){showAlert('الرجاء إدخال رقم الهاتف','⚠️');return;}
  if(!nationality){showAlert('الرجاء إدخال الجنسية','⚠️');return;}
  if(!hotel){showAlert('الرجاء إدخال اسم الفندق','⚠️');return;}
  if(!activeDate){showAlert('الرجاء إدخال تاريخ التنفيذ','⚠️');return;}
  if(!tripTime){showAlert('الرجاء إدخال وقت التنفيذ','⚠️');return;}
  if(!tripName){showAlert('الرجاء اختيار الرحلة','⚠️');return;}
  if(restAmount > 0 && !currency){showAlert('الرجاء اختيار العملة للمبلغ المتبقي','⚠️');return;}
  
  // جمع الكميات للأنشطة (ActivitiesText)
  const quantities = [];
  currentTripItems.forEach((item,i)=>{
    quantities[i] = parseFloat(document.getElementById(`qty_${i}`)?.value) || 0;
  });
  
  const activitiesText = formatActivitiesText(currentTripItems, quantities);
  
  const today = new Date();
  const issueDate = formatDate(today);
  
  // حساب عدد المشاركين
  const adultCount = parseInt(document.getElementById('adultCount')?.value) || 0;
  const childCount = parseInt(document.getElementById('childCount')?.value) || 0;
  const infantCount = parseInt(document.getElementById('infantCount')?.value) || 0;
  
  const invoiceData = {
    issueDate: issueDate,
    activeDate: dateToInput(activeDate),
    time: tripTime,
    trip: tripName,
    customer: customer,
    executor: currentUser?.branchName || currentUser?.centerName || '',
    guestName: guestName,
    nationality: nationality,
    hotel: hotel,
    roomNo: document.getElementById('roomNo')?.value || '',
    contactNo: contactNo,
    adultCount: adultCount,
    childCount: childCount,
    infantCount: infantCount,
    activitiesText: activitiesText,
    actualPrice: 0,  // المبلغ الإجمالي للفواتير العادية = 0
    paymentPrice: 0,
    rest: restAmount,  // المبلغ المتبقي على الزبون
    discount: 0,
    notes: document.getElementById('notes')?.value || '',
    state: 'pending',
    salesId: currentUser?.id || '',
    salesName: currentUser?.name || '',
    centerName: currentUser?.centerName || '',
    branchName: currentUser?.branchName || '',
    invoiceCurrency: currency || '',
    cost: false
  };
  
  showPDFOv('جاري حفظ الفاتورة...');
  try{
    const result = await callGAS('saveInvoice', invoiceData);
    if(result?.success){
      hidePDFOv();
      showAlert(
        `✅ تم حفظ الفاتورة بنجاح\nرقم الفاتورة: ${result.voucherNo}\nالعميل: ${customer}\n${restAmount > 0 ? 'المبلغ المتبقي: ' + restAmount + ' ' + currency : ''}`,
        '✅',
        `<button class="btn btn-save" onclick="location.reload()">فاتورة جديدة</button>
         <button class="btn btn-save" onclick="goBack()">رجوع للوحة</button>`
      );
    } else {
      throw new Error(result?.message || 'فشل الحفظ');
    }
  } catch(e){
    hidePDFOv();
    showAlert('خطأ: '+e.message,'❌');
  }
}
