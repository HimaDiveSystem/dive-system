  <style>
    :root {
      --color-primary: #1e2b4f;
      --color-secondary: #f5c842;
      --color-success: #27ae60;
      --color-danger: #e74c3c;
      --color-warning: #f39c12;
      --color-info: #3498db;
      --color-light: #f0f4f8;
      --color-text: #1a2540;
      --color-text-light: #5a6a8a;
      --gradient-primary: linear-gradient(135deg, #1e2b4f 0%, #152238 100%);
      --gradient-secondary: linear-gradient(135deg, #f5c842 0%, #e6b800 100%);
      --gradient-success: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
      --gradient-danger: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      --radius-lg: 16px;
      --radius-xl: 24px;
      --shadow-md: 0 4px 16px rgba(15,31,61,0.12);
      --shadow-lg: 0 8px 24px rgba(15,31,61,0.15);
      --navy: #0f1f3d;
      --navy2: #1a3260;
      --gold: #f5c842;
      --gold2: #e6b800;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #ea580c;
      --purple: #7c3aed;
      --teal: #0d9488;
      --bg: #f0f4f8;
      --card: #fff;
      --border: #dde4f0;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(15,31,61,0.10);
      --font-primary: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
   
      *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    .header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;padding:13px 22px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(15,31,61,.25);}
    .header h2{color:var(--gold);font-size:18px;font-weight:900;}
    .header-right{display:flex;align-items:center;gap:8px;}
    .user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:40px;padding:4px 13px;color:white;font-size:12px;font-weight:600;}
    .back-btn{background:transparent;border:2px solid rgba(255,255,255,.3);color:white;padding:4px 13px;border-radius:40px;cursor:pointer;font-weight:700;font-size:12px;font-family:'Cairo',sans-serif;transition:all .2s;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}
    .page{max-width:1200px;margin:0 auto;padding:20px 16px 50px;}
    .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden;}
    .card-head{padding:12px 18px;background:linear-gradient(90deg,var(--navy),var(--navy2));display:flex;align-items:center;gap:8px;}
    .card-head h3{color:var(--gold);font-size:14px;font-weight:800;}
    .ch-icon{background:rgba(245,200,66,.2);border-radius:7px;padding:3px 6px;font-size:13px;}
    .card-body{padding:16px;}
    .fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:14px;}
    .fgroup{display:flex;flex-direction:column;gap:5px;}
    .fgroup label{font-size:11px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px;margin-bottom:0;}
    .fgroup label.req::after{content:' *';color:var(--red);}
    .fc{padding:8px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Cairo',sans-serif;color:var(--text);background:#fafbfd;width:100%;height:40px;transition:border-color .2s;}
    .fc:focus{border-color:var(--blue);outline:none;background:white;}
    .fc:focus::placeholder{color:transparent;}
    select.fc{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='13' height='13' viewBox='0 0 24 24' fill='none' stroke='%235a6a8a' stroke-width='2.5'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:left 10px center;padding-left:30px;}
    .btn{padding:8px 20px;border:none;border-radius:40px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .2s;}
    .btn:hover{transform:translateY(-1px);}
    .btn-save{background:var(--green);color:white;}
    .btn-clear{background:#f1f5f9;color:var(--text);}
    .btn-back{background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);}
    .action-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:10px;}
    .trip-table{overflow-x:auto;margin-top:12px;border:1px solid var(--border);border-radius:10px;}
    .trip-table table{width:100%;border-collapse:collapse;}
    .trip-table th{background:#f0f4f8;padding:10px;font-size:12px;font-weight:700;text-align:center;}
    .trip-table td{padding:8px;border-bottom:1px solid #f0f4f8;text-align:center;}
    .trip-table input{width:80px;padding:6px;text-align:center;border:2px solid var(--border);border-radius:8px;background:#fafbfd;}
    .trip-table input:focus{border-color:var(--blue);outline:none;}
    .trip-table input:focus::placeholder{color:transparent;}
    .total-card{background:linear-gradient(135deg,var(--navy),var(--navy2));}
    .total-card .card-head{background:transparent;}
    .total-card .card-head h3{color:var(--gold);}
    .total-strip{display:flex;justify-content:space-around;align-items:center;flex-wrap:wrap;gap:14px;padding:16px;}
    .total-tile{text-align:center;}
    .total-tile .tl{font-size:10px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;margin-bottom:6px;}
    .total-tile .tv{font-size:28px;font-weight:900;color:white;}
    .total-tile input{width:130px;padding:8px;border-radius:10px;text-align:center;font-size:16px;font-weight:700;background:white;border:none;color:var(--navy);}
    .total-tile input:focus{outline:2px solid var(--gold);}
    .total-tile select{width:100px;padding:8px;border-radius:10px;text-align:center;font-size:14px;font-weight:700;background:white;border:none;color:var(--navy);}
    .loader{text-align:center;padding:40px;}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;z-index:9999;}
    .modal.open{display:flex;}
    .alert-box{background:white;width:90%;max-width:380px;border-radius:22px;padding:24px;text-align:center;}
    .alert-icon{font-size:40px;margin-bottom:10px;}
    .alert-msg{color:var(--navy);font-size:14px;font-weight:700;margin-bottom:18px;}
    .alert-actions{display:flex;gap:10px;justify-content:center;margin-top:16px;}
    .hotel-row{display:grid;grid-template-columns:1fr 90px 70px 70px 70px;gap:10px;margin-top:12px;}
    .compact-num{text-align:center;}
    
    /* ✅ تحسينات للهواتف */
    @media(max-width:640px){
      .hotel-row{
        grid-template-columns:1fr 1fr 1fr 1fr;
        gap:8px;
      }
      /* الفندق في صف كامل */
      .hotel-row .fgroup:first-child {
        grid-column: 1 / -1;
      }
      /* تصغير حجم الحقول الصغيرة */
      .compact-num{width:100%;}
      /* تحسين عرض حقل الفندق */
      .hotel-row .fgroup input,
      .hotel-row .fgroup select {
        font-size:12px;
        padding:6px 8px;
        height:36px;
      }
    }
    
    .time-btn-display{width:100%;height:40px;padding:8px;border:2px solid var(--border);border-radius:10px;background:#fafbfd;cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
    .time-btn-display .ph{color:#b0bac9;}
    .clock-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);align-items:center;justify-content:center;z-index:10000;backdrop-filter:blur(6px);}
    .clock-modal.open{display:flex;}
    .clock-box{background:white;width:90%;max-width:340px;border-radius:28px;overflow:hidden;box-shadow:0 30px 70px rgba(0,0,0,.5);animation:pop .3s cubic-bezier(.34,1.56,.64,1);}
    .ck-head{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:18px 20px;text-align:center;}
    .ck-head-title{color:var(--gold);font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;opacity:.8;}
    .ck-time-big{font-size:56px;font-weight:900;color:white;letter-spacing:4px;font-family:monospace;line-height:1;margin-bottom:12px;}
    .ck-mode-row{display:flex;justify-content:center;gap:8px;}
    .ck-mode-pill{padding:4px 18px;border-radius:20px;font-size:12px;font-weight:700;border:2px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.5);cursor:pointer;}
    .ck-mode-pill.active{background:var(--gold);color:var(--navy);border-color:var(--gold);}
    .ck-face-wrap{padding:18px;background:#f5f7fb;display:flex;justify-content:center;align-items:center;}
    .ck-svg-wrap{width:230px;height:230px;cursor:crosshair;}
    .ck-svg-wrap svg{width:100%;height:100%;}
    .ck-foot{display:flex;gap:8px;padding:14px 16px;background:white;border-top:1px solid var(--border);}
    .ck-btn{flex:1;padding:11px;border:none;border-radius:40px;font-weight:700;font-size:13px;cursor:pointer;}
    .ck-clear{background:#f1f5f9;color:var(--text);}
    .ck-cancel{background:#fee2e2;color:var(--red);}
    .ck-set{background:linear-gradient(135deg,var(--green),#15803d);color:white;}
    @keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
    
   @media(max-width:640px){
  .ck-svg-wrap{width:200px;height:200px;}
  .ck-time-big{font-size:44px;}
  .ck-mode-row{
    flex-direction:row;
    justify-content:center;
    gap:8px;
  }
  .ck-mode-pill{
    width:auto;
    text-align:center;
    padding:4px 18px;
  }
}
    
    .error-box{background:#fee2e2;border:1px solid var(--red);border-radius:12px;padding:20px;text-align:center;margin:20px;}
    .error-box .err-icon{font-size:48px;margin-bottom:12px;}
    .error-box .err-msg{color:var(--red);font-size:14px;margin-bottom:16px;}
  </style>

<div class="header">
  <h2>📋 إدخال فاتورة</h2>
  <div class="header-right">
    <span class="user-chip" id="userChip">...</span>
    <button class="back-btn" onclick="goBack()">← رجوع</button>
  </div>
</div>

</div>

<div id="alertModal" class="modal">
  <div class="alert-box">
    <div class="alert-icon" id="alertIcon">ℹ️</div>
    <div class="alert-msg" id="alertMsg"></div>

<!-- Clock Modal -->
<div id="clockModal" class="clock-modal">
  <div class="clock-box">
    <div class="ck-head">
      <div class="ck-head-title">SELECT TIME</div>
      <!-- ✅ الساعة (HOUR) في الأعلى -->
      <div class="ck-time-big" style="font-size:32px;color:#f5c842;font-weight:700;margin-bottom:2px;">
        <span id="ckH">--</span>
      </div>
      <!-- ✅ الدقائق (MINUTE) في الأسفل -->
      <div class="ck-time-big" style="font-size:42px;color:white;font-weight:900;margin-bottom:8px;">
        <span id="ckM">--</span>
      </div>
          <div class="ck-mode-row">
      <button class="ck-mode-pill active" id="modeHour" onclick="setClockMode('hour')">HOUR</button>
      <button class="ck-mode-pill" id="modeMin" onclick="setClockMode('minute')">MINUTE</button>
    </div>
    </div>
    <div class="ck-face-wrap">
      <div class="ck-svg-wrap" id="ckWrap">
        <svg id="ckSVG" viewBox="0 0 230 230" xmlns="http://www.w3.org/2000/svg">
          <circle cx="115" cy="115" r="112" fill="#eef2f8" stroke="#dde4f0" stroke-width="1.5"/>
          <circle cx="115" cy="115" r="64" fill="rgba(37,99,235,.04)" stroke="rgba(37,99,235,.12)" stroke-width="1" stroke-dasharray="4 3"/>
          <g id="ckTicks"></g>
          <g id="ckNums"></g>
          <line id="ckHandH" x1="115" y1="115" x2="115" y2="62" stroke="#0f1f3d" stroke-width="5" stroke-linecap="round"/>
          <line id="ckHandM" x1="115" y1="115" x2="115" y2="44" stroke="#2563eb" stroke-width="3.5" stroke-linecap="round"/>
          <circle cx="115" cy="115" r="7" fill="#0f1f3d"/>
          <circle cx="115" cy="115" r="3" fill="#f5c842"/>
          <circle id="ckDot" cx="115" cy="44" r="9" fill="#f5c842" opacity="0"/>
        </svg>
      </div>
    </div>
    <div class="ck-foot">
      <button class="ck-btn ck-clear" onclick="clearClock()">🔄 Clear</button>
      <button class="ck-btn ck-cancel" onclick="closeClockModal()">❌ Cancel</button>
      <button class="ck-btn ck-set" onclick="confirmClock()">✅ Set</button>
    </div>
  </div>
</div>

<!-- ====== منع الخروج قبل 24 ساعة ====== -->
<script>
(function() {
  history.pushState(null, null, location.href);
  window.addEventListener('popstate', function(e) {
    history.pushState(null, null, location.href);
    alert('⚠️ لا يمكنك الخروج قبل 24 ساعة من بدء الجلسة');
  });
  
  window.addEventListener('beforeunload', function(e) {
    e.preventDefault();
    e.returnValue = '⚠️ لا يمكنك الخروج قبل 24 ساعة من بدء الجلسة';
    return e.returnValue;
  });
  
  if (!sessionStorage.getItem('sessionStartTime')) {
    sessionStorage.setItem('sessionStartTime', Date.now().toString());
  }
  
  setInterval(function() {
    const start = parseInt(sessionStorage.getItem('sessionStartTime'));
    const now = Date.now();
    const hoursPassed = (now - start) / (1000 * 60 * 60);
    if (hoursPassed >= 24) {
      window.removeEventListener('beforeunload', null);
      sessionStorage.removeItem('sessionStartTime');
    }
  }, 5000);
})();
</script>

<script>
let currentUser = null;
let selectedCustomer = null;
let allCustomers = [];
let customerTrips = [];
let allTrips = [];
let allNationalities = [];
let allHotels = [];
let currentTripItems = [];
let activitiesQuantities = [];
let returnUrl = null;

// ====================== الساعة ======================
let ckHour = null, ckMin = null, ckMode = 'hour';
const CX = 115, CY = 115;

function buildClockFace() {
  const tg = document.getElementById('ckTicks'), ng = document.getElementById('ckNums');
  if (!tg || !ng || tg.children.length) return;
  for (let i = 0; i < 60; i++) {
    const a = (i * 6 - 90) * Math.PI / 180, maj = i % 5 === 0, r1 = maj ? 96 : 103, r2 = 109;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', CX + r1 * Math.cos(a));
    line.setAttribute('y1', CY + r1 * Math.sin(a));
    line.setAttribute('x2', CX + r2 * Math.cos(a));
    line.setAttribute('y2', CY + r2 * Math.sin(a));
    line.setAttribute('stroke', maj ? '#0f1f3d' : '#c5cfe0');
    line.setAttribute('stroke-width', maj ? '2.5' : '1');
    tg.appendChild(line);
  }
  for (let i = 1; i <= 12; i++) {
    const a = (i * 30 - 90) * Math.PI / 180, r = 82;
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', CX + r * Math.cos(a));
    t.setAttribute('y', CY + r * Math.sin(a));
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('dominant-baseline', 'central');
    t.setAttribute('font-size', '14');
    t.setAttribute('font-weight', '700');
    t.setAttribute('fill', '#1a2540');
    t.textContent = i;
    ng.appendChild(t);
  }
  for (let i = 1; i <= 12; i++) {
    const a = (i * 30 - 90) * Math.PI / 180, r = 54;
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', CX + r * Math.cos(a));
    t.setAttribute('y', CY + r * Math.sin(a));
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('dominant-baseline', 'central');
    t.setAttribute('font-size', '9');
    t.setAttribute('font-weight', '600');
    t.setAttribute('fill', '#94a3b8');
    t.textContent = (i + 12) % 24 || 12;
    ng.appendChild(t);
  }
}

function updateHandsDisplay() {
  const h = ckHour !== null ? ckHour : 0, m = ckMin !== null ? ckMin : 0;
  const ha = ((h % 12) * 30 + (m * 0.5) - 90) * Math.PI / 180;
  const ma = (m * 6 - 90) * Math.PI / 180;
  const hl = 50, ml = 68;
  const hx = CX + hl * Math.cos(ha), hy = CY + hl * Math.sin(ha);
  const mx = CX + ml * Math.cos(ma), my = CY + ml * Math.sin(ma);
  const hh = document.getElementById('ckHandH');
  if (hh) { hh.setAttribute('x2', hx); hh.setAttribute('y2', hy); }
  const hm = document.getElementById('ckHandM');
  if (hm) { hm.setAttribute('x2', mx); hm.setAttribute('y2', my); }
  const dot = document.getElementById('ckDot');
  if (dot) {
    if (ckMode === 'hour' && ckHour !== null) {
      dot.setAttribute('cx', hx); dot.setAttribute('cy', hy); dot.setAttribute('opacity', '1');
    } else if (ckMode === 'minute' && ckMin !== null) {
      dot.setAttribute('cx', mx); dot.setAttribute('cy', my); dot.setAttribute('opacity', '1');
    } else dot.setAttribute('opacity', '0');
  }
  const hEl = document.getElementById('ckH'), mEl = document.getElementById('ckM');
  if (hEl) hEl.textContent = ckHour !== null ? (ckHour < 10 ? '0' + ckHour : '' + ckHour) : '--';
  if (mEl) mEl.textContent = ckMin !== null ? (ckMin < 10 ? '0' + ckMin : '' + ckMin) : '--';
  if (hEl) hEl.style.color = ckMode === 'hour' ? 'var(--gold)' : 'white';
  if (mEl) mEl.style.color = ckMode === 'minute' ? 'var(--gold)' : 'white';
}

function openClockModal() {
  buildClockFace();
  const ex = document.getElementById('tripTime')?.value;
  if (ex && ex !== '--:--') { const [h, m] = ex.split(':'); ckHour = parseInt(h); ckMin = parseInt(m); }
  else { ckHour = null; ckMin = null; }
   ckMode = 'hour';
  document.getElementById('modeHour').classList.add('active');
  document.getElementById('modeMin').classList.remove('active');
  updateHandsDisplay();
  document.getElementById('clockModal').classList.add('open');
  bindClockTouch();
}

function closeClockModal() { document.getElementById('clockModal').classList.remove('open'); }
function clearClock() { ckHour = null; ckMin = null; updateHandsDisplay(); }
function confirmClock() {
  if (ckHour === null || ckMin === null) { showAlert('Please select both hour and minute', '⚠️'); return; }
  const t = (ckHour < 10 ? '0' + ckHour : '' + ckHour) + ':' + (ckMin < 10 ? '0' + ckMin : '' + ckMin);
  document.getElementById('tripTime').value = t;
  const td = document.getElementById('timeDisplayText');
  if (td) { td.textContent = t; td.classList.remove('ph'); }
  closeClockModal();
}
function setClockMode(m) {
  ckMode = m;
  document.getElementById('modeHour').classList.toggle('active', m === 'hour');
  document.getElementById('modeMin').classList.toggle('active', m === 'minute');
  updateHandsDisplay();
}
function bindClockTouch() {
  const wrap = document.getElementById('ckWrap');
  if (!wrap) return;
  const nw = wrap.cloneNode(true);
  wrap.parentNode.replaceChild(nw, wrap);
  nw.addEventListener('click', onClockClick);
  nw.addEventListener('touchend', e => { e.preventDefault(); onClockClick(e.changedTouches[0]); }, { passive: false });
}
function onClockClick(e) {
  const wrap = document.getElementById('ckWrap');
  if (!wrap) return;
  const rect = wrap.getBoundingClientRect();
  const scaleX = 230 / rect.width, scaleY = 230 / rect.height;
  const svgX = ((e.clientX || e.pageX) - rect.left) * scaleX;
  const svgY = ((e.clientY || e.pageY) - rect.top) * scaleY;
  const dx = svgX - CX, dy = svgY - CY, dist = Math.sqrt(dx * dx + dy * dy);
  let angle = Math.atan2(dy, dx) * (180 / Math.PI) + 90;
  if (angle < 0) angle += 360;
  if (ckMode === 'hour') {
    let h = Math.round(angle / 30) % 12;
    if (h === 0) h = 12;
    if (dist < 65) h = (h === 12 ? 0 : h) + 12;
        ckHour = h % 24;
    ckMode = 'minute';
    document.getElementById('modeMin').classList.remove('active');
    document.getElementById('modeHour').classList.add('active');
  } else {
    ckMin = Math.round(angle / 6) % 60;
  }
  updateHandsDisplay();
}

// ====================== الاتصال ======================
function gas(action, params = {}) {
  return new Promise((resolve, reject) => {
    const callbackName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    const url = new URL(CONFIG.GAS_URL);
    url.searchParams.set('action', action);
    url.searchParams.set('callback', callbackName);
    url.searchParams.set('_t', Date.now());
    
    if (currentUser && currentUser.centerName && !params.centerName) {
      params.centerName = currentUser.centerName;
    }
    if (currentUser && currentUser.centerId && !params.centerId) {
      params.centerId = currentUser.centerId;
    }
    
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v ?? '')));
    window[callbackName] = function(data) {
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
      resolve(data);
    };

    const script = document.createElement('script');
    script.src = url.toString();
    script.onerror = () => {
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('فشل الاتصال بالخادم'));
    };
    document.body.appendChild(script);
    setTimeout(() => {
      if (window[callbackName]) {
        delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);
        reject(new Error('انتهى وقت الاتصال'));
      }
    }, 30000);
  });
}

function formatDate(d) {
  if (!d) return '';
  const MN = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return `${String(d.getDate()).padStart(2, '0')}/${MN[d.getMonth()]}/${d.getFullYear()}`;
}

function dateToInput(dateStr) {
  if (!dateStr) return '';
  const match = dateStr.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (match) {
    const months = { Jan: '01', Feb: '02', Mar: '03', Apr: '04', May: '05', Jun: '06', Jul: '07', Aug: '08', Sep: '09', Oct: '10', Nov: '11', Dec: '12' };
    return `${match[3]}-${months[match[2]]}-${match[1].padStart(2, '0')}`;
  }
  return dateStr;
}

function formatActivitiesText(items, quantities) {
  const parts = [];
  items.forEach((item, i) => {
    const qty = quantities[i] || 0;
    if (qty > 0) parts.push(`${item}×${qty}`);
  });
  return parts.join(' | ');
}

      selectedCustomer = allCustomers.find(c => 
        c.loginEmail === currentUser?.email || c.customerName === currentUser?.name

    if (selectedCustomer) {

  } catch (e) {
    showAlert('فشل تحميل بيانات العميل: ' + e.message, '❌');

async function onTripChange() {
  const tripName = document.getElementById('tripName')?.value;
  if (!tripName) {
    document.getElementById('tripItemsContainer').innerHTML = '<div class="no-data" style="padding:20px">اختر رحلة لعرض بنودها</div>';
    return;
  }
  
  try {
    const tripData = await gas('getTripData', { 
      tripName, 
      currency: '$',
      centerName: currentUser?.centerName || '' 
    });
    if (tripData && tripData.items && tripData.items.length > 0) {
      currentTripItems = tripData.items;
      activitiesQuantities = new Array(currentTripItems.length).fill(0);
      renderTripTable();
      updateActivitiesText();
    } else {
      currentTripItems = [];
      document.getElementById('tripItemsContainer').innerHTML = '<div class="no-data" style="padding:20px">لا توجد بيانات للرحلة</div>';
    }
  } catch (e) {
    showAlert('خطأ في تحميل بيانات الرحلة: ' + e.message, '❌');
  }
}

function renderTripTable() {
  if (!currentTripItems.length) {
    document.getElementById('tripItemsContainer').innerHTML = '<div class="no-data" style="padding:20px">اختر رحلة لعرض بنودها</div>';
    return;
  }
  
  let rows = '';
  for (let i = 0; i < currentTripItems.length; i++) {
    const item = currentTripItems[i];
    rows += `<tr><td style="font-weight:600;text-align:right">${item}</td>
                <td><input type="number" id="qty_${i}" min="0" placeholder="0" value="${activitiesQuantities[i] || ''}" oninput="updateActivitiesText()" class="fc" style="width:80px"></td>

    <div class="trip-table">
      <table>
        <thead>
          <tr><th style="text-align:right;padding-left:14px">النشاط</th><th>العدد</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>

  `;
}

function updateActivitiesText() {
  const quantities = [];
  for (let i = 0; i < currentTripItems.length; i++) {
    const val = document.getElementById(`qty_${i}`)?.value;
    quantities[i] = val && val !== '' ? parseFloat(val) : 0;
    activitiesQuantities[i] = quantities[i];
  }
  const activitiesText = formatActivitiesText(currentTripItems, quantities);
  document.getElementById('activitiesTextDisplay').value = activitiesText;
  updateTotalPersons();

async function saveInvoice() {
  const customer = document.getElementById('customer')?.value;
  const guestName = document.getElementById('guestName')?.value;
  const contactNo = document.getElementById('contactNo')?.value;
  const nationality = document.getElementById('nationality')?.value;
  const hotel = document.getElementById('hotel')?.value;
  const activeDate = document.getElementById('activeDate')?.value;
  const tripTime = document.getElementById('tripTime')?.value;
  const tripName = document.getElementById('tripName')?.value;
  const restAmount = parseFloat(document.getElementById('totalPrice')?.value) || 0;
  const currency = document.getElementById('invoiceCurrency')?.value || '';
  
  if(!customer){showAlert('الرجاء اختيار العميل','⚠️');return;}
  if(!guestName){showAlert('الرجاء إدخال اسم السائح','⚠️');return;}
  if(!contactNo){showAlert('الرجاء إدخال رقم الهاتف','⚠️');return;}
  if(!nationality){showAlert('الرجاء إدخال الجنسية','⚠️');return;}
  if(!hotel){showAlert('الرجاء إدخال اسم الفندق','⚠️');return;}
  if(!activeDate){showAlert('الرجاء إدخال تاريخ التنفيذ','⚠️');return;}
  if(!tripTime){showAlert('الرجاء إدخال وقت التنفيذ','⚠️');return;}
  if(!tripName){showAlert('الرجاء اختيار الرحلة','⚠️');return;}
  if(restAmount > 0 && !currency){showAlert('الرجاء اختيار العملة للمبلغ المتبقي','⚠️');return;}
  
  const quantities = [];
  for (let i = 0; i < currentTripItems.length; i++) {
    const val = document.getElementById(`qty_${i}`)?.value;
    quantities[i] = val && val !== '' ? parseFloat(val) : 0;
  }
  const activitiesText = formatActivitiesText(currentTripItems, quantities);
  
  const today = new Date();
  const issueDate = formatDate(today);
  
  const adultCount = parseInt(document.getElementById('adultCount')?.value) || 0;
  const childCount = parseInt(document.getElementById('childCount')?.value) || 0;
  const infantCount = parseInt(document.getElementById('infantCount')?.value) || 0;
  
  const isSupplier = selectedCustomer?.customerType === 'Supplier';

  const invoiceData = {
    issueDate: issueDate,
    activeDate: dateToInput(activeDate),
    time: tripTime,
    trip: tripName,
    customer: isSupplier ? '' : customer,
    supplier: isSupplier ? customer : '',
    executor: currentUser?.branchName || currentUser?.centerName || '',
    guestName: guestName,
    nationality: nationality,
    hotel: hotel,
    roomNo: document.getElementById('roomNo')?.value || '',
    contactNo: contactNo,
    adultCount: adultCount,
    childCount: childCount,
    infantCount: infantCount,
    activitiesText: activitiesText,
    actualPrice: 0,
    paymentPrice: 0,
    rest: restAmount,
    discount: 0,
    notes: document.getElementById('notes')?.value || '',
    state: 'pending',
    salesId: currentUser?.id || '',
    salesName: currentUser?.name || '',
    centerName: selectedCustomer?.parentCenter || currentUser?.centerName || '',
    branchName: currentUser?.branchName || '',
    centerNameForSave: currentUser?.centerName || '',
    invoiceCurrency: currency || '',
    cost: false
  };
  
  const btn = document.getElementById('saveBtn');
  if (btn) btn.disabled = true;
  
  try {
    const result = await gas('saveInvoice', { ...invoiceData, centerName: currentUser?.centerName || '' });
    if(result?.success){
      showAlert(
        `✅ تم حفظ الفاتورة بنجاح\nرقم الفاتورة: ${result.voucherNo}\nالعميل: ${customer}\n${restAmount > 0 ? 'المبلغ المتبقي: ' + restAmount + ' ' + currency : ''}`,
        '✅',
        `<button class="btn btn-save" onclick="location.reload()">فاتورة جديدة</button>
         <button class="btn btn-back" onclick="goBack()">رجوع</button>`
      );
    } else {
      throw new Error(result?.message || 'فشل الحفظ');
    }
  } catch(e){
    showAlert('خطأ: '+e.message,'❌');
  } finally {
    if (btn) btn.disabled = false;
  }
}
