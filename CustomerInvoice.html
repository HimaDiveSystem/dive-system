<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>إدخال فاتورة - العميل</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0f1f3d;--navy2:#1a3260;--gold:#f5c842;
      --blue:#2563eb;--green:#16a34a;--red:#dc2626;
      --bg:#f0f4f8;--card:#fff;--border:#dde4f0;--text:#1a2540;--text-lt:#5a6a8a;
      --radius:16px;--radius-sm:10px;--shadow:0 4px 24px rgba(15,31,61,.10);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    .header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;padding:13px 22px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(15,31,61,.25);}
    .header h2{color:var(--gold);font-size:18px;font-weight:900;}
    .header-right{display:flex;align-items:center;gap:8px;}
    .user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:40px;padding:4px 13px;color:white;font-size:12px;font-weight:600;}
    .back-btn{background:transparent;border:2px solid rgba(255,255,255,.3);color:white;padding:4px 13px;border-radius:40px;cursor:pointer;font-weight:700;font-size:12px;font-family:'Cairo',sans-serif;transition:all .2s;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}
    .page{max-width:1200px;margin:0 auto;padding:20px 16px 50px;}
    .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden;}
    .card-head{padding:12px 18px;background:linear-gradient(90deg,var(--navy),var(--navy2));display:flex;align-items:center;gap:8px;}
    .card-head h3{color:var(--gold);font-size:14px;font-weight:800;}
    .ch-icon{background:rgba(245,200,66,.2);border-radius:7px;padding:3px 6px;font-size:13px;}
    .card-body{padding:16px;}
    .fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:14px;}
    .fgroup{display:flex;flex-direction:column;gap:5px;}
    .fgroup label{font-size:11px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px;}
    .fgroup label.req::after{content:' *';color:var(--red);}
    .fc{padding:8px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Cairo',sans-serif;color:var(--text);background:#fafbfd;width:100%;height:40px;transition:border-color .2s;}
    .fc:focus{border-color:var(--blue);outline:none;background:white;}
    select.fc{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='13' height='13' viewBox='0 0 24 24' fill='none' stroke='%235a6a8a' stroke-width='2.5'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:left 10px center;padding-left:30px;}
    .btn{padding:8px 20px;border:none;border-radius:40px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .2s;}
    .btn:hover{transform:translateY(-1px);}
    .btn-save{background:var(--green);color:white;}
    .btn-clear{background:#f1f5f9;color:var(--text);}
    .btn-back{background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);}
    .action-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:10px;}
    .trip-table{overflow-x:auto;margin-top:12px;border:1px solid var(--border);border-radius:10px;}
    .trip-table table{width:100%;border-collapse:collapse;}
    .trip-table th{background:#f0f4f8;padding:10px;font-size:12px;font-weight:700;text-align:center;}
    .trip-table td{padding:8px;border-bottom:1px solid #f0f4f8;text-align:center;}
    .trip-table input{width:80px;padding:6px;text-align:center;border:2px solid var(--border);border-radius:8px;}
    .total-card{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;}
    .total-card .card-head{background:transparent;}
    .total-card .card-head h3{color:var(--gold);}
    .total-strip{display:flex;justify-content:space-around;align-items:center;flex-wrap:wrap;gap:14px;padding:16px;}
    .total-tile{text-align:center;}
    .total-tile .tl{font-size:10px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;}
    .total-tile .tv{font-size:28px;font-weight:900;color:white;}
    .total-tile input{width:130px;padding:8px;border-radius:10px;text-align:center;font-size:16px;font-weight:700;background:white;border:none;color:var(--navy);}
    .loader{text-align:center;padding:40px;}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;z-index:9999;}
    .modal.open{display:flex;}
    .alert-box{background:white;width:90%;max-width:380px;border-radius:22px;padding:24px;text-align:center;}
    .alert-icon{font-size:40px;margin-bottom:10px;}
    .alert-msg{color:var(--navy);font-size:14px;font-weight:700;margin-bottom:18px;}
    .hotel-row{display:grid;grid-template-columns:1fr 90px 70px 70px 70px;gap:10px;margin-top:12px;}
    @media(max-width:640px){.hotel-row{grid-template-columns:1fr 70px 60px 60px 60px;}}
    .compact-num{text-align:center;}
    .time-btn-display{width:100%;height:40px;padding:8px;border:2px solid var(--border);border-radius:10px;background:#fafbfd;cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
    .time-btn-display .ph{color:#b0bac9;}
  </style>
</head>
<body>

<div class="header">
  <h2>📋 إدخال فاتورة</h2>
  <div class="header-right">
    <span class="user-chip" id="userChip">...</span>
    <button class="back-btn" onclick="goBack()">← رجوع</button>
  </div>
</div>

<div class="page">
  <div id="mainContent"><div class="loader"><div class="spinner"></div>جاري التحميل...</div></div>
</div>

<div id="alertModal" class="modal">
  <div class="alert-box">
    <div class="alert-icon" id="alertIcon">ℹ️</div>
    <div class="alert-msg" id="alertMsg"></div>
    <div style="margin-top:16px;">
      <button class="btn btn-save" onclick="closeAlert()">موافق</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwe1Q9pjAJRk9CfWsK5YGjD5uVAbJkMhAVgw6akKkFIR9sz15V78C88Vs5dumKE-SwF/exec';

let currentUser = null;
let selectedCustomer = null;
let allCustomers = [];
let customerTrips = [];
let allTrips = [];
let allNationalities = [];
let allHotels = [];
let currentTripItems = [];
let tripPrices = [];
let activitiesQuantities = [];

// ====================== الاتصال ======================
function gas(action, params = {}) {
  return new Promise((resolve, reject) => {
    const callbackName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    const url = new URL(GAS_URL);
    url.searchParams.set('action', action);
    url.searchParams.set('callback', callbackName);
    url.searchParams.set('_t', Date.now());
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v ?? '')));

    window[callbackName] = function(data) {
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
      resolve(data);
    };

    const script = document.createElement('script');
    script.src = url.toString();
    script.onerror = () => {
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('فشل الاتصال بالخادم'));
    };
    document.body.appendChild(script);

    setTimeout(() => {
      if (window[callbackName]) {
        delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);
        reject(new Error('انتهى وقت الاتصال'));
      }
    }, 30000);
  });
}

// ====================== مساعدات ======================
function goBack() { 
  if (currentUser?.type === 'Customer') {
    window.location.href = 'CustomerDashboard.html';
  } else {
    window.location.href = 'Dashboard.html';
  }
}
function showAlert(msg, icon) { 
  document.getElementById('alertIcon').textContent = icon || 'ℹ️';
  document.getElementById('alertMsg').textContent = msg;
  document.getElementById('alertModal').classList.add('open');
}
function closeAlert() { 
  document.getElementById('alertModal').classList.remove('open'); 
}

function formatDate(d) {
  if (!d) return '';
  const MN = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return `${String(d.getDate()).padStart(2, '0')}/${MN[d.getMonth()]}/${d.getFullYear()}`;
}

function dateToInput(dateStr) {
  if (!dateStr) return '';
  const match = dateStr.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (match) {
    const months = { Jan: '01', Feb: '02', Mar: '03', Apr: '04', May: '05', Jun: '06', Jul: '07', Aug: '08', Sep: '09', Oct: '10', Nov: '11', Dec: '12' };
    return `${match[3]}-${months[match[2]]}-${match[1].padStart(2, '0')}`;
  }
  return dateStr;
}

function formatActivitiesText(items, quantities) {
  const parts = [];
  items.forEach((item, i) => {
    const qty = quantities[i] || 0;
    if (qty > 0) parts.push(`${item}×${qty}`);
  });
  return parts.join(' | ');
}

// ====================== جلب بيانات العميل ======================
async function loadCustomerData() {
  try {
    const res = await gas('getAllSuppliersCustomers');
    allCustomers = Array.isArray(res) ? res.filter(c => c.customerType === 'Customer') : [];
    
    if (currentUser?.type === 'Customer') {
      selectedCustomer = allCustomers.find(c => 
        c.loginEmail === currentUser?.email || c.customerName === currentUser?.name
      );
      if (selectedCustomer) {
        customerTrips = selectedCustomer.assignedTrips ? 
          selectedCustomer.assignedTrips.split('|').filter(Boolean) : [];
      }
    }
    
    return true;
  } catch (e) {
    console.error('loadCustomerData error:', e);
    return false;
  }
}

// ====================== جلب بيانات الرحلات ======================
async function loadTripsData() {
  try {
    const res = await gas('getAllTrips');
    allTrips = Array.isArray(res) ? res : [];
    return true;
  } catch (e) {
    console.error('loadTripsData error:', e);
    return false;
  }
}

// ====================== جلب بيانات الجنسيات والفنادق ======================
async function loadLookups() {
  try {
    const [nationalitiesRes, hotelsRes] = await Promise.all([
      gas('getNationalities'),
      gas('getHotels')
    ]);
    allNationalities = Array.isArray(nationalitiesRes) ? nationalitiesRes : [];
    allHotels = Array.isArray(hotelsRes) ? hotelsRes : [];
  } catch (e) {
    console.error('loadLookups error:', e);
  }
}

// ====================== عند تغيير العميل ======================
function onCustomerChange() {
  const customerName = document.getElementById('customer')?.value;
  if (!customerName) {
    customerTrips = [];
    renderTripsList();
    return;
  }
  
  selectedCustomer = allCustomers.find(c => c.customerName === customerName);
  if (selectedCustomer) {
    customerTrips = selectedCustomer.assignedTrips ? 
      selectedCustomer.assignedTrips.split('|').filter(Boolean) : [];
    renderTripsList();
  }
}

// ====================== عرض قائمة الرحلات ======================
function renderTripsList() {
  const tripsSelect = document.getElementById('tripName');
  if (!tripsSelect) return;
  
  let tripsList = [];
  if (currentUser?.type === 'Customer') {
    tripsList = customerTrips;
  } else {
    if (selectedCustomer && selectedCustomer.customerName) {
      tripsList = customerTrips;
    } else {
      tripsList = allTrips.map(t => t.name || t).filter(Boolean);
    }
  }
  
  tripsSelect.innerHTML = '<option value="">-- اختر الرحلة --</option>' +
    tripsList.map(t => `<option value="${t}">${t}</option>`).join('');
}

// ====================== عند تغيير الرحلة ======================
async function onTripChange() {
  const tripName = document.getElementById('tripName')?.value;
  if (!tripName) {
    document.getElementById('tripItemsContainer').innerHTML = '<div class="no-data" style="padding:20px">اختر رحلة لعرض بنودها</div>';
    return;
  }
  
  try {
    const tripData = await gas('getTripData', { tripName, currency: '$' });
    if (tripData && tripData.items) {
      currentTripItems = tripData.items;
      tripPrices = tripData.prices || [];
      activitiesQuantities = new Array(currentTripItems.length).fill(0);
      renderTripTable();
      updateActivitiesText();
    } else {
      currentTripItems = [];
      tripPrices = [];
      document.getElementById('tripItemsContainer').innerHTML = '<div class="no-data" style="padding:20px">لا توجد بيانات للرحلة</div>';
    }
  } catch (e) {
    showAlert('خطأ في تحميل بيانات الرحلة: ' + e.message, '❌');
  }
}

function renderTripTable() {
  if (!currentTripItems.length) {
    document.getElementById('tripItemsContainer').innerHTML = '<div class="no-data" style="padding:20px">اختر رحلة لعرض بنودها</div>';
    return;
  }
  
  let rows = '';
  currentTripItems.forEach((item, i) => {
    rows += `汽水<td style="font-weight:600;text-align:right">${item}</td>
            <td><input type="number" id="qty_${i}" min="0" placeholder="0" value="${activitiesQuantities[i] || 0}" oninput="updateActivitiesText()" class="fc" style="width:80px"></td>
           </tr>`;
  });
  
  document.getElementById('tripItemsContainer').innerHTML = `
    <div class="trip-table">
      <table>
        <thead>
           <tr><th style="text-align:right;padding-left:14px">النشاط</th><th>العدد</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function updateActivitiesText() {
  const quantities = [];
  currentTripItems.forEach((item, i) => {
    quantities[i] = parseFloat(document.getElementById(`qty_${i}`)?.value) || 0;
    activitiesQuantities[i] = quantities[i];
  });
  const activitiesText = formatActivitiesText(currentTripItems, quantities);
  document.getElementById('activitiesTextDisplay').value = activitiesText;
  updateTotalPersons();
}

function updateTotalPersons() {
  const adult = parseInt(document.getElementById('adultCount')?.value) || 0;
  const child = parseInt(document.getElementById('childCount')?.value) || 0;
  const infant = parseInt(document.getElementById('infantCount')?.value) || 0;
  document.getElementById('displayTotalPersons').textContent = adult + child + infant;
}

function updateCurrencyVisibility() {
  const restAmount = parseFloat(document.getElementById('totalPrice')?.value) || 0;
  const currencyRow = document.getElementById('currencyRow');
  if (currencyRow) {
    currencyRow.style.display = restAmount > 0 ? 'flex' : 'none';
  }
}

// ====================== حفظ الفاتورة ======================
async function saveInvoice() {
  const customer = document.getElementById('customer')?.value;
  const guestName = document.getElementById('guestName')?.value;
  const contactNo = document.getElementById('contactNo')?.value;
  const nationality = document.getElementById('nationality')?.value;
  const hotel = document.getElementById('hotel')?.value;
  const activeDate = document.getElementById('activeDate')?.value;
  const tripTime = document.getElementById('tripTime')?.value;
  const tripName = document.getElementById('tripName')?.value;
  const restAmount = parseFloat(document.getElementById('totalPrice')?.value) || 0;
  const currency = document.getElementById('invoiceCurrency')?.value || '';
  
  if(!customer){showAlert('الرجاء اختيار العميل','⚠️');return;}
  if(!guestName){showAlert('الرجاء إدخال اسم السائح','⚠️');return;}
  if(!contactNo){showAlert('الرجاء إدخال رقم الهاتف','⚠️');return;}
  if(!nationality){showAlert('الرجاء إدخال الجنسية','⚠️');return;}
  if(!hotel){showAlert('الرجاء إدخال اسم الفندق','⚠️');return;}
  if(!activeDate){showAlert('الرجاء إدخال تاريخ التنفيذ','⚠️');return;}
  if(!tripTime){showAlert('الرجاء إدخال وقت التنفيذ','⚠️');return;}
  if(!tripName){showAlert('الرجاء اختيار الرحلة','⚠️');return;}
  if(restAmount > 0 && !currency){showAlert('الرجاء اختيار العملة للمبلغ المتبقي','⚠️');return;}
  
  const quantities = [];
  currentTripItems.forEach((item, i) => {
    quantities[i] = parseFloat(document.getElementById(`qty_${i}`)?.value) || 0;
  });
  const activitiesText = formatActivitiesText(currentTripItems, quantities);
  
  const today = new Date();
  const issueDate = formatDate(today);
  
  const adultCount = parseInt(document.getElementById('adultCount')?.value) || 0;
  const childCount = parseInt(document.getElementById('childCount')?.value) || 0;
  const infantCount = parseInt(document.getElementById('infantCount')?.value) || 0;
  
  const invoiceData = {
    issueDate: issueDate,
    activeDate: dateToInput(activeDate),
    time: tripTime,
    trip: tripName,
    customer: customer,
    executor: currentUser?.branchName || currentUser?.centerName || '',
    guestName: guestName,
    nationality: nationality,
    hotel: hotel,
    roomNo: document.getElementById('roomNo')?.value || '',
    contactNo: contactNo,
    adultCount: adultCount,
    childCount: childCount,
    infantCount: infantCount,
    activitiesText: activitiesText,
    actualPrice: 0,
    paymentPrice: 0,
    rest: restAmount,
    discount: 0,
    notes: document.getElementById('notes')?.value || '',
    state: 'pending',
    salesId: currentUser?.id || '',
    salesName: currentUser?.name || '',
    centerName: currentUser?.centerName || '',
    branchName: currentUser?.branchName || '',
    invoiceCurrency: currency || '',
    cost: false
  };
  
  const btn = document.getElementById('saveBtn');
  if (btn) btn.disabled = true;
  
  try {
    const result = await gas('saveInvoice', invoiceData);
    if(result?.success){
      showAlert(
        `✅ تم حفظ الفاتورة بنجاح\nرقم الفاتورة: ${result.voucherNo}\nالعميل: ${customer}\n${restAmount > 0 ? 'المبلغ المتبقي: ' + restAmount + ' ' + currency : ''}`,
        '✅',
        `<button class="btn btn-save" onclick="location.reload()">فاتورة جديدة</button>
         <button class="btn btn-back" onclick="goBack()">رجوع للوحة</button>`
      );
    } else {
      throw new Error(result?.message || 'فشل الحفظ');
    }
  } catch(e){
    showAlert('خطأ: '+e.message,'❌');
  } finally {
    if (btn) btn.disabled = false;
  }
}

function clearForm(){
  document.getElementById('customer').value = '';
  document.getElementById('guestName').value = '';
  document.getElementById('contactNo').value = '';
  document.getElementById('nationality').value = '';
  document.getElementById('hotel').value = '';
  document.getElementById('roomNo').value = '';
  document.getElementById('adultCount').value = '';
  document.getElementById('childCount').value = '';
  document.getElementById('infantCount').value = '';
  document.getElementById('activeDate').value = '';
  document.getElementById('tripTime').value = '';
  document.getElementById('timeDisplayText').textContent = 'اختر الوقت...';
  document.getElementById('timeDisplayText').classList.add('ph');
  document.getElementById('tripName').value = '';
  document.getElementById('invoiceCurrency').value = '';
  document.getElementById('totalPrice').value = '';
  document.getElementById('notes').value = '';
  document.getElementById('tripItemsContainer').innerHTML = '';
  document.getElementById('activitiesTextDisplay').value = '';
  currentTripItems = [];
  activitiesQuantities = [];
  updateTotalPersons();
  updateCurrencyVisibility();
}

// ====================== الساعة ======================
function openClockModal() {
  const modal = document.getElementById('clockModal');
  if (modal) modal.classList.add('open');
  // تنفيذ الساعة (اختصاراً)
  const time = prompt('أدخل الوقت (HH:MM)', '12:00');
  if (time && time.match(/^([0-1][0-9]|2[0-3]):[0-5][0-9]$/)) {
    document.getElementById('tripTime').value = time;
    const td = document.getElementById('timeDisplayText');
    if (td) { td.textContent = time; td.classList.remove('ph'); }
  }
  if (modal) modal.classList.remove('open');
}
function closeClockModal() {}
function clearClock() {}
function confirmClock() {}
function setClockMode() {}

// ====================== عرض النموذج ======================
function renderForm() {
  const isCustomerUser = currentUser?.type === 'Customer';
  const customerDefault = isCustomerUser && selectedCustomer ? selectedCustomer.customerName : '';
  
  const customersOptions = allCustomers.map(c => `<option value="${c.customerName}" ${customerDefault === c.customerName ? 'selected' : ''}>${c.customerName}</option>`).join('');
  const tripsOptions = customerTrips.map(t => `<option value="${t}">${t}</option>`).join('');
  const nationalitiesOptions = allNationalities.map(n => `<option value="${n}">${n}</option>`).join('');
  const hotelsOptions = allHotels.map(h => `<option value="${h}">${h}</option>`).join('');
  
  document.getElementById('mainContent').innerHTML = `
    <div class="card">
      <div class="card-head"><span class="ch-icon">🏢</span><h3>بيانات العميل</h3></div>
      <div class="card-body">
        <div class="fgrid">
          <div class="fgroup"><label class="req">العميل</label>
            <select class="fc" id="customer" onchange="onCustomerChange()" ${isCustomerUser ? 'disabled' : ''}>
              <option value="">-- اختر العميل --</option>
              ${customersOptions}
            </select>
          </div>
          <div class="fgroup"><label class="req">اسم السائح</label><input type="text" class="fc" id="guestName" placeholder="الاسم الكامل"></div>
          <div class="fgroup"><label class="req">رقم الهاتف</label><input type="tel" class="fc" id="contactNo" placeholder="2010xxxxxxx"></div>
          <div class="fgroup"><label class="req">الجنسية</label>
            <input type="text" class="fc" id="nationality" list="nationalitiesList" placeholder="اختر الجنسية">
            <datalist id="nationalitiesList">${nationalitiesOptions}</datalist>
          </div>
        </div>
      </div>
    </div>
    
    <div class="card">
      <div class="card-head"><span class="ch-icon">🏨</span><h3>بيانات الإقامة</h3></div>
      <div class="card-body">
        <div class="hotel-row">
          <div class="fgroup"><label class="req">الفندق</label>
            <input type="text" class="fc" id="hotel" list="hotelsList" placeholder="اختر الفندق">
            <datalist id="hotelsList">${hotelsOptions}</datalist>
          </div>
          <div class="fgroup"><label>رقم الغرفة</label><input type="text" class="compact-num" id="roomNo" placeholder="000"></div>
          <div class="fgroup"><label>بالغين</label><input type="number" class="compact-num" id="adultCount" min="0" placeholder="0" oninput="updateTotalPersons()"></div>
          <div class="fgroup"><label>أطفال</label><input type="number" class="compact-num" id="childCount" min="0" placeholder="0" oninput="updateTotalPersons()"></div>
          <div class="fgroup"><label>رضع</label><input type="number" class="compact-num" id="infantCount" min="0" placeholder="0" oninput="updateTotalPersons()"></div>
        </div>
      </div>
    </div>
    
    <div class="card">
      <div class="card-head"><span class="ch-icon">🏝️</span><h3>بيانات الرحلة</h3></div>
      <div class="card-body">
        <div class="fgrid">
          <div class="fgroup"><label class="req">تاريخ التنفيذ</label><input type="date" class="fc" id="activeDate"></div>
          <div class="fgroup"><label class="req">وقت التنفيذ</label>
            <input type="hidden" id="tripTime">
            <button type="button" class="time-btn-display" onclick="openClockModal()" id="timeDisplay">
              <span id="timeDisplayText" class="ph">اختر الوقت...</span><span>🕐</span>
            </button>
          </div>
          <div class="fgroup"><label class="req">الرحلة</label>
            <select class="fc" id="tripName" onchange="onTripChange()">
              <option value="">-- اختر الرحلة --</option>
              ${tripsOptions}
            </select>
          </div>
        </div>
        <div id="tripItemsContainer" style="margin-top:16px"></div>
        <div class="fgroup" style="margin-top:12px">
          <label>نص الأنشطة</label>
          <textarea class="fc" id="activitiesTextDisplay" rows="2" readonly style="background:#f0f4f8"></textarea>
        </div>
      </div>
    </div>
    
    <div class="card total-card">
      <div class="card-head"><span class="ch-icon">💰</span><h3>المبلغ المتبقي على الزبون</h3></div>
      <div class="total-strip">
        <div class="total-tile"><div class="tl">عدد المشاركين</div><div class="tv" id="displayTotalPersons">0</div></div>
        <div class="total-tile" id="currencyRow" style="display:none"><div class="tl">العملة</div>
          <select class="fc" id="invoiceCurrency" style="width:100px;background:white">
            <option value="">اختر العملة</option>
            <option value="$">USD $</option>
            <option value="€">EUR €</option>
            <option value="£">GBP £</option>
            <option value="LE">EGP LE</option>
          </select>
        </div>
        <div class="total-tile"><div class="tl">المبلغ المتبقي</div><input type="number" id="totalPrice" min="0" step="0.01" placeholder="0.00" oninput="updateCurrencyVisibility()" style="width:140px"></div>
      </div>
    </div>
    
    <div class="card">
      <div class="card-head"><span class="ch-icon">📝</span><h3>ملاحظات</h3></div>
      <div class="card-body">
        <textarea class="fc" id="notes" rows="3" placeholder="ملاحظات إضافية..."></textarea>
      </div>
    </div>
    
    <div class="action-row">
      <button class="btn btn-save" id="saveBtn" onclick="saveInvoice()">💾 حفظ الفاتورة</button>
      <button class="btn btn-clear" onclick="clearForm()">🔄 تفريغ</button>
      <button class="btn btn-back" onclick="goBack()">← رجوع</button>
    </div>
  `;
  
  const today = new Date();
  document.getElementById('activeDate').value = today.toISOString().split('T')[0];
  
  if (isCustomerUser && selectedCustomer) {
    document.getElementById('customer').value = selectedCustomer.customerName;
    onCustomerChange();
  }
  
  updateTotalPersons();
  updateCurrencyVisibility();
}

// ====================== تهيئة الصفحة ======================
document.addEventListener('DOMContentLoaded', async () => {
  let ud = sessionStorage.getItem('currentUser');
  if (!ud) {
    const p = new URLSearchParams(location.search).get('user');
    if (p) { ud = decodeURIComponent(p); sessionStorage.setItem('currentUser', ud); }
  }
  if (!ud) { location.href = 'index.html'; return; }
  try { currentUser = JSON.parse(ud); } catch(e) { location.href = 'index.html'; return; }
  
  document.getElementById('userChip').textContent = currentUser.name || 'User';
  
  await loadCustomerData();
  await loadTripsData();
  await loadLookups();
  
  renderForm();
});

// ====================== دوال عامة ======================
window.goBack = goBack;
window.closeAlert = closeAlert;
window.onCustomerChange = onCustomerChange;
window.onTripChange = onTripChange;
window.saveInvoice = saveInvoice;
window.clearForm = clearForm;
window.updateTotalPersons = updateTotalPersons;
window.updateActivitiesText = updateActivitiesText;
window.updateCurrencyVisibility = updateCurrencyVisibility;
window.openClockModal = openClockModal;
window.closeClockModal = closeClockModal;
window.clearClock = clearClock;
window.confirmClock = confirmClock;
window.setClockMode = setClockMode;
</script>
</body>
</html>
