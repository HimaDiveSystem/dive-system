<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Sales Dashboard - Diving Centers Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script src="ui.js"></script>
  <style>
    /* ✅ متغيرات الثيم الموحد */
    :root {
      --color-primary: #1e2b4f;
      --color-secondary: #f5c842;
      --color-success: #27ae60;
      --color-danger: #e74c3c;
      --color-warning: #f39c12;
      --color-info: #3498db;
      --color-light: #f0f4f8;
      --color-text: #1a2540;
      --color-text-light: #5a6a8a;
      --gradient-primary: linear-gradient(135deg, #1e2b4f 0%, #152238 100%);
      --gradient-secondary: linear-gradient(135deg, #f5c842 0%, #e6b800 100%);
      --gradient-success: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
      --gradient-danger: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      --radius-lg: 16px;
      --radius-xl: 24px;
      --shadow-md: 0 4px 16px rgba(15,31,61,0.12);
      --shadow-lg: 0 8px 24px rgba(15,31,61,0.15);
      --shadow-sm: 0 2px 8px rgba(15,31,61,0.08);
      --font-primary: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      
      /* ألوان إضافية للتوافق */
      --navy: #0f1f3d;
      --navy2: #1a3260;
      --gold: #f5c842;
      --gold2: #e6b800;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #ea580c;
      --purple: #7c3aed;
      --teal: #0d9488;
      --bg: #f0f4f8;
      --card: #fff;
      --border: #dde4f0;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(15,31,61,0.10);
    }
    
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      font-family: var(--font-primary); 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      min-height: 100vh; 
      padding: 20px; 
    }
    .container { 
      max-width: 1200px; 
      margin: 0 auto; 
      background: white; 
      border-radius: 28px; 
      box-shadow: var(--shadow-lg); 
      overflow: hidden; 
    }
    .header { 
      background: var(--gradient-primary); 
      color: white; 
      padding: 20px 30px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      flex-wrap: wrap; 
      gap: 15px; 
    }
    .header h2 { 
      color: var(--color-secondary); 
      font-size: 24px; 
      display: flex; 
      align-items: center; 
      gap: 10px; 
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .user-info { 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      flex-wrap: wrap; 
    }
    .user-name { 
      background: rgba(255,255,255,0.1); 
      padding: 8px 18px; 
      border-radius: 40px; 
      border: 1px solid var(--color-secondary); 
      font-weight: 600; 
      font-size: 14px;
    }
    /* ✅ زر تغيير الفرع */
    .branch-btn {
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 8px 16px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: 0.3s;
      font-family: var(--font-primary);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .branch-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: translateY(-2px);
    }
    .branch-btn .branch-icon { font-size: 16px; }
    .branch-name-display {
      color: var(--color-secondary);
      font-weight: 700;
    }
    .logout-btn { 
      background: var(--gradient-danger); 
      color: white; 
      border: none; 
      padding: 8px 20px; 
      border-radius: 40px; 
      cursor: pointer; 
      font-weight: 600; 
      transition: 0.3s; 
      font-family: var(--font-primary);
      font-size: 13px;
    }
    .logout-btn:hover { 
      transform: translateY(-2px); 
      opacity: 0.9; 
      box-shadow: 0 4px 12px rgba(231,76,60,0.3);
    }
    .nav-tabs { 
      display: flex; 
      background: var(--color-light); 
      padding: 0 20px; 
      border-bottom: 2px solid var(--border); 
      overflow-x: auto; 
      white-space: nowrap; 
      gap: 5px; 
    }
    .nav-tab { 
      padding: 15px 25px; 
      cursor: pointer; 
      font-weight: 600; 
      color: var(--color-text-light); 
      border-bottom: 3px solid transparent; 
      transition: 0.3s; 
      display: inline-block; 
      font-size: 14px;
    }
    .nav-tab.active { 
      color: var(--color-primary); 
      border-bottom-color: var(--color-secondary); 
    }
    .nav-tab:hover { 
      color: var(--color-primary); 
      background: rgba(30,43,79,0.05);
    }
    .status-bar { 
      display: flex; 
      gap: 12px; 
      padding: 15px 30px; 
      background: var(--color-light); 
      border-bottom: 1px solid var(--border); 
      overflow-x: auto; 
      white-space: nowrap; 
    }
    .status-item { 
      padding: 8px 20px; 
      border-radius: 30px; 
      cursor: pointer; 
      font-weight: 600; 
      transition: 0.3s; 
      display: inline-block; 
      font-size: 13px;
      border: none;
      font-family: var(--font-primary);
    }
    .status-item:hover { 
      transform: translateY(-2px); 
      box-shadow: var(--shadow-sm);
    }
    .status-item.receipt { background: #e3f2fd; color: #1976d2; }
    .status-item.pending { background: #fff3e0; color: #f57c00; }
    .status-item.cancel  { background: #ffebee; color: #d32f2f; }
    .status-item.done    { background: #e8f5e8; color: #2e7d32; }
    .content { padding: 30px; }
    .section-title { 
      color: var(--color-primary); 
      font-size: 18px; 
      font-weight: 700; 
      margin-bottom: 20px; 
      padding-bottom: 10px; 
      border-bottom: 2px solid var(--color-secondary); 
      text-align: left; 
    }
    .branch-selector { 
      background: var(--color-light); 
      border-radius: 20px; 
      padding: 30px; 
      margin-bottom: 30px; 
      text-align: center; 
      border: 2px dashed var(--border);
    }
    .branch-selector label { 
      display: block; 
      margin-bottom: 15px; 
      color: var(--color-primary); 
      font-weight: 700; 
      font-size: 18px; 
    }
    .branch-selector select { 
      width: 100%; 
      max-width: 400px; 
      padding: 14px 20px; 
      border: 2px solid var(--border); 
      border-radius: 15px; 
      font-size: 16px; 
      background-color: white; 
      font-family: var(--font-primary);
      transition: 0.3s;
    }
    .branch-selector select:focus { 
      border-color: var(--color-secondary); 
      outline: none; 
      box-shadow: 0 0 0 3px rgba(245,200,66,0.2);
    }
    .branch-selector .btn-primary {
      margin-top: 15px;
    }
    .dashboard-buttons { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
      gap: 20px; 
      margin-top: 10px; 
    }
    .dashboard-btn { 
      background: white; 
      border: 2px solid var(--border); 
      border-radius: 20px; 
      padding: 30px 20px; 
      text-align: center; 
      cursor: pointer; 
      transition: 0.3s; 
      box-shadow: var(--shadow-sm); 
      position: relative;
      overflow: hidden;
    }
    .dashboard-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(30,43,79,0.02), rgba(245,200,66,0.05));
      opacity: 0;
      transition: 0.3s;
    }
    .dashboard-btn:hover::after {
      opacity: 1;
    }
    .dashboard-btn:hover { 
      transform: translateY(-6px); 
      border-color: var(--color-secondary); 
      box-shadow: var(--shadow-md); 
    }
    .dashboard-btn .icon  { font-size: 48px; margin-bottom: 12px; display: block; }
    .dashboard-btn .title { 
      font-size: 16px; 
      font-weight: 700; 
      color: var(--color-primary); 
      margin-bottom: 4px; 
      position: relative;
      z-index: 1;
    }
    .dashboard-btn .subtitle {
      font-size: 12px;
      color: var(--color-text-light);
      position: relative;
      z-index: 1;
    }
    .badge { 
      display: inline-block; 
      padding: 4px 12px; 
      border-radius: 20px; 
      font-size: 11px; 
      font-weight: 600; 
      margin-top: 10px; 
      position: relative;
      z-index: 1;
    }
    .badge.pending    { background: #fff3e0; color: #f57c00; }
    .badge.confirmed  { background: #e8f5e8; color: #2e7d32; }
    .badge.cancel     { background: #ffebee; color: #d32f2f; }
    .badge.commission { background: #e3f2fd; color: #1976d2; }
    .badge.package    { background: #f3e5f5; color: #7b1fa2; }
    .btn-primary   { 
      background: var(--gradient-primary); 
      color: var(--color-secondary); 
      border: none; 
      padding: 12px 30px; 
      border-radius: 40px; 
      font-weight: 600; 
      font-size: 15px; 
      cursor: pointer; 
      transition: 0.3s; 
      font-family: var(--font-primary);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary:hover { 
      transform: translateY(-2px); 
      box-shadow: var(--shadow-md); 
    }
    .btn-secondary { 
      background: var(--color-light); 
      color: var(--color-primary); 
      border: 1px solid var(--border); 
      padding: 12px 30px; 
      border-radius: 40px; 
      font-weight: 600; 
      font-size: 15px; 
      cursor: pointer; 
      transition: 0.3s; 
      font-family: var(--font-primary);
    }
    .btn-secondary:hover { 
      background: var(--border); 
    }
    .loading-overlay { 
      display: none; 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      background: rgba(0,0,0,0.5); 
      align-items: center; 
      justify-content: center; 
      z-index: 10000; 
      backdrop-filter: blur(4px);
    }
    .loading-container { 
      background: white; 
      padding: 25px 40px; 
      border-radius: 50px; 
      display: flex; 
      align-items: center; 
      gap: 15px; 
      box-shadow: var(--shadow-lg);
    }
    .hourglass { font-size: 30px; animation: rotate 1.5s linear infinite; }
    @keyframes rotate { to { transform: rotate(360deg); } }
    
    /* ✅ تنسيقات إضافية للهواتف */
    @media(max-width:768px) {
      .dashboard-buttons {
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .header {
        padding: 15px;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }
      .header h2 { font-size: 20px; }
      .header-actions {
        flex-wrap: wrap;
        justify-content: center;
      }
      .user-info { 
        flex-wrap: wrap;
        justify-content: center;
      }
      .user-name { font-size: 12px; padding: 6px 14px; }
      .branch-btn { font-size: 12px; padding: 6px 14px; }
      .logout-btn { font-size: 12px; padding: 6px 16px; }
      .nav-tabs { padding: 0 10px; gap: 3px; }
      .nav-tab { padding: 12px 16px; font-size: 12px; }
      .status-bar { padding: 10px 15px; gap: 8px; }
      .status-item { padding: 6px 14px; font-size: 11px; }
      .content { padding: 15px; }
      .branch-selector { padding: 20px; }
      .dashboard-btn { padding: 20px 15px; }
      .dashboard-btn .icon { font-size: 36px; }
      .dashboard-btn .title { font-size: 14px; }
    }
    @media(max-width:480px) {
      .dashboard-buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>🧾 Sales Dashboard</h2>
      <div class="header-actions">
        <div class="user-info">
          <span class="user-name" id="userNameDisplay"></span>
          <!-- ✅ زر تغيير الفرع -->
          <button class="branch-btn" onclick="openBranchSelector()" title="تغيير الفرع">
            <span class="branch-icon">🌿</span>
            <span class="branch-name-display" id="branchNameDisplay">اختر فرع</span>
            <span style="font-size:12px;">▼</span>
          </button>
          <button class="logout-btn" onclick="handleLogout()">🚪 خروج</button>
        </div>
      </div>
    </div>
    <div class="nav-tabs">
      <div class="nav-tab active" onclick="showTab('dashboard',this)">📊 Dashboard</div>
      <div class="nav-tab" onclick="showTab('analytics',this)">📈 Analytics</div>
      <div class="nav-tab" onclick="showTab('collect',this)">💰 Collect</div>
      <div class="nav-tab" onclick="window.location.href='TripPriceList.html'">💲 Prices</div>
      <div class="nav-tab" onclick="openInvoicePage()">🧾 New Invoice</div>
      <!-- ✅ زر فتح PackageInvoice -->
      <div class="nav-tab" onclick="openPackageInvoice()" style="color: var(--purple); font-weight: 700;">📦 Package</div>
    </div>
    <div class="status-bar">
      <div class="status-item receipt" onclick="filterInvoices('receipt')">📄 Receipts</div>
      <div class="status-item pending" onclick="filterInvoices('pending')">⏳ Pending</div>
      <div class="status-item cancel"  onclick="filterInvoices('cancel')">❌ Canceled</div>
      <div class="status-item done"    onclick="filterInvoices('Confirmed')">✅ Done</div>
    </div>
    <div class="content" id="mainContent"></div>
  </div>

  <!-- ✅ مودال اختيار الفرع -->
  <div id="branchModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px);">
    <div style="background:white;border-radius:24px;padding:35px;max-width:450px;width:90%;box-shadow:var(--shadow-lg);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h3 style="color:var(--color-primary);">🌿 اختيار الفرع</h3>
        <button onclick="closeBranchModal()" style="background:none;border:none;font-size:28px;cursor:pointer;color:var(--color-text-light);">&times;</button>
      </div>
      <select id="branchSelectModal" style="width:100%;padding:14px 20px;border:2px solid var(--border);border-radius:15px;font-size:16px;font-family:var(--font-primary);">
        <option value="">-- اختر الفرع --</option>
      </select>
      <div style="display:flex;gap:10px;margin-top:20px;justify-content:flex-end;">
        <button class="btn-secondary" onclick="closeBranchModal()">إلغاء</button>
        <button class="btn-primary" onclick="confirmBranchModal()">تأكيد</button>
      </div>
    </div>
  </div>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-container">
      <div class="hourglass">⏳</div>
      <span id="loadingMessage">جاري التحميل...</span>
    </div>
  </div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzjv8iFYX6vm_3hsbKEHWRLRhFoGISm6TSQcDINgkkff14yjpoBY-rYGCqJFlpF5u3g/exec';

  let currentUser    = null;
  let selectedBranch = null;
  let branchesList   = [];

  // ============================================================
  // ✅ التحقق من صحة الجلسة - 24 ساعة
  // ============================================================
  function checkSessionValidity() {
    try {
      const stored = localStorage.getItem('currentUser');
      if (!stored) {
        window.location.href = 'index.html';
        return false;
      }
      
      const data = JSON.parse(stored);
      if (data.expiry && Date.now() < data.expiry) {
        return true;
      } else {
        localStorage.removeItem('currentUser');
        sessionStorage.clear();
        window.location.href = 'index.html';
        return false;
      }
    } catch(e) {
      window.location.href = 'index.html';
      return false;
    }
  }

  // ============================================================
  // ✅ دالة الخروج الموحدة
  // ============================================================
  function handleLogout() {
    if (typeof showLogoutConfirm !== 'undefined') {
      showLogoutConfirm();
    } else {
      if (confirm('⚠️ تحذير: سيتم تسجيل خروجك من النظام.\nهل أنت متأكد؟')) {
        localStorage.removeItem('currentUser');
        sessionStorage.clear();
        window.location.href = 'index.html';
      }
    }
  }

  function navigateTo(page) {
    window.location.href = page + '.html';
  }

  async function apiGet(action, params = {}) {
    const url = new URL(GAS_URL);
    url.searchParams.set('action', action);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    const res = await fetch(url.toString(), { redirect: 'follow' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }

  function showAlert(message) {
    if (typeof showAlertDialog !== 'undefined') {
      showAlertDialog(message, 'info');
    } else {
      alert(message);
    }
  }

  function showLoading(show, message = 'جاري التحميل...') {
    document.getElementById('loadingMessage').innerText = message;
    document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
  }

  // ============================================================
  // ✅ دوال تغيير الفرع المحسنة
  // ============================================================
  function updateBranchDisplay() {
    const display = document.getElementById('branchNameDisplay');
    if (selectedBranch && selectedBranch.name) {
      display.textContent = selectedBranch.name;
    } else {
      display.textContent = 'اختر فرع';
    }
  }

  function openBranchSelector() {
    const modal = document.getElementById('branchModal');
    const select = document.getElementById('branchSelectModal');
    
    // ملء القائمة
    select.innerHTML = '<option value="">-- اختر الفرع --</option>';
    if (branchesList.length > 0) {
      branchesList.forEach(b => {
        const selected = (selectedBranch && selectedBranch.id === b.id) ? 'selected' : '';
        select.innerHTML += `<option value="${b.id}" ${selected}>${b.name}</option>`;
      });
    }
    
    modal.style.display = 'flex';
  }

  function closeBranchModal() {
    document.getElementById('branchModal').style.display = 'none';
  }

  function confirmBranchModal() {
    const select = document.getElementById('branchSelectModal');
    const branchId = select.value;
    const branchName = select.options[select.selectedIndex]?.text;
    
    if (!branchId) { 
      showAlert('يرجى اختيار فرع'); 
      return; 
    }
    
    selectedBranch = { id: branchId, name: branchName };
    sessionStorage.setItem('selectedBranch', JSON.stringify(selectedBranch));
    updateBranchDisplay();
    closeBranchModal();
    showDashboard();
    showAlert(`✅ تم التبديل إلى فرع: ${branchName}`);
  }

  function showBranchSelector(branches) {
    branchesList = branches;
    let options = '<option value="">-- اختر الفرع --</option>';
    branches.forEach(b => { options += `<option value="${b.id}">${b.name}</option>`; });
    
    document.getElementById('mainContent').innerHTML = `
      <div class="branch-selector">
        <label>🌿 اختر الفرع الذي تعمل به</label>
        <select id="branchSelect">${options}</select>
        <br>
        <button class="btn-primary" style="margin-top:15px;" onclick="confirmBranch()">✅ تأكيد</button>
      </div>`;
  }

  function confirmBranch() {
    const select = document.getElementById('branchSelect');
    const branchId = select.value;
    const branchName = select.options[select.selectedIndex]?.text;
    if (!branchId) { showAlert('يرجى اختيار فرع'); return; }
    selectedBranch = { id: branchId, name: branchName };
    sessionStorage.setItem('selectedBranch', JSON.stringify(selectedBranch));
    updateBranchDisplay();
    showDashboard();
  }

  async function loadUserBranches() {
    if (!currentUser?.centerId) { showDashboard(); return; }
    showLoading(true, 'جاري تحميل الفروع...');
    try {
      const data = await apiGet('getBranchesByCenter', { centerId: currentUser.centerId });
      const branches = Array.isArray(data) ? data : (data.branches || []);
      branchesList = branches;
      if (branches.length > 0) showBranchSelector(branches);
      else { showAlert('لا توجد فروع متاحة'); showDashboard(); }
    } catch(e) {
      showAlert('فشل في تحميل الفروع');
      showDashboard();
    } finally {
      showLoading(false);
    }
  }

  // ============================================================
  // ✅ عرض Dashboard
  // ============================================================
  function showDashboard() {
    const branchInfo = selectedBranch
      ? `<p style="color:var(--color-text-light);margin-top:5px;font-size:14px;">🌿 <strong>${selectedBranch.name}</strong></p>`
      : `<p style="color:var(--color-warning);margin-top:5px;font-size:14px;">⚠️ الرجاء اختيار فرع للعمل</p>`;
    
    document.getElementById('mainContent').innerHTML = `
      <div class="section-title">📋 قائمة العمليات ${branchInfo}</div>
      <div class="dashboard-buttons">
        <div class="dashboard-btn" onclick="openInvoicePage()">
          <div class="icon">➕</div>
          <div class="title">فاتورة جديدة</div>
          <div class="subtitle">إنشاء فاتورة مبيعات</div>
          <span class="badge confirmed">New</span>
        </div>
        <div class="dashboard-btn" onclick="openPackageInvoice()">
          <div class="icon">📦</div>
          <div class="title">فاتورة باقة</div>
          <div class="subtitle">إنشاء فاتورة باقة متكاملة</div>
          <span class="badge package">Package</span>
        </div>
        <div class="dashboard-btn" onclick="openPassportScanner()">
          <div class="icon">🛂</div>
          <div class="title">مسح جواز السفر</div>
          <div class="subtitle">مسح ضوئي لجواز السفر</div>
          <span class="badge commission">Scan</span>
        </div>
        <div class="dashboard-btn" onclick="openMyBookings('pending')">
          <div class="icon">⏳</div>
          <div class="title">فواتير معلقة</div>
          <div class="subtitle">بانتظار التنفيذ</div>
          <span class="badge pending">Pending</span>
        </div>
        <div class="dashboard-btn" onclick="openMyBookings('Confirmed')">
          <div class="icon">✅</div>
          <div class="title">فواتير منفذة</div>
          <div class="subtitle">تم التنفيذ</div>
          <span class="badge confirmed">Done</span>
        </div>
        <div class="dashboard-btn" onclick="openMyBookings('Cancel')">
          <div class="icon">❌</div>
          <div class="title">فواتير ملغاة</div>
          <div class="subtitle">تم الإلغاء</div>
          <span class="badge cancel">Cancel</span>
        </div>
        <div class="dashboard-btn" onclick="showAlert('العمولات - قيد التطوير')">
          <div class="icon">💰</div>
          <div class="title">العمولات</div>
          <div class="subtitle">تقارير العمولات</div>
          <span class="badge commission">Commission</span>
        </div>
      </div>`;
  }

  // ============================================================
  // ✅ دوال التنقل
  // ============================================================
  
  // ✅ دالة فتح PackageInvoice
  function openPackageInvoice() {
    if (!currentUser) { showAlert('بيانات المستخدم غير متوفرة'); return; }
    if (selectedBranch) {
      const user = { ...currentUser, branchId: selectedBranch.id, branchName: selectedBranch.name };
      sessionStorage.setItem('currentUser', JSON.stringify(user));
    }
    window.location.href = 'PackageInvoice.html';
  }

  function openInvoicePage() {
    if (!currentUser) { showAlert('بيانات المستخدم غير متوفرة'); return; }
    if (selectedBranch) {
      const user = { ...currentUser, branchId: selectedBranch.id, branchName: selectedBranch.name };
      sessionStorage.setItem('currentUser', JSON.stringify(user));
    }
    window.location.href = 'SalesInvoice.html';
  }

  function showTab(tab, el) {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    
    if (tab === 'dashboard') {
      showDashboard();
    } else if (tab === 'analytics') {
      if (selectedBranch) {
        const user = { ...currentUser, branchId: selectedBranch.id, branchName: selectedBranch.name };
        sessionStorage.setItem('currentUser', JSON.stringify(user));
      } else {
        sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
      }
      window.location.href = 'SalesAnalytics.html';
    } else {
      showAlert('هذه الصفحة قيد التطوير');
    }
  }

  function filterInvoices(status) {
    if (!currentUser) {
      showAlert('بيانات المستخدم غير متوفرة');
      return;
    }
    sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
    let statusParam = '';
    if (status === 'pending') statusParam = 'pending';
    else if (status === 'cancel') statusParam = 'cancel';
    else if (status === 'done') statusParam = 'confirmed';
    else if (status === 'receipt') statusParam = 'receipt';
    window.location.href = `MyBookings.html?status=${statusParam}`;
  }

  function openPassportScanner() {
    if (!currentUser) {
      showAlert('بيانات المستخدم غير متوفرة');
      return;
    }
    if (selectedBranch) {
      const user = { ...currentUser, branchId: selectedBranch.id, branchName: selectedBranch.name };
      sessionStorage.setItem('currentUser', JSON.stringify(user));
    }
    window.location.href = 'PassportScan.html';
  }

  function openMyBookings(status) {
    if (!currentUser) {
      showAlert('بيانات المستخدم غير متوفرة');
      return;
    }
    if (selectedBranch) {
      const user = { ...currentUser, branchId: selectedBranch.id, branchName: selectedBranch.name };
      sessionStorage.setItem('currentUser', JSON.stringify(user));
    } else {
      sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
    }
    let statusParam = '';
    if (status === 'pending') statusParam = 'pending';
    else if (status === 'cancel') statusParam = 'cancel';
    else if (status === 'done') statusParam = 'confirmed';
    window.location.href = `MyBookings.html?status=${statusParam}`;
  }

  // ============================================================
  // ✅ التحميل الأولي
  // ============================================================
  document.addEventListener('DOMContentLoaded', async function() {
    // تطبيق الثيم الموحد
    if (typeof Theme !== 'undefined' && Theme.applyToPage) {
      Theme.applyToPage();
      Theme.setPageTitle('لوحة المبيعات');
    }
    
    // التحقق من صحة الجلسة
    if (!checkSessionValidity()) {
      return;
    }
    
    // جلب بيانات المستخدم
    let userData = null;
    const storedUser = localStorage.getItem('currentUser');
    if (storedUser) {
      try {
        const parsed = JSON.parse(storedUser);
        userData = parsed.user;
      } catch(e) {}
    }
    
    if (!userData) {
      const sessionData = sessionStorage.getItem('currentUser');
      if (sessionData) {
        try {
          userData = JSON.parse(sessionData);
        } catch(e) {}
      }
    }
    
    if (!userData) { 
      window.location.href = 'index.html'; 
      return; 
    }

    try {
      currentUser = userData;
      document.getElementById('userNameDisplay').textContent = currentUser.name || 'Sales Rep';

      if (currentUser.type !== 'Sales') {
        const map = { Admin:'Dashboard', Owner:'OwnerDashboard', Accountant:'AccountantDashboard' };
        window.location.href = (map[currentUser.type] || 'Dashboard') + '.html';
        return;
      }

      // استعادة الفرع المحفوظ
      const savedBranch = sessionStorage.getItem('selectedBranch');
      if (savedBranch) {
        selectedBranch = JSON.parse(savedBranch);
        updateBranchDisplay();
        showDashboard();
      } else {
        await loadUserBranches();
      }
    } catch(e) {
      console.error(e);
      window.location.href = 'index.html';
    }
  });
</script>
