<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Sales Dashboard - Diving Centers Management System</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
    body { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; padding:20px; }
    .container { max-width:1200px; margin:0 auto; background:white; border-radius:30px; box-shadow:0 20px 60px rgba(0,0,0,0.3); overflow:hidden; }
    .header { background:linear-gradient(135deg,#1e2b4f 0%,#152238 100%); color:white; padding:20px 30px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px; }
    .header h2 { color:#ffd966; font-size:24px; display:flex; align-items:center; gap:10px; }
    .user-info { display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
    .user-name { background:rgba(255,255,255,0.1); padding:10px 20px; border-radius:40px; border:1px solid #ffd966; }
    .logout-btn { background:#ff6b6b; color:white; border:none; padding:10px 25px; border-radius:40px; cursor:pointer; font-weight:600; transition:0.3s; }
    .logout-btn:hover { background:#ee5253; transform:translateY(-2px); }
    .nav-tabs { display:flex; background:#f8f9fa; padding:0 20px; border-bottom:2px solid #dee2e6; overflow-x:auto; white-space:nowrap; gap:5px; }
    .nav-tab { padding:15px 25px; cursor:pointer; font-weight:600; color:#6c757d; border-bottom:3px solid transparent; transition:0.3s; display:inline-block; }
    .nav-tab.active { color:#1e2b4f; border-bottom-color:#ffd966; }
    .nav-tab:hover { color:#1e2b4f; }
    .status-bar { display:flex; gap:15px; padding:15px 30px; background:#f8f9fa; border-bottom:1px solid #dee2e6; overflow-x:auto; white-space:nowrap; }
    .status-item { padding:8px 20px; border-radius:30px; cursor:pointer; font-weight:600; transition:0.3s; display:inline-block; }
    .status-item.receipt { background:#e3f2fd; color:#1976d2; }
    .status-item.pending { background:#fff3e0; color:#f57c00; }
    .status-item.cancel  { background:#ffebee; color:#d32f2f; }
    .status-item.done    { background:#e8f5e8; color:#2e7d32; }
    .content { padding:30px; }
    .section-title { color:#1e2b4f; font-size:18px; font-weight:700; margin-bottom:20px; padding-bottom:10px; border-bottom:2px solid #ffd966; text-align:left; }
    .branch-selector { background:#f8f9fa; border-radius:20px; padding:25px; margin-bottom:30px; text-align:center; }
    .branch-selector label { display:block; margin-bottom:10px; color:#1e2b4f; font-weight:600; font-size:16px; }
    .branch-selector select { width:100%; max-width:400px; padding:12px 20px; border:2px solid #e9f0fa; border-radius:15px; font-size:16px; background-color:white; }
    .branch-selector select:focus { border-color:#ffd966; outline:none; }
    .dashboard-buttons { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; margin-top:30px; }
    .dashboard-btn { background:white; border:2px solid #e9f0fa; border-radius:20px; padding:30px 20px; text-align:center; cursor:pointer; transition:0.3s; box-shadow:0 5px 15px rgba(0,0,0,0.05); }
    .dashboard-btn:hover { transform:translateY(-5px); border-color:#ffd966; box-shadow:0 10px 25px rgba(0,0,0,0.1); }
    .dashboard-btn .icon  { font-size:48px; margin-bottom:15px; }
    .dashboard-btn .title { font-size:18px; font-weight:700; color:#1e2b4f; margin-bottom:5px; }
    .badge { display:inline-block; padding:5px 10px; border-radius:20px; font-size:12px; font-weight:600; margin-top:10px; }
    .badge.pending    { background:#fff3e0; color:#f57c00; }
    .badge.confirmed  { background:#e8f5e8; color:#2e7d32; }
    .badge.cancel     { background:#ffebee; color:#d32f2f; }
    .badge.commission { background:#e3f2fd; color:#1976d2; }
    .btn-primary   { background:#1e2b4f; color:white; border:none; padding:15px 30px; border-radius:40px; font-weight:600; font-size:16px; cursor:pointer; transition:0.3s; }
    .btn-primary:hover { background:#ffd966; color:#1e2b4f; }
    .btn-secondary { background:#e9f0fa; color:#1e2b4f; border:none; padding:15px 30px; border-radius:40px; font-weight:600; font-size:16px; cursor:pointer; transition:0.3s; }
    .btn-secondary:hover { background:#d0ddeb; }
    .loading-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:10000; }
    .loading-container { background:white; padding:20px 40px; border-radius:50px; display:flex; align-items:center; gap:15px; }
    .hourglass { font-size:30px; animation:rotate 1.5s linear infinite; }
    @keyframes rotate { to { transform:rotate(360deg); } }
    @media(max-width:768px) { .dashboard-buttons{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>🧾 Sales Dashboard</h2>
      <div class="user-info">
        <span class="user-name" id="userNameDisplay"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>
    <div class="nav-tabs">
      <div class="nav-tab active" onclick="showTab('dashboard',this)">📊 Dashboard</div>
      <div class="nav-tab" onclick="showTab('analytics',this)">📊 Analytics</div>
      <div class="nav-tab" onclick="showTab('collect',this)">💰 Collect</div>
      <div class="nav-tab" onclick="showTab('prices',this)">💲 Prices</div>
      <div class="nav-tab" onclick="openInvoicePage()">🧾 New Invoice</div>
    </div>
    <div class="status-bar">
      <div class="status-item receipt" onclick="filterInvoices('receipt')">📄 Receipts</div>
      <div class="status-item pending" onclick="filterInvoices('pending')">⏳ Pending</div>
      <div class="status-item cancel"  onclick="filterInvoices('cancel')">❌ Canceled</div>
      <div class="status-item done"    onclick="filterInvoices('done')">✅ Done</div>
    </div>
    <div class="content" id="mainContent"></div>
  </div>

  <div id="customAlertModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:9999;">
    <div style="background:white;width:400px;border-radius:30px;padding:30px;text-align:center;">
      <div style="font-size:50px;margin-bottom:20px;">ℹ️</div>
      <h3 style="color:#1e2b4f;margin-bottom:20px;" id="alertMessage"></h3>
      <button class="btn-primary" id="alertOk">OK</button>
    </div>
  </div>

  <div id="customConfirmModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:9999;">
    <div style="background:white;width:400px;border-radius:30px;padding:30px;text-align:center;">
      <div style="font-size:50px;margin-bottom:20px;">❓</div>
      <h3 style="color:#1e2b4f;margin-bottom:20px;" id="confirmMessage"></h3>
      <div style="display:flex;gap:15px;justify-content:center;">
        <button id="confirmOk" class="btn-primary" style="background:#e74c3c;">نعم</button>
        <button id="confirmCancel" class="btn-secondary">إلغاء</button>
      </div>
    </div>
  </div>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-container">
      <div class="hourglass">⏳</div>
      <span id="loadingMessage">جاري التحميل...</span>
    </div>
  </div>

<script>
 const GAS_URL = 'https://script.google.com/macros/s/AKfycbwX_BUpZUxhOKB-BtjykeE2lSTjlfXORGWhwoh6aJo_JYwCL6vnZjxc5r4mj7qPIcyt/exec';
  // ── جدول الصفحات ──
  const PAGES = {
    Login:               'index.html',
    Dashboard:           'Dashboard.html',
    OwnerDashboard:      'OwnerDashboard.html',
    SalesDashboard:      'SalesDashboard.html',
    AccountantDashboard: 'AccountantDashboard.html',
    SalesInvoice:        'SalesInvoice.html',
    BookingsToday:       'BookingsToday.html'
  };

  let currentUser    = null;
  let selectedBranch = null;

  function navigateTo(page) {
    window.location.href = PAGES[page] || (page + '.html');
  }

  async function apiGet(action, params = {}) {
    const url = new URL(GAS_URL);
    url.searchParams.set('action', action);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    const res = await fetch(url.toString(), { redirect: 'follow' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }

  function showAlert(message) {
    document.getElementById('alertMessage').innerText = message;
    const modal = document.getElementById('customAlertModal');
    modal.style.display = 'flex';
    document.getElementById('alertOk').onclick = () => modal.style.display = 'none';
  }

  function showLoading(show, message = 'جاري التحميل...') {
    document.getElementById('loadingMessage').innerText = message;
    document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
  }

  function showConfirm(message, onConfirm) {
    const modal = document.getElementById('customConfirmModal');
    document.getElementById('confirmMessage').innerText = message;
    modal.style.display = 'flex';
    const ok = document.getElementById('confirmOk');
    const cancel = document.getElementById('confirmCancel');
    const okH     = () => { modal.style.display='none'; onConfirm(); ok.removeEventListener('click',okH); cancel.removeEventListener('click',cancelH); };
    const cancelH = () => { modal.style.display='none'; ok.removeEventListener('click',okH); cancel.removeEventListener('click',cancelH); };
    ok.addEventListener('click', okH);
    cancel.addEventListener('click', cancelH);
  }

  // ── اختيار الفرع ──
  function showBranchSelector(branches) {
    let options = '<option value="">-- اختر الفرع --</option>';
    branches.forEach(b => { options += `<option value="${b.id}">${b.name}</option>`; });
    document.getElementById('mainContent').innerHTML = `
      <div class="branch-selector">
        <label>🌿 اختر الفرع الذي تعمل به</label>
        <select id="branchSelect">${options}</select>
        <br>
        <button class="btn-primary" style="margin-top:15px;" onclick="confirmBranch()">تأكيد</button>
      </div>`;
  }

  function confirmBranch() {
    const select     = document.getElementById('branchSelect');
    const branchId   = select.value;
    const branchName = select.options[select.selectedIndex]?.text;
    if (!branchId) { showAlert('يرجى اختيار فرع'); return; }
    selectedBranch = { id: branchId, name: branchName };
    sessionStorage.setItem('selectedBranch', JSON.stringify(selectedBranch));
    showDashboard();
  }

  async function loadUserBranches() {
    if (!currentUser?.centerId) { showDashboard(); return; }
    showLoading(true, 'جاري تحميل الفروع...');
    try {
      const data     = await apiGet('getBranchesByCenter', { centerId: currentUser.centerId });
      const branches = Array.isArray(data) ? data : (data.branches || []);
      if (branches.length > 0) showBranchSelector(branches);
      else { showAlert('لا توجد فروع متاحة'); showDashboard(); }
    } catch(e) {
      showAlert('فشل في تحميل الفروع');
      showDashboard();
    } finally {
      showLoading(false);
    }
  }

  // ── الداشبورد ──
  function showDashboard() {
    const branchInfo = selectedBranch
      ? `<p style="color:#666;margin-top:5px;font-size:14px;">🌿 ${selectedBranch.name}</p>` : '';
    document.getElementById('mainContent').innerHTML = `
      <div class="section-title">📋 قائمة العمليات ${branchInfo}</div>
      <div class="dashboard-buttons">
        <div class="dashboard-btn" onclick="openInvoicePage()">
          <div class="icon">➕</div><div class="title">إنشاء فاتورة جديدة</div>
        </div>
        <!-- أضف هذا الزر الجديد بعد أزرار الفواتير الموجودة -->
    <div class="dashboard-btn" onclick="openPassportScanner()">
    <div class="icon">🛂</div>
    <div class="title">مسح جواز السفر</div>
    <span class="badge commission">Passport Scan</span>
        </div>
        <div class="dashboard-btn" onclick="showAlert('فواتير معلقة - قيد التطوير')">
          <div class="icon">⏳</div><div class="title">فواتير معلقة</div>
          <span class="badge pending">Pending</span>
        </div>
        <div class="dashboard-btn" onclick="showAlert('فواتير تم تنفيذها - قيد التطوير')">
          <div class="icon">✅</div><div class="title">فواتير تم تنفيذها</div>
          <span class="badge confirmed">Confirmed</span>
        </div>
        <div class="dashboard-btn" onclick="showAlert('فواتير ملغاة - قيد التطوير')">
          <div class="icon">❌</div><div class="title">فواتير ملغاة</div>
          <span class="badge cancel">Cancel</span>
        </div>
        <div class="dashboard-btn" onclick="showAlert('العمولات - قيد التطوير')">
          <div class="icon">💰</div><div class="title">العمولات</div>
          <span class="badge commission">Commission</span>
        </div>
      </div>`;
  }

  // ✅ الانتقال لصفحة الفاتورة
  function openInvoicePage() {
    if (!currentUser) { showAlert('بيانات المستخدم غير متوفرة'); return; }
    // حفظ بيانات الفرع المختار قبل الانتقال
    if (selectedBranch) {
      const user = { ...currentUser, branchId: selectedBranch.id, branchName: selectedBranch.name };
      sessionStorage.setItem('currentUser', JSON.stringify(user));
    }
    window.location.href = 'SalesInvoice.html';
  }

  function showTab(tab, el) {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    if (tab === 'dashboard') showDashboard();
    else showAlert('هذه الصفحة قيد التطوير');
  }

  function filterInvoices(status) { showAlert('تصفية حسب ' + status + ' - قيد التطوير'); }
// دالة فتح ماسح جواز السفر
function openPassportScanner() {
    if (!currentUser) {
        showAlert('بيانات المستخدم غير متوفرة');
        return;
    }
    // حفظ بيانات الفرع المختار قبل الانتقال
    if (selectedBranch) {
        const user = { ...currentUser, branchId: selectedBranch.id, branchName: selectedBranch.name };
        sessionStorage.setItem('currentUser', JSON.stringify(user));
    }
    window.location.href = 'PassportScan.html';
}
  function logout() {
    showConfirm('هل أنت متأكد من تسجيل الخروج؟', function() {
      sessionStorage.clear();
      window.location.href = 'index.html';
    });
  }

  // ── التحميل الأولي ──
  document.addEventListener('DOMContentLoaded', async function() {
    const userData = sessionStorage.getItem('currentUser');
    if (!userData) { window.location.href = 'index.html'; return; }

    try {
      currentUser = JSON.parse(userData);
      document.getElementById('userNameDisplay').textContent = currentUser.name || 'Sales Rep';

      if (currentUser.type !== 'Sales') {
        const map = { Admin:'Dashboard', Owner:'OwnerDashboard', Accountant:'AccountantDashboard' };
        window.location.href = (map[currentUser.type] || 'Dashboard') + '.html';
        return;
      }

      const savedBranch = sessionStorage.getItem('selectedBranch');
      if (savedBranch) {
        selectedBranch = JSON.parse(savedBranch);
        showDashboard();
      } else {
        await loadUserBranches();
      }
    } catch(e) {
      console.error(e);
      window.location.href = 'index.html';
    }
  });
</script>
</body>
</html>
