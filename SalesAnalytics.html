<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Sales Analytics - Diving Centers Management</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
    .header { background: linear-gradient(135deg, #1e2b4f 0%, #152238 100%); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
    .header h2 { color: #ffd966; font-size: 24px; display: flex; align-items: center; gap: 10px; }
    .user-info { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .user-name { background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 40px; border: 1px solid #ffd966; }
    .back-btn { background: #ff6b6b; color: white; border: none; padding: 8px 25px; border-radius: 40px; cursor: pointer; font-weight: 600; transition: 0.3s; }
    .back-btn:hover { background: #ee5253; transform: translateY(-2px); }
    
    .analytics-tabs { display: flex; background: #f8f9fa; padding: 15px 30px; border-bottom: 2px solid #dee2e6; gap: 10px; flex-wrap: wrap; }
    .analytics-tab { padding: 10px 25px; border: none; border-radius: 30px; font-weight: 600; cursor: pointer; transition: 0.3s; background: white; color: #1e2b4f; border: 2px solid #e9f0fa; }
    .analytics-tab:hover { background: #ffd966; }
    .analytics-tab.active { background: #1e2b4f; color: #ffd966; border-color: #1e2b4f; }
    
    .filter-section { background: #f8f9fa; padding: 20px 30px; border-bottom: 2px solid #dee2e6; }
    .filter-row { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
    .filter-group { flex: 1; min-width: 160px; }
    .filter-group label { display: block; font-size: 12px; color: #1e2b4f; font-weight: 600; margin-bottom: 5px; }
    .filter-group input { width: 100%; padding: 10px; border: 2px solid #e9f0fa; border-radius: 15px; font-size: 14px; }
    .filter-group input:focus { outline: none; border-color: #1e2b4f; }
    .filter-actions { display: flex; gap: 10px; }
    .btn-primary { background: #1e2b4f; color: white; border: none; padding: 10px 25px; border-radius: 40px; font-weight: 600; cursor: pointer; }
    .btn-primary:hover { background: #ffd966; color: #1e2b4f; }
    
    .analytics-content { padding: 30px; }
    .chart-container { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
    .chart-title { font-size: 18px; font-weight: 700; color: #1e2b4f; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #ffd966; }
    canvas { max-height: 400px; width: 100% !important; }
    .summary-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
    .stat-card { background: #f8f9fa; border-radius: 20px; padding: 20px; text-align: center; }
    .stat-value { font-size: 32px; font-weight: 800; color: #1e2b4f; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1e2b4f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 50px auto; }
    @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
    .no-data { text-align: center; padding: 50px; color: #6c757d; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>📊 Sales Analytics</h2>
    <div class="user-info">
      <span class="user-name" id="userNameDisplay"></span>
      <button class="back-btn" onclick="goBack()">🔙 الرجوع</button>
    </div>
  </div>

  <div class="analytics-tabs">
    <button class="analytics-tab active" onclick="switchTab('daily')">📅 Daily Sales</button>
    <button class="analytics-tab" onclick="switchTab('monthly')">📆 Monthly Sales</button>
    <button class="analytics-tab" onclick="switchTab('trips')">🚤 By Trip</button>
    <button class="analytics-tab" onclick="switchTab('nationalities')">🌍 By Nationality</button>
    <button class="analytics-tab" onclick="switchTab('commission')">💰 Commission</button>
  </div>

  <div class="filter-section">
    <div class="filter-row">
      <div class="filter-group">
        <label>From Date</label>
        <input type="date" id="filterDateFrom">
      </div>
      <div class="filter-group">
        <label>To Date</label>
        <input type="date" id="filterDateTo">
      </div>
      <div class="filter-actions">
        <button class="btn-primary" onclick="loadAnalytics()">Apply</button>
      </div>
    </div>
  </div>

  <div class="analytics-content" id="analyticsContent">
    <div class="loader"></div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwtzYyXV6-ET3P1p6bKOMOfuyzYhLsWvHyOQzlpmzFxTyMxtVhLl66_NR2afUOBmKHF/exec';
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let currentUser = null;
let currentTab = 'daily';
let exchangeRates = [];
let invoices = [];

function parseDate(str) {
  if (!str) return null;
  let parts = str.split('/');
  if (parts.length === 3) {
    let day = parseInt(parts[0]);
    let month = MONTHS.findIndex(m => m.toLowerCase() === parts[1].toLowerCase());
    let year = parseInt(parts[2]);
    if (month !== -1) return new Date(year, month, day);
  }
  return new Date(str);
}

function formatDate(date) {
  return date.getDate() + '/' + MONTHS[date.getMonth()] + '/' + date.getFullYear();
}

function getAmount(inv) {
  let total = 0;
  total += (parseFloat(inv.cashUSD) || 0) * 47.5;
  total += (parseFloat(inv.cashEUR) || 0) * 50.25;
  total += (parseFloat(inv.cashGBP) || 0) * 60;
  total += (parseFloat(inv.cashLE) || 0) * 1;
  total += (parseFloat(inv.visaUSD) || 0) * 46.3125;
  total += (parseFloat(inv.visaEUR) || 0) * 48.99375;
  total += (parseFloat(inv.visaGBP) || 0) * 58.5;
  total += (parseFloat(inv.visaLE) || 0) * 0.975;
  return total;
}

async function loadData() {
  try {
    console.log('Loading data...');
    
    let res = await fetch(GAS_URL + '?action=getAllInvoices');
    let data = await res.json();
    invoices = Array.isArray(data) ? data : [];
    
    invoices = invoices.filter(inv => inv.SalesID == currentUser?.id);
    console.log('Invoices:', invoices.length);
    
    res = await fetch(GAS_URL + '?action=getExchangeRates');
    data = await res.json();
    exchangeRates = Array.isArray(data) ? data : [];
    console.log('Exchange rates:', exchangeRates.length);
    
    loadAnalytics();
  } catch (e) {
    console.error(e);
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.analytics-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  loadAnalytics();
}

function loadAnalytics() {
  let from = new Date(document.getElementById('filterDateFrom').value);
  let to = new Date(document.getElementById('filterDateTo').value);
  
  if (currentTab === 'daily') showDaily(from, to);
  else if (currentTab === 'monthly') showMonthly(from, to);
  else if (currentTab === 'trips') showTrips(from, to);
  else if (currentTab === 'nationalities') showNationalities(from, to);
  else if (currentTab === 'commission') showCommission(from, to);
}

function showDaily(from, to) {
  let data = {};
  let dates = [];
  
  for (let d = new Date(from); d <= to; d.setDate(d.getDate() + 1)) {
    let key = formatDate(d);
    dates.push(key);
    data[key] = 0;
  }
  
  invoices.forEach(inv => {
    let d = parseDate(inv.activeDate);
    if (d && d >= from && d <= to) {
      let key = formatDate(d);
      data[key] += getAmount(inv);
    }
  });
  
  let values = dates.map(d => data[d]);
  let total = values.reduce((a, b) => a + b, 0);
  
  document.getElementById('analyticsContent').innerHTML = `
    <div class="chart-container">
      <div class="chart-title">📅 Daily Sales</div>
      <canvas id="chart"></canvas>
    </div>
    <div class="summary-stats">
      <div class="stat-card"><div class="stat-value">${total.toLocaleString()} EGP</div><div>Total</div></div>
    </div>
  `;
  
  setTimeout(() => {
    new Chart(document.getElementById('chart'), {
      type: 'bar',
      data: {
        labels: dates,
        datasets: [{
          label: 'Sales',
          data: values,
          backgroundColor: '#1e2b4f'
        }]
      }
    });
  }, 100);
}

function showMonthly(from, to) {
  let data = {};
  let months = [];
  
  for (let d = new Date(from); d <= to; d.setMonth(d.getMonth() + 1)) {
    let key = MONTHS[d.getMonth()] + ' ' + d.getFullYear();
    months.push(key);
    data[key] = 0;
  }
  
  invoices.forEach(inv => {
    let d = parseDate(inv.activeDate);
    if (d && d >= from && d <= to) {
      let key = MONTHS[d.getMonth()] + ' ' + d.getFullYear();
      data[key] += getAmount(inv);
    }
  });
  
  let values = months.map(m => data[m]);
  let total = values.reduce((a, b) => a + b, 0);
  
  document.getElementById('analyticsContent').innerHTML = `
    <div class="chart-container">
      <div class="chart-title">📆 Monthly Sales</div>
      <canvas id="chart"></canvas>
    </div>
    <div class="summary-stats">
      <div class="stat-card"><div class="stat-value">${total.toLocaleString()} EGP</div><div>Total</div></div>
    </div>
  `;
  
  setTimeout(() => {
    new Chart(document.getElementById('chart'), {
      type: 'bar',
      data: {
        labels: months,
        datasets: [{
          label: 'Sales',
          data: values,
          backgroundColor: '#ffd966'
        }]
      }
    });
  }, 100);
}

function showTrips(from, to) {
  let data = {};
  
  invoices.forEach(inv => {
    let d = parseDate(inv.activeDate);
    if (d && d >= from && d <= to) {
      let trip = inv.Trip || 'Unknown';
      data[trip] = (data[trip] || 0) + getAmount(inv);
    }
  });
  
  let sorted = Object.entries(data).sort((a, b) => b[1] - a[1]).slice(0, 10);
  let labels = sorted.map(s => s[0]);
  let values = sorted.map(s => s[1]);
  
  document.getElementById('analyticsContent').innerHTML = `
    <div class="chart-container">
      <div class="chart-title">🚤 By Trip</div>
      <canvas id="chart"></canvas>
    </div>
  `;
  
  setTimeout(() => {
    new Chart(document.getElementById('chart'), {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Sales',
          data: values,
          backgroundColor: '#9b59b6'
        }]
      },
      options: { indexAxis: 'y' }
    });
  }, 100);
}

function showNationalities(from, to) {
  let data = {};
  
  invoices.forEach(inv => {
    let d = parseDate(inv.activeDate);
    if (d && d >= from && d <= to) {
      let nat = inv.Nationality || 'Unknown';
      data[nat] = (data[nat] || 0) + getAmount(inv);
    }
  });
  
  let sorted = Object.entries(data).sort((a, b) => b[1] - a[1]).slice(0, 10);
  let labels = sorted.map(s => s[0]);
  let values = sorted.map(s => s[1]);
  
  document.getElementById('analyticsContent').innerHTML = `
    <div class="chart-container">
      <div class="chart-title">🌍 By Nationality</div>
      <canvas id="chart"></canvas>
    </div>
  `;
  
  setTimeout(() => {
    new Chart(document.getElementById('chart'), {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Sales',
          data: values,
          backgroundColor: '#3498db'
        }]
      },
      options: { indexAxis: 'y' }
    });
  }, 100);
}

function showCommission(from, to) {
  let data = {};
  let dates = [];
  
  for (let d = new Date(from); d <= to; d.setDate(d.getDate() + 1)) {
    let key = formatDate(d);
    dates.push(key);
    data[key] = 0;
  }
  
  invoices.forEach(inv => {
    let d = parseDate(inv.activeDate);
    if (d && d >= from && d <= to) {
      let key = formatDate(d);
      data[key] += parseFloat(inv.Commission) || 0;
    }
  });
  
  let values = dates.map(d => data[d]);
  let total = values.reduce((a, b) => a + b, 0);
  
  document.getElementById('analyticsContent').innerHTML = `
    <div class="chart-container">
      <div class="chart-title">💰 Commission</div>
      <canvas id="chart"></canvas>
    </div>
    <div class="summary-stats">
      <div class="stat-card"><div class="stat-value">${total.toFixed(2)} EGP</div><div>Total</div></div>
    </div>
  `;
  
  setTimeout(() => {
    new Chart(document.getElementById('chart'), {
      type: 'line',
      data: {
        labels: dates,
        datasets: [{
          label: 'Commission',
          data: values,
          borderColor: '#27ae60',
          fill: false
        }]
      }
    });
  }, 100);
}

function goBack() {
  window.location.href = 'SalesDashboard.html';
}

document.addEventListener('DOMContentLoaded', () => {
  let userData = sessionStorage.getItem('currentUser');
  if (!userData) {
    window.location.href = 'index.html';
    return;
  }
  
  currentUser = JSON.parse(userData);
  document.getElementById('userNameDisplay').textContent = currentUser.name;
  
  let today = new Date();
  let firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
  
  document.getElementById('filterDateFrom').value = firstDay.toISOString().split('T')[0];
  document.getElementById('filterDateTo').value = today.toISOString().split('T')[0];
  
  loadData();
});

window.switchTab = switchTab;
window.loadAnalytics = loadAnalytics;
window.goBack = goBack;
</script>
</body>
</html>
