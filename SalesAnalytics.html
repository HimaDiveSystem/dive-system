<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Sales Analytics - Diving Centers Management</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
    .header { background: linear-gradient(135deg, #1e2b4f 0%, #152238 100%); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
    .header h2 { color: #ffd966; font-size: 24px; display: flex; align-items: center; gap: 10px; }
    .user-info { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .user-name { background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 40px; border: 1px solid #ffd966; }
    .back-btn { background: #ff6b6b; color: white; border: none; padding: 8px 25px; border-radius: 40px; cursor: pointer; font-weight: 600; transition: 0.3s; }
    .back-btn:hover { background: #ee5253; transform: translateY(-2px); }
    
    .analytics-tabs { display: flex; background: #f8f9fa; padding: 15px 30px; border-bottom: 2px solid #dee2e6; gap: 10px; flex-wrap: wrap; }
    .analytics-tab { padding: 10px 25px; border: none; border-radius: 30px; font-weight: 600; cursor: pointer; transition: 0.3s; background: white; color: #1e2b4f; border: 2px solid #e9f0fa; }
    .analytics-tab:hover { background: #ffd966; }
    .analytics-tab.active { background: #1e2b4f; color: #ffd966; border-color: #1e2b4f; }
    
    .filter-section { background: #f8f9fa; padding: 20px 30px; border-bottom: 2px solid #dee2e6; }
    .filter-row { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
    .filter-group { flex: 1; min-width: 160px; }
    .filter-group label { display: block; font-size: 12px; color: #1e2b4f; font-weight: 600; margin-bottom: 5px; }
    .filter-group input { width: 100%; padding: 10px; border: 2px solid #e9f0fa; border-radius: 15px; font-size: 14px; }
    .filter-group input:focus { outline: none; border-color: #1e2b4f; }
    .filter-actions { display: flex; gap: 10px; align-items: center; }
    .btn-primary { background: #1e2b4f; color: white; border: none; padding: 10px 25px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    .btn-primary:hover { background: #ffd966; color: #1e2b4f; }
    
    .analytics-content { padding: 30px; }
    .chart-container { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
    .chart-title { font-size: 18px; font-weight: 700; color: #1e2b4f; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #ffd966; }
    canvas { max-height: 400px; width: 100% !important; }
    .summary-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
    .stat-card { background: #f8f9fa; border-radius: 20px; padding: 20px; text-align: center; }
    .stat-value { font-size: 32px; font-weight: 800; color: #1e2b4f; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1e2b4f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 50px auto; }
    @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
    .no-data { text-align: center; padding: 50px; color: #6c757d; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>📊 Sales Analytics</h2>
    <div class="user-info">
      <span class="user-name" id="userNameDisplay"></span>
      <button class="back-btn" onclick="goBack()">🔙 الرجوع</button>
    </div>
  </div>

  <div class="analytics-tabs">
    <button class="analytics-tab active" onclick="switchTab('daily')">📅 Daily Sales</button>
    <button class="analytics-tab" onclick="switchTab('monthly')">📆 Monthly Sales</button>
    <button class="analytics-tab" onclick="switchTab('trips')">🚤 By Trip</button>
    <button class="analytics-tab" onclick="switchTab('nationalities')">🌍 By Nationality</button>

  <div class="filter-section">
    <div class="filter-row">
      <div class="filter-group">
        <label>From Date</label>
        <input type="date" id="filterDateFrom">
      </div>
      <div class="filter-group">
        <label>To Date</label>

      </div>
      <div class="filter-actions">
        <button class="btn-primary" onclick="loadAnalytics()">Apply</button>
      </div>
    </div>
  </div>

  <div class="analytics-content" id="analyticsContent">
    <div class="loader"></div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwtzYyXV6-ET3P1p6bKOMOfuyzYhLsWvHyOQzlpmzFxTyMxtVhLl66_NR2afUOBmKHF/exec';
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let currentUser = null;
let currentTab = 'daily';
let exchangeRates = [];
let invoices = [];

// ============ دوال موحدة للتعامل مع التاريخ ============
function parseDate(str) {
  console.log('🔍 parseDate المدخل:', str);
  if (!str) return null;
  // تنسيق DD/MMM/YYYY مثل 09/Mar/2026
  const parts = str.split('/');
  if (parts.length === 3) {
    const day = parseInt(parts[0]);
    const monthIndex = MONTHS.findIndex(m => m.toLowerCase() === parts[1].toLowerCase());
    const year = parseInt(parts[2]);
    if (!isNaN(day) && monthIndex !== -1 && !isNaN(year)) {
      const result = new Date(year, monthIndex, day);
      console.log('✅ parseDate النتيجة:', result);
      return result;
    }
  }
  console.log('❌ parseDate فشل في التحويل');
  return null;
}

function formatDate(date) {
  return `${String(date.getDate()).padStart(2,'0')}/${MONTHS[date.getMonth()]}/${date.getFullYear()}`;
}

  function normalizeDate(dateStr) {
  if (!dateStr) return '';
  // إذا كان التاريخ بصيغة YYYY-MM-DD
  if (dateStr.includes('-')) {
    const [y, m, d] = dateStr.split('-');
    return `${parseInt(d)}/${MONTHS[parseInt(m)-1]}/${y}`;
  }
  return dateStr;
}
function getRateForDate(dateStr, rates) {
  const normalizedDate = normalizeDate(dateStr);
  const rate = rates.find(r => normalizeDate(r.Date) === normalizedDate);
  console.log(`💰 getRateForDate المدخل: ${dateStr}, بعد التوحيد: ${normalizedDate}, موجود: ${rate ? 'نعم' : 'لا'}`);
  return rate || null;
}
function calculateTotalEGP(inv, rate) {
  console.log('🧮 calculateTotalEGP المدخلات:', { inv, rate });
  if (!rate) return 0;
  
  let total = 0;
  
  // المبالغ النقدية - باستخدام الأسماء الصحيحة من getAllInvoices
  total += (parseFloat(inv.cashUSD) || 0) * (parseFloat(rate.Sales_USD) || 0);
  total += (parseFloat(inv.cashEUR) || 0) * (parseFloat(rate.Sales_EUR) || 0);
  total += (parseFloat(inv.cashGBP) || 0) * (parseFloat(rate.Sales_GBP) || 0);
  total += (parseFloat(inv.cashLE) || 0) * (parseFloat(rate.Sales_LE) || 1);
  
  // مبالغ الفيزا
  total += (parseFloat(inv.visaUSD) || 0) * (parseFloat(rate.Sales_VisaUSD) || 0);
  total += (parseFloat(inv.visaEUR) || 0) * (parseFloat(rate.Sales_VisaEUR) || 0);
  total += (parseFloat(inv.visaGBP) || 0) * (parseFloat(rate.Sales_VisaGBP) || 0);
  total += (parseFloat(inv.visaLE) || 0) * (parseFloat(rate.Sales_VisaLE) || 1);
  
  console.log('✅ calculateTotalEGP النتيجة:', total);
  return total;
}
// ============ تحميل البيانات ============
async function loadData() {
  console.log('📥 ===== بداية تحميل البيانات =====');
  
  try {
    console.log('1️⃣ الخطوة 1: جلب بيانات المستخدم');
    console.log('currentUser:', currentUser);
    
    // تحميل الفواتير
    console.log('2️⃣ الخطوة 2: جلب الفواتير من GAS');
    const invRes = await fetch(GAS_URL + '?action=getAllInvoices');
    console.log('استجابة الفواتير:', invRes.status);
    
    let invData = await invRes.json();
    console.log('عدد الفواتير الخام:', invData.length);
    console.log('أول فاتورة:', invData[0]);
    console.log('مفاتيح أول فاتورة:', Object.keys(invData[0]));
    
    invoices = Array.isArray(invData) ? invData : [];
    
    // فلترة لفواتير المستخدم الحالي فقط
    console.log(`3️⃣ الخطوة 3: فلترة الفواتير للمستخدم ${currentUser?.id}`);
    invoices = invoices.filter(inv => {
      const match = inv.salesId == currentUser?.id;
      if (match) console.log('✅ فاتورة مطابقة:', inv.voucherNo);
      return match;
    });
    
    console.log(`📊 عدد فواتير المستخدم بعد الفلترة: ${invoices.length}`);
    
    // تحميل أسعار الصرف
 // تحميل أسعار الصرف
console.log('4️⃣ الخطوة 4: جلب أسعار الصرف من GAS');
const ratesRes = await fetch(GAS_URL + '?action=getExchangeRates');
console.log('استجابة أسعار الصرف:', ratesRes.status);

let ratesData = await ratesRes.json();
console.log('💰 بيانات أسعار الصرف الخام:', ratesData);

// التحقق من شكل البيانات المستلمة
if (ratesData && typeof ratesData === 'object') {
  // إذا كانت الاستجابة كائن يحوي success و message
  if (ratesData.success !== undefined) {
    console.log('⚠️ استجابة تحتوي success/message:', ratesData);
    if (ratesData.success === false) {
      console.warn('❌ فشل جلب أسعار الصرف:', ratesData.message);
      exchangeRates = [];
    } else if (Array.isArray(ratesData.data)) {
      exchangeRates = ratesData.data;
    }
  }
  // إذا كانت مصفوفة مباشرة
  else if (Array.isArray(ratesData)) {
    exchangeRates = ratesData;
    console.log('✅ تم استلام مصفوفة أسعار صرف بعدد:', exchangeRates.length);
    if (exchangeRates.length > 0) {
      console.log('💰 أول سعر صرف:', exchangeRates[0]);
      console.log('💰 جميع التواريخ المتوفرة:', exchangeRates.map(r => r.Date).join(', '));
    }
  }
  // إذا كانت كائن بمفاتيح رقمية (كائن يشبه المصفوفة)
  else if (typeof ratesData === 'object') {
    const possibleArray = Object.values(ratesData);
    if (Array.isArray(possibleArray) && possibleArray.length > 0) {
      exchangeRates = possibleArray;
      console.log('✅ تم تحويل الكائن إلى مصفوفة بعدد:', exchangeRates.length);
    } else {
      exchangeRates = [];
    }
  }
} else {
  exchangeRates = [];
}

console.log(`💰 عدد أسعار الصرف بعد المعالجة: ${exchangeRates.length}`);

console.log('💰 أسعار الصرف الخام:', ratesData);
console.log('💰 نوع البيانات:', typeof ratesData);
console.log('💰 هل هو مصفوفة:', Array.isArray(ratesData));

if (Array.isArray(ratesData) && ratesData.length > 0) {
  console.log('💰 أول سعر صرف:', ratesData[0]);
  console.log('💰 جميع التواريخ المتوفرة:', ratesData.map(r => r.Date).join(', '));
  
  // تحقق من وجود تطابق مع تاريخ من الفواتير
  const sampleDate = formatDate(new Date(2026, 2, 9)); // 09/Mar/2026
  const match = ratesData.find(r => r.Date === sampleDate);
  console.log(`💰 البحث عن تطابق للتاريخ ${sampleDate}:`, match ? 'موجود' : 'غير موجود');
} else {
  console.log('⚠️ لا توجد بيانات أسعار صرف');
}
    // عرض التحليل الأول
    console.log('5️⃣ الخطوة 5: بدء التحليل');
    loadAnalytics();
    
  } catch (error) {
    console.error('❌ خطأ في تحميل البيانات:', error);
    document.getElementById('analyticsContent').innerHTML = `<div class="no-data">خطأ في تحميل البيانات</div>`;
  }
  
  console.log('🏁 ===== نهاية تحميل البيانات =====');
}

// ============ التبديل بين التحليلات ============
function switchTab(tab) {
  console.log(`🔄 تبديل التاب إلى: ${tab}`);
  currentTab = tab;
  document.querySelectorAll('.analytics-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  loadAnalytics();
}

function loadAnalytics() {
  console.log(`📊 ===== بداية تحميل التحليل: ${currentTab} =====`);
  
  const fromDate = document.getElementById('filterDateFrom').value;
  const toDate = document.getElementById('filterDateTo').value;
  
  console.log('📅 التاريخ من:', fromDate);
  console.log('📅 التاريخ إلى:', toDate);
  
  if (!fromDate || !toDate) {
    console.log('⚠️ التواريخ غير مكتملة');
    return;
  }
  
  const from = new Date(fromDate);
  const to = new Date(toDate);
  
  console.log('📅 from (كـ Date):', from);
  console.log('📅 to (كـ Date):', to);
  
  if (currentTab === 'daily') showDailyChart(from, to);
  else if (currentTab === 'monthly') showMonthlyChart(from, to);
  else if (currentTab === 'trips') showTripsChart(from, to);
  else if (currentTab === 'nationalities') showNationalitiesChart(from, to);
  else if (currentTab === 'commission') showCommissionChart(from, to);
  
  console.log(`🏁 ===== نهاية تحميل التحليل: ${currentTab} =====`);
}

// ============ 1. الرسم البياني اليومي ============
function showDailyChart(from, to) {
  console.log('📅 ===== بداية الرسم اليومي =====');
  
  // تجهيز البيانات
  const dailyData = {};
  const dates = [];
  
  for (let d = new Date(from); d <= to; d.setDate(d.getDate() + 1)) {
    const dateStr = formatDate(d);
    dates.push(dateStr);
    dailyData[dateStr] = 0;
  }
  
  console.log('📅 التواريخ المطلوبة:', dates);
  
  // حساب المبيعات لكل يوم
  let invoicesProcessed = 0;
  let invoicesWithRate = 0;
  
  invoices.forEach(inv => {
    invoicesProcessed++;
    const invDate = parseDate(inv.activeDate);
    if (invDate && invDate >= from && invDate <= to) {
      const dateStr = formatDate(invDate);
      const rate = getRateForDate(dateStr, exchangeRates);
      if (rate) {
        invoicesWithRate++;
        dailyData[dateStr] += calculateTotalEGP(inv, rate);
      }
    }
  });
  
  console.log(`📊 عدد الفواتير المعالجة: ${invoicesProcessed}`);
  console.log(`📊 عدد الفواتير مع سعر صرف: ${invoicesWithRate}`);
  console.log('📊 dailyData:', dailyData);
  
  const values = dates.map(d => dailyData[d]);
  const total = values.reduce((a, b) => a + b, 0);
  
  console.log('📈 القيم:', values);
  console.log('💰 الإجمالي:', total);
  
  // عرض الرسم
  document.getElementById('analyticsContent').innerHTML = `
    <div class="chart-container">
      <div class="chart-title">📅 Daily Sales (EGP)</div>
      <canvas id="chart"></canvas>
    </div>
    <div class="summary-stats">
      <div class="stat-card">
        <div class="stat-value">${total.toLocaleString()} EGP</div>
        <div class="stat-label">Total Sales</div>
      </div>
    </div>
  `;
  
  setTimeout(() => {
    const ctx = document.getElementById('chart');
    if (ctx) {
      console.log('🎨 رسم المخطط اليومي');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: dates,
          datasets: [{
            label: 'Sales (EGP)',
            data: values,
            backgroundColor: '#1e2b4f'
          }]
        },
        options: {
          responsive: true,
          scales: { y: { beginAtZero: true } }
        }
      });
    } else {
      console.error('❌ عنصر canvas غير موجود');
    }
  }, 100);
  
  console.log('📅 ===== نهاية الرسم اليومي =====');
}

// ============ 2. الرسم البياني الشهري ============
function showMonthlyChart(from, to) {
  console.log('📆 ===== بداية الرسم الشهري =====');
  
  const monthlyData = {};
  const months = [];
  
  for (let d = new Date(from); d <= to; d.setMonth(d.getMonth() + 1)) {
    const monthStr = `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
    months.push(monthStr);
    monthlyData[monthStr] = 0;
  }
  
  console.log('📆 الأشهر المطلوبة:', months);
  
  invoices.forEach(inv => {
    const invDate = parseDate(inv.activeDate);
    if (invDate && invDate >= from && invDate <= to) {
      const monthStr = `${MONTHS[invDate.getMonth()]} ${invDate.getFullYear()}`;
      
      const monthRates = exchangeRates.filter(r => {
        const rDate = parseDate(r.Date);
        return rDate && rDate.getMonth() === invDate.getMonth() && rDate.getFullYear() === invDate.getFullYear();
      });
      
      console.log(`💰 عدد أسعار الشهر ${monthStr}: ${monthRates.length}`);
      
      if (monthRates.length > 0) {
        const avgRate = {
          Sales_USD: monthRates.reduce((sum, r) => sum + (parseFloat(r.Sales_USD) || 0), 0) / monthRates.length,
          Sales_EUR: monthRates.reduce((sum, r) => sum + (parseFloat(r.Sales_EUR) || 0), 0) / monthRates.length,
          Sales_GBP: monthRates.reduce((sum, r) => sum + (parseFloat(r.Sales_GBP) || 0), 0) / monthRates.length,
          Sales_LE: monthRates.reduce((sum, r) => sum + (parseFloat(r.Sales_LE) || 1), 0) / monthRates.length,
          Sales_VisaUSD: monthRates.reduce((sum, r) => sum + (parseFloat(r.Sales_VisaUSD) || 0), 0) / monthRates.length,
          Sales_VisaEUR: monthRates.reduce((sum, r) => sum + (parseFloat(r.Sales_VisaEUR) || 0), 0) / monthRates.length,
          Sales_VisaGBP: monthRates.reduce((sum, r) => sum + (parseFloat(r.Sales_VisaGBP) || 0), 0) / monthRates.length,
          Sales_VisaLE: monthRates.reduce((sum, r) => sum + (parseFloat(r.Sales_VisaLE) || 1), 0) / monthRates.length
        };
        
        monthlyData[monthStr] += calculateTotalEGP(inv, avgRate);
      }
    }
  });
  
  const values = months.map(m => monthlyData[m]);
  const total = values.reduce((a, b) => a + b, 0);
  
  console.log('📈 القيم الشهرية:', values);
  console.log('💰 الإجمالي الشهري:', total);
  
  document.getElementById('analyticsContent').innerHTML = `
    <div class="chart-container">
      <div class="chart-title">📆 Monthly Sales (EGP)</div>
      <canvas id="chart"></canvas>
    </div>
    <div class="summary-stats">
      <div class="stat-card">
        <div class="stat-value">${total.toLocaleString()} EGP</div>
        <div class="stat-label">Total Sales</div>
      </div>
    </div>
  `;
  
  setTimeout(() => {
    const ctx = document.getElementById('chart');
    if (ctx) {
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: months,
          datasets: [{
            label: 'Sales (EGP)',
            data: values,
            backgroundColor: '#ffd966'
          }]
        },
        options: {
          responsive: true,
          scales: { y: { beginAtZero: true } }
        }
      });
    }
  }, 100);
  
  console.log('📆 ===== نهاية الرسم الشهري =====');
}

// ============ 3. الرسم حسب الرحلات ============
function showTripsChart(from, to) {
  console.log('🚤 ===== بداية الرسم حسب الرحلات =====');
  
  const tripsData = {};
  let invoicesProcessed = 0;
  
  invoices.forEach(inv => {
    const invDate = parseDate(inv.activeDate);
    if (invDate && invDate >= from && invDate <= to) {
      invoicesProcessed++;
      const trip = inv.trip || 'Unknown';
      const dateStr = formatDate(invDate);
      const rate = getRateForDate(dateStr, exchangeRates);
      
      if (rate) {
        tripsData[trip] = (tripsData[trip] || 0) + calculateTotalEGP(inv, rate);
      }
    }
  });
  
  console.log(`📊 عدد الفواتير في النطاق: ${invoicesProcessed}`);
  console.log('🚤 بيانات الرحلات:', tripsData);
  
  const sorted = Object.entries(tripsData).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const labels = sorted.map(s => s[0]);
  const values = sorted.map(s => s[1]);
  
  console.log('🏆 أفضل 10 رحلات:', sorted);
  
  document.getElementById('analyticsContent').innerHTML = `
    <div class="chart-container">
      <div class="chart-title">🚤 Sales by Trip</div>
      <canvas id="chart"></canvas>
    </div>
  `;
  
  setTimeout(() => {
    const ctx = document.getElementById('chart');
    if (ctx) {
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Sales (EGP)',
            data: values,
            backgroundColor: '#9b59b6'
          }]
        },
        options: {
          responsive: true,
          indexAxis: 'y'
        }
      });
    }
  }, 100);
  
  console.log('🚤 ===== نهاية الرسم حسب الرحلات =====');
}

// ============ 4. الرسم حسب الجنسيات ============
function showNationalitiesChart(from, to) {
  console.log('🌍 ===== بداية الرسم حسب الجنسيات =====');
  
  const natData = {};
  let invoicesProcessed = 0;
  
  invoices.forEach(inv => {
    const invDate = parseDate(inv.activeDate);
    if (invDate && invDate >= from && invDate <= to) {
      invoicesProcessed++;
      const nationality = inv.nationality || 'Unknown';
      const dateStr = formatDate(invDate);
      const rate = getRateForDate(dateStr, exchangeRates);
      
      if (rate) {
        natData[nationality] = (natData[nationality] || 0) + calculateTotalEGP(inv, rate);
      }
    }
  });
  
  console.log(`📊 عدد الفواتير في النطاق: ${invoicesProcessed}`);
  console.log('🌍 بيانات الجنسيات:', natData);
  
  const sorted = Object.entries(natData).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const labels = sorted.map(s => s[0]);
  const values = sorted.map(s => s[1]);
  
  console.log('🏆 أفضل 10 جنسيات:', sorted);
  
  document.getElementById('analyticsContent').innerHTML = `
    <div class="chart-container">
      <div class="chart-title">🌍 Sales by Nationality</div>
      <canvas id="chart"></canvas>
    </div>
  `;
  
  setTimeout(() => {
    const ctx = document.getElementById('chart');
    if (ctx) {
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Sales (EGP)',
            data: values,
            backgroundColor: '#3498db'
          }]
        },
        options: {
          responsive: true,
          indexAxis: 'y'
        }
      });
    }
  }, 100);
  
  console.log('🌍 ===== نهاية الرسم حسب الجنسيات =====');
}

// ============ 5. الرسم حسب العمولات ============
function showCommissionChart(from, to) {
  console.log('💰 ===== بداية الرسم حسب العمولات =====');
  
  const commissionData = {};
  const dates = [];
  
  for (let d = new Date(from); d <= to; d.setDate(d.getDate() + 1)) {
    const dateStr = formatDate(d);
    dates.push(dateStr);
    commissionData[dateStr] = 0;
  }
  
  console.log('📅 التواريخ:', dates);
  
  let invoicesWithCommission = 0;
  
  invoices.forEach(inv => {
    const invDate = parseDate(inv.activeDate);
    if (invDate && invDate >= from && invDate <= to) {
      const dateStr = formatDate(invDate);
      const commission = parseFloat(inv.Commission) || 0;
      if (commission > 0) invoicesWithCommission++;
      commissionData[dateStr] += commission;
    }
  });
  
  console.log(`💰 عدد الفواتير بعمولات: ${invoicesWithCommission}`);
  console.log('💰 بيانات العمولات:', commissionData);
  
  const values = dates.map(d => commissionData[d]);
  const total = values.reduce((a, b) => a + b, 0);
  
  console.log('📈 قيم العمولات:', values);
  console.log('💰 إجمالي العمولات:', total);
  
  document.getElementById('analyticsContent').innerHTML = `
    <div class="chart-container">
      <div class="chart-title">💰 Commission</div>
      <canvas id="chart"></canvas>
    </div>
    <div class="summary-stats">
      <div class="stat-card">
        <div class="stat-value">${total.toFixed(2)} EGP</div>
        <div class="stat-label">Total Commission</div>
      </div>
    </div>
  `;
  
  setTimeout(() => {
    const ctx = document.getElementById('chart');
    if (ctx) {
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: dates,
          datasets: [{
            label: 'Commission (EGP)',
            data: values,
            borderColor: '#27ae60',
            fill: false
          }]
        },
        options: {
          responsive: true,
          scales: { y: { beginAtZero: true } }
        }
      });
    }
  }, 100);
  
  console.log('💰 ===== نهاية الرسم حسب العمولات =====');
}

function goBack() {
  window.location.href = 'SalesDashboard.html';
}

// ============ التهيئة ============
document.addEventListener('DOMContentLoaded', () => {
  console.log('🚀 ===== بداية تهيئة الصفحة =====');
  
  const userData = sessionStorage.getItem('currentUser');
  console.log('👤 userData من sessionStorage:', userData);
  
  if (!userData) {
    console.log('❌ لا توجد بيانات مستخدم، توجيه إلى index.html');
    window.location.href = 'index.html';
    return;
  }
  
  try {
    currentUser = JSON.parse(userData);
    console.log('✅ currentUser:', currentUser);
    document.getElementById('userNameDisplay').textContent = currentUser.name || 'Sales';
    
    const today = new Date();
    const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
    
    document.getElementById('filterDateFrom').value = firstDay.toISOString().split('T')[0];
    document.getElementById('filterDateTo').value = today.toISOString().split('T')[0];
    
    console.log('📅 التواريخ الافتراضية:', {
      from: document.getElementById('filterDateFrom').value,
      to: document.getElementById('filterDateTo').value
    });
    
    loadData();
  } catch (e) {
    console.error('❌ خطأ في تحميل المستخدم:', e);
    window.location.href = 'index.html';
  }
  
  console.log('🏁 ===== نهاية تهيئة الصفحة =====');
});

window.loadAnalytics = loadAnalytics;
