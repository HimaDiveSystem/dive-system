<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Sales Analytics - Diving Centers Management</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
    .header { background: linear-gradient(135deg, #1e2b4f 0%, #152238 100%); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
    .header h2 { color: #ffd966; font-size: 24px; display: flex; align-items: center; gap: 10px; }
    .user-info { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .user-name { background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 40px; border: 1px solid #ffd966; }
    .back-btn { background: #ff6b6b; color: white; border: none; padding: 8px 25px; border-radius: 40px; cursor: pointer; font-weight: 600; transition: 0.3s; }
    .back-btn:hover { background: #ee5253; transform: translateY(-2px); }
    
    /* تابل التحليلات */
    .analytics-tabs { display: flex; background: #f8f9fa; padding: 15px 30px; border-bottom: 2px solid #dee2e6; gap: 10px; flex-wrap: wrap; }
    .analytics-tab { padding: 10px 25px; border: none; border-radius: 30px; font-weight: 600; cursor: pointer; transition: 0.3s; background: white; color: #1e2b4f; border: 2px solid #e9f0fa; }
    .analytics-tab:hover { background: #ffd966; }
    .analytics-tab.active { background: #1e2b4f; color: #ffd966; border-color: #1e2b4f; }
    
    /* فلتر التاريخ */
    .filter-section { background: #f8f9fa; padding: 20px 30px; border-bottom: 2px solid #dee2e6; }
    .filter-row { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
    .filter-group { flex: 1; min-width: 160px; }
    .filter-group label { display: block; font-size: 12px; color: #1e2b4f; font-weight: 600; margin-bottom: 5px; }
    .filter-group input { width: 100%; padding: 10px; border: 2px solid #e9f0fa; border-radius: 15px; font-size: 14px; }
    .filter-group input:focus { outline: none; border-color: #1e2b4f; }
    .filter-actions { display: flex; gap: 10px; align-items: center; }
    .btn-primary { background: #1e2b4f; color: white; border: none; padding: 10px 25px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    .btn-primary:hover { background: #ffd966; color: #1e2b4f; }
    
    /* محتوى التحليلات */
    .analytics-content { padding: 30px; }
    .chart-container { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
    .chart-title { font-size: 18px; font-weight: 700; color: #1e2b4f; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #ffd966; display: flex; align-items: center; gap: 10px; }
    canvas { max-height: 400px; width: 100% !important; }
    .summary-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
    .stat-card { background: #f8f9fa; border-radius: 20px; padding: 20px; text-align: center; }
    .stat-value { font-size: 32px; font-weight: 800; color: #1e2b4f; }
    .stat-label { color: #666; font-size: 14px; margin-top: 5px; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1e2b4f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 50px auto; }
    @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
    .no-data { text-align: center; padding: 50px; color: #6c757d; }
    @media (max-width: 768px) { .filter-row { flex-direction: column; } }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>📊 Sales Analytics</h2>
    <div class="user-info">
      <span class="user-name" id="userNameDisplay"></span>
      <button class="back-btn" onclick="goBack()">🔙 الرجوع</button>
    </div>
  </div>

  <!-- ألسنة التحليلات -->
  <div class="analytics-tabs">
    <button class="analytics-tab active" onclick="switchTab('daily')" id="tabDaily">📅 Daily Sales</button>
    <button class="analytics-tab" onclick="switchTab('monthly')" id="tabMonthly">📆 Monthly Sales</button>
    <button class="analytics-tab" onclick="switchTab('trips')" id="tabTrips">🚤 By Trip</button>
    <button class="analytics-tab" onclick="switchTab('nationalities')" id="tabNationalities">🌍 By Nationality</button>
    <button class="analytics-tab" onclick="switchTab('commission')" id="tabCommission">💰 Commission</button>
  </div>

  <!-- فلتر التاريخ -->
  <div class="filter-section">
    <div class="filter-row">
      <div class="filter-group">
        <label>From Date</label>
        <input type="date" id="filterDateFrom">
      </div>
      <div class="filter-group">
        <label>To Date</label>
        <input type="date" id="filterDateTo">
      </div>
      <div class="filter-actions">
        <button class="btn-primary" onclick="loadAnalytics()">Apply</button>
      </div>
    </div>
  </div>

  <!-- محتوى التحليلات -->
  <div class="analytics-content" id="analyticsContent">
    <div class="loader"></div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwX_BUpZUxhOKB-BtjykeE2lSTjlfXORGWhwoh6aJo_JYwCL6vnZjxc5r4mj7qPIcyt/exec';
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let currentUser = null;
let currentTab = 'daily';
let exchangeRates = [];
let invoices = [];

// دوال التاريخ
function parseDDMMMYYYY(str) {
  if (!str) return null;
  const m = String(str).match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})/);
  if (m) {
    const idx = MONTHS.findIndex(mn => mn.toLowerCase() === m[2].toLowerCase());
    if (idx !== -1) return new Date(m[3], idx, m[1]);
  }
  return new Date(str);
}

function formatDateForDisplay(date) {
  return `${String(date.getDate()).padStart(2,'0')}/${MONTHS[date.getMonth()]}/${date.getFullYear()}`;
}

// =================== دوال التصحيح والمرونة ===================

// دالة للتحقق من البيانات وعرضها في الكونسول
function debugData() {
  console.log('=== DEBUG INFO ===');
  console.log('Current User ID:', currentUser?.id);
  console.log('Invoices count:', invoices.length);
  console.log('Exchange Rates count:', exchangeRates.length);
  
  if (invoices.length > 0) {
    console.log('First invoice:', invoices[0]);
    console.log('Invoice keys:', Object.keys(invoices[0]));
    console.log('Sample invoice date:', invoices[0].ActiveDate || invoices[0].activeDate);
    console.log('Sample invoice amounts:', {
      cashUSD: invoices[0]['$'] || invoices[0].cashUSD,
      cashEUR: invoices[0]['€'] || invoices[0].cashEUR,
      visaUSD: invoices[0]['Visa$'] || invoices[0].visaUSD
    });
  }
  
  if (exchangeRates.length > 0) {
    console.log('First exchange rate:', exchangeRates[0]);
    console.log('Exchange rate keys:', Object.keys(exchangeRates[0]));
    console.log('Available dates:', exchangeRates.map(r => r.Date || r.date).join(', '));
  }
  
  const fromDate = document.getElementById('filterDateFrom').value;
  const toDate = document.getElementById('filterDateTo').value;
  console.log('Selected date range:', fromDate, 'to', toDate);
}

// دالة للحصول على سعر الصرف بطريقة مرنة
function getRateValue(rateRow, fieldName) {
  if (!rateRow) return 0;
  
  // قائمة بالأسماء المحتملة للحقل
  const possibleNames = {
    Sales_USD: ['Sales_USD', 'SalesUSD', 'USD', 'usd'],
    Sales_EUR: ['Sales_EUR', 'SalesEUR', 'EUR', 'eur'],
    Sales_GBP: ['Sales_GBP', 'SalesGBP', 'GBP', 'gbp'],
    Sales_LE: ['Sales_LE', 'SalesLE', 'LE', 'le'],
    Sales_VisaUSD: ['Sales_VisaUSD', 'SalesVisaUSD', 'VisaUSD', 'visaUSD'],
    Sales_VisaEUR: ['Sales_VisaEUR', 'SalesVisaEUR', 'VisaEUR', 'visaEUR'],
    Sales_VisaGBP: ['Sales_VisaGBP', 'SalesVisaGBP', 'VisaGBP', 'visaGBP'],
    Sales_VisaLE: ['Sales_VisaLE', 'SalesVisaLE', 'VisaLE', 'visaLE']
  };
  
  const candidates = possibleNames[fieldName] || [fieldName];
  
  for (const name of candidates) {
    if (rateRow[name] !== undefined && rateRow[name] !== null) {
      const value = parseFloat(rateRow[name]);
      if (!isNaN(value)) {
        return value;
      }
    }
  }
  
  return 0;
}

// دالة للحصول على التاريخ بطريقة مرنة
function getRateDate(rateRow) {
  return rateRow.Date || rateRow.date || rateRow['Date'] || '';
}

// دالة للحصول على قيمة من الفاتورة بطريقة مرنة
function getInvoiceValue(inv, fieldName) {
  if (!inv) return 0;
  
  const possibleFields = {
    '$': ['$', 'cashUSD', 'USD'],
    '€': ['€', 'cashEUR', 'EUR'],
    '£': ['£', 'cashGBP', 'GBP'],
    'LE': ['LE', 'cashLE'],
    'Visa$': ['Visa$', 'visaUSD', 'VisaUSD'],
    'Visa€': ['Visa€', 'visaEUR', 'VisaEUR'],
    'Visa£': ['Visa£', 'visaGBP', 'VisaGBP'],
    'VisaLE': ['VisaLE', 'visaLE', 'VisaLE']
  };
  
  const candidates = possibleFields[fieldName] || [fieldName];
  
  for (const name of candidates) {
    if (inv[name] !== undefined && inv[name] !== null) {
      const value = parseFloat(inv[name]);
      if (!isNaN(value)) {
        return value;
      }
    }
  }
  
  return 0;
}

// دالة حساب إجمالي الفاتورة بالجنيه المصري
function calculateTotalEGP(inv, rateRow) {
  if (!rateRow) return 0;
  
  let totalEGP = 0;
  
  // المبالغ النقدية
  totalEGP += getInvoiceValue(inv, '$') * getRateValue(rateRow, 'Sales_USD');
  totalEGP += getInvoiceValue(inv, '€') * getRateValue(rateRow, 'Sales_EUR');
  totalEGP += getInvoiceValue(inv, '£') * getRateValue(rateRow, 'Sales_GBP');
  totalEGP += getInvoiceValue(inv, 'LE') * getRateValue(rateRow, 'Sales_LE');
  
  // مبالغ الفيزا
  totalEGP += getInvoiceValue(inv, 'Visa$') * getRateValue(rateRow, 'Sales_VisaUSD');
  totalEGP += getInvoiceValue(inv, 'Visa€') * getRateValue(rateRow, 'Sales_VisaEUR');
  totalEGP += getInvoiceValue(inv, 'Visa£') * getRateValue(rateRow, 'Sales_VisaGBP');
  totalEGP += getInvoiceValue(inv, 'VisaLE') * getRateValue(rateRow, 'Sales_VisaLE');
  
  return totalEGP;
}

// =================== تحميل البيانات ===================

async function loadData() {
  try {
    // تحميل الفواتير
    const invRes = await fetch(GAS_URL + '?action=getAllInvoices');
    invoices = await invRes.json();
    if (!Array.isArray(invoices)) invoices = [];
    
    // فلترة لفواتير المستخدم الحالي فقط باستخدام SalesID
    invoices = invoices.filter(inv => inv.SalesID === currentUser?.id);
    
    // تحميل أسعار الصرف
    const ratesRes = await fetch(GAS_URL + '?action=getExchangeRates');
    exchangeRates = await ratesRes.json();
    if (!Array.isArray(exchangeRates)) exchangeRates = [];
    
    // عرض معلومات التصحيح
    debugData();
    
    loadAnalytics();
  } catch (error) {
    document.getElementById('analyticsContent').innerHTML = `<div class="no-data">Error: ${error.message}</div>`;
  }
}

// تبديل التاب
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.analytics-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
  loadAnalytics();
}

// تحميل التحليلات حسب التاب المحدد
function loadAnalytics() {
  const fromDate = document.getElementById('filterDateFrom').value;
  const toDate = document.getElementById('filterDateTo').value;
  
  const from = fromDate ? new Date(fromDate) : new Date(new Date().setDate(1));
  const to = toDate ? new Date(toDate) : new Date();
  
  if (currentTab === 'daily') showDailyChart(from, to);
  else if (currentTab === 'monthly') showMonthlyChart(from, to);
  else if (currentTab === 'trips') showTripsChart(from, to);
  else if (currentTab === 'nationalities') showNationalitiesChart(from, to);
  else if (currentTab === 'commission') showCommissionChart(from, to);
}

// =================== الرسوم البيانية ===================

// 1. الرسم اليومي
function showDailyChart(from, to) {
  const container = document.getElementById('analyticsContent');
  
  // تجميع الفواتير حسب التاريخ
  const dailyData = {};
  const dateRange = [];
  
  for (let d = new Date(from); d <= to; d.setDate(d.getDate() + 1)) {
    const dateKey = formatDateForDisplay(d);
    dateRange.push(dateKey);
    dailyData[dateKey] = 0;
  }
  
  // حساب المبيعات لكل يوم
  invoices.forEach(inv => {
    const invDate = parseDDMMMYYYY(inv.ActiveDate);
    if (invDate && invDate >= from && invDate <= to) {
      const dateKey = formatDateForDisplay(invDate);
      
      // البحث عن سعر الصرف لهذا التاريخ
      const rateRow = exchangeRates.find(r => {
        const rateDate = getRateDate(r);
        return rateDate === dateKey;
      });
      
      if (rateRow) {
        const totalEGP = calculateTotalEGP(inv, rateRow);
        dailyData[dateKey] = (dailyData[dateKey] || 0) + totalEGP;
      }
    }
  });
  
  const labels = dateRange;
  const values = labels.map(d => dailyData[d] || 0);
  
  // حساب التغير اليومي
  const changes = [];
  for (let i = 1; i < values.length; i++) {
    const prev = values[i-1] || 0;
    const curr = values[i] || 0;
    const change = prev > 0 ? ((curr - prev) / prev * 100).toFixed(1) : 0;
    changes.push(change);
  }
  changes.unshift(0);
  
  const total = values.reduce((a, b) => a + b, 0);
  const avg = total / values.filter(v => v > 0).length || 0;
  
  container.innerHTML = `
    <div class="chart-container">
      <div class="chart-title">📅 Daily Sales (in EGP) with Stock Arrows</div>
      <canvas id="dailyChart"></canvas>
    </div>
    <div class="summary-stats">
      <div class="stat-card">
        <div class="stat-value">${total.toLocaleString()} EGP</div>
        <div class="stat-label">Total Sales</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${avg.toFixed(0)} EGP</div>
        <div class="stat-label">Daily Average</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${values.filter(v => v > 0).length}</div>
        <div class="stat-label">Active Days</div>
      </div>
    </div>
  `;
  
  setTimeout(() => {
    const ctx = document.getElementById('dailyChart').getContext('2d');
    
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Daily Sales (EGP)',
          data: values,
          backgroundColor: 'rgba(30, 43, 79, 0.7)',
          borderColor: '#1e2b4f',
          borderWidth: 2,
          borderRadius: 5
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { display: true, position: 'top' },
          tooltip: {
            callbacks: {
              label: (context) => {
                return `Sales: ${context.parsed.y.toLocaleString()} EGP`;
              }
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            title: { display: true, text: 'Amount (EGP)' }
          }
        }
      }
    });
    
    // إضافة الأسهم بشكل منفصل (للبساطة سنستخدم tooltip فقط)
  }, 100);
}

// 2. الرسم الشهري
function showMonthlyChart(from, to) {
  const container = document.getElementById('analyticsContent');
  
  const monthlyData = {};
  const monthsList = [];
  
  for (let d = new Date(from); d <= to; d.setMonth(d.getMonth() + 1)) {
    const monthKey = `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
    monthsList.push(monthKey);
    monthlyData[monthKey] = 0;
  }
  
  invoices.forEach(inv => {
    const invDate = parseDDMMMYYYY(inv.ActiveDate);
    if (invDate && invDate >= from && invDate <= to) {
      const monthKey = `${MONTHS[invDate.getMonth()]} ${invDate.getFullYear()}`;
      
      const monthRates = exchangeRates.filter(r => {
        const rDate = parseDDMMMYYYY(getRateDate(r));
        return rDate && rDate.getMonth() === invDate.getMonth() && rDate.getFullYear() === invDate.getFullYear();
      });
      
      if (monthRates.length > 0) {
        const avgRate = {
          Sales_USD: monthRates.reduce((sum, r) => sum + getRateValue(r, 'Sales_USD'), 0) / monthRates.length,
          Sales_EUR: monthRates.reduce((sum, r) => sum + getRateValue(r, 'Sales_EUR'), 0) / monthRates.length,
          Sales_GBP: monthRates.reduce((sum, r) => sum + getRateValue(r, 'Sales_GBP'), 0) / monthRates.length,
          Sales_LE: monthRates.reduce((sum, r) => sum + getRateValue(r, 'Sales_LE'), 0) / monthRates.length,
          Sales_VisaUSD: monthRates.reduce((sum, r) => sum + getRateValue(r, 'Sales_VisaUSD'), 0) / monthRates.length,
          Sales_VisaEUR: monthRates.reduce((sum, r) => sum + getRateValue(r, 'Sales_VisaEUR'), 0) / monthRates.length,
          Sales_VisaGBP: monthRates.reduce((sum, r) => sum + getRateValue(r, 'Sales_VisaGBP'), 0) / monthRates.length,
          Sales_VisaLE: monthRates.reduce((sum, r) => sum + getRateValue(r, 'Sales_VisaLE'), 0) / monthRates.length
        };
        
        const totalEGP = calculateTotalEGP(inv, avgRate);
        monthlyData[monthKey] = (monthlyData[monthKey] || 0) + totalEGP;
      }
    }
  });
  
  const labels = monthsList;
  const values = labels.map(m => monthlyData[m] || 0);
  
  container.innerHTML = `
    <div class="chart-container">
      <div class="chart-title">📆 Monthly Sales (in EGP) - Average Exchange Rates</div>
      <canvas id="monthlyChart"></canvas>
    </div>
    <div class="summary-stats">
      <div class="stat-card">
        <div class="stat-value">${values.reduce((a,b)=>a+b,0).toLocaleString()} EGP</div>
        <div class="stat-label">Total Sales</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${(values.reduce((a,b)=>a+b,0) / values.filter(v=>v>0).length || 0).toFixed(0)} EGP</div>
        <div class="stat-label">Monthly Average</div>
      </div>
    </div>
  `;
  
  setTimeout(() => {
    const ctx = document.getElementById('monthlyChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Monthly Sales (EGP)',
          data: values,
          backgroundColor: 'rgba(255, 217, 102, 0.7)',
          borderColor: '#ffd966',
          borderWidth: 2,
          borderRadius: 5
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        scales: {
          y: { beginAtZero: true, title: { display: true, text: 'Amount (EGP)' } }
        }
      }
    });
  }, 100);
}

// 3. الرسم حسب الرحلات
function showTripsChart(from, to) {
  const container = document.getElementById('analyticsContent');
  const tripsData = {};
  
  invoices.forEach(inv => {
    const invDate = parseDDMMMYYYY(inv.ActiveDate);
    if (invDate && invDate >= from && invDate <= to) {
      const trip = inv.Trip || 'Unknown';
      
      const dateKey = formatDateForDisplay(invDate);
      const rateRow = exchangeRates.find(r => getRateDate(r) === dateKey);
      
      if (rateRow) {
        const totalEGP = calculateTotalEGP(inv, rateRow);
        tripsData[trip] = (tripsData[trip] || 0) + totalEGP;
      }
    }
  });
  
  const sortedTrips = Object.entries(tripsData)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 15);
  
  const labels = sortedTrips.map(t => t[0]);
  const values = sortedTrips.map(t => t[1]);
  
  container.innerHTML = `
    <div class="chart-container">
      <div class="chart-title">🚤 Sales by Trip</div>
      <canvas id="tripsChart"></canvas>
    </div>
  `;
  
  setTimeout(() => {
    const ctx = document.getElementById('tripsChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Sales (EGP)',
          data: values,
          backgroundColor: 'rgba(155, 89, 182, 0.7)',
          borderColor: '#9b59b6',
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        indexAxis: 'y',
        scales: {
          x: { title: { display: true, text: 'Amount (EGP)' } }
        }
      }
    });
  }, 100);
}

// 4. الرسم حسب الجنسيات
function showNationalitiesChart(from, to) {
  const container = document.getElementById('analyticsContent');
  const nationalitiesData = {};
  
  invoices.forEach(inv => {
    const invDate = parseDDMMMYYYY(inv.ActiveDate);
    if (invDate && invDate >= from && invDate <= to) {
      const nationality = inv.Nationality || 'Unknown';
      
      const dateKey = formatDateForDisplay(invDate);
      const rateRow = exchangeRates.find(r => getRateDate(r) === dateKey);
      
      if (rateRow) {
        const totalEGP = calculateTotalEGP(inv, rateRow);
        nationalitiesData[nationality] = (nationalitiesData[nationality] || 0) + totalEGP;
      }
    }
  });
  
  const sorted = Object.entries(nationalitiesData)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 15);
  
  const labels = sorted.map(n => n[0]);
  const values = sorted.map(n => n[1]);
  
  container.innerHTML = `
    <div class="chart-container">
      <div class="chart-title">🌍 Sales by Nationality</div>
      <canvas id="nationalitiesChart"></canvas>
    </div>
  `;
  
  setTimeout(() => {
    const ctx = document.getElementById('nationalitiesChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Sales (EGP)',
          data: values,
          backgroundColor: 'rgba(52, 152, 219, 0.7)',
          borderColor: '#3498db',
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        indexAxis: 'y',
        scales: {
          x: { title: { display: true, text: 'Amount (EGP)' } }
        }
      }
    });
  }, 100);
}

// 5. الرسم حسب العمولات
function showCommissionChart(from, to) {
  const container = document.getElementById('analyticsContent');
  
  const commissionsData = {};
  const dateRange = [];
  
  for (let d = new Date(from); d <= to; d.setDate(d.getDate() + 1)) {
    const dateKey = formatDateForDisplay(d);
    dateRange.push(dateKey);
    commissionsData[dateKey] = 0;
  }
  
  invoices.forEach(inv => {
    const invDate = parseDDMMMYYYY(inv.ActiveDate);
    if (invDate && invDate >= from && invDate <= to) {
      const dateKey = formatDateForDisplay(invDate);
      const commission = parseFloat(inv.Commission) || 0;
      commissionsData[dateKey] = (commissionsData[dateKey] || 0) + commission;
    }
  });
  
  const labels = dateRange;
  const values = labels.map(d => commissionsData[d] || 0);
  const totalCommission = values.reduce((a, b) => a + b, 0);
  
  container.innerHTML = `
    <div class="chart-container">
      <div class="chart-title">💰 Sales Commission</div>
      <canvas id="commissionChart"></canvas>
    </div>
    <div class="summary-stats">
      <div class="stat-card">
        <div class="stat-value">${totalCommission.toFixed(2)} EGP</div>
        <div class="stat-label">Total Commission</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${(totalCommission / values.filter(v => v > 0).length || 0).toFixed(2)} EGP</div>
        <div class="stat-label">Average Commission</div>
      </div>
    </div>
  `;
  
  setTimeout(() => {
    const ctx = document.getElementById('commissionChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Commission (EGP)',
          data: values,
          borderColor: '#27ae60',
          backgroundColor: 'rgba(39, 174, 96, 0.1)',
          borderWidth: 3,
          fill: true,
          tension: 0.4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        scales: {
          y: { beginAtZero: true, title: { display: true, text: 'Commission (EGP)' } }
        }
      }
    });
  }, 100);
}

function goBack() {
  window.location.href = 'SalesDashboard.html';
}

// التهيئة
document.addEventListener('DOMContentLoaded', () => {
  const userData = sessionStorage.getItem('currentUser');
  if (!userData) {
    window.location.href = 'index.html';
    return;
  }
  
  try {
    currentUser = JSON.parse(userData);
    document.getElementById('userNameDisplay').textContent = currentUser.name || 'Sales Rep';
    
    const today = new Date();
    const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
    
    document.getElementById('filterDateFrom').value = firstDay.toISOString().split('T')[0];
    document.getElementById('filterDateTo').value = today.toISOString().split('T')[0];
    
    loadData();
  } catch (e) {
    console.error(e);
    window.location.href = 'index.html';
  }
});

window.switchTab = switchTab;
window.loadAnalytics = loadAnalytics;
window.goBack = goBack;
</script>
