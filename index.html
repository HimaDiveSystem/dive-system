<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام إدارة مراكز الغوص</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0b1a2e; }

    #app-frame {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
    }

    /* شاشة التحميل الأولية */
    #splash {
      position: fixed;
      inset: 0;
      background: #0b1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    .splash-icon { font-size: 64px; animation: bob 2s infinite ease-in-out; }
    .splash-title { color: white; font-size: 28px; font-weight: 700; font-family: 'Segoe UI', sans-serif; }
    .splash-subtitle { color: rgba(255,255,255,0.6); font-size: 14px; font-family: 'Segoe UI', sans-serif; }
    .splash-spinner {
      width: 44px; height: 44px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  </style>
</head>
<body>

  <!-- شاشة التحميل -->
  <div id="splash">
    <div class="splash-icon">🤿</div>
    <div class="splash-title">نظام إدارة مراكز الغوص</div>
    <div class="splash-subtitle">جارٍ التحميل...</div>
    <div class="splash-spinner"></div>
  </div>

  <!-- الـ iframe الذي يعرض Apps Script بدون تغيير رابط المتصفح -->
  <iframe
    id="app-frame"
    src=""
    allow="clipboard-read; clipboard-write"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation"
  ></iframe>

  <script>
    // ============================================================
    // ⚠️ ضع هنا رابط الـ Web App الخاص بك من Apps Script
    // ============================================================
    const GAS_APP_URL = 'https://script.google.com/macros/s/AKfycbxy3i2tiKsZpTkFj0gljt0_LuXFzdOlZAU10AtIrVFdAi_n3gcQjvMxLKpWiV0EHPI2/exec';
    // ============================================================

    const frame  = document.getElementById('app-frame');
    const splash = document.getElementById('splash');

    // تحديد الصفحة من URL الحالي
    // مثال: himadivesystem.github.io/?page=SalesDashboard
    function getPageParam() {
      const p = new URLSearchParams(window.location.search);
      return p.get('page') || 'Login';
    }

    function loadPage(page, extraParams) {
      let url = GAS_APP_URL + '?page=' + encodeURIComponent(page);
      if (extraParams) url += '&' + extraParams;
      frame.src = url;
    }

    // إخفاء splash بعد تحميل الـ iframe
    frame.addEventListener('load', () => {
      setTimeout(() => splash.classList.add('hidden'), 300);
    });

    // الاستماع لرسائل من داخل الـ iframe (للتنقل بين الصفحات)
    // Apps Script يرسل: parent.postMessage({type:'navigate', page:'Dashboard'}, '*')
    window.addEventListener('message', function(event) {
      // تأكد أن الرسالة من Apps Script
      if (!event.origin.includes('googleusercontent.com') &&
          !event.origin.includes('script.google.com')) return;

      const msg = event.data;
      if (!msg || !msg.type) return;

      if (msg.type === 'navigate' && msg.page) {
        // تحديث URL في المتصفح بدون reload (يبقى على GitHub)
        const newUrl = window.location.origin + window.location.pathname + '?page=' + msg.page;
        window.history.pushState({page: msg.page}, '', newUrl);
        loadPage(msg.page, msg.params || '');
      }

      if (msg.type === 'setTitle' && msg.title) {
        document.title = msg.title;
      }
    });

    // تحميل الصفحة الأولى
    const startPage = getPageParam();
    loadPage(startPage);
  </script>
</body>
</html>
