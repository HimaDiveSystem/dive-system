<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام إدارة مراكز الغوص</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#0b1a2e; }
    #app-frame { width:100%; height:100vh; border:none; display:none; }
    #login-wrap { display:none; width:100%; height:100vh; overflow:auto; }
    #splash {
      position:fixed; inset:0; background:#0b1a2e;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:20px; z-index:9999; transition:opacity 0.5s;
    }
    #splash.hidden { opacity:0; pointer-events:none; }
    .splash-icon    { font-size:64px; animation:bob 2s infinite ease-in-out; }
    .splash-title   { color:white; font-size:28px; font-weight:700; font-family:'Segoe UI',sans-serif; }
    .splash-sub     { color:rgba(255,255,255,0.6); font-size:14px; font-family:'Segoe UI',sans-serif; }
    .splash-spinner { width:44px; height:44px; border:4px solid rgba(255,255,255,0.2); border-top-color:#38bdf8; border-radius:50%; animation:spin .8s linear infinite; margin-top:10px; }
    @keyframes spin { to{transform:rotate(360deg);} }
    @keyframes bob  { 0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);} }
  </style>
</head>
<body>

<div id="splash">
  <div class="splash-icon">🤿</div>
  <div class="splash-title">نظام إدارة مراكز الغوص</div>
  <div class="splash-sub">جارٍ التحميل...</div>
  <div class="splash-spinner"></div>
</div>

<!-- صفحات Apps Script -->
<iframe id="app-frame" src=""
  allow="clipboard-read; clipboard-write"
  sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation">
</iframe>

<!-- Login يُحمَّل مباشرة من GitHub -->
<div id="login-wrap"></div>

<script>
  const GAS_URL   = 'https://script.google.com/macros/s/AKfycbxy3i2tiKsZpTkFj0gljt0_LuXFzdOlZAU10AtIrVFdAi_n3gcQjvMxLKpWiV0EHPI2/exec';
  const BASE_PATH = window.location.pathname.replace(/[^/]*$/, ''); // مثال: /dive-system/

  const frame     = document.getElementById('app-frame');
  const loginWrap = document.getElementById('login-wrap');
  const splash    = document.getElementById('splash');

  function hideSplash() { setTimeout(() => splash.classList.add('hidden'), 300); }

  // ── Login: يُحمَّل من GitHub مباشرة بدون iframe ──────────────
  function showLogin() {
    frame.style.display     = 'none';
    loginWrap.style.display = 'block';
    loginWrap.innerHTML     = '<div style="color:white;text-align:center;padding:80px;font-size:18px;">جارٍ التحميل...</div>';

    fetch(BASE_PATH + 'Login.html?v=' + Date.now())
      .then(r => r.text())
      .then(html => {
        // استخرج body فقط
        const match = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
        const bodyContent = match ? match[1] : html;

        loginWrap.innerHTML = bodyContent;

        // استخرج style
        const styleMatches = html.matchAll(/<style[^>]*>([\s\S]*?)<\/style>/gi);
        for (const m of styleMatches) {
          const s = document.createElement('style');
          s.textContent = m[1];
          document.head.appendChild(s);
        }

        // شغّل السكريبتات
        loginWrap.querySelectorAll('script').forEach(old => {
          const s = document.createElement('script');
          s.textContent = old.textContent;
          document.body.appendChild(s);
        });

        hideSplash();
      })
      .catch(err => {
        loginWrap.innerHTML = '<p style="color:white;text-align:center;padding:50px;">خطأ في تحميل صفحة الدخول</p>';
        console.error(err);
        hideSplash();
      });
  }

  // ── باقي الصفحات: داخل iframe من Apps Script ────────────────
  function showGASPage(page, params) {
    loginWrap.style.display = 'none';
    loginWrap.innerHTML     = '';
    frame.style.display     = 'block';
    let url = GAS_URL + '?page=' + encodeURIComponent(page);
    if (params) url += '&' + params;
    frame.src = url;
  }

  frame.addEventListener('load', hideSplash);

  // ── postMessage من الصفحات الداخلية ─────────────────────────
  window.addEventListener('message', function(e) {
    const msg = e.data;
    if (!msg || msg.type !== 'navigate' || !msg.page) return;
    const newUrl = location.origin + location.pathname + '?page=' + msg.page;
    history.pushState({ page: msg.page }, '', newUrl);
    navigate(msg.page, msg.params || '');
  });

  function navigate(page, params) {
    if (page === 'Login') showLogin();
    else showGASPage(page, params);
  }

  // ── التحميل الأولي ───────────────────────────────────────────
  const startPage = new URLSearchParams(location.search).get('page') || 'Login';
  navigate(startPage);
</script>
</body>
</html>
