<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام إدارة مراكز الغوص</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#0b1a2e; }

    /* ── Login ── */
    #login-page { display:none; width:100%; height:100vh; overflow:auto; }
    .dark-bg { position:fixed; inset:0; z-index:0; background-image:url('https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=1920&auto=format&fit=crop'); background-size:cover; background-position:center; filter:brightness(0.4) contrast(1.1); }
    .login-container { position:relative; z-index:2; width:95%; max-width:1100px; display:flex; gap:50px; align-items:center; justify-content:center; padding:20px; min-height:100vh; margin:auto; }
    .illustration-side { flex:1; display:flex; flex-direction:column; gap:18px; max-width:420px; }
    .illustration-card { background:rgba(255,255,255,0.85); backdrop-filter:blur(8px); border-radius:24px; padding:20px; border:1px solid rgba(255,255,255,0.3); box-shadow:0 15px 30px rgba(0,0,0,0.2); display:flex; gap:16px; align-items:center; transition:.25s; }
    .illustration-card:hover { transform:translateY(-4px); background:rgba(255,255,255,0.95); }
    .illustration-icon { width:60px; height:60px; border-radius:50%; background:linear-gradient(135deg,#0284c7,#0f2b4b); display:flex; align-items:center; justify-content:center; font-size:32px; color:white; }
    .illustration-text h3 { color:#0b1a2e; font-size:18px; font-weight:600; margin-bottom:4px; }
    .illustration-text p  { color:#1e2b4f; font-size:13px; line-height:1.5; }
    .login-card { width:420px; background:white; padding:42px 38px; border-radius:32px; box-shadow:0 30px 60px rgba(0,0,0,0.3); }
    .login-card h2 { text-align:center; margin-bottom:30px; color:#0b1a2e; font-size:32px; font-weight:700; }
    .input-group { margin-bottom:22px; }
    .input-group label { display:block; margin-bottom:6px; color:#0f2b4b; font-weight:500; font-size:14px; }
    .input-group input { width:100%; padding:16px 18px; border-radius:14px; border:1px solid #cbd5e1; background:#f8fafc; color:#0b1a2e; font-size:16px; transition:.2s; direction:ltr; text-align:left; }
    .input-group input:focus { outline:none; border-color:#0284c7; box-shadow:0 0 0 3px rgba(2,132,199,0.2); }
    .checkbox-row { display:flex; align-items:center; gap:8px; color:#1e2b4f; font-size:14px; margin:16px 0; }
    .checkbox-row input { accent-color:#0284c7; }
    #loginBtn { width:100%; padding:16px; border:none; border-radius:14px; background:linear-gradient(135deg,#0f2b4b,#0284c7); color:white; font-size:18px; font-weight:bold; cursor:pointer; transition:.25s; box-shadow:0 8px 20px rgba(2,132,199,0.3); }
    #loginBtn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 12px 28px rgba(2,132,199,0.5); }
    #loginBtn:disabled { opacity:0.6; cursor:not-allowed; }

    /* ── Modals ── */
    .modal-overlay { display:none; position:fixed; inset:0; align-items:center; justify-content:center; z-index:10000; background:rgba(0,0,0,0.5); backdrop-filter:blur(5px); }
    .modal-box { background:white; border-radius:28px; padding:35px; max-width:400px; text-align:center; }
    .modal-box h3 { color:#0b1a2e; margin-bottom:20px; line-height:1.5; }
    .modal-btn { background:#0284c7; color:white; border:none; padding:12px 36px; border-radius:40px; cursor:pointer; font-size:15px; font-weight:600; }
    #loadingOverlay { display:none; position:fixed; inset:0; align-items:center; justify-content:center; z-index:10000; background:rgba(0,0,0,0.5); }
    .loading-box { background:white; padding:30px 40px; border-radius:60px; display:flex; gap:16px; align-items:center; }
    .spinner { width:28px; height:28px; border:3px solid #e2e8f0; border-top-color:#0284c7; border-radius:50%; animation:spin .7s linear infinite; }

    /* ── iframe ── */
    #app-frame { display:none; width:100%; height:100vh; border:none; }

    /* ── Splash ── */
    #splash { position:fixed; inset:0; background:#0b1a2e; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; z-index:9999; transition:opacity 0.5s; }
    #splash.hidden { opacity:0; pointer-events:none; }
    .splash-icon    { font-size:64px; animation:bob 2s infinite ease-in-out; }
    .splash-title   { color:white; font-size:28px; font-weight:700; font-family:'Segoe UI',sans-serif; }
    .splash-sub     { color:rgba(255,255,255,0.6); font-size:14px; }
    .splash-spinner { width:44px; height:44px; border:4px solid rgba(255,255,255,0.2); border-top-color:#38bdf8; border-radius:50%; animation:spin .8s linear infinite; }

    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes bob  { 0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);} }
    @media(max-width:900px) { .login-container{flex-direction:column;} .illustration-side{order:2;flex-direction:row;flex-wrap:wrap;} .login-card{order:1;width:100%;} }
  </style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <div class="splash-icon">🤿</div>
  <div class="splash-title">نظام إدارة مراكز الغوص</div>
  <div class="splash-sub">جارٍ التحميل...</div>
  <div class="splash-spinner"></div>
</div>

<!-- Login Page (مضمّنة مباشرة) -->
<div id="login-page">
  <div class="dark-bg"></div>
  <div class="login-container">
    <div class="illustration-side">
      <div class="illustration-card"><div class="illustration-icon">📊</div><div class="illustration-text"><h3>نظام إدارة متكامل</h3><p>تحكم كامل في المراكز والفروع والموظفين</p></div></div>
      <div class="illustration-card"><div class="illustration-icon">💰</div><div class="illustration-text"><h3>فواتير وميزانيات</h3><p>إصدار فواتير دقيقة ومتابعة الميزانيات</p></div></div>
      <div class="illustration-card"><div class="illustration-icon">📈</div><div class="illustration-text"><h3>تقارير وتحليلات</h3><p>تقارير مبيعات وعمولات وأرباح</p></div></div>
    </div>
    <div class="login-card">
      <h2>🌊 غوص</h2>
      <div class="input-group"><label>البريد الإلكتروني</label><input type="email" id="email" placeholder="example@domain.com"></div>
      <div class="input-group"><label>كلمة المرور</label><input type="password" id="password" placeholder="********"></div>
      <div class="checkbox-row"><input type="checkbox" id="showPass"><label for="showPass">إظهار كلمة المرور</label></div>
      <button id="loginBtn" onclick="doLogin()">تسجيل الدخول</button>
    </div>
  </div>
</div>

<!-- Alert Modal -->
<div id="alertModal" class="modal-overlay">
  <div class="modal-box">
    <div style="font-size:40px;margin-bottom:15px;">⚠️</div>
    <h3 id="alertMsg"></h3>
    <button class="modal-btn" onclick="document.getElementById('alertModal').style.display='none'">موافق</button>
  </div>
</div>

<!-- Loading -->
<div id="loadingOverlay" class="modal-overlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <span style="color:#0b1a2e;font-weight:600;font-size:16px;">جارٍ التحقق...</span>
  </div>
</div>

<!-- Apps Script iframe -->
<iframe id="app-frame" src=""
  allow="clipboard-read; clipboard-write"
  sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation">
</iframe>

<script>
  var GAS = 'https://script.google.com/macros/s/AKfycbxy3i2tiKsZpTkFj0gljt0_LuXFzdOlZAU10AtIrVFdAi_n3gcQjvMxLKpWiV0EHPI2/exec';

  var splash    = document.getElementById('splash');
  var loginPage = document.getElementById('login-page');
  var appFrame  = document.getElementById('app-frame');

  function hideSplash() { setTimeout(function(){ splash.classList.add('hidden'); }, 300); }

  function showAlert(msg) {
    document.getElementById('alertMsg').innerText = msg;
    document.getElementById('alertModal').style.display = 'flex';
  }

  function setLoading(on) {
    document.getElementById('loadingOverlay').style.display = on ? 'flex' : 'none';
  }

  // ── عرض Login ─────────────────────────────────────────────────
  function showLogin() {
    appFrame.style.display  = 'none';
    appFrame.src            = '';
    loginPage.style.display = 'block';
    hideSplash();
  }

  // ── عرض صفحة Apps Script ──────────────────────────────────────
  function showPage(page, params) {
    loginPage.style.display = 'none';
    appFrame.style.display  = 'block';
    var url = GAS + '?page=' + encodeURIComponent(page);
    if (params) url += '&' + params;
    appFrame.src = url;
  }

  appFrame.addEventListener('load', hideSplash);

  // ── إظهار/إخفاء كلمة المرور ───────────────────────────────────
  document.getElementById('showPass').addEventListener('change', function() {
    document.getElementById('password').type = this.checked ? 'text' : 'password';
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && loginPage.style.display !== 'none') doLogin();
  });

  // ── تسجيل الدخول ──────────────────────────────────────────────
  function doLogin() {
    var email    = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value.trim();
    var btn      = document.getElementById('loginBtn');

    if (!email || !password) return showAlert('يرجى إدخال البريد الإلكتروني وكلمة المرور');

    btn.disabled = true;
    setLoading(true);

    fetch(GAS + '?action=login&email=' + encodeURIComponent(email) + '&password=' + encodeURIComponent(password))
      .then(function(r){ return r.json(); })
      .then(function(r){
        btn.disabled = false;
        setLoading(false);
        if (r && r.success) {
          try { sessionStorage.setItem('currentUser', JSON.stringify(r.user)); } catch(e){}
          navigate(r.dashboardPage || 'Dashboard');
        } else {
          showAlert(r && r.message ? r.message : 'بيانات الدخول غير صحيحة');
        }
      })
      .catch(function(err){
        btn.disabled = false;
        setLoading(false);
        showAlert('خطأ في الاتصال بالخادم. حاول مجدداً.');
        console.error(err);
      });
  }

  // ── التنقل بين الصفحات ────────────────────────────────────────
  function navigate(page, params) {
    history.pushState({ page:page }, '', location.pathname + '?page=' + page);
    if (page === 'Login') showLogin();
    else showPage(page, params || '');
  }

  // ── postMessage من Apps Script iframe ─────────────────────────
  window.addEventListener('message', function(e) {
    var msg = e.data;
    if (!msg || msg.type !== 'navigate' || !msg.page) return;
    navigate(msg.page, msg.params || '');
  });

  // ── تحميل أولي ────────────────────────────────────────────────
  var startPage = new URLSearchParams(location.search).get('page') || 'Login';
  if (startPage === 'Login') showLogin();
  else showPage(startPage);
</script>
</body>
</html>
