<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام إدارة مراكز الغوص</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#0b1a2e; }
    #app-frame  { width:100%; height:100vh; border:none; display:none; }
    #login-wrap { display:none; width:100%; height:100vh; overflow:auto; }
    #splash {
      position:fixed; inset:0; background:#0b1a2e;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:20px; z-index:9999; transition:opacity 0.5s;
    }
    #splash.hidden { opacity:0; pointer-events:none; }
    .splash-icon    { font-size:64px; animation:bob 2s infinite ease-in-out; }
    .splash-title   { color:white; font-size:28px; font-weight:700; font-family:'Segoe UI',sans-serif; }
    .splash-sub     { color:rgba(255,255,255,0.6); font-size:14px; font-family:'Segoe UI',sans-serif; }
    .splash-spinner { width:44px; height:44px; border:4px solid rgba(255,255,255,0.2); border-top-color:#38bdf8; border-radius:50%; animation:spin .8s linear infinite; margin-top:10px; }
    @keyframes spin { to{transform:rotate(360deg);} }
    @keyframes bob  { 0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);} }
  </style>
</head>
<body>

<div id="splash">
  <div class="splash-icon">🤿</div>
  <div class="splash-title">نظام إدارة مراكز الغوص</div>
  <div class="splash-sub">جارٍ التحميل...</div>
  <div class="splash-spinner"></div>
</div>

<!-- صفحات Apps Script داخل iframe -->
<iframe id="app-frame" src=""
  allow="clipboard-read; clipboard-write"
  sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation">
</iframe>

<!-- Login يُحمَّل مباشرة من GitHub -->
<div id="login-wrap"></div>

<script>
  var _GAS_URL  = 'https://script.google.com/macros/s/AKfycbxy3i2tiKsZpTkFj0gljt0_LuXFzdOlZAU10AtIrVFdAi_n3gcQjvMxLKpWiV0EHPI2/exec';
  var BASE_PATH = window.location.pathname.replace(/[^/]*$/, '');

  var frame     = document.getElementById('app-frame');
  var loginWrap = document.getElementById('login-wrap');
  var splash    = document.getElementById('splash');

  function hideSplash() { setTimeout(function(){ splash.classList.add('hidden'); }, 300); }

  // دالة التنقل — متاحة لـ login.js
  window.__navigateTo = function(page, params) {
    var newUrl = location.origin + location.pathname + '?page=' + page;
    history.pushState({ page: page }, '', newUrl);
    if (page === 'Login') showLogin();
    else showGASPage(page, params || '');
  };

  // ── Login من GitHub مباشرة ────────────────────────────────────
  function showLogin() {
    frame.style.display     = 'none';
    loginWrap.style.display = 'block';

    fetch(BASE_PATH + 'Login.html?v=' + Date.now())
      .then(function(r){ return r.text(); })
      .then(function(html){
        // أدرج HTML
        loginWrap.innerHTML = html;

        // أدرج الأنماط
        var styleRe = /<style[^>]*>([\s\S]*?)<\/style>/gi, m;
        while ((m = styleRe.exec(html)) !== null) {
          var st = document.createElement('style');
          st.textContent = m[1];
          document.head.appendChild(st);
        }

        // حمّل login.js مرة واحدة
        var old = document.getElementById('_login_js');
        if (old) old.remove();
        var s = document.createElement('script');
        s.id  = '_login_js';
        s.src = BASE_PATH + 'login.js?v=' + Date.now();
        document.head.appendChild(s);

        hideSplash();
      })
      .catch(function(err){
        loginWrap.innerHTML = '<p style="color:white;text-align:center;padding:80px;font-size:18px;">خطأ في تحميل صفحة الدخول</p>';
        console.error(err);
        hideSplash();
      });
  }

  // ── Apps Script داخل iframe ───────────────────────────────────
  function showGASPage(page, params) {
    loginWrap.style.display = 'none';
    loginWrap.innerHTML     = '';
    frame.style.display     = 'block';
    var url = _GAS_URL + '?page=' + encodeURIComponent(page);
    if (params) url += '&' + params;
    frame.src = url;
  }

  frame.addEventListener('load', hideSplash);

  // ── postMessage من الصفحات الداخلية ──────────────────────────
  window.addEventListener('message', function(e) {
    var msg = e.data;
    if (!msg || msg.type !== 'navigate' || !msg.page) return;
    window.__navigateTo(msg.page, msg.params || '');
  });

  // ── تحميل أولي ───────────────────────────────────────────────
  var startPage = new URLSearchParams(location.search).get('page') || 'Login';
  window.__navigateTo(startPage);
</script>
</body>
</html>
