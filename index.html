<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل الدخول - نظام إدارة متكامل</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh; display: flex; justify-content: center; align-items: center;
      overflow: hidden; position: relative; background: #0b1a2e;
    }
    .dark-bg {
      position: fixed; inset:0; z-index:0;
      background-image: url('https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=1920&auto=format&fit=crop');
      background-size: cover; background-position: center; background-repeat: no-repeat;
      filter: brightness(0.4) contrast(1.1);
    }
    .container {
      position: relative; z-index:2;
      width: 95%; max-width: 1100px; display: flex; gap:50px;
      align-items: center; justify-content: center; padding: 20px;
    }
    .illustration-side { flex:1; display:flex; flex-direction:column; gap:18px; max-width:420px; }
    .illustration-card {
      background: rgba(255,255,255,0.85); backdrop-filter: blur(8px);
      border-radius:24px; padding:20px; border:1px solid rgba(255,255,255,0.3);
      box-shadow:0 15px 30px rgba(0,0,0,0.2); display:flex; gap:16px; align-items:center; transition:.25s;
    }
    .illustration-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.95); }
    .illustration-icon {
      width:60px; height:60px; border-radius:50%;
      background: linear-gradient(135deg,#0284c7,#0f2b4b);
      display:flex; align-items:center; justify-content:center;
      font-size:32px; color:white; flex-shrink:0;
    }
    .illustration-text h3 { color:#0b1a2e; font-size:18px; font-weight:600; margin-bottom:4px; }
    .illustration-text p  { color:#1e2b4f; font-size:13px; line-height:1.5; }

    .card {
      width:420px; background:white; padding:42px 38px;
      border-radius:32px; box-shadow:0 30px 60px rgba(0,0,0,0.3);
      border:1px solid rgba(255,255,255,0.5);
    }
    .card h2 { text-align:center; margin-bottom:30px; color:#0b1a2e; font-size:32px; font-weight:700; }
    .input-group { margin-bottom:22px; }
    .input-group label { display:block; margin-bottom:6px; color:#0f2b4b; font-weight:500; font-size:14px; }
    .input-group input {
      width:100%; padding:16px 18px; border-radius:14px; border:1px solid #cbd5e1;
      background:#f8fafc; color:#0b1a2e; font-size:16px; transition:.2s; direction:ltr; text-align:left;
    }
    .input-group input:focus { outline:none; border-color:#0284c7; box-shadow:0 0 0 3px rgba(2,132,199,0.2); }

    .checkbox-label {
      display:flex; align-items:center; gap:8px;
      color:#1e2b4f; font-size:14px; margin:16px 0; cursor:pointer; user-select:none;
    }
    .checkbox-label input[type="checkbox"] {
      accent-color:#0284c7; width:16px; height:16px; cursor:pointer; flex-shrink:0;
    }

    .btn-login {
      width:100%; padding:16px; border:none; border-radius:14px;
      background: linear-gradient(135deg,#0f2b4b,#0284c7);
      color:white; font-size:18px; font-weight:bold; cursor:pointer;
      transition:.25s; box-shadow:0 8px 20px rgba(2,132,199,0.3);
    }
    .btn-login:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 12px 28px rgba(2,132,199,0.5); }
    .btn-login:disabled { opacity:0.65; cursor:not-allowed; transform:none; }

    .custom-modal {
      display:none; position:fixed; top:0; left:0; width:100%; height:100%;
      align-items:center; justify-content:center; z-index:10000;
      background:rgba(0,0,0,0.5); backdrop-filter:blur(5px);
    }
    .modal-content {
      background:white; border-radius:28px; padding:35px 30px;
      max-width:380px; width:90%; text-align:center;
      box-shadow:0 25px 60px rgba(0,0,0,0.3);
    }
    .modal-icon { font-size:48px; margin-bottom:14px; }
    .modal-content h3 { color:#0b1a2e; font-size:17px; line-height:1.6; margin-bottom:20px; }
    .modal-btn {
      background: linear-gradient(135deg,#0f2b4b,#0284c7);
      color:white; border:none; padding:13px 45px;
      border-radius:40px; font-size:16px; font-weight:600; cursor:pointer; transition:.2s;
    }
    .modal-btn:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(2,132,199,0.4); }

    .loading-overlay {
      display:none; position:fixed; top:0; left:0; width:100%; height:100%;
      align-items:center; justify-content:center; z-index:10000;
      background:rgba(0,0,0,0.5); backdrop-filter:blur(5px);
    }
    .loading-container {
      background:white; padding:28px 36px; border-radius:60px;
      display:flex; align-items:center; gap:16px;
      box-shadow:0 20px 50px rgba(0,0,0,0.2);
    }
    .spinner {
      width:28px; height:28px; border:4px solid #e2e8f0;
      border-top-color:#0284c7; border-radius:50%;
      animation:spin .7s linear infinite; flex-shrink:0;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-text { color:#0b1a2e; font-size:16px; font-weight:600; }

    @media (max-width:900px) {
      .container { flex-direction:column; }
      .illustration-side { order:2; flex-direction:row; flex-wrap:wrap; }
      .card { order:1; width:100%; }
    }
    @media (max-width:480px) {
      .card { padding:32px 24px; }
      .illustration-side { display:none; }
    }
  </style>
</head>
<body>

<div class="dark-bg"></div>

<div class="container">

  <div class="illustration-side">
    <div class="illustration-card">
      <div class="illustration-icon">📊</div>
      <div class="illustration-text">
        <h3>نظام إدارة متكامل</h3>
        <p>تحكم كامل في المراكز والفروع والموظفين</p>
      </div>
    </div>
    <div class="illustration-card">
      <div class="illustration-icon">💰</div>
      <div class="illustration-text">
        <h3>فواتير وميزانيات</h3>
        <p>إصدار فواتير دقيقة ومتابعة الميزانيات</p>
      </div>
    </div>
    <div class="illustration-card">
      <div class="illustration-icon">📈</div>
      <div class="illustration-text">
        <h3>تقارير وتحليلات</h3>
        <p>تقارير مبيعات وعمولات وأرباح</p>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>🌊  نظام إدارة متكامل</h2>

    <div class="input-group">
      <label>البريد الإلكتروني</label>
      <input type="email" id="email" placeholder="example@domain.com" autocomplete="username">
    </div>

    <div class="input-group">
      <label>كلمة المرور</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <label class="checkbox-label">
      <input type="checkbox" id="showPass">
      إظهار كلمة المرور
    </label>

    <button class="btn-login" id="loginBtn" onclick="login()">تسجيل الدخول</button>
  </div>

</div>

<!-- مودال التنبيه -->
<div id="customAlertModal" class="custom-modal">
  <div class="modal-content">
    <div class="modal-icon" id="alertIcon">ℹ️</div>
    <h3 id="alertMessage"></h3>
    <button class="modal-btn" id="alertOk">موافق</button>
  </div>
</div>

<!-- شاشة التحميل -->
<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-container">
    <div class="spinner"></div>
    <span class="loading-text">جاري التحقق...</span>
  </div>
</div>

<script>
  // ============================================================
  // ⚙️ CONFIG — عدّل هذا الرابط برابط Web App الخاص بك
  // ============================================================
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwe1Q9pjAJRk9CfWsK5YGjD5uVAbJkMhAVgw6akKkFIR9sz15V78C88Vs5dumKE-SwF/exec";

 const DASHBOARD_PAGES = {
  Admin:      "Dashboard.html",
  Owner:      "OwnerDashboard.html",
  Sales:      "SalesDashboard.html",
  Accountant: "AccountantDashboard.html",
  Customer:   "CustomerDashboard.html"   // ✅ صفحة مخصصة للعملاء
};

  // ============================================================
  // AUTH — إدارة الجلسة
  // ============================================================
  const Auth = {
    save(user)    { try { sessionStorage.setItem('currentUser', JSON.stringify(user)); } catch(e){} },
    get()         { try { const u=sessionStorage.getItem('currentUser'); return u?JSON.parse(u):null; } catch(e){return null;} },
    isLoggedIn()  { return !!this.get(); },
    logout()      { sessionStorage.clear(); window.location.href='index.html'; }
  };

  // ── تحقق من جلسة موجودة → توجيه فوري ──
  (function checkSession() {
    const user = Auth.get();
    if (user?.type) {
      const targetPage = DASHBOARD_PAGES[user.type] || 'Dashboard.html';
      window.location.href = targetPage;
    }
  })();

  // ============================================================
  // API — دوال الاتصال
  // ============================================================
  const API = {
    async get(action, params={}) {
      const url = new URL(WEB_APP_URL);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
      const res = await fetch(url.toString(), { redirect: 'follow' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    },
    jsonp(action, params={}) {
      return new Promise((resolve, reject) => {
        const cbName = 'cb_' + Date.now();
        const script = document.createElement('script');
        window[cbName] = (data) => { delete window[cbName]; script.remove(); resolve(data); };
        script.onerror = () => { delete window[cbName]; script.remove(); reject(new Error('JSONP failed')); };
        const url = new URL(WEB_APP_URL);
        url.searchParams.set('action', action);
        url.searchParams.set('callback', cbName);
        Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
        script.src = url.toString();
        document.head.appendChild(script);
      });
    },
    async login(email, password) {
      try {
        return await this.get('login', { email, password });
      } catch(e) {
        console.warn('fetch failed → trying JSONP:', e.message);
        return await this.jsonp('login', { email, password });
      }
    }
  };

  // ============================================================
  // إظهار / إخفاء كلمة المرور
  // ============================================================
  document.getElementById('showPass').addEventListener('change', function() {
    document.getElementById('password').type = this.checked ? 'text' : 'password';
  });

  // ── Enter للتسجيل ──
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !document.getElementById('loginBtn').disabled) login();
  });

  // ============================================================
  // دالة تسجيل الدخول
  // ============================================================
  async function login() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) {
      showAlert('يرجى إدخال البريد الإلكتروني وكلمة المرور', '⚠️');
      return;
    }

    setLoading(true);

    try {
      const result = await API.login(email, password);

      if (!result?.success) {
        showAlert(result?.message || 'بيانات الدخول غير صحيحة', '❌');
        return;
      }

      Auth.save(result.user);
      const page = DASHBOARD_PAGES[result.user?.type] || 'Dashboard.html';
      window.location.href = page;

    } catch(err) {
      console.error('Login error:', err);
      showAlert('تعذّر الاتصال بالخادم.\nتحقق من رابط Web App.', '❌');
    } finally {
      setLoading(false);
    }
  }

  // ============================================================
  // دوال مساعدة
  // ============================================================
  function setLoading(show) {
    document.getElementById('loginBtn').disabled            = show;
    document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
  }

  function showAlert(message, icon) {
    document.getElementById('alertMessage').textContent = message;
    document.getElementById('alertIcon').textContent    = icon || 'ℹ️';
    const modal = document.getElementById('customAlertModal');
    modal.style.display = 'flex';
    document.getElementById('alertOk').onclick = () => modal.style.display = 'none';
  }

  // ============================================================
  // 🧪 اختبار في الكونسول
  // ============================================================
  window.testAPI = async function() {
    console.log('🧪 اختبار الاتصال بـ Apps Script...');
    console.log('🔗 URL:', WEB_APP_URL);
    try {
      const res = await fetch(WEB_APP_URL, { redirect: 'follow' });
      const text = await res.text();
      console.log('✅ الاستجابة:', text.substring(0, 200));
    } catch(e) {
      console.warn('⚠️ fetch فشل، جرب JSONP:', e.message);
      try {
        const data = await API.jsonp('login', { email: 'test', password: 'test' });
        console.log('✅ JSONP يعمل، النتيجة:', data);
      } catch(e2) {
        console.error('❌ JSONP فشل أيضاً:', e2.message);
      }
    }
  };
</script>

</body>
</html>
