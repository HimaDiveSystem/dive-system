<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل الدخول - نظام إدارة مراكز الغوص</title>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
</head>
<body>
  <form id="loginForm">
    <input type="email" id="email" placeholder="البريد الإلكتروني" required>
    <input type="password" id="password" placeholder="كلمة المرور" required>
    <button type="button" onclick="handleLogin()">دخول</button>
    <div id="error" style="color:red;display:none"></div>
  </form>

  <script>
    // إذا مسجّل دخول، اذهب للداشبورد مباشرة
    if (Auth.isLoggedIn()) {
      const user = Auth.getUser();
      window.location.href = CONFIG.DASHBOARD_PAGES[user.type] || 'Dashboard.html';
    }

    async function handleLogin() {
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errDiv   = document.getElementById('error');

      try {
        const result = await API.login(email, password);
        
        if (result.success) {
          Auth.saveUser(result.user);
          // توجيه حسب نوع المستخدم
          const page = CONFIG.DASHBOARD_PAGES[result.user.type] || 'Dashboard.html';
          window.location.href = page;
        } else {
          errDiv.style.display = 'block';
          errDiv.textContent = result.message || 'خطأ في تسجيل الدخول';
        }
      } catch (e) {
        errDiv.style.display = 'block';
        errDiv.textContent = 'خطأ في الاتصال بالخادم';
      }
    }
  </script>
</body>
</html>
