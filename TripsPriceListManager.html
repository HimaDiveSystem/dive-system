<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏝️ إدارة أسعار الرحلات</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
    html, body { height:100%; }
    body { background:linear-gradient(135deg,#1e2b4f 0%,#2c3e50 100%); min-height:100vh; padding:15px; display:flex; flex-direction:column; }
    .container { max-width:1400px; width:100%; margin:0 auto; background:#fff; border-radius:25px; box-shadow:0 20px 50px rgba(0,0,0,.2); display:flex; flex-direction:column; flex:1; overflow:hidden; }
    .sticky-top { flex-shrink:0; position:sticky; top:0; z-index:100; border-radius:25px 25px 0 0; overflow:hidden; }
    .scrollable-content { flex:1; overflow-y:auto; min-height:0; }

    /* ── Header ── */
    .header { background:linear-gradient(135deg,#1e2b4f,#152238); color:white; padding:15px 25px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
    .header h2 { color:#ffd966; font-size:22px; display:flex; align-items:center; gap:10px; }
    .user-info { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .user-name { background:rgba(255,255,255,.1); padding:7px 18px; border-radius:30px; border:1px solid #ffd966; font-size:13px; }
    .back-btn { background:#ffd966; color:#1e2b4f; border:none; padding:7px 18px; border-radius:30px; cursor:pointer; font-weight:700; font-size:13px; display:flex; align-items:center; gap:6px; }
    .back-btn:hover { background:#f0c020; }

    /* ── Tabs ── */
    .nav-tabs { display:flex; background:#f0f4f8; padding:0 20px; border-bottom:2px solid #d0ddeb; overflow-x:auto; white-space:nowrap; gap:5px; }
    .nav-tab { padding:14px 22px; cursor:pointer; font-weight:600; color:#4a5a72; border-bottom:3px solid transparent; transition:.2s; display:inline-block; font-size:14px; }
    .nav-tab.active { color:#1e2b4f; border-bottom-color:#ffd966; background:white; border-radius:12px 12px 0 0; }

    /* ── Cards ── */
    .content { padding:22px 25px; }
    .card { background:#f8fafd; border-radius:18px; padding:20px; margin-bottom:22px; border:2px solid #d0ddeb; }
    .card-title { color:#1e2b4f; font-size:16px; font-weight:700; margin-bottom:18px; padding-bottom:10px; border-bottom:2px solid #ffd966; display:flex; align-items:center; gap:8px; }

    /* ── Form ── */
    .form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:18px; }
    .form-group { margin-bottom:14px; }
    .form-group label { display:block; margin-bottom:7px; color:#1e2b4f; font-weight:600; font-size:13px; }
    .form-group label.req::after { content:" *"; color:#e74c3c; }
    .form-control { width:100%; padding:11px 14px; border:2px solid #d0ddeb; border-radius:12px; font-size:14px; background:white; }
    .form-control:focus { border-color:#ffd966; outline:none; }
    .trip-name-row { display:flex; gap:10px; align-items:flex-start; }
    .trip-name-row .form-control { flex:1; }

    /* ── Items ── */
    .items-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin:16px 0; }
    .item-row { background:white; border:2px solid #d0ddeb; border-radius:12px; padding:10px 12px; display:flex; align-items:center; gap:10px; }
    .item-num { background:#1e2b4f; color:#ffd966; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex-shrink:0; }
    .item-input { flex:1; padding:7px 12px; border:2px solid #d0ddeb; border-radius:20px; font-size:14px; direction:ltr; min-width:0; }
    .item-input:focus { border-color:#ffd966; outline:none; }
    .item-del { background:#e74c3c; color:white; border:none; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:15px; font-weight:700; flex-shrink:0; }
    .item-del:hover { background:#c0392b; }
    .btn-add-item { background:#27ae60; color:white; border:none; padding:12px 24px; border-radius:30px; font-weight:700; font-size:14px; cursor:pointer; display:inline-flex; align-items:center; gap:8px; margin-bottom:16px; }
    .btn-add-item:hover { background:#2ecc71; }

    /* ── Currency ── */
    .currency-row { display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin:16px 0; padding:16px 18px; background:#f0f4f8; border-radius:16px; }
    .cur-opts { display:flex; gap:10px; flex-wrap:wrap; }
    .cur-lbl { display:flex; align-items:center; gap:6px; padding:7px 16px; background:white; border:2px solid #d0ddeb; border-radius:30px; cursor:pointer; font-weight:600; font-size:13px; transition:.2s; }
    .cur-lbl.sel { background:#1e2b4f; color:white; border-color:#ffd966; }
    .cur-lbl input[type=radio] { display:none; }
    .bank-pct { display:flex; align-items:center; gap:8px; }
    .bank-pct label { font-weight:600; color:#1e2b4f; font-size:13px; white-space:nowrap; }
    .bank-pct input { width:75px; padding:7px; border:2px solid #d0ddeb; border-radius:20px; text-align:center; font-weight:600; direction:ltr; }

    /* ── Cost checkbox ── */
    .cost-row { display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin:12px 0; padding:12px 18px; background:#e8f0fe; border-radius:14px; border:2px solid #ffd966; }
    .cost-row input[type=checkbox] { width:20px; height:20px; cursor:pointer; accent-color:#1e2b4f; }
    .cost-row label { font-weight:700; color:#1e2b4f; font-size:14px; cursor:pointer; }
    .cost-note { color:#e74c3c; font-size:12px; font-weight:700; background:#fff3e0; padding:4px 12px; border-radius:20px; }

    /* ── Prices grid ── */
    .prices-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:16px 0; }
    .price-card { background:white; border:2px solid #d0ddeb; border-radius:12px; padding:13px; }
    .price-card-title { font-weight:700; color:#1e2b4f; font-size:13px; margin-bottom:10px; padding-bottom:6px; border-bottom:1px dashed #d0ddeb; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .price-inp-row { display:flex; align-items:center; gap:8px; }
    .price-inp-row label { font-weight:600; color:#555; font-size:12px; min-width:28px; }
    .price-inp-row input { flex:1; padding:8px 10px; border:2px solid #d0ddeb; border-radius:10px; font-size:13px; direction:ltr; min-width:0; }
    .price-inp-row input:focus { border-color:#ffd966; outline:none; }

    /* ── Buttons ── */
    .action-row { display:flex; gap:12px; justify-content:center; margin-top:24px; padding-top:18px; border-top:2px dashed #d0ddeb; flex-wrap:wrap; }
    .btn-primary   { background:#1e2b4f; color:white; border:none; padding:11px 24px; border-radius:30px; font-weight:700; font-size:14px; cursor:pointer; display:inline-flex; align-items:center; gap:7px; }
    .btn-primary:hover   { background:#ffd966; color:#1e2b4f; }
    .btn-primary.danger  { background:#e74c3c; }
    .btn-primary.danger:hover { background:#c0392b; }
    .btn-secondary { background:#e9f0fa; color:#1e2b4f; border:2px solid #b0c4de; padding:11px 24px; border-radius:30px; font-weight:700; font-size:14px; cursor:pointer; }
    .btn-secondary:hover { background:#d0ddeb; }
    .btn-blue { background:#3498db; color:white; border:none; padding:11px 20px; border-radius:12px; font-weight:700; font-size:14px; cursor:pointer; display:flex; align-items:center; gap:7px; white-space:nowrap; }
    .btn-blue:hover { background:#2980b9; }
    .btn-green { background:#27ae60; color:white; border:none; padding:11px 22px; border-radius:30px; font-weight:700; font-size:14px; cursor:pointer; display:inline-flex; align-items:center; gap:7px; }
    .btn-green:hover { background:#2ecc71; }

    /* ── Table ── */
    .tbl-wrap { overflow-x:auto; border-radius:16px; border:2px solid #d0ddeb; }
    table.trips-tbl { width:100%; border-collapse:collapse; min-width:500px; }
    table.trips-tbl th { background:#1e2b4f; color:#ffd966; padding:13px 10px; font-size:13px; text-align:center; }
    table.trips-tbl td { padding:11px 10px; border-bottom:1px solid #e9f0fa; text-align:center; font-size:13px; }
    table.trips-tbl tr:hover td { background:#f5f9ff; }
    .search-inp { width:100%; max-width:380px; padding:11px 18px; border:2px solid #d0ddeb; border-radius:30px; font-size:14px; direction:ltr; }

    /* ── Misc ── */
    .msg { padding:11px 18px; border-radius:12px; margin-top:14px; font-weight:600; text-align:center; font-size:14px; }
    .msg.success { background:#d5f5e3; color:#1e8449; }
    .msg.error   { background:#fadbd8; color:#c0392b; }
    .loader { border:4px solid #f3f3f3; border-top:4px solid #1e2b4f; border-radius:50%; width:36px; height:36px; animation:spin 1s linear infinite; margin:28px auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .empty { text-align:center; padding:40px; color:#aaa; }
    .badge-cost { background:#fef9e7; color:#b7770d; border:1px solid #f0c040; padding:2px 10px; border-radius:20px; font-size:12px; font-weight:700; }

    /* ── Modal ── */
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); align-items:center; justify-content:center; z-index:9999; }
    .modal-box { background:white; width:90%; max-width:380px; border-radius:24px; padding:28px; text-align:center; box-shadow:0 20px 40px rgba(0,0,0,.25); }
    .modal-box .icon { font-size:42px; margin-bottom:12px; }
    .modal-box p { color:#1e2b4f; font-weight:700; font-size:15px; margin-bottom:20px; }
    .modal-btns { display:flex; gap:12px; justify-content:center; }

    @media(max-width:900px) { .prices-grid{grid-template-columns:repeat(2,1fr);} }
    @media(max-width:600px) {
      .prices-grid{grid-template-columns:1fr;} .items-grid{grid-template-columns:1fr;}
      .trip-name-row{flex-direction:column;} .action-row{flex-direction:column;}
      .btn-primary,.btn-secondary,.btn-green{width:100%;justify-content:center;}
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="sticky-top">
  <div class="header">
    <h2>🏝️ إدارة أسعار الرحلات</h2>
    <div class="user-info">
      <span class="user-name" id="userNameDisplay">—</span>
      <button class="back-btn" onclick="goBack()">🔙 رجوع</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="nav-tabs">
    <div class="nav-tab" id="tab-add"  onclick="showTab('add')">➕ إضافة رحلة</div>
    <div class="nav-tab" id="tab-edit" onclick="showTab('edit')">✏️ تعديل رحلة</div>
    <div class="nav-tab" id="tab-list" onclick="showTab('list')">📋 قائمة الرحلات</div>
  </div>

  </div><!-- /sticky-top -->
  <div class="scrollable-content">
  <div class="content" id="mainContent"></div>
  </div>
</div>

<!-- Confirm Modal -->
<div id="confirmModal" class="modal">
  <div class="modal-box">
    <div class="icon">❓</div>
    <p id="confirmMsg">تأكيد</p>
    <div class="modal-btns">
      <button id="confirmYes" class="btn-primary" style="background:#e74c3c;">نعم</button>
      <button id="confirmNo"  class="btn-secondary">إلغاء</button>
    </div>
  </div>
</div>
<!-- Alert Modal -->
<div id="alertModal" class="modal">
  <div class="modal-box">
    <div class="icon">ℹ️</div>
    <p id="alertMsg">تنبيه</p>
    <div class="modal-btns">
      <button id="alertOk" class="btn-primary">موافق</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// الإعدادات
// ══════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyIROtu-OMKccUAgyn4eSMiXi4eSNfQVIkHg9hhlepZoLd4v3XbGO5E9UAETdPZ0TxC/exec';
const DASH = { Admin:'Dashboard.html', Owner:'OwnerDashboard.html', Sales:'SalesDashboard.html', Accountant:'AccountantDashboard.html' };

let currentUser = null;
let allCategories = [];
let allTripNames  = [];  // أسماء الرحلات من TripDefinitions
let allTrips = [];

// حالة النموذج الحالي
let formState = {
  mode: 'add',          // 'add' | 'edit'
  tripName: '',
  category: '',
  items: [],            // ['Adlt','Ch',...]
  prices: [],           // [50, 25, ...]
  hasCost: false
};
let selectedCurrency = '$';

// ══════════════════════════════════════════
// Modals
// ══════════════════════════════════════════
function showAlert(msg) {
  const m = document.getElementById('alertModal');
  document.getElementById('alertMsg').textContent = msg;
  m.style.display = 'flex';
  const ok = document.getElementById('alertOk');
  const h = () => { m.style.display='none'; ok.removeEventListener('click',h); };
  ok.addEventListener('click', h);
}
function showConfirm(msg, onYes, onNo) {
  const m = document.getElementById('confirmModal');
  document.getElementById('confirmMsg').textContent = msg;
  m.style.display = 'flex';
  const y = document.getElementById('confirmYes'), n = document.getElementById('confirmNo');
  const yH = () => { m.style.display='none'; if(onYes) onYes(); y.removeEventListener('click',yH); n.removeEventListener('click',nH); };
  const nH = () => { m.style.display='none'; if(onNo)  onNo();  y.removeEventListener('click',yH); n.removeEventListener('click',nH); };
  y.addEventListener('click',yH); n.addEventListener('click',nH);
}

// ══════════════════════════════════════════
// JSONP
// ══════════════════════════════════════════
function jsonp(action, params={}) {
  return new Promise((res, rej) => {
    const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*99999);
    params.action = action; params.callback = cb;
    const qs = Object.entries(params).map(([k,v]) => k+'='+encodeURIComponent(String(v??''))).join('&');
    const sc = document.createElement('script');
    const to = setTimeout(() => { delete window[cb]; sc.remove(); rej(new Error('انتهت مهلة الاتصال')); }, 30000);
    window[cb] = d => { clearTimeout(to); delete window[cb]; sc.remove(); res(d); };
    sc.onerror = () => { clearTimeout(to); delete window[cb]; sc.remove(); rej(new Error('خطأ في الاتصال')); };
    sc.src = GAS_URL + '?' + qs;
    document.head.appendChild(sc);
  });
}

// POST عبر JSONP (إرسال البيانات كـ params)
function jsonpPost(action, data) {
  const flat = {};
  Object.entries(data).forEach(([k,v]) => {
    if (Array.isArray(v)) flat[k] = JSON.stringify(v);
    else flat[k] = String(v ?? '');
  });
  flat._method = 'POST';
  return jsonp(action, flat);
}

// ══════════════════════════════════════════
// التحميل الأولي
// ══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  let ud = sessionStorage.getItem('currentUser');
  if (!ud) {
    try { const p=new URLSearchParams(location.search),u=p.get('user'); if(u){ud=decodeURIComponent(u);sessionStorage.setItem('currentUser',ud);} } catch(e){}
  }
  if (!ud) { location.href='index.html'; return; }
  try { currentUser=JSON.parse(ud); } catch(e) { location.href='index.html'; return; }
  // ✅ أي مستخدم مسجّل يمكنه الدخول
  document.getElementById('userNameDisplay').textContent = currentUser.name || '—';

  showLoadingMsg('جاري تحميل البيانات...');
  try {
    const [cats, tripNames, trips] = await Promise.all([
      jsonp('getActivityCategories'),   // العمود B من شيت Activities
      jsonp('getTripNames'),            // العمود B من شيت TripDefinitions
      jsonp('getAllTrips')
    ]);
    allCategories = cats || [];
    allTripNames  = tripNames || [];   // للـ datalist فقط
    allTrips = (trips || []).sort((a,b) => a.name.localeCompare(b.name,'ar'));
  } catch(e) { console.error('خطأ في التحميل:', e); }

  showTab('add');
});

function showLoadingMsg(msg) {
  document.getElementById('mainContent').innerHTML = `<div class="empty"><div class="loader"></div><p>${msg}</p></div>`;
}

// ══════════════════════════════════════════
// التبويبات
// ══════════════════════════════════════════
function showTab(tab) {
  ['add','edit','list'].forEach(t => {
    const el = document.getElementById('tab-'+t);
    if(el) el.classList.toggle('active', t===tab);
  });
  if (tab === 'add')  { resetFormState('add');  renderForm(); }
  else if (tab === 'edit') { resetFormState('edit'); renderForm(); }
  else if (tab === 'list') { renderList(); }
}

function resetFormState(mode) {
  formState = { mode, tripName:'', category:'', items:[], prices:[], hasCost:false };
  selectedCurrency = '$';
}

// ══════════════════════════════════════════
// نموذج الإضافة / التعديل
// ══════════════════════════════════════════
function renderForm() {
  const isEdit = formState.mode === 'edit';
  const c = document.getElementById('mainContent');

  const catOptions  = allCategories.map(x=>`<option value="${x}">`).join('');
  // الرحلات: من TripDefinitions (allTripNames) + Price_List (allTrips) مدمجتان بدون تكرار
  const tripNamesSet = new Set([...allTripNames, ...allTrips.map(t=>t.name)]);
  const tripOptions  = Array.from(tripNamesSet).sort((a,b)=>a.localeCompare(b)).map(n=>`<option value="${n}">`).join('');

  const tripNameField = isEdit
    ? `<div class="trip-name-row">
        <input type="text" id="fTripName" class="form-control" list="tripsList"
          placeholder="اختر اسم الرحلة" value="${formState.tripName}" style="direction:ltr;">
        <button class="btn-blue" onclick="loadTrip()">📥 تحميل</button>
        <datalist id="tripsList">${tripOptions}</datalist>
       </div>`
    : `<input type="text" id="fTripName" class="form-control" list="tripsList"
          placeholder="اكتب اسم الرحلة" value="${formState.tripName}" style="direction:ltr;">
       <datalist id="tripsList">${tripOptions}</datalist>`;

  const actionBtns = isEdit
    ? `<button class="btn-green" onclick="doUpdateTrip()">✏️ تحديث الأسعار</button>
       <button class="btn-primary danger" onclick="doDeleteTrip()">🗑️ حذف الرحلة</button>
       <button class="btn-secondary" onclick="resetFormState('edit');renderForm();">🔄 إعادة تعيين</button>`
    : `<button class="btn-primary" onclick="doSaveTrip()">💾 حفظ الرحلة</button>
       <button class="btn-secondary" onclick="resetFormState('add');renderForm();">🔄 إعادة تعيين</button>`;

  c.innerHTML = `
    <!-- معلومات الرحلة -->
    <div class="card">
      <div class="card-title">📋 ${isEdit ? 'تعديل رحلة' : 'رحلة جديدة'}</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="req">الفئة (Category)</label>
          <input type="text" id="fCategory" class="form-control" list="catList"
            placeholder="مثال: Safari" value="${formState.category}" style="direction:ltr;">
          <datalist id="catList">${catOptions}</datalist>
        </div>
        <div class="form-group">
          <label class="req">اسم الرحلة</label>
          ${tripNameField}
        </div>
      </div>
    </div>

    <!-- بنود الرحلة -->
    <div class="card">
      <div class="card-title">📝 بنود الرحلة (حتى 10 بنود)</div>
      <button class="btn-add-item" onclick="addItem()">➕ إضافة بند</button>
      <div id="itemsContainer"></div>
    </div>

    <!-- الأسعار -->
    <div class="card">
      <div class="card-title">💰 الأسعار</div>

      <!-- اختيار العملة -->
      <div class="currency-row">
        <div class="cur-opts">
          ${[['$','💵 دولار'],['€','💶 يورو'],['£','💷 إسترليني'],['LE','🇪🇬 جنيه']].map(([v,l])=>`
          <label class="cur-lbl ${selectedCurrency===v?'sel':''}">
            <input type="radio" name="cur" value="${v}" ${selectedCurrency===v?'checked':''}
              onchange="onCurrencyChange('${v}')"> ${l}
          </label>`).join('')}
        </div>
        <div class="bank-pct">
          <label>نسبة البنك (%):</label>
          <input type="number" id="fBankPct" value="2.5" step="0.1" min="0" max="100" style="direction:ltr;">
        </div>
      </div>

      <!-- هل لها تكلفة -->
      <div class="cost-row">
        <input type="checkbox" id="fHasCost" ${formState.hasCost?'checked':''}>
        <label for="fHasCost">💰 هذه الرحلة لها تكلفة (Cost)</label>
        <span class="cost-note">⚠️ يؤثر على عمولة السيلز</span>
      </div>

      <div id="pricesContainer"></div>
    </div>

    <div class="action-row">${actionBtns}</div>
    <div id="msgArea"></div>`;

  renderItems();
  renderPrices();
}

// ── رسم بنود الرحلة ──
function renderItems() {
  const c = document.getElementById('itemsContainer'); if(!c) return;
  if (!formState.items.length) {
    c.innerHTML = '<p style="color:#aaa;text-align:center;padding:12px;">لا توجد بنود — اضغط "إضافة بند"</p>';
    return;
  }
  let html = '<div class="items-grid">';
  formState.items.forEach((item, i) => {
    html += `<div class="item-row">
      <span class="item-num">${i+1}</span>
      <input type="text" class="item-input" id="item_${i}" value="${item}"
        placeholder="اسم البند بالإنجليزية"
        onchange="syncItem(${i})" oninput="syncItemLabel(${i})">
      <button class="item-del" onclick="removeItem(${i})" title="حذف البند">✕</button>
    </div>`;
  });
  html += '</div>';
  c.innerHTML = html;
}

// ── رسم حقول الأسعار ──
function renderPrices() {
  const c = document.getElementById('pricesContainer'); if(!c) return;
  if (!formState.items.length) {
    c.innerHTML = '<p style="color:#aaa;text-align:center;padding:12px;">أضف البنود أولاً لتظهر حقول الأسعار</p>';
    return;
  }
  let html = '<div class="prices-grid">';
  formState.items.forEach((name, i) => {
    const label = name || `بند ${i+1}`;
    html += `<div class="price-card">
      <div class="price-card-title" id="plbl_${i}" title="${label}">${label}</div>
      <div class="price-inp-row">
        <label>${selectedCurrency}</label>
        <input type="number" id="price_${i}" value="${formState.prices[i]||0}"
          step="0.01" min="0" style="direction:ltr;">
      </div>
    </div>`;
  });
  html += '</div>';
  c.innerHTML = html;
}

// ── إضافة بند ──
function addItem() {
  if (formState.items.length >= 10) { showAlert('الحد الأقصى 10 بنود'); return; }
  syncAllItems();
  formState.items.push('');
  formState.prices.push(0);
  renderItems();
  renderPrices();
}

// ── حذف بند ──
function removeItem(i) {
  showConfirm('حذف هذا البند؟', () => {
    syncAllItems();
    formState.items.splice(i, 1);
    formState.prices.splice(i, 1);
    renderItems();
    renderPrices();
  });
}

// ── مزامنة البنود من الـ DOM إلى formState ──
function syncAllItems() {
  formState.items.forEach((_, i) => {
    const el = document.getElementById(`item_${i}`);
    if (el) formState.items[i] = el.value.trim();
  });
}
function syncAllPrices() {
  formState.prices = formState.items.map((_, i) => {
    const el = document.getElementById(`price_${i}`);
    return el ? parseFloat(el.value)||0 : 0;
  });
}
function syncItem(i) {
  const el = document.getElementById(`item_${i}`);
  if (el) formState.items[i] = el.value.trim();
}
function syncItemLabel(i) {
  const el  = document.getElementById(`item_${i}`);
  const lbl = document.getElementById(`plbl_${i}`);
  if (el && lbl) { const t = el.value||`بند ${i+1}`; lbl.textContent = t; lbl.title = t; }
}

// ── تغيير العملة ──
async function onCurrencyChange(cur) {
  syncAllItems();
  syncAllPrices();
  selectedCurrency = cur;
  document.querySelectorAll('.cur-lbl').forEach(l => l.classList.toggle('sel', l.querySelector('input')?.value===cur));
  if (formState.tripName) {
    await fetchTripPrices(formState.tripName, cur);
  } else {
    renderPrices();
  }
}

// ══════════════════════════════════════════
// تحميل رحلة موجودة (وضع التعديل)
// ══════════════════════════════════════════
async function loadTrip() {
  const nameEl = document.getElementById('fTripName');
  const name = nameEl?.value?.trim();
  if (!name) { showAlert('الرجاء إدخال اسم الرحلة أولاً'); return; }

  showMsg('', '⏳ جاري التحميل...');
  try {
    const def = await jsonp('getTripDefinition', { tripName: name });
    if (!def || !def.name) { showAlert(`لم يتم العثور على الرحلة: "${name}"`); clearMsg(); return; }

    // نستخدم totalItems من العمود N في TripDefinitions لتحديد عدد البنود الصحيح
    const totalItems = def.totalItems || (def.items||[]).filter(x=>x&&x!=='null').length;
    const rawItems   = def.items || [];
    const items = [];
    for (let i=0; i<totalItems; i++) items.push(rawItems[i] || '');

    formState.tripName = def.name;
    formState.category = def.category || '';
    formState.items    = items;
    formState.prices   = new Array(items.length).fill(0);
    formState.hasCost  = def.hasCost || false;

    // تحديث حقول الـ UI مباشرة
    const catEl = document.getElementById('fCategory');
    if (catEl) catEl.value = formState.category;
    const hcEl = document.getElementById('fHasCost');
    if (hcEl) hcEl.checked = formState.hasCost;

    renderItems();
    await fetchTripPrices(name, selectedCurrency);
    clearMsg();
  } catch(e) { showAlert('خطأ في التحميل: ' + e.message); clearMsg(); }
}

async function fetchTripPrices(tripName, currency) {
  try {
    const data = await jsonp('getTripPrices', { tripName, currency, category: formState.category });
    if (data && data.prices) {
      formState.prices = formState.items.map((_, i) => i < data.prices.length ? (data.prices[i]||0) : 0);
      if (data.hasCost !== undefined) {
        formState.hasCost = data.hasCost;
        const hcEl = document.getElementById('fHasCost'); if(hcEl) hcEl.checked = formState.hasCost;
      }
    } else {
      formState.prices = new Array(formState.items.length).fill(0);
    }
    renderPrices();
  } catch(e) { renderPrices(); }
}

// ══════════════════════════════════════════
// حفظ رحلة جديدة
// ══════════════════════════════════════════
async function doSaveTrip() {
  syncAllItems();
  syncAllPrices();

  const name     = document.getElementById('fTripName')?.value?.trim();
  const category = document.getElementById('fCategory')?.value?.trim();
  const bankPct  = parseFloat(document.getElementById('fBankPct')?.value)||2.5;
  const hasCost  = document.getElementById('fHasCost')?.checked||false;

  if (!name)     { showAlert('الرجاء إدخال اسم الرحلة'); return; }
  if (!category) { showAlert('الرجاء إدخال الفئة'); return; }
  if (!formState.items.length) { showAlert('يجب إضافة بند واحد على الأقل'); return; }
  for (let i=0; i<formState.items.length; i++) {
    if (!formState.items[i]) { showAlert(`الرجاء إدخال اسم البند رقم ${i+1}`); return; }
  }
  if (allTrips.find(t => t.name.toLowerCase() === name.toLowerCase())) {
    showAlert('⚠️ هذه الرحلة موجودة بالفعل — استخدم تبويب "تعديل رحلة"'); return;
  }

  const btn = document.querySelector('.action-row .btn-primary');
  if(btn) { btn.disabled=true; btn.textContent='⏳ جاري الحفظ...'; }

  try {
    // 1. حفظ التعريف
    const defRes = await jsonpPost('saveTripDefinition', {
      tripName: name, category, items: formState.items
    });
    if (!defRes?.success) { showAlert('خطأ في حفظ تعريف الرحلة: ' + (defRes?.message||'')); return; }

    // 2. حفظ الأسعار
    const priceRes = await jsonpPost('saveTripPrices', {
      tripName: name, category,
      currency: selectedCurrency,
      prices:   formState.prices,
      bankPercentage: bankPct,
      hasCost, isNewTrip: true
    });
    if (priceRes?.success) {
      showMsg('success', '✅ تم حفظ الرحلة بنجاح');
      allTrips = (await jsonp('getAllTrips') || []).sort((a,b)=>a.name.localeCompare(b.name,'ar'));
      resetFormState('add'); renderForm();
    } else {
      showAlert('خطأ في حفظ الأسعار: ' + (priceRes?.message||''));
    }
  } catch(e) { showAlert('خطأ في الاتصال: ' + e.message); }
  if(btn) { btn.disabled=false; btn.innerHTML='💾 حفظ الرحلة'; }
}

// ══════════════════════════════════════════
// تحديث رحلة موجودة
// ══════════════════════════════════════════
async function doUpdateTrip() {
  if (!formState.tripName) { showAlert('الرجاء تحميل رحلة أولاً'); return; }
  syncAllItems();
  syncAllPrices();

  const category = document.getElementById('fCategory')?.value?.trim();
  const bankPct  = parseFloat(document.getElementById('fBankPct')?.value)||2.5;
  const hasCost  = document.getElementById('fHasCost')?.checked||false;

  showConfirm(
    `تحديث أسعار "${formState.tripName}" بعملة ${selectedCurrency}؟`,
    async () => {
      try {
        const res = await jsonpPost('updateTrip', {
          tripName: formState.tripName, category,
          currency: selectedCurrency,
          prices:   formState.prices,
          hasCost,  bankPercentage: bankPct
        });
        if (res?.success) {
          showMsg('success', '✅ ' + (res.message||'تم التحديث'));
          // إذا عملة $ → اسأل عن الجنيه
          if (selectedCurrency === '$') {
            setTimeout(() => {
              showConfirm('هل تريد إدخال أسعار الجنيه أيضاً؟',
                () => onCurrencyChange('LE'),
                () => { resetFormState('edit'); renderForm(); }
              );
            }, 300);
          }
        } else { showAlert('❌ ' + (res?.message||'فشل التحديث')); }
      } catch(e) { showAlert('خطأ: ' + e.message); }
    }
  );
}

// ══════════════════════════════════════════
// حذف رحلة
// ══════════════════════════════════════════
async function doDeleteTrip() {
  if (!formState.tripName) { showAlert('الرجاء تحميل رحلة أولاً'); return; }
  showConfirm(
    `⚠️ حذف الرحلة "${formState.tripName}" نهائياً؟`,
    async () => {
      try {
        const res = await jsonpPost('deleteTrip', { tripName: formState.tripName });
        if (res?.success) {
          showMsg('success', '✅ تم الحذف');
          allTrips = (await jsonp('getAllTrips') || []).sort((a,b)=>a.name.localeCompare(b.name,'ar'));
          resetFormState('edit'); renderForm();
        } else { showAlert('❌ ' + (res?.message||'فشل الحذف')); }
      } catch(e) { showAlert('خطأ: ' + e.message); }
    }
  );
}

// ══════════════════════════════════════════
// قائمة الرحلات
// ══════════════════════════════════════════
let fullTripsList = [];

async function renderList() {
  const c = document.getElementById('mainContent');
  c.innerHTML = `
    <div class="card">
      <div class="card-title">🔍 بحث</div>
      <input type="text" class="search-inp" id="tripSearch" placeholder="اكتب اسم أو فئة..."
        oninput="filterList()">
    </div>
    <div id="listContainer"><div class="loader"></div></div>`;

  try {
    const trips = await jsonp('getAllTrips');
    fullTripsList = (trips||[]).sort((a,b)=>a.name.localeCompare(b.name,'ar'));
    displayList(fullTripsList);
  } catch(e) {
    document.getElementById('listContainer').innerHTML = `<div class="empty">خطأ: ${e.message}</div>`;
  }
}

function filterList() {
  const q = document.getElementById('tripSearch')?.value?.toLowerCase()||'';
  displayList(fullTripsList.filter(t =>
    t.name.toLowerCase().includes(q) || (t.category||'').toLowerCase().includes(q)
  ));
}

function displayList(trips) {
  const c = document.getElementById('listContainer'); if(!c) return;
  if (!trips.length) { c.innerHTML='<div class="empty">لا توجد نتائج</div>'; return; }
  let html = `<div class="tbl-wrap"><table class="trips-tbl">
    <thead><tr>
      <th>#</th><th>اسم الرحلة</th><th>الفئة</th><th>عدد البنود</th><th>تكلفة</th><th>إجراء</th>
    </tr></thead><tbody>`;
  trips.forEach((t,i) => {
    html += `<tr>
      <td>${i+1}</td>
      <td style="text-align:right;font-weight:700;">${t.name}</td>
      <td>${t.category||'—'}</td>
      <td>${t.totalItems||'—'}</td>
      <td>${t.hasCost ? '<span class="badge-cost">💰 نعم</span>' : '—'}</td>
      <td><button class="btn-blue" style="padding:6px 14px;font-size:12px;"
          onclick="editFromList('${t.name.replace(/'/g,"\\'")}')">✏️ تعديل</button></td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  c.innerHTML = html;
}

function editFromList(tripName) {
  showTab('edit');
  setTimeout(() => {
    const el = document.getElementById('fTripName');
    if (el) { el.value = tripName; loadTrip(); }
  }, 150);
}

// ══════════════════════════════════════════
// Messages & goBack
// ══════════════════════════════════════════
function showMsg(type, text) {
  const el = document.getElementById('msgArea'); if(!el) return;
  el.innerHTML = type ? `<div class="msg ${type}">${text}</div>` : `<div style="text-align:center;color:#888;">${text}</div>`;
  if (type) setTimeout(()=>{ if(el) el.innerHTML=''; }, 6000);
}
function clearMsg() { const el=document.getElementById('msgArea'); if(el) el.innerHTML=''; }

function goBack() {
  window.location.href = DASH[currentUser?.type] || 'Dashboard.html';
}
