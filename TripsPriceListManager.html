<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>🏝️ إدارة أسعار الرحلات</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e2b4f 0%, #2c3e50 100%);
      min-height: 100vh;
      padding: 15px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 25px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #1e2b4f 0%, #152238 100%);
      color: white;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .header h2 {
      color: #ffd966;
      font-size: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .user-name {
      background: rgba(255, 255, 255, 0.1);
      padding: 8px 20px;
      border-radius: 30px;
      border: 1px solid #ffd966;
      font-size: 14px;
    }

    .logout-btn {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logout-btn:hover {
      background: #ee5253;
      transform: translateY(-2px);
    }

    .nav-tabs {
      display: flex;
      background: #f0f4f8;
      padding: 0 20px;
      border-bottom: 2px solid #d0ddeb;
      overflow-x: auto;
      white-space: nowrap;
      gap: 5px;
    }

    .nav-tab {
      padding: 15px 25px;
      cursor: pointer;
      font-weight: 600;
      color: #4a5a72;
      border-bottom: 3px solid transparent;
      transition: 0.3s;
      display: inline-block;
      font-size: 15px;
      flex-shrink: 0;
    }

    .nav-tab.active {
      color: #1e2b4f;
      border-bottom-color: #ffd966;
      background: white;
      border-radius: 15px 15px 0 0;
    }

    .content {
      padding: 25px;
    }

    .card {
      background: #f8fafd;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 25px;
      border: 2px solid #d0ddeb;
    }

    .card-title {
      color: #1e2b4f;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #ffd966;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #1e2b4f;
      font-weight: 600;
      font-size: 14px;
    }

    .form-group label.required::after {
      content: " *";
      color: #e74c3c;
    }

    .form-control {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #d0ddeb;
      border-radius: 15px;
      font-size: 14px;
      transition: 0.3s;
      background: white;
    }

    .form-control:focus {
      border-color: #ffd966;
      outline: none;
    }

    /* مجموعة اسم الرحلة مع زر التحميل */
    .trip-name-group {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .trip-name-group .form-control {
      flex: 1;
    }

    .btn-load {
      background: #3498db;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 15px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .btn-load:hover {
      background: #2980b9;
      transform: translateY(-2px);
    }

    .items-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin: 20px 0;
    }

    .item-row {
      background: white;
      border: 2px solid #d0ddeb;
      border-radius: 15px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .item-number {
      background: #1e2b4f;
      color: #ffd966;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }

    .item-name-input {
      flex: 1;
      padding: 8px 12px;
      border: 2px solid #d0ddeb;
      border-radius: 25px;
      font-size: 14px;
      min-width: 0;
      direction: ltr;
      text-align: left;
    }

    .item-delete-btn {
      background: #e74c3c;
      color: white;
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      flex-shrink: 0;
      transition: 0.3s;
    }

    .item-delete-btn:hover {
      background: #c0392b;
      transform: scale(1.1);
    }

    /* شبكة الأسعار - 3 أعمدة */
    .prices-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin: 20px 0;
    }

    .price-row {
      background: white;
      border: 2px solid #d0ddeb;
      border-radius: 15px;
      padding: 15px;
      width: 100%;
      box-sizing: border-box;
    }

    .price-row-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px dashed #d0ddeb;
    }

    .price-row-header span {
      font-weight: 700;
      color: #1e2b4f;
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .price-input-group {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
    }

    .price-input-group label {
      font-weight: 600;
      color: #4a5a72;
      min-width: 30px;
      font-size: 13px;
    }

    .price-input-group input {
      flex: 1;
      padding: 10px 12px;
      border: 2px solid #d0ddeb;
      border-radius: 15px;
      font-size: 14px;
      text-align: left;
      direction: ltr;
      width: 100%;
      min-width: 0;
      box-sizing: border-box;
    }

    .price-input-group input:focus {
      border-color: #ffd966;
      outline: none;
    }

    .price-input-group input::placeholder {
      text-align: right;
      direction: rtl;
      font-size: 12px;
      color: #999;
    }

    .currency-section {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin: 25px 0;
      padding: 20px;
      background: #f0f4f8;
      border-radius: 20px;
    }

    .currency-options {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .currency-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      background: white;
      border: 2px solid #d0ddeb;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: 600;
    }

    .currency-option.selected {
      background: #1e2b4f;
      color: white;
      border-color: #ffd966;
    }

    .currency-option input[type="radio"] {
      display: none;
    }

    .bank-percent {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .bank-percent input {
      width: 80px;
      padding: 8px;
      border: 2px solid #d0ddeb;
      border-radius: 20px;
      text-align: center;
      font-weight: 600;
      direction: ltr;
    }

    .cost-section {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin: 15px 0;
      padding: 15px 20px;
      background: #e8f0fe;
      border-radius: 20px;
      border: 2px solid #ffd966;
    }

    .cost-checkbox {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .cost-checkbox input[type="checkbox"] {
      width: 22px;
      height: 22px;
      cursor: pointer;
      accent-color: #1e2b4f;
    }

    .cost-checkbox label {
      font-weight: 700;
      color: #1e2b4f;
      font-size: 16px;
      cursor: pointer;
    }

    .cost-note {
      color: #e74c3c;
      font-size: 13px;
      font-weight: 700;
      background: #fff3e0;
      padding: 5px 15px;
      border-radius: 30px;
    }

    .action-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 2px dashed #d0ddeb;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: #1e2b4f;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary:hover {
      background: #ffd966;
      color: #1e2b4f;
      transform: translateY(-2px);
    }

    .btn-primary.danger {
      background: #e74c3c;
    }

    .btn-secondary {
      background: #e9f0fa;
      color: #1e2b4f;
      border: 2px solid #b0c4de;
      padding: 12px 25px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-secondary:hover {
      background: #d0ddeb;
      border-color: #ffd966;
    }

    .btn-edit {
      background: #3498db;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-edit:hover {
      background: #2980b9;
      transform: translateY(-2px);
    }

    .btn-add-item {
      background: #27ae60;
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .btn-add-item:hover {
      background: #2ecc71;
      transform: translateY(-3px);
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 20px;
    }

    .trips-table-container {
      overflow-x: auto;
      border-radius: 20px;
      background: white;
      border: 2px solid #d0ddeb;
      width: 100%;
    }

    .trips-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    .trips-table th {
      background: #1e2b4f;
      color: #ffd966;
      padding: 15px;
      font-weight: 600;
      font-size: 14px;
      text-align: center;
    }

    .trips-table td {
      padding: 12px;
      border-bottom: 1px solid #e9f0fa;
      text-align: center;
    }

    /* تحسينات للشاشات المختلفة */
    @media (max-width: 1200px) {
      .prices-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .prices-grid {
        grid-template-columns: 1fr;
      }
      
      .items-grid {
        grid-template-columns: 1fr;
      }
      
      .trip-name-group {
        flex-direction: column;
      }
      
      .btn-load {
        width: 100%;
        justify-content: center;
      }
      
      .currency-section {
        flex-direction: column;
        align-items: flex-start;
      }
      
      .action-buttons {
        flex-direction: column;
      }
      
      .btn-primary, .btn-secondary, .btn-edit {
        width: 100%;
        justify-content: center;
      }
    }

    .search-box {
      margin-bottom: 20px;
    }

    .search-box input {
      width: 100%;
      max-width: 400px;
      padding: 12px 20px;
      border: 2px solid #d0ddeb;
      border-radius: 40px;
      font-size: 16px;
      direction: ltr;
      text-align: left;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .modal-content {
      background: white;
      width: 90%;
      max-width: 400px;
      border-radius: 30px;
      padding: 30px;
      text-align: center;
    }

    .modal-actions {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 25px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>🏝️ إدارة أسعار الرحلات</h2>
      <div class="user-info">
        <span class="user-name" id="userNameDisplay"></span>
        <button class="logout-btn" onclick="window.logout()">
          <span>🚪</span> خروج
        </button>
      </div>
    </div>

    <div class="nav-tabs">
      <div class="nav-tab active" onclick="window.showTab('add', event)">➕ إضافة رحلة</div>
      <div class="nav-tab" onclick="window.showTab('edit', event)">✏️ تعديل رحلة</div>
      <div class="nav-tab" onclick="window.showTab('list', event)">📋 قائمة الرحلات</div>
    </div>

    <div class="content" id="mainContent"></div>
  </div>

  <div id="confirmModal" class="modal">
    <div class="modal-content">
      <h3>تأكيد</h3>
      <p id="confirmMessage"></p>
      <div class="modal-actions">
        <button class="btn-primary" id="confirmYes">نعم</button>
        <button class="btn-secondary" id="confirmNo">إلغاء</button>
      </div>
    </div>
  </div>

  <div id="alertModal" class="modal">
    <div class="modal-content">
      <h3>تنبيه</h3>
      <p id="alertMessage"></p>
      <div class="modal-actions">
        <button class="btn-primary" id="alertOk">موافق</button>
      </div>
    </div>
  </div>

  <script>
    // ✅ استخدام GAS_URL للاتصال بالـ API
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyBfwHQQoHb9E2bq0l-u6FLMD2XFKu_d8rZuJLnIq5iko82Bn93Emki6-cvDF_XOyRp/exec';

    let currentUser = null;
    let allCategories = [];
    let allTrips = [];
    let currentTrip = {
      id: null,
      name: '',
      category: '',
      items: [],
      prices: [],
      hasCost: false
    };
    let selectedCurrency = '$';
    let isEditMode = false;

    // ── JSONP دالة ──
    function jsonp(action, params = {}) {
      return new Promise((res, rej) => {
        const cb = '_p' + Date.now() + Math.floor(Math.random() * 99999);
        params.action = action;
        params.callback = cb;
        const qs = Object.entries(params).map(([k, v]) => k + '=' + encodeURIComponent(String(v ?? ''))).join('&');
        const sc = document.createElement('script');
        const to = setTimeout(() => {
          delete window[cb];
          sc.remove();
          rej(new Error('انتهت المهلة'));
        }, 30000);
        
        window[cb] = d => {
          clearTimeout(to);
          delete window[cb];
          sc.remove();
          res(d);
        };
        
        sc.onerror = () => {
          clearTimeout(to);
          delete window[cb];
          sc.remove();
          rej(new Error('فشل الاتصال'));
        };
        
        sc.src = GAS_URL + '?' + qs;
        document.head.appendChild(sc);
      });
    }

    document.addEventListener('DOMContentLoaded', function() {
      // محاولة قراءة المستخدم من sessionStorage أولاً
      let ud = sessionStorage.getItem('currentUser');
      
      // إذا لم يكن موجوداً في sessionStorage، حاول من localStorage (للتوافق)
      if (!ud) {
        ud = localStorage.getItem('currentUser');
        if (ud) {
          // نسخ إلى sessionStorage للجلسة الحالية
          sessionStorage.setItem('currentUser', ud);
        }
      }
      
      if (!ud) {
        showAlert('الرجاء تسجيل الدخول أولاً');
        setTimeout(() => {
          window.top.location.href = '?page=Login';
        }, 2000);
        return;
      }

      try {
        currentUser = JSON.parse(ud);
        document.getElementById('userNameDisplay').textContent = currentUser.name || 'مدير النظام';

        const allowedTypes = ['Admin', 'Owner', 'FinancialManager', 'Sales', 'Accountant', 'Employee'];
if (!allowedTypes.includes(currentUser.type)) {
  showAlert('ليس لديك صلاحية للوصول إلى هذه الصفحة');
  setTimeout(() => {
    window.location.href = '?page=Dashboard';
  }, 2000);
  return;
}
      } catch (e) {
        showAlert('خطأ في بيانات المستخدم');
        setTimeout(() => {
          window.top.location.href = '?page=Login';
        }, 2000);
        return;
      }

      loadAllCategories();
      loadAllTrips();
      showTab('add', null);
    });

    async function loadAllCategories() {
      try {
        const cats = await jsonp('getAllCategories');
        allCategories = cats || [];
      } catch (err) {
        console.error('خطأ في تحميل الفئات:', err);
      }
    }

    async function loadAllTrips() {
      try {
        const trips = await jsonp('getAllTrips');
        allTrips = trips || [];
        allTrips.sort((a, b) => a.name.localeCompare(b.name, 'ar'));
      } catch (err) {
        console.error('خطأ في تحميل الرحلات:', err);
      }
    }

    function showAlert(message) {
      document.getElementById('alertMessage').innerText = message;
      document.getElementById('alertModal').style.display = 'flex';
      document.getElementById('alertOk').onclick = function() {
        document.getElementById('alertModal').style.display = 'none';
      };
    }

    function showConfirm(message, onConfirm, onCancel) {
      document.getElementById('confirmMessage').innerText = message;
      document.getElementById('confirmModal').style.display = 'flex';
      document.getElementById('confirmYes').onclick = function() {
        document.getElementById('confirmModal').style.display = 'none';
        if (onConfirm) onConfirm();
      };
      document.getElementById('confirmNo').onclick = function() {
        document.getElementById('confirmModal').style.display = 'none';
        if (onCancel) onCancel();
      };
    }

    function showTab(tab, evt) {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      
      if (evt && evt.target) {
        evt.target.classList.add('active');
      } else {
        const tabs = document.querySelectorAll('.nav-tab');
        for (let i = 0; i < tabs.length; i++) {
          if (tabs[i].textContent.includes(tab === 'add' ? 'إضافة' : tab === 'edit' ? 'تعديل' : 'قائمة')) {
            tabs[i].classList.add('active');
            break;
          }
        }
      }

      if (tab === 'add') {
        isEditMode = false;
        newTrip();
      } else if (tab === 'edit') {
        isEditMode = true;
        showEditForm();
      } else if (tab === 'list') {
        showTripsList();
      }
    }

    function showAddEditForm() {
      const content = document.getElementById('mainContent');
      
      let bottomButtons = '';
      if (isEditMode) {
        bottomButtons = `
          <button class="btn-edit" onclick="window.updateTrip()"><span>✏️</span> تحديث الأسعار</button>
          <button class="btn-primary danger" onclick="window.deleteCurrentTrip()"><span>🗑️</span> حذف الرحلة</button>
          <button class="btn-secondary" onclick="window.resetForm()"><span>🔄</span> إعادة تعيين</button>
        `;
      } else {
        bottomButtons = `
          <button class="btn-primary" onclick="window.saveTrip()"><span>💾</span> حفظ الرحلة</button>
          <button class="btn-secondary" onclick="window.resetForm()"><span>🔄</span> إعادة تعيين</button>
        `;
      }
      
      const title = isEditMode ? '✏️ تعديل رحلة' : '➕ إضافة رحلة جديدة';
      
      // نموذج التعديل يحتوي على زر تحميل
      const tripNameField = isEditMode ? `
        <div class="trip-name-group">
          <input type="text" id="tripName" class="form-control" list="tripsList" placeholder="اختر أو اكتب اسم الرحلة" value="${currentTrip.name}" style="direction: ltr; text-align: left;">
          <button class="btn-load" onclick="window.loadTrip()"><span>📥</span> تحميل</button>
          <datalist id="tripsList">
            ${allTrips.map(trip => `<option value="${trip.name}">`).join('')}
          </datalist>
        </div>
      ` : `
        <input type="text" id="tripName" class="form-control" list="tripsList" placeholder="اختر أو اكتب اسم الرحلة" value="${currentTrip.name}" style="direction: ltr; text-align: left;">
        <datalist id="tripsList">
          ${allTrips.map(trip => `<option value="${trip.name}">`).join('')}
        </datalist>
      `;
      
      content.innerHTML = `
        <div class="card">
          <div class="card-title">${title}</div>
          <div class="form-grid">
            <div class="form-group">
              <label class="required">الفئة</label>
              <input type="text" id="tripCategory" class="form-control" list="categoriesList" placeholder="اختر أو اكتب فئة جديدة" value="${currentTrip.category}" style="direction: ltr; text-align: left;">
              <datalist id="categoriesList">
                ${allCategories.map(cat => `<option value="${cat}">`).join('')}
              </datalist>
            </div>
            <div class="form-group">
              <label class="required">اسم الرحلة</label>
              ${tripNameField}
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">📝 بنود الرحلة</div>
          <button class="btn-add-item" onclick="window.addItem()"><span>➕</span> إضافة بند جديد</button>
          <div id="itemsContainer"></div>
        </div>

        <div class="card">
          <div class="card-title">💰 الأسعار</div>
          
          <div class="currency-section">
            <div class="currency-options">
              <label class="currency-option ${selectedCurrency === '$' ? 'selected' : ''}">
                <input type="radio" name="currency" value="$" ${selectedCurrency === '$' ? 'checked' : ''} onchange="window.selectCurrency('$')"> 💵 دولار
              </label>
              <label class="currency-option ${selectedCurrency === '€' ? 'selected' : ''}">
                <input type="radio" name="currency" value="€" ${selectedCurrency === '€' ? 'checked' : ''} onchange="window.selectCurrency('€')"> 💶 يورو
              </label>
              <label class="currency-option ${selectedCurrency === '£' ? 'selected' : ''}">
                <input type="radio" name="currency" value="£" ${selectedCurrency === '£' ? 'checked' : ''} onchange="window.selectCurrency('£')"> 💷 استرليني
              </label>
              <label class="currency-option ${selectedCurrency === 'LE' ? 'selected' : ''}">
                <input type="radio" name="currency" value="LE" ${selectedCurrency === 'LE' ? 'checked' : ''} onchange="window.selectCurrency('LE')"> 🇪🇬 جنيه
              </label>
            </div>
            <div class="bank-percent">
              <label>نسبة البنك:</label>
              <input type="number" id="bankPercentage" value="2.5" step="0.1" min="0" max="100" style="direction: ltr; text-align: left;">
            </div>
          </div>

          <div class="cost-section">
            <div class="cost-checkbox">
              <input type="checkbox" id="hasCost" ${currentTrip.hasCost ? 'checked' : ''}>
              <label for="hasCost">💰 هذه الرحلة لها تكلفة (Cost)</label>
            </div>
            <div class="cost-note">
              ⚠️ إذا كان محدداً سيتم التأثير على عمولة السيلز
            </div>
          </div>

          <div id="pricesContainer"></div>
        </div>

        <div class="action-buttons">
          ${bottomButtons}
        </div>
      `;

      updateItemsTable();
      updatePricesTable();
    }

    function newTrip() {
      currentTrip = {
        id: null,
        name: '',
        category: '',
        items: [],
        prices: [],
        hasCost: false
      };
      selectedCurrency = '$';
      isEditMode = false;
      showAddEditForm();
    }

    function showEditForm() {
      currentTrip = {
        id: null,
        name: '',
        category: '',
        items: [],
        prices: [],
        hasCost: false
      };
      selectedCurrency = '$';
      isEditMode = true;
      showAddEditForm();
    }

    function updateItemsTable() {
      const container = document.getElementById('itemsContainer');
      if (!container) return;

      let html = '<div class="items-grid">';
      
      for (let i = 0; i < currentTrip.items.length; i += 2) {
        html += `<div class="item-row">`;
        html += `<span class="item-number">${i + 1}</span>`;
        html += `<input type="text" class="item-name-input" id="item_${i}" value="${currentTrip.items[i] || ''}" placeholder="اسم البند" onchange="window.updatePriceLabel(${i})">`;
        html += `<button class="item-delete-btn" onclick="window.removeItem(${i})">✕</button>`;
        html += `</div>`;

        if (i + 1 < currentTrip.items.length) {
          html += `<div class="item-row">`;
          html += `<span class="item-number">${i + 2}</span>`;
          html += `<input type="text" class="item-name-input" id="item_${i + 1}" value="${currentTrip.items[i + 1] || ''}" placeholder="اسم البند" onchange="window.updatePriceLabel(${i + 1})">`;
          html += `<button class="item-delete-btn" onclick="window.removeItem(${i + 1})">✕</button>`;
          html += `</div>`;
        }
      }
      
      html += '</div>';
      container.innerHTML = html;
    }

    function updatePricesTable() {
      const container = document.getElementById('pricesContainer');
      if (!container) return;

      let html = '<div class="prices-grid">';
      
      for (let i = 0; i < currentTrip.items.length; i++) {
        const itemName = currentTrip.items[i] || `بند ${i + 1}`;
        html += `<div class="price-row">`;
        html += `<div class="price-row-header"><span id="priceLabel_${i}" title="${itemName}">${itemName.length > 15 ? itemName.substring(0, 12) + '...' : itemName}</span></div>`;
        html += `<div class="price-input-group"><label>${selectedCurrency}:</label> <input type="number" id="price_${i}" class="price-input" value="${currentTrip.prices[i] || 0}" step="0.01" min="0" placeholder="أدخل السعر"></div>`;
        html += `</div>`;
      }
      
      html += '</div>';
      container.innerHTML = html;
    }

    function updatePriceLabel(index) {
      const itemInput = document.getElementById(`item_${index}`);
      if (itemInput) {
        currentTrip.items[index] = itemInput.value;
        const priceLabel = document.getElementById(`priceLabel_${index}`);
        if (priceLabel) {
          const displayText = itemInput.value || `بند ${index + 1}`;
          priceLabel.textContent = displayText.length > 15 ? displayText.substring(0, 12) + '...' : displayText;
          priceLabel.title = displayText;
        }
      }
    }

    function addItem() {
      currentTrip.items.push('');
      currentTrip.prices.push(0);
      updateItemsTable();
      updatePricesTable();
    }

    function removeItem(index) {
      showConfirm('هل أنت متأكد من حذف هذا البند؟', function() {
        currentTrip.items.splice(index, 1);
        currentTrip.prices.splice(index, 1);
        updateItemsTable();
        updatePricesTable();
      });
    }

    function selectCurrency(currency) {
      selectedCurrency = currency;
      
      document.querySelectorAll('.currency-option').forEach(opt => {
        opt.classList.remove('selected');
      });
      
      const radios = document.querySelectorAll('input[name="currency"]');
      for (let i = 0; i < radios.length; i++) {
        if (radios[i].value === currency) {
          radios[i].closest('.currency-option').classList.add('selected');
          break;
        }
      }
      
      if (currentTrip.name) {
        loadTripPrices(currentTrip.name, currency);
      } else {
        updatePricesTable();
      }
    }

    async function loadTrip() {
      const tripName = document.getElementById('tripName').value;
      if (!tripName) {
        showAlert('الرجاء إدخال اسم الرحلة');
        return;
      }

      try {
        const def = await jsonp('getTripDefinition', { tripName });
        
        if (def && def.name) {
          currentTrip = {
  id: def.id,
  name: def.name,
  category: def.category,
  items: Array.isArray(def.items) ? def.items : [],
  prices: new Array(def.items?.length || 0).fill(0),
  hasCost: def.hasCost || false
};
          document.getElementById('tripCategory').value = def.category;
          
          const costCheckbox = document.getElementById('hasCost');
          if (costCheckbox) {
            costCheckbox.checked = currentTrip.hasCost;
          }
          
          updateItemsTable();
          await loadTripPrices(def.name, selectedCurrency);
        } else {
          showAlert(`لم يتم العثور على الرحلة "${tripName}"`);
        }
      } catch (err) {
        showAlert('خطأ في تحميل الرحلة: ' + err.message);
      }
    }

    async function loadTripPrices(tripName, currency) {
      try {
        const data = await jsonp('getTripPrices', {
          tripName: tripName,
          currency: currency,
          category: currentTrip.category
        });
        
        if (data && data.prices) {
          for (let i = 0; i < currentTrip.prices.length; i++) {
            if (i < data.prices.length) {
              currentTrip.prices[i] = data.prices[i];
            }
          }
          if (data.hasCost !== undefined) {
            currentTrip.hasCost = data.hasCost;
            const costCheckbox = document.getElementById('hasCost');
            if (costCheckbox) costCheckbox.checked = currentTrip.hasCost;
          }
          updatePricesTable();
        } else {
          for (let i = 0; i < currentTrip.prices.length; i++) {
            currentTrip.prices[i] = 0;
          }
          updatePricesTable();
        }
      } catch (err) {
        console.error('خطأ في تحميل الأسعار:', err);
        for (let i = 0; i < currentTrip.prices.length; i++) {
          currentTrip.prices[i] = 0;
        }
        updatePricesTable();
      }
    }

    async function saveTrip() {
      const tripName = document.getElementById('tripName').value;
      const category = document.getElementById('tripCategory').value;
      const bankPercent = parseFloat(document.getElementById('bankPercentage').value) || 2.5;
      const hasCost = document.getElementById('hasCost').checked;

      if (!tripName) {
        showAlert('الرجاء إدخال اسم الرحلة');
        return;
      }
      if (!category) {
        showAlert('الرجاء اختيار الفئة');
        return;
      }

      const existingTrip = allTrips.find(t => t.name.toLowerCase() === tripName.toLowerCase());
      if (existingTrip) {
        showAlert('⚠️ هذه الرحلة موجودة بالفعل. استخدم تعديل الرحلة بدلاً من الإضافة.');
        return;
      }

      const items = [];
      const prices = [];
      for (let i = 0; i < currentTrip.items.length; i++) {
        const itemEl = document.getElementById(`item_${i}`);
        if (itemEl) {
          const itemName = itemEl.value.trim();
          if (!itemName) {
            showAlert(`الرجاء إدخال اسم البند رقم ${i + 1}`);
            return;
          }
          items.push(itemName);
          
          const priceEl = document.getElementById(`price_${i}`);
          prices.push(priceEl ? parseFloat(priceEl.value) || 0 : 0);
        }
      }

      if (items.length === 0) {
        showAlert('يجب إضافة بند واحد على الأقل');
        return;
      }

      try {
        const tripDef = {
  tripName: tripName,
  category: category,
  items: JSON.stringify(items)  // تحويل المصفوفة إلى JSON string
};
        const defRes = await jsonp('saveTripDefinition', tripDef);
        
        if (defRes.success) {
          const priceData = {
            tripName: tripName,
            category: category,
            currency: selectedCurrency,
            prices: JSON.stringify(prices),
            bankPercentage: bankPercent,
            hasCost: hasCost,
            isNewTrip: true
          };

          const priceRes = await jsonp('saveTripPrices', priceData);
          
          if (priceRes.success) {
            showAlert('✅ تم إنشاء الرحلة بنجاح');
            await loadAllTrips();
            newTrip();
          } else {
            showAlert('❌ خطأ في حفظ الأسعار: ' + priceRes.message);
          }
        } else {
          showAlert('❌ خطأ في حفظ تعريف الرحلة: ' + defRes.message);
        }
      } catch (err) {
        showAlert('❌ خطأ في الاتصال: ' + err.message);
      }
    }

    async function updateTrip() {
      if (!currentTrip.name) {
        showAlert('الرجاء تحميل رحلة أولاً');
        return;
      }

      const items = [];
      const prices = [];
      for (let i = 0; i < currentTrip.items.length; i++) {
        const itemEl = document.getElementById(`item_${i}`);
        if (itemEl) {
          items.push(itemEl.value.trim() || `بند ${i + 1}`);
          const priceEl = document.getElementById(`price_${i}`);
          prices.push(priceEl ? parseFloat(priceEl.value) || 0 : 0);
        }
      }

      const category = document.getElementById('tripCategory').value;
      const bankPercent = parseFloat(document.getElementById('bankPercentage').value) || 2.5;
      const hasCost = document.getElementById('hasCost').checked;

      showConfirm(`تحديث أسعار الرحلة "${currentTrip.name}" بالعملة ${selectedCurrency}؟`, async function() {
        try {
          const res = await jsonp('updateTrip', {
            tripName: currentTrip.name,
            category: category,
            currency: selectedCurrency,
            prices: JSON.stringify(prices),
            hasCost: hasCost,
            bankPercentage: bankPercent
          });
          
          if (res.success) {
            showAlert('✅ ' + res.message);
            
            if (selectedCurrency === '$') {
              showConfirm('هل تريد إدخال أسعار هذه الرحلة بالجنيه؟', function() {
                selectCurrency('LE');
              }, function() {
                resetForm();
                showTab('add');
              });
            } else {
              resetForm();
              showTab('add');
            }
          } else {
            showAlert('❌ خطأ: ' + res.message);
          }
        } catch (err) {
          showAlert('❌ خطأ في الاتصال: ' + err.message);
        }
      });
    }

    async function deleteCurrentTrip() {
      if (!currentTrip.name) {
        showAlert('الرجاء اختيار رحلة أولاً');
        return;
      }

      showConfirm(`هل أنت متأكد من حذف الرحلة "${currentTrip.name}"؟`, async function() {
        try {
          const res = await jsonp('deleteTrip', { tripName: currentTrip.name });
          
          if (res.success) {
            showAlert('✅ تم حذف الرحلة بنجاح');
            await loadAllTrips();
            newTrip();
          } else {
            showAlert('❌ خطأ في حذف الرحلة: ' + res.message);
          }
        } catch (err) {
          showAlert('❌ خطأ في الاتصال: ' + err.message);
        }
      });
    }

    async function showTripsList() {
      const content = document.getElementById('mainContent');
      
      content.innerHTML = `
        <div class="card">
          <div class="card-title">🔍 البحث في الرحلات</div>
          <div class="search-box">
            <input type="text" id="tripSearch" placeholder="ابحث عن رحلة..." onkeyup="window.filterTripsList()">
          </div>
        </div>
        <div id="tripsListContainer" style="text-align: center; padding: 50px;">جاري التحميل...</div>
      `;

      await loadTripsListData();
    }

    async function loadTripsListData() {
      try {
        const trips = await jsonp('getAllTrips');
        
        if (!trips || trips.length === 0) {
          document.getElementById('tripsListContainer').innerHTML = '<div style="text-align: center; padding: 50px;">لا توجد رحلات</div>';
          return;
        }

        trips.sort((a, b) => a.name.localeCompare(b.name, 'ar'));
        window.allTripsList = trips;
        displayFilteredTrips(trips);
      } catch (err) {
        document.getElementById('tripsListContainer').innerHTML = '<div style="color: red; text-align: center; padding: 50px;">خطأ في تحميل البيانات</div>';
      }
    }

    function filterTripsList() {
      const searchText = document.getElementById('tripSearch').value.toLowerCase();
      if (!window.allTripsList) return;
      
      const filtered = window.allTripsList.filter(trip => 
        trip.name.toLowerCase().includes(searchText) || 
        (trip.category && trip.category.toLowerCase().includes(searchText))
      );
      displayFilteredTrips(filtered);
    }

    function displayFilteredTrips(trips) {
      let html = '<div class="trips-table-container"><table class="trips-table"><tr><th>الرحلة</th><th>الفئة</th><th>عدد البنود</th><th>تكلفة</th><th>الإجراءات</th></tr>';
      
      trips.forEach(trip => {
        const itemCount = trip.totalItems || 0;
        const hasCostIcon = trip.hasCost ? '✅' : '❌';
        
        html += `
          <tr>
            <td>${trip.name}</td>
            <td>${trip.category || '-'}</td>
            <td>${itemCount}</td>
            <td>${hasCostIcon}</td>
            <td>
              <button class="btn-secondary btn-small" onclick="window.editTripFromList('${trip.name}')">✏️ تعديل</button>
            </td>
          </tr>
        `;
      });
      
      html += '</table></div>';
      document.getElementById('tripsListContainer').innerHTML = html;
    }

    function editTripFromList(tripName) {
      showTab('edit');
      setTimeout(function() {
        document.getElementById('tripName').value = tripName;
        loadTrip();
      }, 200);
    }

    function resetForm() {
      if (isEditMode) {
        showEditForm();
      } else {
        newTrip();
      }
    }

    function logout() {
      showConfirm('هل أنت متأكد من تسجيل الخروج؟', function() {
        sessionStorage.removeItem('currentUser');
        localStorage.removeItem('currentUser');
        
        // العودة إلى صفحة Dashboard مباشرة
        window.top.location.href = '?page=Dashboard';
      });
    }

    // تعريف الدوال العامة
    window.showTab = showTab;
    window.newTrip = newTrip;
    window.addItem = addItem;
    window.removeItem = removeItem;
    window.selectCurrency = selectCurrency;
    window.saveTrip = saveTrip;
    window.updateTrip = updateTrip;
    window.updatePriceLabel = updatePriceLabel;
    window.deleteCurrentTrip = deleteCurrentTrip;
    window.resetForm = resetForm;
    window.logout = logout;
    window.showAlert = showAlert;
    window.showConfirm = showConfirm;
    window.filterTripsList = filterTripsList;
    window.editTripFromList = editTripFromList;
    window.loadTrip = loadTrip;
  </script>
</body>
</html>
