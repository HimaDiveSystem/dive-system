<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تعديل أسعار الرحلة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:   #0d1b3e;
      --navy2:  #152952;
      --gold:   #f0b429;
      --gold2:  #ffd166;
      --teal:   #0a7c6e;
      --teal2:  #0ea58f;
      --bg:     #f0f4f8;
      --white:  #ffffff;
      --text:   #1a2640;
      --muted:  #6b7a99;
      --border: #d8e2f0;
      --danger: #e74c3c;
      --success: #27ae60;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Tajawal', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,.35);
      flex-shrink: 0;
    }
    .header-left { display:flex; align-items:center; gap:14px; }
    .header-logo {
      width: 38px; height: 38px;
      background: var(--gold);
      border-radius: 10px;
      display: flex; align-items:center; justify-content:center;
      font-size: 20px;
    }
    .header-title {
      color: var(--gold2);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: .3px;
    }
    .header-title span { color: rgba(255,255,255,.5); font-weight: 400; font-size: 13px; display:block; }

    .close-btn {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      color: white;
      padding: 8px 18px;
      border-radius: 30px;
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      font-weight: 700;
      display: flex; align-items:center; gap:6px;
      transition: .2s;
    }
    .close-btn:hover { background: rgba(255,255,255,.2); }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── CARD ── */
    .card {
      background: var(--white);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 4px 20px rgba(13,27,62,.1);
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .trip-title {
      font-size: 24px;
      font-weight: 900;
      color: var(--navy);
      margin-bottom: 6px;
    }
    .trip-category {
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border);
    }

    /* ── FORM GRID ── */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-weight: 700;
      font-size: 13px;
    }
    .form-control {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 16px;
      font-family: 'Tajawal', sans-serif;
      font-size: 15px;
      transition: .2s;
      background: var(--white);
    }
    .form-control:focus {
      outline: none;
      border-color: var(--gold);
    }
    .form-control[readonly] {
      background: var(--bg);
      color: var(--muted);
    }

    /* ── CURRENCY SELECTOR ── */
    .currency-selector {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .cur-option {
      flex: 1;
      min-width: 100px;
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: 40px;
      background: var(--white);
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s;
      text-align: center;
    }
    .cur-option:hover {
      border-color: var(--gold);
    }
    .cur-option.active {
      background: var(--navy);
      color: var(--gold2);
      border-color: var(--navy);
      box-shadow: 0 4px 12px rgba(13,27,62,.3);
    }

    /* ── BANK PERCENTAGE ── */
    .bank-row {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #f8fafd;
      padding: 16px 20px;
      border-radius: 18px;
      margin-bottom: 24px;
    }
    .bank-row label {
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }
    .bank-row input {
      width: 100px;
      padding: 8px 12px;
      border: 2px solid var(--border);
      border-radius: 30px;
      text-align: center;
      font-family: 'Tajawal', sans-serif;
      font-weight: 700;
    }
    .bank-hint {
      color: var(--muted);
      font-size: 12px;
    }

    /* ── COST TOGGLE ── */
    .cost-toggle {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff9e6;
      border: 2px solid var(--gold);
      border-radius: 18px;
      padding: 16px 20px;
      margin-bottom: 28px;
    }
    .cost-toggle input[type="checkbox"] {
      width: 22px;
      height: 22px;
      cursor: pointer;
      accent-color: var(--gold);
    }
    .cost-toggle label {
      font-weight: 700;
      color: var(--navy);
      font-size: 15px;
      flex: 1;
    }
    .cost-warning {
      color: var(--danger);
      font-size: 12px;
      font-weight: 500;
      background: rgba(231,76,60,.1);
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* ── PRICES TABLE ── */
    .prices-table {
      margin: 24px 0;
      border: 2px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
    }
    .prices-header {
      display: grid;
      grid-template-columns: 1fr 100px;
      background: var(--navy);
      color: var(--gold2);
      padding: 12px 16px;
      font-weight: 700;
      font-size: 14px;
    }
    .price-row {
      display: grid;
      grid-template-columns: 1fr 100px;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    .price-row:last-child { border-bottom: none; }
    .price-row .item-name {
      color: var(--text);
      font-weight: 600;
      font-size: 14px;
    }
    .price-row .item-name small {
      color: var(--muted);
      font-size: 11px;
      margin-right: 6px;
    }
    .price-row input {
      width: 100%;
      padding: 8px;
      border: 2px solid var(--border);
      border-radius: 12px;
      text-align: center;
      font-family: 'Tajawal', sans-serif;
      font-weight: 700;
    }

    /* ── ACTION BUTTONS ── */
    .action-buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      margin-top: 32px;
    }
    .btn-primary {
      background: var(--navy);
      color: var(--gold2);
      border: none;
      padding: 14px 36px;
      border-radius: 40px;
      font-family: 'Tajawal', sans-serif;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      transition: .2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary:hover {
      background: var(--gold);
      color: var(--navy);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(240,180,41,.4);
    }
    .btn-secondary {
      background: var(--bg);
      color: var(--text);
      border: 2px solid var(--border);
      padding: 12px 30px;
      border-radius: 40px;
      font-family: 'Tajawal', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: .2s;
    }
    .btn-secondary:hover {
      background: var(--border);
    }

    /* ── LOADING ── */
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 20px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid var(--border);
      border-top: 4px solid var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ALERT MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.6);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-overlay.show { display: flex; }
    .modal-content {
      background: var(--white);
      width: 90%;
      max-width: 450px;
      border-radius: 28px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,.3);
    }
    .modal-icon { font-size: 56px; margin-bottom: 16px; }
    .modal-title {
      color: var(--navy);
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 12px;
    }
    .modal-message {
      color: var(--text);
      font-size: 15px;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .modal-btn {
      padding: 12px 28px;
      border: none;
      border-radius: 40px;
      font-family: 'Tajawal', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: .2s;
    }
    .modal-btn-primary {
      background: var(--navy);
      color: var(--gold2);
    }
    .modal-btn-primary:hover { background: var(--gold); color: var(--navy); }
    .modal-btn-success {
      background: var(--success);
      color: white;
    }
    .modal-btn-success:hover { background: #2ecc71; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="header-logo">✏️</div>
    <div class="header-title">
      تعديل أسعار الرحلة
      <span id="tripNameHeader"></span>
    </div>
  </div>
  <button class="close-btn" onclick="goBack()">✕ إغلاق</button>
</div>

<!-- Content -->
<div class="content" id="mainContent">
  <div class="loading-screen">
    <div class="spinner"></div>
    <p>جاري تحميل بيانات الرحلة...</p>
  </div>
</div>

<!-- Alert Modal -->
<div class="modal-overlay" id="alertModal">
  <div class="modal-content">
    <div class="modal-icon" id="alertIcon">ℹ️</div>
    <div class="modal-title" id="alertTitle"></div>
    <div class="modal-message" id="alertMessage"></div>
    <div class="modal-buttons" id="alertButtons">
      <button class="modal-btn modal-btn-primary" onclick="closeAlert()">موافق</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyBfwHQQoHb9E2bq0l-u6FLMD2XFKu_d8rZuJLnIq5iko82Bn93Emki6-cvDF_XOyRp/exec';

let currentUser = null;
let currentTrip = null;        // بيانات الرحلة من TripDefinitions
let currentPrices = null;      // الأسعار الحالية (إن وجدت)
let currentCurrency = '$';      // العملة الحالية في النموذج
let bankPercentage = 2.5;       // نسبة البنك الافتراضية
let hasCost = false;            // حالة Cost
let isSaving = false;           // لمنع الحفظ المتكرر
let saveStep = 0;               // 0 = دولار, 1 = جنيه

// ============ INIT ============
document.addEventListener('DOMContentLoaded', () => {
  // التحقق من تسجيل الدخول
  let ud = sessionStorage.getItem('currentUser');
  if (!ud) {
    const p = new URLSearchParams(location.search), u = p.get('user');
    if (u) { ud = decodeURIComponent(u); sessionStorage.setItem('currentUser', ud); }
  }
  if (!ud) { location.href = 'index.html'; return; }
  try { currentUser = JSON.parse(ud); } catch(e) { location.href = 'index.html'; return; }

  // الحصول على اسم الرحلة من URL
  const params = new URLSearchParams(window.location.search);
  const tripName = params.get('tripName');
  if (!tripName) {
    showAlert('خطأ', 'لم يتم تحديد الرحلة', '❌', () => goBack());
    return;
  }

  document.getElementById('tripNameHeader').textContent = tripName;
  loadTripData(tripName);
});

// ============ JSONP ============
function jsonp(action, params = {}) {
  return new Promise((res, rej) => {
    const cb = '_p' + Date.now() + Math.floor(Math.random() * 99999);
    params.action = action; params.callback = cb;
    const qs = Object.entries(params).map(([k,v]) => k+'='+encodeURIComponent(String(v??''))).join('&');
    const sc = document.createElement('script');
    const to = setTimeout(() => { delete window[cb]; sc.remove(); rej(new Error('انتهت المهلة')); }, 30000);
    window[cb] = d => { clearTimeout(to); delete window[cb]; sc.remove(); res(d); };
    sc.onerror = () => { clearTimeout(to); delete window[cb]; sc.remove(); rej(new Error('فشل الاتصال')); };
    sc.src = GAS_URL + '?' + qs;
    document.head.appendChild(sc);
  });
}

// ============ تحميل بيانات الرحلة ============
async function loadTripData(tripName) {
  try {
    // 1. جلب تعريف الرحلة
    const tripDef = await jsonp('getTripDefinition', { tripName });
    if (!tripDef) throw new Error('الرحلة غير موجودة');

    currentTrip = tripDef;
    
    // 2. محاولة جلب الأسعار بالدولار (كعينة)
    try {
      const prices = await jsonp('getTripPrices', {
        tripName: tripName,
        currency: '$',
        category: tripDef.category || ''
      });
      currentPrices = prices;
    } catch(e) {
      // لا توجد أسعار بعد
      currentPrices = null;
    }

    renderEditForm();
  } catch(e) {
    showAlert('خطأ', 'فشل تحميل بيانات الرحلة: ' + e.message, '❌', () => goBack());
  }
}

// ============ عرض نموذج التعديل ============
function renderEditForm() {
  if (!currentTrip) return;

  // تجهيز صفوف الأسعار
  let priceRows = '';
  for (let i = 0; i < currentTrip.totalItems; i++) {
    const itemName = currentTrip.items[i] || `بند ${i+1}`;
    const currentPrice = (currentPrices?.prices && currentPrices.prices[i]) ? currentPrices.prices[i] : '';
    
    priceRows += `
      <div class="price-row">
        <div class="item-name">
          ${itemName}
          <small>${i+1}</small>
        </div>
        <input type="number" id="price_${i}" value="${currentPrice}" step="0.01" min="0" placeholder="0.00">
      </div>
    `;
  }

  // تحديد العملة الحالية (من currentPrices أو افتراضي دولار)
  if (currentPrices?.currency) {
    currentCurrency = currentPrices.currency;
  }
  if (currentPrices?.hasCost !== undefined) {
    hasCost = currentPrices.hasCost;
  }

  const html = `
    <div class="card">
      <div class="trip-title">${currentTrip.name}</div>
      <div class="trip-category">${currentTrip.category || 'غير مصنف'} · ${currentTrip.totalItems} بنود</div>

      <div class="form-grid">
        <div class="form-group">
          <label>اسم الرحلة</label>
          <input type="text" class="form-control" value="${currentTrip.name}" readonly>
        </div>
        <div class="form-group">
          <label>الفئة</label>
          <input type="text" class="form-control" value="${currentTrip.category || ''}" readonly>
        </div>
        <div class="form-group">
          <label>عدد البنود</label>
          <input type="number" class="form-control" value="${currentTrip.totalItems}" readonly>
        </div>
      </div>

      <div class="currency-selector">
        <button class="cur-option ${currentCurrency === '$' ? 'active' : ''}" onclick="selectCurrency('$')">💵 دولار ($)</button>
        <button class="cur-option ${currentCurrency === '€' ? 'active' : ''}" onclick="selectCurrency('€')">💶 يورو (€)</button>
        <button class="cur-option ${currentCurrency === '£' ? 'active' : ''}" onclick="selectCurrency('£')">💷 إسترليني (£)</button>
        <button class="cur-option ${currentCurrency === 'LE' ? 'active' : ''}" onclick="selectCurrency('LE')">🇪🇬 جنيه (LE)</button>
      </div>

      <div class="bank-row">
        <label>نسبة البنك:</label>
        <input type="number" id="bankPercentage" value="${bankPercentage}" step="0.1" min="0" max="100">
        <span class="bank-hint">تستخدم لحساب أسعار الفيزا</span>
      </div>

      <div class="cost-toggle">
        <input type="checkbox" id="hasCost" ${hasCost ? 'checked' : ''}>
        <label>
          💰 هذه الرحلة لها تكلفة (Cost)
          <span class="cost-warning">⚠️ يؤثر على عمولة السيلز</span>
        </label>
      </div>

      <div class="prices-table">
        <div class="prices-header">
          <div>البند</div>
          <div>السعر</div>
        </div>
        ${priceRows}
      </div>

      <div class="action-buttons">
        <button class="btn-primary" onclick="savePrices()">
          ✏️ تحديث الأسعار
        </button>
        <button class="btn-secondary" onclick="goBack()">
          إلغاء
        </button>
      </div>
    </div>
  `;

  document.getElementById('mainContent').innerHTML = html;
}

// ============ اختيار العملة ============
function selectCurrency(currency) {
  if (currency === currentCurrency) return;
  
  currentCurrency = currency;
  
  // تحديث واجهة الأزرار
  document.querySelectorAll('.cur-option').forEach(btn => {
    btn.classList.remove('active');
  });
  document.querySelectorAll('.cur-option').forEach(btn => {
    if (btn.textContent.includes(currency)) {
      btn.classList.add('active');
    }
  });

  // إذا كانت هناك أسعار محفوظة مسبقاً، نحاول تحميلها للعملة الجديدة
  loadPricesForCurrency(currency);
}

// ============ تحميل الأسعار للعملة المحددة ============
async function loadPricesForCurrency(currency) {
  try {
    const prices = await jsonp('getTripPrices', {
      tripName: currentTrip.name,
      currency: currency,
      category: currentTrip.category || ''
    });
    
    if (prices && prices.prices) {
      // تحديث حقول الأسعار
      for (let i = 0; i < currentTrip.totalItems; i++) {
        const input = document.getElementById(`price_${i}`);
        if (input) {
          input.value = prices.prices[i] || '';
        }
      }
      
      // تحديث حالة Cost
      if (prices.hasCost !== undefined) {
        hasCost = prices.hasCost;
        document.getElementById('hasCost').checked = hasCost;
      }
    } else {
      // لا توجد أسعار لهذه العملة
      for (let i = 0; i < currentTrip.totalItems; i++) {
        const input = document.getElementById(`price_${i}`);
        if (input) {
          input.value = '';
        }
      }
    }
  } catch(e) {
    console.warn('لا توجد أسعار للعملة', currency);
    // إفراغ الحقول
    for (let i = 0; i < currentTrip.totalItems; i++) {
      const input = document.getElementById(`price_${i}`);
      if (input) input.value = '';
    }
  }
}

// ============ حفظ الأسعار ============
async function savePrices() {
  if (isSaving) return;
  isSaving = true;

  try {
    // جمع الأسعار من الحقول
    const prices = [];
    for (let i = 0; i < currentTrip.totalItems; i++) {
      const input = document.getElementById(`price_${i}`);
      const val = input ? parseFloat(input.value) : 0;
      prices.push(isNaN(val) ? 0 : val);
    }

    // التأكد من ملء جميع الأسعار
    const emptyIndex = prices.findIndex(p => p === 0 || isNaN(p));
    if (emptyIndex !== -1 && currentCurrency !== 'LE') {
      // نسمح بالأصفار فقط للجنيه
      showAlert('تنبيه', `الرجاء ملء سعر البند رقم ${emptyIndex + 1}`, '⚠️');
      isSaving = false;
      return;
    }

    // قراءة نسبة البنك وحالة Cost
    bankPercentage = parseFloat(document.getElementById('bankPercentage').value) || 2.5;
    hasCost = document.getElementById('hasCost').checked;

    // حفظ الأسعار
    const result = await jsonp('updateTrip', {
      tripName: currentTrip.name,
      category: currentTrip.category || '',
      currency: currentCurrency,
      prices: JSON.stringify(prices),
      hasCost: hasCost,
      bankPercentage: bankPercentage
    });

    if (result.success) {
      // نجاح الحفظ
      if (currentCurrency === '$' && saveStep === 0) {
        // الخطوة 1: تم حفظ الدولار، نطلب إدخال الجنيه
        saveStep = 1;
        showAlert(
          'تم الحفظ',
          '✅ تم حفظ أسعار الدولار بنجاح\n\nالرجاء الآن إدخال أسعار الرحلة بالجنيه المصري (LE)',
          '✅',
          () => {
            // تغيير العملة إلى LE
            selectCurrency('LE');
            closeAlert();
          }
        );
      } 
      else if (currentCurrency === 'LE' && saveStep === 1) {
        // الخطوة 2: تم حفظ الجنيه، ننهي العملية
        showAlert(
          'تم الحفظ',
          '✅ تم حفظ أسعار الجنيه بنجاح',
          '✅',
          () => {
            goBack(); // العودة إلى قائمة الرحلات
          }
        );
        saveStep = 0; // إعادة تعيين الخطوة
      }
      else {
        // حفظ عملة أخرى (يورو أو استرليني) - ننهي فوراً
        showAlert('تم الحفظ', '✅ تم حفظ الأسعار بنجاح', '✅', () => {
          goBack();
        });
      }
    } else {
      throw new Error(result.message || 'فشل الحفظ');
    }
  } catch(e) {
    showAlert('خطأ', '❌ ' + e.message, '❌');
  } finally {
    isSaving = false;
  }
}

// ============ دوال مساعدة ============
function goBack() {
  window.location.href = 'TripPriceList.html';
}

function showAlert(title, message, icon, callback) {
  document.getElementById('alertIcon').textContent = icon || 'ℹ️';
  document.getElementById('alertTitle').textContent = title;
  document.getElementById('alertMessage').textContent = message;
  
  const modal = document.getElementById('alertModal');
  modal.classList.add('show');
  
  // تخزين callback للاستخدام عند الإغلاق
  window.alertCallback = callback;
}

function closeAlert() {
  document.getElementById('alertModal').classList.remove('show');
  if (window.alertCallback) {
    const cb = window.alertCallback;
    window.alertCallback = null;
    cb();
  }
}

// تعريف الدوال العامة
window.selectCurrency = selectCurrency;
window.savePrices = savePrices;
window.goBack = goBack;
window.closeAlert = closeAlert;
</script>
