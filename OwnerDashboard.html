<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم صاحب المركز - نظام إدارة مراكز الغوص</title>
  <style>
    /* جميع الأنماط السابقة كما هي */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      display: flex;
      min-height: 100vh;
      background: #1a2634;
    }

    .sidebar {
      width: 280px;
      background: linear-gradient(180deg, #1e2b4f 0%, #152238 100%);
      color: white;
      padding: 30px 0;
      box-shadow: 4px 0 20px rgba(0, 20, 40, 0.2);
      position: fixed;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 0 25px 30px 25px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .sidebar-header h3 {
      color: #ffd966;
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .sidebar-header p {
      color: #b0c4de;
      font-size: 14px;
      opacity: 0.9;
    }

    .sidebar-menu {
      padding: 20px 0;
    }

    .menu-item {
      display: flex;
      align-items: center;
      padding: 14px 25px;
      margin: 8px 15px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #e0e0e0;
      font-size: 16px;
      font-weight: 500;
    }

    .menu-item:hover {
      background: rgba(255, 217, 102, 0.15);
      color: #ffd966;
      transform: translateX(5px);
    }

    .menu-item.active {
      background: #ffd966;
      color: #1e2b4f;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(255, 217, 102, 0.4);
    }

    .menu-item .icon {
      margin-left: 15px;
      font-size: 22px;
    }

    .main-content {
      flex: 1;
      margin-right: 280px;
      background: #e6f7ff;
      padding: 30px 40px;
      overflow-y: auto;
      min-height: 100vh;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #2a3747;
      padding: 18px 30px;
      border-radius: 50px;
      margin-bottom: 35px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
      border: 1px solid #3a4757;
    }

    .page-title {
      font-size: 28px;
      color: #ffd966;
      font-weight: 800;
      background: #1e2b4f;
      padding: 10px 30px;
      border-radius: 50px;
      border: 1px solid #ffd966;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .user-name {
      color: #ffffff;
      font-weight: 600;
      font-size: 16px;
      background: #1e2b4f;
      padding: 8px 20px;
      border-radius: 40px;
      border: 1px solid #ffd966;
    }

    .logout-btn {
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5253 100%);
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s;
      box-shadow: 0 5px 15px rgba(238, 82, 83, 0.3);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logout-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(238, 82, 83, 0.4);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      border-radius: 20px;
      padding: 15px 10px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0, 40, 80, 0.08);
      transition: transform 0.3s, box-shadow 0.3s;
      border: 1px solid #b0e0e6;
      cursor: pointer;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0, 40, 80, 0.15);
    }

    .stat-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .stat-label {
      color: #1e2b4f;
      font-size: 12px;
      margin-bottom: 8px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      color: #1e2b4f;
      font-size: 28px;
      font-weight: 800;
      line-height: 1.2;
    }

    .content-area {
      background: white;
      border-radius: 40px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 40, 80, 0.05);
      border: 1px solid #e6f0fa;
    }

    .content-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .content-header h2 {
      color: #1e2b4f;
      font-size: 24px;
      font-weight: 700;
    }

    .btn-primary {
      background: #1e2b4f;
      color: white;
      border: 1px solid #ffd966;
      padding: 12px 25px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary:hover {
      background: #ffd966;
      color: #1e2b4f;
    }

    .btn-secondary {
      background: #e9f0fa;
      color: #1e2b4f;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s;
    }

    .btn-secondary:hover {
      background: #d0ddeb;
    }

    .table-container {
      overflow-x: auto;
      border-radius: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #1e2b4f;
      color: #ffd966;
      padding: 15px 10px;
      text-align: right;
      font-weight: 600;
      font-size: 14px;
    }

    td {
      padding: 12px 10px;
      border-bottom: 1px solid #e9f0fa;
      color: #2c3e50;
    }

    tr:hover {
      background: #f5f9ff;
    }

    .status-badge {
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
      display: inline-block;
    }

    .status-active {
      background: #d4edda;
      color: #155724;
    }

    .status-inactive {
      background: #f8d7da;
      color: #721c24;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.3s;
      color: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .action-btn.view {
      background: #2ecc71;
    }
    .action-btn.view:hover {
      background: #27ae60;
      transform: translateY(-2px);
    }

    .action-btn.edit {
      background: #3498db;
    }
    .action-btn.edit:hover {
      background: #2980b9;
      transform: translateY(-2px);
    }

    .action-btn.delete {
      background: #e74c3c;
    }
    .action-btn.delete:hover {
      background: #c0392b;
      transform: translateY(-2px);
    }

    .welcome-area {
      background: white;
      border-radius: 40px;
      padding: 60px 40px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 40, 80, 0.05);
      border: 1px solid #e6f0fa;
    }

    .welcome-icon {
      font-size: 100px;
      margin-bottom: 25px;
      animation: gentle-float 3s ease-in-out infinite;
    }

    @keyframes gentle-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .welcome-area h2 {
      color: #1e2b4f;
      font-size: 32px;
      margin-bottom: 20px;
      font-weight: 700;
    }

    .welcome-area p {
      color: #4a5a72;
      font-size: 18px;
      line-height: 1.8;
      max-width: 600px;
      margin: 0 auto;
    }

    @media (max-width: 1300px) {
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .sidebar { width: 100px; }
      .sidebar-header p, .menu-item span:last-child { display: none; }
      .menu-item { justify-content: center; padding: 14px 0; margin: 8px 10px; }
      .menu-item .icon { margin-left: 0; font-size: 28px; }
      .main-content { margin-right: 100px; padding: 20px; }
    }

    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: 1fr; }
      .top-bar { flex-direction: column; gap: 15px; text-align: center; }
      .action-buttons { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>?? غوص</h3>
      <p>لوحة تحكم صاحب المركز</p>
    </div>
    <div class="sidebar-menu">
      <div class="menu-item active" onclick="window.showSection('welcome')">
        <span class="icon">??</span>
        <span>الرئيسية</span>
      </div>
      <div class="menu-item" onclick="window.loadBranches()">
        <span class="icon">???</span>
        <span>الفروع</span>
      </div>
      <div class="menu-item" onclick="window.loadStaff()">
        <span class="icon">??</span>
        <span>الموظفين</span>
      </div>
      <div class="menu-item" onclick="window.loadInvoices()">
        <span class="icon">??</span>
        <span>الفواتير</span>
      </div>
      <div class="menu-item" onclick="window.loadReports()">
        <span class="icon">??</span>
        <span>التقارير</span>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="top-bar">
      <div class="page-title">لوحة تحكم صاحب المركز</div>
      <div class="user-info">
        <span class="user-name" id="userNameDisplay">...</span>
        <button class="logout-btn" onclick="window.logout()">
          <span>??</span> خروج
        </button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card" onclick="window.loadBranches()">
        <div class="stat-icon">???</div>
        <div class="stat-label">الفروع</div>
        <div class="stat-value" id="branchesCount">0</div>
      </div>
      <div class="stat-card" onclick="window.loadStaff()">
        <div class="stat-icon">??</div>
        <div class="stat-label">الموظفين</div>
        <div class="stat-value" id="staffCount">0</div>
      </div>
      <div class="stat-card" onclick="window.loadInvoices()">
        <div class="stat-icon">??</div>
        <div class="stat-label">فواتير اليوم</div>
        <div class="stat-value" id="todayInvoices">0</div>
      </div>
      <div class="stat-card" onclick="window.loadReports()">
        <div class="stat-icon">??</div>
        <div class="stat-label">مبيعات اليوم</div>
        <div class="stat-value" id="todaySales">0</div>
      </div>
    </div>

    <div id="contentArea"></div>
  </div>

  <!-- مودال مخصص للرسائل التأكيدية -->
  <div id="customConfirmModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 9999;">
    <div style="background: white; width: 400px; border-radius: 30px; padding: 30px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3);">
      <div style="font-size: 50px; margin-bottom: 20px;">?</div>
      <h3 style="color: #1e2b4f; margin-bottom: 20px;" id="confirmMessage">هل أنت متأكد من تسجيل الخروج؟</h3>
      <div style="display: flex; gap: 15px; justify-content: center;">
        <button id="confirmOk" class="btn-primary" style="background: #e74c3c;">نعم</button>
        <button id="confirmCancel" class="btn-secondary">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- مودال مخصص للرسائل التنبيهية -->
  <div id="customAlertModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 9999;">
    <div style="background: white; width: 400px; border-radius: 30px; padding: 30px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3);">
      <div style="font-size: 50px; margin-bottom: 20px;">??</div>
      <h3 style="color: #1e2b4f; margin-bottom: 20px;" id="alertMessage"></h3>
      <button id="alertOk" class="btn-primary">موافق</button>
    </div>
  </div>

  <script>
    // استخراج بيانات المستخدم من الرابط
function getUserFromUrl() {
  const urlParams = new URLSearchParams(window.location.search);
  const userParam = urlParams.get('user');
  if (userParam) {
    try {
      return JSON.parse(decodeURIComponent(userParam));
    } catch (e) {
      console.error('خطأ في فك تشفير بيانات المستخدم:', e);
      return null;
    }
  }
  return null;
}

// التحقق من وجود المستخدم عند تحميل الصفحة
document.addEventListener('DOMContentLoaded', function() {
  const user = getUserFromUrl();
  if (!user) {
    // إذا لم يكن هناك مستخدم في الرابط، توجه إلى صفحة تسجيل الدخول
    window.location.replace('?page=Login');
    return;
  }
  
  // تخزين المستخدم في متغير عام
  window.currentUser = user;
  
  // تحديث اسم المستخدم في الواجهة
  const userNameElement = document.getElementById('userNameDisplay');
  if (userNameElement) {
    userNameElement.textContent = user.name || 'User';
  }
  
  // متابعة تحميل الصفحة...
});
    console.log("?? OwnerDashboard بدأ التحميل");
    
    let currentUser = null;
    let branches = [];
    let staff = [];

    document.addEventListener('DOMContentLoaded', function() {
      console.log("?? DOMContentLoaded تم التفعيل");
      const userData = localStorage.getItem('currentUser');
      console.log("?? userData من localStorage:", userData);
      
      if (!userData) {
        console.log("? لا يوجد مستخدم، التوجيه إلى Login");
        window.top.location.href = '?page=Login';
        return;
      }
      
      try {
        currentUser = JSON.parse(userData);
        console.log("? currentUser:", currentUser);
        document.getElementById('userNameDisplay').textContent = currentUser.name || 'صاحب مركز';
        
        if (currentUser.type !== 'Owner' && currentUser.type !== 'Admin') {
          console.log("? نوع المستخدم غير مسموح:", currentUser.type);
          window.top.location.href = '?page=Login';
          return;
        }
      } catch (e) {
        console.error("? خطأ في تحليل userData:", e);
        window.top.location.href = '?page=Login';
        return;
      }
      
      console.log("?? استدعاء showSection('welcome')");
      showSection('welcome');
      loadStats();
    });

    // دوال المودال المخصص
    function showConfirm(message, onConfirm) {
      const modal = document.getElementById('customConfirmModal');
      document.getElementById('confirmMessage').innerText = message;
      modal.style.display = 'flex';
      
      const okBtn = document.getElementById('confirmOk');
      const cancelBtn = document.getElementById('confirmCancel');
      
      const okHandler = function() {
        modal.style.display = 'none';
        onConfirm();
        okBtn.removeEventListener('click', okHandler);
        cancelBtn.removeEventListener('click', cancelHandler);
      };
      
      const cancelHandler = function() {
        modal.style.display = 'none';
        okBtn.removeEventListener('click', okHandler);
        cancelBtn.removeEventListener('click', cancelHandler);
      };
      
      okBtn.addEventListener('click', okHandler);
      cancelBtn.addEventListener('click', cancelHandler);
    }

    function showAlert(message) {
      const modal = document.getElementById('customAlertModal');
      document.getElementById('alertMessage').innerText = message;
      modal.style.display = 'flex';
      
      const okBtn = document.getElementById('alertOk');
      const okHandler = function() {
        modal.style.display = 'none';
        okBtn.removeEventListener('click', okHandler);
      };
      
      okBtn.addEventListener('click', okHandler);
    }

    // دالة الخروج المعدلة
    function logout() {
      showConfirm('هل أنت متأكد من تسجيل الخروج؟', function() {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('appUrl');
        const appUrl = localStorage.getItem('appUrl');
        if (appUrl) {
          window.top.location.href = appUrl + '?page=Login';
        } else {
          window.top.location.href = '?page=Login';
        }
      });
    }

    function showSection(section) {
      console.log("?? showSection تم استدعاؤها بالقسم:", section);
      document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
      
      if (section === 'welcome') {
        document.querySelector('.menu-item[onclick*="showSection(\'welcome\')"]').classList.add('active');
        const contentArea = document.getElementById('contentArea');
        if (contentArea) {
          contentArea.innerHTML = `
            <div class="welcome-area">
              <div class="welcome-icon">???</div>
              <h2>مرحباً بك في لوحة تحكم صاحب المركز</h2>
              <p>من هنا يمكنك متابعة فروعك وموظفيك وفواتيرك بكل سهولة</p>
            </div>
          `;
          console.log("? تم تحديث contentArea");
        } else {
          console.error("? contentArea غير موجود!");
        }
      }
    }

    function loadStats() {
      document.getElementById('branchesCount').textContent = '0';
      document.getElementById('staffCount').textContent = '0';
      document.getElementById('todayInvoices').textContent = '0';
      document.getElementById('todaySales').textContent = '0';
    }

    function loadBranches() {
      document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
      document.querySelector('.menu-item[onclick*="loadBranches()"]').classList.add('active');
      
      document.getElementById('contentArea').innerHTML = `
        <div class="content-area">
          <div class="content-header">
            <h2>??? فروعي</h2>
            <button class="btn-primary" onclick="window.openAddBranchModal()">
              <span>?</span> إضافة فرع جديد
            </button>
          </div>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>اسم الفرع</th>
                  <th>المدير</th>
                  <th>الجوال</th>
                  <th>الحالة</th>
                  <th>الإجراءات</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td colspan="5" style="text-align: center;">لا توجد فروع حالياً</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function loadStaff() {
      document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
      document.querySelector('.menu-item[onclick*="loadStaff()"]').classList.add('active');
      
      document.getElementById('contentArea').innerHTML = `
        <div class="content-area">
          <div class="content-header">
            <h2>?? موظفيني</h2>
            <button class="btn-primary" onclick="window.openAddEmployeeModal()">
              <span>?</span> إضافة موظف جديد
            </button>
          </div>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>الاسم</th>
                  <th>الفرع</th>
                  <th>الوظيفة</th>
                  <th>الجوال</th>
                  <th>الحالة</th>
                  <th>الإجراءات</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td colspan="6" style="text-align: center;">لا يوجد موظفين حالياً</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function loadInvoices() {
      document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
      document.querySelector('.menu-item[onclick*="loadInvoices()"]').classList.add('active');
      
      document.getElementById('contentArea').innerHTML = `
        <div class="content-area">
          <div class="content-header">
            <h2>?? الفواتير</h2>
          </div>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>رقم الفاتورة</th>
                  <th>التاريخ</th>
                  <th>الفرع</th>
                  <th>المندوب</th>
                  <th>المبلغ</th>
                  <th>الحالة</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td colspan="6" style="text-align: center;">لا توجد فواتير حالياً</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function loadReports() {
      document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
      document.querySelector('.menu-item[onclick*="loadReports()"]').classList.add('active');
      
      document.getElementById('contentArea').innerHTML = `
        <div class="content-area">
          <div class="content-header">
            <h2>?? التقارير</h2>
          </div>
          <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px;">
            <div style="background: #1e2b4f; padding: 20px; border-radius: 20px; text-align: center; cursor: pointer;" onclick="showAlert('تقرير المبيعات - قيد التطوير')">
              <div style="font-size: 40px; margin-bottom: 10px;">??</div>
              <div style="color: #ffd966; font-size: 18px;">تقرير المبيعات</div>
            </div>
