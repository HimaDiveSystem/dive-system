<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>لوحة تحكم صاحب المركز</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
    body{display:flex;min-height:100vh;background:#1a2634;}

    /* ── Sidebar ── */
    .sidebar{width:275px;background:linear-gradient(180deg,#0f1f3d 0%,#152238 100%);color:white;padding:28px 0;box-shadow:4px 0 20px rgba(0,20,40,.2);position:fixed;height:100vh;overflow-y:auto;z-index:50;}
    .sb-head{padding:0 22px 24px;border-bottom:1px solid rgba(255,255,255,.1);}
    .sb-head h3{color:#f5c842;font-size:24px;font-weight:900;margin-bottom:5px;}
    .sb-head p{color:#b0c4de;font-size:13px;}
    .sb-menu{padding:16px 0;}
    .mi{display:flex;align-items:center;padding:13px 22px;margin:5px 12px;border-radius:40px;cursor:pointer;transition:all .3s;color:#e0e0e0;font-size:15px;font-weight:600;gap:13px;}
    .mi:hover{background:rgba(245,200,66,.15);color:#f5c842;transform:translateX(-5px);}
    .mi.active{background:#f5c842;color:#0f1f3d;font-weight:800;box-shadow:0 4px 12px rgba(245,200,66,.4);}
    .mi .icon{font-size:20px;flex-shrink:0;}
    .notif-badge{background:#dc2626;color:white;padding:1px 7px;border-radius:20px;font-size:11px;display:none;min-width:20px;text-align:center;margin-right:4px;}

    /* ── Main ── */
    .main{flex:1;margin-right:275px;background:#e6f7ff;padding:24px 32px;overflow-y:auto;min-height:100vh;}
    .top-bar{display:flex;justify-content:space-between;align-items:center;background:#2a3747;padding:15px 26px;border-radius:50px;margin-bottom:26px;box-shadow:0 5px 20px rgba(0,0,0,.2);border:1px solid #3a4757;}
    .page-title{font-size:22px;color:#f5c842;font-weight:800;background:#0f1f3d;padding:8px 24px;border-radius:50px;border:1px solid #f5c842;}
    .user-info{display:flex;align-items:center;gap:14px;}
    .user-name{color:white;font-weight:600;font-size:14px;background:#0f1f3d;padding:7px 18px;border-radius:40px;border:1px solid #f5c842;}
    .logout-btn{background:linear-gradient(135deg,#ff6b6b,#ee5253);color:white;border:none;padding:9px 20px;border-radius:40px;cursor:pointer;font-weight:700;font-size:13px;font-family:'Cairo',sans-serif;transition:all .3s;display:flex;align-items:center;gap:7px;}
    .logout-btn:hover{transform:translateY(-2px);}

    /* ── KPI Grid ── */
    .kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;}
    .kpi-card{background:white;border-radius:18px;padding:14px 10px;text-align:center;box-shadow:0 5px 15px rgba(0,40,80,.08);cursor:pointer;transition:transform .3s;border:1px solid #b0e0e6;position:relative;overflow:hidden;}
    .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,#0f1f3d);}
    .kpi-card:hover{transform:translateY(-5px);}
    .kpi-card.c-blue{--accent:#2563eb;}
    .kpi-card.c-gold{--accent:#f5c842;}
    .kpi-card.c-green{--accent:#16a34a;}
    .kpi-card.c-orange{--accent:#ea580c;}
    .kpi-card.c-red{--accent:#dc2626;}
    .kpi-icon{font-size:30px;margin-bottom:6px;}
    .kpi-label{color:#0f1f3d;font-size:11px;margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
    .kpi-val{color:#0f1f3d;font-size:26px;font-weight:900;line-height:1.2;}

    /* ── Content ── */
    .content-area{background:white;border-radius:32px;padding:24px;box-shadow:0 10px 30px rgba(0,40,80,.05);border:1px solid #e6f0fa;}
    .content-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
    .content-header h2{color:#0f1f3d;font-size:22px;font-weight:700;}
    .btn-primary{background:#0f1f3d;color:white;border:1px solid #f5c842;padding:10px 22px;border-radius:40px;cursor:pointer;font-weight:700;font-size:13px;font-family:'Cairo',sans-serif;transition:all .3s;display:inline-flex;align-items:center;gap:7px;}
    .btn-primary:hover{background:#f5c842;color:#0f1f3d;}

    /* ── Table ── */
    .tbl-cont{overflow-x:auto;border-radius:16px;}
    table{width:100%;border-collapse:collapse;}
    th{background:#0f1f3d;color:#f5c842;padding:13px 10px;text-align:right;font-weight:700;font-size:13px;}
    td{padding:11px 10px;border-bottom:1px solid #e9f0fa;color:#2c3e50;font-size:13px;}
    tr:hover{background:#f5f9ff;}
    .st-badge{padding:4px 12px;border-radius:30px;font-size:11px;font-weight:700;display:inline-block;}
    .st-active{background:#d4edda;color:#155724;}
    .st-inactive{background:#f8d7da;color:#721c24;}
    .act-btns{display:flex;gap:7px;}
    .act-btn{padding:5px 11px;border:none;border-radius:18px;cursor:pointer;font-size:12px;font-weight:600;color:white;font-family:'Cairo',sans-serif;transition:all .2s;}
    .ab-view{background:#2ecc71;}.ab-view:hover{background:#27ae60;}
    .ab-edit{background:#3498db;}.ab-edit:hover{background:#2980b9;}

    /* ── Welcome ── */
    .welcome{background:white;border-radius:32px;padding:50px 36px;text-align:center;box-shadow:0 10px 30px rgba(0,40,80,.05);border:1px solid #e6f0fa;}
    .welcome-icon{font-size:90px;margin-bottom:22px;animation:float 3s ease-in-out infinite;}
    @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}
    .welcome h2{color:#0f1f3d;font-size:28px;margin-bottom:16px;font-weight:700;}
    .welcome p{color:#2c3e50;font-size:16px;line-height:1.8;max-width:560px;margin:0 auto;}

    /* ── Modals ── */
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:9999;}
    .modal.open{display:flex;}
    .modal-box{background:white;width:90%;max-width:380px;border-radius:28px;padding:28px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.3);}
    .modal-icon{font-size:46px;margin-bottom:16px;}
    .modal-msg{color:#0f1f3d;margin-bottom:18px;font-size:15px;font-weight:600;}
    .modal-btns{display:flex;gap:12px;justify-content:center;}
    .btn-sec{background:#e9f0fa;color:#0f1f3d;border:none;padding:9px 20px;border-radius:40px;cursor:pointer;font-weight:700;font-size:13px;font-family:'Cairo',sans-serif;}
    .btn-danger{background:#e74c3c;color:white;border:none;padding:9px 20px;border-radius:40px;cursor:pointer;font-weight:700;font-size:13px;font-family:'Cairo',sans-serif;}

    /* Reports grid */
    .rep-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:16px;}
    .rep-card{background:#0f1f3d;padding:22px;border-radius:20px;text-align:center;cursor:pointer;transition:all .3s;border:2px solid transparent;}
    .rep-card:hover{transform:translateY(-4px);border-color:#f5c842;}
    .rep-card .rc-icon{font-size:40px;margin-bottom:10px;}
    .rep-card .rc-label{color:#f5c842;font-size:16px;font-weight:700;}

    @media(max-width:1300px){.kpi-grid{grid-template-columns:repeat(4,1fr);}}
    @media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(3,1fr);}}
    @media(max-width:900px){.sidebar{width:80px;}.sb-head p,.mi span:last-child{display:none;}.mi{justify-content:center;padding:12px 0;margin:5px 8px;gap:0;}.mi .icon{font-size:24px;}.main{margin-right:80px;padding:18px;}}
    @media(max-width:600px){.kpi-grid{grid-template-columns:repeat(2,1fr);}.top-bar{flex-direction:column;gap:12px;}}
  </style>
</head>
<body>
<div class="sidebar">
  <div class="sb-head"><h3>🌊 غوص</h3><p>لوحة تحكم صاحب المركز</p></div>
  <div class="sb-menu">
    <div class="mi active" onclick="showSection('welcome')"><span class="icon">📊</span><span>الرئيسية</span></div>
    <div class="mi" onclick="loadBranches()"><span class="icon">🏛️</span><span>الفروع</span></div>
    <div class="mi" onclick="loadStaff()"><span class="icon">👥</span><span>الموظفين</span></div>
    <div class="mi" onclick="goInvoices()"><span class="icon">📄</span><span>الفواتير</span></div>
    <div class="mi" onclick="window.location.href='SalesReport.html'"><span class="icon">📈</span><span>تقرير المبيعات</span></div>
    <div class="mi" onclick="window.location.href='CashRegister.html'"><span class="icon">💰</span><span>الخزينة اليومية</span></div>
    <div class="mi" onclick="openNotifications()">
      <span class="icon">🔔</span>
      <span>التنبيهات <span id="notifBadge" class="notif-badge">0</span></span>
    </div>
  </div>
</div>

<div class="main">
  <div class="top-bar">
    <div class="page-title">لوحة تحكم صاحب المركز</div>
    <div class="user-info">
      <span class="user-name" id="userNameDisplay">...</span>
      <button class="logout-btn" onclick="logout()">🚪 خروج</button>
    </div>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card c-blue" onclick="loadBranches()"><div class="kpi-icon">🏛️</div><div class="kpi-label">الفروع</div><div class="kpi-val" id="kBranches">0</div></div>
    <div class="kpi-card c-gold" onclick="loadStaff()"><div class="kpi-icon">👥</div><div class="kpi-label">الموظفين</div><div class="kpi-val" id="kStaff">0</div></div>
    <div class="kpi-card c-green" onclick="goInvoices()"><div class="kpi-icon">📄</div><div class="kpi-label">فواتير اليوم</div><div class="kpi-val" id="kInvoices">0</div></div>
    <div class="kpi-card c-orange" onclick="window.location.href='SalesReport.html'"><div class="kpi-icon">📈</div><div class="kpi-label">تقرير المبيعات</div><div class="kpi-val">→</div></div>
    <div class="kpi-card c-green" onclick="window.location.href='CashRegister.html'"><div class="kpi-icon">💰</div><div class="kpi-label">الخزينة</div><div class="kpi-val">→</div></div>
    <div class="kpi-card c-red" onclick="openNotifications()"><div class="kpi-icon">🔔</div><div class="kpi-label">التنبيهات</div><div class="kpi-val" id="kNotif">0</div></div>
  </div>

  <div id="contentArea"></div>
</div>

<!-- Confirm Modal -->
<div id="confirmModal" class="modal">
  <div class="modal-box"><div class="modal-icon">❓</div><div class="modal-msg" id="confirmMsg">هل أنت متأكد؟</div>
    <div class="modal-btns"><button class="btn-danger" id="confirmOk">نعم</button><button class="btn-sec" id="confirmCancel">إلغاء</button></div>
  </div>
</div>
<!-- Alert Modal -->
<div id="alertModal" class="modal">
  <div class="modal-box"><div class="modal-icon">ℹ️</div><div class="modal-msg" id="alertMsg"></div><button class="btn-primary" id="alertOk">موافق</button></div>
</div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbwe1Q9pjAJRk9CfWsK5YGjD5uVAbJkMhAVgw6akKkFIR9sz15V78C88Vs5dumKE-SwF/exec';
let currentUser=null,notifInterval=null;

function getUserFromUrl(){try{const p=new URLSearchParams(location.search).get('user');return p?JSON.parse(decodeURIComponent(p)):null;}catch{return null;}}

function showConfirm(msg,onOk){const m=document.getElementById('confirmModal');document.getElementById('confirmMsg').textContent=msg;m.classList.add('open');const ok=document.getElementById('confirmOk'),ca=document.getElementById('confirmCancel');const oh=()=>{m.classList.remove('open');onOk();ok.removeEventListener('click',oh);ca.removeEventListener('click',ch);};const ch=()=>{m.classList.remove('open');ok.removeEventListener('click',oh);ca.removeEventListener('click',ch);};ok.addEventListener('click',oh);ca.addEventListener('click',ch);}

function showAlert(msg){const m=document.getElementById('alertModal');document.getElementById('alertMsg').textContent=msg;m.classList.add('open');const b=document.getElementById('alertOk');const h=()=>{m.classList.remove('open');b.removeEventListener('click',h);};b.addEventListener('click',h);}

function logout(){showConfirm('هل أنت متأكد من تسجيل الخروج؟',()=>{clearInterval(notifInterval);sessionStorage.removeItem('currentUser');location.href='index.html';});}
function openNotifications(){location.href='Notifications.html';}
function goInvoices(){location.href='BookingsToday.html';}

async function fetchNotifCount(){
  try{const data=await fetch(`${GAS_URL}?action=getAllInvoicesEdit`).then(r=>r.json());
  if(Array.isArray(data)){const cnt=data.filter(n=>!n.isRead).length;const b=document.getElementById('notifBadge');if(b){b.textContent=cnt;b.style.display=cnt>0?'inline-block':'none';}const k=document.getElementById('kNotif');if(k)k.textContent=cnt;}}
  catch(e){console.warn(e);}
}

async function loadStats(){
  if(!currentUser?.centerId)return;
  try{const[br,st]=await Promise.all([
    fetch(`${GAS_URL}?action=getOwnerBranchesCount&centerId=${encodeURIComponent(currentUser.centerId)}`).then(r=>r.json()),
    fetch(`${GAS_URL}?action=getOwnerStaffCount&centerId=${encodeURIComponent(currentUser.centerId)}`).then(r=>r.json())
  ]);
  const kb=document.getElementById('kBranches');if(kb)kb.textContent=typeof br==='number'?br:0;
  const ks=document.getElementById('kStaff');if(ks)ks.textContent=typeof st==='number'?st:0;}
  catch(e){console.warn(e);}
}

/* ── Sections ── */
function setActive(fn){document.querySelectorAll('.mi').forEach(m=>m.classList.remove('active'));if(fn){const el=document.querySelector(`.mi[onclick*="${fn}"]`);if(el)el.classList.add('active');}}

function showSection(s){
  setActive('showSection');
  document.getElementById('contentArea').innerHTML=`
    <div class="welcome">
      <div class="welcome-icon">🏝️</div>
      <h2>مرحباً بك في لوحة تحكم صاحب المركز</h2>
      <p>من هنا يمكنك متابعة فروعك وموظفيك وفواتيرك وتقارير المبيعات بكل سهولة</p>
    </div>`;
}

/* ── Branches (NO add-branch button) ── */
function loadBranches(){
  setActive('loadBranches');
  document.getElementById('contentArea').innerHTML='<div style="text-align:center;padding:40px">جاري تحميل الفروع...</div>';
  fetch(`${GAS_URL}?action=getBranchesByCenter&centerId=${encodeURIComponent(currentUser.centerId)}`)
    .then(r=>r.json()).then(displayBranches)
    .catch(()=>document.getElementById('contentArea').innerHTML='<div style="text-align:center;padding:40px;color:red">فشل تحميل الفروع</div>');
}
function displayBranches(data){
  const arr=Array.isArray(data)?data:(data.branches||[]);
  /* ✅ لا يوجد زر إضافة فرع */
  let html=`<div class="content-area"><div class="content-header"><h2>🏛️ الفروع</h2></div>`;
  if(!arr.length){html+='<div style="text-align:center;padding:40px;color:#94a3b8">لا توجد فروع حالياً</div></div>';document.getElementById('contentArea').innerHTML=html;return;}
  html+=`<div class="tbl-cont"><table><thead><tr><th>اسم الفرع</th><th>المدير</th><th>الجوال</th><th>الحالة</th><th>الإجراءات</th></tr></thead><tbody>`;
  arr.forEach(b=>{const a=b.isActive==='TRUE'||b.isActive===true;html+=`<tr><td><strong>${b.name||''}</strong></td><td>${b.manager||'-'}</td><td>${b.phone||'-'}</td><td><span class="st-badge ${a?'st-active':'st-inactive'}">${a?'نشط':'غير نشط'}</span></td><td><div class="act-btns"><button class="act-btn ab-view" onclick="showAlert('عرض - قيد التطوير')">عرض</button></div></td></tr>`;});
  html+='</tbody></table></div></div>';
  document.getElementById('contentArea').innerHTML=html;
}

/* ── Staff (button opens EmployeesManagement.html) ── */
function loadStaff(){
  setActive('loadStaff');
  document.getElementById('contentArea').innerHTML='<div style="text-align:center;padding:40px">جاري تحميل الموظفين...</div>';
  fetch(`${GAS_URL}?action=getStaffByCenter&centerId=${encodeURIComponent(currentUser.centerId)}`)
    .then(r=>r.json()).then(displayStaff)
    .catch(()=>document.getElementById('contentArea').innerHTML='<div style="text-align:center;padding:40px;color:red">فشل تحميل الموظفين</div>');
}
function displayStaff(data){
  const arr=Array.isArray(data)?data:(data.staff||[]);
  /* ✅ زر الموظف يفتح EmployeesManagement.html */
  let html=`<div class="content-area"><div class="content-header"><h2>👥 الموظفون</h2>
    <button class="btn-primary" onclick="window.location.href='EmployeesManagement.html'">➕ إضافة موظف جديد</button>
  </div>`;
  if(!arr.length){html+='<div style="text-align:center;padding:40px;color:#94a3b8">لا يوجد موظفون حالياً</div></div>';document.getElementById('contentArea').innerHTML=html;return;}
  html+=`<div class="tbl-cont"><table><thead><tr><th>الاسم</th><th>الفرع</th><th>الوظيفة</th><th>الجوال</th><th>الحالة</th><th>الإجراءات</th></tr></thead><tbody>`;
  arr.forEach(u=>{html+=`<tr><td><strong>${u.name||''}</strong></td><td>${u.branchName||'الرئيسي'}</td><td>${u.type||'موظف'}</td><td>${u.phone||'-'}</td><td><span class="st-badge ${u.isActive?'st-active':'st-inactive'}">${u.isActive?'نشط':'غير نشط'}</span></td><td><div class="act-btns"><button class="act-btn ab-edit" onclick="window.location.href='EmployeesManagement.html'">تعديل</button></div></td></tr>`;});
  html+='</tbody></table></div></div>';
  document.getElementById('contentArea').innerHTML=html;
}

/* ── Init ── */
document.addEventListener('DOMContentLoaded',async()=>{
  let ud=sessionStorage.getItem('currentUser');
  if(!ud){const u=getUserFromUrl();if(u){ud=JSON.stringify(u);sessionStorage.setItem('currentUser',ud);}}
  if(!ud){location.href='index.html';return;}
  try{currentUser=JSON.parse(ud);}catch{location.href='index.html';return;}
  document.getElementById('userNameDisplay').textContent=currentUser.name||'صاحب مركز';
  if(currentUser.type!=='Owner'&&currentUser.type!=='Admin'){location.href='index.html';return;}
  showSection('welcome');
  loadStats();fetchNotifCount();
  notifInterval=setInterval(fetchNotifCount,60000);
});
</script>
</body>
</html>
