<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Edit Invoice - Diving Centers Management</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
    body { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; padding:20px; }
    .container { max-width:1400px; margin:0 auto; background:white; border-radius:30px; box-shadow:0 20px 60px rgba(0,0,0,0.3); overflow:hidden; }
    .header { background:linear-gradient(135deg,#1e2b4f 0%,#152238 100%); color:white; padding:20px 30px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px; }
    .header h2 { color:#ffd966; font-size:24px; display:flex; align-items:center; gap:10px; }
    .user-info { display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
    .user-details { display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.1); padding:8px 20px; border-radius:40px; border:1px solid #ffd966; }
    .back-btn { background:#ff6b6b; color:white; border:none; padding:8px 25px; border-radius:40px; cursor:pointer; font-weight:600; transition:0.3s; }
    .back-btn:hover { background:#ee5253; transform:translateY(-2px); }
    
    .voucher-badge {
      background: #ffd966;
      color: #1e2b4f;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 16px;
      margin-left: 15px;
    }
    
    .content { padding:30px; }
    .section-title { color:#1e2b4f; font-size:18px; font-weight:700; margin:25px 0 15px; padding-bottom:10px; border-bottom:2px solid #ffd966; }
    .form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; margin-bottom:15px; }
    .form-group { margin-bottom:10px; }
    .form-group label { display:block; margin-bottom:5px; color:#1e2b4f; font-weight:600; font-size:12px; }
    .form-control { width:100%; padding:8px 12px; border:2px solid #e9f0fa; border-radius:10px; font-size:14px; transition:.25s; background:white; }
    .form-control:focus { border-color:#ffd966; outline:none; }
    .form-control[readonly] { background:#f8f9fa; color:#2c3e50; cursor:default; }
    
    .row-flex {
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
      background: #f8f9fa;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 20px;
    }
    
    .small-input {
      width: 80px;
      text-align: center;
    }
    
    .trip-table { margin:20px 0; overflow-x:auto; }
    .trip-table table { width:100%; border-collapse:collapse; background:white; border-radius:15px; overflow:hidden; box-shadow:0 4px 10px rgba(0,0,0,0.05); }
    .trip-table th { background:#1e2b4f; color:#ffd966; padding:12px; font-weight:600; font-size:13px; }
    .trip-table td { padding:10px; border-bottom:1px solid #e9f0fa; }
    .trip-table input { width:80px; padding:6px; border:2px solid #e9f0fa; border-radius:8px; text-align:center; }
    
    .payment-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 15px 0;
    }
    
    .payment-item {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.03);
    }
    
    .payment-item label {
      display: block;
      margin-bottom: 5px;
      color: #1e2b4f;
      font-weight: 600;
      font-size: 11px;
    }
    
    .payment-item input {
      width: 100%;
      padding: 6px;
      border: 2px solid #e9f0fa;
      border-radius: 8px;
      text-align: center;
      font-size: 13px;
    }
    
    .totals-bar {
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: #f8f9fa;
      padding: 20px;
      border-radius: 15px;
      margin: 20px 0;
      flex-wrap: wrap;
      gap: 20px;
    }
    
    .total-item {
      text-align: center;
      min-width: 150px;
    }
    
    .total-item .label {
      color: #6c757d;
      font-size: 12px;
      margin-bottom: 5px;
    }
    
    .total-item .value {
      font-size: 28px;
      font-weight: 800;
      color: #1e2b4f;
    }
    
    .total-item .currency {
      font-size: 14px;
      color: #ffd966;
      margin-left: 5px;
    }
    
    .total-item input {
      width: 100px;
      padding: 8px;
      border: 2px solid #e9f0fa;
      border-radius: 10px;
      text-align: center;
      font-size: 16px;
    }
    
    .action-buttons { display:flex; gap:15px; justify-content:center; margin-top:30px; flex-wrap:wrap; }
    .btn-primary { background:#1e2b4f; color:white; border:none; padding:12px 30px; border-radius:40px; font-weight:700; font-size:15px; cursor:pointer; transition:0.3s; }
    .btn-primary:hover { background:#ffd966; color:#1e2b4f; }
    .btn-danger { background:#e74c3c; color:white; border:none; padding:12px 30px; border-radius:40px; font-weight:700; font-size:15px; cursor:pointer; }
    .btn-danger:hover { background:#c0392b; }
    
    .loader { border:4px solid #f3f3f3; border-top:4px solid #1e2b4f; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:50px auto; }
    @keyframes spin { to{transform:rotate(360deg);} }
    
    .pdf-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; align-items:center; justify-content:center; flex-direction:column; gap:20px; }
    .pdf-overlay.show { display:flex; }
    .pdf-spinner { width:60px; height:60px; border:6px solid rgba(255,255,255,.3); border-top:6px solid #ffd966; border-radius:50%; animation:spin 1s linear infinite; }
    .pdf-overlay p { color:white; font-size:18px; font-weight:700; }
    
    #alertModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:10000; }
    .alert-content { background:white; width:90%; max-width:500px; border-radius:30px; padding:30px; text-align:center; box-shadow:0 20px 40px rgba(0,0,0,0.3); }
    
    .warning-message {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #f5c6cb;
      border-radius: 15px;
      padding: 15px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
    }
    .warning-message .icon { font-size: 24px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>✏️ تعديل الفاتورة <span class="voucher-badge" id="voucherDisplay"></span></h2>
    <div class="user-info">
      <div class="user-details">
        <span id="userNameDisplay"></span>
      </div>
      <button class="back-btn" onclick="goBack()">🔙 الرجوع</button>
    </div>
  </div>
  <div class="content" id="mainContent">
    <div class="loader"></div>
  </div>
</div>

<!-- PDF Overlay -->
<div class="pdf-overlay" id="pdfOverlay">
  <div class="pdf-spinner"></div>
  <p id="pdfMsg">⏳ جاري حفظ التعديلات...</p>
</div>

<!-- Alert Modal -->
<div id="alertModal">
  <div class="alert-content">
    <div style="font-size:50px;margin-bottom:20px;" id="alertIcon">ℹ️</div>
    <h3 style="color:#1e2b4f;margin-bottom:20px;" id="alertMsg"></h3>
    <div style="display:flex;gap:10px;justify-content:center;" id="alertBtns">
      <button class="btn-primary" onclick="closeAlert()">OK</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyBfwHQQoHb9E2bq0l-u6FLMD2XFKu_d8rZuJLnIq5iko82Bn93Emki6-cvDF_XOyRp/exec';
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let currentUser = null;
let currentInvoice = null;
let originalInvoice = null;
let exchangeRatesCache = {};
let tripsList = [];
let suppliersList = [];
let customersList = [];

// دالة لتقريب القيم إلى أقرب جزء من مئة (منزلتين عشريتين)
function roundToTwo(num) {
  return Math.round((num + Number.EPSILON) * 100) / 100;
}

// ============ دوال مساعدة ============
function showPDFOverlay(msg) {
  document.getElementById('pdfMsg').textContent = msg || '⏳ جاري حفظ التعديلات...';
  document.getElementById('pdfOverlay').classList.add('show');
}

function hidePDFOverlay() {
  document.getElementById('pdfOverlay').classList.remove('show');
}

function showAlert(msg, icon = 'ℹ️', btnHtml = null) {
  document.getElementById('alertMsg').textContent = msg;
  document.getElementById('alertIcon').textContent = icon;
  if (btnHtml) {
    document.getElementById('alertBtns').innerHTML = btnHtml;
  }
  document.getElementById('alertModal').style.display = 'flex';
}

function closeAlert() {
  document.getElementById('alertModal').style.display = 'none';
}

function goBack() {
  window.location.href = 'BookingsToday.html';
}

async function callGAS(action, params = {}) {
  const url = new URL(GAS_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => {
    url.searchParams.set(k, String(v ?? ''));
  });
  const res = await fetch(url.toString(), { redirect: 'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ============ دوال التاريخ والوقت ============
function parseDate(str) {
  if (!str) return null;
  const parts = str.split('/');
  if (parts.length === 3) {
    const day = parseInt(parts[0]);
    const monthIndex = MONTHS.findIndex(m => m.toLowerCase() === parts[1].toLowerCase());
    const year = parseInt(parts[2]);
    if (!isNaN(day) && monthIndex !== -1 && !isNaN(year)) {
      return new Date(year, monthIndex, day);
    }
  }
  return null;
}

function formatDate(date) {
  return `${String(date.getDate()).padStart(2,'0')}/${MONTHS[date.getMonth()]}/${date.getFullYear()}`;
}

function dateToInput(dateStr) {
  if (!dateStr) return '';
  const d = parseDate(dateStr);
  if (!d) return '';
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function timeToInput(timeStr) {
  if (!timeStr) return '';
  
  // إذا كان الوقت بصيغة HH:MM:SS
  const match = String(timeStr).match(/(\d{1,2}):(\d{2}):(\d{2})/);
  if (match) {
    return `${match[1].padStart(2,'0')}:${match[2]}`;
  }
  
  // إذا كان بصيغة HH:MM
  const match2 = String(timeStr).match(/(\d{1,2}):(\d{2})/);
  if (match2) {
    return `${match2[1].padStart(2,'0')}:${match2[2]}`;
  }
  
  return timeStr.substring(0,5);
}

// ============ تحليل ActivitiesText إلى items ============
function parseActivities(text) {
  const items = [];
  if (!text) return items;
  
  const parts = text.split('|');
  parts.forEach(part => {
    const match = part.trim().match(/^(.+?)×(\d+(\.\d+)?)$/);
    if (match) {
      items.push({
        name: match[1].trim(),
        qty: parseFloat(match[2]) || 0
      });
    }
  });
  return items;
}

// ============ جلب قائمة الرحلات ============
async function loadTripsList() {
  try {
    const trips = await callGAS('getAllTrips');
    tripsList = Array.isArray(trips) ? trips : [];
  } catch (e) {
    console.error('❌ خطأ في جلب الرحلات:', e);
  }
}

// ============ جلب بيانات الرحلة والأسعار ============
async function loadTripData(tripName, currency) {
  if (!tripName || !currency) return null;
  try {
    const data = await callGAS('getTripData', { tripName, currency });
    return data;
  } catch (e) {
    console.error('❌ خطأ في جلب بيانات الرحلة:', e);
    return null;
  }
}

// ============ جلب القوائم (Supplier, Customer) ============
async function loadLists() {
  try {
    const invoices = await callGAS('getAllInvoices');
    if (Array.isArray(invoices)) {
      const supplierSet = new Set();
      const customerSet = new Set();
      invoices.forEach(inv => {
        if (inv.supplier && inv.supplier.trim()) supplierSet.add(inv.supplier.trim());
        if (inv.customer && inv.customer.trim()) customerSet.add(inv.customer.trim());
      });
      suppliersList = Array.from(supplierSet).sort();
      customersList = Array.from(customerSet).sort();
    }
  } catch (e) {
    console.error('❌ خطأ في جلب القوائم:', e);
  }
}

// ============ جلب بيانات الفاتورة ============
async function loadInvoice() {
  const params = new URLSearchParams(window.location.search);
  const voucherNo = params.get('voucherNo');
  
  if (!voucherNo) {
    showAlert('رقم الفاتورة غير موجود', '❌', '<button class="btn-primary" onclick="goBack()">الرجوع</button>');
    return;
  }
  
  try {
    showPDFOverlay('⏳ جلب بيانات الفاتورة...');
    
    await Promise.all([
      loadTripsList(),
      loadLists()
    ]);
    
    const result = await callGAS('getAllInvoices');
    const invoices = Array.isArray(result) ? result : [];
    
    currentInvoice = invoices.find(inv => inv.voucherNo === voucherNo);
    
    if (!currentInvoice) {
      throw new Error('الفاتورة غير موجودة');
    }
    
    // نسخة عميقة من الفاتورة الأصلية
    originalInvoice = JSON.parse(JSON.stringify(currentInvoice));
    
    // التأكد من وجود actualPrice
    console.log('✅ الفاتورة الأصلية:', {
      voucherNo: originalInvoice.voucherNo,
      actualPrice: originalInvoice.actualPrice,
      paymentPrice: originalInvoice.paymentPrice,
      rest: originalInvoice.rest
    });
    
    document.getElementById('voucherDisplay').textContent = currentInvoice.voucherNo;
    hidePDFOverlay();
    
    if (currentInvoice.trip && currentInvoice.invoiceCurrency) {
      const tripData = await loadTripData(currentInvoice.trip, currentInvoice.invoiceCurrency);
      renderEditForm(tripData);
    } else {
      renderEditForm(null);
    }
    
  } catch (error) {
    console.error('❌ خطأ:', error);
    hidePDFOverlay();
    showAlert('خطأ في جلب بيانات الفاتورة: ' + error.message, '❌', 
      '<button class="btn-primary" onclick="goBack()">الرجوع</button>');
  }
}

// ============ عرض نموذج التعديل ============
function renderEditForm(tripData) {
  if (!currentInvoice) return;
  
  const activities = parseActivities(currentInvoice.activitiesText || '');
  
  // التحقق من تاريخ الحجز (IssueDate)
  const issueDateStr = currentInvoice.issueDate;
  const issueDate = issueDateStr ? parseDate(issueDateStr) : null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  
  let warningHtml = '';
  let isDisabled = false;
  
  if (issueDate && issueDate < today) {
    warningHtml = `
      <div class="warning-message">
        <span class="icon">⚠️</span>
        <span>هذه الفاتورة تاريخ حجزها سابق (${issueDateStr}) ولا يمكن تعديلها لأن ذلك سيؤثر على بيانات الخزينة</span>
      </div>
    `;
    isDisabled = true;
  }
  
  let tripsOptions = '';
  tripsList.forEach(trip => {
    const selected = trip.name === currentInvoice.trip ? 'selected' : '';
    tripsOptions += `<option value="${trip.name}" ${selected}>${trip.name}</option>`;
  });
  
  let supplierOptions = '<option value="">-- اختر --</option>';
  suppliersList.forEach(sup => {
    const selected = sup === currentInvoice.supplier ? 'selected' : '';
    supplierOptions += `<option value="${sup}" ${selected}>${sup}</option>`;
  });
  
  let customerOptions = '<option value="">-- اختر --</option>';
  customersList.forEach(cust => {
    const selected = cust === currentInvoice.customer ? 'selected' : '';
    customerOptions += `<option value="${cust}" ${selected}>${cust}</option>`;
  });
  
  let itemsRows = '';
  if (tripData && tripData.items && tripData.prices) {
    tripData.items.forEach((itemName, index) => {
      const qty = activities.find(a => a.name === itemName)?.qty || 0;
      const price = tripData.prices[index] || 0;
      itemsRows += `
        <tr>
          <td>${itemName}</td>
          <td><input type="number" class="item-qty" data-index="${index}" data-name="${itemName}" value="${qty || ''}" min="0" step="1" oninput="updateItemTotal(${index}, ${price})" ${isDisabled ? 'disabled' : ''}></td>
          <td><input type="number" class="item-price" value="${price}" readonly></td>
          <td><input type="number" class="item-total" id="total_${index}" value="${(qty * price).toFixed(2)}" readonly></td>
        </tr>
      `;
    });
  } else {
    itemsRows = '<tr><td colspan="4" style="text-align:center;padding:20px;">لا يمكن تحميل بيانات الرحلة</td></tr>';
  }
  
  // دالة مساعدة لعرض القيم مع إخفاء الأصفار
  const displayValue = (val) => {
    const num = parseFloat(val);
    return (num === 0 || isNaN(num)) ? '' : num;
  };
  
  document.getElementById('mainContent').innerHTML = `
    ${warningHtml}
    <div class="section-title">👤 بيانات العميل</div>
    <div class="form-grid">
      <div class="form-group">
        <label>رقم الهاتف</label>
        <input type="text" class="form-control" id="contactNo" value="${currentInvoice.contactNo || ''}" ${isDisabled ? 'disabled' : ''}>
      </div>
      <div class="form-group">
        <label>اسم العميل</label>
        <input type="text" class="form-control" id="guestName" value="${currentInvoice.guestName || ''}" ${isDisabled ? 'disabled' : ''}>
      </div>
      <div class="form-group">
        <label>الجنسية</label>
        <input type="text" class="form-control" id="nationality" value="${currentInvoice.nationality || ''}" ${isDisabled ? 'disabled' : ''}>
      </div>
      <div class="form-group">
        <label>الفندق</label>
        <input type="text" class="form-control" id="hotel" value="${currentInvoice.hotel || ''}" ${isDisabled ? 'disabled' : ''}>
      </div>
      <div class="form-group">
        <label>رقم الغرفة</label>
        <input type="text" class="form-control" id="roomNo" value="${currentInvoice.roomNo || ''}" ${isDisabled ? 'disabled' : ''}>
      </div>
    </div>

    <div class="section-title">🏝️ بيانات الرحلة</div>
    <div class="row-flex">
      <div class="form-group" style="min-width:120px;">
        <label>التاريخ</label>
        <input type="date" class="form-control" id="activeDate" value="${dateToInput(currentInvoice.activeDate)}" onchange="updateTotals()" ${isDisabled ? 'disabled' : ''}>
      </div>
      <div class="form-group" style="min-width:100px;">
        <label>الوقت</label>
        <input type="time" class="form-control" id="time" value="${timeToInput(currentInvoice.time)}" ${isDisabled ? 'disabled' : ''}>
      </div>
      <div class="form-group" style="min-width:120px;">
        <label>العملة</label>
        <select class="form-control" id="invoiceCurrency" onchange="changeCurrency()" ${isDisabled ? 'disabled' : ''}>
          <option value="$" ${currentInvoice.invoiceCurrency === '$' ? 'selected' : ''}>USD ($)</option>
          <option value="€" ${currentInvoice.invoiceCurrency === '€' ? 'selected' : ''}>EUR (€)</option>
          <option value="£" ${currentInvoice.invoiceCurrency === '£' ? 'selected' : ''}>GBP (£)</option>
          <option value="LE" ${currentInvoice.invoiceCurrency === 'LE' ? 'selected' : ''}>EGP (LE)</option>
        </select>
      </div>
      <div class="form-group" style="min-width:70px;">
        <label>Adult</label>
        <input type="number" class="form-control small-input" id="adultCount" value="${displayValue(currentInvoice.adultCount)}" min="0" onchange="updateTotals()" ${isDisabled ? 'disabled' : ''}>
      </div>
      <div class="form-group" style="min-width:70px;">
        <label>Child</label>
        <input type="number" class="form-control small-input" id="childCount" value="${displayValue(currentInvoice.childCount)}" min="0" onchange="updateTotals()" ${isDisabled ? 'disabled' : ''}>
      </div>
      <div class="form-group" style="min-width:70px;">
        <label>Infant</label>
        <input type="number" class="form-control small-input" id="infantCount" value="${displayValue(currentInvoice.infantCount)}" min="0" onchange="updateTotals()" ${isDisabled ? 'disabled' : ''}>
      </div>
    </div>
    
    <div class="form-group">
      <label>الرحلة</label>
      <select class="form-control" id="tripName" onchange="changeTrip()" ${isDisabled ? 'disabled' : ''}>
        ${tripsOptions}
      </select>
    </div>

    <div class="trip-table">
      <table>
        <thead>
          <tr>
            <th>النشاط</th>
            <th>العدد</th>
            <th>السعر</th>
            <th>الإجمالي</th>
          </tr>
        </thead>
        <tbody id="itemsContainer">
          ${itemsRows}
        </tbody>
      </table>
    </div>

    <div class="section-title">💰 المدفوعات</div>
    <div class="payment-grid">
      <div class="payment-item"><label>كاش $</label><input type="number" id="cashUSD" value="${displayValue(currentInvoice.cashUSD)}" step="0.01" oninput="updateTotals()" ${isDisabled ? 'disabled' : ''}></div>
      <div class="payment-item"><label>كاش €</label><input type="number" id="cashEUR" value="${displayValue(currentInvoice.cashEUR)}" step="0.01" oninput="updateTotals()" ${isDisabled ? 'disabled' : ''}></div>
      <div class="payment-item"><label>كاش £</label><input type="number" id="cashGBP" value="${displayValue(currentInvoice.cashGBP)}" step="0.01" oninput="updateTotals()" ${isDisabled ? 'disabled' : ''}></div>
      <div class="payment-item"><label>كاش LE</label><input type="number" id="cashLE" value="${displayValue(currentInvoice.cashLE)}" step="0.01" oninput="updateTotals()" ${isDisabled ? 'disabled' : ''}></div>

        <span class="currency" id="restCurrency">${currentInvoice.invoiceCurrency || ''}</span>

        <label>المنفذ (Supplier)</label>

  setTimeout(() => {
    calculateInvoiceTotal();
    updateTotals();
  }, 100);
}

// ============ تغيير الرحلة ============
async function changeTrip() {
  const tripName = document.getElementById('tripName').value;
  const currency = document.getElementById('invoiceCurrency').value;
  
  if (!tripName || !currency) return;
  
  showPDFOverlay('⏳ جلب بيانات الرحلة...');
  const tripData = await loadTripData(tripName, currency);
  hidePDFOverlay();
  
  if (tripData) {
    renderEditForm(tripData);
  }
}

// ============ تغيير العملة ============
async function changeCurrency() {
  const tripName = document.getElementById('tripName').value;
  const currency = document.getElementById('invoiceCurrency').value;
  
  if (!tripName || !currency) return;
  
  showPDFOverlay('⏳ تحديث الأسعار...');
  const tripData = await loadTripData(tripName, currency);
  hidePDFOverlay();
  
  if (tripData) {
    const itemsContainer = document.getElementById('itemsContainer');
    if (itemsContainer) {
      tripData.items.forEach((itemName, index) => {
        const priceInput = document.querySelector(`.item-price[data-index="${index}"]`);
        if (priceInput) {
          priceInput.value = tripData.prices[index] || 0;
        }
      });
      updateAllItemTotals();
      calculateInvoiceTotal();
      updateTotals();
    } else {
      renderEditForm(tripData);
    }
  }
}

// ============ تحديث إجمالي item ============
function updateItemTotal(index, price) {
  const qtyInput = document.querySelector(`.item-qty[data-index="${index}"]`);
  if (!qtyInput) return;
  
  const qty = parseFloat(qtyInput.value) || 0;
  const totalInput = document.getElementById(`total_${index}`);
  if (totalInput) {
    totalInput.value = (qty * price).toFixed(2);
  }
  
  calculateInvoiceTotal();
  updateTotals();
}

function updateAllItemTotals() {
  const qtyInputs = document.querySelectorAll('.item-qty');
  qtyInputs.forEach(input => {
    const index = input.dataset.index;
    const price = parseFloat(document.querySelector(`.item-price[data-index="${index}"]`).value) || 0;
    const qty = parseFloat(input.value) || 0;
    const totalInput = document.getElementById(`total_${index}`);
    if (totalInput) {
      totalInput.value = (qty * price).toFixed(2);
    }
  });
}

function calculateInvoiceTotal() {
  let total = 0;
  document.querySelectorAll('[id^="total_"]').forEach(input => {
    total += parseFloat(input.value) || 0;
  });
  
  const actualPriceElement = document.getElementById('displayActualPrice');
  if(actualPriceElement) {
    actualPriceElement.textContent = total.toFixed(2);
  }
  
  return total;
}

// ============ تحديث المجاميع مع تحويل العملات ============
async function updateTotals() {
  const currency = document.getElementById('invoiceCurrency')?.value;
  const dateStr = document.getElementById('activeDate')?.value;
  
  if (!currency || !dateStr) return;
  
  // ActualPrice = إجمالي الفاتورة (مجموع البنود)
  let actualPrice = 0;
  document.querySelectorAll('[id^="total_"]').forEach(input => {
    actualPrice += parseFloat(input.value) || 0;
  });
  
  // قراءة المدفوعات
  const cashUSD = parseFloat(document.getElementById('cashUSD')?.value) || 0;
  const cashEUR = parseFloat(document.getElementById('cashEUR')?.value) || 0;
  const cashGBP = parseFloat(document.getElementById('cashGBP')?.value) || 0;
  const cashLE = parseFloat(document.getElementById('cashLE')?.value) || 0;
  const visaUSD = parseFloat(document.getElementById('visaUSD')?.value) || 0;
  const visaEUR = parseFloat(document.getElementById('visaEUR')?.value) || 0;
  const visaGBP = parseFloat(document.getElementById('visaGBP')?.value) || 0;
  const visaLE = parseFloat(document.getElementById('visaLE')?.value) || 0;
  
  // جلب أسعار الصرف
  let rates = exchangeRatesCache[dateStr];
  if (!rates) {
    try {
      rates = await callGAS('getExchangeRate', { dateStr });
      if (rates) {
        exchangeRatesCache[dateStr] = rates;
      }
    } catch (e) {
      console.error('❌ خطأ في جلب أسعار الصرف:', e);
    }
  }
  
  // تحويل جميع المدفوعات إلى العملة المحلية (LE) أولاً
  let totalInLE = 0;
  
  if (rates) {
    totalInLE += cashUSD * (rates.cash?.USD || 47.5);
    totalInLE += cashEUR * (rates.cash?.EUR || 50.25);
    totalInLE += cashGBP * (rates.cash?.GBP || 60);
    totalInLE += cashLE;
    totalInLE += visaUSD * (rates.visa?.USD || 46.3125);
    totalInLE += visaEUR * (rates.visa?.EUR || 48.99375);
    totalInLE += visaGBP * (rates.visa?.GBP || 58.5);
    totalInLE += visaLE * (rates.visa?.LE || 0.975);
  } else {
    totalInLE = cashUSD * 47.5 + cashEUR * 50.25 + cashGBP * 60 + cashLE +
                visaUSD * 46.3125 + visaEUR * 48.99375 + visaGBP * 58.5 + visaLE * 0.975;
  }
  
  // تحويل من LE إلى عملة الفاتورة وتقريب النتيجة
  let paidInInvoiceCurrency = 0;
  
  if (currency === '$') {
    paidInInvoiceCurrency = roundToTwo(totalInLE / 47.5);
  } else if (currency === '€') {
    paidInInvoiceCurrency = roundToTwo(totalInLE / 50.25);
  } else if (currency === '£') {
    paidInInvoiceCurrency = roundToTwo(totalInLE / 60);
  } else if (currency === 'LE') {
    paidInInvoiceCurrency = roundToTwo(totalInLE);
  }
  
  const discount = parseFloat(document.getElementById('discount')?.value) || 0;
  
  // المتبقي = إجمالي الفاتورة - الخصم - المدفوع (بعد التحويل)
  const rest = roundToTwo(actualPrice - discount - paidInInvoiceCurrency);
  
  // تحديث العرض
  document.getElementById('displayActualPrice').textContent = actualPrice.toFixed(2);
  document.getElementById('displayPaymentPrice').textContent = paidInInvoiceCurrency.toFixed(2);
  document.getElementById('displayRest').textContent = rest.toFixed(2);
  
  console.log('💰 updateTotals:', {
    actualPrice,
    discount,
    paidInInvoiceCurrency,
    rest,
    totalInLE: roundToTwo(totalInLE)
  });
}

// ============ جمع بيانات التعديل مع تحويل العملات ============
function collectEditedData() {
  const timeInput = document.getElementById('time')?.value || '';
  const cleanTime = timeInput ? timeToInput(timeInput) : '';
  const stateSelect = document.getElementById('state')?.value || 'pending';
  const currency = document.getElementById('invoiceCurrency')?.value;
  
  const items = [];
  const rows = document.querySelectorAll('#itemsContainer tr');
  rows.forEach(row => {
    const name = row.querySelector('td:first-child')?.textContent;
    const qtyInput = row.querySelector('input[type="number"]');
    if (name && qtyInput) {
      const qty = parseFloat(qtyInput.value) || 0;
      if (qty > 0) {
        items.push(`${name}×${qty}`);
      }
    }
  });
  
  const valueOrEmpty = (val) => {
    if (val === undefined || val === null) return '';
    const num = parseFloat(val);
    return (num !== 0 && !isNaN(num)) ? num : '';
  };
  
  const activeDateInput = document.getElementById('activeDate')?.value;
  let activeDate = '';
  if (activeDateInput) {
    const d = new Date(activeDateInput);
    activeDate = formatDate(d);
  }
  
  // ActualPrice = إجمالي الفاتورة
  let actualPrice = 0;
  document.querySelectorAll('[id^="total_"]').forEach(input => {
    actualPrice += parseFloat(input.value) || 0;
  });
  
  const discount = parseFloat(document.getElementById('discount')?.value) || 0;
  
  // قراءة المدفوعات
  const cashUSD = parseFloat(document.getElementById('cashUSD')?.value) || 0;
  const cashEUR = parseFloat(document.getElementById('cashEUR')?.value) || 0;
  const cashGBP = parseFloat(document.getElementById('cashGBP')?.value) || 0;
  const cashLE = parseFloat(document.getElementById('cashLE')?.value) || 0;
  const visaUSD = parseFloat(document.getElementById('visaUSD')?.value) || 0;
  const visaEUR = parseFloat(document.getElementById('visaEUR')?.value) || 0;
  const visaGBP = parseFloat(document.getElementById('visaGBP')?.value) || 0;
  const visaLE = parseFloat(document.getElementById('visaLE')?.value) || 0;
  
  // تحويل جميع المدفوعات إلى العملة المحلية (LE)
  const totalInLE = cashUSD * 47.5 + cashEUR * 50.25 + cashGBP * 60 + cashLE +
                    visaUSD * 46.3125 + visaEUR * 48.99375 + visaGBP * 58.5 + visaLE * 0.975;
  
  // تحويل من LE إلى عملة الفاتورة وتقريب النتيجة
  let paidInInvoiceCurrency = 0;
  
  if (currency === '$') {
    paidInInvoiceCurrency = roundToTwo(totalInLE / 47.5);
  } else if (currency === '€') {
    paidInInvoiceCurrency = roundToTwo(totalInLE / 50.25);
  } else if (currency === '£') {
    paidInInvoiceCurrency = roundToTwo(totalInLE / 60);
  } else if (currency === 'LE') {
    paidInInvoiceCurrency = roundToTwo(totalInLE);
  }
  
  const rest = roundToTwo(actualPrice - discount - paidInInvoiceCurrency);
  
  const data = {
    voucherNo: currentInvoice.voucherNo,
    issueDate: currentInvoice.issueDate,
    activeDate: activeDate,
    time: cleanTime,
    contactNo: document.getElementById('contactNo')?.value || '',
    guestName: document.getElementById('guestName')?.value || '',
    nationality: document.getElementById('nationality')?.value || '',
    hotel: document.getElementById('hotel')?.value || '',
    roomNo: document.getElementById('roomNo')?.value || '',
    trip: document.getElementById('tripName')?.value || '',
    invoiceCurrency: currency || '',
    adultCount: parseInt(document.getElementById('adultCount')?.value) || 0,
    childCount: parseInt(document.getElementById('childCount')?.value) || 0,
    infantCount: parseInt(document.getElementById('infantCount')?.value) || 0,
    cashUSD: valueOrEmpty(cashUSD),
    cashEUR: valueOrEmpty(cashEUR),
    cashGBP: valueOrEmpty(cashGBP),
    cashLE: valueOrEmpty(cashLE),
    visaUSD: valueOrEmpty(visaUSD),
    visaEUR: valueOrEmpty(visaEUR),
    visaGBP: valueOrEmpty(visaGBP),
    visaLE: valueOrEmpty(visaLE),
    actualPrice: actualPrice,
    paymentPrice: paidInInvoiceCurrency,
    discount: valueOrEmpty(discount),
    rest: rest,
    activitiesText: items.join(' | '),
    supplier: document.getElementById('supplier')?.value || '',
    customer: document.getElementById('customer')?.value || '',
    state: stateSelect,
    notes: document.getElementById('notes')?.value || '',
    salesId: currentInvoice.salesId,
    centerName: currentInvoice.centerName,
    branchName: currentInvoice.branchName,
    salesName: currentInvoice.salesName,

  console.log('📊 بيانات التعديل المجمعة:', {

    discount,

    rest,
    totalInLE: roundToTwo(totalInLE),
    currency
  });
  
  return data;
}

// ============ إنشاء ملخص التغييرات ============
function createEditSummary(original, edited) {
  const changes = [];
  const currency = edited.invoiceCurrency || original.invoiceCurrency || '$';
  
  // الخصم - فقط إذا تغير
  if (original.discount !== edited.discount) {
    const oldVal = original.discount || 0;
    const newVal = edited.discount || 0;
    const diff = newVal - oldVal;
    
    if (diff > 0) {
      changes.push(`💰 زيادة الخصم بمقدار ${diff} ${currency} (من ${oldVal} إلى ${newVal})`);
    } else if (diff < 0) {
      changes.push(`💰 تخفيض الخصم بمقدار ${Math.abs(diff)} ${currency} (من ${oldVal} إلى ${newVal})`);
    }
  }
  
  // حالة الفاتورة
  if (original.state !== edited.state) {
    const stateMap = {
      'pending': 'معلق',
      'confirmed': 'مؤكد',
      'cancel': 'ملغي'
    };
    const oldState = stateMap[original.state] || original.state;
    const newState = stateMap[edited.state] || edited.state;
    changes.push(`📌 تغيير الحالة: من "${oldState}" إلى "${newState}"`);
  }
  
  // الوقت
  const oldTime = original.time ? timeToInput(original.time) : '';
  const newTime = edited.time ? timeToInput(edited.time) : '';
  if (oldTime !== newTime) {
    changes.push(`⏰ تغيير الوقت: من "${oldTime || 'فارغ'}" إلى "${newTime || 'فارغ'}"`);
  }
  
  // الخدمات
  const originalItems = parseActivities(original.activitiesText || '');
  const editedItems = parseActivities(edited.activitiesText || '');
  
  const originalMap = {};
  originalItems.forEach(item => { originalMap[item.name] = item.qty; });
  
  const editedMap = {};
  editedItems.forEach(item => { editedMap[item.name] = item.qty; });
  
  const allItemNames = new Set([...Object.keys(originalMap), ...Object.keys(editedMap)]);
  
  const itemChanges = [];
  allItemNames.forEach(itemName => {
    const oldQty = originalMap[itemName] || 0;
    const newQty = editedMap[itemName] || 0;
    if (oldQty !== newQty) {
      const diff = newQty - oldQty;
      if (diff > 0) {
        itemChanges.push(`➕ ${itemName} +${diff}`);
      } else if (diff < 0) {
        itemChanges.push(`➖ ${itemName} ${diff}`);
      }
    }
  });
  
  if (itemChanges.length > 0) {
    changes.push(`📋 تغيير في الخدمات: ${itemChanges.join('، ')}`);
  }
  
  if (changes.length === 0) return 'لا توجد تغييرات';
  
  return changes.join(' | ');
}

// ============ حفظ التغييرات ============
async function saveChanges() {
  const issueDateStr = document.getElementById('activeDate')?.value;
  if (issueDateStr) {
    const issueDate = new Date(issueDateStr);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    
    if (issueDate < today) {
      showAlert('❌ لا يمكن تعديل فواتير سابقة التاريخ لأن ذلك سيؤثر على بيانات الخزينة', '⚠️');
      return;
    }
  }
  
  const editedData = collectEditedData();
  const editSummary = createEditSummary(originalInvoice, editedData);
  
  console.log('📤 حفظ التعديلات:', {
    originalActual: originalInvoice.actualPrice,
    editedActual: editedData.actualPrice,
    originalPayment: originalInvoice.paymentPrice,
    editedPayment: editedData.paymentPrice,
    rest: editedData.rest
  });
  
  try {
    showPDFOverlay('⏳ جاري حفظ التعديلات...');
    
    const updateResult = await callGAS('updateInvoice', editedData);
    if (!updateResult.success) throw new Error(updateResult.message || 'فشل تحديث الفاتورة');
    
    const copyResult = await callGAS('copyInvoiceToEdit', {
      originalData: JSON.stringify(originalInvoice),
      editedData: JSON.stringify(editedData),
      userId: currentUser?.id || '',
      editSummary: editSummary
    });
    
    if (!copyResult.success) throw new Error(copyResult.message || 'فشل نسخ الفاتورة');
    
    const pdfResult = await callGAS('saveAndGenerateSinglePDF', { voucherNo: editedData.voucherNo });
    if (!pdfResult?.success) throw new Error(pdfResult?.message || 'فشل إنشاء PDF');
    
    hidePDFOverlay();
    showAlert('✅ تم حفظ التعديلات بنجاح', '✅', '<button class="btn-primary" onclick="goBack()">العودة للقائمة</button>');
    
  } catch (error) {
    hidePDFOverlay();
    showAlert('خطأ: ' + error.message, '❌');
  }
}

async function cancelEdit() {
  if (confirm('هل أنت متأكد من إلغاء التعديل؟')) {
    try {
      showPDFOverlay('⏳ جاري إلغاء التعديل...');
      await callGAS('deleteFromEditSheet', { voucherNo: originalInvoice.voucherNo });
    } catch (e) {
      console.warn('⚠️', e);
    } finally {
      hidePDFOverlay();
      goBack();
    }
  }
}
