<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes, viewport-fit=cover">
  <title>Edit Invoice | تعديل الفاتورة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* نفس الـ CSS السابق - لم يتغير */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #0f1f3d; --primary-dark: #1a3260; --accent: #f5c842; --accent-dark: #e6b800;
      --success: #16a34a; --success-dark: #15803d; --danger: #dc2626; --warning: #f59e0b;
      --info: #3b82f6; --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
      --gray-300: #cbd5e1; --gray-400: #94a3b8; --gray-500: #64748b; --gray-600: #475569;
      --gray-700: #334155; --gray-800: #1e293b; --border: #e2e8f0;
      --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --radius: 16px; --radius-sm: 10px;
    }
    body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #f0f4f8 0%, #e6edf4 100%); color: var(--gray-800); min-height: 100vh; }
    .header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-left h2 { color: var(--accent); font-size: 1.25rem; font-weight: 800; }
    .voucher-badge { background: var(--accent); color: var(--primary); padding: 4px 16px; border-radius: 40px; font-weight: 800; font-size: 0.875rem; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .user-chip { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 40px; padding: 6px 16px; font-size: 0.8125rem; font-weight: 600; }
    .back-btn { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 18px; border-radius: 40px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 20px 48px; }
    .card { background: white; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 20px; overflow: hidden; }
    .card-header { padding: 14px 20px; background: linear-gradient(90deg, var(--primary), var(--primary-dark)); display: flex; align-items: center; gap: 10px; }
    .card-header h3 { color: var(--accent); font-size: 0.875rem; font-weight: 800; }
    .card-header .icon { background: rgba(245,200,66,0.2); border-radius: 8px; padding: 4px 8px; }
    .card-body { padding: 20px; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.6875rem; font-weight: 700; color: var(--gray-500); text-transform: uppercase; }
    input, select, textarea { padding: 10px 14px; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 0.875rem; font-family: 'Cairo', sans-serif; background: var(--gray-50); width: 100%; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--info); background: white; }
    input[readonly] { background: var(--gray-100); color: var(--gray-500); }
    input[type="number"] { text-align: center; }
    input:disabled { background: #f1f5f9; color: #94a3b8; cursor: not-allowed; }
    .hotel-row { display: grid; grid-template-columns: 1fr 90px 70px 70px 70px; gap: 12px; margin-bottom: 16px; }
    @media (max-width: 680px) { .hotel-row { grid-template-columns: 1fr 80px 65px 65px 65px; } }
    .trip-table { overflow-x: auto; border-radius: 12px; border: 1px solid var(--gray-200); margin-top: 12px; }
    .trip-table table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
    .trip-table th { background: linear-gradient(90deg, var(--primary), var(--primary-dark)); color: var(--accent); padding: 10px 12px; text-align: center; }
    .trip-table th:first-child { text-align: left; }
    .trip-table td { padding: 10px 12px; border-bottom: 1px solid var(--gray-100); text-align: center; }
    .trip-table td:first-child { text-align: left; font-weight: 600; }
    .trip-table input { width: 70px; padding: 6px; text-align: center; }
    .payment-section { background: linear-gradient(135deg, #fafbff, #f5f7fa); border-radius: 12px; margin-top: 8px; }
    .payment-label { padding: 12px 16px 4px; font-size: 0.6875rem; font-weight: 800; color: var(--gray-500); text-transform: uppercase; }
    .payment-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 8px 16px 16px; }
    .payment-card { background: white; border: 1px solid var(--gray-200); border-radius: 12px; padding: 10px 8px; text-align: center; }
    .payment-card label { display: block; font-size: 0.625rem; font-weight: 700; color: var(--gray-500); margin-bottom: 6px; }
    .payment-card input { width: 100%; border: none; background: transparent; text-align: center; font-size: 0.875rem; font-weight: 700; padding: 4px; }
    .totals-strip { display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; gap: 16px; padding: 16px 20px; background: white; border-bottom: 1px dashed var(--gray-200); }
    .total-item { text-align: center; }
    .total-item .label { font-size: 0.625rem; font-weight: 700; color: var(--gray-500); text-transform: uppercase; margin-bottom: 4px; }
    .total-item .value { font-size: 1.75rem; font-weight: 900; color: var(--primary); line-height: 1.2; }
    .total-item .currency { font-size: 0.75rem; color: var(--accent-dark); font-weight: 700; }
    .total-item input { width: 110px; padding: 6px 10px; text-align: center; font-weight: 700; }
    .warning-bar { background: #fffbeb; border: 1px solid var(--warning); border-radius: 12px; padding: 12px 16px; color: #b45309; font-weight: 600; font-size: 0.8125rem; margin-bottom: 20px; }
    .warning-bar.info { background: #eff6ff; border-color: var(--info); color: #1e40af; }
    .action-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 24px; }
    .btn { padding: 12px 28px; border: none; border-radius: 40px; font-weight: 800; font-size: 0.8125rem; cursor: pointer; font-family: 'Cairo', sans-serif; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; }
    .btn:hover { transform: translateY(-2px); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: var(--accent); }
    .btn-success { background: linear-gradient(135deg, var(--success), var(--success-dark)); color: white; }
    .btn-danger { background: #fee2e2; color: var(--danger); }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
    .modal.open { display: flex; }
    .modal-content { background: white; width: 90%; max-width: 550px; border-radius: 24px; padding: 24px; box-shadow: 0 20px 35px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto; }
    .modal-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
    .loader-container { text-align: center; padding: 60px; color: var(--gray-500); }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--gray-200); border-top-color: var(--info); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pdf-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1100; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
    .pdf-overlay.show { display: flex; }
    .pdf-spinner { width: 56px; height: 56px; border: 4px solid rgba(255,255,255,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @media (max-width: 640px) { .payment-grid { grid-template-columns: repeat(2, 1fr); } .totals-strip { flex-direction: column; } .container { padding: 16px; } .card-body { padding: 16px; } }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h2>✏️ تعديل الفاتورة</h2>
    <span class="voucher-badge" id="voucherDisplay">---</span>
  </div>
  <div class="header-right">
    <span class="user-chip" id="userNameDisplay">...</span>
    <button class="back-btn" onclick="goBack()">← خروج</button>
  </div>
</div>

<div class="container" id="mainContainer">
  <div class="loader-container" id="loaderState">
    <div class="spinner"></div>
    <div>جاري تحميل بيانات الفاتورة...</div>
  </div>
  <div id="formContent" style="display: none;"></div>
</div>

<div id="collectionModal" class="modal"><div class="modal-content" id="collectionModalContent"></div></div>
<div id="alertModal" class="modal"><div class="modal-content"><div class="modal-message" id="alertMsg"></div><div class="modal-buttons" id="alertBtns"><button class="btn btn-primary" onclick="closeAlert()">موافق</button></div></div></div>
<div id="pdfOverlay" class="pdf-overlay"><div class="pdf-spinner"></div><p id="pdfMsg" style="color:white;">جاري المعالجة...</p></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwe1Q9pjAJRk9CfWsK5YGjD5uVAbJkMhAVgw6akKkFIR9sz15V78C88Vs5dumKE-SwF/exec';
const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
const DASH = { Admin: 'Dashboard.html', Owner: 'OwnerDashboard.html', Sales: 'SalesDashboard.html', Accountant: 'AccountantDashboard.html', Customer: 'CustomerDashboard.html' };

let currentUser = null, currentInvoice = null, originalInvoice = null, openFrom = 'today';
let tripDefinitions = [], allSuppliersCustomers = [], allEmployees = [], exRatesCache = {};

function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function R2(n) { return Math.round((n + Number.EPSILON) * 100) / 100; }
function dV(v) { const n = Number(v); return (n === 0 || isNaN(n)) ? '' : n; }
function formatDate(d) { return `${String(d.getDate()).padStart(2,'0')}/${MONTHS[d.getMonth()]}/${d.getFullYear()}`; }
function parseDate(str) { if (!str) return null; const p = str.split('/'); if (p.length === 3) { const mi = MONTHS.findIndex(m => m.toLowerCase() === p[1].toLowerCase()); if (mi !== -1) return new Date(+p[2], mi, +p[0]); } return null; }
function dateToInput(s) { const d = parseDate(s); if (!d) return ''; return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function timeToInput(t) { if (!t) return ''; const m = String(t).match(/(\d{1,2}):(\d{2})/); return m ? `${m[1].padStart(2,'0')}:${m[2]}` : String(t).substring(0,5); }

function showAlert(msg, btns = null) { document.getElementById('alertMsg').textContent = msg; if (btns) document.getElementById('alertBtns').innerHTML = btns; else document.getElementById('alertBtns').innerHTML = '<button class="btn btn-primary" onclick="closeAlert()">موافق</button>'; document.getElementById('alertModal').classList.add('open'); }
function closeAlert() { document.getElementById('alertModal').classList.remove('open'); }
function showPDF(m) { document.getElementById('pdfMsg').textContent = m; document.getElementById('pdfOverlay').classList.add('show'); }
function hidePDF() { document.getElementById('pdfOverlay').classList.remove('show'); }
function goBack() { const returnUrl = sessionStorage.getItem('returnUrl'); if (returnUrl) location.href = returnUrl; else location.href = DASH[currentUser?.type] || 'Dashboard.html'; }

async function gas(action, params = {}) {
  const url = new URL(GAS_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v ?? '')));
  const res = await fetch(url.toString(), { redirect: 'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function loadSuppliersAndTrips() {
  try { 
    const [suppliers, trips, employees] = await Promise.all([
      gas('getAllSuppliersCustomers'), 
      gas('getAllTrips'),
      gas('getAllEmployees')
    ]); 
    allSuppliersCustomers = Array.isArray(suppliers) ? suppliers : []; 
    tripDefinitions = Array.isArray(trips) ? trips : [];
    allEmployees = Array.isArray(employees) ? employees : [];
  } catch(e) { console.warn(e); }
}
function getTripCategory(tripName) { const trip = tripDefinitions.find(t => t.name === tripName); return trip?.category || ''; }
function getCustomersByCategory(cat) { if (!cat) return []; return allSuppliersCustomers.filter(c => c.customerType === 'Customer' && c.category === cat && c.status === true); }
function getSuppliersByCategory(cat) { if (!cat) return []; return allSuppliersCustomers.filter(s => s.customerType === 'Supplier' && s.category === cat && s.status === true); }

async function getRate(dateStr) {
  if (!dateStr) return null;
  if (exRatesCache[dateStr]) return exRatesCache[dateStr];
  try { const r = await gas('getExchangeRate', { dateStr }); if (r) { exRatesCache[dateStr] = r; return r; } } catch(e) {}
  return null;
}
function rateFields(r) {
  if (!r) return null;
  if (r.cash) return r;
  return { cash: { USD: +r.sUSD || 47.5, EUR: +r.sEUR || 50.25, GBP: +r.sGBP || 60 }, visa: { USD: +r.sVUSD || 46.3, EUR: +r.sVEUR || 49, GBP: +r.sVGBP || 58.5, LE: +r.sVLE || 0.975 } };
}
function directPaid(cur, cU, cE, cG, cL, vU, vE, vG, vL) { if (cur === '$') return cU + vU; if (cur === '€') return cE + vE; if (cur === '£') return cG + vG; return cL + vL; }

function calculateTotalFromItems() {
  let total = 0;
  for (let i = 0; i < 20; i++) {
    const totalEl = document.getElementById(`total_${i}`);
    if (totalEl) total += parseFloat(totalEl.value) || 0;
  }
  return total;
}

// دالة لجمع جميع المدفوعات للفاتورة (الأصلية + فواتير التحصيل)
async function getTotalPaymentsForInvoice(voucherNo) {
  try {
    // استخدام دالة getInvoiceByVoucher لجلب الفاتورة الأصلية
    const originalResult = await gas('getInvoiceByVoucher', { voucherNo: voucherNo });
    if (!originalResult || !originalResult.success) {
      console.log('⚠️ لم يتم العثور على الفاتورة:', voucherNo);
      return null;
    }
    const original = originalResult.invoice;
    
    console.log('💰 الفاتورة الأصلية - voucherNo:', original.VoucherNo || original.voucherNo);
    
    // استخدام الأسماء الصحيحة للأعمدة
    const cashUSD = original['$'] || 0;
    const cashEUR = original['€'] || 0;
    const cashGBP = original['£'] || 0;
    const cashLE = original['LE'] || 0;
    const visaUSD = original['Visa$'] || 0;
    const visaEUR = original['Visa€'] || 0;
    const visaGBP = original['Visa£'] || 0;
    const visaLE = original['VisaLE'] || 0;
    
    console.log('💰 الفاتورة الأصلية - cashEUR:', cashEUR);
    
    // بدء المجاميع
    let totalCashUSD = cashUSD;
    let totalCashEUR = cashEUR;
    let totalCashGBP = cashGBP;
    let totalCashLE = cashLE;
    let totalVisaUSD = visaUSD;
    let totalVisaEUR = visaEUR;
    let totalVisaGBP = visaGBP;
    let totalVisaLE = visaLE;
    
    // جلب فواتير التحصيل
    const allInvoices = await gas('getAllInvoices', { includeCollection: true });
    if (Array.isArray(allInvoices)) {
      const collectionInvoices = allInvoices.filter(inv => {
        return inv.ParentVoucherNo === voucherNo || (inv.VoucherNo && inv.VoucherNo.startsWith(voucherNo + '-C'));
      });
      
      console.log('💰 عدد فواتير التحصيل:', collectionInvoices.length);
      
      for (const coll of collectionInvoices) {
        totalCashUSD += (coll['$'] || 0);
        totalCashEUR += (coll['€'] || 0);
        totalCashGBP += (coll['£'] || 0);
        totalCashLE += (coll['LE'] || 0);
        totalVisaUSD += (coll['Visa$'] || 0);
        totalVisaEUR += (coll['Visa€'] || 0);
        totalVisaGBP += (coll['Visa£'] || 0);
        totalVisaLE += (coll['VisaLE'] || 0);
      }
    }
    
    console.log('💰 بعد الجمع - totalCashEUR:', totalCashEUR);
    
    // حساب المبلغ المدفوع باستخدام أسعار الصرف
    const currency = original['InvoiceCurrency '] || original.invoiceCurrency || 'LE';
    const activeDate = original.ActiveDate || original.activeDate;
    let totalPaymentPrice = 0;
    
    if (activeDate) {
      const raw = await getRate(activeDate);
      const r = rateFields(raw);
      if (r) {
        const totalLE = totalCashUSD * r.cash.USD + totalCashEUR * r.cash.EUR + totalCashGBP * r.cash.GBP + totalCashLE +
                        totalVisaUSD * r.visa.USD + totalVisaEUR * r.visa.EUR + totalVisaGBP * r.visa.GBP + totalVisaLE * (r.visa.LE || 0.975);
        if (currency === '$') totalPaymentPrice = R2(totalLE / r.cash.USD);
        else if (currency === '€') totalPaymentPrice = R2(totalLE / r.cash.EUR);
        else if (currency === '£') totalPaymentPrice = R2(totalLE / r.cash.GBP);
        else totalPaymentPrice = R2(totalLE);
      } else {
        totalPaymentPrice = totalCashUSD + totalCashEUR + totalCashGBP + totalCashLE + totalVisaUSD + totalVisaEUR + totalVisaGBP + totalVisaLE;
      }
    } else {
      totalPaymentPrice = totalCashUSD + totalCashEUR + totalCashGBP + totalCashLE + totalVisaUSD + totalVisaEUR + totalVisaGBP + totalVisaLE;
    }
    
    const actualPrice = original.ActualPrice || original.actualPrice || 0;
    const discount = original['Discount '] || original.discount || 0;
    const rest = actualPrice - discount - totalPaymentPrice;
    
    console.log('💰 النتائج النهائية - totalPaymentPrice:', totalPaymentPrice, 'rest:', rest);
    
    return {
      paymentPrice: totalPaymentPrice,
      cashUSD: totalCashUSD,
      cashEUR: totalCashEUR,
      cashGBP: totalCashGBP,
      cashLE: totalCashLE,
      visaUSD: totalVisaUSD,
      visaEUR: totalVisaEUR,
      visaGBP: totalVisaGBP,
      visaLE: totalVisaLE,
      rest: rest > 0 ? rest : 0,
      actualPrice: actualPrice,
      discount: discount
    };
  } catch(e) {
    console.error('getTotalPaymentsForInvoice error:', e);
    return null;
  }
}
  // دالة لجلب فواتير التحصيل المرتبطة برقم فاتورة معين
function getAllInvoices(includeCollection = false) {
  try {
    const s = SpreadsheetApp.openById(SHEET_ID).getSheetByName("Invoices");
    if (!s) return [];
    
    const raw = s.getDataRange().getValues();
    if (raw.length < 2) return [];
    
    let rows = raw.slice(1);
    
    // تصفية الفواتير التي تبدأ بـ INV
    rows = rows.filter(row => {
      const voucherNo = row[1] ? row[1].toString().trim() : '';
      return voucherNo.startsWith('INV');
    });
    
    const result = rows.map(row => {
      return {
        rest: Number(row[0]) || 0,
        voucherNo: String(row[1] || ""),
        issueDate: row[2] ? row[2].toString() : "",
        activeDate: row[3] ? row[3].toString() : "",
        salesId: String(row[4] || ""),
        time: String(row[5] || ""),
        trip: String(row[6] || ""),
        cashUSD: Number(row[17]) || 0,
        cashEUR: Number(row[18]) || 0,
        cashGBP: Number(row[19]) || 0,
        cashLE: Number(row[20]) || 0,
        visaUSD: Number(row[21]) || 0,
        visaEUR: Number(row[22]) || 0,
        visaGBP: Number(row[23]) || 0,
        visaLE: Number(row[24]) || 0,
        hotel: String(row[25] || ""),
        roomNo: String(row[26] || ""),
        nationality: String(row[27] || ""),
        guestName: String(row[28] || ""),
        contactNo: String(row[29] || ""),
        notes: String(row[30] || ""),
        supplier: String(row[31] || ""),
        customer: String(row[32] || ""),
        state: String(row[33] || ""),
        actualPrice: Number(row[34]) || 0,
        paymentPrice: Number(row[35]) || 0,
        invoiceCurrency: String(row[41] || ""),
        centerName: String(row[43] || ""),
        branchName: String(row[44] || ""),
        salesName: String(row[45] || ""),
        discount: Number(row[46]) || 0,
        adultCount: Number(row[47]) || 0,
        childCount: Number(row[48]) || 0,
        infantCount: Number(row[49]) || 0,
        activitiesText: String(row[50] || ""),
        receiptType: String(row[55] || ""),
        parentVoucherNo: String(row[56] || ""),
        collectionNumber: Number(row[57]) || 0,
        collectedBy: String(row[58] || ""),
        collectedByName: String(row[59] || ""),
        collectionDate: String(row[60] || ""),
        paymentMethod: String(row[61] || ""),
        transferredToTreasury: String(row[62] || "")
      };
    });
    
    if (!includeCollection) {
      return result.filter(r => r.receiptType !== 'Collection');
    }
    return result;
  } catch(e) {
    console.error('❌ getAllInvoices error:', e);
    return [];
  }
}
function getCurrentDiscount() {
  return parseFloat(document.getElementById('discount')?.value) || 0;
}

function getCurrentRest() {
  const actualPrice = calculateTotalFromItems() > 0 ? calculateTotalFromItems() : (currentInvoice?.actualPrice || 0);
  const discount = getCurrentDiscount();
  const paid = parseFloat(document.getElementById('displayPaymentPrice')?.textContent) || 0;
  return actualPrice - discount - paid;
}

async function updateTotals() {
  const currency = document.getElementById('invoiceCurrency')?.value;
  const dateStr = document.getElementById('activeDate')?.value;
  
  const actualFromItems = calculateTotalFromItems();
  const actualPrice = actualFromItems > 0 ? actualFromItems : (currentInvoice?.actualPrice || 0);
  
  const disc = getCurrentDiscount();
  const cU = parseFloat(document.getElementById('cashUSD')?.value) || 0;
  const cE = parseFloat(document.getElementById('cashEUR')?.value) || 0;
  const cG = parseFloat(document.getElementById('cashGBP')?.value) || 0;
  const cL = parseFloat(document.getElementById('cashLE')?.value) || 0;
  const vU = parseFloat(document.getElementById('visaUSD')?.value) || 0;
  const vE = parseFloat(document.getElementById('visaEUR')?.value) || 0;
  const vG = parseFloat(document.getElementById('visaGBP')?.value) || 0;
  const vL = parseFloat(document.getElementById('visaLE')?.value) || 0;
  
  let paid = 0;
  if (dateStr) {
    const raw = await getRate(dateStr);
    const r = rateFields(raw);
    if (r) {
      const LE = cU * r.cash.USD + cE * r.cash.EUR + cG * r.cash.GBP + cL +
                 vU * r.visa.USD + vE * r.visa.EUR + vG * r.visa.GBP + vL * (r.visa.LE || 0.975);
      if (currency === '$') paid = R2(LE / r.cash.USD);
      else if (currency === '€') paid = R2(LE / r.cash.EUR);
      else if (currency === '£') paid = R2(LE / r.cash.GBP);
      else paid = R2(LE);
    } else {
      paid = directPaid(currency, cU, cE, cG, cL, vU, vE, vG, vL);
    }
  } else {
    paid = directPaid(currency, cU, cE, cG, cL, vU, vE, vG, vL);
  }
  
  const rest = R2(actualPrice - disc - paid);
  
  const actualPriceEl = document.getElementById('displayActualPrice');
  const paymentPriceEl = document.getElementById('displayPaymentPrice');
  const restEl = document.getElementById('displayRest');
  
  if (actualPriceEl) actualPriceEl.textContent = actualPrice.toFixed(2);
  if (paymentPriceEl) paymentPriceEl.textContent = paid.toFixed(2);
  if (restEl) restEl.textContent = rest.toFixed(2);
}
  
function updateItemTotal(idx, price) { 
  const qty = parseFloat(document.getElementById(`qty_${idx}`)?.value) || 0; 
  const tot = document.getElementById(`total_${idx}`); 
  if (tot) tot.value = (qty * price).toFixed(2); 
  updateTotals(); 
}
function parseActivities(text) { 
  const res = []; 
  if (!text) return res; 
  text.split('|').forEach(p => { 
    const m = p.trim().match(/^(.+?)×(\d+(\.\d+)?)$/); 
    if (m) res.push({ name: m[1].trim(), qty: parseFloat(m[2]) || 0 }); 
  }); 
  return res; 
}

async function updateCollectionPreview() {
  const currency = document.getElementById('invoiceCurrency')?.value || currentInvoice?.invoiceCurrency || 'LE';
  const activeDate = document.getElementById('activeDate')?.value;
  
  const cU = Number(document.getElementById('collUSD')?.value) || 0;
  const cE = Number(document.getElementById('collEUR')?.value) || 0;
  const cG = Number(document.getElementById('collGBP')?.value) || 0;
  const cL = Number(document.getElementById('collLE')?.value) || 0;
  const vU = Number(document.getElementById('collVisaUSD')?.value) || 0;
  const vE = Number(document.getElementById('collVisaEUR')?.value) || 0;
  const vG = Number(document.getElementById('collVisaGBP')?.value) || 0;
  const vL = Number(document.getElementById('collVisaLE')?.value) || 0;
  
  let collectedTotal = 0;
  
  if (activeDate && (cU + cE + cG + cL + vU + vE + vG + vL) > 0) {
    const raw = await getRate(activeDate);
    const r = rateFields(raw);
    if (r) {
      const totalLE = cU * r.cash.USD + cE * r.cash.EUR + cG * r.cash.GBP + cL +
                      vU * r.visa.USD + vE * r.visa.EUR + vG * r.visa.GBP + vL * (r.visa.LE || 0.975);
      
      if (currency === '$') collectedTotal = R2(totalLE / r.cash.USD);
      else if (currency === '€') collectedTotal = R2(totalLE / r.cash.EUR);
      else if (currency === '£') collectedTotal = R2(totalLE / r.cash.GBP);
      else collectedTotal = R2(totalLE);
      
      console.log('💰 updateCollectionPreview - totalLE:', totalLE.toFixed(2), 'collectedTotal:', collectedTotal);
    } else {
      collectedTotal = cU + cE + cG + cL + vU + vE + vG + vL;
    }
  } else {
    collectedTotal = cU + cE + cG + cL + vU + vE + vG + vL;
  }
  
  document.getElementById('collectionTotalDisplay').textContent = collectedTotal.toFixed(2);
  const currentRest = getCurrentRest();
  let newRest = currentRest - collectedTotal;
  if (newRest < 0) newRest = 0;
  
  const newRestField = document.getElementById('newRestPreview');
  if (newRestField) {
    newRestField.value = newRest.toFixed(2);
    newRestField.readOnly = newRest > 5;
  }
}

        <div class="trip-table"><table><thead><tr><th style="text-align:left">البند</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead><tbody id="itemsBody">${tRows}</tbody></table></div>
      </div></div>
      <div class="card"><div class="card-header"><span class="icon">💰</span><h3>المدفوعات والإجماليات</h3></div>
        <div class="totals-strip">
          <div class="total-item"><div class="label">الخصم</div><input type="number" id="discount" min="0" step="0.01" value="${dV(currentInvoice.discount)}" oninput="updateTotals()"></div>
          <div class="total-item"><div class="label">إجمالي الفاتورة</div><div class="value" id="displayActualPrice">${(currentInvoice.actualPrice || 0).toFixed(2)}</div><div class="currency">${currentInvoice.invoiceCurrency || ''}</div></div>
          <div class="total-item"><div class="label">المدفوع</div><div class="value" id="displayPaymentPrice">${(currentInvoice.paymentPrice || 0).toFixed(2)}</div><div class="currency">${currentInvoice.invoiceCurrency || ''}</div></div>
          <div class="total-item"><div class="label">المتبقي</div><div class="value" id="displayRest">${(currentInvoice.rest || 0).toFixed(2)}</div><div class="currency">${currentInvoice.invoiceCurrency || ''}</div></div>
        </div>
        <div class="payment-section"><div class="payment-label">💵 كاش</div><div class="payment-grid">
          <div class="payment-card"><label>USD $</label><input type="number" id="cashUSD" step="0.01" value="${dV(currentInvoice.cashUSD)}" oninput="updateTotals()" ${disPayments}></div>
          <div class="payment-card"><label>EUR €</label><input type="number" id="cashEUR" step="0.01" value="${dV(currentInvoice.cashEUR)}" oninput="updateTotals()" ${disPayments}></div>
          <div class="payment-card"><label>GBP £</label><input type="number" id="cashGBP" step="0.01" value="${dV(currentInvoice.cashGBP)}" oninput="updateTotals()" ${disPayments}></div>
          <div class="payment-card"><label>EGP LE</label><input type="number" id="cashLE" step="0.01" value="${dV(currentInvoice.cashLE)}" oninput="updateTotals()" ${disPayments}></div>
        </div></div>
        <div class="payment-section"><div class="payment-label">💳 فيزا / بطاقة</div><div class="payment-grid">
          <div class="payment-card"><label>Visa $</label><input type="number" id="visaUSD" step="0.01" value="${dV(currentInvoice.visaUSD)}" oninput="updateTotals()" ${disPayments}></div>
          <div class="payment-card"><label>Visa €</label><input type="number" id="visaEUR" step="0.01" value="${dV(currentInvoice.visaEUR)}" oninput="updateTotals()" ${disPayments}></div>
          <div class="payment-card"><label>Visa £</label><input type="number" id="visaGBP" step="0.01" value="${dV(currentInvoice.visaGBP)}" oninput="updateTotals()" ${disPayments}></div>
          <div class="payment-card"><label>Visa LE</label><input type="number" id="visaLE" step="0.01" value="${dV(currentInvoice.visaLE)}" oninput="updateTotals()" ${disPayments}></div>
        </div></div>
        <div class="card-body" style="padding-top:0"><div class="form-group"><label>ملاحظات</label><textarea id="notes" rows="2">${esc(currentInvoice.notes)}</textarea></div></div>
      </div>
      <div class="card"><div class="card-header"><span class="icon">🏢</span><h3>معلومات إضافية</h3></div><div class="card-body"><div class="form-grid">
        <div class="form-group"><label>المنفذ</label><select id="supplier">${supOpts}</select></div>
        <div class="form-group"><label>العميل</label><select id="customer">${custOpts}</select></div>
        <div class="form-group"><label>الحالة</label><select id="state"><option value="pending" ${currentInvoice.state === 'pending' ? 'selected' : ''}>⏳ قيد الانتظار</option><option value="Confirmed" ${(currentInvoice.state === 'Confirmed' || currentInvoice.state === 'confirmed') ? 'selected' : ''}>✅ مؤكد</option><option value="cancel" ${currentInvoice.state === 'cancel' ? 'selected' : ''}>❌ ملغي</option></select></div>
      </div></div></div>
      <div class="action-buttons">
        <button class="btn btn-success" id="collectionBtn" ${disableCollectionBtn ? 'disabled' : ''}>💰 تحصيل دفعة</button>
        <button class="btn btn-primary" onclick="saveChanges()">💾 حفظ التعديلات</button>
        <button class="btn btn-danger" onclick="cancelEdit()">❌ إلغاء</button>
      </div>
    `;
    document.getElementById('loaderState').style.display = 'none';
    document.getElementById('formContent').style.display = 'block';
    document.getElementById('formContent').innerHTML = formHtml;
    document.getElementById('collectionBtn')?.addEventListener('click', openCollectionModal);
    
    // تعبئة حقول المدفوعات (مرة أخرى للتأكيد)
    document.getElementById('cashUSD').value = dV(currentInvoice.cashUSD);
    document.getElementById('cashEUR').value = dV(currentInvoice.cashEUR);
    document.getElementById('cashGBP').value = dV(currentInvoice.cashGBP);
    document.getElementById('cashLE').value = dV(currentInvoice.cashLE);
    document.getElementById('visaUSD').value = dV(currentInvoice.visaUSD);
    document.getElementById('visaEUR').value = dV(currentInvoice.visaEUR);
    document.getElementById('visaGBP').value = dV(currentInvoice.visaGBP);
    document.getElementById('visaLE').value = dV(currentInvoice.visaLE);
    document.getElementById('discount').value = dV(currentInvoice.discount);
    
    await updateTotals();
  } catch(err) { hidePDF(); showAlert('خطأ: ' + err.message, '<button class="btn btn-primary" onclick="goBack()">رجوع</button>'); document.getElementById('loaderState').style.display = 'none'; }
  finally { hidePDF(); }
}
async function collectEditedData() {
  const currency = document.getElementById('invoiceCurrency')?.value;
  const activeDateInput = document.getElementById('activeDate')?.value;
  let activeDate = '';
  if (activeDateInput) { const d = new Date(activeDateInput); activeDate = formatDate(d); }
  const items = [];
  for (let i = 0; i < 20; i++) {
    const qtyEl = document.getElementById(`qty_${i}`);
    if (qtyEl) {
      const qty = parseFloat(qtyEl.value) || 0;
      const nameEl = document.querySelector(`#itemsBody tr:nth-child(${i + 1}) td:first-child`);
      if (qty > 0 && nameEl) items.push(`${nameEl.textContent}×${qty}`);
    }
  }
  let actualPrice = parseFloat(currentInvoice.actualPrice) || 0;
  let itemsTotal = 0;
  for (let i = 0; i < 20; i++) { const totalEl = document.getElementById(`total_${i}`); if (totalEl) itemsTotal += parseFloat(totalEl.value) || 0; }
  if (itemsTotal > 0 && itemsTotal !== actualPrice) actualPrice = itemsTotal;
  
  const disc = parseFloat(document.getElementById('discount')?.value) || 0;
  const cU = parseFloat(document.getElementById('cashUSD')?.value) || 0;
  const cE = parseFloat(document.getElementById('cashEUR')?.value) || 0;
  const cG = parseFloat(document.getElementById('cashGBP')?.value) || 0;
  const cL = parseFloat(document.getElementById('cashLE')?.value) || 0;
  const vU = parseFloat(document.getElementById('visaUSD')?.value) || 0;
  const vE = parseFloat(document.getElementById('visaEUR')?.value) || 0;
  const vG = parseFloat(document.getElementById('visaGBP')?.value) || 0;
  const vL = parseFloat(document.getElementById('visaLE')?.value) || 0;
  
  let paid = 0;
  const dateStr = document.getElementById('activeDate')?.value;
  if (dateStr) {
    const raw = await getRate(dateStr);
    const r = rateFields(raw);
    if (r) {
      const LE = cU * r.cash.USD + cE * r.cash.EUR + cG * r.cash.GBP + cL + vU * r.visa.USD + vE * r.visa.EUR + vG * r.visa.GBP + vL * (r.visa.LE || 0.975);
      if (currency === '$') paid = R2(LE / r.cash.USD);
      else if (currency === '€') paid = R2(LE / r.cash.EUR);
      else if (currency === '£') paid = R2(LE / r.cash.GBP);
      else paid = R2(LE);
    } else paid = directPaid(currency, cU, cE, cG, cL, vU, vE, vG, vL);
  } else paid = directPaid(currency, cU, cE, cG, cL, vU, vE, vG, vL);
  const rest = R2(actualPrice - disc - paid);
  
  return {
    voucherNo: currentInvoice.voucherNo, issueDate: currentInvoice.issueDate, activeDate: activeDate,
    time: document.getElementById('tripTime')?.value || '', contactNo: document.getElementById('contactNo')?.value || '',
    guestName: document.getElementById('guestName')?.value || '', nationality: document.getElementById('nationality')?.value || '',
    hotel: document.getElementById('hotel')?.value || '', roomNo: document.getElementById('roomNo')?.value || '',
    trip: document.getElementById('tripName')?.value || '', invoiceCurrency: currency || '',
    adultCount: parseInt(document.getElementById('adultCount')?.value) || 0, childCount: parseInt(document.getElementById('childCount')?.value) || 0,
    infantCount: parseInt(document.getElementById('infantCount')?.value) || 0,
    cashUSD: cU, cashEUR: cE, cashGBP: cG, cashLE: cL, visaUSD: vU, visaEUR: vE, visaGBP: vG, visaLE: vL,
    actualPrice: actualPrice, paymentPrice: paid, discount: disc, rest: rest,
    activitiesText: items.join(' | '), supplier: document.getElementById('supplier')?.value || '',
    customer: document.getElementById('customer')?.value || '', state: document.getElementById('state')?.value || 'pending',
    notes: document.getElementById('notes')?.value || '', salesId: currentInvoice.salesId,
    centerName: currentInvoice.centerName, branchName: currentInvoice.branchName, salesName: currentInvoice.salesName,
    cost: currentInvoice.cost || ''
  };
}

function createEditSummary(orig, edited) {
  const changes = [];
  const cur = edited.invoiceCurrency || '$';
  if ((orig.discount || 0) !== (edited.discount || 0)) { const d = (edited.discount || 0) - (orig.discount || 0); changes.push(`💰 الخصم ${d > 0 ? '+' : ''}${d} ${cur}`); }
  if (orig.state !== edited.state) changes.push(`📌 الحالة: ${orig.state} → ${edited.state}`);
  const ot = timeToInput(orig.time || ''), et = timeToInput(edited.time || '');
  if (ot !== et) changes.push(`⏰ الوقت: ${ot} → ${et}`);
  return changes.length ? changes.join(' | ') : 'لا توجد تغييرات';
}

async function saveChanges() {
  const issueDate = currentInvoice.issueDate;
  const today = formatDate(new Date());
  const isPastDate = (issueDate < today);
  const editedData = await collectEditedData();
  if (isPastDate) {
    editedData.cashUSD = currentInvoice.cashUSD;
    editedData.cashEUR = currentInvoice.cashEUR;
    editedData.cashGBP = currentInvoice.cashGBP;
    editedData.cashLE = currentInvoice.cashLE;
    editedData.visaUSD = currentInvoice.visaUSD;
    editedData.visaEUR = currentInvoice.visaEUR;
    editedData.visaGBP = currentInvoice.visaGBP;
    editedData.visaLE = currentInvoice.visaLE;
    const actualPrice = editedData.actualPrice;
    const disc = editedData.discount || 0;
    const paid = currentInvoice.paymentPrice;
    editedData.paymentPrice = paid;
    editedData.rest = actualPrice - disc - paid;
  }
  const summary = createEditSummary(originalInvoice, editedData);
  showPDF('جاري حفظ التعديلات...');
  try {
    const upd = await gas('updateInvoice', editedData);
    if (!upd.success) throw new Error(upd.message || 'فشل التحديث');
    await gas('copyInvoiceToEdit', { originalData: JSON.stringify(originalInvoice), editedData: JSON.stringify(editedData), userId: currentUser?.id || '', editSummary: summary });
    showPDF('جاري إنشاء PDF...');
    const pdf = await gas('saveAndGenerateSinglePDF', { voucherNo: editedData.voucherNo });
    hidePDF();
    if (pdf?.success) { showAlert('✅ تم حفظ التعديلات بنجاح', `<a href="${pdf.url}" target="_blank" class="btn btn-primary" style="text-decoration:none;">📄 فتح PDF</a><button class="btn btn-primary" onclick="goBack()">رجوع</button>`); }
    else { showAlert('✅ تم الحفظ (فشل إنشاء PDF: ' + (pdf?.message || '') + ')', '<button class="btn btn-primary" onclick="goBack()">رجوع</button>'); }
  } catch(err) { hidePDF(); showAlert('خطأ: ' + err.message); }
}
async function cancelEdit() { if (confirm('هل أنت متأكد من إلغاء التعديلات؟')) goBack(); }

window.changeTrip = async function() {
  const newTrip = document.getElementById('tripName')?.value;
  const currency = document.getElementById('invoiceCurrency')?.value;
  if (!newTrip || !currency) return;
  const newCategory = getTripCategory(newTrip);
  const newCustomers = getCustomersByCategory(newCategory);
  const newSuppliers = getSuppliersByCategory(newCategory);
  const supSelect = document.getElementById('supplier');
  const custSelect = document.getElementById('customer');
  if (supSelect) supSelect.innerHTML = '<option value="">-- اختر --</option>' + newSuppliers.map(s => `<option value="${esc(s.customerName)}">${esc(s.customerName)}</option>`).join('');
  if (custSelect) custSelect.innerHTML = '<option value="">-- اختر --</option>' + newCustomers.map(c => `<option value="${esc(c.customerName)}">${esc(c.customerName)}</option>`).join('');
  const newTripData = await gas('getTripData', { tripName: newTrip, currency });
  if (newTripData?.items) {
    let rows = '';
    for (let i = 0; i < newTripData.items.length; i++) rows += `<tr><td style="font-weight:600">${esc(newTripData.items[i])}</td><td><input type="number" id="qty_${i}" min="0" placeholder="0" oninput="updateItemTotal(${i}, ${newTripData.prices?.[i] || 0})"></td><td><input type="number" id="price_${i}" value="${newTripData.prices?.[i] || 0}" readonly></td><td><input type="number" id="total_${i}" value="0" readonly></td></tr>`;
    document.getElementById('itemsBody').innerHTML = rows;
  }
  await updateTotals();
};

document.addEventListener('DOMContentLoaded', () => {
  let ud = sessionStorage.getItem('currentUser');
  if (!ud) { const p = new URLSearchParams(location.search).get('user'); if (p) { ud = decodeURIComponent(p); sessionStorage.setItem('currentUser', ud); } }
  if (!ud) { location.href = 'index.html'; return; }
  try { currentUser = JSON.parse(ud); } catch { location.href = 'index.html'; return; }
  if (!sessionStorage.getItem('returnUrl') && document.referrer) sessionStorage.setItem('returnUrl', document.referrer);
  loadInvoice();
});

window.goBack = goBack; window.closeAlert = closeAlert; window.updateTotals = updateTotals;
window.updateItemTotal = updateItemTotal; window.openCollectionModal = openCollectionModal;
window.closeCollectionModal = closeCollectionModal; window.submitCollection = submitCollection;
window.updateCollectionPreview = updateCollectionPreview; window.saveChanges = saveChanges;
window.cancelEdit = cancelEdit;
</script>
