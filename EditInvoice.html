<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Edit Invoice - Diving Centers Management</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
    body { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; padding:20px; }
    .container { max-width:1400px; margin:0 auto; background:white; border-radius:30px; box-shadow:0 20px 60px rgba(0,0,0,0.3); overflow:hidden; }
    .header { background:linear-gradient(135deg,#1e2b4f 0%,#152238 100%); color:white; padding:20px 30px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px; }
    .header h2 { color:#ffd966; font-size:24px; display:flex; align-items:center; gap:10px; }
    .user-info { display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
    .user-details { display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.1); padding:8px 20px; border-radius:40px; border:1px solid #ffd966; }
    .back-btn { background:#ff6b6b; color:white; border:none; padding:8px 25px; border-radius:40px; cursor:pointer; font-weight:600; transition:0.3s; }
    .back-btn:hover { background:#ee5253; transform:translateY(-2px); }
    
    .voucher-badge {
      background: #ffd966;
      color: #1e2b4f;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 16px;
      margin-left: 15px;
    }
    
    .content { padding:30px; }
    .section-title { color:#1e2b4f; font-size:18px; font-weight:700; margin:25px 0 15px; padding-bottom:10px; border-bottom:2px solid #ffd966; }
    .form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; margin-bottom:15px; }
    .form-group { margin-bottom:10px; }
    .form-group label { display:block; margin-bottom:5px; color:#1e2b4f; font-weight:600; font-size:12px; }
    .form-control { width:100%; padding:8px 12px; border:2px solid #e9f0fa; border-radius:10px; font-size:14px; transition:.25s; background:white; }
    .form-control:focus { border-color:#ffd966; outline:none; }
    .form-control[readonly] { background:#f8f9fa; color:#2c3e50; cursor:default; }
    
    .row-flex {
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
      background: #f8f9fa;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 20px;
    }
    
    .small-input {
      width: 80px;
      text-align: center;
    }
    
    .trip-table { margin:20px 0; overflow-x:auto; }
    .trip-table table { width:100%; border-collapse:collapse; background:white; border-radius:15px; overflow:hidden; box-shadow:0 4px 10px rgba(0,0,0,0.05); }
    .trip-table th { background:#1e2b4f; color:#ffd966; padding:12px; font-weight:600; font-size:13px; }
    .trip-table td { padding:10px; border-bottom:1px solid #e9f0fa; }
    .trip-table input { width:80px; padding:6px; border:2px solid #e9f0fa; border-radius:8px; text-align:center; }
    
    .payment-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 15px 0;
    }
    
    .payment-item {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.03);
    }
    
    .payment-item label {
      display: block;
      margin-bottom: 5px;
      color: #1e2b4f;
      font-weight: 600;
      font-size: 11px;
    }
    
    .payment-item input {
      width: 100%;
      padding: 6px;
      border: 2px solid #e9f0fa;
      border-radius: 8px;
      text-align: center;
      font-size: 13px;
    }
    
    .totals-bar {
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: #f8f9fa;
      padding: 20px;
      border-radius: 15px;
      margin: 20px 0;
      flex-wrap: wrap;
      gap: 20px;
    }
    
    .total-item {
      text-align: center;
      min-width: 150px;
    }
    
    .total-item .label {
      color: #6c757d;
      font-size: 12px;
      margin-bottom: 5px;
    }
    
    .total-item .value {
      font-size: 28px;
      font-weight: 800;
      color: #1e2b4f;
    }
    
    .total-item .currency {
      font-size: 14px;
      color: #ffd966;
      margin-left: 5px;
    }
    
    .total-item input {
      width: 100px;
      padding: 8px;
      border: 2px solid #e9f0fa;
      border-radius: 10px;
      text-align: center;
      font-size: 16px;
    }
    
    .action-buttons { display:flex; gap:15px; justify-content:center; margin-top:30px; flex-wrap:wrap; }
    .btn-primary { background:#1e2b4f; color:white; border:none; padding:12px 30px; border-radius:40px; font-weight:700; font-size:15px; cursor:pointer; transition:0.3s; }
    .btn-primary:hover { background:#ffd966; color:#1e2b4f; }
    .btn-danger { background:#e74c3c; color:white; border:none; padding:12px 30px; border-radius:40px; font-weight:700; font-size:15px; cursor:pointer; }
    .btn-danger:hover { background:#c0392b; }
    
    .loader { border:4px solid #f3f3f3; border-top:4px solid #1e2b4f; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:50px auto; }
    @keyframes spin { to{transform:rotate(360deg);} }
    
    .pdf-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; align-items:center; justify-content:center; flex-direction:column; gap:20px; }
    .pdf-overlay.show { display:flex; }
    .pdf-spinner { width:60px; height:60px; border:6px solid rgba(255,255,255,.3); border-top:6px solid #ffd966; border-radius:50%; animation:spin 1s linear infinite; }
    .pdf-overlay p { color:white; font-size:18px; font-weight:700; }
    
    #alertModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:10000; }
    .alert-content { background:white; width:90%; max-width:500px; border-radius:30px; padding:30px; text-align:center; box-shadow:0 20px 40px rgba(0,0,0,0.3); }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>✏️ تعديل الفاتورة <span class="voucher-badge" id="voucherDisplay"></span></h2>
    <div class="user-info">
      <div class="user-details">
        <span id="userNameDisplay"></span>
      </div>
      <button class="back-btn" onclick="goBack()">🔙 الرجوع</button>
    </div>
  </div>
  <div class="content" id="mainContent">
    <div class="loader"></div>
  </div>
</div>

<!-- PDF Overlay -->
<div class="pdf-overlay" id="pdfOverlay">
  <div class="pdf-spinner"></div>
  <p id="pdfMsg">⏳ جاري حفظ التعديلات...</p>
</div>

<!-- Alert Modal -->
<div id="alertModal">
  <div class="alert-content">
    <div style="font-size:50px;margin-bottom:20px;" id="alertIcon">ℹ️</div>
    <h3 style="color:#1e2b4f;margin-bottom:20px;" id="alertMsg"></h3>
    <div style="display:flex;gap:10px;justify-content:center;" id="alertBtns">
      <button class="btn-primary" onclick="closeAlert()">OK</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyBfwHQQoHb9E2bq0l-u6FLMD2XFKu_d8rZuJLnIq5iko82Bn93Emki6-cvDF_XOyRp/exec';
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let currentUser = null;
let currentInvoice = null;
let originalInvoice = null;
let exchangeRatesCache = {};
let tripsList = [];
let suppliersList = [];
let customersList = [];

// ============ دوال مساعدة ============
function showPDFOverlay(msg) {
  document.getElementById('pdfMsg').textContent = msg || '⏳ جاري حفظ التعديلات...';
  document.getElementById('pdfOverlay').classList.add('show');
}

function hidePDFOverlay() {
  document.getElementById('pdfOverlay').classList.remove('show');
}

function showAlert(msg, icon = 'ℹ️', btnHtml = null) {
  document.getElementById('alertMsg').textContent = msg;
  document.getElementById('alertIcon').textContent = icon;
  if (btnHtml) {
    document.getElementById('alertBtns').innerHTML = btnHtml;
  }
  document.getElementById('alertModal').style.display = 'flex';
}

function closeAlert() {
  document.getElementById('alertModal').style.display = 'none';
}

async function callGAS(action, params = {}) {
  const url = new URL(GAS_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => {
    url.searchParams.set(k, String(v ?? ''));
  });
  const res = await fetch(url.toString(), { redirect: 'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ============ دوال التاريخ ============
function parseDate(str) {
  if (!str) return null;
  const parts = str.split('/');
  if (parts.length === 3) {
    const day = parseInt(parts[0]);
    const monthIndex = MONTHS.findIndex(m => m.toLowerCase() === parts[1].toLowerCase());
    const year = parseInt(parts[2]);
    if (!isNaN(day) && monthIndex !== -1 && !isNaN(year)) {
      return new Date(year, monthIndex, day);
    }
  }
  return null;
}

function formatDate(date) {
  return `${String(date.getDate()).padStart(2,'0')}/${MONTHS[date.getMonth()]}/${date.getFullYear()}`;
}

function dateToInput(dateStr) {
  if (!dateStr) return '';
  const d = parseDate(dateStr);
  if (!d) return '';
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function timeToInput(timeStr) {
  if (!timeStr) return '';
  const match = String(timeStr).match(/(\d{1,2}):(\d{2})/);
  if (match) {
    return `${match[1].padStart(2,'0')}:${match[2]}`;
  }
  return timeStr.substring(0,5);
}

// ============ تحليل ActivitiesText إلى items ============
function parseActivities(text) {
  const items = [];
  if (!text) return items;
  
  const parts = text.split('|');
  parts.forEach(part => {
    const match = part.trim().match(/^(.+?)×(\d+(\.\d+)?)$/);
    if (match) {
      items.push({
        name: match[1].trim(),
        qty: parseFloat(match[2]) || 0
      });
    }
  });
  return items;
}

// ============ دالة لجلب سعر الصرف ============
async function getExchangeRateForDate(dateStr) {
  if (exchangeRatesCache[dateStr]) {
    return exchangeRatesCache[dateStr];
  }
  try {
    const rate = await callGAS('getExchangeRate', { dateStr });
    if (rate) {
      exchangeRatesCache[dateStr] = rate;
      return rate;
    }
    return null;
  } catch (e) {
    console.error('❌ خطأ في جلب سعر الصرف:', e);
    return null;
  }
}

// ============ جلب قائمة الرحلات ============
async function loadTripsList() {
  try {
    const trips = await callGAS('getAllTrips');
    tripsList = Array.isArray(trips) ? trips : [];
  } catch (e) {
    console.error('❌ خطأ في جلب الرحلات:', e);
  }
}

// ============ جلب بيانات الرحلة والأسعار ============
async function loadTripData(tripName, currency) {
  if (!tripName || !currency) return null;
  try {
    const data = await callGAS('getTripData', { tripName, currency });
    return data;
  } catch (e) {
    console.error('❌ خطأ في جلب بيانات الرحلة:', e);
    return null;
  }
}

// ============ جلب القوائم (Supplier, Customer) ============
async function loadLists() {
  try {
    const invoices = await callGAS('getAllInvoices');
    if (Array.isArray(invoices)) {
      // استخراج قيم فريدة من Supplier و Customer
      const supplierSet = new Set();
      const customerSet = new Set();
      invoices.forEach(inv => {
        if (inv.supplier && inv.supplier.trim()) supplierSet.add(inv.supplier.trim());
        if (inv.customer && inv.customer.trim()) customerSet.add(inv.customer.trim());
      });
      suppliersList = Array.from(supplierSet).sort();
      customersList = Array.from(customerSet).sort();
    }
  } catch (e) {
    console.error('❌ خطأ في جلب القوائم:', e);
  }
}

// ============ جلب بيانات الفاتورة ============
async function loadInvoice() {
  const params = new URLSearchParams(window.location.search);
  const voucherNo = params.get('voucherNo');
  
  if (!voucherNo) {
    showAlert('رقم الفاتورة غير موجود', '❌', '<button class="btn-primary" onclick="goBack()">الرجوع</button>');
    return;
  }
  
  try {
    showPDFOverlay('⏳ جلب بيانات الفاتورة...');
    
    // جلب القوائم أولاً
    await Promise.all([
      loadTripsList(),
      loadLists()
    ]);
    
    // جلب الفاتورة
    const result = await callGAS('getAllInvoices');
    const invoices = Array.isArray(result) ? result : [];
    
    currentInvoice = invoices.find(inv => inv.voucherNo === voucherNo);
    
    if (!currentInvoice) {
      throw new Error('الفاتورة غير موجودة');
    }
    
    originalInvoice = JSON.parse(JSON.stringify(currentInvoice));
    
    document.getElementById('voucherDisplay').textContent = currentInvoice.voucherNo;
    console.log('✅ تم جلب الفاتورة:', currentInvoice);
    hidePDFOverlay();
    
    // جلب بيانات الرحلة الحالية
    if (currentInvoice.trip && currentInvoice.invoiceCurrency) {
      const tripData = await loadTripData(currentInvoice.trip, currentInvoice.invoiceCurrency);
      renderEditForm(tripData);
    } else {
      renderEditForm(null);
    }
    
  } catch (error) {
    console.error('❌ خطأ:', error);
    hidePDFOverlay();
    showAlert('خطأ في جلب بيانات الفاتورة: ' + error.message, '❌', 
      '<button class="btn-primary" onclick="goBack()">الرجوع</button>');
  }
}

// ============ عرض نموذج التعديل ============
function renderEditForm(tripData) {
  if (!currentInvoice) return;
  
  const activities = parseActivities(currentInvoice.activitiesText || '');
  
  // بناء خيارات الرحلات
  let tripsOptions = '';
  tripsList.forEach(trip => {
    const selected = trip.name === currentInvoice.trip ? 'selected' : '';
    tripsOptions += `<option value="${trip.name}" ${selected}>${trip.name}</option>`;
  });
  
  // بناء خيارات Supplier
  let supplierOptions = '<option value="">-- اختر --</option>';
  suppliersList.forEach(sup => {
    const selected = sup === currentInvoice.supplier ? 'selected' : '';
    supplierOptions += `<option value="${sup}" ${selected}>${sup}</option>`;
  });
  
  // بناء خيارات Customer
  let customerOptions = '<option value="">-- اختر --</option>';
  customersList.forEach(cust => {
    const selected = cust === currentInvoice.customer ? 'selected' : '';
    customerOptions += `<option value="${cust}" ${selected}>${cust}</option>`;
  });
  
  // بناء جدول البنود مع الأسعار
  let itemsRows = '';
  if (tripData && tripData.items && tripData.prices) {
    tripData.items.forEach((itemName, index) => {
      const qty = activities.find(a => a.name === itemName)?.qty || 0;
      const price = tripData.prices[index] || 0;
      itemsRows += `
        <tr>
          <td>${itemName}</td>
          <td><input type="number" class="item-qty" data-index="${index}" value="${qty}" min="0" step="1" onchange="updateItemTotal(${index}, ${price})"></td>
          <td><input type="number" class="item-price" value="${price}" readonly></td>
          <td><input type="number" class="item-total" id="total_${index}" value="${(qty * price).toFixed(2)}" readonly></td>
        </tr>
      `;
    });
  } else {
    itemsRows = '<tr><td colspan="4" style="text-align:center;padding:20px;">لا يمكن تحميل بيانات الرحلة</td></tr>';
  }
  
  document.getElementById('mainContent').innerHTML = `
    <div class="section-title">👤 بيانات العميل</div>
    <div class="form-grid">
      <div class="form-group">
        <label>رقم الهاتف</label>
        <input type="text" class="form-control" id="contactNo" value="${currentInvoice.contactNo || ''}">
      </div>
      <div class="form-group">
        <label>اسم العميل</label>
        <input type="text" class="form-control" id="guestName" value="${currentInvoice.guestName || ''}">
      </div>
      <div class="form-group">
        <label>الجنسية</label>
        <input type="text" class="form-control" id="nationality" value="${currentInvoice.nationality || ''}">
      </div>
      <div class="form-group">
        <label>الفندق</label>
        <input type="text" class="form-control" id="hotel" value="${currentInvoice.hotel || ''}">
      </div>
      <div class="form-group">
        <label>رقم الغرفة</label>
        <input type="text" class="form-control" id="roomNo" value="${currentInvoice.roomNo || ''}">
      </div>
    </div>

    <div class="section-title">🏝️ بيانات الرحلة</div>
    <div class="row-flex">
      <div class="form-group" style="min-width:120px;">
        <label>التاريخ</label>
        <input type="date" class="form-control" id="activeDate" value="${dateToInput(currentInvoice.activeDate)}" onchange="updateTotals()">
      </div>
      <div class="form-group" style="min-width:100px;">
        <label>الوقت</label>
        <input type="time" class="form-control" id="time" value="${timeToInput(currentInvoice.time)}">
      </div>
      <div class="form-group" style="min-width:120px;">
        <label>العملة</label>
        <select class="form-control" id="invoiceCurrency" onchange="changeCurrency()">
          <option value="$" ${currentInvoice.invoiceCurrency === '$' ? 'selected' : ''}>USD ($)</option>
          <option value="€" ${currentInvoice.invoiceCurrency === '€' ? 'selected' : ''}>EUR (€)</option>
          <option value="£" ${currentInvoice.invoiceCurrency === '£' ? 'selected' : ''}>GBP (£)</option>
          <option value="LE" ${currentInvoice.invoiceCurrency === 'LE' ? 'selected' : ''}>EGP (LE)</option>
        </select>
      </div>
      <div class="form-group" style="min-width:70px;">
        <label>بالغ</label>
        <input type="number" class="form-control small-input" id="adultCount" value="${currentInvoice.adultCount || 0}" min="0" onchange="updateTotals()">
      </div>
      <div class="form-group" style="min-width:70px;">
        <label>طفل</label>
        <input type="number" class="form-control small-input" id="childCount" value="${currentInvoice.childCount || 0}" min="0" onchange="updateTotals()">
      </div>
      <div class="form-group" style="min-width:70px;">
        <label>رضيع</label>
        <input type="number" class="form-control small-input" id="infantCount" value="${currentInvoice.infantCount || 0}" min="0" onchange="updateTotals()">
      </div>
    </div>
    
    <div class="form-group">
      <label>الرحلة</label>
      <select class="form-control" id="tripName" onchange="changeTrip()">
        ${tripsOptions}
      </select>
    </div>

    <div class="trip-table">
      <table>
        <thead>
          <tr>
            <th>النشاط</th>
            <th>العدد</th>
            <th>السعر</th>
            <th>الإجمالي</th>
          </tr>
        </thead>
        <tbody id="itemsContainer">
          ${itemsRows}
        </tbody>
      </table>
    </div>

    <div class="section-title">💰 المدفوعات</div>
    <div class="payment-grid">
      <div class="payment-item"><label>كاش $</label><input type="number" id="cashUSD" value="${currentInvoice.cashUSD || 0}" step="0.01" onchange="updateTotals()"></div>
      <div class="payment-item"><label>كاش €</label><input type="number" id="cashEUR" value="${currentInvoice.cashEUR || 0}" step="0.01" onchange="updateTotals()"></div>
      <div class="payment-item"><label>كاش £</label><input type="number" id="cashGBP" value="${currentInvoice.cashGBP || 0}" step="0.01" onchange="updateTotals()"></div>
      <div class="payment-item"><label>كاش LE</label><input type="number" id="cashLE" value="${currentInvoice.cashLE || 0}" step="0.01" onchange="updateTotals()"></div>
      <div class="payment-item"><label>فيزا $</label><input type="number" id="visaUSD" value="${currentInvoice.visaUSD || 0}" step="0.01" onchange="updateTotals()"></div>
      <div class="payment-item"><label>فيزا €</label><input type="number" id="visaEUR" value="${currentInvoice.visaEUR || 0}" step="0.01" onchange="updateTotals()"></div>
      <div class="payment-item"><label>فيزا £</label><input type="number" id="visaGBP" value="${currentInvoice.visaGBP || 0}" step="0.01" onchange="updateTotals()"></div>
      <div class="payment-item"><label>فيزا LE</label><input type="number" id="visaLE" value="${currentInvoice.visaLE || 0}" step="0.01" onchange="updateTotals()"></div>
    </div>

    <div class="section-title">📊 الإجماليات</div>
    <div class="totals-bar">
      <div class="total-item">
        <div class="label">الخصم</div>
        <input type="number" id="discount" value="${currentInvoice.discount || 0}" step="0.01" onchange="updateTotals()">
      </div>
      <div class="total-item">
        <div class="label">الإجمالي</div>
        <div class="value" id="displayTotal">${(currentInvoice.paymentPrice || 0).toFixed(2)}</div>
        <span class="currency" id="totalCurrency">${currentInvoice.invoiceCurrency || ''}</span>
      </div>
      <div class="total-item">
        <div class="label">المتبقي</div>
        <div class="value" id="displayRest">${(currentInvoice.rest || 0).toFixed(2)}</div>
        <span class="currency" id="restCurrency">${currentInvoice.invoiceCurrency || ''}</span>
      </div>
    </div>

    <div class="section-title">🏢 بيانات إضافية</div>
    <div class="form-grid">
      <div class="form-group">
        <label>المنفذ (Supplier)</label>
        <select class="form-control" id="supplier">
          ${supplierOptions}
        </select>
      </div>
      <div class="form-group">
        <label>العميل (Customer)</label>
        <select class="form-control" id="customer">
          ${customerOptions}
        </select>
      </div>
      <div class="form-group">
        <label>الحالة</label>
        <select class="form-control" id="state">
          <option value="pending" ${currentInvoice.state === 'pending' ? 'selected' : ''}>⏳ معلق</option>
          <option value="confirmed" ${currentInvoice.state === 'confirmed' ? 'selected' : ''}>✅ مؤكد</option>
          <option value="cancel" ${currentInvoice.state === 'cancel' ? 'selected' : ''}>❌ ملغي</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>ملاحظات</label>
      <textarea class="form-control" id="notes" rows="3">${currentInvoice.notes || ''}</textarea>
    </div>

    <div class="action-buttons">
      <button class="btn-primary" onclick="saveChanges()">💾 حفظ التعديلات</button>
      <button class="btn-danger" onclick="cancelEdit()">❌ إلغاء</button>
    </div>
  `;
  
  setTimeout(() => {
    updateTotals();
  }, 100);
}

// ============ تغيير الرحلة ============
async function changeTrip() {
  const tripName = document.getElementById('tripName').value;
  const currency = document.getElementById('invoiceCurrency').value;
  
  if (!tripName || !currency) return;
  
  showPDFOverlay('⏳ جلب بيانات الرحلة...');
  const tripData = await loadTripData(tripName, currency);
  hidePDFOverlay();
  
  if (tripData) {
    renderEditForm(tripData);
  }
}

// ============ تغيير العملة ============
async function changeCurrency() {
  const tripName = document.getElementById('tripName').value;
  const currency = document.getElementById('invoiceCurrency').value;
  
  if (!tripName || !currency) return;
  
  showPDFOverlay('⏳ تحديث الأسعار...');
  const tripData = await loadTripData(tripName, currency);
  hidePDFOverlay();
  
  if (tripData) {
    // تحديث الأسعار فقط دون إعادة رسم كامل
    tripData.items.forEach((itemName, index) => {
      const priceInput = document.querySelector(`.item-price[data-index="${index}"]`);
      if (priceInput) {
        priceInput.value = tripData.prices[index] || 0;
      }
    });
    updateAllItemTotals();
    updateTotals();
  }
}

// ============ تحديث إجمالي item ============
function updateItemTotal(index, price) {
  const qty = parseFloat(document.querySelector(`.item-qty[data-index="${index}"]`).value) || 0;
  const totalInput = document.getElementById(`total_${index}`);
  if (totalInput) {
    totalInput.value = (qty * price).toFixed(2);
  }
  updateTotals();
}

// ============ تحديث جميع totals ============
function updateAllItemTotals() {
  const qtyInputs = document.querySelectorAll('.item-qty');
  qtyInputs.forEach(input => {
    const index = input.dataset.index;
    const price = parseFloat(document.querySelector(`.item-price[data-index="${index}"]`).value) || 0;
    const qty = parseFloat(input.value) || 0;
    const totalInput = document.getElementById(`total_${index}`);
    if (totalInput) {
      totalInput.value = (qty * price).toFixed(2);
    }
  });
}

// ============ حساب إجمالي الفاتورة ============
function calculateInvoiceTotal() {
  let total = 0;
  
  // جمع totals من البنود
  const totalInputs = document.querySelectorAll('[id^="total_"]');
  totalInputs.forEach(input => {
    total += parseFloat(input.value) || 0;
  });
  
  return total;
}

// ============ تحديث المجاميع ============
async function updateTotals() {
  const currency = document.getElementById('invoiceCurrency')?.value;
  if (!currency) return;
  
  // حساب إجمالي البنود
  let itemsTotal = calculateInvoiceTotal();
  
  const cashUSD = parseFloat(document.getElementById('cashUSD')?.value) || 0;
  const cashEUR = parseFloat(document.getElementById('cashEUR')?.value) || 0;
  const cashGBP = parseFloat(document.getElementById('cashGBP')?.value) || 0;
  const cashLE = parseFloat(document.getElementById('cashLE')?.value) || 0;
  const visaUSD = parseFloat(document.getElementById('visaUSD')?.value) || 0;
  const visaEUR = parseFloat(document.getElementById('visaEUR')?.value) || 0;
  const visaGBP = parseFloat(document.getElementById('visaGBP')?.value) || 0;
  const visaLE = parseFloat(document.getElementById('visaLE')?.value) || 0;
  const discount = parseFloat(document.getElementById('discount')?.value) || 0;
  
  // الإجمالي = إجمالي البنود - الخصم
  let total = itemsTotal - discount;
  
  document.getElementById('displayTotal').textContent = total.toFixed(2);
  document.getElementById('totalCurrency').textContent = currency;
  document.getElementById('restCurrency').textContent = currency;
  
  // حساب المتبقي
  const dateStr = document.getElementById('activeDate')?.value;
  if (dateStr) {
    const d = new Date(dateStr);
    const formattedDate = formatDate(d);
    const rate = await getExchangeRateForDate(formattedDate);
    
    if (rate) {
      const key = currency === '$' ? 'USD' : currency === '€' ? 'EUR' : currency === '£' ? 'GBP' : 'LE';
      const baseRate = rate.cash?.[key] || 1;
      
      const totalEGP = total * baseRate;
      const paidEGP = (cashUSD * (rate.cash?.USD || 0)) +
                     (cashEUR * (rate.cash?.EUR || 0)) +
                     (cashGBP * (rate.cash?.GBP || 0)) +
                     cashLE +
                     (visaUSD * (rate.visa?.USD || 0)) +
                     (visaEUR * (rate.visa?.EUR || 0)) +
                     (visaGBP * (rate.visa?.GBP || 0)) +
                     (visaLE * (rate.visa?.LE || 1));
      
      const rest = baseRate > 0 ? (totalEGP - paidEGP) / baseRate : 0;
      document.getElementById('displayRest').textContent = rest.toFixed(2);
    }
  }
}

// ============ جمع بيانات التعديل ============
// ============ جمع بيانات التعديل ============
function collectEditedData() {
  // جمع الـ items
  const items = [];
  const qtyInputs = document.querySelectorAll('.item-qty');
  qtyInputs.forEach(input => {
    const qty = parseFloat(input.value) || 0;
    const name = input.closest('tr').querySelector('td:first-child').textContent;
    if (qty > 0) {
      items.push(`${name}×${qty}`);
    }
  });
  
  // دالة مساعدة لترحيل القيم غير الصفرية فقط
  const valueOrEmpty = (val) => {
    const num = parseFloat(val);
    return (num !== 0 && !isNaN(num)) ? num : '';
  };
  
  return {
    voucherNo: currentInvoice.voucherNo,
    contactNo: document.getElementById('contactNo')?.value || '',
    guestName: document.getElementById('guestName')?.value || '',
    nationality: document.getElementById('nationality')?.value || '',
    hotel: document.getElementById('hotel')?.value || '',
    roomNo: document.getElementById('roomNo')?.value || '',
    adultCount: parseInt(document.getElementById('adultCount')?.value) || 0,
    childCount: parseInt(document.getElementById('childCount')?.value) || 0,
    infantCount: parseInt(document.getElementById('infantCount')?.value) || 0,
    activeDate: document.getElementById('activeDate')?.value || '',
    time: document.getElementById('time')?.value || '',
    trip: document.getElementById('tripName')?.value || '',
    invoiceCurrency: document.getElementById('invoiceCurrency')?.value || '',
    cashUSD: valueOrEmpty(document.getElementById('cashUSD')?.value),
    cashEUR: valueOrEmpty(document.getElementById('cashEUR')?.value),
    cashGBP: valueOrEmpty(document.getElementById('cashGBP')?.value),
    cashLE: valueOrEmpty(document.getElementById('cashLE')?.value),
    visaUSD: valueOrEmpty(document.getElementById('visaUSD')?.value),
    visaEUR: valueOrEmpty(document.getElementById('visaEUR')?.value),
    visaGBP: valueOrEmpty(document.getElementById('visaGBP')?.value),
    visaLE: valueOrEmpty(document.getElementById('visaLE')?.value),
    discount: valueOrEmpty(document.getElementById('discount')?.value),
    paymentPrice: parseFloat(document.getElementById('displayTotal')?.textContent) || 0,
    rest: parseFloat(document.getElementById('displayRest')?.textContent) || 0,
    activitiesText: items.join(' | '),
    supplier: document.getElementById('supplier')?.value || '',
    customer: document.getElementById('customer')?.value || '',
    state: document.getElementById('state')?.value || 'pending',
    notes: document.getElementById('notes')?.value || ''
  };
}
// ============ إنشاء ملخص التغييرات ============
function createEditSummary(original, edited) {
  const changes = [];
  
  if (original.guestName !== edited.guestName) changes.push(`العميل: ${original.guestName} → ${edited.guestName}`);
  if (original.nationality !== edited.nationality) changes.push(`الجنسية: ${original.nationality} → ${edited.nationality}`);
  if (original.hotel !== edited.hotel) changes.push(`الفندق: ${original.hotel} → ${edited.hotel}`);
  if (original.roomNo !== edited.roomNo) changes.push(`الغرفة: ${original.roomNo} → ${edited.roomNo}`);
  if (original.contactNo !== edited.contactNo) changes.push(`الهاتف: ${original.contactNo} → ${edited.contactNo}`);
  if (original.activeDate !== edited.activeDate) changes.push(`التاريخ: ${original.activeDate} → ${edited.activeDate}`);
  if (original.time !== edited.time) changes.push(`الوقت: ${original.time} → ${edited.time}`);
  if (original.trip !== edited.trip) changes.push(`الرحلة: ${original.trip} → ${edited.trip}`);
  if (original.invoiceCurrency !== edited.invoiceCurrency) changes.push(`العملة: ${original.invoiceCurrency} → ${edited.invoiceCurrency}`);
  
  if (original.cashUSD !== edited.cashUSD) changes.push(`كاش USD: ${original.cashUSD} → ${edited.cashUSD}`);
  if (original.cashEUR !== edited.cashEUR) changes.push(`كاش EUR: ${original.cashEUR} → ${edited.cashEUR}`);
  if (original.cashGBP !== edited.cashGBP) changes.push(`كاش GBP: ${original.cashGBP} → ${edited.cashGBP}`);
  if (original.cashLE !== edited.cashLE) changes.push(`كاش LE: ${original.cashLE} → ${edited.cashLE}`);
  
  if (original.visaUSD !== edited.visaUSD) changes.push(`فيزا USD: ${original.visaUSD} → ${edited.visaUSD}`);
  if (original.visaEUR !== edited.visaEUR) changes.push(`فيزا EUR: ${original.visaEUR} → ${edited.visaEUR}`);
  if (original.visaGBP !== edited.visaGBP) changes.push(`فيزا GBP: ${original.visaGBP} → ${edited.visaGBP}`);
  if (original.visaLE !== edited.visaLE) changes.push(`فيزا LE: ${original.visaLE} → ${edited.visaLE}`);
  
  if (original.adultCount !== edited.adultCount) changes.push(`بالغين: ${original.adultCount} → ${edited.adultCount}`);
  if (original.childCount !== edited.childCount) changes.push(`أطفال: ${original.childCount} → ${edited.childCount}`);
  if (original.infantCount !== edited.infantCount) changes.push(`رضع: ${original.infantCount} → ${edited.infantCount}`);
  
  if (original.supplier !== edited.supplier) changes.push(`المنفذ: ${original.supplier || 'فارغ'} → ${edited.supplier || 'فارغ'}`);
  if (original.customer !== edited.customer) changes.push(`العميل: ${original.customer || 'فارغ'} → ${edited.customer || 'فارغ'}`);
  if (original.state !== edited.state) changes.push(`الحالة: ${original.state} → ${edited.state}`);
  
  if (original.activitiesText !== edited.activitiesText) changes.push(`تم تحديث الأنشطة`);
  
  return changes.length > 0 ? changes.join('; ') : 'لا توجد تغييرات';
}

// ============ حفظ التغييرات ============
async function saveChanges() {
  const editedData = collectEditedData();
  const editSummary = createEditSummary(originalInvoice, editedData);
  
  try {
    showPDFOverlay('⏳ جاري حفظ التعديلات...');
    
    // 1. نسخ الفاتورة الأصلية إلى Invoices_Edit
    const copyResult = await callGAS('copyInvoiceToEdit', {
      voucherNo: originalInvoice.voucherNo,
      originalData: JSON.stringify(originalInvoice),
      editedData: JSON.stringify(editedData),
      userId: currentUser?.id || '',
      editSummary: editSummary
    });
    
    if (!copyResult.success) {
      throw new Error(copyResult.message || 'فشل نسخ الفاتورة');
    }
    
    // 2. تحديث الفاتورة في Invoices
    const updateResult = await callGAS('updateInvoice', editedData);
    
    if (!updateResult.success) {
      throw new Error(updateResult.message || 'فشل تحديث الفاتورة');
    }
    
    // 3. إنشاء PDF جديد
    const pdfResult = await callGAS('saveAndGenerateSinglePDF', {
      voucherNo: editedData.voucherNo
    });
    
    if (!pdfResult?.success) {
      throw new Error(pdfResult?.message || 'فشل إنشاء PDF');
    }
    
    hidePDFOverlay();
    
    showAlert(
      `✅ تم حفظ التعديلات بنجاح\n\n${editSummary}`,
      '✅',
      `<button class="btn-primary" onclick="goBack()">العودة للقائمة</button>
       <button class="btn-secondary" onclick="closeAlert()">البقاء</button>`
    );
    
  } catch (error) {
    console.error('❌ خطأ:', error);
    hidePDFOverlay();
    showAlert('خطأ: ' + error.message, '❌');
  }
}

// ============ إلغاء التعديل ============
async function cancelEdit() {
  if (confirm('هل أنت متأكد من إلغاء التعديل؟')) {
    try {
      showPDFOverlay('⏳ جاري إلغاء التعديل...');
      await callGAS('deleteFromEditSheet', { voucherNo: originalInvoice.voucherNo });
    } catch (e) {
      console.warn('⚠️', e);
    } finally {
      hidePDFOverlay();
      goBack();
    }
  }
}

function goBack() {
  window.location.href = 'BookingsToday.html';
}

// ============ التهيئة ============
document.addEventListener('DOMContentLoaded', () => {
  const userData = sessionStorage.getItem('currentUser');
  if (!userData) {
    window.location.href = 'index.html';
    return;
  }
  
  try {
    currentUser = JSON.parse(userData);
    document.getElementById('userNameDisplay').textContent = currentUser.name || 'User';
    loadInvoice();
  } catch (e) {
    console.error(e);
    window.location.href = 'index.html';
  }
});

// تعريف الدوال العامة
window.goBack = goBack;
window.saveChanges = saveChanges;
window.cancelEdit = cancelEdit;
window.updateTotals = updateTotals;
window.updateItemTotal = updateItemTotal;
window.changeTrip = changeTrip;

window.closeAlert = closeAlert;
