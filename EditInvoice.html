<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes, viewport-fit=cover">
  <title>Edit Invoice</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0f1f3d;--navy2:#1a3260;--gold:#f5c842;--gold2:#e6b800;
      --blue:#2563eb;--green:#16a34a;--red:#dc2626;--orange:#ea580c;
      --bg:#f0f4f8;--card:#fff;--border:#dde4f0;--text:#1a2540;--text-lt:#5a6a8a;
      --radius:16px;--radius-sm:10px;
      --shadow:0 4px 24px rgba(15,31,61,.10);--shadow-lg:0 8px 40px rgba(15,31,61,.16);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    .header{
      background:linear-gradient(135deg,var(--navy),var(--navy2));
      color:white;padding:14px 24px;
      display:flex;justify-content:space-between;align-items:center;
      position:sticky;top:0;z-index:200;box-shadow:var(--shadow-lg);
    }
    .header-left{display:flex;align-items:center;gap:12px;}
    .header-left h2{color:var(--gold);font-size:19px;font-weight:900;}
    .voucher-badge{background:var(--gold);color:var(--navy);padding:5px 16px;border-radius:30px;font-weight:800;font-size:14px;}
    .header-right{display:flex;align-items:center;gap:10px;}
    .user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:40px;padding:5px 14px;color:white;font-size:13px;font-weight:600;}
    .back-btn{background:transparent;border:2px solid rgba(255,255,255,.3);color:white;padding:5px 14px;border-radius:40px;cursor:pointer;font-weight:700;font-size:12px;font-family:'Cairo',sans-serif;transition:all .2s;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}

    .page{max-width:1100px;margin:0 auto;padding:20px 16px 50px;}
    .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
    .card-head{padding:11px 18px;background:linear-gradient(90deg,var(--navy),var(--navy2));display:flex;align-items:center;gap:8px;}
    .card-head h3{color:var(--gold);font-size:14px;font-weight:800;}
    .ch-icon{background:rgba(245,200,66,.2);border-radius:7px;padding:3px 6px;font-size:13px;}
    .card-body{padding:16px;}

    .fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
    .fgroup{display:flex;flex-direction:column;gap:5px;}
    .fgroup label{font-size:11px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px;}
    .fc{padding:9px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:'Cairo',sans-serif;color:var(--text);background:#fafbfd;width:100%;height:42px;transition:border-color .2s;-webkit-appearance:none;appearance:none;}
    .fc:focus{border-color:var(--blue);outline:none;background:white;}
    .fc[readonly]{background:#f1f5f9;color:var(--text-lt);cursor:default;}
    .btn{padding:10px 22px;border:none;border-radius:40px;font-weight:800;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .2s;}
    .btn:hover{transform:translateY(-2px);}
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none;}
    .btn-save{background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);}
    .btn-cancel{background:#fee2e2;color:var(--red);}
    .btn-green{background:linear-gradient(135deg,#16a34a,#15803d);color:white;}

    /* باقي العملات */
    .pay-grp-lbl{padding:5px 16px 2px;font-size:10px;font-weight:800;color:var(--text-lt);text-transform:uppercase;letter-spacing:.7px;}
    .pay-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px 15px;}
    .pay-cell{background:white;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;transition:box-shadow .2s;}
    .pay-cell:focus-within{box-shadow:0 0 0 2px var(--blue);border-color:var(--blue);}
    .pay-cell label{display:block;font-size:10px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px;}
    .pay-cell input{width:100%;border:none;background:transparent;text-align:center;font-size:14px;font-weight:700;font-family:'Cairo',sans-serif;color:var(--text);outline:none;}

    /* مؤشر المبلغ المتبقي */
    .rest-highlight{background:#fef3c7;border-radius:12px;padding:12px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
    .rest-highlight .label{font-size:12px;font-weight:700;color:#92400e;text-transform:uppercase;}
    .rest-highlight .value{font-size:28px;font-weight:900;color:var(--navy);}
    .rest-highlight .currency{font-size:14px;color:var(--gold2);margin-right:4px;}

    .info-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:space-between;margin-bottom:14px;background:#f8fafc;padding:10px 14px;border-radius:12px;}
    .info-item{font-size:12px;color:var(--text-lt);}
    .info-item strong{color:var(--navy);margin-left:5px;}

    .action-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px;}

    /* باقي المودالات */
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px);}
    .modal.open{display:flex;}
    .modal-box{background:white;width:90%;max-width:440px;border-radius:22px;padding:24px;text-align:center;box-shadow:0 25px 50px rgba(0,0,0,.3);}
    .modal-icon{font-size:42px;margin-bottom:10px;}
    .modal-msg{color:var(--navy);font-size:15px;font-weight:700;margin-bottom:18px;}
    .modal-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
    .pdf-ov{display:none;position:fixed;inset:0;background:rgba(10,22,40,.88);z-index:99999;align-items:center;justify-content:center;flex-direction:column;gap:18px;}
    .pdf-ov.show{display:flex;}
    .pdf-spin{width:56px;height:56px;border:5px solid rgba(255,255,255,.15);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
    .loader-big{text-align:center;padding:60px;color:var(--text-lt);}
    .spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px;}

    @media(max-width:680px){.pay-grid{grid-template-columns:repeat(2,1fr);}}
  </style>
</head>
<body>

<div class="header">
  <div class="header-left"><h2>✏️ Edit Invoice</h2><span class="voucher-badge" id="voucherDisplay"></span></div>
  <div class="header-right"><span class="user-chip" id="userNameDisplay"></span><button class="back-btn" onclick="goBack()">← Back</button></div>
</div>

<div class="page"><div id="mainContent"><div class="loader-big"><div class="spinner"></div>Loading invoice...</div></div></div>

<div class="pdf-ov" id="pdfOv"><div class="pdf-spin"></div><p id="pdfMsg">Processing...</p></div>
<div id="alertModal" class="modal"><div class="modal-box"><div class="modal-icon" id="alertIcon">ℹ️</div><div class="modal-msg" id="alertMsg"></div><div class="modal-btns" id="alertBtns"><button class="btn btn-save" onclick="closeAlert()">OK</button></div></div></div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbwe1Q9pjAJRk9CfWsK5YGjD5uVAbJkMhAVgw6akKkFIR9sz15V78C88Vs5dumKE-SwF/exec';
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DASH={Admin:'Dashboard.html',Owner:'OwnerDashboard.html',Sales:'SalesDashboard.html',Accountant:'AccountantDashboard.html',Customer:'CustomerDashboard.html'};

let currentUser=null,currentInvoice=null;
let exRatesCache={};

// دوال مساعدة
function R2(n){return Math.round((n+Number.EPSILON)*100)/100;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function formatDate(d){return`${String(d.getDate()).padStart(2,'0')}/${MONTHS[d.getMonth()]}/${d.getFullYear()}`;}
function parseDate(str){if(!str)return null;const p=str.split('/');if(p.length===3){const mi=MONTHS.findIndex(m=>m.toLowerCase()===p[1].toLowerCase());if(mi!==-1)return new Date(+p[2],mi,+p[0]);}return null;}
function dateToInput(s){const d=parseDate(s);if(!d)return'';return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function showAlert(msg,icon,btns){document.getElementById('alertMsg').textContent=msg;document.getElementById('alertIcon').textContent=icon||'ℹ️';document.getElementById('alertBtns').innerHTML=btns||'<button class="btn btn-save" onclick="closeAlert()">OK</button>';document.getElementById('alertModal').classList.add('open');}
function closeAlert(){document.getElementById('alertModal').classList.remove('open');}
function showPDFOv(m){document.getElementById('pdfMsg').textContent=m;document.getElementById('pdfOv').classList.add('show');}
function hidePDFOv(){document.getElementById('pdfOv').classList.remove('show');}
function goBack(){
  const returnUrl=sessionStorage.getItem('returnUrl');
  if(returnUrl) location.href=returnUrl;
  else location.href=DASH[currentUser?.type]||'Dashboard.html';
}

// دوال سعر الصرف (مثل SalesInvoice)
async function gas(action,params={}){
  const hasSig=params.signatureData&&params.signatureData.toString().startsWith('data:image');
  if(hasSig){
    const body=JSON.stringify({action,...params});
    return fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body,redirect:'follow'})
      .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});
  }
  const u=new URL(GAS_URL);
  u.searchParams.set('action',action);
  Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,String(v??'')));
  return fetch(u.toString(),{redirect:'follow'}).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});
}

async function getRate(dateStr){
  if(!dateStr)return null;
  if(exRatesCache[dateStr])return exRatesCache[dateStr];
  try{const r=await gas('getExchangeRate',{dateStr});if(r){exRatesCache[dateStr]=r;return r;}}catch(e){}
  return null;
}
function rateFields(r){
  if(!r)return null;
  if(r.cash)return r;
  return{cash:{USD:+r.sUSD||47.5,EUR:+r.sEUR||50.25,GBP:+r.sGBP||60},
         visa:{USD:+r.sVUSD||46.3,EUR:+r.sVEUR||49,GBP:+r.sVGBP||58.5,LE:+r.sVLE||0.975}};
}
function directPaid(cur,cU,cE,cG,cL,vU,vE,vG,vL){
  if(cur==='$')return cU+vU;
  if(cur==='€')return cE+vE;
  if(cur==='£')return cG+vG;
  return cL+vL;
}

// حساب المبلغ المحصل بالعملة الأصلية للفاتورة (نفس آلية SalesInvoice)
async function computeCollectedTotal(currency,activeDate,cashUSD,cashEUR,cashGBP,cashLE,visaUSD,visaEUR,visaGBP,visaLE){
  let total=0;
  if(activeDate){
    const raw=await getRate(activeDate);
    const r=rateFields(raw);
    if(r){
      const LE=cashUSD*r.cash.USD+cashEUR*r.cash.EUR+cashGBP*r.cash.GBP+cashLE+
              visaUSD*r.visa.USD+visaEUR*r.visa.EUR+visaGBP*r.visa.GBP+visaLE*(r.visa.LE||0.975);
      if(currency==='$')total=R2(LE/r.cash.USD);
      else if(currency==='€')total=R2(LE/r.cash.EUR);
      else if(currency==='£')total=R2(LE/r.cash.GBP);
      else total=R2(LE);
    } else total=directPaid(currency,cashUSD,cashEUR,cashGBP,cashLE,visaUSD,visaEUR,visaGBP,visaLE);
  } else total=directPaid(currency,cashUSD,cashEUR,cashGBP,cashLE,visaUSD,visaEUR,visaGBP,visaLE);
  return total;
}

// عرض النموذج المبسط
function renderCollectionModal(){
  if(!currentInvoice) return;
  const currency=currentInvoice.invoiceCurrency||'$';
  const rest=parseFloat(currentInvoice.rest)||0;
  const activeDate=currentInvoice.activeDate;

  // هيكل النموذج: لا تكرار للمعلومات
  document.getElementById('mainContent').innerHTML+=`
  <div id="collectionModal" class="modal" style="display:flex">
    <div class="modal-box" style="max-width:550px;max-height:85vh;overflow-y:auto">
      <div class="modal-icon">💰</div>
      <div class="modal-msg">تحصيل دفعة</div>
      
      <div class="rest-highlight">
        <span class="label">المبلغ المتبقي</span>
        <span class="value">${rest.toFixed(2)}</span>
        <span class="currency">${currency}</span>
      </div>

      <div class="pay-grp-lbl">💵 المبلغ المحصل (بنفس عملة الفاتورة)</div>
      <div style="padding:0 10px 10px 10px">
        <input type="number" id="collectionAmount" class="fc" min="0" max="${rest}" step="0.01" placeholder="المبلغ المحصل" value="${rest.toFixed(2)}" style="text-align:center;font-size:16px;font-weight:700">
      </div>

      <div class="pay-grp-lbl">💰 تفاصيل العملات المستلمة</div>
      <div class="pay-grid">
        <div class="pay-cell"><label>USD $</label><input type="number" id="collUSD" min="0" step="0.01" placeholder="0" oninput="updateCollectedPreview()"></div>
        <div class="pay-cell"><label>EUR €</label><input type="number" id="collEUR" min="0" step="0.01" placeholder="0" oninput="updateCollectedPreview()"></div>
        <div class="pay-cell"><label>GBP £</label><input type="number" id="collGBP" min="0" step="0.01" placeholder="0" oninput="updateCollectedPreview()"></div>
        <div class="pay-cell"><label>EGP LE</label><input type="number" id="collLE" min="0" step="0.01" placeholder="0" oninput="updateCollectedPreview()"></div>
        <div class="pay-cell"><label>Visa $</label><input type="number" id="collVisaUSD" min="0" step="0.01" placeholder="0" oninput="updateCollectedPreview()"></div>
        <div class="pay-cell"><label>Visa €</label><input type="number" id="collVisaEUR" min="0" step="0.01" placeholder="0" oninput="updateCollectedPreview()"></div>
        <div class="pay-cell"><label>Visa £</label><input type="number" id="collVisaGBP" min="0" step="0.01" placeholder="0" oninput="updateCollectedPreview()"></div>
        <div class="pay-cell"><label>Visa LE</label><input type="number" id="collVisaLE" min="0" step="0.01" placeholder="0" oninput="updateCollectedPreview()"></div>
      </div>

      <div style="background:#f0f4f8;margin:12px 15px;padding:12px;border-radius:12px;text-align:center">
        <span style="font-weight:700">إجمالي المبلغ المحصل (${currency}): </span>
        <span id="collectionTotalDisplay" style="font-size:20px;font-weight:900;color:var(--green)">0.00</span>
      </div>

      <div class="pay-grp-lbl">📌 المبلغ المتبقي بعد التحصيل</div>
      <div style="padding:0 15px 10px 15px">
        <input type="number" id="newRestPreview" class="fc" step="0.01" style="text-align:center;font-weight:700">
        <div style="font-size:10px;color:var(--text-lt);margin-top:4px">* يمكن تعديله يدوياً إذا كان ≤ 5 (فروق طفيفة)</div>
      </div>

      <div class="fgroup" style="margin:8px 15px">
        <label>ملاحظات التحصيل</label>
        <textarea id="collectionNotes" rows="2" class="fc" placeholder="اختياري..."></textarea>
      </div>

      <div class="modal-btns" style="margin-top:16px">
        <button class="btn btn-green" onclick="submitCollection()">💾 تأكيد التحصيل</button>
        <button class="btn btn-cancel" onclick="closeCollectionModal()">إلغاء</button>
      </div>
    </div>
  </div>`;

  // حساب أولي
  updateCollectedPreview();
}

async function updateCollectedPreview(){
  if(!currentInvoice) return;
  const currency=currentInvoice.invoiceCurrency||'$';
  const activeDate=currentInvoice.activeDate;
  const cU=parseFloat(document.getElementById('collUSD')?.value)||0;
  const cE=parseFloat(document.getElementById('collEUR')?.value)||0;
  const cG=parseFloat(document.getElementById('collGBP')?.value)||0;
  const cL=parseFloat(document.getElementById('collLE')?.value)||0;
  const vU=parseFloat(document.getElementById('collVisaUSD')?.value)||0;
  const vE=parseFloat(document.getElementById('collVisaEUR')?.value)||0;
  const vG=parseFloat(document.getElementById('collVisaGBP')?.value)||0;
  const vL=parseFloat(document.getElementById('collVisaLE')?.value)||0;

  const total=await computeCollectedTotal(currency,activeDate,cU,cE,cG,cL,vU,vE,vG,vL);
  const totalDisplay=document.getElementById('collectionTotalDisplay');
  if(totalDisplay) totalDisplay.textContent=total.toFixed(2);

  const amountField=document.getElementById('collectionAmount');
  if(amountField && total>0 && amountField.value==='') amountField.value=total.toFixed(2);
  else if(amountField && amountField.value==='') amountField.value='0';

  const originalRest=parseFloat(currentInvoice.rest)||0;
  const collectedAmount=parseFloat(amountField?.value)||0;
  let newRest=originalRest-collectedAmount;
  if(newRest<0) newRest=0;
  const newRestField=document.getElementById('newRestPreview');
  if(newRestField){
    newRestField.value=newRest.toFixed(2);
    // إذا كان المبلغ المتبقي الجديد >5 => مغلق، وإلا مفتوح لتعديل الفروق الطفيفة
    if(newRest>5){
      newRestField.readOnly=true;
      newRestField.style.background='#f1f5f9';
      newRestField.style.cursor='default';
    } else {
      newRestField.readOnly=false;
      newRestField.style.background='white';
      newRestField.style.cursor='text';
    }
  }
}

function closeCollectionModal(){
  const modalDiv=document.getElementById('collectionModal');
  if(modalDiv) modalDiv.remove();
}

async function submitCollection(){
  if(!currentInvoice) return;

  const amountField=document.getElementById('collectionAmount');
  let amount=parseFloat(amountField?.value)||0;
  const originalRest=parseFloat(currentInvoice.rest)||0;
  if(amount<=0){showAlert('أدخل مبلغ التحصيل','⚠️');return;}
  if(amount>originalRest){showAlert(`المبلغ المحصل (${amount.toFixed(2)}) يتجاوز المبلغ المتبقي (${originalRest.toFixed(2)})`,'⚠️');return;}

  // الحصول على قيم العملات
  const cU=parseFloat(document.getElementById('collUSD')?.value)||0;
  const cE=parseFloat(document.getElementById('collEUR')?.value)||0;
  const cG=parseFloat(document.getElementById('collGBP')?.value)||0;
  const cL=parseFloat(document.getElementById('collLE')?.value)||0;
  const vU=parseFloat(document.getElementById('collVisaUSD')?.value)||0;
  const vE=parseFloat(document.getElementById('collVisaEUR')?.value)||0;
  const vG=parseFloat(document.getElementById('collVisaGBP')?.value)||0;
  const vL=parseFloat(document.getElementById('collVisaLE')?.value)||0;

  // المبلغ المحسوب من العملات كمرجع
  const currency=currentInvoice.invoiceCurrency||'$';
  const activeDate=currentInvoice.activeDate;
  const computedTotal=await computeCollectedTotal(currency,activeDate,cU,cE,cG,cL,vU,vE,vG,vL);
  if(Math.abs(computedTotal-amount)>0.5 && amount>0){
    const confirmOk=confirm(`المبلغ المدخل (${amount.toFixed(2)}) يختلف عن قيمة العملات المحسوبة (${computedTotal.toFixed(2)}). هل تريد الاستمرار؟`);
    if(!confirmOk) return;
  }

  const newRestManual=document.getElementById('newRestPreview');
  let finalRest=originalRest-amount;
  if(newRestManual && !newRestManual.readOnly && parseFloat(newRestManual.value)>=0){
    const manual=parseFloat(newRestManual.value)||0;
    if(manual>=0 && manual<=originalRest) finalRest=manual;
  }
  if(finalRest<0) finalRest=0;

  const notes=document.getElementById('collectionNotes')?.value||'';
  const paymentMethod= (cU+cE+cG+cL)>0 && (vU+vE+vG+vL)>0 ? 'Mixed' : ((cU+cE+cG+cL)>0?'Cash':'Visa');

  const collectionData={
    parentVoucherNo:currentInvoice.voucherNo,
    activeDate:currentInvoice.activeDate,
    salesId:currentInvoice.salesId,
    time:currentInvoice.time,
    trip:currentInvoice.trip,
    hotel:currentInvoice.hotel,
    roomNo:currentInvoice.roomNo,
    nationality:currentInvoice.nationality,
    guestName:currentInvoice.guestName,
    contactNo:currentInvoice.contactNo,
    supplier:currentInvoice.supplier,
    customer:currentInvoice.customer,
    state:currentInvoice.state,
    invoiceCurrency:currency,
    centerName:currentInvoice.centerName,
    branchName:currentInvoice.branchName,
    salesName:currentInvoice.salesName,
    cashUSD:cU,cashEUR:cE,cashGBP:cG,cashLE:cL,
    visaUSD:vU,visaEUR:vE,visaGBP:vG,visaLE:vL,
    discount:0, notes:notes,
    collectedBy:currentUser?.id||'',
    collectedByName:currentUser?.name||'',
    paymentMethod:paymentMethod,
    rest:finalRest
  };

  showPDFOv('جاري حفظ التحصيل...');
  try{
    const result=await gas('createCollectionInvoice',collectionData);
    hidePDFOv();
    if(result?.success){
      showAlert(`✅ تم تحصيل ${amount.toFixed(2)} ${currency}\nرقم فاتورة التحصيل: ${result.voucherNo}\nالمبلغ المتبقي الجديد: ${finalRest.toFixed(2)} ${currency}`,'✅',
        `<button class="btn btn-save" onclick="location.reload()">تحديث</button>
         <button class="btn btn-save" onclick="goBack()">رجوع</button>`);
      closeCollectionModal();
    } else showAlert('❌ فشل التحصيل: '+(result?.message||'خطأ'),'❌');
  }catch(err){hidePDFOv();showAlert('خطأ: '+err.message,'❌');}
}

// دالة عرض الفاتورة وتفعيل زر التحصيل
async function loadInvoice(){
  const params=new URLSearchParams(location.search);
  const voucherNo=params.get('voucherNo');
  if(!voucherNo){showAlert('رقم الفاتورة غير موجود','❌','<button class="btn btn-save" onclick="goBack()">رجوع</button>');return;}

  try{
    const allInv=await gas('getAllInvoices');
    const invoices=Array.isArray(allInv)?allInv:[];
    currentInvoice=invoices.find(i=>i.voucherNo===voucherNo);
    if(!currentInvoice)throw new Error('الفاتورة غير موجودة');

    document.getElementById('userNameDisplay').textContent=currentUser?.name||'User';
    document.getElementById('voucherDisplay').textContent=voucherNo;

    const restVal=parseFloat(currentInvoice.rest)||0;
    const isOverdue=(()=>{const ad=parseDate(currentInvoice.activeDate);return ad&&ad<new Date();})();

    document.getElementById('mainContent').innerHTML=`
    <div class="card">
      <div class="card-head"><span class="ch-icon">ℹ️</span><h3>معلومات الفاتورة</h3></div>
      <div class="card-body">
        <div class="info-row"><span class="info-item"><strong>رقم الفاتورة:</strong> ${esc(currentInvoice.voucherNo)}</span>
        <span class="info-item"><strong>العميل:</strong> ${esc(currentInvoice.customer||'—')}</span>
        <span class="info-item"><strong>الرحلة:</strong> ${esc(currentInvoice.trip||'—')}</span>
        <span class="info-item"><strong>تاريخ التنفيذ:</strong> ${esc(currentInvoice.activeDate)}</span>
        <span class="info-item"><strong>الفندق:</strong> ${esc(currentInvoice.hotel||'—')}</span></div>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><span class="ch-icon">💰</span><h3>المبلغ المتبقي</h3></div>
      <div class="card-body" style="text-align:center;padding:20px">
        <div style="font-size:44px;font-weight:900;color:var(--navy)">${restVal.toFixed(2)}</div>
        <div style="font-size:14px;color:var(--gold2);margin-top:4px">${currentInvoice.invoiceCurrency||'LE'}</div>
        ${isOverdue?'<div style="color:var(--red);font-size:12px;margin-top:8px">⚠️ تاريخ التنفيذ قد مضى، التحصيل مسموح لكن لا يمكن تعديل الفاتورة</div>':''}
      </div>
    </div>

    <div class="action-row">
      <button class="btn btn-green" id="collectBtn" ${restVal<=0?'disabled':''}>💰 تحصيل دفعة</button>
      <button class="btn btn-cancel" onclick="goBack()">← رجوع</button>
    </div>`;

    document.getElementById('collectBtn')?.addEventListener('click',()=>renderCollectionModal());

  }catch(e){
    document.getElementById('mainContent').innerHTML=`<div class="loader-big">خطأ: ${e.message}</div>`;
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  let ud=sessionStorage.getItem('currentUser');
  if(!ud){const p=new URLSearchParams(location.search).get('user');if(p){ud=decodeURIComponent(p);sessionStorage.setItem('currentUser',ud);}}
  if(!ud){location.href='index.html';return;}
  try{currentUser=JSON.parse(ud);}catch{location.href='index.html';return;}
  loadInvoice();
});
</script>
</body>
</html>
