<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes, viewport-fit=cover">
  <title>Edit Invoice | تعديل الفاتورة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0f1f3d;--navy2:#1a3260;--gold:#f5c842;--gold2:#e6b800;
      --blue:#2563eb;--blue-lt:#3b82f6;--green:#16a34a;--red:#dc2626;
      --bg:#f0f4f8;--card:#fff;--border:#dde4f0;--text:#1a2540;--text-lt:#5a6a8a;
      --radius:16px;--radius-sm:10px;
      --shadow:0 4px 24px rgba(15,31,61,.10);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    .header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
    .header-left{display:flex;align-items:center;gap:16px;}
    .header-left h2{color:var(--gold);font-size:1.25rem;font-weight:800;}
    .voucher-badge{background:var(--gold);color:var(--primary);padding:4px 16px;border-radius:40px;font-weight:800;}
    .user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:40px;padding:6px 16px;font-size:0.8125rem;font-weight:600;}
    .back-btn{background:transparent;border:1px solid rgba(255,255,255,.3);color:white;padding:6px 18px;border-radius:40px;cursor:pointer;font-weight:600;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}
    .container{max-width:1200px;margin:0 auto;padding:24px 20px 48px;}
    .card{background:white;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;}
    .card-header{padding:14px 20px;background:linear-gradient(90deg,var(--navy),var(--navy2));display:flex;align-items:center;gap:10px;}
    .card-header h3{color:var(--gold);font-size:0.875rem;font-weight:800;}
    .card-body{padding:20px;}
    .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;}
    .form-group{display:flex;flex-direction:column;gap:6px;}
    .form-group label{font-size:0.6875rem;font-weight:700;color:var(--text-lt);text-transform:uppercase;}
    input,select,textarea{padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:0.875rem;font-family:'Cairo',sans-serif;background:white;width:100%;}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);}
    input[readonly]{background:#f8fafc;color:var(--text-lt);cursor:not-allowed;}
    .hotel-row{display:grid;grid-template-columns:1fr 90px 70px 70px 70px;gap:12px;margin-bottom:16px;}
    @media(max-width:680px){.hotel-row{grid-template-columns:1fr 80px 65px 65px 65px;}}
    .trip-table{overflow-x:auto;border-radius:12px;border:1px solid var(--border);margin-top:12px;}
    .trip-table table{width:100%;border-collapse:collapse;font-size:0.8125rem;}
    .trip-table th{background:linear-gradient(90deg,var(--navy),var(--navy2));color:var(--gold);padding:10px 12px;text-align:center;}
    .trip-table th:first-child{text-align:left;}
    .trip-table td{padding:10px 12px;border-bottom:1px solid var(--gray-100);text-align:center;}
    .trip-table td:first-child{text-align:left;font-weight:600;}
    .trip-table input{width:80px;padding:8px;text-align:center;border:1.5px solid var(--border);border-radius:8px;}
    .payment-section{background:linear-gradient(135deg,#fafbff,#f5f7fa);border-radius:12px;margin-top:8px;}
    .payment-label{padding:12px 16px 4px;font-size:0.6875rem;font-weight:800;color:var(--text-lt);text-transform:uppercase;}
    .payment-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:8px 16px 16px;}
    .payment-card{background:white;border:1px solid var(--border);border-radius:12px;padding:10px 8px;text-align:center;}
    .payment-card label{display:block;font-size:0.625rem;font-weight:700;color:var(--text-lt);margin-bottom:6px;}
    .payment-card input{width:100%;border:none;background:transparent;text-align:center;font-size:0.875rem;font-weight:700;padding:4px;}
    .totals-strip{display:flex;justify-content:space-around;align-items:center;flex-wrap:wrap;gap:16px;padding:16px 20px;background:white;border-bottom:1px dashed var(--border);}
    .total-item{text-align:center;}
    .total-item .label{font-size:0.625rem;font-weight:700;color:var(--text-lt);text-transform:uppercase;margin-bottom:4px;}
    .total-item .value{font-size:1.75rem;font-weight:900;color:var(--navy);line-height:1.2;}
    .total-item input{width:120px;padding:8px;text-align:center;border:1.5px solid var(--border);border-radius:10px;}
    .warning-bar{background:#fffbeb;border:1px solid #f59e0b;border-radius:12px;padding:12px 16px;color:#b45309;font-weight:600;margin-bottom:20px;}
    .action-buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px;}
    .btn{padding:12px 28px;border:none;border-radius:40px;font-weight:800;font-size:0.8125rem;cursor:pointer;font-family:'Cairo',sans-serif;display:inline-flex;align-items:center;gap:8px;transition:all 0.2s;}
    .btn:hover{transform:translateY(-2px);}
    .btn-primary{background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);}
    .btn-success{background:linear-gradient(135deg,#16a34a,#15803d);color:white;}
    .btn-danger{background:#fee2e2;color:#dc2626;}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);}
    .modal.open{display:flex;}
    .modal-content{background:white;width:90%;max-width:500px;border-radius:24px;padding:24px;text-align:center;}
    .modal-icon{font-size:48px;margin-bottom:12px;}
    .modal-msg{font-size:1rem;font-weight:600;margin-bottom:20px;}
    .modal-buttons{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
    .loader-container{text-align:center;padding:60px;color:var(--text-lt);}
    .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .pdf-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1100;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
    .pdf-overlay.show{display:flex;}
    .pdf-spinner{width:56px;height:56px;border:4px solid rgba(255,255,255,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
    .time-btn-display{width:100%;height:43px;padding:9px 13px;border:1.5px solid var(--border);border-radius:10px;background:white;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:14px;}
    .time-btn-display .ph{color:#b0bac9;}
    .clock-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);align-items:center;justify-content:center;z-index:10000;backdrop-filter:blur(6px);}
    .clock-modal.open{display:flex;}
    .clock-box{background:white;width:90%;max-width:340px;border-radius:28px;overflow:hidden;}
    .ck-head{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:18px 20px;text-align:center;}
    .ck-head-title{color:var(--gold);font-size:12px;font-weight:800;text-transform:uppercase;margin-bottom:10px;}
    .ck-time-big{font-size:56px;font-weight:900;color:white;letter-spacing:4px;font-family:monospace;line-height:1;margin-bottom:12px;}
    .ck-mode-row{display:flex;justify-content:center;gap:8px;}
    .ck-mode-pill{padding:4px 18px;border-radius:20px;font-size:12px;font-weight:700;border:2px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.5);cursor:pointer;}
    .ck-mode-pill.active{background:var(--gold);color:var(--navy);border-color:var(--gold);}
    .ck-face-wrap{padding:18px;background:#f5f7fb;display:flex;justify-content:center;}
    .ck-svg-wrap{width:230px;height:230px;cursor:crosshair;}
    .ck-svg-wrap svg{width:100%;height:100%;display:block;}
    .ck-foot{display:flex;gap:8px;padding:14px 16px;background:white;border-top:1px solid var(--border);}
    .ck-btn{flex:1;padding:11px;border:none;border-radius:40px;font-weight:700;font-size:13px;cursor:pointer;}
    .ck-clear{background:#f1f5f9;color:var(--text);}
    .ck-cancel{background:#fee2e2;color:#dc2626;}
    .ck-set{background:linear-gradient(135deg,#16a34a,#15803d);color:white;}
    @media(max-width:640px){.payment-grid{grid-template-columns:repeat(2,1fr);}.container{padding:16px;}.ck-svg-wrap{width:200px;height:200px;}.ck-time-big{font-size:44px;}}
  </style>
</head>
<body>

<div class="header">
  <div class="header-left"><h2>✏️ تعديل الفاتورة</h2><span class="voucher-badge" id="voucherDisplay">---</span></div>
  <div class="header-right"><span class="user-chip" id="userNameDisplay">...</span><button class="back-btn" onclick="goBack()">← خروج</button></div>
</div>

<div class="container" id="mainContainer">
  <div class="loader-container" id="loaderState"><div class="spinner"></div><div>جاري تحميل بيانات الفاتورة...</div></div>
  <div id="formContent" style="display: none;"></div>
</div>

<div id="alertModal" class="modal"><div class="modal-content"><div class="modal-icon" id="alertIcon">ℹ️</div><div class="modal-msg" id="alertMsg"></div><div class="modal-buttons" id="alertBtns"></div></div></div>
<div id="pdfOverlay" class="pdf-overlay"><div class="pdf-spinner"></div><p id="pdfMsg">جاري المعالجة...</p></div>
<div id="clockModal" class="clock-modal"><div class="clock-box"><div class="ck-head"><div class="ck-head-title">اختيار الوقت</div><div class="ck-time-big"><span id="ckH">--</span>:<span id="ckM">--</span></div><div class="ck-mode-row"><button class="ck-mode-pill active" id="modeHour" onclick="setClockMode('hour')">ساعة</button><button class="ck-mode-pill" id="modeMin" onclick="setClockMode('minute')">دقيقة</button></div></div><div class="ck-face-wrap"><div class="ck-svg-wrap" id="ckWrap"><svg viewBox="0 0 230 230"><circle cx="115" cy="115" r="112" fill="#eef2f8" stroke="#dde4f0" stroke-width="1.5"/><circle cx="115" cy="115" r="64" fill="rgba(37,99,235,.04)" stroke="rgba(37,99,235,.12)" stroke-width="1" stroke-dasharray="4 3"/><g id="ckTicks"></g><g id="ckNums"></g><line id="ckHandH" x1="115" y1="115" x2="115" y2="62" stroke="#0f1f3d" stroke-width="5" stroke-linecap="round"/><line id="ckHandM" x1="115" y1="115" x2="115" y2="44" stroke="#2563eb" stroke-width="3.5" stroke-linecap="round"/><circle cx="115" cy="115" r="7" fill="#0f1f3d"/><circle cx="115" cy="115" r="3" fill="#f5c842"/><circle id="ckDot" cx="115" cy="44" r="9" fill="#f5c842" opacity="0"/></svg></div></div><div class="ck-foot"><button class="ck-btn ck-clear" onclick="clearClock()">🔄 مسح</button><button class="ck-btn ck-cancel" onclick="closeClockModal()">❌ إلغاء</button><button class="ck-btn ck-set" onclick="confirmClock()">✅ تعيين</button></div></div></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwC1BRoLAJthZqxWTYyMUSjPNNGfCI0BjTfhE7ZiVx67rUP__OKAj0vlwD1-RUCOMSE/exec';
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DASH = { Admin: 'Dashboard.html', Owner: 'OwnerDashboard.html', Sales: 'SalesDashboard.html', Accountant: 'AccountantDashboard.html', Customer: 'CustomerDashboard.html' };

let currentUser = null, currentInvoice = null, originalInvoice = null;
let tripDefinitions = [], allSuppliersCustomers = [], allEmployees = [], exRatesCache = {};
let ckHour = null, ckMin = null, ckMode = 'hour';
const CX = 115, CY = 115;

function esc(s) { if (s === undefined || s === null) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function R2(n) { return Math.round((n + Number.EPSILON) * 100) / 100; }
function dV(v) { const n = Number(v); return (n === 0 || isNaN(n)) ? '' : n; }
function formatDate(d) { return `${String(d.getDate()).padStart(2,'0')}/${MONTHS[d.getMonth()]}/${d.getFullYear()}`; }
function parseDate(str) { if (!str) return null; const p = str.split('/'); if (p.length === 3) { const mi = MONTHS.findIndex(m => m.toLowerCase() === p[1].toLowerCase()); if (mi !== -1) return new Date(+p[2], mi, +p[0]); } return null; }
function dateToInput(s) { const d = parseDate(s); if (!d) return ''; return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function timeToInput(t) { if (!t) return ''; const m = String(t).match(/(\d{1,2}):(\d{2})/); return m ? `${m[1].padStart(2,'0')}:${m[2]}` : String(t).substring(0,5); }
function showAlert(msg, icon = 'ℹ️', btns = null) {
  document.getElementById('alertMsg').textContent = msg;
  document.getElementById('alertIcon').textContent = icon;
  const btnsContainer = document.getElementById('alertBtns');
  btnsContainer.innerHTML = btns || '<button class="btn btn-primary" onclick="closeAlert()">موافق</button>';
  document.getElementById('alertModal').classList.add('open');
}
function closeAlert() { document.getElementById('alertModal').classList.remove('open'); }
function showPDF(m) { document.getElementById('pdfMsg').textContent = m; document.getElementById('pdfOverlay').classList.add('show'); }
function hidePDF() { document.getElementById('pdfOverlay').classList.remove('show'); }
function goBack() {
  const returnUrl = sessionStorage.getItem('returnUrl');
  if (returnUrl && returnUrl !== window.location.href) {
    sessionStorage.removeItem('returnUrl');
    location.href = returnUrl;
  } else {
    location.href = DASH[currentUser?.type] || 'Dashboard.html';
  }
}

async function gas(action, params = {}) {
  const url = new URL(GAS_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v ?? '')));
  const res = await fetch(url.toString(), { method: 'GET', redirect: 'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function getRate(dateStr) {
  if (!dateStr) return null;
  if (exRatesCache[dateStr]) return exRatesCache[dateStr];
  try { const r = await gas('getExchangeRate', { dateStr }); if (r) { exRatesCache[dateStr] = r; return r; } } catch(e) {}
  return null;
}

function rateFields(r) {
  if (!r) return null;
  if (r.cash) return r;
  return { cash: { USD: +r.sUSD || 47.5, EUR: +r.sEUR || 50.25, GBP: +r.sGBP || 60 }, visa: { USD: +r.sVUSD || 46.3, EUR: +r.sVEUR || 49, GBP: +r.sVGBP || 58.5, LE: +r.sVLE || 0.975 } };
}

function directPaid(cur, cU, cE, cG, cL, vU, vE, vG, vL) {
  if (cur === '$') return cU + vU;
  if (cur === '€') return cE + vE;
  if (cur === '£') return cG + vG;
  return cL + vL;
}

function calcTotalFromItems() {
  let total = 0;
  for (let i = 0; i < 20; i++) {
    const el = document.getElementById(`total_${i}`);
    if (el && el.value) total += parseFloat(el.value) || 0;
  }
  return total;
}

async function updateTotals() {
  const itemsTotal = calcTotalFromItems();
  const discount = parseFloat(document.getElementById('discount')?.value) || 0;
  const currency = document.getElementById('invoiceCurrency')?.value || currentInvoice?.invoiceCurrency || 'LE';
  const activeDate = document.getElementById('activeDate')?.value;
  
  const cU = parseFloat(document.getElementById('cashUSD')?.value) || 0;
  const cE = parseFloat(document.getElementById('cashEUR')?.value) || 0;
  const cG = parseFloat(document.getElementById('cashGBP')?.value) || 0;
  const cL = parseFloat(document.getElementById('cashLE')?.value) || 0;
  const vU = parseFloat(document.getElementById('visaUSD')?.value) || 0;
  const vE = parseFloat(document.getElementById('visaEUR')?.value) || 0;
  const vG = parseFloat(document.getElementById('visaGBP')?.value) || 0;
  const vL = parseFloat(document.getElementById('visaLE')?.value) || 0;
  
  let paid = 0;
  if (activeDate && (cU + cE + cG + cL + vU + vE + vG + vL) > 0) {
    const raw = await getRate(activeDate);
    const r = rateFields(raw);
    if (r) {
      const totalLE = cU * r.cash.USD + cE * r.cash.EUR + cG * r.cash.GBP + cL +
                      vU * r.visa.USD + vE * r.visa.EUR + vG * r.visa.GBP + vL * (r.visa.LE || 0.975);
      if (currency === '$') paid = totalLE / r.cash.USD;
      else if (currency === '€') paid = totalLE / r.cash.EUR;
      else if (currency === '£') paid = totalLE / r.cash.GBP;
      else paid = totalLE;
    } else {
      paid = cU + cE + cG + cL + vU + vE + vG + vL;
    }
  } else {
    paid = cU + cE + cG + cL + vU + vE + vG + vL;
  }
  
  paid = R2(paid);
  const rest = R2(Math.max(0, itemsTotal - discount - paid));
  
  document.getElementById('displayActualPrice').textContent = itemsTotal.toFixed(2);
  document.getElementById('displayPaymentPrice').textContent = paid.toFixed(2);
  document.getElementById('displayRest').textContent = rest.toFixed(2);
  
  if (currentInvoice) {
    currentInvoice.actualPrice = itemsTotal;
    currentInvoice.paymentPrice = paid;
    currentInvoice.discount = discount;
    currentInvoice.rest = rest;
  }
}

function updateItemTotal(idx, price) {
  const qty = parseFloat(document.getElementById(`qty_${idx}`)?.value) || 0;
  const totalEl = document.getElementById(`total_${idx}`);
  if (totalEl) totalEl.value = (qty * price).toFixed(2);
  updateTotals();
}

// ===================== الساعة التفاعلية =====================
function buildClockFace() {
  const tg = document.getElementById('ckTicks'), ng = document.getElementById('ckNums');
  if (!tg || !ng || tg.children.length) return;
  for (let i = 0; i < 60; i++) {
    const a = (i * 6 - 90) * Math.PI / 180, maj = i % 5 === 0, r1 = maj ? 96 : 103, r2 = 109;
    const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    ln.setAttribute('x1', CX + r1 * Math.cos(a)); ln.setAttribute('y1', CY + r1 * Math.sin(a));
    ln.setAttribute('x2', CX + r2 * Math.cos(a)); ln.setAttribute('y2', CY + r2 * Math.sin(a));
    ln.setAttribute('stroke', maj ? '#0f1f3d' : '#c5cfe0'); ln.setAttribute('stroke-width', maj ? '2.5' : '1');
    tg.appendChild(ln);
  }
  for (let i = 1; i <= 12; i++) {
    const a = (i * 30 - 90) * Math.PI / 180;
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', CX + 82 * Math.cos(a)); t.setAttribute('y', CY + 82 * Math.sin(a));
    t.setAttribute('text-anchor', 'middle'); t.setAttribute('dominant-baseline', 'central');
    t.setAttribute('font-size', '14'); t.setAttribute('font-weight', '700'); t.setAttribute('fill', '#1a2540');
    t.textContent = i; ng.appendChild(t);
  }
  for (let i = 1; i <= 12; i++) {
    const a = (i * 30 - 90) * Math.PI / 180;
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', CX + 54 * Math.cos(a)); t.setAttribute('y', CY + 54 * Math.sin(a));
    t.setAttribute('text-anchor', 'middle'); t.setAttribute('dominant-baseline', 'central');
    t.setAttribute('font-size', '9'); t.setAttribute('font-weight', '600'); t.setAttribute('fill', '#94a3b8');
    t.textContent = (i + 12) % 24 || 12; ng.appendChild(t);
  }
}

function updateHands() {
  const h = ckHour !== null ? ckHour : 0, m = ckMin !== null ? ckMin : 0;
  const ha = ((h % 12) * 30 + (m * .5) - 90) * Math.PI / 180, ma = (m * 6 - 90) * Math.PI / 180;
  const hx = CX + 50 * Math.cos(ha), hy = CY + 50 * Math.sin(ha), mx = CX + 68 * Math.cos(ma), my = CY + 68 * Math.sin(ma);
  const hh = document.getElementById('ckHandH'); if (hh) { hh.setAttribute('x2', hx); hh.setAttribute('y2', hy); }
  const hm = document.getElementById('ckHandM'); if (hm) { hm.setAttribute('x2', mx); hm.setAttribute('y2', my); }
  const dot = document.getElementById('ckDot'); if (dot) { if (ckMode === 'hour' && ckHour !== null) { dot.setAttribute('cx', hx); dot.setAttribute('cy', hy); dot.setAttribute('opacity', '1'); } else if (ckMode === 'minute' && ckMin !== null) { dot.setAttribute('cx', mx); dot.setAttribute('cy', my); dot.setAttribute('opacity', '1'); } else dot.setAttribute('opacity', '0'); }
  const hs = ckHour !== null ? (ckHour < 10 ? '0' + ckHour : '' + ckHour) : '--', ms = ckMin !== null ? (ckMin < 10 ? '0' + ckMin : '' + ckMin) : '--';
  const hEl = document.getElementById('ckH'), mEl = document.getElementById('ckM');
  if (hEl) { hEl.textContent = hs; hEl.style.color = ckMode === 'hour' ? 'var(--gold)' : 'white'; }
  if (mEl) { mEl.textContent = ms; mEl.style.color = ckMode === 'minute' ? 'var(--gold)' : 'white'; }
}

function openClockModal() { buildClockFace(); const ex = document.getElementById('tripTime')?.value; if (ex) { const [h, m] = ex.split(':'); ckHour = +h; ckMin = +m; } else { ckHour = null; ckMin = null; } ckMode = 'hour'; document.getElementById('modeHour').classList.add('active'); document.getElementById('modeMin').classList.remove('active'); updateHands(); document.getElementById('clockModal').classList.add('open'); bindClockTouch(); }
function closeClockModal() { document.getElementById('clockModal').classList.remove('open'); }
function clearClock() { ckHour = null; ckMin = null; updateHands(); }
function confirmClock() { if (ckHour === null || ckMin === null) { showAlert('الرجاء اختيار الساعة والدقيقة', '⚠️'); return; } const t = (ckHour < 10 ? '0' + ckHour : '' + ckHour) + ':' + (ckMin < 10 ? '0' + ckMin : '' + ckMin); document.getElementById('tripTime').value = t; const td = document.getElementById('timeDisplayText'); if (td) { td.textContent = t; td.classList.remove('ph'); } closeClockModal(); updateTotals(); }
function setClockMode(m) { ckMode = m; document.getElementById('modeHour').classList.toggle('active', m === 'hour'); document.getElementById('modeMin').classList.toggle('active', m === 'minute'); updateHands(); }
function bindClockTouch() { const wrap = document.getElementById('ckWrap'); if (!wrap) return; const nw = wrap.cloneNode(true); wrap.parentNode.replaceChild(nw, wrap); nw.addEventListener('click', onClockClick); nw.addEventListener('touchend', e => { e.preventDefault(); onClockClick(e.changedTouches[0]); }, { passive: false }); }
function onClockClick(e) { const wrap = document.getElementById('ckWrap'); if (!wrap) return; const rect = wrap.getBoundingClientRect(); const sx = ((e.clientX || e.pageX) - rect.left) * (230 / rect.width), sy = ((e.clientY || e.pageY) - rect.top) * (230 / rect.height); const dx = sx - CX, dy = sy - CY, dist = Math.sqrt(dx * dx + dy * dy); let angle = Math.atan2(dy, dx) * (180 / Math.PI) + 90; if (angle < 0) angle += 360; if (ckMode === 'hour') { let h = Math.round(angle / 30) % 12; if (h === 0) h = 12; if (dist < 65) h = (h === 12 ? 0 : h) + 12; ckHour = h % 24; ckMode = 'minute'; document.getElementById('modeHour').classList.remove('active'); document.getElementById('modeMin').classList.add('active'); } else { ckMin = Math.round(angle / 6) % 60; } updateHands(); }

// ===================== تحميل الفاتورة =====================
async function loadInvoice() {
  if (!sessionStorage.getItem('returnUrl') && document.referrer) {
    sessionStorage.setItem('returnUrl', document.referrer);
  }
  
  const params = new URLSearchParams(location.search);
  const voucherNo = params.get('voucherNo');
  
  if (!voucherNo) {
    showAlert('رقم الفاتورة غير موجود', '⚠️', '<button class="btn btn-primary" onclick="goBack()">رجوع</button>');
    return;
  }
  
  showPDF('جاري تحميل الفاتورة...');
  
  try {
    // جلب الفاتورة مباشرة
    const result = await gas('getInvoiceByVoucher', { voucherNo });
    console.log('📄 Invoice result:', result);
    
    if (!result.success || !result.invoice) {
      throw new Error('الفاتورة غير موجودة: ' + voucherNo);
    }
    
    currentInvoice = result.invoice;
    originalInvoice = JSON.parse(JSON.stringify(currentInvoice));
    
    document.getElementById('userNameDisplay').textContent = currentUser?.name || 'User';
    document.getElementById('voucherDisplay').textContent = voucherNo;
    
    // جلب بيانات الرحلة
    const tripData = await gas('getTripData', { 
      tripName: currentInvoice.trip, 
      currency: currentInvoice.invoiceCurrency || 'LE' 
    });
    
    const tripPricesData = await gas('getTripPrices', { 
      tripName: currentInvoice.trip, 
      currency: currentInvoice.invoiceCurrency || 'LE',
      category: ''
    });
    
    const tripPrices = (tripPricesData?.prices) ? tripPricesData.prices : [];
    
    // بناء جدول البنود
    let tRows = '';
    if (tripData?.items && tripData.items.length > 0) {
      // تحويل activitiesText إلى كميات
      const acts = [];
      if (currentInvoice.activitiesText) {
        currentInvoice.activitiesText.split('|').forEach(p => {
          const m = p.trim().match(/^(.+?)×(\d+(\.\d+)?)$/);
          if (m) acts.push({ name: m[1].trim(), qty: parseFloat(m[2]) || 0 });
        });
      }
      
      tRows = tripData.items.map((name, i) => {
        const act = acts.find(a => a.name === name);
        const qty = act ? act.qty : 0;
        const price = tripPrices[i] || 0;
        return `<tr>
          <td style="font-weight:600">${esc(name)}</td>
          <td><input type="number" id="qty_${i}" min="0" step="1" placeholder="0" value="${qty || ''}" oninput="updateItemTotal(${i}, ${price})"></td>
          <td><input type="number" id="price_${i}" value="${price}" readonly></td>
          <td><input type="number" id="total_${i}" value="${(qty * price).toFixed(2)}" readonly></td>
        </tr>`;
      }).join('');
    }
    
    // جلب قائمة الرحلات
    const uniqueTrips = await gas('getUniqueTrips');
    const tripsOpts = Array.isArray(uniqueTrips) 
      ? uniqueTrips.map(t => `<option value="${esc(t.name)}" ${t.name === currentInvoice.trip ? 'selected' : ''}>${esc(t.name)}</option>`).join('') 
      : `<option value="${esc(currentInvoice.trip)}" selected>${esc(currentInvoice.trip)}</option>`;
    
    // ✅ التحقق من تاريخ الفاتورة لحماية المدفوعات
    const issueDate = parseDate(currentInvoice.issueDate);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const isPastDate = issueDate && issueDate < today;
    const paymentsReadonly = isPastDate;
    const warnHtml = isPastDate ? `<div class="warning-bar">⚠️ تاريخ الفاتورة (${currentInvoice.issueDate}) قد مضى — التعديل على المدفوعات غير مسموح.</div>` : '';
    
    const formHtml = `
      ${warnHtml}
      <div class="card">
        <div class="card-header">👤<h3>بيانات العميل</h3></div>
        <div class="card-body">
          <div class="form-grid">
            <div class="form-group"><label>الهاتف</label><input type="text" id="contactNo" value="${esc(currentInvoice.contactNo)}"></div>
            <div class="form-group"><label>اسم الضيف</label><input type="text" id="guestName" value="${esc(currentInvoice.guestName)}"></div>
            <div class="form-group"><label>الجنسية</label><input type="text" id="nationality" value="${esc(currentInvoice.nationality)}"></div>
          </div>
        </div>
      </div>
      
      <div class="card">
        <div class="card-header">🏝️<h3>تفاصيل الرحلة</h3></div>
        <div class="card-body">
          <div class="hotel-row">
            <div class="form-group"><label>الفندق</label><input type="text" id="hotel" value="${esc(currentInvoice.hotel)}"></div>
            <div class="form-group"><label>رقم الغرفة</label><input type="text" id="roomNo" value="${esc(currentInvoice.roomNo)}"></div>
            <div class="form-group"><label>بالغين</label><input type="number" id="adultCount" min="0" value="${dV(currentInvoice.adultCount)}"></div>
            <div class="form-group"><label>أطفال</label><input type="number" id="childCount" min="0" value="${dV(currentInvoice.childCount)}"></div>
            <div class="form-group"><label>رضع</label><input type="number" id="infantCount" min="0" value="${dV(currentInvoice.infantCount)}"></div>
          </div>
          <div class="form-grid">
            <div class="form-group"><label>تاريخ التنفيذ</label><input type="date" id="activeDate" value="${dateToInput(currentInvoice.activeDate)}" onchange="updateTotals()"></div>
            <div class="form-group"><label>الوقت</label><input type="hidden" id="tripTime"><button type="button" class="time-btn-display" onclick="openClockModal()"><span id="timeDisplayText" class="${currentInvoice.time ? '' : 'ph'}">${currentInvoice.time || 'اختر الوقت...'}</span><span>🕐</span></button></div>
            <div class="form-group"><label>عملة الفاتورة</label><select id="invoiceCurrency" onchange="changeTrip()">
              <option value="$" ${currentInvoice.invoiceCurrency === '$' ? 'selected' : ''}>USD ($)</option>
              <option value="€" ${currentInvoice.invoiceCurrency === '€' ? 'selected' : ''}>EUR (€)</option>
              <option value="£" ${currentInvoice.invoiceCurrency === '£' ? 'selected' : ''}>GBP (£)</option>
              <option value="LE" ${currentInvoice.invoiceCurrency === 'LE' ? 'selected' : ''}>EGP (LE)</option>
            </select></div>
          </div>
          <div class="form-group"><label>اسم الرحلة</label><select id="tripName" onchange="changeTrip()">${tripsOpts}</select></div>
          <div class="trip-table">
            <table>
              <thead><tr><th style="text-align:left">البند</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead>
              <tbody id="itemsBody">${tRows || '<tr><td colspan="4">لا توجد بنود</td></tr>'}</tbody>
            </table>
          </div>
        </div>
      </div>
      
      <div class="card">
        <div class="card-header">💰<h3>المدفوعات والإجماليات</h3></div>
        <div class="totals-strip">
          <div class="total-item"><div class="label">الخصم</div><input type="number" id="discount" min="0" step="0.01" value="${dV(currentInvoice.discount)}" oninput="updateTotals()"></div>
          <div class="total-item"><div class="label">إجمالي الفاتورة</div><div class="value" id="displayActualPrice">${(currentInvoice.actualPrice || 0).toFixed(2)}</div><div class="currency">${currentInvoice.invoiceCurrency || ''}</div></div>
          <div class="total-item"><div class="label">المدفوع</div><div class="value" id="displayPaymentPrice">${(currentInvoice.paymentPrice || 0).toFixed(2)}</div><div class="currency">${currentInvoice.invoiceCurrency || ''}</div></div>
          <div class="total-item"><div class="label">المتبقي</div><div class="value" id="displayRest">${(currentInvoice.rest || 0).toFixed(2)}</div><div class="currency">${currentInvoice.invoiceCurrency || ''}</div></div>
        </div>
        
        <div class="payment-section">
          <div class="payment-label">💵 كاش</div>
          <div class="payment-grid">
            <div class="payment-card"><label>USD</label><input type="number" id="cashUSD" step="0.01" value="${dV(currentInvoice.cashUSD)}" oninput="updateTotals()" ${paymentsReadonly ? 'readonly' : ''}></div>
            <div class="payment-card"><label>EUR</label><input type="number" id="cashEUR" step="0.01" value="${dV(currentInvoice.cashEUR)}" oninput="updateTotals()" ${paymentsReadonly ? 'readonly' : ''}></div>
            <div class="payment-card"><label>GBP</label><input type="number" id="cashGBP" step="0.01" value="${dV(currentInvoice.cashGBP)}" oninput="updateTotals()" ${paymentsReadonly ? 'readonly' : ''}></div>
            <div class="payment-card"><label>EGP</label><input type="number" id="cashLE" step="0.01" value="${dV(currentInvoice.cashLE)}" oninput="updateTotals()" ${paymentsReadonly ? 'readonly' : ''}></div>
          </div>
        </div>
        
        <div class="payment-section">
          <div class="payment-label">💳 فيزا</div>
          <div class="payment-grid">
            <div class="payment-card"><label>Visa USD</label><input type="number" id="visaUSD" step="0.01" value="${dV(currentInvoice.visaUSD)}" oninput="updateTotals()" ${paymentsReadonly ? 'readonly' : ''}></div>
            <div class="payment-card"><label>Visa EUR</label><input type="number" id="visaEUR" step="0.01" value="${dV(currentInvoice.visaEUR)}" oninput="updateTotals()" ${paymentsReadonly ? 'readonly' : ''}></div>
            <div class="payment-card"><label>Visa GBP</label><input type="number" id="visaGBP" step="0.01" value="${dV(currentInvoice.visaGBP)}" oninput="updateTotals()" ${paymentsReadonly ? 'readonly' : ''}></div>
            <div class="payment-card"><label>Visa EGP</label><input type="number" id="visaLE" step="0.01" value="${dV(currentInvoice.visaLE)}" oninput="updateTotals()" ${paymentsReadonly ? 'readonly' : ''}></div>
          </div>
        </div>
        
        <div class="card-body">
          <div class="form-group"><label>ملاحظات</label><textarea id="notes" rows="2">${esc(currentInvoice.notes)}</textarea></div>
        </div>
      </div>
      
      <div class="card">
        <div class="card-header">🏢<h3>معلومات إضافية</h3></div>
        <div class="card-body">
          <div class="form-grid">
            <div class="form-group"><label>المنفذ</label><input type="text" id="supplier" value="${esc(currentInvoice.supplier)}" readonly style="background:#f0f4ff; cursor:pointer;" onclick="alert('قيد التطوير')"></div>
            <div class="form-group"><label>العميل</label><input type="text" id="customer" value="${esc(currentInvoice.customer)}" readonly style="background:#f0f4ff; cursor:pointer;" onclick="alert('قيد التطوير')"></div>
            <div class="form-group"><label>الحالة</label><select id="state">
              <option value="pending" ${currentInvoice.state === 'pending' ? 'selected' : ''}>⏳ قيد الانتظار</option>
              <option value="Confirmed" ${(currentInvoice.state === 'Confirmed' || currentInvoice.state === 'confirmed') ? 'selected' : ''}>✅ مؤكد</option>
              <option value="cancel" ${currentInvoice.state === 'cancel' ? 'selected' : ''}>❌ ملغي</option>
            </select></div>
          </div>
        </div>
      </div>
      
      <div class="action-buttons">
        <button class="btn btn-primary" onclick="saveChanges()">💾 حفظ التعديلات</button>
        <button class="btn btn-danger" onclick="cancelEdit()">❌ إلغاء</button>
      </div>
    `;
    
    document.getElementById('loaderState').style.display = 'none';
    document.getElementById('formContent').style.display = 'block';
    document.getElementById('formContent').innerHTML = formHtml;
    
    if (currentInvoice.time) {
      document.getElementById('tripTime').value = currentInvoice.time;
      const td = document.getElementById('timeDisplayText');
      if (td) { td.textContent = currentInvoice.time; td.classList.remove('ph'); }
    }
    
    await updateTotals();
    
  } catch(err) {
    console.error('loadInvoice error:', err);
    hidePDF();
    showAlert('خطأ: ' + err.message, '❌', '<button class="btn btn-primary" onclick="goBack()">رجوع</button>');
    document.getElementById('loaderState').style.display = 'none';
  } finally {
    hidePDF();
  }
}

async function changeTrip() {
  const newTrip = document.getElementById('tripName')?.value;
  const currency = document.getElementById('invoiceCurrency')?.value;
  if (!newTrip || !currency) return;
  const td = await gas('getTripData', { tripName: newTrip, currency });
  if (td?.items) {
    let rows = '';
    for (let i = 0; i < td.items.length; i++) {
      rows += `<tr><td style="font-weight:600">${esc(td.items[i])}</td>
        <td><input type="number" id="qty_${i}" min="0" step="1" placeholder="0" oninput="updateItemTotal(${i}, ${td.prices?.[i] || 0})"></td>
        <td><input type="number" id="price_${i}" value="${td.prices?.[i] || 0}" readonly></td>
        <td><input type="number" id="total_${i}" value="0" readonly></td>
      </td>`;
    }
    document.getElementById('itemsBody').innerHTML = rows;
  }
  await updateTotals();
}

async function collectEditedData() {
  const items = [];
  for (let i = 0; i < 20; i++) {
    const qty = parseFloat(document.getElementById(`qty_${i}`)?.value) || 0;
    if (qty > 0) {
      const name = document.querySelector(`#itemsBody tr:nth-child(${i+1}) td:first-child`)?.textContent;
      if (name) items.push(`${name}×${qty}`);
    }
  }
  
  const tripPrices = [];
  for (let i = 0; i < 20; i++) {
    const priceEl = document.getElementById(`price_${i}`);
    tripPrices.push(priceEl ? parseFloat(priceEl.value) || 0 : 0);
  }
  
  return {
    voucherNo: currentInvoice.voucherNo,
    issueDate: currentInvoice.issueDate,
    activeDate: document.getElementById('activeDate')?.value || '',
    time: document.getElementById('tripTime')?.value || '',
    contactNo: document.getElementById('contactNo')?.value || '',
    guestName: document.getElementById('guestName')?.value || '',
    nationality: document.getElementById('nationality')?.value || '',
    hotel: document.getElementById('hotel')?.value || '',
    roomNo: document.getElementById('roomNo')?.value || '',
    trip: document.getElementById('tripName')?.value || '',
    invoiceCurrency: document.getElementById('invoiceCurrency')?.value || '',
    adultCount: parseInt(document.getElementById('adultCount')?.value) || 0,
    childCount: parseInt(document.getElementById('childCount')?.value) || 0,
    infantCount: parseInt(document.getElementById('infantCount')?.value) || 0,
    cashUSD: parseFloat(document.getElementById('cashUSD')?.value) || 0,
    cashEUR: parseFloat(document.getElementById('cashEUR')?.value) || 0,
    cashGBP: parseFloat(document.getElementById('cashGBP')?.value) || 0,
    cashLE: parseFloat(document.getElementById('cashLE')?.value) || 0,
    visaUSD: parseFloat(document.getElementById('visaUSD')?.value) || 0,
    visaEUR: parseFloat(document.getElementById('visaEUR')?.value) || 0,
    visaGBP: parseFloat(document.getElementById('visaGBP')?.value) || 0,
    visaLE: parseFloat(document.getElementById('visaLE')?.value) || 0,
    actualPrice: calcTotalFromItems(),
    discount: parseFloat(document.getElementById('discount')?.value) || 0,
    paymentPrice: parseFloat(document.getElementById('displayPaymentPrice')?.textContent) || 0,
    rest: parseFloat(document.getElementById('displayRest')?.textContent) || 0,
    activitiesText: items.join(' | '),
    supplier: document.getElementById('supplier')?.value || '',
    customer: document.getElementById('customer')?.value || '',
    state: document.getElementById('state')?.value || 'pending',
    notes: document.getElementById('notes')?.value || '',
    salesId: currentInvoice.salesId,
    centerName: currentInvoice.centerName,
    branchName: currentInvoice.branchName,
    salesName: currentInvoice.salesName,
    cost: currentInvoice.cost || '',
    nationArrange: currentInvoice.nationArrange || '',
    tripPrices: tripPrices
  };
}

function createEditSummary(orig, edited) {
  const changes = [], cur = edited.invoiceCurrency || '$';
  if ((orig.discount || 0) !== (edited.discount || 0)) {
    const d = (edited.discount || 0) - (orig.discount || 0);
    changes.push(`💰 الخصم ${d > 0 ? '+' : ''}${d} ${cur}`);
  }
  if (orig.state !== edited.state) changes.push(`📌 الحالة: ${orig.state || 'pending'} → ${edited.state || 'pending'}`);
  if ((orig.time || '') !== (edited.time || '')) changes.push(`⏰ الوقت: ${orig.time || ''} → ${edited.time || ''}`);
  return changes.length ? changes.join(' | ') : 'لا توجد تغييرات';
}

async function saveChanges() {
  const editedData = await collectEditedData();
  const summary = createEditSummary(originalInvoice, editedData);
  showPDF('جاري حفظ التعديلات...');
  try {
    await gas('updateInvoice', editedData);
    await gas('copyInvoiceToEdit', {
      originalData: JSON.stringify(originalInvoice),
      editedData: JSON.stringify(editedData),
      userId: currentUser?.id || '',
      editSummary: summary
    });
    
    showPDF('جاري إنشاء PDF...');
    const pdfResult = await gas('saveAndGenerateSinglePDF_New', {
      voucherNo: editedData.voucherNo,
      prices: JSON.stringify(editedData.tripPrices || []),
      total: editedData.actualPrice || 0
    });
    
    hidePDF();
    
    let buttons = '<button class="btn btn-primary" onclick="closeAlert(); goBack()">🏠 رجوع</button>';
    if (pdfResult?.success && pdfResult?.url) {
      buttons += `<a href="${pdfResult.url}" target="_blank" class="btn btn-success" style="text-decoration:none; margin-right:8px;">📄 فتح PDF</a>`;
    }
    buttons += '<button class="btn btn-primary" onclick="closeAlert()">❌ إغلاق</button>';
    
    showAlert('✅ تم حفظ التعديلات بنجاح', '✅', buttons);
    
  } catch(err) {
    hidePDF();
    showAlert('خطأ: ' + err.message, '❌', '<button class="btn btn-primary" onclick="closeAlert()">موافق</button>');
  }
}

async function cancelEdit() {
  if (confirm('هل أنت متأكد من إلغاء التعديلات؟')) goBack();
}

document.addEventListener('DOMContentLoaded', () => {
  let ud = sessionStorage.getItem('currentUser');
  if (!ud) { const p = new URLSearchParams(location.search).get('user'); if (p) { ud = decodeURIComponent(p); sessionStorage.setItem('currentUser', ud); } }
  if (!ud) { location.href = 'index.html'; return; }
  try { currentUser = JSON.parse(ud); } catch { location.href = 'index.html'; return; }
  loadInvoice();
});

window.goBack = goBack; window.closeAlert = closeAlert; window.updateTotals = updateTotals; window.updateItemTotal = updateItemTotal;
window.saveChanges = saveChanges; window.cancelEdit = cancelEdit; window.changeTrip = changeTrip;
window.openClockModal = openClockModal; window.closeClockModal = closeClockModal; window.clearClock = clearClock;
window.confirmClock = confirmClock; window.setClockMode = setClockMode;
</script>
