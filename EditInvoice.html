<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Edit Invoice</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0f1f3d;--navy2:#1a3260;--gold:#f5c842;--gold2:#e6b800;
      --blue:#2563eb;--green:#16a34a;--red:#dc2626;--orange:#ea580c;
      --bg:#f0f4f8;--card:#fff;--border:#dde4f0;--text:#1a2540;--text-lt:#5a6a8a;
      --radius:16px;--radius-sm:10px;
      --shadow:0 4px 24px rgba(15,31,61,.10);--shadow-lg:0 8px 40px rgba(15,31,61,.16);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    /* ── Header ── */
    .header{
      background:linear-gradient(135deg,var(--navy),var(--navy2));
      color:white;padding:14px 24px;
      display:flex;justify-content:space-between;align-items:center;
      position:sticky;top:0;z-index:200;box-shadow:var(--shadow-lg);
    }
    .header-left{display:flex;align-items:center;gap:12px;}
    .header-left h2{color:var(--gold);font-size:19px;font-weight:900;}
    .voucher-badge{background:var(--gold);color:var(--navy);padding:5px 16px;border-radius:30px;font-weight:800;font-size:14px;}
    .header-right{display:flex;align-items:center;gap:10px;}
    .user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:40px;padding:5px 14px;color:white;font-size:13px;font-weight:600;}
    .back-btn{background:transparent;border:2px solid rgba(255,255,255,.3);color:white;padding:5px 14px;border-radius:40px;cursor:pointer;font-weight:700;font-size:12px;font-family:'Cairo',sans-serif;transition:all .2s;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}

    /* ── Page ── */
    .page{max-width:1000px;margin:0 auto;padding:20px 16px 50px;}

    /* ── Warn ── */
    .warn-bar{background:#fef3c7;border:2px solid #f59e0b;border-radius:var(--radius-sm);padding:12px 16px;color:#92400e;font-weight:600;font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}

    /* ── Card ── */
    .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
    .card-head{padding:11px 18px;background:linear-gradient(90deg,var(--navy),var(--navy2));display:flex;align-items:center;gap:8px;}
    .card-head h3{color:var(--gold);font-size:14px;font-weight:800;}
    .ch-icon{background:rgba(245,200,66,.2);border-radius:7px;padding:3px 6px;font-size:13px;}
    .card-body{padding:16px;}

    /* ── Form ── */
    .fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;}
    .fgroup{display:flex;flex-direction:column;gap:5px;}
    .fgroup label{font-size:11px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px;}
    .fc{padding:9px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:'Cairo',sans-serif;color:var(--text);background:#fafbfd;width:100%;height:42px;transition:border-color .2s;-webkit-appearance:none;appearance:none;}
    .fc:focus{border-color:var(--blue);outline:none;background:white;}
    .fc[readonly]{background:#f1f5f9;color:var(--text-lt);cursor:default;}
    select.fc{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='13' height='13' viewBox='0 0 24 24' fill='none' stroke='%235a6a8a' stroke-width='2.5'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:left 10px center;padding-left:30px;}
    textarea.fc{height:auto;resize:vertical;}

    /* ── Hotel row (1fr 90px 68px 68px 68px) ── */
    .hotel-row{display:grid;grid-template-columns:1fr 90px 68px 68px 68px;gap:11px;align-items:end;}
    .compact-num{padding:9px 4px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:'Cairo',sans-serif;font-weight:700;color:var(--text);background:#fafbfd;width:100%;height:42px;text-align:center;transition:border-color .2s;-webkit-appearance:none;}
    .compact-num:focus{border-color:var(--blue);outline:none;background:white;}

    /* ── Time btn ── */
    .time-btn{width:100%;height:42px;padding:8px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);background:#fafbfd;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:14px;font-family:'Cairo',sans-serif;color:var(--text);transition:border-color .2s;}
    .time-btn:hover{border-color:var(--blue);}
    .time-btn .ph{color:#b0bac9;}

    /* ── Trip table ── */
    .trip-tbl{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border);}
    .trip-tbl table{width:100%;border-collapse:collapse;}
    .trip-tbl thead th{background:linear-gradient(90deg,var(--navy),var(--navy2));color:var(--gold);padding:9px 11px;font-size:11px;font-weight:700;text-align:center;text-transform:uppercase;}
    .trip-tbl thead th:first-child{text-align:left;}
    .trip-tbl tbody tr:hover{background:#f8faff;}
    .trip-tbl td{padding:8px 11px;border-bottom:1px solid #f0f4f8;font-size:13px;vertical-align:middle;}
    .trip-tbl td:not(:first-child){text-align:center;}
    .trip-tbl input[type="number"]{width:68px;padding:5px;border:2px solid var(--border);border-radius:7px;text-align:center;font-size:14px;font-weight:700;font-family:'Cairo',sans-serif;background:#fafbfd;}
    .trip-tbl input[type="number"]:focus{border-color:var(--blue);outline:none;}
    .trip-tbl input[readonly]{background:#f0f4f8;color:var(--text-lt);}

    /* ── Payments ── */
    .pay-grp-lbl{padding:4px 16px 2px;font-size:10px;font-weight:800;color:var(--text-lt);text-transform:uppercase;letter-spacing:.7px;}
    .pay-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px 15px;}
    .pay-cell{background:#fafbfd;border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 7px;text-align:center;}
    .pay-cell:focus-within{border-color:var(--blue);}
    .pay-cell label{display:block;font-size:10px;font-weight:700;color:var(--text-lt);text-transform:uppercase;margin-bottom:5px;}
    .pay-cell input{width:100%;border:none;background:transparent;text-align:center;font-size:14px;font-weight:700;font-family:'Cairo',sans-serif;color:var(--text);outline:none;}

    /* ── Totals ── */
    .totals-strip{display:flex;justify-content:space-around;align-items:center;flex-wrap:wrap;gap:14px;padding:16px;border-bottom:2px dashed var(--border);}
    .total-tile{text-align:center;}
    .total-tile .tl{font-size:10px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
    .total-tile .tv{font-size:30px;font-weight:900;color:var(--navy);line-height:1;}
    .total-tile .tc{font-size:13px;color:var(--gold2);font-weight:700;margin-left:3px;}
    .total-tile input{width:110px;padding:7px;border:2px solid var(--border);border-radius:10px;text-align:center;font-size:14px;font-weight:700;font-family:'Cairo',sans-serif;background:white;}
    .total-tile input:focus{border-color:var(--blue);outline:none;}

    /* ── Actions ── */
    .action-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:6px;}
    .btn{padding:12px 26px;border:none;border-radius:40px;font-weight:800;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;display:flex;align-items:center;gap:6px;transition:all .2s;}
    .btn:hover{transform:translateY(-2px);}
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none;}
    .btn-save{background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);box-shadow:0 4px 14px rgba(15,31,61,.3);}
    .btn-cancel{background:#fee2e2;color:var(--red);}

    /* ══ CLOCK MODAL ══ */
    .clock-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);align-items:center;justify-content:center;z-index:10000;backdrop-filter:blur(6px);}
    .clock-modal.open{display:flex;}
    .clock-box{background:white;width:90%;max-width:320px;border-radius:26px;overflow:hidden;box-shadow:0 30px 70px rgba(0,0,0,.5);animation:pop .3s cubic-bezier(.34,1.56,.64,1);}
    @keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
    .ck-head{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:16px 18px;text-align:center;}
    .ck-head-title{color:var(--gold);font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;opacity:.8;}
    .ck-time-big{font-size:50px;font-weight:900;color:white;letter-spacing:4px;font-family:'Cairo',monospace;line-height:1;margin-bottom:10px;}
    .ck-mode-row{display:flex;justify-content:center;gap:8px;}
    .ck-mode-pill{padding:3px 16px;border-radius:20px;font-size:11px;font-weight:700;font-family:'Cairo',sans-serif;border:2px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;}
    .ck-mode-pill.active{background:var(--gold);color:var(--navy);border-color:var(--gold);}
    .ck-face-wrap{padding:14px;background:#f5f7fb;display:flex;justify-content:center;}
    .ck-svg-wrap{width:210px;height:210px;cursor:crosshair;}
    .ck-svg-wrap svg{width:100%;height:100%;display:block;-webkit-tap-highlight-color:transparent;}
    .ck-foot{display:flex;gap:7px;padding:12px 14px;background:white;border-top:1px solid var(--border);}
    .ck-btn{flex:1;padding:10px;border:none;border-radius:40px;font-weight:700;font-size:12px;cursor:pointer;font-family:'Cairo',sans-serif;transition:all .2s;}
    .ck-clear{background:#f1f5f9;color:var(--text);}
    .ck-cancel{background:#fee2e2;color:var(--red);}
    .ck-set{background:linear-gradient(135deg,var(--green),#15803d);color:white;}

    /* ── Modals ── */
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px);}
    .modal.open{display:flex;}
    .modal-box{background:white;width:90%;max-width:440px;border-radius:22px;padding:24px;text-align:center;box-shadow:0 25px 50px rgba(0,0,0,.3);animation:pop .25s ease;}
    .modal-icon{font-size:42px;margin-bottom:10px;}
    .modal-msg{color:var(--navy);font-size:15px;font-weight:700;margin-bottom:18px;white-space:pre-wrap;line-height:1.6;}
    .modal-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}

    /* ── PDF Overlay ── */
    .pdf-ov{display:none;position:fixed;inset:0;background:rgba(10,22,40,.88);z-index:99999;align-items:center;justify-content:center;flex-direction:column;gap:18px;}
    .pdf-ov.show{display:flex;}
    .pdf-spin{width:56px;height:56px;border:5px solid rgba(255,255,255,.15);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .pdf-ov p{color:white;font-size:16px;font-weight:700;}

    /* ── Loader ── */
    .loader-big{text-align:center;padding:60px;color:var(--text-lt);}
    .spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px;}

    @media(max-width:700px){
      .pay-grid{grid-template-columns:repeat(2,1fr);}
      .hotel-row{grid-template-columns:1fr 78px 62px 62px 62px;}
      .ck-svg-wrap{width:190px;height:190px;}
      .ck-time-big{font-size:42px;}
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h2>✏️ Edit Invoice</h2>
    <span class="voucher-badge" id="voucherDisplay"></span>
  </div>
  <div class="header-right">
    <span class="user-chip" id="userNameDisplay"></span>
    <button class="back-btn" onclick="goBack()">← Back</button>
  </div>
</div>

<div class="page">
  <div id="mainContent"><div class="loader-big"><div class="spinner"></div>Loading invoice...</div></div>
</div>

<!-- PDF Overlay -->
<div class="pdf-ov" id="pdfOv"><div class="pdf-spin"></div><p id="pdfMsg">Saving...</p></div>

<!-- ══ ANALOG CLOCK MODAL ══ -->
<div id="clockModal" class="clock-modal">
  <div class="clock-box">
    <div class="ck-head">
      <div class="ck-head-title">SELECT TIME</div>
      <div class="ck-time-big"><span id="ckH">--</span>:<span id="ckM">--</span></div>
      <div class="ck-mode-row">
        <button class="ck-mode-pill active" id="modeHour" onclick="setClockMode('hour')">HOUR</button>
        <button class="ck-mode-pill" id="modeMin"  onclick="setClockMode('minute')">MIN</button>
      </div>
    </div>
    <div class="ck-face-wrap">
      <div class="ck-svg-wrap" id="ckWrap">
        <svg id="ckSVG" viewBox="0 0 210 210" xmlns="http://www.w3.org/2000/svg">
          <circle cx="105" cy="105" r="102" fill="#eef2f8" stroke="#dde4f0" stroke-width="1.5"/>
          <circle cx="105" cy="105" r="58" fill="rgba(37,99,235,.04)" stroke="rgba(37,99,235,.12)" stroke-width="1" stroke-dasharray="4 3"/>
          <g id="ckTicks"></g>
          <g id="ckNums"></g>
          <line id="ckHandH" x1="105" y1="105" x2="105" y2="56" stroke="#0f1f3d" stroke-width="5" stroke-linecap="round"/>
          <line id="ckHandM" x1="105" y1="105" x2="105" y2="40" stroke="#2563eb" stroke-width="3.5" stroke-linecap="round"/>
          <circle cx="105" cy="105" r="6" fill="#0f1f3d"/>
          <circle cx="105" cy="105" r="2.5" fill="#f5c842"/>
          <circle id="ckDot" cx="105" cy="40" r="8" fill="#f5c842" opacity="0"/>
        </svg>
      </div>
    </div>
    <div class="ck-foot">
      <button class="ck-btn ck-clear"  onclick="clearClock()">🔄 Clear</button>
      <button class="ck-btn ck-cancel" onclick="closeClockModal()">❌ Cancel</button>
      <button class="ck-btn ck-set"    onclick="confirmClock()">✅ Set</button>
    </div>
  </div>
</div>

<!-- Alert Modal -->
<div id="alertModal" class="modal">
  <div class="modal-box">
    <div class="modal-icon" id="alertIcon">ℹ️</div>
    <div class="modal-msg" id="alertMsg"></div>
    <div class="modal-btns" id="alertBtns"><button class="btn btn-save" onclick="closeAlert()">OK</button></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   CONFIG & GLOBALS
═══════════════════════════════════════ */
const GAS_URL='https://script.google.com/macros/s/AKfycbyBfwHQQoHb9E2bq0l-u6FLMD2XFKu_d8rZuJLnIq5iko82Bn93Emki6-cvDF_XOyRp/exec';
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let currentUser=null,currentInvoice=null,originalInvoice=null;
let exRatesCache={},tripsCache={};
let ckHour=null,ckMin=null,ckMode='hour';
const CX=105,CY=105;
function roundTwo(n){return Math.round((n+Number.EPSILON)*100)/100;}
function dV(v){const n=Number(v);return(n===0||isNaN(n))?'':n;}

/* ═══════════════════════════════════════
   API
═══════════════════════════════════════ */
async function callGAS(action,params={}){
  const url=new URL(GAS_URL);url.searchParams.set('action',action);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,String(v??'')));
  const r=await fetch(url.toString(),{redirect:'follow'});if(!r.ok)throw new Error('HTTP '+r.status);return r.json();
}

/* ═══════════════════════════════════════
   MODALS
═══════════════════════════════════════ */
function showPDFOv(m){document.getElementById('pdfMsg').textContent=m;document.getElementById('pdfOv').classList.add('show');}
function hidePDFOv(){document.getElementById('pdfOv').classList.remove('show');}
function showAlert(msg,icon,btnHtml){document.getElementById('alertMsg').textContent=msg;document.getElementById('alertIcon').textContent=icon||'ℹ️';document.getElementById('alertBtns').innerHTML=btnHtml||'<button class="btn btn-save" onclick="closeAlert()">OK</button>';document.getElementById('alertModal').classList.add('open');}
function closeAlert(){document.getElementById('alertModal').classList.remove('open');}
function goBack(){window.location.href='BookingsToday.html';}

/* ═══════════════════════════════════════
   DATE / TIME HELPERS
═══════════════════════════════════════ */
function parseDate(str){if(!str)return null;const p=str.split('/');if(p.length===3){const mi=MONTHS.findIndex(m=>m.toLowerCase()===p[1].toLowerCase());if(mi!==-1)return new Date(+p[2],mi,+p[0]);}return null;}
function formatDate(d){return`${String(d.getDate()).padStart(2,'0')}/${MONTHS[d.getMonth()]}/${d.getFullYear()}`;}
function dateToInput(s){const d=parseDate(s);if(!d)return'';return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function timeToInput(t){if(!t)return'';const m=String(t).match(/(\d{1,2}):(\d{2})/);return m?`${m[1].padStart(2,'0')}:${m[2]}`:String(t).substring(0,5);}
function parseActivities(text){const r=[];if(!text)return r;text.split('|').forEach(p=>{const m=p.trim().match(/^(.+?)×(\d+(\.\d+)?)$/);if(m)r.push({name:m[1].trim(),qty:parseFloat(m[2])||0});});return r;}

/* ═══════════════════════════════════════
   CLOCK (Analog)
═══════════════════════════════════════ */
function buildClockFace(){
  const tg=document.getElementById('ckTicks'),ng=document.getElementById('ckNums');
  if(!tg||!ng||tg.children.length)return;
  for(let i=0;i<60;i++){
    const a=(i*6-90)*Math.PI/180,maj=i%5===0,r1=maj?88:95,r2=100;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',CX+r1*Math.cos(a));line.setAttribute('y1',CY+r1*Math.sin(a));
    line.setAttribute('x2',CX+r2*Math.cos(a));line.setAttribute('y2',CY+r2*Math.sin(a));
    line.setAttribute('stroke',maj?'#0f1f3d':'#c5cfe0');line.setAttribute('stroke-width',maj?'2.5':'1');
    tg.appendChild(line);
  }
  for(let i=1;i<=12;i++){
    const a=(i*30-90)*Math.PI/180,r=75;
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',CX+r*Math.cos(a));t.setAttribute('y',CY+r*Math.sin(a));
    t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','central');
    t.setAttribute('font-size','13');t.setAttribute('font-weight','700');t.setAttribute('fill','#1a2540');t.setAttribute('font-family','Cairo,sans-serif');
    t.textContent=i;ng.appendChild(t);
  }
  for(let i=1;i<=12;i++){
    const a=(i*30-90)*Math.PI/180,r=49;
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',CX+r*Math.cos(a));t.setAttribute('y',CY+r*Math.sin(a));
    t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','central');
    t.setAttribute('font-size','8');t.setAttribute('font-weight','600');t.setAttribute('fill','#94a3b8');t.setAttribute('font-family','Cairo,sans-serif');
    t.textContent=(i+12)%24||12;ng.appendChild(t);
  }
}
function sAttr(id,...pairs){const el=document.getElementById(id);if(!el)return;for(let i=0;i<pairs.length;i+=2)el.setAttribute(pairs[i],pairs[i+1]);}
function updateHandsDisplay(){
  const h=ckHour!==null?ckHour:0,m=ckMin!==null?ckMin:0;
  const ha=((h%12)*30+(m*0.5)-90)*Math.PI/180,ma=(m*6-90)*Math.PI/180;
  const hl=46,ml=62;
  const hx=CX+hl*Math.cos(ha),hy=CY+hl*Math.sin(ha),mx=CX+ml*Math.cos(ma),my=CY+ml*Math.sin(ma);
  sAttr('ckHandH','x2',hx,'y2',hy);sAttr('ckHandM','x2',mx,'y2',my);
  const dot=document.getElementById('ckDot');
  if(dot){if(ckMode==='hour'&&ckHour!==null){dot.setAttribute('cx',hx);dot.setAttribute('cy',hy);dot.setAttribute('opacity','1');}
  else if(ckMode==='minute'&&ckMin!==null){dot.setAttribute('cx',mx);dot.setAttribute('cy',my);dot.setAttribute('opacity','1');}
  else dot.setAttribute('opacity','0');}
  const hEl=document.getElementById('ckH'),mEl=document.getElementById('ckM');
  if(hEl)hEl.textContent=ckHour!==null?(ckHour<10?'0'+ckHour:''+ckHour):'--';
  if(mEl)mEl.textContent=ckMin!==null?(ckMin<10?'0'+ckMin:''+ckMin):'--';
  if(hEl)hEl.style.color=ckMode==='hour'?'var(--gold)':'white';
  if(mEl)mEl.style.color=ckMode==='minute'?'var(--gold)':'white';
}
function openClockModal(){
  buildClockFace();
  const ex=document.getElementById('tripTime')?.value;
  if(ex&&ex!=='--:--'){const[h,m]=ex.split(':');ckHour=parseInt(h);ckMin=parseInt(m);}
  else{ckHour=null;ckMin=null;}
  ckMode='hour';
  document.getElementById('modeHour').classList.add('active');
  document.getElementById('modeMin').classList.remove('active');
  updateHandsDisplay();
  document.getElementById('clockModal').classList.add('open');
  bindClockTouch();
}
function closeClockModal(){document.getElementById('clockModal').classList.remove('open');}
function clearClock(){ckHour=null;ckMin=null;updateHandsDisplay();}
function confirmClock(){
  if(ckHour===null||ckMin===null){showAlert('Please select both hour and minute','⚠️');return;}
  const t=(ckHour<10?'0'+ckHour:''+ckHour)+':'+(ckMin<10?'0'+ckMin:''+ckMin);
  document.getElementById('tripTime').value=t;
  const tb=document.getElementById('timeDisplay');if(tb){const sp=tb.querySelector('span:first-child');if(sp){sp.textContent=t;sp.classList.remove('ph');}}
  closeClockModal();
}
function setClockMode(m){ckMode=m;document.getElementById('modeHour').classList.toggle('active',m==='hour');document.getElementById('modeMin').classList.toggle('active',m==='minute');updateHandsDisplay();}
function bindClockTouch(){
  const wrap=document.getElementById('ckWrap');if(!wrap)return;
  const nw=wrap.cloneNode(true);wrap.parentNode.replaceChild(nw,wrap);
  nw.addEventListener('click',onClockClick);
  nw.addEventListener('touchend',e=>{e.preventDefault();onClockClick(e.changedTouches[0]);},{passive:false});
}
function onClockClick(e){
  const wrap=document.getElementById('ckWrap');if(!wrap)return;
  const rect=wrap.getBoundingClientRect();
  const sx=210/rect.width,sy=210/rect.height;
  const svgX=((e.clientX||e.pageX)-rect.left)*sx,svgY=((e.clientY||e.pageY)-rect.top)*sy;
  const dx=svgX-CX,dy=svgY-CY,dist=Math.sqrt(dx*dx+dy*dy);
  let angle=Math.atan2(dy,dx)*(180/Math.PI)+90;if(angle<0)angle+=360;
  if(ckMode==='hour'){
    let h=Math.round(angle/30)%12;if(h===0)h=12;
    if(dist<58)h=(h===12?0:h)+12;
    ckHour=h%24;ckMode='minute';
    document.getElementById('modeHour').classList.remove('active');
    document.getElementById('modeMin').classList.add('active');
  }else{ckMin=Math.round(angle/6)%60;}
  updateHandsDisplay();
}

/* ═══════════════════════════════════════
   EXCHANGE RATES
═══════════════════════════════════════ */
async function getExRate(dateStr){
  if(!dateStr)return null;
  if(exRatesCache[dateStr])return exRatesCache[dateStr];
  try{const r=await callGAS('getExchangeRate',{dateStr});if(r){exRatesCache[dateStr]=r;return r;}}catch(e){console.warn(e);}
  return null;
}
function directPaid(cur,cU,cE,cG,cL,vU,vE,vG,vL){if(cur==='$')return cU+vU;if(cur==='€')return cE+vE;if(cur==='£')return cG+vG;return cL+vL;}

/* ═══════════════════════════════════════
   TOTALS
═══════════════════════════════════════ */
async function updateTotals(){
  const currency=document.getElementById('invoiceCurrency')?.value;
  const dateStr=document.getElementById('activeDate')?.value;
  let actual=0;document.querySelectorAll('[id^="tot_"]').forEach(el=>{actual+=parseFloat(el.value)||0;});
  document.getElementById('displayActualPrice').textContent=actual.toFixed(2);
  document.getElementById('actualPriceCurrency').textContent=currency||'';
  const disc=parseFloat(document.getElementById('discount')?.value)||0;
  const cU=parseFloat(document.getElementById('cashUSD')?.value)||0,cE=parseFloat(document.getElementById('cashEUR')?.value)||0,cG=parseFloat(document.getElementById('cashGBP')?.value)||0,cL=parseFloat(document.getElementById('cashLE')?.value)||0;
  const vU=parseFloat(document.getElementById('visaUSD')?.value)||0,vE=parseFloat(document.getElementById('visaEUR')?.value)||0,vG=parseFloat(document.getElementById('visaGBP')?.value)||0,vL=parseFloat(document.getElementById('visaLE')?.value)||0;
  let paid=0;
  if(dateStr){const r=await getExRate(dateStr);
    if(r){const LE=cU*(r.cash?.USD||47.5)+cE*(r.cash?.EUR||50.25)+cG*(r.cash?.GBP||60)+cL+vU*(r.visa?.USD||46.3)+vE*(r.visa?.EUR||49)+vG*(r.visa?.GBP||58.5)+vL*(r.visa?.LE||0.975);
      if(currency==='$')paid=roundTwo(LE/(r.cash?.USD||47.5));
      else if(currency==='€')paid=roundTwo(LE/(r.cash?.EUR||50.25));
      else if(currency==='£')paid=roundTwo(LE/(r.cash?.GBP||60));
      else paid=roundTwo(LE);}
    else paid=directPaid(currency,cU,cE,cG,cL,vU,vE,vG,vL);
  }else paid=directPaid(currency,cU,cE,cG,cL,vU,vE,vG,vL);
  const rest=roundTwo(actual-disc-paid);
  document.getElementById('displayPaymentPrice').textContent=paid.toFixed(2);
  document.getElementById('displayRest').textContent=rest.toFixed(2);
  document.getElementById('paymentPriceCurrency').textContent=currency||'';
  document.getElementById('restCurrency').textContent=currency||'';
}
function updateItemTotal(idx,price){
  const qty=parseFloat(document.getElementById('qty_'+idx)?.value)||0;
  const tot=document.getElementById('tot_'+idx);if(tot)tot.value=(qty*price).toFixed(2);
  updateTotals();
}

async function loadTripData(tripName,currency){

/* ═══════════════════════════════════════
   LOAD INVOICE (parallel fetch — fast)
═══════════════════════════════════════ */
async function loadInvoice(){
  const params=new URLSearchParams(window.location.search);
  const voucherNo=params.get('voucherNo');
  if(!voucherNo){showAlert('Invoice not found','❌','<button class="btn btn-save" onclick="goBack()">Back</button>');return;}

  showPDFOv('Loading invoice...');
  try{
    /* ─── جلب متوازي: الفاتورة + قائمة الرحلات ─── */
    const [allInvRes,tripsRes]=await Promise.all([
      callGAS('getAllInvoices'),
      callGAS('getUniqueTrips')
    ]);

    const invoices=Array.isArray(allInvRes)?allInvRes:[];
    currentInvoice=invoices.find(inv=>inv.voucherNo===voucherNo);
    if(!currentInvoice)throw new Error('Invoice not found');

    /* تصحيح actualPrice */
    if(currentInvoice.actualPrice===0&&currentInvoice.paymentPrice>0)
      currentInvoice.actualPrice=currentInvoice.paymentPrice;

    /* بناء قوائم Supplier/Customer من نفس البيانات */
    const supSet=new Set(),custSet=new Set();
    invoices.forEach(inv=>{
      if(inv.supplier?.trim())supSet.add(inv.supplier.trim());
      if(inv.customer?.trim())custSet.add(inv.customer.trim());
    });

    originalInvoice={...currentInvoice};
    document.getElementById('voucherDisplay').textContent=voucherNo;

    const trips=Array.isArray(tripsRes)?tripsRes:[];

    /* جلب بيانات الرحلة الحالية (مخزّن في cache بعد أول جلب) */
    let tripData=null;
    if(currentInvoice.trip&&currentInvoice.invoiceCurrency){
      tripData=await loadTripData(currentInvoice.trip,currentInvoice.invoiceCurrency);
    }

    hidePDFOv();
    renderForm(tripData,trips,Array.from(supSet),Array.from(custSet));
  }catch(err){
    hidePDFOv();
    showAlert('Error: '+err.message,'❌','<button class="btn btn-save" onclick="goBack()">Back</button>');
  }
}

      if(currency==='$')paid=roundTwo(LE/(r.cash?.USD||47.5));
      else if(currency==='€')paid=roundTwo(LE/(r.cash?.EUR||50.25));
      else if(currency==='£')paid=roundTwo(LE/(r.cash?.GBP||60));
      else paid=roundTwo(LE);}
    else paid=directPaid(currency,cU,cE,cG,cL,vU,vE,vG,vL);
  }else paid=directPaid(currency,cU,cE,cG,cL,vU,vE,vG,vL);
  const rest=roundTwo(actual-disc-paid);
  const nE=v=>{const x=Number(v);return(x!==0&&!isNaN(x))?x:'';};

    actualPrice:actual,paymentPrice:paid,discount:nE(disc),rest,

    state:document.getElementById('state')?.value||'pending',
    notes:document.getElementById('notes')?.value||'',
    salesId:currentInvoice.salesId,centerName:currentInvoice.centerName,
    branchName:currentInvoice.branchName,salesName:currentInvoice.salesName,cost:currentInvoice.cost||''
  };
}

function createEditSummary(orig,edited){
  const changes=[];const cur=edited.invoiceCurrency||'$';
  if((orig.discount||0)!==(edited.discount||0)){const d=(edited.discount||0)-(orig.discount||0);changes.push(`💰 Discount ${d>0?'+':''}${d} ${cur}`);}
  if(orig.state!==edited.state)changes.push(`📌 State: ${orig.state}→${edited.state}`);
  const ot=timeToInput(orig.time||''),et=timeToInput(edited.time||'');if(ot!==et)changes.push(`⏰ Time: ${ot}→${et}`);
  return changes.length?changes.join(' | '):'No changes';
}

/* ═══════════════════════════════════════
   SAVE
═══════════════════════════════════════ */
async function saveChanges(){
  const editedData=await collectEditedData();
  const summary=createEditSummary(originalInvoice,editedData);
  try{
    showPDFOv('💾 Saving changes...');
    const upd=await callGAS('updateInvoice',editedData);
    if(!upd.success)throw new Error(upd.message||'Update failed');
    await callGAS('copyInvoiceToEdit',{originalData:JSON.stringify(originalInvoice),editedData:JSON.stringify(editedData),userId:currentUser?.id||'',editSummary:summary});
    showPDFOv('📄 Generating PDF...');
    const pdf=await callGAS('saveAndGenerateSinglePDF',{voucherNo:editedData.voucherNo});
    hidePDFOv();
    if(pdf?.success){showAlert('✅ Changes saved successfully','✅',`<a href="${pdf.url}" target="_blank" class="btn btn-save" style="text-decoration:none;margin:4px">📄 Open PDF</a><button class="btn btn-save" onclick="goBack()">← Back</button>`);}
    else{showAlert('✅ Saved (PDF failed: '+(pdf?.message||'')+')', '⚠️','<button class="btn btn-save" onclick="goBack()">← Back</button>');}
  }catch(err){hidePDFOv();showAlert('Error: '+err.message,'❌');}
}

async function cancelEdit(){
  if(confirm('Cancel editing?')){
    try{showPDFOv('...');await callGAS('deleteFromEditSheet',{voucherNo:originalInvoice?.voucherNo||''});}catch(e){console.warn(e);}
    finally{hidePDFOv();goBack();}
  }
}

// حساب إجمالي التحصيل
async function updateCollectionTotal() {
  const currency = currentInvoice?.invoiceCurrency || '$';
  const activeDate = currentInvoice?.activeDate;
  
  const cU = parseFloat(document.getElementById('collUSD')?.value) || 0;
  const cE = parseFloat(document.getElementById('collEUR')?.value) || 0;
  const cG = parseFloat(document.getElementById('collGBP')?.value) || 0;
  const cL = parseFloat(document.getElementById('collLE')?.value) || 0;
  const vU = parseFloat(document.getElementById('collVisaUSD')?.value) || 0;
  const vE = parseFloat(document.getElementById('collVisaEUR')?.value) || 0;
  const vG = parseFloat(document.getElementById('collVisaGBP')?.value) || 0;
  const vL = parseFloat(document.getElementById('collVisaLE')?.value) || 0;
  
  let totalInEGP = 0;
  let totalInInvoiceCurrency = 0;
  
  if (activeDate) {
    const rate = await getExRate(activeDate);
    if (rate) {
      totalInEGP = cU * (rate.cash?.USD || 47.5) +
                   cE * (rate.cash?.EUR || 50.25) +
                   cG * (rate.cash?.GBP || 60) +
                   cL +
                   vU * (rate.visa?.USD || 46.3) +
                   vE * (rate.visa?.EUR || 49) +
                   vG * (rate.visa?.GBP || 58.5) +
                   vL * (rate.visa?.LE || 0.975);
      
      if (currency === '$') totalInInvoiceCurrency = totalInEGP / (rate.cash?.USD || 47.5);
      else if (currency === '€') totalInInvoiceCurrency = totalInEGP / (rate.cash?.EUR || 50.25);
      else if (currency === '£') totalInInvoiceCurrency = totalInEGP / (rate.cash?.GBP || 60);
      else totalInInvoiceCurrency = totalInEGP;
    } else {
      totalInInvoiceCurrency = cU + cE + cG + cL + vU + vE + vG + vL;
    }
  } else {
    totalInInvoiceCurrency = cU + cE + cG + cL + vU + vE + vG + vL;
  }
  
  document.getElementById('collectionTotalDisplay').textContent = totalInInvoiceCurrency.toFixed(2);
}

// تأكيد التحصيل وحفظه
async function submitCollection() {
  const amount = parseFloat(document.getElementById('collectionAmount')?.value) || 0;
  const rest = parseFloat(currentInvoice.rest) || 0;
  
  if (amount <= 0) {
    showAlert('الرجاء إدخال مبلغ التحصيل', '⚠️');
    return;
  }
  
  if (amount > rest) {
    showAlert(`المبلغ المحصل (${amount}) يتجاوز المبلغ المتبقي (${rest.toFixed(2)})`, '⚠️');
    return;
  }
  
  const cU = parseFloat(document.getElementById('collUSD')?.value) || 0;
  const cE = parseFloat(document.getElementById('collEUR')?.value) || 0;
  const cG = parseFloat(document.getElementById('collGBP')?.value) || 0;
  const cL = parseFloat(document.getElementById('collLE')?.value) || 0;
  const vU = parseFloat(document.getElementById('collVisaUSD')?.value) || 0;
  const vE = parseFloat(document.getElementById('collVisaEUR')?.value) || 0;
  const vG = parseFloat(document.getElementById('collVisaGBP')?.value) || 0;
  const vL = parseFloat(document.getElementById('collVisaLE')?.value) || 0;
  
  const notes = document.getElementById('collectionNotes')?.value || '';
  
  // بناء Details
  const details = `تحصيل من زبائن رحلة ${currentInvoice.trip || ''} بفندق ${currentInvoice.hotel || ''} بتاريخ ${currentInvoice.activeDate || ''} لصالح العميل ${currentInvoice.customer || ''}`;
  
  const today = new Date();
  const dateStr = formatDate(today);
  const month = MONTHS[today.getMonth()];
  const year = today.getFullYear();
  
  const collectionData = {
    date: dateStr,
    details: details,
    USD: cU,
    EUR: cE,
    GBP: cG,
    LE: cL,
    VisaUSD: vU,
    VisaEUR: vE,
    VisaGBP: vG,
    VisaLE: vL,
    account: currentInvoice.customer || '',
    accountName: getAccountType(currentInvoice.customer),
    month: month,
    year: year,
    centerName: currentUser?.centerName || '',
    branchName: currentUser?.branchName || '',
    userId: currentUser?.id || '',
    voucherNo: currentInvoice.voucherNo,
    notes: notes,
    amount: amount,
    currency: currentInvoice.invoiceCurrency
  };
  
  showPDFOv('جاري حفظ التحصيل...');
  
  try {
    // حفظ التحصيل في Other_Revenues
    const saveResult = await callGAS('addExpenseRevenue', {
      type: 'revenue',
      date: dateStr,
      details: details,
      USD: cU,
      EUR: cE,
      GBP: cG,
      LE: cL,
      VisaUSD: vU,
      VisaEUR: vE,
      VisaGBP: vG,
      VisaLE: vL,
      account: currentInvoice.customer || '',
      accountName: getAccountType(currentInvoice.customer),
      month: month,
      year: year,
      centerName: currentUser?.centerName || '',
      branchName: currentUser?.branchName || '',
      userId: currentUser?.id || ''
    });
    
    if (!saveResult.success) throw new Error(saveResult.message || 'فشل حفظ التحصيل');
    
    // تحديث الفاتورة (خصم المبلغ المحصل)
    const updatedInvoice = { ...currentInvoice };
    const currentPaid = parseFloat(updatedInvoice.paymentPrice) || 0;
    const currentRest = parseFloat(updatedInvoice.rest) || 0;
    
    updatedInvoice.paymentPrice = currentPaid + amount;
    updatedInvoice.rest = currentRest - amount;
    
    // تحديث تفاصيل الدفع في الفاتورة
    updatedInvoice.cashUSD = (parseFloat(updatedInvoice.cashUSD) || 0) + cU;
    updatedInvoice.cashEUR = (parseFloat(updatedInvoice.cashEUR) || 0) + cE;
    updatedInvoice.cashGBP = (parseFloat(updatedInvoice.cashGBP) || 0) + cG;
    updatedInvoice.cashLE = (parseFloat(updatedInvoice.cashLE) || 0) + cL;
    updatedInvoice.visaUSD = (parseFloat(updatedInvoice.visaUSD) || 0) + vU;
    updatedInvoice.visaEUR = (parseFloat(updatedInvoice.visaEUR) || 0) + vE;
    updatedInvoice.visaGBP = (parseFloat(updatedInvoice.visaGBP) || 0) + vG;
    updatedInvoice.visaLE = (parseFloat(updatedInvoice.visaLE) || 0) + vL;
    
    // حفظ التحديث في الفاتورة
    const updateResult = await callGAS('updateInvoice', updatedInvoice);
    if (!updateResult.success) throw new Error(updateResult.message || 'فشل تحديث الفاتورة');
    
    hidePDFOv();
    closeCollectionModal();
    
    showAlert(
      `✅ تم تحصيل ${amount.toFixed(2)} ${currentInvoice.invoiceCurrency || ''}\n` +
      `المبلغ المتبقي: ${updatedInvoice.rest.toFixed(2)} ${currentInvoice.invoiceCurrency || ''}`,
      '✅',
      `<button class="btn btn-save" onclick="location.reload()">تحديث الصفحة</button>
       <button class="btn btn-save" onclick="goBack()">رجوع</button>`
    );
    
  } catch (err) {
    hidePDFOv();
    showAlert('خطأ: ' + err.message, '❌');
  }
}

// تحديد نوع الحساب المحاسبي بناءً على اسم العميل
function getAccountType(customerName) {
  const customerLower = (customerName || '').toLowerCase();
  
  if (customerLower.includes('water') || customerLower.includes('sport') || customerLower.includes('قوارب'))
    return 'Water Sport Customer';
  if (customerLower.includes('safari') || customerLower.includes('صحراء'))
    return 'Safari Customer';
  if (customerLower.includes('diving') || customerLower.includes('غوص'))
    return 'Diving Customer';
  if (customerLower.includes('hotel') || customerLower.includes('فندق'))
    return 'Hotel Customer';
  
  return 'General Customer';
}
