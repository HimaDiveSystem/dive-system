<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes, viewport-fit=cover">
  <title>Edit Invoice | تعديل الفاتورة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #0f1f3d;
      --primary-dark: #1a3260;
      --primary-light: #2a4a7a;
      --accent: #f5c842;
      --accent-dark: #e6b800;
      --success: #16a34a;
      --success-dark: #15803d;
      --danger: #dc2626;
      --danger-dark: #b91c1c;
      --warning: #f59e0b;
      --info: #3b82f6;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1e293b;
      --gray-900: #0f172a;
      --border: #e2e8f0;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --radius: 16px;
      --radius-sm: 10px;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #f0f4f8 0%, #e6edf4 100%);
      color: var(--gray-800);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-lg);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-left h2 {
      color: var(--accent);
      font-size: 1.25rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .voucher-badge {
      background: var(--accent);
      color: var(--primary);
      padding: 4px 16px;
      border-radius: 40px;
      font-weight: 800;
      font-size: 0.875rem;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-chip {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 0.8125rem;
      font-weight: 600;
    }
    .back-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 6px 18px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.8125rem;
      transition: all 0.2s;
    }
    .back-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }

    /* Main Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }

    /* Cards */
    .card {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .card:hover {
      box-shadow: var(--shadow-md);
    }
    .card-header {
      padding: 14px 20px;
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-header h3 {
      color: var(--accent);
      font-size: 0.875rem;
      font-weight: 800;
      letter-spacing: 0.3px;
    }
    .card-header .icon {
      background: rgba(245, 200, 66, 0.2);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 0.875rem;
    }
    .card-body {
      padding: 20px;
    }

    /* Forms */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group label {
      font-size: 0.6875rem;
      font-weight: 700;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group label.required::after {
      content: '*';
      color: var(--danger);
      margin-right: 4px;
    }
    input, select, textarea {
      padding: 10px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      font-size: 0.875rem;
      font-family: 'Cairo', sans-serif;
      color: var(--gray-800);
      background: var(--gray-50);
      transition: all 0.2s;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--info);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      background: white;
    }
    input[readonly] {
      background: var(--gray-100);
      color: var(--gray-500);
      cursor: default;
    }
    input[type="number"] {
      text-align: center;
    }

    /* Hotel Row */
    .hotel-row {
      display: grid;
      grid-template-columns: 1fr 90px 70px 70px 70px;
      gap: 12px;
      margin-bottom: 16px;
    }
    @media (max-width: 680px) {
      .hotel-row {
        grid-template-columns: 1fr 80px 65px 65px 65px;
      }
    }

    /* Trip Table */
    .trip-table {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--gray-200);
      margin-top: 12px;
    }
    .trip-table table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
    }
    .trip-table th {
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
      color: var(--accent);
      padding: 10px 12px;
      font-weight: 700;
      text-align: center;
    }
    .trip-table th:first-child {
      text-align: left;
    }
    .trip-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--gray-100);
      text-align: center;
    }
    .trip-table td:first-child {
      text-align: left;
      font-weight: 600;
    }
    .trip-table input {
      width: 70px;
      padding: 6px;
      text-align: center;
      font-weight: 600;
    }

    /* Payment Grid (مثل SalesInvoice) */
    .payment-section {
      background: linear-gradient(135deg, #fafbff, #f5f7fa);
      border-radius: 12px;
      margin-top: 8px;
    }
    .payment-label {
      padding: 12px 16px 4px;
      font-size: 0.6875rem;
      font-weight: 800;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }
    .payment-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 8px 16px 16px;
    }
    .payment-card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      padding: 10px 8px;
      text-align: center;
      transition: all 0.2s;
    }
    .payment-card:focus-within {
      border-color: var(--info);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }
    .payment-card label {
      display: block;
      font-size: 0.625rem;
      font-weight: 700;
      color: var(--gray-500);
      margin-bottom: 6px;
    }
    .payment-card input {
      width: 100%;
      border: none;
      background: transparent;
      text-align: center;
      font-size: 0.875rem;
      font-weight: 700;
      padding: 4px;
    }
    .payment-card input:focus {
      box-shadow: none;
    }

    /* Totals Strip */
    .totals-strip {
      display: flex;
      justify-content: space-around;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      padding: 16px 20px;
      background: white;
      border-bottom: 1px dashed var(--gray-200);
    }
    .total-item {
      text-align: center;
    }
    .total-item .label {
      font-size: 0.625rem;
      font-weight: 700;
      color: var(--gray-500);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .total-item .value {
      font-size: 1.75rem;
      font-weight: 900;
      color: var(--primary);
      line-height: 1.2;
    }
    .total-item .currency {
      font-size: 0.75rem;
      color: var(--accent-dark);
      font-weight: 700;
    }
    .total-item input {
      width: 110px;
      padding: 6px 10px;
      text-align: center;
      font-weight: 700;
      font-size: 0.875rem;
    }

    /* Warning Bar */
    .warning-bar {
      background: #fffbeb;
      border: 1px solid var(--warning);
      border-radius: 12px;
      padding: 12px 16px;
      color: #b45309;
      font-weight: 600;
      font-size: 0.8125rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .warning-bar.info {
      background: #eff6ff;
      border-color: var(--info);
      color: #1e40af;
    }

    /* Action Buttons */
    .action-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    .btn {
      padding: 12px 28px;
      border: none;
      border-radius: 40px;
      font-weight: 800;
      font-size: 0.8125rem;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--accent);
      box-shadow: var(--shadow);
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      box-shadow: var(--shadow-md);
    }
    .btn-success {
      background: linear-gradient(135deg, var(--success), var(--success-dark));
      color: white;
    }
    .btn-danger {
      background: #fee2e2;
      color: var(--danger);
    }
    .btn-danger:hover {
      background: #fecaca;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .modal.open {
      display: flex;
    }
    .modal-content {
      background: white;
      width: 90%;
      max-width: 520px;
      border-radius: 24px;
      padding: 28px;
      text-align: center;
      box-shadow: var(--shadow-lg);
      animation: modalPop 0.25s ease;
    }
    @keyframes modalPop {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .modal-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }
    .modal-message {
      color: var(--gray-800);
      font-size: 0.9375rem;
      font-weight: 700;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Loader */
    .loader-container {
      text-align: center;
      padding: 60px;
      color: var(--gray-500);
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--info);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .pdf-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 1100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .pdf-overlay.show {
      display: flex;
    }
    .pdf-spinner {
      width: 56px;
      height: 56px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .payment-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .totals-strip {
        flex-direction: column;
        align-items: stretch;
      }
      .container {
        padding: 16px;
      }
      .card-body {
        padding: 16px;
      }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h2>✏️ تعديل الفاتورة</h2>
    <span class="voucher-badge" id="voucherDisplay">---</span>
  </div>
  <div class="header-right">
    <span class="user-chip" id="userNameDisplay">...</span>
    <button class="back-btn" onclick="goBack()">← خروج</button>
  </div>
</div>

<div class="container" id="mainContainer">
  <div class="loader-container" id="loaderState">
    <div class="spinner"></div>
    <div>جاري تحميل بيانات الفاتورة...</div>
  </div>
  <div id="formContent" style="display: none;"></div>
</div>

<div id="collectionModal" class="modal">
  <div class="modal-content" id="collectionModalContent"></div>
</div>

<div id="alertModal" class="modal">
  <div class="modal-content">
    <div class="modal-icon" id="alertIcon">ℹ️</div>
    <div class="modal-message" id="alertMsg"></div>
    <div class="modal-buttons" id="alertBtns">
      <button class="btn btn-primary" onclick="closeAlert()">موافق</button>
    </div>
  </div>
</div>

<div id="pdfOverlay" class="pdf-overlay">
  <div class="pdf-spinner"></div>
  <p id="pdfMsg" style="color: white;">جاري المعالجة...</p>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwe1Q9pjAJRk9CfWsK5YGjD5uVAbJkMhAVgw6akKkFIR9sz15V78C88Vs5dumKE-SwF/exec';
const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
const DASH = {
  Admin: 'Dashboard.html',
  Owner: 'OwnerDashboard.html',
  Sales: 'SalesDashboard.html',
  Accountant: 'AccountantDashboard.html',
  Customer: 'CustomerDashboard.html'
};

let currentUser = null;
let currentInvoice = null;
let originalInvoice = null;
let openFrom = 'today';
let tripDefinitions = [];
let allSuppliersCustomers = [];
let exRatesCache = {};

// ====================== Helper Functions ======================
function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function R2(n) { return Math.round((n + Number.EPSILON) * 100) / 100; }
function dV(v) { const n = Number(v); return (n === 0 || isNaN(n)) ? '' : n; }
function formatDate(d) { return `${String(d.getDate()).padStart(2, '0')}/${MONTHS[d.getMonth()]}/${d.getFullYear()}`; }
function parseDate(str) { if (!str) return null; const p = str.split('/'); if (p.length === 3) { const mi = MONTHS.findIndex(m => m.toLowerCase() === p[1].toLowerCase()); if (mi !== -1) return new Date(+p[2], mi, +p[0]); } return null; }
function dateToInput(s) { const d = parseDate(s); if (!d) return ''; return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }
function timeToInput(t) { if (!t) return ''; const m = String(t).match(/(\d{1,2}):(\d{2})/); return m ? `${m[1].padStart(2, '0')}:${m[2]}` : String(t).substring(0, 5); }

function showAlert(msg, icon = 'ℹ️', btns = null) {
  document.getElementById('alertMsg').textContent = msg;
  document.getElementById('alertIcon').textContent = icon;
  if (btns) document.getElementById('alertBtns').innerHTML = btns;
  else document.getElementById('alertBtns').innerHTML = '<button class="btn btn-primary" onclick="closeAlert()">موافق</button>';
  document.getElementById('alertModal').classList.add('open');
}
function closeAlert() { document.getElementById('alertModal').classList.remove('open'); }
function showPDF(m) { document.getElementById('pdfMsg').textContent = m; document.getElementById('pdfOverlay').classList.add('show'); }
function hidePDF() { document.getElementById('pdfOverlay').classList.remove('show'); }
function goBack() {
  const returnUrl = sessionStorage.getItem('returnUrl');
  if (returnUrl) location.href = returnUrl;
  else location.href = DASH[currentUser?.type] || 'Dashboard.html';
}

async function gas(action, params = {}) {
  const url = new URL(GAS_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v ?? '')));
  const res = await fetch(url.toString(), { redirect: 'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ====================== Load Suppliers & Trips ======================
async function loadSuppliersAndTrips() {
  try {
    const [suppliers, trips] = await Promise.all([
      gas('getAllSuppliersCustomers'),
      gas('getAllTrips')
    ]);
    allSuppliersCustomers = Array.isArray(suppliers) ? suppliers : [];
    tripDefinitions = Array.isArray(trips) ? trips : [];
  } catch (e) { console.warn(e); }
}

function getTripCategory(tripName) {
  const trip = tripDefinitions.find(t => t.name === tripName);
  return trip?.category || '';
}
function getCustomersByCategory(cat) {
  if (!cat) return [];
  return allSuppliersCustomers.filter(c => c.customerType === 'Customer' && c.category === cat && c.status === true);
}
function getSuppliersByCategory(cat) {
  if (!cat) return [];
  return allSuppliersCustomers.filter(s => s.customerType === 'Supplier' && s.category === cat && s.status === true);
}

// ====================== Exchange Rate ======================
async function getRate(dateStr) {
  if (!dateStr) return null;
  if (exRatesCache[dateStr]) return exRatesCache[dateStr];
  try {
    const r = await gas('getExchangeRate', { dateStr });
    if (r) { exRatesCache[dateStr] = r; return r; }
  } catch (e) {}
  return null;
}
function rateFields(r) {
  if (!r) return null;
  if (r.cash) return r;
  return {
    cash: { USD: +r.sUSD || 47.5, EUR: +r.sEUR || 50.25, GBP: +r.sGBP || 60 },
    visa: { USD: +r.sVUSD || 46.3, EUR: +r.sVEUR || 49, GBP: +r.sVGBP || 58.5, LE: +r.sVLE || 0.975 }
  };
}
function directPaid(cur, cU, cE, cG, cL, vU, vE, vG, vL) {
  if (cur === '$') return cU + vU;
  if (cur === '€') return cE + vE;
  if (cur === '£') return cG + vG;
  return cL + vL;
}

// ====================== Update Totals ======================
async function updateTotals() {
  const currency = document.getElementById('invoiceCurrency')?.value;
  const dateStr = document.getElementById('activeDate')?.value;
  let actual = 0;
  for (let i = 0; i < 20; i++) {
    const tot = document.getElementById(`total_${i}`);
    if (tot) actual += parseFloat(tot.value) || 0;
  }
  const disc = parseFloat(document.getElementById('discount')?.value) || 0;
  const cU = parseFloat(document.getElementById('cashUSD')?.value) || 0;
  const cE = parseFloat(document.getElementById('cashEUR')?.value) || 0;
  const cG = parseFloat(document.getElementById('cashGBP')?.value) || 0;
  const cL = parseFloat(document.getElementById('cashLE')?.value) || 0;
  const vU = parseFloat(document.getElementById('visaUSD')?.value) || 0;
  const vE = parseFloat(document.getElementById('visaEUR')?.value) || 0;
  const vG = parseFloat(document.getElementById('visaGBP')?.value) || 0;
  const vL = parseFloat(document.getElementById('visaLE')?.value) || 0;
  let paid = 0;
  if (dateStr) {
    const raw = await getRate(dateStr);
    const r = rateFields(raw);
    if (r) {
      const LE = cU * r.cash.USD + cE * r.cash.EUR + cG * r.cash.GBP + cL +
                 vU * r.visa.USD + vE * r.visa.EUR + vG * r.visa.GBP + vL * (r.visa.LE || 0.975);
      if (currency === '$') paid = R2(LE / r.cash.USD);
      else if (currency === '€') paid = R2(LE / r.cash.EUR);
      else if (currency === '£') paid = R2(LE / r.cash.GBP);
      else paid = R2(LE);
    } else paid = directPaid(currency, cU, cE, cG, cL, vU, vE, vG, vL);
  } else paid = directPaid(currency, cU, cE, cG, cL, vU, vE, vG, vL);
  const rest = R2(actual - disc - paid);
  document.getElementById('displayActualPrice').textContent = actual.toFixed(2);
  document.getElementById('displayPaymentPrice').textContent = paid.toFixed(2);
  document.getElementById('displayRest').textContent = rest.toFixed(2);
}
function updateItemTotal(idx, price) {
  const qty = parseFloat(document.getElementById(`qty_${idx}`)?.value) || 0;
  const tot = document.getElementById(`total_${idx}`);
  if (tot) tot.value = (qty * price).toFixed(2);
  updateTotals();
}
function parseActivities(text) {
  const res = [];
  if (!text) return res;
  text.split('|').forEach(p => {
    const m = p.trim().match(/^(.+?)×(\d+(\.\d+)?)$/);
    if (m) res.push({ name: m[1].trim(), qty: parseFloat(m[2]) || 0 });
  });
  return res;
}

// ====================== Collection Modal ======================
async function openCollectionModal() {
  if (!currentInvoice) return;
  const rest = parseFloat(currentInvoice.rest) || 0;

async function updateCollectionPreview() {
  // ✅ حساب إجمالي العملات فقط للعرض (كمرجع للمستخدم)
  const currency = currentInvoice?.invoiceCurrency || '$';
  const activeDate = currentInvoice?.activeDate;
  const cU = parseFloat(document.getElementById('collUSD')?.value) || 0;
  const cE = parseFloat(document.getElementById('collEUR')?.value) || 0;
  const cG = parseFloat(document.getElementById('collGBP')?.value) || 0;
  const cL = parseFloat(document.getElementById('collLE')?.value) || 0;
  const vU = parseFloat(document.getElementById('collVisaUSD')?.value) || 0;
  const vE = parseFloat(document.getElementById('collVisaEUR')?.value) || 0;
  const vG = parseFloat(document.getElementById('collVisaGBP')?.value) || 0;
  const vL = parseFloat(document.getElementById('collVisaLE')?.value) || 0;
  
  let referenceTotal = 0;
  if (activeDate) {
    const raw = await getRate(activeDate);
    const r = rateFields(raw);
    if (r) {
      const LE = cU * r.cash.USD + cE * r.cash.EUR + cG * r.cash.GBP + cL +
                 vU * r.visa.USD + vE * r.visa.EUR + vG * r.visa.GBP + vL * (r.visa.LE || 0.975);
      if (currency === '$') referenceTotal = R2(LE / r.cash.USD);
      else if (currency === '€') referenceTotal = R2(LE / r.cash.EUR);
      else if (currency === '£') referenceTotal = R2(LE / r.cash.GBP);
      else referenceTotal = R2(LE);
    } else {
      referenceTotal = directPaid(currency, cU, cE, cG, cL, vU, vE, vG, vL);
    }
  } else {
    referenceTotal = directPaid(currency, cU, cE, cG, cL, vU, vE, vG, vL);
  }
  
  // ✅ عرض الإجمالي المرجعي فقط (لا يتم تعيينه في حقل المبلغ المحصل)
  document.getElementById('collectionTotalDisplay').textContent = referenceTotal.toFixed(2);
  
  // ✅ حساب المبلغ المتبقي بعد التحصيل بناءً على المبلغ المدخل (وليس المرجعي)
  const amountField = document.getElementById('collectionAmount');
  const collected = parseFloat(amountField?.value) || 0;
  const originalRest = parseFloat(currentInvoice.rest) || 0;
  let newRest = originalRest - collected;
  if (newRest < 0) newRest = 0;
  
  const newRestField = document.getElementById('newRestPreview');
  if (newRestField) {
    newRestField.value = newRest.toFixed(2);
    newRestField.readOnly = newRest > 5;
    newRestField.style.background = newRest > 5 ? '#f1f5f9' : 'white';
  }
}

// ✅ إضافة مستمع لتحديث المبلغ المتبقي عند تغيير المبلغ المحصل يدوياً
function setupCollectionListeners() {
  const amountField = document.getElementById('collectionAmount');
  if (amountField) {
    amountField.addEventListener('input', function() {
      updateCollectionPreview();
    });

async function submitCollection() {
  // ✅ 1. المبلغ المحصل = ما أدخله المستخدم مباشرة
  const amount = parseFloat(document.getElementById('collectionAmount')?.value) || 0;
  const originalRest = parseFloat(currentInvoice.rest) || 0;
  
  if (amount <= 0) {
    showAlert('الرجاء إدخال مبلغ تحصيل صحيح', '⚠️');
    return;
  }
  if (amount > originalRest) {
    showAlert(`المبلغ المحصل (${amount.toFixed(2)}) يتجاوز المبلغ المتبقي (${originalRest.toFixed(2)})`, '⚠️');
    return;
  }
  
  // ✅ 2. تفاصيل العملات (للتسجيل فقط، لا يتم التحقق منها)
  const cU = parseFloat(document.getElementById('collUSD')?.value) || 0;
  const cE = parseFloat(document.getElementById('collEUR')?.value) || 0;
  const cG = parseFloat(document.getElementById('collGBP')?.value) || 0;
  const cL = parseFloat(document.getElementById('collLE')?.value) || 0;
  const vU = parseFloat(document.getElementById('collVisaUSD')?.value) || 0;
  const vE = parseFloat(document.getElementById('collVisaEUR')?.value) || 0;
  const vG = parseFloat(document.getElementById('collVisaGBP')?.value) || 0;
  const vL = parseFloat(document.getElementById('collVisaLE')?.value) || 0;
  
  // ✅ 3. المبلغ المتبقي بعد التحصيل (من حقل التعديل أو محسوب)
  const newRestField = document.getElementById('newRestPreview');
  let finalRest = originalRest - amount;
  if (newRestField && !newRestField.readOnly && parseFloat(newRestField.value) >= 0) {
    finalRest = parseFloat(newRestField.value) || 0;
  }
  if (finalRest < 0) finalRest = 0;
  
  const notes = document.getElementById('collectionNotes')?.value || '';
  
  // ✅ 4. تحديد طريقة الدفع
  const hasCash = (cU + cE + cG + cL) > 0;
  const hasVisa = (vU + vE + vG + vL) > 0;
  const paymentMethod = hasCash && hasVisa ? 'Mixed' : (hasCash ? 'Cash' : (hasVisa ? 'Visa' : 'Mixed'));
  
  // ✅ 5. إرسال البيانات للخادم (بدون تحقق إضافي)
  const collectionData = {
    parentVoucherNo: currentInvoice.voucherNo,
    activeDate: currentInvoice.activeDate,
    salesId: currentInvoice.salesId,
    time: currentInvoice.time,
    trip: currentInvoice.trip,
    hotel: currentInvoice.hotel,
    roomNo: currentInvoice.roomNo,
    nationality: currentInvoice.nationality,
    guestName: currentInvoice.guestName,
    contactNo: currentInvoice.contactNo,
    supplier: currentInvoice.supplier,
    customer: currentInvoice.customer,
    state: currentInvoice.state,
    invoiceCurrency: currentInvoice.invoiceCurrency,
    centerName: currentInvoice.centerName,
    branchName: currentInvoice.branchName,
    salesName: currentInvoice.salesName,
    cashUSD: cU, cashEUR: cE, cashGBP: cG, cashLE: cL,
    visaUSD: vU, visaEUR: vE, visaGBP: vG, visaLE: vL,
    discount: 0,
    notes: notes,
    collectedBy: currentUser?.id || '',
    collectedByName: currentUser?.name || '',
    paymentMethod: paymentMethod,
    rest: finalRest
  };
  
  showPDF('جاري حفظ التحصيل...');
  try {
    const result = await gas('createCollectionInvoice', collectionData);
    hidePDF();
    closeCollectionModal();
    
    if (result?.success) {
      showAlert(`✅ تم تحصيل ${amount.toFixed(2)} ${currentInvoice.invoiceCurrency}\nرقم فاتورة التحصيل: ${result.voucherNo}\nالمبلغ المتبقي الجديد: ${finalRest.toFixed(2)} ${currentInvoice.invoiceCurrency}`,
        '✅',
        `<button class="btn btn-primary" onclick="location.reload()">تحديث</button>
         <button class="btn btn-primary" onclick="goBack()">رجوع</button>`);
    } else {
      showAlert('❌ فشل التحصيل: ' + (result?.message || 'خطأ غير معروف'), '❌');
    }
  } catch (err) {
    hidePDF();
    showAlert('خطأ: ' + err.message, '❌');
  }
}

        let rows = '';
        for (let i = 0; i < newTripData.items.length; i++) {
          rows += `<tr><td style="font-weight:600">${esc(newTripData.items[i])}</td>
            <td><input type="number" id="qty_${i}" min="0" placeholder="0" oninput="updateItemTotal(${i}, ${newTripData.prices?.[i] || 0})" ${dis}></td>
            <td><input type="number" id="price_${i}" value="${newTripData.prices?.[i] || 0}" readonly></td>
            <td><input type="number" id="total_${i}" value="0" readonly></td></tr>`;
        }
        document.getElementById('itemsBody').innerHTML = rows;
      }
      await updateTotals();
    };
  } catch (err) {
    hidePDF();
    showAlert('خطأ: ' + err.message, '❌', '<button class="btn btn-primary" onclick="goBack()">رجوع</button>');
    document.getElementById('loaderState').style.display = 'none';
  } finally { hidePDF(); }
}

async function saveChanges() {
  // جمع البيانات من النموذج
  const editedData = await collectEditedData();
  
  // إنشاء ملخص التعديلات
  const summary = createEditSummary(originalInvoice, editedData);
  
  showPDF('جاري حفظ التعديلات...');
  try {
    // تحديث الفاتورة
    const upd = await gas('updateInvoice', editedData);
    if (!upd.success) throw new Error(upd.message || 'فشل التحديث');
    
    // حفظ نسخة في Invoices_Edit للتتبع
    await gas('copyInvoiceToEdit', {
      originalData: JSON.stringify(originalInvoice),
      editedData: JSON.stringify(editedData),
      userId: currentUser?.id || '',
      editSummary: summary
    });
    
    // إعادة إنشاء PDF
    showPDF('جاري إنشاء PDF...');
    const pdf = await gas('saveAndGenerateSinglePDF', { voucherNo: editedData.voucherNo });
    hidePDF();
    
    if (pdf?.success) {
      showAlert('✅ تم حفظ التعديلات بنجاح', '✅',
        `<a href="${pdf.url}" target="_blank" class="btn btn-primary" style="text-decoration:none; margin:4px">📄 فتح PDF</a>
         <button class="btn btn-primary" onclick="goBack()">رجوع</button>`);
    } else {
      showAlert('✅ تم الحفظ (فشل إنشاء PDF: ' + (pdf?.message || '') + ')', '⚠️',
        '<button class="btn btn-primary" onclick="goBack()">رجوع</button>');
    }
  } catch (err) {
    hidePDF();
    showAlert('خطأ: ' + err.message, '❌');
  }
}

// دالة جمع البيانات من النموذج
async function collectEditedData() {
  const currency = document.getElementById('invoiceCurrency')?.value;
  const activeDateInput = document.getElementById('activeDate')?.value;
  let activeDate = '';
  if (activeDateInput) {
    const d = new Date(activeDateInput);
    activeDate = formatDate(d);
  }
  
  // جمع الكميات من جدول البنود
  const items = [];
  for (let i = 0; i < 20; i++) {
    const qtyEl = document.getElementById(`qty_${i}`);
    if (qtyEl) {
      const qty = parseFloat(qtyEl.value) || 0;
      const nameEl = document.querySelector(`#itemsBody tr:nth-child(${i + 1}) td:first-child`);
      if (qty > 0 && nameEl) {
        items.push(`${nameEl.textContent}×${qty}`);
      }
    }
  }
  
  // حساب ActualPrice
  let actualPrice = 0;
  for (let i = 0; i < 20; i++) {
    const totalEl = document.getElementById(`total_${i}`);
    if (totalEl) actualPrice += parseFloat(totalEl.value) || 0;
  }
  
  const disc = parseFloat(document.getElementById('discount')?.value) || 0;
  const cU = parseFloat(document.getElementById('cashUSD')?.value) || 0;
  const cE = parseFloat(document.getElementById('cashEUR')?.value) || 0;
  const cG = parseFloat(document.getElementById('cashGBP')?.value) || 0;
  const cL = parseFloat(document.getElementById('cashLE')?.value) || 0;
  const vU = parseFloat(document.getElementById('visaUSD')?.value) || 0;
  const vE = parseFloat(document.getElementById('visaEUR')?.value) || 0;
  const vG = parseFloat(document.getElementById('visaGBP')?.value) || 0;
  const vL = parseFloat(document.getElementById('visaLE')?.value) || 0;
  
  // حساب المدفوع
  let paid = 0;
  const dateStr = document.getElementById('activeDate')?.value;
  if (dateStr) {
    const raw = await getRate(dateStr);
    const r = rateFields(raw);
    if (r) {
      const LE = cU * r.cash.USD + cE * r.cash.EUR + cG * r.cash.GBP + cL +
                 vU * r.visa.USD + vE * r.visa.EUR + vG * r.visa.GBP + vL * (r.visa.LE || 0.975);
      if (currency === '$') paid = R2(LE / r.cash.USD);
      else if (currency === '€') paid = R2(LE / r.cash.EUR);
      else if (currency === '£') paid = R2(LE / r.cash.GBP);
      else paid = R2(LE);
    } else {
      paid = directPaid(currency, cU, cE, cG, cL, vU, vE, vG, vL);
    }
  } else {
    paid = directPaid(currency, cU, cE, cG, cL, vU, vE, vG, vL);
  }
  
  const rest = R2(actualPrice - disc - paid);
  
  return {
    voucherNo: currentInvoice.voucherNo,
    issueDate: currentInvoice.issueDate,
    activeDate: activeDate,
    time: document.getElementById('tripTime')?.value || '',
    contactNo: document.getElementById('contactNo')?.value || '',
    guestName: document.getElementById('guestName')?.value || '',
    nationality: document.getElementById('nationality')?.value || '',
    hotel: document.getElementById('hotel')?.value || '',
    roomNo: document.getElementById('roomNo')?.value || '',
    trip: document.getElementById('tripName')?.value || '',
    invoiceCurrency: currency || '',
    adultCount: parseInt(document.getElementById('adultCount')?.value) || 0,
    childCount: parseInt(document.getElementById('childCount')?.value) || 0,
    infantCount: parseInt(document.getElementById('infantCount')?.value) || 0,
    cashUSD: cU, cashEUR: cE, cashGBP: cG, cashLE: cL,
    visaUSD: vU, visaEUR: vE, visaGBP: vG, visaLE: vL,
    actualPrice: actualPrice,
    paymentPrice: paid,
    discount: disc,
    rest: rest,
    activitiesText: items.join(' | '),
    supplier: document.getElementById('supplier')?.value || '',
    customer: document.getElementById('customer')?.value || '',
    state: document.getElementById('state')?.value || 'pending',
    notes: document.getElementById('notes')?.value || '',
    salesId: currentInvoice.salesId,
    centerName: currentInvoice.centerName,
    branchName: currentInvoice.branchName,
    salesName: currentInvoice.salesName,
    cost: currentInvoice.cost || ''
  };
}

// دالة إنشاء ملخص التعديلات
function createEditSummary(orig, edited) {
  const changes = [];
  const cur = edited.invoiceCurrency || '$';
  
  if ((orig.discount || 0) !== (edited.discount || 0)) {
    const d = (edited.discount || 0) - (orig.discount || 0);
    changes.push(`💰 الخصم ${d > 0 ? '+' : ''}${d} ${cur}`);
  }
  if (orig.state !== edited.state) {
    changes.push(`📌 الحالة: ${orig.state} → ${edited.state}`);
  }
  const ot = timeToInput(orig.time || '');
  const et = timeToInput(edited.time || '');
  if (ot !== et) changes.push(`⏰ الوقت: ${ot} → ${et}`);
  
  return changes.length ? changes.join(' | ') : 'لا توجد تغييرات';
}
  
async function cancelEdit() {
  if (confirm('هل أنت متأكد من إلغاء التعديلات؟')) goBack();
}

document.addEventListener('DOMContentLoaded', () => {
  let ud = sessionStorage.getItem('currentUser');
  if (!ud) {
    const p = new URLSearchParams(location.search).get('user');
    if (p) { ud = decodeURIComponent(p); sessionStorage.setItem('currentUser', ud); }
  }
  if (!ud) { location.href = 'index.html'; return; }
  try { currentUser = JSON.parse(ud); } catch { location.href = 'index.html'; return; }
  if (!sessionStorage.getItem('returnUrl') && document.referrer) {
    sessionStorage.setItem('returnUrl', document.referrer);
  }
  loadInvoice();
});
