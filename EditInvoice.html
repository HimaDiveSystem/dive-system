<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyBfwHQQoHb9E2bq0l-u6FLMD2XFKu_d8rZuJLnIq5iko82Bn93Emki6-cvDF_XOyRp/exec';
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let currentUser = null;
let currentInvoice = null;
let originalInvoice = null;
let exchangeRatesCache = {};

// ============ دوال مساعدة ============
function parseDate(str) {
  if (!str) return null;
  const parts = str.split('/');
  if (parts.length === 3) {
    const day = parseInt(parts[0]);
    const monthIndex = MONTHS.findIndex(m => m.toLowerCase() === parts[1].toLowerCase());
    const year = parseInt(parts[2]);
    if (!isNaN(day) && monthIndex !== -1 && !isNaN(year)) {
      return new Date(year, monthIndex, day);
    }
  }
  return null;
}

function formatDate(date) {
  return `${String(date.getDate()).padStart(2,'0')}/${MONTHS[date.getMonth()]}/${date.getFullYear()}`;
}

function showPDFOverlay(msg) {
  document.getElementById('pdfMsg').textContent = msg || '⏳ جاري حفظ التعديلات...';
  document.getElementById('pdfOverlay').style.display = 'flex';
}

function hidePDFOverlay() {
  document.getElementById('pdfOverlay').style.display = 'none';
}

function showAlert(msg, icon = 'ℹ️', btnHtml = null) {
  document.getElementById('alertMsg').textContent = msg;
  document.getElementById('alertIcon').textContent = icon;
  if (btnHtml) {
    document.getElementById('alertBtns').innerHTML = btnHtml;
  } else {
    document.getElementById('alertBtns').innerHTML = '<button class="btn-primary" onclick="closeAlert()">OK</button>';
  }
  document.getElementById('alertModal').style.display = 'flex';
}

function closeAlert() {
  document.getElementById('alertModal').style.display = 'none';
}

async function callGAS(action, params = {}) {
  const url = new URL(GAS_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => {
    if (k !== 'signatureData') url.searchParams.set(k, String(v ?? ''));
  });
  const res = await fetch(url.toString(), { redirect: 'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}
// ============ جلب بيانات الفاتورة ============
async function loadInvoice() {
  const params = new URLSearchParams(window.location.search);
  const voucherNo = params.get('voucherNo');
  
  if (!voucherNo) {
    showAlert('رقم الفاتورة غير موجود', '❌', '<button class="btn-primary" onclick="goBack()">الرجوع</button>');
    return;
  }
  
  try {
    showPDFOverlay('⏳ جلب بيانات الفاتورة...');
    
    // استخدام الدالة المخصصة
    const result = await callGAS('getInvoiceByVoucher', { voucherNo });
    
    if (!result.success) {
      throw new Error(result.message || 'فشل جلب الفاتورة');
    }
    
    currentInvoice = result.invoice;
    originalInvoice = JSON.parse(JSON.stringify(currentInvoice));
    
    console.log('✅ تم جلب الفاتورة:', currentInvoice);
    hidePDFOverlay();
    renderEditForm();
    
  } catch (error) {
    console.error('❌ خطأ:', error);
    hidePDFOverlay();
    showAlert('خطأ في جلب بيانات الفاتورة: ' + error.message, '❌', '<button class="btn-primary" onclick="goBack()">الرجوع</button>');
  }
}
// ============ عرض نموذج التعديل ============

      </div>
      <div class="form-group">
        <label>Nationality</label>
        <input type="text" class="form-control" id="nationality" value="${currentInvoice.nationality || ''}">
      </div>
      <div class="form-group">
        <label>Hotel</label>
        <input type="text" class="form-control" id="hotel" value="${currentInvoice.hotel || ''}">
      </div>

        <label>Room No.</label>

      </div>
    </div>

    <div class="counts-group">

        <div class="payment-item"><label>Visa €</label><input type="number" id="visaEUR" step="0.01" value="${currentInvoice.visaEUR || 0}" onchange="updateTotals()"></div>

          <div class="label">Discount</div>
          <input type="number" id="discount" step="0.01" value="${currentInvoice.discount || 0}" onchange="updateTotals()">
        </div>
        <div class="total-item">
          <div class="label">Total</div>
          <div class="value" id="displayTotal">${(currentInvoice.paymentPrice || 0).toFixed(2)}</div>

        </div>
        <div class="total-item">

// ============ تحويل ActivitiesText إلى مصفوفة items ============
function parseActivities(text) {
  const items = [];
  if (!text) return items;
  
  const parts = text.split('|');
  parts.forEach(part => {
    const match = part.trim().match(/^(.+?)×(\d+(\.\d+)?)$/);
    if (match) {
      items.push({
        name: match[1].trim(),
        qty: parseFloat(match[2]) || 0,
        price: 0 // سيتم تحديث السعر لاحقاً
      });
    }
  });
  
  return items;
}

// ============ عرض صفوف items ============
function renderItemsRows(activities) {
  if (!activities || activities.length === 0) {
    return `<tr><td colspan="4" style="text-align:center;padding:20px;">لا توجد items</td></tr>`;
  }
  
  let html = '';
  activities.forEach((item, index) => {
    // تقدير السعر من المبالغ الإجمالية (هذا تقريبي)
    const estimatedPrice = 0;
    
    html += `
      <tr>
        <td>${item.name}</td>
        <td><input type="number" id="qty_${index}" min="0" value="${item.qty}" onchange="updateItemTotal(${index})"></td>
        <td><input type="number" id="price_${index}" value="${estimatedPrice}" readonly></td>
        <td><input type="number" id="total_${index}" value="0" readonly></td>
      </tr>
    `;
  });
  
  return html;
}

// ============ تحديث إجمالي item ============
function updateItemTotal(index) {
  const priceInput = document.getElementById(`price_${index}`);
  const qtyInput = document.getElementById(`qty_${index}`);
  const totalInput = document.getElementById(`total_${index}`);
  
  if (priceInput && qtyInput && totalInput) {
    const price = parseFloat(priceInput.value) || 0;
    const qty = parseFloat(qtyInput.value) || 0;
    totalInput.value = (price * qty).toFixed(2);
  }
  
  updateTotals();
}

// ============ تحديث ActivitiesText بناءً على الأعداد ============
function updateActivitiesText() {
  // هذه الدالة ستُستدعى عند تغيير Adult, Child, Infant
  // لكن في الواقع ActivitiesText يأتي من items
  console.log('تم تغيير الأعداد');
}

// ============ تحديث المجاميع ============
async function updateTotals() {
  const currency = document.getElementById('invoiceCurrency')?.value;
  if (!currency) return;
  
  const cashUSD = parseFloat(document.getElementById('cashUSD')?.value) || 0;
  const cashEUR = parseFloat(document.getElementById('cashEUR')?.value) || 0;
  const cashGBP = parseFloat(document.getElementById('cashGBP')?.value) || 0;
  const cashLE = parseFloat(document.getElementById('cashLE')?.value) || 0;
  const visaUSD = parseFloat(document.getElementById('visaUSD')?.value) || 0;
  const visaEUR = parseFloat(document.getElementById('visaEUR')?.value) || 0;
  const visaGBP = parseFloat(document.getElementById('visaGBP')?.value) || 0;
  const visaLE = parseFloat(document.getElementById('visaLE')?.value) || 0;
  const discount = parseFloat(document.getElementById('discount')?.value) || 0;
  
  // حساب الإجمالي (مجموع كل المبالغ)
  let total = cashUSD + cashEUR + cashGBP + cashLE + visaUSD + visaEUR + visaGBP + visaLE;
  total = total - discount;
  
  document.getElementById('displayTotal').textContent = total.toFixed(2);
  
  // حساب المتبقي بعد تطبيق سعر الصرف
  const dateStr = document.getElementById('activeDate')?.value;
  if (dateStr) {
    try {
      const formattedDate = formatDate(new Date(dateStr));
      const rate = await getExchangeRateForDate(formattedDate);
      
      if (rate) {
        const key = currency === '$' ? 'USD' : currency === '€' ? 'EUR' : currency === '£' ? 'GBP' : 'LE';
        const baseRate = rate.cash?.[key] || 1;
        
        const totalEGP = total * baseRate;
        const paidEGP = (cashUSD * (rate.cash?.USD || 0)) +
                       (cashEUR * (rate.cash?.EUR || 0)) +
                       (cashGBP * (rate.cash?.GBP || 0)) +
                       cashLE +
                       (visaUSD * (rate.visa?.USD || 0)) +
                       (visaEUR * (rate.visa?.EUR || 0)) +
                       (visaGBP * (rate.visa?.GBP || 0)) +
                       (visaLE * (rate.visa?.LE || 1));
        
        const rest = baseRate > 0 ? (totalEGP - paidEGP) / baseRate : 0;
        document.getElementById('displayRest').textContent = rest.toFixed(2);
      }
    } catch (e) {
      console.error('خطأ في حساب المتبقي:', e);
    }
  }
}

// ============ جلب سعر الصرف ============
async function getExchangeRateForDate(dateStr) {
  if (exchangeRatesCache[dateStr]) {
    return exchangeRatesCache[dateStr];
  }
  
  try {
    const rate = await callGAS('getExchangeRate', { dateStr });
    if (rate) {
      exchangeRatesCache[dateStr] = rate;
      return rate;
    }
    return null;
  } catch (e) {
    console.error('❌ خطأ في جلب سعر الصرف:', e);
    return null;
  }
}

// ============ تحويل تاريخ dd/MMM/yyyy إلى input date ============
function convertToDateInput(dateStr) {
  if (!dateStr) return '';
  
  const date = parseDate(dateStr);
  if (!date) return '';
  
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  
  return `${year}-${month}-${day}`;
}

// ============ جمع بيانات التعديل ============
function collectEditedData() {
  // جمع قيم items
  const items = [];
  let i = 0;
  while (document.getElementById(`qty_${i}`)) {
    const qty = parseFloat(document.getElementById(`qty_${i}`).value) || 0;
    const name = document.querySelector(`#itemsContainer tr:nth-child(${i+1}) td:first-child`)?.textContent || '';
    if (qty > 0 && name) {
      items.push(`${name}×${qty}`);
    }
    i++;
  }
  
  return {
    voucherNo: currentInvoice.voucherNo,
    contactNo: document.getElementById('contactNo')?.value || '',
    guestName: document.getElementById('guestName')?.value || '',
    nationality: document.getElementById('nationality')?.value || '',
    hotel: document.getElementById('hotel')?.value || '',
    roomNo: document.getElementById('roomNo')?.value || '',
    adultCount: parseInt(document.getElementById('adultCount')?.value) || 0,
    childCount: parseInt(document.getElementById('childCount')?.value) || 0,
    infantCount: parseInt(document.getElementById('infantCount')?.value) || 0,
    activeDate: document.getElementById('activeDate')?.value || '',
    time: document.getElementById('time')?.value || '',
    trip: document.getElementById('trip')?.value || '',
    invoiceCurrency: document.getElementById('invoiceCurrency')?.value || '',
    cashUSD: parseFloat(document.getElementById('cashUSD')?.value) || 0,
    cashEUR: parseFloat(document.getElementById('cashEUR')?.value) || 0,
    cashGBP: parseFloat(document.getElementById('cashGBP')?.value) || 0,
    cashLE: parseFloat(document.getElementById('cashLE')?.value) || 0,
    visaUSD: parseFloat(document.getElementById('visaUSD')?.value) || 0,
    visaEUR: parseFloat(document.getElementById('visaEUR')?.value) || 0,
    visaGBP: parseFloat(document.getElementById('visaGBP')?.value) || 0,
    visaLE: parseFloat(document.getElementById('visaLE')?.value) || 0,
    notes: document.getElementById('notes')?.value || '',
    discount: parseFloat(document.getElementById('discount')?.value) || 0,
    paymentPrice: parseFloat(document.getElementById('displayTotal')?.textContent) || 0,
    rest: parseFloat(document.getElementById('displayRest')?.textContent) || 0,
    activitiesText: items.join(' | ')
  };
}

// ============ إنشاء ملخص التغييرات ============
function createEditSummary(original, edited) {
  const changes = [];
  
  // مقارنة الحقول المهمة
  if (original.guestName !== edited.guestName) changes.push(`Guest: ${original.guestName} → ${edited.guestName}`);
  if (original.nationality !== edited.nationality) changes.push(`Nationality: ${original.nationality} → ${edited.nationality}`);
  if (original.hotel !== edited.hotel) changes.push(`Hotel: ${original.hotel} → ${edited.hotel}`);
  if (original.roomNo !== edited.roomNo) changes.push(`Room: ${original.roomNo} → ${edited.roomNo}`);
  if (original.contactNo !== edited.contactNo) changes.push(`Phone: ${original.contactNo} → ${edited.contactNo}`);
  if (original.activeDate !== edited.activeDate) changes.push(`Date: ${original.activeDate} → ${edited.activeDate}`);
  if (original.time !== edited.time) changes.push(`Time: ${original.time} → ${edited.time}`);
  if (original.invoiceCurrency !== edited.invoiceCurrency) changes.push(`Currency: ${original.invoiceCurrency} → ${edited.invoiceCurrency}`);
  
  // مقارنة المبالغ
  if (original.cashUSD !== edited.cashUSD) changes.push(`Cash USD: ${original.cashUSD} → ${edited.cashUSD}`);
  if (original.cashEUR !== edited.cashEUR) changes.push(`Cash EUR: ${original.cashEUR} → ${edited.cashEUR}`);
  if (original.cashGBP !== edited.cashGBP) changes.push(`Cash GBP: ${original.cashGBP} → ${edited.cashGBP}`);
  if (original.cashLE !== edited.cashLE) changes.push(`Cash LE: ${original.cashLE} → ${edited.cashLE}`);
  if (original.visaUSD !== edited.visaUSD) changes.push(`Visa USD: ${original.visaUSD} → ${edited.visaUSD}`);
  if (original.visaEUR !== edited.visaEUR) changes.push(`Visa EUR: ${original.visaEUR} → ${edited.visaEUR}`);
  if (original.visaGBP !== edited.visaGBP) changes.push(`Visa GBP: ${original.visaGBP} → ${edited.visaGBP}`);
  if (original.visaLE !== edited.visaLE) changes.push(`Visa LE: ${original.visaLE} → ${edited.visaLE}`);
  
  // مقارنة الأعداد
  if (original.adultCount !== edited.adultCount) changes.push(`Adults: ${original.adultCount} → ${edited.adultCount}`);
  if (original.childCount !== edited.childCount) changes.push(`Children: ${original.childCount} → ${edited.childCount}`);
  if (original.infantCount !== edited.infantCount) changes.push(`Infants: ${original.infantCount} → ${edited.infantCount}`);
  
  // مقارنة ActivitiesText
  if (original.activitiesText !== edited.activitiesText) changes.push(`Activities updated`);
  
  if (changes.length === 0) return 'No changes made';
  return changes.join('; ');
}

// ============ حفظ التغييرات ============
async function saveChanges() {
  const editedData = collectEditedData();
  const editSummary = createEditSummary(originalInvoice, editedData);
  
  if (editSummary === 'No changes made') {
    showAlert('لم يتم إجراء أي تغييرات', 'ℹ️');
    return;
  }
  
  try {
    showPDFOverlay('⏳ جاري حفظ التعديلات...');
    
    // 1. نسخ الفاتورة الأصلية إلى Invoices_Edit (سجل التعديلات)
    const copyResult = await callGAS('copyInvoiceToEdit', {
      voucherNo: originalInvoice.voucherNo,
      originalData: JSON.stringify(originalInvoice),
      editedData: JSON.stringify(editedData),
      userId: currentUser?.id || '',
      editSummary: editSummary
    });
    
    if (!copyResult.success) {
      throw new Error(copyResult.message || 'فشل نسخ الفاتورة إلى سجل التعديلات');
    }
    
    // 2. تحديث الفاتورة في Invoices
    const updateResult = await callGAS('updateInvoice', {
      ...editedData,
      salesId: originalInvoice.salesId,
      centerName: originalInvoice.centerName,
      branchName: originalInvoice.branchName,
      salesName: originalInvoice.salesName,
      state: originalInvoice.state
    });
    
    if (!updateResult.success) {
      throw new Error(updateResult.message || 'فشل تحديث الفاتورة');
    }
    
    // 3. إنشاء PDF جديد للفاتورة المعدلة
    const pdfResult = await callGAS('saveAndGenerateSinglePDF', {
      voucherNo: editedData.voucherNo
    });
    
    if (!pdfResult?.success) {
      throw new Error(pdfResult?.message || 'فشل إنشاء PDF');
    }
    
    hidePDFOverlay();
    
    showAlert(
      `✅ تم حفظ التعديلات بنجاح\n\nرقم الفاتورة: ${editedData.voucherNo}\n${editSummary}`,
      '✅',
      `<button class="btn-primary" onclick="goBack()">العودة للقائمة</button>
       <button class="btn-secondary" onclick="closeAlert()">البقاء في التعديل</button>`
    );
    
  } catch (error) {
    console.error('❌ خطأ في حفظ التعديلات:', error);
    hidePDFOverlay();
    showAlert('خطأ في حفظ التعديلات: ' + error.message, '❌');
  }
}

// ============ إلغاء التعديل ============
async function cancelEdit() {
  if (confirm('هل أنت متأكد من إلغاء التعديل؟')) {
    showPDFOverlay('⏳ جاري إلغاء التعديل...');
    
    try {
      // حذف الفاتورة من Invoices_Edit إذا تم نسخها
      await callGAS('deleteFromEditSheet', {
        voucherNo: originalInvoice.voucherNo
      });
    } catch (e) {
      console.warn('⚠️ فشل حذف من سجل التعديلات:', e);
    }
    
    hidePDFOverlay();
    goBack();
  }
}

function goBack() {
  window.location.href = 'BookingsToday.html';
}

// ============ التهيئة ============
document.addEventListener('DOMContentLoaded', () => {
  const userData = sessionStorage.getItem('currentUser');
  if (!userData) {
    window.location.href = 'index.html';
    return;
  }
  
  try {
    currentUser = JSON.parse(userData);
    document.getElementById('userNameDisplay').textContent = currentUser.name || 'User';
    
    loadInvoice();
  } catch (e) {
    console.error(e);
    window.location.href = 'index.html';
  }
});
