<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes, viewport-fit=cover">
  <title>Edit Invoice | تعديل الفاتورة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --navy:#0f1f3d;--navy2:#1a3260;--gold:#f5c842;--gold2:#e6b800;
      --blue:#2563eb;--blue-lt:#3b82f6;--green:#16a34a;--red:#dc2626;
      --bg:#f0f4f8;--card:#fff;--border:#dde4f0;--text:#1a2540;--text-lt:#5a6a8a;
      --radius:16px;--radius-sm:10px;
      --shadow:0 4px 24px rgba(15,31,61,.10);
    }
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    .header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
    .header-left{display:flex;align-items:center;gap:16px;}
    .header-left h2{color:var(--gold);font-size:1.25rem;font-weight:800;}
    .voucher-badge{background:var(--gold);color:var(--primary);padding:4px 16px;border-radius:40px;font-weight:800;}
    .user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:40px;padding:6px 16px;font-size:0.8125rem;font-weight:600;}
    .back-btn{background:transparent;border:1px solid rgba(255,255,255,.3);color:white;padding:6px 18px;border-radius:40px;cursor:pointer;font-weight:600;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}
    .container{max-width:1200px;margin:0 auto;padding:24px 20px 48px;}
    .card{background:white;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;}
    .card-header{padding:14px 20px;background:linear-gradient(90deg,var(--navy),var(--navy2));display:flex;align-items:center;gap:10px;}
    .card-header h3{color:var(--gold);font-size:0.875rem;font-weight:800;}
    .card-body{padding:20px;}
    .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;}
    .form-group{display:flex;flex-direction:column;gap:6px;}
    .form-group label{font-size:0.6875rem;font-weight:700;color:var(--gray-500);text-transform:uppercase;}
    input,select,textarea{padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:0.875rem;font-family:'Cairo',sans-serif;background:var(--gray-50);width:100%;}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--info);background:white;}
    input[readonly]{background:var(--gray-100);color:var(--gray-500);}
    .hotel-row{display:grid;grid-template-columns:1fr 90px 70px 70px 70px;gap:12px;margin-bottom:16px;}
    @media(max-width:680px){.hotel-row{grid-template-columns:1fr 80px 65px 65px 65px;}}
    .trip-table{overflow-x:auto;border-radius:12px;border:1px solid var(--gray-200);margin-top:12px;}
    .trip-table table{width:100%;border-collapse:collapse;font-size:0.8125rem;}
    .trip-table th{background:linear-gradient(90deg,var(--navy),var(--navy2));color:var(--gold);padding:10px 12px;text-align:center;}
    .trip-table th:first-child{text-align:left;}
    .trip-table td{padding:10px 12px;border-bottom:1px solid var(--gray-100);text-align:center;}
    .trip-table td:first-child{text-align:left;font-weight:600;}
    .trip-table input{width:70px;padding:6px;text-align:center;}
    .payment-section{background:linear-gradient(135deg,#fafbff,#f5f7fa);border-radius:12px;margin-top:8px;}
    .payment-label{padding:12px 16px 4px;font-size:0.6875rem;font-weight:800;color:var(--gray-500);text-transform:uppercase;}
    .payment-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:8px 16px 16px;}
    .payment-card{background:white;border:1px solid var(--gray-200);border-radius:12px;padding:10px 8px;text-align:center;}
    .payment-card label{display:block;font-size:0.625rem;font-weight:700;color:var(--gray-500);margin-bottom:6px;}
    .payment-card input{width:100%;border:none;background:transparent;text-align:center;font-size:0.875rem;font-weight:700;padding:4px;}
    .totals-strip{display:flex;justify-content:space-around;align-items:center;flex-wrap:wrap;gap:16px;padding:16px 20px;background:white;border-bottom:1px dashed var(--gray-200);}
    .total-item{text-align:center;}
    .total-item .label{font-size:0.625rem;font-weight:700;color:var(--gray-500);text-transform:uppercase;margin-bottom:4px;}
    .total-item .value{font-size:1.75rem;font-weight:900;color:var(--primary);line-height:1.2;}
    .total-item input{width:110px;padding:6px 10px;text-align:center;font-weight:700;}
    .warning-bar{background:#fffbeb;border:1px solid #f59e0b;border-radius:12px;padding:12px 16px;color:#b45309;font-weight:600;margin-bottom:20px;}
    .warning-bar.info{background:#eff6ff;border-color:var(--info);color:#1e40af;}
    .action-buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px;}
    .btn{padding:12px 28px;border:none;border-radius:40px;font-weight:800;font-size:0.8125rem;cursor:pointer;font-family:'Cairo',sans-serif;display:inline-flex;align-items:center;gap:8px;transition:all 0.2s;}
    .btn:hover{transform:translateY(-2px);}
    .btn-primary{background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);}
    .btn-success{background:linear-gradient(135deg,var(--green),#15803d);color:white;}
    .btn-danger{background:#fee2e2;color:var(--red);}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);}
    .modal.open{display:flex;}
    .modal-content{background:white;width:90%;max-width:550px;border-radius:24px;padding:24px;max-height:90vh;overflow-y:auto;}
    .loader-container{text-align:center;padding:60px;color:var(--gray-500);}
    .spinner{width:40px;height:40px;border:3px solid var(--gray-200);border-top-color:var(--info);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .pdf-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1100;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
    .pdf-overlay.show{display:flex;}
    .pdf-spinner{width:56px;height:56px;border:4px solid rgba(255,255,255,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
    /* الساعة التفاعلية */
    .clock-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);align-items:center;justify-content:center;z-index:10000;backdrop-filter:blur(6px);}
    .clock-modal.open{display:flex;}
    .clock-box{background:white;width:90%;max-width:340px;border-radius:28px;overflow:hidden;box-shadow:0 30px 70px rgba(0,0,0,.5);}
    .ck-head{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:18px 20px;text-align:center;}
    .ck-head-title{color:var(--gold);font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
    .ck-time-big{font-size:56px;font-weight:900;color:white;letter-spacing:4px;font-family:'Tajawal',monospace;line-height:1;margin-bottom:12px;}
    .ck-mode-row{display:flex;justify-content:center;gap:8px;}
    .ck-mode-pill{padding:4px 18px;border-radius:20px;font-size:12px;font-weight:700;border:2px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.5);cursor:pointer;}
    .ck-mode-pill.active{background:var(--gold);color:var(--navy);border-color:var(--gold);}
    .ck-face-wrap{padding:18px;background:#f5f7fb;display:flex;justify-content:center;}
    .ck-svg-wrap{width:230px;height:230px;cursor:crosshair;}
    .ck-svg-wrap svg{width:100%;height:100%;display:block;}
    .ck-foot{display:flex;gap:8px;padding:14px 16px;background:white;border-top:1px solid var(--border);}
    .ck-btn{flex:1;padding:11px;border:none;border-radius:40px;font-weight:700;font-size:13px;cursor:pointer;}
    .ck-clear{background:#f1f5f9;color:var(--text);}
    .ck-cancel{background:#fee2e2;color:var(--red);}
    .ck-set{background:linear-gradient(135deg,var(--green),#15803d);color:white;}
    /* القوائم المنبثقة للعملاء/المنفذين */
    .quick-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:1000;}
    .quick-modal.open{display:flex;}
    .quick-modal-content{background:white;border-radius:20px;width:90%;max-width:420px;max-height:85vh;overflow-y:auto;padding:20px;}
    .quick-modal-header{font-size:16px;font-weight:800;color:var(--navy);margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--gold);display:flex;justify-content:space-between;}
    .quick-modal-close{cursor:pointer;font-size:24px;color:var(--gray-500);}
    .quick-option{padding:12px 16px;margin:6px 0;border-radius:12px;cursor:pointer;background:var(--gray-50);border:1px solid var(--gray-200);}
    .quick-option:hover{background:var(--gray-100);border-color:var(--blue);}
    .quick-option.selected{background:var(--navy);color:var(--gold);border-color:var(--gold);}
    .quick-option .name{font-weight:700;font-size:14px;}
    .time-btn-display{width:100%;height:43px;padding:9px 13px;border:2px solid var(--border);border-radius:var(--radius-sm);background:#fafbfd;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:14px;}
    .time-btn-display .ph{color:#b0bac9;}
    @media(max-width:640px){.payment-grid{grid-template-columns:repeat(2,1fr);}.container{padding:16px;}.ck-svg-wrap{width:200px;height:200px;}.ck-time-big{font-size:44px;}}
  </style>
</head>
<body>

<div class="header">
  <div class="header-left"><h2>✏️ تعديل الفاتورة</h2><span class="voucher-badge" id="voucherDisplay">---</span></div>
  <div class="header-right"><span class="user-chip" id="userNameDisplay">...</span><button class="back-btn" onclick="goBack()">← خروج</button></div>
</div>

<div class="container" id="mainContainer">
  <div class="loader-container" id="loaderState"><div class="spinner"></div><div>جاري تحميل بيانات الفاتورة...</div></div>
  <div id="formContent" style="display: none;"></div>
</div>

<div id="collectionModal" class="modal"><div class="modal-content" id="collectionModalContent"></div></div>
<div id="alertModal" class="modal"><div class="modal-content"><div class="modal-message" id="alertMsg"></div><div class="modal-buttons" id="alertBtns"><button class="btn btn-primary" onclick="closeAlert()">موافق</button></div></div></div>
<div id="pdfOverlay" class="pdf-overlay"><div class="pdf-spinner"></div><p id="pdfMsg" style="color:white;">جاري المعالجة...</p></div>

<!-- الساعة التفاعلية -->
<div id="clockModal" class="clock-modal"><div class="clock-box"><div class="ck-head"><div class="ck-head-title">اختيار الوقت</div><div class="ck-time-big" id="ckDisplay"><span id="ckH">--</span>:<span id="ckM">--</span></div><div class="ck-mode-row"><button class="ck-mode-pill active" id="modeHour" onclick="setClockMode('hour')">ساعة</button><button class="ck-mode-pill" id="modeMin" onclick="setClockMode('minute')">دقيقة</button></div></div><div class="ck-face-wrap"><div class="ck-svg-wrap" id="ckWrap"><svg id="ckSVG" viewBox="0 0 230 230" xmlns="http://www.w3.org/2000/svg"><circle cx="115" cy="115" r="112" fill="#eef2f8" stroke="#dde4f0" stroke-width="1.5"/><circle cx="115" cy="115" r="64" fill="rgba(37,99,235,.04)" stroke="rgba(37,99,235,.12)" stroke-width="1" stroke-dasharray="4 3"/><g id="ckTicks"></g><g id="ckNums"></g><line id="ckHandH" x1="115" y1="115" x2="115" y2="62" stroke="#0f1f3d" stroke-width="5" stroke-linecap="round"/><line id="ckHandM" x1="115" y1="115" x2="115" y2="44" stroke="#2563eb" stroke-width="3.5" stroke-linecap="round"/><circle cx="115" cy="115" r="7" fill="#0f1f3d"/><circle cx="115" cy="115" r="3" fill="#f5c842"/><circle id="ckDot" cx="115" cy="44" r="9" fill="#f5c842" opacity="0"/></svg></div></div><div class="ck-foot"><button class="ck-btn ck-clear" onclick="clearClock()">🔄 مسح</button><button class="ck-btn ck-cancel" onclick="closeClockModal()">❌ إلغاء</button><button class="ck-btn ck-set" onclick="confirmClock()">✅ تعيين</button></div></div></div>

<!-- القائمة المنبثقة للعملاء/المنفذين -->
<div id="quickModal" class="quick-modal"><div class="quick-modal-content"><div class="quick-modal-header"><span id="quickModalTitle">اختر</span><span class="quick-modal-close" onclick="closeQuickModal()">&times;</span></div><div id="quickModalBody"></div></div></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwC1BRoLAJthZqxWTYyMUSjPNNGfCI0BjTfhE7ZiVx67rUP__OKAj0vlwD1-RUCOMSE/exec';
const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
const DASH = { Admin: 'Dashboard.html', Owner: 'OwnerDashboard.html', Sales: 'SalesDashboard.html', Accountant: 'AccountantDashboard.html', Customer: 'CustomerDashboard.html' };

let currentUser = null, currentInvoice = null, originalInvoice = null, openFrom = 'today';
let tripDefinitions = [], allSuppliersCustomers = [], allEmployees = [], exRatesCache = {};
let cachedInvoicesData = null;

// متغيرات الساعة
let ckHour = null, ckMin = null, ckMode = 'hour';
const CX = 115, CY = 115;

// دوال مساعدة
function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function R2(n) { return Math.round((n + Number.EPSILON) * 100) / 100; }
function dV(v) { const n = Number(v); return (n === 0 || isNaN(n)) ? '' : n; }
function formatDate(d) { return `${String(d.getDate()).padStart(2,'0')}/${MONTHS[d.getMonth()]}/${d.getFullYear()}`; }
function parseDate(str) { if (!str) return null; const p = str.split('/'); if (p.length === 3) { const mi = MONTHS.findIndex(m => m.toLowerCase() === p[1].toLowerCase()); if (mi !== -1) return new Date(+p[2], mi, +p[0]); } return null; }
function dateToInput(s) { const d = parseDate(s); if (!d) return ''; return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function timeToInput(t) { if (!t) return ''; const m = String(t).match(/(\d{1,2}):(\d{2})/); return m ? `${m[1].padStart(2,'0')}:${m[2]}` : String(t).substring(0,5); }
function showAlert(msg, btns = null) { document.getElementById('alertMsg').textContent = msg; document.getElementById('alertBtns').innerHTML = btns || '<button class="btn btn-primary" onclick="closeAlert()">موافق</button>'; document.getElementById('alertModal').classList.add('open'); }
function closeAlert() { document.getElementById('alertModal').classList.remove('open'); }
function showPDF(m) { document.getElementById('pdfMsg').textContent = m; document.getElementById('pdfOverlay').classList.add('show'); }
function hidePDF() { document.getElementById('pdfOverlay').classList.remove('show'); }
function goBack() { location.href = DASH[currentUser?.type] || 'Dashboard.html'; }
function closeQuickModal() { document.getElementById('quickModal').classList.remove('open'); }

async function gas(action, params = {}) {
  const url = new URL(GAS_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v ?? '')));
  const res = await fetch(url.toString(), { redirect: 'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function loadSuppliersAndTrips() {
  try {
    const [suppliers, trips, employees] = await Promise.all([gas('getAllSuppliersCustomers'), gas('getAllTrips'), gas('getAllEmployees')]);
    allSuppliersCustomers = Array.isArray(suppliers) ? suppliers : [];
    tripDefinitions = Array.isArray(trips) ? trips : [];
    allEmployees = Array.isArray(employees) ? employees : [];
  } catch(e) { console.warn(e); }
}
function getTripCategory(tripName) { return (tripDefinitions.find(t => t.name === tripName) || {}).category || ''; }

async function getRate(dateStr) {
  if (!dateStr) return null;
  if (exRatesCache[dateStr]) return exRatesCache[dateStr];
  try { const r = await gas('getExchangeRate', { dateStr }); if (r) { exRatesCache[dateStr] = r; return r; } } catch(e) {}
  return null;
}
function rateFields(r) {
  if (!r) return null;
  if (r.cash) return r;
  return { cash: { USD: +r.sUSD || 47.5, EUR: +r.sEUR || 50.25, GBP: +r.sGBP || 60 }, visa: { USD: +r.sVUSD || 46.3, EUR: +r.sVEUR || 49, GBP: +r.sVGBP || 58.5, LE: +r.sVLE || 0.975 } };
}
function directPaid(cur, cU, cE, cG, cL, vU, vE, vG, vL) { if (cur === '$') return cU + vU; if (cur === '€') return cE + vE; if (cur === '£') return cG + vG; return cL + vL; }

// حساب الإجمالي من الجدول
function calculateTotalFromItems() { let total = 0; for (let i = 0; i < 20; i++) { const el = document.getElementById(`total_${i}`); if (el) total += parseFloat(el.value) || 0; } return total; }
function getCurrentDiscount() { return parseFloat(document.getElementById('discount')?.value) || 0; }
function getCurrentRest() { return (currentInvoice?.actualPrice || 0) - (currentInvoice?.discount || 0) - (currentInvoice?.paymentPrice || 0); }

// تحديث الإجماليات
async function updateTotals() {
  const cashUSD = parseFloat(document.getElementById('cashUSD')?.value) || 0;
  const cashEUR = parseFloat(document.getElementById('cashEUR')?.value) || 0;
  const cashGBP = parseFloat(document.getElementById('cashGBP')?.value) || 0;
  const cashLE = parseFloat(document.getElementById('cashLE')?.value) || 0;
  const visaUSD = parseFloat(document.getElementById('visaUSD')?.value) || 0;
  const visaEUR = parseFloat(document.getElementById('visaEUR')?.value) || 0;
  const visaGBP = parseFloat(document.getElementById('visaGBP')?.value) || 0;
  const visaLE = parseFloat(document.getElementById('visaLE')?.value) || 0;
  
  currentInvoice.cashUSD = cashUSD; currentInvoice.cashEUR = cashEUR; currentInvoice.cashGBP = cashGBP; currentInvoice.cashLE = cashLE;
  currentInvoice.visaUSD = visaUSD; currentInvoice.visaEUR = visaEUR; currentInvoice.visaGBP = visaGBP; currentInvoice.visaLE = visaLE;
  
  const actualPrice = currentInvoice?.actualPrice || 0;
  const discount = parseFloat(document.getElementById('discount')?.value) || currentInvoice?.discount || 0;
  currentInvoice.discount = discount;
  
  const activeDateInput = document.getElementById('activeDate')?.value;
  const currency = document.getElementById('invoiceCurrency')?.value || currentInvoice?.invoiceCurrency || 'LE';
  let paid = 0;
  
  if (activeDateInput && (cashUSD + cashEUR + cashGBP + cashLE + visaUSD + visaEUR + visaGBP + visaLE) > 0) {
    const raw = await getRate(activeDateInput);
    const r = rateFields(raw);
    if (r) {
      const totalLE = cashUSD * r.cash.USD + cashEUR * r.cash.EUR + cashGBP * r.cash.GBP + cashLE + visaUSD * r.visa.USD + visaEUR * r.visa.EUR + visaGBP * r.visa.GBP + visaLE * (r.visa.LE || 0.975);
      if (currency === '$') paid = totalLE / r.cash.USD;
      else if (currency === '€') paid = totalLE / r.cash.EUR;
      else if (currency === '£') paid = totalLE / r.cash.GBP;
      else paid = totalLE;
    } else paid = cashUSD + cashEUR + cashGBP + cashLE + visaUSD + visaEUR + visaGBP + visaLE;
  } else paid = cashUSD + cashEUR + cashGBP + cashLE + visaUSD + visaEUR + visaGBP + visaLE;
  
  paid = Math.round(paid * 100) / 100;
  const rest = Math.max(0, Math.round((actualPrice - discount - paid) * 100) / 100);
  currentInvoice.paymentPrice = paid; currentInvoice.rest = rest;
  
  const paymentPriceEl = document.getElementById('displayPaymentPrice');
  const restEl = document.getElementById('displayRest');
  if (paymentPriceEl) paymentPriceEl.textContent = paid.toFixed(2);
  if (restEl) restEl.textContent = rest.toFixed(2);
}
function updateItemTotal(idx, price) { const qty = parseFloat(document.getElementById(`qty_${idx}`)?.value) || 0; const tot = document.getElementById(`total_${idx}`); if (tot) tot.value = (qty * price).toFixed(2); updateTotals(); }

// ===================== الساعة التفاعلية =====================
function buildClockFace() {
  const tg = document.getElementById('ckTicks'), ng = document.getElementById('ckNums');
  if (!tg || !ng || tg.children.length) return;
  for (let i = 0; i < 60; i++) {
    const a = (i * 6 - 90) * Math.PI / 180, maj = i % 5 === 0, r1 = maj ? 96 : 103, r2 = 109;
    const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    ln.setAttribute('x1', CX + r1 * Math.cos(a)); ln.setAttribute('y1', CY + r1 * Math.sin(a));
    ln.setAttribute('x2', CX + r2 * Math.cos(a)); ln.setAttribute('y2', CY + r2 * Math.sin(a));
    ln.setAttribute('stroke', maj ? '#0f1f3d' : '#c5cfe0'); ln.setAttribute('stroke-width', maj ? '2.5' : '1');
    tg.appendChild(ln);
  }
  for (let i = 1; i <= 12; i++) {
    const a = (i * 30 - 90) * Math.PI / 180;
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', CX + 82 * Math.cos(a)); t.setAttribute('y', CY + 82 * Math.sin(a));
    t.setAttribute('text-anchor', 'middle'); t.setAttribute('dominant-baseline', 'central');
    t.setAttribute('font-size', '14'); t.setAttribute('font-weight', '700'); t.setAttribute('fill', '#1a2540');
    t.textContent = i; ng.appendChild(t);
  }
  for (let i = 1; i <= 12; i++) {
    const a = (i * 30 - 90) * Math.PI / 180;
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');

    <div class="payment-section"><div class="payment-label">💵 كاش (إجمالي كل التحصيلات)</div><div class="payment-grid"><div class="payment-card"><label>USD $</label><input type="number" id="cashUSD" step="0.01" value="${dV(currentInvoice.cashUSD)}" oninput="updateTotals()" ${paymentsReadonly ? 'readonly' : ''}></div><div class="payment-card"><label>EUR €</label><input type="number" id="cashEUR" step="0.01" value="${dV(currentInvoice.cashEUR)}" oninput="updateTotals()" ${paymentsReadonly ? 'readonly' : ''}></div><div class="payment-card"><label>GBP £</label><input type="number" id="cashGBP" step="0.01" value="${dV(currentInvoice.cashGBP)}" oninput="updateTotals()" ${paymentsReadonly ? 'readonly' : ''}></div><div class="payment-card"><label>EGP LE</label><input type="number" id="cashLE" step="0.01" value="${dV(currentInvoice.cashLE)}" oninput="updateTotals()" ${paymentsReadonly ? 'readonly' : ''}></div></div></div>

    <div class="card-body" style="padding-top:0"><div class="form-group"><label>ملاحظات</label><textarea id="notes" rows="2">${esc(currentInvoice.notes)}</textarea></div></div></div>
    <div class="card"><div class="card-header"><span class="icon">🏢</span><h3>معلومات إضافية</h3></div><div class="card-body"><div class="form-grid"><div class="form-group"><label>المنفذ</label><input type="text" id="supplier" value="${esc(currentInvoice.supplier)}" readonly style="background:#f0f4ff; cursor:pointer;" onclick="showSupplierList('${currentInvoice.voucherNo}', '${currentInvoice.trip}', '${esc(currentInvoice.supplier)}')"></div><div class="form-group"><label>العميل</label><input type="text" id="customer" value="${esc(currentInvoice.customer)}" readonly style="background:#f0f4ff; cursor:pointer;" onclick="showCustomerList('${currentInvoice.voucherNo}', '${currentInvoice.trip}', '${esc(currentInvoice.customer)}')"></div><div class="form-group"><label>الحالة</label><select id="state"><option value="pending" ${currentInvoice.state==='pending'?'selected':''}>⏳ قيد الانتظار</option><option value="Confirmed" ${(currentInvoice.state==='Confirmed'||currentInvoice.state==='confirmed')?'selected':''}>✅ مؤكد</option><option value="cancel" ${currentInvoice.state==='cancel'?'selected':''}>❌ ملغي</option></select></div></div></div></div>
    <div class="action-buttons"><button class="btn btn-success" id="collectionBtn" ${disableCollectionBtn ? 'disabled' : ''}>💰 تحصيل دفعة</button><button class="btn btn-primary" onclick="saveChanges()">💾 حفظ التعديلات</button><button class="btn btn-danger" onclick="cancelEdit()">❌ إلغاء</button></div>`;
    document.getElementById('loaderState').style.display = 'none';
    document.getElementById('formContent').style.display = 'block';
    document.getElementById('formContent').innerHTML = formHtml;
    document.getElementById('collectionBtn')?.addEventListener('click', openCollectionModal);
    if (currentInvoice.time) { document.getElementById('tripTime').value = currentInvoice.time; const td = document.getElementById('timeDisplayText'); if (td) { td.textContent = currentInvoice.time; td.classList.remove('ph'); } }
    await updateTotals();
    console.timeEnd('loadInvoice');
  } catch(err) { hidePDF(); showAlert('خطأ: ' + err.message, '<button class="btn btn-primary" onclick="goBack()">رجوع</button>'); document.getElementById('loaderState').style.display = 'none'; } finally { hidePDF(); }
}

// جمع البيانات المعدلة
async function collectEditedData() {
  const currency = document.getElementById('invoiceCurrency')?.value; const activeDateInput = document.getElementById('activeDate')?.value;
  let activeDate = ''; if (activeDateInput) { const d = new Date(activeDateInput); activeDate = formatDate(d); }
  const items = []; const tripPrices = [];
  for (let i = 0; i < 20; i++) { const qtyEl = document.getElementById(`qty_${i}`); if (!qtyEl) continue; const qty = parseFloat(qtyEl.value) || 0; const priceEl = document.getElementById(`price_${i}`); const price = priceEl ? (parseFloat(priceEl.value) || 0) : 0; tripPrices.push(price); const nameEl = document.querySelector(`#itemsBody tr:nth-child(${i+1}) td:first-child`); if (qty > 0 && nameEl) items.push(`${nameEl.textContent}×${qty}`); }
  let actualPrice = 0; for (let i = 0; i < 20; i++) { const el = document.getElementById(`total_${i}`); if (el) actualPrice += parseFloat(el.value) || 0; }
  const disc = parseFloat(document.getElementById('discount')?.value) || 0; const cU = parseFloat(document.getElementById('cashUSD')?.value) || 0; const cE = parseFloat(document.getElementById('cashEUR')?.value) || 0; const cG = parseFloat(document.getElementById('cashGBP')?.value) || 0; const cL = parseFloat(document.getElementById('cashLE')?.value) || 0;
  const vU = parseFloat(document.getElementById('visaUSD')?.value) || 0; const vE = parseFloat(document.getElementById('visaEUR')?.value) || 0; const vG = parseFloat(document.getElementById('visaGBP')?.value) || 0; const vL = parseFloat(document.getElementById('visaLE')?.value) || 0;
  let paid = 0; if (activeDateInput) { const raw = await getRate(activeDateInput); const r = rateFields(raw); if (r) { const LE = cU*r.cash.USD + cE*r.cash.EUR + cG*r.cash.GBP + cL + vU*r.visa.USD + vE*r.visa.EUR + vG*r.visa.GBP + vL*(r.visa.LE||0.975); if (currency==='$') paid = R2(LE/r.cash.USD); else if (currency==='€') paid = R2(LE/r.cash.EUR); else if (currency==='£') paid = R2(LE/r.cash.GBP); else paid = R2(LE); } else paid = directPaid(currency, cU,cE,cG,cL,vU,vE,vG,vL); } else paid = directPaid(currency, cU,cE,cG,cL,vU,vE,vG,vL);
  const rest = R2(actualPrice - disc - paid);
  return { voucherNo: currentInvoice.voucherNo, issueDate: currentInvoice.issueDate, activeDate, time: document.getElementById('tripTime')?.value || '', contactNo: document.getElementById('contactNo')?.value || '', guestName: document.getElementById('guestName')?.value || '', nationality: document.getElementById('nationality')?.value || '', hotel: document.getElementById('hotel')?.value || '', roomNo: document.getElementById('roomNo')?.value || '', trip: document.getElementById('tripName')?.value || '', invoiceCurrency: currency || '', adultCount: parseInt(document.getElementById('adultCount')?.value) || 0, childCount: parseInt(document.getElementById('childCount')?.value) || 0, infantCount: parseInt(document.getElementById('infantCount')?.value) || 0, cashUSD: cU, cashEUR: cE, cashGBP: cG, cashLE: cL, visaUSD: vU, visaEUR: vE, visaGBP: vG, visaLE: vL, actualPrice, paymentPrice: paid, discount: disc, rest, activitiesText: items.join(' | '), supplier: document.getElementById('supplier')?.value || '', customer: document.getElementById('customer')?.value || '', state: document.getElementById('state')?.value || 'pending', notes: document.getElementById('notes')?.value || '', salesId: currentInvoice.salesId, centerName: currentInvoice.centerName, branchName: currentInvoice.branchName, salesName: currentInvoice.salesName, cost: currentInvoice.cost || '', nationArrange: currentInvoice.nationArrange || '', tripPrices: tripPrices };
}
function createEditSummary(orig, edited) { const changes = [], cur = edited.invoiceCurrency || '$'; if ((orig.discount||0) !== (edited.discount||0)) { const d=(edited.discount||0)-(orig.discount||0); changes.push(`💰 الخصم ${d>0?'+':''}${d} ${cur}`); } if (orig.state !== edited.state) changes.push(`📌 الحالة: ${orig.state} → ${edited.state}`); const ot = timeToInput(orig.time||''), et = timeToInput(edited.time||''); if (ot !== et) changes.push(`⏰ الوقت: ${ot} → ${et}`); return changes.length ? changes.join(' | ') : 'لا توجد تغييرات'; }
async function saveChanges() { const editedData = await collectEditedData(); const summary = createEditSummary(originalInvoice, editedData); showPDF('جاري حفظ التعديلات...'); try { const upd = await gas('updateInvoice', editedData); if (!upd.success) throw new Error(upd.message || 'فشل التحديث'); await gas('copyInvoiceToEdit', { originalData: JSON.stringify(originalInvoice), editedData: JSON.stringify(editedData), userId: currentUser?.id || '', editSummary: summary }); showPDF('جاري إنشاء PDF...'); const prices = editedData.tripPrices || []; const pdf = await gas('saveAndGenerateSinglePDF_New', { voucherNo: editedData.voucherNo, prices: JSON.stringify(prices), total: editedData.actualPrice || 0 }); hidePDF(); if (pdf?.success) { showAlert('✅ تم حفظ التعديلات بنجاح', '✅', `<a href="${pdf.url}" target="_blank" class="btn btn-primary" style="text-decoration:none">📄 فتح PDF</a><button class="btn btn-primary" onclick="goBack()">رجوع</button>`); } else { showAlert('✅ تم الحفظ (فشل إنشاء PDF: ' + (pdf?.message||'') + ')', '⚠️', '<button class="btn btn-primary" onclick="goBack()">رجوع</button>'); } } catch(err) { hidePDF(); showAlert('خطأ: ' + err.message, '❌'); } }
async function cancelEdit() { if (confirm('هل أنت متأكد من إلغاء التعديلات؟')) goBack(); }
window.changeTrip = async function() { const newTrip = document.getElementById('tripName')?.value; const currency = document.getElementById('invoiceCurrency')?.value; if (!newTrip || !currency) return; const td = await gas('getTripData', { tripName: newTrip, currency }); if (td?.items) { let rows = ''; for (let i = 0; i < td.items.length; i++) { rows += `<tr><td style="font-weight:600">${esc(td.items[i])}</td><td><input type="number" id="qty_${i}" min="0" placeholder="0" oninput="updateItemTotal(${i}, ${td.prices?.[i]||0})"></td><td><input type="number" id="price_${i}" value="${td.prices?.[i]||0}" readonly></td><td><input type="number" id="total_${i}" value="0" readonly></td></tr>`; } document.getElementById('itemsBody').innerHTML = rows; } await updateTotals(); };
document.addEventListener('DOMContentLoaded', () => { let ud = sessionStorage.getItem('currentUser'); if (!ud) { const p = new URLSearchParams(location.search).get('user'); if (p) { ud = decodeURIComponent(p); sessionStorage.setItem('currentUser', ud); } } if (!ud) { location.href = 'index.html'; return; } try { currentUser = JSON.parse(ud); } catch { location.href = 'index.html'; return; } loadInvoice(); });
window.goBack = goBack; window.closeAlert = closeAlert; window.updateTotals = updateTotals; window.updateItemTotal = updateItemTotal; window.openCollectionModal = openCollectionModal; window.closeCollectionModal = closeCollectionModal; window.submitCollection = submitCollection; window.updateCollectionPreview = updateCollectionPreview; window.saveChanges = saveChanges; window.cancelEdit = cancelEdit; window.showSupplierList = showSupplierList; window.showCustomerList = showCustomerList; window.updateInvoiceCustomer = updateInvoiceCustomer; window.closeQuickModal = closeQuickModal;
window.openClockModal = openClockModal; window.closeClockModal = closeClockModal; window.clearClock = clearClock; window.confirmClock = confirmClock; window.setClockMode = setClockMode;
</script>
