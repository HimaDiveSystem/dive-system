<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Edit Invoice - Diving Centers Management</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
    body { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; padding:20px; }
    .container { max-width:1400px; margin:0 auto; background:white; border-radius:30px; box-shadow:0 20px 60px rgba(0,0,0,0.3); overflow:hidden; }
    .header { background:linear-gradient(135deg,#1e2b4f 0%,#152238 100%); color:white; padding:20px 30px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px; }
    .header h2 { color:#ffd966; font-size:24px; display:flex; align-items:center; gap:10px; }
    .user-info { display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
    .user-details { display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.1); padding:8px 20px; border-radius:40px; border:1px solid #ffd966; }
    .back-btn { background:#ff6b6b; color:white; border:none; padding:8px 25px; border-radius:40px; cursor:pointer; font-weight:600; transition:0.3s; }
    .back-btn:hover { background:#ee5253; transform:translateY(-2px); }
    
    .content { padding:30px; }
    .section-title { color:#1e2b4f; font-size:18px; font-weight:700; margin:25px 0 15px; padding-bottom:10px; border-bottom:2px solid #ffd966; }
    .form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; margin-bottom:20px; }
    .form-group { margin-bottom:15px; }
    .form-group label { display:block; margin-bottom:5px; color:#1e2b4f; font-weight:600; font-size:13px; }
    .form-control { width:100%; padding:10px 12px; border:2px solid #e9f0fa; border-radius:12px; font-size:14px; transition:.25s; background:white; }
    .form-control:focus { border-color:#ffd966; outline:none; }
    
    .counts-group { display:grid; grid-template-columns:repeat(3,1fr); gap:15px; margin:15px 0; }
    .count-item { background:#f8f9fa; padding:15px; border-radius:15px; text-align:center; }
    .count-item label { display:block; margin-bottom:8px; color:#1e2b4f; font-weight:600; font-size:13px; }
    .count-item input { width:100%; padding:8px; border:2px solid #e9f0fa; border-radius:10px; text-align:center; font-size:15px; }
    
    .trip-table { margin:20px 0; overflow-x:auto; }
    .trip-table table { width:100%; border-collapse:collapse; background:white; border-radius:15px; overflow:hidden; box-shadow:0 4px 10px rgba(0,0,0,0.05); }
    .trip-table th { background:#1e2b4f; color:#ffd966; padding:12px; font-weight:600; font-size:13px; }
    .trip-table td { padding:10px; border-bottom:1px solid #e9f0fa; }
    .trip-table input { width:80px; padding:6px; border:2px solid #e9f0fa; border-radius:8px; text-align:center; }
    
    .calc-section { background:#f8f9fa; border-radius:15px; padding:20px; margin:20px 0; }
    .payment-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:12px 0; }
    .payment-item { background:white; padding:12px; border-radius:12px; text-align:center; box-shadow:0 2px 5px rgba(0,0,0,0.03); }
    .payment-item label { display:block; margin-bottom:5px; color:#1e2b4f; font-weight:600; font-size:12px; }
    .payment-item input { width:100%; padding:6px; border:2px solid #e9f0fa; border-radius:8px; text-align:center; }
    
    .total-row { display:flex; justify-content:space-around; align-items:center; margin:20px 0; padding:20px 0; border-top:2px dashed #dee2e6; flex-wrap:wrap; gap:20px; }
    .total-item { text-align:center; min-width:150px; }
    .total-item .label { color:#6c757d; font-size:12px; margin-bottom:5px; }
    .total-item .value { font-size:28px; font-weight:800; color:#1e2b4f; }
    .total-item .currency { font-size:16px; color:#ffd966; margin-left:5px; }
    
    .notes-section { margin:20px 0; }
    .notes-section textarea { width:100%; padding:10px; border:2px solid #e9f0fa; border-radius:12px; min-height:80px; }
    
    .action-buttons { display:flex; gap:15px; justify-content:center; margin-top:30px; flex-wrap:wrap; }
    .btn-primary { background:#1e2b4f; color:white; border:none; padding:12px 30px; border-radius:40px; font-weight:700; font-size:15px; cursor:pointer; transition:0.3s; }
    .btn-primary:hover { background:#ffd966; color:#1e2b4f; }
    .btn-secondary { background:#e9f0fa; color:#1e2b4f; border:none; padding:12px 30px; border-radius:40px; font-weight:700; font-size:15px; cursor:pointer; }
    .btn-danger { background:#e74c3c; color:white; border:none; padding:12px 30px; border-radius:40px; font-weight:700; font-size:15px; cursor:pointer; }
    .btn-danger:hover { background:#c0392b; }
    
    .loader { border:4px solid #f3f3f3; border-top:4px solid #1e2b4f; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:50px auto; }
    @keyframes spin { to{transform:rotate(360deg);} }
    
    .pdf-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; align-items:center; justify-content:center; flex-direction:column; gap:20px; }
    .pdf-overlay.show { display:flex; }
    .pdf-spinner { width:60px; height:60px; border:6px solid rgba(255,255,255,.3); border-top:6px solid #ffd966; border-radius:50%; animation:spin 1s linear infinite; }
    .pdf-overlay p { color:white; font-size:18px; font-weight:700; }
    
    #alertModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:10000; }
    .alert-content { background:white; width:90%; max-width:500px; border-radius:30px; padding:30px; text-align:center; box-shadow:0 20px 40px rgba(0,0,0,0.3); }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>✏️ Edit Invoice</h2>
    <div class="user-info">
      <div class="user-details">
        <span id="userNameDisplay"></span>
      </div>
      <button class="back-btn" onclick="goBack()">🔙 الرجوع</button>
    </div>
  </div>
  <div class="content" id="mainContent">
    <div class="loader"></div>
  </div>
</div>

<!-- PDF Overlay -->
<div class="pdf-overlay" id="pdfOverlay">
  <div class="pdf-spinner"></div>
  <p id="pdfMsg">⏳ جاري حفظ التعديلات...</p>
</div>

<!-- Alert Modal -->
<div id="alertModal">
  <div class="alert-content">
    <div style="font-size:50px;margin-bottom:20px;" id="alertIcon">ℹ️</div>
    <h3 style="color:#1e2b4f;margin-bottom:20px;" id="alertMsg"></h3>
    <div style="display:flex;gap:10px;justify-content:center;" id="alertBtns">
      <button class="btn-primary" onclick="closeAlert()">OK</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyBfwHQQoHb9E2bq0l-u6FLMD2XFKu_d8rZuJLnIq5iko82Bn93Emki6-cvDF_XOyRp/exec';
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let currentUser = null;
let currentInvoice = null;
let originalInvoice = null;
let exchangeRatesCache = {};

// ============ دوال مساعدة ============
function showPDFOverlay(msg) {
  document.getElementById('pdfMsg').textContent = msg || '⏳ جاري حفظ التعديلات...';
  document.getElementById('pdfOverlay').classList.add('show');
}

function hidePDFOverlay() {
  document.getElementById('pdfOverlay').classList.remove('show');
}

function showAlert(msg, icon = 'ℹ️', btnHtml = null) {
  document.getElementById('alertMsg').textContent = msg;
  document.getElementById('alertIcon').textContent = icon;
  if (btnHtml) {
    document.getElementById('alertBtns').innerHTML = btnHtml;
  }
  document.getElementById('alertModal').style.display = 'flex';
}

function closeAlert() {
  document.getElementById('alertModal').style.display = 'none';
}

async function callGAS(action, params = {}) {
  const url = new URL(GAS_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => {
    url.searchParams.set(k, String(v ?? ''));
  });
  const res = await fetch(url.toString(), { redirect: 'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ============ دوال التاريخ ============
function parseDate(str) {
  if (!str) return null;
  const parts = str.split('/');
  if (parts.length === 3) {
    const day = parseInt(parts[0]);
    const monthIndex = MONTHS.findIndex(m => m.toLowerCase() === parts[1].toLowerCase());
    const year = parseInt(parts[2]);
    if (!isNaN(day) && monthIndex !== -1 && !isNaN(year)) {
      return new Date(year, monthIndex, day);
    }
  }
  return null;
}

function formatDate(date) {
  return `${String(date.getDate()).padStart(2,'0')}/${MONTHS[date.getMonth()]}/${date.getFullYear()}`;
}

function dateToInput(dateStr) {
  if (!dateStr) return '';
  const d = parseDate(dateStr);
  if (!d) return '';
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

// ============ تحليل ActivitiesText إلى items ============
function parseActivities(text) {
  const items = [];
  if (!text) return items;
  
  const parts = text.split('|');
  parts.forEach(part => {
    const match = part.trim().match(/^(.+?)×(\d+(\.\d+)?)$/);
    if (match) {
      items.push({
        name: match[1].trim(),
        qty: parseFloat(match[2]) || 0
      });
    }
  });
  return items;
}

// ============ دالة لجلب سعر الصرف ============
async function getExchangeRateForDate(dateStr) {
  if (exchangeRatesCache[dateStr]) {
    return exchangeRatesCache[dateStr];
  }
  try {
    const rate = await callGAS('getExchangeRate', { dateStr });
    if (rate) {
      exchangeRatesCache[dateStr] = rate;
      return rate;
    }
    return null;
  } catch (e) {
    console.error('❌ خطأ في جلب سعر الصرف:', e);
    return null;
  }
}

// ============ جلب بيانات الفاتورة ============
async function loadInvoice() {
  const params = new URLSearchParams(window.location.search);
  const voucherNo = params.get('voucherNo');
  
  if (!voucherNo) {
    showAlert('رقم الفاتورة غير موجود', '❌', '<button class="btn-primary" onclick="goBack()">الرجوع</button>');
    return;
  }
  
  try {
    showPDFOverlay('⏳ جلب بيانات الفاتورة...');
    
    const result = await callGAS('getAllInvoices');
    const invoices = Array.isArray(result) ? result : [];
    
    currentInvoice = invoices.find(inv => inv.voucherNo === voucherNo);
    
    if (!currentInvoice) {
      throw new Error('الفاتورة غير موجودة');
    }
    
    originalInvoice = JSON.parse(JSON.stringify(currentInvoice));
    
    console.log('✅ تم جلب الفاتورة:', currentInvoice);
    hidePDFOverlay();
    renderEditForm();
    
  } catch (error) {
    console.error('❌ خطأ:', error);
    hidePDFOverlay();
    showAlert('خطأ في جلب بيانات الفاتورة: ' + error.message, '❌', 
      '<button class="btn-primary" onclick="goBack()">الرجوع</button>');
  }
}

// ============ عرض نموذج التعديل ============
function renderEditForm() {
  if (!currentInvoice) return;
  
  const activities = parseActivities(currentInvoice.activitiesText || '');
  
  let itemsRows = '';
  activities.forEach((item, index) => {
    itemsRows += `
      <tr>
        <td>${item.name}</td>
        <td><input type="number" id="qty_${index}" value="${item.qty}" min="0" step="1" onchange="updateItemTotal(${index})"></td>
        <td><input type="number" id="price_${index}" value="0" readonly></td>
        <td><input type="number" id="total_${index}" value="0" readonly></td>
      </tr>
    `;
  });
  
  if (itemsRows === '') {
    itemsRows = '<tr><td colspan="4" style="text-align:center;padding:20px;">لا توجد items</td></tr>';
  }
  
  document.getElementById('mainContent').innerHTML = `
    <div class="section-title">👤 Customer Data</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" class="form-control" id="contactNo" value="${currentInvoice.contactNo || ''}">
      </div>
      <div class="form-group">
        <label>Guest Name</label>
        <input type="text" class="form-control" id="guestName" value="${currentInvoice.guestName || ''}">
      </div>
      <div class="form-group">
        <label>Nationality</label>
        <input type="text" class="form-control" id="nationality" value="${currentInvoice.nationality || ''}">
      </div>
      <div class="form-group">
        <label>Hotel</label>
        <input type="text" class="form-control" id="hotel" value="${currentInvoice.hotel || ''}">
      </div>
      <div class="form-group">
        <label>Room No.</label>
        <input type="text" class="form-control" id="roomNo" value="${currentInvoice.roomNo || ''}">
      </div>
    </div>

    <div class="counts-group">
      <div class="count-item">
        <label>Adults</label>
        <input type="number" id="adultCount" value="${currentInvoice.adultCount || 0}" min="0" onchange="updateActivitiesText()">
      </div>
      <div class="count-item">
        <label>Children</label>
        <input type="number" id="childCount" value="${currentInvoice.childCount || 0}" min="0" onchange="updateActivitiesText()">
      </div>
      <div class="count-item">
        <label>Infants</label>
        <input type="number" id="infantCount" value="${currentInvoice.infantCount || 0}" min="0" onchange="updateActivitiesText()">
      </div>
    </div>

    <div class="section-title">🏝️ Trip Data</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Active Date</label>
        <input type="date" class="form-control" id="activeDate" value="${dateToInput(currentInvoice.activeDate)}" onchange="updateTotals()">
      </div>
      <div class="form-group">
        <label>Time</label>
        <input type="time" class="form-control" id="time" value="${currentInvoice.time || ''}">
      </div>
      <div class="form-group">
        <label>Trip Name</label>
        <input type="text" class="form-control" id="trip" value="${currentInvoice.trip || ''}" readonly>
      </div>
      <div class="form-group">
        <label>Invoice Currency</label>
        <select class="form-control" id="invoiceCurrency" onchange="updateTotals()">
          <option value="$" ${currentInvoice.invoiceCurrency === '$' ? 'selected' : ''}>USD ($)</option>
          <option value="€" ${currentInvoice.invoiceCurrency === '€' ? 'selected' : ''}>EUR (€)</option>
          <option value="£" ${currentInvoice.invoiceCurrency === '£' ? 'selected' : ''}>GBP (£)</option>
          <option value="LE" ${currentInvoice.invoiceCurrency === 'LE' ? 'selected' : ''}>EGP (LE)</option>
        </select>
      </div>
    </div>

    <div class="trip-table">
      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="itemsContainer">
          ${itemsRows}
        </tbody>
      </table>
    </div>

    <div class="calc-section">
      <div class="payment-row">
        <div class="payment-item"><label>Cash $</label><input type="number" id="cashUSD" value="${currentInvoice.cashUSD || 0}" step="0.01" onchange="updateTotals()"></div>
        <div class="payment-item"><label>Cash €</label><input type="number" id="cashEUR" value="${currentInvoice.cashEUR || 0}" step="0.01" onchange="updateTotals()"></div>
        <div class="payment-item"><label>Cash £</label><input type="number" id="cashGBP" value="${currentInvoice.cashGBP || 0}" step="0.01" onchange="updateTotals()"></div>
        <div class="payment-item"><label>Cash LE</label><input type="number" id="cashLE" value="${currentInvoice.cashLE || 0}" step="0.01" onchange="updateTotals()"></div>
      </div>
      <div class="payment-row">
        <div class="payment-item"><label>Visa $</label><input type="number" id="visaUSD" value="${currentInvoice.visaUSD || 0}" step="0.01" onchange="updateTotals()"></div>
        <div class="payment-item"><label>Visa €</label><input type="number" id="visaEUR" value="${currentInvoice.visaEUR || 0}" step="0.01" onchange="updateTotals()"></div>
        <div class="payment-item"><label>Visa £</label><input type="number" id="visaGBP" value="${currentInvoice.visaGBP || 0}" step="0.01" onchange="updateTotals()"></div>
        <div class="payment-item"><label>Visa LE</label><input type="number" id="visaLE" value="${currentInvoice.visaLE || 0}" step="0.01" onchange="updateTotals()"></div>
      </div>
      <div class="notes-section">
        <label>Notes</label>
        <textarea class="form-control" id="notes">${currentInvoice.notes || ''}</textarea>
      </div>
      <div class="total-row">
        <div class="total-item">
          <div class="label">Discount</div>
          <input type="number" id="discount" value="${currentInvoice.discount || 0}" step="0.01" onchange="updateTotals()" style="width:100px; padding:8px; border:2px solid #e9f0fa; border-radius:10px; text-align:center;">
        </div>
        <div class="total-item">
          <div class="label">Total</div>
          <div class="value" id="displayTotal">${(currentInvoice.paymentPrice || 0).toFixed(2)}</div>
          <span class="currency" id="totalCurrency">${currentInvoice.invoiceCurrency || ''}</span>
        </div>
        <div class="total-item">
          <div class="label">Rest</div>
          <div class="value" id="displayRest">${(currentInvoice.rest || 0).toFixed(2)}</div>
          <span class="currency" id="restCurrency">${currentInvoice.invoiceCurrency || ''}</span>
        </div>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-primary" onclick="saveChanges()">💾 حفظ التعديلات</button>
      <button class="btn-danger" onclick="cancelEdit()">❌ إلغاء</button>
    </div>
  `;
  
  setTimeout(() => {
    updateTotals();
  }, 100);
}

// ============ تحديث إجمالي item ============
function updateItemTotal(index) {
  const qty = parseFloat(document.getElementById(`qty_${index}`)?.value) || 0;
  const price = parseFloat(document.getElementById(`price_${index}`)?.value) || 0;
  const totalInput = document.getElementById(`total_${index}`);
  if (totalInput) {
    totalInput.value = (qty * price).toFixed(2);
  }
  updateTotals();
}

// ============ تحديث ActivitiesText ============
function updateActivitiesText() {
  // سيتم بناؤها عند الحفظ من القيم الحالية
}

// ============ تحديث المجاميع ============
async function updateTotals() {
  const currency = document.getElementById('invoiceCurrency')?.value;
  if (!currency) return;
  
  const cashUSD = parseFloat(document.getElementById('cashUSD')?.value) || 0;
  const cashEUR = parseFloat(document.getElementById('cashEUR')?.value) || 0;
  const cashGBP = parseFloat(document.getElementById('cashGBP')?.value) || 0;
  const cashLE = parseFloat(document.getElementById('cashLE')?.value) || 0;
  const visaUSD = parseFloat(document.getElementById('visaUSD')?.value) || 0;
  const visaEUR = parseFloat(document.getElementById('visaEUR')?.value) || 0;
  const visaGBP = parseFloat(document.getElementById('visaGBP')?.value) || 0;
  const visaLE = parseFloat(document.getElementById('visaLE')?.value) || 0;
  const discount = parseFloat(document.getElementById('discount')?.value) || 0;
  
  // حساب الإجمالي
  let total = cashUSD + cashEUR + cashGBP + cashLE + visaUSD + visaEUR + visaGBP + visaLE;
  total = total - discount;
  
  document.getElementById('displayTotal').textContent = total.toFixed(2);
  document.getElementById('totalCurrency').textContent = currency;
  document.getElementById('restCurrency').textContent = currency;
  
  // حساب المتبقي
  const dateStr = document.getElementById('activeDate')?.value;
  if (dateStr) {
    const d = new Date(dateStr);
    const formattedDate = formatDate(d);
    const rate = await getExchangeRateForDate(formattedDate);
    
    if (rate) {
      const key = currency === '$' ? 'USD' : currency === '€' ? 'EUR' : currency === '£' ? 'GBP' : 'LE';
      const baseRate = rate.cash?.[key] || 1;
      
      const totalEGP = total * baseRate;
      const paidEGP = (cashUSD * (rate.cash?.USD || 0)) +
                     (cashEUR * (rate.cash?.EUR || 0)) +
                     (cashGBP * (rate.cash?.GBP || 0)) +
                     cashLE +
                     (visaUSD * (rate.visa?.USD || 0)) +
                     (visaEUR * (rate.visa?.EUR || 0)) +
                     (visaGBP * (rate.visa?.GBP || 0)) +
                     (visaLE * (rate.visa?.LE || 1));
      
      const rest = baseRate > 0 ? (totalEGP - paidEGP) / baseRate : 0;
      document.getElementById('displayRest').textContent = rest.toFixed(2);
    }
  }
}

// ============ جمع بيانات التعديل ============
function collectEditedData() {
  // جمع الـ items
  const items = [];
  let index = 0;
  while (document.getElementById(`qty_${index}`)) {
    const qty = parseFloat(document.getElementById(`qty_${index}`).value) || 0;
    const name = document.querySelector(`#itemsContainer tr:nth-child(${index+1}) td:first-child`)?.textContent || '';
    if (qty > 0 && name) {
      items.push(`${name}×${qty}`);
    }
    index++;
  }
  
  return {
    voucherNo: currentInvoice.voucherNo,
    contactNo: document.getElementById('contactNo')?.value || '',
    guestName: document.getElementById('guestName')?.value || '',
    nationality: document.getElementById('nationality')?.value || '',
    hotel: document.getElementById('hotel')?.value || '',
    roomNo: document.getElementById('roomNo')?.value || '',
    adultCount: parseInt(document.getElementById('adultCount')?.value) || 0,
    childCount: parseInt(document.getElementById('childCount')?.value) || 0,
    infantCount: parseInt(document.getElementById('infantCount')?.value) || 0,
    activeDate: document.getElementById('activeDate')?.value || '',
    time: document.getElementById('time')?.value || '',
    trip: document.getElementById('trip')?.value || '',
    invoiceCurrency: document.getElementById('invoiceCurrency')?.value || '',
    cashUSD: parseFloat(document.getElementById('cashUSD')?.value) || 0,
    cashEUR: parseFloat(document.getElementById('cashEUR')?.value) || 0,
    cashGBP: parseFloat(document.getElementById('cashGBP')?.value) || 0,
    cashLE: parseFloat(document.getElementById('cashLE')?.value) || 0,
    visaUSD: parseFloat(document.getElementById('visaUSD')?.value) || 0,
    visaEUR: parseFloat(document.getElementById('visaEUR')?.value) || 0,
    visaGBP: parseFloat(document.getElementById('visaGBP')?.value) || 0,
    visaLE: parseFloat(document.getElementById('visaLE')?.value) || 0,
    notes: document.getElementById('notes')?.value || '',
    discount: parseFloat(document.getElementById('discount')?.value) || 0,
    paymentPrice: parseFloat(document.getElementById('displayTotal')?.textContent) || 0,
    rest: parseFloat(document.getElementById('displayRest')?.textContent) || 0,
    activitiesText: items.join(' | ')
  };
}

// ============ إنشاء ملخص التغييرات ============
function createEditSummary(original, edited) {
  const changes = [];
  
  if (original.guestName !== edited.guestName) changes.push(`Guest: ${original.guestName} → ${edited.guestName}`);
  if (original.nationality !== edited.nationality) changes.push(`Nationality: ${original.nationality} → ${edited.nationality}`);
  if (original.hotel !== edited.hotel) changes.push(`Hotel: ${original.hotel} → ${edited.hotel}`);
  if (original.roomNo !== edited.roomNo) changes.push(`Room: ${original.roomNo} → ${edited.roomNo}`);
  if (original.contactNo !== edited.contactNo) changes.push(`Phone: ${original.contactNo} → ${edited.contactNo}`);
  if (original.activeDate !== edited.activeDate) changes.push(`Date: ${original.activeDate} → ${edited.activeDate}`);
  if (original.time !== edited.time) changes.push(`Time: ${original.time} → ${edited.time}`);
  if (original.invoiceCurrency !== edited.invoiceCurrency) changes.push(`Currency: ${original.invoiceCurrency} → ${edited.invoiceCurrency}`);
  
  if (original.cashUSD !== edited.cashUSD) changes.push(`Cash USD: ${original.cashUSD} → ${edited.cashUSD}`);
  if (original.cashEUR !== edited.cashEUR) changes.push(`Cash EUR: ${original.cashEUR} → ${edited.cashEUR}`);
  if (original.cashGBP !== edited.cashGBP) changes.push(`Cash GBP: ${original.cashGBP} → ${edited.cashGBP}`);
  if (original.cashLE !== edited.cashLE) changes.push(`Cash LE: ${original.cashLE} → ${edited.cashLE}`);
  
  if (original.adultCount !== edited.adultCount) changes.push(`Adults: ${original.adultCount} → ${edited.adultCount}`);
  if (original.childCount !== edited.childCount) changes.push(`Children: ${original.childCount} → ${edited.childCount}`);
  if (original.infantCount !== edited.infantCount) changes.push(`Infants: ${original.infantCount} → ${edited.infantCount}`);
  
  if (original.activitiesText !== edited.activitiesText) changes.push(`Activities updated`);
  
  return changes.length > 0 ? changes.join('; ') : 'No changes';
}

// ============ حفظ التغييرات ============
async function saveChanges() {
  const editedData = collectEditedData();
  const editSummary = createEditSummary(originalInvoice, editedData);
  
  try {
    showPDFOverlay('⏳ جاري حفظ التعديلات...');
    
    // 1. نسخ الفاتورة الأصلية إلى Invoices_Edit
    const copyResult = await callGAS('copyInvoiceToEdit', {
      voucherNo: originalInvoice.voucherNo,
      originalData: JSON.stringify(originalInvoice),
      editedData: JSON.stringify(editedData),
      userId: currentUser?.id || '',
      editSummary: editSummary
    });
    
    if (!copyResult.success) {
      throw new Error(copyResult.message || 'فشل نسخ الفاتورة');
    }
    
    // 2. تحديث الفاتورة في Invoices
    const updateResult = await callGAS('updateInvoice', editedData);
    
    if (!updateResult.success) {
      throw new Error(updateResult.message || 'فشل تحديث الفاتورة');
    }
    
    // 3. إنشاء PDF جديد
    const pdfResult = await callGAS('saveAndGenerateSinglePDF', {
      voucherNo: editedData.voucherNo
    });
    
    if (!pdfResult?.success) {
      throw new Error(pdfResult?.message || 'فشل إنشاء PDF');
    }
    
    hidePDFOverlay();
    
    showAlert(
      `✅ تم حفظ التعديلات بنجاح\n\n${editSummary}`,
      '✅',
      `<button class="btn-primary" onclick="goBack()">العودة للقائمة</button>
       <button class="btn-secondary" onclick="closeAlert()">البقاء</button>`
    );
    
  } catch (error) {
    console.error('❌ خطأ:', error);
    hidePDFOverlay();
    showAlert('خطأ: ' + error.message, '❌');
  }
}

// ============ إلغاء التعديل ============
async function cancelEdit() {
  if (confirm('هل أنت متأكد من إلغاء التعديل؟')) {
    try {
      showPDFOverlay('⏳ جاري إلغاء التعديل...');
      await callGAS('deleteFromEditSheet', { voucherNo: originalInvoice.voucherNo });
    } catch (e) {
      console.warn('⚠️', e);
    } finally {
      hidePDFOverlay();
      goBack();
    }
  }
}

function goBack() {
  window.location.href = 'BookingsToday.html';
}

// ============ التهيئة ============
document.addEventListener('DOMContentLoaded', () => {
  const userData = sessionStorage.getItem('currentUser');
  if (!userData) {
    window.location.href = 'index.html';
    return;
  }
  
  try {
    currentUser = JSON.parse(userData);
    document.getElementById('userNameDisplay').textContent = currentUser.name || 'User';
    loadInvoice();
  } catch (e) {
    console.error(e);
    window.location.href = 'index.html';
  }
});

// تعريف الدوال العامة
window.goBack = goBack;
window.saveChanges = saveChanges;
window.cancelEdit = cancelEdit;
window.updateTotals = updateTotals;
window.updateItemTotal = updateItemTotal;
window.updateActivitiesText = updateActivitiesText;
window.closeAlert = closeAlert;
</script>
