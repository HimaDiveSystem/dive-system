<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>إدارة الموظفين - نظام المرتبات</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
    body { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; padding:20px; }
    .container { max-width:1200px; margin:0 auto; background:white; border-radius:30px; box-shadow:0 20px 60px rgba(0,0,0,0.3); overflow:hidden; }
    .header { background:linear-gradient(135deg,#1e2b4f 0%,#152238 100%); color:white; padding:20px 30px; display:flex; justify-content:space-between; align-items:center; }
    .header h2 { color:#ffd966; display:flex; align-items:center; gap:10px; }
    .back-btn { background:#ffd966; color:#1e2b4f; border:none; padding:8px 20px; border-radius:40px; cursor:pointer; font-weight:600; }
    .content { padding:30px; }
    .action-bar { display:flex; gap:15px; margin-bottom:25px; flex-wrap:wrap; }
    .btn-primary { background:#1e2b4f; color:white; border:none; padding:12px 25px; border-radius:40px; cursor:pointer; font-weight:600; transition:0.3s; }
    .btn-primary:hover { background:#ffd966; color:#1e2b4f; }
    .btn-success { background:#27ae60; color:white; border:none; padding:12px 25px; border-radius:40px; cursor:pointer; font-weight:600; transition:0.3s; }
    .btn-success:hover { background:#229954; }
    .btn-danger { background:#e74c3c; color:white; border:none; padding:12px 25px; border-radius:40px; cursor:pointer; font-weight:600; transition:0.3s; }
    .btn-danger:hover { background:#c0392b; }
    
    table { width:100%; border-collapse:collapse; background:white; border-radius:15px; overflow:hidden; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
    th { background:#1e2b4f; color:white; padding:15px; }
    td { padding:12px; border-bottom:1px solid #dee2e6; text-align:center; }
    tr:hover { background:#f8f9fa; }
    .status-active { color:#27ae60; font-weight:600; }
    .status-inactive { color:#e74c3c; font-weight:600; }
    
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:10000; overflow-y:auto; }
    .modal-content { background:white; width:90%; max-width:600px; border-radius:30px; padding:30px; max-height:90vh; overflow-y:auto; }
    .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .close-modal { font-size:30px; cursor:pointer; color:#95a5a6; }
    .close-modal:hover { color:#e74c3c; }
    
    .form-group { margin-bottom:15px; }
    .form-group label { display:block; margin-bottom:5px; color:#1e2b4f; font-weight:600; }
    .form-group input, .form-group select { width:100%; padding:10px; border:2px solid #e9f0fa; border-radius:10px; }
    
    .loader { border:4px solid #f3f3f3; border-top:4px solid #1e2b4f; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:20px auto; }
    @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>📋 إدارة الموظفين</h2>
      <button class="back-btn" onclick="goBack()">🔙 العودة</button>
    </div>
    <div class="content">
      <div class="action-bar">
        <button class="btn-success" onclick="openAddModal()">➕ إضافة موظف جديد</button>
        <button class="btn-primary" onclick="loadEmployees()">🔄 تحديث</button>
      </div>
      <div id="employeesTable" style="text-align:center; padding:20px;">جاري التحميل...</div>
    </div>
  </div>

  <!-- مودال إضافة موظف -->
  <div id="addModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>➕ إضافة موظف جديد</h3>
        <span class="close-modal" onclick="closeModal('addModal')">&times;</span>
      </div>
      <div class="form-group">
        <label>الاسم الكامل *</label>
        <input type="text" id="empName" placeholder="أدخل الاسم">
      </div>
      <div class="form-group">
        <label>الوظيفة *</label>
        <input type="text" id="empPosition" placeholder="مثال: سيلز">
      </div>
      <div class="form-group">
        <label>الراتب الشهري</label>
        <input type="number" id="empSalary" placeholder="0">
      </div>
      <div class="form-group">
        <label>نظام الحساب *</label>
        <select id="empPaymentSystem">
          <option value="مرتب فقط">مرتب فقط</option>
          <option value="مرتب+عمولة">مرتب + عمولة</option>
          <option value="عمولة فقط">عمولة فقط</option>
        </select>
      </div>
      <div class="form-group">
        <label>تاريخ بداية العمل *</label>
        <input type="date" id="empStartDate">
      </div>
      <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
        <button class="btn-success" onclick="saveEmployee()">💾 حفظ</button>
        <button class="btn-primary" onclick="closeModal('addModal')">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- مودال تعديل راتب -->
  <div id="salaryModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>💰 تعديل الراتب</h3>
        <span class="close-modal" onclick="closeModal('salaryModal')">&times;</span>
      </div>
      <p><strong>الموظف:</strong> <span id="salaryEmpName"></span></p>
      <div class="form-group">
        <label>الراتب الجديد *</label>
        <input type="number" id="newSalary">
      </div>
      <div class="form-group">
        <label>تاريخ التفعيل *</label>
        <input type="date" id="salaryDate">
      </div>
      <div class="form-group">
        <label>سبب التعديل</label>
        <input type="text" id="salaryReason" placeholder="مثال: زيادة سنوية">
      </div>
      <div style="display:flex; gap:10px; justify-content:center;">
        <button class="btn-success" onclick="saveSalary()">حفظ</button>
        <button class="btn-primary" onclick="closeModal('salaryModal')">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- مودال تغيير حالة -->
  <div id="statusModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>⛔ تغيير الحالة</h3>
        <span class="close-modal" onclick="closeModal('statusModal')">&times;</span>
      </div>
      <p><strong>الموظف:</strong> <span id="statusEmpName"></span></p>
      <div class="form-group">
        <label>الحالة الجديدة *</label>
        <select id="newStatus">
          <option value="نشط">نشط</option>
          <option value="موقوف">موقوف</option>
        </select>
      </div>
      <div class="form-group">
        <label>السبب</label>
        <input type="text" id="statusReason">
      </div>
      <div style="display:flex; gap:10px; justify-content:center;">
        <button class="btn-danger" onclick="saveStatus()">تأكيد</button>
        <button class="btn-primary" onclick="closeModal('statusModal')">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- مودال سجل الراتب -->
  <div id="historyModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>📜 سجل الراتب</h3>
        <span class="close-modal" onclick="closeModal('historyModal')">&times;</span>
      </div>
      <div id="historyContent"></div>
    </div>
  </div>

  <script>
    // الرابط الثابت
    const APP_URL = 'https://script.google.com/macros/s/AKfycbyB4ZzI5UJibARWEXXSmtLYACNWqiYvv1GC_zeeBsZFMcW7pOFskDDkbiNF50zdWorq/exec';
    
    let currentUser = null;
    let employees = [];
    let currentSerial = null;

    function goBack() { window.location.href = 'AccountantDashboard.html'; }

    function closeModal(modalId) {
      document.getElementById(modalId).style.display = 'none';
    }

    async function callApi(action, params = {}) {
      const url = new URL(APP_URL);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
      const res = await fetch(url.toString());
      return res.json();
    }

    async function loadEmployees() {
      document.getElementById('employeesTable').innerHTML = '<div class="loader"></div>';
      const result = await callApi('getAllEmployees');
      if (Array.isArray(result)) {
        employees = result;
        displayTable();
      } else {
        document.getElementById('employeesTable').innerHTML = '<p>خطأ في تحميل البيانات</p>';
      }
    }

    function displayTable() {
      let html = `
        <table>
          <thead>
            <tr>
              <th>الرقم</th>
              <th>الاسم</th>
              <th>الوظيفة</th>
              <th>الراتب</th>
              <th>نظام الحساب</th>
              <th>الحالة</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody>
      `;
      
      employees.forEach(emp => {
        html += `
          <tr>
            <td>${emp.serial}</td>
            <td>${emp.name}</td>
            <td>${emp.position}</td>
            <td>${emp.monthlySalary}</td>
            <td>${emp.paymentSystem}</td>
            <td class="${emp.status === 'نشط' ? 'status-active' : 'status-inactive'}">${emp.status}</td>
            <td>
              <button class="btn-primary" style="padding:5px 10px;" onclick="viewHistory('${emp.serial}')">📜 سجل</button>
              <button class="btn-success" style="padding:5px 10px;" onclick="openSalaryModal('${emp.serial}')">💰 راتب</button>
              <button class="btn-danger" style="padding:5px 10px;" onclick="openStatusModal('${emp.serial}')">⛔ حالة</button>
            </td>
          </tr>
        `;
      });
      
      html += '</tbody></table>';
      document.getElementById('employeesTable').innerHTML = html;
    }

    // إضافة موظف جديد
    function openAddModal() {
      document.getElementById('empName').value = '';
      document.getElementById('empPosition').value = '';
      document.getElementById('empSalary').value = '';
      document.getElementById('empPaymentSystem').value = 'مرتب فقط';
      document.getElementById('empStartDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('addModal').style.display = 'flex';
    }

    async function saveEmployee() {
      const data = {
        fullName: document.getElementById('empName').value,
        position: document.getElementById('empPosition').value,
        monthlySalary: parseFloat(document.getElementById('empSalary').value) || 0,
        paymentSystem: document.getElementById('empPaymentSystem').value,
        startDate: document.getElementById('empStartDate').value,
        centerId: currentUser?.centerId,
        centerName: currentUser?.centerName,
        branchId: currentUser?.branchId,
        branchName: currentUser?.branchName,
        hasSystemAccess: false
      };

      if (!data.fullName || !data.position || !data.startDate) {
        alert('يرجى ملء الحقول المطلوبة');
        return;
      }

      const result = await callApi('addNewEmployee', data, 'POST');
      if (result.success) {
        alert('تم إضافة الموظف بنجاح');
        closeModal('addModal');
        loadEmployees();
      } else {
        alert('خطأ: ' + result.message);
      }
    }

    // تعديل راتب
    function openSalaryModal(serial) {
      const emp = employees.find(e => e.serial === serial);
      if (emp) {
        currentSerial = serial;
        document.getElementById('salaryEmpName').innerText = emp.name;
        document.getElementById('newSalary').value = emp.monthlySalary;
        document.getElementById('salaryDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('salaryReason').value = '';
        document.getElementById('salaryModal').style.display = 'flex';
      }
    }

    async function saveSalary() {
      const data = {
        serial: currentSerial,
        fullName: document.getElementById('salaryEmpName').innerText,
        newSalary: parseFloat(document.getElementById('newSalary').value),
        effectiveDate: document.getElementById('salaryDate').value,
        reason: document.getElementById('salaryReason').value
      };

      const result = await callApi('updateEmployeeSalary', data, 'POST');
      if (result.success) {
        alert('تم تعديل الراتب');
        closeModal('salaryModal');
        loadEmployees();
      } else {
        alert('خطأ: ' + result.message);
      }
    }

    // تغيير حالة
    function openStatusModal(serial) {
      const emp = employees.find(e => e.serial === serial);
      if (emp) {
        currentSerial = serial;
        document.getElementById('statusEmpName').innerText = emp.name;
        document.getElementById('newStatus').value = emp.status === 'نشط' ? 'موقوف' : 'نشط';
        document.getElementById('statusReason').value = '';
        document.getElementById('statusModal').style.display = 'flex';
      }
    }

    async function saveStatus() {
      const data = {
        serial: currentSerial,
        fullName: document.getElementById('statusEmpName').innerText,
        newStatus: document.getElementById('newStatus').value,
        reason: document.getElementById('statusReason').value,
        effectiveDate: new Date().toISOString().split('T')[0]
      };

      const result = await callApi('updateEmployeeStatus', data, 'POST');
      if (result.success) {
        alert('تم تغيير الحالة');
        closeModal('statusModal');
        loadEmployees();
      } else {
        alert('خطأ: ' + result.message);
      }
    }

    // عرض سجل الراتب
    async function viewHistory(serial) {
      const history = await callApi('getSalaryHistory', { serial });
      if (Array.isArray(history) && history.length > 0) {
        let html = '<table><tr><th>الراتب</th><th>الشهر</th><th>السنة</th><th>السبب</th></tr>';
        history.forEach(h => {
          html += `<tr><td>${h.salary}</td><td>${h.month}</td><td>${h.year}</td><td>${h.reason}</td></tr>`;
        });
        html += '</table>';
        document.getElementById('historyContent').innerHTML = html;
        document.getElementById('historyModal').style.display = 'flex';
      } else {
        alert('لا يوجد سجل لهذا الموظف');
      }
    }

    // بدء التشغيل
    document.addEventListener('DOMContentLoaded', () => {
      const userData = sessionStorage.getItem('currentUser');
      if (!userData) {
        window.location.href = 'index.html';
        return;
      }
      currentUser = JSON.parse(userData);
      loadEmployees();
    });
  </script>
</body>
</html>
