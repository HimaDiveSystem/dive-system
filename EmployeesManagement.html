<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>إدارة الموظفين - نظام المرتبات</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
    body { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; padding:20px; }
    .container { max-width:1200px; margin:0 auto; background:white; border-radius:30px; box-shadow:0 20px 60px rgba(0,0,0,0.3); overflow:hidden; }
    .header { background:linear-gradient(135deg,#1e2b4f 0%,#152238 100%); color:white; padding:20px 30px; display:flex; justify-content:space-between; align-items:center; }
    .header h2 { color:#ffd966; display:flex; align-items:center; gap:10px; }
    .back-btn { background:#ffd966; color:#1e2b4f; border:none; padding:8px 20px; border-radius:40px; cursor:pointer; font-weight:600; }
    .content { padding:30px; }
    .action-bar { display:flex; gap:15px; margin-bottom:25px; flex-wrap:wrap; }
    .btn-primary { background:#1e2b4f; color:white; border:none; padding:12px 25px; border-radius:40px; cursor:pointer; font-weight:600; }
    .btn-success { background:#27ae60; color:white; border:none; padding:12px 25px; border-radius:40px; cursor:pointer; font-weight:600; }
    .btn-danger { background:#e74c3c; color:white; border:none; padding:12px 25px; border-radius:40px; cursor:pointer; font-weight:600; }
    
    table { width:100%; border-collapse:collapse; background:white; border-radius:15px; overflow:hidden; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
    th { background:#1e2b4f; color:#ffd966; padding:15px; }
    td { padding:12px; border-bottom:1px solid #e9f0fa; text-align:center; }
    tr:hover { background:#f5f9ff; }
    .status-active { color:#27ae60; font-weight:600; }
    .status-inactive { color:#e74c3c; font-weight:600; }
    
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:10000; overflow-y:auto; }
    .modal-content { background:white; width:90%; max-width:900px; border-radius:30px; padding:30px; max-height:90vh; overflow-y:auto; }
    .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:2px solid #e9f0fa; padding-bottom:15px; }
    .close-modal { font-size:30px; cursor:pointer; color:#95a5a6; }
    .close-modal:hover { color:#e74c3c; }
    
    .tabs { display:flex; gap:10px; margin-bottom:25px; flex-wrap:wrap; }
    .tab { padding:12px 25px; background:#e9f0fa; border-radius:40px; cursor:pointer; font-weight:600; color:#1e2b4f; }
    .tab.active { background:#1e2b4f; color:white; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    
    .form-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; margin-bottom:20px; }
    .form-group { margin-bottom:15px; }
    .form-group label { display:block; margin-bottom:8px; color:#1e2b4f; font-weight:600; }
    .form-group input, .form-group select { width:100%; padding:12px; border:2px solid #e9f0fa; border-radius:12px; }
    .form-group.checkbox { display:flex; align-items:center; gap:10px; }
    .form-group.checkbox input { width:auto; }
    
    .image-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; }
    .image-preview { width:100%; height:150px; border:2px dashed #dee2e6; border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; background-size:cover; background-position:center; }
    .image-preview:hover { border-color:#1e2b4f; }
    
    .loader { border:4px solid #f3f3f3; border-top:4px solid #1e2b4f; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:20px auto; }
    @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
    
    .toast { position:fixed; bottom:20px; right:20px; padding:10px 18px; border-radius:10px; font-size:12px; font-weight:600; color:white; z-index:9999; box-shadow:0 4px 16px rgba(0,0,0,0.2); transform:translateY(50px); opacity:0; transition:0.35s; }
    .toast.show { transform:translateY(0); opacity:1; }
    .toast-success { background:#27ae60; }
    .toast-error { background:#e74c3c; }
    .toast-info { background:#3498db; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>📋 إدارة الموظفين</h2>
      <button class="back-btn" onclick="goBack()">🔙 العودة</button>
    </div>
    <div class="content">
      <div class="action-bar">
        <button class="btn-success" onclick="openAddModal()">➕ إضافة موظف جديد</button>
        <button class="btn-primary" onclick="loadEmployees()">🔄 تحديث</button>
      </div>
      <div id="employeesTable" style="text-align:center; padding:20px;">جاري التحميل...</div>
    </div>
  </div>

  <!-- مودال إضافة موظف جديد -->
  <div id="addModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>➕ إضافة موظف جديد</h3>
        <span class="close-modal" onclick="closeModal('addModal')">&times;</span>
      </div>
      
      <div class="tabs">
        <div class="tab active" onclick="switchTab('basic')">📋 بيانات أساسية</div>
        <div class="tab" onclick="switchTab('system')">💻 بيانات النظام</div>
        <div class="tab" onclick="switchTab('images')">🖼️ الصور</div>
      </div>
      
      <!-- تبويب البيانات الأساسية -->
      <div id="tab-basic" class="tab-content active">
        <div class="form-grid">
          <div class="form-group">
            <label>الاسم الكامل *</label>
            <input type="text" id="empName" placeholder="أدخل الاسم الكامل">
          </div>
          <div class="form-group">
            <label>الوظيفة *</label>
            <select id="empPosition">
              <option value="">اختر الوظيفة</option>
              <option value="Admin">مدير النظام</option>
              <option value="Owner">صاحب مركز</option>
              <option value="Accountant">محاسب</option>
              <option value="Sales">سيلز</option>
              <option value="Employee">موظف عادي</option>
              <option value="Technician">فني</option>
              <option value="Cleaner">عامل نظافة</option>
            </select>
          </div>
          <div class="form-group">
            <label>الراتب الشهري</label>
            <input type="number" id="empSalary" placeholder="0">
          </div>
          <div class="form-group">
            <label>رقم الهاتف</label>
            <input type="text" id="empPhone" placeholder="رقم الهاتف">
          </div>
          <div class="form-group">
            <label>تاريخ بداية العمل *</label>
            <input type="date" id="empStartDate">
          </div>
          <div class="form-group">
            <label>الفرع *</label>
            <select id="empBranch">
              <option value="">اختر الفرع</option>
            </select>
          </div>
          <div class="form-group">
            <label>نظام الحساب *</label>
            <select id="empPaymentSystem">
              <option value="مرتب فقط">مرتب فقط</option>
              <option value="مرتب+عمولة">مرتب + عمولة</option>
              <option value="عمولة فقط">عمولة فقط</option>
            </select>
          </div>
        </div>
        <div style="display:flex; justify-content:flex-start;">
          <button class="btn-primary" onclick="switchTab('system')">التالي: بيانات النظام ▶</button>
        </div>
      </div>
      
      <!-- تبويب بيانات النظام -->
      <div id="tab-system" class="tab-content">
        <div class="form-group checkbox">
          <input type="checkbox" id="empHasAccess" onchange="toggleSystemFields()">
          <label>لديه حساب في النظام</label>
        </div>
        
        <div id="systemFields" style="display:none;">
          <div class="form-grid">
            <div class="form-group">
              <label>اسم المستخدم (الاسم الحركي)</label>
              <input type="text" id="empUsername" placeholder="مثال: ahmed" oninput="generateEmail()">
            </div>
            <div class="form-group">
              <label>كلمة المرور</label>
              <input type="password" id="empPassword" placeholder="كلمة المرور">
            </div>
            <div class="form-group">
              <label>البريد الإلكتروني</label>
              <input type="email" id="empEmail" readonly placeholder="سيتولد تلقائياً">
            </div>
            <div class="form-group">
              <label>نوع المستخدم</label>
              <select id="empUserType">
                <option value="Employee">موظف</option>
                <option value="Accountant">محاسب</option>
                <option value="Sales">سيلز</option>
                <option value="Admin">مدير</option>
                <option value="Owner">صاحب مركز</option>
              </select>
            </div>
            <div class="form-group">
              <label>العنوان</label>
              <input type="text" id="empAddress" placeholder="العنوان">
            </div>
          </div>
        </div>
        
        <div style="display:flex; justify-content:space-between; margin-top:20px;">
          <button class="btn-primary" onclick="switchTab('basic')">▶ السابق</button>
          <button class="btn-primary" onclick="switchTab('images')">التالي: الصور ▶</button>
        </div>
      </div>
      
      <!-- تبويب الصور -->
      <div id="tab-images" class="tab-content">
        <div class="image-grid">
          <div class="form-group">
            <label>صورة الموظف</label>
            <div class="image-preview" id="previewEmployee" onclick="uploadImage('employee')">
              <span style="font-size:40px;">➕</span>
            </div>
            <input type="file" id="empImageEmployee" accept="image/*" style="display:none;" onchange="previewImage(this, 'previewEmployee')">
          </div>
          
          <div class="form-group">
            <label>البطاقة الشخصية (وجه)</label>
            <div class="image-preview" id="previewIdFront" onclick="uploadImage('idFront')">
              <span style="font-size:40px;">➕</span>
            </div>
            <input type="file" id="empImageIdFront" accept="image/*" style="display:none;" onchange="previewImage(this, 'previewIdFront')">
          </div>
          
          <div class="form-group">
            <label>البطاقة الشخصية (ظهر)</label>
            <div class="image-preview" id="previewIdBack" onclick="uploadImage('idBack')">
              <span style="font-size:40px;">➕</span>
            </div>
            <input type="file" id="empImageIdBack" accept="image/*" style="display:none;" onchange="previewImage(this, 'previewIdBack')">
          </div>
          
          <div class="form-group">
            <label>الاستعلام الأمني</label>
            <div class="image-preview" id="previewSecurity" onclick="uploadImage('security')">
              <span style="font-size:40px;">➕</span>
            </div>
            <input type="file" id="empImageSecurity" accept="image/*" style="display:none;" onchange="previewImage(this, 'previewSecurity')">
          </div>
        </div>
        
        <div style="display:flex; justify-content:space-between; margin-top:20px;">
          <button class="btn-primary" onclick="switchTab('system')">▶ السابق</button>
          <button class="btn-success" onclick="saveNewEmployee()">💾 حفظ الموظف</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ══════════════════════════════════════════════════════
    // CONFIG - نفس الرابط من ExpenseRevenueEntry
    // ══════════════════════════════════════════════════════
    const GAS = 'https://script.google.com/macros/s/AKfycbyB4ZzI5UJibARWEXXSmtLYACNWqiYvv1GC_zeeBsZFMcW7pOFskDDkbiNF50zdWorq/exec';
    
    let currentUser = null;
    let employees = [];
    let branches = [];

    // ══════════════════════════════════════════════════════
    // دالة showToast
    // ══════════════════════════════════════════════════════
    function showToast(msg, type = 'success') {
      console.log(`🍞 Toast [${type}]: ${msg}`);
      
      let toast = document.getElementById('toast');
      if (!toast) {
        console.warn('⚠️ Toast element not found, creating one');
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.className = 'toast';
        document.body.appendChild(toast);
      }
      
      toast.textContent = msg;
      toast.className = `toast toast-${type} show`;
      
      setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }

    // ══════════════════════════════════════════════════════
    // دالة gasGet المحسنة للتشخيص
    // ══════════════════════════════════════════════════════
    async function gasGet(params) {
      console.log('🔧 gasGet called with params:', params);
      
      const queryString = Object.entries(params)
        .map(([key, value]) => {
          const encodedValue = encodeURIComponent(String(value || ''));
          return `${key}=${encodedValue}`;
        })
        .join('&');
      
      const url = `${GAS}?${queryString}`;
      console.log('🔧 gasGet URL:', url);
      
      try {
        const response = await fetch(url, {
          method: 'GET',
          mode: 'cors',
          cache: 'no-cache',
          headers: {
            'Content-Type': 'application/json',
          }
        });
        
        console.log('🔧 Response status:', response.status);
        console.log('🔧 Response ok:', response.ok);
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const text = await response.text();
        console.log('🔧 Raw response text (first 200):', text.substring(0, 200));
        
        try {
          return JSON.parse(text);
        } catch (e) {
          console.error('🔧 Failed to parse JSON:', e);
          console.error('🔧 Raw text:', text);
          throw new Error('Invalid JSON response from server');
        }
      } catch (error) {
        console.error('🔧 Fetch error:', error);
        throw error;
      }
    }

    // ══════════════════════════════════════════════════════
    // دوال مساعدة
    // ══════════════════════════════════════════════════════
    function closeModal(modalId) {
      document.getElementById(modalId).style.display = 'none';
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      if (tabName === 'basic') {
        document.querySelectorAll('.tab')[0].classList.add('active');
      } else if (tabName === 'system') {
        document.querySelectorAll('.tab')[1].classList.add('active');
      } else if (tabName === 'images') {
        document.querySelectorAll('.tab')[2].classList.add('active');
      }
      
      document.getElementById(`tab-${tabName}`).classList.add('active');
    }

    function toggleSystemFields() {
      const hasAccess = document.getElementById('empHasAccess').checked;
      document.getElementById('systemFields').style.display = hasAccess ? 'block' : 'none';
      if (hasAccess) generateEmail();
    }

    function generateEmail() {
      const username = document.getElementById('empUsername').value;
      const position = document.getElementById('empPosition').value;
      const centerName = currentUser?.centerName || 'center';
      
      if (username && position) {
        const cleanUser = username.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
        const cleanPos = position.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
        const cleanCenter = centerName.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
        document.getElementById('empEmail').value = `${cleanUser}${cleanPos}@${cleanCenter}.com`;
      }
    }

    function uploadImage(type) {
      document.getElementById(`empImage${type.charAt(0).toUpperCase() + type.slice(1)}`).click();
    }

    function previewImage(input, previewId) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const preview = document.getElementById(previewId);
          preview.style.backgroundImage = `url('${e.target.result}')`;
          preview.style.backgroundSize = 'cover';
          preview.innerHTML = '';
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    // ══════════════════════════════════════════════════════
    // تحميل الفروع الخاصة بالمركز فقط
    // ══════════════════════════════════════════════════════
    async function loadBranchesForCenter() {
      if (!currentUser?.centerId) {
        console.error('لا يوجد مركز للمستخدم');
        return;
      }

      try {
        const result = await gasGet({ 
          action: 'getBranchesByCenter', 
          centerId: currentUser.centerId 
        });
        
        if (Array.isArray(result)) {
          branches = result;
          const select = document.getElementById('empBranch');
          select.innerHTML = '<option value="">اختر الفرع</option>';
          branches.forEach(b => {
            select.innerHTML += `<option value="${b.id}">${b.name}</option>`;
          });
          console.log('تم تحميل الفروع:', branches);
        } else {
          console.error('فشل تحميل الفروع:', result);
          showToast('فشل تحميل الفروع', 'error');
        }
      } catch (error) {
        console.error('خطأ في تحميل الفروع:', error);
        showToast('خطأ في تحميل الفروع', 'error');
      }
    }

    // ══════════════════════════════════════════════════════
    // عرض الموظفين
    // ══════════════════════════════════════════════════════
    async function loadEmployees() {
      document.getElementById('employeesTable').innerHTML = '<div class="loader"></div>';
      try {
        const result = await gasGet({ action: 'getAllEmployees' });
        
        if (Array.isArray(result)) {
          employees = result;
          displayTable();
          console.log('تم تحميل الموظفين:', employees.length);
        } else {
          document.getElementById('employeesTable').innerHTML = '<p>خطأ في تحميل البيانات</p>';
          showToast('خطأ في تحميل الموظفين', 'error');
        }
      } catch (error) {
        console.error('خطأ في تحميل الموظفين:', error);
        document.getElementById('employeesTable').innerHTML = '<p>خطأ في الاتصال بالخادم</p>';
        showToast('خطأ في الاتصال: ' + error.message, 'error');
      }
    }

    function displayTable() {
      let html = `
        <table>
          <thead>
            <tr>
              <th>الرقم</th>
              <th>الاسم</th>
              <th>الوظيفة</th>
              <th>الراتب</th>
              <th>نظام الحساب</th>
              <th>الحالة</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody>
      `;
      
      employees.forEach(emp => {
        html += `
          <tr>
            <td>${emp.serial}</td>
            <td>${emp.name}</td>
            <td>${emp.position}</td>
            <td>${emp.monthlySalary}</td>
            <td>${emp.paymentSystem}</td>
            <td class="${emp.status === 'نشط' ? 'status-active' : 'status-inactive'}">${emp.status}</td>
            <td>
              <button class="btn-primary" style="padding:5px 10px;" onclick="viewHistory('${emp.serial}')">📜 سجل</button>
              <button class="btn-success" style="padding:5px 10px;" onclick="openSalaryModal('${emp.serial}')">💰 راتب</button>
              <button class="btn-danger" style="padding:5px 10px;" onclick="openStatusModal('${emp.serial}')">⛔ حالة</button>
            </td>
          </tr>
        `;
      });
      
      html += '</tbody></table>';
      document.getElementById('employeesTable').innerHTML = html;
    }

    // ══════════════════════════════════════════════════════
    // فتح مودال الإضافة
    // ══════════════════════════════════════════════════════
    function openAddModal() {
      console.log('📋 Opening add modal');
      
      // تفريغ الحقول
      document.getElementById('empName').value = '';
      document.getElementById('empPosition').value = '';
      document.getElementById('empSalary').value = '';
      document.getElementById('empPhone').value = '';
      document.getElementById('empStartDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('empPaymentSystem').value = 'مرتب فقط';
      
      // تفريغ حقول النظام
      document.getElementById('empHasAccess').checked = false;
      document.getElementById('systemFields').style.display = 'none';
      document.getElementById('empUsername').value = '';
      document.getElementById('empPassword').value = '';
      document.getElementById('empEmail').value = '';
      document.getElementById('empAddress').value = '';
      document.getElementById('empUserType').value = 'Employee';
      
      // تفريغ معاينات الصور
      ['previewEmployee', 'previewIdFront', 'previewIdBack', 'previewSecurity'].forEach(id => {
        const el = document.getElementById(id);
        el.style.backgroundImage = '';
        el.innerHTML = '<span style="font-size:40px;">➕</span>';
      });
      
      // تحميل الفروع الخاصة بالمركز فقط
      loadBranchesForCenter();
      
      // العودة للتبويب الأول
      switchTab('basic');
      
      // عرض المودال
      document.getElementById('addModal').style.display = 'flex';
    }

    // ══════════════════════════════════════════════════════
    // حفظ الموظف الجديد - مع تشخيص كامل
    // ══════════════════════════════════════════════════════
    async function saveNewEmployee() {
      // ✋ تأكد من وصول التنفيذ لهذه النقطة
      console.log('%c🔥🔥🔥 saveNewEmployee CALLED! 🔥🔥🔥', 'color: green; font-size: 16px; font-weight: bold');
      console.log('🔥 Timestamp:', new Date().toISOString());
      console.log('🔥 Current user:', currentUser);
      
      showToast('جاري الحفظ...', 'info');
      
      // التحقق من الحقول المطلوبة
      const name = document.getElementById('empName')?.value;
      const position = document.getElementById('empPosition')?.value;
      const startDate = document.getElementById('empStartDate')?.value;
      const branchId = document.getElementById('empBranch')?.value;
      
      console.log('📋 Form values:', { 
        name, 
        position, 
        startDate, 
        branchId,
        salary: document.getElementById('empSalary')?.value,
        phone: document.getElementById('empPhone')?.value,
        paymentSystem: document.getElementById('empPaymentSystem')?.value
      });
      
      // التحقق من وجود العناصر
      if (!document.getElementById('empName')) {
        console.error('❌ عنصر empName غير موجود في الصفحة');
        showToast('خطأ في النموذج', 'error');
        return;
      }
      
      if (!name || !position || !startDate || !branchId) {
        console.warn('⚠️ Missing required fields');
        showToast('يرجى ملء جميع الحقول المطلوبة', 'error');
        return;
      }
      
      // تجميع البيانات الأساسية
      const params = {
        action: 'addNewEmployee',
        fullName: name,
        position: position,
        monthlySalary: parseFloat(document.getElementById('empSalary')?.value) || 0,
        phone: document.getElementById('empPhone')?.value || '',
        startDate: startDate,
        branchId: branchId,
        branchName: branches.find(b => b.id === branchId)?.name || '',
        paymentSystem: document.getElementById('empPaymentSystem')?.value || 'مرتب فقط',
        hasSystemAccess: document.getElementById('empHasAccess')?.checked ? 'true' : 'false',
        centerId: currentUser?.centerId || '',
        centerName: currentUser?.centerName || ''
      };
      
      // بيانات النظام إذا وجدت
      if (document.getElementById('empHasAccess')?.checked) {
        console.log('🔑 User has system access, collecting credentials...');
        
        const password = document.getElementById('empPassword')?.value;
        if (!password) {
          showToast('كلمة المرور مطلوبة للمستخدمين', 'error');
          return;
        }
        
        params.username = document.getElementById('empUsername')?.value || '';
        params.password = password;
        params.email = document.getElementById('empEmail')?.value || '';
        params.userType = document.getElementById('empUserType')?.value || 'Employee';
        params.address = document.getElementById('empAddress')?.value || '';
      }
      
      console.log('📤 Final params object:', params);
      
      // بناء URL للاختبار
      const testUrl = GAS + '?' + new URLSearchParams(params).toString();
      console.log('📤 Full URL (for testing):', testUrl);
      
      // تعطيل الزر أثناء الحفظ
      const btn = document.querySelector('#tab-images .btn-success');
      if (!btn) {
        console.error('❌ زر الحفظ غير موجود!');
        return;
      }
      
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = '⏳ جاري الحفظ...';
      
      try {
        console.log('⏳ Calling gasGet with params...');
        console.time('API Call Duration');
        
        const result = await gasGet(params);
        
        console.timeEnd('API Call Duration');
        console.log('📥 Raw response:', result);
        
        if (result && result.success === true) {
          console.log('%c✅ Save successful!', 'color: green; font-size: 14px');
          showToast('✅ تم إضافة الموظف بنجاح', 'success');
          closeModal('addModal');
          await loadEmployees();
        } else {
          console.error('❌ Server returned error:', result);
          const errorMsg = result?.message || 'خطأ غير معروف من الخادم';
          showToast('❌ ' + errorMsg, 'error');
        }
      } catch (error) {
        console.error('%c❌❌❌ CATCH ERROR ❌❌❌', 'color: red; font-size: 14px');
        console.error('❌ Error name:', error.name);
        console.error('❌ Error message:', error.message);
        console.error('❌ Error stack:', error.stack);
        
        // محاولة fetch مباشرة للتشخيص
        try {
          console.log('🔍 Attempting direct fetch for diagnosis...');
          const directResponse = await fetch(testUrl);
          console.log('🔍 Direct fetch status:', directResponse.status);
          const text = await directResponse.text();
          console.log('🔍 Direct fetch response (first 200 chars):', text.substring(0, 200));
        } catch (directError) {
          console.error('🔍 Direct fetch also failed:', directError);
        }
        
        showToast('❌ خطأ في الاتصال: ' + error.message, 'error');
      } finally {
        console.log('🏁 Finally block - re-enabling button');
        btn.disabled = false;
        btn.textContent = originalText;
      }
    }

    // ══════════════════════════════════════════════════════
    // سجل الراتب
    // ══════════════════════════════════════════════════════
    async function viewHistory(serial) {
      try {
        const history = await gasGet({ 
          action: 'getSalaryHistory', 
          serial: serial 
        });
        
        if (Array.isArray(history) && history.length > 0) {
          let msg = 'سجل تعديلات الراتب:\n';
          history.forEach(h => {
            msg += `\n${h.salary} (${h.month}/${h.year}) - ${h.reason || 'بدون سبب'}`;
          });
          alert(msg);
        } else {
          showToast('لا يوجد سجل لهذا الموظف', 'info');
        }
      } catch (error) {
        showToast('خطأ في تحميل السجل', 'error');
      }
    }

    function openSalaryModal(serial) {
      showToast('سيتم فتح تعديل الراتب قريباً', 'info');
    }

    function openStatusModal(serial) {
      showToast('سيتم فتح تغيير الحالة قريباً', 'info');
    }

    function goBack() {
      window.location.href = 'AccountantDashboard.html';
    }

    // ══════════════════════════════════════════════════════
    // بدء التشغيل
    // ══════════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', () => {
      console.log('📋 Page loaded, initializing...');
      
      const userData = sessionStorage.getItem('currentUser');
      if (!userData) {
        console.warn('No user data found, redirecting to login');
        window.location.href = 'index.html';
        return;
      }
      
      try {
        currentUser = JSON.parse(userData);
        console.log('Current user:', currentUser);
        
        if (!['Accountant', 'Admin', 'Owner'].includes(currentUser.type)) {
          console.warn('User type not authorized:', currentUser.type);
          window.location.href = 'index.html';
          return;
        }
        
        console.log('📋 Registering global functions...');
        
        window.saveNewEmployee = saveNewEmployee;
        window.gasGet = gasGet;
        window.showToast = showToast;
        window.closeModal = closeModal;
        window.switchTab = switchTab;
        window.toggleSystemFields = toggleSystemFields;
        window.generateEmail = generateEmail;
        window.uploadImage = uploadImage;
        window.previewImage = previewImage;
        window.openAddModal = openAddModal;
        window.loadEmployees = loadEmployees;
        window.viewHistory = viewHistory;
        window.openSalaryModal = openSalaryModal;
        window.openStatusModal = openStatusModal;
        window.goBack = goBack;
        
        console.log('📋 Global functions registered');
        
        loadEmployees();
      } catch (e) {
        console.error('Error parsing user data:', e);
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
