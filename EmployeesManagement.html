<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>إدارة الموظفين</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
    body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px;}
    .container{max-width:1400px;margin:0 auto;background:white;border-radius:30px;box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden;}

    .header{background:linear-gradient(135deg,#1e2b4f 0%,#152238 100%);color:white;padding:20px 30px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;}
    .header h2{color:#ffd966;font-size:22px;display:flex;align-items:center;gap:10px;}
    .hright{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
    .uname{background:rgba(255,255,255,0.1);padding:7px 16px;border-radius:40px;border:1px solid #ffd966;font-size:13px;}
    .back-btn{background:#2a4f8c;color:white;border:1px solid #ffd966;padding:8px 18px;border-radius:40px;cursor:pointer;font-weight:600;font-size:13px;transition:.2s;}
    .back-btn:hover{background:#ffd966;color:#1e2b4f;}
    .logout-btn{background:#ff6b6b;color:white;border:none;padding:8px 18px;border-radius:40px;cursor:pointer;font-weight:600;font-size:13px;}
    .logout-btn:hover{background:#ee5253;}

    .content{padding:28px;}

    /* STATS */
    .stats-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:22px;}
    .stat-card{flex:1;min-width:130px;background:#f0f4fa;border-radius:16px;padding:16px;text-align:center;border-left:4px solid #1e2b4f;}
    .stat-num{font-size:28px;font-weight:700;color:#1e2b4f;}
    .stat-lbl{font-size:11px;color:#6c757d;margin-top:4px;}

    /* TOOLBAR */
    .toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
    .btn-primary{background:#1e2b4f;color:white;border:none;padding:10px 20px;border-radius:40px;font-weight:600;font-size:13px;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px;}
    .btn-primary:hover{background:#ffd966;color:#1e2b4f;}
    .btn-secondary{background:#e9f0fa;color:#1e2b4f;border:none;padding:10px 20px;border-radius:40px;font-weight:600;font-size:13px;cursor:pointer;transition:.2s;}
    .btn-secondary:hover{background:#d0ddeb;}
    .btn-sm{padding:6px 12px;font-size:11px;}
    .btn-edit{background:#f39c12;color:white;border:none;padding:6px 12px;border-radius:40px;font-weight:600;font-size:11px;cursor:pointer;}
    .btn-edit:hover{background:#e67e22;}

    .search-bar{flex:1;max-width:400px;}
    .search-bar input{width:100%;padding:9px 14px;border:2px solid #e9f0fa;border-radius:40px;font-size:13px;}
    .search-bar input:focus{outline:none;border-color:#1e2b4f;}

    /* TABLE */
    .tbl-wrap{overflow-x:auto;border-radius:16px;box-shadow:0 4px 16px rgba(0,20,40,0.08);}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    thead th{background:#1e2b4f;color:#ffd966;padding:12px 10px;font-weight:600;white-space:nowrap;text-align:right;}
    tbody td{padding:10px;border-bottom:1px solid #e9f0fa;color:#2c3e50;vertical-align:middle;}
    tbody tr:hover{background:#f5f9ff;}
    .badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;color:white;white-space:nowrap;}
    .badge-active{background:#27ae60;}
    .badge-inactive{background:#e74c3c;}
    .badge-type{background:#3498db;}
    .badge-acc{background:#9b59b6;}

    /* EMPTY / LOADER */
    .empty{text-align:center;padding:60px 20px;color:#6c757d;}
    .empty .eico{font-size:60px;margin-bottom:16px;}
    .loader{border:4px solid #f3f3f3;border-top:4px solid #1e2b4f;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:40px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* MODAL */
    .modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9000;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
    .modal-ov.open{display:flex;}
    .modal-box{background:white;border-radius:24px;width:100%;max-width:750px;box-shadow:0 20px 60px rgba(0,0,0,0.35);margin:auto;}
    .modal-head{background:linear-gradient(135deg,#1e2b4f,#152238);color:white;padding:18px 24px;border-radius:24px 24px 0 0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1;}
    .modal-head h3{color:#ffd966;font-size:17px;}
    .modal-close{background:none;border:none;color:white;font-size:22px;cursor:pointer;line-height:1;}
    .modal-body{padding:24px;}

    /* FORM */
    .fsec{margin-bottom:20px;}
    .fsec-title{font-size:11px;font-weight:700;color:#1e2b4f;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid #e9f0fa;display:flex;align-items:center;gap:6px;}
    .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .fgrid.g3{grid-template-columns:1fr 1fr 1fr;}
    .full{grid-column:1/-1;}
    .field{display:flex;flex-direction:column;gap:5px;}
    .field label{font-size:12px;font-weight:600;color:#495057;}
    .field input,.field select,.field textarea{padding:9px 12px;border:2px solid #e9f0fa;border-radius:10px;font-size:13px;color:#2c3e50;background:white;transition:.15s;}
    .field input:focus,.field select:focus{outline:none;border-color:#1e2b4f;}
    .field input[readonly]{background:#f8f9fa;color:#6c757d;}
    .field textarea{resize:vertical;min-height:55px;}
    .full{grid-column:1/-1;}

    /* IMAGE UPLOAD */
    .img-upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .img-slot{border:2px dashed #dee2e6;border-radius:14px;padding:14px;text-align:center;cursor:pointer;transition:.2s;position:relative;background:#fafbfc;}
    .img-slot:hover{border-color:#1e2b4f;background:#f0f4fa;}
    .img-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
    .img-slot .slot-ico{font-size:28px;margin-bottom:6px;}
    .img-slot .slot-lbl{font-size:11px;color:#6c757d;font-weight:600;}
    .img-slot .slot-name{font-size:10px;color:#27ae60;margin-top:4px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .img-slot.has-img{border-color:#27ae60;background:#f0fff4;}
    .img-slot .slot-preview{width:60px;height:60px;object-fit:cover;border-radius:8px;margin-bottom:4px;}

    /* TOGGLE */
    .toggle-wrap{display:flex;align-items:center;gap:10px;padding:8px 0;}
    .toggle-lbl{font-size:13px;font-weight:600;color:#1e2b4f;}
    .toggle{position:relative;width:44px;height:24px;cursor:pointer;flex-shrink:0;}
    .toggle input{opacity:0;width:0;height:0;}
    .slider{position:absolute;inset:0;background:#ccc;border-radius:34px;transition:.3s;}
    .slider:before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s;}
    input:checked+.slider{background:#1e2b4f;}
    input:checked+.slider:before{transform:translateX(20px);}

    /* ACCESS BOX */
    .access-box{background:#f0f4fa;border-radius:14px;padding:16px;border:2px solid #dee2e6;transition:.2s;}
    .access-box.on{border-color:#1e2b4f;background:#e8edf8;}

    /* EMAIL PREVIEW */
    .email-preview{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:8px 12px;font-size:12px;color:#856404;margin-top:6px;display:none;}
    .email-preview.show{display:block;}
    .email-preview b{color:#1e2b4f;}

    /* EDIT BANNER */
    .edit-banner{background:linear-gradient(135deg,#f39c12,#e67e22);color:white;padding:10px 20px;border-radius:14px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
    .edit-banner span{font-size:13px;font-weight:600;}
    .edit-banner button{background:white;color:#e67e22;border:none;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;}

    /* ALERT */
    .al-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99999;align-items:center;justify-content:center;}
    .al-ov.open{display:flex;}
    .al-box{background:white;border-radius:24px;padding:30px;width:340px;text-align:center;box-shadow:0 16px 40px rgba(0,0,0,0.3);}
    .al-ico{font-size:44px;margin-bottom:10px;}
    .al-msg{font-size:14px;color:#1e2b4f;font-weight:600;margin-bottom:18px;line-height:1.6;}
    .al-btns{display:flex;gap:10px;justify-content:center;}
    .al-ok{padding:9px 26px;background:#1e2b4f;color:#ffd966;border:none;border-radius:40px;font-size:13px;font-weight:700;cursor:pointer;}
    .al-ok.red{background:#e74c3c;}
    .al-cancel{padding:9px 20px;background:#f8f9fa;color:#6c757d;border:2px solid #dee2e6;border-radius:40px;font-size:13px;cursor:pointer;}

    /* TOAST */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);padding:12px 24px;border-radius:40px;font-size:13px;font-weight:600;color:white;z-index:99999;opacity:0;transition:.4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
    .toast.ok{background:#27ae60;}
    .toast.err{background:#e74c3c;}

    /* MODAL FOOTER */
    .mfoot{display:flex;gap:10px;justify-content:flex-end;padding-top:14px;border-top:2px solid #e9f0fa;margin-top:4px;}

    @media(max-width:600px){.fgrid,.fgrid.g3{grid-template-columns:1fr;}.img-upload-grid{grid-template-columns:1fr 1fr;}}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>👥 إدارة الموظفين</h2>
    <div class="hright">
      <span class="uname" id="uname">—</span>
      <button class="back-btn" onclick="goBack()">🔙 رجوع</button>
      <button class="logout-btn" onclick="doLogout()">خروج</button>
    </div>
  </div>

  <div class="content" id="mainContent">
    <div class="loader"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ALERT -->
<div class="al-ov" id="alOv">
  <div class="al-box">
    <div class="al-ico" id="alIco">ℹ️</div>
    <div class="al-msg" id="alMsg"></div>
    <div class="al-btns" id="alBtns"><button class="al-ok" onclick="closeAl()">موافق</button></div>
  </div>
</div>

<!-- EMPLOYEE MODAL -->
<div class="modal-ov" id="empModal">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="modalTitle">➕ إضافة موظف جديد</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════
const GAS  = 'https://script.google.com/macros/s/AKfycbygznz2Q9GyNuHdpP3WAdt_PPtCmcIb-4CozLXAGoA1Y_smleOLIRjp59upbwDPf35h/exec';
const DASH = {Admin:'Dashboard.html',Owner:'OwnerDashboard.html',Sales:'SalesDashboard.html',Accountant:'AccountantDashboard.html'};
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let CU = null;
let allEmployees = [];
let branches = [];
let editingSerial = null;   // null = إضافة، string = تعديل
let imgFiles = {photo:'', idFront:'', idBack:'', security:''};

// ══════════════════════════════════════════════════════════════
// JSONP — GET فقط
// ══════════════════════════════════════════════════════════════
function gasGet(params) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*9999);
    const sc = document.createElement('script');
    const to = setTimeout(() => { delete window[cb]; sc.remove(); reject(new Error('Timeout')); }, 25000);
    window[cb] = d => { clearTimeout(to); delete window[cb]; sc.remove(); resolve(d); };
    sc.onerror = () => { clearTimeout(to); delete window[cb]; sc.remove(); reject(new Error('Network error')); };
    const url = new URL(GAS);
    Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, String(v)));
    url.searchParams.set('callback', cb);
    sc.src = url.toString();
    document.head.appendChild(sc);
  });
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  const ud = sessionStorage.getItem('currentUser');
  if (!ud) { location.href = 'index.html'; return; }
  try { CU = JSON.parse(ud); } catch { location.href = 'index.html'; return; }
  document.getElementById('uname').textContent = CU.name || '—';
  await reload();
});

async function reload() {
  document.getElementById('mainContent').innerHTML = '<div class="loader"></div>';
  try {
    const [emps, brs] = await Promise.all([
      gasGet({ action:'getAllEmployees' }),
      gasGet({ action:'getBranchesByCenter', centerId: CU.centerId||'' })
    ]);
    allEmployees = Array.isArray(emps) ? emps : [];
    branches     = Array.isArray(brs)  ? brs  : [];
  } catch(e) {
    showToast('خطأ في تحميل البيانات', 'err');
    allEmployees = []; branches = [];
  }
  renderList();
}

// ══════════════════════════════════════════════════════════════
// LIST
// ══════════════════════════════════════════════════════════════
function renderList(filter = '') {
  const rows = filter
    ? allEmployees.filter(e =>
        (e.name||'').toLowerCase().includes(filter.toLowerCase()) ||
        (e.serial||'').toLowerCase().includes(filter.toLowerCase()) ||
        (e.position||'').toLowerCase().includes(filter.toLowerCase()))
    : allEmployees;

  const active   = allEmployees.filter(e => e.status === 'نشط').length;
  const inactive = allEmployees.length - active;
  const hasAcc   = allEmployees.filter(e => e.hasAccount).length;

  document.getElementById('mainContent').innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${allEmployees.length}</div><div class="stat-lbl">إجمالي الموظفين</div></div>
      <div class="stat-card" style="border-color:#27ae60"><div class="stat-num" style="color:#27ae60">${active}</div><div class="stat-lbl">نشط</div></div>
      <div class="stat-card" style="border-color:#e74c3c"><div class="stat-num" style="color:#e74c3c">${inactive}</div><div class="stat-lbl">موقوف</div></div>
      <div class="stat-card" style="border-color:#9b59b6"><div class="stat-num" style="color:#9b59b6">${hasAcc}</div><div class="stat-lbl">لديهم حساب</div></div>
    </div>
    <div class="toolbar">
      <button class="btn-primary" onclick="openAdd()">➕ إضافة موظف</button>
      <div class="search-bar">
        <input type="text" placeholder="🔍 بحث بالاسم أو الرقم أو الوظيفة..."
               oninput="renderList(this.value)" value="${filter}">
      </div>
      <button class="btn-secondary" onclick="reload()">🔄 تحديث</button>
    </div>
    ${rows.length === 0 ? `
      <div class="empty"><div class="eico">👥</div>
        <p>${filter ? 'لا نتائج للبحث' : 'لا يوجد موظفون حتى الآن'}</p>
      </div>` : `
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>الرقم</th><th>الاسم</th><th>الوظيفة</th>
          <th>الراتب الأساسي</th><th>نظام الدفع</th>
          <th>تاريخ التعيين</th><th>الحالة</th><th>حساب النظام</th><th>إجراءات</th>
        </tr></thead>
        <tbody>
          ${rows.map(e => `
            <tr>
              <td><b>${e.serial||''}</b></td>
              <td>${e.name||''}</td>
              <td>${e.position||''}</td>
              <td>${Number(e.monthlySalary||0).toLocaleString()} LE</td>
              <td><span class="badge badge-type">${e.paymentSystem||'—'}</span></td>
              <td>${e.startDate||'—'}</td>
              <td><span class="badge ${e.status==='نشط'?'badge-active':'badge-inactive'}">${e.status||'—'}</span></td>
              <td>${e.hasAccount
                  ? `<span class="badge badge-acc">✓ ${e.userType||''}</span>`
                  : '<span style="color:#aaa;font-size:12px;">—</span>'}</td>
              <td>
                <button class="btn-edit" onclick="openEdit('${e.serial}')">✏️ تعديل</button>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`}`;
}

// ══════════════════════════════════════════════════════════════
// MODAL — OPEN ADD
// ══════════════════════════════════════════════════════════════
function openAdd() {
  editingSerial = null;
  imgFiles = {photo:'', idFront:'', idBack:'', security:''};
  document.getElementById('modalTitle').textContent = '➕ إضافة موظف جديد';
  document.getElementById('modalBody').innerHTML = buildForm(null);
  document.getElementById('empModal').classList.add('open');
  initFormEvents();
}

// ══════════════════════════════════════════════════════════════
// MODAL — OPEN EDIT
// ══════════════════════════════════════════════════════════════
function openEdit(serial) {
  const emp = allEmployees.find(e => e.serial === serial);
  if (!emp) return;
  editingSerial = serial;
  imgFiles = {photo:'', idFront:'', idBack:'', security:''};
  document.getElementById('modalTitle').textContent = '✏️ تعديل بيانات الموظف';
  document.getElementById('modalBody').innerHTML = buildForm(emp);
  document.getElementById('empModal').classList.add('open');
  initFormEvents();
  // pre-fill access toggle
  if (emp.hasAccount) {
    const chk = document.getElementById('fAccess');
    if (chk) { chk.checked = true; toggleAccessBox(); }
  }
}

function closeModal() {
  document.getElementById('empModal').classList.remove('open');
  editingSerial = null;
}

// ══════════════════════════════════════════════════════════════
// BUILD FORM
// ══════════════════════════════════════════════════════════════
function buildForm(emp) {
  const isEdit = !!emp;
  const branchOpts = branches.map(b =>
    `<option value="${b.id}" ${emp && b.id===emp.branchId?'selected':''}>${b.name||b.id}</option>`
  ).join('');

  const paySystems = ['مرتب فقط','مرتب+عمولة','عمولة فقط'];
  const paySysOpts = paySystems.map(p =>
    `<option value="${p}" ${emp && p===emp.paymentSystem?'selected':''}>${p}</option>`
  ).join('');

  const statusOpts = ['نشط','موقوف'].map(s =>
    `<option value="${s}" ${emp && s===emp.status?'selected':''}>${s}</option>`
  ).join('');

  const userTypeOpts = ['Sales','Accountant','Admin','Owner'].map(t =>
    `<option value="${t}" ${emp && t===emp.userType?'selected':''}>${t}</option>`
  ).join('');

  const accessChecked = isEdit && emp.hasAccount ? 'checked' : '';
  const accessDisplay = isEdit && emp.hasAccount ? '' : 'display:none';

  return `
  ${isEdit ? `
  <div class="edit-banner">
    <span>🔶 وضع التعديل — الموظف: <b>${emp.name}</b> (${emp.serial})</span>
    <button onclick="closeModal()">إلغاء</button>
  </div>` : ''}

  <!-- البيانات الأساسية -->
  <div class="fsec">
    <div class="fsec-title">📋 البيانات الأساسية</div>
    <div class="fgrid">
      ${isEdit ? `<div class="field"><label>الرقم الوظيفي</label><input type="text" value="${emp.serial}" readonly></div>` : ''}
      <div class="field ${isEdit?'':'full'}">
        <label>الاسم الكامل *</label>
        <input type="text" id="fName" placeholder="الاسم الكامل" value="${emp?.name||''}">
      </div>
      <div class="field">
        <label>الوظيفة *</label>
        <input type="text" id="fPos" placeholder="مثال: Sales, Guide" value="${emp?.position||''}">
      </div>
      <div class="field">
        <label>الفرع *</label>
        <select id="fBranch">
          <option value="">— اختر الفرع —</option>
          ${branchOpts}
        </select>
      </div>
      <div class="field">
        <label>تاريخ التعيين *</label>
        <input type="date" id="fStart" value="${emp?.startDate ? toInputDate(emp.startDate) : ''}">
      </div>
      <div class="field">
        <label>رقم الهاتف</label>
        <input type="text" id="fPhone" placeholder="01xxxxxxxxx" value="${emp?.phone||''}">
      </div>
      ${isEdit ? `
      <div class="field">
        <label>الحالة</label>
        <select id="fStatus">${statusOpts}</select>
      </div>` : ''}
    </div>
  </div>

  <!-- الراتب -->
  <div class="fsec">
    <div class="fsec-title">💰 بيانات الراتب</div>
    <div class="fgrid">
      <div class="field">
        <label>نظام الدفع *</label>
        <select id="fPaySys" onchange="onPayChange()">${paySysOpts}</select>
      </div>
      <div class="field" id="salField">
        <label>الراتب الشهري (LE) *</label>
        <input type="number" id="fSalary" placeholder="0" min="0" value="${emp?.monthlySalary||''}">
      </div>
    </div>
  </div>

  <!-- صور الموظف -->
  <div class="fsec">
    <div class="fsec-title">📸 صور الموظف (اختياري)</div>
    <div class="img-upload-grid">
      ${buildImgSlot('photo',   '🤳', 'صورة الموظف')}
      ${buildImgSlot('idFront', '🪪', 'البطاقة الشخصية (وجه)')}
      ${buildImgSlot('idBack',  '🪪', 'البطاقة الشخصية (ظهر)')}
      ${buildImgSlot('security','🔍', 'الاستعلام الأمني')}
    </div>
    <small style="color:#aaa;font-size:11px;margin-top:6px;display:block;">⚠️ الصور تُرفع كـ Base64 وتُخزَّن في Google Sheets — الحجم الأقصى 1MB لكل صورة</small>
  </div>

  <!-- حساب النظام -->
  <div class="fsec">
    <div class="fsec-title">🔐 حساب النظام</div>
    <div class="toggle-wrap">
      <label class="toggle">
        <input type="checkbox" id="fAccess" ${accessChecked} onchange="toggleAccessBox()">
        <span class="slider"></span>
      </label>
      <span class="toggle-lbl">لديه حساب في النظام</span>
    </div>
    <div class="access-box ${accessChecked?'on':''}" id="accessBox" style="${accessDisplay}">
      <div class="fgrid">
        <div class="field">
          <label>نوع المستخدم</label>
          <select id="fUserType">${userTypeOpts}</select>
        </div>
        <div class="field">
          <label>كلمة المرور *</label>
          <input type="text" id="fPass" placeholder="123456" value="${isEdit&&emp.hasAccount?'••••••':'123456'}">
        </div>
      </div>
      <!-- الإيميل التلقائي -->
      <div style="margin-top:10px;">
        <div class="field">
          <label>البريد الإلكتروني <span style="color:#27ae60;font-size:10px;">(يُولَّد تلقائياً)</span></label>
          <input type="email" id="fEmail" placeholder="سيُولَّد تلقائياً..." value="${isEdit&&emp.email?emp.email:''}" ${isEdit&&emp.email?'':'readonly'}>
        </div>
        <div class="email-preview ${!isEdit?'show':''}" id="emailPreview">
          📧 البريد المقترح: <b id="emailSugg">—</b>
          <span style="font-size:10px;color:#6c757d;margin-right:6px;">(يمكنك التعديل بعد التوليد)</span>
        </div>
      </div>
      <small style="color:#6c757d;font-size:11px;margin-top:8px;display:block;">
        ⚠️ يُستخدم <b>البريد الإلكتروني + كلمة المرور</b> لتسجيل الدخول للنظام
      </small>
    </div>
  </div>

  <div class="mfoot">
    <button class="btn-secondary" onclick="closeModal()">إلغاء</button>
    <button class="btn-primary" id="saveBtn" onclick="saveEmployee()">
      ${isEdit ? '💾 حفظ التعديلات' : '💾 إضافة الموظف'}
    </button>
  </div>`;
}

function buildImgSlot(key, ico, label) {
  return `
    <div class="img-slot" id="slot_${key}">
      <input type="file" accept="image/*" onchange="onImgSelect('${key}',this)">
      <div class="slot-ico">${ico}</div>
      <div class="slot-lbl">${label}</div>
      <div class="slot-name" id="slotName_${key}"></div>
    </div>`;
}

// ══════════════════════════════════════════════════════════════
// FORM EVENTS
// ══════════════════════════════════════════════════════════════
function initFormEvents() {
  // توليد الإيميل عند تغيير الاسم
  const nameInput = document.getElementById('fName');
  if (nameInput) {
    nameInput.addEventListener('input', () => {
      if (!editingSerial) generateEmail();
    });
  }
  // إخفاء/إظهار حقل الراتب
  onPayChange();
  // إخفاء access box
  toggleAccessBox();
}

function onPayChange() {
  const sys = document.getElementById('fPaySys')?.value;
  const sf  = document.getElementById('salField');
  if (sf) sf.style.display = sys === 'عمولة فقط' ? 'none' : '';
}

function toggleAccessBox() {
  const chk = document.getElementById('fAccess');
  const box = document.getElementById('accessBox');
  if (!chk || !box) return;
  box.style.display = chk.checked ? '' : 'none';
  box.classList.toggle('on', chk.checked);
  if (chk.checked && !editingSerial) generateEmail();
}

// توليد الإيميل التلقائي
function generateEmail() {
  const name = (document.getElementById('fName')?.value || '').trim();
  if (!name) return;

  // تحويل الاسم: أول كلمتين بحروف إنجليزية صغيرة
  const parts = name.split(/\s+/).slice(0,2);
  const latin = parts.map(p => translitAr(p)).join('.').toLowerCase().replace(/[^a-z0-9.]/g,'');
  if (!latin) return;

  // التحقق من التكرار في allEmployees (المحلية) ← للتوقع فقط
  const domain = 'staff.divecenter';
  let candidate = `${latin}@${domain}.com`;
  const existingEmails = allEmployees.map(e => (e.email||'').toLowerCase());
  let suffix = 1;
  while (existingEmails.includes(candidate)) {
    candidate = `${latin}${suffix}@${domain}.com`;
    suffix++;
  }

  const emailInput = document.getElementById('fEmail');
  const preview    = document.getElementById('emailPreview');
  const sugg       = document.getElementById('emailSugg');
  if (emailInput) { emailInput.value = candidate; emailInput.readOnly = false; }
  if (preview)    preview.classList.add('show');
  if (sugg)       sugg.textContent = candidate;
}

// تحويل بسيط عربي → لاتيني
function translitAr(str) {
  const map = {
    'ا':'a','أ':'a','إ':'a','آ':'a','ب':'b','ت':'t','ث':'th','ج':'g','ح':'h','خ':'kh',
    'د':'d','ذ':'dh','ر':'r','ز':'z','س':'s','ش':'sh','ص':'s','ض':'d','ط':'t','ظ':'z',
    'ع':'a','غ':'gh','ف':'f','ق':'q','ك':'k','ل':'l','م':'m','ن':'n','ه':'h','و':'w',
    'ي':'y','ى':'a','ة':'h','ء':'','ئ':'y','ؤ':'w','لا':'la'
  };
  return str.split('').map(c => map[c] !== undefined ? map[c] : (/[a-zA-Z0-9]/.test(c)?c:'')).join('');
}

// ══════════════════════════════════════════════════════════════
// IMAGE SELECTION
// ══════════════════════════════════════════════════════════════
function onImgSelect(key, input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 1048576) {
    showToast('الصورة أكبر من 1MB — اختر صورة أصغر', 'err');
    input.value = ''; return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    imgFiles[key] = e.target.result; // base64
    const slot = document.getElementById('slot_' + key);
    const nm   = document.getElementById('slotName_' + key);
    if (slot) slot.classList.add('has-img');
    if (nm)   nm.textContent = '✓ ' + file.name;
  };
  reader.readAsDataURL(file);
}

// ══════════════════════════════════════════════════════════════
// SAVE EMPLOYEE
// ══════════════════════════════════════════════════════════════
async function saveEmployee() {
  const g = id => (document.getElementById(id)?.value || '').trim();
  const hasAccess = document.getElementById('fAccess')?.checked || false;
  const isEdit    = !!editingSerial;

  // ── Validation ──
  const errs = [];
  if (!g('fName'))   errs.push('الاسم الكامل');
  if (!g('fPos'))    errs.push('الوظيفة');
  if (!g('fBranch')) errs.push('الفرع');
  if (!g('fStart'))  errs.push('تاريخ التعيين');
  if (g('fPaySys') !== 'عمولة فقط' && !g('fSalary')) errs.push('الراتب الشهري');
  if (hasAccess && !g('fPass'))  errs.push('كلمة المرور');
  if (errs.length) { showAl('⚠️','يرجى تعبئة: ' + errs.join('، ')); return; }

  const selBranch = branches.find(b => b.id === g('fBranch')) || {};
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '⏳ جاري الحفظ...';

  try {
    const params = {
      action:           isEdit ? 'updateEmployee' : 'addNewEmployee',
      serial:           editingSerial || '',
      fullName:         g('fName'),
      position:         g('fPos'),
      monthlySalary:    g('fPaySys') === 'عمولة فقط' ? 0 : (parseFloat(g('fSalary'))||0),
      phone:            g('fPhone'),
      startDate:        g('fStart'),
      branchId:         g('fBranch'),
      branchName:       selBranch.name || '',
      paymentSystem:    g('fPaySys'),
      status:           isEdit ? (g('fStatus') || 'نشط') : 'نشط',
      centerId:         CU.centerId   || '',
      centerName:       CU.centerName || '',
      hasSystemAccess:  hasAccess ? 'true' : 'false',
      userType:         g('fUserType') || 'Sales',
      email:            g('fEmail'),
      password:         g('fPass') || '123456',
      // صور base64
      imgPhoto:         imgFiles.photo    || '',
      imgIdFront:       imgFiles.idFront  || '',
      imgIdBack:        imgFiles.idBack   || '',
      imgSecurity:      imgFiles.security || ''
    };

    const res = await gasGet(params);
    if (res && res.success) {
      showToast(`✅ ${isEdit?'تم تعديل':'تم إضافة'} الموظف: ${res.serial||editingSerial}`, 'ok');
      closeModal();
      await reload();
    } else {
      showAl('❌', res?.message || 'فشلت العملية');
    }
  } catch(e) {
    showAl('❌', 'خطأ في الاتصال: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = isEdit ? '💾 حفظ التعديلات' : '💾 إضافة الموظف';
  }
}

// ══════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════
function toInputDate(str) {
  if (!str) return '';
  // dd/Mmm/yyyy → yyyy-MM-dd
  const m = str.match(/^(\d{2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (m) {
    const mn = MONTHS.findIndex(x => x.toLowerCase()===m[2].toLowerCase());
    if (mn>=0) return `${m[3]}-${String(mn+1).padStart(2,'0')}-${m[1]}`;
  }
  return str;
}

function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.className='toast', 3500);
}

let _alCb = null;
function showAl(ico, msg) {
  document.getElementById('alIco').textContent = ico;
  document.getElementById('alMsg').innerHTML = msg;
  document.getElementById('alBtns').innerHTML = '<button class="al-ok" onclick="closeAl()">موافق</button>';
  _alCb = null;
  document.getElementById('alOv').classList.add('open');
}
function showConfirm(ico, msg, cb) {
  document.getElementById('alIco').textContent = ico;
  document.getElementById('alMsg').innerHTML = msg;
  document.getElementById('alBtns').innerHTML =
    '<button class="al-cancel" onclick="closeAl()">إلغاء</button>' +
    '<button class="al-ok red" onclick="alYes()">نعم</button>';
  _alCb = cb;
  document.getElementById('alOv').classList.add('open');
}
function alYes() { closeAl(); if (_alCb) _alCb(); }
function closeAl() { document.getElementById('alOv').classList.remove('open'); }

function goBack()   { location.href = DASH[CU?.type] || 'AccountantDashboard.html'; }
function doLogout() {
  showConfirm('❓','هل تريد تسجيل الخروج؟', () => {
    sessionStorage.removeItem('currentUser'); location.href='index.html';
  });
}
