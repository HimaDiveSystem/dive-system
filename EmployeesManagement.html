<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>إدارة الموظفين - نظام المرتبات</title>
  <style>
    /* نفس التنسيقات السابقة ولكن مبسطة */
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
    body { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; padding:20px; }
    .container { max-width:1200px; margin:0 auto; background:white; border-radius:30px; box-shadow:0 20px 60px rgba(0,0,0,0.3); overflow:hidden; }
    .header { background:linear-gradient(135deg,#1e2b4f 0%,#152238 100%); color:white; padding:20px 30px; display:flex; justify-content:space-between; align-items:center; }
    .header h2 { color:#ffd966; display:flex; align-items:center; gap:10px; }
    .back-btn { background:#ffd966; color:#1e2b4f; border:none; padding:8px 20px; border-radius:40px; cursor:pointer; font-weight:600; }
    .content { padding:30px; }
    .action-bar { display:flex; gap:15px; margin-bottom:25px; flex-wrap:wrap; }
    .btn-primary { background:#1e2b4f; color:white; border:none; padding:12px 25px; border-radius:40px; cursor:pointer; }
    .btn-success { background:#27ae60; color:white; border:none; padding:12px 25px; border-radius:40px; cursor:pointer; }
    table { width:100%; border-collapse:collapse; background:white; border-radius:15px; overflow:hidden; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
    th { background:#1e2b4f; color:white; padding:15px; }
    td { padding:12px; border-bottom:1px solid #dee2e6; text-align:center; }
    .status-active { color:#27ae60; font-weight:600; }
    .status-inactive { color:#e74c3c; font-weight:600; }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:10000; }
    .modal-content { background:white; width:90%; max-width:800px; border-radius:30px; padding:30px; max-height:90vh; overflow-y:auto; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>📋 إدارة الموظفين</h2>
      <button class="back-btn" onclick="goBack()">🔙 العودة للوحة المحاسب</button>
    </div>
    <div class="content" id="content">
      <div class="action-bar">
        <button class="btn-success" onclick="openAddModal()">➕ إضافة موظف جديد</button>
        <button class="btn-primary" onclick="loadEmployees()">🔄 تحديث</button>
      </div>
      <div id="employeesTable">جاري التحميل...</div>
    </div>
  </div>

  <script>
    let currentUser = null;
    let employees = [];
    let currentSerial = null;
    
    // رابط Web App (استبدله بالرابط الخاص بك)
    const APP_URL = 'https://script.google.com/macros/s/AKfycbyB4ZzI5UJibARWEXXSmtLYACNWqiYvv1GC_zeeBsZFMcW7pOFskDDkbiNF50zdWorq/exec';
    
    function goBack() { window.location.href = 'AccountantDashboard.html'; }
    
    async function callApi(action, params = {}) {
      const url = new URL(APP_URL);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
      const res = await fetch(url.toString());
      return res.json();
    }
    
    async function loadEmployees() {
      document.getElementById('employeesTable').innerHTML = '<div class="loader"></div>';
      const result = await callApi('getAllEmployees');
      if (Array.isArray(result)) {
        employees = result;
        displayTable();
      }
    }
    
    function displayTable() {
      let html = `
        <table>
          <thead>
            <tr>
              <th>الرقم</th>
              <th>الاسم</th>
              <th>الوظيفة</th>
              <th>الراتب</th>
              <th>نظام الحساب</th>
              <th>الحالة</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody>
      `;
      
      employees.forEach(emp => {
        html += `
          <tr>
            <td>${emp.serial}</td>
            <td>${emp.name}</td>
            <td>${emp.position}</td>
            <td>${emp.monthlySalary}</td>
            <td>${emp.paymentSystem}</td>
            <td class="${emp.status === 'نشط' ? 'status-active' : 'status-inactive'}">${emp.status}</td>
            <td>
              <button onclick="viewHistory('${emp.serial}')">📜 سجل</button>
              <button onclick="editSalary('${emp.serial}')">💰 راتب</button>
              <button onclick="changeStatus('${emp.serial}')">⛔ حالة</button>
            </td>
          </tr>
        `;
      });
      
      html += '</tbody></table>';
      document.getElementById('employeesTable').innerHTML = html;
    }
    
    // باقي الدوال (viewHistory, editSalary, changeStatus, addEmployee...)
    
    document.addEventListener('DOMContentLoaded', () => {
      const user = sessionStorage.getItem('currentUser');
      if (!user) { window.location.href = 'index.html'; return; }
      currentUser = JSON.parse(user);
      loadEmployees();
    });
  </script>
</body>
</html>
