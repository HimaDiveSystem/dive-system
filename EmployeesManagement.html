<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>إدارة الموظفين - نظام المرتبات</title>
  <style>
    /* نفس التنسيقات السابقة */
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
    body { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; padding:20px; }
    .container { max-width:1200px; margin:0 auto; background:white; border-radius:30px; box-shadow:0 20px 60px rgba(0,0,0,0.3); overflow:hidden; }
    .header { background:linear-gradient(135deg,#1e2b4f 0%,#152238 100%); color:white; padding:20px 30px; display:flex; justify-content:space-between; align-items:center; }
    .header h2 { color:#ffd966; display:flex; align-items:center; gap:10px; }
    .back-btn { background:#ffd966; color:#1e2b4f; border:none; padding:8px 20px; border-radius:40px; cursor:pointer; font-weight:600; }
    .content { padding:30px; }
    .action-bar { display:flex; gap:15px; margin-bottom:25px; flex-wrap:wrap; }
    .btn-primary { background:#1e2b4f; color:white; border:none; padding:12px 25px; border-radius:40px; cursor:pointer; font-weight:600; }
    .btn-success { background:#27ae60; color:white; border:none; padding:12px 25px; border-radius:40px; cursor:pointer; font-weight:600; }
    table { width:100%; border-collapse:collapse; background:white; border-radius:15px; overflow:hidden; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
    th { background:#1e2b4f; color:white; padding:15px; }
    td { padding:12px; border-bottom:1px solid #dee2e6; text-align:center; }
    
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:10000; overflow-y:auto; }
    .modal-content { background:white; width:90%; max-width:900px; border-radius:30px; padding:30px; max-height:90vh; overflow-y:auto; }
    .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:2px solid #e9f0fa; padding-bottom:15px; }
    .close-modal { font-size:30px; cursor:pointer; color:#95a5a6; }
    .close-modal:hover { color:#e74c3c; }
    
    .tabs { display:flex; gap:10px; margin-bottom:25px; flex-wrap:wrap; }
    .tab { padding:12px 25px; background:#e9f0fa; border-radius:40px; cursor:pointer; font-weight:600; color:#1e2b4f; }
    .tab.active { background:#1e2b4f; color:white; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    
    .form-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; margin-bottom:20px; }
    .form-group { margin-bottom:15px; }
    .form-group label { display:block; margin-bottom:8px; color:#1e2b4f; font-weight:600; }
    .form-group input, .form-group select { width:100%; padding:12px; border:2px solid #e9f0fa; border-radius:12px; }
    .form-group.checkbox { display:flex; align-items:center; gap:10px; }
    .form-group.checkbox input { width:auto; }
    
    .image-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; }
    .image-preview { width:100%; height:150px; border:2px dashed #dee2e6; border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; background-size:cover; background-position:center; }
    .image-preview:hover { border-color:#1e2b4f; }
    
    .loader { border:4px solid #f3f3f3; border-top:4px solid #1e2b4f; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:20px auto; }
    @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>📋 إدارة الموظفين</h2>
      <button class="back-btn" onclick="window.location.href='AccountantDashboard.html'">🔙 العودة</button>
    </div>
    <div class="content">
      <div class="action-bar">
        <button class="btn-success" onclick="openAddModal()">➕ إضافة موظف جديد</button>
        <button class="btn-primary" onclick="loadEmployees()">🔄 تحديث</button>
      </div>
      <div id="employeesTable" style="text-align:center; padding:20px;">جاري التحميل...</div>
    </div>
  </div>

  <!-- مودال إضافة موظف جديد -->
  <div id="addModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>➕ إضافة موظف جديد</h3>
        <span class="close-modal" onclick="closeModal('addModal')">&times;</span>
      </div>
      
      <div class="tabs">
        <div class="tab active" onclick="switchTab('basic')">📋 بيانات أساسية</div>
        <div class="tab" onclick="switchTab('system')">💻 بيانات النظام</div>
        <div class="tab" onclick="switchTab('images')">🖼️ الصور</div>
      </div>
      
      <!-- تبويب البيانات الأساسية -->
      <div id="tab-basic" class="tab-content active">
        <div class="form-grid">
          <div class="form-group">
            <label>الاسم الكامل *</label>
            <input type="text" id="empName" placeholder="أدخل الاسم الكامل">
          </div>
          <div class="form-group">
            <label>الوظيفة *</label>
            <select id="empPosition">
              <option value="">اختر الوظيفة</option>
              <option value="Admin">مدير النظام</option>
              <option value="Owner">صاحب مركز</option>
              <option value="Accountant">محاسب</option>
              <option value="Sales">سيلز</option>
              <option value="Employee">موظف عادي</option>
              <option value="Technician">فني</option>
              <option value="Cleaner">عامل نظافة</option>
            </select>
          </div>
          <div class="form-group">
            <label>الراتب الشهري</label>
            <input type="number" id="empSalary" placeholder="0">
          </div>
          <div class="form-group">
            <label>رقم الهاتف</label>
            <input type="text" id="empPhone" placeholder="رقم الهاتف">
          </div>
          <div class="form-group">
            <label>تاريخ بداية العمل *</label>
            <input type="date" id="empStartDate">
          </div>
          <div class="form-group">
            <label>الفرع *</label>
            <select id="empBranch">
              <option value="">اختر الفرع</option>
            </select>
          </div>
          <div class="form-group">
            <label>نظام الحساب *</label>
            <select id="empPaymentSystem">
              <option value="مرتب فقط">مرتب فقط</option>
              <option value="مرتب+عمولة">مرتب + عمولة</option>
              <option value="عمولة فقط">عمولة فقط</option>
            </select>
          </div>
        </div>
        <div style="display:flex; justify-content:flex-start;">
          <button class="btn-primary" onclick="switchTab('system')">التالي: بيانات النظام ▶</button>
        </div>
      </div>
      
      <!-- تبويب بيانات النظام -->
      <div id="tab-system" class="tab-content">
        <div class="form-group checkbox">
          <input type="checkbox" id="empHasAccess" onchange="toggleSystemFields()">
          <label>لديه حساب في النظام</label>
        </div>
        
        <div id="systemFields" style="display:none;">
          <div class="form-grid">
            <div class="form-group">
              <label>اسم المستخدم (الاسم الحركي)</label>
              <input type="text" id="empUsername" placeholder="مثال: ahmed" oninput="generateEmail()">
            </div>
            <div class="form-group">
              <label>كلمة المرور</label>
              <input type="password" id="empPassword" placeholder="كلمة المرور">
            </div>
            <div class="form-group">
              <label>البريد الإلكتروني</label>
              <input type="email" id="empEmail" readonly placeholder="سيتولد تلقائياً">
            </div>
            <div class="form-group">
              <label>نوع المستخدم</label>
              <select id="empUserType">
                <option value="Employee">موظف</option>
                <option value="Accountant">محاسب</option>
                <option value="Sales">سيلز</option>
                <option value="Admin">مدير</option>
                <option value="Owner">صاحب مركز</option>
              </select>
            </div>
            <div class="form-group">
              <label>العنوان</label>
              <input type="text" id="empAddress" placeholder="العنوان">
            </div>
          </div>
        </div>
        
        <div style="display:flex; justify-content:space-between; margin-top:20px;">
          <button class="btn-primary" onclick="switchTab('basic')">▶ السابق</button>
          <button class="btn-primary" onclick="switchTab('images')">التالي: الصور ▶</button>
        </div>
      </div>
      
      <!-- تبويب الصور -->
      <div id="tab-images" class="tab-content">
        <div class="image-grid">
          <div class="form-group">
            <label>صورة الموظف</label>
            <div class="image-preview" id="previewEmployee" onclick="uploadImage('employee')">
              <span style="font-size:40px;">➕</span>
            </div>
            <input type="file" id="empImageEmployee" accept="image/*" style="display:none;" onchange="previewImage(this, 'previewEmployee')">
          </div>
          
          <div class="form-group">
            <label>البطاقة الشخصية (وجه)</label>
            <div class="image-preview" id="previewIdFront" onclick="uploadImage('idFront')">
              <span style="font-size:40px;">➕</span>
            </div>
            <input type="file" id="empImageIdFront" accept="image/*" style="display:none;" onchange="previewImage(this, 'previewIdFront')">
          </div>
          
          <div class="form-group">
            <label>البطاقة الشخصية (ظهر)</label>
            <div class="image-preview" id="previewIdBack" onclick="uploadImage('idBack')">
              <span style="font-size:40px;">➕</span>
            </div>
            <input type="file" id="empImageIdBack" accept="image/*" style="display:none;" onchange="previewImage(this, 'previewIdBack')">
          </div>
          
          <div class="form-group">
            <label>الاستعلام الأمني</label>
            <div class="image-preview" id="previewSecurity" onclick="uploadImage('security')">
              <span style="font-size:40px;">➕</span>
            </div>
            <input type="file" id="empImageSecurity" accept="image/*" style="display:none;" onchange="previewImage(this, 'previewSecurity')">
          </div>
        </div>
        
        <div style="display:flex; justify-content:space-between; margin-top:20px;">
          <button class="btn-primary" onclick="switchTab('system')">▶ السابق</button>
          <button class="btn-success" onclick="saveNewEmployee()">💾 حفظ الموظف</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // الرابط الثابت - استبدله بالرابط الخاص بك
    const APP_URL = 'https://script.google.com/macros/s/AKfycbyB4ZzI5UJibARWEXXSmtLYACNWqiYvv1GC_zeeBsZFMcW7pOFskDDkbiNF50zdWorq/exec';
    
    let currentUser = null;
    let employees = [];
    let branches = [];

    // ================ دوال مساعدة ================
    function closeModal(modalId) {
      document.getElementById(modalId).style.display = 'none';
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      if (tabName === 'basic') {
        document.querySelectorAll('.tab')[0].classList.add('active');
      } else if (tabName === 'system') {
        document.querySelectorAll('.tab')[1].classList.add('active');
      } else if (tabName === 'images') {
        document.querySelectorAll('.tab')[2].classList.add('active');
      }
      
      document.getElementById(`tab-${tabName}`).classList.add('active');
    }

    function toggleSystemFields() {
      const hasAccess = document.getElementById('empHasAccess').checked;
      document.getElementById('systemFields').style.display = hasAccess ? 'block' : 'none';
      if (hasAccess) generateEmail();
    }

    function generateEmail() {
      const username = document.getElementById('empUsername').value;
      const position = document.getElementById('empPosition').value;
      const centerName = currentUser?.centerName || 'center';
      
      if (username && position) {
        const cleanUser = username.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
        const cleanPos = position.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
        const cleanCenter = centerName.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
        document.getElementById('empEmail').value = `${cleanUser}${cleanPos}@${cleanCenter}.com`;
      }
    }

    function uploadImage(type) {
      document.getElementById(`empImage${type.charAt(0).toUpperCase() + type.slice(1)}`).click();
    }

    function previewImage(input, previewId) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const preview = document.getElementById(previewId);
          preview.style.backgroundImage = `url('${e.target.result}')`;
          preview.style.backgroundSize = 'cover';
          preview.innerHTML = '';
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    async function callApi(action, params = {}, method = 'GET') {
      try {
        const url = new URL(APP_URL);
        url.searchParams.set('action', action);
        Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
        
        console.log(`Calling API: ${action}`, params);
        
        const res = await fetch(url.toString());
        const data = await res.json();
        
        console.log(`API Response for ${action}:`, data);
        return data;
      } catch (error) {
        console.error('API Error:', error);
        return { success: false, message: error.message };
      }
    }

    // ================ تحميل الفروع ================
    async function loadBranches() {
      const result = await callApi('getActiveBranches');
      if (Array.isArray(result)) {
        branches = result;
        const select = document.getElementById('empBranch');
        select.innerHTML = '<option value="">اختر الفرع</option>';
        branches.forEach(b => {
          select.innerHTML += `<option value="${b.id}">${b.name}</option>`;
        });
      }
    }

    // ================ عرض الموظفين ================
    async function loadEmployees() {
      document.getElementById('employeesTable').innerHTML = '<div class="loader"></div>';
      const result = await callApi('getAllEmployees');
      if (Array.isArray(result)) {
        employees = result;
        displayTable();
      } else {
        document.getElementById('employeesTable').innerHTML = '<p>خطأ في تحميل البيانات</p>';
      }
    }

    function displayTable() {
      let html = `
        <table>
          <thead>
            <tr>
              <th>الرقم</th>
              <th>الاسم</th>
              <th>الوظيفة</th>
              <th>الراتب</th>
              <th>نظام الحساب</th>
              <th>الحالة</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody>
      `;
      
      employees.forEach(emp => {
        html += `
          <tr>
            <td>${emp.serial}</td>
            <td>${emp.name}</td>
            <td>${emp.position}</td>
            <td>${emp.monthlySalary}</td>
            <td>${emp.paymentSystem}</td>
            <td>${emp.status}</td>
            <td>
              <button class="btn-primary" style="padding:5px 10px;" onclick="viewHistory('${emp.serial}')">📜 سجل</button>
              <button class="btn-success" style="padding:5px 10px;" onclick="openSalaryModal('${emp.serial}')">💰 راتب</button>
              <button class="btn-danger" style="padding:5px 10px;" onclick="openStatusModal('${emp.serial}')">⛔ حالة</button>
            </td>
          </tr>
        `;
      });
      
      html += '</tbody></table>';
      document.getElementById('employeesTable').innerHTML = html;
    }

    // ================ فتح مودال الإضافة ================
    function openAddModal() {
      // تفريغ الحقول
      document.getElementById('empName').value = '';
      document.getElementById('empPosition').value = '';
      document.getElementById('empSalary').value = '';
      document.getElementById('empPhone').value = '';
      document.getElementById('empStartDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('empPaymentSystem').value = 'مرتب فقط';
      
      // تفريغ حقول النظام
      document.getElementById('empHasAccess').checked = false;
      document.getElementById('systemFields').style.display = 'none';
      document.getElementById('empUsername').value = '';
      document.getElementById('empPassword').value = '';
      document.getElementById('empEmail').value = '';
      document.getElementById('empAddress').value = '';
      document.getElementById('empUserType').value = 'Employee';
      
      // تفريغ معاينات الصور
      ['previewEmployee', 'previewIdFront', 'previewIdBack', 'previewSecurity'].forEach(id => {
        const el = document.getElementById(id);
        el.style.backgroundImage = '';
        el.innerHTML = '<span style="font-size:40px;">➕</span>';
      });
      
      // تحميل الفروع
      loadBranches();
      
      // العودة للتبويب الأول
      switchTab('basic');
      
      // عرض المودال
      document.getElementById('addModal').style.display = 'flex';
    }

    // ================ حفظ الموظف الجديد ================
    async function saveNewEmployee() {
      // التحقق من الحقول المطلوبة
      const name = document.getElementById('empName').value;
      const position = document.getElementById('empPosition').value;
      const startDate = document.getElementById('empStartDate').value;
      const branchId = document.getElementById('empBranch').value;
      
      if (!name || !position || !startDate || !branchId) {
        alert('يرجى ملء جميع الحقول المطلوبة');
        return;
      }
      
      // تجميع البيانات
      const data = {
        action: 'addNewEmployee', // مهم جداً
        fullName: name,
        position: position,
        monthlySalary: parseFloat(document.getElementById('empSalary').value) || 0,
        phone: document.getElementById('empPhone').value,
        startDate: startDate,
        branchId: branchId,
        branchName: branches.find(b => b.id === branchId)?.name || '',
        paymentSystem: document.getElementById('empPaymentSystem').value,
        hasSystemAccess: document.getElementById('empHasAccess').checked,
        centerId: currentUser?.centerId,
        centerName: currentUser?.centerName
      };
      
      // بيانات النظام إذا وجدت
      if (data.hasSystemAccess) {
        if (!document.getElementById('empPassword').value) {
          alert('كلمة المرور مطلوبة للمستخدمين');
          return;
        }
        data.username = document.getElementById('empUsername').value;
        data.password = document.getElementById('empPassword').value;
        data.email = document.getElementById('empEmail').value;
        data.userType = document.getElementById('empUserType').value;
        data.address = document.getElementById('empAddress').value;
      }
      
      console.log('Sending data:', data);
      
      // استخدام POST مع البيانات كـ JSON
      try {
        const response = await fetch(APP_URL, {
          method: 'POST',
          body: JSON.stringify(data),
          headers: {
            'Content-Type': 'application/json'
          }
        });
        
        const result = await response.json();
        console.log('Save result:', result);
        
        if (result.success) {
          alert('تم إضافة الموظف بنجاح');
          closeModal('addModal');
          loadEmployees();
        } else {
          alert('خطأ: ' + (result.message || 'غير معروف'));
        }
      } catch (error) {
        console.error('Save error:', error);
        alert('خطأ في الاتصال: ' + error.message);
      }
    }

    // ================ دوال أخرى ================
    async function viewHistory(serial) {
      const history = await callApi('getSalaryHistory', { serial });
      if (Array.isArray(history) && history.length > 0) {
        let html = '<h4>سجل تعديلات الراتب</h4><table><tr><th>الراتب</th><th>الشهر</th><th>السنة</th><th>السبب</th></tr>';
        history.forEach(h => {
          html += `<tr><td>${h.salary}</td><td>${h.month}</td><td>${h.year}</td><td>${h.reason}</td></tr>`;
        });
        html += '</table>';
        
        const div = document.createElement('div');
        div.className = 'modal';
        div.style.display = 'flex';
        div.innerHTML = `
          <div class="modal-content" style="max-width:600px;">
            <div class="modal-header">
              <h3>📜 سجل الراتب</h3>
              <span class="close-modal" onclick="this.parentElement.parentElement.parentElement.remove()">&times;</span>
            </div>
            ${html}
          </div>
        `;
        document.body.appendChild(div);
      } else {
        alert('لا يوجد سجل لهذا الموظف');
      }
    }

    function openSalaryModal(serial) {
      alert('سيتم فتح مودال تعديل الراتب قريباً');
    }

    function openStatusModal(serial) {
      alert('سيتم فتح مودال تغيير الحالة قريباً');
    }

    // ================ بدء التشغيل ================
    document.addEventListener('DOMContentLoaded', () => {
      const userData = sessionStorage.getItem('currentUser');
      if (!userData) {
        window.location.href = 'index.html';
        return;
      }
      currentUser = JSON.parse(userData);
      loadEmployees();
    });

    // ================ تعريف الدوال العامة ================
    window.closeModal = closeModal;
    window.switchTab = switchTab;
    window.toggleSystemFields = toggleSystemFields;
    window.generateEmail = generateEmail;
    window.uploadImage = uploadImage;
    window.previewImage = previewImage;
    window.openAddModal = openAddModal;
    window.saveNewEmployee = saveNewEmployee;
    window.loadEmployees = loadEmployees;
    window.viewHistory = viewHistory;
    window.openSalaryModal = openSalaryModal;
    window.openStatusModal = openStatusModal;
  </script>
</body>
</html>
