<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>لوحة العميل</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0f1f3d;--navy2:#1a3260;--gold:#f5c842;
      --blue:#2563eb;--green:#16a34a;--red:#dc2626;--orange:#ea580c;
      --bg:#f0f4f8;--card:#fff;--border:#dde4f0;--text:#1a2540;--text-lt:#5a6a8a;
      --radius:16px;--radius-sm:10px;--shadow:0 4px 24px rgba(15,31,61,.10);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    .header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;padding:13px 22px;
      display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;
      box-shadow:0 2px 12px rgba(15,31,61,.25);}
    .header h2{color:var(--gold);font-size:18px;font-weight:900;}
    .header-right{display:flex;align-items:center;gap:8px;}
    .user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:40px;
      padding:4px 13px;color:white;font-size:12px;font-weight:600;}
    .back-btn{background:transparent;border:2px solid rgba(255,255,255,.3);color:white;padding:4px 13px;
      border-radius:40px;cursor:pointer;font-weight:700;font-size:12px;font-family:'Cairo',sans-serif;transition:all .2s;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}
    .page{max-width:1400px;margin:0 auto;padding:20px 16px 50px;}
    .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);
      box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden;}
    .card-head{padding:12px 18px;background:linear-gradient(90deg,var(--navy),var(--navy2));display:flex;align-items:center;gap:8px;}
    .card-head h3{color:var(--gold);font-size:14px;font-weight:800;}
    .ch-icon{background:rgba(245,200,66,.2);border-radius:7px;padding:3px 6px;font-size:13px;}
    .card-body{padding:16px;}
    .fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:14px;}
    .fgroup{display:flex;flex-direction:column;gap:5px;}
    .fgroup label{font-size:11px;font-weight:700;color:var(--text-lt);}
    .fc{padding:8px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:13px;
      font-family:'Cairo',sans-serif;color:var(--text);background:#fafbfd;width:100%;height:40px;}
    .fc:focus{border-color:var(--blue);outline:none;background:white;}
    .btn{padding:8px 20px;border:none;border-radius:40px;font-weight:700;font-size:13px;cursor:pointer;
      font-family:'Cairo',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .2s;}
    .btn:hover{transform:translateY(-1px);}
    .btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
    .btn-navy{background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);}
    .btn-green{background:var(--green);color:white;}
    .btn-gray{background:#f1f5f9;color:var(--text);}
    /* Tabs */
    .tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;border-bottom:2px solid var(--border);padding-bottom:10px;}
    .tab-btn{padding:8px 20px;background:#f0f4f8;border:none;border-radius:40px;font-size:13px;font-weight:700;
      font-family:'Cairo',sans-serif;cursor:pointer;color:var(--text-lt);transition:all .2s;}
    .tab-btn.active{background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);}
    .tab-pane{display:none;} .tab-pane.active{display:block;}
    /* Tables */
    .table-wrap{overflow-x:auto;max-height:70vh;}
    table.dt{width:100%;border-collapse:collapse;font-size:12px;}
    table.dt thead{position:sticky;top:0;z-index:10;}
    table.dt thead tr.row-trip th{
      background:linear-gradient(90deg,var(--navy),var(--navy2));color:var(--gold);
      padding:9px 8px;font-weight:800;text-align:center;white-space:nowrap;border:1px solid #2a4a7a;}
    table.dt thead tr.row-trip th.th-date{background:#1a3260;}
    table.dt thead tr.row-item th{
      background:#f0f4f8;color:var(--text-lt);padding:6px 8px;font-weight:700;
      text-align:center;font-size:11px;border:1px solid var(--border);}
    table.dt tbody td{padding:7px 8px;border-bottom:1px solid #f0f4f8;border-left:1px solid #f0f4f8;
      text-align:center;white-space:nowrap;font-size:12px;}
    table.dt tbody td:first-child{text-align:right;font-weight:600;background:#fafbff;border-right:2px solid var(--border);}
    table.dt tbody tr:hover{background:#f8faff;}
    table.dt tbody tr.total-row{background:#e6f0ff;font-weight:700;}
    table.dt tbody tr.total-row td{border-top:2px solid var(--navy);}
    .badge-cur{padding:2px 7px;border-radius:10px;font-size:11px;font-weight:700;display:inline-block;}
    .cur-LE{background:#dcfce7;color:#166534;}
    .cur-USD{background:#dbeafe;color:#1e40af;}
    .cur-EUR{background:#fef3c7;color:#92400e;}
    .cur-GBP{background:#ede9fe;color:#5b21b6;}
    .total-card{display:inline-flex;align-items:center;gap:10px;background:white;border:2px solid var(--border);
      border-radius:14px;padding:14px 20px;margin:6px;box-shadow:var(--shadow);}
    .total-card .tc-cur{font-size:12px;font-weight:700;color:var(--text-lt);}
    .total-card .tc-val{font-size:22px;font-weight:900;color:var(--navy);}
    .summary-wrap{display:flex;flex-wrap:wrap;gap:4px;padding:8px 0;}
    .loader{text-align:center;padding:40px;color:var(--text-lt);}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);
      border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .no-data{text-align:center;padding:40px;color:var(--text-lt);}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;
      justify-content:center;z-index:9999;backdrop-filter:blur(4px);}
    .modal.open{display:flex;}
    .alert-box{background:white;width:88%;max-width:380px;border-radius:22px;padding:26px;
      text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.25);}
    .alert-icon{font-size:40px;margin-bottom:10px;}
    .alert-msg{color:var(--navy);font-size:14px;font-weight:700;margin-bottom:18px;white-space:pre-wrap;}
    .info-bar{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px 14px;
      font-size:12px;color:#166534;margin-bottom:14px;}
    @media(max-width:640px){
      table.dt{font-size:10px;}
      table.dt thead tr.row-trip th,table.dt thead tr.row-item th,table.dt tbody td{padding:5px 4px;}
      .tab-btn{padding:6px 14px;font-size:11px;}
    }
  </style>
</head>
<body>

<div class="header">
  <h2>🏢 لوحة العميل</h2>
  <div class="header-right">
    <span class="user-chip" id="userChip">...</span>
    <button class="back-btn" onclick="doLogout()">← خروج</button>
  </div>
</div>

<div class="page">
  <div id="mainContent"><div class="loader"><div class="spinner"></div>جاري التحميل...</div></div>
</div>

<div id="alertModal" class="modal">
  <div class="alert-box">
    <div class="alert-icon" id="alertIcon">ℹ️</div>
    <div class="alert-msg" id="alertMsg"></div>
    <div style="margin-top:16px;">
      <button class="btn btn-navy" onclick="closeAlert()">موافق</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwe1Q9pjAJRk9CfWsK5YGjD5uVAbJkMhAVgw6akKkFIR9sz15V78C88Vs5dumKE-SwF/exec';

let currentUser = null;
let customerAccount = null;
let sheetData = [];     // كل بيانات الشيت كـ 2D array
let tripGroups  = [];   // [{name, startCol, items:[{name,col}]}] — من الجدول الأول B+
let priceGroups = [];   // [{name, startCol, items:[{name,col,currency}]}] — من CC+
let sumCurrencies = []; // ['LE','USD',...] من أعمدة المجاميع

// ====================== اتصال JSONP ======================
function gas(action, params={}) {
  return new Promise((resolve,reject) => {
    const cb = 'cb_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
    const url = new URL(GAS_URL);
    url.searchParams.set('action',action);
    url.searchParams.set('callback',cb);
    url.searchParams.set('_t',Date.now());
    Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,String(v??'')));
    window[cb]=(data)=>{ delete window[cb]; if(s.parentNode) s.parentNode.removeChild(s); resolve(data); };
    const s=document.createElement('script');
    s.src=url.toString();
    s.onerror=()=>{ delete window[cb]; if(s.parentNode) s.parentNode.removeChild(s); reject(new Error('خطأ في الاتصال')); };
    document.body.appendChild(s);
    setTimeout(()=>{ if(window[cb]){ delete window[cb]; if(s.parentNode) s.parentNode.removeChild(s); reject(new Error('انتهى الوقت')); } },30000);
  });
}

// ====================== مساعدات ======================
function doLogout(){ sessionStorage.removeItem('currentUser'); location.href='index.html'; }
function showAlert(msg,icon){ document.getElementById('alertIcon').textContent=icon||'ℹ️'; document.getElementById('alertMsg').textContent=msg; document.getElementById('alertModal').classList.add('open'); }
function closeAlert(){ document.getElementById('alertModal').classList.remove('open'); }

function fmtDate(v) {
  if(!v) return '';
  const s=v.toString().trim();
  if(s.match(/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/)) return s;
  try{ const d=new Date(s); if(!isNaN(d)){ const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return String(d.getDate()).padStart(2,'0')+'/'+MN[d.getMonth()]+'/'+d.getFullYear(); } }catch(e){}
  return s;
}

function parseCell(cell) {
  // "500LE" → {price:500, currency:'LE'}
  const s=(cell??'').toString().trim();
  if(!s||s==='0'||s==='') return {price:0,currency:'LE'};
  const m=s.match(/^([\d.]+)([A-Za-z]+)$/);
  if(m) return {price:parseFloat(m[1])||0, currency:m[2]};
  const n=parseFloat(s);
  return {price:isNaN(n)?0:n, currency:'LE'};
}

function curClass(c){ return 'badge-cur cur-'+(c||'LE'); }

// ====================== تحليل هيكل الشيت ======================
function parseSheetStructure() {
  if(!sheetData||sheetData.length<4) return;
  const row2=sheetData[1]||[];
  const row3=sheetData[2]||[];
  const lastCol=row2.length;

  tripGroups=[]; priceGroups=[]; sumCurrencies=[];

  // ── 1. الجدول الأول: B(1) → ابحث عن أول عمود "مجموع" أو CA(78) ──
  // الرؤوس: الصف 2 = اسم الرحلة (مدمج)، الصف 3 = اسم البند
  let jFirst=1; // العمود B (index 1)
  let jEnd=78;  // قبل CA (index 78)
  // ابحث عن عمود المجاميع في الجدول الأول
  for(let j=jFirst;j<Math.min(jEnd,lastCol);j++){
    const v2=(row2[j]||'').toString().trim();
    const v3=(row3[j]||'').toString().trim();
    if(v2.startsWith('المجموع')||v2.startsWith('Total')){
      // احفظ عملة المجموع
      const cur=v2.replace('المجموع ','').replace('Total ','').trim();
      if(cur) sumCurrencies.push({col:j,currency:cur});
      jEnd=j; break;
    }
  }

  // تحليل الرحلات والبنود في الجدول الأول
  let curTrip=null;
  for(let j=jFirst;j<jEnd;j++){
    const v2=(row2[j]||'').toString().trim();
    const v3=(row3[j]||'').toString().trim();
    if(v2&&v2!==''){ // اسم رحلة جديد
      curTrip={name:v2,items:[]};
      tripGroups.push(curTrip);
    }
    if(v3&&v3!==''&&curTrip){
      curTrip.items.push({name:v3,col:j});
    }
  }
  // إذا لم يتم إيجاد أي عمود مجاميع، ابحث عنها بعد آخر بند
  if(sumCurrencies.length===0){
    for(let j=jFirst;j<Math.min(78,lastCol);j++){
      const v2=(row2[j]||'').toString().trim();
      if(v2.startsWith('المجموع')||v2.startsWith('Total')){
        const cur=v2.replace('المجموع ','').replace('Total ','').trim();
        if(cur) sumCurrencies.push({col:j,currency:cur});
      }
    }
  }

  // ── 2. الجدول الثاني: CC(80) فصاعداً ──
  // الصف 2 = اسم رحلة (مدمج)، الصف 3 = اسم البند
  let curPriceTrip=null;
  for(let j=80;j<lastCol;j++){
    const v2=(row2[j]||'').toString().trim();
    const v3=(row3[j]||'').toString().trim();
    if(v2&&v2!==''){ // اسم رحلة
      curPriceTrip={name:v2,items:[]};
      priceGroups.push(curPriceTrip);
    }
    if(v3&&v3!==''&&curPriceTrip){
      // قراءة سعر من أول صف بيانات (الصف 4 = index 3) لتحديد العملة
      const sampleCell=(sheetData[3]||[])[j];
      const {currency}=parseCell(sampleCell);
      curPriceTrip.items.push({name:v3,col:j,currency});
    }
  }

  console.log('tripGroups:',tripGroups);
  console.log('priceGroups:',priceGroups);
  console.log('sumCurrencies:',sumCurrencies);
}

// ====================== تصيير جدول الأسعار (CC+) ======================
function renderPricesTab(rows) {
  if(!priceGroups.length) return '<div class="no-data">لا توجد بيانات أسعار</div>';

  // ── الصف 1: التاريخ (rowspan=2) + أسماء الرحلات مدمجة ──
  let trTrip = '<th class="th-date" rowspan="2">التاريخ</th>';
  // ── الصف 2: أسماء البنود ──
  let trItem = '';

  for(const g of priceGroups){
    const span = g.items.length;
    trTrip += `<th colspan="${span}" style="text-align:center">${g.name}</th>`;
    for(const it of g.items){
      trItem += `<th>${it.name}</th>`;
    }
  }

  // ── صفوف البيانات ──
  let tbody='';
  for(const row of rows){
    const dateStr=fmtDate(row[0]);
    if(!dateStr) continue;
    let tds='';
    for(const g of priceGroups){
      for(const it of g.items){
        const cell=(row[it.col]??'').toString().trim();
        const {price,currency}=parseCell(cell);
        tds+=`<td>${price>0?`<span class="${curClass(currency)}">${price} ${currency}</span>`:'-'}</td>`;
      }
    }
    tbody+=`<tr><td>${dateStr}</td>${tds}</tr>`;
  }

  return `
    <div class="table-wrap">
      <table class="dt">
        <thead>
          <tr class="row-trip">${trTrip}</tr>
          <tr class="row-item">${trItem}</tr>
        </thead>
        <tbody>${tbody||'<tr><td colspan="100" class="no-data">لا توجد بيانات</td></tr>'}</tbody>
      </table>
    </div>`;
}

// ====================== تصيير جدول الإجماليات (B+) ======================
function renderTotalsTab(rows) {
  if(!tripGroups.length) return '<div class="no-data">لا توجد بيانات بنود</div>';

  // العملات الفعلية من الجدول الثاني (الأسعار)
  const curSet=new Set();
  for(const g of priceGroups) for(const it of g.items) if(it.currency) curSet.add(it.currency);
  const currencies=[...curSet];
  if(!currencies.length) currencies.push('LE');

  // ── الصف 1: التاريخ(rowspan=2) + أسماء الرحلات مدمجة + أعمدة المجاميع(rowspan=2) ──
  let trTrip = '<th class="th-date" rowspan="2">التاريخ</th>';
  // ── الصف 2: أسماء البنود ──
  let trItem = '';

  for(const g of tripGroups){
    const span = g.items.length;
    trTrip += `<th colspan="${span}" style="text-align:center">${g.name}</th>`;
    for(const it of g.items){
      trItem += `<th>${it.name}</th>`;
    }
  }
  // أعمدة المجاميع بعد البنود (rowspan=2 → تمتد للصفين)
  for(const cur of currencies){
    trTrip += `<th class="th-sum" rowspan="2">المجموع<br><span class="${curClass(cur)}">${cur}</span></th>`;
  }

  // ── صفوف البيانات ──
  const grandTotals={};
  currencies.forEach(c=>grandTotals[c]=0);

  let tbody='';
  for(const row of rows){
    const dateStr=fmtDate(row[0]);
    if(!dateStr) continue;

    const dayTotals={};
    currencies.forEach(c=>dayTotals[c]=0);

    let tds='';
    for(const g of tripGroups){
      for(const it of g.items){
        const qty=parseInt(row[it.col])||0;
        tds+=`<td style="${qty>0?'background:#f0fdf4;font-weight:700;color:#166534':'color:#cbd5e1'}">${qty>0?qty:'-'}</td>`;

        if(qty>0){
          for(const pg of priceGroups){
            for(const pi of pg.items){
              if(pi.name===it.name&&pg.name===g.name){
                const {price,currency}=parseCell((row[pi.col]??''));
                dayTotals[currency]=(dayTotals[currency]||0)+price*qty;
                grandTotals[currency]=(grandTotals[currency]||0)+price*qty;
              }
            }
          }
        }
      }
    }

    // خلايا المجاميع اليومية
    let sumTds='';
    for(const cur of currencies){
      const val=dayTotals[cur]||0;
      sumTds+=`<td style="background:#e6f0ff;font-weight:700">${val>0?`${val.toLocaleString()} <span class="${curClass(cur)}">${cur}</span>`:'-'}</td>`;
    }

    tbody+=`<tr><td>${dateStr}</td>${tds}${sumTds}</tr>`;
  }

  // صف الإجمالي الكلي
  const totalCols=tripGroups.reduce((s,g)=>s+g.items.length,0);
  let grandTds='';
  for(const cur of currencies){
    const v=grandTotals[cur]||0;
    grandTds+=`<td style="background:#1a3260;color:var(--gold);font-size:13px"><strong>${v.toLocaleString()} ${cur}</strong></td>`;
  }
  const emptyCell='<td style="color:#94a3b8">-</td>';
  tbody+=`<tr class="total-row"><td>الإجمالي الكلي</td>${emptyCell.repeat(totalCols)}${grandTds}</tr>`;

  return `
    <div class="table-wrap">
      <table class="dt">
        <thead>
          <tr class="row-trip">${trTrip}</tr>
          <tr class="row-item">${trItem}</tr>
        </thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>`;
}

// ====================== تصيير إجمالي العملات ======================
function renderSummaryTab(rows) {
  const totals={};
  for(const row of rows){
    if(!row[0]) continue;
    for(const g of tripGroups){
      for(const it of g.items){
        const qty=parseInt(row[it.col])||0;
        if(!qty) continue;
        for(const pg of priceGroups){
          for(const pi of pg.items){
            if(pi.name===it.name&&pg.name===g.name){
              const {price,currency}=parseCell((row[pi.col]??''));
              totals[currency]=(totals[currency]||0)+price*qty;
            }
          }
        }
      }
    }
  }

  if(!Object.keys(totals).length){
    return '<div class="no-data">لا توجد بيانات كافية</div>';
  }

  let html='<div class="summary-wrap">';
  for(const [cur,val] of Object.entries(totals)){
    if(val===0) continue;
    html+=`<div class="total-card">
      <div>
        <div class="tc-cur">${cur}</div>
        <div class="tc-val">${val.toLocaleString()}</div>
      </div>
      <span class="${curClass(cur)}" style="font-size:20px;padding:6px 12px;">${cur}</span>
    </div>`;
  }
  html+='</div>';
  return html;
}

// ====================== تصيير الصفحة الكاملة ======================
function renderPage(startISO, endISO) {
  if(!sheetData||sheetData.length<4){
    document.getElementById('mainContent').innerHTML='<div class="no-data">لا توجد بيانات في الشيت</div>';
    return;
  }

  parseSheetStructure();

  // تصفية الصفوف حسب التاريخ (من الصف 4 = index 3)
  let rows=sheetData.slice(3).filter(r=>r[0]);

  if(startISO||endISO){
    const s=startISO?new Date(startISO):null;
    const e=endISO?new Date(endISO):null;
    if(s) s.setHours(0,0,0,0);
    if(e) e.setHours(23,59,59,999);
    rows=rows.filter(r=>{
      const d=parseDateToObj(r[0]);
      if(!d) return true;
      if(s&&d<s) return false;
      if(e&&d>e) return false;
      return true;
    });
  }

  const acc=customerAccount;
  const infoBar=acc?`<div class="info-bar">
    🏢 <strong>${acc.customerName}</strong> | 
    🏄 ${acc.category} | 
    📅 ${acc.startDate} ← ${acc.endDate} | 
    ${rows.length} يوم
  </div>`:'';

  document.getElementById('mainContent').innerHTML=`
    ${infoBar}
    <div class="card">
      <div class="card-head"><span class="ch-icon">🔍</span><h3>فلترة حسب التاريخ</h3></div>
      <div class="card-body">
        <div class="fgrid" style="align-items:flex-end;">
          <div class="fgroup"><label>من تاريخ</label><input type="date" class="fc" id="fStart" value="${startISO||''}"></div>
          <div class="fgroup"><label>إلى تاريخ</label><input type="date" class="fc" id="fEnd" value="${endISO||''}"></div>
          <div><button class="btn btn-navy" onclick="applyFilter()">🔍 تطبيق</button>
          <button class="btn btn-gray" style="margin-right:8px" onclick="resetFilter()">↺ إعادة</button></div>
        </div>
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px;">
      <div class="tabs" style="margin-bottom:0;border-bottom:none;padding-bottom:0">
        <button class="tab-btn active" onclick="switchTab('prices',event)">📋 جدول الأسعار</button>
        <button class="tab-btn" onclick="switchTab('totals',event)">💰 الإجماليات اليومية</button>
        <button class="tab-btn" onclick="switchTab('summary',event)">📊 إجمالي العملات</button>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-green" onclick="openInvoicePage()">➕ فاتورة جديدة</button>
        <button class="btn btn-gray" onclick="loadAll()">🔄 تحديث</button>
      </div>
    </div>
    <hr style="border:none;border-top:2px solid var(--border);margin-bottom:16px;">

    <div id="tabPrices" class="tab-pane active">
      <div class="card">
        <div class="card-head"><span class="ch-icon">📋</span><h3>جدول الأسعار</h3></div>
        <div class="card-body">${renderPricesTab(rows)}</div>
      </div>
    </div>

    <div id="tabTotals" class="tab-pane">
      <div class="card">
        <div class="card-head"><span class="ch-icon">💰</span><h3>الإجماليات اليومية (الكميات × الأسعار)</h3></div>
        <div class="card-body">${renderTotalsTab(rows)}</div>
      </div>
    </div>

    <div id="tabSummary" class="tab-pane">
      <div class="card">
        <div class="card-head"><span class="ch-icon">📊</span><h3>إجمالي العملات</h3></div>
        <div class="card-body">${renderSummaryTab(rows)}</div>
      </div>
    </div>`;
}

function parseDateToObj(v){
  if(!v) return null;
  const s=v.toString().trim();
  const MN={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const m=s.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if(m){ const d=new Date(+m[3],MN[m[2]],+m[1]); d.setHours(0,0,0,0); return d; }
  try{ const d=new Date(s); if(!isNaN(d)) return d; }catch(e){}
  return null;
}

function switchTab(name,event){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if(event?.target) event.target.classList.add('active');
  ['prices','totals','summary'].forEach(t=>{
    const el=document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1));
    if(el) el.classList[t===name?'add':'remove']('active');
  });
}

function applyFilter(){
  const s=document.getElementById('fStart')?.value||'';
  const e=document.getElementById('fEnd')?.value||'';
  renderPage(s,e);
}
function resetFilter(){ renderPage('',''); }

// ====================== تحميل البيانات ======================
async function loadAll(){
  document.getElementById('mainContent').innerHTML='<div class="loader"><div class="spinner"></div>جاري جلب الحساب...</div>';
  try{
    // 1. جلب حساب العميل
    const allAcc=await gas('getAllSuppliersCustomers');
    const accounts=Array.isArray(allAcc)?allAcc:[];
    customerAccount=accounts.find(a=>
      a.customerType==='Customer'&&
      (a.loginEmail===currentUser?.email||a.customerName===currentUser?.name)
    );
    if(!customerAccount){
      document.getElementById('mainContent').innerHTML=`<div class="card"><div class="card-body no-data">⚠️ لا يوجد حساب مرتبط بهذا المستخدم</div></div>`;
      return;
    }

    // 2. جلب بيانات شيت الحساب
    const sheetName=customerAccount.customerName+'_'+customerAccount.category+'_'+customerAccount.customerType;
    document.getElementById('mainContent').innerHTML=`<div class="loader"><div class="spinner"></div>جاري جلب شيت "${sheetName}"...</div>`;

    const res=await gas('getAccountSheetData',{sheetName});
    if(!res?.success||!Array.isArray(res.data)||res.data.length<4){
      document.getElementById('mainContent').innerHTML=`<div class="card"><div class="card-body no-data">⚠️ ${res?.message||'لا توجد بيانات في الشيت'}</div></div>`;
      return;
    }
    sheetData=res.data;

    // 3. كتابة الإجماليات في الشيت (background)
    //gas('writeDailyTotalsToSheet', {customerId: customerAccount.customerId})
      //.then(r => console.log('writeDailyTotals:', r?.updated, 'rows'))
      //.catch(e => console.warn('writeDailyTotals:', e.message));

    // 4. تصيير
    renderPage('','');

  } catch(e){
    console.error('loadAll error:',e);
    showAlert('خطأ في التحميل: '+e.message,'❌');
  }
}

// ====================== تهيئة ======================
document.addEventListener('DOMContentLoaded',async()=>{
  let ud=sessionStorage.getItem('currentUser');
  if(!ud){ const p=new URLSearchParams(location.search).get('user'); if(p){ud=decodeURIComponent(p);sessionStorage.setItem('currentUser',ud);} }
  if(!ud){ location.href='index.html'; return; }
  try{ currentUser=JSON.parse(ud); }catch(e){ location.href='index.html'; return; }
  document.getElementById('userChip').textContent=currentUser.name||'User';
  await loadAll();
});

function openInvoicePage(){
  const user=encodeURIComponent(JSON.stringify(currentUser));
  window.open('CustomerInvoice.html?user='+user,'_blank');
}

window.doLogout=doLogout; window.closeAlert=closeAlert;
window.switchTab=switchTab; window.applyFilter=applyFilter; window.resetFilter=resetFilter;
window.openInvoicePage=openInvoicePage; window.loadAll=loadAll;
</script>
</body>
</html>
