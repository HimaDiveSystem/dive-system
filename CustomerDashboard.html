<script>

// ============================================================
// ✅ اتصال JSONP (معرف على المستوى العام)
// ============================================================
function gas(action, params={}) {
  return new Promise((resolve,reject) => {
    const cb = 'cb_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
    const url = new URL(CONFIG.GAS_URL);
    url.searchParams.set('action',action);
    url.searchParams.set('callback',cb);
    url.searchParams.set('_t',Date.now());
    
    // ✅ إضافة centerName و centerId تلقائياً
    if (currentUser && currentUser.centerName && !params.centerName) {
      params.centerName = currentUser.centerName;
    }
    if (currentUser && currentUser.centerId && !params.centerId) {
      params.centerId = currentUser.centerId;
    }
    
    Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,String(v??'')));
    window[cb]=(data)=>{ delete window[cb]; if(s.parentNode) s.parentNode.removeChild(s); resolve(data); };
    const s=document.createElement('script');
    s.src=url.toString();
    s.onerror=()=>{ delete window[cb]; if(s.parentNode) s.parentNode.removeChild(s); reject(new Error('خطأ في الاتصال')); };
    document.body.appendChild(s);
    setTimeout(()=>{ if(window[cb]){ delete window[cb]; if(s.parentNode) s.parentNode.removeChild(s); reject(new Error('انتهى الوقت')); } },90000);
  });
}

// ============================================================
// ✅ دوال مساعدة

function showAlert(msg,icon){
  document.getElementById('alertIcon').textContent=icon||'ℹ️';
  document.getElementById('alertMsg').textContent=msg;
  document.getElementById('alertModal').classList.add('open');
}

function closeAlert(){
  document.getElementById('alertModal').classList.remove('open');
}

function fmtDate(v) {
  if(!v) return '';
  const s=v.toString().trim();
  if(s.match(/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/)) return s;
  try{ const d=new Date(s); if(!isNaN(d)){ const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return String(d.getDate()).padStart(2,'0')+'/'+MN[d.getMonth()]+'/'+d.getFullYear(); } }catch(e){}
  return s;
}

function parseCell(cell) {
  const s=(cell??'').toString().trim();
  if(!s||s==='0'||s==='') return {price:0,currency:'LE'};
  const match=s.match(/^([\d,.]+)\s*([A-Za-z$€£]*)$/);
  if(match){
    let price=parseFloat(match[1].replace(/,/g,''))||0;
    let currency=match[2].trim().toUpperCase();
    if(currency==='$'||currency==='USD') currency='USD';
    else if(currency==='€'||currency==='EUR') currency='EUR';
    else if(currency==='£'||currency==='GBP') currency='GBP';
    else if(currency==='LE'||currency==='EGP') currency='LE';
    else currency='LE';
    return {price,currency};
  }
  const num=parseFloat(s.replace(/,/g,''));
  return {price:isNaN(num)?0:num, currency:'LE'};
}

function curClass(c){ return 'badge-cur cur-'+(c||'LE'); }

function parseDateToObj(v){
  if(!v) return null;
  const s=v.toString().trim();
  const MN={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const m=s.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if(m){ const d=new Date(+m[3],MN[m[2]],+m[1]); d.setHours(0,0,0,0); return d; }
  try{ const d=new Date(s); if(!isNaN(d)) return d; }catch(e){}
  return null;
}

function updateHeaderCustomerInfo() {

    document.getElementById('customerCategorySpan').textContent = customerAccount.category || '-';
    const typeLabel = customerAccount.customerType === 'Supplier' ? '🏢 لوحة المنفذ' : '🏢 لوحة العميل';

  }
}

// ============================================================
// ✅ تحليل هيكل الشيت (نفس الكود السابق)
// ============================================================
function parseSheetStructure() {
  if(!sheetData||sheetData.length<4) return;
  const row2 = sheetData[1] || [];
  const row3 = sheetData[2] || [];
  const lastCol = row2.length;

  tripGroups = [];
  priceGroups = [];
  sumCurrencies = [];
  paymentsData = [];

  const isSubmarine = viewingCustomer && viewingCustomer.category === 'Submarine';
  
  if (isSubmarine) {
    console.log('🛸 معالجة Submarine');
    const priceStartCol = 81;
    const categories = ['F', 'Aarab', 'Arab48', 'EGY'];
    const items = ['PAX', 'CHILD', 'INF'];
    
    let priceCol = priceStartCol;
    for (const cat of categories) {
      const priceGroup = { name: cat, items: [] };
      for (const item of items) {
        priceGroup.items.push({ name: item, col: priceCol - 1 });
        priceCol++;
      }
      priceGroups.push(priceGroup);
    }
    
    for (let j = 0; j < row2.length; j++) {
      const header = (row2[j] || '').toString().trim();
      if (header.startsWith('Total') || header.startsWith('المجموع')) {
        let currency = header.replace('Total ', '').replace('المجموع ', '').trim();
        if (currency === '$') currency = 'USD';
        if (currency === '€') currency = 'EUR';
        if (currency === '£') currency = 'GBP';
        sumCurrencies.push({ col: j, currency: currency || 'LE' });
      }
    }
    
    if (sumCurrencies.length === 0) sumCurrencies = [{ col: -1, currency: 'LE' }];
    
    let paymentsStartCol = -1;
    for (let j = 0; j < row2.length; j++) {
      const header = (row2[j] || '').toString().trim();
      if (header === 'Date') {
        paymentsStartCol = j;
        break;
      }
    }
    
    if (paymentsStartCol !== -1 && sheetData.length > 3) {
      for (let i = 3; i < sheetData.length; i++) {
        const row = sheetData[i];
        const dateVal = row[paymentsStartCol];
        if (dateVal && dateVal.toString().trim()) {
          paymentsData.push({
            date: fmtDate(dateVal),
            details: row[paymentsStartCol + 1] || '',
            USD: parseFloat(row[paymentsStartCol + 2]) || 0,
            EUR: parseFloat(row[paymentsStartCol + 3]) || 0,
            GBP: parseFloat(row[paymentsStartCol + 4]) || 0,
            LE: parseFloat(row[paymentsStartCol + 5]) || 0,
            account: row[paymentsStartCol + 6] || '',
            accountName: row[paymentsStartCol + 7] || '',
            month: row[paymentsStartCol + 8] || '',
            year: row[paymentsStartCol + 9] || ''
          });
        }
      }
    }
    
    console.log('🏗️ هيكل Submarine:', {
      priceGroupsCount: priceGroups.length,
      sumCurrencies: sumCurrencies.map(s => s.currency),
      paymentsCount: paymentsData.length
    });
    
    return;
  }
  
  console.log('🗺️ معالجة الأنشطة العادية');

  // ✅ البحث عن بداية المدفوعات وبداية جدول الأسعار
  let paymentsStartCol = -1;
  let priceStartColForTrip = -1;

  for (let j = 0; j < row2.length; j++) {
    const header = (row2[j] || '').toString().trim();
    if (header === 'Date' && paymentsStartCol === -1) {
      paymentsStartCol = j;
    }
    if ((header === 'الشهر' || header === 'Month' || header === 'PAX') && priceStartColForTrip === -1) {
      priceStartColForTrip = j;
    }
  }

  // ✅ endCol = أقرب حد (بداية الأسعار أو بداية المدفوعات)
  let endCol = row2.length;
  if (paymentsStartCol !== -1) endCol = Math.min(endCol, paymentsStartCol);
  if (priceStartColForTrip !== -1) endCol = Math.min(endCol, priceStartColForTrip);

  const sumSet = new Set();
  
  for (let j = 0; j < endCol; j++) {
    const header = (row2[j] || '').toString().trim();
    if (header.startsWith('Total') || header.startsWith('المجموع')) {
      let currency = header.replace('Total ', '').replace('المجموع ', '').trim();
      if (currency === '$') currency = 'USD';
      if (currency === '€') currency = 'EUR';
      if (currency === '£') currency = 'GBP';
      if (currency && !sumSet.has(currency)) {
        sumSet.add(currency);
        sumCurrencies.push({ col: j, currency: currency });
      }
    }
  }

  if (sumCurrencies.length === 0) sumCurrencies = [{ col: -1, currency: 'LE' }];

  let curTrip = null;
  for (let j = 1; j < endCol; j++) {
    const v2 = (row2[j] || '').toString().trim();
    const v3 = (row3[j] || '').toString().trim();
    
    if (v2 && v2 !== '' && !v2.startsWith('Total') && !v2.startsWith('المجموع') && v2 !== 'Date') {
      curTrip = { name: v2, items: [] };
      tripGroups.push(curTrip);
    }
    if (v3 && v3 !== '' && curTrip && !v3.startsWith('Total') && !v3.startsWith('المجموع')) {
      curTrip.items.push({ name: v3, col: j });
    }
  }

  // ✅ البحث عن جدول الأسعار (يبدأ من priceStartColForTrip)
  let priceStartRow = -1;
  let priceStartCol = -1;
  
  for (let i = 0; i < sheetData.length; i++) {
    const row = sheetData[i];
    for (let j = 0; j < row.length; j++) {
      const cell = (row[j] || '').toString().trim();
      if (cell === 'PAX' || cell === 'الشهر') {
        priceStartRow = i;
        priceStartCol = j;
        break;
      }
    }
    if (priceStartRow !== -1) break;
  }
  
  if (priceStartRow !== -1 && priceStartCol !== -1 && sheetData[priceStartRow + 1]) {
    const priceRow2 = sheetData[priceStartRow] || [];
    const priceRow3 = sheetData[priceStartRow + 1] || [];
    const priceRow4 = sheetData[priceStartRow + 2] || [];
    
    let curPriceTrip = null;
    for (let j = priceStartCol; j < priceRow2.length; j++) {
      const tripName = (priceRow2[j] || '').toString().trim();
      const itemName = (priceRow3[j] || '').toString().trim();
      
      if (tripName === 'الشهر' || tripName === 'السنة' || tripName === 'Month' || tripName === 'Year') {
        continue;
      }
      
      if (tripName && tripName !== '' && !tripName.startsWith('Total')) {
        curPriceTrip = { name: tripName, items: [] };
        priceGroups.push(curPriceTrip);
      }
      if (itemName && itemName !== '' && curPriceTrip && !itemName.startsWith('Total')) {
        if (itemName === 'الشهر' || itemName === 'السنة' || itemName === 'Month' || itemName === 'Year') {
          continue;
        }
        const priceCell = priceRow4[j] || '';
        const { price, currency } = parseCell(priceCell);
        curPriceTrip.items.push({ 
          name: itemName, 
          col: j, 
          price: price,
          currency: currency 
        });
      }
    }
  }

  if (paymentsStartCol !== -1 && sheetData.length > 3) {
    for (let i = 3; i < sheetData.length; i++) {
      const row = sheetData[i];
      const dateVal = row[paymentsStartCol];
      if (dateVal && dateVal.toString().trim()) {
        paymentsData.push({
          date: fmtDate(dateVal),
          details: row[paymentsStartCol + 1] || '',
          USD: parseFloat(row[paymentsStartCol + 2]) || 0,
          EUR: parseFloat(row[paymentsStartCol + 3]) || 0,
          GBP: parseFloat(row[paymentsStartCol + 4]) || 0,
          LE: parseFloat(row[paymentsStartCol + 5]) || 0,
          account: row[paymentsStartCol + 6] || '',
          accountName: row[paymentsStartCol + 7] || '',
          month: row[paymentsStartCol + 8] || '',
          year: row[paymentsStartCol + 9] || ''
        });
      }
    }
  }
  
  console.log('🏗️ هيكل الشيت:', {
    tripGroupsCount: tripGroups.length,
    priceGroupsCount: priceGroups.length,
    sumCurrencies: sumCurrencies.map(s => s.currency),
    paymentsCount: paymentsData.length
  });
}

function renderPricesTab(rows) {
  if (viewingCustomer && viewingCustomer.category === 'Submarine') {
    if (!sheetData || sheetData.length < 4) {
      return '<div class="no-data">لا توجد بيانات</div>';
    }
    
    const headers2 = sheetData[1] || [];
    const headers3 = sheetData[2] || [];
    
    let priceStartCol = -1;
    for (let j = 0; j < headers2.length; j++) {
      const h = (headers2[j] || '').toString().trim();
      if (h === 'السنة' || h === 'Year') {
        priceStartCol = j + 2;
        break;
      }
    }
    
    if (priceStartCol === -1) priceStartCol = 81;
    
    const priceColumns = [];
    let currentTrip = '';
    
    for (let j = priceStartCol - 1; j < headers2.length; j++) {
      const tripName = (headers2[j] || '').toString().trim();
      const itemName = (headers3[j] || '').toString().trim();
      
      if (tripName && tripName !== '') currentTrip = tripName;
      if (itemName && itemName !== '' && currentTrip) {
        priceColumns.push({ trip: currentTrip, item: itemName, col: j });
      }
    }
    
    let trTrip = '<th class="th-date" rowspan="2">التاريخ</th>';
    let trItem = '';
    let lastTrip = '';
    let spanCount = 0;
    
    for (let i = 0; i < priceColumns.length; i++) {
      const col = priceColumns[i];
      if (col.trip !== lastTrip) {
        if (spanCount > 0) trTrip += `<th colspan="${spanCount}" style="text-align:center">${lastTrip}</th>`;
        lastTrip = col.trip;
        spanCount = 1;
      } else {
        spanCount++;
      }
      trItem += `<th>${col.item}</th>`;
    }
    if (spanCount > 0) trTrip += `<th colspan="${spanCount}" style="text-align:center">${lastTrip}</th>`;
    
    let tbody = '';
    const MN = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    
    for (let r = 3; r < sheetData.length; r++) {
      const row = sheetData[r];
      if (!row[0]) continue;
      
      let dateStr = '';
      if (row[0] instanceof Date) {
        dateStr = String(row[0].getDate()).padStart(2, '0') + '/' + MN[row[0].getMonth()] + '/' + row[0].getFullYear();
      } else {
        dateStr = row[0].toString().trim();
      }
      
      let tds = '';
      for (const col of priceColumns) {
        let cellValue = '';
        if (col.col < row.length) cellValue = row[col.col] || '';
        const cellStr = cellValue.toString().trim();
        const { price, currency } = parseCell(cellStr);
        let displayValue = '-';
        if (price > 0) {
          displayValue = `<span class="${curClass(currency)}">${price} ${currency}</span>`;
        } else if (cellStr && cellStr !== '0' && cellStr !== '-') {
          displayValue = cellStr;
        }
        tds += `<td style="text-align:center">${displayValue}</td>`;
      }
      
      if (tds) tbody += `<tr><td style="font-weight:600;text-align:center">${dateStr}</td>${tds}</tr>`;
    }
    
    if (!tbody) tbody = `<tr><td colspan="100" class="no-data">لا توجد بيانات</td></tr>`;
    
    return `<div class="table-wrap"><table class="dt"><thead><tr class="row-trip">${trTrip}</tr><tr class="row-item">${trItem}</tr></thead><tbody>${tbody}</tbody></table></div>`;
  }
  
  if(!priceGroups.length) return '<div class="no-data">لا توجد بيانات أسعار</div>';
  
  const validPriceGroups = priceGroups.filter(g => g.name && g.name !== 'الشهر' && g.name !== 'السنة' && g.items.length > 0);
  
  if(!validPriceGroups.length) return '<div class="no-data">لا توجد بيانات أسعار</div>';
  
  let trTrip = '<th class="th-date" rowspan="2">التاريخ</th>';
  let trItem = '';
  for(const g of validPriceGroups){
    const span = g.items.length;
    trTrip += `<th colspan="${span}" style="text-align:center">${g.name}</th>`;
    for(const it of g.items) trItem += `<th>${it.name}</th>`;
  }
  let tbody='';
  for(let i=0;i<rows.length;i++){
    const row=rows[i];
    const dateStr=row[0]?fmtDate(row[0]):'';
    if(!dateStr) continue;
    let tds='';
    for(const g of validPriceGroups){
      for(const it of g.items){
        const cellValue=(it.col!==undefined&&row[it.col]!==undefined)?row[it.col]:'';
        const cellStr=(cellValue||'').toString().trim();
        const {price,currency}=parseCell(cellStr);
        let displayValue='-';
        if(price>0) displayValue=`<span class="${curClass(currency)}">${price} ${currency}</span>`;
        else if(cellStr&&cellStr!=='0'&&cellStr!=='-') displayValue=cellStr;
        tds+=`<td style="text-align:center">${displayValue}<\/td>`;
      }
    }
    tbody+=`<tr><td style="font-weight:600;text-align:center">${dateStr}<\/td>${tds}<\/tr>`;
  }
  return `<div class="table-wrap"><table class="dt"><thead><tr class="row-trip">${trTrip}<\/tr><tr class="row-item">${trItem}<\/tr><\/thead><tbody>${tbody||'<tr><td colspan="100" class="no-data">لا توجد بيانات<\/td><\/tr>'}<\/tbody><\/table><\/div>`;
}

function renderTotalsTab(rows) {
  if(!tripGroups.length) return '<div class="no-data">لا توجد بيانات بنود</div>';
  
  // ✅ بناء رأس الجدول (نفسه)
  let trTrip = '<th class="th-date" rowspan="2">التاريخ</th>';
  let trItem = '';
  for(const g of tripGroups){
    const span = g.items.length;
    trTrip += `<th colspan="${span}" style="text-align:center">${g.name}</th>`;
    for(const it of g.items) trItem += `<th>${it.name}</th>`;
  }
  for(const cur of sumCurrencies){
    trTrip += `<th class="th-sum" rowspan="2">المجموع<br><span class="${curClass(cur.currency)}">${cur.currency}</span></th>`;
  }
  
  // ✅ بناء جسم الجدول
  let tbody = '';
  const grandQuantities = {};
  const grandTotals = {};
  for(const cur of sumCurrencies) grandTotals[cur.currency] = 0;
  
  // ✅ إذا كانت هناك بيانات، قم ببناء الصفوف وحساب الإجماليات
  if (rows && rows.length > 0) {
    for(let i=0;i<rows.length;i++){
      const row=rows[i];
      const dateStr=row[0]?fmtDate(row[0]):'';
      if(!dateStr) continue;
      
      // ✅ حساب الإجماليات اليومية
      const dayTotals={};
      for(const sc of sumCurrencies) dayTotals[sc.currency]=0;
      
      let tds = '';
      for(const g of tripGroups){
        for(const it of g.items){
          const qty = parseFloat(row[it.col]) || 0;
          const qtyDisplay = (qty > 0 && Number.isInteger(qty)) ? qty : (qty > 0 ? qty.toFixed(1) : '-');
          tds += `<td style="${qty > 0 ? 'background:#f0fdf4;font-weight:700;color:#166534' : 'color:#cbd5e1'}">${qtyDisplay}</td>`;
          
          const key = `${g.name}_${it.name}`;
          grandQuantities[key] = (grandQuantities[key] || 0) + qty;
        }
      }
      
      // ✅ حساب الإجمالي النقدي من أعمدة sumCurrencies
      for(const sc of sumCurrencies){
        if(sc.col >= 0 && row[sc.col] !== undefined) {
          const val = parseFloat(row[sc.col]) || 0;
          if(val > 0) {
            dayTotals[sc.currency] = (dayTotals[sc.currency] || 0) + val;
          }
        }
      }
      
      let sumTds = '';
      for(const cur of sumCurrencies){
        const val = dayTotals[cur.currency] || 0;
        if(val > 0) {
          grandTotals[cur.currency] = (grandTotals[cur.currency] || 0) + val;
        }
        sumTds += `<td style="background:#e6f0ff;font-weight:700">${val > 0 ? `${Math.round(val).toLocaleString()} <span class="${curClass(cur.currency)}">${cur.currency}</span>` : '-'}</td>`;
      }
      
      tbody += `<tr><td style="font-weight:600;text-align:center">${dateStr}</td>${tds}${sumTds}</tr>`;
    }
  } else {
    // ✅ إذا كانت rows فارغة، عرض رسالة
    const colCount = 1 + tripGroups.reduce((sum, g) => sum + g.items.length, 0) + sumCurrencies.length;
    tbody += `<tr><td colspan="${colCount}" style="text-align:center;padding:30px;color:#94a3b8;">
      ⚠️ لا توجد بيانات في الفترة المحددة
    </td></tr>`;
    
    // ✅ تعيين grandTotals و grandQuantities إلى 0 (سيظهر صف الإجمالي الكلي بقيم 0)
    for(const cur of sumCurrencies) grandTotals[cur.currency] = 0;
    for(const g of tripGroups){
      for(const it of g.items){
        grandQuantities[`${g.name}_${it.name}`] = 0;
      }
    }
  }
  
  // ✅ صف الإجمالي الكلي - يظهر دائماً (حتى لو كانت rows فارغة)
  let grandQtyCells = '';
  for(const g of tripGroups){
    for(const it of g.items){
      const key = `${g.name}_${it.name}`;
      const totalQty = grandQuantities[key] || 0;
      const qtyDisplay = (totalQty > 0 && Number.isInteger(totalQty)) ? totalQty : (totalQty > 0 ? totalQty.toFixed(1) : '-');
      grandQtyCells += `<td style="background:#1a3260;color:var(--gold);font-size:13px"><strong>${qtyDisplay}</strong></td>`;
    }
  }
  
  let grandCurrencyCells = '';
  for(const cur of sumCurrencies){
    const v = grandTotals[cur.currency] || 0;
    grandCurrencyCells += `<td style="background:#1a3260;color:var(--gold);font-size:13px"><strong>${v > 0 ? Math.round(v).toLocaleString() : '-'} ${cur.currency}</strong></td>`;
  }
  
  tbody += `<tr class="total-row"><td><strong>الإجمالي الكلي</strong></td>${grandQtyCells}${grandCurrencyCells}</tr>`;
  
  return `<div class="table-wrap"><table class="dt"><thead><tr class="row-trip">${trTrip}</tr><tr class="row-item">${trItem}</tr></thead><tbody>${tbody}</tbody></table></div>`;
}

function renderFinancialSummary(rows) {
  if(!tripGroups.length && !paymentsData.length) return '<div class="no-data">لا توجد بيانات كافية</div>';
  
  const totalsDue={};
  for(const cur of sumCurrencies) totalsDue[cur.currency]=0;
  for(const row of rows){
    for(const sc of sumCurrencies){
      const val=parseFloat(row[sc.col])||0;
      if(val>0) totalsDue[sc.currency]+=val;
    }
  }
  
  const totalsPaid={USD:0,EUR:0,GBP:0,LE:0};
  for(const p of paymentsData){
    totalsPaid.USD+=p.USD||0;
    totalsPaid.EUR+=p.EUR||0;
    totalsPaid.GBP+=p.GBP||0;
    totalsPaid.LE+=p.LE||0;
  }
  
  const balance={};
  const allCurrencies=['USD','EUR','GBP','LE'];
  for(const cur of allCurrencies){
    balance[cur]=(totalsDue[cur]||0)-(totalsPaid[cur]||0);
  }
  
  let html=`<div class="financial-summary"><div class="fs-title">📊 الملخص المالي</div><div class="fs-grid">`;
  
  html+=`<div class="fs-card"><div class="label">💰 إجمالي المستحقات</div>`;
  let hasDue=false;
  for(const cur of allCurrencies){
    if(totalsDue[cur]>0){
      hasDue=true;
      html+=`<div class="value">${Math.round(totalsDue[cur]).toLocaleString()} <span class="currency">${cur}</span></div>`;
    }
  }
  if(!hasDue) html+=`<div class="value">-</div>`;
  html+=`</div>`;
  
  html+=`<div class="fs-card"><div class="label">💳 إجمالي المدفوعات</div>`;
  let hasPaid=false;
  for(const cur of allCurrencies){
    if(totalsPaid[cur]>0){
      hasPaid=true;
      html+=`<div class="value">${Math.round(totalsPaid[cur]).toLocaleString()} <span class="currency">${cur}</span></div>`;
    }
  }
  if(!hasPaid) html+=`<div class="value">-</div>`;
  html+=`</div>`;
  
  html+=`<div class="fs-card"><div class="label">⚖️ الرصيد المتبقي</div>`;
  let hasBalance=false;
  for(const cur of allCurrencies){
    if(balance[cur]!==0){
      hasBalance=true;
      const color=balance[cur]>0?'#16a34a':'#dc2626';
      html+=`<div class="value" style="color:${color}">${Math.abs(Math.round(balance[cur])).toLocaleString()} <span class="currency">${cur}</span></div>`;
    }
  }
  if(!hasBalance) html+=`<div class="value">-</div>`;
  html+=`</div></div></div>`;
  
  return html;
}

function switchTab(name, event){
  const btns = document.querySelectorAll('.tab-btn');
  btns.forEach(b => b.classList.remove('active'));
  if(event?.target) event.target.classList.add('active');
  
  // ✅ الترتيب الجديد: totals, payments, summary, prices
  ['totals','payments','summary','prices'].forEach(t => {
    const el = document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1));
    if(el) el.classList[t===name?'add':'remove']('active');
  });
}

function calculateTotalDue() {
  let total = 0;
  if (sumCurrencies && sumCurrencies.length > 0) {
    // استخدام أعمدة المجاميع من الشيت
    const rows = sheetData?.slice(3).filter(r => r[0]) || [];
    for (const row of rows) {
      for (const sc of sumCurrencies) {
        const val = parseFloat(row[sc.col]) || 0;
        if (val > 0) {
          // تحويل إلى LE إذا كانت العملة مختلفة
          if (sc.currency === 'USD') total += val * 50; // مثال: سعر الصرف
          else if (sc.currency === 'EUR') total += val * 55;
          else if (sc.currency === 'GBP') total += val * 65;
          else total += val;
        }
      }
    }
  }
  return total;
}

function calculateTotalPaid() {
  let total = 0;
  if (paymentsData && paymentsData.length > 0) {
    for (const p of paymentsData) {
      total += (p.USD || 0) * 50;
      total += (p.EUR || 0) * 55;
      total += (p.GBP || 0) * 65;
      total += (p.LE || 0);
    }
  }
  return total;
}

function getInvoiceItems() {
  const items = [];
  if (tripGroups && tripGroups.length > 0) {
    const rows = sheetData?.slice(3).filter(r => r[0]) || [];
    for (const g of tripGroups) {
      for (const item of g.items) {
        let totalQty = 0;
        for (const row of rows) {
          const qty = parseFloat(row[item.col]) || 0;
          if (qty > 0) totalQty += qty;
        }
        if (totalQty > 0) {
          items.push({
            trip: g.name,
            item: item.name,
            quantity: totalQty
          });
        }
      }
    }
  }
  return items;
}

function openPrintDetailedModal() {
  if (!customerAccount || !customerAccount.customerId) {
    showAlert('لا يوجد حساب عميل محدد', '⚠️');

  }

  const acc = customerAccount;
  
  // ✅ جلب بيانات الإجماليات اليومية مع فلترة التاريخ
  const detailedData = buildDetailedData(startDate, endDate);
  
  // ✅ فلترة المدفوعات حسب التاريخ
  const filteredPayments = filterPaymentsByDate(paymentsData, startDate, endDate);
  
  const dateRangeText = (startDate || endDate) 
    ? ` (${startDate || 'بداية'} → ${endDate || 'نهاية'})`
    : ' (جميع الفترة)';
  
  printDetailedData = {
    customerName: acc.customerName,

    category: acc.category || '-',
    phone: acc.phone || '-',

    date: new Date().toLocaleDateString('ar-EG', { day: '2-digit', month: 'short', year: 'numeric' }),

    branchName: currentUser?.branchName || '',
    userName: currentUser?.name || '',
    totalsData: detailedData.totalsData,     // بيانات جدول الإجماليات (مفلترة)
    tripGroups: detailedData.tripGroups,      // هيكل الرحلات والبنود
    sumCurrencies: detailedData.sumCurrencies, // عملات المجاميع
    payments: filteredPayments,               // بيانات المدفوعات (مفلترة)
    totalDue: detailedData.totalDue,
    totalPaid: detailedData.totalPaid,
    balance: detailedData.balance,

  };

}
function buildDetailedData(startDate, endDate) {
  // ✅ بناء بيانات الإجماليات اليومية من sheetData و tripGroups
  let rows = sheetData?.slice(3).filter(r => r[0]) || [];
  
  // ✅ فلترة حسب التاريخ إذا تم تحديده
  if (startDate || endDate) {
    const start = startDate ? new Date(startDate) : null;
    const end = endDate ? new Date(endDate) : null;
    if (start) start.setHours(0, 0, 0, 0);
    if (end) end.setHours(23, 59, 59, 999);
    
    rows = rows.filter(row => {
      const dateStr = row[0]?.toString().trim();
      if (!dateStr) return true;
      const dateObj = parseDateToObj(dateStr);
      if (!dateObj) return true;
      if (start && dateObj < start) return false;
      if (end && dateObj > end) return false;
      return true;
    });
  }
  
  const totalsData = [];
  const grandTotals = {};
  const grandQuantities = {};
  
  // تهيئة grandTotals لكل عملة
  for (const sc of sumCurrencies) {
    grandTotals[sc.currency] = 0;
  }
  
  // تهيئة grandQuantities لكل بند
  for (const g of tripGroups) {
    for (const item of g.items) {
      grandQuantities[`${g.name}_${item.name}`] = 0;
    }
  }
  
  // معالجة كل صف
  for (const row of rows) {
    const dateStr = row[0] ? fmtDate(row[0]) : '';
    if (!dateStr) continue;
    
    const rowData = {
      date: dateStr,
      quantities: {},
      totals: {}
    };
    
    // قراءة الكميات
    for (const g of tripGroups) {
      for (const item of g.items) {
        const qty = parseFloat(row[item.col]) || 0;
        const key = `${g.name}_${item.name}`;
        rowData.quantities[key] = qty;
        grandQuantities[key] = (grandQuantities[key] || 0) + qty;
      }
    }
    
    // قراءة المجاميع
    for (const sc of sumCurrencies) {
      const val = parseFloat(row[sc.col]) || 0;
      rowData.totals[sc.currency] = val;
      grandTotals[sc.currency] = (grandTotals[sc.currency] || 0) + val;
    }
    
    totalsData.push(rowData);
  }
  
  // ✅ حساب إجمالي المستحقات والمدفوعات
  let totalDue = 0;
  for (const sc of sumCurrencies) {
    const val = grandTotals[sc.currency] || 0;
    if (sc.currency === 'USD') totalDue += val * 50;
    else if (sc.currency === 'EUR') totalDue += val * 55;
    else if (sc.currency === 'GBP') totalDue += val * 65;
    else totalDue += val;
  }
  
  // ✅ استخدام المدفوعات المفلترة (تُمرر من الخارج)
  let totalPaid = 0;
  for (const p of paymentsData) {
    totalPaid += (p.USD || 0) * 50;
    totalPaid += (p.EUR || 0) * 55;
    totalPaid += (p.GBP || 0) * 65;
    totalPaid += (p.LE || 0);
  }
  
  const balance = totalDue - totalPaid;
  
  return {
    totalsData: totalsData,
    tripGroups: tripGroups,
    sumCurrencies: sumCurrencies,
    grandQuantities: grandQuantities,
    grandTotals: grandTotals,
    totalDue: totalDue,
    totalPaid: totalPaid,
    balance: balance
  };
}

function buildTotalsTable(data) {
  const tripGroups = data.tripGroups || [];
  const sumCurrencies = data.sumCurrencies || [];
  const totalsData = data.totalsData || [];
  const grandQuantities = data.grandQuantities || {};
  const grandTotals = data.grandTotals || {};
  
  if (tripGroups.length === 0) {
    return '<div style="padding:20px;text-align:center;color:#94a3b8;">لا توجد بيانات للإجماليات اليومية</div>';
  }
  
  // ✅ بناء رأس الجدول
  let trTrip = '<th class="th-date" rowspan="2">التاريخ</th>';
  let trItem = '';
  
  for (const g of tripGroups) {
    const span = g.items.length;
    trTrip += `<th colspan="${span}" style="text-align:center;">${g.name}</th>`;
    for (const it of g.items) {
      trItem += `<th>${it.name}</th>`;
    }
  }
  
  for (const cur of sumCurrencies) {
    trTrip += `<th class="th-sum" rowspan="2" style="text-align:center;">المجموع<br><span class="badge-cur cur-${cur.currency}">${cur.currency}</span></th>`;
  }
  
  // ✅ بناء جسم الجدول
  let tbody = '';
  
  for (const row of totalsData) {
    let tds = `<td style="font-weight:600;">${row.date}</td>`;
    
    // الكميات
    for (const g of tripGroups) {
      for (const item of g.items) {
        const key = `${g.name}_${item.name}`;
        const qty = row.quantities[key] || 0;
        const display = qty > 0 ? qty : '-';
        const style = qty > 0 ? 'background:#f0fdf4;font-weight:700;color:#166534;' : 'color:#cbd5e1;';
        tds += `<td style="${style}">${display}</td>`;
      }
    }
    
    // المجاميع
    for (const cur of sumCurrencies) {
      const val = row.totals[cur.currency] || 0;
      tds += `<td style="background:#e6f0ff;font-weight:700;">${val > 0 ? Math.round(val).toLocaleString() : '-'}</td>`;
    }
    
    tbody += `<tr>${tds}</tr>`;
  }
  
  // ✅ صف الإجمالي الكلي
  let grandQtyCells = '';
  for (const g of tripGroups) {
    for (const item of g.items) {
      const key = `${g.name}_${item.name}`;
      const totalQty = grandQuantities[key] || 0;
      const display = totalQty > 0 ? totalQty : '-';
      grandQtyCells += `<td style="background:#1a3260;color:#f5c842;font-weight:700;">${display}</td>`;
    }
  }
  
  let grandCurrencyCells = '';
  for (const cur of sumCurrencies) {
    const val = grandTotals[cur.currency] || 0;
    grandCurrencyCells += `<td style="background:#1a3260;color:#f5c842;font-weight:700;">${val > 0 ? Math.round(val).toLocaleString() : '-'} ${cur.currency}</td>`;
  }
  
  tbody += `<tr class="total-row"><td style="background:#1a3260;color:#f5c842;font-weight:700;text-align:center;">الإجمالي الكلي</td>${grandQtyCells}${grandCurrencyCells}</tr>`;
  
  return `
    <table class="dt-print">
      <thead>
        <tr class="row-trip">${trTrip}</tr>
        <tr class="row-item">${trItem}</tr>
      </thead>
      <tbody>${tbody}</tbody>
    </table>
  `;
}

async function refreshCustomerData() {
  if(!customerAccount || !customerAccount.customerId) {
    showAlert('لا يوجد حساب عميل محدد', '⚠️');
    return;
  }
  
  showAlert('جاري تحديث البيانات من الفواتير...', '🔄');
  
  try {
    const isUnlimited = UNLIMITED_TYPES.includes(loggedInUser?.type);
    let branchesParam = [];
    
    if(isUnlimited && selectedBranches.length > 0) {
      branchesParam = selectedBranches;
    } else if(!isUnlimited && loggedInUser?.branchName) {
      branchesParam = [loggedInUser.branchName];
    }
    
    const result = await gas('collectAndUpdateCustomerSheet', {
      customerId: customerAccount.customerId,
      userId: loggedInUser?.id || '',
      selectedBranches: JSON.stringify(branchesParam),
      centerName: currentUser?.centerName || ''
    });
    
    if(result && result.success) {
      showAlert(`✅ تم تحديث البيانات بنجاح!\nتم تحديث ${result.updatedDates || 0} تاريخ`, '✅');
    } else {
      console.log('⚠️ لا توجد فواتير مؤكدة للتجميع');
      showAlert('⚠️ لا توجد فواتير مؤكدة للعميل في الفترة المحددة', '⚠️');
    }
    
    await loadSheetDataOnly();
    renderPage('', '');
    
  } catch(e) {
    console.error('refreshCustomerData error:', e);
    showAlert('خطأ في التحديث: ' + e.message, '❌');
    await loadSheetDataOnly();
    renderPage('', '');
  }
}

async function loadSheetDataOnly() {
  const sheetName = customerAccount.customerName + '_' + customerAccount.category + '_' + customerAccount.customerType;
  const res = await gas('getAccountSheetData', {
    sheetName: sheetName,
    centerName: currentUser?.centerName || ''
  });
  if(res?.success && Array.isArray(res.data)) {
    sheetData = res.data;
    parseSheetStructure();
  }
}
function filterPaymentsByDate(payments, startDate, endDate) {
  if (!payments || payments.length === 0) return [];
  
  // ✅ إذا لم يتم تحديد تاريخ، إرجاع جميع المدفوعات
  if (!startDate && !endDate) return payments;
  
  const start = startDate ? new Date(startDate) : null;
  const end = endDate ? new Date(endDate) : null;
  if (start) start.setHours(0, 0, 0, 0);
  if (end) end.setHours(23, 59, 59, 999);
  
  return payments.filter(p => {
    const dateStr = p.date;
    if (!dateStr) return true;
    const dateObj = parseDateToObj(dateStr);
    if (!dateObj) return true;
    if (start && dateObj < start) return false;
    if (end && dateObj > end) return false;
    return true;
  });
}

async function loadAll(){
  document.getElementById('mainContent').innerHTML='<div class="loader"><div class="spinner"></div>جاري جلب الحساب...</div>';
  try{
    const params = {
      customerId: viewingCustomer?.customerId || customerAccount?.customerId,
      centerName: currentUser?.centerName || ''
    };
    
    const dashboardData = await gas('getCustomerDashboardData', params);
    
    if (!dashboardData?.success) {
      document.getElementById('mainContent').innerHTML=`
        <div class="card"><div class="card-body no-data">⚠️ ${dashboardData?.message || 'لا توجد بيانات'}</div></div>
      `;
      return;
    }
    
    customerAccount = dashboardData.customer;
    const isSupplier = customerAccount.customerType === 'Supplier';
    
    paymentsData = dashboardData.payments || [];
    
    const typeLabel = isSupplier ? '🏢 لوحة المنفذ' : '🏢 لوحة العميل';
    const headerTitle = document.querySelector('.header h2');
    if (headerTitle) headerTitle.textContent = typeLabel;
    
    document.getElementById('customerNameSpan').textContent = customerAccount.customerName;
    document.getElementById('customerCategorySpan').textContent = customerAccount.category || '-';
    
    if (dashboardData.sheetData && dashboardData.sheetData.length >= 4) {
      sheetData = dashboardData.sheetData;
    } else {
      document.getElementById('mainContent').innerHTML=`
        <div class="card"><div class="card-body no-data">⚠️ لا توجد بيانات في شيت الحساب</div></div>
      `;
      return;
    }
    
    const isUnlimited = UNLIMITED_TYPES.includes(loggedInUser?.type);
    if(isUnlimited && loggedInUser?.centerId) {
      const branchesRes = await gas('getBranchesByCenterId', { centerId: loggedInUser.centerId });
      if(Array.isArray(branchesRes)) {
        availableBranches = branchesRes;
        if(availableBranches.length > 0 && selectedBranches.length === 0) {
          selectedBranches = [availableBranches[0].name];
        }
      }
    } else if(!isUnlimited && loggedInUser?.branchName) {
      selectedBranches = [loggedInUser.branchName];
    }
    
    // ✅ ============================================================
    // ✅ تحديث البيانات تلقائياً من الفواتير (مرة واحدة عند التحميل)
    // ✅ ============================================================
    try {
      console.log('🔄 تحديث البيانات تلقائياً من الفواتير...');
      
      let branchesParam = [];
      if(isUnlimited && selectedBranches.length > 0) {
        branchesParam = selectedBranches;
      } else if(!isUnlimited && loggedInUser?.branchName) {
        branchesParam = [loggedInUser.branchName];
      }
      
      const updateResult = await gas('collectAndUpdateCustomerSheet', {
        customerId: customerAccount.customerId,
        userId: loggedInUser?.id || '',
        selectedBranches: JSON.stringify(branchesParam),
        centerName: currentUser?.centerName || ''
      });
      
      if (updateResult?.success) {
        console.log(`✅ تم تحديث البيانات تلقائياً: ${updateResult.updatedDates || 0} تاريخ, ${updateResult.updatedCount || 0} خلية`);
        
        // ✅ إعادة تحميل بيانات الشيت بعد التحديث
        const sheetName = customerAccount.customerName + '_' + customerAccount.category + '_' + customerAccount.customerType;
        const updatedSheetData = await gas('getAccountSheetData', {
          sheetName: sheetName,
          centerName: currentUser?.centerName || ''
        });
        
        if (updatedSheetData?.success && Array.isArray(updatedSheetData.data)) {
          sheetData = updatedSheetData.data;
          console.log('✅ تم تحديث بيانات الشيت بعد التجميع');
        }
      } else {
        console.log('⚠️ لا توجد فواتير جديدة للتحديث');
      }
    } catch(updateError) {
      console.warn('⚠️ فشل التحديث التلقائي:', updateError.message);
      // لا نعرض رسالة خطأ للمستخدم حتى لا يزعجه
    }
    
    renderPage('', '');
    
  } catch(e){
    console.error('loadAll error:',e);
    showAlert('خطأ في التحميل: '+e.message,'❌');
  }
}

// ✅ DOMContentLoaded - باستخدام Session API
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
  // ✅ تطبيق الثيم الموحد
  if (typeof Theme !== 'undefined' && Theme.applyToPage) {
    Theme.applyToPage();
  }
  Theme.setPageTitle('لوحة العميل - التقارير المالية');
  
  // ✅ استخدام Session.checkValidity() من session.js
  if (!Session.checkValidity()) {
    return; // تم التوجيه داخل الدالة
  }
  
  // ✅ استخدام Session.getUser() من session.js
  const user = Session.getUser();
  if (!user) {
    location.href = 'index.html';
    return;
  }
  
  loggedInUser = user;
  currentUser = user;
  
  if (!sessionStorage.getItem('returnUrl') && document.referrer) {
    sessionStorage.setItem('returnUrl', document.referrer);
  }
  
  const urlParams = new URLSearchParams(location.search);
  const customerId = urlParams.get('customerId');
  
  if (customerId) {
    viewingCustomer = { customerId: customerId };
  }
  
  document.getElementById('userChip').textContent = loggedInUser.name || 'User';
  await loadAll();
});

function goBackToDashboard() {
  const userType = loggedInUser?.type || currentUser?.type || 'Accountant';
  if (userType === 'Customer') { 
    // ✅ استخدام Session.logout() بدلاً من localStorage المباشر
    Session.logout();
    return;
  }
  let returnUrl = sessionStorage.getItem('returnUrl');
  if (!returnUrl && document.referrer) returnUrl = document.referrer;
  if (returnUrl && returnUrl.includes('ManageSupplierCustomers.html')) {
    const userParam = encodeURIComponent(JSON.stringify(loggedInUser || currentUser));
    location.href = `ManageSupplierCustomers.html?centerName=${currentUser?.centerName || ''}&user=${userParam}`;
    return;
  }
  const dashboardPage = DASHBOARDS[userType] || 'Dashboard.html';
  const userParam = encodeURIComponent(JSON.stringify(loggedInUser || currentUser));
  location.href = `${dashboardPage}?centerName=${currentUser?.centerName || ''}&user=${userParam}`;
}
