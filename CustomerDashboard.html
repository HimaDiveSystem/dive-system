 <!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>لوحة العميل - نظام إدارة الفعاليات</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0f1f3d;
      --navy2: #1a3260;
      --gold: #f5c842;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #ea580c;
      --bg: #f0f4f8;
      --card: #fff;
      --border: #dde4f0;
      --text: #1a2540;
      --text-lt: #5a6a8a;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 4px 24px rgba(15, 31, 61, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      color: white;
      padding: 13px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(15, 31, 61, 0.25);
    }

    .header h2 {
      color: var(--gold);
      font-size: 18px;
      font-weight: 900;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-chip {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 40px;
      padding: 4px 13px;
      color: white;
      font-size: 12px;
      font-weight: 600;
    }

    .back-btn {
      background: transparent;
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 4px 13px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      font-family: 'Cairo', sans-serif;
      transition: all 0.2s;
    }

    .back-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 16px 50px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 18px;
      overflow: hidden;
    }

    .card-head {
      padding: 12px 18px;
      background: linear-gradient(90deg, var(--navy), var(--navy2));
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-head h3 {
      color: var(--gold);
      font-size: 14px;
      font-weight: 800;
    }

    .ch-icon {
      background: rgba(245, 200, 66, 0.2);
      border-radius: 7px;
      padding: 3px 6px;
      font-size: 13px;
    }

    .card-body {
      padding: 16px;
    }

    .fgrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .fgroup {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .fgroup label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-lt);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .fc {
      padding: 8px 12px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: 'Cairo', sans-serif;
      color: var(--text);
      background: #fafbfd;
      width: 100%;
      height: 40px;
      transition: border-color 0.2s;
    }

    .fc:focus {
      border-color: var(--blue);
      outline: none;
      background: white;
    }

    .btn {
      padding: 8px 20px;
      border: none;
      border-radius: 40px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      color: var(--gold);
    }

    .btn-success {
      background: var(--green);
      color: white;
    }

    .btn-warning {
      background: var(--orange);
      color: white;
    }

    .action-btns {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .data-table thead th {
      background: #f0f4f8;
      color: var(--text-lt);
      padding: 10px 8px;
      font-weight: 700;
      text-align: center;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }

    .data-table tbody td {
      padding: 8px;
      border-bottom: 1px solid #f0f4f8;
      text-align: center;
      white-space: nowrap;
    }

    .data-table tbody tr:hover {
      background: #f8faff;
    }

    .data-table tbody td:first-child {
      text-align: right;
      font-weight: 600;
    }

    .total-row {
      background: #e6f0ff;
      font-weight: 700;
    }

    .loader {
      text-align: center;
      padding: 40px;
      color: var(--text-lt);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .no-data {
      text-align: center;
      padding: 40px;
      color: var(--text-lt);
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(4px);
    }

    .modal.open {
      display: flex;
    }

    .modal-box {
      background: white;
      width: 92%;
      max-width: 400px;
      border-radius: 22px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      animation: pop 0.25s ease;
    }

    .alert-icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .alert-msg {
      color: var(--navy);
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    @keyframes pop {
      from {
        transform: scale(0.85);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @media (max-width: 640px) {
      .fgrid {
        grid-template-columns: 1fr;
      }
      .data-table {
        font-size: 10px;
      }
      .data-table td,
      .data-table th {
        padding: 6px 4px;
      }
    }
  </style>
</head>
<body>

<div class="header">
  <h2>🏢 لوحة العميل</h2>
  <div class="header-right">
    <span class="user-chip" id="userChip">...</span>
    <button class="back-btn" onclick="goBack()">← تسجيل الخروج</button>
  </div>
</div>

<div class="page">
  <div id="mainContent">
    <div class="loader">
      <div class="spinner"></div>
      جاري تحميل بيانات الحساب...
    </div>
  </div>
</div>

<!-- Alert Modal -->
<div id="alertModal" class="modal">
  <div class="modal-box">
    <div class="alert-icon" id="alertIcon">ℹ️</div>
    <div class="alert-msg" id="alertMsg"></div>
    <div style="display: flex; gap: 8px; justify-content: center; margin-top: 16px;">
      <button class="btn btn-primary" onclick="closeAlert()">موافق</button>
    </div>
  </div>
</div>

<script>
// ====================== الرابط الصحيح للـ API ======================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwe1Q9pjAJRk9CfWsK5YGjD5uVAbJkMhAVgw6akKkFIR9sz15V78C88Vs5dumKE-SwF/exec';
const DASH = { Admin: 'Dashboard.html', Owner: 'OwnerDashboard.html', Sales: 'SalesDashboard.html', Accountant: 'AccountantDashboard.html', Customer: 'CustomerDashboard.html' };

let currentUser = null;
let customerAccount = null;
let accountSheetData = null;
let tripsHeaders = []; // أسماء الرحلات والبنود
let priceColumns = []; // أعمدة الأسعار
let dailyTotals = {}; // إجمالي كل يوم

// ====================== دوال الاتصال ======================
function gas(action, params = {}) {
  return new Promise((resolve, reject) => {
    const callbackName = 'jsonp_callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    const url = new URL(GAS_URL);
    url.searchParams.set('action', action);
    url.searchParams.set('callback', callbackName);
    url.searchParams.set('_t', Date.now());
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v ?? '')));

    window[callbackName] = function (data) {
      delete window[callbackName];
      if (document.body.contains(script)) {
        document.body.removeChild(script);
      }
      resolve(data);
    };

    const script = document.createElement('script');
    script.src = url.toString();
    script.onerror = () => {
      delete window[callbackName];
      if (document.body.contains(script)) {
        document.body.removeChild(script);
      }
      reject(new Error('فشل الاتصال بالخادم'));
    };
    document.body.appendChild(script);

    setTimeout(() => {
      if (window[callbackName]) {
        delete window[callbackName];
        if (document.body.contains(script)) {
          document.body.removeChild(script);
        }
        reject(new Error('انتهى وقت الاتصال'));
      }
    }, 30000);
  });
}

async function gasPost(data) {
  const params = {};
  for (const [key, value] of Object.entries(data)) {
    if (value !== undefined && value !== null) {
      params[key] = typeof value === 'object' ? JSON.stringify(value) : String(value);
    }
  }
  return gas(data.action, params);
}

// ====================== دوال مساعدة ======================
function goBack() {
  sessionStorage.removeItem('currentUser');
  location.href = 'index.html';
}

function showAlert(msg, icon) {
  document.getElementById('alertIcon').textContent = icon || 'ℹ️';
  document.getElementById('alertMsg').textContent = msg;
  document.getElementById('alertModal').classList.add('open');
}

function closeAlert() {
  document.getElementById('alertModal').classList.remove('open');
}

function formatDateDisplay(dateStr) {
  if (!dateStr) return '';
  // إذا كان بصيغة dd/MMM/yyyy
  const match = dateStr.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (match) {
    return `${match[1].padStart(2, '0')}/${match[2]}/${match[3]}`;
  }
  return dateStr;
}

function parseDateFromDDMMMYYYY(dateStr) {
  if (!dateStr) return null;
  const match = dateStr.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (match) {
    const months = { Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11 };
    return new Date(parseInt(match[3]), months[match[2]], parseInt(match[1]));
  }
  return new Date(dateStr);
}

// ====================== جلب بيانات العميل ======================
async function loadCustomerAccount() {
  try {
    // جلب جميع الحسابات والعثور على حساب العميل الحالي
    const allAccounts = await gas('getAllSuppliersCustomers');
    const accounts = Array.isArray(allAccounts) ? allAccounts : [];
    
    // البحث عن حساب العميل باستخدام البريد الإلكتروني أو الاسم
    customerAccount = accounts.find(acc => 
      acc.customerType === 'Customer' && 
      (acc.loginEmail === currentUser?.email || acc.customerName === currentUser?.name)
    );
    
    if (!customerAccount) {
      showAlert('لم يتم العثور على حساب مرتبط بهذا المستخدم', '⚠️');
      document.getElementById('mainContent').innerHTML = `
        <div class="card">
          <div class="card-body" style="text-align:center;padding:40px;">
            <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
            <h3>لا يوجد حساب مرتبط</h3>
            <p style="color:var(--text-lt);margin-top:8px;">يرجى التواصل مع الإدارة لربط حسابك</p>
          </div>
        </div>`;
      return false;
    }
    
    console.log('حساب العميل:', customerAccount);
    return true;
    
  } catch (e) {
    console.error('loadCustomerAccount error:', e);
    showAlert('فشل تحميل بيانات الحساب: ' + e.message, '❌');
    return false;
  }
}

// ====================== جلب بيانات الشيت ======================
async function loadAccountSheet(startDateISO, endDateISO) {
  try {
    showLoading(true);
    
    // جلب تواريخ الشيت
    const datesRes = await gasPost({
      action: 'getAccountSheetDates',
      customerId: customerAccount.customerId
    });
    
    if (!datesRes?.success) {
      showAlert('لا يوجد شيت للحساب', '⚠️');
      return false;
    }
    
    // جلب بيانات الشيت بالكامل
    const sheetName = customerAccount.customerName + '_' + customerAccount.category + '_' + customerAccount.customerType;
    const sheetData = await gas('getAccountSheetData', { sheetName });
    
    if (!sheetData?.success || !sheetData.data) {
      showAlert('فشل تحميل بيانات الشيت', '❌');
      return false;
    }
    
    accountSheetData = sheetData.data;
    
    // تحليل البيانات
    parseSheetData();
    
    // عرض الجدول
    renderPriceTable(startDateISO, endDateISO);
    
    return true;
    
  } catch (e) {
    console.error('loadAccountSheet error:', e);
    showAlert('فشل تحميل بيانات الشيت: ' + e.message, '❌');
    return false;
  } finally {
    showLoading(false);
  }
}

function parseSheetData() {
  if (!accountSheetData || accountSheetData.length < 4) return;
  
  // الصف 2: أسماء الرحلات
  const row2 = accountSheetData[1] || [];
  // الصف 3: أسماء البنود
  const row3 = accountSheetData[2] || [];
  
  // بناء هيكل الرحلات والبنود
  tripsHeaders = [];
  let currentTrip = null;
  
  for (let i = 1; i < row2.length; i++) {
    const tripName = row2[i]?.toString().trim();
    const itemName = row3[i]?.toString().trim();
    
    if (tripName && tripName !== '') {
      currentTrip = { name: tripName, items: [], colStart: i };
      tripsHeaders.push(currentTrip);
    }
    if (currentTrip && itemName && itemName !== '') {
      currentTrip.items.push({ name: itemName, col: i });
    }
  }
  
  console.log('الرحلات والبنود:', tripsHeaders);
}

function renderPriceTable(startDateISO, endDateISO) {
  if (!accountSheetData || accountSheetData.length < 4) {
    document.getElementById('mainContent').innerHTML = `
      <div class="card">
        <div class="card-body no-data">لا توجد بيانات في الشيت</div>
      </div>`;
    return;
  }
  
  // تحديد نطاق التواريخ
  let startRow = 3;
  let endRow = accountSheetData.length - 1;
  
  if (startDateISO) {
    const startDt = new Date(startDateISO);
    for (let i = 3; i < accountSheetData.length; i++) {
      const dateStr = accountSheetData[i]?.[0]?.toString() || '';
      const rowDate = parseDateFromDDMMMYYYY(dateStr);
      if (rowDate && rowDate >= startDt) {
        startRow = i;
        break;
      }
    }
  }
  
  if (endDateISO) {
    const endDt = new Date(endDateISO);
    for (let i = accountSheetData.length - 1; i >= 3; i--) {
      const dateStr = accountSheetData[i]?.[0]?.toString() || '';
      const rowDate = parseDateFromDDMMMYYYY(dateStr);
      if (rowDate && rowDate <= endDt) {
        endRow = i;
        break;
      }
    }
  }
  
  // بناء جدول HTML
  let html = `
    <div class="card">
      <div class="card-head">
        <span class="ch-icon">💰</span>
        <h3>قائمة الأسعار</h3>
      </div>
      <div class="card-body">
        <div class="action-btns">
          <button class="btn btn-primary" onclick="openInvoicePage()">➕ فاتورة جديدة</button>
          <button class="btn btn-success" onclick="refreshData()">🔄 تحديث</button>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr><th>التاريخ</th>`;
  
  // إضافة رؤوس الأعمدة
  for (const trip of tripsHeaders) {
    if (trip.items.length === 1) {
      html += `<th>${trip.name}<br><span style="font-size:10px;color:#94a3b8">${trip.items[0].name}</span></th>`;
    } else {
      html += `<th colspan="${trip.items.length}">${trip.name}</th>`;
    }
  }
  html += `<th>الإجمالي</th></tr><tr><th></th>`;
  
  // إضافة أسماء البنود الفرعية
  for (const trip of tripsHeaders) {
    for (const item of trip.items) {
      html += `<th style="font-size:10px;color:#94a3b8">${item.name}</th>`;
    }
  }
  html += `<th></th></tr></thead><tbody>`;
  
  // إضافة الصفوف
  dailyTotals = {};
  let grandTotal = 0;
  
  for (let i = startRow; i <= endRow; i++) {
    const row = accountSheetData[i];
    if (!row || !row[0]) continue;
    
    const dateStr = formatDateDisplay(row[0]?.toString() || '');
    let rowTotal = 0;
    
    html += `<tr><td style="font-weight:600">${dateStr}</td>`;
    
    let colIndex = 1;
    for (const trip of tripsHeaders) {
      for (const item of trip.items) {
        const priceCell = row[item.col]?.toString() || '0';
        // استخراج الرقم من النص (مثل "500LE" أو "500 USD")
        const priceMatch = priceCell.match(/^([\d.]+)/);
        const price = priceMatch ? parseFloat(priceMatch[1]) : 0;
        rowTotal += price;
        html += `<td>${priceCell}</td>`;
        colIndex++;
      }
    }
    
    dailyTotals[dateStr] = rowTotal;
    grandTotal += rowTotal;
    html += `<td style="font-weight:700;background:#e6f0ff">${rowTotal.toFixed(2)}</td>`;
    html += `</tr>`;
  }
  
  // إضافة صف المجموع الكلي
  html += `<tr class="total-row"><td style="font-weight:700">المجموع الكلي</td>`;
  const itemCount = tripsHeaders.reduce((sum, t) => sum + t.items.length, 0);
  for (let i = 0; i < itemCount; i++) {
    html += `<td></td>`;
  }
  html += `<td style="font-weight:700;font-size:14px">${grandTotal.toFixed(2)}</td></tr>`;
  
  html += `</tbody></table></div></div></div>`;
  
  // إضافة إحصائيات سريعة
  html += `
    <div class="card">
      <div class="card-head">
        <span class="ch-icon">📊</span>
        <h3>إحصائيات سريعة</h3>
      </div>
      <div class="card-body">
        <div class="fgrid">
          <div class="fgroup"><label>إجمالي الأيام</label><div class="fc" style="background:#f8faff;font-weight:700">${endRow - startRow + 1}</div></div>
          <div class="fgroup"><label>أعلى يوم</label><div class="fc" style="background:#f8faff;font-weight:700;color:var(--green)">${Object.entries(dailyTotals).sort((a,b)=>b[1]-a[1])[0]?.[0] || '-'}</div></div>
          <div class="fgroup"><label>أعلى قيمة</label><div class="fc" style="background:#f8faff;font-weight:700;color:var(--green)">${Math.max(...Object.values(dailyTotals), 0).toFixed(2)}</div></div>
        </div>
      </div>
    </div>`;
  
  document.getElementById('mainContent').innerHTML = html;
}

function showLoading(show) {
  if (show) {
    document.getElementById('mainContent').innerHTML = `
      <div class="loader">
        <div class="spinner"></div>
        جاري تحميل البيانات...
      </div>`;
  }
}

function refreshData() {
  loadAccountSheet(null, null);
}

function openInvoicePage() {
  // فتح صفحة إدخال الفاتورة في نافذة جديدة
  window.open('CustomerInvoice.html', '_blank');
}

// ====================== دالة جلب بيانات الشيت من الخادم ======================
async function getAccountSheetData(params) {
  try {
    const sheetName = params.sheetName;
    if (!sheetName) return { success: false, message: 'sheetName مطلوب' };
    
    const ss = SpreadsheetApp.openById(SHEET_ID);
    const sh = ss.getSheetByName(sheetName);
    if (!sh) return { success: false, message: 'شيت غير موجود' };
    
    const data = sh.getDataRange().getValues();
    return { success: true, data: data };
  } catch(e) {
    return { success: false, message: e.toString() };
  }
}

// ====================== إضافة عناصر تحكم التاريخ ======================
function addDateFilterControls() {
  const filterHtml = `
    <div class="card">
      <div class="card-head">
        <span class="ch-icon">📅</span>
        <h3>فلترة النتائج</h3>
      </div>
      <div class="card-body">
        <div class="fgrid">
          <div class="fgroup"><label>من تاريخ</label><input type="date" class="fc" id="filterStartDate"></div>
          <div class="fgroup"><label>إلى تاريخ</label><input type="date" class="fc" id="filterEndDate"></div>
          <div class="fgroup"><label style="visibility:hidden">.</label><button class="btn btn-primary" onclick="applyDateFilter()">تطبيق الفلتر</button></div>
        </div>

// ====================== تهيئة الصفحة ======================
document.addEventListener('DOMContentLoaded', async () => {
  console.log('=== بدء تحميل لوحة العميل ===');
  
  let ud = sessionStorage.getItem('currentUser');
  if (!ud) {
    const p = new URLSearchParams(location.search).get('user');
    if (p) {
      ud = decodeURIComponent(p);
      sessionStorage.setItem('currentUser', ud);
    }
  }
  
  if (!ud) {
    location.href = 'index.html';
    return;
  }
  
  try {
    currentUser = JSON.parse(ud);
  } catch (e) {
    location.href = 'index.html';
    return;
  }
  
  document.getElementById('userChip').textContent = currentUser.name || 'User';
  
  const loaded = await loadCustomerAccount();
  if (loaded) {
    await loadAccountSheet(null, null);
  }
  
  console.log('=== انتهى التحميل ===');
});
