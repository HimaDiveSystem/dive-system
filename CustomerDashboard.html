<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>لوحة العميل</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0f1f3d;--navy2:#1a3260;--gold:#f5c842;
      --blue:#2563eb;--green:#16a34a;--red:#dc2626;--orange:#ea580c;
      --bg:#f0f4f8;--card:#fff;--border:#dde4f0;--text:#1a2540;--text-lt:#5a6a8a;
      --radius:16px;--radius-sm:10px;--shadow:0 4px 24px rgba(15,31,61,.10);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    .header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;padding:13px 22px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(15,31,61,.25);}
    .header h2{color:var(--gold);font-size:18px;font-weight:900;}
    .header-right{display:flex;align-items:center;gap:8px;}
    .user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:40px;padding:4px 13px;color:white;font-size:12px;font-weight:600;}
    .back-btn{background:transparent;border:2px solid rgba(255,255,255,.3);color:white;padding:4px 13px;border-radius:40px;cursor:pointer;font-weight:700;font-size:12px;font-family:'Cairo',sans-serif;transition:all .2s;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}
    .page{max-width:1400px;margin:0 auto;padding:20px 16px 50px;}
    .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden;}
    .card-head{padding:12px 18px;background:linear-gradient(90deg,var(--navy),var(--navy2));display:flex;align-items:center;gap:8px;}
    .card-head h3{color:var(--gold);font-size:14px;font-weight:800;}
    .ch-icon{background:rgba(245,200,66,.2);border-radius:7px;padding:3px 6px;font-size:13px;}
    .card-body{padding:16px;}
    .fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:14px;}
    .fgroup{display:flex;flex-direction:column;gap:5px;}
    .fgroup label{font-size:11px;font-weight:700;color:var(--text-lt);}
    .fc{padding:8px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Cairo',sans-serif;color:var(--text);background:#fafbfd;width:100%;height:40px;}
    .fc:focus{border-color:var(--blue);outline:none;background:white;}
    .btn{padding:8px 20px;border:none;border-radius:40px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .2s;}
    .btn:hover{transform:translateY(-1px);}
    .btn-navy{background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);}
    .btn-green{background:var(--green);color:white;}
    .btn-gray{background:#f1f5f9;color:var(--text);}
    .tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;border-bottom:2px solid var(--border);padding-bottom:10px;}
    .tab-btn{padding:8px 20px;background:#f0f4f8;border:none;border-radius:40px;font-size:13px;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;color:var(--text-lt);}
    .tab-btn.active{background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);}
    .tab-pane{display:none;} .tab-pane.active{display:block;}
    .table-wrap{overflow-x:auto;max-height:70vh;}
    table.dt{width:100%;border-collapse:collapse;font-size:12px;}
    table.dt thead{position:sticky;top:0;z-index:10;}
    table.dt thead tr.row-trip th{background:linear-gradient(90deg,var(--navy),var(--navy2));color:var(--gold);padding:9px 8px;font-weight:800;text-align:center;white-space:nowrap;border:1px solid #2a4a7a;}
    table.dt thead tr.row-trip th.th-date{background:#1a3260;}
    table.dt thead tr.row-item th{background:#f0f4f8;color:var(--text-lt);padding:6px 8px;font-weight:700;text-align:center;font-size:11px;border:1px solid var(--border);}
    table.dt tbody td{padding:7px 8px;border-bottom:1px solid #f0f4f8;border-left:1px solid #f0f4f8;text-align:center;white-space:nowrap;font-size:12px;}
    table.dt tbody td:first-child{text-align:right;font-weight:600;background:#fafbff;border-right:2px solid var(--border);}
    table.dt tbody tr:hover{background:#f8faff;}
    table.dt tbody tr.total-row{background:#e6f0ff;font-weight:700;}
    .badge-cur{padding:2px 7px;border-radius:10px;font-size:11px;font-weight:700;display:inline-block;}
    .cur-LE{background:#dcfce7;color:#166534;}
    .cur-USD{background:#dbeafe;color:#1e40af;}
    .cur-EUR{background:#fef3c7;color:#92400e;}
    .cur-GBP{background:#ede9fe;color:#5b21b6;}
    .summary-wrap{display:flex;flex-wrap:wrap;gap:4px;padding:8px 0;}
    .total-card{display:inline-flex;align-items:center;gap:10px;background:white;border:2px solid var(--border);border-radius:14px;padding:14px 20px;margin:6px;box-shadow:var(--shadow);}
    .total-card .tc-cur{font-size:12px;font-weight:700;color:var(--text-lt);}
    .total-card .tc-val{font-size:22px;font-weight:900;color:var(--navy);}
    .loader{text-align:center;padding:40px;color:var(--text-lt);}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .no-data{text-align:center;padding:40px;color:var(--text-lt);}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px);}
    .modal.open{display:flex;}
    .alert-box{background:white;width:88%;max-width:380px;border-radius:22px;padding:26px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.25);}
    .alert-icon{font-size:40px;margin-bottom:10px;}
    .alert-msg{color:var(--navy);font-size:14px;font-weight:700;margin-bottom:18px;}
    .info-bar{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px 14px;font-size:12px;color:#166534;margin-bottom:14px;}
    @media(max-width:640px){table.dt{font-size:10px;} table.dt td,table.dt th{padding:5px 4px;} .tab-btn{padding:6px 14px;font-size:11px;}}
  </style>
</head>
<body>

<div class="header">
  <h2>🏢 لوحة العميل</h2>
  <div class="header-right">
    <span class="user-chip" id="userChip">...</span>
    <button class="back-btn" onclick="doLogout()">← خروج</button>
  </div>
</div>

<div class="page">
  <div id="mainContent"><div class="loader"><div class="spinner"></div>جاري التحميل...</div></div>
</div>

<div id="alertModal" class="modal">
  <div class="alert-box">
    <div class="alert-icon" id="alertIcon">ℹ️</div>
    <div class="alert-msg" id="alertMsg"></div>
    <div style="margin-top:16px;"><button class="btn btn-navy" onclick="closeAlert()">موافق</button></div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwe1Q9pjAJRk9CfWsK5YGjD5uVAbJkMhAVgw6akKkFIR9sz15V78C88Vs5dumKE-SwF/exec';

let currentUser = null;
let dashboardData = null;

// ====================== الاتصال ======================
function gas(action, params = {}) {
  return new Promise((resolve, reject) => {
    const callbackName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    const url = new URL(GAS_URL);
    url.searchParams.set('action', action);
    url.searchParams.set('callback', callbackName);
    url.searchParams.set('_t', Date.now());
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v ?? '')));

    window[callbackName] = function(data) {
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
      resolve(data);
    };

    const script = document.createElement('script');
    script.src = url.toString();
    script.onerror = () => {
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('فشل الاتصال بالخادم'));
    };
    document.body.appendChild(script);
    setTimeout(() => {
      if (window[callbackName]) {
        delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);
        reject(new Error('انتهى وقت الاتصال'));
      }
    }, 30000);
  });
}

function doLogout() { sessionStorage.removeItem('currentUser'); location.href = 'index.html'; }
function showAlert(msg, icon) { document.getElementById('alertIcon').textContent = icon || 'ℹ️'; document.getElementById('alertMsg').textContent = msg; document.getElementById('alertModal').classList.add('open'); }
function closeAlert() { document.getElementById('alertModal').classList.remove('open'); }

// ====================== جدول الأسعار ======================
function renderPricesTab() {
  if (!dashboardData || !dashboardData.rows || !dashboardData.priceHeaders) return '<div class="no-data">لا توجد بيانات</div>';
  
  let header = '<thead><tr class="row-trip"><th class="th-date" rowspan="2">التاريخ</th>';
  for (const h of dashboardData.priceHeaders) {
    header += `<th>${h.trip}</th>`;
  }
  header += '发展<tr class="row-item">';
  for (const h of dashboardData.priceHeaders) {
    header += `<th>${h.item}</th>`;
  }
  header += '发展</thead>';
  
  let tbody = '';
  for (const row of dashboardData.rows) {
    tbody += `<tr><td style="font-weight:600">${row.date}</td>`;
    for (const price of row.prices) {
      tbody += `<td>${price > 0 ? price : '-'}</td>`;
    }
    tbody += '</tr>';
  }
  
  return `<div class="table-wrap"><table class="dt">${header}<tbody>${tbody || '<tr><td colspan="100" class="no-data">لا توجد بيانات</td></tr>'}</tbody></table></div>`;
}

// ====================== جدول الإجماليات ======================
function renderTotalsTab() {
  if (!dashboardData || !dashboardData.rows || !dashboardData.qtyHeaders) return '<div class="no-data">لا توجد بيانات</div>';
  
  let header = '<thead><tr class="row-trip"><th class="th-date" rowspan="2">التاريخ</th>';
  for (const h of dashboardData.qtyHeaders) {
    header += `<th colspan="1">${h.trip || h.item}</th>`;
  }
  for (const col of dashboardData.sumColumns) {
    header += `<th rowspan="2">المجموع ${col.currency}</th>`;
  }
  header += '</tr><tr class="row-item">';
  for (const h of dashboardData.qtyHeaders) {
    header += `<th>${h.item}</th>`;
  }
  header += '</tr></thead>';
  
  let tbody = '';
  for (const row of dashboardData.rows) {
    tbody += `<tr><td style="font-weight:600">${row.date}</td>`;
    for (const qty of row.quantities) {
      tbody += `<td style="${qty > 0 ? 'background:#e6f0ff;font-weight:600' : ''}">${qty > 0 ? qty : '-'}</td>`;
    }
    for (const col of dashboardData.sumColumns) {
      const val = row.totals[col.currency] || 0;
      tbody += `<td style="font-weight:700;background:#e6f0ff">${val.toLocaleString()} ${col.currency}</td>`;
    }
    tbody += '</tr>';
  }
  
  return `<div class="table-wrap"><table class="dt">${header}<tbody>${tbody || '<tr><td colspan="100" class="no-data">لا توجد بيانات</td></tr>'}</tbody></table></div>`;
}

// ====================== إجمالي العملات ======================
function renderSummaryTab() {
  if (!dashboardData || !dashboardData.rows) return '<div class="no-data">لا توجد بيانات</div>';
  
  const totals = { USD: 0, EUR: 0, GBP: 0, LE: 0 };
  for (const row of dashboardData.rows) {
    for (const [cur, val] of Object.entries(row.totals)) {
      totals[cur] = (totals[cur] || 0) + val;
    }
  }
  
  let html = '<div class="summary-wrap">';
  for (const [cur, val] of Object.entries(totals)) {
    if (val === 0) continue;
    let curName = cur;
    if (cur === 'USD') curName = '🇺🇸 دولار أمريكي';
    if (cur === 'EUR') curName = '🇪🇺 يورو';
    if (cur === 'GBP') curName = '🇬🇧 جنيه إسترليني';
    if (cur === 'LE') curName = '🇪🇬 جنيه مصري';
    html += `<div class="total-card"><div><div class="tc-cur">${curName}</div><div class="tc-val">${val.toLocaleString()}</div></div><span class="badge-cur cur-${cur}" style="font-size:20px;padding:6px 12px;">${cur}</span></div>`;
  }
  html += '</div>';
  return html || '<div class="no-data">لا توجد بيانات كافية</div>';
}

// ====================== تحميل البيانات ======================
async function loadAll() {
  try {
    document.getElementById('mainContent').innerHTML = '<div class="loader"><div class="spinner"></div>جاري جلب البيانات...</div>';
    
    const allAcc = await gas('getAllSuppliersCustomers');
    const accounts = Array.isArray(allAcc) ? allAcc : [];
    
    const customer = accounts.find(a => 
      a.customerType === 'Customer' && 
      (a.loginEmail === currentUser?.email || a.customerName === currentUser?.name)
    );
    
    if (!customer) {
      document.getElementById('mainContent').innerHTML = '<div class="card"><div class="card-body no-data">⚠️ لا يوجد حساب مرتبط بهذا المستخدم</div></div>';
      return;
    }
    
    const res = await gas('getCustomerDashboardData', { customerId: customer.customerId });
    
    if (!res?.success) {
      document.getElementById('mainContent').innerHTML = `<div class="card"><div class="card-body no-data">⚠️ ${res?.message || 'فشل تحميل البيانات'}</div></div>`;
      return;
    }
    
    dashboardData = res;
    
    const infoBar = `<div class="info-bar">🏢 <strong>${dashboardData.customer.name}</strong> | 🏄 ${dashboardData.customer.category} | 📅 ${dashboardData.customer.startDate || '-'} → ${dashboardData.customer.endDate || '-'} | ${dashboardData.rows.length} يوم</div>`;
    
    document.getElementById('mainContent').innerHTML = `
      ${infoBar}
      <div class="card">
        <div class="card-head"><span class="ch-icon">🔍</span><h3>فلترة حسب التاريخ</h3></div>
        <div class="card-body">
          <div class="fgrid" style="align-items:flex-end;">
            <div class="fgroup"><label>من تاريخ</label><input type="date" class="fc" id="fStart"></div>
            <div class="fgroup"><label>إلى تاريخ</label><input type="date" class="fc" id="fEnd"></div>
            <div><button class="btn btn-navy" onclick="applyFilter()">🔍 تطبيق</button>
            <button class="btn btn-gray" style="margin-right:8px" onclick="resetFilter()">↺ إعادة</button></div>
          </div>
        </div>
      </div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('prices',event)">📋 جدول الأسعار</button>
        <button class="tab-btn" onclick="switchTab('totals',event)">💰 الإجماليات اليومية</button>
        <button class="tab-btn" onclick="switchTab('summary',event)">📊 إجمالي العملات</button>
      </div>
      <div id="tabPrices" class="tab-pane active"><div class="card"><div class="card-head"><span class="ch-icon">📋</span><h3>جدول الأسعار</h3></div><div class="card-body">${renderPricesTab()}</div></div></div>
      <div id="tabTotals" class="tab-pane"><div class="card"><div class="card-head"><span class="ch-icon">💰</span><h3>الإجماليات اليومية (الكميات × الأسعار)</h3></div><div class="card-body">${renderTotalsTab()}</div></div></div>
      <div id="tabSummary" class="tab-pane"><div class="card"><div class="card-head"><span class="ch-icon">📊</span><h3>إجمالي العملات</h3></div><div class="card-body">${renderSummaryTab()}</div></div></div>
    `;
    
  } catch (e) {
    console.error('loadAll error:', e);
    showAlert('خطأ في التحميل: ' + e.message, '❌');
  }
}

function applyFilter() {
  if (!dashboardData || !dashboardData.rows) return;
  
  const start = document.getElementById('fStart')?.value;
  const end = document.getElementById('fEnd')?.value;
  
  let filteredRows = dashboardData.rows;
  
  if (start || end) {
    const s = start ? new Date(start) : null;
    const e = end ? new Date(end) : null;
    if (s) s.setHours(0,0,0,0);
    if (e) e.setHours(23,59,59,999);
    
    filteredRows = dashboardData.rows.filter(row => {
      const parts = row.date.split('/');
      if (parts.length !== 3) return true;
      const months = { Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11 };
      const d = new Date(parseInt(parts[2]), months[parts[1]], parseInt(parts[0]));
      d.setHours(0,0,0,0);
      if (s && d < s) return false;
      if (e && d > e) return false;
      return true;
    });
  }
  
  const tempData = { ...dashboardData, rows: filteredRows };
  const oldData = dashboardData;
  dashboardData = tempData;
  
  document.getElementById('tabPrices').innerHTML = `<div class="card"><div class="card-head"><span class="ch-icon">📋</span><h3>جدول الأسعار</h3></div><div class="card-body">${renderPricesTab()}</div></div>`;
  document.getElementById('tabTotals').innerHTML = `<div class="card"><div class="card-head"><span class="ch-icon">💰</span><h3>الإجماليات اليومية (الكميات × الأسعار)</h3></div><div class="card-body">${renderTotalsTab()}</div></div>`;
  document.getElementById('tabSummary').innerHTML = `<div class="card"><div class="card-head"><span class="ch-icon">📊</span><h3>إجمالي العملات</h3></div><div class="card-body">${renderSummaryTab()}</div></div>`;
  
  dashboardData = oldData;
}

function resetFilter() {
  document.getElementById('fStart').value = '';
  document.getElementById('fEnd').value = '';
  applyFilter();
}

function switchTab(name, event) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (event?.target) event.target.classList.add('active');
  document.getElementById('tabPrices').classList.remove('active');
  document.getElementById('tabTotals').classList.remove('active');
  document.getElementById('tabSummary').classList.remove('active');
  document.getElementById('tab' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
}

// ====================== تهيئة ======================
document.addEventListener('DOMContentLoaded', async () => {
  let ud = sessionStorage.getItem('currentUser');
  if (!ud) {
    const p = new URLSearchParams(location.search).get('user');
    if (p) { ud = decodeURIComponent(p); sessionStorage.setItem('currentUser', ud); }
  }
  if (!ud) { location.href = 'index.html'; return; }
  try { currentUser = JSON.parse(ud); } catch(e) { location.href = 'index.html'; return; }
  document.getElementById('userChip').textContent = currentUser.name || 'User';
  await loadAll();
});

window.doLogout = doLogout;
window.closeAlert = closeAlert;
window.switchTab = switchTab;
window.applyFilter = applyFilter;
window.resetFilter = resetFilter;
</script>
</body>
</html>
