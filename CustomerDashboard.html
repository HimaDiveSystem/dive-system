<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>لوحة العميل - نظام إدارة الفعاليات</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0f1f3d;
      --navy2: #1a3260;
      --gold: #f5c842;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #ea580c;
      --bg: #f0f4f8;
      --card: #fff;
      --border: #dde4f0;
      --text: #1a2540;
      --text-lt: #5a6a8a;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 4px 24px rgba(15, 31, 61, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      color: white;
      padding: 13px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(15, 31, 61, 0.25);
    }

    .header h2 {
      color: var(--gold);
      font-size: 18px;
      font-weight: 900;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-chip {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 40px;
      padding: 4px 13px;
      color: white;
      font-size: 12px;
      font-weight: 600;
    }

    .back-btn {
      background: transparent;
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 4px 13px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      font-family: 'Cairo', sans-serif;
      transition: all 0.2s;
    }

    .back-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 16px 50px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 8px;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 10px 24px;
      background: transparent;
      border: none;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      color: var(--text-lt);
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      color: var(--gold);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 18px;
      overflow: hidden;
    }

    .card-head {
      padding: 12px 18px;
      background: linear-gradient(90deg, var(--navy), var(--navy2));
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-head h3 {
      color: var(--gold);
      font-size: 14px;
      font-weight: 800;
    }

    .ch-icon {
      background: rgba(245, 200, 66, 0.2);
      border-radius: 7px;
      padding: 3px 6px;
      font-size: 13px;
    }

    .card-body {
      padding: 16px;
    }

    .fgrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .fgroup {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .fgroup label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-lt);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .fc {
      padding: 8px 12px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: 'Cairo', sans-serif;
      color: var(--text);
      background: #fafbfd;
      width: 100%;
      height: 40px;
      transition: border-color 0.2s;
    }

    .fc:focus {
      border-color: var(--blue);
      outline: none;
      background: white;
    }

    .btn {
      padding: 8px 20px;
      border: none;
      border-radius: 40px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      color: var(--gold);
    }

    .btn-success {
      background: var(--green);
      color: white;
    }

    .action-btns {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .data-table thead tr:first-child th {
      background: linear-gradient(90deg, var(--navy), var(--navy2));
      color: var(--gold);
      padding: 10px 8px;
      font-weight: 700;
      text-align: center;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .data-table thead tr:second-child th {
      background: #f0f4f8;
      color: var(--text-lt);
      padding: 8px;
      font-weight: 600;
      text-align: center;
      font-size: 11px;
    }

    .data-table tbody td {
      padding: 8px;
      border-bottom: 1px solid #f0f4f8;
      text-align: center;
      white-space: nowrap;
    }

    .data-table tbody tr:hover {
      background: #f8faff;
    }

    .data-table tbody td:first-child {
      text-align: right;
      font-weight: 600;
    }

    .total-row {
      background: #e6f0ff;
      font-weight: 700;
    }

    .loader {
      text-align: center;
      padding: 40px;
      color: var(--text-lt);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(4px);
    }

    .modal.open {
      display: flex;
    }

    .modal-box {
      background: white;
      width: 92%;
      max-width: 400px;
      border-radius: 22px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      animation: pop 0.25s ease;
    }

    .alert-icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .alert-msg {
      color: var(--navy);
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    @keyframes pop {
      from {
        transform: scale(0.85);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @media (max-width: 640px) {
      .fgrid {
        grid-template-columns: 1fr;
      }
      .data-table {
        font-size: 10px;
      }
      .data-table td,
      .data-table th {
        padding: 6px 4px;
      }
      .tab-btn {
        padding: 6px 16px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

<div class="header">
  <h2>🏢 لوحة العميل</h2>
  <div class="header-right">
    <span class="user-chip" id="userChip">...</span>
    <button class="back-btn" onclick="goBack()">← تسجيل الخروج</button>
  </div>
</div>

<div class="page">
  <div id="mainContent">
    <div class="loader">
      <div class="spinner"></div>
      جاري تحميل بيانات الحساب...
    </div>
  </div>
</div>

<!-- Alert Modal -->
<div id="alertModal" class="modal">
  <div class="modal-box">
    <div class="alert-icon" id="alertIcon">ℹ️</div>
    <div class="alert-msg" id="alertMsg"></div>
    <div style="display: flex; gap: 8px; justify-content: center; margin-top: 16px;">
      <button class="btn btn-primary" onclick="closeAlert()">موافق</button>
    </div>
  </div>
</div>

<script>
// ====================== الرابط الصحيح للـ API ======================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwe1Q9pjAJRk9CfWsK5YGjD5uVAbJkMhAVgw6akKkFIR9sz15V78C88Vs5dumKE-SwF/exec';
const DASH = { Admin: 'Dashboard.html', Owner: 'OwnerDashboard.html', Sales: 'SalesDashboard.html', Accountant: 'AccountantDashboard.html', Customer: 'CustomerDashboard.html' };

let currentUser = null;
let customerAccount = null;
let accountSheetData = null;
let priceColumns = []; // { col, trip, item }
let tripGroups = []; // تجميع البنود حسب الرحلة
let userInvoices = []; // فواتير العميل (للحصول على الكميات)

// ====================== دوال الاتصال ======================
function gas(action, params = {}) {
  return new Promise((resolve, reject) => {
    const callbackName = 'jsonp_callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    const url = new URL(GAS_URL);
    url.searchParams.set('action', action);
    url.searchParams.set('callback', callbackName);
    url.searchParams.set('_t', Date.now());
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v ?? '')));

    window[callbackName] = function (data) {
      delete window[callbackName];
      if (document.body.contains(script)) {
        document.body.removeChild(script);
      }
      resolve(data);
    };

    const script = document.createElement('script');
    script.src = url.toString();
    script.onerror = () => {
      delete window[callbackName];
      if (document.body.contains(script)) {
        document.body.removeChild(script);
      }
      reject(new Error('فشل الاتصال بالخادم'));
    };
    document.body.appendChild(script);

    setTimeout(() => {
      if (window[callbackName]) {
        delete window[callbackName];
        if (document.body.contains(script)) {
          document.body.removeChild(script);
        }
        reject(new Error('انتهى وقت الاتصال'));
      }
    }, 30000);
  });
}

async function gasPost(data) {
  const params = {};
  for (const [key, value] of Object.entries(data)) {
    if (value !== undefined && value !== null) {
      params[key] = typeof value === 'object' ? JSON.stringify(value) : String(value);
    }
  }
  return gas(data.action, params);
}

// ====================== دوال مساعدة ======================
function goBack() {
  sessionStorage.removeItem('currentUser');
  location.href = 'index.html';
}

function showAlert(msg, icon) {
  document.getElementById('alertIcon').textContent = icon || 'ℹ️';
  document.getElementById('alertMsg').textContent = msg;
  document.getElementById('alertModal').classList.add('open');
}

function closeAlert() {
  document.getElementById('alertModal').classList.remove('open');
}

function formatDateDisplay(dateStr) {
  if (!dateStr) return '';
  const match = dateStr.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (match) {
    return `${match[1].padStart(2, '0')}/${match[2]}/${match[3]}`;
  }
  return dateStr;
}

function parseDateFromDDMMMYYYY(dateStr) {
  if (!dateStr) return null;
  const match = dateStr.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (match) {
    const months = { Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11 };
    return new Date(parseInt(match[3]), months[match[2]], parseInt(match[1]));
  }
  return new Date(dateStr);
}

function extractPriceAndCurrency(priceStr) {
  const match = priceStr.match(/^([\d.]+)([A-Za-z]+)$/);
  if (match) {
    return { price: parseFloat(match[1]) || 0, currency: match[2] };
  }
  return { price: 0, currency: 'LE' };
}

// ====================== جلب بيانات العميل ======================
async function loadCustomerAccount() {
  try {
    const allAccounts = await gas('getAllSuppliersCustomers');
    const accounts = Array.isArray(allAccounts) ? allAccounts : [];
    
    customerAccount = accounts.find(acc => 
      acc.customerType === 'Customer' && 
      (acc.loginEmail === currentUser?.email || acc.customerName === currentUser?.name)
    );
    
    if (!customerAccount) {
      showAlert('لم يتم العثور على حساب مرتبط بهذا المستخدم', '⚠️');
      document.getElementById('mainContent').innerHTML = `
        <div class="card">
          <div class="card-body" style="text-align:center;padding:40px;">
            <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
            <h3>لا يوجد حساب مرتبط</h3>
            <p style="color:var(--text-lt);margin-top:8px;">يرجى التواصل مع الإدارة لربط حسابك</p>
          </div>
        </div>`;
      return false;
    }
    
    console.log('حساب العميل:', customerAccount);
    return true;
    
  } catch (e) {
    console.error('loadCustomerAccount error:', e);
    showAlert('فشل تحميل بيانات الحساب: ' + e.message, '❌');
    return false;
  }
}

// ====================== جلب فواتير العميل ======================
async function loadUserInvoices() {
  try {
    const allInvoices = await gas('getAllInvoices');
    const invoices = Array.isArray(allInvoices) ? allInvoices : [];
    
    // فلترة فواتير العميل الحالي
    userInvoices = invoices.filter(inv => 
      inv.customer === customerAccount.customerName || 
      inv.guestName === currentUser?.name
    );
    
    console.log('فواتير العميل:', userInvoices.length);
    return true;
  } catch (e) {
    console.error('loadUserInvoices error:', e);
    return false;
  }
}

// ====================== جلب بيانات الشيت ======================
async function loadAccountSheet(startDateISO, endDateISO) {
  try {
    showLoading(true);
    
    const sheetName = customerAccount.customerName + '_' + customerAccount.category + '_' + customerAccount.customerType;
    console.log('sheetName:', sheetName);
    
    const sheetData = await gas('getAccountSheetData', { sheetName });
    
    console.log('sheetData:', sheetData);
    
    if (!sheetData || !sheetData.success) {
      console.error('فشل جلب بيانات الشيت:', sheetData?.message);
      showAlert('فشل تحميل بيانات الشيت: ' + (sheetData?.message || 'لا توجد بيانات'), '❌');
      return false;
    }
    
    if (!sheetData.data || !Array.isArray(sheetData.data) || sheetData.data.length === 0) {
      console.error('بيانات الشيت فارغة');
      showAlert('لا توجد بيانات في الشيت', '⚠️');
      return false;
    }
    
    accountSheetData = sheetData.data;
    
    console.log('accountSheetData length:', accountSheetData.length);
    console.log('accountSheetData[0]:', accountSheetData[0]);
    console.log('accountSheetData[1]:', accountSheetData[1]);
    console.log('accountSheetData[2]:', accountSheetData[2]);
    console.log('accountSheetData[3]:', accountSheetData[3]);
    
    // سجلات إضافية للتحقق من الأعمدة
    console.log('accountSheetData[1][80]:', accountSheetData[1]?.[80]);
    console.log('accountSheetData[2][80]:', accountSheetData[2]?.[80]);
    console.log('accountSheetData[2][81]:', accountSheetData[2]?.[81]);
    console.log('accountSheetData[2][82]:', accountSheetData[2]?.[82]);
    console.log('accountSheetData[2][83]:', accountSheetData[2]?.[83]);
    
    extractPriceColumns();
    
    await loadUserInvoices();
    
    renderTabs(startDateISO, endDateISO);
    
    return true;
    
  } catch (e) {
    console.error('loadAccountSheet error:', e);
    showAlert('فشل تحميل بيانات الشيت: ' + e.message, '❌');
    return false;
  } finally {
    showLoading(false);
  }
}
  
function extractPriceColumns() {
  if (!accountSheetData || accountSheetData.length < 4) return;
  
  const row2 = accountSheetData[1] || [];
  const row3 = accountSheetData[2] || [];
  
  console.log('row2 length:', row2.length);
  console.log('row3 length:', row3.length);
  
  priceColumns = [];
  tripGroups = [];
  
  // البحث عن عمود "السنة" لتحديد بداية أعمدة الأسعار
  let yearCol = -1;
  for (let i = 0; i < row2.length; i++) {
    const val = row2[i]?.toString().trim();
    if (val === 'السنة' || val === 'Year') yearCol = i;
  }
  
  console.log('yearCol:', yearCol);
  
  // أعمدة الأسعار تبدأ بعد عمود "السنة"
  let startCol = yearCol + 1;
  
  console.log('startCol:', startCol);
  console.log('row2[startCol]:', row2[startCol]);
  console.log('row3[startCol]:', row3[startCol]);
  
  let currentTrip = null;
  
  for (let i = startCol; i < row2.length; i++) {
    const tripName = row2[i]?.toString().trim();
    const itemName = row3[i]?.toString().trim();
    
    // إذا وجدنا اسم رحلة جديد (غير فارغ)
    if (tripName && tripName !== '' && tripName !== 'Total' && tripName !== 'المجموع' && tripName !== 'Month' && tripName !== 'Year' && tripName !== 'الشهر' && tripName !== 'السنة') {
      if (currentTrip && currentTrip.items.length > 0) {
        tripGroups.push(currentTrip);
      }
      currentTrip = { name: tripName, items: [] };
    }
    
    // إضافة البند إذا كان موجوداً
    if (itemName && itemName !== '' && currentTrip) {
      currentTrip.items.push({ col: i, name: itemName });
      priceColumns.push({ col: i, trip: tripName || currentTrip.name, item: itemName });
    }
  }
  
  if (currentTrip && currentTrip.items.length > 0) {
    tripGroups.push(currentTrip);
  }
  
  console.log('مجموعات الرحلات:', tripGroups);
  console.log('أعمدة الأسعار:', priceColumns);
}
  
  function calculateDailyTotalsFromInvoices(startRow, endRow) {
  // إنشاء خريطة: التاريخ + اسم البند → الكمية الإجمالية
  const quantities = {};
  
  userInvoices.forEach(inv => {
    const activeDate = inv.activeDate;
    const activitiesText = inv.activitiesText || '';
    
    // تحويل activitiesText إلى كائن { "Moto Sgl": 1, "Moto Dbl": 2, ... }
    const parts = activitiesText.split('|');
    parts.forEach(part => {
      const match = part.trim().match(/^(.+?)×(\d+)$/);
      if (match) {
        const itemName = match[1].trim();
        const qty = parseInt(match[2]) || 0;
        const key = activeDate + '|' + itemName;
        quantities[key] = (quantities[key] || 0) + qty;
      }
    });
  });
  
  // حساب الإجماليات لكل يوم وبند
  const dailyTotals = {};
  
  for (let i = startRow; i <= endRow; i++) {
    const row = accountSheetData[i];
    if (!row || !row[0]) continue;
    
    const dateStr = formatDateDisplay(row[0]?.toString() || '');
    dailyTotals[dateStr] = {};
    let rowTotalLE = 0;
    
    for (const col of priceColumns) {
      const priceCell = row[col.col]?.toString() || '0';
      const { price, currency } = extractPriceAndCurrency(priceCell);
      const key = dateStr + '|' + col.item;
      const qty = quantities[key] || 0;
      const totalPrice = price * qty;
      
      dailyTotals[dateStr][col.item] = { qty, totalPrice, currency };
      
      if (currency === 'LE') {
        rowTotalLE += totalPrice;
      }
    }
    
    dailyTotals[dateStr]['_rowTotalLE'] = rowTotalLE;
  }
  
  return dailyTotals;
}

function renderTabs(startDateISO, endDateISO) {
  if (!accountSheetData || accountSheetData.length < 4) {
    document.getElementById('mainContent').innerHTML = `
      <div class="card">
        <div class="card-body no-data">لا توجد بيانات في الشيت</div>
      </div>`;
    return;
  }
  
  // تحديد نطاق الصفوف
  let startRow = 3;
  let endRow = accountSheetData.length - 1;
  
  if (startDateISO) {
    const startDt = new Date(startDateISO);
    for (let i = 3; i < accountSheetData.length; i++) {
      const dateStr = accountSheetData[i]?.[0]?.toString() || '';
      const rowDate = parseDateFromDDMMMYYYY(dateStr);
      if (rowDate && rowDate >= startDt) {
        startRow = i;
        break;
      }
    }
  }
  
  if (endDateISO) {
    const endDt = new Date(endDateISO);
    for (let i = accountSheetData.length - 1; i >= 3; i--) {
      const dateStr = accountSheetData[i]?.[0]?.toString() || '';
      const rowDate = parseDateFromDDMMMYYYY(dateStr);
      if (rowDate && rowDate <= endDt) {
        endRow = i;
        break;
      }
    }
  }
  
  // حساب الإجماليات اليومية من الفواتير
  const dailyTotals = calculateDailyTotalsFromInvoices(startRow, endRow);
  
  // بناء HTML
  const html = `
    <div class="card">
      <div class="card-head">
        <span class="ch-icon">📅</span>
        <h3>فلترة النتائج</h3>
      </div>
      <div class="card-body">
        <div class="fgrid">
          <div class="fgroup"><label>من تاريخ</label><input type="date" class="fc" id="filterStartDate" value="${startDateISO || ''}"></div>
          <div class="fgroup"><label>إلى تاريخ</label><input type="date" class="fc" id="filterEndDate" value="${endDateISO || ''}"></div>
          <div class="fgroup"><label style="visibility:hidden">.</label><button class="btn btn-primary" onclick="applyDateFilter()">تطبيق الفلتر</button></div>
        </div>
      </div>
    </div>
    
    <div class="action-btns">
      <button class="btn btn-primary" onclick="openInvoicePage()">➕ فاتورة جديدة</button>
      <button class="btn btn-success" onclick="refreshData()">🔄 تحديث</button>
    </div>
    
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('prices')">📊 جدول الأسعار</button>
      <button class="tab-btn" onclick="switchTab('totals')">💰 الإجماليات اليومية</button>
      <button class="tab-btn" onclick="switchTab('summary')">📈 إجمالي العملات</button>
    </div>
    
    <!-- تبويب جدول الأسعار -->
    <div id="tabPrices" class="tab-content active">
      <div class="card">
        <div class="card-head">
          <span class="ch-icon">📋</span>
          <h3>قائمة الأسعار</h3>
        </div>
        <div class="card-body">
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                ${buildPricesHeader()}
              </thead>
              <tbody>
                ${buildPricesRows(startRow, endRow)}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    
    <!-- تبويب الإجماليات اليومية (الكميات × الأسعار) -->
    <div id="tabTotals" class="tab-content">
      <div class="card">
        <div class="card-head">
          <span class="ch-icon">💰</span>
          <h3>الإجماليات اليومية (الكميات × الأسعار)</h3>
        </div>
        <div class="card-body">
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                ${buildTotalsHeader()}
              </thead>
              <tbody>
                ${buildTotalsRows(startRow, endRow, dailyTotals)}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    
    <!-- تبويب إجمالي العملات -->
    <div id="tabSummary" class="tab-content">
      <div class="card">
        <div class="card-head">
          <span class="ch-icon">📊</span>
          <h3>إجمالي العملات</h3>
        </div>
        <div class="card-body">
          ${buildCurrencySummary(startRow, endRow)}
        </div>
      </div>
    </div>
  `;
  
  document.getElementById('mainContent').innerHTML = html;
}

function buildPricesHeader() {
  let header = '<tr>';
  header += '<th rowspan="2">التاريخ</th>';
  
  for (const trip of tripGroups) {
    header += `<th colspan="${trip.items.length}">${trip.name}</th>`;
  }
  header += '</tr><tr>';
  
  for (const trip of tripGroups) {
    for (const item of trip.items) {
      header += `<th style="font-size:11px;background:#f0f4f8">${item.name}</th>`;
    }
  }
  header += '</tr>';
  
  return header;
}

function buildPricesRows(startRow, endRow) {
  let rows = '';
  for (let i = startRow; i <= endRow; i++) {
    const row = accountSheetData[i];
    if (!row || !row[0]) continue;
    
    const dateStr = formatDateDisplay(row[0]?.toString() || '');
    rows += `<tr><td style="font-weight:600">${dateStr}${row[79] ? ' (' + row[79] + '/' + row[80] + ')' : ''} ${row[78] ? row[78] : ''}${row[79] ? '/' + row[79] : ''}${row[80] ? '/' + row[80] : ''}</td>`;
    
    for (const col of priceColumns) {
      const priceCell = row[col.col]?.toString() || '0';
      rows += `<td>${priceCell}${row[79] ? '/' + row[79] : ''}${row[80] ? '/' + row[80] : ''}</td>`;
    }
    rows += `</tr>`;
  }
  return rows || '<tr><td colspan="100" class="no-data">لا توجد بيانات</td></tr>';
}

function buildTotalsHeader() {
  let header = '<tr>';
  header += '<th rowspan="2">التاريخ</th>';
  
  for (const trip of tripGroups) {
    header += `<th colspan="${trip.items.length}">${trip.name}</th>`;
  }
  header += '<th rowspan="2">المجموع LE</th>';
  header += '</tr><tr>';
  
  for (const trip of tripGroups) {
    for (const item of trip.items) {
      header += `<th style="font-size:11px;background:#f0f4f8">${item.name}</th>`;
    }
  }
  header += '</tr>';
  
  return header;
}

function buildTotalsRows(startRow, endRow, dailyTotals) {
  let rows = '';
  for (let i = startRow; i <= endRow; i++) {
    const row = accountSheetData[i];
    if (!row || !row[0]) continue;
    
    const dateStr = formatDateDisplay(row[0]?.toString() || '');
    const dayData = dailyTotals[dateStr] || {};
    const rowTotalLE = dayData['_rowTotalLE'] || 0;
    
    rows += `<tr><td style="font-weight:600">${dateStr}</td>`;
    
    for (const col of priceColumns) {
      const itemData = dayData[col.item];
      if (itemData && itemData.qty > 0) {
        rows += `<td style="background:#e6f0ff">${itemData.qty}</td>`;
      } else {
        rows += `<td>-</td>`;
      }
    }
    
    rows += `<td style="font-weight:700;background:#e6f0ff">${rowTotalLE.toFixed(2)} LE</td></tr>`;
  }
  return rows || '<tr><td colspan="100" class="no-data">لا توجد بيانات</td></tr>';
}

function buildCurrencySummary(startRow, endRow) {
  // حساب إجمالي العملات من جميع الفواتير
  const totals = { USD: 0, EUR: 0, GBP: 0, LE: 0 };
  
  userInvoices.forEach(inv => {
    // إضافة من paymentPrice و rest
    const currency = inv.invoiceCurrency || 'LE';
    const rest = parseFloat(inv.rest) || 0;
    
    if (currency === 'USD') totals.USD += rest;
    else if (currency === 'EUR') totals.EUR += rest;
    else if (currency === 'GBP') totals.GBP += rest;
    else totals.LE += rest;
    
    // إضافة من الدفعات النقدية والفيزا
    totals.USD += parseFloat(inv.cashUSD) || 0;
    totals.USD += parseFloat(inv.visaUSD) || 0;
    totals.EUR += parseFloat(inv.cashEUR) || 0;
    totals.EUR += parseFloat(inv.visaEUR) || 0;
    totals.GBP += parseFloat(inv.cashGBP) || 0;
    totals.GBP += parseFloat(inv.visaGBP) || 0;
    totals.LE += parseFloat(inv.cashLE) || 0;
    totals.LE += parseFloat(inv.visaLE) || 0;
  });
  
  return `
    <table class="data-table">
      <thead><tr><th>العملة</th><th>الإجمالي</th></tr></thead>
      <tbody>
        <tr><td>🇺🇸 USD</td><td class="total-amount">${totals.USD.toFixed(2)} USD</td></tr>
        <tr><td>🇪🇺 EUR</td><td class="total-amount">${totals.EUR.toFixed(2)} EUR</td></tr>
        <tr><td>🇬🇧 GBP</td><td class="total-amount">${totals.GBP.toFixed(2)} GBP</td></tr>
        <tr><td>🇪🇬 LE</td><td class="total-amount">${totals.LE.toFixed(2)} LE</td></tr>
      </tbody>
    </table>
  `;
}

function showLoading(show) {
  if (show) {
    document.getElementById('mainContent').innerHTML = `
      <div class="loader">
        <div class="spinner"></div>
        جاري تحميل البيانات...
      </div>`;
  }
}

function refreshData() {
  const startDate = document.getElementById('filterStartDate')?.value;
  const endDate = document.getElementById('filterEndDate')?.value;
  loadAccountSheet(startDate, endDate);
}

function applyDateFilter() {
  const startDate = document.getElementById('filterStartDate')?.value;
  const endDate = document.getElementById('filterEndDate')?.value;
  loadAccountSheet(startDate, endDate);
}

function openInvoicePage() {
  window.open('CustomerInvoice.html', '_blank');
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  
  document.getElementById('tabPrices').classList.remove('active');
  document.getElementById('tabTotals').classList.remove('active');
  document.getElementById('tabSummary').classList.remove('active');
  
  if (tab === 'prices') {
    document.getElementById('tabPrices').classList.add('active');
  } else if (tab === 'totals') {
    document.getElementById('tabTotals').classList.add('active');
  } else if (tab === 'summary') {
    document.getElementById('tabSummary').classList.add('active');
  }
}

// ====================== تهيئة الصفحة ======================
document.addEventListener('DOMContentLoaded', async () => {
  console.log('=== بدء تحميل لوحة العميل ===');
  
  let ud = sessionStorage.getItem('currentUser');
  if (!ud) {
    const p = new URLSearchParams(location.search).get('user');
    if (p) {
      ud = decodeURIComponent(p);
      sessionStorage.setItem('currentUser', ud);
    }
  }
  
  if (!ud) {
    location.href = 'index.html';
    return;
  }
  
  try {
    currentUser = JSON.parse(ud);
  } catch (e) {
    location.href = 'index.html';
    return;
  }
  
  document.getElementById('userChip').textContent = currentUser.name || 'User';
  
  const loaded = await loadCustomerAccount();
  if (loaded) {
    await loadAccountSheet(null, null);
  }
  
  console.log('=== انتهى التحميل ===');
});

window.goBack = goBack;
window.closeAlert = closeAlert;
window.refreshData = refreshData;
window.openInvoicePage = openInvoicePage;
window.applyDateFilter = applyDateFilter;
window.switchTab = switchTab;
</script>
</body>
</html>
