<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقرير المرتبات الشهري</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
        body{background:#f0f2f5;padding:20px;}
        .container{max-width:1400px;margin:0 auto;background:white;border-radius:24px;box-shadow:0 10px 30px rgba(0,0,0,0.1);overflow:hidden;}
        .header{background:linear-gradient(135deg,#1e2b4f,#152238);color:white;padding:18px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
        .header h2{color:#ffd966;display:flex;align-items:center;gap:8px;}
        .user-badge{background:rgba(255,255,255,0.1);border:1px solid #ffd966;padding:6px 14px;border-radius:40px;font-size:13px;}
        .back-btn{background:#ffd966;color:#1e2b4f;border:none;padding:6px 16px;border-radius:40px;cursor:pointer;font-weight:600;}
        .filter-bar{background:#f8f9fa;padding:20px;border-bottom:1px solid #e0e8f0;display:flex;flex-wrap:wrap;gap:15px;align-items:flex-end;}
        .filter-group{display:flex;flex-direction:column;gap:5px;}
        .filter-group label{font-size:12px;font-weight:700;color:#5a6a8a;}
        .filter-group select,.filter-group input{padding:8px 12px;border:2px solid #ddd;border-radius:10px;font-size:13px;min-width:130px;}
        .btn-primary{background:#1e2b4f;color:#ffd966;border:none;padding:8px 20px;border-radius:40px;cursor:pointer;font-weight:600;}
        .btn-primary:hover{background:#2a4f8c;}
        .btn-success{background:#27ae60;color:white;border:none;padding:8px 20px;border-radius:40px;cursor:pointer;font-weight:600;}
        .table-wrapper{overflow-x:auto;padding:20px;}
        table{width:100%;border-collapse:collapse;min-width:1000px;}
        th{background:#1e2b4f;color:#ffd966;padding:12px;text-align:center;font-size:12px;white-space:nowrap;}
        td{padding:10px;text-align:center;border-bottom:1px solid #eee;font-size:12px;}
        tr:hover{background:#f8f9fa;}
        .badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
        .badge-paid{background:#d4edda;color:#155724;}
        .badge-pending{background:#fff3cd;color:#856404;}
        .loader{border:4px solid #f3f3f3;border-top:4px solid #1e2b4f;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:40px auto;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e2b4f;color:white;padding:10px 24px;border-radius:40px;font-size:13px;z-index:9999;opacity:0;transition:0.3s;}
        .toast.show{opacity:1;}
        .toast.success{background:#27ae60;}
        .toast.error{background:#e74c3c;}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>💰 تقرير المرتبات الشهري</h2>
        <div>
            <span class="user-badge" id="userBadge">—</span>
            <button class="back-btn" onclick="goBack()">🔙 رجوع</button>
        </div>
    </div>
    <div class="filter-bar">
        <div class="filter-group"><label>📅 الشهر</label>
            <select id="monthSelect">
                <option value="Jan">يناير</option><option value="Feb">فبراير</option>
                <option value="Mar">مارس</option><option value="Apr">أبريل</option>
                <option value="May">مايو</option><option value="Jun">يونيو</option>
                <option value="Jul">يوليو</option><option value="Aug">أغسطس</option>
                <option value="Sep">سبتمبر</option><option value="Oct">أكتوبر</option>
                <option value="Nov">نوفمبر</option><option value="Dec">ديسمبر</option>
            </select>
        </div>
        <div class="filter-group"><label>📆 السنة</label><select id="yearSelect"></select></div>
        <div class="filter-group" id="branchFilterGroup"><label>🏢 الفرع</label><select id="branchSelect"><option value="">الكل</option></select></div>
        <button class="btn-primary" onclick="loadSalaryReport()">🔍 عرض التقرير</button>
        <button class="btn-success" onclick="exportToExcel()">📎 تصدير Excel</button>
    </div>
    <div id="reportArea"><div class="loader"></div></div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script>
const GAS = 'https://script.google.com/macros/s/AKfycbwC1BRoLAJthZqxWTYyMUSjPNNGfCI0BjTfhE7ZiVx67rUP__OKAj0vlwD1-RUCOMSE/exec';
let currentUser = null;
let isUnlimited = false; // Admin, Owner, FinancialManager, AccountantManager

function jsonpRequest(action, params = {}) {
    return new Promise((resolve, reject) => {
        const cbName = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*99999);
        params.action = action;
        params.callback = cbName;
        const qs = Object.entries(params).map(([k,v]) => k + '=' + encodeURIComponent(String(v ?? ''))).join('&');
        const url = GAS + '?' + qs;
        const script = document.createElement('script');
        const timeout = setTimeout(() => { delete window[cbName]; script.remove(); reject(new Error('Timeout')); }, 30000);
        window[cbName] = (data) => { clearTimeout(timeout); delete window[cbName]; script.remove(); resolve(data); };
        script.onerror = () => { clearTimeout(timeout); delete window[cbName]; script.remove(); reject(new Error('Network error')); };
        script.src = url;
        document.head.appendChild(script);
    });
}

function showToast(msg, type = 'info') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast ' + type + ' show';
    setTimeout(() => toast.classList.remove('show'), 3000);
}

async function init() {
    const ud = sessionStorage.getItem('currentUser');
    if (!ud) { window.location.href = 'index.html'; return; }
    try { currentUser = JSON.parse(ud); } catch(e) { window.location.href = 'index.html'; return; }
    document.getElementById('userBadge').textContent = currentUser.name || 'محاسب';
    
    // تحديد صلاحيات المستخدم
    const unlimitedTypes = ['Admin', 'Owner', 'FinancialManager', 'AccountantManager'];
    isUnlimited = unlimitedTypes.includes(currentUser.type);
    
    // تعبئة السنوات
    const yearSelect = document.getElementById('yearSelect');
    const currentYear = new Date().getFullYear();
    for (let y = currentYear + 1; y >= 2020; y--) {
        const option = document.createElement('option');
        option.value = y;
        option.textContent = y;
        if (y === currentYear) option.selected = true;
        yearSelect.appendChild(option);
    }
    
    // تعبئة الفروع (للمستخدمين غير المحدودين فقط)
    if (isUnlimited) {
        try {
            const branchesData = await jsonpRequest('getActiveBranches');
            if (Array.isArray(branchesData)) {
                const branchSelect = document.getElementById('branchSelect');
                branchesData.forEach(b => {
                    const option = document.createElement('option');
                    option.value = b.name;
                    option.textContent = b.name;
                    branchSelect.appendChild(option);
                });
            }
        } catch(e) { console.warn(e); }
    } else {
        // للمحاسب: إخفاء فلتر الفرع
        const branchFilterGroup = document.getElementById('branchFilterGroup');
        if (branchFilterGroup) branchFilterGroup.style.display = 'none';
    }
    
    // تحميل التقرير تلقائياً
    await loadSalaryReport();
}

async function loadSalaryReport() {
    const month = document.getElementById('monthSelect').value;
    const year = document.getElementById('yearSelect').value;
    const branchFilter = document.getElementById('branchSelect')?.value || '';
    
    document.getElementById('reportArea').innerHTML = '<div class="loader"></div>';
    
    try {
        // 1. جلب بيانات Salaries
        const allSalaries = await jsonpRequest('getSalariesData');
        if (!Array.isArray(allSalaries)) throw new Error('لا توجد بيانات رواتب');
        
        // تصفية حسب الشهر والسنة
        let monthlySalaries = allSalaries.filter(s => String(s.Year) === String(year) && s.Month === month);
        
        if (!monthlySalaries.length) {
            document.getElementById('reportArea').innerHTML = '<p style="text-align:center;padding:40px;">لا توجد بيانات رواتب للشهر المحدد</p>';
            return;
        }
        
        // 2. جلب بيانات الموظفين
        const allEmployees = await jsonpRequest('getAllEmployees');
        
        // 3. جلب بيانات الحضور (أيام العمل)
        const attendance = await jsonpRequest('getMonthlyAttendance', { month, year });
        const attendanceData = attendance.data || {};
        
        // 4. جلب المدفوعات من Expenses
        const expensesData = await jsonpRequest('getExpenseRevenueRows', { sheet: 'Expenses', month, year });
        
        // بناء التقرير
        const report = [];
        for (const sal of monthlySalaries) {
            const emp = allEmployees.find(e => e.serial === sal.UserID);
            if (!emp) continue;
            
            // تصفية حسب الفرع (للمستخدم غير المحدود)
            if (isUnlimited && branchFilter && branchFilter !== 'الكل' && emp.branchName !== branchFilter) continue;
            
            // تصفية حسب الفرع (للمحاسب: فقط موظفي فرعه)
            if (!isUnlimited && currentUser.branchName && emp.branchName !== currentUser.branchName) continue;
            
            // أيام العمل من Attendance
            const empAttendance = attendanceData[sal.UserID] || {};
            const workingDays = Object.values(empAttendance).filter(v => v && v !== '' && parseFloat(v) > 0).length;
            
            // حساب المدفوعات من Expenses
            let totalPayments = 0;
            if (Array.isArray(expensesData)) {
                totalPayments = expensesData
                    .filter(row => {
                        const account = (row.account || '').toLowerCase();
                        const accountName = (row.accountName || '').toLowerCase();
                        const empName = (emp.name || '').toLowerCase();
                        return account === empName || accountName === empName;
                    })
                    .reduce((sum, row) => sum + (parseFloat(row.le) || 0), 0);
            }
            
            // قيم الراتب من Salaries
            const baseSalary = parseFloat(sal.SalaryAmount) || 0;
            const commission = parseFloat(sal.Commission) || 0;
            const bonus = parseFloat(sal.Bonus) || 0;
            const cuts = parseFloat(sal.Cuts) || 0;
            const absent = parseFloat(sal.Absent) || 0;
            const insurance = parseFloat(sal.Insurance) || 0;
            const downPayment = parseFloat(sal.DownPayment) || 0;
            
            // حساب الإجمالي والصافي
            const totalSalary = baseSalary + commission + bonus - cuts - absent - insurance;
            const netSalary = totalSalary - downPayment - totalPayments;
            
            report.push({
                serial: sal.UserID,
                name: emp.name || sal.UserID,
                position: emp.position || '—',
                branch: emp.branchName || '—',
                workingDays: workingDays,
                baseSalary: baseSalary,
                commission: commission,
                bonus: bonus,
                cuts: cuts,
                absent: absent,
                insurance: insurance,
                total: totalSalary,
                downPayment: downPayment,
                paymentsFromExpenses: totalPayments,
                net: netSalary,
                status: netSalary >= 0 ? 'paid' : 'pending'
            });
        }
        
        displayReport(report);
        
    } catch(e) {
        document.getElementById('reportArea').innerHTML = `<p style="color:red;text-align:center;padding:40px;">خطأ: ${e.message}</p>`;
        showToast(e.message, 'error');
    }
}

function displayReport(report) {
    if (!report.length) {
        document.getElementById('reportArea').innerHTML = '<p style="text-align:center;padding:40px;">لا توجد بيانات مطابقة</p>';
        return;
    }
    
    let html = '<div class="table-wrapper"><table><thead><tr>';
    html += '<th>الرقم</th><th>الاسم</th><th>الوظيفة</th><th>الفرع</th>';
    html += '<th>أيام العمل</th><th>الراتب الأساسي</th><th>العمولة</th><th>الإضافات</th>';
    html += '<th>الاستقطاعات</th><th>الغياب</th><th>التأمينات</th><th>الإجمالي</th>';
    html += '<th>المسدد</th><th>مدفوعات (مصروفات)</th><th>الصافي</th><th>الحالة</th>';
    html += '</tr></thead><tbody>';
    
    let totalBase=0,totalCommission=0,totalBonus=0,totalCuts=0,totalAbsent=0,totalInsurance=0;
    let totalSalaries=0,totalDownPayment=0,totalExpensePayments=0,totalNet=0;
    
    report.forEach(r => {
        totalBase += r.baseSalary;
        totalCommission += r.commission;
        totalBonus += r.bonus;
        totalCuts += r.cuts;
        totalAbsent += r.absent;
        totalInsurance += r.insurance;
        totalSalaries += r.total;
        totalDownPayment += r.downPayment;
        totalExpensePayments += r.paymentsFromExpenses;
        totalNet += r.net;
        
        html += `<tr>
            <td>${r.serial}</td><td>${r.name}</td><td>${r.position}</td><td>${r.branch}</td>
            <td>${r.workingDays}</td>
            <td>${r.baseSalary.toFixed(2)}</td><td>${r.commission.toFixed(2)}</td>
            <td>${r.bonus.toFixed(2)}</td><td>${r.cuts.toFixed(2)}</td>
            <td>${r.absent.toFixed(2)}</td><td>${r.insurance.toFixed(2)}</td>
            <td><strong>${r.total.toFixed(2)}</strong></td>
            <td>${r.downPayment.toFixed(2)}</td><td>${r.paymentsFromExpenses.toFixed(2)}</td>
            <td><strong>${r.net.toFixed(2)}</strong></td>
            <td><span class="badge ${r.status === 'paid' ? 'badge-paid' : 'badge-pending'}">${r.status === 'paid' ? 'مدفوع' : 'مستحق'}</span></td>
        </tr>`;
    });
    
    html += `<tr style="background:#e9ecef;font-weight:700;border-top:2px solid #1e2b4f;">
        <td colspan="4">الإجمالي</td><td>—</td>
        <td>${totalBase.toFixed(2)}</td><td>${totalCommission.toFixed(2)}</td>
        <td>${totalBonus.toFixed(2)}</td><td>${totalCuts.toFixed(2)}</td>
        <td>${totalAbsent.toFixed(2)}</td><td>${totalInsurance.toFixed(2)}</td>
        <td>${totalSalaries.toFixed(2)}</td><td>${totalDownPayment.toFixed(2)}</td>
        <td>${totalExpensePayments.toFixed(2)}</td><td>${totalNet.toFixed(2)}</td><td></td>
    <tr>`;
    html += '</tbody></table></div>';
    document.getElementById('reportArea').innerHTML = html;
}

function exportToExcel() {
    const table = document.querySelector('table');
    if (!table) { showToast('لا توجد بيانات للتصدير', 'error'); return; }
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.table_to_sheet(table);
    XLSX.utils.book_append_sheet(wb, ws, 'تقرير_المرتبات');
    XLSX.writeFile(wb, `Salary_Report_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function goBack() {
    window.location.href = 'AccountantDashboard.html';
}

init();
</script>
</body>
</html>
