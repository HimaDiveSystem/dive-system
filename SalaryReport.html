<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>تقرير المرتبات الشهري</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
    body{background:linear-gradient(135deg,#1e2b4f,#152238);min-height:100vh;padding:20px;}
    .container{max-width:1400px;margin:0 auto;background:white;border-radius:30px;box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden;}
    .header{background:linear-gradient(135deg,#1e2b4f,#152238);color:white;padding:18px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
    .header h2{color:#ffd966;font-size:20px;display:flex;align-items:center;gap:8px;}
    .header-right{display:flex;align-items:center;gap:10px;}
    .user-badge{background:rgba(255,255,255,0.1);border:1px solid #ffd966;color:white;padding:7px 16px;border-radius:40px;font-size:13px;}
    .back-btn{background:#ffd966;color:#1e2b4f;border:none;padding:7px 18px;border-radius:40px;cursor:pointer;font-weight:700;font-size:13px;}
    .content{padding:28px;}
    .filter-card{background:#f8f9fa;border-radius:18px;padding:24px;margin-bottom:20px;}
    .filter-row{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
    .filter-group{display:flex;flex-direction:column;gap:6px;}
    .filter-group label{font-size:12px;font-weight:700;color:#6c757d;text-transform:uppercase;}
    .filter-group select{padding:12px 18px;border:2px solid #d0ddeb;border-radius:14px;font-size:14px;font-weight:700;color:#1e2b4f;background:white;min-width:160px;}
    .btn-primary{background:#1e2b4f;color:#ffd966;border:none;padding:12px 30px;border-radius:40px;cursor:pointer;font-weight:700;font-size:14px;transition:.2s;}
    .btn-primary:hover{background:#2a4f8c;transform:translateY(-1px);}
    .btn-excel{background:#27ae60;color:white;border:none;padding:12px 30px;border-radius:40px;cursor:pointer;font-weight:700;font-size:14px;transition:.2s;}
    .btn-excel:hover{background:#1e8449;transform:translateY(-1px);}
    .table-wrap{overflow-x:auto;border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.07);margin-top:20px;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    thead th{background:#1e2b4f;color:#ffd966;padding:12px 10px;text-align:center;white-space:nowrap;font-size:12px;}
    thead th.group-salary{background:#1a5276;color:#aed6f1;}
    thead th.group-deduction{background:#641e16;color:#f9ebea;}
    tbody td{padding:10px 8px;border-bottom:1px solid #f0f4fa;text-align:center;white-space:nowrap;}
    tbody tr:hover{background:#f8f9ff;}
    tbody tr:nth-child(even){background:#fafbff;}
    .total-row{background:#1e2b4f!important;color:white;font-weight:700;}
    .total-row td{color:white!important;border-bottom:none;}
    .total-row td.highlight{color:#ffd966!important;font-size:15px;}
    .cell-salary{background:#e8f4f8;color:#1a5276;font-weight:700;}
    .cell-commission{background:#e8f5e9;color:#1b5e20;font-weight:700;}
    .cell-net{background:#fff3e0;color:#e65100;font-weight:900;font-size:14px;}
    .cell-name{text-align:right;font-weight:700;color:#2c3e50;}
    .cell-days{font-weight:700;color:#1e2b4f;}
    .badge-zero{color:#aaa;}
    .loader{border:4px solid #f3f3f3;border-top:4px solid #1e2b4f;border-radius:50%;width:36px;height:36px;animation:spin .9s linear infinite;margin:36px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .empty{text-align:center;padding:50px;color:#aaa;}
    .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;color:white;z-index:9999;box-shadow:0 6px 20px rgba(0,0,0,.2);transform:translateY(60px);opacity:0;transition:.35s;}
    .toast.show{transform:translateY(0);opacity:1;}
    .t-ok{background:#27ae60;} .t-err{background:#e74c3c;} .t-info{background:#3498db;}
    .info-bar{background:#e8f4fd;border:1px solid #bee3f8;border-radius:12px;padding:12px 18px;margin-bottom:16px;font-size:13px;color:#1a5276;display:flex;align-items:center;gap:8px;}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>💰 تقرير المرتبات الشهري</h2>
    <div class="header-right">
      <span class="user-badge" id="userBadge">—</span>
      <button class="back-btn" onclick="goBack()">🔙 رجوع</button>
    </div>
  </div>
  <div class="content">
    <div class="filter-card">
      <div class="filter-row">
        <div class="filter-group">
          <label>📅 الشهر</label>
          <select id="selMonth">
            <option value="Jan">يناير</option><option value="Feb">فبراير</option><option value="Mar">مارس</option>
            <option value="Apr">أبريل</option><option value="May">مايو</option><option value="Jun">يونيو</option>
            <option value="Jul">يوليو</option><option value="Aug">أغسطس</option><option value="Sep">سبتمبر</option>
            <option value="Oct">أكتوبر</option><option value="Nov">نوفمبر</option><option value="Dec">ديسمبر</option>
          </select>
        </div>
        <div class="filter-group">
          <label>📆 السنة</label>
          <select id="selYear"></select>
        </div>
        <div style="display:flex;gap:10px;align-items:flex-end;">
          <button class="btn-primary" onclick="loadReport()">🔍 عرض التقرير</button>
          <button class="btn-excel" onclick="exportToExcel()">📎 تصدير Excel</button>
        </div>
      </div>
    </div>

    <div class="info-bar" id="infoBar" style="display:none;">
      <span>ℹ️</span>
      <span id="infoText"></span>
    </div>

    <div id="reportArea"><div class="loader"></div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwC1BRoLAJthZqxWTYyMUSjPNNGfCI0BjTfhE7ZiVx67rUP__OKAj0vlwD1-RUCOMSE/exec';
let currentUser = null;
let tableData = []; // البيانات المحسوبة النهائية للتصدير

// ──────────────────────────────────────────────
// JSONP helper
// ──────────────────────────────────────────────
function jsonp(action, params={}) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    params.action = action;
    params.callback = cb;
    const qs = Object.entries(params).map(([k,v]) => k+'='+encodeURIComponent(String(v??''))).join('&');
    const script = document.createElement('script');
    const timeout = setTimeout(() => { delete window[cb]; script.remove(); reject(new Error('انتهى الوقت')); }, 30000);
    window[cb] = (data) => { clearTimeout(timeout); delete window[cb]; script.remove(); resolve(data); };
    script.onerror = () => { clearTimeout(timeout); delete window[cb]; script.remove(); reject(new Error('خطأ في الاتصال')); };
    script.src = GAS_URL + '?' + qs;
    document.head.appendChild(script);
  });
}

// ──────────────────────────────────────────────
// Init
// ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const ud = sessionStorage.getItem('currentUser');
  if (ud) {
    try { currentUser = JSON.parse(ud); } catch(e) {}
  }
  document.getElementById('userBadge').textContent = currentUser?.name || '—';

  // تعبئة السنوات
  const selYear = document.getElementById('selYear');
  const currentYear = new Date().getFullYear();
  for (let y = currentYear + 1; y >= 2020; y--) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    if (y === currentYear) opt.selected = true;
    selYear.appendChild(opt);
  }

  // قراءة المعاملات من URL
  const urlParams = new URLSearchParams(window.location.search);
  const month = urlParams.get('month');
  const year  = urlParams.get('year');
  if (month) document.getElementById('selMonth').value = month;
  if (year)  document.getElementById('selYear').value  = year;

  loadReport();
});

// ──────────────────────────────────────────────
// تحميل التقرير: نجمع 3 مصادر في وقت واحد
// 1. getSalaryReportData  → أيام العمل + الراتب من Salaries
// 2. getAllInvoices        → عمولات من Invoices عمود 39
// 3. getExpenseRevenueRows (Expenses) → الدفعات المقدمة
// ──────────────────────────────────────────────
async function loadReport() {
  const month = document.getElementById('selMonth').value;
  const year  = document.getElementById('selYear').value;
  if (!month || !year) { showToast('اختر الشهر والسنة', 'error'); return; }

  document.getElementById('reportArea').innerHTML = '<div class="loader"></div>';
  document.getElementById('infoBar').style.display = 'none';

  try {
    // طلبات متوازية
    const [salResult, invoicesResult, expResult, ratesResult] = await Promise.all([
      jsonp('getSalaryReportData', { month, year }),
      jsonp('getAllInvoices', { includeCollection: 'false' }),
      jsonp('getExpenseRevenueRows', { sheet: 'Expenses', dateFrom: '', dateTo: '' }),
      jsonp('getLatestExchangeRates', {})
    ]);

    if (!salResult || !salResult.success || !salResult.employees || salResult.employees.length === 0) {
      document.getElementById('reportArea').innerHTML =
        '<div class="empty">📭 لا توجد بيانات رواتب للشهر المحدد<br><small>تأكد من تسجيل الحضور وضغط "مزامنة" أولاً</small></div>';
      tableData = [];
      return;
    }

    const employees   = salResult.employees;
    const invoices    = Array.isArray(invoicesResult) ? invoicesResult : [];
    const expenses    = Array.isArray(expResult) ? expResult : [];
    const rates       = ratesResult || { bUSD: 50, bEUR: 55, bGBP: 65 };

    // معدلات تحويل (نستخدم أسعار البنك كتقريب للمرتبات)
    const usdRate = parseFloat(rates.bUSD) || 50;
    const eurRate = parseFloat(rates.bEUR) || 55;
    const gbpRate = parseFloat(rates.bGBP) || 65;

    // ── 1. حساب العمولات من Invoices (عمود index 39) ──
    // نفلتر: State=Confirmed، Month وYear يطابقان الشهر المحسوب
    const commissionMap = {}; // {salesId: totalCommission}
    invoices.forEach(inv => {
      // inv هو object من getAllInvoices
      const invMonth = (inv.month || '').toString().trim();
      const invYear  = (inv.year  || '').toString().trim();
      const state    = (inv.state || '').toString().trim().toLowerCase();
      const comm     = parseFloat(inv.commission) || 0; // commission = العمود index 39

      // نقبل فقط فواتير الشهر المطابق وحالتها confirmed
      if (invMonth !== month || invYear !== year) return;
      if (state !== 'confirmed') return;
      if (comm <= 0) return;

      const salesId = (inv.salesId || '').toString().trim();
      if (!salesId) return;
      commissionMap[salesId] = (commissionMap[salesId] || 0) + comm;
    });

    // ── 2. حساب الدفعات المقدمة من Expenses ──
    // نفلتر: Month وYear يطابقان + Account أو Account_Name يطابق اسم الموظف
    // نبني خريطة اسم → userId أولاً
    const nameToId = {};
    employees.forEach(emp => {
      if (emp.name) nameToId[emp.name.trim().toLowerCase()] = emp.userId;
    });

    const advanceMap = {}; // {userId: totalAdvanceLE}
    expenses.forEach(exp => {
      const expMonth = (exp.month || '').toString().trim();
      const expYear  = (exp.year  || '').toString().trim();
      if (expMonth !== month || expYear !== year) return;

      const account     = (exp.account     || '').toString().trim().toLowerCase();
      const accountName = (exp.accountName || '').toString().trim().toLowerCase();
      const details     = (exp.details     || '').toString().trim().toLowerCase();

      // البحث عن الموظف المرتبط
      let targetUserId = null;
      // أولاً: Account_Name مباشر
      if (nameToId[accountName]) {
        targetUserId = nameToId[accountName];
      } else {
        // البحث في details
        for (const [name, uid] of Object.entries(nameToId)) {
          if (details.includes(name) || account.includes(name)) {
            targetUserId = uid;
            break;
          }
        }
      }

      if (!targetUserId) return;

      // تحويل كل العملات إلى LE
      const usd = parseFloat(exp.usd) || 0;
      const eur = parseFloat(exp.eur) || 0;
      const gbp = parseFloat(exp.gbp) || 0;
      const le  = parseFloat(exp.le)  || 0;

      const totalLE = (usd * usdRate) + (eur * eurRate) + (gbp * gbpRate) + le;
      if (totalLE <= 0) return;

      advanceMap[targetUserId] = (advanceMap[targetUserId] || 0) + totalLE;
    });

    // ── 3. بناء صفوف التقرير النهائية ──
    tableData = employees.map(emp => {
      const workingDays    = parseFloat(emp.workingDays)    || 0;
      const monthlySalary  = parseFloat(emp.monthlySalary)  || 0;
      const absentDays     = Math.max(0, 30 - workingDays);

      // الراتب المستحق = (المرتب الشهري / 30) × أيام العمل
      const salaryAmount   = monthlySalary > 0
        ? Math.round((monthlySalary / 30) * workingDays)
        : (parseFloat(emp.salaryAmount) || 0);

      // العمولة من Invoices
      const commission     = Math.round(commissionMap[emp.userId] || 0);

      // الحافز (0 لاحقاً)
      const bonus          = parseFloat(emp.bonus) || 0;

      // الإجمالي = الراتب المستحق + العمولة + الحافز
      const total          = salaryAmount + commission + bonus;

      // الخصم (0 لاحقاً)
      const cuts           = parseFloat(emp.cuts) || 0;

      // التأمينات (0 لاحقاً)
      const insurance      = parseFloat(emp.insurance) || 0;

      // صافي بعد الخصم = الإجمالي - الخصم - التأمينات
      const totalAfterCuts = total - cuts - insurance;

      // الدفعة المقدمة = إجمالي المسحوبات من Expenses بالجنيه
      const downPaymentLE  = Math.round(advanceMap[emp.userId] || 0);

      // الصافي المستحق
      const net            = totalAfterCuts - downPaymentLE;

      return {
        userId:        emp.userId        || '',
        name:          emp.name          || '',
        position:      emp.position      || '',
        workingDays,
        absentDays,
        monthlySalary,
        salaryAmount,
        commission,
        bonus,
        total,
        cuts,
        insurance,
        totalAfterCuts,
        downPaymentLE,
        net
      };
    });

    // معلومات إضافية
    const totalCommissions = Object.values(commissionMap).reduce((a,b)=>a+b, 0);
    const totalAdvances    = Object.values(advanceMap).reduce((a,b)=>a+b, 0);
    document.getElementById('infoBar').style.display = 'flex';
    document.getElementById('infoText').textContent =
      `إجمالي العمولات المجمَّعة من الفواتير: ${Math.round(totalCommissions).toLocaleString()} LE  |  إجمالي المسحوبات: ${Math.round(totalAdvances).toLocaleString()} LE  |  سعر الصرف المستخدم: $1 = ${usdRate} LE، €1 = ${eurRate} LE`;

    renderTable(tableData, month, year);

  } catch(e) {
    document.getElementById('reportArea').innerHTML =
      '<div class="empty">❌ خطأ: ' + e.message + '</div>';
    console.error(e);
  }
}

// ──────────────────────────────────────────────
// عرض الجدول
// ──────────────────────────────────────────────
function renderTable(rows, month, year) {
  if (!rows.length) {
    document.getElementById('reportArea').innerHTML =
      '<div class="empty">📭 لا توجد بيانات</div>';
    return;
  }

  // إجماليات الأعمدة
  let totals = {
    monthlySalary:0, workingDays:0, absentDays:0,
    salaryAmount:0, commission:0, bonus:0, total:0,
    downPaymentLE:0, insurance:0, cuts:0, net:0
  };
  rows.forEach(r => {
    totals.monthlySalary += r.monthlySalary;
    totals.workingDays   += r.workingDays;
    totals.absentDays    += r.absentDays;
    totals.salaryAmount  += r.salaryAmount;
    totals.commission    += r.commission;
    totals.bonus         += r.bonus;
    totals.total         += r.total;
    totals.downPaymentLE += r.downPaymentLE;
    totals.insurance     += r.insurance;
    totals.cuts          += r.cuts;
    totals.net           += r.net;
  });

  function fmt(n) { return Math.round(n).toLocaleString(); }
  function fmtDays(n) { return (Math.round(n*100)/100).toLocaleString(); }

  let html = `<div class="table-wrap"><table>
    <thead>
      <tr>
        <th rowspan="2">#</th>
        <th rowspan="2">الرقم الوظيفي</th>
        <th rowspan="2" style="text-align:right;">الاسم</th>
        <th rowspan="2">الوظيفة</th>
        <th rowspan="2">الراتب الأساسي</th>
        <th rowspan="2">أيام الحضور</th>
        <th rowspan="2">أيام الغياب</th>
        <th colspan="4" class="group-salary">المستحقات</th>
        <th colspan="3" class="group-deduction">الخصومات</th>
        <th rowspan="2" style="background:#b7770d;color:#fff;">الصافي المستحق (LE)</th>
      </tr>
      <tr>
        <th class="group-salary">الراتب المستحق</th>
        <th class="group-salary">العمولات</th>
        <th class="group-salary">الحافز</th>
        <th class="group-salary">الإجمالي</th>
        <th class="group-deduction">الدفعة المقدمة</th>
        <th class="group-deduction">التأمينات</th>
        <th class="group-deduction">خصم آخر</th>
      </tr>
    </thead>
    <tbody>`;

  rows.forEach((r, i) => {
    // تنسيق الراتب الأساسي (يظهر فقط إذا كان > 0)
    const monthlySalaryDisplay = r.monthlySalary > 0 ? fmt(r.monthlySalary) : '—';
    // تنسيق العمولة (يظهر فقط إذا كانت > 0)
    const commissionDisplay = r.commission > 0 ? fmt(r.commission) : '—';
    // تنسيق الدفعة المقدمة (يظهر فقط إذا كانت > 0)
    const downPaymentDisplay = r.downPaymentLE > 0 ? fmt(r.downPaymentLE) : '—';
    
    html += `<tr>
      <td>${i+1}</td>
      <td>${r.userId}</td>
      <td class="cell-name" style="text-align:right;">${r.name}</td>
      <td style="color:#6c757d;">${r.position || '—'}</td>
      <td class="cell-salary">${monthlySalaryDisplay}</td>
      <td class="cell-days">${fmtDays(r.workingDays)}</td>
      <td style="color:${r.absentDays>0?'#e74c3c':'#aaa'};">${r.absentDays>0?r.absentDays:'—'}</td>
      <td style="background:#e8f4f8;">${fmt(r.salaryAmount)}</td>
      <td style="background:#e8f5e9;">${commissionDisplay}</td>
      <td>${fmt(r.bonus)}</td>
      <td style="font-weight:700;">${fmt(r.total)}</td>
      <td style="color:${r.downPaymentLE>0?'#c0392b':'#aaa'};">${downPaymentDisplay}</td>
      <td>${fmt(r.insurance)}</td>
      <td>${fmt(r.cuts)}</td>
      <td class="cell-net">${r.net >= 0 ? fmt(r.net) : '<span style="color:#e74c3c;">'+fmt(r.net)+'</span>'}</td>
    </tr>`;
  });

  // صف الإجماليات
  html += `<tr class="total-row">
    <td colspan="4" style="text-align:right;">الإجمالي الكلي</td>
    <td>${fmt(totals.monthlySalary)}</td>
    <td>${fmtDays(totals.workingDays)}</td>
    <td>${fmt(totals.absentDays)}</td>
    <td>${fmt(totals.salaryAmount)}</td>
    <td>${fmt(totals.commission)}</td>
    <td>${fmt(totals.bonus)}</td>
    <td class="highlight">${fmt(totals.total)}</td>
    <td>${fmt(totals.downPaymentLE)}</td>
    <td>${fmt(totals.insurance)}</td>
    <td>${fmt(totals.cuts)}</td>
    <td class="highlight">${fmt(totals.net)}</td>
  </tr>`;

  html += `</tbody></table></div>`;
  document.getElementById('reportArea').innerHTML = html;
}
  // ──────────────────────────────────────────────
// تصدير Excel (CSV)
// ──────────────────────────────────────────────
function exportToExcel() {
  if (!tableData.length) { showToast('لا توجد بيانات لتصديرها', 'error'); return; }
  const month = document.getElementById('selMonth').value;
  const year  = document.getElementById('selYear').value;

  const headers = [
    'الرقم الوظيفي','الاسم','الوظيفة','أيام الحضور','أيام الغياب',
    'الراتب الأساسي (LE)','العمولات (LE)','الحافز (LE)','الإجمالي (LE)',
    'الدفعة المقدمة (LE)','التأمينات (LE)','خصم آخر (LE)','الصافي المستحق (LE)'
  ].join(',');

  const rows = tableData.map(r => [
    r.userId, '"'+r.name+'"', '"'+r.position+'"',
    r.workingDays, r.absentDays,
    Math.round(r.salaryAmount), Math.round(r.commission), Math.round(r.bonus), Math.round(r.total),
    Math.round(r.downPaymentLE), Math.round(r.insurance), Math.round(r.cuts), Math.round(r.net)
  ].join(','));

  // صف الإجماليات
  const totals = tableData.reduce((acc, r) => {
    acc.workingDays    += r.workingDays;
    acc.absentDays     += r.absentDays;
    acc.salaryAmount   += r.salaryAmount;
    acc.commission     += r.commission;
    acc.bonus          += r.bonus;
    acc.total          += r.total;
    acc.downPaymentLE  += r.downPaymentLE;
    acc.insurance      += r.insurance;
    acc.cuts           += r.cuts;
    acc.net            += r.net;
    return acc;
  }, {workingDays:0,absentDays:0,salaryAmount:0,commission:0,bonus:0,total:0,downPaymentLE:0,insurance:0,cuts:0,net:0});

  rows.push([
    'الإجمالي','','',
    Math.round(totals.workingDays*100)/100, Math.round(totals.absentDays),
    Math.round(totals.salaryAmount), Math.round(totals.commission), Math.round(totals.bonus), Math.round(totals.total),
    Math.round(totals.downPaymentLE), Math.round(totals.insurance), Math.round(totals.cuts), Math.round(totals.net)
  ].join(','));

  const csv = '\uFEFF' + headers + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `Salary_${month}_${year}.csv`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(link.href);
  showToast('✅ تم التصدير', 'success');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type==='error'?'t-err':type==='info'?'t-info':'t-ok') + ' show';
  setTimeout(() => { t.className = 'toast'; }, 3500);
}

function goBack() { window.location.href = 'AttendanceManagement.html'; }
</script>
