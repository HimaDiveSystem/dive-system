<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>تقرير المرتبات الشهري</title>
  
  <!-- ====== IMPORT CONFIG & SESSION MANAGER ====== -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="config.js"></script>
 <script src="session.js"></script>  
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
    body{background:linear-gradient(135deg,#1e2b4f,#152238);min-height:100vh;padding:20px;}
    .container{max-width:1400px;margin:0 auto;background:white;border-radius:30px;box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden;}
    .header{background:linear-gradient(135deg,#1e2b4f,#152238);color:white;padding:18px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
    .header h2{color:#ffd966;font-size:20px;display:flex;align-items:center;gap:8px;}
    .header-right{display:flex;align-items:center;gap:10px;}
    .user-badge{background:rgba(255,255,255,0.1);border:1px solid #ffd966;color:white;padding:7px 16px;border-radius:40px;font-size:13px;}
    .back-btn{background:#ffd966;color:#1e2b4f;border:none;padding:7px 18px;border-radius:40px;cursor:pointer;font-weight:700;font-size:13px;}
    .content{padding:28px;}
    .filter-card{background:#f8f9fa;border-radius:18px;padding:24px;margin-bottom:20px;}
    .filter-row{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
    .filter-group{display:flex;flex-direction:column;gap:6px;}
    .filter-group label{font-size:12px;font-weight:700;color:#6c757d;text-transform:uppercase;}
    .filter-group select{padding:12px 18px;border:2px solid #d0ddeb;border-radius:14px;font-size:14px;font-weight:700;color:#1e2b4f;background:white;min-width:160px;}
    .btn-primary{background:#1e2b4f;color:#ffd966;border:none;padding:12px 30px;border-radius:40px;cursor:pointer;font-weight:700;font-size:14px;transition:.2s;}
    .btn-primary:hover{background:#2a4f8c;transform:translateY(-1px);}
    .btn-excel{background:#27ae60;color:white;border:none;padding:12px 30px;border-radius:40px;cursor:pointer;font-weight:700;font-size:14px;transition:.2s;}
    .btn-excel:hover{background:#1e8449;transform:translateY(-1px);}
    .table-wrap{overflow-x:auto;border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.07);margin-top:20px;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    thead th{background:#1e2b4f;color:#ffd966;padding:12px 10px;text-align:center;white-space:nowrap;font-size:12px;}
    thead th.group-salary{background:#1a5276;color:#aed6f1;}
    thead th.group-deduction{background:#641e16;color:#f9ebea;}
    tbody td{padding:10px 8px;border-bottom:1px solid #f0f4fa;text-align:center;white-space:nowrap;}
    tbody tr:hover{background:#f8f9ff;}
    tbody tr:nth-child(even){background:#fafbff;}
    .total-row{background:#1e2b4f!important;color:white;font-weight:700;}
    .total-row td{color:white!important;border-bottom:none;}
    .total-row td.highlight{color:#ffd966!important;font-size:15px;}
    .cell-salary{background:#e8f4f8;color:#1a5276;font-weight:700;}
    .cell-commission{background:#e8f5e9;color:#1b5e20;font-weight:700;}
    .cell-net{background:#fff3e0;color:#e65100;font-weight:900;font-size:14px;}
    .cell-name{text-align:right;font-weight:700;color:#2c3e50;}
    .cell-days{font-weight:700;color:#1e2b4f;}
    .badge-zero{color:#aaa;}
    .loader{border:4px solid #f3f3f3;border-top:4px solid #1e2b4f;border-radius:50%;width:36px;height:36px;animation:spin .9s linear infinite;margin:36px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .empty{text-align:center;padding:50px;color:#aaa;}
    .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;color:white;z-index:9999;box-shadow:0 6px 20px rgba(0,0,0,.2);transform:translateY(60px);opacity:0;transition:.35s;}
    .toast.show{transform:translateY(0);opacity:1;}
    .t-ok{background:#27ae60;} .t-err{background:#e74c3c;} .t-info{background:#3498db;}
    .info-bar{background:#e8f4fd;border:1px solid #bee3f8;border-radius:12px;padding:12px 18px;margin-bottom:16px;font-size:13px;color:#1a5276;display:flex;align-items:center;gap:8px;}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>💰 تقرير المرتبات الشهري</h2>
    <div class="header-right">
      <span class="user-badge" id="userBadge">—</span>
      <button class="back-btn" onclick="goBack()">🔙 رجوع</button>
    </div>
  </div>
  <div class="content">
    <div class="filter-card">
      <div class="filter-row">
        <div class="filter-group">
          <label>📅 الشهر</label>
          <select id="selMonth">
            <option value="Jan">يناير</option><option value="Feb">فبراير</option><option value="Mar">مارس</option>
            <option value="Apr">أبريل</option><option value="May">مايو</option><option value="Jun">يونيو</option>
            <option value="Jul">يوليو</option><option value="Aug">أغسطس</option><option value="Sep">سبتمبر</option>
            <option value="Oct">أكتوبر</option><option value="Nov">نوفمبر</option><option value="Dec">ديسمبر</option>
          </select>
        </div>
        <div class="filter-group">
          <label>📆 السنة</label>
          <select id="selYear"></select>
        </div>
        <div style="display:flex;gap:10px;align-items:flex-end;">
          <button class="btn-primary" onclick="loadReport()">🔍 عرض التقرير</button>
          <button class="btn-excel" onclick="exportToExcel()">📎 تصدير Excel</button>
        </div>
      </div>
    </div>

    <div class="info-bar" id="infoBar" style="display:none;">
      <span>ℹ️</span>
      <span id="infoText"></span>
    </div>

    <div id="reportArea"><div class="loader"></div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
let currentUser = null;
let tableData = [];

// ──────────────────────────────────────────────
// JSONP helper
// ──────────────────────────────────────────────
function jsonp(action, params={}) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    params.action = action;
    params.callback = cb;
    
    // ✅ إضافة الـ Session ID تلقائياً
    const sessionId = getSessionId();
    if (sessionId) {
      params.sessionId = sessionId;
    }
    
    const qs = Object.entries(params).map(([k,v]) => k+'='+encodeURIComponent(String(v??''))).join('&');
    const script = document.createElement('script');
    const timeout = setTimeout(() => { delete window[cb]; script.remove(); reject(new Error('انتهى الوقت')); }, 30000);
    window[cb] = (data) => { clearTimeout(timeout); delete window[cb]; script.remove(); resolve(data); };
    script.onerror = () => { clearTimeout(timeout); delete window[cb]; script.remove(); reject(new Error('خطأ في الاتصال')); };
    script.src = CONFIG.GAS_URL + '?' + qs;  // ✅ تستخدم CONFIG.GAS_URL من config.js
    document.head.appendChild(script);
  });
}

// ──────────────────────────────────────────────
// دالة مساعدة لتنسيق القيم (تحويل 0 إلى "-")
// ──────────────────────────────────────────────
function formatValue(value, isCurrency = false) {
  if (value === undefined || value === null || value === '') return '—';
  const num = parseFloat(value);
  if (isNaN(num)) return '—';
  if (num === 0) return '—';
  if (isCurrency) return num.toLocaleString();
  if (Number.isInteger(num)) return num.toLocaleString();
  return num.toFixed(1);
}

// ──────────────────────────────────────────────
// Init
// ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // ✅ استخدام session-manager للحصول على بيانات المستخدم
  currentUser = getCurrentUser();
  document.getElementById('userBadge').textContent = currentUser?.name || '—';

  const selYear = document.getElementById('selYear');
  const currentYear = new Date().getFullYear();
  for (let y = currentYear + 1; y >= 2020; y--) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    if (y === currentYear) opt.selected = true;
    selYear.appendChild(opt);
  }

  const urlParams = new URLSearchParams(window.location.search);
  const month = urlParams.get('month');
  const year  = urlParams.get('year');
  if (month) document.getElementById('selMonth').value = month;
  if (year)  document.getElementById('selYear').value  = year;

  loadReport();
});

// ──────────────────────────────────────────────
// تحميل التقرير
// ──────────────────────────────────────────────
async function loadReport() {
  const month = document.getElementById('selMonth').value;
  const year  = document.getElementById('selYear').value;
  if (!month || !year) { showToast('اختر الشهر والسنة', 'error'); return; }

  document.getElementById('reportArea').innerHTML = '<div class="loader"></div>';
  document.getElementById('infoBar').style.display = 'none';

  try {
    // ✅ جلب اسم المركز من session
    const centerName = getCenterName();
    
    const [salResult, invoicesResult, expResult, ratesResult] = await Promise.all([
      jsonp('getSalaryReportData', { 
        month: month, 
        year: year,
        currentUser: JSON.stringify(currentUser),
        centerName: centerName  // ✅ إضافة اسم المركز
      }),
      jsonp('getAllInvoices', { 
        includeCollection: 'false',
        centerName: centerName  // ✅ إضافة اسم المركز
      }),
      jsonp('getExpenseRevenueRows', { 
        sheet: 'Expenses', 
        dateFrom: '', 
        dateTo: '',
        centerName: centerName  // ✅ إضافة اسم المركز
      }),
      jsonp('getLatestExchangeRates', {
        centerName: centerName  // ✅ إضافة اسم المركز
      })
    ]);

    if (!ratesResult || !ratesResult.bUSD || !ratesResult.bEUR || !ratesResult.bGBP) {
      console.log('⚠️ لا توجد أسعار صرف في شيت Exchange_Rates');
      document.getElementById('reportArea').innerHTML = 
        '<div class="empty">⚠️ لا توجد أسعار صرف في شيت Exchange_Rates<br><small>يرجى إدخال أسعار الصرف أولاً</small></div>';
      tableData = [];
      return;
    }

    const usdRate = parseFloat(ratesResult.bUSD);
    const eurRate = parseFloat(ratesResult.bEUR);
    const gbpRate = parseFloat(ratesResult.bGBP);

    if (!salResult || !salResult.success || !salResult.employees || salResult.employees.length === 0) {
      document.getElementById('reportArea').innerHTML =
        '<div class="empty">📭 لا توجد بيانات رواتب للشهر المحدد<br><small>تأكد من تسجيل الحضور وضغط "مزامنة" أولاً</small></div>';
      tableData = [];
      return;
    }

    const employees   = salResult.employees;
    const invoices    = Array.isArray(invoicesResult) ? invoicesResult : [];
    const expenses    = Array.isArray(expResult) ? expResult : [];

    // حساب العمولات من Invoices
    const commissionMap = {};
    invoices.forEach(inv => {
      const invMonth = (inv.month || '').toString().trim();
      const invYear  = (inv.year  || '').toString().trim();
      const state    = (inv.state || '').toString().trim().toLowerCase();
      let comm = parseFloat(inv.commission) || 0;
      
      if (isNaN(comm) || comm === 0) {
        const commStr = inv.commission?.toString().trim();
        if (commStr && commStr !== '') comm = parseFloat(commStr) || 0;
      }

      if (invMonth !== month || invYear !== year) return;
      if (state !== 'confirmed') return;
      if (comm <= 0) return;

      const salesId = (inv.salesId || '').toString().trim();
      if (!salesId) return;
      commissionMap[salesId] = (commissionMap[salesId] || 0) + comm;
    });

    // حساب الدفعات المقدمة من Expenses
    const nameToId = {};
    employees.forEach(emp => {
      if (emp.name) nameToId[emp.name] = emp.userId;
    });

    const advanceMap = {};
    expenses.forEach(exp => {
      const expMonth = (exp.month || '').toString().trim();
      const expYear  = (exp.year  || '').toString().trim();
      if (expMonth !== month || expYear !== year) return;

      const account = (exp.account || '').toString().trim();
      const targetUserId = nameToId[account];
      if (!targetUserId) return;

      const usd = parseFloat(exp.usd) || 0;
      const eur = parseFloat(exp.eur) || 0;
      const gbp = parseFloat(exp.gbp) || 0;
      const le  = parseFloat(exp.le)  || 0;

      const totalLE = (usd * usdRate) + (eur * eurRate) + (gbp * gbpRate) + le;
      if (totalLE <= 0) return;

      advanceMap[targetUserId] = (advanceMap[targetUserId] || 0) + totalLE;
    });

    // بناء صفوف التقرير
    tableData = employees.map(emp => {
      const workingDays    = parseFloat(emp.workingDays)    || 0;
      const monthlySalary  = parseFloat(emp.monthlySalary)  || 0;
      const absentDays     = Math.max(0, 30 - workingDays);

      const salaryAmount   = monthlySalary > 0
        ? Math.round((monthlySalary / 30) * workingDays)
        : (parseFloat(emp.salaryAmount) || 0);

      const commission     = Math.round(commissionMap[emp.userId] || 0);
      const bonus          = parseFloat(emp.bonus) || 0;
      const total          = salaryAmount + commission + bonus;
      const cuts           = parseFloat(emp.cuts) || 0;
      const insurance      = parseFloat(emp.insurance) || 0;
      const totalAfterCuts = total - cuts - insurance;
      const downPaymentLE  = Math.round(advanceMap[emp.userId] || 0);
      const net            = totalAfterCuts - downPaymentLE;

      return {
        userId:        emp.userId        || '',
        name:          emp.name          || '',
        position:      emp.position      || '',
        workingDays: workingDays,
        absentDays: absentDays,
        monthlySalary: monthlySalary,
        salaryAmount: salaryAmount,
        commission: commission,
        bonus: bonus,
        total: total,
        cuts: cuts,
        insurance: insurance,
        totalAfterCuts: totalAfterCuts,
        downPaymentLE: downPaymentLE,
        net: net
      };
    });

    const totalCommissions = Object.values(commissionMap).reduce((a,b)=>a+b, 0);
    const totalAdvances    = Object.values(advanceMap).reduce((a,b)=>a+b, 0);
    document.getElementById('infoBar').style.display = 'flex';
    document.getElementById('infoText').textContent =
      `إجمالي العمولات المجمَّعة من الفواتير: ${Math.round(totalCommissions).toLocaleString()} LE  |  إجمالي المسحوبات: ${Math.round(totalAdvances).toLocaleString()} LE  |  سعر الصرف المستخدم: $1 = ${usdRate} LE، €1 = ${eurRate} LE`;

    renderTable(tableData, month, year);

  } catch(e) {
    document.getElementById('reportArea').innerHTML =
      '<div class="empty">❌ خطأ: ' + e.message + '</div>';
    console.error(e);
  }
}

// ──────────────────────────────────────────────
// عرض الجدول (مع إخفاء الأصفار)
// ──────────────────────────────────────────────
function renderTable(rows, month, year) {
  if (!rows.length) {
    document.getElementById('reportArea').innerHTML =
      '<div class="empty">📭 لا توجد بيانات</div>';
    return;
  }

  let totals = {
    workingDays: 0, absentDays: 0,
    monthlySalary: 0, salaryAmount: 0,
    commission: 0, bonus: 0, total: 0,
    downPaymentLE: 0, net: 0
  };
  rows.forEach(r => {
    totals.workingDays   += r.workingDays || 0;
    totals.absentDays    += r.absentDays || 0;
    totals.monthlySalary += r.monthlySalary || 0;
    totals.salaryAmount  += r.salaryAmount || 0;
    totals.commission    += r.commission || 0;
    totals.bonus         += r.bonus || 0;
    totals.total         += r.total || 0;
    totals.downPaymentLE += r.downPaymentLE || 0;
    totals.net           += r.net || 0;
  });

  function fmt(n) { return Math.round(n).toLocaleString(); }
  function fmtDays(n) { return (Math.round(n*100)/100).toLocaleString(); }

  let html = `<div class="table-wrap"><table>
    <thead>
      <tr>
        <th>#</th>
        <th>الرقم الوظيفي</th>
        <th style="text-align:right;">الاسم</th>
        <th>الوظيفة</th>
        <th>أيام الحضور</th>
        <th>أيام الغياب</th>
        <th>الراتب الأساسي</th>
        <th>الراتب المستحق</th>
        <th>العمولة</th>
        <th>الحافز</th>
        <th>الإجمالي</th>
        <th>الخصم</th>
        <th>التأمينات</th>
        <th>صافي بعد الخصم</th>
        <th>الدفعة المقدمة</th>
        <th>الصافي المستحق</th>
      </tr>
    </thead>
    <tbody>`;

  rows.forEach((r, i) => {
    html += `<tr>
      <td>${i+1}</td>
      <td>${r.userId}</td>
      <td style="text-align:right;">${r.name}</td>
      <td style="color:#6c757d;">${r.position || '—'}</td>
      <td class="cell-days">${r.workingDays > 0 ? fmtDays(r.workingDays) : '—'}</td>
      <td style="color:${r.absentDays>0?'#e74c3c':'#aaa'};">${r.absentDays > 0 ? r.absentDays : '—'}</td>
      <td class="cell-salary">${r.monthlySalary > 0 ? fmt(r.monthlySalary) : '—'}</td>
      <td style="background:#e8f4f8;">${r.salaryAmount > 0 ? fmt(r.salaryAmount) : '—'}</td>
      <td style="background:#e8f5e9;">${r.commission > 0 ? fmt(r.commission) : '—'}</td>
      <td>${r.bonus > 0 ? fmt(r.bonus) : '—'}</td>
      <td style="font-weight:700;">${r.total > 0 ? fmt(r.total) : '—'}</td>
      <td>${r.cuts > 0 ? fmt(r.cuts) : '—'}</td>
      <td>${r.insurance > 0 ? fmt(r.insurance) : '—'}</td>
      <td>${r.totalAfterCuts > 0 ? fmt(r.totalAfterCuts) : '—'}</td>
      <td style="color:${r.downPaymentLE>0?'#c0392b':'#aaa'};">${r.downPaymentLE > 0 ? fmt(r.downPaymentLE) : '—'}</td>
      <td class="cell-net" style="font-weight:700;color:${r.net>=0?'#1e8449':'#e74c3c'};">${r.net !== 0 ? fmt(r.net) : '—'}</td>
    </tr>`;
  });

  html += `<tr class="total-row" style="background:#1e2b4f;color:#ffd966;">
    <td colspan="4"><strong>الإجمالي الكلي</strong></td>
    <td><strong>${totals.workingDays > 0 ? fmtDays(totals.workingDays) : '—'}</strong></td>
    <td><strong>${totals.absentDays > 0 ? fmt(totals.absentDays) : '—'}</strong></td>
    <td><strong>${totals.monthlySalary > 0 ? fmt(totals.monthlySalary) : '—'}</strong></td>
    <td><strong>${totals.salaryAmount > 0 ? fmt(totals.salaryAmount) : '—'}</strong></td>
    <td><strong>${totals.commission > 0 ? fmt(totals.commission) : '—'}</strong></td>
    <td><strong>${totals.bonus > 0 ? fmt(totals.bonus) : '—'}</strong></td>
    <td><strong>${totals.total > 0 ? fmt(totals.total) : '—'}</strong></td>
    <td><strong>0</strong></td>
    <td><strong>0</strong></td>
    <td><strong>${totals.total > 0 ? fmt(totals.total) : '—'}</strong></td>
    <td><strong>${totals.downPaymentLE > 0 ? fmt(totals.downPaymentLE) : '—'}</strong></td>
    <td><strong>${totals.net !== 0 ? fmt(totals.net) : '—'}</strong></td>
  </tr>`;

  html += `</tbody></table></div>`;
  document.getElementById('reportArea').innerHTML = html;
}

// ──────────────────────────────────────────────
// تصدير Excel (CSV) - مع إخفاء الأصفار
// ──────────────────────────────────────────────
function exportToExcel() {
  if (!tableData.length) { showToast('لا توجد بيانات لتصديرها', 'error'); return; }
  
  const month = document.getElementById('selMonth').value;
  const year = document.getElementById('selYear').value;
  
  const delimiter = ';';
  
  const headers = [
    '#', 'الرقم الوظيفي', 'الاسم', 'الوظيفة', 
    'أيام الحضور', 'أيام الغياب', 
    'الراتب الأساسي', 'الراتب المستحق', 
    'العمولة', 'الحافز', 
    'الإجمالي', 'الخصم', 'التأمينات', 
    'صافي بعد الخصم', 'الدفعة المقدمة', 'الصافي المستحق'
  ];
  
  const rows = [];
  rows.push(headers.join(delimiter));
  
  // إضافة بيانات كل موظف (مع تحويل 0 إلى سلاسل فارغة)
  tableData.forEach((emp, index) => {
    const row = [
      index + 1,
      emp.userId,
      emp.name ? `"${emp.name}"` : '',
      emp.position ? `"${emp.position}"` : '',
      (emp.workingDays && emp.workingDays > 0) ? emp.workingDays.toFixed(1) : '',
      (emp.absentDays && emp.absentDays > 0) ? emp.absentDays : '',
      (emp.monthlySalary && emp.monthlySalary > 0) ? emp.monthlySalary : '',
      (emp.salaryAmount && emp.salaryAmount > 0) ? emp.salaryAmount : '',
      (emp.commission && emp.commission > 0) ? emp.commission : '',
      (emp.bonus && emp.bonus > 0) ? emp.bonus : '',
      (emp.total && emp.total > 0) ? emp.total : '',
      (emp.cuts && emp.cuts > 0) ? emp.cuts : '',
      (emp.insurance && emp.insurance > 0) ? emp.insurance : '',
      (emp.totalAfterCuts && emp.totalAfterCuts > 0) ? emp.totalAfterCuts : '',
      (emp.downPaymentLE && emp.downPaymentLE > 0) ? emp.downPaymentLE : '',
      (emp.net !== 0) ? emp.net : ''
    ];
    rows.push(row.join(delimiter));
  });
  
  // حساب الإجماليات
  const totals = tableData.reduce((acc, r) => {
    acc.workingDays   += r.workingDays || 0;
    acc.absentDays    += r.absentDays || 0;
    acc.monthlySalary += r.monthlySalary || 0;
    acc.salaryAmount  += r.salaryAmount || 0;
    acc.commission    += r.commission || 0;
    acc.total         += r.total || 0;
    acc.downPaymentLE += r.downPaymentLE || 0;
    acc.net           += r.net || 0;
    return acc;
  }, { workingDays: 0, absentDays: 0, monthlySalary: 0, salaryAmount: 0, commission: 0, total: 0, downPaymentLE: 0, net: 0 });
  
  const totalRow = [
    'الإجمالي الكلي',
    '', '', '',
    totals.workingDays > 0 ? totals.workingDays.toFixed(1) : '',
    totals.absentDays > 0 ? totals.absentDays : '',
    totals.monthlySalary > 0 ? totals.monthlySalary : '',
    totals.salaryAmount > 0 ? totals.salaryAmount : '',
    totals.commission > 0 ? totals.commission : '',
    '',
    totals.total > 0 ? totals.total : '',
    '',
    '',
    totals.total > 0 ? totals.total : '',
    totals.downPaymentLE > 0 ? totals.downPaymentLE : '',
    totals.net !== 0 ? totals.net : ''
  ];
  rows.push(totalRow.join(delimiter));
  
  // إنشاء ملف CSV مع BOM
  const blob = new Blob(['\uFEFF' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  
  const link = document.createElement('a');
  const url = URL.createObjectURL(blob);
  link.href = url;
  link.setAttribute('download', `Salary_Report_${month}_${year}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
  
  showToast('✅ تم التصدير بنجاح', 'success');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type==='error'?'t-err':type==='info'?'t-info':'t-ok') + ' show';
  setTimeout(() => { t.className = 'toast'; }, 3500);
}

function goBack() {
  if (document.referrer && document.referrer !== '') {
    window.location.href = document.referrer;
  } else {
    // ✅ استخدام CONFIG.DASHBOARDS من config.js
    const userType = currentUser?.type || 'Sales';
    window.location.href = CONFIG.DASHBOARDS[userType] || 'Dashboard.html';
  }
}
</script>
</body>
</html>
