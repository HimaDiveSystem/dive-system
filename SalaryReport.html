<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>تقرير المرتبات الشهري</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
    body{background:linear-gradient(135deg,#1e2b4f,#152238);min-height:100vh;padding:20px;}
    .container{max-width:1300px;margin:0 auto;background:white;border-radius:30px;box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden;}
    .header{background:linear-gradient(135deg,#1e2b4f,#152238);color:white;padding:18px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
    .header h2{color:#ffd966;font-size:20px;display:flex;align-items:center;gap:8px;}
    .header-right{display:flex;align-items:center;gap:10px;}
    .user-badge{background:rgba(255,255,255,0.1);border:1px solid #ffd966;color:white;padding:7px 16px;border-radius:40px;font-size:13px;}
    .back-btn{background:#ffd966;color:#1e2b4f;border:none;padding:7px 18px;border-radius:40px;cursor:pointer;font-weight:700;font-size:13px;}
    .content{padding:28px;}
    .filter-card{background:#f8f9fa;border-radius:18px;padding:24px;margin-bottom:20px;}
    .filter-row{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
    .filter-group{display:flex;flex-direction:column;gap:6px;}
    .filter-group label{font-size:12px;font-weight:700;color:#6c757d;text-transform:uppercase;}
    .filter-group select{padding:12px 18px;border:2px solid #d0ddeb;border-radius:14px;font-size:14px;font-weight:700;color:#1e2b4f;background:white;min-width:160px;}
    .btn-primary{background:#1e2b4f;color:#ffd966;border:none;padding:12px 30px;border-radius:40px;cursor:pointer;font-weight:700;font-size:14px;transition:.2s;}
    .btn-primary:hover{background:#2a4f8c;transform:translateY(-1px);}
    .btn-excel{background:#27ae60;color:white;border:none;padding:12px 30px;border-radius:40px;cursor:pointer;font-weight:700;font-size:14px;transition:.2s;}
    .btn-excel:hover{background:#1e8449;transform:translateY(-1px);}
    .table-wrap{overflow-x:auto;border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.07);margin-top:20px;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    thead th{background:#1e2b4f;color:#ffd966;padding:12px;text-align:center;white-space:nowrap;}
    tbody td{padding:10px;border-bottom:1px solid #f0f4fa;text-align:center;}
    tbody tr:hover{background:#f8f9ff;}
    .total-row{background:#e6f0ff;font-weight:700;}
    .loader{border:4px solid #f3f3f3;border-top:4px solid #1e2b4f;border-radius:50%;width:36px;height:36px;animation:spin .9s linear infinite;margin:36px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .empty{text-align:center;padding:50px;color:#aaa;}
    .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;color:white;z-index:9999;box-shadow:0 6px 20px rgba(0,0,0,.2);transform:translateY(60px);opacity:0;transition:.35s;}
    .toast.show{transform:translateY(0);opacity:1;}
    .t-ok{background:#27ae60;}
    .t-err{background:#e74c3c;}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>💰 تقرير المرتبات الشهري</h2>
    <div class="header-right">
      <span class="user-badge" id="userBadge">—</span>
      <button class="back-btn" onclick="goBack()">🔙 رجوع</button>
    </div>
  </div>
  <div class="content">
    <div class="filter-card">
      <div class="filter-row">
        <div class="filter-group">
          <label>📅 الشهر</label>
          <select id="selMonth">
            <option value="Jan">يناير</option><option value="Feb">فبراير</option><option value="Mar">مارس</option>
            <option value="Apr">أبريل</option><option value="May">مايو</option><option value="Jun">يونيو</option>
            <option value="Jul">يوليو</option><option value="Aug">أغسطس</option><option value="Sep">سبتمبر</option>
            <option value="Oct">أكتوبر</option><option value="Nov">نوفمبر</option><option value="Dec">ديسمبر</option>
          </select>
        </div>
        <div class="filter-group">
          <label>📆 السنة</label>
          <select id="selYear"></select>
        </div>
        <div style="display:flex;gap:10px;">
          <button class="btn-primary" onclick="loadReport()">🔍 عرض التقرير</button>
          <button class="btn-excel" onclick="exportToExcel()">📎 تصدير Excel</button>
        </div>
      </div>
    </div>
    <div id="reportArea"><div class="loader"></div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwC1BRoLAJthZqxWTYyMUSjPNNGfCI0BjTfhE7ZiVx67rUP__OKAj0vlwD1-RUCOMSE/exec';
let currentUser = null;
let currentData = [];

function jsonp(action, params) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    params.action = action;
    params.callback = cb;
    const qs = Object.entries(params).map(([k, v]) => k + '=' + encodeURIComponent(v)).join('&');
    const script = document.createElement('script');
    const timeout = setTimeout(() => { delete window[cb]; script.remove(); reject(new Error('انتهى الوقت')); }, 30000);
    window[cb] = (data) => { clearTimeout(timeout); delete window[cb]; script.remove(); resolve(data); };
    script.onerror = () => { clearTimeout(timeout); delete window[cb]; script.remove(); reject(new Error('خطأ في الاتصال')); };
    script.src = GAS_URL + '?' + qs;
    document.head.appendChild(script);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  const ud = sessionStorage.getItem('currentUser');
  if (!ud) { window.location.href = 'AccountantDashboard.html'; return; }
  try { currentUser = JSON.parse(ud); } catch(e) { window.location.href = 'AccountantDashboard.html'; return; }
  document.getElementById('userBadge').textContent = currentUser.name || '—';
  
  const urlParams = new URLSearchParams(window.location.search);
  const month = urlParams.get('month');
  const year = urlParams.get('year');
  if (month) document.getElementById('selMonth').value = month;
  if (year) document.getElementById('selYear').value = year;
  
  const selYear = document.getElementById('selYear');
  const currentYear = new Date().getFullYear();
  for (let y = currentYear + 1; y >= 2020; y--) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    if (y === currentYear) opt.selected = true;
    selYear.appendChild(opt);
  }
  if (year) selYear.value = year;
  
  loadReport();
});

async function loadReport() {
  const month = document.getElementById('selMonth').value;
  const year = document.getElementById('selYear').value;
  if (!month || !year) { showToast('اختر الشهر والسنة', 'error'); return; }
  
  document.getElementById('reportArea').innerHTML = '<div class="loader"></div>';
  
  try {
    const result = await jsonp('getSalaryReportData', { month: month, year: year });
    if (result && result.success && result.employees && result.employees.length > 0) {
      currentData = result.employees;
      renderTable(result.employees, month, year);
    } else {
      document.getElementById('reportArea').innerHTML = '<div class="empty">📭 لا توجد بيانات رواتب للشهر المحدد</div>';
      currentData = [];
    }
  } catch(e) {
    document.getElementById('reportArea').innerHTML = '<div class="empty">❌ خطأ: ' + e.message + '</div>';
  }
}

function renderTable(employees, month, year) {
  const monthNames = {Jan:'يناير',Feb:'فبراير',Mar:'مارس',Apr:'أبريل',May:'مايو',Jun:'يونيو',Jul:'يوليو',Aug:'أغسطس',Sep:'سبتمبر',Oct:'أكتوبر',Nov:'نوفمبر',Dec:'ديسمبر'};
  let html = `<div class="table-wrap"><table>
  <thead>
  <tr>
    <th>#</th>
    <th>الرقم الوظيفي</th>
    <th>الاسم</th>
    <th>الوظيفة</th>
    <th>أيام العمل</th>
    <th>الراتب الشهري</th>
    <th>الراتب المستحق</th>
    <th>العمولة</th>
    <th>الحافز</th>
    <th>الإجمالي</th>
    <th>الخصم</th>
    <th>الغياب</th>
    <th>التأمينات</th>
    <th>صافي بعد الخصم</th>
    <th>الدفعة المقدمة</th>
    <th>الصافي المستحق</th>
  </tr>
</thead><tbody>`;
  
  employees.forEach((emp, i) => {
  html += `<tr>
    <td>${i+1}</td>
    <td>${emp.userId || ''}</td>
    <td>${emp.name || ''}</td>
    <td>${emp.position || ''}</td>
    <td>${emp.workingDays || 0}</td>
    <td>${(emp.monthlySalary || 0).toLocaleString()}</td>
    <td style="background:#e6f0ff;font-weight:700;">${(emp.salaryAmount || 0).toLocaleString()}</td>
    <td>${(emp.commission || 0).toLocaleString()}</td>
    <td>${(emp.bonus || 0).toLocaleString()}</td>
    <td>${(emp.total || 0).toLocaleString()}</td>
    <td>${(emp.cuts || 0).toLocaleString()}</td>
    <td>${(emp.absent || 0).toLocaleString()}</td>
    <td>${(emp.insurance || 0).toLocaleString()}</td>
    <td>${(emp.totalAfterCuts || 0).toLocaleString()}</td>
    <td>${(emp.downPayment || 0).toLocaleString()}</td>
    <td style="font-weight:700;color:#1e8449;">${(emp.net || 0).toLocaleString()}</td>
  </tr>`;
});
  
 // حساب إجمالي كل عمود
let totalMonthlySalary = 0;
let totalSalaryAmount = 0;
let totalCommission = 0;
let totalBonus = 0;
let totalOverall = 0;
let totalCuts = 0;
let totalAbsent = 0;
let totalInsurance = 0;
let totalAfterCuts = 0;
let totalDownPayment = 0;
let totalNet = 0;

employees.forEach(e => {
  totalMonthlySalary += e.monthlySalary || 0;
  totalSalaryAmount += e.salaryAmount || 0;
  totalCommission += e.commission || 0;
  totalBonus += e.bonus || 0;
  totalOverall += e.total || 0;
  totalCuts += e.cuts || 0;
  totalAbsent += e.absent || 0;
  totalInsurance += e.insurance || 0;
  totalAfterCuts += e.totalAfterCuts || 0;
  totalDownPayment += e.downPayment || 0;
  totalNet += e.net || 0;
});

html += `<tr class="total-row">
  <td colspan="4" style="text-align:left;"><strong>الإجمالي الكلي</strong></td>
  <td><strong>${totalMonthlySalary.toLocaleString()}</strong></td>
  <td><strong>${totalSalaryAmount.toLocaleString()}</strong></td>
  <td><strong>${totalCommission.toLocaleString()}</strong></td>
  <td><strong>${totalBonus.toLocaleString()}</strong></td>
  <td><strong>${totalOverall.toLocaleString()}</strong></td>
  <td><strong>${totalCuts.toLocaleString()}</strong></td>
  <td><strong>${totalAbsent.toLocaleString()}</strong></td>
  <td><strong>${totalInsurance.toLocaleString()}</strong></td>
  <td><strong>${totalAfterCuts.toLocaleString()}</strong></td>
  <td><strong>${totalDownPayment.toLocaleString()}</strong></td>
  <td><strong>${totalNet.toLocaleString()}</strong></td>
</tr>`;
  html += `</tbody></table></div>`;
  document.getElementById('reportArea').innerHTML = html;
}

function exportToExcel() {
  if (!currentData.length) { showToast('لا توجد بيانات لتصديرها', 'error'); return; }
  let csv = "الرقم الوظيفي,الاسم,الوظيفة,أيام العمل,الراتب الشهري,الراتب المستحق,العمولة,الحافز,الإجمالي,الخصم,الغياب,التأمينات,صافي بعد الخصم,الدفعة المقدمة,الصافي المستحق\n";
  currentData.forEach(emp => {
    csv += `"${emp.userId || ''}","${emp.name || ''}","${emp.position || ''}",${emp.workingDays || 0},${emp.monthlySalary || 0},${emp.salaryAmount || 0},${emp.commission || 0},${emp.bonus || 0},${emp.total || 0},${emp.cuts || 0},${emp.absent || 0},${emp.insurance || 0},${emp.totalAfterCuts || 0},${emp.downPayment || 0},${emp.net || 0}\n`;
  });
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  const url = URL.createObjectURL(blob);
  link.href = url;
  link.setAttribute("download", `Salary_Report_${document.getElementById('selMonth').value}_${document.getElementById('selYear').value}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
  showToast('✅ تم التصدير', 'success');
}

function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + (type === 'error' ? 't-err' : 't-ok') + ' show';
  setTimeout(() => toast.className = 'toast', 3000);
}

function goBack() { window.location.href = 'AttendanceManagement.html'; }
</script>
</body>
</html>
