<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قائمة أسعار الرحلات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:   #0d1b3e;
      --navy2:  #152952;
      --gold:   #f0b429;
      --gold2:  #ffd166;
      --teal:   #0a7c6e;
      --teal2:  #0ea58f;
      --bg:     #f0f4f8;
      --white:  #ffffff;
      --text:   #1a2640;
      --muted:  #6b7a99;
      --border: #d8e2f0;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Tajawal', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,.35);
      flex-shrink: 0;
    }
    .header-left { display:flex; align-items:center; gap:14px; }
    .header-logo {
      width: 38px; height: 38px;
      background: var(--gold);
      border-radius: 10px;
      display: flex; align-items:center; justify-content:center;
      font-size: 20px;
    }
    .header-title {
      color: var(--gold2);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: .3px;
    }
    .header-title span { color: rgba(255,255,255,.5); font-weight: 400; font-size: 13px; display:block; }

    .close-btn {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      color: white;
      padding: 8px 18px;
      border-radius: 30px;
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      font-weight: 700;
      display: flex; align-items:center; gap:6px;
      transition: .2s;
    }
    .close-btn:hover { background: rgba(255,255,255,.2); }

    /* ── CURRENCY BAR ── */
    .currency-bar {
      background: var(--white);
      border-bottom: 2px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      position: sticky;
      top: 64px;
      z-index: 99;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
      flex-shrink: 0;
    }
    .currency-label { color: var(--muted); font-size: 13px; font-weight: 700; white-space:nowrap; }
    .cur-opts { display:flex; gap:8px; flex-wrap:wrap; }
    .cur-btn {
      padding: 8px 20px;
      border-radius: 30px;
      border: 2px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s;
      white-space: nowrap;
    }
    .cur-btn:hover { border-color: var(--gold); }
    .cur-btn.active {
      background: var(--navy);
      color: var(--gold2);
      border-color: var(--navy);
      box-shadow: 0 4px 12px rgba(13,27,62,.3);
    }

    .result-count {
      margin-right: auto;
      background: var(--teal2);
      color: white;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    /* ── LOADING ── */
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 20px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid var(--border);
      border-top: 4px solid var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-screen p { color: var(--muted); font-size: 15px; font-weight: 500; }

    /* ── GRID ── */
    .trips-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* ── TRIP CARD ── */
    .trip-card {
      background: var(--white);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(13,27,62,.07);
      border: 1.5px solid var(--border);
      transition: transform .2s, box-shadow .2s;
      animation: fadeUp .35s ease both;
    }
    .trip-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(13,27,62,.13);
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(14px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .trip-header {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .trip-name {
      color: var(--gold2);
      font-size: 15px;
      font-weight: 800;
      line-height: 1.3;
    }
    .trip-category {
      color: rgba(255,255,255,.55);
      font-size: 11px;
      font-weight: 500;
      margin-top: 3px;
    }
    .cost-badge {
      background: rgba(240,180,41,.15);
      border: 1px solid rgba(240,180,41,.4);
      color: var(--gold);
      font-size: 10px;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .items-list { padding: 10px 0; }
    .item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 16px;
      border-bottom: 1px solid #f0f4f8;
      transition: background .15s;
    }
    .item-row:last-child { border-bottom: none; }
    .item-row:hover { background: #f8fafd; }

    .item-name {
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .item-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--teal2);
      flex-shrink: 0;
    }
    .item-price {
      font-size: 15px;
      font-weight: 800;
      color: var(--teal);
      direction: ltr;
      display: flex;
      align-items: baseline;
      gap: 3px;
    }
    .item-price .cur { font-size: 11px; font-weight: 600; color: var(--muted); }
    .item-price.zero { color: var(--border); }
    .item-price.zero .cur { color: var(--border); }

    /* ── NO DATA ── */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 52px; margin-bottom: 14px; }
    .empty-state p { font-size: 16px; font-weight: 600; }

    /* ── CATEGORY GROUP HEADER ── */
    .category-header {
      grid-column: 1/-1;
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 0 4px;
    }
    .category-header h3 {
      font-size: 13px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
    }
    .category-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .category-count {
      background: var(--navy);
      color: var(--gold2);
      font-size: 11px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .trips-grid { grid-template-columns: 1fr; }
      .content { padding: 14px; }
      .header-title span { display: none; }
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="header-logo">🏝️</div>
    <div class="header-title">
      قائمة أسعار الرحلات
      <span>اختر العملة لعرض الأسعار</span>
    </div>
  </div>
  <button class="close-btn" onclick="goBack()">✕ إغلاق</button>
</div>

<!-- Currency Bar -->
<div class="currency-bar">
  <span class="currency-label">العملة:</span>
  <div class="cur-opts">
    <button class="cur-btn active" data-cur="$"  onclick="selectCurrency('$',  this)">💵 دولار $</button>
    <button class="cur-btn"        data-cur="€"  onclick="selectCurrency('€',  this)">💶 يورو €</button>
    <button class="cur-btn"        data-cur="£"  onclick="selectCurrency('£',  this)">💷 إسترليني £</button>
    <button class="cur-btn"        data-cur="LE" onclick="selectCurrency('LE', this)">🇪🇬 جنيه LE</button>
  </div>
  <span class="result-count" id="resultCount" style="display:none"></span>
</div>

<!-- Content -->
<div class="content" id="mainContent">
  <div class="loading-screen">
    <div class="spinner"></div>
    <p>جاري تحميل الأسعار...</p>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwX_BUpZUxhOKB-BtjykeE2lSTjlfXORGWhwoh6aJo_JYwCL6vnZjxc5r4mj7qPIcyt/exec';

let currentUser    = null;
let currentCur     = '$';
let allData        = {};   // cache: currency → trips[]
let isLoading      = false;

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  let ud = sessionStorage.getItem('currentUser');
  if (!ud) {
    const p = new URLSearchParams(location.search), u = p.get('user');
    if (u) { ud = decodeURIComponent(u); sessionStorage.setItem('currentUser', ud); }
  }
  if (!ud) { location.href = 'index.html'; return; }
  try { currentUser = JSON.parse(ud); } catch(e) { location.href = 'index.html'; return; }

  loadPrices('$');
});

// ── goBack ──
function goBack() {
  const pages = {
    Admin:'Dashboard.html', Owner:'OwnerDashboard.html',
    Sales:'SalesDashboard.html', Accountant:'AccountantDashboard.html'
  };
  location.href = pages[currentUser?.type] || 'SalesDashboard.html';
}

// ── Currency select ──
function selectCurrency(cur, btn) {
  if (cur === currentCur && allData[cur]) return;
  currentCur = cur;
  document.querySelectorAll('.cur-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadPrices(cur);
}

// ── JSONP ──
function jsonp(action, params = {}) {
  return new Promise((res, rej) => {
    const cb = '_p' + Date.now() + Math.floor(Math.random() * 99999);
    params.action = action; params.callback = cb;
    const qs = Object.entries(params).map(([k,v]) => k+'='+encodeURIComponent(String(v??''))).join('&');
    const sc = document.createElement('script');
    const to = setTimeout(() => { delete window[cb]; sc.remove(); rej(new Error('انتهت المهلة')); }, 30000);
    window[cb] = d => { clearTimeout(to); delete window[cb]; sc.remove(); res(d); };
    sc.onerror = () => { clearTimeout(to); delete window[cb]; sc.remove(); rej(new Error('فشل الاتصال')); };
    sc.src = GAS_URL + '?' + qs;
    document.head.appendChild(sc);
  });
}

// ── Load prices ──
async function loadPrices(currency) {
  // من الـ cache
  if (allData[currency]) {
    renderTrips(allData[currency], currency);
    return;
  }

  if (isLoading) return;
  isLoading = true;
  showLoading();

  try {
    const trips = await jsonp('getAllTripsWithPrices', { currency });
    allData[currency] = trips || [];
    renderTrips(allData[currency], currency);
  } catch(e) {
    showError(e.message);
  } finally {
    isLoading = false;
  }
}

// ── Render ──
function renderTrips(trips, currency) {
  const el = document.getElementById('mainContent');
  const rc = document.getElementById('resultCount');

  if (!trips || !trips.length) {
    el.innerHTML = `<div class="trips-grid"><div class="empty-state">
      <div class="icon">🔍</div>
      <p>لا توجد رحلات بهذه العملة</p>
    </div></div>`;
    rc.style.display = 'none';
    return;
  }

  // تجميع حسب الفئة
  const byCategory = new Map();
  trips.forEach(t => {
    const cat = t.category || 'أخرى';
    if (!byCategory.has(cat)) byCategory.set(cat, []);
    byCategory.get(cat).push(t);
  });

  let html = '<div class="trips-grid">';
  let cardIndex = 0;

  byCategory.forEach((catTrips, catName) => {
    html += `<div class="category-header">
      <h3>${catName}</h3>
      <div class="category-line"></div>
      <span class="category-count">${catTrips.length}</span>
    </div>`;

    catTrips.forEach(trip => {
      const delay = (cardIndex++ % 12) * 40;
      const itemsHtml = (trip.items || []).map(item => {
        const isZero = !item.price || item.price === 0;
        const priceStr = isZero ? '—' : Number(item.price).toLocaleString('en', {minimumFractionDigits:0, maximumFractionDigits:2});
        return `<div class="item-row">
          <div class="item-name">
            <span class="item-dot"></span>
            ${item.name}
          </div>
          <div class="item-price ${isZero ? 'zero' : ''}">
            ${isZero ? '—' : priceStr}
            ${isZero ? '' : `<span class="cur">${currency}</span>`}
          </div>
        </div>`;
      }).join('');

      html += `<div class="trip-card" style="animation-delay:${delay}ms">
        <div class="trip-header">
          <div>
            <div class="trip-name">${trip.name}</div>
            <div class="trip-category">${trip.category || ''}</div>
          </div>
          ${trip.hasCost ? '<span class="cost-badge">💰 Cost</span>' : ''}
        </div>
        <div class="items-list">${itemsHtml || '<div class="item-row"><span style="color:#aaa;font-size:12px">لا توجد بنود</span></div>'}</div>
      </div>`;
    });
  });

  html += '</div>';
  el.innerHTML = html;

  rc.textContent = `${trips.length} رحلة`;
  rc.style.display = 'inline-block';
}

// ── Helpers ──
function showLoading() {
  document.getElementById('mainContent').innerHTML = `
    <div class="loading-screen">
      <div class="spinner"></div>
      <p>جاري تحميل أسعار ${getCurrencyLabel(currentCur)}...</p>
    </div>`;
  document.getElementById('resultCount').style.display = 'none';
}

function showError(msg) {
  document.getElementById('mainContent').innerHTML = `
    <div class="loading-screen">
      <div style="font-size:48px">⚠️</div>
      <p style="color:#e74c3c">${msg}</p>
      <button onclick="loadPrices(currentCur)"
        style="background:#0d1b3e;color:#ffd166;border:none;padding:10px 24px;border-radius:30px;cursor:pointer;font-family:Tajawal,sans-serif;font-size:14px;font-weight:700;margin-top:8px">
        🔄 إعادة المحاولة
      </button>
    </div>`;
}

function getCurrencyLabel(cur) {
  return { '$':'الدولار', '€':'اليورو', '£':'الإسترليني', 'LE':'الجنيه' }[cur] || cur;
}
</script>
</body>
</html>
