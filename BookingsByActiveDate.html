<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Bookings by Active Date</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
    body{background:#f0f4f8;min-height:100vh}

    /* HEADER — بلا إطار، بلا border-radius */
    .header{background:linear-gradient(135deg,#1e2b4f,#152238);color:white;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
    .header h2{color:#ffd966;font-size:20px;display:flex;align-items:center;gap:8px}
    .user-name{background:rgba(255,255,255,.1);padding:6px 16px;border-radius:30px;border:1px solid #ffd966;font-size:13px}
    .goBack-btn{background:#ff6b6b;color:white;border:none;padding:7px 20px;border-radius:30px;cursor:pointer;font-weight:600;font-size:13px}
    .goBack-btn:hover{background:#ee5253}

    /* FILTER */
    .filter-section{background:white;padding:14px 24px;border-bottom:2px solid #dee2e6;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .filter-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
    .fg{flex:1;min-width:140px}
    .fg label{display:block;font-size:11px;color:#1e2b4f;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
    .date-row{display:flex;gap:4px;align-items:center}
    .date-txt{flex:1;padding:8px 10px;border:2px solid #e9f0fa;border-radius:10px;font-size:13px;color:#2c3e50}
    .date-txt:focus{outline:none;border-color:#1e2b4f}
    .date-txt.err{border-color:#e74c3c}
    .cal-btn{padding:7px 9px;background:#1e2b4f;color:#ffd966;border:none;border-radius:8px;cursor:pointer;font-size:14px}
    .cal-btn:hover{background:#2a3a60}
    .date-native{position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0}
    .spin-row{display:flex;gap:4px;margin-top:4px}
    .spin-btn{flex:1;padding:4px;border:none;border-radius:7px;background:#1e2b4f;color:white;font-weight:bold;cursor:pointer;font-size:12px}
    .spin-btn:hover{background:#ffd966;color:#1e2b4f}
    .err-msg{font-size:10px;color:#e74c3c;margin-top:2px;min-height:13px}
    .search-inp{width:100%;padding:9px 10px;border:2px solid #e9f0fa;border-radius:10px;font-size:13px}
    .search-inp:focus{outline:none;border-color:#1e2b4f}
    .state-sel{width:100%;padding:9px 10px;border:2px solid #e9f0fa;border-radius:10px;font-size:13px;background:white;color:#2c3e50;cursor:pointer}
    .state-sel:focus{outline:none;border-color:#1e2b4f}
    .filter-actions{display:flex;gap:8px;align-items:center;padding-bottom:2px}
    .btn-primary{background:#1e2b4f;color:white;border:none;padding:9px 18px;border-radius:30px;font-weight:600;cursor:pointer;font-size:13px}
    .btn-primary:hover{background:#ffd966;color:#1e2b4f}
    .btn-reset{background:#6c757d;color:white;border:none;padding:9px 18px;border-radius:30px;font-weight:600;cursor:pointer;font-size:13px}
    .btn-reset:hover{background:#5a6268}

    /* STATUS BADGES */
    .st-pending{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:#fff3cd;color:#856404}
    .st-confirmed{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:#d1e7dd;color:#0f5132}
    .st-cancel{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:#f8d7da;color:#842029}
    .st-other{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:#e9ecef;color:#495057}

    /* TABLE */
    .table-wrap{padding:16px 24px;overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{background:#1e2b4f;color:#ffd966;padding:9px 5px;font-weight:600;cursor:pointer;white-space:nowrap;position:sticky;top:57px}
    th:hover{background:#2a3a60}
    td{padding:6px 5px;border-bottom:1px solid #e9f0fa;color:#2c3e50;white-space:nowrap}
    tr:hover{background:#f5f9ff}
    .act-cell{max-width:180px;white-space:normal;word-break:break-word}
    .pax-cell{max-width:80px;white-space:normal}
    .totals-row td{background:#eaf2ff;font-weight:700;color:#1e2b4f;border-top:2px solid #1e2b4f}

    /* PAGINATION */
    .pagination{display:flex;justify-content:center;gap:8px;padding:10px 24px 16px;flex-wrap:wrap}
    .pg-btn{padding:5px 11px;border:1px solid #dee2e6;background:white;border-radius:20px;cursor:pointer;font-size:12px}
    .pg-btn.active{background:#1e2b4f;color:#ffd966;border-color:#1e2b4f}

    /* TRIP SUMMARY */
    .summary-section{padding:0 24px 24px}
    .summary-title{font-size:15px;font-weight:700;color:#1e2b4f;margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .sum-table{width:100%;border-collapse:collapse;font-size:13px}
    .sum-table th{background:#2a3a60;color:#ffd966;padding:8px 12px;text-align:left}
    .sum-table td{padding:7px 12px;border-bottom:1px solid #e9f0fa}
    .sum-table tr:hover{background:#f0f5ff}
    .badge{display:inline-block;background:#1e2b4f;color:#ffd966;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700}

    /* ACTIONS */
    .act-btns{display:flex;gap:3px;justify-content:center}
    .abtn{padding:3px 7px;border:none;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;color:white;text-decoration:none;display:inline-flex;align-items:center}
    .edit-btn{background:#3498db}.edit-btn:hover{background:#2980b9}
    .del-btn{background:#e74c3c}.del-btn:hover{background:#c0392b}
    .pdf-btn{background:#e67e22}.pdf-btn:hover{background:#d35400}
    .pdf-na{background:#bdc3c7;cursor:default}

    .no-data{text-align:center;padding:50px;color:#6c757d}
    .loader{border:4px solid #f3f3f3;border-top:4px solid #1e2b4f;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:20px auto}
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    @media(max-width:768px){.filter-row{flex-direction:column}.filter-actions{width:100%}.table-wrap{padding:8px}.summary-section{padding:0 8px 16px}}
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <h2>📄 Bookings by Active Date</h2>
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <span class="user-name" id="userNameDisplay"></span>
      <button class="goBack-btn" onclick="goBack()">الرجوع</button>
    </div>
  </div>

  <!-- FILTER -->
  <div class="filter-section">
    <div class="filter-row">

      <!-- FROM DATE -->
      <div class="fg">
        <label>From Date (Active)</label>
        <div class="date-row">
          <input class="date-txt" id="fromTxt" placeholder="dd/Mmm/yyyy" oninput="onDateType('from')">
          <button class="cal-btn" onclick="openCal('from')" type="button">📅</button>
        </div>
        <input type="date" class="date-native" id="fromNat" onchange="onCalPick('from')">
        <div class="spin-row">
          <button class="spin-btn" onclick="doSpin('from',-1)" type="button">▼ -1</button>
          <button class="spin-btn" onclick="doSpin('from',+1)" type="button">▲ +1</button>
        </div>
        <div class="err-msg" id="errFrom"></div>
      </div>

      <!-- TO DATE -->
      <div class="fg">
        <label>To Date (Active)</label>
        <div class="date-row">
          <input class="date-txt" id="toTxt" placeholder="dd/Mmm/yyyy" oninput="onDateType('to')">
          <button class="cal-btn" onclick="openCal('to')" type="button">📅</button>
        </div>
        <input type="date" class="date-native" id="toNat" onchange="onCalPick('to')">
        <div class="spin-row">
          <button class="spin-btn" onclick="doSpin('to',-1)" type="button">▼ -1</button>
          <button class="spin-btn" onclick="doSpin('to',+1)" type="button">▲ +1</button>
        </div>
        <div class="err-msg" id="errTo"></div>
      </div>

      <!-- STATUS -->
      <div class="fg">
        <label>Status</label>
        <select class="state-sel" id="stateFilter" onchange="applyFilters()">
          <option value="">— All —</option>
          <option value="Pending">⏳ Pending</option>
          <option value="Confirmed">✅ Confirmed</option>
          <option value="Cancel">❌ Cancel</option>
        </select>
      </div>

      <!-- SEARCH -->
      <div class="fg">
        <label>Search</label>
        <input class="search-inp" id="searchTxt" placeholder="Voucher, Guest, Trip...">
      </div>

      <div class="filter-actions">
        <button class="btn-primary" onclick="applyFilters()">Apply</button>
        <button class="btn-reset"   onclick="resetFilters()">Reset</button>
      </div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap" id="tableWrap">
    <div style="text-align:center;padding:50px">Loading...</div>
  </div>
  <div class="pagination" id="pagination"></div>

  <!-- TRIP SUMMARY -->
  <div class="summary-section" id="summarySection" style="display:none">
    <div class="summary-title">🗺️ Trips Summary</div>
    <div style="overflow-x:auto">
      <table class="sum-table" id="sumTable"></table>
    </div>
  </div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:9999">
  <div style="background:white;width:380px;border-radius:20px;padding:28px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.3)">
    <div style="font-size:44px;margin-bottom:16px">ℹ️</div>
    <h3 style="color:#1e2b4f;margin-bottom:20px" id="modalMsg"></h3>
    <button class="btn-primary" id="modalOk">OK</button>
  </div>
</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbyEXU9rrScCGTOcksiONNNznJ6vG0fdi4mA5CIbpXYmohsH2MFp4dqF8bQuSqm57c36/exec';
  const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DASH = {Admin:'Dashboard.html',Owner:'OwnerDashboard.html',Sales:'SalesDashboard.html',Accountant:'AccountantDashboard.html'};
  const ALLOWED = ['Admin','Owner','Sales','Accountant','FinancialManager','CenterManager','BranchManager'];

  let currentUser = null;
  let allInvoices = [];
  let filteredInvoices = [];
  let currentPage = 1;
  const PAGE_SIZE = 20;
  let sortCol = 'activeDate', sortDir = 'asc';

  /* ── DATE HELPERS ── */
  function isoToTxt(iso){
    if(!iso) return '';
    const[y,m,d]=iso.split('-').map(Number);
    return String(d).padStart(2,'0')+'/'+MN[m-1]+'/'+y;
  }
  function txtToIso(txt){
    if(!txt) return '';
    const m=txt.trim().match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
    if(!m) return '';
    const idx=MN.findIndex(x=>x.toLowerCase()===m[2].toLowerCase());
    if(idx<0) return '';
    return m[3]+'-'+String(idx+1).padStart(2,'0')+'-'+String(m[1]).padStart(2,'0');
  }
  function parseDDMMM(str){
    if(!str) return null;
    if(str instanceof Date) return str.getTime();
    const s=String(str).trim();
    const m=s.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})/);
    if(m){
      const idx=MN.findIndex(x=>x.toLowerCase()===m[2].toLowerCase());
      if(idx>=0) return new Date(parseInt(m[3]),idx,parseInt(m[1])).getTime();
    }
    const d=new Date(s);
    if(!isNaN(d)) return d.getTime();
    return null;
  }
  function txtToTs(txt){ const iso=txtToIso(txt); if(!iso) return null; const[y,mo,d]=iso.split('-').map(Number); return new Date(y,mo-1,d).getTime(); }

  /* ── DATE PICKER ── */
  function openCal(w){ const n=document.getElementById(w+'Nat'); try{n.showPicker();}catch{n.click();} }
  function onCalPick(w){
    const iso=document.getElementById(w+'Nat').value;
    if(!iso) return;
    document.getElementById(w+'Txt').value=isoToTxt(iso);
    checkDates(); applyFilters();
  }
  function onDateType(w){
    const val=document.getElementById(w+'Txt').value.trim();
    const iso=txtToIso(val);
    if(iso){ document.getElementById(w+'Nat').value=iso; checkDates(); applyFilters(); }
  }
  function doSpin(w,delta){
    const nat=document.getElementById(w+'Nat');
    const txt=document.getElementById(w+'Txt');
    let iso=nat.value||new Date().toISOString().split('T')[0];
    const d=new Date(iso);
    d.setDate(d.getDate()+delta);
    iso=d.toISOString().split('T')[0];
    nat.value=iso; txt.value=isoToTxt(iso);
    checkDates(); applyFilters();
  }
  function checkDates(){
    const f=document.getElementById('fromNat').value;
    const t=document.getElementById('toNat').value;
    const el=document.getElementById('errTo');
    const txtEl=document.getElementById('toTxt');
    if(f&&t&&t<f){ el.textContent='⚠️ To ≥ From'; txtEl.classList.add('err'); return false; }
    el.textContent=''; txtEl.classList.remove('err'); return true;
  }

  /* ── LOAD ── */
  function goBack(){ window.location.href=DASH[currentUser?.type]||'Dashboard.html'; }

  function loadInvoices(){
    document.getElementById('tableWrap').innerHTML='<div class="loader"></div>';
    fetch(GAS_URL+'?action=getAllInvoices')
      .then(r=>r.json())
      .then(data=>{
        if(!Array.isArray(data)) data=[];
        const ub=currentUser?.branchName, ut=currentUser?.type;
        allInvoices=(ub&&ut!=='Admin'&&ut!=='Owner')?data.filter(i=>i.branchName===ub):data;
        filteredInvoices=[...allInvoices];
        doSort(); renderAll();
      })
      .catch(e=>{ document.getElementById('tableWrap').innerHTML=`<div class="no-data">Error: ${e.message}</div>`; });
  }

  /* ── SORT ── */
  const NUM=['rest','cashUSD','cashEUR','cashGBP','cashLE','visaUSD','visaEUR','visaGBP','visaLE','discount','adultCount','childCount','infantCount'];
  const DAT=['issueDate','activeDate'];
  function doSort(){
    filteredInvoices.sort((a,b)=>{
      let va=a[sortCol]??'', vb=b[sortCol]??'';
      if(DAT.includes(sortCol)){ va=parseDDMMM(va)??0; vb=parseDDMMM(vb)??0; }
      else if(NUM.includes(sortCol)){ va=parseFloat(va)||0; vb=parseFloat(vb)||0; }
      else{ va=String(va).toLowerCase(); vb=String(vb).toLowerCase(); }
      return va<vb?(sortDir==='asc'?-1:1):va>vb?(sortDir==='asc'?1:-1):0;
    });
  }
  function setSort(col){
    sortDir=(sortCol===col)?(sortDir==='asc'?'desc':'asc'):'asc';
    sortCol=col; doSort(); renderAll();
  }

  /* ── FILTER ── (يفلتر على activeDate) ── */
  function applyFilters(){
    if(!checkDates()) return;
    const fromTxt=document.getElementById('fromTxt').value.trim();
    const toTxt=document.getElementById('toTxt').value.trim();
    const search=document.getElementById('searchTxt').value.toLowerCase().trim();
    const stateVal=document.getElementById('stateFilter').value;
    const fromTs=txtToTs(fromTxt);
    const toTs=toTxt?txtToTs(toTxt)+(86400000-1):null;

    filteredInvoices=allInvoices.filter(inv=>{
      // ── فلتر activeDate (العمود D) ──
      const ts=parseDDMMM(inv.activeDate);
      if(fromTs!==null&&(ts===null||ts<fromTs)) return false;
      if(toTs!==null  &&(ts===null||ts>toTs))   return false;
      // ── فلتر الحالة ──
      if(stateVal){
        const s=(inv.state||'').trim().toLowerCase();
        if(s!==stateVal.toLowerCase()) return false;
      }
      // ── فلتر النص ──
      if(search){
        const txt=[inv.voucherNo,inv.guestName,inv.trip,inv.salesName,inv.contactNo,inv.hotel].map(x=>x||'').join(' ').toLowerCase();
        if(!txt.includes(search)) return false;
      }
      return true;
    });
    currentPage=1; doSort(); renderAll();
  }

  function resetFilters(){
    ['fromTxt','toTxt','searchTxt'].forEach(id=>document.getElementById(id).value='');
    ['fromNat','toNat'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('stateFilter').value='';
    document.getElementById('errTo').textContent='';
    document.getElementById('toTxt').classList.remove('err');
    filteredInvoices=[...allInvoices];
    doSort(); renderAll();
  }

  /* ── FORMAT ── */
  function fmtDate(s){
    if(!s) return '';
    if(/^\d{1,2}\/[A-Za-z]{3}\/\d{4}/.test(s)) return s.substring(0,11);
    try{ const d=new Date(s); return String(d.getDate()).padStart(2,'0')+'/'+MN[d.getMonth()]+'/'+d.getFullYear(); }catch{ return s; }
  }
  function fmtTime(t){
    if(!t) return '';
    const m=String(t).match(/(\d{1,2}):(\d{2})/);
    return m?m[1].padStart(2,'0')+':'+m[2]:String(t).substring(0,5);
  }
  function fmtRest(inv){
    const r=Number(inv.rest)||0;
    if(!r) return '<span style="color:#27ae60;font-weight:bold">✓</span>';
    return `<span style="color:#e74c3c;font-weight:bold">${r} ${inv.invoiceCurrency||''}</span>`;
  }
  function fmtNum(v){ return (Number(v)||0)||''; }
  function fmtState(s){
    const v=(s||'').trim();
    const lv=v.toLowerCase();
    if(lv==='confirmed') return `<span class="st-confirmed">✅ Confirmed</span>`;
    if(lv==='pending')   return `<span class="st-pending">⏳ Pending</span>`;
    if(lv==='cancel')    return `<span class="st-cancel">❌ Cancel</span>`;
    return v?`<span class="st-other">${v}</span>`:'';
  }

  /* ── TOTALS ROW ── */
  function buildTotals(data){
    const s=k=>data.reduce((a,i)=>a+(Number(i[k])||0),0);
    const f=v=>v?v.toFixed(2).replace(/\.00$/,''):'0';
    return `<tr class="totals-row">
      <td style="font-size:11px;color:#666">TOTAL</td>
      <td colspan="7" style="text-align:center;font-size:11px;color:#555">${data.length} invoice(s)</td>
      <td>${f(s('cashUSD'))}</td><td>${f(s('cashEUR'))}</td>
      <td>${f(s('cashGBP'))}</td><td>${f(s('cashLE'))}</td>
      <td>${f(s('visaUSD'))}</td><td>${f(s('visaEUR'))}</td>
      <td>${f(s('visaGBP'))}</td><td>${f(s('visaLE'))}</td>
      <td colspan="10"></td>
      <td>${f(s('discount'))}</td>
      <td></td><td></td><td></td>
    </tr>`;
  }

  /* ── TRIP SUMMARY ── */
  function parseActs(text){
    const r={};
    if(!text) return r;
    if(text.includes('×')){
      text.split('|').forEach(p=>{
        const m=p.trim().match(/^(.+?)×(\d+(\.\d+)?)$/);
        if(m){ const n=m[1].trim(); r[n]=(r[n]||0)+(parseFloat(m[2])||0); }
      });
    } else { const k=text.trim(); if(k) r[k]=(r[k]||0)+1; }
    return r;
  }
  function buildTripSummary(data){
    const sec=document.getElementById('summarySection');
    if(!data.length){ sec.style.display='none'; return; }
    const trips={};
    data.forEach(inv=>{
      const t=(inv.trip||'(Unknown)').trim();
      if(!trips[t]) trips[t]={bookings:0,acts:{}};
      trips[t].bookings++;
      Object.entries(parseActs(inv.activitiesText||inv.activities||'')).forEach(([k,v])=>{
        trips[t].acts[k]=(trips[t].acts[k]||0)+v;
      });
    });
    let rows='';
    Object.entries(trips).sort((a,b)=>b[1].bookings-a[1].bookings).forEach(([name,info])=>{
      const actsStr=Object.entries(info.acts).map(([k,v])=>`${k}×${Number.isInteger(v)?v:v.toFixed(1)}`).join(' | ')||'—';
      rows+=`<tr><td><strong>${name}</strong></td><td style="text-align:center"><span class="badge">${info.bookings}</span></td><td>${actsStr}</td></tr>`;
    });
    document.getElementById('sumTable').innerHTML=`<thead><tr><th>Trip Name</th><th style="text-align:center;width:100px">Bookings</th><th>Activities Total</th></tr></thead><tbody>${rows}</tbody>`;
    sec.style.display='block';
  }

  /* ── RENDER ── */
  function renderAll(){ renderTable(); buildTripSummary(filteredInvoices); }

  function renderTable(){
    const wrap=document.getElementById('tableWrap');
    if(!filteredInvoices.length){
      wrap.innerHTML='<div class="no-data">No bookings found</div>';
      document.getElementById('pagination').innerHTML='';
      document.getElementById('summarySection').style.display='none';
      return;
    }
    const start=(currentPage-1)*PAGE_SIZE;
    const page=filteredInvoices.slice(start,start+PAGE_SIZE);

    const cols=[
      ['rest','Rest'],['voucherNo','Voucher'],['activeDate','Active Date'],
      ['issueDate','Issue Date'],['salesName','Sales'],['time','Time'],['trip','Trip'],
      ['activitiesText','Activities'],
      ['cashUSD','$'],['cashEUR','€'],['cashGBP','£'],['cashLE','LE'],
      ['visaUSD','V$'],['visaEUR','V€'],['visaGBP','V£'],['visaLE','VLE'],
      ['hotel','Hotel'],['roomNo','Room'],['nationality','Nat.'],
      ['guestName','Guest'],['contactNo','Contact'],['notes','Notes'],
      ['supplier','Supplier'],['customer','Customer'],['state','Status'],
      ['invoiceCurrency','Cur.'],['branchName','Branch'],['discount','Disc.'],
      [null,'Pax'],[null,'Actions']
    ];

    let h='<table><thead><tr>';
    cols.forEach(([c,l])=>{
      if(c){ const ic=sortCol===c?(sortDir==='asc'?' ↑':' ↓'):''; h+=`<th onclick="setSort('${c}')">${l}${ic}</th>`; }
      else h+=`<th>${l}</th>`;
    });
    h+='</tr></thead><tbody>';

    page.forEach(inv=>{
      const pdf=(inv.pdfLink&&inv.pdfLink.startsWith('http'))
        ?`<a href="${inv.pdfLink}" target="_blank" class="abtn pdf-btn" title="PDF">🖨️</a>`
        :`<button class="abtn pdf-na" disabled>🖨️</button>`;
      h+=`<tr>
        <td>${fmtRest(inv)}</td>
        <td>${inv.voucherNo||''}</td>
        <td>${fmtDate(inv.activeDate)}</td>
        <td>${fmtDate(inv.issueDate)}</td>
        <td>${inv.salesName||''}</td>
        <td>${fmtTime(inv.time)}</td>
        <td>${inv.trip||''}</td>
        <td class="act-cell">${inv.activitiesText||inv.activities||''}</td>
        <td>${fmtNum(inv.cashUSD)}</td><td>${fmtNum(inv.cashEUR)}</td>
        <td>${fmtNum(inv.cashGBP)}</td><td>${fmtNum(inv.cashLE)}</td>
        <td>${fmtNum(inv.visaUSD)}</td><td>${fmtNum(inv.visaEUR)}</td>
        <td>${fmtNum(inv.visaGBP)}</td><td>${fmtNum(inv.visaLE)}</td>
        <td>${inv.hotel||''}</td><td>${inv.roomNo||''}</td>
        <td>${inv.nationality||''}</td><td>${inv.guestName||''}</td>
        <td>${inv.contactNo||''}</td><td>${inv.notes||''}</td>
        <td>${inv.supplier||''}</td><td>${inv.customer||''}</td>
        <td>${fmtState(inv.state)}</td>
        <td>${inv.invoiceCurrency||''}</td><td>${inv.branchName||''}</td>
        <td>${fmtNum(inv.discount)}</td>
        <td class="pax-cell">A:${inv.adultCount||0} C:${inv.childCount||0} I:${inv.infantCount||0}</td>
        <td><div class="act-btns">
          <button class="abtn edit-btn" onclick="editInv('${inv.id||''}')">✏️</button>
          <button class="abtn del-btn"  onclick="delInv('${inv.id||''}')">🗑️</button>
          ${pdf}
        </div></td>
      </tr>`;
    });
    h+=buildTotals(filteredInvoices)+'</tbody></table>';
    wrap.innerHTML=h;
    renderPag();
  }

  function renderPag(){
    const total=Math.ceil(filteredInvoices.length/PAGE_SIZE);
    const delta=3; let pages=[];
    if(currentPage>delta+1){pages.push(1);if(currentPage>delta+2)pages.push('...');}
    for(let i=Math.max(1,currentPage-delta);i<=Math.min(total,currentPage+delta);i++)pages.push(i);
    if(currentPage<total-delta){if(currentPage<total-delta-1)pages.push('...');pages.push(total);}
    document.getElementById('pagination').innerHTML=pages.map(p=>
      p==='...'?`<span style="padding:5px 3px;color:#6c757d">…</span>`
              :`<button class="pg-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`
    ).join('');
  }
  function goPage(p){ currentPage=p; renderTable(); }
  function editInv(){ showModal('Edit — تحت التطوير'); }
  function delInv(){ if(confirm('Delete this invoice?')) showModal('Delete — تحت التطوير'); }
  function showModal(msg){
    const m=document.getElementById('modal');
    document.getElementById('modalMsg').innerText=msg;
    m.style.display='flex';
    const btn=document.getElementById('modalOk');
    const h=()=>{ m.style.display='none'; btn.removeEventListener('click',h); };
    btn.addEventListener('click',h);
  }

  /* ── INIT ── */
  document.addEventListener('DOMContentLoaded',()=>{
    let ud=sessionStorage.getItem('currentUser');
    if(!ud){ try{ const p=new URLSearchParams(window.location.search).get('user'); if(p){ ud=decodeURIComponent(p); sessionStorage.setItem('currentUser',ud); }}catch{} }
    if(!ud){ window.location.href='index.html'; return; }
    try{
      currentUser=JSON.parse(ud);
      document.getElementById('userNameDisplay').textContent=currentUser.name||'User';
      if(!ALLOWED.includes(currentUser.type)){ showModal('No permission'); setTimeout(()=>window.location.href='Dashboard.html',2000); return; }
    }catch{ window.location.href='index.html'; return; }
    loadInvoices();
  });

  window.goBack=goBack; window.applyFilters=applyFilters; window.resetFilters=resetFilters;
  window.openCal=openCal; window.onCalPick=onCalPick; window.onDateType=onDateType; window.doSpin=doSpin;
  window.setSort=setSort; window.goPage=goPage; window.editInv=editInv; window.delInv=delInv;
  window.showModal=showModal; window.checkDates=checkDates;
</script>
</body>
</html>
