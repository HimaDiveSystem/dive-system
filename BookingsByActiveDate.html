<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Bookings by Active Date - Diving Centers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, system-ui, sans-serif; }
    body { background: linear-gradient(135deg, #0b2a4f 0%, #1b3a6b 100%); min-height: 100vh; padding: 16px; }
    .container { max-width: 1600px; margin: 0 auto; background: white; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,20,40,0.4); overflow: hidden; }
    .header { background: #0b2447; color: white; padding: 16px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; border-bottom: 3px solid #f4c542; }
    .header h2 { color: #fad57e; font-size: 24px; display: flex; align-items: center; gap: 10px; }
    .user-info { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .user-name { background: rgba(255,255,255,0.1); padding: 8px 22px; border-radius: 40px; border: 1px solid #ffd966; color: #ffd966; }
    .goBack-btn { background: #2a4f8c; color: white; border: none; padding: 8px 25px; border-radius: 40px; cursor: pointer; font-weight: 600; transition: 0.3s; border: 1px solid #fad57e; }
    .goBack-btn:hover { background: #1e3b66; }

    /* Filter Section */
    .filter-section { background: #f8f9fa; padding: 20px 30px; border-bottom: 2px solid #dee2e6; }
    .filter-row { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
    .filter-group { flex: 1; min-width: 180px; }
    .filter-group label { display: block; font-size: 12px; color: #1e2b4f; font-weight: 600; margin-bottom: 5px; }

    .date-input-wrap { position: relative; display: flex; gap: 5px; align-items: center; }
    .date-text-input {
      flex: 1; padding: 10px 12px;
      border: 2px solid #e9f0fa; border-radius: 15px;
      font-size: 14px; background: white;
      color: #2c3e50; letter-spacing: 0.5px;
    }
    .date-text-input:focus { outline: none; border-color: #1e2b4f; }
    .date-text-input.date-error { border-color: #e74c3c; }
    .cal-icon {
      padding: 8px 10px; background: #1e2b4f; color: #ffd966;
      border-radius: 12px; font-size: 15px; cursor: pointer;
      border: none; white-space: nowrap;
    }
    .cal-icon:hover { background: #2a3a60; }
    .date-native { position: absolute; opacity: 0; width: 1px; height: 1px; pointer-events: none; overflow: hidden; }

    .date-spin { display: flex; gap: 5px; margin-top: 5px; }
    .spin-btn { flex: 1; padding: 5px; border: none; border-radius: 10px; background: #1e2b4f; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .spin-btn:hover { background: #ffd966; color: #1e2b4f; }
    .date-err-msg { font-size: 11px; color: #e74c3c; margin-top: 3px; min-height: 16px; }

    .filter-group input[type=text] { width: 100%; padding: 10px; border: 2px solid #e9f0fa; border-radius: 15px; font-size: 14px; }
    .filter-actions { display: flex; gap: 10px; align-items: center; }
    .btn-primary { background: #1e2b4f; color: white; border: none; padding: 10px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    .btn-primary:hover { background: #ffd966; color: #1e2b4f; }

    /* Table */
    .table-container { padding: 20px 30px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    th { background: #1e2b4f; color: #ffd966; padding: 12px 5px; font-weight: 600; cursor: pointer; white-space: nowrap; position: relative; }
    th:hover { background: #2a3a60; }
    th .sort-icon { margin-left: 4px; font-size: 11px; }
    td { padding: 8px 5px; border-bottom: 1px solid #e9f0fa; color: #2c3e50; white-space: nowrap; }
    tr:hover { background: #f5f9ff; }
    .activities-cell { max-width: 200px; white-space: normal; word-break: break-word; }
    .pax-cell { max-width: 80px; white-space: normal; }

    /* Totals Row */
    .totals-row td { background: #eaf2ff; font-weight: 700; color: #1e2b4f; border-top: 2px solid #1e2b4f; border-bottom: 2px solid #1e2b4f; }
    .totals-label { font-size: 12px; color: #666; }

    /* Trip Summary */
    .summary-section { padding: 0 30px 30px; }
    .summary-title { font-size: 16px; font-weight: 700; color: #1e2b4f; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .summary-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .summary-table th { background: #2a3a60; color: #ffd966; padding: 9px 12px; text-align: left; }
    .summary-table td { padding: 8px 12px; border-bottom: 1px solid #e9f0fa; }
    .badge { display: inline-block; background: #1e2b4f; color: #ffd966; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 700; }

    /* Action Buttons */
    .action-buttons { display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }
    .action-btn { padding: 4px 8px; border: none; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; color: white; text-decoration: none; display: inline-flex; align-items: center; gap: 2px; }
    .edit-btn   { background: #3498db; } .edit-btn:hover   { background: #2980b9; }
    .delete-btn { background: #e74c3c; } .delete-btn:hover { background: #c0392b; }
    .print-btn  { background: #e67e22; } .print-btn:hover  { background: #d35400; }
    .print-na   { background: #bdc3c7; cursor: default; }

    .pagination { display: flex; justify-content: center; gap: 10px; padding: 10px 30px 20px; flex-wrap: wrap; }
    .page-btn { padding: 6px 12px; border: 1px solid #dee2e6; background: white; border-radius: 20px; cursor: pointer; font-size: 13px; }
    .page-btn.active { background: #1e2b4f; color: #ffd966; border-color: #1e2b4f; }
    .no-data { text-align: center; padding: 50px; color: #6c757d; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1e2b4f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
    @media (max-width: 768px) { .filter-row { flex-direction: column; } .filter-actions { width: 100%; } .table-container { padding: 10px; } }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>📅 Bookings (by Active Date)</h2>
    <div class="user-info">
      <span class="user-name" id="userNameDisplay"></span>
      <button class="goBack-btn" onclick="goBack()">🔙 رجوع</button>
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-row">
      <!-- From Active Date -->
      <div class="filter-group">
        <label>من تاريخ التنفيذ (From)</label>
        <div class="date-input-wrap">
          <input class="date-text-input" id="filterDateFromText" placeholder="dd/Mmm/yyyy"
                 oninput="onTextInput('From')" onblur="onTextBlur('From')">
          <button class="cal-icon" onclick="openPicker('From')" type="button">📅</button>
          <input type="date" class="date-native" id="filterDateFromNative" onchange="onNativePick('From')">
        </div>
        <div class="date-spin">
          <button class="spin-btn" onclick="spinDate('From',-1)">▼ -1</button>
          <button class="spin-btn" onclick="spinDate('From',1)">▲ +1</button>
        </div>
        <div class="date-err-msg" id="errFrom"></div>
      </div>

      <!-- To Active Date -->
      <div class="filter-group">
        <label>إلى تاريخ التنفيذ (To)</label>
        <div class="date-input-wrap">
          <input class="date-text-input" id="filterDateToText" placeholder="dd/Mmm/yyyy"
                 oninput="onTextInput('To')" onblur="onTextBlur('To')">
          <button class="cal-icon" onclick="openPicker('To')" type="button">📅</button>
          <input type="date" class="date-native" id="filterDateToNative" onchange="onNativePick('To')">
        </div>
        <div class="date-spin">
          <button class="spin-btn" onclick="spinDate('To',-1)">▼ -1</button>
          <button class="spin-btn" onclick="spinDate('To',1)">▲ +1</button>
        </div>
        <div class="date-err-msg" id="errTo"></div>
      </div>

      <!-- Search Text -->
      <div class="filter-group">
        <label>بحث عام</label>
        <input type="text" id="filterText" placeholder="رقم الفاتورة, الضيف, الرحلة...">
      </div>

      <!-- Action Buttons -->
      <div class="filter-actions">
        <button class="btn-primary" onclick="applyFilters()">تطبيق</button>
        <button class="btn-primary" onclick="resetFilters()">إعادة تعيين</button>
      </div>
    </div>
  </div>

  <div class="table-container" id="tableContainer">
    <div style="text-align:center;padding:50px;">جاري تحميل الفواتير...</div>
  </div>
  <div class="pagination" id="pagination"></div>

  <!-- Trip Summary -->
  <div class="summary-section" id="summarySection" style="display:none;">
    <div class="summary-title">🗺️ ملخص الرحلات (للنتائج المعروضة)</div>
    <div style="overflow-x:auto;">
      <table class="summary-table" id="summaryTable"></table>
    </div>
  </div>
</div>

<!-- Alert Modal -->
<div id="customAlertModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:9999;">
  <div style="background:white;width:400px;border-radius:30px;padding:30px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.3);">
    <div style="font-size:50px;margin-bottom:20px;">ℹ️</div>
    <h3 style="color:#1e2b4f;margin-bottom:20px;" id="alertMessage"></h3>
    <button class="btn-primary" id="alertOk">OK</button>
  </div>
</div>

<script>
  // -------------------- CONFIG --------------------
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbyB4ZzI5UJibARWEXXSmtLYACNWqiYvv1GC_zeeBsZFMcW7pOFskDDkbiNF50zdWorq/exec'; // ضع رابط الـ API الخاص بك هنا
  const MONTHS  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DASHBOARD_PAGES = {
    Admin: 'Dashboard.html', Owner: 'OwnerDashboard.html',
    Sales: 'SalesDashboard.html', Accountant: 'AccountantDashboard.html',
    FinancialManager: 'FinancialManagerDashboard.html', CenterManager: 'CenterManagerDashboard.html', BranchManager: 'BranchManagerDashboard.html'
  };
  const allowedUserTypes = ['Admin','Owner','Sales','Accountant','FinancialManager','CenterManager','BranchManager'];

  // -------------------- GLOBALS --------------------
  let currentUser = null;
  window.allInvoices      = [];
  window.filteredInvoices = [];
  let currentPage   = 1;
  const pageSize    = 20;
  let sortColumn    = 'activeDate'; // ترتيب افتراضي حسب تاريخ التنفيذ
  let sortDirection = 'desc';

  // -------------------- DATE HELPERS --------------------
  function isoToDDMMM(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-');
    return `${d.padStart(2,'0')}/${MONTHS[Number(m)-1]}/${y}`;
  }

  function dddmmmToISO(text) {
    if (!text) return '';
    const m = text.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
    if (!m) return '';
    const day = m[1].padStart(2,'0');
    const monthIndex = MONTHS.findIndex(x => x.toLowerCase() === m[2].toLowerCase());
    if (monthIndex === -1) return '';
    const month = String(monthIndex + 1).padStart(2,'0');
    return `${m[3]}-${month}-${day}`;
  }

  function parseDateToTimestamp(str) {
    if (!str) return null;
    if (str instanceof Date) return str.getTime();

    const s = String(str).trim();
    // تنسيق dd/Mmm/yyyy
    const m = s.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})/);
    if (m) {
      const idx = MONTHS.findIndex(mn => mn.toLowerCase() === m[2].toLowerCase());
      if (idx !== -1) {
        return new Date(m[3], idx, m[1]).getTime();
      }
    }
    // محاولة التحويل المباشر
    const d = new Date(s);
    if (!isNaN(d)) return d.getTime();
    return null;
  }

  // -------------------- DATE PICKER UI --------------------
  function openPicker(which) {
    const native = document.getElementById('filterDate' + which + 'Native');
    native.style.pointerEvents = 'auto';
    try { native.showPicker(); } catch { native.click(); }
    setTimeout(() => { native.style.pointerEvents = 'none'; }, 2000);
  }

  function onNativePick(which) {
    const iso = document.getElementById('filterDate' + which + 'Native').value;
    if (!iso) return;
    document.getElementById('filterDate' + which + 'Text').value = isoToDDMMM(iso);
    validateDates();
    applyFilters();
  }

  function onTextInput(which) {
    const textEl = document.getElementById('filterDate' + which + 'Text');
    const val    = textEl.value.trim();
    if (/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(val)) {
      const iso = dddmmmToISO(val);
      if (iso) {
        document.getElementById('filterDate' + which + 'Native').value = iso;
        validateDates();
        applyFilters();
      }
    }
  }

  function onTextBlur(which) {
    setTimeout(() => {
      const textEl = document.getElementById('filterDate' + which + 'Text');
      const val    = textEl.value.trim();
      if (!val) {
        document.getElementById('filterDate' + which + 'Native').value = '';
        validateDates(); applyFilters(); return;
      }
      if (!/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(val)) {
        textEl.value = '';
        document.getElementById('filterDate' + which + 'Native').value = '';
        validateDates(); applyFilters();
      }
    }, 200);
  }

  function spinDate(which, delta) {
    const textEl   = document.getElementById('filterDate' + which + 'Text');
    const nativeEl = document.getElementById('filterDate' + which + 'Native');
    let iso = nativeEl.value;
    if (!iso) {
      iso = new Date().toISOString().split('T')[0];
    }
    const d = new Date(iso);
    d.setDate(d.getDate() + delta);
    iso = d.toISOString().split('T')[0];
    nativeEl.value  = iso;
    textEl.value    = isoToDDMMM(iso);
    validateDates();
    applyFilters();
  }

  function validateDates() {
    const fromISO = document.getElementById('filterDateFromNative').value;
    const toISO   = document.getElementById('filterDateToNative').value;
    const errFrom = document.getElementById('errFrom');
    const errTo   = document.getElementById('errTo');
    const toText  = document.getElementById('filterDateToText');
    errFrom.textContent = '';
    errTo.textContent   = '';
    toText.classList.remove('date-error');
    if (fromISO && toISO && toISO < fromISO) {
      toText.classList.add('date-error');
      errTo.textContent = '⚠️ تاريخ "إلى" يجب أن يكون بعد تاريخ "من"';
      return false;
    }
    return true;
  }

  // -------------------- FILTERING (ACTIVE DATE) --------------------
  function applyFilters() {
    if (!validateDates()) return;

    const fromISO    = document.getElementById('filterDateFromNative').value;
    const toISO      = document.getElementById('filterDateToNative').value;
    const searchText = document.getElementById('filterText').value.toLowerCase().trim();

    // تحويل حدود البحث إلى Timestamps (local midnight)
    let fromTs = null, toTs = null;
    if (fromISO) {
      const [fy,fm,fd] = fromISO.split('-').map(Number);
      fromTs = new Date(fy, fm-1, fd).getTime();
    }
    if (toISO) {
      const [ty,tm,td] = toISO.split('-').map(Number);
      toTs = new Date(ty, tm-1, td, 23, 59, 59, 999).getTime();
    }

    window.filteredInvoices = window.allInvoices.filter(inv => {
      // فلترة حسب تاريخ التنفيذ (Active Date)
      const ts = parseDateToTimestamp(inv.activeDate);
      if (fromTs !== null && (ts === null || ts < fromTs)) return false;
      if (toTs   !== null && (ts === null || ts > toTs))   return false;

      // فلترة حسب النص
      if (searchText) {
        const s = [inv.voucherNo, inv.guestName, inv.trip, inv.salesName, inv.contactNo, inv.hotel]
          .map(x=>x||'').join(' ').toLowerCase();
        if (!s.includes(searchText)) return false;
      }
      return true;
    });

    currentPage = 1;
    sortData(sortColumn, sortDirection);
    renderAll();
  }

  function resetFilters() {
    document.getElementById('filterDateFromText').value   = '';
    document.getElementById('filterDateToText').value     = '';
    document.getElementById('filterDateFromNative').value = '';
    document.getElementById('filterDateToNative').value   = '';
    document.getElementById('filterText').value           = '';
    document.getElementById('errFrom').textContent        = '';
    document.getElementById('errTo').textContent          = '';
    document.getElementById('filterDateToText').classList.remove('date-error');
    window.filteredInvoices = [...window.allInvoices];
    sortData(sortColumn, sortDirection);
    renderAll();
  }

  // -------------------- SORTING --------------------
  const NUM_COLS  = ['rest','cashUSD','cashEUR','cashGBP','cashLE','visaUSD','visaEUR','visaGBP','visaLE','discount','adultCount','childCount','infantCount'];
  const DATE_COLS = ['issueDate','activeDate'];

  function sortData(col, dir) {
    window.filteredInvoices.sort((a, b) => {
      let va = a[col] ?? '', vb = b[col] ?? '';
      if (DATE_COLS.includes(col)) {
        va = parseDateToTimestamp(va) ?? 0;
        vb = parseDateToTimestamp(vb) ?? 0;
      } else if (NUM_COLS.includes(col)) {
        va = parseFloat(va)||0; vb = parseFloat(vb)||0;
      } else {
        va = String(va).toLowerCase(); vb = String(vb).toLowerCase();
      }
      return va < vb ? (dir==='asc'?-1:1) : va > vb ? (dir==='asc'?1:-1) : 0;
    });
  }

  function setSort(col) {
    sortDirection = sortColumn===col ? (sortDirection==='asc'?'desc':'asc') : 'asc';
    sortColumn = col;
    sortData(sortColumn, sortDirection);
    renderAll();
  }

  // -------------------- RENDER FUNCTIONS --------------------
  function fmtDate(str) {
    if (!str) return '';
    if (/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(str)) return str;
    try {
      const d = new Date(str);
      return `${String(d.getDate()).padStart(2,'0')}/${MONTHS[d.getMonth()]}/${d.getFullYear()}`;
    } catch { return str; }
  }

  function fmtTime(t) {
    if (!t) return '';
    const m = String(t).match(/(\d{1,2}):(\d{2})/);
    return m ? `${m[1].padStart(2,'0')}:${m[2]}` : String(t).substring(0,5);
  }

  function fmtRest(inv) {
    const r = Number(inv.rest)||0;
    if (!r) return '<span style="color:#27ae60;font-weight:bold;">✓</span>';
    return `<span style="color:#e74c3c;font-weight:bold;">${r} ${inv.invoiceCurrency||''}</span>`;
  }

  function buildPax(inv) { return `A:${inv.adultCount||0} C:${inv.childCount||0} I:${inv.infantCount||0}`; }

  function buildTotalsRow(data) {
    const sum = (key) => data.reduce((acc, inv) => acc + (Number(inv[key])||0), 0);
    const fmt = (v) => v ? v.toFixed(2).replace(/\.00$/,'') : '0';
    return `<tr class="totals-row">
      <td><span class="totals-label">المجموع</span></td>
      <td colspan="6" style="text-align:center;font-size:12px;color:#555;">${data.length} فاتورة</td>
      <td>${fmt(sum('cashUSD'))}</td>
      <td>${fmt(sum('cashEUR'))}</td>
      <td>${fmt(sum('cashGBP'))}</td>
      <td>${fmt(sum('cashLE'))}</td>
      <td>${fmt(sum('visaUSD'))}</td>
      <td>${fmt(sum('visaEUR'))}</td>
      <td>${fmt(sum('visaGBP'))}</td>
      <td>${fmt(sum('visaLE'))}</td>
      <td colspan="12"></td>
      <td>${fmt(sum('discount'))}</td>
      <td></td><td></td>
    </tr>`;
  }

  function parseActivities(text) {
    const result = {};
    if (!text) return result;
    if (text.includes('×')) {
      text.split('|').forEach(part => {
        const m = part.trim().match(/^(.+?)×(\d+(\.\d+)?)$/);
        if (m) {
          const name = m[1].trim();
          result[name] = (result[name]||0) + (parseFloat(m[2])||0);
        }
      });
      return result;
    }
    const key = text.trim();
    if (key) result[key] = (result[key]||0) + 1;
    return result;
  }

  function buildTripsSummary(data) {
    const trips = {};
    data.forEach(inv => {
      const trip = (inv.trip || '(Unknown)').trim();
      if (!trips[trip]) trips[trip] = { bookings: 0, activities: {} };
      trips[trip].bookings++;
      const acts = parseActivities(inv.activitiesText || inv.activities || '');
      Object.entries(acts).forEach(([k,v]) => {
        trips[trip].activities[k] = (trips[trip].activities[k]||0) + v;
      });
    });

    if (!Object.keys(trips).length) {
      document.getElementById('summarySection').style.display = 'none';
      return;
    }

    let rows = '';
    Object.entries(trips).sort((a,b) => b[1].bookings - a[1].bookings).forEach(([tripName, info]) => {
      const actsText = Object.entries(info.activities).map(([k,v]) => `${k}×${Number.isInteger(v)?v:v.toFixed(1)}`).join(' | ') || '—';
      rows += `<tr><td><strong>${tripName}</strong></td><td style="text-align:center;"><span class="badge">${info.bookings}</span></td><td>${actsText}</td></tr>`;
    });

    document.getElementById('summaryTable').innerHTML = `<thead><tr><th>الرحلة</th><th style="text-align:center;">الحجوزات</th><th>الأنشطة</th></tr></thead><tbody>${rows}</tbody>`;
    document.getElementById('summarySection').style.display = 'block';
  }

  function renderAll() {
    renderTable();
    buildTripsSummary(window.filteredInvoices);
  }

  function renderTable() {
    const container = document.getElementById('tableContainer');
    if (!window.filteredInvoices.length) {
      container.innerHTML = '<div class="no-data">لا توجد نتائج للبحث</div>';
      document.getElementById('pagination').innerHTML = '';
      document.getElementById('summarySection').style.display = 'none';
      return;
    }

    const start    = (currentPage - 1) * pageSize;
    const pageData = window.filteredInvoices.slice(start, start + pageSize);

    const cols = [
      ['rest','Rest'],['voucherNo','Voucher'],['issueDate','Issue'],
      ['activeDate','Active'],['salesName','Sales'],['time','Time'],['trip','Trip'],
      ['activitiesText','Activities'],
      ['cashUSD','$'],['cashEUR','€'],['cashGBP','£'],['cashLE','LE'],
      ['visaUSD','V$'],['visaEUR','V€'],['visaGBP','V£'],['visaLE','VLE'],
      ['hotel','Hotel'],['roomNo','Room'],['nationality','Nat.'],
      ['guestName','Guest'],['contactNo','Contact'],['notes','Notes'],
      ['supplier','Supplier'],['customer','Customer'],['state','State'],
      ['invoiceCurrency','Cur.'],['branchName','Branch'],['discount','Disc.'],
      [null,'Pax'],[null,'Actions']
    ];

    let html = '<table><thead><tr>';
    cols.forEach(([col, label]) => {
      if (col) {
        const ic = sortColumn===col ? (sortDirection==='asc'?' ↑':' ↓') : '';
        html += `<th onclick="setSort('${col}')">${label}<span class="sort-icon">${ic}</span></th>`;
      } else {
        html += `<th>${label}</th>`;
      }
    });
    html += '</tr></thead><tbody>';

    pageData.forEach(inv => {
      const printBtn = (inv.pdfLink && inv.pdfLink.startsWith('http'))
        ? `<a href="${inv.pdfLink}" target="_blank" class="action-btn print-btn" title="Open PDF">🖨️</a>`
        : `<button class="action-btn print-na" disabled title="لا يوجد PDF">🖨️</button>`;

      html += `<tr>
        <td>${fmtRest(inv)}</td>
        <td>${inv.voucherNo||''}</td>
        <td>${fmtDate(inv.issueDate)}</td>
        <td>${fmtDate(inv.activeDate)}</td>
        <td>${inv.salesName||''}</td>
        <td>${fmtTime(inv.time)}</td>
        <td>${inv.trip||''}</td>
        <td class="activities-cell">${inv.activitiesText||''}</td>
        <td>${inv.cashUSD||0}</td><td>${inv.cashEUR||0}</td>
        <td>${inv.cashGBP||0}</td><td>${inv.cashLE||0}</td>
        <td>${inv.visaUSD||0}</td><td>${inv.visaEUR||0}</td>
        <td>${inv.visaGBP||0}</td><td>${inv.visaLE||0}</td>
        <td>${inv.hotel||''}</td><td>${inv.roomNo||''}</td>
        <td>${inv.nationality||''}</td><td>${inv.guestName||''}</td>
        <td>${inv.contactNo||''}</td><td>${inv.notes||''}</td>
        <td>${inv.supplier||''}</td><td>${inv.customer||''}</td>
        <td>${inv.state||''}</td><td>${inv.invoiceCurrency||''}</td>
        <td>${inv.branchName||''}</td><td>${inv.discount||0}</td>
        <td class="pax-cell">${buildPax(inv)}</td>
        <td><div class="action-buttons">
          <button class="action-btn edit-btn"   onclick="editInvoice('${inv.id}')">✏️</button>
          <button class="action-btn delete-btn" onclick="deleteInvoice('${inv.id}')">🗑️</button>
          ${printBtn}
        </div></td>
      </tr>`;
    });

    html += buildTotalsRow(window.filteredInvoices);
    html += '</tbody></table>';
    container.innerHTML = html;
    renderPagination();
  }

  function renderPagination() {
    const total = Math.ceil(window.filteredInvoices.length / pageSize);
    const delta = 3;
    let pages = [];
    if (currentPage > delta+1) { pages.push(1); if (currentPage > delta+2) pages.push('...'); }
    for (let i=Math.max(1,currentPage-delta); i<=Math.min(total,currentPage+delta); i++) pages.push(i);
    if (currentPage < total-delta) { if (currentPage < total-delta-1) pages.push('...'); pages.push(total); }
    document.getElementById('pagination').innerHTML = pages.map(p =>
      p==='...' ? `<span style="padding:6px 4px;color:#6c757d;">…</span>`
                : `<button class="page-btn ${p===currentPage?'active':''}" onclick="goToPage(${p})">${p}</button>`
    ).join('');
  }

  function goToPage(p) { currentPage = p; renderTable(); }

  // -------------------- MOCK ACTIONS --------------------
  function editInvoice(id)   { showAlert('تعديل الفاتورة قيد التطوير'); }
  function deleteInvoice(id) { if (confirm('هل أنت متأكد؟')) showAlert('حذف الفاتورة قيد التطوير'); }

  function showAlert(msg) {
    const modal = document.getElementById('customAlertModal');
    document.getElementById('alertMessage').innerText = msg;
    modal.style.display = 'flex';
    const btn = document.getElementById('alertOk');
    const h = () => { modal.style.display='none'; btn.removeEventListener('click',h); };
    btn.addEventListener('click', h);
  }

  function goBack() {
    window.location.href = DASHBOARD_PAGES[currentUser?.type] || 'Dashboard.html';
  }

  // -------------------- LOAD DATA --------------------
  function loadInvoices() {
    document.getElementById('tableContainer').innerHTML = '<div class="loader"></div>';
    fetch(GAS_URL + '?action=getAllInvoices')
      .then(r => r.json())
      .then(invoices => {
        if (!Array.isArray(invoices)) invoices = [];
        const uBranch = currentUser?.branchName;
        const uType   = currentUser?.type;
        window.allInvoices = (uBranch && uType !== 'Admin' && uType !== 'Owner')
          ? invoices.filter(inv => inv.branchName === uBranch)
          : invoices;

        window.filteredInvoices = [...window.allInvoices];
        sortData(sortColumn, sortDirection);
        renderAll();
      })
      .catch(err => {
        document.getElementById('tableContainer').innerHTML = `<div class="no-data">خطأ في التحميل: ${err.message}</div>`;
      });
  }

  // -------------------- INIT --------------------
  function getUserFromUrl() {
    try { const p = new URLSearchParams(window.location.search).get('user'); return p ? JSON.parse(decodeURIComponent(p)) : null; } catch { return null; }
  }

  document.addEventListener('DOMContentLoaded', () => {
    let userData = sessionStorage.getItem('currentUser');
    if (!userData) {
      const u = getUserFromUrl();
      if (u) { userData = JSON.stringify(u); sessionStorage.setItem('currentUser', userData); }
    }
    if (!userData) { window.location.href = 'index.html'; return; }
    try {
      currentUser = JSON.parse(userData);
      document.getElementById('userNameDisplay').textContent = currentUser.name || 'User';
      if (!allowedUserTypes.includes(currentUser.type)) {
        showAlert('لا تملك الصلاحية لعرض هذه الصفحة.');
        setTimeout(() => window.location.href = 'Dashboard.html', 2000);
        return;
      }
    } catch { window.location.href = 'index.html'; return; }
    loadInvoices();
  });

  // Expose functions to global
  window.applyFilters = applyFilters;
  window.resetFilters = resetFilters;
  window.openPicker   = openPicker;
  window.onNativePick = onNativePick;
  window.onTextInput  = onTextInput;
  window.onTextBlur   = onTextBlur;
  window.spinDate     = spinDate;
  window.goToPage     = goToPage;
  window.setSort      = setSort;
  window.editInvoice  = editInvoice;
  window.deleteInvoice= deleteInvoice;
  window.goBack       = goBack;
  window.showAlert    = showAlert;
</script>
</body>
</html>
