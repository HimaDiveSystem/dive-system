<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Bookings by Active Date</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:#f0f4f8;}
    .header{background:#0f1f3d;color:white;padding:12px 22px;display:flex;justify-content:space-between;align-items:center;}
    .back-btn{background:transparent;border:1px solid rgba(255,255,255,.3);color:white;padding:4px 13px;border-radius:40px;cursor:pointer;}
    .filter-bar{background:white;padding:10px 20px;border-bottom:1px solid #ddd;}
    .filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;}
    .fg{display:flex;flex-direction:column;gap:3px;}
    .fg label{font-size:10px;font-weight:bold;color:#666;}
    .fc{padding:6px 10px;border:1px solid #ddd;border-radius:8px;font-size:12px;}
    .fbtn{padding:6px 14px;border:none;border-radius:20px;cursor:pointer;}
    .fbtn-go{background:#0f1f3d;color:#f5c842;}
    .fbtn-rs{background:#f1f5f9;}
    .tbl-wrap{overflow:auto;max-height:70vh;}
    table{width:100%;border-collapse:collapse;font-size:11px;min-width:2600px;}
    th{background:#0f1f3d;color:#f5c842;padding:10px 5px;position:sticky;top:0;white-space:nowrap;}
    td{padding:6px 5px;border-bottom:1px solid #e2e8f0;white-space:nowrap;}
    .amt{text-align:right;}
    .rest-pos{color:#dc2626;font-weight:bold;}
    .rest-zero{color:#16a34a;font-weight:bold;}
    .vlink{color:#2563eb;cursor:pointer;font-weight:bold;}
    .act-btn{padding:3px 6px;border-radius:8px;font-size:10px;cursor:pointer;color:white;text-decoration:none;display:inline-block;}
    .act-edit{background:#3b82f6;}
    .act-del{background:#dc2626;}
    .act-pdf{background:#ea580c;}
    .act-na{background:#cbd5e1;}
    .st-confirmed{color:#16a34a;font-weight:bold;}
    .st-pending{color:#eab308;}
    .st-cancel{color:#dc2626;}
    .st-refund{color:#f97316;}
    .pagination{display:flex;justify-content:center;gap:5px;padding:12px;}
    .page-btn{padding:4px 9px;border:1px solid #ddd;background:white;border-radius:14px;cursor:pointer;}
    .page-btn.active{background:#0f1f3d;color:#f5c842;}
    .loader-wrap{text-align:center;padding:50px;}
    .spinner{width:32px;height:32px;border:4px solid #ddd;border-top-color:#2563eb;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .quick-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:1000;}
    .quick-modal.open{display:flex;}
    .quick-modal-content{background:white;border-radius:20px;width:90%;max-width:400px;max-height:80vh;overflow:auto;padding:20px;}
    .quick-modal-header{font-size:18px;font-weight:bold;margin-bottom:16px;display:flex;justify-content:space-between;}
    .quick-modal-close{cursor:pointer;font-size:24px;}
    .status-option{display:inline-block;padding:8px 16px;margin:4px;border-radius:30px;cursor:pointer;}
    .status-pending{background:#fef9c3;color:#854d0e;}
    .status-confirmed{background:#dcfce7;color:#166534;}
    .status-cancel{background:#fee2e2;color:#991b1b;}
    .btn{padding:8px 16px;border-radius:30px;cursor:pointer;border:none;}
    .btn-success{background:#16a34a;color:white;}
    .btn-danger{background:#dc2626;color:white;}
    .payment-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0;}
    .payment-card{background:white;border:1px solid #ddd;border-radius:10px;padding:8px;text-align:center;}
    .payment-card input{width:100%;text-align:center;padding:4px;border:1px solid #ddd;border-radius:6px;}
  </style>
</head>
<body>

<div class="header">
  <h2>📅 Bookings by Active Date</h2>
  <div class="header-right">
    <span id="userNameDisplay"></span>
    <button class="back-btn" onclick="goBack()">← Back</button>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-row">
    <div class="fg"><label>From Date</label><input type="date" id="fFrom" onchange="apply()"></div>
    <div class="fg"><label>To Date</label><input type="date" id="fTo" onchange="apply()"></div>
    <div class="fg"><label>Search</label><input type="text" id="fSearch" placeholder="Search..." oninput="debounce()"></div>
    <div class="fg"><label>Status</label><select id="fState" onchange="apply()"><option value="">All</option><option value="pending">Pending</option><option value="Confirmed">Confirmed</option><option value="cancel">Cancel</option><option value="refund">Refund</option></select></div>
    <div class="fbtns"><button class="fbtn fbtn-go" onclick="apply()">Apply</button><button class="fbtn fbtn-rs" onclick="reset()">Reset</button></div>
  </div>
</div>

<div class="tbl-wrap"><div id="tblCont"><div class="loader-wrap"><div class="spinner"></div>Loading...</div></div></div>
<div class="pagination" id="pagination"></div>

<div id="quickModal" class="quick-modal"><div class="quick-modal-content"><div class="quick-modal-header"><span id="quickModalTitle">اختر</span><span class="quick-modal-close" onclick="closeQuickModal()">&times;</span></div><div id="quickModalBody"></div></div></div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbwXjfHfc5rpqUyh7jXI1VjIxuaziEU5q-rCff9Z0p0KMUnP5GcOq3nWQ0VFVw2KNFgz/exec';
var MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var DASH = {Admin:'Dashboard.html',Owner:'OwnerDashboard.html',Sales:'SalesDashboard.html',Accountant:'AccountantDashboard.html'};
var ALLOWED = ['Admin','Owner','Sales','Accountant','FinancialManager','CenterManager','BranchManager'];
var currentUser = null, allInv = [], filtInv = [];
var pg = 1, PS = 20, ftimer = null;
var currentActionVoucher = null;

function escapeHtml(str){if(!str)return'';return String(str).replace(/[&<>]/g,function(m){return m==='&'?'&amp;':m==='<'?'&lt;':'&gt;';});}
function formatDate(d){var dd=new Date(d);return String(dd.getDate()).padStart(2,'0')+'/'+MN[dd.getMonth()]+'/'+dd.getFullYear();}
function fmtDate(s){if(!s)return'';try{var d=new Date(s);return formatDate(d);}catch(e){return s;}}
function fmtTime(t){if(!t)return'';var m=String(t).match(/(\d{1,2}):(\d{2})/);return m?m[1].padStart(2,'0')+':'+m[2]:t.substring(0,5);}
function showToast(msg,type){alert(msg);}
function goBack(){window.location.href=DASH[currentUser?.type]||'Dashboard.html';}
function editInvoice(v){window.location.href='EditInvoice.html?voucherNo='+v;}
function closeQuickModal(){document.getElementById('quickModal').classList.remove('open');}

function fmtRest(inv){
  var rest = inv.Rest;
  var cur = inv.InvoiceCurrency || '';
  if(rest === undefined || rest === null || rest === '') return '<span class="rest-zero">✓</span>';
  var num = parseFloat(rest);
  if(!isNaN(num)){
    if(num === 0) return '<span class="rest-zero">✓</span>';
    return '<span class="rest-pos">' + num.toFixed(2) + (cur ? ' ' + cur : '') + '</span>';
  }
  return '<span style="color:#2563eb;font-weight:bold;">' + escapeHtml(rest) + '</span>';
}

function fmtSt(inv){
  if(inv.Refund) return '<span class="st-refund">💰 Refund</span>';
  var s = (inv.State || '').toLowerCase();
  if(s === 'confirmed') return '<span class="st-confirmed">✅ Confirmed</span>';
  if(s === 'pending') return '<span class="st-pending">⏳ Pending</span>';
  if(s === 'cancel') return '<span class="st-cancel">❌ Cancel</span>';
  return inv.State || '';
}

async function updateInvoiceField(voucherNo,field,value){
  try{
    var res=await fetch(GAS_URL+'?action=updateInvoiceField&voucherNo='+encodeURIComponent(voucherNo)+'&field='+encodeURIComponent(field)+'&value='+encodeURIComponent(value));
    var result=await res.json();
    if(result.success){showToast('تم التحديث','success');loadInv();}
    else showToast('فشل','error');
  }catch(e){showToast('خطأ','error');}
}

async function openStateModal(voucherNo){
  currentActionVoucher=voucherNo;
  document.getElementById('quickModalTitle').textContent='تغيير حالة الفاتورة';
  document.getElementById('quickModalBody').innerHTML=`
    <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:8px;">
      <div class="status-option status-pending" onclick="selectState('pending')">⏳ قيد الانتظار</div>
      <div class="status-option status-confirmed" onclick="selectState('Confirmed')">✅ مؤكد</div>
      <div class="status-option status-cancel" onclick="selectState('cancel')">❌ ملغي</div>
    </div>
  `;
  document.getElementById('quickModal').classList.add('open');
}

function selectState(state){closeQuickModal();updateInvoiceField(currentActionVoucher,'state',state);}

async function loadInv(){
  document.getElementById('tblCont').innerHTML='<div class="loader-wrap"><div class="spinner"></div>Loading...</div>';
  try{
    var res=await fetch(GAS_URL+'?action=getAllInvoicesWithCategory');
    var data=await res.json();
    if(!Array.isArray(data)) data=[];
    allInv=data;
    filtInv=allInv.slice();
    renderTable();
  }catch(e){document.getElementById('tblCont').innerHTML='<div class="loader-wrap">Error</div>';}
}

function apply(){
  var from=document.getElementById('fFrom').value;
  var to=document.getElementById('fTo').value;
  var search=document.getElementById('fSearch').value.toLowerCase();
  var state=document.getElementById('fState').value.toLowerCase();
  filtInv=allInv.filter(function(inv){
    var d=inv.ActiveDate||'';
    if(from && d<from) return false;
    if(to && d>to) return false;
    if(state && (inv.State||'').toLowerCase()!==state) return false;
    if(search){
      var t=(inv.VoucherNo||'')+(inv.GuestName||'')+(inv.Trip||'');
      if(t.toLowerCase().indexOf(search)===-1) return false;
    }
    return true;
  });
  pg=1;
  renderTable();
}

function reset(){
  document.getElementById('fFrom').value='';
  document.getElementById('fTo').value='';
  document.getElementById('fSearch').value='';
  document.getElementById('fState').value='';
  filtInv=allInv.slice();
  renderTable();
}

function debounce(){clearTimeout(ftimer);ftimer=setTimeout(apply,300);}

// استبدل دالة renderTable بهذا فقط (الباقي كما هو)

function renderTable(){
  var cont = document.getElementById('tblCont');
  if(filtInv.length === 0){
    cont.innerHTML = '<div class="no-data">No bookings found</div>';
    document.getElementById('pagination').innerHTML = '';
    document.getElementById('summarySec').style.display = 'none';
    return;
  }
  
  var start = (pg - 1) * PS;
  var pdata = filtInv.slice(start, start + PS);
  
  var h = '<table><thead><tr>';
  h += '<th onclick="setSort(\'Rest\')">Rest</th>';
  h += '<th onclick="setSort(\'VoucherNo\')">Voucher</th>';
  h += '<th onclick="setSort(\'IssueDate\')">Issue Date</th>';
  h += '<th onclick="setSort(\'ActiveDate\')">Active Date</th>';
  h += '<th onclick="setSort(\'SalesName\')">Sales</th>';
  h += '<th onclick="setSort(\'Time\')">Time</th>';
  h += '<th onclick="setSort(\'Trip\')">Trip</th>';
  h += '<th onclick="setSort(\'ActivitiesText\')">Activities</th>';
  h += '<th onclick="setSort(\'cashUSD\')">$</th>';
  h += '<th onclick="setSort(\'cashEUR\')">€</th>';
  h += '<th onclick="setSort(\'cashGBP\')">£</th>';
  h += '<th onclick="setSort(\'cashLE\')">LE</th>';
  h += '<th onclick="setSort(\'visaUSD\')">V$</th>';
  h += '<th onclick="setSort(\'visaEUR\')">V€</th>';
  h += '<th onclick="setSort(\'visaGBP\')">V£</th>';
  h += '<th onclick="setSort(\'visaLE\')">VLE</th>';
  h += '<th onclick="setSort(\'Hotel\')">Hotel</th>';
  h += '<th onclick="setSort(\'RoomNo\')">Room</th>';
  h += '<th onclick="setSort(\'Nationality\')">Nat.</th>';
  h += '<th onclick="setSort(\'GuestName\')">Guest</th>';
  h += '<th onclick="setSort(\'ContactNo\')">Contact</th>';
  h += '<th onclick="setSort(\'Notes\')">Notes</th>';
  h += '<th onclick="setSort(\'Supplier\')">Supplier</th>';
  h += '<th onclick="setSort(\'Customer\')">Customer</th>';
  h += '<th onclick="setSort(\'State\')">State</th>';
  h += '<th onclick="setSort(\'InvoiceCurrency\')">Cur.</th>';
  h += '<th onclick="setSort(\'BranchName\')">Branch</th>';
  h += '<th onclick="setSort(\'Discount\')">Disc.</th>';
  h += '<th>Pax</th>';
  h += '<th>Actions</th>';
  h += '</thead><tbody>';
  
  for(var idx = 0; idx < pdata.length; idx++){
    var inv = pdata[idx];
    
    // قراءة جميع القيم مع معالجة الحالات المختلفة
    var restVal = inv.Rest !== undefined ? inv.Rest : inv.rest;
    var restCurrency = inv.InvoiceCurrency || inv.invoiceCurrency || '';
    var numRest = parseFloat(restVal);
    var restHtml = (isNaN(numRest) || numRest === 0) ? '<span class="rest-zero">✓</span>' : '<span class="rest-pos">' + numRest.toFixed(2) + (restCurrency ? ' ' + restCurrency : '') + '</span>';
    
    var voucherNo = inv.VoucherNo || inv.voucherNo || '';
    var issueDate = inv.IssueDate || inv.issueDate || '';
    var activeDate = inv.ActiveDate || inv.activeDate || '';
    var sales = inv.SalesName || inv.salesName || inv.SalesID || '';
    var time = inv.Time || inv.time || '';
    var trip = inv.Trip || inv.trip || '';
    var activities = inv.ActivitiesText || inv.activitiesText || '';
    
    var cashUSD = inv.cashUSD || inv['$'] || 0;
    var cashEUR = inv.cashEUR || inv['€'] || 0;
    var cashGBP = inv.cashGBP || inv['£'] || 0;
    var cashLE = inv.cashLE || inv['LE'] || 0;
    var visaUSD = inv.visaUSD || inv['Visa$'] || 0;
    var visaEUR = inv.visaEUR || inv['Visa€'] || 0;
    var visaGBP = inv.visaGBP || inv['Visa£'] || 0;
    var visaLE = inv.visaLE || inv['VisaLE'] || 0;
    
    var hotel = inv.Hotel || inv.hotel || '';
    var roomNo = inv.RoomNo || inv.roomNo || '';
    var nationality = inv.Nationality || inv.nationality || '';
    var guestName = inv.GuestName || inv.guestName || '';
    var contactNo = inv.ContactNo || inv.contactNo || '';
    var notes = inv.Notes || inv.notes || '';
    var supplier = inv.Supplier || inv.supplier || '—';
    var customer = inv.Customer || inv.customer || '—';
    var branch = inv.BranchName || inv.branchName || '';
    var discount = inv.Discount || inv.discount || 0;
    
    var adult = inv.Adult || inv.adultCount || 0;
    var child = inv.Children || inv.childCount || 0;
    var infant = inv.Infants || inv.infantCount || 0;
    var paxHtml = 'A:' + adult + ' C:' + child + ' I:' + infant;
    
    // حالة الفاتورة
    var stateHtml = '';
    if(inv.Refund && inv.Refund !== ''){
      stateHtml = '<span class="st-refund">💰 Refund</span>';
    } else {
      var stateVal = (inv.State || inv.state || '').toLowerCase();
      if(stateVal === 'confirmed') stateHtml = '<span class="st-confirmed">✅ Confirmed</span>';
      else if(stateVal === 'pending') stateHtml = '<span class="st-pending">⏳ Pending</span>';
      else if(stateVal === 'cancel') stateHtml = '<span class="st-cancel">❌ Cancel</span>';
      else stateHtml = inv.State || inv.state || '';
    }
    
    var pdfLink = (inv.Invoice_PDF && inv.Invoice_PDF.startsWith('http')) ? 
      '<a href="' + inv.Invoice_PDF + '" target="_blank" class="act-btn act-pdf">🖨️</a>' : 
      '<span class="act-btn act-na">📄</span>';
    
    h += '<tr>' +
      '<td onclick="openCollectionQuickModal(\'' + voucherNo + '\', ' + (numRest||0) + ', \'' + restCurrency + '\', \'' + activeDate + '\', \'' + fmtDate(issueDate) + '\')" style="cursor:pointer">' + restHtml + '</td>' +
      '<td><span class="vlink" onclick="editInvoice(\'' + voucherNo + '\')">' + voucherNo + '</span></td>' +
      '<td>' + fmtDate(issueDate) + '</td>' +
      '<td>' + fmtDate(activeDate) + '</td>' +
      '<td>' + sales + '</td>' +
      '<td>' + fmtTime(time) + '</td>' +
      '<td>' + trip + '</td>' +
      '<td class="acts-cell">' + (activities || '—') + '</td>' +
      '<td class="amt">' + (cashUSD || 0) + '</td>' +
      '<td class="amt">' + (cashEUR || 0) + '</td>' +
      '<td class="amt">' + (cashGBP || 0) + '</td>' +
      '<td class="amt">' + (cashLE || 0) + '</td>' +
      '<td class="amt">' + (visaUSD || 0) + '</td>' +
      '<td class="amt">' + (visaEUR || 0) + '</td>' +
      '<td class="amt">' + (visaGBP || 0) + '</td>' +
      '<td class="amt">' + (visaLE || 0) + '</td>' +
      '<td>' + hotel + '</td>' +
      '<td>' + roomNo + '</td>' +
      '<td>' + nationality + '</td>' +
      '<td>' + guestName + '</td>' +
      '<td>' + contactNo + '</td>' +
      '<td class="acts-cell">' + (notes || '—') + '</td>' +
      '<td onclick="openPartyModal(\'' + voucherNo + '\', \'supplier\', \'' + escapeHtml(supplier) + '\', \'' + escapeHtml(inv.tripCategory || '') + '\')" style="cursor:pointer; background:#fafbfd;" title="انقر لتغيير المورد">' + supplier + '</td>' +
      '<td onclick="openPartyModal(\'' + voucherNo + '\', \'customer\', \'' + escapeHtml(customer) + '\', \'' + escapeHtml(inv.tripCategory || '') + '\')" style="cursor:pointer; background:#fafbfd;" title="انقر لتغيير العميل">' + customer + '</td>' +
      '<td onclick="openStateModal(\'' + voucherNo + '\')" style="cursor:pointer; background:#fafbfd;" title="انقر لتغيير الحالة">' + stateHtml + '</td>' +
      '<td>' + restCurrency + '</td>' +
      '<td>' + branch + '</td>' +
      '<td class="amt">' + (discount || 0) + '</td>' +
      '<td>' + paxHtml + '</td>' +
      '<td><div class="act-btns"><button class="act-btn act-edit" onclick="editInvoice(\'' + voucherNo + '\')">✏️</button><button class="act-btn act-del" onclick="showDeleteConfirmModal(\'' + voucherNo + '\')">🗑️</button>' + pdfLink + '</div></td>' +
    '</tr>';
  }
  
  h += '</tbody></table>';
  cont.innerHTML = h;
  renderPag();
}

function deleteInvoiceConfirm(v){if(confirm('هل أنت متأكد من حذف الفاتورة '+v+'؟')) deleteInvoice(v);}
async function deleteInvoice(v){
  try{
    var res=await fetch(GAS_URL+'?action=deleteInvoice&voucherNo='+v+'&userId='+(currentUser?.id||'')+'&userType='+(currentUser?.type||''));
    var result=await res.json();
    if(result.success){showToast('تم الحذف','success');loadInv();}
    else showToast(result.message,'error');
  }catch(e){showToast('خطأ','error');}
}

async function openCollectionQuickModal(voucherNo,restAmount,currency){
  if(!restAmount||restAmount<=0){showToast('لا يوجد مبلغ متبقي','error');return;}
  var inv=filtInv.find(function(i){return i.VoucherNo===voucherNo||i.voucherNo===voucherNo;});
  if(!inv)return;
  document.getElementById('quickModalTitle').textContent='💰 تحصيل دفعة';
  document.getElementById('quickModalBody').innerHTML=`
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:28px;font-weight:900">${restAmount.toFixed(2)}</div>
      <div>${currency}</div>
      <div>المبلغ المتبقي</div>
    </div>
    <div class="payment-grid">
      <div class="payment-card"><label>USD $</label><input type="number" id="collUSD" step="0.01" placeholder="0"></div>
      <div class="payment-card"><label>EUR €</label><input type="number" id="collEUR" step="0.01" placeholder="0"></div>
      <div class="payment-card"><label>GBP £</label><input type="number" id="collGBP" step="0.01" placeholder="0"></div>
      <div class="payment-card"><label>EGP LE</label><input type="number" id="collLE" step="0.01" placeholder="0"></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-success" onclick="submitCollection('${voucherNo}')">تأكيد التحصيل</button>
      <button class="btn btn-danger" onclick="closeQuickModal()">إلغاء</button>
    </div>
  `;
  document.getElementById('quickModal').classList.add('open');
}

async function submitCollection(voucherNo){
  var cU=Number(document.getElementById('collUSD')?.value)||0;
  var cE=Number(document.getElementById('collEUR')?.value)||0;
  var cG=Number(document.getElementById('collGBP')?.value)||0;
  var cL=Number(document.getElementById('collLE')?.value)||0;
  var total=cU+cE+cG+cL;
  if(total<=0){showToast('الرجاء إدخال مبلغ','error');return;}
  var params=new URLSearchParams();
  params.set('action','createCollectionInvoice');
  params.set('parentVoucherNo',voucherNo);
  params.set('cashUSD',cU);params.set('cashEUR',cE);params.set('cashGBP',cG);params.set('cashLE',cL);
  showToast('جاري المعالجة...','info');
  try{
    var res=await fetch(GAS_URL+'?'+params.toString());
    var result=await res.json();
    if(result.success){showToast('تم التحصيل','success');closeQuickModal();loadInv();}
    else showToast('فشل','error');
  }catch(e){showToast('خطأ','error');}
}

function renderPag(){
  var total=Math.ceil(filtInv.length/PS);
  var html='';
  for(var i=1;i<=Math.min(total,15);i++){
    html+='<button class="page-btn '+(i===pg?'active':'')+'" onclick="gotoPage('+i+')">'+i+'</button>';
  }
  document.getElementById('pagination').innerHTML=html;
}
function gotoPage(p){pg=p;renderTable();}

document.addEventListener('DOMContentLoaded',function(){
  var ud=sessionStorage.getItem('currentUser');
  if(!ud){var p=new URLSearchParams(location.search).get('user');if(p){ud=decodeURIComponent(p);sessionStorage.setItem('currentUser',ud);}}
  if(!ud){location.href='index.html';return;}
  try{currentUser=JSON.parse(ud);}catch(e){location.href='index.html';return;}
  document.getElementById('userNameDisplay').textContent=currentUser.name||'User';
  if(!ALLOWED.includes(currentUser.type)){alert('No permission');setTimeout(function(){location.href='Dashboard.html';},2000);return;}
  var t=new Date().toISOString().split('T')[0];
  document.getElementById('fFrom').value=t;
  document.getElementById('fTo').value=t;
  loadInv();
});
</script>
