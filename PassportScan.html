<!DOCTYPE html>
<html lang="en">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Passport Scanner - Diving Centers Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e2b4f 0%, #152238 100%);
            color: white;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h2 {
            color: #ffd966;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-name {
            background: rgba(255,255,255,0.1);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            border: 1px solid #ffd966;
        }
        .back-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
        }
        .content {
            padding: 15px;
        }
        
        /* Options Grid */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        .option-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 12px;
            padding: 12px 5px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .option-card.active {
            border-color: #1e2b4f;
            background: white;
        }
        .option-icon {
            font-size: 24px;
            margin-bottom: 3px;
        }
        .option-title {
            font-size: 12px;
            font-weight: 700;
            color: #1e2b4f;
        }
        
        /* Sections */
        .section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: none;
        }
        .section.active {
            display: block;
        }
        
        /* Camera */
        #camera {
            width: 100%;
            border-radius: 12px;
            border: 2px solid #1e2b4f;
            margin-bottom: 10px;
        }
        
        /* Gallery Upload */
        .upload-area {
            border: 2px dashed #1e2b4f;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            background: white;
            margin-bottom: 10px;
        }
        .upload-icon {
            font-size: 48px;
            color: #1e2b4f;
            margin-bottom: 10px;
        }
        .upload-text {
            color: #1e2b4f;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .upload-hint {
            color: #666;
            font-size: 12px;
        }
        #imageUpload {
            display: none;
        }
        .file-name {
            background: #e9f0fa;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #1e2b4f;
            margin-top: 10px;
            word-break: break-all;
        }
        
        /* Manual Entry */
        .manual-form {
            background: white;
            border-radius: 12px;
            padding: 15px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #1e2b4f;
            font-weight: 600;
            font-size: 13px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9f0fa;
            border-radius: 10px;
            font-size: 14px;
        }
        .form-group input:focus {
            border-color: #ffd966;
            outline: none;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        /* Crop View */
        .crop-container {
            width: 100%;
            margin: 0 auto;
            position: relative;
            border: 2px solid #1e2b4f;
            border-radius: 12px;
            overflow: hidden;
            background: #1a1a1a;
            touch-action: none;
        }
        .image-wrapper {
            width: 100%;
            height: 350px;
            position: relative;
            overflow: hidden;
            touch-action: none;
            background: #1a1a1a;
        }
        #cropImage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            transform-origin: center center;
            will-change: transform;
        }
        .crop-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 55%;
            border: 3px solid #ff4444;
            border-radius: 10px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
            pointer-events: none;
            z-index: 10;
        }
        .frame-label {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff4444;
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 10px;
            font-weight: bold;
            white-space: nowrap;
        }
        
        /* Zoom Controls */
        .zoom-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 12px 0;
            padding: 8px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .zoom-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #1e2b4f;
            background: white;
            color: #1e2b4f;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .zoom-btn:active {
            background: #1e2b4f;
            color: white;
        }
        .zoom-slider {
            width: 150px;
            height: 40px;
            -webkit-appearance: none;
            background: transparent;
        }
        .zoom-slider::-webkit-slider-runnable-track {
            height: 4px;
            background: #e9f0fa;
            border-radius: 2px;
        }
        .zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #1e2b4f;
            margin-top: -10px;
            cursor: pointer;
        }
        .zoom-percent {
            min-width: 55px;
            text-align: center;
            font-weight: 600;
            color: #1e2b4f;
            font-size: 14px;
        }
        
        /* Buttons */
        .button-group {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .btn {
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            min-width: 120px;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-primary {
            background: #1e2b4f;
            color: white;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        /* Results */
        .result-box {
            background: #e8f5e8;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            border-left: 5px solid #28a745;
        }
        .result-item {
            display: flex;
            margin-bottom: 6px;
            padding: 8px 10px;
            background: white;
            border-radius: 8px;
            font-size: 13px;
        }
        .result-label {
            font-weight: bold;
            min-width: 100px;
            color: #1e2b4f;
        }
        
        /* Activity Section */
        .activity-form {
            background: white;
            border-radius: 12px;
            padding: 15px;
        }
        .activity-form input,
        .activity-form select,
        .activity-form textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9f0fa;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        /* Raw Text */
        .raw-text {
            background: #f0f0f0;
            border-radius: 10px;
            padding: 10px;
            margin-top: 10px;
            font-size: 10px;
            color: #666;
            word-break: break-all;
            max-height: 100px;
            overflow-y: auto;
        }
        
        /* Loading */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .loading-container {
            background: white;
            padding: 20px 30px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        /* Alert */
        #alertModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }
        #alertModal > div {
            background: white;
            width: 90%;
            max-width: 320px;
            border-radius: 25px;
            padding: 25px;
            text-align: center;
        }
        
        .instruction {
            background: #e9f0fa;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 12px;
            font-size: 12px;
            text-align: center;
            color: #1e2b4f;
        }
        .instruction span {
            background: white;
            padding: 4px 8px;
            border-radius: 15px;
            margin: 0 3px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>🛂 Passport Scanner</h2>
            <div class="user-info">
                <span class="user-name" id="userNameDisplay"></span>
                <a href="SalesDashboard.html" class="back-btn">←</a>
            </div>
        </div>

        <div class="content">
            <!-- Options -->
            <div class="options-grid">
                <div class="option-card" onclick="selectOption('scan')" id="optionScan">
                    <div class="option-icon">📸</div>
                    <div class="option-title">Camera</div>
                </div>
                <div class="option-card" onclick="selectOption('gallery')" id="optionGallery">
                    <div class="option-icon">🖼️</div>
                    <div class="option-title">Gallery</div>
                </div>
                <div class="option-card" onclick="selectOption('manual')" id="optionManual">
                    <div class="option-icon">✏️</div>
                    <div class="option-title">Manual</div>
                </div>
            </div>

            <!-- Camera Section -->
            <div class="section" id="cameraSection">
                <video id="camera" autoplay playsinline></video>
                <div class="button-group">
                    <button class="btn btn-secondary" onclick="startCamera()">📷 Start</button>
                    <button class="btn btn-primary" onclick="captureFromCamera()" disabled id="captureBtn">📸 Capture</button>
                </div>
            </div>

            <!-- Gallery Section -->
            <div class="section" id="gallerySection">
                <div class="upload-area" onclick="document.getElementById('imageUpload').click()">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">Tap to choose image</div>
                    <div class="upload-hint">from gallery</div>
                </div>
                <input type="file" id="imageUpload" accept="image/*">
                <div id="fileName" class="file-name"></div>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="document.getElementById('imageUpload').click()">📁 Select Image</button>
                </div>
            </div>

            <!-- Crop Section -->
            <div class="section" id="cropSection">
                <h3 style="margin-bottom:10px; font-size:16px;">👆 Adjust Image</h3>
                
                <div class="instruction">
                    <span>👆 Drag</span> to move · <span>📌 Pinch</span> to zoom
                </div>
                
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="zoomOut()">−</button>
                    <input type="range" id="zoomSlider" class="zoom-slider" min="0.5" max="3" step="0.1" value="1">
                    <button class="zoom-btn" onclick="zoomIn()">+</button>
                    <span class="zoom-percent" id="zoomPercent">100%</span>
                </div>
                
                <div class="crop-container">
                    <div class="image-wrapper" id="imageWrapper"
                         ontouchstart="handleTouchStart(event)"
                         ontouchmove="handleTouchMove(event)"
                         ontouchend="handleTouchEnd(event)">
                        <img id="cropImage" src="" alt="Passport">
                        <div class="crop-frame">
                            <div class="frame-label">📷 SCAN AREA</div>
                        </div>
                    </div>
                </div>
                
                <div class="button-group">
                    <button class="btn btn-success" onclick="scanVisibleArea()">🔍 Scan Area</button>
                    <button class="btn btn-secondary" onclick="cancelCrop()">← Back</button>
                </div>
            </div>

            <!-- Manual Entry Section -->
            <div class="section" id="manualSection">
                <div class="manual-form">
                    <div class="form-group">
                        <label>👤 Full Name</label>
                        <input type="text" id="manualName" placeholder="Enter full name">
                    </div>
                    
                    <div class="form-group">
                        <label>🌍 Nationality</label>
                        <input type="text" id="manualNationality" placeholder="Enter nationality">
                    </div>
                    
                    <div class="form-group">
                        <label>🛂 Passport Number</label>
                        <input type="text" id="manualPassport" placeholder="Enter passport number">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>📅 Birthdate</label>
                            <input type="date" id="manualBirthdate" onchange="calcManualAge()">
                        </div>
                        
                        <div class="form-group">
                            <label>🎂 Age</label>
                            <input type="text" id="manualAge" placeholder="Age" readonly>
                        </div>
                    </div>
                    
                    <div class="button-group">
                        <button class="btn btn-success" onclick="processManual()">✓ Continue</button>
                    </div>
                </div>
            </div>

            <!-- Results -->
            <div class="result-box" id="resultBox" style="display:none;">
                <div class="result-item"><span class="result-label">Name:</span> <span id="resName">-</span></div>
                <div class="result-item"><span class="result-label">Nationality:</span> <span id="resNationality">-</span></div>
                <div class="result-item"><span class="result-label">Passport No.:</span> <span id="resPassport">-</span></div>
                <div class="result-item"><span class="result-label">Birthdate:</span> <span id="resBirthdate">-</span></div>
                <div class="result-item"><span class="result-label">Age:</span> <span id="resAge">-</span></div>
                <div class="raw-text" id="rawText"></div>
                <div class="button-group">
                    <button class="btn btn-success" onclick="goToActivity()">▶ Next</button>
                    <button class="btn btn-secondary" onclick="resetAll()">↻ New</button>
                </div>
            </div>

            <!-- Activity Section -->
            <div class="section" id="activitySection">
                <div class="activity-form">
                    <select id="activitySelect">
                        <option value="">Select Activity</option>
                        <option value="Diving">Diving</option>
                        <option value="Snorkeling">Snorkeling</option>
                        <option value="Boat Trip">Boat Trip</option>
                        <option value="Diving Training">Diving Training</option>
                    </select>
                    
                    <input type="date" id="activityDate" placeholder="Activity Date">
                    <input type="time" id="pickupTime" placeholder="Pick Up Time">
                    <input type="text" id="roomNumber" placeholder="Room Number">
                    <textarea id="activityText" rows="3" placeholder="Additional details..."></textarea>
                    
                    <div class="button-group">
                        <button class="btn btn-primary" onclick="saveAll()">💾 Save</button>
                        <button class="btn btn-secondary" onclick="backToResults()">← Back</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-container">
            <div class="hourglass">⏳</div>
            <span id="loadingMessage">Processing...</span>
        </div>
    </div>

    <!-- Alert -->
    <div id="alertModal">
        <div>
            <h3 style="color:#1e2b4f; margin-bottom:15px;" id="alertMessage"></h3>
            <button class="btn btn-primary" onclick="this.parentElement.parentElement.style.display='none'">OK</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <script>
        // GAS URL
        const GAS_URL='https://script.google.com/macros/s/AKfycbwC1BRoLAJthZqxWTYyMUSjPNNGfCI0BjTfhE7ZiVx67rUP__OKAj0vlwD1-RUCOMSE/exec';
       
        let currentUser = null;
        let stream = null;
        let isCameraStarted = false;
        let extractedData = {};
        let rawOcrText = '';
        
        // Image variables
        let img = new Image();
        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let lastTouchDistance = 0;
        let isTouching = false;
        let startTouchX, startTouchY;
        let currentImageData = null;

        const imageElement = document.getElementById('cropImage');
        const wrapper = document.getElementById('imageWrapper');
        const zoomSlider = document.getElementById('zoomSlider');

        // ========== IMPROVED DATA EXTRACTION FUNCTIONS ==========
        
        function cleanText(text) {
            return text.replace(/[^\x20-\x7E\u0600-\u06FF\n]/g, ' ').replace(/\s+/g, ' ').trim();
        }

        function extractName(text) {
            // Patterns for English names
            const engPatterns = [
                /(?:Name|Full Name|Surname|Given Name)[:\s]*([A-Z][A-Z\s]{2,30}[A-Z])/i,
                /([A-Z][a-z]+ [A-Z][a-z]+(?: [A-Z][a-z]+)?)/,
                /([A-Z]{2,}\s+[A-Z]{2,})/
            ];
            
            // Patterns for Arabic names
            const araPatterns = [
                /(?:الاسم|الإسم|الاسم الكامل)[:\s]*([\u0600-\u06FF\s]{3,30})/i,
                /([\u0600-\u06FF]{3,}\s+[\u0600-\u06FF]{3,})/
            ];
            
            for (let p of engPatterns) {
                const match = text.match(p);
                if (match && match[1] && match[1].length > 3) {
                    return match[1].trim();
                }
            }
            
            for (let p of araPatterns) {
                const match = text.match(p);
                if (match && match[1] && match[1].length > 3) {
                    return match[1].trim();
                }
            }
            
            return null;
        }

        function extractNationality(text) {
            const nationalityMap = {
                'مصري': 'Egyptian', 'مصر': 'Egyptian', 'EGYPT': 'Egyptian',
                'سعودي': 'Saudi', 'SAUDI': 'Saudi', 'المملكة العربية السعودية': 'Saudi',
                'أردني': 'Jordanian', 'JORDAN': 'Jordanian',
                'إماراتي': 'Emirati', 'UAE': 'Emirati',
                'كويتي': 'Kuwaiti', 'KUWAIT': 'Kuwaiti',
                'بحريني': 'Bahraini', 'BAHRAIN': 'Bahraini',
                'قطري': 'Qatari', 'QATAR': 'Qatari',
                'عماني': 'Omani', 'OMAN': 'Omani',
                'ليبي': 'Libyan', 'LIBYA': 'Libyan',
                'تونسي': 'Tunisian', 'TUNISIA': 'Tunisian',
                'جزائري': 'Algerian', 'ALGERIA': 'Algerian',
                'مغربي': 'Moroccan', 'MOROCCO': 'Moroccan',
                'سوداني': 'Sudanese', 'SUDAN': 'Sudanese',
                'فلسطيني': 'Palestinian', 'PALESTINE': 'Palestinian',
                'لبناني': 'Lebanese', 'LEBANON': 'Lebanese',
                'سوري': 'Syrian', 'SYRIA': 'Syrian',
                'عراقي': 'Iraqi', 'IRAQ': 'Iraqi',
                'يمني': 'Yemeni', 'YEMEN': 'Yemeni',
                'روسي': 'Russian', 'RUSSIA': 'Russian',
                'أمريكي': 'American', 'USA': 'American',
                'بريطاني': 'British', 'UK': 'British',
                'فرنسي': 'French', 'FRANCE': 'French',
                'ألماني': 'German', 'GERMANY': 'German',
                'إيطالي': 'Italian', 'ITALY': 'Italian',
                'إسباني': 'Spanish', 'SPAIN': 'Spanish',
                'صيني': 'Chinese', 'CHINA': 'Chinese',
                'هندي': 'Indian', 'INDIA': 'Indian'
            };
            
            const textUpper = text.toUpperCase();
            
            // Search for Nationality/الجنسية labels
            const labelPatterns = [
                /(?:Nationality|الجنسية)[:\s]*([A-Za-z\u0600-\u06FF\s]{3,25})/i,
                /(?:NATION|NAT\.?)[:\s]*([A-Z]{3,15})/i
            ];
            
            for (let p of labelPatterns) {
                const match = text.match(p);
                if (match && match[1]) {
                    const found = match[1].trim();
                    for (let [ar, en] of Object.entries(nationalityMap)) {
                        if (found.toUpperCase().includes(ar.toUpperCase()) || 
                            found.toUpperCase().includes(en.toUpperCase())) {
                            return en;
                        }
                    }
                    if (found.length < 25) return found;
                }
            }
            
            // Search in nationality map
            for (let [ar, en] of Object.entries(nationalityMap)) {
                if (textUpper.includes(ar.toUpperCase()) || textUpper.includes(en.toUpperCase())) {
                    return en;
                }
            }
            
            return null;
        }

        function extractPassportNumber(text) {
            // Passport number patterns
            const patterns = [
                /(?:Passport No\.?|Passport Number|رقم الجواز|رقم جواز السفر)[:\s]*([A-Z0-9]{6,12})/i,
                /(?:PASSPORT|P\/SPT|P\/PORT|DOCUMENT)[:\s]*([A-Z0-9]{6,12})/i,
                /(?:NO\.?|NUMBER|#)[:\s]*([A-Z0-9]{6,12})/i,
                /\b([A-Z][0-9]{7,9})\b/i,
                /\b([0-9]{7,10})\b/
            ];
            
            for (let p of patterns) {
                const match = text.match(p);
                if (match && match[1] && match[1].length >= 6) {
                    return match[1].trim();
                }
            }
            
            return null;
        }

        function extractBirthdate(text) {
            // Date patterns (DD/MM/YYYY, DD-MM-YYYY, DD.MM.YYYY)
            const patterns = [
                /(?:Birth Date|Date of Birth|DOB|تاريخ الميلاد)[:\s]*(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{4})/i,
                /(?:BIRTH|DOB)[:\s]*(\d{2}[\/\-\.]\d{2}[\/\-\.]\d{4})/i,
                /\b(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{4})\b/
            ];
            
            for (let p of patterns) {
                const match = text.match(p);
                if (match && match[1]) {
                    let date = match[1];
                    // Convert to YYYY-MM-DD format
                    let parts = date.split(/[\/\-\.]/);
                    if (parts.length === 3) {
                        let day = parts[0].padStart(2, '0');
                        let month = parts[1].padStart(2, '0');
                        let year = parts[2];
                        if (year.length === 4) {
                            return `${year}-${month}-${day}`;
                        }
                    }
                    return date;
                }
            }
            
            return null;
        }

        function calculateAge(birthdate) {
            if (!birthdate) return 'Not detected';
            try {
                let d, m, y;
                if (birthdate.includes('-')) {
                    [y, m, d] = birthdate.split('-');
                } else if (birthdate.includes('/')) {
                    [d, m, y] = birthdate.split('/');
                } else {
                    return 'Not detected';
                }
                
                const birth = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
                const today = new Date();
                let age = today.getFullYear() - birth.getFullYear();
                if (today < new Date(today.getFullYear(), birth.getMonth(), birth.getDate())) {
                    age--;
                }
                return age + ' years';
            } catch {
                return 'Not detected';
            }
        }

        function extractAllData(text) {
            const clean = cleanText(text);
            console.log('Cleaned OCR Text:', clean);
            
            const name = extractName(clean);
            const nationality = extractNationality(clean);
            const passport = extractPassportNumber(clean);
            const birthdate = extractBirthdate(clean);
            const age = calculateAge(birthdate);
            
            return {
                name: name || 'Not detected',
                nationality: nationality || 'Not detected',
                passport: passport || 'Not detected',
                birthdate: birthdate || 'Not detected',
                age: age
            };
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const userData = sessionStorage.getItem('currentUser');
            if (!userData) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = JSON.parse(userData);
            document.getElementById('userNameDisplay').textContent = currentUser.name || 'User';
            
            setupEvents();
            selectOption('scan');
        });

        function setupEvents() {
            zoomSlider.addEventListener('input', (e) => {
                scale = parseFloat(e.target.value);
                updateZoomPercent();
                updateImageTransform();
            });
        }

        // ===== TOUCH HANDLERS =====
        function handleTouchStart(e) {
            e.preventDefault();
            const touches = e.touches;
            
            if (touches.length === 1) {
                isTouching = true;
                startTouchX = touches[0].clientX - translateX;
                startTouchY = touches[0].clientY - translateY;
            } else if (touches.length === 2) {
                lastTouchDistance = getTouchDistance(touches);
            }
        }

        function handleTouchMove(e) {
            e.preventDefault();
            const touches = e.touches;
            
            if (touches.length === 1 && isTouching) {
                translateX = touches[0].clientX - startTouchX;
                translateY = touches[0].clientY - startTouchY;
                updateImageTransform();
            } else if (touches.length === 2) {
                const currentDistance = getTouchDistance(touches);
                const scaleChange = currentDistance / lastTouchDistance;
                scale = Math.min(3, Math.max(0.5, scale * scaleChange));
                lastTouchDistance = currentDistance;
                zoomSlider.value = scale;
                updateZoomPercent();
                updateImageTransform();
            }
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            isTouching = false;
            lastTouchDistance = 0;
        }

        function getTouchDistance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // ===== SELECT OPTION =====
        function selectOption(opt) {
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`option${opt.charAt(0).toUpperCase()+opt.slice(1)}`).classList.add('active');
            
            hideAllSections();
            
            if (opt === 'scan') {
                document.getElementById('cameraSection').classList.add('active');
                startCamera();
            } else if (opt === 'gallery') {
                document.getElementById('gallerySection').classList.add('active');
            } else if (opt === 'manual') {
                document.getElementById('manualSection').classList.add('active');
            }
        }

        function hideAllSections() {
            document.getElementById('cameraSection').classList.remove('active');
            document.getElementById('gallerySection').classList.remove('active');
            document.getElementById('cropSection').classList.remove('active');
            document.getElementById('manualSection').classList.remove('active');
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('activitySection').classList.remove('active');
        }

        // ===== CAMERA =====
        async function startCamera() {
            try {
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                }
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                document.getElementById('camera').srcObject = stream;
                isCameraStarted = true;
                document.getElementById('captureBtn').disabled = false;
            } catch (err) {
                showAlert('Camera error: ' + err.message);
            }
        }

        function captureFromCamera() {
            const video = document.getElementById('camera');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            loadImageToCrop(canvas.toDataURL('image/jpeg'));
        }

        // ===== GALLERY =====
        document.getElementById('imageUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            document.getElementById('fileName').textContent = `📁 Selected: ${file.name}`;
            
            const reader = new FileReader();
            reader.onload = (event) => loadImageToCrop(event.target.result);
            reader.readAsDataURL(file);
        });

        // ===== CROP FUNCTIONS =====
        function loadImageToCrop(dataUrl) {
            currentImageData = dataUrl;
            
            img.onload = () => {
                scale = 1;
                translateX = 0;
                translateY = 0;
                
                imageElement.src = dataUrl;
                zoomSlider.value = scale;
                updateZoomPercent();
                updateImageTransform();
                
                document.getElementById('gallerySection').classList.remove('active');
                document.getElementById('cropSection').classList.add('active');
            };
            img.src = dataUrl;
        }

        function updateImageTransform() {
            imageElement.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        function updateZoomPercent() {
            document.getElementById('zoomPercent').textContent = Math.round(scale * 100) + '%';
        }

        function zoomIn() {
            if (scale < 3) {
                scale = Math.min(3, scale + 0.2);
                zoomSlider.value = scale;
                updateZoomPercent();
                updateImageTransform();
            }
        }

        function zoomOut() {
            if (scale > 0.5) {
                scale = Math.max(0.5, scale - 0.2);
                zoomSlider.value = scale;
                updateZoomPercent();
                updateImageTransform();
            }
        }

        // ===== SCAN VISIBLE AREA =====
        async function scanVisibleArea() {
            if (!currentImageData) {
                showAlert('No image loaded');
                return;
            }

            showLoading(true, 'Scanning with OCR...');

            try {
                const frame = document.querySelector('.crop-frame').getBoundingClientRect();
                const imageRect = imageElement.getBoundingClientRect();
                
                const visibleX = frame.left - imageRect.left;
                const visibleY = frame.top - imageRect.top;
                const visibleWidth = frame.width;
                const visibleHeight = frame.height;
                
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = visibleWidth;
                tempCanvas.height = visibleHeight;
                const ctx = tempCanvas.getContext('2d');
                
                ctx.drawImage(
                    imageElement,
                    visibleX, visibleY, visibleWidth, visibleHeight,
                    0, 0, visibleWidth, visibleHeight
                );
                
                const visibleData = tempCanvas.toDataURL('image/jpeg');
                
                // Run OCR with Arabic + English
                const result = await Tesseract.recognize(
                    visibleData,
                    'ara+eng',
                    { 
                        logger: m => console.log(m),
                        tessedit_pageseg_mode: '6'  // Assume uniform text block
                    }
                );
                
                rawOcrText = result.data.text;
                console.log('Raw OCR:', rawOcrText);
                
                extractedData = extractAllData(rawOcrText);
                showResults(extractedData);
                
            } catch (error) {
                showAlert('Error: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        function cancelCrop() {
            document.getElementById('cropSection').classList.remove('active');
            document.getElementById('gallerySection').classList.add('active');
        }

        // ===== RESULTS =====
        function showResults(data) {
            document.getElementById('resName').textContent = data.name;
            document.getElementById('resNationality').textContent = data.nationality;
            document.getElementById('resPassport').textContent = data.passport;
            document.getElementById('resBirthdate').textContent = data.birthdate;
            document.getElementById('resAge').textContent = data.age;
            document.getElementById('rawText').textContent = '📄 Raw OCR: ' + (rawOcrText.substring(0, 300) || 'No text detected');
            
            hideAllSections();
            document.getElementById('resultBox').style.display = 'block';
        }

        // ===== MANUAL =====
        function calcManualAge() {
            const date = document.getElementById('manualBirthdate').value;
            if (date) {
                const age = calculateAge(date);
                document.getElementById('manualAge').value = age;
            }
        }

        function processManual() {
            const name = document.getElementById('manualName').value;
            const nationality = document.getElementById('manualNationality').value;
            const passport = document.getElementById('manualPassport').value;
            const birthdate = document.getElementById('manualBirthdate').value;
            
            if (!name || !nationality || !passport || !birthdate) {
                showAlert('Please fill all fields');
                return;
            }
            
            extractedData = {
                name: name,
                nationality: nationality,
                passport: passport,
                birthdate: birthdate,
                age: calculateAge(birthdate)
            };
            
            showResults(extractedData);
        }

        // ===== NAVIGATION =====
        function goToActivity() {
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('activitySection').classList.add('active');
        }

        function backToResults() {
            document.getElementById('activitySection').classList.remove('active');
            document.getElementById('resultBox').style.display = 'block';
        }

        function resetAll() {
            hideAllSections();
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('active'));
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
            }
            // Reset forms
            document.getElementById('manualName').value = '';
            document.getElementById('manualNationality').value = '';
            document.getElementById('manualPassport').value = '';
            document.getElementById('manualBirthdate').value = '';
            document.getElementById('manualAge').value = '';
            document.getElementById('activitySelect').value = '';
            document.getElementById('activityDate').value = '';
            document.getElementById('pickupTime').value = '';
            document.getElementById('roomNumber').value = '';
            document.getElementById('activityText').value = '';
            
            selectOption('scan');
        }

        function saveAll() {
            const activity = {
                activity: document.getElementById('activitySelect').value,
                date: document.getElementById('activityDate').value,
                time: document.getElementById('pickupTime').value,
                room: document.getElementById('roomNumber').value,
                text: document.getElementById('activityText').value
            };
            
            if (!activity.activity || !activity.date || !activity.time) {
                showAlert('Please fill required fields');
                return;
            }
            
            const completeData = {
                passport: extractedData,
                activity: activity,
                user: currentUser,
                timestamp: new Date().toISOString()
            };
            
            console.log('Saving to GAS:', completeData);
            
            showAlert('Data saved successfully!');
            setTimeout(() => window.location.href = 'SalesDashboard.html', 1500);
        }

        // ===== UTILITIES =====
        function showAlert(msg) {
            document.getElementById('alertMessage').textContent = msg;
            document.getElementById('alertModal').style.display = 'flex';
        }

        function showLoading(show, msg = 'Processing...') {
            document.getElementById('loadingMessage').textContent = msg;
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }
    </script>
</body>
</html>
