<!DOCTYPE html>
<html lang="en">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Passport Scanner - Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e2b4f 0%, #152238 100%);
            color: white;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h2 {
            color: #ffd966;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-name {
            background: rgba(255,255,255,0.1);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            border: 1px solid #ffd966;
        }
        .back-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
        }
        .content {
            padding: 15px;
        }
        
        /* Options Grid - Mobile friendly */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        .option-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 12px;
            padding: 12px 5px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .option-card.active {
            border-color: #1e2b4f;
            background: white;
        }
        .option-icon {
            font-size: 24px;
            margin-bottom: 3px;
        }
        .option-title {
            font-size: 12px;
            font-weight: 700;
            color: #1e2b4f;
        }
        
        /* Sections */
        .section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: none;
        }
        .section.active {
            display: block;
        }
        
        /* Camera */
        #camera {
            width: 100%;
            border-radius: 12px;
            border: 2px solid #1e2b4f;
            margin-bottom: 10px;
        }
        
        /* ===== MOBILE CROP VIEW ===== */
        .crop-container {
            width: 100%;
            margin: 0 auto;
            position: relative;
            border: 2px solid #1e2b4f;
            border-radius: 12px;
            overflow: hidden;
            background: #1a1a1a;
            touch-action: none; /* مهم جداً للهاتف */
        }
        
        .image-wrapper {
            width: 100%;
            height: 350px;          /* مناسب للهاتف */
            position: relative;
            overflow: hidden;
            touch-action: none;      /* منع التمرير العادي */
            background: #1a1a1a;
        }
        
        #cropImage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            transform-origin: center center;
            will-change: transform;  /* تحسين الأداء */
        }
        
        /* الإطار الأحمر الثابت */
        .crop-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 55%;
            border: 3px solid #ff4444;
            border-radius: 10px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
            pointer-events: none;
            z-index: 10;
        }
        
        .frame-label {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff4444;
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 10px;
            font-weight: bold;
            white-space: nowrap;
        }
        
        /* Zoom Controls - محسنة للمس */
        .zoom-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 12px 0;
            padding: 8px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .zoom-btn {
            width: 44px;            /* أكبر للمس */
            height: 44px;
            border-radius: 50%;
            border: 2px solid #1e2b4f;
            background: white;
            color: #1e2b4f;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        
        .zoom-btn:active {
            background: #1e2b4f;
            color: white;
            transform: scale(0.95);
        }
        
        .zoom-slider {
            width: 150px;
            height: 40px;           /* أطول للمس */
            -webkit-appearance: none;
            background: transparent;
        }
        
        .zoom-slider::-webkit-slider-runnable-track {
            height: 4px;
            background: #e9f0fa;
            border-radius: 2px;
        }
        
        .zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #1e2b4f;
            margin-top: -10px;
            cursor: pointer;
        }
        
        .zoom-percent {
            min-width: 55px;
            text-align: center;
            font-weight: 600;
            color: #1e2b4f;
            font-size: 14px;
        }
        
        /* Buttons - محسنة للمس */
        .button-group {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .btn {
            border: none;
            padding: 14px 20px;     /* أطول للمس */
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            min-width: 120px;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn:active {
            transform: scale(0.97);
            opacity: 0.9;
        }
        
        .btn-primary {
            background: #1e2b4f;
            color: white;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        /* Results */
        .result-box {
            background: #e8f5e8;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            border-left: 5px solid #28a745;
        }
        
        .result-item {
            display: flex;
            margin-bottom: 6px;
            padding: 8px 10px;
            background: white;
            border-radius: 8px;
            font-size: 13px;
        }
        
        .result-label {
            font-weight: bold;
            min-width: 100px;
            color: #1e2b4f;
        }
        
        /* Form */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px;          /* أطول للمس */
            border: 2px solid #e9f0fa;
            border-radius: 10px;
            font-size: 16px;        /* منع التكبير التلقائي */
        }
        
        /* Loading */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        
        .loading-container {
            background: white;
            padding: 20px 30px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        /* Alert */
        #alertModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }
        
        #alertModal > div {
            background: white;
            width: 90%;
            max-width: 320px;
            border-radius: 25px;
            padding: 25px;
            text-align: center;
        }
        
        /* Instructions */
        .mobile-instruction {
            background: #e9f0fa;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 12px;
            font-size: 12px;
            text-align: center;
            color: #1e2b4f;
        }
        
        .mobile-instruction span {
            background: white;
            padding: 4px 8px;
            border-radius: 15px;
            margin: 0 3px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>🛂 Passport Scanner</h2>
            <div class="user-info">
                <span class="user-name" id="userNameDisplay"></span>
                <a href="SalesDashboard.html" class="back-btn">←</a>
            </div>
        </div>

        <div class="content">
            <!-- Options -->
            <div class="options-grid">
                <div class="option-card" onclick="selectOption('scan')" id="optionScan">
                    <div class="option-icon">📸</div>
                    <div class="option-title">Scan</div>
                </div>
                <div class="option-card" onclick="selectOption('gallery')" id="optionGallery">
                    <div class="option-icon">🖼️</div>
                    <div class="option-title">Gallery</div>
                </div>
                <div class="option-card" onclick="selectOption('manual')" id="optionManual">
                    <div class="option-icon">✏️</div>
                    <div class="option-title">Manual</div>
                </div>
            </div>

            <!-- Camera -->
            <div class="section" id="cameraSection">
                <video id="camera" autoplay playsinline></video>
                <div class="button-group">
                    <button class="btn btn-secondary" onclick="startCamera()">📷 Start</button>
                    <button class="btn btn-primary" onclick="captureFromCamera()" disabled id="captureBtn">📸 Capture</button>
                </div>
            </div>

            <!-- Gallery -->
            <div class="section" id="gallerySection">
                <input type="file" id="imageUpload" accept="image/*" capture="environment" style="display:none;">
                <div class="button-group">
                    <button class="btn btn-primary" onclick="document.getElementById('imageUpload').click()">📁 Choose Photo</button>
                </div>
                <div style="text-align:center; margin-top:10px; font-size:12px; color:#666;" id="fileName"></div>
            </div>

            <!-- MOBILE CROP VIEW -->
            <div class="section" id="cropSection">
                <h3 style="margin-bottom:10px; font-size:16px;">👆 Adjust Image in Frame</h3>
                
                <!-- تعليمات للمس -->
                <div class="mobile-instruction">
                    <span>👆 Drag</span> to move image · <span>📌 Pinch</span> to zoom
                </div>
                
                <!-- Zoom Controls -->
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="zoomOut()">−</button>
                    <input type="range" id="zoomSlider" class="zoom-slider" min="0.5" max="3" step="0.1" value="1">
                    <button class="zoom-btn" onclick="zoomIn()">+</button>
                    <span class="zoom-percent" id="zoomPercent">100%</span>
                </div>
                
                <!-- Crop Container -->
                <div class="crop-container">
                    <div class="image-wrapper" id="imageWrapper"
                         ontouchstart="handleTouchStart(event)"
                         ontouchmove="handleTouchMove(event)"
                         ontouchend="handleTouchEnd(event)"
                         ontouchcancel="handleTouchEnd(event)">
                        
                        <img id="cropImage" src="" alt="Passport">
                        
                        <!-- الإطار الأحمر الثابت -->
                        <div class="crop-frame">
                            <div class="frame-label">📷 SCAN AREA</div>
                        </div>
                    </div>
                </div>
                
                <!-- Action Buttons -->
                <div class="button-group">
                    <button class="btn btn-success" onclick="scanVisibleArea()">🔍 Scan Area</button>
                    <button class="btn btn-secondary" onclick="cancelCrop()">← Back</button>
                </div>
            </div>

            <!-- Manual Entry -->
            <div class="section" id="manualSection">
                <div class="form-grid">
                    <input type="text" id="manualName" placeholder="Full Name">
                    <input type="text" id="manualNationality" placeholder="Nationality">
                    <input type="text" id="manualPassport" placeholder="Passport No.">
                    <input type="date" id="manualBirthdate" onchange="calcManualAge()">
                    <input type="text" id="manualAge" placeholder="Age" readonly>
                </div>
                <div class="button-group">
                    <button class="btn btn-success" onclick="processManual()">✓ Continue</button>
                </div>
            </div>

            <!-- Results -->
            <div class="result-box" id="resultBox" style="display:none;">
                <div class="result-item"><span class="result-label">Name:</span> <span id="resName">-</span></div>
                <div class="result-item"><span class="result-label">Nationality:</span> <span id="resNationality">-</span></div>
                <div class="result-item"><span class="result-label">Passport:</span> <span id="resPassport">-</span></div>
                <div class="result-item"><span class="result-label">Birthdate:</span> <span id="resBirthdate">-</span></div>
                <div class="result-item"><span class="result-label">Age:</span> <span id="resAge">-</span></div>
                <div class="button-group">
                    <button class="btn btn-success" onclick="goToActivity()">▶ Next</button>
                    <button class="btn btn-secondary" onclick="resetAll()">↻ New</button>
                </div>
            </div>

            <!-- Activity -->
            <div class="section" id="activitySection">
                <div class="form-grid">
                    <select id="activitySelect">
                        <option value="">Select Activity</option>
                        <option value="Diving">Diving</option>
                        <option value="Snorkeling">Snorkeling</option>
                        <option value="Boat Trip">Boat Trip</option>
                    </select>
                    <input type="date" id="activityDate">
                    <input type="time" id="pickupTime">
                    <input type="text" id="roomNumber" placeholder="Room No.">
                    <textarea id="activityText" rows="3" placeholder="Additional details..."></textarea>
                </div>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="saveAll()">💾 Save</button>
                    <button class="btn btn-secondary" onclick="backToResults()">← Back</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-container">
            <div class="hourglass">⏳</div>
            <span id="loadingMessage">Processing...</span>
        </div>
    </div>

    <!-- Alert -->
    <div id="alertModal">
        <div>
            <h3 style="color:#1e2b4f; margin-bottom:15px;" id="alertMessage"></h3>
            <button class="btn btn-primary" onclick="this.parentElement.parentElement.style.display='none'">OK</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <script>
        // Mobile-optimized variables
        let currentUser = null;
        let stream = null;
        let isCameraStarted = false;
        let extractedData = {};
        
        // Image transform variables
        let img = new Image();
        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let lastTouchDistance = 0;
        let isTouching = false;
        let startTouchX, startTouchY;
        let currentImageData = null;

        const imageElement = document.getElementById('cropImage');
        const wrapper = document.getElementById('imageWrapper');
        const zoomSlider = document.getElementById('zoomSlider');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const userData = sessionStorage.getItem('currentUser');
            if (!userData) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = JSON.parse(userData);
            document.getElementById('userNameDisplay').textContent = currentUser.name || 'User';
            
            setupEvents();
        });

        function setupEvents() {
            zoomSlider.addEventListener('input', (e) => {
                scale = parseFloat(e.target.value);
                updateZoomPercent();
                updateImageTransform();
            });
        }

        // ===== TOUCH HANDLERS (للجوال) =====
        function handleTouchStart(e) {
            e.preventDefault();
            const touches = e.touches;
            
            if (touches.length === 1) {
                // لمسة واحدة للتحريك
                isTouching = true;
                startTouchX = touches[0].clientX - translateX;
                startTouchY = touches[0].clientY - translateY;
            } else if (touches.length === 2) {
                // لمسة مزدوجة للتكبير/التصغير (Pinch)
                lastTouchDistance = getTouchDistance(touches);
            }
        }

        function handleTouchMove(e) {
            e.preventDefault();
            const touches = e.touches;
            
            if (touches.length === 1 && isTouching) {
                // تحريك الصورة
                translateX = touches[0].clientX - startTouchX;
                translateY = touches[0].clientY - startTouchY;
                updateImageTransform();
            } else if (touches.length === 2) {
                // Pinch to zoom
                const currentDistance = getTouchDistance(touches);
                const scaleChange = currentDistance / lastTouchDistance;
                
                scale = Math.min(3, Math.max(0.5, scale * scaleChange));
                lastTouchDistance = currentDistance;
                
                zoomSlider.value = scale;
                updateZoomPercent();
                updateImageTransform();
            }
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            isTouching = false;
            lastTouchDistance = 0;
        }

        function getTouchDistance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // ===== SELECT OPTION =====
        function selectOption(opt) {
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`option${opt.charAt(0).toUpperCase()+opt.slice(1)}`).classList.add('active');
            
            hideAllSections();
            
            if (opt === 'scan') {
                document.getElementById('cameraSection').classList.add('active');
                startCamera();
            } else if (opt === 'gallery') {
                document.getElementById('gallerySection').classList.add('active');
            } else if (opt === 'manual') {
                document.getElementById('manualSection').classList.add('active');
            }
        }

        function hideAllSections() {
            document.getElementById('cameraSection').classList.remove('active');
            document.getElementById('gallerySection').classList.remove('active');
            document.getElementById('cropSection').classList.remove('active');
            document.getElementById('manualSection').classList.remove('active');
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('activitySection').classList.remove('active');
        }

        // ===== CAMERA =====
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                document.getElementById('camera').srcObject = stream;
                isCameraStarted = true;
                document.getElementById('captureBtn').disabled = false;
            } catch (err) {
                showAlert('Camera error: ' + err.message);
            }
        }

        function captureFromCamera() {
            const video = document.getElementById('camera');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            loadImageToCrop(canvas.toDataURL('image/jpeg'));
        }

        // ===== GALLERY =====
        document.getElementById('imageUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            document.getElementById('fileName').textContent = `📁 ${file.name}`;
            
            const reader = new FileReader();
            reader.onload = (event) => loadImageToCrop(event.target.result);
            reader.readAsDataURL(file);
        });

        // ===== CROP FUNCTIONS =====
        function loadImageToCrop(dataUrl) {
            currentImageData = dataUrl;
            
            img.onload = () => {
                scale = 1;
                translateX = 0;
                translateY = 0;
                
                imageElement.src = dataUrl;
                zoomSlider.value = scale;
                updateZoomPercent();
                updateImageTransform();
                
                document.getElementById('gallerySection').classList.remove('active');
                document.getElementById('cropSection').classList.add('active');
            };
            img.src = dataUrl;
        }

        function updateImageTransform() {
            imageElement.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        function updateZoomPercent() {
            document.getElementById('zoomPercent').textContent = Math.round(scale * 100) + '%';
        }

        function zoomIn() {
            if (scale < 3) {
                scale = Math.min(3, scale + 0.2);
                zoomSlider.value = scale;
                updateZoomPercent();
                updateImageTransform();
            }
        }

        function zoomOut() {
            if (scale > 0.5) {
                scale = Math.max(0.5, scale - 0.2);
                zoomSlider.value = scale;
                updateZoomPercent();
                updateImageTransform();
            }
        }

        function resetView() {
            scale = 1;
            translateX = 0;
            translateY = 0;
            zoomSlider.value = scale;
            updateZoomPercent();
            updateImageTransform();
        }

        // ===== SCAN VISIBLE AREA =====
        async function scanVisibleArea() {
            if (!currentImageData) {
                showAlert('No image loaded');
                return;
            }

            showLoading(true, 'Scanning...');

            try {
                // Get frame position
                const frame = document.querySelector('.crop-frame').getBoundingClientRect();
                const imageRect = imageElement.getBoundingClientRect();
                
                // Calculate visible area
                const visibleX = frame.left - imageRect.left;
                const visibleY = frame.top - imageRect.top;
                const visibleWidth = frame.width;
                const visibleHeight = frame.height;
                
                // Create canvas with visible area
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = visibleWidth;
                tempCanvas.height = visibleHeight;
                const ctx = tempCanvas.getContext('2d');
                
                ctx.drawImage(
                    imageElement,
                    visibleX, visibleY, visibleWidth, visibleHeight,
                    0, 0, visibleWidth, visibleHeight
                );
                
                const visibleData = tempCanvas.toDataURL('image/jpeg');
                
                const result = await Tesseract.recognize(
                    visibleData,
                    'ara+eng',
                    { logger: m => console.log(m) }
                );
                
                extractedData = extractData(result.data.text);
                showResults(extractedData);
                
            } catch (error) {
                showAlert('Error: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        function cancelCrop() {
            document.getElementById('cropSection').classList.remove('active');
            document.getElementById('gallerySection').classList.add('active');
        }

        // ===== DATA EXTRACTION =====
        function extractData(text) {
            console.log('Scanned:', text);
            
            const nationalityMap = {
                'مصري': 'Egyptian', 'سعودي': 'Saudi', 'أردني': 'Jordanian',
                'روسي': 'Russian', 'روسيا': 'Russian', 'RUSSIAN': 'Russian'
            };
            
            return {
                name: extractName(text) || 'Not detected',
                nationality: extractNationality(text, nationalityMap) || 'Not detected',
                passport: extractPassport(text) || 'Not detected',
                birthdate: extractBirthdate(text) || 'Not detected'
            };
        }

        function extractName(text) {
            const patterns = [
                /[A-Z][A-Z\s]+\/[A-Z][A-Z\s]+/g,
                /[A-Z][a-z]+\s+[A-Z][a-z]+/g,
                /[أ-ي]{3,}\s+[أ-ي]{3,}/g
            ];
            for (let p of patterns) {
                const match = text.match(p);
                if (match) return match[0];
            }
            return null;
        }

        function extractNationality(text, map) {
            for (let [k, v] of Object.entries(map)) {
                if (text.toUpperCase().includes(k.toUpperCase())) return v;
            }
            return null;
        }

        function extractPassport(text) {
            const match = text.match(/[A-Z0-9]{6,9}/g);
            return match ? match[0] : null;
        }

        function extractBirthdate(text) {
            const match = text.match(/\d{2}[.\/]\d{2}[.\/]\d{4}/g);
            return match ? match[0] : null;
        }

        function calculateAge(birthdate) {
            if (!birthdate || birthdate === 'Not detected') return 'Not detected';
            try {
                const parts = birthdate.split(/[.\/]/);
                if (parts.length !== 3) return 'Not detected';
                
                let d, m, y;
                if (parts[2].length === 4) {
                    [d, m, y] = parts;
                } else {
                    [m, d, y] = parts;
                }
                
                const birth = new Date(y, m-1, d);
                const today = new Date();
                let age = today.getFullYear() - birth.getFullYear();
                if (today < new Date(today.getFullYear(), birth.getMonth(), birth.getDate())) age--;
                return age + ' years';
            } catch {
                return 'Not detected';
            }
        }

        // ===== RESULTS =====
        function showResults(data) {
            const age = calculateAge(data.birthdate);
            
            document.getElementById('resName').textContent = data.name;
            document.getElementById('resNationality').textContent = data.nationality;
            document.getElementById('resPassport').textContent = data.passport;
            document.getElementById('resBirthdate').textContent = data.birthdate;
            document.getElementById('resAge').textContent = age;
            
            hideAllSections();
            document.getElementById('resultBox').style.display = 'block';
        }

        // ===== MANUAL =====
        function calcManualAge() {
            const date = document.getElementById('manualBirthdate').value;
            if (date) {
                const age = calculateAge(date.replace(/-/g, '.'));
                document.getElementById('manualAge').value = age;
            }
        }

        function processManual() {
            const name = document.getElementById('manualName').value;
            const nationality = document.getElementById('manualNationality').value;
            const passport = document.getElementById('manualPassport').value;
            const birthdate = document.getElementById('manualBirthdate').value;
            
            if (!name || !nationality || !passport || !birthdate) {
                showAlert('Please fill all fields');
                return;
            }
            
            extractedData = {
                name: name,
                nationality: nationality,
                passport: passport,
                birthdate: birthdate
            };
            
            showResults(extractedData);
        }

        // ===== NAVIGATION =====
        function goToActivity() {
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('activitySection').classList.add('active');
        }

        function backToResults() {
            document.getElementById('activitySection').classList.remove('active');
            document.getElementById('resultBox').style.display = 'block';
        }

        function resetAll() {
            hideAllSections();
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('active'));
            if (stream) stream.getTracks().forEach(t => t.stop());
        }

        function saveAll() {
            const activity = {
                activity: document.getElementById('activitySelect').value,
                date: document.getElementById('activityDate').value,
                time: document.getElementById('pickupTime').value,
                room: document.getElementById('roomNumber').value,
                text: document.getElementById('activityText').value
            };
            
            if (!activity.activity || !activity.date || !activity.time) {
                showAlert('Please fill required fields');
                return;
            }
            
            console.log('Saved:', {passport: extractedData, activity});
            showAlert('Data saved!');
            setTimeout(() => window.location.href = 'SalesDashboard.html', 1000);
        }

        // ===== UTILITIES =====
        function showAlert(msg) {
            document.getElementById('alertMessage').textContent = msg;
            document.getElementById('alertModal').style.display = 'flex';
        }

        function showLoading(show, msg = 'Processing...') {
            document.getElementById('loadingMessage').textContent = msg;
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }
    </script>
</body>
</html>
