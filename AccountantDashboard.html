<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>لوحة المحاسب</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#0f1f3d;--navy2:#1a3260;--gold:#f5c842;--gold2:#e6b800;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--orange:#ea580c;--purple:#7c3aed;--bg:#f0f4f8;--card:#fff;--border:#dde4f0;--text:#1a2540;--text-lt:#5a6a8a;--radius:16px;--shadow:0 4px 24px rgba(15,31,61,.10);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px;}
    .container{max-width:960px;margin:0 auto;background:white;border-radius:28px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;}
    .header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;padding:18px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
    .header h2{color:var(--gold);font-size:22px;font-weight:900;display:flex;align-items:center;gap:8px;}
    .header-right{display:flex;align-items:center;gap:10px;}
    .user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:40px;padding:6px 18px;color:white;font-size:13px;font-weight:600;}
    .logout-btn{background:#ff6b6b;color:white;border:none;padding:8px 22px;border-radius:40px;cursor:pointer;font-weight:700;font-size:13px;font-family:'Cairo',sans-serif;transition:all .2s;}
    .logout-btn:hover{background:#ee5253;transform:translateY(-2px);}
    .content{padding:32px 28px;}
    .welcome-msg{font-size:26px;color:var(--navy);margin-bottom:20px;font-weight:700;text-align:center;}
    .user-card{background:#f8fafc;border-radius:var(--radius);padding:22px;margin:0 auto 24px;max-width:500px;border:1px solid var(--border);}
    .di{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
    .di:last-child{border-bottom:none;}
    .di-label{font-weight:700;color:var(--navy);font-size:14px;}
    .di-val{color:var(--text-lt);font-size:14px;}
    /* Actions grid */
    .action-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:16px;}
    .action-btn{
      display:flex;align-items:center;justify-content:center;gap:8px;
      padding:14px 18px;border:none;border-radius:40px;font-weight:700;font-size:14px;
      cursor:pointer;font-family:'Cairo',sans-serif;transition:all .2s;text-align:center;
    }
    .action-btn:hover{transform:translateY(-3px);}
    .btn-navy{background:var(--navy);color:var(--gold);}
    .btn-navy:hover{background:var(--gold);color:var(--navy);}
    .btn-blue{background:var(--blue);color:white;box-shadow:0 4px 12px rgba(37,99,235,.3);}
    .btn-blue:hover{background:#1d4ed8;}
    .btn-green{background:var(--green);color:white;box-shadow:0 4px 12px rgba(22,163,74,.3);}
    .btn-green:hover{background:#15803d;}
    .btn-orange{background:var(--orange);color:white;box-shadow:0 4px 12px rgba(234,88,12,.3);}
    .btn-orange:hover{background:#c2410c;}
    .btn-purple{background:var(--purple);color:white;box-shadow:0 4px 12px rgba(124,58,237,.3);}
    .btn-purple:hover{background:#6d28d9;}
    .btn-gold{background:var(--gold);color:var(--navy);}
    .btn-gray{background:#f1f5f9;color:var(--text);}
    /* CASH REGISTER highlighted */
    .btn-cash{
      background:linear-gradient(135deg,#065f46,#16a34a);
      color:white;box-shadow:0 6px 18px rgba(22,163,74,.4);
      grid-column:span 2;font-size:16px;padding:18px;
    }
    .btn-cash:hover{box-shadow:0 8px 24px rgba(22,163,74,.5);}
    /* Modal */
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:9999;}
    .modal.open{display:flex;}
    .modal-box{background:white;width:90%;max-width:380px;border-radius:22px;padding:26px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.3);}
    .modal-icon{font-size:44px;margin-bottom:12px;}
    .modal-msg{color:var(--navy);font-size:15px;font-weight:700;margin-bottom:18px;}
    .modal-btns{display:flex;gap:10px;justify-content:center;}
    @media(max-width:600px){.action-grid{grid-template-columns:1fr;}.btn-cash{grid-column:span 1;}}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>🧾 لوحة المحاسب</h2>
    <div class="header-right">
      <span class="user-chip" id="userNameDisplay"></span>
      <button class="logout-btn" onclick="logout()">🚪 خروج</button>
    </div>
  </div>
  <div class="content" id="mainContent"><div style="text-align:center;padding:40px;color:#94a3b8">⏳ جاري التحميل...</div></div>
</div>

<!-- Alert -->
<div id="alertModal" class="modal">
  <div class="modal-box"><div class="modal-icon">ℹ️</div><div class="modal-msg" id="alertMsg"></div><button class="action-btn btn-navy" onclick="closeAlert()">موافق</button></div>
</div>
<!-- Confirm -->
<div id="confirmModal" class="modal">
  <div class="modal-box"><div class="modal-icon">❓</div><div class="modal-msg" id="confirmMsg"></div>
    <div class="modal-btns">
      <button class="action-btn btn-orange" id="confirmOk">نعم</button>
      <button class="action-btn btn-gray" id="confirmCancel">إلغاء</button>
    </div>
  </div>
</div>

<script>
let currentUser=null;
function showAlert(m){document.getElementById('alertMsg').textContent=m;document.getElementById('alertModal').classList.add('open');}
function closeAlert(){document.getElementById('alertModal').classList.remove('open');}
function showConfirm(m,onOk){document.getElementById('confirmMsg').textContent=m;document.getElementById('confirmModal').classList.add('open');const ok=document.getElementById('confirmOk'),ca=document.getElementById('confirmCancel');const oh=()=>{document.getElementById('confirmModal').classList.remove('open');onOk();ok.removeEventListener('click',oh);ca.removeEventListener('click',ch);};const ch=()=>{document.getElementById('confirmModal').classList.remove('open');ok.removeEventListener('click',oh);ca.removeEventListener('click',ch);};ok.addEventListener('click',oh);ca.addEventListener('click',ch);}
function logout(){showConfirm('هل أنت متأكد من تسجيل الخروج؟',()=>{sessionStorage.removeItem('currentUser');location.href='index.html';});}
function go(url){sessionStorage.setItem('currentUser',JSON.stringify(currentUser));location.href=url;}

function showDashboard(){
  document.getElementById('userNameDisplay').textContent=currentUser.name||'محاسب';
  document.getElementById('mainContent').innerHTML=`
    <div class="welcome-msg">مرحباً ${currentUser.name||''}! 👋</div>
    <div class="user-card">
      <div class="di"><span class="di-label">الاسم</span><span class="di-val">${currentUser.name||'—'}</span></div>
      <div class="di"><span class="di-label">البريد</span><span class="di-val">${currentUser.email||'—'}</span></div>
      <div class="di"><span class="di-label">المركز</span><span class="di-val">${currentUser.centerName||'—'}</span></div>
      <div class="di"><span class="di-label">الفرع</span><span class="di-val">${currentUser.branchName||'—'}</span></div>
    </div>

    <div class="action-grid">
      <!-- ✅ Cash Register — highlighted & double-width -->
      <button class="action-btn btn-cash" onclick="go('CashRegister.html')">💰 إدارة الخزينة اليومية</button>

      <button class="action-btn btn-navy" onclick="go('BookingsToday.html')">📅 حجوزات اليوم</button>
      <button class="action-btn btn-navy" onclick="go('BookingsByActiveDate.html')">📄 الفواتير</button>
      <button class="action-btn btn-blue" onclick="go('SalesReport.html')">📊 تقرير المبيعات</button>
      <button class="action-btn btn-gray" onclick="showAlert('التقارير - قيد التطوير')">📈 التقارير</button>
      <button class="action-btn btn-gray" onclick="showAlert('العمولات - قيد التطوير')">💰 العمولات</button>
      <button class="action-btn btn-orange" onclick="go('ExpenseRevenueEntry.html')">💸 مصروفات وإيرادات</button>
      <button class="action-btn btn-green" onclick="go('EmployeesManagement.html')">👥 إدارة الموظفين</button>
      <button class="action-btn btn-purple" onclick="go('AttendanceManagement.html')">🗓️ الحضور والغياب</button>
      <button class="action-btn btn-gray" onclick="go('MyAttendance.html')">📋 سجل حضوري</button>
      <button class="action-btn btn-gray" onclick="go('TripsPriceListManager.html')">🗺️ أسعار الرحلات</button>
      <button class="action-btn btn-gold" onclick="go('ExchangeRatesDashboard.html')">💱 أسعار الصرف</button>
    </div>`;
}

document.addEventListener('DOMContentLoaded',()=>{
  let ud=sessionStorage.getItem('currentUser');
  if(!ud){const p=new URLSearchParams(location.search).get('user');if(p){ud=decodeURIComponent(p);sessionStorage.setItem('currentUser',ud);}}
  if(!ud){location.href='index.html';return;}
  try{currentUser=JSON.parse(ud);}catch{location.href='index.html';return;}
  if(currentUser.type!=='Accountant'&&currentUser.type!=='Admin'){location.href='index.html';return;}
  showDashboard();
});
</script>
</body>
</html>
