<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>لوحة المحاسب - نظام إدارة مراكز الغوص</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
    body { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; padding:20px; }
    .container { max-width:1200px; margin:0 auto; background:white; border-radius:30px; box-shadow:0 20px 60px rgba(0,0,0,0.3); overflow:hidden; }
    .header { background:linear-gradient(135deg,#1e2b4f 0%,#152238 100%); color:white; padding:20px 30px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px; }
    .header h2 { color:#ffd966; font-size:24px; display:flex; align-items:center; gap:10px; }
    .user-info { display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
    .user-name { background:rgba(255,255,255,0.1); padding:10px 20px; border-radius:40px; border:1px solid #ffd966; }
    .logout-btn { background:#ff6b6b; color:white; border:none; padding:10px 25px; border-radius:40px; cursor:pointer; font-weight:600; transition:0.3s; }
    .logout-btn:hover { background:#ee5253; transform:translateY(-2px); }
    .content { padding:40px 30px; min-height:300px; }
    .welcome-message { font-size:28px; color:#1e2b4f; margin-bottom:20px; font-weight:600; text-align:center; }
    .user-details { background:#f8f9fa; border-radius:20px; padding:25px; margin:20px auto; width:100%; max-width:500px; box-shadow:0 5px 15px rgba(0,0,0,0.05); }
    .detail-item { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #dee2e6; }
    .detail-item:last-child { border-bottom:none; }
    .detail-label { font-weight:600; color:#1e2b4f; }
    .detail-value { color:#495057; }
    .action-buttons { display:flex; gap:15px; margin-top:30px; flex-wrap:wrap; justify-content:center; }
    .btn-primary { background:#1e2b4f; color:white; border:none; padding:12px 30px; border-radius:40px; font-weight:600; font-size:16px; cursor:pointer; transition:0.3s; display:flex; align-items:center; gap:8px; }
    .btn-primary:hover { background:#ffd966; color:#1e2b4f; }
    .btn-secondary { background:#e9f0fa; color:#1e2b4f; border:none; padding:12px 30px; border-radius:40px; font-weight:600; font-size:16px; cursor:pointer; transition:0.3s; }
    .btn-secondary:hover { background:#d0ddeb; }
    .btn-danger { background:#e74c3c; color:white; border:none; padding:12px 30px; border-radius:40px; font-weight:600; font-size:16px; cursor:pointer; transition:0.3s; }
    .btn-danger:hover { background:#c0392b; }
    .btn-success { background:#27ae60; color:white; border:none; padding:12px 30px; border-radius:40px; font-weight:600; font-size:16px; cursor:pointer; transition:0.3s; }
    .btn-success:hover { background:#229954; }
    
    /* الجداول */
    .table-container { overflow-x: auto; margin-top:30px; }
    table { width:100%; border-collapse:collapse; background:white; border-radius:15px; overflow:hidden; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
    th { background:#1e2b4f; color:white; padding:15px; font-weight:600; }
    td { padding:12px 15px; border-bottom:1px solid #dee2e6; text-align:center; }
    tr:hover { background:#f8f9fa; }
    
    /* النوافذ المنبثقة */
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:10000; overflow-y:auto; padding:20px; }
    .modal-content { background:white; width:90%; max-width:800px; border-radius:30px; padding:30px; box-shadow:0 20px 40px rgba(0,0,0,0.3); max-height:90vh; overflow-y:auto; }
    .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; padding-bottom:15px; border-bottom:2px solid #e9f0fa; }
    .modal-header h3 { color:#1e2b4f; font-size:22px; }
    .close-modal { font-size:30px; cursor:pointer; color:#95a5a6; transition:0.3s; }
    .close-modal:hover { color:#e74c3c; }
    
    /* الفورم */
    .form-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; margin-bottom:20px; }
    .form-group { margin-bottom:15px; }
    .form-group label { display:block; margin-bottom:8px; color:#1e2b4f; font-weight:600; font-size:14px; }
    .form-group input, .form-group select, .form-group textarea { width:100%; padding:12px 15px; border:2px solid #e9f0fa; border-radius:12px; font-size:14px; transition:0.3s; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline:none; border-color:#1e2b4f; }
    .form-group.checkbox { display:flex; align-items:center; gap:10px; }
    .form-group.checkbox input { width:auto; }
    
    /* تبويبات */
    .tabs { display:flex; gap:10px; margin-bottom:30px; flex-wrap:wrap; }
    .tab { padding:12px 25px; background:#e9f0fa; border-radius:40px; cursor:pointer; transition:0.3s; font-weight:600; color:#1e2b4f; }
    .tab.active { background:#1e2b4f; color:white; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    
    /* بطاقات سريعة */
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-bottom:30px; }
    .stat-card { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white; padding:25px; border-radius:20px; text-align:center; box-shadow:0 10px 20px rgba(0,0,0,0.2); }
    .stat-card h3 { font-size:16px; opacity:0.9; margin-bottom:10px; }
    .stat-card .number { font-size:36px; font-weight:700; }
    
    /* صور */
    .image-preview { width:100px; height:100px; border:2px dashed #dee2e6; border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; margin-top:10px; background-size:cover; background-position:center; }
    
    /* التحميل */
    .loader { border:4px solid #f3f3f3; border-top:4px solid #1e2b4f; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:20px auto; }
    @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
    
    @media(max-width:768px) {
      .form-grid { grid-template-columns:1fr; }
      .action-buttons button { width:100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>🧾 لوحة المحاسب</h2>
      <div class="user-info">
        <span class="user-name" id="userNameDisplay"></span>
        <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
      </div>
    </div>
    <div class="content" id="mainContent"></div>
  </div>

  <!-- مودال التنبيه -->
  <div id="customAlertModal" class="modal">
    <div class="modal-content" style="max-width:400px; text-align:center;">
      <div style="font-size:50px; margin-bottom:20px;">ℹ️</div>
      <h3 style="color:#1e2b4f; margin-bottom:20px;" id="alertMessage"></h3>
      <button id="alertOk" class="btn-primary" style="margin:0 auto;">موافق</button>
    </div>
  </div>

  <!-- مودال التأكيد -->
  <div id="customConfirmModal" class="modal">
    <div class="modal-content" style="max-width:400px; text-align:center;">
      <div style="font-size:50px; margin-bottom:20px;">❓</div>
      <h3 style="color:#1e2b4f; margin-bottom:20px;" id="confirmMessage"></h3>
      <div style="display:flex; gap:15px; justify-content:center;">
        <button id="confirmOk" class="btn-primary" style="background:#e74c3c;">نعم</button>
        <button id="confirmCancel" class="btn-secondary">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- مودال إضافة موظف جديد -->
  <div id="addEmployeeModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>➕ إضافة موظف جديد</h3>
        <span class="close-modal" onclick="closeModal('addEmployeeModal')">&times;</span>
      </div>
      <div class="tabs" id="employeeTabs">
        <div class="tab active" onclick="switchTab('basic')">📋 بيانات أساسية</div>
        <div class="tab" onclick="switchTab('salary')">💰 بيانات الراتب</div>
        <div class="tab" onclick="switchTab('system')">💻 بيانات النظام</div>
        <div class="tab" onclick="switchTab('images')">🖼️ صور</div>
      </div>
      
      <!-- تبويب البيانات الأساسية -->
      <div id="tab-basic" class="tab-content active">
        <div class="form-grid">
          <div class="form-group">
            <label>الاسم الكامل *</label>
            <input type="text" id="empFullName" placeholder="أدخل الاسم الكامل">
          </div>
          <div class="form-group">
            <label>الوظيفة *</label>
            <input type="text" id="empPosition" placeholder="مثال: سيلز، محاسب، فني">
          </div>
          <div class="form-group">
            <label>رقم الهاتف</label>
            <input type="text" id="empPhone" placeholder="رقم الهاتف">
          </div>
          <div class="form-group">
            <label>تاريخ بداية العمل *</label>
            <input type="date" id="empStartDate">
          </div>
          <div class="form-group">
            <label>الفرع *</label>
            <select id="empBranch">
              <option value="">اختر الفرع</option>
            </select>
          </div>
          <div class="form-group">
            <label>الاسم الحركي (للإيميل)</label>
            <input type="text" id="empUsername" placeholder="مثال: ahmed">
          </div>
        </div>
        <div style="display:flex; justify-content:space-between; margin-top:20px;">
          <button class="btn-secondary" onclick="switchTab('salary')">التالي ▶</button>
        </div>
      </div>
      
      <!-- تبويب بيانات الراتب -->
      <div id="tab-salary" class="tab-content">
        <div class="form-grid">
          <div class="form-group">
            <label>الراتب الشهري</label>
            <input type="number" id="empMonthlySalary" placeholder="0">
          </div>
          <div class="form-group">
            <label>نظام الحساب *</label>
            <select id="empPaymentSystem">
              <option value="مرتب فقط">مرتب فقط</option>
              <option value="مرتب+عمولة">مرتب + عمولة</option>
              <option value="عمولة فقط">عمولة فقط</option>
            </select>
          </div>
        </div>
        <div style="display:flex; justify-content:space-between; margin-top:20px;">
          <button class="btn-secondary" onclick="switchTab('basic')">▶ السابق</button>
          <button class="btn-primary" onclick="switchTab('system')">التالي ▶</button>
        </div>
      </div>
      
      <!-- تبويب بيانات النظام -->
      <div id="tab-system" class="tab-content">
        <div class="form-group checkbox">
          <input type="checkbox" id="empHasAccess" onchange="toggleSystemFields()">
          <label>لديه حساب في النظام</label>
        </div>
        
        <div id="systemFields" style="display:none;">
          <div class="form-grid">
            <div class="form-group">
              <label>البريد الإلكتروني</label>
              <input type="email" id="empEmail" readonly placeholder="سيتولد تلقائياً">
            </div>
            <div class="form-group">
              <label>كلمة المرور</label>
              <input type="password" id="empPassword" placeholder="كلمة المرور">
            </div>
            <div class="form-group">
              <label>نوع المستخدم</label>
              <select id="empUserType">
                <option value="Employee">موظف</option>
                <option value="Accountant">محاسب</option>
                <option value="Sales">سيلز</option>
                <option value="Manager">مدير</option>
              </select>
            </div>
            <div class="form-group">
              <label>العنوان</label>
              <input type="text" id="empAddress" placeholder="العنوان">
            </div>
          </div>
        </div>
        
        <div style="display:flex; justify-content:space-between; margin-top:20px;">
          <button class="btn-secondary" onclick="switchTab('salary')">▶ السابق</button>
          <button class="btn-primary" onclick="switchTab('images')">التالي ▶</button>
        </div>
      </div>
      
      <!-- تبويب الصور -->
      <div id="tab-images" class="tab-content">
        <div class="form-grid">
          <div class="form-group">
            <label>صورة الموظف</label>
            <div class="image-preview" id="previewEmployee" onclick="uploadImage('employee')">➕</div>
            <input type="file" id="empImageEmployee" accept="image/*" style="display:none;" onchange="previewImage(this, 'previewEmployee')">
          </div>
          <div class="form-group">
            <label>البطاقة الشخصية (وجه)</label>
            <div class="image-preview" id="previewIdFront" onclick="uploadImage('idFront')">➕</div>
            <input type="file" id="empImageIdFront" accept="image/*" style="display:none;" onchange="previewImage(this, 'previewIdFront')">
          </div>
          <div class="form-group">
            <label>البطاقة الشخصية (ظهر)</label>
            <div class="image-preview" id="previewIdBack" onclick="uploadImage('idBack')">➕</div>
            <input type="file" id="empImageIdBack" accept="image/*" style="display:none;" onchange="previewImage(this, 'previewIdBack')">
          </div>
          <div class="form-group">
            <label>الاستعلام الأمني</label>
            <div class="image-preview" id="previewSecurity" onclick="uploadImage('security')">➕</div>
            <input type="file" id="empImageSecurity" accept="image/*" style="display:none;" onchange="previewImage(this, 'previewSecurity')">
          </div>
        </div>
        
        <div style="display:flex; justify-content:space-between; margin-top:20px;">
          <button class="btn-secondary" onclick="switchTab('system')">▶ السابق</button>
          <button class="btn-success" onclick="saveNewEmployee()">💾 حفظ الموظف</button>
        </div>
      </div>
    </div>
  </div>

  <!-- مودال تعديل الراتب -->
  <div id="editSalaryModal" class="modal">
    <div class="modal-content" style="max-width:500px;">
      <div class="modal-header">
        <h3>💰 تعديل الراتب</h3>
        <span class="close-modal" onclick="closeModal('editSalaryModal')">&times;</span>
      </div>
      <div id="editSalaryEmployeeInfo" style="background:#f8f9fa; padding:15px; border-radius:12px; margin-bottom:20px;">
        <p><strong>الموظف:</strong> <span id="editSalaryName"></span></p>
        <p><strong>الراتب الحالي:</strong> <span id="editSalaryCurrent"></span></p>
      </div>
      <div class="form-group">
        <label>الراتب الجديد *</label>
        <input type="number" id="editSalaryNew" placeholder="أدخل الراتب الجديد">
      </div>
      <div class="form-group">
        <label>تاريخ التفعيل *</label>
        <input type="date" id="editSalaryDate">
      </div>
      <div class="form-group">
        <label>الشهر *</label>
        <select id="editSalaryMonth">
          <option value="1">يناير</option>
          <option value="2">فبراير</option>
          <option value="3">مارس</option>
          <option value="4">أبريل</option>
          <option value="5">مايو</option>
          <option value="6">يونيو</option>
          <option value="7">يوليو</option>
          <option value="8">أغسطس</option>
          <option value="9">سبتمبر</option>
          <option value="10">أكتوبر</option>
          <option value="11">نوفمبر</option>
          <option value="12">ديسمبر</option>
        </select>
      </div>
      <div class="form-group">
        <label>السنة *</label>
        <input type="number" id="editSalaryYear" value="2025">
      </div>
      <div class="form-group">
        <label>سبب التعديل</label>
        <input type="text" id="editSalaryReason" placeholder="مثال: زيادة سنوية">
      </div>
      <div style="display:flex; gap:15px; justify-content:center; margin-top:25px;">
        <button class="btn-success" onclick="confirmEditSalary()">حفظ التعديل</button>
        <button class="btn-secondary" onclick="closeModal('editSalaryModal')">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- مودال إيقاف/تفعيل موظف -->
  <div id="statusModal" class="modal">
    <div class="modal-content" style="max-width:500px;">
      <div class="modal-header">
        <h3>⛔ تغيير حالة الموظف</h3>
        <span class="close-modal" onclick="closeModal('statusModal')">&times;</span>
      </div>
      <div id="statusEmployeeInfo" style="background:#f8f9fa; padding:15px; border-radius:12px; margin-bottom:20px;">
        <p><strong>الموظف:</strong> <span id="statusName"></span></p>
        <p><strong>الحالة الحالية:</strong> <span id="statusCurrent"></span></p>
      </div>
      <div class="form-group">
        <label>الحالة الجديدة *</label>
        <select id="statusNew">
          <option value="نشط">نشط</option>
          <option value="موقوف">موقوف</option>
          <option value="إجازة">إجازة</option>
        </select>
      </div>
      <div class="form-group">
        <label>تاريخ التفعيل *</label>
        <input type="date" id="statusDate">
      </div>
      <div class="form-group">
        <label>تاريخ الانتهاء (للمؤقت)</label>
        <input type="date" id="statusEndDate">
      </div>
      <div class="form-group">
        <label>السبب</label>
        <input type="text" id="statusReason" placeholder="سبب التغيير">
      </div>
      <div class="form-group">
        <label>ملاحظات</label>
        <textarea id="statusNotes" rows="3"></textarea>
      </div>
      <div class="form-group checkbox" id="deactivateAccountField" style="display:none;">
        <input type="checkbox" id="statusDeactivateAccount">
        <label>تعطيل حساب النظام نهائياً</label>
      </div>
      <div style="display:flex; gap:15px; justify-content:center; margin-top:25px;">
        <button class="btn-danger" onclick="confirmStatusChange()">تأكيد</button>
        <button class="btn-secondary" onclick="closeModal('statusModal')">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- مودال تقرير شهري -->
  <div id="reportModal" class="modal">
    <div class="modal-content" style="max-width:600px;">
      <div class="modal-header">
        <h3>📊 إنشاء تقرير شهري</h3>
        <span class="close-modal" onclick="closeModal('reportModal')">&times;</span>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>الشهر *</label>
          <select id="reportMonth">
            <option value="Jan">يناير</option>
            <option value="Feb">فبراير</option>
            <option value="Mar">مارس</option>
            <option value="Apr">أبريل</option>
            <option value="May">مايو</option>
            <option value="Jun">يونيو</option>
            <option value="Jul">يوليو</option>
            <option value="Aug">أغسطس</option>
            <option value="Sep">سبتمبر</option>
            <option value="Oct">أكتوبر</option>
            <option value="Nov">نوفمبر</option>
            <option value="Dec">ديسمبر</option>
          </select>
        </div>
        <div class="form-group">
          <label>السنة *</label>
          <input type="number" id="reportYear" value="2025">
        </div>
      </div>
      <div style="display:flex; gap:15px; justify-content:center; margin-top:25px;">
        <button class="btn-primary" onclick="generateReport()">إنشاء التقرير</button>
        <button class="btn-secondary" onclick="closeModal('reportModal')">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- مودال عرض سجل الراتب -->
  <div id="salaryHistoryModal" class="modal">
    <div class="modal-content" style="max-width:700px;">
      <div class="modal-header">
        <h3>📜 سجل تعديلات الراتب</h3>
        <span class="close-modal" onclick="closeModal('salaryHistoryModal')">&times;</span>
      </div>
      <div id="salaryHistoryContent"></div>
    </div>
  </div>

  <script>
    let currentUser = null;
    let currentEmployeeSerial = null;
    let branches = [];
    let employees = [];

    // ✅ خريطة الصفحات
    const PAGES = {
      Login:               'index.html',
      Dashboard:           'Dashboard.html',
      OwnerDashboard:      'OwnerDashboard.html',
      SalesDashboard:      'SalesDashboard.html',
      AccountantDashboard: 'AccountantDashboard.html',
      BookingsToday:       'BookingsToday.html',
      BookingsByActiveDate: 'BookingsByActiveDate.html'
    };

    function navigateTo(page) {
      window.location.href = PAGES[page] || (page + '.html');
    }

    function showAlert(message) {
      const modal = document.getElementById('customAlertModal');
      document.getElementById('alertMessage').innerText = message;
      modal.style.display = 'flex';
      const okBtn = document.getElementById('alertOk');
      const h = () => { modal.style.display='none'; okBtn.removeEventListener('click',h); };
      okBtn.addEventListener('click', h);
    }

    function showConfirm(message, onConfirm) {
      const modal = document.getElementById('customConfirmModal');
      document.getElementById('confirmMessage').innerText = message;
      modal.style.display = 'flex';
      const ok = document.getElementById('confirmOk');
      const cancel = document.getElementById('confirmCancel');
      const okH = () => { modal.style.display='none'; onConfirm(); ok.removeEventListener('click',okH); cancel.removeEventListener('click',cancelH); };
      const cancelH = () => { modal.style.display='none'; ok.removeEventListener('click',okH); cancel.removeEventListener('click',cancelH); };
      ok.addEventListener('click', okH);
      cancel.addEventListener('click', cancelH);
    }

    function closeModal(modalId) {
      document.getElementById(modalId).style.display = 'none';
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      if (tabName === 'basic') document.querySelector('.tab').classList.add('active');
      else if (tabName === 'salary') document.querySelectorAll('.tab')[1].classList.add('active');
      else if (tabName === 'system') document.querySelectorAll('.tab')[2].classList.add('active');
      else if (tabName === 'images') document.querySelectorAll('.tab')[3].classList.add('active');
      
      document.getElementById(`tab-${tabName}`).classList.add('active');
    }

    function toggleSystemFields() {
      const hasAccess = document.getElementById('empHasAccess').checked;
      document.getElementById('systemFields').style.display = hasAccess ? 'block' : 'none';
      if (hasAccess) generateEmail();
    }

    function generateEmail() {
      const username = document.getElementById('empUsername').value;
      const position = document.getElementById('empPosition').value;
      const centerName = currentUser?.centerName || 'center';
      
      if (username && position) {
        const cleanUser = username.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
        const cleanPos = position.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
        const cleanCenter = centerName.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
        document.getElementById('empEmail').value = `${cleanUser}${cleanPos}@${cleanCenter}.com`;
      }
    }

    function uploadImage(type) {
      document.getElementById(`empImage${type.charAt(0).toUpperCase() + type.slice(1)}`).click();
    }

    function previewImage(input, previewId) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById(previewId).style.backgroundImage = `url('${e.target.result}')`;
          document.getElementById(previewId).style.backgroundSize = 'cover';
          document.getElementById(previewId).innerHTML = '';
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    // ==================== دوال API ====================
    async function callApi(action, params = {}, method = 'GET') {
      const baseUrl = '<?= getAppUrl() ?>';
      const url = new URL(baseUrl);
      
      if (method === 'GET') {
        url.searchParams.set('action', action);
        Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
        const res = await fetch(url.toString());
        return res.json();
      } else {
        const res = await fetch(url.toString(), {
          method: 'POST',
          body: JSON.stringify({ action, ...params }),
          headers: { 'Content-Type': 'application/json' }
        });
        return res.json();
      }
    }

    // ==================== تحميل البيانات ====================
    async function loadBranches() {
      const result = await callApi('getActiveBranchesForDropdown');
      if (Array.isArray(result)) {
        branches = result;
        const select = document.getElementById('empBranch');
        select.innerHTML = '<option value="">اختر الفرع</option>';
        branches.forEach(b => {
          select.innerHTML += `<option value="${b.id}">${b.name}</option>`;
        });
      }
    }

    async function loadEmployees() {
      const result = await callApi('getAllEmployees');
      if (Array.isArray(result)) {
        employees = result;
        displayEmployeesTable();
      }
    }

    function displayEmployeesTable() {
      let html = `
        <div class="action-buttons" style="justify-content:space-between;">
          <button class="btn-success" onclick="openAddEmployeeModal()">➕ إضافة موظف جديد</button>
          <button class="btn-primary" onclick="openReportModal()">📊 تقرير شهري</button>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>الرقم</th>
                <th>الاسم</th>
                <th>الوظيفة</th>
                <th>الراتب</th>
                <th>نظام الحساب</th>
                <th>الحالة</th>
                <th>الإجراءات</th>
              </tr>
            </thead>
            <tbody>
      `;

      employees.forEach(emp => {
        html += `
          <tr>
            <td>${emp.serial}</td>
            <td>${emp.name}</td>
            <td>${emp.position}</td>
            <td>${emp.monthlySalary}</td>
            <td>${emp.paymentSystem}</td>
            <td><span style="color:${emp.status === 'نشط' ? '#27ae60' : '#e74c3c'}">${emp.status}</span></td>
            <td>
              <button class="btn-secondary" style="padding:5px 10px; font-size:12px;" onclick="viewSalaryHistory('${emp.serial}')">📜 سجل الراتب</button>
              <button class="btn-primary" style="padding:5px 10px; font-size:12px;" onclick="openEditSalaryModal('${emp.serial}')">💰 تعديل راتب</button>
              <button class="btn-danger" style="padding:5px 10px; font-size:12px;" onclick="openStatusModal('${emp.serial}')">⛔ تغيير حالة</button>
            </td>
          </tr>
        `;
      });

      html += `</tbody></table></div>`;
      document.getElementById('mainContent').innerHTML = html;
    }

    // ==================== نوافذ الإجراءات ====================
    function openAddEmployeeModal() {
      document.getElementById('addEmployeeModal').style.display = 'flex';
      loadBranches();
      // Reset form
      document.getElementById('empFullName').value = '';
      document.getElementById('empPosition').value = '';
      document.getElementById('empPhone').value = '';
      document.getElementById('empStartDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('empUsername').value = '';
      document.getElementById('empMonthlySalary').value = '';
      document.getElementById('empPaymentSystem').value = 'مرتب فقط';
      document.getElementById('empHasAccess').checked = false;
      document.getElementById('empPassword').value = '';
      document.getElementById('empUserType').value = 'Employee';
      document.getElementById('empAddress').value = '';
      document.getElementById('systemFields').style.display = 'none';
      
      // Reset previews
      ['previewEmployee', 'previewIdFront', 'previewIdBack', 'previewSecurity'].forEach(id => {
        document.getElementById(id).style.backgroundImage = '';
        document.getElementById(id).innerHTML = '➕';
      });
    }

    async function viewSalaryHistory(serial) {
      const history = await callApi('getSalaryHistory', { serial });
      if (Array.isArray(history) && history.length > 0) {
        let html = '<table><thead><tr><th>الراتب</th><th>الشهر</th><th>السنة</th><th>تاريخ التفعيل</th><th>السبب</th></tr></thead><tbody>';
        history.forEach(h => {
          html += `<tr><td>${h.salary}</td><td>${h.month}</td><td>${h.year}</td><td>${h.effectiveDate}</td><td>${h.reason}</td></tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('salaryHistoryContent').innerHTML = html;
        document.getElementById('salaryHistoryModal').style.display = 'flex';
      } else {
        showAlert('لا يوجد سجل تعديلات لهذا الموظف');
      }
    }

    function openEditSalaryModal(serial) {
      const emp = employees.find(e => e.serial === serial);
      if (emp) {
        currentEmployeeSerial = serial;
        document.getElementById('editSalaryName').innerText = emp.name;
        document.getElementById('editSalaryCurrent').innerText = emp.monthlySalary;
        document.getElementById('editSalaryNew').value = emp.monthlySalary;
        document.getElementById('editSalaryDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('editSalaryMonth').value = new Date().getMonth() + 1;
        document.getElementById('editSalaryYear').value = new Date().getFullYear();
        document.getElementById('editSalaryReason').value = '';
        document.getElementById('editSalaryModal').style.display = 'flex';
      }
    }

    async function confirmEditSalary() {
      const data = {
        serial: currentEmployeeSerial,
        fullName: document.getElementById('editSalaryName').innerText,
        newSalary: parseFloat(document.getElementById('editSalaryNew').value),
        effectiveMonth: document.getElementById('editSalaryMonth').value,
        effectiveYear: document.getElementById('editSalaryYear').value,
        effectiveDate: document.getElementById('editSalaryDate').value,
        reason: document.getElementById('editSalaryReason').value
      };

      const result = await callApi('updateEmployeeSalary', data, 'POST');
      if (result.success) {
        showAlert('تم تعديل الراتب بنجاح');
        closeModal('editSalaryModal');
        loadEmployees();
      } else {
        showAlert('خطأ: ' + result.message);
      }
    }

    function openStatusModal(serial) {
      const emp = employees.find(e => e.serial === serial);
      if (emp) {
        currentEmployeeSerial = serial;
        document.getElementById('statusName').innerText = emp.name;
        document.getElementById('statusCurrent').innerText = emp.status;
        document.getElementById('statusNew').value = emp.status === 'نشط' ? 'موقوف' : 'نشط';
        document.getElementById('statusDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('statusEndDate').value = '';
        document.getElementById('statusReason').value = '';
        document.getElementById('statusNotes').value = '';
        document.getElementById('deactivateAccountField').style.display = 
          (emp.status === 'نشط' && document.getElementById('statusNew').value === 'موقوف') ? 'block' : 'none';
        document.getElementById('statusModal').style.display = 'flex';
      }
    }

    async function confirmStatusChange() {
      const data = {
        serial: currentEmployeeSerial,
        fullName: document.getElementById('statusName').innerText,
        newStatus: document.getElementById('statusNew').value,
        reason: document.getElementById('statusReason').value,
        effectiveDate: document.getElementById('statusDate').value,
        endDate: document.getElementById('statusEndDate').value,
        notes: document.getElementById('statusNotes').value,
        deactivateAccount: document.getElementById('statusDeactivateAccount')?.checked || false
      };

      const result = await callApi('updateEmployeeStatus', data, 'POST');
      if (result.success) {
        showAlert('تم تحديث حالة الموظف');
        closeModal('statusModal');
        loadEmployees();
      } else {
        showAlert('خطأ: ' + result.message);
      }
    }

    function openReportModal() {
      document.getElementById('reportModal').style.display = 'flex';
    }

    async function generateReport() {
      const month = document.getElementById('reportMonth').value;
      const year = document.getElementById('reportYear').value;
      
      const result = await callApi('generateMonthlyReport', { month, year });
      if (result.success) {
        showAlert(result.message);
        closeModal('reportModal');
      } else {
        showAlert('خطأ: ' + result.message);
      }
    }

    async function saveNewEmployee() {
      // تجميع البيانات
      const data = {
        fullName: document.getElementById('empFullName').value,
        position: document.getElementById('empPosition').value,
        phone: document.getElementById('empPhone').value,
        startDate: document.getElementById('empStartDate').value,
        branchId: document.getElementById('empBranch').value,
        branchName: branches.find(b => b.id === document.getElementById('empBranch').value)?.name || '',
        username: document.getElementById('empUsername').value,
        monthlySalary: parseFloat(document.getElementById('empMonthlySalary').value) || 0,
        paymentSystem: document.getElementById('empPaymentSystem').value,
        hasSystemAccess: document.getElementById('empHasAccess').checked,
        centerId: currentUser?.centerId,
        centerName: currentUser?.centerName
      };

      if (data.hasSystemAccess) {
        data.password = document.getElementById('empPassword').value;
        data.userType = document.getElementById('empUserType').value;
        data.address = document.getElementById('empAddress').value;
        data.email = document.getElementById('empEmail').value;
      }

      // التحقق من الحقول المطلوبة
      if (!data.fullName || !data.position || !data.startDate || !data.branchId) {
        showAlert('يرجى ملء جميع الحقول المطلوبة');
        return;
      }

      const result = await callApi('addNewEmployee', data, 'POST');
      if (result.success) {
        showAlert('تم إضافة الموظف بنجاح');
        closeModal('addEmployeeModal');
        loadEmployees();
      } else {
        showAlert('خطأ: ' + result.message);
      }
    }

    // ==================== الصفحة الرئيسية ====================
    function showDashboard() {
      document.getElementById('userNameDisplay').textContent = currentUser.name || '';
      
      let dashboardHtml = `
        <div class="welcome-message">مرحباً بك في لوحة المحاسب</div>
        <div class="user-details">
          <div class="detail-item"><span class="detail-label">الاسم:</span><span class="detail-value">${currentUser.name||'غير محدد'}</span></div>
          <div class="detail-item"><span class="detail-label">البريد الإلكتروني:</span><span class="detail-value">${currentUser.email||'غير محدد'}</span></div>
          <div class="detail-item"><span class="detail-label">المركز:</span><span class="detail-value">${currentUser.centerName||'غير محدد'}</span></div>
          <div class="detail-item"><span class="detail-label">الفرع:</span><span class="detail-value">${currentUser.branchName||'غير محدد'}</span></div>
        </div>
        <div class="action-buttons">
          <button class="btn-primary"   onclick="window.location.href='BookingsByActiveDate.html'">📄 عرض التنفيذ</button>
          <button class="btn-secondary" onclick="loadEmployees()">📋 إدارة الموظفين</button>
          <button class="btn-primary"   onclick="window.location.href='BookingsToday.html'">📅 حجوزات اليوم</button>
          <button class="btn-secondary" onclick="window.location.href='ExpenseRevenueEntry.html'">💸 مصروفات وإيرادات</button>
        </div>
      `;
      
      document.getElementById('mainContent').innerHTML = dashboardHtml;
    }

    // ==================== التحميل الأولي ====================
    document.addEventListener('DOMContentLoaded', function() {
      let userData = sessionStorage.getItem('currentUser');

      if (!userData) {
        try {
          const p = new URLSearchParams(window.location.search);
          const u = p.get('user');
          if (u) { userData = decodeURIComponent(u); sessionStorage.setItem('currentUser', userData); }
        } catch(e) {}
      }

      if (!userData) {
        document.getElementById('mainContent').innerHTML = `
          <div style="text-align:center;padding:50px;">
            <h3>لا يوجد مستخدم مسجل الدخول</h3>
            <button class="btn-primary" style="margin:20px auto 0;" onclick="window.location.href='index.html'">الذهاب إلى تسجيل الدخول</button>
          </div>`;
        return;
      }

      try {
        currentUser = JSON.parse(userData);
        if (currentUser.type !== 'Accountant' && currentUser.type !== 'Admin' && currentUser.type !== 'Owner') {
          window.location.href = 'index.html'; return;
        }
        showDashboard();
        
        // أحداث تغيير الإيميل
        document.getElementById('empUsername')?.addEventListener('input', generateEmail);
        document.getElementById('empPosition')?.addEventListener('input', generateEmail);
        
      } catch(e) {
        window.location.href = 'index.html';
      }
    });

    function logout() {
      showConfirm('هل أنت متأكد من تسجيل الخروج؟', function() {
        sessionStorage.removeItem('currentUser');
        window.location.href = 'index.html';
      });
    }

    // دوال عامة
    window.logout = logout;
    window.showAlert = showAlert;
    window.showConfirm = showConfirm;
    window.closeModal = closeModal;
    window.switchTab = switchTab;
    window.toggleSystemFields = toggleSystemFields;
    window.uploadImage = uploadImage;
    window.previewImage = previewImage;
    window.openAddEmployeeModal = openAddEmployeeModal;
    window.viewSalaryHistory = viewSalaryHistory;
    window.openEditSalaryModal = openEditSalaryModal;
    window.confirmEditSalary = confirmEditSalary;
    window.openStatusModal = openStatusModal;
    window.confirmStatusChange = confirmStatusChange;
    window.openReportModal = openReportModal;
    window.generateReport = generateReport;
    window.saveNewEmployee = saveNewEmployee;
    window.loadEmployees = loadEmployees;
  </script>
</body>
</html>
