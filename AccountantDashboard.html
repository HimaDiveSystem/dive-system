<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>لوحة المحاسب</title>
</head>
<body>
  <h1>مرحباً بك في لوحة المحاسب</h1>
  <div id="userInfo"></div>
  <button onclick="logout()">تسجيل الخروج</button>

  <script>
    // قراءة المستخدم من الرابط
    const urlParams = new URLSearchParams(window.location.search);
    const userParam = urlParams.get('user');

    if (userParam) {
      try {
        const user = JSON.parse(decodeURIComponent(userParam));
        document.getElementById('userInfo').innerText = 'مرحباً ' + (user.name || 'محاسب');
        console.log('✅ المستخدم:', user);
      } catch (e) {
        console.error('خطأ في بيانات المستخدم');
        window.top.location.href = '?page=Login';
      }
    } else {
      console.log('❌ لا يوجد مستخدم');
      window.top.location.href = '?page=Login';
    }

    function logout() {
      window.top.location.href = '?page=Login';
    }
  </script>
</body>
</html>
