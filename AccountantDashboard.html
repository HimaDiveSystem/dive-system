<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>لوحة المحاسب - نظام إدارة مراكز الغوص</title>
  <style>
    /* جميع الأنماط السابقة كما هي */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #1e2b4f 0%, #152238 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .header h2 {
      color: #ffd966;
      font-size: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .user-name {
      background: rgba(255,255,255,0.1);
      padding: 10px 20px;
      border-radius: 40px;
      border: 1px solid #ffd966;
    }

    .logout-btn {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    .logout-btn:hover {
      background: #ee5253;
      transform: translateY(-2px);
    }

    .content {
      padding: 40px 30px;
      min-height: 300px;
    }

    .welcome-message {
      font-size: 28px;
      color: #1e2b4f;
      margin-bottom: 20px;
      font-weight: 600;
      text-align: center;
    }

    .user-details {
      background: #f8f9fa;
      border-radius: 20px;
      padding: 25px;
      margin: 20px 0;
      width: 100%;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #dee2e6;
    }

    .detail-item:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-weight: 600;
      color: #1e2b4f;
    }

    .detail-value {
      color: #495057;
    }

    .action-buttons {
      display: flex;
      gap: 15px;
      margin-top: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-primary {
      background: #1e2b4f;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary:hover {
      background: #ffd966;
      color: #1e2b4f;
    }

    .btn-secondary {
      background: #e9f0fa;
      color: #1e2b4f;
      border: none;
      padding: 12px 30px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-secondary:hover {
      background: #d0ddeb;
    }

    @media (max-width: 600px) {
      .action-buttons {
        flex-direction: column;
        width: 100%;
      }
      .btn-primary, .btn-secondary {
        width: 100%;
        justify-content: center;
      }
    }
    .loader {
  border: 4px solid #f3f3f3;
  border-top: 4px solid #1e2b4f;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin: 20px auto;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>🧾 لوحة المحاسب</h2>
      <div class="user-info">
        <span class="user-name" id="userNameDisplay"></span>
        <button class="logout-btn" onclick="window.logout()">تسجيل الخروج</button>
      </div>
    </div>

    <div class="content" id="mainContent">
      <!-- المحتوى سيتم ملؤه ديناميكياً -->
    </div>
  </div>

  <!-- مودال مخصص للرسائل -->
  <div id="customAlertModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 9999;">
    <div style="background: white; width: 400px; border-radius: 30px; padding: 30px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3);">
      <div style="font-size: 50px; margin-bottom: 20px;">ℹ️</div>
      <h3 style="color: #1e2b4f; margin-bottom: 20px;" id="alertMessage"></h3>
      <button id="alertOk" class="btn-primary">موافق</button>
    </div>
  </div>

  <!-- مودال التأكيد -->
  <div id="customConfirmModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 9999;">
    <div style="background: white; width: 400px; border-radius: 30px; padding: 30px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3);">
      <div style="font-size: 50px; margin-bottom: 20px;">❓</div>
      <h3 style="color: #1e2b4f; margin-bottom: 20px;" id="confirmMessage"></h3>
      <div style="display: flex; gap: 15px; justify-content: center;">
        <button id="confirmOk" class="btn-primary" style="background: #e74c3c;">نعم</button>
        <button id="confirmCancel" class="btn-secondary">إلغاء</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== المتغيرات العامة ====================
    let APP_BASE_URL = null;
    let currentUser = null;

    // ==================== دالة جلب الرابط من السيرفر ====================
    function fetchAppUrl() {
      return new Promise((resolve) => {
        google.script.run
          .withSuccessHandler(url => {
            APP_BASE_URL = url;
            console.log('✅ APP_BASE_URL:', APP_BASE_URL);
            resolve(url);
          })
          .withFailureHandler(error => {
            console.error('❌ فشل جلب الرابط:', error);
            APP_BASE_URL = window.location.origin + window.location.pathname;
            console.log('⚠️ استخدام رابط Fallback:', APP_BASE_URL);
            resolve(APP_BASE_URL);
          })
          .getAppUrl();
      });
    }

    // ==================== استخراج بيانات المستخدم من الرابط ====================
    function getUserFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      const userParam = urlParams.get('user');
      if (userParam) {
        try {
          return JSON.parse(decodeURIComponent(userParam));
        } catch (e) {
          console.error('خطأ في فك تشفير بيانات المستخدم:', e);
          return null;
        }
      }
      return null;
    }

    // ==================== دوال مساعدة ====================
    function showAlert(message) {
      const modal = document.getElementById('customAlertModal');
      document.getElementById('alertMessage').innerText = message;
      modal.style.display = 'flex';
      
      const okBtn = document.getElementById('alertOk');
      const okHandler = function() {
        modal.style.display = 'none';
        okBtn.removeEventListener('click', okHandler);
      };
      
      okBtn.addEventListener('click', okHandler);
    }

    function showConfirm(message, onConfirm) {
      const modal = document.getElementById('customConfirmModal');
      document.getElementById('confirmMessage').innerText = message;
      modal.style.display = 'flex';
      
      const okBtn = document.getElementById('confirmOk');
      const cancelBtn = document.getElementById('confirmCancel');
      
      const okHandler = function() {
        modal.style.display = 'none';
        onConfirm();
        okBtn.removeEventListener('click', okHandler);
        cancelBtn.removeEventListener('click', cancelHandler);
      };
      
      const cancelHandler = function() {
        modal.style.display = 'none';
        okBtn.removeEventListener('click', okHandler);
        cancelBtn.removeEventListener('click', cancelHandler);
      };
      
      okBtn.addEventListener('click', okHandler);
      cancelBtn.addEventListener('click', cancelHandler);
    }

    // ==================== عرض لوحة التحكم الرئيسية ====================
    function showDashboard() {
      const content = document.getElementById('mainContent');
      
      content.innerHTML = `
        <div class="welcome-message">مرحباً بك في لوحة المحاسب</div>
        <div class="user-details">
          <div class="detail-item">
            <span class="detail-label">الاسم:</span>
            <span class="detail-value" id="userFullName">${currentUser.name || 'غير محدد'}</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">البريد الإلكتروني:</span>
            <span class="detail-value" id="userEmail">${currentUser.email || 'غير محدد'}</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">المركز:</span>
            <span class="detail-value" id="userCenter">${currentUser.centerName || 'غير محدد'}</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">الفرع:</span>
            <span class="detail-value" id="userBranch">${currentUser.branchName || 'غير محدد'}</span>
          </div>
        </div>

        <div class="action-buttons">
          <button class="btn-primary" onclick="window.goToInvoices()">📄 عرض الفواتير</button>
          <button class="btn-secondary" onclick="window.goToReports()">📊 التقارير</button>
          <button class="btn-secondary" onclick="window.goToCommissions()">💰 العمولات</button>
          <button class="btn-primary" onclick="window.goToBookingsToday()">📅 حجوزات اليوم</button>
        </div>
      `;
    }

    // ==================== دوال التنقل ====================
    function goToInvoices() {
      showAlert('عرض الفواتير - قيد التطوير');
    }

    function goToReports() {
      showAlert('التقارير - قيد التطوير');
    }

    function goToCommissions() {
      showAlert('العمولات - قيد التطوير');
    }

    function goToBookingsToday() {
      if (!APP_BASE_URL) {
        fetchAppUrl().then(() => {
          const branchParam = currentUser?.branchName ? `&branchName=${encodeURIComponent(currentUser.branchName)}` : '';
          console.log('🔍 التوجيه إلى حجوزات اليوم للفرع:', currentUser?.branchName);
          window.top.location.href = APP_BASE_URL + '?page=BookingsToday' + branchParam;
        });
        return;
      }
      const branchParam = currentUser?.branchName ? `&branchName=${encodeURIComponent(currentUser.branchName)}` : '';
      console.log('🔍 التوجيه إلى حجوزات اليوم للفرع:', currentUser?.branchName);
      window.top.location.href = APP_BASE_URL + '?page=BookingsToday' + branchParam;
    }

    // ==================== الخروج ====================
    function logout() {
      showConfirm('هل أنت متأكد من تسجيل الخروج؟', function() {
        sessionStorage.removeItem('currentUser');
        if (APP_BASE_URL) {
          window.top.location.href = APP_BASE_URL + '?page=Login';
        } else {
          window.top.location.href = '?page=Login';
        }
      });
    }

    // دالة مساعدة للتوجيه إلى تسجيل الدخول
    function redirectToLogin() {
      window.top.location.href = APP_BASE_URL + '?page=Login';
    }

    // ==================== التحميل الأولي ====================
    document.addEventListener('DOMContentLoaded', async function() {
      console.log("📌 DOMContentLoaded تم التفعيل");
      
      // 1️⃣ نجيب رابط التطبيق أولاً
      await fetchAppUrl();
      
      // 2️⃣ نتحقق من المستخدم
      let userData = sessionStorage.getItem('currentUser');
      
      if (!userData) {
        const urlUser = getUserFromUrl();
        if (urlUser) {
          userData = JSON.stringify(urlUser);
          sessionStorage.setItem('currentUser', userData);
        }
      }

      if (!userData) {
        console.log("❌ لا يوجد مستخدم");
        document.getElementById('mainContent').innerHTML = `
          <div style="text-align: center; padding: 50px;">
            <h3>لا يوجد مستخدم مسجل الدخول</h3>
            <button class="btn-primary" onclick="window.redirectToLogin()">الذهاب إلى تسجيل الدخول</button>
          </div>
        `;
        return;
      }

      try {
        currentUser = JSON.parse(userData);
        console.log("✅ currentUser:", currentUser);

        // التحقق من نوع المستخدم
        if (currentUser.type !== 'Accountant' && currentUser.type !== 'Admin') {
          console.log("❌ نوع المستخدم غير مسموح:", currentUser.type);
          window.top.location.href = APP_BASE_URL + '?page=Login';
          return;
        }

        // عرض لوحة التحكم مباشرة
        showDashboard();

      } catch (e) {
        console.error("❌ خطأ في تحليل بيانات المستخدم:", e);
        window.top.location.href = APP_BASE_URL + '?page=Login';
        return;
      }
    });

    // تصدير الدوال إلى النطاق العام
    window.logout = logout;
    window.goToInvoices = goToInvoices;
    window.goToReports = goToReports;
    window.goToCommissions = goToCommissions;
    window.goToBookingsToday = goToBookingsToday;
    window.showAlert = showAlert;
    window.showConfirm = showConfirm;
    window.redirectToLogin = redirectToLogin;
  </script>
</body>
</html>
