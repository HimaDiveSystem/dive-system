<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>إدارة الموظفين - نظام الغوص</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
    body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px;}
    .container{max-width:1400px;margin:0 auto;background:white;border-radius:30px;box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden;}

    /* HEADER */
    .header{background:linear-gradient(135deg,#1e2b4f 0%,#152238 100%);color:white;padding:20px 30px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;}
    .header h2{color:#ffd966;font-size:22px;display:flex;align-items:center;gap:10px;}
    .hright{display:flex;align-items:center;gap:15px;flex-wrap:wrap;}
    .uname{background:rgba(255,255,255,0.1);padding:8px 18px;border-radius:40px;border:1px solid #ffd966;font-size:13px;}
    .back-btn{background:#2a4f8c;color:white;border:1px solid #ffd966;padding:8px 20px;border-radius:40px;cursor:pointer;font-weight:600;font-size:13px;transition:.2s;}
    .back-btn:hover{background:#ffd966;color:#1e2b4f;}
    .logout-btn{background:#ff6b6b;color:white;border:none;padding:8px 20px;border-radius:40px;cursor:pointer;font-weight:600;font-size:13px;transition:.2s;}
    .logout-btn:hover{background:#ee5253;}

    /* TABS */
    .tabs{display:flex;background:#f8f9fa;padding:0 20px;border-bottom:2px solid #dee2e6;overflow-x:auto;}
    .tab{padding:14px 24px;cursor:pointer;font-weight:600;color:#6c757d;border-bottom:3px solid transparent;transition:.2s;white-space:nowrap;font-size:14px;}
    .tab.active{color:#1e2b4f;border-bottom-color:#ffd966;}
    .tab:hover{color:#1e2b4f;}

    /* CONTENT */
    .content{padding:28px;}

    /* TOOLBAR */
    .toolbar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;align-items:center;}
    .btn-primary{background:#1e2b4f;color:white;border:none;padding:10px 22px;border-radius:40px;font-weight:600;font-size:13px;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:7px;}
    .btn-primary:hover{background:#ffd966;color:#1e2b4f;}
    .btn-secondary{background:#e9f0fa;color:#1e2b4f;border:none;padding:10px 22px;border-radius:40px;font-weight:600;font-size:13px;cursor:pointer;transition:.2s;}
    .btn-secondary:hover{background:#d0ddeb;}
    .btn-danger{background:#e74c3c;color:white;border:none;padding:8px 16px;border-radius:40px;font-weight:600;font-size:12px;cursor:pointer;transition:.2s;}
    .btn-danger:hover{background:#c0392b;}
    .btn-sm{padding:6px 14px;font-size:11px;}

    /* SEARCH */
    .search-bar{display:flex;gap:10px;align-items:center;flex:1;max-width:400px;}
    .search-bar input{flex:1;padding:9px 14px;border:2px solid #e9f0fa;border-radius:40px;font-size:13px;}
    .search-bar input:focus{outline:none;border-color:#1e2b4f;}

    /* TABLE */
    .tbl-wrap{overflow-x:auto;border-radius:16px;box-shadow:0 4px 16px rgba(0,20,40,0.08);}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    thead th{background:#1e2b4f;color:#ffd966;padding:12px 10px;font-weight:600;white-space:nowrap;text-align:right;}
    tbody td{padding:10px;border-bottom:1px solid #e9f0fa;color:#2c3e50;vertical-align:middle;}
    tbody tr:hover{background:#f5f9ff;}
    .badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;color:white;}
    .badge-active{background:#27ae60;}
    .badge-inactive{background:#e74c3c;}
    .badge-type{background:#3498db;}

    /* EMPTY */
    .empty{text-align:center;padding:60px 20px;color:#6c757d;}
    .empty .eico{font-size:60px;margin-bottom:16px;}
    .loader{border:4px solid #f3f3f3;border-top:4px solid #1e2b4f;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:40px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* MODAL */
    .modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9000;align-items:center;justify-content:center;padding:20px;}
    .modal-ov.open{display:flex;}
    .modal-box{background:white;border-radius:24px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
    .modal-head{background:linear-gradient(135deg,#1e2b4f,#152238);color:white;padding:18px 24px;border-radius:24px 24px 0 0;display:flex;justify-content:space-between;align-items:center;}
    .modal-head h3{color:#ffd966;font-size:17px;}
    .modal-close{background:none;border:none;color:white;font-size:20px;cursor:pointer;padding:0 4px;}
    .modal-body{padding:24px;}

    /* FORM */
    .form-section{margin-bottom:20px;}
    .form-section-title{font-size:12px;font-weight:700;color:#1e2b4f;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid #e9f0fa;display:flex;align-items:center;gap:6px;}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .form-grid.g3{grid-template-columns:1fr 1fr 1fr;}
    .form-grid.g1{grid-template-columns:1fr;}
    .field{display:flex;flex-direction:column;gap:5px;}
    .field label{font-size:12px;font-weight:600;color:#1e2b4f;}
    .field input,.field select,.field textarea{padding:9px 12px;border:2px solid #e9f0fa;border-radius:10px;font-size:13px;color:#2c3e50;background:white;transition:.2s;}
    .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#1e2b4f;}
    .field input.err{border-color:#e74c3c;}
    .field textarea{resize:vertical;min-height:60px;}
    .full{grid-column:1/-1;}

    /* TOGGLE */
    .toggle-wrap{display:flex;align-items:center;gap:10px;padding:8px 0;}
    .toggle-lbl{font-size:13px;font-weight:600;color:#1e2b4f;}
    .toggle{position:relative;width:44px;height:24px;cursor:pointer;}
    .toggle input{opacity:0;width:0;height:0;}
    .slider{position:absolute;inset:0;background:#ccc;border-radius:34px;transition:.3s;}
    .slider:before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s;}
    input:checked+.slider{background:#1e2b4f;}
    input:checked+.slider:before{transform:translateX(20px);}

    /* SYSTEM ACCESS BOX */
    .access-box{background:#f0f4fa;border-radius:14px;padding:16px;margin-top:8px;border:2px solid #dee2e6;transition:.2s;}
    .access-box.active{border-color:#1e2b4f;background:#e8edf8;}

    /* ALERT / CONFIRM */
    .al-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;}
    .al-ov.open{display:flex;}
    .al-box{background:white;border-radius:24px;padding:30px;width:360px;text-align:center;box-shadow:0 16px 40px rgba(0,0,0,0.25);}
    .al-ico{font-size:44px;margin-bottom:12px;}
    .al-msg{font-size:14px;color:#1e2b4f;font-weight:600;margin-bottom:18px;line-height:1.6;}
    .al-btns{display:flex;gap:10px;justify-content:center;}
    .al-ok{padding:9px 26px;background:#1e2b4f;color:#ffd966;border:none;border-radius:40px;font-size:13px;font-weight:700;cursor:pointer;}
    .al-ok.red{background:#e74c3c;}
    .al-cancel{padding:9px 20px;background:#f8f9fa;color:#6c757d;border:2px solid #dee2e6;border-radius:40px;font-size:13px;font-weight:600;cursor:pointer;}

    /* TOAST */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);padding:12px 24px;border-radius:40px;font-size:13px;font-weight:600;color:white;z-index:9999;opacity:0;transition:.4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
    .toast.ok{background:#27ae60;}
    .toast.err{background:#e74c3c;}
    .toast.inf{background:#3498db;}

    /* STATS */
    .stats-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:24px;}
    .stat-card{flex:1;min-width:140px;background:#f0f4fa;border-radius:16px;padding:16px;text-align:center;border-left:4px solid #1e2b4f;}
    .stat-num{font-size:28px;font-weight:700;color:#1e2b4f;}
    .stat-lbl{font-size:12px;color:#6c757d;margin-top:4px;}

    @media(max-width:600px){.form-grid{grid-template-columns:1fr;}.form-grid.g3{grid-template-columns:1fr 1fr;}}
  </style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h2>👥 إدارة الموظفين</h2>
    <div class="hright">
      <span class="uname" id="uname">—</span>
      <button class="back-btn" onclick="goBack()">🔙 رجوع</button>
      <button class="logout-btn" onclick="doLogout()">خروج</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="showTab('list',this)">👥 قائمة الموظفين</div>
    <div class="tab" onclick="showTab('add',this)">➕ إضافة موظف</div>
  </div>

  <div class="content" id="mainContent">
    <div class="loader"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ALERT -->
<div class="al-ov" id="alOv">
  <div class="al-box">
    <div class="al-ico" id="alIco">ℹ️</div>
    <div class="al-msg" id="alMsg"></div>
    <div class="al-btns" id="alBtns"><button class="al-ok" onclick="closeAl()">موافق</button></div>
  </div>
</div>

<!-- ADD EMPLOYEE MODAL -->
<div class="modal-ov" id="addModal">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="modalTitle">➕ إضافة موظف جديد</h3>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════
const GAS = 'https://script.google.com/macros/s/AKfycbygznz2Q9GyNuHdpP3WAdt_PPtCmcIb-4CozLXAGoA1Y_smleOLIRjp59upbwDPf35h/exec';
const DASH = {Admin:'Dashboard.html',Owner:'OwnerDashboard.html',Sales:'SalesDashboard.html',Accountant:'AccountantDashboard.html'};

let CU = null;
let allEmployees = [];
let branches = [];

// ══════════════════════════════════════════════════════
// API — JSONP only (GitHub Pages → GAS)
// ══════════════════════════════════════════════════════
function gasGet(params) {
  return new Promise((resolve, reject) => {
    const cb = 'jsonp_cb_' + Date.now() + Math.floor(Math.random()*1000);
    const script = document.createElement('script');
    const tout = setTimeout(() => {
      delete window[cb]; script.remove();
      reject(new Error('Timeout'));
    }, 20000);
    window[cb] = (data) => {
      clearTimeout(tout); delete window[cb]; script.remove();
      resolve(data);
    };
    script.onerror = () => {
      clearTimeout(tout); delete window[cb]; script.remove();
      reject(new Error('Script error'));
    };
    const url = new URL(GAS);
    Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
    url.searchParams.set('callback', cb);
    script.src = url.toString();
    document.head.appendChild(script);
  });
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  const ud = sessionStorage.getItem('currentUser');
  if (!ud) { window.location.href = 'index.html'; return; }
  try { CU = JSON.parse(ud); } catch { window.location.href = 'index.html'; return; }
  document.getElementById('uname').textContent = CU.name || '—';
  await loadAll();
  showTab('list', document.querySelector('.tab'));
});

async function loadAll() {
  try {
    const [emps, brs] = await Promise.all([
      gasGet({ action: 'getAllEmployees' }),
      gasGet({ action: 'getBranchesByCenter', centerId: CU.centerId || '' })
    ]);
    allEmployees = Array.isArray(emps) ? emps : [];
    branches     = Array.isArray(brs)  ? brs  : [];
  } catch(e) {
    showToast('خطأ في تحميل البيانات', 'err');
  }
}

// ══════════════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════════════
function showTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  if (tab === 'list') renderList();
  else if (tab === 'add') openAddModal();
}

// ══════════════════════════════════════════════════════
// LIST TAB
// ══════════════════════════════════════════════════════
function renderList(filter = '') {
  const rows = filter
    ? allEmployees.filter(e =>
        (e.name||'').toLowerCase().includes(filter.toLowerCase()) ||
        (e.serial||'').toLowerCase().includes(filter.toLowerCase()) ||
        (e.position||'').toLowerCase().includes(filter.toLowerCase()))
    : allEmployees;

  const active   = allEmployees.filter(e => e.status === 'نشط').length;
  const inactive = allEmployees.length - active;

  document.getElementById('mainContent').innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${allEmployees.length}</div><div class="stat-lbl">إجمالي الموظفين</div></div>
      <div class="stat-card" style="border-color:#27ae60"><div class="stat-num" style="color:#27ae60">${active}</div><div class="stat-lbl">نشط</div></div>
      <div class="stat-card" style="border-color:#e74c3c"><div class="stat-num" style="color:#e74c3c">${inactive}</div><div class="stat-lbl">موقوف</div></div>
    </div>
    <div class="toolbar">
      <button class="btn-primary" onclick="openAddModal()">➕ إضافة موظف</button>
      <div class="search-bar">
        <input type="text" placeholder="🔍 بحث بالاسم أو الرقم أو الوظيفة..." id="srchInp"
               oninput="renderList(this.value)" value="${filter}">
      </div>
      <button class="btn-secondary" onclick="reloadList()">🔄 تحديث</button>
    </div>
    ${rows.length === 0 ? `
      <div class="empty"><div class="eico">👥</div>
        <p>${filter ? 'لا نتائج للبحث' : 'لا يوجد موظفون بعد'}</p>
      </div>` : `
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>الرقم</th><th>الاسم</th><th>الوظيفة</th>
          <th>الراتب الأساسي</th><th>نظام الدفع</th>
          <th>تاريخ التعيين</th><th>الحالة</th><th>إجراءات</th>
        </tr></thead>
        <tbody>
          ${rows.map(e => `
            <tr>
              <td><b>${e.serial||''}</b></td>
              <td>${e.name||''}</td>
              <td>${e.position||''}</td>
              <td>${Number(e.monthlySalary||0).toLocaleString()} LE</td>
              <td><span class="badge badge-type">${e.paymentSystem||''}</span></td>
              <td>${fmtDate(e.startDate)}</td>
              <td><span class="badge ${e.status==='نشط'?'badge-active':'badge-inactive'}">${e.status||'—'}</span></td>
              <td>
                <button class="btn-secondary btn-sm" onclick="viewEmployee('${e.serial}')">👁 عرض</button>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`}`;
}

async function reloadList() {
  document.getElementById('mainContent').innerHTML = '<div class="loader"></div>';
  await loadAll();
  renderList();
}

// ══════════════════════════════════════════════════════
// ADD MODAL
// ══════════════════════════════════════════════════════
function openAddModal() {
  document.getElementById('modalTitle').textContent = '➕ إضافة موظف جديد';
  document.getElementById('modalBody').innerHTML = buildAddForm();
  document.getElementById('addModal').classList.add('open');
  // init toggle
  toggleAccessBox();
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
  // إعادة للقائمة
  document.querySelector('.tab').click();
}

function buildAddForm() {
  const branchOpts = branches.map(b =>
    `<option value="${b.id}">${b.name} — ${b.centerName}</option>`
  ).join('');

  return `
  <div class="form-section">
    <div class="form-section-title">📋 البيانات الأساسية</div>
    <div class="form-grid">
      <div class="field full">
        <label>الاسم الكامل *</label>
        <input type="text" id="fName" placeholder="الاسم الكامل للموظف">
      </div>
      <div class="field">
        <label>الوظيفة *</label>
        <input type="text" id="fPos" placeholder="مثال: Sales, Guide, Admin">
      </div>
      <div class="field">
        <label>الفرع *</label>
        <select id="fBranch">
          <option value="">— اختر الفرع —</option>
          ${branchOpts}
        </select>
      </div>
      <div class="field">
        <label>تاريخ التعيين *</label>
        <input type="date" id="fStart">
      </div>
      <div class="field">
        <label>رقم الهاتف</label>
        <input type="text" id="fPhone" placeholder="01xxxxxxxxx">
      </div>
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">💰 بيانات الراتب</div>
    <div class="form-grid">
      <div class="field">
        <label>نظام الدفع *</label>
        <select id="fPaySys" onchange="onPaySysChange()">
          <option value="مرتب فقط">مرتب فقط</option>
          <option value="مرتب+عمولة">مرتب + عمولة</option>
          <option value="عمولة فقط">عمولة فقط</option>
        </select>
      </div>
      <div class="field" id="salaryField">
        <label>الراتب الشهري (LE) *</label>
        <input type="number" id="fSalary" placeholder="0" min="0">
      </div>
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">🔐 حساب النظام</div>
    <div class="toggle-wrap">
      <label class="toggle">
        <input type="checkbox" id="fAccess" onchange="toggleAccessBox()">
        <span class="slider"></span>
      </label>
      <span class="toggle-lbl">لديه حساب في النظام</span>
    </div>
    <div class="access-box" id="accessBox">
      <div class="form-grid">
        <div class="field">
          <label>نوع المستخدم</label>
          <select id="fUserType">
            <option value="Sales">Sales</option>
            <option value="Accountant">Accountant</option>
            <option value="Admin">Admin</option>
          </select>
        </div>
        <div class="field">
          <label>البريد الإلكتروني (لتسجيل الدخول) *</label>
          <input type="email" id="fEmail" placeholder="user@example.com">
        </div>
        <div class="field">
          <label>اسم المستخدم</label>
          <input type="text" id="fUsername" placeholder="اختياري">
        </div>
        <div class="field">
          <label>كلمة المرور *</label>
          <input type="text" id="fPass" placeholder="123456" value="123456">
        </div>
      </div>
      <small style="color:#6c757d;font-size:11px;">⚠️ يُستخدم البريد الإلكتروني + كلمة المرور لتسجيل الدخول</small>
    </div>
  </div>

  <div style="display:flex;gap:10px;justify-content:flex-end;padding-top:10px;border-top:2px solid #e9f0fa;">
    <button class="btn-secondary" onclick="closeAddModal()">إلغاء</button>
    <button class="btn-primary" id="saveEmpBtn" onclick="saveEmployee()">💾 حفظ الموظف</button>
  </div>`;
}

function toggleAccessBox() {
  const chk = document.getElementById('fAccess');
  const box = document.getElementById('accessBox');
  if (!chk || !box) return;
  if (chk.checked) {
    box.classList.add('active');
    box.style.display = 'block';
  } else {
    box.classList.remove('active');
    box.style.display = 'none';
  }
}

function onPaySysChange() {
  const sys = document.getElementById('fPaySys')?.value;
  const sf  = document.getElementById('salaryField');
  if (!sf) return;
  sf.style.display = sys === 'عمولة فقط' ? 'none' : '';
}

// ══════════════════════════════════════════════════════
// SAVE EMPLOYEE
// ══════════════════════════════════════════════════════
async function saveEmployee() {
  const g = id => (document.getElementById(id)?.value || '').trim();
  const hasAccess = document.getElementById('fAccess')?.checked || false;

  // Validation
  const errs = [];
  if (!g('fName'))   errs.push('الاسم الكامل');
  if (!g('fPos'))    errs.push('الوظيفة');
  if (!g('fBranch')) errs.push('الفرع');
  if (!g('fStart'))  errs.push('تاريخ التعيين');
  const paySys = g('fPaySys');
  if (paySys !== 'عمولة فقط' && !g('fSalary')) errs.push('الراتب الشهري');
  if (hasAccess) {
    if (!g('fEmail')) errs.push('البريد الإلكتروني');
    if (!g('fPass'))  errs.push('كلمة المرور');
  }
  if (errs.length) {
    showAl('⚠️', 'يرجى تعبئة: ' + errs.join('، '));
    return;
  }

  // Branch info
  const selBranch = branches.find(b => b.id === g('fBranch')) || {};

  const btn = document.getElementById('saveEmpBtn');
  btn.disabled = true; btn.textContent = '⏳ جاري الحفظ...';

  try {
    const params = {
      action:        'addNewEmployee',
      fullName:      g('fName'),
      position:      g('fPos'),
      monthlySalary: paySys === 'عمولة فقط' ? 0 : (parseFloat(g('fSalary')) || 0),
      phone:         g('fPhone'),
      startDate:     g('fStart'),
      branchId:      g('fBranch'),
      branchName:    selBranch.name || '',
      paymentSystem: paySys,
      hasSystemAccess: hasAccess ? 'true' : 'false',
      centerId:      CU.centerId   || '',
      centerName:    CU.centerName || '',
      // بيانات حساب النظام (تُرسل دائماً، تُستخدم فقط إذا hasSystemAccess=true)
      username:      g('fUsername'),
      password:      g('fPass')   || '123456',
      email:         g('fEmail'),
      userType:      g('fUserType') || 'Sales',
      address:       ''
    };

    const res = await gasGet(params);

    if (res && res.success) {
      showToast('✅ تم إضافة الموظف: ' + res.serial, 'ok');
      closeAddModal();
      await reloadList();
    } else {
      showAl('❌', res?.message || 'فشل الحفظ');
    }
  } catch(e) {
    showAl('❌', 'خطأ في الاتصال: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '💾 حفظ الموظف';
  }
}

// ══════════════════════════════════════════════════════
// VIEW EMPLOYEE
// ══════════════════════════════════════════════════════
async function viewEmployee(serial) {
  const emp = allEmployees.find(e => e.serial === serial);
  if (!emp) return;
  showAl('👤', `
    <b>${emp.name}</b><br>
    🔢 ${emp.serial}<br>
    💼 ${emp.position}<br>
    💰 ${Number(emp.monthlySalary||0).toLocaleString()} LE<br>
    📅 ${fmtDate(emp.startDate)}<br>
    ⚙️ ${emp.paymentSystem||'—'}<br>
    🔵 ${emp.status||'—'}
  `.trim());
}

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function fmtDate(d) {
  if (!d) return '—';
  try {
    const dt = new Date(d);
    if (isNaN(dt)) return String(d);
    const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${dt.getDate().toString().padStart(2,'0')}/${MN[dt.getMonth()]}/${dt.getFullYear()}`;
  } catch { return String(d); }
}

function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => { t.className = 'toast'; }, 3500);
}

let _alCb = null;
function showAl(ico, msg) {
  document.getElementById('alIco').textContent = ico;
  document.getElementById('alMsg').innerHTML = msg;
  document.getElementById('alBtns').innerHTML = '<button class="al-ok" onclick="closeAl()">موافق</button>';
  _alCb = null;
  document.getElementById('alOv').classList.add('open');
}
function showConfirm(ico, msg, cb) {
  document.getElementById('alIco').textContent = ico;
  document.getElementById('alMsg').innerHTML = msg;
  document.getElementById('alBtns').innerHTML =
    '<button class="al-cancel" onclick="closeAl()">إلغاء</button>' +
    '<button class="al-ok red" onclick="alYes()">نعم</button>';
  _alCb = cb;
  document.getElementById('alOv').classList.add('open');
}
function alYes() { closeAl(); if (_alCb) _alCb(); }
function closeAl() { document.getElementById('alOv').classList.remove('open'); }

function goBack()   { window.location.href = DASH[CU?.type] || 'AccountantDashboard.html'; }
function doLogout() {
  showConfirm('❓', 'هل تريد تسجيل الخروج؟', () => {
    sessionStorage.removeItem('currentUser');
    window.location.href = 'index.html';
  });
}

// expose
window.showTab=showTab; window.openAddModal=openAddModal; window.closeAddModal=closeAddModal;
window.saveEmployee=saveEmployee; window.viewEmployee=viewEmployee; window.reloadList=reloadList;
window.toggleAccessBox=toggleAccessBox; window.onPaySysChange=onPaySysChange;
window.closeAl=closeAl; window.alYes=alYes; window.goBack=goBack; window.doLogout=doLogout;
window.renderList=renderList;
</script>
