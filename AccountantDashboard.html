<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>لوحة المحاسب</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#0f1f3d;--navy2:#1a3260;--gold:#f5c842;--gold2:#e6b800;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--orange:#ea580c;--purple:#7c3aed;--teal:#0d9488;--bg:#f0f4f8;--card:#fff;--border:#dde4f0;--text:#1a2540;--text-lt:#5a6a8a;--radius:16px;--shadow:0 4px 24px rgba(15,31,61,.10);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px;}
    .container{max-width:1100px;margin:0 auto;background:white;border-radius:28px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;}
    .header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;padding:18px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
    .header h2{color:var(--gold);font-size:22px;font-weight:900;display:flex;align-items:center;gap:8px;}
    .header-right{display:flex;align-items:center;gap:10px;}
    .user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:40px;padding:6px 18px;color:white;font-size:13px;font-weight:600;}
    .logout-btn{background:#ff6b6b;color:white;border:none;padding:8px 22px;border-radius:40px;cursor:pointer;font-weight:700;font-size:13px;font-family:'Cairo',sans-serif;transition:all .2s;}
    .logout-btn:hover{background:#ee5253;transform:translateY(-2px);}
    .content{padding:32px 28px;}
    .welcome-msg{font-size:26px;color:var(--navy);margin-bottom:20px;font-weight:700;text-align:center;}
    .user-card{background:#f8fafc;border-radius:var(--radius);padding:22px;margin:0 auto 32px;max-width:500px;border:1px solid var(--border);}
    .di{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
    .di:last-child{border-bottom:none;}
    .di-label{font-weight:700;color:var(--navy);font-size:14px;}
    .di-val{color:var(--text-lt);font-size:14px;}
    
    /* مجموعات الأزرار */
    .section-group{margin-bottom:32px;}
    .section-title{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:8px;border-bottom:3px solid var(--gold);}
    .section-title .icon{font-size:24px;}
    .section-title h3{font-size:18px;font-weight:800;color:var(--navy);}
    .action-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}
    .action-btn{
      display:flex;align-items:center;justify-content:center;gap:8px;
      padding:14px 18px;border:none;border-radius:40px;font-weight:700;font-size:14px;
      cursor:pointer;font-family:'Cairo',sans-serif;transition:all .2s;text-align:center;
    }
    .action-btn:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,.15);}
    
    /* ألوان الأزرار */
    .btn-navy{background:var(--navy);color:var(--gold);}
    .btn-navy:hover{background:var(--gold);color:var(--navy);}
    .btn-blue{background:var(--blue);color:white;}
    .btn-blue:hover{background:#1d4ed8;}
    .btn-green{background:var(--green);color:white;}
    .btn-green:hover{background:#15803d;}
    .btn-orange{background:var(--orange);color:white;}
    .btn-orange:hover{background:#c2410c;}
    .btn-purple{background:var(--purple);color:white;}
    .btn-purple:hover{background:#6d28d9;}
    .btn-teal{background:var(--teal);color:white;}
    .btn-teal:hover{background:#0f766e;}
    .btn-gold{background:var(--gold);color:var(--navy);}
    .btn-gold:hover{background:#e6b800;}
    .btn-gray{background:#f1f5f9;color:var(--text);}
    .btn-gray:hover{background:#e2e8f0;}
    .btn-red{background:#dc2626;color:white;}
    .btn-red:hover{background:#b91c1c;}
    
    /* زر الخزينة المميز */
    .btn-cash{
      background:linear-gradient(135deg,#065f46,#16a34a);
      color:white;box-shadow:0 6px 18px rgba(22,163,74,.4);
    }
    .btn-cash:hover{background:linear-gradient(135deg,#16a34a,#15803d);box-shadow:0 8px 24px rgba(22,163,74,.5);}
    
    /* زر العميل المميز */
    .btn-customer{
      background:linear-gradient(135deg,#7c3aed,#a855f7);
      color:white;box-shadow:0 6px 18px rgba(124,58,237,.4);
    }
    .btn-customer:hover{background:linear-gradient(135deg,#a855f7,#7c3aed);box-shadow:0 8px 24px rgba(124,58,237,.5);}
    
    .footer-note{margin-top:32px;text-align:center;padding:16px;background:#f8fafc;border-radius:var(--radius);color:var(--text-lt);font-size:12px;}
    
    /* Modal styles */
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:9999;}
    .modal.open{display:flex;}
    .modal-box{background:white;width:90%;max-width:500px;border-radius:22px;padding:26px;box-shadow:0 20px 40px rgba(0,0,0,.3);}
    .modal-icon{font-size:44px;margin-bottom:12px;text-align:center;}
    .modal-msg{color:var(--navy);font-size:15px;font-weight:700;margin-bottom:18px;text-align:center;}
    .modal-btns{display:flex;gap:10px;justify-content:center;margin-top:20px;}
    .modal-select-group{margin-bottom:16px;}
    .modal-select-group label{display:block;font-weight:700;color:var(--navy);margin-bottom:6px;}
    .modal-select-group select,.modal-select-group input{width:100%;padding:12px;border:2px solid var(--border);border-radius:12px;font-family:'Cairo',sans-serif;}
    
    @media(max-width:600px){.action-grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>🧾 لوحة المحاسب</h2>
    <div class="header-right">
      <span class="user-chip" id="userNameDisplay"></span>
      <button class="logout-btn" onclick="logout()">🚪 خروج</button>
    </div>
  </div>
  <div class="content" id="mainContent"><div style="text-align:center;padding:40px;color:#94a3b8">⏳ جاري التحميل...</div></div>
</div>

<!-- Alert Modal -->
<div id="alertModal" class="modal">
  <div class="modal-box"><div class="modal-icon">ℹ️</div><div class="modal-msg" id="alertMsg"></div><div class="modal-btns"><button class="action-btn btn-navy" onclick="closeAlert()">موافق</button></div></div>
</div>

<!-- Confirm Modal -->
<div id="confirmModal" class="modal">
  <div class="modal-box"><div class="modal-icon">❓</div><div class="modal-msg" id="confirmMsg"></div>
    <div class="modal-btns">
      <button class="action-btn btn-orange" id="confirmOk">نعم</button>
      <button class="action-btn btn-gray" id="confirmCancel">إلغاء</button>
    </div>
  </div>
</div>

<!-- Customer Selection Modal -->
<div id="customerModal" class="modal">
  <div class="modal-box">
    <div class="modal-icon">🏢</div>
    <div class="modal-msg">اختر العميل لعرض لوحة التحكم</div>
    <div class="modal-select-group">
      <label>نوع الحساب</label>
      <select id="customerTypeSelect">
        <option value="Customer">عميل</option>
        <option value="Supplier">منفذ</option>
      </select>
    </div>
    <div class="modal-select-group">
      <label>نوع النشاط</label>
      <select id="categorySelect">
        <option value="">جميع الأنشطة</option>
        <option value="Safari">Safari</option>
        <option value="Submarine">Submarine</option>
        <option value="Water Sports">Water Sports</option>
        <option value="Diving">Diving</option>
        <option value="Tourism Company">Tourism Company</option>
        <option value="Excursions">Excursions</option>
      </select>
    </div>
    <div class="modal-select-group">
      <label>اسم العميل / المنفذ</label>
      <select id="customerNameSelect">
        <option value="">-- اختر العميل --</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="action-btn btn-navy" onclick="openSelectedCustomerDashboard()">فتح لوحة العميل</button>
      <button class="action-btn btn-gray" onclick="closeCustomerModal()">إلغاء</button>
    </div>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwe1Q9pjAJRk9CfWsK5YGjD5uVAbJkMhAVgw6akKkFIR9sz15V78C88Vs5dumKE-SwF/exec";

let currentUser = null;
let allCustomers = [];

// ====================== API Functions ======================
function gas(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    const url = new URL(WEB_APP_URL);
    url.searchParams.set('action', action);
    url.searchParams.set('callback', cb);
    url.searchParams.set('_t', Date.now());
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v ?? '')));
    window[cb] = (data) => { delete window[cb]; if (s.parentNode) s.parentNode.removeChild(s); resolve(data); };
    const s = document.createElement('script');
    s.src = url.toString();
    s.onerror = () => { delete window[cb]; if (s.parentNode) s.parentNode.removeChild(s); reject(new Error('خطأ في الاتصال')); };
    document.body.appendChild(s);
    setTimeout(() => { if (window[cb]) { delete window[cb]; if (s.parentNode) s.parentNode.removeChild(s); reject(new Error('انتهى الوقت')); } }, 30000);
  });
}

// ====================== Helper Functions ======================
function showAlert(msg) {
  document.getElementById('alertMsg').textContent = msg;
  document.getElementById('alertModal').classList.add('open');
}
function closeAlert() {
  document.getElementById('alertModal').classList.remove('open');
}
function showConfirm(msg, onOk) {
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmModal').classList.add('open');
  const ok = document.getElementById('confirmOk');
  const ca = document.getElementById('confirmCancel');
  const oh = () => { document.getElementById('confirmModal').classList.remove('open'); onOk(); ok.removeEventListener('click', oh); ca.removeEventListener('click', ch); };
  const ch = () => { document.getElementById('confirmModal').classList.remove('open'); ok.removeEventListener('click', oh); ca.removeEventListener('click', ch); };
  ok.addEventListener('click', oh);
  ca.addEventListener('click', ch);
}
function logout() {
  showConfirm('هل أنت متأكد من تسجيل الخروج؟', () => {
    sessionStorage.removeItem('currentUser');
    location.href = 'index.html';
  });
}
function go(url, userData = null) {
  if (userData) {
    sessionStorage.setItem('currentUser', JSON.stringify(userData));
  } else {
    sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
  }
  location.href = url;
}

// ====================== Customer Modal Functions ======================
async function loadCustomers() {
  try {
    const result = await gas('getAllSuppliersCustomers');
    if (Array.isArray(result)) {
      allCustomers = result;
    } else {
      allCustomers = [];
    }
    updateCustomerSelect();
  } catch (e) {
    console.error('loadCustomers error:', e);
    allCustomers = [];
  }
}

function updateCustomerSelect() {
  const typeSelect = document.getElementById('customerTypeSelect');
  const categorySelect = document.getElementById('categorySelect');
  const nameSelect = document.getElementById('customerNameSelect');
  
  const selectedType = typeSelect.value;
  const selectedCategory = categorySelect.value;
  
  let filtered = allCustomers.filter(c => c.customerType === selectedType);
  
  if (selectedCategory) {
    filtered = filtered.filter(c => c.category === selectedCategory);
  }
  
  nameSelect.innerHTML = '<option value="">-- اختر العميل --</option>';
  filtered.forEach(c => {
    nameSelect.innerHTML += `<option value="${c.customerId}" data-customer='${JSON.stringify(c)}'>${c.customerName} (${c.category})</option>`;
  });
}

function openCustomerDashboard() {
  loadCustomers().then(() => {
    document.getElementById('customerModal').classList.add('open');
  });
}

function closeCustomerModal() {
  document.getElementById('customerModal').classList.remove('open');
}

function openSelectedCustomerDashboard() {
  const nameSelect = document.getElementById('customerNameSelect');
  const selectedOption = nameSelect.options[nameSelect.selectedIndex];
  const customerData = selectedOption.getAttribute('data-customer');
  
  if (!customerData) {
    showAlert('الرجاء اختيار عميل');
    return;
  }
  
  try {
    const customer = JSON.parse(customerData);
    const userForDashboard = {
      ...currentUser,
      customerId: customer.customerId,
      customerName: customer.customerName,
      customerCategory: customer.category,
      customerType: customer.customerType,
      isCustomerView: true
    };
    
    sessionStorage.setItem('currentUser', JSON.stringify(userForDashboard));
    location.href = 'CustomerDashboard.html';
  } catch (e) {
    showAlert('خطأ في البيانات: ' + e.message);
  }
}

// ====================== Dashboard Rendering ======================
function showDashboard() {
  document.getElementById('userNameDisplay').textContent = currentUser.name || 'محاسب';
  document.getElementById('mainContent').innerHTML = `
    <div class="welcome-msg">مرحباً ${currentUser.name || ''}! 👋</div>
    <div class="user-card">
      <div class="di"><span class="di-label">الاسم</span><span class="di-val">${currentUser.name || '—'}</span></div>
      <div class="di"><span class="di-label">البريد</span><span class="di-val">${currentUser.email || '—'}</span></div>
      <div class="di"><span class="di-label">المركز</span><span class="di-val">${currentUser.centerName || '—'}</span></div>
      <div class="di"><span class="di-label">الفرع</span><span class="di-val">${currentUser.branchName || '—'}</span></div>
    </div>

    <!-- 📊 مجموعة الفواتير والتقارير -->
    <div class="section-group">
      <div class="section-title">
        <span class="icon">📊</span>
        <h3>الفواتير والتقارير</h3>
      </div>
      <div class="action-grid">
        <button class="action-btn btn-navy" onclick="go('BookingsToday.html')">📅 حجوزات اليوم</button>
        <button class="action-btn btn-navy" onclick="go('BookingsByActiveDate.html')">📄 الفواتير</button>
        <button class="action-btn btn-blue" onclick="go('SalesReport.html')">📊 تقرير المبيعات</button>
        <button class="action-btn btn-gray" onclick="showAlert('التقارير المتقدمة - قيد التطوير')">📈 تقارير متقدمة</button>
      </div>
    </div>

    <!-- 👥 مجموعة الموظفين والغياب والعمولات -->
    <div class="section-group">
      <div class="section-title">
        <span class="icon">👥</span>
        <h3>الموظفون والغياب والعمولات</h3>
      </div>
      <div class="action-grid">
        <button class="action-btn btn-green" onclick="go('EmployeesManagement.html')">👥 إدارة الموظفين</button>
        <button class="action-btn btn-purple" onclick="go('AttendanceManagement.html')">🗓️ إدارة الحضور والغياب</button>
        <button class="action-btn btn-gray" onclick="go('MyAttendance.html')">📋 سجل حضوري</button>
        <button class="action-btn btn-gray" onclick="showAlert('العمولات - قيد التطوير')">💰 العمولات</button>
      </div>
    </div>

    <!-- 💰 مجموعة الخزينة والمصروفات والإيرادات -->
    <div class="section-group">
      <div class="section-title">
        <span class="icon">💰</span>
        <h3>الخزينة والمصروفات والإيرادات</h3>
      </div>
      <div class="action-grid">
        <button class="action-btn btn-cash" onclick="go('CashRegister.html')">💰 إدارة الخزينة اليومية</button>
        <button class="action-btn btn-orange" onclick="go('ExpenseRevenueEntry.html')">💸 مصروفات وإيرادات</button>
      </div>
    </div>

    <!-- 🌍 مجموعة الإعدادات والعملاء والرحلات -->
    <div class="section-group">
      <div class="section-title">
        <span class="icon">🌍</span>
        <h3>الإعدادات والعملاء والرحلات</h3>
      </div>
      <div class="action-grid">
        <button class="action-btn btn-teal" onclick="go('ManageSupplierCustomers.html')">🏢 إدارة العملاء والمنفذين</button>
        <button class="action-btn btn-gold" onclick="go('ExchangeRatesDashboard.html')">💱 أسعار الصرف</button>
        <button class="action-btn btn-gray" onclick="go('TripsPriceListManager.html')">🗺️ أسعار الرحلات</button>
      </div>
    </div>

    <!-- 🏢 مجموعة فواتير العملاء (جديد) -->
    <div class="section-group">
      <div class="section-title">
        <span class="icon">🏢</span>
        <h3>فواتير العملاء (المراكز والفروع)</h3>
      </div>
      <div class="action-grid">
        <button class="action-btn btn-customer" onclick="openCustomerDashboard()">📋 لوحة عملاء ومنفذين</button>
        <button class="action-btn btn-gray" onclick="showAlert('كشف حساب العملاء - قيد التطوير')">📊 كشف حساب العملاء</button>
        <button class="action-btn btn-gray" onclick="showAlert('مديونيات العملاء - قيد التطوير')">💰 مديونيات العملاء</button>
      </div>
    </div>

    <div class="footer-note">
      ⚡ النظام المحاسبي المتكامل | آخر تحديث: ${new Date().toLocaleDateString('ar-EG')}
    </div>
  `;
  
  // Event listeners for customer modal
  document.getElementById('customerTypeSelect').addEventListener('change', updateCustomerSelect);
  document.getElementById('categorySelect').addEventListener('change', updateCustomerSelect);
}

// ====================== Initialization ======================
document.addEventListener('DOMContentLoaded', () => {
  let ud = sessionStorage.getItem('currentUser');
  if (!ud) {
    const p = new URLSearchParams(location.search).get('user');
    if (p) {
      ud = decodeURIComponent(p);
      sessionStorage.setItem('currentUser', ud);
    }
  }
  if (!ud) {
    location.href = 'index.html';
    return;
  }
  try {
    currentUser = JSON.parse(ud);
  } catch {
    location.href = 'index.html';
    return;
  }
  if (currentUser.type !== 'Accountant' && currentUser.type !== 'Admin') {
    location.href = 'index.html';
    return;
  }
  showDashboard();
});

// Export functions to global scope
window.logout = logout;
window.go = go;
window.showAlert = showAlert;
window.closeAlert = closeAlert;
window.openCustomerDashboard = openCustomerDashboard;
window.closeCustomerModal = closeCustomerModal;
window.openSelectedCustomerDashboard = openSelectedCustomerDashboard;
window.updateCustomerSelect = updateCustomerSelect;
</script>
</body>
</html>
