<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>لوحة المحاسب</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#0f1f3d;--navy2:#1a3260;--gold:#f5c842;--gold2:#e6b800;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--orange:#ea580c;--purple:#7c3aed;--teal:#0d9488;--bg:#f0f4f8;--card:#fff;--border:#dde4f0;--text:#1a2540;--text-lt:#5a6a8a;--radius:16px;--shadow:0 4px 24px rgba(15,31,61,.10);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px;}
    .container{max-width:1100px;margin:0 auto;background:white;border-radius:28px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;}
    .header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;padding:18px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
    .header h2{color:var(--gold);font-size:22px;font-weight:900;display:flex;align-items:center;gap:8px;}
    .header-right{display:flex;align-items:center;gap:10px;}
    .user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:40px;padding:6px 18px;color:white;font-size:13px;font-weight:600;}
    .logout-btn{background:#ff6b6b;color:white;border:none;padding:8px 22px;border-radius:40px;cursor:pointer;font-weight:700;font-size:13px;font-family:'Cairo',sans-serif;transition:all .2s;}
    .logout-btn:hover{background:#ee5253;transform:translateY(-2px);}
    .content{padding:32px 28px;}
    .welcome-msg{font-size:26px;color:var(--navy);margin-bottom:20px;font-weight:700;text-align:center;}
    .user-card{background:#f8fafc;border-radius:var(--radius);padding:22px;margin:0 auto 32px;max-width:500px;border:1px solid var(--border);}
    .di{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
    .di:last-child{border-bottom:none;}
    .di-label{font-weight:700;color:var(--navy);font-size:14px;}
    .di-val{color:var(--text-lt);font-size:14px;}
    
    /* مجموعات الأزرار */
    .section-group{margin-bottom:32px;}
    .section-title{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:8px;border-bottom:3px solid var(--gold);}
    .section-title .icon{font-size:24px;}
    .section-title h3{font-size:18px;font-weight:800;color:var(--navy);}
    .action-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}
    .action-btn{
      display:flex;align-items:center;justify-content:center;gap:8px;
      padding:14px 18px;border:none;border-radius:40px;font-weight:700;font-size:14px;
      cursor:pointer;font-family:'Cairo',sans-serif;transition:all .2s;text-align:center;
    }
    .action-btn:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,.15);}
    
    /* ألوان الأزرار */
    .btn-navy{background:var(--navy);color:var(--gold);}
    .btn-navy:hover{background:var(--gold);color:var(--navy);}
    .btn-blue{background:var(--blue);color:white;}
    .btn-blue:hover{background:#1d4ed8;}
    .btn-green{background:var(--green);color:white;}
    .btn-green:hover{background:#15803d;}
    .btn-orange{background:var(--orange);color:white;}
    .btn-orange:hover{background:#c2410c;}
    .btn-purple{background:var(--purple);color:white;}
    .btn-purple:hover{background:#6d28d9;}
    .btn-teal{background:var(--teal);color:white;}
    .btn-teal:hover{background:#0f766e;}
    .btn-gold{background:var(--gold);color:var(--navy);}
    .btn-gold:hover{background:#e6b800;}
    .btn-gray{background:#f1f5f9;color:var(--text);}
    .btn-gray:hover{background:#e2e8f0;}
    .btn-red{background:#dc2626;color:white;}
    .btn-red:hover{background:#b91c1c;}
    
    /* زر الخزينة المميز */
    .btn-cash{
      background:linear-gradient(135deg,#065f46,#16a34a);
      color:white;box-shadow:0 6px 18px rgba(22,163,74,.4);
    }
    .btn-cash:hover{background:linear-gradient(135deg,#16a34a,#15803d);box-shadow:0 8px 24px rgba(22,163,74,.5);}
    
    /* تذييل */
    .footer-note{margin-top:32px;text-align:center;padding:16px;background:#f8fafc;border-radius:var(--radius);color:var(--text-lt);font-size:12px;}
    
    /* مودال */
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:9999;}
    .modal.open{display:flex;}
    .modal-box{background:white;width:90%;max-width:500px;border-radius:22px;padding:26px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.3);}
    .modal-icon{font-size:44px;margin-bottom:12px;}
    .modal-msg{color:var(--navy);font-size:15px;font-weight:700;margin-bottom:18px;}
    .modal-btns{display:flex;gap:10px;justify-content:center;}
    .no-data{text-align:center;padding:40px;color:var(--text-lt);}
    .loader{text-align:center;padding:40px;color:var(--text-lt);}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    /* استايلات الفلتر */
    .filter-panel{background:#f8fafc;border-radius:20px;padding:20px;margin-bottom:24px;border:1px solid var(--border);}
    .filter-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:15px;}
    .filter-group{display:flex;flex-direction:column;gap:6px;text-align:right;}
    .filter-group label{font-size:12px;font-weight:700;color:var(--text-lt);}
    .filter-select{padding:10px 14px;border:2px solid var(--border);border-radius:12px;font-size:14px;font-family:'Cairo',sans-serif;background:white;cursor:pointer;transition:all .2s;}
    .filter-select:focus{border-color:var(--teal);outline:none;}
    .filter-select option{padding:8px;}
    .btn-view{background:linear-gradient(135deg,var(--teal),#0f766e);color:white;padding:12px 24px;border:none;border-radius:40px;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;width:100%;margin-top:10px;}
    .btn-view:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(13,148,136,.4);}
    .btn-view:disabled{opacity:.5;cursor:not-allowed;transform:none;}
    .selected-info{background:#e6f0ff;border-radius:12px;padding:10px 15px;margin-top:12px;font-size:13px;color:var(--navy);text-align:center;}
    @media(max-width:600px){.action-grid{grid-template-columns:1fr;}.filter-row{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>🧾 لوحة المحاسب</h2>
    <div class="header-right">
      <span class="user-chip" id="userNameDisplay"></span>
      <button class="logout-btn" onclick="logout()">🚪 خروج</button>
    </div>
  </div>
  <div class="content" id="mainContent"><div style="text-align:center;padding:40px;color:#94a3b8">⏳ جاري التحميل...</div></div>
</div>

<!-- Alert -->
<div id="alertModal" class="modal">
  <div class="modal-box"><div class="modal-icon">ℹ️</div><div class="modal-msg" id="alertMsg"></div><button class="action-btn btn-navy" onclick="closeAlert()">موافق</button></div>
</div>
<!-- Confirm -->
<div id="confirmModal" class="modal">
  <div class="modal-box"><div class="modal-icon">❓</div><div class="modal-msg" id="confirmMsg"></div>
    <div class="modal-btns">
      <button class="action-btn btn-orange" id="confirmOk">نعم</button>
      <button class="action-btn btn-gray" id="confirmCancel">إلغاء</button>
    </div>
  </div>
</div>

<!-- Modal اختيار العميل (المحسن) -->
<div id="customerSelectModal" class="modal">
  <div class="modal-box" style="max-width:550px;">
    <div class="modal-title" style="font-size:18px;">📊 اختيار عميل / منفذ</div>
    <div id="filterContent" style="text-align:right;">
      <div class="loader"><div class="spinner"></div>جاري تحميل البيانات...</div>
    </div>
    <div class="modal-footer" style="margin-top:20px;">
      <button class="action-btn btn-gray" onclick="closeCustomerSelect()">إلغاء</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwe1Q9pjAJRk9CfWsK5YGjD5uVAbJkMhAVgw6akKkFIR9sz15V78C88Vs5dumKE-SwF/exec';

let currentUser = null;
let allAccounts = [];
let filteredNames = [];

// ====================== دوال الاتصال ======================
function gas(action, params = {}) {
  return new Promise((resolve, reject) => {
    const callbackName = 'jsonp_callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    const url = new URL(GAS_URL);
    url.searchParams.set('action', action);
    url.searchParams.set('callback', callbackName);
    url.searchParams.set('_t', Date.now());
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v ?? '')));
    
    window[callbackName] = function(data) {
      delete window[callbackName];
      if (document.body.contains(script)) {
        document.body.removeChild(script);
      }
      resolve(data);
    };
    
    const script = document.createElement('script');
    script.src = url.toString();
    script.onerror = () => {
      delete window[callbackName];
      if (document.body.contains(script)) {
        document.body.removeChild(script);
      }
      reject(new Error('فشل الاتصال بالخادم'));
    };
    document.body.appendChild(script);
    
    setTimeout(() => {
      if (window[callbackName]) {
        delete window[callbackName];
        if (document.body.contains(script)) {
          document.body.removeChild(script);
        }
        reject(new Error('انتهى وقت الاتصال'));
      }
    }, 30000);
  });
}

// ====================== دوال مساعدة ======================
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showAlert(m){
  document.getElementById('alertMsg').textContent=m;
  document.getElementById('alertModal').classList.add('open');
}
function closeAlert(){
  document.getElementById('alertModal').classList.remove('open');
}
function showConfirm(m,onOk){
  document.getElementById('confirmMsg').textContent=m;
  document.getElementById('confirmModal').classList.add('open');
  const ok=document.getElementById('confirmOk'),ca=document.getElementById('confirmCancel');
  const oh=()=>{
    document.getElementById('confirmModal').classList.remove('open');
    onOk();
    ok.removeEventListener('click',oh);
    ca.removeEventListener('click',ch);
  };
  const ch=()=>{
    document.getElementById('confirmModal').classList.remove('open');
    ok.removeEventListener('click',oh);
    ca.removeEventListener('click',ch);
  };
  ok.addEventListener('click',oh);
  ca.addEventListener('click',ch);
}
function logout(){
  showConfirm('هل أنت متأكد من تسجيل الخروج؟',()=>{
    sessionStorage.removeItem('currentUser');
    location.href='index.html';
  });
}
function go(url){
  sessionStorage.setItem('currentUser',JSON.stringify(currentUser));
  location.href=url;
}

// ====================== دوال اختيار العميل المحسنة ======================
async function openCustomerSelect() {
  document.getElementById('customerSelectModal').classList.add('open');
  document.getElementById('filterContent').innerHTML = '<div class="loader"><div class="spinner"></div>جاري تحميل العملاء...</div>';
  
  try {
    const res = await gas('getAllSuppliersCustomers');
    allAccounts = Array.isArray(res) ? res : [];
    
    // استخراج الأنواع والأنشطة الفريدة
    const types = [...new Set(allAccounts.map(a => a.customerType).filter(Boolean))];
    const categories = [...new Set(allAccounts.map(a => a.category).filter(Boolean))].sort();
    
    let html = `
      <div class="filter-panel" style="background:transparent;padding:0;">
        <div class="filter-row">
          <div class="filter-group">
            <label>🏷️ نوع الحساب</label>
            <select id="filterType" class="filter-select" onchange="updateNamesList()">
              <option value="all">الكل</option>
              ${types.map(t => `<option value="${t}">${t === 'Customer' ? 'عميل' : 'منفذ'}</option>`).join('')}
            </select>
          </div>
          <div class="filter-group">
            <label>🏄 نوع النشاط</label>
            <select id="filterCategory" class="filter-select" onchange="updateNamesList()">
              <option value="all">الكل</option>
              ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="filter-row">
          <div class="filter-group">
            <label>👤 اختر الاسم</label>
            <select id="filterName" class="filter-select" style="background:white;">
              <option value="">-- اختر من القائمة --</option>
            </select>
          </div>
        </div>
        <button class="btn-view" id="viewAccountBtn" onclick="viewSelectedAccount()" disabled>📊 عرض كشف الحساب</button>
        <div id="selectedInfo" class="selected-info" style="display:none;"></div>
      </div>
    `;
    document.getElementById('filterContent').innerHTML = html;
    
    // تحديث قائمة الأسماء الأولية
    updateNamesList();
    
  } catch(e) {
    document.getElementById('filterContent').innerHTML = '<div class="no-data" style="padding:40px;">خطأ في التحميل: ' + e.message + '</div>';
  }
}

function updateNamesList() {
  const typeFilter = document.getElementById('filterType')?.value || 'all';
  const categoryFilter = document.getElementById('filterCategory')?.value || 'all';
  
  // تصفية الحسابات
  filteredNames = allAccounts.filter(acc => {
    if (typeFilter !== 'all' && acc.customerType !== typeFilter) return false;
    if (categoryFilter !== 'all' && acc.category !== categoryFilter) return false;
    return true;
  });
  
  // ترتيب حسب الاسم
  filteredNames.sort((a,b) => (a.customerName || '').localeCompare(b.customerName || '', 'ar'));
  
  const nameSelect = document.getElementById('filterName');
  const viewBtn = document.getElementById('viewAccountBtn');
  const infoDiv = document.getElementById('selectedInfo');
  
  if (nameSelect) {
    if (filteredNames.length === 0) {
      nameSelect.innerHTML = '<option value="">-- لا توجد نتائج --</option>';
      if (viewBtn) viewBtn.disabled = true;
      if (infoDiv) infoDiv.style.display = 'none';
    } else {
      let options = '<option value="">-- اختر من القائمة --</option>';
      filteredNames.forEach(acc => {
        const typeText = acc.customerType === 'Customer' ? 'عميل' : 'منفذ';
        const statusText = acc.status ? '✓' : '✗';
        options += `<option value="${acc.customerId}" data-name="${esc(acc.customerName)}" data-type="${acc.customerType}" data-category="${acc.category}" data-phone="${acc.phone || ''}">
          ${esc(acc.customerName)} (${typeText} - ${acc.category}) ${statusText}
        </option>`;
      });
      nameSelect.innerHTML = options;
      
      // إضافة حدث التغيير
      nameSelect.onchange = function() {
        const selectedOption = nameSelect.options[nameSelect.selectedIndex];
        const selectedId = nameSelect.value;
        
        if (selectedId && viewBtn) {
          viewBtn.disabled = false;
          const name = selectedOption.getAttribute('data-name') || '';
          const type = selectedOption.getAttribute('data-type') || '';
          const category = selectedOption.getAttribute('data-category') || '';
          const phone = selectedOption.getAttribute('data-phone') || '';
          const typeText = type === 'Customer' ? 'عميل' : 'منفذ';
          if (infoDiv) {
            infoDiv.style.display = 'block';
            infoDiv.innerHTML = `✅ تم اختيار: <strong>${name}</strong> (${typeText} - ${category})${phone ? ` | 📞 ${phone}` : ''}`;
          }
        } else {
          if (viewBtn) viewBtn.disabled = true;
          if (infoDiv) infoDiv.style.display = 'none';
        }
      };
      
      if (viewBtn) viewBtn.disabled = true;
      if (infoDiv) infoDiv.style.display = 'none';
    }
  }
}

function viewSelectedAccount() {
  const nameSelect = document.getElementById('filterName');
  const selectedId = nameSelect?.value;
  
  if (!selectedId) {
    showAlert('الرجاء اختيار عميل أو منفذ أولاً', '⚠️');
    return;
  }
  
  const selectedAccount = allAccounts.find(acc => acc.customerId === selectedId);
  if (!selectedAccount) {
    showAlert('البيانات غير موجودة', '❌');
    return;
  }
  
  if (selectedAccount.customerType !== 'Customer') {
    showAlert('هذا الحساب منفذ وليس عميلاً، لا يوجد كشف حساب', '⚠️');
    return;
  }
  
  closeCustomerSelect();
  const userParam = encodeURIComponent(JSON.stringify(currentUser));
  location.href = `CustomerDashboard.html?customerId=${selectedId}&user=${userParam}`;
}

function closeCustomerSelect() {
  document.getElementById('customerSelectModal').classList.remove('open');
}

// ====================== عرض لوحة التحكم ======================
function showDashboard(){
  document.getElementById('userNameDisplay').textContent=currentUser.name||'محاسب';
  document.getElementById('mainContent').innerHTML=`
    <div class="welcome-msg">مرحباً ${currentUser.name||''}! 👋</div>
    <div class="user-card">
      <div class="di"><span class="di-label">الاسم</span><span class="di-val">${currentUser.name||'—'}</span></div>
      <div class="di"><span class="di-label">البريد</span><span class="di-val">${currentUser.email||'—'}</span></div>
      <div class="di"><span class="di-label">المركز</span><span class="di-val">${currentUser.centerName||'—'}</span></div>
      <div class="di"><span class="di-label">الفرع</span><span class="di-val">${currentUser.branchName||'—'}</span></div>
    </div>

    <!-- 📊 مجموعة الفواتير والتقارير -->
    <div class="section-group">
      <div class="section-title">
        <span class="icon">📊</span>
        <h3>الفواتير والتقارير</h3>
      </div>
      <div class="action-grid">
        <button class="action-btn btn-navy" onclick="go('BookingsToday.html')">📅 حجوزات اليوم</button>
        <button class="action-btn btn-navy" onclick="go('BookingsByActiveDate.html')">📄 الفواتير</button>
        <button class="action-btn btn-blue" onclick="go('SalesReport.html')">📊 تقرير المبيعات</button>
        <button class="action-btn btn-gray" onclick="showAlert('التقارير المتقدمة - قيد التطوير')">📈 تقارير متقدمة</button>
      </div>
    </div>

    <!-- 👥 مجموعة الموظفين والغياب والعمولات -->
    <div class="section-group">
      <div class="section-title">
        <span class="icon">👥</span>
        <h3>الموظفون والغياب والعمولات</h3>
      </div>
      <div class="action-grid">
        <button class="action-btn btn-green" onclick="go('EmployeesManagement.html')">👥 إدارة الموظفين</button>
        <button class="action-btn btn-purple" onclick="go('AttendanceManagement.html')">🗓️ إدارة الحضور والغياب</button>
        <button class="action-btn btn-gray" onclick="go('MyAttendance.html')">📋 سجل حضوري</button>
        <button class="action-btn btn-gray" onclick="showAlert('العمولات - قيد التطوير')">💰 العمولات</button>
      </div>
    </div>

    <!-- 💰 مجموعة الخزينة والمصروفات والإيرادات -->
    <div class="section-group">
      <div class="section-title">
        <span class="icon">💰</span>
        <h3>الخزينة والمصروفات والإيرادات</h3>
      </div>
      <div class="action-grid">
        <button class="action-btn btn-cash" onclick="go('CashRegister.html')">💰 إدارة الخزينة اليومية</button>
        <button class="action-btn btn-orange" onclick="go('ExpenseRevenueEntry.html')">💸 مصروفات وإيرادات</button>
      </div>
    </div>

    <!-- 🌍 مجموعة الإعدادات والعملاء والرحلات -->
    <div class="section-group">
      <div class="section-title">
        <span class="icon">🌍</span>
        <h3>الإعدادات والعملاء والرحلات</h3>
      </div>
      <div class="action-grid">
        <button class="action-btn btn-teal" onclick="go('ManageSupplierCustomers.html')">🏢 إدارة العملاء والمنفذين</button>
        <button class="action-btn btn-gold" onclick="go('ExchangeRatesDashboard.html')">💱 أسعار الصرف</button>
        <button class="action-btn btn-gray" onclick="go('TripsPriceListManager.html')">🗺️ أسعار الرحلات</button>
      </div>
    </div>

    <!-- 🏢 مجموعة فواتير العملاء (المراكز والفروع) -->
    <div class="section-group">
      <div class="section-title">
        <span class="icon">🏢</span>
        <h3>فواتير العملاء (المراكز والفروع)</h3>
      </div>
      <div class="action-grid">
        <button class="action-btn" style="background:linear-gradient(135deg,#0f1f3d,#1e3a5f);color:var(--gold)" onclick="go('CustomerInvoice.html')">📋 فاتورة عميل</button>
        <button class="action-btn btn-teal" onclick="openCustomerSelect()">📊 كشف حساب العملاء</button>
        <button class="action-btn btn-gray" onclick="showAlert('مديونيات العملاء - قيد التطوير')">💰 مديونيات العملاء</button>
      </div>
    </div>

    <div class="footer-note">
      ⚡ النظام المحاسبي المتكامل | آخر تحديث: ${new Date().toLocaleDateString('ar-EG')}
    </div>
  `;
}

// ====================== تهيئة الصفحة ======================
document.addEventListener('DOMContentLoaded',()=>{
  let ud=sessionStorage.getItem('currentUser');
  if(!ud){
    const p=new URLSearchParams(location.search).get('user');
    if(p){
      ud=decodeURIComponent(p);
      sessionStorage.setItem('currentUser',ud);
    }
  }
  if(!ud){
    location.href='index.html';
    return;
  }
  try{
    currentUser=JSON.parse(ud);
  }catch{
    location.href='index.html';
    return;
  }
  if(currentUser.type!=='Accountant'&&currentUser.type!=='Admin'){
    location.href='index.html';
    return;
  }
  showDashboard();
});

window.go = go;
window.logout = logout;
window.showAlert = showAlert;
window.closeAlert = closeAlert;
window.openCustomerSelect = openCustomerSelect;
window.closeCustomerSelect = closeCustomerSelect;
window.updateNamesList = updateNamesList;
window.viewSelectedAccount = viewSelectedAccount;
