<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Print</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Cairo', 'Segoe UI', Arial, sans-serif;
      background: #eef2f5;
      padding: 30px 20px;
      display: flex;
      justify-content: center;
    }
    .invoice {
      max-width: 800px;
      width: 100%;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    /* Header */
    .header {
      background: linear-gradient(135deg, #0f1f3d, #1a3260);
      padding: 20px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      border-bottom: 3px solid #f5c842;
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    .logo-img {
      max-width: 60px;
      max-height: 60px;
      object-fit: contain;
    }
    .center-name {
      color: #f5c842;
      font-size: 18px;
      font-weight: 800;
    }
    .receipt-title {
      text-align: right;
    }
    .receipt-title .label {
      color: #94a3b8;
      font-size: 11px;
      letter-spacing: 1px;
    }
    .receipt-title .number {
      color: white;
      font-size: 22px;
      font-weight: 900;
      font-family: monospace;
    }
    /* Info Grid */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 20px 25px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    .info-item {
      display: flex;
      flex-direction: column;
    }
    .info-label {
      font-size: 10px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .info-value {
      font-size: 14px;
      font-weight: 600;
      color: #0f1f3d;
      margin-top: 4px;
      word-break: break-word;
    }
    /* Trip Section */
    .section {
      padding: 16px 25px;
      border-bottom: 1px solid #e2e8f0;
    }
    .section-title {
      font-size: 13px;
      font-weight: 800;
      color: #f5c842;
      background: #0f1f3d;
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .trip-name {
      font-size: 18px;
      font-weight: 800;
      color: #0f1f3d;
      margin-bottom: 12px;
    }
    .activities-table {
      width: 100%;
      border-collapse: collapse;
    }
    .activities-table th,
    .activities-table td {
      padding: 8px 5px;
      text-align: center;
      border-bottom: 1px solid #e2e8f0;
      font-size: 13px;
    }
    .activities-table th {
      background: #f1f5f9;
      font-weight: 700;
      color: #1e293b;
    }
    .activities-table td:first-child {
      text-align: left;
      font-weight: 600;
    }
    /* Totals */
    .totals {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 10px;
      padding: 15px 25px;
      background: #fefce8;
      border-bottom: 1px solid #e2e8f0;
    }
    .total-amount {
      font-size: 22px;
      font-weight: 900;
      color: #0f1f3d;
    }
    .total-currency {
      font-size: 14px;
      color: #f5c842;
      font-weight: 700;
    }
    .discount {
      color: #dc2626;
      font-size: 14px;
    }
    /* Payments Grid */
    .payments-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 12px 0;
    }
    .payment-card {
      background: #f8fafc;
      border-radius: 12px;
      padding: 8px 6px;
      text-align: center;
      border: 1px solid #e2e8f0;
    }
    .payment-currency {
      font-size: 11px;
      font-weight: 800;
      color: #64748b;
      text-transform: uppercase;
    }
    .payment-amount {
      font-size: 15px;
      font-weight: 700;
      color: #0f1f3d;
    }
    /* Rest */
    .rest-area {
      background: #0f1f3d;
      margin: 0 25px 16px 25px;
      border-radius: 50px;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .rest-label {
      color: #94a3b8;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .rest-value {
      color: #f5c842;
      font-size: 26px;
      font-weight: 900;
    }
    .rest-currency {
      color: white;
      font-size: 14px;
    }
    /* Footer */
    .footer {
      padding: 16px 25px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 15px;
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
    }
    .signature-area {
      text-align: center;
    }
    .signature-img {
      max-width: 150px;
      max-height: 60px;
      border: 1px dashed #cbd5e1;
      border-radius: 8px;
      padding: 5px;
      background: white;
    }
    .signature-label {
      font-size: 9px;
      color: #94a3b8;
      margin-top: 5px;
    }
    .contact-numbers, .policy {
      font-size: 10px;
      color: #64748b;
      line-height: 1.5;
    }
    hr {
      margin: 8px 0;
      border-color: #e2e8f0;
    }
    @media print {
      body {
        background: white;
        padding: 0;
      }
      .invoice {
        box-shadow: none;
        border-radius: 0;
      }
      .header {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .section-title {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .rest-area {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
    @media (max-width: 550px) {
      .info-grid {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .payments-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .footer {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="invoice" id="invoiceContainer">
    <!-- سيتم تعبئتها بواسطة JavaScript -->
  </div>
  <script>
    function renderInvoice(data) {
      const container = document.getElementById('invoiceContainer');
      if (!container) return;
      
      // دالة مساعدة للقيم الفارغة
      const nvl = (val, defaultVal = '—') => (val && val !== 0 && val !== '0') ? val : defaultVal;
      const formatNumber = (num) => {
        if (num === undefined || num === null || num === '') return '—';
        const n = parseFloat(num);
        return isNaN(n) ? '—' : n.toFixed(2);
      };
      
      // بنود الرحلة
      let activitiesHtml = '';
      if (data.items && data.items.length > 0) {
        activitiesHtml = `<table class="activities-table">
          <thead><tr><th>النشاط</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead>
          <tbody>`;
        data.items.forEach(item => {
          const total = (item.quantity || 0) * (item.price || 0);
          activitiesHtml += `<tr>
            <td>${nvl(item.name)}</td>
            <td>${nvl(item.quantity)}</td>
            <td>${formatNumber(item.price)} ${nvl(item.currency, '')}</td>
            <td>${formatNumber(total)} ${nvl(item.currency, '')}</td>
          </tr>`;
        });
        activitiesHtml += `</tbody></table>`;
      } else {
        activitiesHtml = `<p style="color:#94a3b8; font-size:13px;">لا توجد أنشطة</p>`;
      }
      
      // المدفوعات
      const paymentCurrencies = [
        { key: 'cashUSD', label: '$ (كاش)', val: data.cashUSD },
        { key: 'cashEUR', label: '€ (كاش)', val: data.cashEUR },
        { key: 'cashGBP', label: '£ (كاش)', val: data.cashGBP },
        { key: 'cashLE', label: 'LE (كاش)', val: data.cashLE },
        { key: 'visaUSD', label: '$ (فيزا)', val: data.visaUSD },
        { key: 'visaEUR', label: '€ (فيزا)', val: data.visaEUR },
        { key: 'visaGBP', label: '£ (فيزا)', val: data.visaGBP },
        { key: 'visaLE', label: 'LE (فيزا)', val: data.visaLE }
      ];
      
      let paymentsHtml = '<div class="payments-grid">';
      paymentCurrencies.forEach(p => {
        if (p.val && parseFloat(p.val) > 0) {
          paymentsHtml += `<div class="payment-card">
            <div class="payment-currency">${p.label}</div>
            <div class="payment-amount">${formatNumber(p.val)}</div>
          </div>`;
        }
      });
      if (paymentsHtml === '<div class="payments-grid">') {
        paymentsHtml += `<div class="payment-card" style="grid-column:span 4; text-align:center;">لا توجد مدفوعات</div>`;
      }
      paymentsHtml += '</div>';
      
      // التاريخ والوقت
      let timeDisplay = nvl(data.time, '');
      if (timeDisplay !== '—' && timeDisplay.length > 5) {
        timeDisplay = timeDisplay.substring(0, 5);
      }
      
      const html = `
        <div class="header">
          <div class="logo-area">
            ${data.logoUrl ? `<img class="logo-img" src="${data.logoUrl}" alt="Logo">` : ''}
            <div class="center-name">${nvl(data.centerName, 'Default Center')}</div>
          </div>
          <div class="receipt-title">
            <div class="label">ONLINE RECEIPT</div>
            <div class="number">${nvl(data.voucherNo)}</div>
          </div>
        </div>
        
        <div class="info-grid">
          <div class="info-item"><span class="info-label">Guest Name</span><span class="info-value">${nvl(data.guestName)}</span></div>
          <div class="info-item"><span class="info-label">Nationality</span><span class="info-value">${nvl(data.nationality)}</span></div>
          <div class="info-item"><span class="info-label">Phone No.</span><span class="info-value">${nvl(data.phone)}</span></div>
          <div class="info-item"><span class="info-label">Hotel / Room</span><span class="info-value">${nvl(data.hotel)} / ${nvl(data.roomNo)}</span></div>
          <div class="info-item"><span class="info-label">Active Date</span><span class="info-value">${nvl(data.activeDate)}</span></div>
          <div class="info-item"><span class="info-label">Time</span><span class="info-value">${timeDisplay}</span></div>
        </div>
        
        <div class="section">
          <div class="section-title">TRIP DETAILS</div>
          <div class="trip-name">${nvl(data.tripName)}</div>
          ${activitiesHtml}
        </div>
        
        <div class="totals">
          <div><span class="total-amount">${formatNumber(data.total)}</span><span class="total-currency"> ${nvl(data.invoiceCurrency)}</span></div>
          ${data.discount && parseFloat(data.discount) > 0 ? `<div class="discount">خصم: ${formatNumber(data.discount)} ${nvl(data.invoiceCurrency)}</div>` : ''}
        </div>
        
        <div class="section">
          <div class="section-title">PAYMENTS</div>
          ${paymentsHtml}
        </div>
        
        <div class="rest-area">
          <span class="rest-label">REMAINING</span>
          <span><span class="rest-value">${formatNumber(data.rest)}</span><span class="rest-currency"> ${nvl(data.invoiceCurrency)}</span></span>
        </div>
        
        <div class="footer">
          <div class="sales-info">
            <div><strong>SalesMan:</strong> ${nvl(data.salesName)}</div>
            <div><strong>Phone:</strong> ${nvl(data.salesPhone)}</div>
          </div>
          <div class="signature-area">
            ${data.signatureUrl ? `<img class="signature-img" src="${data.signatureUrl}" alt="Signature">` : '<div style="width:120px;height:40px;border:1px dashed #ccc;border-radius:8px;"></div>'}
            <div class="signature-label">Guest Signature</div>
          </div>
        </div>
        
        <div class="section" style="border-top:1px solid #e2e8f0; background:#fafcff;">
          <div class="contact-numbers">📞 ${nvl(data.contactNumbers, 'Contact Numbers: —')}</div>
          <hr>
          <div class="policy">📜 ${nvl(data.cancellationPolicy, 'Cancellation Policy: —')}</div>
        </div>
      `;
      
      container.innerHTML = html;
    }
    
    // استقبال البيانات من Apps Script
    window.onload = function() {
      if (window.parent && window.parent.postMessage) {
        window.parent.postMessage({ type: 'INVOICE_PRINT_READY' }, '*');
      }
    };
  </script>
</body>
</html>
