<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Operations Access - Assign Instructors & Vehicles</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0f1f3d;
      --navy2: #1a3260;
      --gold: #f5c842;
      --gold2: #e6b800;
      --blue: #2563eb;
      --blue-lt: #3b82f6;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #ea580c;
      --purple: #7c3aed;
      --bg: #f0f4f8;
      --card: #fff;
      --border: #dde4f0;
      --text: #1a2540;
      --text-lt: #5a6a8a;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-500: #64748b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    /* Header */
    .header {
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      color: white;
      padding: 12px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 3px 16px rgba(15,31,61,.25);
    }
    .header h2 { color: var(--gold); font-size: 18px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .user-chip { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); border-radius: 40px; padding: 4px 13px; color: white; font-size: 12px; font-weight: 600; }
    .back-btn { background: transparent; border: 2px solid rgba(255,255,255,.3); color: white; padding: 4px 13px; border-radius: 40px; cursor: pointer; font-weight: 700; font-size: 12px; transition: all .2s; }
    .back-btn:hover { border-color: var(--gold); color: var(--gold); }
    
    /* Selection Bar */
    .selection-bar {
      background: white;
      border-bottom: 2px solid var(--border);
      padding: 12px 20px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
      position: sticky;
      top: 60px;
      z-index: 199;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .selection-btn {
      background: var(--navy);
      color: var(--gold);
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      transition: all .2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .selection-btn:hover { background: var(--navy2); transform: translateY(-1px); }
    .selection-badge {
      background: var(--gold);
      color: var(--navy);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 700;
      margin-left: 8px;
    }
    .reset-selection {
      background: #f1f5f9;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 11px;
      cursor: pointer;
    }
    .reset-selection:hover { background: #e2e8f0; }
    
    /* Filter Bar */
    .filter-bar {
      background: white;
      border-bottom: 2px solid var(--border);
      padding: 10px 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
      position: sticky;
      top: 120px;
      z-index: 198;
    }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-group label { font-size: 10px; font-weight: 700; color: var(--text-lt); }
    .filter-group input, .filter-group select {
      padding: 6px 10px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-family: 'Cairo', sans-serif;
      background: white;
    }
    .filter-group select[multiple] { min-width: 180px; max-height: 100px; }
    .btn-go { background: var(--navy); color: var(--gold); border: none; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-weight: 700; }
    .btn-reset { background: #f1f5f9; border: 1px solid var(--border); padding: 6px 16px; border-radius: 20px; cursor: pointer; }
    .export-btn { background: var(--green); color: white; border: none; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-weight: 700; }
    
    .page-size-selector {
      display: flex;
      align-items: center;
      gap: 6px;
      background: white;
      padding: 0 5px;
    }
    .page-size-selector label { font-size: 11px; font-weight: 700; color: var(--gray-500); }
    .page-size-selector select {
      padding: 4px 6px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 11px;
    }
    
    /* Table */
    .tbl-wrap {
      overflow-x: auto;
      position: relative;
      max-height: calc(100vh - 280px);
    }
   table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
  min-width: 1200px;
}
    thead {
      position: sticky;
      top: 0;
      z-index: 180;
      background: linear-gradient(135deg, var(--navy), var(--navy2));
    }
    th {
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      color: var(--gold);
      padding: 10px 6px;
      font-weight: 700;
      white-space: nowrap;
      border-right: 1px solid rgba(255,255,255,.08);
      font-size: 11px;
      cursor: pointer;
    }
    th:hover { background: var(--navy2); }
    td {
      padding: 8px 5px;
      border-bottom: 1px solid #eef2f9;
      color: var(--text);
      white-space: nowrap;
      background: white;
      font-size: 11px;
      vertical-align: middle;
    }
    tr:hover td { background: #f0f6ff; }
    
    .sort-icon { font-size: 9px; margin-left: 3px; }
    .status-pending { background: #fef9c3; color: #854d0e; padding: 2px 8px; border-radius: 20px; display: inline-block; font-size: 10px; }
    .status-confirmed { background: #dcfce7; color: #166534; padding: 2px 8px; border-radius: 20px; display: inline-block; font-size: 10px; }
    
    .action-btn {
      background: var(--blue-lt);
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      margin: 0 2px;
    }
    .action-btn.upsell { background: var(--orange); }
    .action-btn.instructor { background: var(--green); }
    .action-btn.vehicle { background: var(--purple); }
    .action-btn.boat { background: var(--blue); }
    .action-btn.equipment { background: var(--navy2); }
    
    .totals-row td { background: #dbeafe; color: var(--navy); border-top: 2px solid var(--navy); border-bottom: 2px solid var(--navy); position: sticky; bottom: 0; z-index: 70; padding: 8px 5px; font-size: 11px; }
    .tl { font-size: 9px; color: #475569; display: block; margin-bottom: 1px; }
    .tv { font-size: 12px; font-weight: 800; color: var(--navy); }
   .action-buttons {
  display: flex;
  flex-direction: row;
  flex-wrap: nowrap;
  gap: 4px;
  justify-content: center;
  align-items: center;
  white-space: nowrap;
}
.action-btn {
  background: var(--blue-lt);
  color: white;
  border: none;
  padding: 4px 8px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  white-space: nowrap;
}
    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 5px;
      padding: 12px;
      background: white;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .page-btn {
      padding: 4px 9px;
      border: 1px solid var(--border);
      background: white;
      border-radius: 14px;
      cursor: pointer;
      font-size: 11px;
    }
    .page-btn.active { background: var(--navy); color: var(--gold); border-color: var(--navy); }
    .badge-vehicle { background: var(--purple); color: white; display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 9px; font-weight: 700; margin: 1px; }
.badge-boat { background: var(--blue); color: white; display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 9px; font-weight: 700; margin: 1px; }
.badge-instructor { background: var(--green); color: white; display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 9px; font-weight: 700; margin: 1px; }
.badge-upsell { background: var(--orange); color: white; display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 9px; font-weight: 700; margin: 1px; }
.action-btn { background: var(--blue-lt); color: white; border: none; padding: 4px 8px; border-radius: 12px; cursor: pointer; font-size: 10px; font-weight: 600; margin: 0 2px; }
.action-btn.upsell { background: var(--orange); }
.action-btn.instructor { background: var(--green); }
.action-btn.vehicle { background: var(--purple); }
.action-btn.boat { background: var(--blue); }
.action-btn.equipment { background: var(--navy2); }
.disabled-btn { opacity: 0.5; pointer-events: none; cursor: not-allowed; }
    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      color: white;
      z-index: 9999;
      transform: translateY(50px);
      opacity: 0;
      transition: 0.35s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast-success { background: var(--green); }
    .toast-error { background: var(--red); }
    .toast-info { background: var(--blue); }
    
    /* Loader */
    .loader { text-align: center; padding: 50px; color: var(--text-lt); }
    .spinner {
      width: 32px;
      height: 32px;
      border: 4px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    .badge-upsell { background: var(--orange); color: white; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: white;
      width: 90%;
      max-width: 1000px;
      max-height: 90vh;
      border-radius: 20px;
      overflow-y: auto;
      padding: 20px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--gold);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }
    .modal-header h3 { color: var(--navy); font-size: 18px; }
    .close-modal {
      font-size: 28px;
      cursor: pointer;
      color: var(--gray-500);
      background: none;
      border: none;
    }
    .close-modal:hover { color: var(--red); }
    
    /* Form Grid */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 11px; font-weight: 700; color: var(--text-lt); }
    .form-group input, .form-group select {
      padding: 8px 10px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-family: 'Cairo', sans-serif;
    }
    
    /* Selection List */
    .selection-list {
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 16px;
    }
    .selection-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }
    .selection-item:hover { background: var(--gray-50); }
    .selection-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .selection-item .info { flex: 1; }
    .selection-item .name { font-weight: 700; font-size: 13px; color: var(--navy); }
    .selection-item .capacity { font-size: 10px; color: var(--text-lt); }
    .expiry { font-size: 9px; margin-top: 2px; }
    .expiry.warning { color: var(--orange); }
    .expiry.expired { color: var(--red); }
    
    /* Distribution Tables */
    .dist-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
    }
    .dist-table th {
      background: var(--navy);
      color: var(--gold);
      padding: 8px;
      font-size: 11px;
      text-align: center;
    }
    .dist-table td {
      padding: 8px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .dist-table input {
      width: 70px;
      padding: 4px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    
    /* Trip Items Table (for Upsell) */
    .trip-table {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .trip-table table { width: 100%; min-width: 400px; }
    .trip-table th {
      background: var(--navy);
      color: var(--gold);
      padding: 10px;
      font-size: 11px;
      text-align: center;
    }
    .trip-table td { padding: 8px; text-align: center; }
    .trip-table input { width: 80px; padding: 6px; text-align: center; border: 1px solid var(--border); border-radius: 6px; }
    
    /* Payment Grid */
    .payment-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .payment-card {
      background: var(--gray-50);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      text-align: center;
    }
    .payment-card label { display: block; font-size: 10px; font-weight: 700; color: var(--text-lt); margin-bottom: 4px; }
    .payment-card input {
      width: 100%;
      border: none;
      background: transparent;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      outline: none;
    }
    
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 30px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      transition: all 0.2s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--navy); color: var(--gold); }
    .btn-success { background: var(--green); color: white; }
    .btn-danger { background: var(--red); color: white; }
    .btn-warning { background: var(--orange); color: white; }
    .btn-secondary { background: var(--gray-200); color: var(--text); }
    
    .disabled-btn {
      opacity: 0.5;
      pointer-events: none;
      cursor: not-allowed;
    }
    
    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 10px;
      font-size: 9px;
      font-weight: 700;
    }
    .badge-vehicle { background: var(--purple); color: white; }
    .badge-boat { background: var(--blue); color: white; }
    .badge-instructor { background: var(--green); color: white; }
    /* تنسيق عرض الأعمدة */
.tbl-wrap th:nth-child(1) { width: 70px; }  /* Balance */
.tbl-wrap th:nth-child(2) { width: 100px; } /* Voucher # */
.tbl-wrap th:nth-child(3) { width: 95px; }  /* Active Date */
.tbl-wrap th:nth-child(4) { width: 140px; } /* Trip */
.tbl-wrap th:nth-child(5) { width: 120px; } /* Guest */
.tbl-wrap th:nth-child(6) { width: 80px; }  /* Nationality */
.tbl-wrap th:nth-child(7) { width: 50px; }  /* Item1 */
.tbl-wrap th:nth-child(8) { width: 50px; }  /* Item2 */
.tbl-wrap th:nth-child(9) { width: 50px; }  /* Item3 */
.tbl-wrap th:nth-child(10) { width: 50px; } /* Item4 */
.tbl-wrap th:nth-child(11) { width: 50px; } /* Item5 */
.tbl-wrap th:nth-child(12) { width: 50px; } /* Item6 */
.tbl-wrap th:nth-child(13) { width: 50px; } /* Item7 */
.tbl-wrap th:nth-child(14) { width: 50px; } /* Item8 */
.tbl-wrap th:nth-child(15) { width: 50px; } /* Item9 */
.tbl-wrap th:nth-child(16) { width: 50px; } /* Item10 */
.tbl-wrap th:nth-child(17) { width: 100px; } /* Supplier */
.tbl-wrap th:nth-child(18) { width: 100px; } /* Customer */
.tbl-wrap th:nth-child(19) { width: 70px; }  /* Status */
.tbl-wrap th:nth-child(20) { width: 100px; } /* Vehicles */
.tbl-wrap th:nth-child(21) { width: 100px; } /* Boats */
.tbl-wrap th:nth-child(22) { width: 120px; } /* Instructors (Exec) */
.tbl-wrap th:nth-child(23) { width: 120px; } /* Instructors (UpSell) */
.tbl-wrap th:nth-child(24) { width: 200px; } /* Actions */

/* منع التفاف النص في الخلايا */
.tbl-wrap td {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* السماح بالتمرير الأفقي */
.tbl-wrap {
  overflow-x: auto;
  display: block;
}
    @media(max-width: 640px) {
      .filter-bar { flex-direction: column; align-items: stretch; }
      .payment-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="header">
  <h2>🎯 Operations Access - Assign Instructors & Vehicles</h2>
  <div class="header-right">
    <span class="user-chip" id="userNameDisplay"></span>
    <button class="back-btn" onclick="goBack()">← Back</button>
  </div>
</div>

<div class="selection-bar">
  <button class="selection-btn" onclick="openInstructorsModal()">
    👨‍🏫 Instructors <span id="selectedInstructorsBadge" class="selection-badge">0</span>
  </button>
  <button class="selection-btn" onclick="openVehiclesModal()">
    🚗 Vehicles <span id="selectedVehiclesBadge" class="selection-badge">0</span>
  </button>
  <button class="selection-btn" onclick="openBoatsModal()">
    ⛵ Boats <span id="selectedBoatsBadge" class="selection-badge">0</span>
  </button>
  <button class="reset-selection" onclick="resetAllSelections()">🗑️ Clear All</button>
</div>

<div class="filter-bar">
  <div class="filter-group">
    <label>📅 From Date</label>
    <input type="date" id="filterFromDate">
  </div>
  <div class="filter-group">
    <label>📅 To Date</label>
    <input type="date" id="filterToDate">
  </div>
  <div class="filter-group">
  <label>📅 Single Date</label>
  <input type="date" id="filterSingleDate" onchange="applySingleDateFilter()">
</div>
  <div class="filter-group">
    <label>🔍 Search</label>
    <input type="text" id="filterSearch" placeholder="Voucher / Guest">
  </div>
  <div class="filter-group">
    <label>📌 Status</label>
    <select id="filterState">
      <option value="">All</option>
      <option value="pending">Pending</option>
      <option value="confirmed">Confirmed</option>
    </select>
  </div>
  <div class="filter-group">
    <label>🚌 Trip Filter</label>
    <select id="filterTrip" multiple size="1" style="min-width:160px">
      <option value="">All Trips</option>
    </select>
  </div>
  <div class="page-size-selector">
    <label>Show:</label>
    <select id="pageSizeSelect" onchange="changePageSize()">
      <option value="20">20</option>
      <option value="30" selected>30</option>
      <option value="50">50</option>
      <option value="100">100</option>
      <option value="-1">All</option>
    </select>
  </div>
  <button class="btn-go" onclick="applyFilters()">Apply</button>
  <button class="btn-reset" onclick="resetFilters()">Reset</button>
  <button class="export-btn" onclick="exportToExcel()">📊 Export</button>
</div>

<div class="tbl-wrap">
  <div id="tblCont"><div class="loader"><div class="spinner"></div>Loading...</div></div>
</div>
<div class="pagination" id="pagination"></div>

<!-- Modals -->
<div id="instructorsModal" class="modal">
  <div class="modal-content">
    <div class="modal-header"><h3>👨‍🏫 Choose Instructors</h3><button class="close-modal" onclick="closeModal('instructorsModal')">×</button></div>
    <div class="selection-list" id="instructorsList"></div>
    <button class="btn btn-primary" onclick="saveInstructorsSelection()" style="width:100%">✅ Confirm Selection</button>
  </div>
</div>

<div id="vehiclesModal" class="modal">
  <div class="modal-content">
    <div class="modal-header"><h3>🚗 Choose Vehicles</h3><button class="close-modal" onclick="closeModal('vehiclesModal')">×</button></div>
    <div class="selection-list" id="vehiclesList"></div>
    <button class="btn btn-primary" onclick="saveVehiclesSelection()" style="width:100%">✅ Confirm Selection</button>
  </div>
</div>

<div id="boatsModal" class="modal">
  <div class="modal-content">
    <div class="modal-header"><h3>⛵ Choose Boats</h3><button class="close-modal" onclick="closeModal('boatsModal')">×</button></div>
    <div class="selection-list" id="boatsList"></div>
    <button class="btn btn-primary" onclick="saveBoatsSelection()" style="width:100%">✅ Confirm Selection</button>
  </div>
</div>

<div id="assignVehiclesModal" class="modal">
  <div class="modal-content" style="max-width: 900px;">
    <div class="modal-header"><h3>🚗 Distribute Passengers to Vehicles</h3><button class="close-modal" onclick="closeModal('assignVehiclesModal')">×</button></div>
    <div id="assignVehiclesContent"></div>
  </div>
</div>

// ============================================================
// JSONP REQUEST FUNCTION
// ============================================================
function jsonpRequest(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    
    // إضافة centerName إذا كان موجوداً
    if (currentUser?.centerName) params.centerName = currentUser.centerName;
    if (currentUser?.centerId) params.centerId = currentUser.centerId;
    
    params.action = action;
    params.callback = cbName;
    
    const qs = Object.entries(params)
      .map(([k, v]) => k + '=' + encodeURIComponent(String(v ?? '')))
      .join('&');
    
    const url = GAS_URL + '?' + qs;
    const script = document.createElement('script');
    
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('Request timeout'));
    }, 60000);
    
    const cleanup = () => {
      clearTimeout(timeout);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    };
    
    window[cbName] = (data) => {
      cleanup();
      resolve(data);
    };
    
    script.onerror = () => {
      cleanup();
      reject(new Error('Network error - failed to load script'));
    };
    
    script.src = url;
    document.head.appendChild(script);
  });
}
// ============================================================
// UTILITIES
// ============================================================
function showToast(msg, type) {
  const toast = document.createElement('div');
  toast.className = `toast toast-${type} show`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function gas(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    if (currentUser?.centerName) params.centerName = currentUser.centerName;
    params.action = action;
    params.callback = cbName;
    const qs = Object.entries(params).map(([k, v]) => k + '=' + encodeURIComponent(String(v ?? ''))).join('&');
    const url = GAS_URL + '?' + qs;
    const script = document.createElement('script');
    const timeout = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 60000);
    const cleanup = () => { clearTimeout(timeout); delete window[cbName]; script.remove(); };
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('network error')); };
    script.src = url;
    document.head.appendChild(script);
  });
}

function formatDateDDMMMYYYY(date) {
  if (!date) return '';
  const d = new Date(date);
  if (isNaN(d)) return date;
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return String(d.getDate()).padStart(2, '0') + '/' + months[d.getMonth()] + '/' + d.getFullYear();
}

function parseDateFromString(dateStr) {
  if (!dateStr) return null;
  if (dateStr instanceof Date && !isNaN(dateStr)) return dateStr;
  const s = dateStr.toString().trim();
  const match = s.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (match) {
    const months = { Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11 };
    return new Date(parseInt(match[3]), months[match[2]], parseInt(match[1]));
  }
  const isoMatch = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (isoMatch) return new Date(parseInt(isoMatch[1]), parseInt(isoMatch[2]) - 1, parseInt(isoMatch[3]));
  const d = new Date(s);
  return !isNaN(d) ? d : null;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function goBack() {

function canAssignToday(activeDate) {
  if (!activeDate) return false;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const invDate = parseDateFromString(activeDate);
  if (!invDate) return false;
  invDate.setHours(0, 0, 0, 0);
  return invDate.getTime() >= today.getTime();
}
// ============================================================
// SORTING
// ============================================================
function setSort(col) {
  if (sortColumn === col) {
    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
  } else {
    sortColumn = col;
    sortDirection = 'asc';
  }
  doSort();
  renderTable();
  renderPagination();
}

function doSort() {
  filteredInvoices.sort((a, b) => {
    let aVal = a[sortColumn];
    let bVal = b[sortColumn];
    if (aVal === undefined) aVal = '';
    if (bVal === undefined) bVal = '';
    if (sortColumn === 'ActiveDate') {
      aVal = parseDateFromString(aVal)?.getTime() || 0;
      bVal = parseDateFromString(bVal)?.getTime() || 0;
    } else {
      aVal = String(aVal).toLowerCase();
      bVal = String(bVal).toLowerCase();
    }
    if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
    if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
    return 0;
  });
}

async function loadInvoices() {
  try {
    // ✅ أضف centerName إلى المعاملات
    const result = await jsonpRequest('getAllInvoices', { 
      includeCollection: 'true',
      centerName: currentUser?.centerName  // ← هذا السطر مهم
    });
    
    if (Array.isArray(result)) {
      allInvoices = result.filter(inv => {
        const state = (inv.State || inv.state || '').toLowerCase();
        return state === 'confirmed' || state === 'pending';
      });
      
      const tripSet = new Set();
      allInvoices.forEach(inv => {
        const trip = inv.Trip || inv.trip;
        if (trip) tripSet.add(trip);
      });
      uniqueTrips = Array.from(tripSet).sort();
      
      const tripSelect = document.getElementById('filterTrip');
      tripSelect.innerHTML = '<option value="">All Trips</option>';
      uniqueTrips.forEach(trip => {
        tripSelect.innerHTML += `<option value="${escapeHtml(trip)}">${escapeHtml(trip)}</option>`;
      });
      
      applyFilters();
    } else {
      showToast('Failed to load invoices', 'error');
    }
  } catch(e) {
    console.error('loadInvoices error:', e);
    showToast('Connection error: ' + e.message, 'error');
  }
}
function applyFilters() {
  const fromDate = document.getElementById('filterFromDate').value;
  const toDate = document.getElementById('filterToDate').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();
  const state = document.getElementById('filterState').value;
  const selectedTrips = Array.from(document.getElementById('filterTrip').selectedOptions).map(opt => opt.value).filter(v => v);

  // ✅ تحويل التواريخ إلى كائنات Date للمقارنة
  let fromDateObj = null;
  let toDateObj = null;
  
  if (fromDate) {
    fromDateObj = new Date(fromDate);
    fromDateObj.setHours(0, 0, 0, 0);
  }
  if (toDate) {
    toDateObj = new Date(toDate);
    toDateObj.setHours(23, 59, 59, 999);
  }

  filteredInvoices = allInvoices.filter(inv => {
    const activeDate = inv.ActiveDate || inv.activeDate || '';
    const parsedDate = parseDateFromString(activeDate);
    
    // ✅ مقارنة التواريخ بشكل صحيح
    if (fromDateObj && parsedDate && parsedDate < fromDateObj) return false;
    if (toDateObj && parsedDate && parsedDate > toDateObj) return false;
    
    if (state && (inv.State || inv.state || '').toLowerCase() !== state) return false;
    if (selectedTrips.length > 0 && !selectedTrips.includes(inv.Trip || inv.trip)) return false;
    
    if (search) {
      const voucher = (inv.VoucherNo || inv.voucherNo || '').toLowerCase();
      const guest = (inv.GuestName || inv.guestName || '').toLowerCase();
      const trip = (inv.Trip || inv.trip || '').toLowerCase();
      if (!voucher.includes(search) && !guest.includes(search) && !trip.includes(search)) return false;
    }
    
    return true;
  });

  console.log('📊 Filtered invoices:', filteredInvoices.length);
  
  doSort();
  currentPage = 1;
  renderTable();
  renderPagination();
}
function resetFilters() {
  document.getElementById('filterFromDate').value = '';
  document.getElementById('filterToDate').value = '';
  document.getElementById('filterSearch').value = '';
  document.getElementById('filterState').value = '';
  document.getElementById('filterTrip').value = '';
  applyFilters();
}

// CALCULATE SUMS FOR TOTALS ROW
// ============================================================
function calculateSums(data) {
  let item1 = 0, item2 = 0, item3 = 0, item4 = 0, item5 = 0, item6 = 0, item7 = 0, item8 = 0, item9 = 0, item10 = 0;
  
  for (const inv of data) {
    item1 += parseInt(inv.Sgl || inv.sgl || 0);
    item2 += parseInt(inv.Dbl || inv.dbl || 0);
    item3 += parseInt(inv.Trpl || inv.trpl || 0);
    item4 += parseInt(inv.Extra || inv.extra || 0);
    item5 += parseInt(inv.Camel || inv.camel || 0);
    item6 += parseInt(inv.Dinner || inv.dinner || 0);
    item7 += parseInt(inv.VIPDinner || inv.vipDinner || 0);
    item8 += parseInt(inv.StarGazing || inv.starGazing || 0);
    item9 += parseInt(inv.PrivateTrip || inv.privateTrip || 0);
    item10 += parseInt(inv.PrivateTransfer || inv.privateTransfer || 0);
  }
  
  return { item1, item2, item3, item4, item5, item6, item7, item8, item9, item10 };
}
function renderPagination() {
  const totalPages = Math.ceil(filteredInvoices.length / pageSize);
  if (totalPages <= 1) {
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  let html = '';
  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="gotoPage(${i})">${i}</button>`;
  }
  document.getElementById('pagination').innerHTML = html;
}

function gotoPage(page) {
  currentPage = page;
  renderTable();
}

async function loadInstructorsList() {
  try {
    // ✅ استخدام البيانات المخزنة مؤقتاً أولاً
    let instructors = cachedInstructors;
    if (!instructors) {
      instructors = await gas('getInstructors');
      cachedInstructors = instructors;
    }
    
    if (Array.isArray(instructors)) {
      const today = new Date(); today.setHours(0,0,0,0);
      const listHtml = instructors.map(inst => {
        const isSelected = selectedInstructors.includes(inst.id);
        let expiryWarning = '';
        if (inst.licenseExpiry) {
          const expiry = new Date(inst.licenseExpiry);
          if (expiry < today) expiryWarning = '<span class="expiry expired">⚠️ License expired</span>';
          else if (expiry < new Date(today.getTime() + 30*24*60*60*1000)) expiryWarning = '<span class="expiry warning">⚠️ License expires soon</span>';
        }
        if (inst.cdwsExpiry) {
          const expiry = new Date(inst.cdwsExpiry);
          if (expiry < today) expiryWarning += ' <span class="expiry expired">⚠️ CDWS expired</span>';
          else if (expiry < new Date(today.getTime() + 30*24*60*60*1000)) expiryWarning += ' <span class="expiry warning">⚠️ CDWS expires soon</span>';
        }
        return `
          <div class="selection-item" onclick="toggleInstructor('${inst.id}')">
            <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleInstructor('${inst.id}')">
            <div class="info">
              <div class="name">${escapeHtml(inst.name)}</div>
              <div class="capacity">${inst.role || 'Instructor'} | ${inst.organization || ''} | ${inst.level || ''}</div>
              <div class="expiry">${expiryWarning}</div>
            </div>
          </div>
        `;
      }).join('');
      document.getElementById('instructorsList').innerHTML = listHtml || '<div class="selection-item">No instructors found</div>';
    } else {
      document.getElementById('instructorsList').innerHTML = '<div class="selection-item">No instructors found</div>';
    }
  } catch(e) {
    console.error('loadInstructorsList error:', e);
    showToast('Error loading instructors', 'error');
    document.getElementById('instructorsList').innerHTML = '<div class="selection-item">Error loading instructors</div>';
  }
}

function toggleInstructor(id) {
  const index = selectedInstructors.indexOf(id);
  if (index === -1) selectedInstructors.push(id);
  else selectedInstructors.splice(index, 1);
  loadInstructorsList();
  updateSelectionBadges();
}

function saveInstructorsSelection() {
  closeModal('instructorsModal');
  updateSelectionBadges();
  showToast(`Selected ${selectedInstructors.length} instructors`, 'success');
}

function openInstructorsModal() {

          else if (expiryDate < new Date(today.getTime() + 30 * 24 * 60 * 60 * 1000)) expiryWarning = '<span class="expiry warning">⚠️ License expires soon</span>';
        }
        return `
          <div class="selection-item" onclick="toggleBoat('${boat.id}')">
            <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleBoat('${boat.id}')">
            <div class="info">
              <div class="name">${escapeHtml(boat.name)} (Capacity: ${boat.capacity})</div>
              <div class="capacity">License: ${escapeHtml(boat.licenseNumber || '')}</div>
              <div class="expiry">${expiryWarning}</div>
            </div>
          </div>
        `;
      }).join('');
      document.getElementById('boatsList').innerHTML = listHtml || '<div class="selection-item">No boats found</div>';
    } else {
      document.getElementById('boatsList').innerHTML = '<div class="selection-item">No boats found</div>';
    }
  } catch(e) {
    console.error('loadBoatsList error:', e);
    showToast('Error loading boats', 'error');
    document.getElementById('boatsList').innerHTML = '<div class="selection-item">Error loading boats</div>';
  }
}

  }));
  
  try {
    // داخل saveInstructorDistribution()
await gas('testUpdateInvoiceField', {
  voucherNo: currentAssignVoucher,
  field: 'InstructorsExecution',
  value: JSON.stringify(instructorsExecutionJson),
  centerName: currentUser?.centerName
});
    
    const activeDate = invoice.ActiveDate || invoice.activeDate || new Date().toISOString().split('T')[0];
    for (const a of assignments) {
      await gas('assignInstructorToTrip', {
        voucherNo: currentAssignVoucher,
        instructorId: a.instructorId,
        introCount: a.intro,
        courseCount: a.course,
        diverCount: a.diver,

      });

    await loadInvoices();
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }
}
// ============================================================
// UPSELL
// ============================================================
async function openUpsell(voucherNo) {
  const invoice = filteredInvoices.find(i => (i.VoucherNo || i.voucherNo) === voucherNo);
  if (!invoice) return;
  
  currentUpsellVoucher = voucherNo;
  currentUpsellInvoice = invoice;
  
  const tripName = invoice.Trip || invoice.trip || '';
  const currency = invoice.InvoiceCurrency || invoice.invoiceCurrency || 'LE';
  
  if (!tripName) {
    showToast('No trip name found for this invoice', 'error');
    return;
  }
  
  showToast('Loading trip items...', 'info');
  
  try {
    const tripData = await jsonpRequest('getTripData', { tripName, currency });
    let items = [];
    let prices = [];
    
    if (tripData && tripData.items && tripData.items.length > 0) {
      items = tripData.items;
      prices = tripData.prices || [];
    } else {
      // بنود افتراضية إذا لم يتم العثور على بيانات
      items = ['1 Intro', '2 Intro', 'Diver', 'C.D.', 'S.R.'];
      prices = [20, 30, 60, 100, 40];
    }
    
    // ✅ تصفية البنود: إزالة Adult, Child, Inf, Infant (لأنها ليست مبيعات إضافية)
    const filteredItems = [];
    const filteredPrices = [];
    const excludeList = ['Adult', 'Child', 'Inf', 'Infant', 'adult', 'child', 'inf', 'infant'];
    
    for (let i = 0; i < items.length; i++) {
      const itemName = items[i].toString().trim();
      if (!excludeList.includes(itemName)) {
        filteredItems.push(itemName);
        filteredPrices.push(prices[i] || 0);
      }
    }
    
    // إذا لم يتبقى أي بنود بعد التصفية، استخدم البنود الافتراضية
    if (filteredItems.length === 0) {
      filteredItems.push('1 Intro', '2 Intro', 'Diver', 'C.D.', 'S.R.');
      filteredPrices.push(20, 30, 60, 100, 40);
    }
    
    currentUpsellTripItems = filteredItems.map((item, idx) => ({ 
      name: item, 
      price: filteredPrices[idx] || 0, 
      quantity: 0 
    }));
    
    // ✅ بناء جدول البنود مع إمكانية تعديل السعر والكمية
    let itemsHtml = `
      <div class="trip-table">
        <table style="width:100%; border-collapse:collapse;">
          <thead>
            <tr style="background:var(--navy); color:var(--gold);">
              <th style="padding:8px;">Activity</th>
              <th style="padding:8px;">Price (${escapeHtml(currency)})</th>
              <th style="padding:8px;">Quantity</th>
              <th style="padding:8px;">Total</th>
             </tr>
          </thead>
          <tbody>
    `;
    
    for (let i = 0; i < currentUpsellTripItems.length; i++) {
      const item = currentUpsellTripItems[i];
      itemsHtml += `
        <tr>
          <td style="padding:8px; text-align:center;">${escapeHtml(item.name)}</td>
          <td style="padding:8px; text-align:center;">
            <input type="number" id="upsell_price_${i}" value="${item.price}" step="0.01" style="width:80px; padding:4px; text-align:center;" onchange="updateUpsellTotal(${i})">
          </td>
          <td style="padding:8px; text-align:center;">
            <input type="number" id="upsell_qty_${i}" value="0" min="0" step="1" style="width:70px; padding:4px; text-align:center;" onchange="updateUpsellTotal(${i})">
          </td>
          <td style="padding:8px; text-align:center;" id="upsell_total_${i}">0.00</td>
        </tr>
      `;
    }
    itemsHtml += '</tbody>赶</div>';
    
    // ✅ بناء قائمة المدربين
    let instructorsHtml = '<option value="">Select selling instructor</option>';
    const instructors = await jsonpRequest('getInstructors', { centerName: currentUser?.centerName });
    if (Array.isArray(instructors)) {
      instructors.forEach(inst => {
        instructorsHtml += `<option value="${inst.id}">${escapeHtml(inst.name)}</option>`;
      });
    }
    
    // ✅ بناء قسم المدفوعات
    const paymentsHtml = `
      <div style="background: #f0fdf4; padding: 12px; border-radius: 8px; margin: 12px 0;">
        <div style="font-weight: 700; margin-bottom: 8px;">💰 Payment Details</div>
        <div class="payment-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px;">
          <div class="payment-card"><label>Cash USD</label><input type="number" id="upsellCashUSD" step="0.01" placeholder="0" value="0"></div>
          <div class="payment-card"><label>Cash EUR</label><input type="number" id="upsellCashEUR" step="0.01" placeholder="0" value="0"></div>
          <div class="payment-card"><label>Cash GBP</label><input type="number" id="upsellCashGBP" step="0.01" placeholder="0" value="0"></div>
          <div class="payment-card"><label>Cash EGP</label><input type="number" id="upsellCashLE" step="0.01" placeholder="0" value="0"></div>
          <div class="payment-card"><label>Visa USD</label><input type="number" id="upsellVisaUSD" step="0.01" placeholder="0" value="0"></div>
          <div class="payment-card"><label>Visa EUR</label><input type="number" id="upsellVisaEUR" step="0.01" placeholder="0" value="0"></div>
          <div class="payment-card"><label>Visa GBP</label><input type="number" id="upsellVisaGBP" step="0.01" placeholder="0" value="0"></div>
          <div class="payment-card"><label>Visa EGP</label><input type="number" id="upsellVisaLE" step="0.01" placeholder="0" value="0"></div>
        </div>
      </div>
    `;
    
    // ✅ بناء الأزرار
    const buttonsHtml = `
      <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px;">
        <button class="btn btn-secondary" onclick="closeModal('upsellModal')">Cancel</button>
        <button class="btn btn-success" onclick="saveUpsell()">💰 Create UpSell Invoice</button>
      </div>
    `;
    
    // تجميع المحتوى بالكامل
    const upsellHtml = `
      ${itemsHtml}
      <div class="form-group" style="margin-top: 16px;">
        <label>Selling Instructor</label>
        <select id="upsellInstructor" style="width:100%; padding:8px; border-radius:8px; border:1px solid var(--border);">${instructorsHtml}</select>
      </div>
      ${paymentsHtml}
      ${buttonsHtml}
    `;
    
    document.getElementById('upsellContent').innerHTML = upsellHtml;
    openModal('upsellModal');
    
  } catch(e) {
    console.error('openUpsell error:', e);
    showToast('Error loading trip items: ' + e.message, 'error');
  }
}

// ✅ دالة مساعدة لتحديث الإجمالي في UpSell
function updateUpsellTotal(idx) {
  const qty = parseInt(document.getElementById(`upsell_qty_${idx}`)?.value) || 0;
  const price = parseFloat(document.getElementById(`upsell_price_${idx}`)?.value) || 0;
  const total = qty * price;
  const totalCell = document.getElementById(`upsell_total_${idx}`);
  if (totalCell) totalCell.textContent = total.toFixed(2);
}

// ✅ دالة حفظ UpSell
async function saveUpsell() {
  // جمع العناصر المختارة
  const items = [];
  for (let i = 0; i < currentUpsellTripItems.length; i++) {
    const quantity = parseInt(document.getElementById(`upsell_qty_${i}`)?.value) || 0;
    const price = parseFloat(document.getElementById(`upsell_price_${i}`)?.value) || 0;
    if (quantity > 0) {
      items.push({
        name: currentUpsellTripItems[i].name,
        quantity: quantity,
        price: price,
        position: i + 1
      });
    }
  }
  
  if (items.length === 0) {
    showToast('Please select at least one upsell item', 'error');
    return;
  }
  
  const instructorId = document.getElementById('upsellInstructor')?.value;
  if (!instructorId) {
    showToast('Please select selling instructor', 'error');
    return;
  }
  
  const amounts = {
    cashUSD: parseFloat(document.getElementById('upsellCashUSD')?.value) || 0,
    cashEUR: parseFloat(document.getElementById('upsellCashEUR')?.value) || 0,
    cashGBP: parseFloat(document.getElementById('upsellCashGBP')?.value) || 0,
    cashLE: parseFloat(document.getElementById('upsellCashLE')?.value) || 0,
    visaUSD: parseFloat(document.getElementById('upsellVisaUSD')?.value) || 0,
    visaEUR: parseFloat(document.getElementById('upsellVisaEUR')?.value) || 0,
    visaGBP: parseFloat(document.getElementById('upsellVisaGBP')?.value) || 0,
    visaLE: parseFloat(document.getElementById('upsellVisaLE')?.value) || 0
  };
  
  const totalAmount = Object.values(amounts).reduce((a, b) => a + b, 0);
  if (totalAmount === 0) {
    showToast('Please enter payment amounts', 'error');
    return;
  }
  
  // تخزين في عمود InstructorsUpSell
  const upsellData = [{
    instructorId: instructorId,
    items: items,
    totalAmount: totalAmount,
    payments: amounts
  }];
  
  try {
    showToast('Creating UpSell invoice...', 'info');
    const result = await jsonpRequest('createUpSellInvoice', {
      originalVoucherNo: currentUpsellVoucher,
      upSellItems: JSON.stringify(items),
      upSellAmounts: JSON.stringify(amounts),
      instructorId: instructorId,
      upsellData: JSON.stringify(upsellData)
    });
    
    if (result?.success) {
      // تحديث عمود InstructorsUpSell في الفاتورة الأصلية
      await jsonpRequest('testUpdateInvoiceField', {
        voucherNo: currentUpsellVoucher,
        field: 'InstructorsUpSell',
        value: JSON.stringify(upsellData),
        centerName: currentUser?.centerName
      });
      
      showToast(`UpSell invoice created: ${result.voucherNo}`, 'success');
      closeModal('upsellModal');
      await loadInvoices();
    } else {
      showToast(result?.message || 'Failed to create UpSell', 'error');
    }
  } catch(e) {
    console.error('UpSell error:', e);
    showToast('Connection error: ' + e.message, 'error');
  }
}

  }
  return null;
}

async function getBoatById(id) {
  const boats = await gas('getBoats');
  if (Array.isArray(boats)) {
    return boats.find(b => b.id === id);
  }
  return null;
}

async function getInstructorById(id) {
  const instructors = await gas('getInstructors');
  if (Array.isArray(instructors)) {
    return instructors.find(i => i.id === id);
  }
  return null;
}
