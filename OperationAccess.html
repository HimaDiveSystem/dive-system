<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Operations Access - Assign Instructors & Vehicles</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/choices.js/10.2.0/choices.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/choices.js/10.2.0/choices.min.js"></script>
  <style>
    :root {
      --navy: #0f1f3d;
      --navy2: #1a3260;
      --gold: #f5c842;
      --gold2: #e6b800;
      --blue: #2563eb;
      --blue-lt: #3b82f6;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #ea580c;
      --purple: #7c3aed;
      --bg: #f0f4f8;
      --card: #fff;
      --border: #dde4f0;
      --text: #1a2540;
      --text-lt: #5a6a8a;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-500: #64748b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    .header {
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      color: white;
      padding: 12px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky;
      top: 0;

      box-shadow: 0 3px 16px rgba(15,31,61,.25);
    }
    .header h2 { color: var(--gold); font-size: 18px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .user-chip { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); border-radius: 40px; padding: 4px 13px; color: white; font-size: 12px; font-weight: 600; }
    .back-btn { background: transparent; border: 2px solid rgba(255,255,255,.3); color: white; padding: 4px 13px; border-radius: 40px; cursor: pointer; font-weight: 700; font-size: 12px; transition: all .2s; }

    /* Selection Bar */
    .selection-bar {
      background: white;
      border-bottom: 2px solid var(--border);

      gap: 15px;
      flex-wrap: wrap;

    .selection-btn {

    /* Filter Bar */

    .filter-group label { font-size: 10px; font-weight: 700; color: var(--text-lt); text-transform: uppercase; }
    .filter-group input, .filter-group select {

<script>
// ============================================================
// CONFIGURATION & GLOBALS
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwC1BRoLAJthZqxWTYyMUSjPNNGfCI0BjTfhE7ZiVx67rUP__OKAj0vlwD1-RUCOMSE/exec';
const DASH = { Admin: 'Dashboard.html', Owner: 'OwnerDashboard.html', Sales: 'SalesDashboard.html', Accountant: 'AccountantDashboard.html', OperationsManager: 'OperationAccess.html', OperationsSupervisor: 'OperationAccess.html' };

const BOAT_TRIPS = [
  'Private Boat (max 10 persons)',
  'Ras Mohamed Boat',
  'Local Boat',
  'Tiran Island By Boat',
  'Boat Trip Half Day'
];

let currentUser = null;
let allInvoices = [];
let filteredInvoices = [];
let currentPage = 1;
let pageSize = 30;
let sortColumn = 'ActiveDate';
let sortDirection = 'asc';
let uniqueTrips = [];
let choicesInstance = null;

let selectedInstructors = [];
let selectedVehicles = [];
let selectedBoats = [];

let cachedInstructors = null;
let cachedVehicles = null;
let cachedBoats = null;

let currentAssignVoucher = null;
let currentAssignInvoice = null;
let currentUpsellVoucher = null;
let currentUpsellInvoice = null;
let currentUpsellTripItems = [];
let pendingTimeVoucher = null;

// ============================================================
// JSONP REQUEST
// ============================================================
function jsonpRequest(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    if (currentUser?.centerName) params.centerName = currentUser.centerName;
    if (currentUser?.centerId) params.centerId = currentUser.centerId;
    params.action = action;
    params.callback = cbName;
    const qs = Object.entries(params).map(([k, v]) => k + '=' + encodeURIComponent(String(v ?? ''))).join('&');
    const url = GAS_URL + '?' + qs;
    const script = document.createElement('script');
    const timeout = setTimeout(() => { cleanup(); reject(new Error('Request timeout')); }, 60000);
    const cleanup = () => { clearTimeout(timeout); delete window[cbName]; script.remove(); };
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('Network error')); };
    script.src = url;
    document.head.appendChild(script);
  });
}

function gas(action, params = {}) {
  return jsonpRequest(action, params);
}

// ============================================================
// UTILITIES
// ============================================================
function showToast(msg, type) {
  const toast = document.createElement('div');
  toast.className = `toast toast-${type} show`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function formatDateDDMMMYYYY(date) {
  if (!date) return '';
  const d = new Date(date);
  if (isNaN(d)) return date;
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return String(d.getDate()).padStart(2, '0') + '/' + months[d.getMonth()] + '/' + d.getFullYear();
}

function parseDateFromString(dateStr) {
  if (!dateStr) return null;
  if (dateStr instanceof Date && !isNaN(dateStr)) return dateStr;
  const s = dateStr.toString().trim();
  const match = s.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (match) {
    const months = { Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11 };
    return new Date(parseInt(match[3]), months[match[2]], parseInt(match[1]));
  }
  const isoMatch = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (isoMatch) return new Date(parseInt(isoMatch[1]), parseInt(isoMatch[2]) - 1, parseInt(isoMatch[3]));
  const d = new Date(s);
  return !isNaN(d) ? d : null;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function goBack() {
  const userType = currentUser?.type || 'Admin';
  window.location.href = DASH[userType] || 'Dashboard.html';
}

function isSingleDateRange() {
  const fromDate = document.getElementById('filterFromDate').value;
  const toDate = document.getElementById('filterToDate').value;
  return fromDate && fromDate === toDate;
}

function updateSelectionButtonsState() {
  const isSingle = isSingleDateRange();
  const btns = ['btnInstructors', 'btnVehicles', 'btnBoats'];
  btns.forEach(id => {
    const btn = document.getElementById(id);
    if (btn) {
      if (isSingle) {
        btn.classList.remove('disabled');
      } else {
        btn.classList.add('disabled');
      }
    }
  });
}

function getRestColor(restValue) {
  if (restValue === undefined || restValue === null) return 'var(--blue)';
  const num = parseFloat(restValue);
  if (isNaN(num)) return 'var(--blue)';
  if (num > 0) return '#dc2626';
  if (num === 0) return '#16a34a';
  return 'var(--blue)';
}

// ============================================================
// SORTING
// ============================================================
function setSort(col) {
  if (sortColumn === col) {
    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
  } else {
    sortColumn = col;
    sortDirection = 'asc';
  }
  doSort();
  renderTable();
  renderPagination();
}

function getSortIcon(col) {
  if (sortColumn !== col) return '⇅';
  return sortDirection === 'asc' ? '↑' : '↓';
}

function doSort() {
  filteredInvoices.sort((a, b) => {
    let aVal = a[sortColumn];
    let bVal = b[sortColumn];
    if (aVal === undefined) aVal = '';
    if (bVal === undefined) bVal = '';
    if (sortColumn === 'Rest') {
      aVal = parseFloat(aVal) || 0;
      bVal = parseFloat(bVal) || 0;
    } else if (sortColumn === 'ActiveDate' || sortColumn === 'IssueDate') {
      aVal = parseDateFromString(aVal)?.getTime() || 0;
      bVal = parseDateFromString(bVal)?.getTime() || 0;
    } else {
      aVal = String(aVal).toLowerCase();
      bVal = String(bVal).toLowerCase();
    }
    if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
    if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
    return 0;
  });
}

function changePageSize() {
  const select = document.getElementById('pageSizeSelect');
  pageSize = parseInt(select.value);
  if (pageSize === -1) pageSize = filteredInvoices.length || 9999;
  currentPage = 1;
  renderTable();
  renderPagination();
}

// ============================================================
// LOAD INVOICES
// ============================================================
async function loadInvoices() {
  try {
    const result = await jsonpRequest('getAllInvoices', { 
      includeCollection: 'true',
      centerName: currentUser?.centerName
    });
    
    if (Array.isArray(result)) {
      allInvoices = result.filter(inv => {
        const state = (inv.State || inv.state || '').toLowerCase();
        return state === 'confirmed' || state === 'pending';
      });
      
      const tripSet = new Set();
      allInvoices.forEach(inv => {
        const trip = inv.Trip || inv.trip;
        if (trip) tripSet.add(trip);
      });
      uniqueTrips = Array.from(tripSet).sort();
      
      initTripFilter();
      applyFilters();
    } else {
      showToast('Failed to load invoices', 'error');
    }
  } catch(e) {
    console.error('loadInvoices error:', e);
    showToast('Connection error: ' + e.message, 'error');
  }
}

function applyFilters() {
  const fromDate = document.getElementById('filterFromDate').value;
  const toDate = document.getElementById('filterToDate').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();
  const state = document.getElementById('filterState').value;
  const selectedTrips = choicesInstance ? choicesInstance.getValue(true) : [];
  
  let fromDateObj = null;
  let toDateObj = null;
  
  if (fromDate) {
    fromDateObj = new Date(fromDate);
    fromDateObj.setHours(0, 0, 0, 0);
  }
  if (toDate) {
    toDateObj = new Date(toDate);
    toDateObj.setHours(23, 59, 59, 999);
  }
  
  filteredInvoices = allInvoices.filter(inv => {
    const activeDate = inv.ActiveDate || inv.activeDate || '';
    const parsedDate = parseDateFromString(activeDate);
    
    if (fromDateObj && parsedDate && parsedDate < fromDateObj) return false;
    if (toDateObj && parsedDate && parsedDate > toDateObj) return false;
    if (state && (inv.State || inv.state || '').toLowerCase() !== state) return false;
    if (selectedTrips.length > 0 && !selectedTrips.includes(inv.Trip || inv.trip)) return false;
    
    if (search) {
      const voucher = (inv.VoucherNo || inv.voucherNo || '').toLowerCase();
      const guest = (inv.GuestName || inv.guestName || '').toLowerCase();
      if (!voucher.includes(search) && !guest.includes(search)) return false;
    }
    
    return true;
  });
  
  doSort();
  currentPage = 1;
  renderTable();
  renderPagination();
  updateSelectionButtonsState();
}

function resetFilters() {
  document.getElementById('filterFromDate').value = '';
  document.getElementById('filterToDate').value = '';
  document.getElementById('filterSearch').value = '';
  document.getElementById('filterState').value = '';
  if (choicesInstance) choicesInstance.removeActiveItems();
  applyFilters();
}

async function saveTimeUpdate() {
  if (!pendingTimeVoucher) return;
  const newTime = document.getElementById('timePickerInput').value;
  if (!newTime) {
    showToast('الرجاء اختيار وقت', 'error');
    return;
  }
  
  try {
    await gas('updateInvoiceFieldV2', {
      voucherNo: pendingTimeVoucher,
      field: 'Time',
      value: newTime,
      centerName: currentUser?.centerName
    });
    
    // تحديث البيانات المحلية دون إعادة تحميل كل شيء
    const invoice = allInvoices.find(i => (i.VoucherNo || i.voucherNo) === pendingTimeVoucher);
    if (invoice) {
      invoice.Time = newTime;
      invoice.time = newTime;
    }

function renderPagination() {
  const totalPages = Math.ceil(filteredInvoices.length / pageSize);
  if (totalPages <= 1) {
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  let html = '';
  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="gotoPage(${i})">${i}</button>`;
  }
  document.getElementById('pagination').innerHTML = html;
}

function gotoPage(page) {
  currentPage = page;
  renderTable();
}

    vehicleId: vehId,

  try {
    await gas('updateInvoiceFieldV2', {
      voucherNo: currentAssignVoucher,
      field: 'VehiclesUsed',
      value: JSON.stringify(vehiclesUsedJson),
      centerName: currentUser?.centerName
    });

    closeModal('assignVehiclesModal');
    await loadInvoices();
  } catch(e) { showToast('Error: ' + e.message, 'error'); }

  currentAssignVoucher = voucherNo;
  currentAssignInvoice = invoice;
  const introCount = parseInt(invoice.Extra || 0);
  const courseCount = parseInt(invoice.Dbl || 0);
  const diverCount = parseInt(invoice.Sgl || 0);
  
  let instructorsHtml = `
    <div style="margin-bottom:16px;">
      <div style="background:#f8f9fa; padding:12px; border-radius:8px; margin-bottom:16px;">
        <strong>Required: Intro:${introCount} | Course:${courseCount} | Diver:${diverCount}</strong>

        <td><strong>${escapeHtml(instructor.name)}</strong></td>
        <td><input type="number" id="intro_${instId}" value="0" min="0" style="width:60px"></td>

    </div>
  `;
  
  document.getElementById('assignInstructorsContent').innerHTML = instructorsHtml;
  openModal('assignInstructorsModal');
}

async function saveInstructorAssignment() {
  const invoice = currentAssignInvoice;
  const requiredIntro = parseInt(invoice.Extra || 0);
  const requiredCourse = parseInt(invoice.Dbl || 0);
  const requiredDiver = parseInt(invoice.Sgl || 0);
  
  let totalIntro = 0, totalCourse = 0, totalDiver = 0;
  const assignments = [];
  
  for (const instId of selectedInstructors) {
    const cb = document.querySelector(`.instructor-checkbox[data-id="${instId}"]`);
    if (!cb || !cb.checked) continue;
    const intro = parseInt(document.getElementById(`intro_${instId}`).value) || 0;
    const course = parseInt(document.getElementById(`course_${instId}`).value) || 0;
    const diver = parseInt(document.getElementById(`diver_${instId}`).value) || 0;
    totalIntro += intro;
    totalCourse += course;
    totalDiver += diver;
    if (intro > 0 || course > 0 || diver > 0) {
      assignments.push({ instructorId: instId, intro, course, diver });
    }
  }
  
  if (totalIntro !== requiredIntro || totalCourse !== requiredCourse || totalDiver !== requiredDiver) {
    showToast(`Mismatch: Intro ${totalIntro}/${requiredIntro}, Course ${totalCourse}/${requiredCourse}, Diver ${totalDiver}/${requiredDiver}`, 'error');
    return;
  }
  
  try {
    await gas('updateInvoiceFieldV2', {
      voucherNo: currentAssignVoucher,
      field: 'InstructorsExecution',
      value: JSON.stringify(assignments),
      centerName: currentUser?.centerName
    });
    showToast(`Assigned ${assignments.length} instructors`, 'success');
    closeModal('assignInstructorsModal');
    await loadInvoices();
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

// ============================================================
// UPSELL (simplified)
// ============================================================
async function openUpsell(voucherNo) {
  const invoice = filteredInvoices.find(i => (i.VoucherNo || i.voucherNo) === voucherNo);
  if (!invoice) return;
  currentUpsellVoucher = voucherNo;
  currentUpsellInvoice = invoice;
  
  const tripName = invoice.Trip || invoice.trip || '';
  const currency = invoice.InvoiceCurrency || invoice.invoiceCurrency || 'LE';
  if (!tripName) { showToast('No trip name found', 'error'); return; }
  
  try {
    const tripData = await gas('getTripData', { tripName, currency });
    let items = tripData?.items || ['1 Intro', '2 Intro', 'Diver', 'C.D.', 'S.R.'];
    let prices = tripData?.prices || [20, 30, 60, 100, 40];
    const exclude = ['Adult', 'Child', 'Inf', 'Infant'];
    const filtered = [];
    const filteredPrices = [];
    for (let i = 0; i < items.length; i++) {
      if (!exclude.includes(items[i])) {
        filtered.push(items[i]);
        filteredPrices.push(prices[i] || 0);
      }
    }
    currentUpsellTripItems = filtered.map((item, idx) => ({ name: item, price: filteredPrices[idx], quantity: 0 }));
    
    let itemsHtml = '<table class="dist-table"><thead><tr><th>Activity</th><th>Price</th><th>Qty</th><th>Total</th></tr></thead><tbody>';
    for (let i = 0; i < currentUpsellTripItems.length; i++) {
      const item = currentUpsellTripItems[i];
      itemsHtml += `
        <tr>
          <td>${escapeHtml(item.name)}</td>
          <td><input type="number" id="upsell_price_${i}" value="${item.price}" step="0.01" style="width:80px"></td>
          <td><input type="number" id="upsell_qty_${i}" value="0" min="0" style="width:70px" onchange="updateUpsellTotal(${i})"></td>
          <td id="upsell_total_${i}">0.00</td>
        </tr>
      `;
    }
    itemsHtml += '</tbody></table>';
    
    const instructors = await gas('getInstructors');
    let instructorsHtml = '<option value="">Select instructor</option>';
    if (Array.isArray(instructors)) {
      instructors.forEach(inst => { instructorsHtml += `<option value="${inst.id}">${escapeHtml(inst.name)}</option>`; });
    }
    
    const upsellHtml = `
      ${itemsHtml}
      <div class="form-group"><label>Selling Instructor</label><select id="upsellInstructor">${instructorsHtml}</select></div>
      <div style="background:#f0fdf4; padding:12px; border-radius:8px; margin:12px 0;">
        <div style="font-weight:700; margin-bottom:8px;">💰 Payment Details</div>
        <div class="payment-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px;">
          <div class="payment-card"><label>Cash USD</label><input type="number" id="upsellCashUSD" step="0.01" value="0"></div>
          <div class="payment-card"><label>Cash EUR</label><input type="number" id="upsellCashEUR" step="0.01" value="0"></div>
          <div class="payment-card"><label>Cash GBP</label><input type="number" id="upsellCashGBP" step="0.01" value="0"></div>
          <div class="payment-card"><label>Cash EGP</label><input type="number" id="upsellCashLE" step="0.01" value="0"></div>
          <div class="payment-card"><label>Visa USD</label><input type="number" id="upsellVisaUSD" step="0.01" value="0"></div>
          <div class="payment-card"><label>Visa EUR</label><input type="number" id="upsellVisaEUR" step="0.01" value="0"></div>
          <div class="payment-card"><label>Visa GBP</label><input type="number" id="upsellVisaGBP" step="0.01" value="0"></div>
          <div class="payment-card"><label>Visa EGP</label><input type="number" id="upsellVisaLE" step="0.01" value="0"></div>
        </div>
      </div>
      <div style="display:flex; gap:10px; justify-content:flex-end;">
        <button class="btn btn-secondary" onclick="closeModal('upsellModal')">Cancel</button>
        <button class="btn btn-success" onclick="saveUpsell()">💰 Create UpSell</button>
      </div>
    `;
    document.getElementById('upsellContent').innerHTML = upsellHtml;
    openModal('upsellModal');
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

function updateUpsellTotal(idx) {
  const qty = parseInt(document.getElementById(`upsell_qty_${idx}`)?.value) || 0;
  const price = parseFloat(document.getElementById(`upsell_price_${idx}`)?.value) || 0;
  const total = qty * price;
  const totalCell = document.getElementById(`upsell_total_${idx}`);
  if (totalCell) totalCell.textContent = total.toFixed(2);
}

async function saveUpsell() {
  const items = [];
  for (let i = 0; i < currentUpsellTripItems.length; i++) {
    const qty = parseInt(document.getElementById(`upsell_qty_${i}`)?.value) || 0;
    const price = parseFloat(document.getElementById(`upsell_price_${i}`)?.value) || 0;
    if (qty > 0) items.push({ name: currentUpsellTripItems[i].name, quantity: qty, price, position: i + 1 });
  }
  if (items.length === 0) { showToast('Please select at least one upsell item', 'error'); return; }
  
  const instructorId = document.getElementById('upsellInstructor')?.value;
  if (!instructorId) { showToast('Please select selling instructor', 'error'); return; }
  
  const amounts = {
    cashUSD: parseFloat(document.getElementById('upsellCashUSD')?.value) || 0,
    cashEUR: parseFloat(document.getElementById('upsellCashEUR')?.value) || 0,
    cashGBP: parseFloat(document.getElementById('upsellCashGBP')?.value) || 0,
    cashLE: parseFloat(document.getElementById('upsellCashLE')?.value) || 0,
    visaUSD: parseFloat(document.getElementById('upsellVisaUSD')?.value) || 0,
    visaEUR: parseFloat(document.getElementById('upsellVisaEUR')?.value) || 0,
    visaGBP: parseFloat(document.getElementById('upsellVisaGBP')?.value) || 0,
    visaLE: parseFloat(document.getElementById('upsellVisaLE')?.value) || 0
  };
  const totalAmount = Object.values(amounts).reduce((a,b)=>a+b,0);
  if (totalAmount === 0) { showToast('Please enter payment amounts', 'error'); return; }
  
  const upsellData = [{ instructorId, items, totalAmount, payments: amounts }];
  try {
    const result = await gas('createUpSellInvoice', {
      originalVoucherNo: currentUpsellVoucher,
      upSellItems: JSON.stringify(items),
      upSellAmounts: JSON.stringify(amounts),
      instructorId,
      upsellData: JSON.stringify(upsellData)
    });
    if (result?.success) {
      await gas('updateInvoiceFieldV2', {
        voucherNo: currentUpsellVoucher,
        field: 'InstructorsUpSell',
        value: JSON.stringify(upsellData),
        centerName: currentUser?.centerName
      });
      showToast(`UpSell invoice created: ${result.voucherNo}`, 'success');
      closeModal('upsellModal');
      await loadInvoices();
    } else { showToast(result?.message || 'Failed', 'error'); }
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

// HELPER FUNCTIONS
// ============================================================
async function getVehicleById(id) {
  const vehicles = await gas('getVehicles');
  if (Array.isArray(vehicles)) return vehicles.find(v => v.id === id);
  return null;
}

async function getBoatById(id) {
  const boats = await gas('getBoats');
  if (Array.isArray(boats)) return boats.find(b => b.id === id);
  return null;
}

async function getInstructorById(id) {
  const instructors = await gas('getInstructors');
  if (Array.isArray(instructors)) return instructors.find(i => i.id === id);
  return null;
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
