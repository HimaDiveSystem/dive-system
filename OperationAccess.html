<html dir="ltr">
<head>

    :root {
      --navy: #0f1f3d;
      --navy2: #1a3260;
      --gold: #f5c842;
      --gold2: #e6b800;
      --blue: #2563eb;
      --blue-lt: #3b82f6;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #ea580c;
      --purple: #7c3aed;
      --bg: #f0f4f8;
      --card: #fff;
      --border: #dde4f0;
      --text: #1a2540;
      --text-lt: #5a6a8a;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-500: #64748b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    /* ========== HEADER & NAVIGATION ========== */
    .header {
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      color: white;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 3px 16px rgba(15,31,61,.25);
    }
    .header h2 { color: var(--gold); font-size: 18px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .user-chip { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); border-radius: 40px; padding: 4px 12px; color: white; font-size: 12px; font-weight: 600; }
    .back-btn { background: transparent; border: 2px solid rgba(255,255,255,.3); color: white; padding: 4px 12px; border-radius: 40px; cursor: pointer; font-weight: 700; font-size: 12px; }
    .back-btn:hover { border-color: var(--gold); color: var(--gold); }
    
    /* ========== SELECTION BAR ========== */
    .selection-bar {
      background: white;
      border-bottom: 2px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      position: sticky;
      top: 60px;
      z-index: 199;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .selection-btn {
      background: var(--navy);
      color: var(--gold);
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .selection-btn.disabled { opacity: 0.5; pointer-events: none; }
    .selection-badge {
      background: var(--gold);
      color: var(--navy);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 700;

    .reset-selection {

      color: var(--text);
      border: 1px solid var(--border);

      border-radius: 40px;
      font-size: 11px;

    /* ========== FILTER BAR ========== */
    .filter-bar {
      background: white;
      border-bottom: 2px solid var(--border);

      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
      position: sticky;
      top: 120px;
      z-index: 198;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .filter-group label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-lt);
      text-transform: uppercase;
    }
    .filter-group input, 
    .filter-group select {

      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-family: 'Cairo', sans-serif;
      background: white;

    .btn-go, .btn-reset, .export-btn {

      cursor: pointer;
      font-weight: 700;
      font-size: 12px;

    .btn-reset { background: #f1f5f9; border: 1px solid var(--border); }
    .export-btn { background: var(--green); color: white; }
    
    /* ========== TABLE STYLES (Desktop) ========== */
    .tbl-wrap {

      position: relative;
      max-height: calc(100vh - 310px);
    }
    table {

    /* Toast */
    .toast {

      bottom: 20px;
      right: 20px;

      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      color: white;

      border: 4px solid var(--border);

<script>
// ============================================================
// CONFIGURATION & GLOBALS
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwC1BRoLAJthZqxWTYyMUSjPNNGfCI0BjTfhE7ZiVx67rUP__OKAj0vlwD1-RUCOMSE/exec';
const DASH = { Admin: 'Dashboard.html', Owner: 'OwnerDashboard.html', Sales: 'SalesDashboard.html', Accountant: 'AccountantDashboard.html', OperationsManager: 'OperationAccess.html', OperationsSupervisor: 'OperationAccess.html' };

const BOAT_TRIPS = ['Private Boat (max 10 persons)', 'Ras Mohamed Boat', 'Local Boat', 'Tiran Island By Boat', 'Boat Trip Half Day'];

let currentUser = null;
let allInvoices = [];
let filteredInvoices = [];
let currentPage = 1;
let pageSize = 30;
let sortColumn = 'activeDate';
let sortDirection = 'asc';
let uniqueTrips = [];

let selectedBeachInstructors = [];
let selectedVehicles = [];
let selectedBoats = [];
let boatInstructorsMap = {};
let currentAssignments = null;

let cachedInstructors = [];
let cachedVehicles = [];
let cachedBoats = [];

let currentAssignVoucher = null;
let currentAssignInvoice = null;

let preloadedData = { logisticsRecords: {}, vehicleTripRecords: {}, dailyAssignments: {} };
let dataLoaded = false;
let invoicesLoaded = false;
let lastFilterParams = {};

// ============================================================
// JSONP REQUEST
// ============================================================
function jsonpRequest(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    if (currentUser?.centerName) params.centerName = currentUser.centerName;
    if (currentUser?.centerId) params.centerId = currentUser.centerId;
    params.action = action;
    params.callback = cbName;
    const qs = Object.entries(params).map(([k, v]) => k + '=' + encodeURIComponent(String(v ?? ''))).join('&');
    const url = GAS_URL + '?' + qs;
    const script = document.createElement('script');
    const timeout = setTimeout(() => { cleanup(); reject(new Error('Request timeout')); }, 30000);
    const cleanup = () => { clearTimeout(timeout); delete window[cbName]; script.remove(); };
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('Network error')); };
    script.src = url;
    document.head.appendChild(script);
  });
}

function gas(action, params = {}) {
  return new Promise((resolve, reject) => {
    const timeoutId = setTimeout(() => reject(new Error('Request timeout')), 60000);  // ✅ 60 ثانية
    jsonpRequest(action, params).then(resolve).catch(reject).finally(() => clearTimeout(timeoutId));
  });
}

function showToast(msg, type) {
  const toast = document.createElement('div');
  toast.className = `toast toast-${type} show`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function formatDateDDMMMYYYY(date) {
  if (!date) return '';
  const d = new Date(date);
  if (isNaN(d)) return date;
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return `${String(d.getDate()).padStart(2, '0')}/${months[d.getMonth()]}/${d.getFullYear()}`;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function goBack() {
  // ✅ العودة للصفحة السابقة في التاريخ
  if (window.history.length > 1) {
    window.history.back();
  } else {
    // إذا لم توجد صفحة سابقة، اذهب للوحة التحكم حسب نوع المستخدم
    const defaultPage = DASH[currentUser?.type || 'Admin'] || 'Dashboard.html';

}
// ✅ تصفية الرحلات لعرض Diving فقط (إلا لبعض الصلاحيات)
function filterTripsByUserType(trips) {
  if (!currentUser) return trips;
  
  // ✅ الصلاحيات التي ترى كل الرحلات
  const fullAccessTypes = ['Admin', 'Owner', 'Accountant', 'FinancialManager'];
  
  if (fullAccessTypes.includes(currentUser.type)) {
    return trips; // كل الرحلات
  }
  
  // ✅ باقي الصلاحيات (OperationsManager, OperationsSupervisor, Sales) تشوف Diving فقط
  return trips.filter(trip => 
    trip.toLowerCase().includes('diving') || 
    trip.toLowerCase().includes('dive') ||
    trip === 'Diving Boat' ||
    trip === 'Diving Trip'
  );
}



function getCurrentDateISO() {
  const fromDate = document.getElementById('filterFromDate').value;
  const toDate = document.getElementById('filterToDate').value;
  if (fromDate && fromDate === toDate) {
    const parts = fromDate.split('-');
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    return `${parts[2]}/${months[parseInt(parts[1]) - 1]}/${parts[0]}`;
  }
  return null;
}

function isSingleDateRange() {
  const fromDate = document.getElementById('filterFromDate').value;
  const toDate = document.getElementById('filterToDate').value;
  return fromDate && fromDate === toDate;
}

async function loadInvoices() {
  if (invoicesLoaded && allInvoices.length > 0) {
    console.log(`📦 استخدام البيانات المخزنة (${allInvoices.length} فاتورة)`);
    applyFilters();
    return;
  }
  
  try {
    showToast('جاري تحميل البيانات...', 'info');
    
    const fromDate = document.getElementById('filterFromDate').value;
    const toDate = document.getElementById('filterToDate').value;
    const isSingleDate = fromDate && fromDate === toDate;
    
    let result = null;
    
    // ✅ محاولة مع timeout أطول
    const fetchWithRetry = async (retryCount = 0) => {
      try {
        if (isSingleDate) {
          const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
          const parts = fromDate.split('-');
          const formattedDate = `${parts[2]}/${months[parseInt(parts[1]) - 1]}/${parts[0]}`;
          return await gas('getInvoicesByDate', { 
            dateStr: formattedDate,
            centerName: currentUser?.centerName
          });
        } else {
          return await gas('getAllInvoices', { 
            includeCollection: 'true',
            centerName: currentUser?.centerName
          });
        }
      } catch(e) {
        if (retryCount < 2) {
          console.log(`⚠️ محاولة إعادة التحميل (${retryCount + 1}/2)...`);
          await new Promise(r => setTimeout(r, 2000));
          return fetchWithRetry(retryCount + 1);
        }
        throw e;
      }
    };
    
    result = await fetchWithRetry();
    
    if (Array.isArray(result)) {
      // ✅ تصفية الحالات (pending / confirmed)
      let invoices = result.filter(inv => {
        const state = (inv.State || inv.state || '').toLowerCase();
        return state === 'confirmed' || state === 'pending';
      });
      
      // ✅ تصفية الرحلات حسب نوع المستخدم (Diving فقط لبعض الصلاحيات)
      if (currentUser && !['Admin', 'Owner', 'Accountant', 'FinancialManager'].includes(currentUser.type)) {
        invoices = invoices.filter(inv => {
          const trip = (inv.Trip || inv.trip || '').toLowerCase();
          return trip.includes('diving') || trip.includes('dive');
        });
      }
      
      allInvoices = invoices;
      invoicesLoaded = true;
      
      // ✅ استخراج الرحلات الفريدة
      const tripSet = new Set();
      allInvoices.forEach(inv => { 
        const trip = inv.Trip || inv.trip;
        if (trip) tripSet.add(trip); 
      });
      uniqueTrips = Array.from(tripSet).sort();
      
      initTripFilter();
      applyFilters();
      showToast(`تم تحميل ${allInvoices.length} فاتورة`, 'success');
    }
  } catch(e) {
    console.error('loadInvoices error:', e);
    showToast('خطأ في التحميل: ' + e.message, 'error');
    allInvoices = [];
  }
}
function initTripFilter() {
  const select = document.getElementById('filterTrip');
  select.innerHTML = '<option value="">All Trips</option>';
  
  // ✅ تطبيق التصفية حسب نوع المستخدم
  let tripsToShow = filterTripsByUserType(uniqueTrips);
  
  tripsToShow.forEach(trip => {
    const option = document.createElement('option');
    option.value = trip;
    option.textContent = trip;
    select.appendChild(option);
  });
  
  select.addEventListener('change', applyFilters);
}

function getSelectedTrips() {
  const select = document.getElementById('filterTrip');
  const selected = [];
  for (let i = 0; i < select.options.length; i++) {
    if (select.options[i].selected && select.options[i].value !== '') selected.push(select.options[i].value);
  }
  const hasAllTrips = Array.from(select.options).some(opt => opt.selected && opt.value === '');
  return hasAllTrips || selected.length === 0 ? [] : selected;
}


function applyFilters() {
  const fromDate = document.getElementById('filterFromDate').value;
  const toDate = document.getElementById('filterToDate').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();
  const state = document.getElementById('filterState').value;
  const selectedTrips = getSelectedTrips();
  const currentParams = JSON.stringify({ fromDate, toDate, search, state, selectedTrips });
  if (currentParams === lastFilterParams && filteredInvoices.length > 0) return;
  lastFilterParams = currentParams;
  
  let fromDateObj = null, toDateObj = null;
  if (fromDate) { fromDateObj = new Date(fromDate); fromDateObj.setHours(0,0,0,0); }
  if (toDate) { toDateObj = new Date(toDate); toDateObj.setHours(23,59,59,999); }
  
  filteredInvoices = [];
  for (let inv of allInvoices) {
    const activeDate = inv.activeDate || '';
    const parsedDate = parseDateFromString(activeDate);
    if (fromDateObj && parsedDate && parsedDate < fromDateObj) continue;
    if (toDateObj && parsedDate && parsedDate > toDateObj) continue;
    if (state && (inv.state || '').toLowerCase() !== state) continue;
    if (selectedTrips.length > 0 && !selectedTrips.includes(inv.trip)) continue;
    if (search) {
      const voucher = (inv.voucherNo || '').toLowerCase();
      const guest = (inv.guestName || '').toLowerCase();
      if (!voucher.includes(search) && !guest.includes(search)) continue;
    }
    filteredInvoices.push(inv);
  }
  doSort();
  currentPage = 1;
  renderTable();      // ✅ وليس renderTableAndCards
  renderPagination();
  updateSelectionButtonsState();
  const currentDate = getCurrentDateISO();
  if (currentDate) loadAndPopulateAssignments(currentDate);
}

function doSort() {
  filteredInvoices.sort((a,b) => {
    let aVal = a[sortColumn], bVal = b[sortColumn];
    if (aVal === undefined) aVal = '';
    if (bVal === undefined) bVal = '';
    if (sortColumn === 'rest') { aVal = parseFloat(aVal) || 0; bVal = parseFloat(bVal) || 0; }
    else if (sortColumn === 'activeDate' || sortColumn === 'issueDate') {
      aVal = parseDateFromString(aVal)?.getTime() || 0;
      bVal = parseDateFromString(bVal)?.getTime() || 0;
    } else { aVal = String(aVal).toLowerCase(); bVal = String(bVal).toLowerCase(); }
    if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
    if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
    return 0;
  });
}

function setSort(col) {
  if (sortColumn === col) {
    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
  } else {
    sortColumn = col;
    sortDirection = 'asc';
  }
  doSort();
  renderTable();           // ✅ تصحيح
  renderPagination();
}

function getSortIcon(col) { return sortColumn !== col ? '⇅' : (sortDirection === 'asc' ? '↑' : '↓'); }

function changePageSize() {
  const select = document.getElementById('pageSizeSelect');
  pageSize = parseInt(select.value);
  if (pageSize === -1) pageSize = filteredInvoices.length || 9999;
  currentPage = 1;

}

function gotoPage(page) {
  currentPage = page;
  renderTable();           // ✅ تصحيح
  renderPagination();
}
function renderPagination() {
  const totalPages = Math.ceil(filteredInvoices.length / pageSize);
  if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  let html = '';
  for (let i = 1; i <= totalPages; i++) html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="gotoPage(${i})">${i}</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function formatRest(restValue, currencySymbol) {
  const num = parseFloat(restValue);
  if (isNaN(num)) return escapeHtml(String(restValue));
  if (num <= 0) return '<span class="rest-zero">✓ Paid</span>';
  return `<span class="rest-pos">${num.toFixed(2)} ${escapeHtml(currencySymbol)}</span>`;
}

function parseDateFromString(dateStr) {
  if (!dateStr) return null;
  if (dateStr instanceof Date && !isNaN(dateStr)) return dateStr;
  const s = dateStr.toString().trim();
  const match = s.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (match) {
    const months = { Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11 };
    return new Date(parseInt(match[3]), months[match[2]], parseInt(match[1]));
  }
  const d = new Date(s);
  return !isNaN(d) ? d : null;
}

function formatValue(val) {
  if (val === undefined || val === null) return '';
  const num = parseFloat(val);
  if (isNaN(num)) return val;
  if (num === 0) return '';
  return num;
}

function renderMobileCards() {
  const start = (currentPage - 1) * pageSize;
  const end = Math.min(start + pageSize, filteredInvoices.length);
  const pageData = filteredInvoices.slice(start, end);
  if (pageData.length === 0) { document.getElementById('cardsContainer').innerHTML = '<div class="loader">لا توجد فواتير</div>'; return; }
  
  let html = '';
  for (const inv of pageData) {
    const voucherNo = inv.voucherNo || '';
    const showActions = isSingleDateRange() && BOAT_TRIPS.includes(inv.trip);
    let currencySymbol = 'LE';
    let currency = inv.invoiceCurrency || 'LE';
    if (currency === '$') currencySymbol = '$';
    else if (currency === '€') currencySymbol = '€';
    else if (currency === '£') currencySymbol = '£';
    
    const restValue = parseFloat(inv.rest) || 0;
    const restHtml = restValue <= 0 ? '<span class="rest-zero">✓ Paid</span>' : `<span class="rest-pos">${restValue.toFixed(2)} ${currencySymbol}</span>`;
    
    let vehiclesHtml = '';
    try {
      const vehiclesData = JSON.parse(inv.VehiclesUsed || '[]');
      vehiclesHtml = vehiclesData.map(v => `<span class="badge-vehicle">🚗 ${v.licensePlate || v.vehicleId}</span>`).join(' ') || '—';
    } catch(e) { vehiclesHtml = '—'; }
    
    let boatsHtml = '';
    try {
      const boatsData = JSON.parse(inv.BoatsUsed || '[]');
      boatsHtml = boatsData.map(b => `<span class="badge-boat">⛵ ${b.boatName || b.boatId}</span>`).join(' ') || '—';
    } catch(e) { boatsHtml = '—'; }
    
    let instructorsHtml = '';
    try {
      const instructorsData = JSON.parse(inv.InstructorsExecution || '[]');
      instructorsHtml = instructorsData.map(i => `<span class="badge-instructor">👨‍🏫 ${i.instructorName || i.instructorId}</span>`).join(' ') || '—';
    } catch(e) { instructorsHtml = '—'; }
    
    const activitiesText = inv.activitiesText || '';
    let activitiesHtml = '';
    if (activitiesText) {
      const parts = activitiesText.split('|');
      activitiesHtml = parts.map(p => `<span>${escapeHtml(p.trim())}</span>`).join('');
    }
    
    html += `
      <div class="invoice-card">
        <div class="card-header">
          <span class="card-voucher">📄 ${escapeHtml(voucherNo)}</span>
          <span class="card-rest">${restHtml}</span>
        </div>
        <div class="card-body">
          <div class="card-row"><span class="card-label">📅 Date:</span><span class="card-value">${formatDateDDMMMYYYY(inv.activeDate)}</span></div>
          <div class="card-row"><span class="card-label">⏰ Time:</span><span class="card-value">${escapeHtml(inv.time || '—')}</span></div>
          <div class="card-row"><span class="card-label">🚌 Trip:</span><span class="card-value">${escapeHtml(inv.trip || '—')}</span></div>
          <div class="card-row"><span class="card-label">👤 Guest:</span><span class="card-value">${escapeHtml(inv.guestName || '—')}</span></div>
          <div class="card-row"><span class="card-label">📞 Contact:</span><span class="card-value">${escapeHtml(inv.contactNo || '—')}</span></div>
          <div class="card-row"><span class="card-label">👥 Passengers:</span><span class="card-value">Sgl:${inv.sgl||0} Dbl:${inv.dbl||0} Trpl:${inv.trpl||0} Extra:${inv.extra||0}</span></div>
          ${activitiesHtml ? `<div class="card-activities">${activitiesHtml}</div>` : ''}
          <div class="card-row"><span class="card-label">🚗 Vehicles:</span><span class="card-value">${vehiclesHtml}</span></div>

async function openAssignInstructors(voucherNo) {
  const invoice = filteredInvoices.find(i => i.voucherNo === voucherNo);
  if (!invoice) return;
  
  currentAssignVoucher = voucherNo;
  currentAssignInvoice = invoice;
  
  // ✅ تحديد المركب المرتبط بهذه الفاتورة (من BoatsUsed)
  let assignedBoats = [];
  try {
    assignedBoats = JSON.parse(invoice.BoatsUsed || '[]');
  } catch(e) {}
  
  // ✅ استخراج معرفات المراكب المرتبطة
  const boatIds = assignedBoats.map(b => b.boatId);
  
  // ✅ جمع المدربين المرتبطين بهذه المراكب من boatInstructorsMap
  const relevantInstructorIds = new Set();
  for (const boatId of boatIds) {
    const instructors = boatInstructorsMap[boatId];
    if (instructors) {
      if (Array.isArray(instructors)) {
        instructors.forEach(id => relevantInstructorIds.add(id));
      } else {
        relevantInstructorIds.add(instructors);
      }
    }
  }
  
  // ✅ إذا لم يكن هناك مراكب أو مدربين، عرض رسالة
  if (relevantInstructorIds.size === 0) {
    showToast('⚠️ لا يوجد مدربين مرتبطين بهذه الفاتورة. الرجاء اختيار مركب ومدربين أولاً.', 'error');
    return;
  }
  
  // ✅ جلب المدربين من المعرفات المحددة فقط
  let instructors = cachedInstructors;
  if (!instructors.length) {
    instructors = await gas('getInstructors');
    cachedInstructors = instructors;
  }
  
  const relevantInstructors = instructors.filter(inst => relevantInstructorIds.has(inst.id));
  
  if (relevantInstructors.length === 0) {
    showToast('لا يوجد مدربين مرتبطين بهذه الفاتورة', 'error');
    return;
  }
  
  // ✅ جلب الأنشطة الديناميكية حسب الرحلة
  let activityItems = [];
  try {
    const tripItems = await gas('getTripItemsForInstructors', { tripName: invoice.trip });
    if (tripItems && tripItems.items) {
      activityItems = tripItems.items;
    }
  } catch(e) {
    console.warn('Could not load trip items, using defaults:', e);
  }
  
  // ✅ استخدام الأنشطة الافتراضية إذا لم يتم جلبها
  if (activityItems.length === 0) {
    activityItems = ['Diver', 'Course', 'Intro'];
  }
  
  // بناء رأس الجدول
  let headersHtml = '<th style="padding: 8px;">👨‍🏫 المدرب</th>';
  for (const item of activityItems) {
    headersHtml += `<th style="padding: 8px;">${escapeHtml(item)}</th>`;
  }
  headersHtml += '<th style="padding: 8px;">✅ تحديد</th>';
  
  // بناء صفوف المدربين
  let rowsHtml = '';
  for (const inst of relevantInstructors) {
    rowsHtml += `<tr>`;
    rowsHtml += `<td style="padding: 8px;"><strong>${escapeHtml(inst.name)}</strong></td>`;
    for (let i = 0; i < activityItems.length; i++) {
      rowsHtml += `<td style="padding: 8px; text-align: center;">
        <input type="number" class="assign-activity" data-instructor="${inst.id}" data-activity-index="${i}" value="0" min="0" style="width: 60px; text-align: center; padding: 4px;">
      </td>`;
    }
    rowsHtml += `<td style="padding: 8px; text-align: center;">
      <input type="checkbox" class="assign-select" data-id="${inst.id}" style="width: 18px; height: 18px; cursor: pointer;">
    </td>`;
    rowsHtml += `</tr>`;
  }
  
  let instructorsHtml = `
    <div class="summary-box" style="margin-bottom: 12px; background: var(--navy); color: white; padding: 12px; border-radius: 8px;">
      <strong>📊 ملخص الفاتورة:</strong><br>
      الرحلة: ${escapeHtml(invoice.trip)}<br>
      عدد المراكب: ${boatIds.length} | عدد المدربين المتاحين: ${relevantInstructors.length}
    </div>
    <div style="overflow-x: auto; max-height: 400px;">
      <table style="width: 100%; font-size: 12px; border-collapse: collapse;">
        <thead>
          <tr style="background: var(--navy); color: var(--gold);">
            ${headersHtml}
          </tr>
        </thead>
        <tbody>
          ${rowsHtml}
        </tbody>
      </table>
    </div>
    <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px;">
      <button class="btn btn-secondary" onclick="closeModal('assignInstructorsModal')">إلغاء</button>
      <button class="btn btn-primary" onclick="saveInstructorAssignmentV3(${JSON.stringify(activityItems).replace(/"/g, '&quot;')})">✅ تعيين</button>
    </div>
  `;
  
  document.getElementById('assignInstructorsContent').innerHTML = instructorsHtml;
  openModal('assignInstructorsModal');
}
 async function saveInstructorAssignmentV3(activityItems) {
  let selectedRows = [];
  
  document.querySelectorAll('#assignInstructorsModal .assign-select:checked').forEach(cb => {
    const instructorId = cb.getAttribute('data-id');
    const activities = [];
    
    for (let i = 0; i < activityItems.length; i++) {
      const qty = parseInt(document.querySelector(`.assign-activity[data-instructor="${instructorId}"][data-activity-index="${i}"]`).value) || 0;
      if (qty > 0) {
        activities.push({
          activityName: activityItems[i],
          quantity: qty
        });
      }
    }
    
    if (activities.length > 0) {
      const instructor = cachedInstructors.find(i => i.id === instructorId);
      selectedRows.push({
        instructorId: instructorId,
        instructorName: instructor?.name || instructorId,
        activities: activities
      });
    }
  });
  
  if (selectedRows.length === 0) {
    showToast('⚠️ الرجاء اختيار مدرب واحد على الأقل', 'error');
    return;
  }
  
  const saveBtn = document.querySelector('#assignInstructorsModal .btn-primary');
  const originalText = saveBtn ? saveBtn.textContent : '✅ تعيين';
  if (saveBtn) {

  function renderSummary() {
  const trips = {};
  
  if (!filteredInvoices || filteredInvoices.length === 0) {
    const summarySec = document.getElementById('summarySec');
    if (summarySec) summarySec.style.display = 'none';
    return;
  }
  
  filteredInvoices.forEach(inv => {
    const sgl = parseInt(inv.Sgl) || parseInt(inv.sgl) || 0;
    const dbl = parseInt(inv.Dbl) || parseInt(inv.dbl) || 0;
    const trpl = parseInt(inv.Trpl) || parseInt(inv.trpl) || 0;
    const extra = parseInt(inv.Extra) || parseInt(inv.extra) || 0;
    
    if (sgl === 0 && dbl === 0 && trpl === 0 && extra === 0) return;
    
    const tripName = (inv.Trip || inv.trip || 'Unknown').trim();
    if (!trips[tripName]) {
      trips[tripName] = { bookings: 0, activities: {} };
    }
    trips[tripName].bookings++;
    
    const activitiesText = (inv.ActivitiesText || inv.activitiesText || '').toString().trim();
    if (activitiesText) {
      activitiesText.split('|').forEach(part => {
        const match = part.trim().match(/^(.+?)×(\d+(\.\d+)?)$/);
        if (match) {
          const activityName = match[1].trim();
          const quantity = parseFloat(match[2]) || 0;
          trips[tripName].activities[activityName] = (trips[tripName].activities[activityName] || 0) + quantity;
        }
      });
    } else {
      if (sgl > 0) trips[tripName].activities['Adult'] = (trips[tripName].activities['Adult'] || 0) + sgl;
      if (dbl > 0) trips[tripName].activities['Child'] = (trips[tripName].activities['Child'] || 0) + dbl;
      if (trpl > 0) trips[tripName].activities['Infant'] = (trips[tripName].activities['Infant'] || 0) + trpl;
      if (extra > 0) trips[tripName].activities['Intro'] = (trips[tripName].activities['Intro'] || 0) + extra;
    }
  });
  
  if (Object.keys(trips).length === 0) {
    const summarySec = document.getElementById('summarySec');
    if (summarySec) summarySec.style.display = 'none';
    return;
  }
  
  let rows = '';
  Object.entries(trips).sort((a, b) => b[1].bookings - a[1].bookings).forEach(([tripName, info]) => {
    const sortedActivities = Object.entries(info.activities).sort((a, b) => b[1] - a[1]);
    const activitiesStr = sortedActivities
      .map(([act, qty]) => `${act}×${Number.isInteger(qty) ? qty : qty.toFixed(1)}`)
      .join(' | ');
    
    rows += `<tr>
      <td><strong>${escapeHtml(tripName)}</strong></td>
      <td style="text-align:center"><span style="background:var(--navy);color:var(--gold);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700">${info.bookings}</span></td>
      <td class="acts-cell" style="white-space:normal; word-break:break-word;">${escapeHtml(activitiesStr || '—')}</span></td>
    </tr>`;
  });
  
  let summaryHtml = `
    <div class="summary-sec" id="summarySec" style="margin-top:16px; padding:14px 20px; background:white; border-top:2px solid var(--border); overflow-x:auto;">
      <div class="summary-title" style="font-size:13px; font-weight:700; color:var(--navy); margin-bottom:8px; text-align:center;">🗺️ Trips Summary</div>
      <div style="overflow-x:auto;">
        <table class="summary-table" style="width:100%; border-collapse:collapse; font-size:12px; margin:0 auto;">
          <thead>
            <tr style="background:var(--navy2); color:var(--gold);">
              <th style="padding:10px 8px; text-align:center; width:28%;">Trip</th>
              <th style="padding:10px 8px; text-align:center; width:15%;">Bookings</th>
              <th style="padding:10px 8px; text-align:center; width:57%;">Activities</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
  
  // ✅ تحديث العنصر الموجود بدلاً من حذفه وإعادة إنشائه
  let existingSummary = document.getElementById('summarySec');
  if (existingSummary) {
    existingSummary.outerHTML = summaryHtml;
  } else {
    const tblWrap = document.querySelector('.tbl-wrap');
    if (tblWrap) {
      tblWrap.insertAdjacentHTML('afterend', summaryHtml);
    }
  }
}

async function exportToExcel() {
  if (!filteredInvoices || filteredInvoices.length === 0) {
    showToast('لا توجد بيانات للتصدير', 'error');
    return;
  }
  
  showToast('جاري تجهيز ملف Excel...', 'info');
  
  try {
    const result = await gas('exportToExcel', {
      data: JSON.stringify(filteredInvoices),
      centerName: currentUser?.centerName,
      centerId: currentUser?.centerId
    });
    
    if (result?.success && result.downloadUrl) {
      // فتح رابط التحميل
      window.open(result.downloadUrl, '_blank');
      showToast('✅ تم تصدير البيانات بنجاح', 'success');
    } else if (result?.csvData) {
      // طريقة بديلة: تحميل CSV مباشرة
      const blob = new Blob([result.csvData], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.href = url;
      link.setAttribute('download', `invoices_${new Date().toISOString().split('T')[0]}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      showToast('✅ تم التصدير بنجاح', 'success');
    } else {
      showToast('❌ فشل التصدير', 'error');
    }
  } catch(e) {
    showToast('خطأ: ' + e.message, 'error');
  }
}

async function loadBranches() {
  if (!currentUser) return;
  
  const branchAccessTypes = ['Owner', 'Accountant', 'FinancialManager'];
  if (!branchAccessTypes.includes(currentUser.type)) return;
  
  const branchSelector = document.getElementById('branchSelector');
  if (branchSelector) branchSelector.style.display = 'inline-block';
  
  try {
    const branches = await gas('getBranches');
    const select = document.getElementById('branchSelect');
    
    select.innerHTML = '<option value="">🌍 جميع الفروع</option>';
    branches.forEach(branch => {
      select.innerHTML += `<option value="${escapeHtml(branch.id)}">${escapeHtml(branch.name)}</option>`;
    });
    
    select.addEventListener('change', async (e) => {
      const branchId = e.target.value;
      if (branchId) {
        const branch = branches.find(b => b.id === branchId);
        if (branch) currentUser.centerName = branch.name;
        currentUser.centerId = branchId;
        sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
      } else {
        delete currentUser.centerName;
        delete currentUser.centerId;
        sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
      }
      
      // ✅ إعادة تحميل البيانات
      lastFilterParams = '';
      invoicesLoaded = false;
      await loadInvoices();
      applyFilters();
      showToast(`تم التبديل إلى ${branch?.name || 'جميع الفروع'}`, 'success');
    });
  } catch(e) {
    console.warn('loadBranches error:', e);
  }
}

// دوال الحفظ المطلوبة
async function saveBeachInstructors() {
  const selected = [];
  document.querySelectorAll('#beachInstructorsList .instructor-checkbox:checked').forEach(cb => {
    selected.push(cb.value);
  });
  
  const currentDate = getCurrentDateISO();
  if (!currentDate) {
    showToast('الرجاء اختيار تاريخ أولاً', 'error');
    return;
  }
  
  // ✅ التحقق من عدم وجود المدرب في المراكب
  const allBoatInstructors = [];
  for (const instructors of Object.values(boatInstructorsMap)) {
    if (Array.isArray(instructors)) {
      allBoatInstructors.push(...instructors);
    } else if (instructors) {
      allBoatInstructors.push(instructors);
    }
  }
  
  const duplicateInBoats = selected.filter(id => allBoatInstructors.includes(id));
  if (duplicateInBoats.length > 0) {
    const duplicateNames = duplicateInBoats.map(id => {
      const inst = cachedInstructors.find(i => i.id === id);
      return inst?.name || id;
    }).join(', ');
    showToast(`⚠️ لا يمكن تعيين نفس المدرب في الشاطئ والمركب: ${duplicateNames}`, 'error');
    return;
  }
  
  selectedBeachInstructors = selected;
  updateSelectionBadges();
  
  // ✅ حفظ في الخادم
  const assignments = currentAssignments || {};
  assignments.beachInstructors = selectedBeachInstructors;
  
  try {
    const result = await gas('saveDailyAssignments', {
      date: currentDate,
      data: JSON.stringify(assignments),
      centerName: currentUser?.centerName
    });
    
    if (result && result.success !== false) {
      currentAssignments = assignments;
      showToast(`✅ تم حفظ ${selected.length} مدرب شاطئ`, 'success');
    } else {
      showToast('⚠️ تم الحفظ محلياً فقط (خطأ في الخادم)', 'warning');
    }
  } catch(e) {
    console.warn('saveBeachInstructors error:', e);
    showToast('تم الحفظ محلياً فقط', 'info');
  }
  
  closeModal('beachInstructorsModal');
}

async function saveLogisticsVehicles() {
  const records = [];
  document.querySelectorAll('#logisticsVehiclesModal .logistics-checkbox:checked').forEach(cb => {
    const vehicleId = cb.dataset.id;
    const trip = document.querySelector(`.logistics-trip[data-id="${vehicleId}"]`).value;
    const goCount = parseInt(document.querySelector(`.logistics-go[data-id="${vehicleId}"]`).value) || 0;
    const returnCount = parseInt(document.querySelector(`.logistics-return[data-id="${vehicleId}"]`).value) || 0;
    
    if (trip && (goCount > 0 || returnCount > 0)) {
      records.push({ vehicleId, tripName: trip, goCount, returnCount });
    }
  });
  
  const currentDate = getCurrentDateISO();
  if (!currentDate) {
    showToast('الرجاء اختيار تاريخ أولاً', 'error');
    return;
  }
  
  if (records.length === 0) {
    showToast('⚠️ الرجاء اختيار سيارة ورحلة وإدخال أرقام', 'error');
    return;
  }
  
  showToast('جاري حفظ البيانات...', 'info');
  
  try {
    const result = await gas('saveLogisticsRecords', { 
      date: currentDate, 
      records: JSON.stringify(records),
      centerName: currentUser?.centerName
    });
    
    if (result?.success) {
      preloadedData.logisticsRecords = records;
      updateSelectionBadges();
      closeModal('logisticsVehiclesModal');
      showToast(`✅ تم حفظ ${records.length} تشغيل`, 'success');
    } else {
      showToast('❌ فشل حفظ البيانات: ' + (result?.message || 'خطأ غير معروف'), 'error');
    }
  } catch(e) {
    showToast('خطأ: ' + e.message, 'error');
  }
}

async function saveBoatsAndInstructors() {
  const selectedBoatsList = [];
  const instructorsMap = {};
  
  document.querySelectorAll('#boatsModal .boat-checkbox:checked').forEach(cb => {
    const boatId = cb.dataset.id;
    selectedBoatsList.push(boatId);

    if (instructorSelect && instructorSelect.value) {
      // ✅ دعم اختيار متعدد (إذا كان select يسمح بـ multiple)
      if (instructorSelect.multiple) {
        instructorsMap[boatId] = Array.from(instructorSelect.selectedOptions).map(opt => opt.value);
      } else {

    } else {

// دوال إزالة الصفوف
function removeVehicleRow(index) {
  const row = document.querySelector(`.vehicle-row[data-row-index="${index}"]`);
  if (row) {
    row.remove();
    // ✅ إعادة ترقيم الصفوف المتبقية
    const remainingRows = document.querySelectorAll('.vehicle-row');
    remainingRows.forEach((row, newIndex) => {
      row.setAttribute('data-row-index', newIndex);
      // تحديث المعرفات داخل الصف
      row.querySelectorAll('[data-row]').forEach(el => {
        el.setAttribute('data-row', newIndex);
      });
    });
  }
}

async function onDateChange() {
  const fromDate = document.getElementById('filterFromDate').value;
  const toDate = document.getElementById('filterToDate').value;
  
  if (!fromDate && !toDate) return;
  
  // ✅ إعادة تعيين التخزين المؤقت
  lastFilterParams = '';
  invoicesLoaded = false;
  
  showToast('جاري تحميل الفواتير...', 'info');
  
  // ✅ إعادة تحميل الفواتير بالكامل
  await loadInvoices();
  
  // ✅ تحديث التعيينات لليوم المحدد (إذا كان تاريخ واحد)
  if (fromDate && toDate && fromDate === toDate) {
    await loadAndPopulateAssignments(fromDate);
    await refreshLogisticsBadge();
  } else {
    selectedBeachInstructors = [];
    selectedBoats = [];
    selectedVehicles = [];
    updateSelectionBadges();
  }
  
  // ✅ تحديث العرض
  applyFilters();
  renderTable();
  renderPagination();
  
  // ✅ تحديث عرض الموبايل
  if (window.innerWidth <= 768) {
    renderMobileCards();
  }
  
  updateSelectionButtonsState();
}
// ✅ تحديث عداد Logistics Vehicles
async function refreshLogisticsBadge() {
  const currentDate = getCurrentDateISO();
  if (!currentDate) return;
  
  try {
    const result = await gas('getLogisticsRecords', { 
      date: currentDate,
      centerName: currentUser?.centerName 
    });
    if (result?.success && result.data) {
      preloadedData.logisticsRecords = result.data;
      const badge = document.getElementById('selectedLogisticsBadge');
      if (badge) badge.textContent = result.data.length;
    }
  } catch(e) {
    console.warn('refreshLogisticsBadge error:', e);
  }
}

// INITIALIZATION
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
  const ud = sessionStorage.getItem('currentUser');
  if (!ud) { window.location.href = 'index.html'; return; }
  try {
    currentUser = JSON.parse(ud);
     await loadBranches();
    document.getElementById('userNameDisplay').textContent = currentUser.name || 'User';
    const today = new Date();
    const todayISO = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    const fromDateInput = document.getElementById('filterFromDate');
    const toDateInput = document.getElementById('filterToDate');
    if (fromDateInput && !fromDateInput.value) fromDateInput.value = todayISO;
    if (toDateInput && !toDateInput.value) toDateInput.value = todayISO;
    showToast('جاري تحميل الفواتير...', 'info');
    await loadInvoices();
    renderTable(); if (window.innerWidth <= 768) renderMobileCards();
    setTimeout(async () => {
      try {
        const [instructors, vehicles, boats] = await Promise.all([gas('getInstructors'), gas('getVehicles'), gas('getBoats')]);
        cachedInstructors = instructors;
        cachedVehicles = vehicles;
        cachedBoats = boats;
      } catch(e) { console.warn(e); }
    }, 500);
    if (fromDateInput.value && toDateInput.value && fromDateInput.value === toDateInput.value) {
      setTimeout(() => loadAndPopulateAssignments(fromDateInput.value), 1000);
    }
    updateSelectionButtonsState();
  } catch(e) { console.error(e); window.location.href = 'index.html'; }
});
