<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>مشرف الحركة - توزيع المدربين والمركبات</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0f1f3d;
      --navy2: #1a3260;
      --gold: #f5c842;
      --gold2: #e6b800;
      --blue: #2563eb;
      --blue-lt: #3b82f6;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #ea580c;
      --bg: #f0f4f8;
      --card: #fff;
      --border: #dde4f0;
      --text: #1a2540;
      --text-lt: #5a6a8a;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-500: #64748b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    /* Header */
    .header {
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      color: white;
      padding: 12px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 3px 16px rgba(15,31,61,.25);
    }
    .header h2 { color: var(--gold); font-size: 18px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .user-chip { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); border-radius: 40px; padding: 4px 13px; color: white; font-size: 12px; font-weight: 600; }
    .back-btn { background: transparent; border: 2px solid rgba(255,255,255,.3); color: white; padding: 4px 13px; border-radius: 40px; cursor: pointer; font-weight: 700; font-size: 12px; transition: all .2s; }
    .back-btn:hover { border-color: var(--gold); color: var(--gold); }
    
    /* Selection Bar */
    .selection-bar {
      background: white;
      border-bottom: 2px solid var(--border);
      padding: 12px 20px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
      position: sticky;
      top: 60px;
      z-index: 199;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .selection-btn {
      background: var(--navy);
      color: var(--gold);
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      transition: all .2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .selection-btn:hover { background: var(--navy2); transform: translateY(-1px); }
    .selection-badge {
      background: var(--gold);
      color: var(--navy);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 700;
      margin-right: 8px;
    }
    .reset-selection {
      background: #f1f5f9;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 11px;
      cursor: pointer;
    }
    .reset-selection:hover { background: #e2e8f0; }
    
    /* Filter Bar */
    .filter-bar {
      background: white;
      border-bottom: 2px solid var(--border);
      padding: 10px 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
      position: sticky;
      top: 120px;
      z-index: 198;
    }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-group label { font-size: 10px; font-weight: 700; color: var(--text-lt); }
    .filter-group input, .filter-group select {
      padding: 6px 10px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-family: 'Cairo', sans-serif;
      background: white;
    }
    .btn-go { background: var(--navy); color: var(--gold); border: none; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-weight: 700; }
    .btn-reset { background: #f1f5f9; border: 1px solid var(--border); padding: 6px 16px; border-radius: 20px; cursor: pointer; }
    .export-btn { background: var(--green); color: white; border: none; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-weight: 700; }
    
    /* Table */
    .tbl-wrap {
      overflow-x: auto;
      position: relative;
      max-height: calc(100vh - 200px);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      min-width: 1800px;
    }
    thead {
      position: sticky;
      top: 0;
      z-index: 180;
      background: linear-gradient(135deg, var(--navy), var(--navy2));
    }
    th {
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      color: var(--gold);
      padding: 10px 6px;
      font-weight: 700;
      white-space: nowrap;
      border-right: 1px solid rgba(255,255,255,.08);
      font-size: 11px;
      cursor: pointer;
    }
    td {
      padding: 8px 5px;
      border-bottom: 1px solid #eef2f9;
      color: var(--text);
      white-space: nowrap;
      background: white;
      font-size: 11px;
      vertical-align: middle;
    }
    tr:hover td { background: #f0f6ff; }
    
    .status-pending { background: #fef9c3; color: #854d0e; padding: 2px 8px; border-radius: 20px; display: inline-block; font-size: 10px; }
    .status-confirmed { background: #dcfce7; color: #166534; padding: 2px 8px; border-radius: 20px; display: inline-block; font-size: 10px; }
    
    .action-btn {
      background: var(--blue-lt);
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      margin: 0 2px;
    }
    .action-btn.upsell { background: var(--orange); }
    .action-btn.instructor { background: var(--green); }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: white;
      width: 90%;
      max-width: 800px;
      max-height: 85vh;
      border-radius: 20px;
      overflow-y: auto;
      padding: 20px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--gold);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }
    .modal-header h3 { color: var(--navy); font-size: 18px; }
    .close-modal { font-size: 28px; cursor: pointer; color: var(--gray-500); background: none; border: none; }
    .close-modal:hover { color: var(--red); }
    
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 11px; font-weight: 700; color: var(--text-lt); }
    .form-group input, .form-group select { padding: 8px; border: 2px solid var(--border); border-radius: 8px; font-size: 12px; }
    
    .checkbox-group { display: flex; align-items: center; gap: 8px; flex-direction: row; }
    
    .selection-list {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 16px;
    }
    .selection-item {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }
    .selection-item:hover { background: var(--gray-50); }
    .selection-item input { width: 18px; height: 18px; cursor: pointer; }
    .selection-item .info { flex: 1; }
    .selection-item .name { font-weight: 700; font-size: 13px; }
    .selection-item .capacity { font-size: 10px; color: var(--text-lt); }
    .selection-item .expiry { font-size: 9px; }
    .selection-item .expiry.warning { color: var(--orange); }
    .selection-item .expiry.expired { color: var(--red); }
    
    .pagination {
      display: flex;
      justify-content: center;
      gap: 5px;
      padding: 12px;
      background: white;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .page-btn {
      padding: 4px 9px;
      border: 1px solid var(--border);
      background: white;
      border-radius: 14px;
      cursor: pointer;
      font-size: 11px;
    }
    .page-btn.active { background: var(--navy); color: var(--gold); border-color: var(--navy); }
    
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      color: white;
      z-index: 9999;
      transform: translateY(50px);
      opacity: 0;
      transition: 0.35s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast-success { background: var(--green); }
    .toast-error { background: var(--red); }
    .toast-info { background: var(--blue); }
    
    .loader { text-align: center; padding: 50px; color: var(--text-lt); }
    .spinner {
      width: 32px;
      height: 32px;
      border: 4px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <h2>🎯 مشرف الحركة - توزيع المدربين والمركبات</h2>
  <div class="header-right">
    <span class="user-chip" id="userNameDisplay"></span>
    <button class="back-btn" onclick="goBack()">← Back</button>
  </div>
</div>

<div class="selection-bar" id="selectionBar">
  <button class="selection-btn" onclick="openInstructorsModal()">
    👨‍🏫 المدربين <span id="selectedInstructorsBadge" class="selection-badge">0</span>
  </button>
  <button class="selection-btn" onclick="openVehiclesModal()">
    🚗 السيارات <span id="selectedVehiclesBadge" class="selection-badge">0</span>
  </button>
  <button class="selection-btn" onclick="openBoatsModal()">
    ⛵ المراكب <span id="selectedBoatsBadge" class="selection-badge">0</span>
  </button>
  <button class="reset-selection" onclick="resetAllSelections()">🗑️ إلغاء الكل</button>
</div>

<div class="filter-bar">
  <div class="filter-group">
    <label>📅 من تاريخ</label>
    <input type="date" id="filterFromDate">
  </div>
  <div class="filter-group">
    <label>📅 إلى تاريخ</label>
    <input type="date" id="filterToDate">
  </div>
  <div class="filter-group">
    <label>🔍 بحث</label>
    <input type="text" id="filterSearch" placeholder="رقم الفاتورة / الاسم">
  </div>
  <div class="filter-group">
    <label>📌 الحالة</label>
    <select id="filterState">
      <option value="">الكل</option>
      <option value="pending">قيد الانتظار</option>
      <option value="confirmed">مؤكد</option>
    </select>
  </div>
  <button class="btn-go" onclick="applyFilters()">تطبيق</button>
  <button class="btn-reset" onclick="resetFilters()">إعادة تعيين</button>
  <button class="export-btn" onclick="exportToExcel()">📊 تصدير Excel</button>
</div>

<div class="tbl-wrap" id="tblWrap">
  <div id="tblCont"><div class="loader"><div class="spinner"></div>جاري التحميل...</div></div>
</div>
<div class="pagination" id="pagination"></div>

<!-- Modal اختيار المدربين -->
<div id="instructorsModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>👨‍🏫 اختيار المدربين</h3>
      <button class="close-modal" onclick="closeModal('instructorsModal')">×</button>
    </div>
    <div class="selection-list" id="instructorsList"></div>
    <button class="btn-go" onclick="saveInstructorsSelection()" style="width:100%">✅ تأكيد الاختيار</button>
    <button class="btn-reset" onclick="openAddInstructorForm()" style="width:100%; margin-top:8px">➕ إضافة مدرب جديد</button>
  </div>
</div>

<!-- Modal اختيار السيارات -->
<div id="vehiclesModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>🚗 اختيار السيارات</h3>
      <button class="close-modal" onclick="closeModal('vehiclesModal')">×</button>
    </div>
    <div class="selection-list" id="vehiclesList"></div>
    <button class="btn-go" onclick="saveVehiclesSelection()" style="width:100%">✅ تأكيد الاختيار</button>
    <button class="btn-reset" onclick="openAddVehicleForm()" style="width:100%; margin-top:8px">➕ إضافة سيارة جديدة</button>
  </div>
</div>

<!-- Modal اختيار المراكب -->
<div id="boatsModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>⛵ اختيار المراكب</h3>
      <button class="close-modal" onclick="closeModal('boatsModal')">×</button>
    </div>
    <div class="selection-list" id="boatsList"></div>
    <button class="btn-go" onclick="saveBoatsSelection()" style="width:100%">✅ تأكيد الاختيار</button>
    <button class="btn-reset" onclick="openAddBoatForm()" style="width:100%; margin-top:8px">➕ إضافة مركب جديد</button>
  </div>
</div>

<!-- Modal إضافة مدرب -->
<div id="addInstructorModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>➕ إضافة مدرب جديد</h3>
      <button class="close-modal" onclick="closeModal('addInstructorModal')">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>الاسم الكامل *</label><input type="text" id="instructorName" placeholder="الاسم الكامل"></div>
      <div class="form-group"><label>الدور</label><select id="instructorRole"><option value="Instructor">مدرب غوص</option><option value="Guide">مرشد سنوركل</option><option value="Photographer">مصور</option><option value="TechnicalManager">مدير فني</option></select></div>
      <div class="form-group"><label>نوع التوظيف</label><select id="instructorEmploymentType"><option value="staff">موظف</option><option value="freelance">فريلانس</option></select></div>
      <div class="form-group"><label>المنظمة</label><input type="text" id="instructorOrganization" placeholder="PADI / SSI / CMAS"></div>
      <div class="form-group"><label>رقم الرخصة</label><input type="text" id="instructorLicenseNumber"></div>
      <div class="form-group"><label>تاريخ انتهاء الرخصة</label><input type="date" id="instructorLicenseExpiry"></div>
      <div class="form-group"><label>رقم CDWS</label><input type="text" id="instructorCdwsCard"></div>
      <div class="form-group"><label>تاريخ انتهاء CDWS</label><input type="date" id="instructorCdwsExpiry"></div>
      <div class="form-group"><label>اليومية</label><input type="number" id="instructorDailyGuarantee" placeholder="0"></div>
      <div class="form-group"><label>عمولة التنفيذ</label><input type="text" id="instructorCommissionExecution" placeholder="مثال: 5_fixed أو 10%"></div>
      <div class="form-group"><label>عمولة UpSell</label><input type="text" id="instructorCommissionUpSell" placeholder="مثال: 25%"></div>
      <div class="form-group"><label>عدد Intro مجانية</label><input type="number" id="instructorFirstIntroFree" value="2"></div>
      <div class="form-group"><label>عمولة أول كورس</label><input type="number" id="instructorFirstCourseCommission" placeholder="0"></div>
      <div class="form-group"><label>عمولة باقي الكورسات</label><input type="number" id="instructorAdditionalCourseCommission" placeholder="0"></div>
      <div class="form-group"><label>اللغات</label><input type="text" id="instructorLanguage" placeholder="عربي, إنجليزي, ألماني"></div>
    </div>
    <button class="btn-go" onclick="saveNewInstructor()" style="width:100%">💾 حفظ المدرب</button>
  </div>
</div>

<!-- Modal إضافة سيارة -->
<div id="addVehicleModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>➕ إضافة سيارة جديدة</h3>
      <button class="close-modal" onclick="closeModal('addVehicleModal')">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>رقم اللوحة *</label><input type="text" id="vehicleLicensePlate"></div>
      <div class="form-group"><label>نوع الملكية</label><select id="vehicleType"><option value="owned">مملوكة</option><option value="monthly_rent">إيجار شهري</option><option value="daily_rent">إيجار يومي</option><option value="round_trip">تشغيلة</option><option value="one_way">مفردة</option></select></div>
      <div class="form-group"><label>اسم المالك</label><input type="text" id="vehicleOwnerName"></div>
      <div class="form-group"><label>نوع الاستخدام</label><select id="vehicleUsageType"><option value="passengers">نقل ركاب</option><option value="equipment">نقل معدات</option></select></div>
      <div class="form-group"><label>عدد الركاب الأقصى</label><input type="number" id="vehicleCapacity" placeholder="0"></div>
      <div class="form-group"><label>اسم السائق</label><input type="text" id="vehicleDriverName"></div>
      <div class="form-group"><label>هاتف السائق</label><input type="text" id="vehicleDriverPhone"></div>
      <div class="form-group"><label>مرتب السائق</label><input type="number" id="vehicleDriverSalary" placeholder="0"></div>
      <div class="form-group"><label>التكلفة الشهرية</label><input type="number" id="vehicleMonthlyFixedCost" placeholder="0"></div>
      <div class="form-group"><label>سعر اليوم الكامل</label><input type="number" id="vehicleDailyRate" placeholder="0"></div>
      <div class="form-group"><label>سعر التشغيلة</label><input type="number" id="vehicleRoundTripRate" placeholder="0"></div>
      <div class="form-group"><label>سعر المفردة</label><input type="number" id="vehicleOneWayRate" placeholder="0"></div>
      <div class="form-group"><label>تاريخ انتهاء الترخيص</label><input type="date" id="vehicleLicenseExpiry"></div>
    </div>
    <button class="btn-go" onclick="saveNewVehicle()" style="width:100%">💾 حفظ السيارة</button>
  </div>
</div>

<!-- Modal إضافة مركب -->
<div id="addBoatModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>➕ إضافة مركب جديد</h3>
      <button class="close-modal" onclick="closeModal('addBoatModal')">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>اسم المركب *</label><input type="text" id="boatName"></div>
      <div class="form-group"><label>الحمولة القصوى</label><input type="number" id="boatCapacity" placeholder="0"></div>
      <div class="form-group"><label>رقم الترخيص</label><input type="text" id="boatLicenseNumber"></div>
      <div class="form-group"><label>تاريخ انتهاء الترخيص</label><input type="date" id="boatLicenseExpiry"></div>
      <div class="form-group"><label>اسم المالك</label><input type="text" id="boatOwnerName"></div>
      <div class="form-group"><label>هاتف المالك</label><input type="text" id="boatOwnerPhone"></div>
    </div>
    <button class="btn-go" onclick="saveNewBoat()" style="width:100%">💾 حفظ المركب</button>
  </div>
</div>

<!-- Modal توزيع المدربين على الفاتورة -->
<div id="distributeInstructorsModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>👨‍🏫 توزيع المدربين على الأنشطة</h3>
      <button class="close-modal" onclick="closeModal('distributeInstructorsModal')">×</button>
    </div>
    <div id="distributeInstructorsList"></div>
    <div class="form-grid" style="margin-top: 16px;">
      <div class="form-group"><label>عدد Intro</label><input type="number" id="distIntroCount" value="0" min="0"></div>
      <div class="form-group"><label>عدد Course</label><input type="number" id="distCourseCount" value="0" min="0"></div>
      <div class="form-group"><label>عدد Diver</label><input type="number" id="distDiverCount" value="0" min="0"></div>
    </div>
    <button class="btn-go" onclick="saveInstructorDistribution()" style="width:100%">✅ حفظ التوزيع</button>
  </div>
</div>

<!-- Modal إضافة UpSell -->
<div id="upsellModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>💰 مبيعات إضافية (UpSell)</h3>
      <button class="close-modal" onclick="closeModal('upsellModal')">×</button>
    </div>
    <div id="upsellItemsContainer"></div>
    <div class="form-grid" style="margin-top: 16px;">
      <div class="form-group"><label>المدرب البائع</label><select id="upsellInstructor"></select></div>
      <div class="form-group"><label>المبلغ (نقداً USD)</label><input type="number" id="upsellCashUSD" value="0" step="0.01"></div>
      <div class="form-group"><label>المبلغ (نقداً EUR)</label><input type="number" id="upsellCashEUR" value="0" step="0.01"></div>
      <div class="form-group"><label>المبلغ (نقداً GBP)</label><input type="number" id="upsellCashGBP" value="0" step="0.01"></div>
      <div class="form-group"><label>المبلغ (نقداً LE)</label><input type="number" id="upsellCashLE" value="0" step="0.01"></div>
      <div class="form-group"><label>المبلغ (فيزا USD)</label><input type="number" id="upsellVisaUSD" value="0" step="0.01"></div>
      <div class="form-group"><label>المبلغ (فيزا EUR)</label><input type="number" id="upsellVisaEUR" value="0" step="0.01"></div>

// ============================================================
// CONFIG
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwC1BRoLAJthZqxWTYyMUSjPNNGfCI0BjTfhE7ZiVx67rUP__OKAj0vlwD1-RUCOMSE/exec';
const DASH = { Admin: 'Dashboard.html', Owner: 'OwnerDashboard.html', Sales: 'SalesDashboard.html', Accountant: 'AccountantDashboard.html' };

let currentUser = null;

function showToast(msg, type) {
  const toast = document.createElement('div');
  toast.className = `toast toast-${type} show`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function jsonpRequest(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    if (currentUser?.centerId) params.centerId = currentUser.centerId;
    if (currentUser?.centerName) params.centerName = currentUser.centerName;
    params.action = action;
    params.callback = cbName;
    const qs = Object.entries(params).map(([k, v]) => k + '=' + encodeURIComponent(String(v ?? ''))).join('&');
    const url = GAS_URL + '?' + qs;
    const script = document.createElement('script');
    const timeout = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 60000);
    const cleanup = () => {
      if (timeout) clearTimeout(timeout);
      if (window[cbName]) delete window[cbName];
      if (script.parentNode) script.remove();
    };
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('network error')); };
    script.src = url;
    document.head.appendChild(script);
  });
}

function formatDate(date) {
  if (!date) return '';
  const d = new Date(date);
  if (isNaN(d)) return date;
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return String(d.getDate()).padStart(2, '0') + '/' + months[d.getMonth()] + '/' + d.getFullYear();
}

function formatPhoneNumber(phone) {
  if (!phone) return '';
  let p = String(phone).trim();
  if (p.startsWith('00')) p = '+' + p.substring(2);
  else if (p.startsWith('0')) p = '+20' + p.substring(1);
  else if (!p.startsWith('+')) p = '+' + p;
  return p;
}

function goBack() {
  const userType = currentUser?.type || 'Admin';
  window.location.href = DASH[userType] || 'Dashboard.html';
}

async function loadInvoices() {
  try {
    const result = await jsonpRequest('getAllInvoices', { includeCollection: 'true' });
    if (Array.isArray(result)) {
      allInvoices = result.filter(inv => {
        const state = (inv.State || inv.state || '').toLowerCase();
        return state === 'confirmed' || state === 'pending';
      });
      applyFilters();
    } else {
      showToast('فشل تحميل الفواتير', 'error');
    }
  } catch(e) {
    showToast('خطأ في الاتصال', 'error');
  }
}

function applyFilters() {
  const fromDate = document.getElementById('filterFromDate').value;
  const toDate = document.getElementById('filterToDate').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();
  const state = document.getElementById('filterState').value;

  filteredInvoices = allInvoices.filter(inv => {
    const activeDate = inv.ActiveDate || inv.activeDate || '';
    if (fromDate && activeDate < fromDate) return false;
    if (toDate && activeDate > toDate) return false;
    if (state && (inv.State || inv.state || '').toLowerCase() !== state) return false;
    if (search) {
      const voucher = (inv.VoucherNo || inv.voucherNo || '').toLowerCase();
      const guest = (inv.GuestName || inv.guestName || '').toLowerCase();
      if (!voucher.includes(search) && !guest.includes(search)) return false;
    }
    return true;
  });

  currentPage = 1;
  renderTable();
  renderPagination();
}

function resetFilters() {
  document.getElementById('filterFromDate').value = '';
  document.getElementById('filterToDate').value = '';
  document.getElementById('filterSearch').value = '';
  document.getElementById('filterState').value = '';
  applyFilters();
}

function renderTable() {
  const start = (currentPage - 1) * pageSize;
  const end = Math.min(start + pageSize, filteredInvoices.length);
  const pageData = filteredInvoices.slice(start, end);

  if (pageData.length === 0) {
    document.getElementById('tblCont').innerHTML = '<div class="loader">لا توجد فواتير</div>';
    return;
  }

  let html = '<table><thead><tr>';
  const columns = [
    { key: 'VoucherNo', label: 'رقم الفاتورة' },
    { key: 'ActiveDate', label: 'تاريخ التنفيذ' },
    { key: 'Trip', label: 'الرحلة' },
    { key: 'GuestName', label: 'اسم العميل' },
    { key: 'Nationality', label: 'الجنسية' },
    { key: 'Item1', label: 'بند1' },
    { key: 'Item2', label: 'بند2' },
    { key: 'Item3', label: 'بند3' },
    { key: 'State', label: 'الحالة' },
    { key: 'Vehicles', label: 'السيارات' },
    { key: 'Boats', label: 'المراكب' },
    { key: 'Instructors', label: 'المدربين' },
    { key: 'Actions', label: 'إجراءات' }
  ];
  columns.forEach(col => { html += `<th>${col.label}</th>`; });
  html += '</thead><tbody>';

  pageData.forEach(inv => {
    const voucherNo = inv.VoucherNo || inv.voucherNo || '';
    const state = (inv.State || inv.state || '').toLowerCase();
    const stateClass = state === 'confirmed' ? 'status-confirmed' : 'status-pending';
    const stateText = state === 'confirmed' ? '✅ مؤكد' : '⏳ قيد الانتظار';

    // حساب عدد الركاب من Item1, Item2, Item3 (Adult, Child, Infant)
    const adultCount = parseInt(inv.Adult || inv.adult || 0);
    const childCount = parseInt(inv.Children || inv.children || 0);
    const infantCount = parseInt(inv.Infants || inv.infants || 0);
    const totalPax = adultCount + childCount + infantCount;

    html += `<tr>`;
    html += `<td>${voucherNo}</td>`;
    html += `<td>${formatDate(inv.ActiveDate || inv.activeDate)}</td>`;
    html += `<td>${inv.Trip || inv.trip || ''}</td>`;
    html += `<td>${inv.GuestName || inv.guestName || ''}</td>`;
    html += `<td>${inv.Nationality || inv.nationality || ''}</td>`;
    html += `<td class="amt">${inv.Sgl || inv.sgl || 0}</td>`;
    html += `<td class="amt">${inv.Dbl || inv.dbl || 0}</td>`;
    html += `<td class="amt">${inv.Trpl || inv.trpl || 0}</td>`;
    html += `<td><span class="${stateClass}">${stateText}</span></td>`;
    html += `<td><button class="action-btn" onclick="assignVehiclesToInvoice('${voucherNo}', ${totalPax})">🚗 توزيع (${totalPax} فرد)</button></td>`;
    html += `<td><button class="action-btn" onclick="assignBoatsToInvoice('${voucherNo}')">⛵ توزيع</button></td>`;
    html += `<td><button class="action-btn instructor" onclick="openDistributeInstructors('${voucherNo}')">👨‍🏫 توزيع</button></td>`;
    html += `<td><button class="action-btn upsell" onclick="openUpSell('${voucherNo}')">💰 UpSell</button></td>`;
    html += `</tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('tblCont').innerHTML = html;
}

function renderPagination() {
  const totalPages = Math.ceil(filteredInvoices.length / pageSize);
  if (totalPages <= 1) {
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  let html = '';
  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="gotoPage(${i})">${i}</button>`;
  }
  document.getElementById('pagination').innerHTML = html;
}

  currentPage = page;
  renderTable();
  renderPagination();

async function assignVehiclesToInvoice(voucherNo, totalPax) {
  if (selectedVehicles.length === 0) {
    showToast('الرجاء اختيار السيارات أولاً', 'error');
    return;
  }
  
  let remainingPax = totalPax;
  let assignedVehicles = [];
  
  for (const vehId of selectedVehicles) {
    if (remainingPax <= 0) break;
    const availability = await jsonpRequest('calculateAvailableSeats', { vehicleId: vehId, date: new Date().toISOString().split('T')[0], excludeVoucher: voucherNo });
    if (availability.success && availability.availableSeats > 0) {
      const seatsToBook = Math.min(remainingPax, availability.availableSeats);
      const result = await jsonpRequest('assignVehicleToTrip', { voucherNo, vehicleId: vehId, bookedSeats: seatsToBook, tripType: 'round_trip', date: new Date().toISOString().split('T')[0] });
      if (result.success) {
        assignedVehicles.push({ id: vehId, seats: seatsToBook });
        remainingPax -= seatsToBook;
      }
    }
  }
  
  if (remainingPax > 0) {
    showToast(`تنبيه: لم يتمكن ${remainingPax} فرد من الركاب من الحصول على مقاعد`, 'info');
  } else {
    showToast(`تم توزيع ${totalPax} فرد على ${assignedVehicles.length} سيارة`, 'success');
  }
  renderTable();
}

async function assignBoatsToInvoice(voucherNo) {
  if (selectedBoats.length === 0) {
    showToast('الرجاء اختيار المراكب أولاً', 'error');
    return;
  }
  showToast('تم توزيع المراكب', 'success');
  renderTable();
}

async function openUpSell(voucherNo) {
  const invoice = filteredInvoices.find(i => (i.VoucherNo || i.voucherNo) === voucherNo);
  if (!invoice) return;
  
  currentUpSellVoucher = voucherNo;
  currentUpSellTrip = invoice.Trip || invoice.trip || '';
  
  // جلب بنود الرحلة
  const tripData = await jsonpRequest('getTripData', { tripName: currentUpSellTrip, currency: invoice.InvoiceCurrency || invoice.invoiceCurrency || 'LE' });
  
  let itemsHtml = '<div class="form-grid">';
  if (tripData?.items && tripData.items.length > 0) {
    currentUpSellItems = tripData.items.map((item, idx) => ({ name: item, quantity: 0, position: idx + 1 }));
    tripData.items.forEach((item, idx) => {
      itemsHtml += `
        <div class="form-group">
          <label>${item}</label>
          <input type="number" id="upsell_item_${idx}" value="0" min="0" placeholder="الكمية" onchange="updateUpSellItem(${idx}, this.value)">
        </div>
      `;
    });
  } else {
    itemsHtml = '<div class="form-group"><label>لا توجد بنود محددة لهذه الرحلة</label></div>';
  }
  itemsHtml += '</div>';
  document.getElementById('upsellItemsContainer').innerHTML = itemsHtml;
  
  // تعبئة قائمة المدربين
  const instructors = await jsonpRequest('getInstructors', {});
  let instructorsHtml = '<option value="">اختر المدرب البائع</option>';
  if (Array.isArray(instructors)) {
    instructors.forEach(inst => {
      instructorsHtml += `<option value="${inst.id}">${inst.name}</option>`;
    });
  }
  document.getElementById('upsellInstructor').innerHTML = instructorsHtml;
  
  openModal('upsellModal');
}

function updateUpSellItem(idx, value) {
  if (currentUpSellItems[idx]) {
    currentUpSellItems[idx].quantity = parseInt(value) || 0;
  }
}

async function saveUpSell() {
  const items = currentUpSellItems.filter(item => item.quantity > 0);
  if (items.length === 0) {
    showToast('الرجاء إدخال كميات للمبيعات الإضافية', 'error');
    return;
  }
  
  const instructorId = document.getElementById('upsellInstructor').value;
  if (!instructorId) {
    showToast('الرجاء اختيار المدرب البائع', 'error');
    return;
  }
  
  const amounts = {
    cashUSD: parseFloat(document.getElementById('upsellCashUSD').value) || 0,
    cashEUR: parseFloat(document.getElementById('upsellCashEUR').value) || 0,
    cashGBP: parseFloat(document.getElementById('upsellCashGBP').value) || 0,
    cashLE: parseFloat(document.getElementById('upsellCashLE').value) || 0,
    visaUSD: parseFloat(document.getElementById('upsellVisaUSD').value) || 0,
    visaEUR: parseFloat(document.getElementById('upsellVisaEUR').value) || 0,
    visaGBP: parseFloat(document.getElementById('upsellVisaGBP').value) || 0,
    visaLE: parseFloat(document.getElementById('upsellVisaLE').value) || 0
  };
  
  try {
    const result = await jsonpRequest('createUpSellInvoice', {
      originalVoucherNo: currentUpSellVoucher,
      upSellItems: items,
      upSellAmounts: amounts,
      instructorId: instructorId
    });
    if (result?.success) {
      showToast(`تم إنشاء فاتورة UpSell: ${result.voucherNo}`, 'success');
      closeModal('upsellModal');
      loadInvoices();
    } else {
      showToast(result?.message || 'فشل إنشاء UpSell', 'error');
    }
  } catch(e) {
    showToast('خطأ في الاتصال', 'error');
  }
}

// ============================================================
// MODAL HELPERS
// ============================================================
function openModal(id) {
  document.getElementById(id).classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function updateSelectionBadges() {
  document.getElementById('selectedInstructorsBadge').textContent = selectedInstructors.length;
  document.getElementById('selectedVehiclesBadge').textContent = selectedVehicles.length;
  document.getElementById('selectedBoatsBadge').textContent = selectedBoats.length;
}

function resetAllSelections() {
  selectedInstructors = [];
  selectedVehicles = [];
  selectedBoats = [];
  updateSelectionBadges();
  showToast('تم إلغاء جميع الاختيارات', 'info');
  renderTable();
}

function openAddInstructorForm() {
  closeModal('instructorsModal');
  openModal('addInstructorModal');
}

function openAddVehicleForm() {
  closeModal('vehiclesModal');
  openModal('addVehicleModal');
}

function openAddBoatForm() {
  closeModal('boatsModal');
  openModal('addBoatModal');
}

function exportToExcel() {
  showToast('جاري التصدير...', 'info');
  setTimeout(() => showToast('سيتم إضافة التصدير قريباً', 'info'), 1000);
}

// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
  const ud = sessionStorage.getItem('currentUser');
  if (!ud) {
    window.location.href = 'index.html';
    return;
  }
  try {
    currentUser = JSON.parse(ud);
    document.getElementById('userNameDisplay').textContent = currentUser.name || 'User';
    await loadInvoices();
  } catch(e) {
    window.location.href = 'index.html';
  }
});
</script>
