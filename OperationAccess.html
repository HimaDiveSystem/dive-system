<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Operations Access - Assign Instructors & Vehicles</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0f1f3d;
      --navy2: #1a3260;
      --gold: #f5c842;
      --gold2: #e6b800;
      --blue: #2563eb;
      --blue-lt: #3b82f6;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #ea580c;
      --purple: #7c3aed;
      --bg: #f0f4f8;
      --card: #fff;
      --border: #dde4f0;
      --text: #1a2540;
      --text-lt: #5a6a8a;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-500: #64748b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    .header {
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      color: white;
      padding: 12px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 3px 16px rgba(15,31,61,.25);
    }
    .header h2 { color: var(--gold); font-size: 18px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .user-chip { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); border-radius: 40px; padding: 4px 13px; color: white; font-size: 12px; font-weight: 600; }
    .back-btn { background: transparent; border: 2px solid rgba(255,255,255,.3); color: white; padding: 4px 13px; border-radius: 40px; cursor: pointer; font-weight: 700; font-size: 12px; transition: all .2s; }
    .back-btn:hover { border-color: var(--gold); color: var(--gold); }
    
    .selection-bar {
      background: white;
      border-bottom: 2px solid var(--border);
      padding: 12px 20px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
      position: sticky;
      top: 60px;
      z-index: 199;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .selection-btn {
      background: var(--navy);
      color: var(--gold);
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      transition: all .2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .selection-btn.disabled {
      opacity: 0.5;
      pointer-events: none;
      cursor: not-allowed;
    }
    .selection-btn:hover:not(.disabled) { background: var(--navy2); transform: translateY(-1px); }
    .selection-badge {
      background: var(--gold);
      color: var(--navy);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 700;
      margin-left: 8px;
    }
    .reset-selection {
      background: #f1f5f9;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 11px;
      cursor: pointer;
    }
    .reset-selection:hover { background: #e2e8f0; }
      /* ===== تنسيق فلتر الرحلات بشكل احترافي ===== */
.filter-group select[multiple],
.filter-group .trip-select {
  min-width: 180px;
  max-width: 280px;
  max-height: 120px;
  background: white;
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 4px;
  font-size: 12px;
  font-family: 'Cairo', sans-serif;
}

.filter-group select[multiple] option,
.filter-group .trip-select option {
  padding: 6px 8px;
  border-bottom: 1px solid var(--gray-100);
  cursor: pointer;
}

.filter-group select[multiple] option:checked,
.filter-group .trip-select option:checked {
  background: var(--navy) linear-gradient(0deg, var(--navy) 0%, var(--navy) 100%);
  color: var(--gold);
}

.filter-group select[multiple] option[value=""],
.filter-group .trip-select option[value=""] {
  font-weight: bold;
  color: var(--navy);
  background: var(--gray-50);
}
    
    .btn-go { background: var(--navy); color: var(--gold); border: none; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-weight: 700; }
    .btn-reset { background: #f1f5f9; border: 1px solid var(--border); padding: 6px 16px; border-radius: 20px; cursor: pointer; }
    .export-btn { background: var(--green); color: white; border: none; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-weight: 700; }
    
    .page-size-selector {
      display: flex;
      align-items: center;
      gap: 6px;
      background: white;
      padding: 0 5px;
    }
    .page-size-selector label { font-size: 11px; font-weight: 700; color: var(--gray-500); }
    .page-size-selector select {
      padding: 4px 6px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 11px;
    }

    /* ===== تنسيق شريط الفلتر الأساسي ===== */
.filter-bar {
  background: white;
  border-bottom: 2px solid var(--border);
  padding: 10px 20px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: flex-end;
  position: sticky;
  top: 120px;
  z-index: 198;
}

.filter-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.filter-group label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-lt);
  text-transform: uppercase;
}

.filter-group input, 
.filter-group select {
  padding: 6px 10px;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
  font-family: 'Cairo', sans-serif;
  background: white;
  min-width: 140px;
}
    
    .tbl-wrap {
      overflow-x: auto;
      position: relative;
      max-height: calc(100vh - 310px);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      min-width: 1600px;
    }
    th, td {
      padding: 8px 5px;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    th {
      background: var(--navy);
      color: var(--gold);
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    th:hover { background: var(--navy2); }
    
    /* صف الإجماليات */
    .totals-row td {
      background: #dbeafe;
      color: var(--navy);
      border-top: 2px solid var(--navy);
      border-bottom: 2px solid var(--navy);
      font-weight: 700;
      padding: 10px 5px;
    }
    .totals-label { font-size: 10px; color: var(--gray-500); display: block; }
    .totals-value { font-size: 13px; font-weight: 800; color: var(--navy); }
    
    .action-buttons {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 4px;
      justify-content: center;
      align-items: center;
    }
    .action-btn {
      background: var(--blue-lt);
      color: white;
      border: none;
      padding: 4px 6px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      white-space: nowrap;
      min-width: 32px;
    }
    .action-btn.upsell { background: var(--orange); }
    .action-btn.instructor { background: var(--green); }
    .action-btn.vehicle { background: var(--purple); }
    .action-btn.boat { background: var(--blue); }
    .action-btn.equipment { background: var(--navy2); }
    .action-btn.disabled { opacity: 0.5; pointer-events: none; cursor: not-allowed; }
    .action-btn.time-btn {
      background: #f0f4f8;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: monospace;
      padding: 2px 6px;
    }
    
    .status-pending { background: #fef9c3; color: #854d0e; padding: 2px 8px; border-radius: 20px; display: inline-block; font-size: 10px; }
    .status-confirmed { background: #dcfce7; color: #166534; padding: 2px 8px; border-radius: 20px; display: inline-block; font-size: 10px; }
    
    .badge-vehicle { background: var(--purple); color: white; display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 9px; margin: 1px; }
    .badge-boat { background: var(--blue); color: white; display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 9px; margin: 1px; }
    .badge-instructor { background: var(--green); color: white; display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 9px; margin: 1px; }
    
    .pagination {
      display: flex;
      justify-content: center;
      gap: 5px;
      padding: 12px;
      background: white;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .page-btn {
      padding: 4px 9px;
      border: 1px solid var(--border);
      background: white;
      border-radius: 14px;
      cursor: pointer;
      font-size: 11px;
    }
    .page-btn.active { background: var(--navy); color: var(--gold); border-color: var(--navy); }
    
    .rest-pos { color: #dc2626; font-weight: bold; cursor: pointer; }
    .rest-pos:hover { text-decoration: underline; }
    .rest-zero { color: #16a34a; font-weight: bold; }
    
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      color: white;
      z-index: 9999;
      transform: translateY(50px);
      opacity: 0;
      transition: 0.35s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast-success { background: var(--green); }
    .toast-error { background: var(--red); }
    .toast-info { background: var(--blue); }
    
    .loader { text-align: center; padding: 50px; color: var(--text-lt); }
    .spinner {
      width: 32px;
      height: 32px;
      border: 4px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: white;
      width: 90%;
      max-width: 950px;
      max-height: 85vh;
      overflow-y: auto;
      border-radius: 20px;
      padding: 20px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--gold);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }
    .modal-header h3 { color: var(--navy); font-size: 18px; }
    .close-modal {
      font-size: 28px;
      cursor: pointer;
      color: var(--gray-500);
      background: none;
      border: none;
    }
    .close-modal:hover { color: var(--red); }
    
    /* تحسين عرض نوافذ التعيين - استخدام flexbox بدلاً من الجداول */
.assign-container {
  overflow-x: auto;
  max-height: 400px;
}

.assign-item {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  padding: 10px;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}

.assign-item > div {
  flex: 1;
  min-width: 60px;
  text-align: center;
}

.assign-item .vehicle-name {
  flex: 2;
  text-align: left;
  font-weight: bold;
}

.assign-item input {
  width: 55px;
  padding: 4px;
  text-align: center;
  border: 1px solid var(--border);
  border-radius: 6px;
}

.assign-item input[type="checkbox"] {
  width: 18px;
  height: 18px;
  cursor: pointer;
}

.assign-header {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  padding: 10px;
  background: var(--navy);
  color: var(--gold);
  font-weight: bold;
  gap: 8px;
}

.assign-header > div {
  flex: 1;
  min-width: 60px;
  text-align: center;
}

.assign-header .vehicle-name {
  flex: 2;
  text-align: left;
}

@media (max-width: 768px) {
  .assign-item, .assign-header {
    min-width: 500px;
  }
}    
    .summary-box {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
    }
    .summary-box strong { color: var(--navy); }
    .warning-box {
      background: #fef3c7;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 11px;
      color: #92400e;
    }
    /* تحسين عرض النوافذ لمنع التمرير الأفقي المزعج */
.modal-content {
  max-width: 95%;
  width: 95%;
  overflow-x: auto;
}

.assign-table {
  min-width: auto;
  width: 100%;
}

.assign-table th,
.assign-table td {
  white-space: nowrap;
  padding: 6px 8px;
}

@media (max-width: 768px) {
  .modal-content {
    width: 98%;
    padding: 12px;
  }
  .assign-table input {
    width: 45px;
  }
}

/* تحسين مظهر summary-box */
.summary-box {
  background: #f8f9fa;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 16px;
  font-size: 13px;
  border: 1px solid var(--border);
}
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 30px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      transition: all 0.2s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--navy); color: var(--gold); }
    .btn-success { background: var(--green); color: white; }
    .btn-secondary { background: var(--gray-200); color: var(--text); }
    .btn-danger { background: var(--red); color: white; }
    
    .selection-list {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 16px;
    }
    .selection-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .selection-item:hover { background: var(--gray-50); }
    .selection-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .selection-item .info { flex: 1; }
    .selection-item .name { font-weight: 700; font-size: 13px; color: var(--navy); }
    
    .boat-card {
      background: var(--gray-50);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .boat-card-header {
      font-weight: 700;
      font-size: 14px;
      color: var(--navy);
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    
    @media(max-width: 640px) {
      .filter-bar { flex-direction: column; align-items: stretch; }
      .trip-select { min-width: 100%; max-width: 100%; }
    }
  </style>
</head>
<body>

<div class="header">
  <h2>🎯 Operations Access - Assign Instructors & Vehicles</h2>
  <div class="header-right">
    <span class="user-chip" id="userNameDisplay"></span>
    <button class="back-btn" onclick="goBack()">← Back</button>
  </div>
</div>

<div class="selection-bar" id="selectionBar">
  <button class="selection-btn" id="btnInstructors" onclick="openBeachInstructorsModal()">
    👨‍🏫 Beach Instructors <span id="selectedInstructorsBadge" class="selection-badge">0</span>
  </button>
  <button class="selection-btn" id="btnBoats" onclick="openBoatsModal()">
    ⛵ Boats <span id="selectedBoatsBadge" class="selection-badge">0</span>
  </button>
  <button class="selection-btn" id="btnVehicles" onclick="openVehiclesModal()">
    🚗 Vehicles <span id="selectedVehiclesBadge" class="selection-badge">0</span>
  </button>
  <button class="reset-selection" onclick="resetAllSelections()">🗑️ Clear All</button>
</div>

<div class="filter-bar">
  <div class="filter-group">
    <label>📅 From Date</label>
    <input type="date" id="filterFromDate" onchange="onDateChange()">
  </div>
  <div class="filter-group">
    <label>📅 To Date</label>
    <input type="date" id="filterToDate" onchange="onDateChange()">
  </div>
  <div class="filter-group">
  <label>🚌 Trip Filter</label>
  <select id="filterTrip" multiple size="1" style="min-width:160px">
    <option value="">All Trips</option>
  </select>
</div>
  <div class="filter-group">
    <label>🔍 Search</label>
    <input type="text" id="filterSearch" placeholder="Voucher / Guest">
  </div>
  <div class="filter-group">
    <label>📌 Status</label>
    <select id="filterState">
      <option value="">All</option>
      <option value="pending">Pending</option>
      <option value="confirmed">Confirmed</option>
    </select>
  </div>
  <div class="page-size-selector">
    <label>Show:</label>
    <select id="pageSizeSelect" onchange="changePageSize()">
      <option value="20">20</option>
      <option value="30" selected>30</option>
      <option value="50">50</option>
      <option value="100">100</option>
      <option value="-1">All</option>
    </select>
  </div>
  <button class="btn-go" onclick="applyFilters()">Apply</button>
  <button class="btn-reset" onclick="resetFilters()">Reset</button>
  <button class="export-btn" onclick="exportToExcel()">📊 Export</button>
</div>

<div class="tbl-wrap">
  <div id="tblCont"><div class="loader"><div class="spinner"></div>Loading...</div></div>
</div>
<div class="pagination" id="pagination"></div>

<!-- Modals (same as before) -->
<div id="assignVehiclesModal" class="modal"><div class="modal-content" style="max-width:950px;"><div class="modal-header"><h3>🚗 Assign Vehicles</h3><button class="close-modal" onclick="closeModal('assignVehiclesModal')">×</button></div><div id="assignVehiclesContent"></div></div></div>
<div id="assignBoatsModal" class="modal"><div class="modal-content" style="max-width:950px;"><div class="modal-header"><h3>⛵ Assign Boats</h3><button class="close-modal" onclick="closeModal('assignBoatsModal')">×</button></div><div id="assignBoatsContent"></div></div></div>
<div id="assignInstructorsModal" class="modal"><div class="modal-content" style="max-width:950px;"><div class="modal-header"><h3>👨‍🏫 Assign Instructors</h3><button class="close-modal" onclick="closeModal('assignInstructorsModal')">×</button></div><div id="assignInstructorsContent"></div></div></div>
<div id="beachInstructorsModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>🏖️ Beach Instructors</h3><button class="close-modal" onclick="closeModal('beachInstructorsModal')">×</button></div><div id="beachInstructorsList"></div><div style="display:flex; gap:10px; justify-content:flex-end;"><button class="btn btn-secondary" onclick="closeModal('beachInstructorsModal')">Cancel</button><button class="btn btn-primary" onclick="saveBeachInstructors()">✅ Save</button></div></div></div>
<div id="boatsModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>⛵ Select Boats & Assign Boat Instructors</h3><button class="close-modal" onclick="closeModal('boatsModal')">×</button></div><div id="boatsSelectionContainer"></div><div style="display:flex; gap:10px; justify-content:flex-end; margin-top:16px;"><button class="btn btn-secondary" onclick="closeModal('boatsModal')">Cancel</button><button class="btn btn-primary" onclick="saveBoatsAndInstructors()">✅ Save All</button></div></div></div>
<div id="vehiclesModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>🚗 Choose Vehicles</h3><button class="close-modal" onclick="closeModal('vehiclesModal')">×</button></div><div id="vehiclesList"></div><div style="display:flex; gap:10px; justify-content:flex-end;"><button class="btn btn-secondary" onclick="closeModal('vehiclesModal')">Cancel</button><button class="btn btn-primary" onclick="saveVehiclesSelection()">✅ Save</button></div></div></div>
<div id="timeModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>🕐 تعديل وقت التنفيذ</h3><button class="close-modal" onclick="closeModal('timeModal')">×</button></div><div style="text-align:center"><input type="time" id="timePickerInput" step="60" style="font-size:32px; text-align:center; padding:16px; width:200px; margin:20px auto; display:block;"><div style="display:flex; gap:10px; justify-content:center;"><button class="btn btn-secondary" onclick="closeModal('timeModal')">إلغاء</button><button class="btn btn-primary" onclick="saveTimeUpdate()">حفظ</button></div></div></div></div>
<div id="upsellModal" class="modal"><div class="modal-content" style="max-width:850px;"><div class="modal-header"><h3>💰 UpSell - Additional Sales</h3><button class="close-modal" onclick="closeModal('upsellModal')">×</button></div><div id="upsellContent"></div></div></div>

<script>

const GAS_URL = 'https://script.google.com/macros/s/AKfycbwC1BRoLAJthZqxWTYyMUSjPNNGfCI0BjTfhE7ZiVx67rUP__OKAj0vlwD1-RUCOMSE/exec';
const DASH = { Admin: 'Dashboard.html', Owner: 'OwnerDashboard.html', Sales: 'SalesDashboard.html', Accountant: 'AccountantDashboard.html', OperationsManager: 'OperationAccess.html', OperationsSupervisor: 'OperationAccess.html' };

const BOAT_TRIPS = [
  'Private Boat (max 10 persons)',
  'Ras Mohamed Boat',
  'Local Boat',
  'Tiran Island By Boat',
  'Boat Trip Half Day'
];

let currentUser = null;
let allInvoices = [];
let filteredInvoices = [];
let currentPage = 1;
let pageSize = 30;
let sortColumn = 'activeDate';
let sortDirection = 'asc';
let uniqueTrips = [];

// Selection data
let selectedBeachInstructors = [];

// JSONP REQUEST
// ============================================================
function jsonpRequest(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    if (currentUser?.centerName) params.centerName = currentUser.centerName;
    if (currentUser?.centerId) params.centerId = currentUser.centerId;
    params.action = action;
    params.callback = cbName;
    const qs = Object.entries(params).map(([k, v]) => k + '=' + encodeURIComponent(String(v ?? ''))).join('&');
    const url = GAS_URL + '?' + qs;
    const script = document.createElement('script');
    const timeout = setTimeout(() => { cleanup(); reject(new Error('Request timeout')); }, 60000);
    const cleanup = () => { clearTimeout(timeout); delete window[cbName]; script.remove(); };
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('Network error')); };
    script.src = url;
    document.head.appendChild(script);
  });
}

function gas(action, params = {}) {
  return jsonpRequest(action, params);
}

function formatDateDDMMMYYYY(date) {
  if (!date) return '';
  const d = new Date(date);
  if (isNaN(d)) return date;
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return `${String(d.getDate()).padStart(2, '0')}/${months[d.getMonth()]}/${d.getFullYear()}`;
}

function formatDateISO(date) {
  if (!date) return '';
  const d = new Date(date);
  if (isNaN(d)) return '';
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function parseDateFromString(dateStr) {
  if (!dateStr) return null;
  if (dateStr instanceof Date && !isNaN(dateStr)) return dateStr;
  const s = dateStr.toString().trim();
  const match = s.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (match) {
    const months = { Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11 };
    return new Date(parseInt(match[3]), months[match[2]], parseInt(match[1]));
  }
  const isoMatch = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (isoMatch) return new Date(parseInt(isoMatch[1]), parseInt(isoMatch[2]) - 1, parseInt(isoMatch[3]));
  const d = new Date(s);
  return !isNaN(d) ? d : null;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function formatValue(val) {
  if (val === undefined || val === null) return '';
  const num = parseFloat(val);
  if (isNaN(num)) return val;
  if (num === 0) return '';
  return num;
}

function getRestColor(restValue) {
  if (restValue === undefined || restValue === null) return 'var(--blue)';
  const num = parseFloat(restValue);
  if (isNaN(num)) return 'var(--blue)';
  if (num > 0) return '#dc2626';
  if (num === 0) return '#16a34a';
  return 'var(--blue)';
}

function formatRest(restValue, currency) {
  const num = parseFloat(restValue);
  if (isNaN(num)) return escapeHtml(String(restValue));
  if (num <= 0) return '<span class="rest-zero">✓ Paid</span>';
  return `<span class="rest-pos" onclick="event.stopPropagation(); alert('تحصيل المتبقي قيد التطوير')">${num.toFixed(2)} ${escapeHtml(currency || 'LE')}</span>`;
}

function setSort(col) {
  if (sortColumn === col) {
    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
  } else {
    sortColumn = col;
    sortDirection = 'asc';
  }
  doSort();
  renderTable();
  renderPagination();
}

function getSortIcon(col) {
  if (sortColumn !== col) return '⇅';
  return sortDirection === 'asc' ? '↑' : '↓';
}

function doSort() {
  filteredInvoices.sort((a, b) => {
    let aVal = a[sortColumn];
    let bVal = b[sortColumn];
    if (aVal === undefined) aVal = '';
    if (bVal === undefined) bVal = '';
    if (sortColumn === 'rest') {
      aVal = parseFloat(aVal) || 0;
      bVal = parseFloat(bVal) || 0;
    } else if (sortColumn === 'activeDate' || sortColumn === 'issueDate') {
      aVal = parseDateFromString(aVal)?.getTime() || 0;
      bVal = parseDateFromString(bVal)?.getTime() || 0;
    } else {
      aVal = String(aVal).toLowerCase();
      bVal = String(bVal).toLowerCase();
    }
    if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
    if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
    return 0;
  });
}

function initTripFilter() {
  const select = document.getElementById('filterTrip');
  // الاحتفاظ بخيار "All Trips" كأول عنصر
  select.innerHTML = '<option value="">All Trips</option>';
  uniqueTrips.forEach(trip => {
    const option = document.createElement('option');
    option.value = trip;
    option.textContent = trip;
    select.appendChild(option);
  });
  
  // إضافة مستمع الحدث لمعالجة الاختيارات
  select.addEventListener('change', function() {
    const selectedValues = Array.from(this.selectedOptions).map(opt => opt.value);
    const hasAllTrips = selectedValues.includes('');
    
    if (hasAllTrips && selectedValues.length > 1) {
      // إذا تم اختيار "All Trips" مع أي رحلة أخرى، قم بإلغاء تحديد "All Trips"
      for (let i = 0; i < this.options.length; i++) {
        if (this.options[i].value === '') {
          this.options[i].selected = false;
          break;
        }
      }
      showToast('تم إلغاء تحديد "All Trips" تلقائياً', 'info');
    } else if (!hasAllTrips && selectedValues.length >= 1) {
      // إذا تم اختيار رحلة ولم يتم اختيار "All Trips" - لا تفعل شيئاً
      // (هذا هو السلوك المطلوب)
    } else if (hasAllTrips && selectedValues.length === 1) {
      // إذا كان "All Trips" فقط هو المحدد - هذا صحيح
    }
    
    // تطبيق الفلترة بعد التغيير
    applyFilters();
  });
}

function getSelectedTrips() {
  const select = document.getElementById('filterTrip');
  const selected = [];
  for (let i = 0; i < select.options.length; i++) {
    if (select.options[i].selected && select.options[i].value !== '') {
      selected.push(select.options[i].value);
    }
  }
  // إذا كان "All Trips" هو المحدد الوحيد أو لم يتم تحديد أي شيء، نرجع مصفوفة فارغة
  const hasAllTrips = Array.from(select.options).some(opt => opt.selected && opt.value === '');
  if (hasAllTrips || selected.length === 0) {
    return []; // مصفوفة فارغة تعني "كل الرحلات"
  }
  return selected;
}

  }
}

async function loadInvoices() {
  try {
    // تحديد التاريخ الحالي من الفلاتر
    const fromDate = document.getElementById('filterFromDate').value;
    const toDate = document.getElementById('filterToDate').value;
    const isSingleDate = fromDate && fromDate === toDate;
    
    let result;
    
    if (isSingleDate) {
      // ✅ تحسين الأداء: جلب فقط فواتير التاريخ المحدد
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const parts = fromDate.split('-');
      const formattedDate = `${parts[2]}/${months[parseInt(parts[1]) - 1]}/${parts[0]}`;
      currentFilterDate = formattedDate;
      
      result = await gas('getInvoicesByDate', { 
        dateStr: formattedDate,
        centerName: currentUser?.centerName
      });
      
      if (!Array.isArray(result)) result = [];
    } else {
      // للفترات الطويلة، نجلب الكل
      result = await gas('getAllInvoices', { 
        includeCollection: 'true',
        centerName: currentUser?.centerName
      });
      currentFilterDate = null;
    }
    
    if (Array.isArray(result)) {
      allInvoices = result.filter(inv => {
        const state = (inv.State || inv.state || '').toLowerCase();
        return state === 'confirmed' || state === 'pending';
      }).map(inv => normalizeInvoice(inv));
      
      const tripSet = new Set();
      allInvoices.forEach(inv => { if (inv.trip) tripSet.add(inv.trip); });
      uniqueTrips = Array.from(tripSet).sort();
      
      initTripFilter();
      applyFilters();
    } else {
      showToast('Failed to load invoices', 'error');
    }
  } catch(e) {
    console.error('loadInvoices error:', e);
    showToast('Connection error: ' + e.message, 'error');
  }
}

function applyFilters() {
  const fromDate = document.getElementById('filterFromDate').value;
  const toDate = document.getElementById('filterToDate').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();
  const state = document.getElementById('filterState').value;
  const selectedTrips = getSelectedTrips();
  
  let fromDateObj = null;
  let toDateObj = null;
  
  if (fromDate) {
    fromDateObj = new Date(fromDate);
    fromDateObj.setHours(0, 0, 0, 0);
  }
  if (toDate) {
    toDateObj = new Date(toDate);
    toDateObj.setHours(23, 59, 59, 999);
  }
  
  filteredInvoices = allInvoices.filter(inv => {
    const activeDate = inv.activeDate || '';
    const parsedDate = parseDateFromString(activeDate);
    
    if (fromDateObj && parsedDate && parsedDate < fromDateObj) return false;
    if (toDateObj && parsedDate && parsedDate > toDateObj) return false;
    if (state && (inv.state || '').toLowerCase() !== state) return false;
    if (selectedTrips.length > 0 && !selectedTrips.includes(inv.trip)) return false;
    
    if (search) {
      const voucher = (inv.voucherNo || '').toLowerCase();
      const guest = (inv.guestName || '').toLowerCase();
      if (!voucher.includes(search) && !guest.includes(search)) return false;
    }
    
    return true;
  });
  
  doSort();
  currentPage = 1;
  renderTable();
  renderPagination();
  updateSelectionButtonsState();
  
  const currentDate = getCurrentDateISO();
  if (currentDate) {
    loadAndPopulateAssignments(currentDate);
  }
}

// ============================================================
// عرض جدول الإحصائيات (Trips Summary)
// ============================================================
function renderSummary() {
  const trips = {};
  
  filteredInvoices.forEach(inv => {
    const tripName = (inv.trip || 'Unknown').trim();
    if (!trips[tripName]) {
      trips[tripName] = { bookings: 0, activities: {} };
    }
    trips[tripName].bookings++;
    
    // ✅ 1. جمع الأنشطة من ActivitiesText (UpSell)
    const activitiesText = (inv.activitiesText || '').toString().trim();
    if (activitiesText) {
      activitiesText.split('|').forEach(part => {
        const match = part.trim().match(/^(.+?)×(\d+(\.\d+)?)$/);
        if (match) {
          const activityName = match[1].trim();
          const quantity = parseFloat(match[2]) || 0;
          trips[tripName].activities[activityName] = (trips[tripName].activities[activityName] || 0) + quantity;
        }
      });
    }
    
    // ✅ 2. جمع الأنشطة من البنود الأساسية (وهذا كان مفقوداً)
    const sgl = parseInt(inv.sgl) || 0;      // Single / Adult
    const dbl = parseInt(inv.dbl) || 0;      // Double / Child
    const trpl = parseInt(inv.trpl) || 0;    // Triple / Infant
    const extra = parseInt(inv.extra) || 0;  // Extra / Intro
    
    const camel = parseInt(inv.camel) || 0;
    const dinner = parseInt(inv.dinner) || 0;
    const vipDinner = parseInt(inv.vipDinner) || 0;
    const starGazing = parseInt(inv.starGazing) || 0;
    const privateTrip = parseInt(inv.privateTrip) || 0;
    const privateTransfer = parseInt(inv.privateTransfer) || 0;
    
    // تعيين الأسماء حسب الرحلة (يمكن تعديلها حسب احتياجك)
    if (sgl > 0) trips[tripName].activities['Adult'] = (trips[tripName].activities['Adult'] || 0) + sgl;
    if (dbl > 0) trips[tripName].activities['Child'] = (trips[tripName].activities['Child'] || 0) + dbl;
    if (trpl > 0) trips[tripName].activities['Infant'] = (trips[tripName].activities['Infant'] || 0) + trpl;
    if (extra > 0) trips[tripName].activities['Intro'] = (trips[tripName].activities['Intro'] || 0) + extra;
    
    if (camel > 0) trips[tripName].activities['Camel'] = (trips[tripName].activities['Camel'] || 0) + camel;
    if (dinner > 0) trips[tripName].activities['Dinner'] = (trips[tripName].activities['Dinner'] || 0) + dinner;
    if (vipDinner > 0) trips[tripName].activities['VIP Dinner'] = (trips[tripName].activities['VIP Dinner'] || 0) + vipDinner;
    if (starGazing > 0) trips[tripName].activities['Star Gazing'] = (trips[tripName].activities['Star Gazing'] || 0) + starGazing;
    if (privateTrip > 0) trips[tripName].activities['Private Trip'] = (trips[tripName].activities['Private Trip'] || 0) + privateTrip;
    if (privateTransfer > 0) trips[tripName].activities['Private Transfer'] = (trips[tripName].activities['Private Transfer'] || 0) + privateTransfer;
  });
  
  if (Object.keys(trips).length === 0) {
    const summarySec = document.getElementById('summarySec');
    if (summarySec) summarySec.style.display = 'none';
    return;
  }
  
  let rows = '';
  Object.entries(trips).sort((a, b) => b[1].bookings - a[1].bookings).forEach(([tripName, info]) => {
    // ترتيب الأنشطة حسب الكمية تنازلياً
    const sortedActivities = Object.entries(info.activities).sort((a, b) => b[1] - a[1]);
    const activitiesStr = sortedActivities
      .map(([act, qty]) => `${act}×${Number.isInteger(qty) ? qty : qty.toFixed(1)}`)
      .join(' | ');
    
    rows += `<tr>
      <td><strong>${escapeHtml(tripName)}</strong></td>
      <td style="text-align:center"><span style="background:var(--navy);color:var(--gold);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700">${info.bookings}</span></td>
      <td class="acts-cell" style="white-space:normal; word-break:break-word;">${escapeHtml(activitiesStr || '—')}</span></td>
    </tr>`;
  });
  
  let summaryHtml = `
    <div class="summary-sec" id="summarySec" style="margin-top:16px; padding:14px 20px; background:white; border-top:2px solid var(--border); overflow-x:auto;">
      <div class="summary-title" style="font-size:13px; font-weight:700; color:var(--navy); margin-bottom:8px; text-align:center;">🗺️ Trips Summary</div>
      <div style="overflow-x:auto;">
        <table class="summary-table" style="width:100%; border-collapse:collapse; font-size:12px; margin:0 auto;">
          <thead>
            <tr style="background:var(--navy2); color:var(--gold);">
              <th style="padding:10px 8px; text-align:center; width:28%;">Trip</th>
              <th style="padding:10px 8px; text-align:center; width:15%;">Bookings</th>
              <th style="padding:10px 8px; text-align:center; width:57%;">Activities</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
  
  // إضافة القسم بعد الجدول إذا لم يكن موجوداً
  if (!document.getElementById('summarySec')) {
    const tblWrap = document.querySelector('.tbl-wrap');
    if (tblWrap) {
      tblWrap.insertAdjacentHTML('afterend', summaryHtml);
    }
  } else {
    const oldSummary = document.getElementById('summarySec');
    if (oldSummary) {
      oldSummary.outerHTML = summaryHtml;
    }
  }
}

  renderTable();

async function saveVehicleAssignment() {
  const selectedRows = [];
  const checkboxes = document.querySelectorAll('.assign-select:checked');
  let totalAdult = 0, totalChild = 0, totalInfant = 0;
  
  for (const cb of checkboxes) {
    const vehId = cb.getAttribute('data-id');
    const adult = parseInt(document.querySelector(`.assign-adult[data-id="${vehId}"]`).value) || 0;
    const child = parseInt(document.querySelector(`.assign-child[data-id="${vehId}"]`).value) || 0;
    const infant = parseInt(document.querySelector(`.assign-infant[data-id="${vehId}"]`).value) || 0;
    
    totalAdult += adult;
    totalChild += child;
    totalInfant += infant;
    
    if (adult > 0 || child > 0 || infant > 0) {
      selectedRows.push({ vehicleId: vehId, adult, child, infant });
    }
  }
  
  const totalAssigned = totalAdult + totalChild + totalInfant;
  const invoiceTotal = (parseInt(currentAssignInvoice.adultCount) || 0) + 
                       (parseInt(currentAssignInvoice.childCount) || 0) + 
                       (parseInt(currentAssignInvoice.infantCount) || 0);
  
  if (totalAssigned !== invoiceTotal) {
    document.getElementById('assignWarning').innerHTML = `⚠️ Total assigned (${totalAssigned}) does not match invoice total (${invoiceTotal})`;
    return;
  }
  
  if (selectedRows.length === 0) {
    document.getElementById('assignWarning').innerHTML = '⚠️ Please assign at least one vehicle';
    return;
  }
  
  const vehiclesUsedJson = selectedRows.map(v => ({
    vehicleId: v.vehicleId,
    adults: v.adult,
    children: v.child,
    infants: v.infant,
    total: v.adult + v.child + v.infant
  }));
  
  try {
    await gas('updateInvoiceFieldV2', {
      voucherNo: currentAssignVoucher,
      field: 'VehiclesUsed',
      value: JSON.stringify(vehiclesUsedJson),
      centerName: currentUser?.centerName
    });
    
    updateLocalInvoice(currentAssignVoucher, 'VehiclesUsed', JSON.stringify(vehiclesUsedJson));
    
    showToast(`Assigned ${selectedRows.length} vehicles`, 'success');
    closeModal('assignVehiclesModal');
    renderTable();
  } catch(e) { 
    showToast('Error: ' + e.message, 'error'); 
  }
}

async function saveInstructorAssignment() {
  const selectedRows = [];
  const checkboxes = document.querySelectorAll('#assignInstructorsModal .assign-select:checked');
  let totalDiver = 0, totalCourse = 0, totalIntro = 0;
  
  for (const cb of checkboxes) {
    const instId = cb.getAttribute('data-id');
    const diver = parseInt(document.querySelector(`#assignInstructorsModal .assign-diver[data-id="${instId}"]`).value) || 0;
    const course = parseInt(document.querySelector(`#assignInstructorsModal .assign-course[data-id="${instId}"]`).value) || 0;
    const intro = parseInt(document.querySelector(`#assignInstructorsModal .assign-intro[data-id="${instId}"]`).value) || 0;
    
    totalDiver += diver;
    totalCourse += course;
    totalIntro += intro;
    
    if (diver > 0 || course > 0 || intro > 0) {
      selectedRows.push({ instructorId: instId, diver, course, intro });
    }
  }
  
  const requiredDiver = parseInt(currentAssignInvoice.sgl) || 0;
  const requiredCourse = parseInt(currentAssignInvoice.dbl) || 0;
  const requiredIntro = parseInt(currentAssignInvoice.extra) || 0;
  
  if (totalDiver !== requiredDiver || totalCourse !== requiredCourse || totalIntro !== requiredIntro) {
    document.getElementById('assignWarning').innerHTML = `⚠️ Mismatch: Diver ${totalDiver}/${requiredDiver}, Course ${totalCourse}/${requiredCourse}, Intro ${totalIntro}/${requiredIntro}`;
    return;
  }
  
  if (selectedRows.length === 0) {
    document.getElementById('assignWarning').innerHTML = '⚠️ Please assign at least one instructor';
    return;
  }
  
  try {
    await gas('updateInvoiceFieldV2', {
      voucherNo: currentAssignVoucher,
      field: 'InstructorsExecution',
      value: JSON.stringify(selectedRows),
      centerName: currentUser?.centerName
    });
    
    updateLocalInvoice(currentAssignVoucher, 'InstructorsExecution', JSON.stringify(selectedRows));
    
    showToast(`Assigned ${selectedRows.length} instructors`, 'success');
    closeModal('assignInstructorsModal');
    renderTable();
  } catch(e) { 
    showToast('Error: ' + e.message, 'error'); 
  }
}

window.loadBeachInstructorsList = async function() {

    const currentDate = getCurrentDateISO();

    if (currentDate) {

      document.getElementById('beachInstructorsList').innerHTML = '<div class="selection-item">لا يوجد مدربين متاحين</div>';

function toggleBeachInstructor(id) {

async function saveBeachInstructors() {
  const currentDate = getCurrentDateISO();
  if (!currentDate) {
    showToast('الرجاء تحديد تاريخ واحد أولاً', 'error');
    return;
  }
  
  // ✅ التحقق من عدم وجود مدرب في قائمة الشاطئ موجود بالفعل في المراكب
  const allBoatInstructors = [];
  for (const instructors of Object.values(boatInstructorsMap)) {
    allBoatInstructors.push(...instructors);
  }
  
  const duplicateInBoats = selectedBeachInstructors.filter(id => allBoatInstructors.includes(id));
  if (duplicateInBoats.length > 0) {
    const duplicateNames = duplicateInBoats.map(id => {
      const inst = cachedInstructors.find(i => i.id === id);
      return inst?.name || id;
    }).join(', ');
    showToast(`⚠️ لا يمكن تعيين نفس المدرب في الشاطئ والمركب: ${duplicateNames}`, 'error');
    return;
  }
  
  const assignments = currentAssignments || {};
  assignments.beachInstructors = selectedBeachInstructors;
  
  const success = await saveAssignmentsForDate(currentDate, assignments);
  if (success) {
    currentAssignments = assignments;
    
    // تسجيل مدربي الشاطئ في DailyLog
    for (const instructorId of selectedBeachInstructors) {
      const instructor = cachedInstructors.find(i => i.id === instructorId);
      if (instructor) {
        await recordInstructorAssignment(instructorId, instructor.name, 'Beach', '', '');
      }
    }
    
    showToast(`✅ تم حفظ ${selectedBeachInstructors.length} مدرب شاطئ`, 'success');
    closeModal('beachInstructorsModal');
    updateSelectionBadges();
    
    // ✅ تحديث الجدول محلياً فقط
    refreshTableData();
  } else {
    showToast('فشل حفظ البيانات', 'error');
  }
}
  // دالة لتحديث الجدول من البيانات الموجودة (بدون API)

  // إعادة تطبيق الفلاتر على البيانات الموجودة

    loadAndPopulateAssignments(currentDate);

}

async function loadBoatsWithInstructors() {
  try {
    let boats = cachedBoats;
    if (!boats || boats.length === 0) {
      boats = await gas('getBoats');
      cachedBoats = boats;
    }
    let instructors = cachedInstructors;
    if (!instructors || instructors.length === 0) {
      instructors = await gas('getInstructors');
      cachedInstructors = instructors;
    }
    
    // ✅ استبعاد المدربين الموجودين في Beach Instructors
    const availableInstructors = instructors.filter(inst => 
      !selectedBeachInstructors.includes(inst.id)
    );
    
    if (!Array.isArray(boats)) boats = [];
    
    let html = '';
    for (const boat of boats) {
      const isBoatSelected = selectedBoats.includes(boat.id);
      const selectedInstructorsForBoat = boatInstructorsMap[boat.id] || [];
      
      html += `
        <div class="boat-card">
          <div class="boat-card-header">
            <input type="checkbox" class="boat-select" data-id="${boat.id}" data-name="${escapeHtml(boat.name)}" ${isBoatSelected ? 'checked' : ''} onchange="toggleBoatSelection('${boat.id}')">
            <span style="margin-left:8px;">⛵ ${escapeHtml(boat.name)} (السعة: ${boat.capacity || 0})</span>
          </div>
          <div id="boat-instructors-${boat.id}" style="margin-top:8px; padding-left:24px; ${isBoatSelected ? '' : 'display:none;'}">
            <div style="font-size:11px; font-weight:700; margin-bottom:6px;">👨‍🏫 اختيار مدربين لهذا المركب:</div>
            <div class="selection-list" style="max-height:200px;">
      `;
      
      for (const inst of availableInstructors) {
        const isSelected = selectedInstructorsForBoat.includes(inst.id);
        html += `
          <div class="selection-item" onclick="toggleBoatInstructor('${boat.id}', '${inst.id}')">
            <input type="checkbox" class="boat-instructor-checkbox-${boat.id}" data-id="${inst.id}" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleBoatInstructor('${boat.id}', '${inst.id}')">
            <div class="info"><div class="name">${escapeHtml(inst.name)}</div></div>
          </div>
        `;
      }
      
      html += `
            </div>
          </div>
        </div>
      `;
    }
    
    document.getElementById('boatsSelectionContainer').innerHTML = html || '<div>لا توجد مراكب</div>';
    
  } catch(e) {
    showToast('خطأ في تحميل المراكب: ' + e.message, 'error');
  }
}

function toggleBoatSelection(boatId) {
  const checkbox = document.querySelector(`.boat-select[data-id="${boatId}"]`);
  const isSelected = checkbox.checked;
  const instructorsDiv = document.getElementById(`boat-instructors-${boatId}`);
  
  if (isSelected) {
    if (!selectedBoats.includes(boatId)) selectedBoats.push(boatId);
    if (instructorsDiv) instructorsDiv.style.display = 'block';
  } else {
    const index = selectedBoats.indexOf(boatId);
    if (index !== -1) selectedBoats.splice(index, 1);
    if (instructorsDiv) instructorsDiv.style.display = 'none';
    delete boatInstructorsMap[boatId];
    updateSelectionBadges();
  }
}

function toggleBoatInstructor(boatId, instructorId) {
  if (!boatInstructorsMap[boatId]) boatInstructorsMap[boatId] = [];
  const index = boatInstructorsMap[boatId].indexOf(instructorId);
  if (index === -1) {
    boatInstructorsMap[boatId].push(instructorId);
  } else {
    boatInstructorsMap[boatId].splice(index, 1);
  }
  const container = document.getElementById(`boat-instructors-${boatId}`);
  if (container) {
    const checkboxes = container.querySelectorAll(`input[type="checkbox"]`);
    checkboxes.forEach(cb => {
      const instId = cb.getAttribute('data-id');
      if (instId) {
        cb.checked = boatInstructorsMap[boatId]?.includes(instId) || false;
      }
    });
  }
}

window.saveBoatsAndInstructors = async function() {

    return false;
  }

  const boatsFromMap = Object.keys(window.boatInstructorsMap || {});
  const allSelectedBoats = [...new Set([...window.selectedBoats, ...boatsFromMap])];
  
  console.log('📋 حفظ البيانات:');
  console.log('   selectedBoats:', window.selectedBoats);
  console.log('   boatsFromMap:', boatsFromMap);
  console.log('   allSelectedBoats:', allSelectedBoats);
  console.log('   boatInstructorsMap:', window.boatInstructorsMap);
  
  // ✅ حفظ في DailyAssignments أولاً
  const assignments = {
    boats: allSelectedBoats,
    boatInstructorsMap: window.boatInstructorsMap
  };
  
  const success = await saveAssignmentsForDate(currentDate, assignments);
  
  if (success) {
    // ✅ تحديث المتغيرات العامة
    window.currentAssignments = assignments;
    window.selectedBoats = allSelectedBoats;
    
    // ✅ تسجيل في InstructorDailyAssignments (معawait لكل واحدة)
    for (const [boatId, instructors] of Object.entries(window.boatInstructorsMap)) {
      const boat = window.cachedBoats?.find(b => b.id === boatId);
      const boatName = boat?.name || boatId;
      for (const instructorId of instructors) {
        const instructor = window.cachedInstructors?.find(i => i.id === instructorId);
        if (instructor) {
          try {
            const logResult = await gas('assignInstructorToDailyLog', {
              date: currentDate,
              instructorId: instructorId,
              instructorName: instructor.name,
              assignmentType: 'Boat',
              boatId: boatId,
              boatName: boatName,
              centerName: currentUser?.centerName
            });

          } catch(e) {
            console.warn(`   ⚠️ فشل تسجيل المدرب ${instructor.name}:`, e);
          }
        }
      }
    }
    
    // ✅ تحديث الشارات
    if (typeof updateSelectionBadges === 'function') {
      updateSelectionBadges();
    }
    
    // ✅ تحديث عدد المراكب في الزر
    const boatsBadge = document.getElementById('selectedBoatsBadge');
    if (boatsBadge) {
      boatsBadge.textContent = allSelectedBoats.length;
    }
    
    showToast(`✅ تم حفظ ${allSelectedBoats.length} مركب مع ${Object.values(window.boatInstructorsMap).flat().length} مدرب`, 'success');
    closeModal('boatsModal');
    
    // ✅ إعادة تحميل القوائم لتحديث المدربين المتاحين
    if (typeof loadBoatsWithInstructors === 'function') {
      // نعيد تحميل القائمة بعد فترة قصيرة
      setTimeout(() => loadBoatsWithInstructors(), 500);
    }
    
    return true;
  } else {
    showToast('فشل حفظ البيانات', 'error');
    return false;
  }
};

window.openBoatsModal = async function() {
  if (!isSingleDateRange()) {
    showToast('لا يمكن اختيار المراكب إلا عند تحديد تاريخ واحد', 'error');
    return;
  }
  
  // ✅ تحميل أحدث البيانات من الخادم قبل فتح النافذة
  showToast('جاري تحميل البيانات...', 'info');
  
  try {
    const [boats, instructors] = await Promise.all([
      gas('getBoats'),
      gas('getInstructors')
    ]);
    
    window.cachedBoats = boats;
    window.cachedInstructors = instructors;
    
    // ✅ تحميل التعيينات المحفوظة مسبقاً
    const currentDate = getCurrentDateISO();
    if (currentDate) {
      const savedAssignments = await loadAssignmentsForDate(currentDate);
      if (savedAssignments) {
        window.selectedBoats = savedAssignments.boats || [];
        window.boatInstructorsMap = savedAssignments.boatInstructorsMap || {};
        window.currentAssignments = savedAssignments;
        
        // تحديث الشارات
        if (typeof updateSelectionBadges === 'function') {
          updateSelectionBadges();
        }
        
        const boatsBadge = document.getElementById('selectedBoatsBadge');
        if (boatsBadge) {
          boatsBadge.textContent = window.selectedBoats.length;
        }
      }
    }
    
    await loadBoatsWithInstructors();
    openModal('boatsModal');
    
  } catch(e) {
    console.error('Error loading boats modal:', e);
    showToast('خطأ في تحميل البيانات', 'error');
  }
};

// ============================================================
// VEHICLES MODAL
// ============================================================
async function loadVehiclesList() {
  try {
    let vehicles = cachedVehicles;
    if (!vehicles || vehicles.length === 0) {
      vehicles = await gas('getVehicles');
      cachedVehicles = vehicles;
    }
    if (Array.isArray(vehicles)) {
      const listHtml = vehicles.map(veh => {
        const isSelected = selectedVehicles.includes(veh.id);
        return `
          <div class="selection-item" onclick="toggleVehicle('${veh.id}')">
            <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleVehicle('${veh.id}')">
            <div class="info"><div class="name">${escapeHtml(veh.licensePlate || veh.id)} (${veh.capacity || 0} seats)</div></div>
          </div>
        `;
      }).join('');
      document.getElementById('vehiclesList').innerHTML = listHtml || '<div class="selection-item">No vehicles found</div>';
    }
  } catch(e) { showToast('Error loading vehicles', 'error'); }
}

function toggleVehicle(id) {
  const index = selectedVehicles.indexOf(id);
  if (index === -1) selectedVehicles.push(id);
  else selectedVehicles.splice(index, 1);
  loadVehiclesList();
  updateSelectionBadges();
}

async function saveVehiclesSelection() {
  const currentDate = getCurrentDateISO();
  if (!currentDate) {
    showToast('Please select a single date first', 'error');
    return;
  }
  
  const assignments = currentAssignments || {};
  assignments.vehicles = selectedVehicles;
  
  const success = await saveAssignmentsForDate(currentDate, assignments);
  if (success) {
    currentAssignments = assignments;
    showToast(`Saved ${selectedVehicles.length} vehicles`, 'success');
    closeModal('vehiclesModal');
    updateSelectionBadges();
  } else {
    showToast('Failed to save assignments', 'error');
  }
}

function openVehiclesModal() {
  if (!isSingleDateRange()) {
    showToast('لا يمكن اختيار السيارات إلا عند تحديد تاريخ واحد', 'error');
    return;
  }
  loadVehiclesList();
  openModal('vehiclesModal');
}

function updateSelectionBadges() {
  document.getElementById('selectedInstructorsBadge').textContent = selectedBeachInstructors.length;
  document.getElementById('selectedBoatsBadge').textContent = selectedBoats.length;
  document.getElementById('selectedVehiclesBadge').textContent = selectedVehicles.length;
}

function resetAllSelections() {
  const currentDate = getCurrentDateISO();
  if (currentDate) {
    saveAssignmentsForDate(currentDate, { beachInstructors: [], boats: [], boatInstructorsMap: {}, vehicles: [] });
  }
  selectedBeachInstructors = [];
  selectedBoats = [];
  boatInstructorsMap = {};
  selectedVehicles = [];
  updateSelectionBadges();
  showToast('All selections cleared', 'info');
  if (currentDate) loadAndPopulateAssignments(currentDate);
}

// ============================================================
// UPSELL
// ============================================================
let currentUpsellVoucher = null;
let currentUpsellInvoice = null;
let currentUpsellTripItems = [];

async function openUpsell(voucherNo) {
  const invoice = filteredInvoices.find(i => i.voucherNo === voucherNo);
  if (!invoice) return;
  currentUpsellVoucher = voucherNo;
  currentUpsellInvoice = invoice;
  
  const tripName = invoice.trip || '';
  const currency = invoice.invoiceCurrency || 'LE';
  if (!tripName) { showToast('No trip name found', 'error'); return; }
  
  try {
    const tripData = await gas('getTripData', { tripName, currency });
    let items = tripData?.items || ['1 Intro', '2 Intro', 'Diver', 'C.D.', 'S.R.'];
    const exclude = ['Adult', 'Child', 'Inf', 'Infant'];
    const filtered = items.filter(item => !exclude.includes(item));
    
    currentUpsellTripItems = filtered.map((item, idx) => ({ name: item, price: '', quantity: 0 }));
    
    let itemsHtml = '<table class="assign-table"><thead><tr><th>Activity</th><th>Price</th><th>Qty</th><th>Total</th></tr></thead><tbody>';
    for (let i = 0; i < currentUpsellTripItems.length; i++) {
      const item = currentUpsellTripItems[i];
      itemsHtml += `
        <tr>
          <td>${escapeHtml(item.name)}</span>
          <td><input type="number" id="upsell_price_${i}" value="" step="0.01" placeholder="0.00" style="width:100px" onchange="updateUpsellTotal(${i})"></td>
          <td><input type="number" id="upsell_qty_${i}" value="0" min="0" style="width:70px" onchange="updateUpsellTotal(${i})"></td>
          <td id="upsell_total_${i}">0.00</span></td>
        </tr>
      `;
    }
    itemsHtml += '</tbody></table>';
    
    const instructors = await gas('getInstructors');
    let instructorsHtml = '<option value="">Select instructor</option>';
    if (Array.isArray(instructors)) {
      instructors.forEach(inst => { instructorsHtml += `<option value="${inst.id}">${escapeHtml(inst.name)}</option>`; });
    }
    
    const upsellHtml = `
      ${itemsHtml}
      <div class="form-group"><label>Selling Instructor</label><select id="upsellInstructor">${instructorsHtml}</select></div>
      <div style="display:flex; gap:10px; justify-content:flex-end;">
        <button class="btn btn-secondary" onclick="closeModal('upsellModal')">Cancel</button>
        <button class="btn btn-success" onclick="saveUpsell()">💰 Create UpSell</button>
      </div>
    `;
    document.getElementById('upsellContent').innerHTML = upsellHtml;
    openModal('upsellModal');
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

function updateUpsellTotal(idx) {
  const qty = parseInt(document.getElementById(`upsell_qty_${idx}`)?.value) || 0;
  const price = parseFloat(document.getElementById(`upsell_price_${idx}`)?.value) || 0;
  const total = qty * price;
  const totalCell = document.getElementById(`upsell_total_${idx}`);
  if (totalCell) totalCell.textContent = total.toFixed(2);
}

async function saveUpsell() {
  const items = [];
  for (let i = 0; i < currentUpsellTripItems.length; i++) {
    const qty = parseInt(document.getElementById(`upsell_qty_${i}`)?.value) || 0;
    const price = parseFloat(document.getElementById(`upsell_price_${i}`)?.value) || 0;
    if (qty > 0 && price > 0) {
      items.push({ name: currentUpsellTripItems[i].name, quantity: qty, price, position: i + 1 });
    }
  }
  if (items.length === 0) { showToast('Please select at least one upsell item with price', 'error'); return; }
  
  const instructorId = document.getElementById('upsellInstructor')?.value;
  if (!instructorId) { showToast('Please select selling instructor', 'error'); return; }
  
  const amounts = {
    cashUSD: parseFloat(document.getElementById('upsellCashUSD')?.value) || 0,
    cashEUR: parseFloat(document.getElementById('upsellCashEUR')?.value) || 0,
    cashGBP: parseFloat(document.getElementById('upsellCashGBP')?.value) || 0,
    cashLE: parseFloat(document.getElementById('upsellCashLE')?.value) || 0,
    visaUSD: parseFloat(document.getElementById('upsellVisaUSD')?.value) || 0,
    visaEUR: parseFloat(document.getElementById('upsellVisaEUR')?.value) || 0,
    visaGBP: parseFloat(document.getElementById('upsellVisaGBP')?.value) || 0,
    visaLE: parseFloat(document.getElementById('upsellVisaLE')?.value) || 0
  };
  const totalAmount = Object.values(amounts).reduce((a,b)=>a+b,0);
  if (totalAmount === 0) { showToast('Please enter payment amounts', 'error'); return; }
  
  const upsellData = [{ instructorId, items, totalAmount, payments: amounts }];
  try {
    const result = await gas('createUpSellInvoice', {
      originalVoucherNo: currentUpsellVoucher,
      upSellItems: JSON.stringify(items),
      upSellAmounts: JSON.stringify(amounts),
      instructorId,
      upsellData: JSON.stringify(upsellData)
    });
    if (result?.success) {
      await gas('updateInvoiceFieldV2', {
        voucherNo: currentUpsellVoucher,
        field: 'InstructorsUpSell',
        value: JSON.stringify(upsellData),
        centerName: currentUser?.centerName
      });
      showToast(`UpSell invoice created: ${result.voucherNo}`, 'success');
      closeModal('upsellModal');
      await loadInvoices();
    } else { showToast(result?.message || 'Failed', 'error'); }
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

// ============================================================
// TIME PICKER
// ============================================================
let pendingTimeVoucher = null;

function openTimePicker(voucherNo, currentTime) {
  pendingTimeVoucher = voucherNo;
  const input = document.getElementById('timePickerInput');
  input.value = currentTime || '09:00';
  openModal('timeModal');
}

async function saveTimeUpdate() {
  if (!pendingTimeVoucher) return;
  const newTime = document.getElementById('timePickerInput').value;
  if (!newTime) {
    showToast('الرجاء اختيار وقت', 'error');
    return;
  }
  
  try {
    await gas('updateInvoiceFieldV2', {
      voucherNo: pendingTimeVoucher,
      field: 'Time',
      value: newTime,
      centerName: currentUser?.centerName
    });
    
    updateLocalInvoice(pendingTimeVoucher, 'time', newTime);
    renderTable();
    showToast(`تم تحديث الوقت إلى ${newTime}`, 'success');
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
  closeModal('timeModal');
  pendingTimeVoucher = null;
}

// HELPER FUNCTIONS

async function getVehicleById(id) {
  const vehicles = await gas('getVehicles');
  if (Array.isArray(vehicles)) return vehicles.find(v => v.id === id);
  return null;
}

async function getBoatById(id) {
  const boats = await gas('getBoats');
  if (Array.isArray(boats)) return boats.find(b => b.id === id);
  return null;
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function exportToExcel() { showToast('Export feature coming soon', 'info'); }

      gas('getVehicles'),
      gas('getBoats')
    ]);
    cachedInstructors = instructors;
    cachedVehicles = vehicles;
    cachedBoats = boats;
    // تعيين تاريخ اليوم تلقائياً في حقلي From Date و To Date
const today = new Date();
const year = today.getFullYear();
const month = String(today.getMonth() + 1).padStart(2, '0');
const day = String(today.getDate()).padStart(2, '0');

}
