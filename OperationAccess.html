<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Operations Access - Assign Instructors & Vehicles</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0f1f3d;
      --navy2: #1a3260;
      --gold: #f5c842;
      --gold2: #e6b800;
      --blue: #2563eb;
      --blue-lt: #3b82f6;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #ea580c;
      --bg: #f0f4f8;
      --card: #fff;
      --border: #dde4f0;
      --text: #1a2540;
      --text-lt: #5a6a8a;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-500: #64748b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    .header {
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      color: white;
      padding: 12px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 3px 16px rgba(15,31,61,.25);
    }
    .header h2 { color: var(--gold); font-size: 18px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .user-chip { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); border-radius: 40px; padding: 4px 13px; color: white; font-size: 12px; font-weight: 600; }
    .back-btn { background: transparent; border: 2px solid rgba(255,255,255,.3); color: white; padding: 4px 13px; border-radius: 40px; cursor: pointer; font-weight: 700; font-size: 12px; transition: all .2s; }
    .back-btn:hover { border-color: var(--gold); color: var(--gold); }
    
    .selection-bar {
      background: white;
      border-bottom: 2px solid var(--border);
      padding: 12px 20px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
      position: sticky;
      top: 60px;
      z-index: 199;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .selection-btn {
      background: var(--navy);
      color: var(--gold);
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      transition: all .2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .selection-btn:hover { background: var(--navy2); transform: translateY(-1px); }
    .selection-badge {
      background: var(--gold);
      color: var(--navy);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 700;
      margin-right: 8px;
    }
    .reset-selection {
      background: #f1f5f9;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 11px;
      cursor: pointer;
    }
    .reset-selection:hover { background: #e2e8f0; }
    
    .filter-bar {
      background: white;
      border-bottom: 2px solid var(--border);
      padding: 10px 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
      position: sticky;
      top: 120px;
      z-index: 198;
    }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-group label { font-size: 10px; font-weight: 700; color: var(--text-lt); }
    .filter-group input, .filter-group select {
      padding: 6px 10px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-family: 'Cairo', sans-serif;
      background: white;
    }
    .filter-group select[multiple] { min-width: 180px; max-height: 100px; }
    .btn-go { background: var(--navy); color: var(--gold); border: none; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-weight: 700; }
    .btn-reset { background: #f1f5f9; border: 1px solid var(--border); padding: 6px 16px; border-radius: 20px; cursor: pointer; }
    .export-btn { background: var(--green); color: white; border: none; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-weight: 700; }
    
    .page-size-selector {
      display: flex;
      align-items: center;
      gap: 6px;
      background: white;
      padding: 0 5px;
    }
    .page-size-selector label { font-size: 11px; font-weight: 700; color: var(--gray-500); }
    .page-size-selector select {
      padding: 4px 6px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 11px;
    }
    
    .tbl-wrap {
      overflow-x: auto;
      position: relative;
      max-height: calc(100vh - 280px);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      min-width: 2200px;
    }
    thead {
      position: sticky;
      top: 0;
      z-index: 180;
      background: linear-gradient(135deg, var(--navy), var(--navy2));
    }
    th {
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      color: var(--gold);
      padding: 10px 6px;
      font-weight: 700;
      white-space: nowrap;
      border-right: 1px solid rgba(255,255,255,.08);
      font-size: 11px;
      cursor: pointer;
    }
    th:hover { background: var(--navy2); }
    td {
      padding: 8px 5px;
      border-bottom: 1px solid #eef2f9;
      color: var(--text);
      white-space: nowrap;
      background: white;
      font-size: 11px;
      vertical-align: middle;
    }
    tr:hover td { background: #f0f6ff; }
    
    .sort-icon { font-size: 9px; margin-left: 3px; }
    .status-pending { background: #fef9c3; color: #854d0e; padding: 2px 8px; border-radius: 20px; display: inline-block; font-size: 10px; }
    .status-confirmed { background: #dcfce7; color: #166534; padding: 2px 8px; border-radius: 20px; display: inline-block; font-size: 10px; }
    
    .action-btn {
      background: var(--blue-lt);
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      margin: 0 2px;
    }
    .action-btn.upsell { background: var(--orange); }
    .action-btn.instructor { background: var(--green); }
    
    .totals-row td { background: #dbeafe; color: var(--navy); border-top: 2px solid var(--navy); border-bottom: 2px solid var(--navy); position: sticky; bottom: 0; z-index: 70; padding: 8px 5px; font-size: 11px; }
    .tl { font-size: 9px; color: #475569; display: block; margin-bottom: 1px; }
    .tv { font-size: 12px; font-weight: 800; color: var(--navy); }
    
    .summary-sec {
      padding: 14px 20px;
      background: white;
      border-top: 2px solid var(--border);
      overflow-x: auto;
      margin-top: 10px;
    }
    .summary-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 8px;
      text-align: center;
    }
    .summary-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin: 0 auto;
    }
    .summary-table th {
      background: var(--navy2);
      color: var(--gold);
      padding: 10px 8px;
      text-align: center;
      font-weight: 700;
    }
    .summary-table td {
      padding: 8px 8px;
      border-bottom: 1px solid var(--border);
      text-align: center;
      vertical-align: middle;
    }
    .summary-table th:first-child,
    .summary-table td:first-child { width: 28%; text-align: center; white-space: normal; word-break: break-word; }
    .summary-table th:nth-child(2),
    .summary-table td:nth-child(2) { width: 15%; text-align: center; }
    .summary-table th:nth-child(3),
    .summary-table td:nth-child(3) { width: 57%; text-align: center; white-space: normal; word-break: break-word; line-height: 1.4; }
    
    .pagination {
      display: flex;
      justify-content: center;
      gap: 5px;
      padding: 12px;
      background: white;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .page-btn {
      padding: 4px 9px;
      border: 1px solid var(--border);
      background: white;
      border-radius: 14px;
      cursor: pointer;
      font-size: 11px;
    }
    .page-btn.active { background: var(--navy); color: var(--gold); border-color: var(--navy); }
    
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      color: white;
      z-index: 9999;
      transform: translateY(50px);
      opacity: 0;
      transition: 0.35s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast-success { background: var(--green); }
    .toast-error { background: var(--red); }
    .toast-info { background: var(--blue); }
    
    .loader { text-align: center; padding: 50px; color: var(--text-lt); }
    .spinner {
      width: 32px;
      height: 32px;
      border: 4px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .tooltip { position: relative; display: inline-block; cursor: help; }
    .tooltip .tooltiptext {
      visibility: hidden;
      width: 200px;
      background-color: var(--navy);
      color: var(--gold);
      text-align: center;
      border-radius: 6px;
      padding: 5px;
      position: absolute;
      z-index: 1;
      bottom: 125%;
      left: 50%;
      margin-left: -100px;
      opacity: 0;
      transition: opacity 0.3s;
      font-size: 10px;
    }
    .tooltip:hover .tooltiptext { visibility: visible; opacity: 1; }
    
    .vlink { color: var(--blue); font-weight: 700; cursor: pointer; text-decoration: none; }
    .vlink:hover { text-decoration: underline; }
    .amt { text-align: right; font-family: monospace; }
    
    @media(max-width: 640px) { .filter-bar { flex-direction: column; align-items: stretch; } }
  </style>
</head>
<body>

<div class="header">
  <h2>🎯 Operations Access - Assign Instructors & Vehicles</h2>
  <div class="header-right">
    <span class="user-chip" id="userNameDisplay"></span>

  </div>
</div>

<div class="selection-bar">
  <button class="selection-btn" onclick="openInstructorsModal()">

  <button class="selection-btn" onclick="openVehiclesModal()">

<div class="tbl-wrap">
  <div id="tblCont"><div class="loader"><div class="spinner"></div>Loading...</div></div>
</div>
<div class="pagination" id="pagination"></div>

<div class="summary-sec" id="summarySec" style="display:none">
  <div class="summary-title">🗺️ Trips Summary</div>
  <div style="overflow-x:auto"><table class="summary-table" id="summaryTbl"></table></div>
</div>

<!-- Modals (same as before - kept for brevity, but will include in final) -->
<div id="instructorsModal" class="modal">...</div>
<div id="vehiclesModal" class="modal">...</div>
<div id="boatsModal" class="modal">...</div>
<div id="addInstructorModal" class="modal">...</div>
<div id="addVehicleModal" class="modal">...</div>
<div id="addBoatModal" class="modal">...</div>
<div id="distributeInstructorsModal" class="modal">...</div>
<div id="upsellModal" class="modal">...</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwC1BRoLAJthZqxWTYyMUSjPNNGfCI0BjTfhE7ZiVx67rUP__OKAj0vlwD1-RUCOMSE/exec';
const DASH = { Admin: 'Dashboard.html', Owner: 'OwnerDashboard.html', Sales: 'SalesDashboard.html', Accountant: 'AccountantDashboard.html', OperationsManager: 'OperationAccess.html', OperationsSupervisor: 'OperationAccess.html' };

let currentUser = null;
let allInvoices = [];
let filteredInvoices = [];
let currentPage = 1;
let pageSize = 30;
let sortColumn = 'ActiveDate';
let sortDirection = 'asc';
let uniqueTrips = [];

let selectedInstructors = [];
let selectedVehicles = [];
let selectedBoats = [];

let currentDistributeVoucher = null;
let currentDistributeInvoice = null;
let currentDistributeInstructors = [];
let currentUpSellVoucher = null;
let currentUpSellTrip = null;
let currentUpSellItems = [];

let pendingInstructorImages = { licensePhoto: null, cdwsPhoto: null };

// ============================================================
// UTILITIES
// ============================================================
function showToast(msg, type) {
  const toast = document.createElement('div');
  toast.className = `toast toast-${type} show`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function jsonpRequest(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    if (currentUser?.centerId) params.centerId = currentUser.centerId;
    if (currentUser?.centerName) params.centerName = currentUser.centerName;
    params.action = action;
    params.callback = cbName;
    const qs = Object.entries(params).map(([k, v]) => k + '=' + encodeURIComponent(String(v ?? ''))).join('&');
    const url = GAS_URL + '?' + qs;
    const script = document.createElement('script');
    const timeout = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 60000);
    const cleanup = () => { clearTimeout(timeout); delete window[cbName]; script.remove(); };
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('network error')); };
    script.src = url;
    document.head.appendChild(script);
  });
}

function formatDateDDMMMYYYY(date) {
  if (!date) return '';
  const d = new Date(date);
  if (isNaN(d)) return date;
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return String(d.getDate()).padStart(2, '0') + '/' + months[d.getMonth()] + '/' + d.getFullYear();
}

function parseDateFromString(dateStr) {
  if (!dateStr) return null;
  if (dateStr instanceof Date && !isNaN(dateStr)) return dateStr;
  const s = dateStr.toString().trim();
  const match = s.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (match) {
    const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
    const month = match[2].substring(0,3);
    const monthIndex = months[month];
    if (monthIndex !== undefined) {
      return new Date(parseInt(match[3]), monthIndex, parseInt(match[1]));
    }
  }
  const isoMatch = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (isoMatch) return new Date(parseInt(isoMatch[1]), parseInt(isoMatch[2])-1, parseInt(isoMatch[3]));
  const d = new Date(s);
  return !isNaN(d) ? d : null;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function goBack() {
  const userType = currentUser?.type || 'Admin';
  window.location.href = DASH[userType] || 'Dashboard.html';
}

function editInvoice(voucherNo) {
  sessionStorage.setItem('editVoucherNo', voucherNo);
  window.open('EditInvoice.html', '_blank');
}

// ============================================================
// SORTING FUNCTIONS
// ============================================================
function setSort(col) {
  if (sortColumn === col) {
    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
  } else {
    sortColumn = col;
    sortDirection = 'asc';
  }
  doSort();
  renderTable();
  renderPagination();
}

function doSort() {
  filteredInvoices.sort((a, b) => {
    let aVal = a[sortColumn] ?? a[sortColumn.toLowerCase()] ?? '';
    let bVal = b[sortColumn] ?? b[sortColumn.toLowerCase()] ?? '';
    
    if (sortColumn === 'Rest') {
      aVal = parseFloat(a.Rest || a.rest || 0);
      bVal = parseFloat(b.Rest || b.rest || 0);
    } else if (sortColumn === 'ActiveDate') {
      aVal = parseDateFromString(a.ActiveDate || a.activeDate)?.getTime() || 0;
      bVal = parseDateFromString(b.ActiveDate || b.activeDate)?.getTime() || 0;
    } else if (sortColumn === 'Trip') {
      aVal = (a.Trip || a.trip || '').toLowerCase();
      bVal = (b.Trip || b.trip || '').toLowerCase();
    } else if (sortColumn === 'GuestName') {
      aVal = (a.GuestName || a.guestName || '').toLowerCase();
      bVal = (b.GuestName || b.guestName || '').toLowerCase();
    } else {
      aVal = String(aVal).toLowerCase();
      bVal = String(bVal).toLowerCase();
    }
    
    if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
    if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
    return 0;
  });
}

// ============================================================
// PAGE SIZE
// ============================================================
function changePageSize() {
  const select = document.getElementById('pageSizeSelect');
  pageSize = parseInt(select.value);
  if (pageSize === -1) pageSize = filteredInvoices.length || 9999;
  currentPage = 1;
  renderTable();
  renderPagination();
}

// ============================================================
// LOAD DATA & FILTERS
// ============================================================
async function loadInvoices() {
  try {
    const result = await jsonpRequest('getAllInvoices', { includeCollection: 'true' });
    if (Array.isArray(result)) {
      allInvoices = result.filter(inv => {
        const state = (inv.State || inv.state || '').toLowerCase();
        return state === 'confirmed' || state === 'pending';
      });
      
      // Extract unique trips for filter
      const tripSet = new Set();
      allInvoices.forEach(inv => {
        const trip = inv.Trip || inv.trip;
        if (trip) tripSet.add(trip);
      });
      uniqueTrips = Array.from(tripSet).sort();
      
      const tripSelect = document.getElementById('filterTrip');
      tripSelect.innerHTML = '<option value="">All Trips</option>';
      uniqueTrips.forEach(trip => {
        tripSelect.innerHTML += `<option value="${escapeHtml(trip)}">${escapeHtml(trip)}</option>`;
      });
      
      applyFilters();
    } else {
      showToast('Failed to load invoices', 'error');
    }
  } catch(e) {
    showToast('Connection error', 'error');
  }
}

function applyFilters() {
  const fromDate = document.getElementById('filterFromDate').value;
  const toDate = document.getElementById('filterToDate').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();
  const state = document.getElementById('filterState').value;
  const selectedTrips = Array.from(document.getElementById('filterTrip').selectedOptions).map(opt => opt.value).filter(v => v);

  filteredInvoices = allInvoices.filter(inv => {
    const activeDate = inv.ActiveDate || inv.activeDate || '';
    const parsedDate = parseDateFromString(activeDate);
    
    if (fromDate && parsedDate && parsedDate < new Date(fromDate)) return false;
    if (toDate && parsedDate && parsedDate > new Date(toDate)) return false;
    if (state && (inv.State || inv.state || '').toLowerCase() !== state) return false;
    if (selectedTrips.length > 0 && !selectedTrips.includes(inv.Trip || inv.trip)) return false;
    if (search) {
      const voucher = (inv.VoucherNo || inv.voucherNo || '').toLowerCase();
      const guest = (inv.GuestName || inv.guestName || '').toLowerCase();
      if (!voucher.includes(search) && !guest.includes(search)) return false;
    }
    return true;
  });

  doSort();
  currentPage = 1;
  renderTable();
  renderPagination();
  renderSummary();
}

function resetFilters() {
  document.getElementById('filterFromDate').value = '';
  document.getElementById('filterToDate').value = '';
  document.getElementById('filterSearch').value = '';
  document.getElementById('filterState').value = '';
  document.getElementById('filterTrip').value = '';
  applyFilters();
}

// ============================================================
// BUILD TOTALS ROW
// ============================================================
function buildTotals(data) {
  const sumField = (key, altKey) => {
    return data.reduce((sum, row) => {
      const val = row[key] !== undefined ? row[key] : (altKey ? row[altKey] : 0);
      return sum + (parseFloat(val) || 0);
    }, 0);
  };

  const formatSum = (val) => {
    if (val === 0) return '0';
    return val % 1 === 0 ? val.toString() : val.toFixed(2).replace(/\.00$/, '');
  };

  const sums = {
    item1: sumField('Sgl', 'sgl'),
    item2: sumField('Dbl', 'dbl'),
    item3: sumField('Trpl', 'trpl'),
    item4: sumField('Extra', 'extra'),
    item5: sumField('Camel', 'camel'),
    item6: sumField('Dinner', 'dinner'),

    item8: sumField('StarGazing', 'starGazing'),
    item9: sumField('PrivateTrip', 'privateTrip'),
    item10: sumField('PrivateTransfer', 'privateTransfer')
  };

  return `<tr class="totals-row">
    <td colspan="6" style="text-align:center">
      <span class="tv">${data.length} of ${filteredInvoices.length}</span><br>
      <span class="tl">(shown / total)</span>
    </td>
    <td class="amt"><span class="tl">Item1</span><span class="tv">${formatSum(sums.item1)}</span></td>
    <td class="amt"><span class="tl">Item2</span><span class="tv">${formatSum(sums.item2)}</span></td>
    <td class="amt"><span class="tl">Item3</span><span class="tv">${formatSum(sums.item3)}</span></td>
    <td class="amt"><span class="tl">Item4</span><span class="tv">${formatSum(sums.item4)}</span></td>
    <td class="amt"><span class="tl">Item5</span><span class="tv">${formatSum(sums.item5)}</span></td>

    <td class="amt"><span class="tl">Item7</span><span class="tv">${formatSum(sums.item7)}</span></td>
    <td class="amt"><span class="tl">Item8</span><span class="tv">${formatSum(sums.item8)}</span></td>
    <td class="amt"><span class="tl">Item9</span><span class="tv">${formatSum(sums.item9)}</span></td>
    <td class="amt"><span class="tl">Item10</span><span class="tv">${formatSum(sums.item10)}</span></td>
    <td colspan="9"></td>
  </tr>`;
}

// ============================================================
// BUILD SUMMARY
// ============================================================
function renderSummary() {
  const trips = {};
  
  filteredInvoices.forEach(inv => {
    const tripName = (inv.Trip || inv.trip || 'Unknown').trim();
    if (!trips[tripName]) trips[tripName] = { bookings: 0, activities: {} };
    trips[tripName].bookings++;
    
    const activitiesText = (inv.ActivitiesText || inv.activitiesText || '').toString().trim();
    if (activitiesText) {
      activitiesText.split('|').forEach(part => {
        const match = part.trim().match(/^(.+?)×(\d+(\.\d+)?)$/);
        if (match) {
          const activityName = match[1].trim();
          const quantity = parseFloat(match[2]) || 0;
          trips[tripName].activities[activityName] = (trips[tripName].activities[activityName] || 0) + quantity;
        }
      });
    }
    
    const introCount = parseInt(inv.Extra || inv.extra || 0);
    const courseCount = parseInt(inv.Dbl || inv.dbl || 0);
    const diverCount = parseInt(inv.Sgl || inv.sgl || 0);
    
    if (introCount > 0) trips[tripName].activities['Intro'] = (trips[tripName].activities['Intro'] || 0) + introCount;
    if (courseCount > 0) trips[tripName].activities['Course'] = (trips[tripName].activities['Course'] || 0) + courseCount;
    if (diverCount > 0) trips[tripName].activities['Diver'] = (trips[tripName].activities['Diver'] || 0) + diverCount;
  });
  
  if (Object.keys(trips).length === 0) {
    document.getElementById('summarySec').style.display = 'none';
    return;
  }
  
  let rows = '';
  Object.entries(trips).sort((a, b) => b[1].bookings - a[1].bookings).forEach(([tripName, info]) => {
    const activitiesStr = Object.entries(info.activities)
      .map(([act, qty]) => `${act}×${Number.isInteger(qty) ? qty : qty.toFixed(1)}`)
      .join(' | ');
    rows += `<tr>
      <td><strong>${escapeHtml(tripName)}</strong></td>
      <td style="text-align:center"><span style="background:var(--navy);color:var(--gold);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700">${info.bookings}</span></td>
      <td class="acts-cell">${escapeHtml(activitiesStr || '—')}</td>
    </tr>`;
  });
  
  document.getElementById('summaryTbl').innerHTML = `<thead><tr><th>Trip</th><th style="text-align:center">Bookings</th><th>Activities</th></tr></thead><tbody>${rows}</tbody>`;
  document.getElementById('summarySec').style.display = 'block';
}

// ============================================================
// RENDER TABLE
// ============================================================
function renderTable() {
  const start = (currentPage - 1) * pageSize;
  const end = Math.min(start + pageSize, filteredInvoices.length);
  const pageData = filteredInvoices.slice(start, end);

  if (pageData.length === 0) {
    document.getElementById('tblCont').innerHTML = '<div class="loader">No invoices found</div>';
    return;
  }

  const columns = [
    { key: 'Rest', label: 'Balance' },
    { key: 'VoucherNo', label: 'Voucher #' },
    { key: 'ActiveDate', label: 'Active Date' },
    { key: 'Trip', label: 'Trip' },
    { key: 'GuestName', label: 'Guest' },
    { key: 'Nationality', label: 'Nationality' },
    { key: 'Item1', label: 'Item1' },
    { key: 'Item2', label: 'Item2' },
    { key: 'Item3', label: 'Item3' },
    { key: 'Item4', label: 'Item4' },
    { key: 'Item5', label: 'Item5' },
    { key: 'Item6', label: 'Item6' },
    { key: 'Item7', label: 'Item7' },
    { key: 'Item8', label: 'Item8' },
    { key: 'Item9', label: 'Item9' },
    { key: 'Item10', label: 'Item10' },
    { key: 'State', label: 'Status' },
    { key: 'Vehicles', label: 'Vehicles' },
    { key: 'Boats', label: 'Boats' },
    { key: 'Instructors', label: 'Instructors' },
    { key: 'Actions', label: 'Actions' }
  ];

  let html = '<table><thead><tr>';
  columns.forEach(col => {
    const sortIcon = (sortColumn === col.key) ? (sortDirection === 'asc' ? ' ↑' : ' ↓') : ' ⇅';
    html += `<th onclick="setSort('${col.key}')">${col.label}<span class="sort-icon">${sortIcon}</span></th>`;
  });
  html += '</thead><tbody>';

  for (const inv of pageData) {
    const voucherNo = inv.VoucherNo || inv.voucherNo || '';
    const state = (inv.State || inv.state || '').toLowerCase();
    const stateClass = state === 'confirmed' ? 'status-confirmed' : 'status-pending';
    const stateText = state === 'confirmed' ? '✅ Confirmed' : '⏳ Pending';
    const rest = parseFloat(inv.Rest || inv.rest || 0);
    const currency = inv.InvoiceCurrency || inv.invoiceCurrency || 'LE';
    
    const adultCount = parseInt(inv.Adult || inv.adult || 0);
    const childCount = parseInt(inv.Children || inv.children || 0);
    const infantCount = parseInt(inv.Infants || inv.infants || 0);
    const totalPax = adultCount + childCount + infantCount;

    const item1 = inv.Sgl || inv.sgl || 0;
    const item2 = inv.Dbl || inv.dbl || 0;
    const item3 = inv.Trpl || inv.trpl || 0;
    const item4 = inv.Extra || inv.extra || 0;
    const item5 = inv.Camel || inv.camel || 0;
    const item6 = inv.Dinner || inv.dinner || 0;
    const item7 = inv.VIPDinner || inv.vipDinner || 0;
    const item8 = inv.StarGazing || inv.starGazing || 0;
    const item9 = inv.PrivateTrip || inv.privateTrip || 0;
    const item10 = inv.PrivateTransfer || inv.privateTransfer || 0;

    html += `<tr>`;
    html += `<td class="amt">${rest.toFixed(2)} ${currency}</td>`;
    html += `<td><span class="vlink" onclick="editInvoice('${escapeHtml(voucherNo)}')">${escapeHtml(voucherNo)}</span></td>`;
    html += `<td>${formatDateDDMMMYYYY(inv.ActiveDate || inv.activeDate)}</td>`;
    html += `<td>${escapeHtml(inv.Trip || inv.trip || '')}</td>`;
    html += `<td>${escapeHtml(inv.GuestName || inv.guestName || '')}</td>`;
    html += `<td>${escapeHtml(inv.Nationality || inv.nationality || '')}</td>`;
    html += `<td class="amt">${item1 > 0 ? item1 : ''}</td>`;
    html += `<td class="amt">${item2 > 0 ? item2 : ''}</td>`;
    html += `<td class="amt">${item3 > 0 ? item3 : ''}</td>`;
    html += `<td class="amt">${item4 > 0 ? item4 : ''}</td>`;
    html += `<td class="amt">${item5 > 0 ? item5 : ''}</td>`;
    html += `<td class="amt">${item6 > 0 ? item6 : ''}</td>`;
    html += `<td class="amt">${item7 > 0 ? item7 : ''}</td>`;
    html += `<td class="amt">${item8 > 0 ? item8 : ''}</td>`;
    html += `<td class="amt">${item9 > 0 ? item9 : ''}</td>`;
    html += `<td class="amt">${item10 > 0 ? item10 : ''}</td>`;
    html += `<td><span class="${stateClass}">${stateText}</span></td>`;
    html += `<td><button class="action-btn" onclick="assignVehiclesToInvoice('${voucherNo}', ${totalPax})">🚗 Assign (${totalPax})</button></td>`;
    html += `<td><button class="action-btn" onclick="assignBoatsToInvoice('${voucherNo}')">⛵ Assign</button></td>`;
    html += `<td><button class="action-btn instructor" onclick="openDistributeInstructors('${voucherNo}')">👨‍🏫 Assign</button></td>`;
    html += `<td><button class="action-btn upsell" onclick="openUpSell('${voucherNo}')">💰 UpSell</button></td>`;
    html += `</tr>`;
  }

  html += buildTotals(pageData);
  html += '</tbody></table>';
  document.getElementById('tblCont').innerHTML = html;
}

function renderPagination() {
  const totalPages = Math.ceil(filteredInvoices.length / pageSize);
  if (totalPages <= 1) {
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  let html = '';
  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="gotoPage(${i})">${i}</button>`;
  }
  document.getElementById('pagination').innerHTML = html;
}

function gotoPage(page) {
  currentPage = page;
  renderTable();
}
