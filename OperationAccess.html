  <style>
   /* ✅ متغيرات الثيم الموحد */
:root {

  --navy: #0f1f3d;
  --navy2: #1a3260;
  --gold: #f5c842;
  --gold2: #e6b800;
  --blue: #2563eb;
  --blue-lt: #3b82f6;
  --green: #16a34a;
  --red: #dc2626;
  --orange: #ea580c;
  --purple: #7c3aed;
  --bg: #f0f4f8;
  --card: #fff;
  --border: #dde4f0;
  --text: #1a2540;
  --text-lt: #5a6a8a;
  --gray-50: #f8fafc;
  --gray-100: #f1f5f9;
  --gray-200: #e2e8f0;
  --gray-500: #64748b;
  
  /* ✅ إضافة متغيرات الألوان الإضافية من النسخة القديمة */
  --header-bg-start: #0f1f3d;
  --header-bg-end: #1a3260;
  --selection-btn-bg: #0f1f3d;
  --selection-btn-text: #f5c842;
  --selection-badge-bg: #f5c842;
  --selection-badge-text: #0f1f3d;
  --table-header-bg: #0f1f3d;
  --table-header-text: #f5c842;
  --modal-header-border: #f5c842;
  --card-header-bg: #0f1f3d;
  --card-header-text: #f5c842;
  --pagination-active-bg: #0f1f3d;
  --pagination-active-text: #f5c842;
}
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    /* ========== HEADER & NAVIGATION ========== */
   .header {
  background: linear-gradient(135deg, var(--header-bg-start), var(--header-bg-end));
  color: white;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 3px 16px rgba(15,31,61,.25);
}
    .header h2 { color: var(--gold); font-size: 18px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .user-chip { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); border-radius: 40px; padding: 4px 12px; color: white; font-size: 12px; font-weight: 600; }
    /* ✅ إضافة تأثيرات للأزرار */
.back-btn {
  background: transparent;
  border: 2px solid rgba(255,255,255,.3);
  color: white;
  padding: 4px 12px;
  border-radius: 40px;
  cursor: pointer;
  font-weight: 700;
  font-size: 12px;
  transition: all 0.3s ease;
}

.back-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(245, 200, 66, 0.1);
}

.btn-go {
  background: var(--navy);
  color: var(--gold);
  transition: all 0.3s ease;
}

.btn-go:hover {
  background: #1a3260;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(15,31,61,0.3);
}

.btn-primary {
  background: var(--navy);
  color: var(--gold);
  transition: all 0.3s ease;
}

.btn-primary:hover {
  background: #1a3260;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(15,31,61,0.3);
}

.btn-success {
  background: var(--green);
  color: white;
  transition: all 0.3s ease;
}

.btn-success:hover {
  background: #15803d;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(22,163,74,0.3);
}

.action-btn {
  background: var(--blue-lt);
  color: white;
  border: none;
  padding: 4px 6px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  min-width: 32px;
  transition: all 0.2s ease;
}

.action-btn:hover:not(.disabled) {
  transform: scale(1.1);
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

.action-btn.upsell { background: var(--orange); }
.action-btn.upsell:hover { background: #c2410c; }

.action-btn.instructor { background: var(--green); }
.action-btn.instructor:hover { background: #15803d; }

.action-btn.vehicle { background: var(--purple); }
.action-btn.vehicle:hover { background: #6d28d9; }

.action-btn.boat { background: var(--blue); }
.action-btn.boat:hover { background: #1d4ed8; }

    /* ========== SELECTION BAR ========== */
    .selection-bar {
      background: white;
      border-bottom: 2px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;

    }

  color: var(--selection-btn-text);
  border: none;
  padding: 8px 16px;
  border-radius: 40px;

  font-size: 12px;

  align-items: center;

}

.selection-btn:hover:not(.disabled) {
  background: #1a3260;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(15,31,61,0.3);
}

.selection-btn:active:not(.disabled) {
  transform: translateY(0px);
}

}

      cursor: pointer;
    }

    .export-btn { background: var(--green); color: white; }

th:hover {

}
    .action-buttons {

    }

}  
    /* ========== CARD STYLES (Mobile) ========== */
    .cards-container {
      display: none;

@media (max-width: 768px) {
    /* جعل حقل التاريخ والأيقونة في صف واحد */

        display: flex;

    }
    
    .filter-group .date-input-wrap input[type="text"] {
        flex: 1;

    }

    }
    
    /* تعديل عرض حقول التاريخ */
    #filterFromDateTxt,
    #filterToDateTxt {
        width: 100% !important;
        min-width: 80px !important;
    }
}
    /* ========== RESPONSIVE BREAKPOINT ========== */
    @media (max-width: 768px) {
      .tbl-wrap {
        display: block;

      }

    /* ========== MODAL STYLES ========== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .modal.open {
      display: flex;
    }
    .modal-content {
      background: white;
      width: 90%;
      max-width: 950px;
      max-height: 85vh;
      overflow-y: auto;
      border-radius: 20px;
      padding: 20px;
    }
  .modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 2px solid var(--modal-header-border);

}

}

    }

}

.modal-content {

    /* الأزرار العامة */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 30px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-primary { background: var(--navy); color: var(--gold); }
    .btn-secondary { background: var(--gray-200); color: var(--text); }
    .btn-success { background: var(--green); color: white; }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      color: white;
      z-index: 9999;
      transform: translateY(50px);
      opacity: 0;
      transition: 0.35s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast-success { background: var(--green); }
    .toast-error { background: var(--red); }
    
    /* Loader */
    .loader { text-align: center; padding: 50px; color: var(--text-lt); }
    .spinner {
      width: 32px;
      height: 32px;
      border: 4px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Badges */
    .badge-vehicle, .badge-boat, .badge-instructor {
      display: inline-block;
      background: var(--purple);
      color: white;
      padding: 2px 6px;
      border-radius: 12px;
      font-size: 9px;
      margin: 1px;
      cursor: pointer;
    }
    .badge-boat { background: var(--blue); }
    .badge-instructor { background: var(--green); }

function isDivingTrip(tripName) {

// ============================================================
// JSONP REQUEST
// ============================================================
function jsonpRequest(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    if (currentUser?.centerName) params.centerName = currentUser.centerName;
    if (currentUser?.centerId) params.centerId = currentUser.centerId;
    params.action = action;
    params.callback = cbName;
    const qs = Object.entries(params).map(([k, v]) => k + '=' + encodeURIComponent(String(v ?? ''))).join('&');
    const url = CONFIG.GAS_URL + '?' + qs;  // ✅ استخدام CONFIG.GAS_URL
    const script = document.createElement('script');
    const timeout = setTimeout(() => { cleanup(); reject(new Error('Request timeout')); }, 30000);
    const cleanup = () => { clearTimeout(timeout); delete window[cbName]; script.remove(); };
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('Network error')); };
   script.src = CONFIG.GAS_URL + '?' + qs;
    document.head.appendChild(script);
  });
}

function gas(action, params = {}) {
  return new Promise((resolve, reject) => {
    const timeoutId = setTimeout(() => reject(new Error('Request timeout')), 60000);  // ✅ 60 ثانية
    jsonpRequest(action, params).then(resolve).catch(reject).finally(() => clearTimeout(timeoutId));
  });
}

let activeToast = null;

}

function formatDateDDMMMYYYY(date) {
  if (!date) return '';
  
  // ✅ إذا كان التاريخ بالفعل بصيغة dd/MMM/yyyy، أعده كما هو
  if (typeof date === 'string' && date.match(/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/)) {
    return date;
  }
  
  // ✅ إذا كان التاريخ بصيغة MM/DD/YYYY، حوله إلى dd/MMM/yyyy
  if (typeof date === 'string' && date.match(/^\d{2}\/\d{2}\/\d{4}$/)) {
    const parts = date.split('/');
    const monthIndex = parseInt(parts[0]) - 1;
    const day = parseInt(parts[1]);
    const year = parseInt(parts[2]);
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    if (monthIndex >= 0 && monthIndex < 12 && day >= 1 && day <= 31) {
      return `${String(day).padStart(2, '0')}/${months[monthIndex]}/${year}`;
    }
  }
  
  // ✅ محاولة تحويل إلى Date
  let d;
  if (date instanceof Date) {
    d = date;
  } else {
    const parsed = parseDateFromString(date);
    if (parsed) {
      d = parsed;
    } else {
      d = new Date(date);
    }
  }
  
  if (!d || isNaN(d.getTime())) return String(date);
  
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return `${String(d.getDate()).padStart(2, '0')}/${months[d.getMonth()]}/${d.getFullYear()}`;
}
function formatDisplayDate(dateStr) {

// DATE HELPERS (مستوردة من MyBookings.html)
// ============================================================
const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

// ✅ تحويل ISO (YYYY-MM-DD) إلى dd/MMM/yyyy
function isoToTxt(iso) {
    if (!iso) return '';
    const parts = iso.split('-');
    if (parts.length !== 3) return '';
    const year = parts[0];
    const monthIndex = parseInt(parts[1]) - 1;
    const day = parseInt(parts[2]);
    if (monthIndex < 0 || monthIndex > 11 || day < 1 || day > 31) return '';
    return String(day).padStart(2, '0') + '/' + MONTHS[monthIndex] + '/' + year;
}

// ✅ تحويل dd/MMM/yyyy إلى ISO (YYYY-MM-DD)
function txtToISO(txt) {
    if (!txt) return '';
    const match = txt.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
    if (!match) return '';
    const day = match[1].padStart(2, '0');
    const monthName = match[2];
    const year = match[3];
    const monthIndex = MONTHS.findIndex(m => m.toLowerCase() === monthName.toLowerCase());
    if (monthIndex === -1) return '';
    const month = String(monthIndex + 1).padStart(2, '0');
    return year + '-' + month + '-' + day;
}

// ✅ التحقق من صحة تاريخ dd/MMM/yyyy
function isValidDateTxt(txt) {
    if (!txt) return false;
    return /^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(txt);
}

// ✅ فتح التقويم (من MyBookings.html)
function openCalendar(w) {
    const hiddenInput = document.getElementById('filter' + w + 'DateHidden');
    const textInput = document.getElementById('filter' + w + 'DateTxt');
    
    if (!hiddenInput || !textInput) {
        console.error('❌ Date inputs not found for:', w);
        return;
    }
    
    // ✅ على الهواتف، اعرض الحقل مباشرة في منتصف الشاشة
    if (window.innerWidth <= 768) {
        // إظهار الحقل المخفي في منتصف الشاشة
        hiddenInput.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;max-width:320px;height:auto;padding:25px 20px;background:white;border-radius:16px;box-shadow:0 10px 50px rgba(0,0,0,0.4);opacity:1;z-index:99999;font-size:20px;pointer-events:auto;display:block;border:2px solid var(--gold);';
        hiddenInput.focus();
        
        // ✅ عند الإغلاق (blur أو تغيير)، إخفاء الحقل
        const hide = () => {
            hiddenInput.style.cssText = 'display:none;';
            hiddenInput.removeEventListener('blur', hide);
        };
        hiddenInput.addEventListener('blur', hide);
        
        // ✅ عند اختيار تاريخ
        hiddenInput.addEventListener('change', function onChange() {
            const val = hiddenInput.value;
            if (val) {
                textInput.value = isoToTxt(val);
                const origHidden = document.getElementById('filter' + w + 'DateHidden');
                if (origHidden) origHidden.value = val;
                onDateTextChange();
            }
            hide();
            hiddenInput.removeEventListener('change', onChange);
        });
        
        return;
    }
    
    // ✅ على سطح المكتب، استخدم showPicker
    try {
        hiddenInput.style.cssText = 'position:fixed;top:-200px;left:-200px;opacity:0;width:1px;height:1px;pointer-events:auto;z-index:9999;display:block;';
        hiddenInput.showPicker();
    } catch(e) {
        hiddenInput.click();
    }
    
    hiddenInput.addEventListener('change', function onChange() {
        const val = hiddenInput.value;
        if (val) {
            textInput.value = isoToTxt(val);
            const origHidden = document.getElementById('filter' + w + 'DateHidden');
            if (origHidden) origHidden.value = val;
            onDateTextChange();
        }
        hiddenInput.style.cssText = 'display:none;';
        hiddenInput.removeEventListener('change', onChange);
    });
}

function onDateBlur(w) {
    setTimeout(() => {
        const txtInput = document.getElementById('filter' + w + 'DateTxt');
        const hiddenInput = document.getElementById('filter' + w + 'DateHidden');
        if (!txtInput || !hiddenInput) return;
        const val = txtInput.value.trim();
        if (!val) {
            hiddenInput.value = '';
            onDateTextChange();
            return;
        }
        if (!isValidDateTxt(val)) {
            txtInput.value = '';
            hiddenInput.value = '';
            onDateTextChange();
        }
    }, 200);
}

// ✅ أزرار +1 / -1 يوم
function spinDate(w, days) {
    const hiddenInput = document.getElementById('filter' + w + 'DateHidden');
    const txtInput = document.getElementById('filter' + w + 'DateTxt');
    if (!hiddenInput || !txtInput) return;
    
    let iso = hiddenInput.value;
    if (!iso) {
        const today = new Date();
        iso = today.toISOString().split('T')[0];
    }
    const dt = new Date(iso);
    dt.setDate(dt.getDate() + days);
    iso = dt.toISOString().split('T')[0];
    hiddenInput.value = iso;
    txtInput.value = isoToTxt(iso);
    onDateTextChange();
}
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function buildCumulativeSeats() {
  vehicleSeatsUsed = {};
  boatSeatsUsed = {};

  for (const inv of allInvoices) {
    const date = inv.activeDate || '';
    const trip = inv.trip || '';

    // سيارات
    let vData = [];
    try { vData = JSON.parse(inv.VehiclesUsed || '[]'); } catch(e) {}
    for (const v of vData) {
      if (!vehicleSeatsUsed[date]) vehicleSeatsUsed[date] = {};
      if (!vehicleSeatsUsed[date][v.vehicleId]) vehicleSeatsUsed[date][v.vehicleId] = {};
      if (!vehicleSeatsUsed[date][v.vehicleId][trip]) vehicleSeatsUsed[date][v.vehicleId][trip] = { go: 0, ret: 0 };
      vehicleSeatsUsed[date][v.vehicleId][trip].go += parseInt(v.goCount) || 0;
      vehicleSeatsUsed[date][v.vehicleId][trip].ret += parseInt(v.returnCount) || 0;
    }

    // مراكب
    let bData = [];
    try { bData = JSON.parse(inv.BoatsUsed || '[]'); } catch(e) {}
    for (const b of bData) {
      if (!boatSeatsUsed[date]) boatSeatsUsed[date] = {};
      if (!boatSeatsUsed[date][b.boatId]) boatSeatsUsed[date][b.boatId] = {};
      if (!boatSeatsUsed[date][b.boatId][trip]) boatSeatsUsed[date][b.boatId][trip] = { adults: 0, children: 0, infants: 0 };
      boatSeatsUsed[date][b.boatId][trip].adults += parseInt(b.adults) || 0;
      boatSeatsUsed[date][b.boatId][trip].children += parseInt(b.children) || 0;
      boatSeatsUsed[date][b.boatId][trip].infants += parseInt(b.infants) || 0;
    }
  }
}

function getVehicleUsedSeats(date, vehicleId, tripName, excludeVoucher) {
  let go = 0, ret = 0;
  for (const inv of allInvoices) {
    if (inv.voucherNo === excludeVoucher) continue;
    if ((inv.activeDate || '') !== date) continue;
    if ((inv.trip || '') !== tripName) continue;
    let vData = [];
    try { vData = JSON.parse(inv.VehiclesUsed || '[]'); } catch(e) {}
    for (const v of vData) {
      if (v.vehicleId === vehicleId) {
        go += parseInt(v.goCount) || 0;
        ret += parseInt(v.returnCount) || 0;
      }
    }
  }
  return { go, ret };
}

function getBoatUsedSeats(date, boatId, tripName, excludeVoucher) {
  let adults = 0, children = 0, infants = 0;
  for (const inv of allInvoices) {
    if (inv.voucherNo === excludeVoucher) continue;
    if ((inv.activeDate || '') !== date) continue;
    if ((inv.trip || '') !== tripName) continue;
    let bData = [];
    try { bData = JSON.parse(inv.BoatsUsed || '[]'); } catch(e) {}
    for (const b of bData) {
      if (b.boatId === boatId) {
        adults += parseInt(b.adults) || 0;
        children += parseInt(b.children) || 0;
        infants += parseInt(b.infants) || 0;
      }
    }
  }
  return { adults, children, infants, total: adults + children + infants };
}

function applyFilters() {
  // ✅ الحصول على التواريخ من الحقول النصية (dd/MMM/yyyy)
  const fromDateStr = document.getElementById('filterFromDateTxt')?.value || '';
  const toDateStr = document.getElementById('filterToDateTxt')?.value || '';
  
  // ✅ الحصول على التواريخ من الحقول المخفية (ISO)
  const fromHidden = document.getElementById('filterFromDateHidden')?.value || '';
  const toHidden = document.getElementById('filterToDateHidden')?.value || '';
  
  // ✅ تحويل التواريخ إلى كائنات Date للمقارنة
  let fromDateObj = null;
  let toDateObj = null;
  
  if (fromHidden) {
    const parts = fromHidden.split('-');
    if (parts.length === 3) {
      fromDateObj = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
      fromDateObj.setHours(0, 0, 0, 0);
    }
  }
  
  if (toHidden) {
    const parts = toHidden.split('-');
    if (parts.length === 3) {
      toDateObj = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
      toDateObj.setHours(23, 59, 59, 999);
    }
  }
  
  console.log('🔍 Filter dates:', { fromDateStr, toDateStr, fromDateObj, toDateObj });
  
  // ✅ باقي المتغيرات
  const search = document.getElementById('filterSearch').value.toLowerCase();
  const state = document.getElementById('filterState').value;
  const selectedTrips = getSelectedTrips();
  
  // ✅ الحصول على الفرع المختار
  const selectedBranchId = document.getElementById('branchSelect')?.value || '';
  let selectedBranchName = '';
  if (selectedBranchId && window.branchesList) {
    const branch = window.branchesList.find(b => b.id === selectedBranchId);
    if (branch) selectedBranchName = branch.name;
  }
  
  // ✅ منع إعادة التصفية إذا لم تتغير المعاملات
  const currentParams = JSON.stringify({ 
    fromDate: fromDateStr, 
    toDate: toDateStr, 
    search, 
    state, 
    selectedTrips, 
    selectedBranchId 
  });
  
  if (currentParams === lastFilterParams && filteredInvoices.length > 0) {
    console.log('⏭️ Skipping duplicate filter');
    return;
  }
  lastFilterParams = currentParams;
  
  // ✅ تصفية الفواتير
  filteredInvoices = [];
  
  for (const inv of allInvoices) {
    // ✅ الحصول على التاريخ النشط وتحويله إلى كائن Date
    const activeDateStr = inv.activeDate || '';
    let activeDateObj = null;
    
    if (activeDateStr) {
      activeDateObj = parseDateFromString(activeDateStr);
      if (activeDateObj) {
        activeDateObj.setHours(0, 0, 0, 0);
      }
    }
    
    // ✅ ✅ ✅ مقارنة التواريخ كـ timestamps (أرقام) بدلاً من النصوص
    if (fromDateObj && activeDateObj) {
      if (activeDateObj.getTime() < fromDateObj.getTime()) continue;
    }
    if (toDateObj && activeDateObj) {
      if (activeDateObj.getTime() > toDateObj.getTime()) continue;
    }
    
    // ✅ تصفية حسب الحالة
    if (state) {
      const invState = (inv.state || '').toLowerCase();
      if (invState !== state) continue;
    }
    
    // ✅ تصفية حسب الرحلات المختارة
    if (selectedTrips.length > 0) {
      const tripName = inv.trip || '';
      if (!selectedTrips.includes(tripName)) continue;
    }
    
    // ✅ تصفية حسب الفرع
    if (selectedBranchName && inv.branchName !== selectedBranchName) continue;
    
    // ✅ تصفية حسب النص (رقم الفاتورة أو اسم العميل)
    if (search) {
      const voucher = (inv.voucherNo || '').toLowerCase();
      const guest = (inv.guestName || '').toLowerCase();
      if (!voucher.includes(search) && !guest.includes(search)) continue;
    }
    
    filteredInvoices.push(inv);
  }
  
  console.log(`📊 Filtered: ${filteredInvoices.length} invoices out of ${allInvoices.length}`);
  console.log('📊 Date range:', { fromDateStr, toDateStr });
  
  // ✅ عرض عينة من الفواتير المُصفاة (للتأكد من النتائج)

    console.log('📊 Sample filtered invoices:', filteredInvoices.slice(0, 3).map(inv => ({
      voucher: inv.voucherNo,
      activeDate: inv.activeDate,
      trip: inv.trip
    })));
  } else {
    console.log('📊 No invoices matched the filters');
  }
  
  // ✅ ترتيب النتائج
  doSort();
  currentPage = 1;
  renderTable();
  renderPagination();
  updateSelectionButtonsState();
  
  // ✅ تحميل التعيينات إذا كان التاريخ مفرداً

  if (currentDate) {
    loadAndPopulateAssignments(currentDate);
  }
}
function doSort() {
  filteredInvoices.sort((a,b) => {
    let aVal = a[sortColumn], bVal = b[sortColumn];
    if (aVal === undefined) aVal = '';
    if (bVal === undefined) bVal = '';
    if (sortColumn === 'rest') { aVal = parseFloat(aVal) || 0; bVal = parseFloat(bVal) || 0; }
    else if (sortColumn === 'activeDate' || sortColumn === 'issueDate') {
      aVal = parseDateFromString(aVal)?.getTime() || 0;
      bVal = parseDateFromString(bVal)?.getTime() || 0;
    } else { aVal = String(aVal).toLowerCase(); bVal = String(bVal).toLowerCase(); }
    if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
    if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
    return 0;
  });
}

 function parseDateFromString(dateStr) {
  if (!dateStr) return null;
  if (dateStr instanceof Date && !isNaN(dateStr)) return dateStr;
  
  const s = dateStr.toString().trim();
  
  // ✅ صيغة dd/MMM/yyyy (المفضلة)
  const match1 = s.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (match1) {
    const months = { Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11 };
    return new Date(parseInt(match1[3]), months[match1[2]], parseInt(match1[1]));
  }
  
  // ✅ صيغة YYYY-MM-DD (من input type="date")
  const match2 = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (match2) {
    return new Date(parseInt(match2[1]), parseInt(match2[2]) - 1, parseInt(match2[3]));
  }
  
  // ✅ صيغة MM/DD/YYYY (التي تظهر في الصورة)
  const match3 = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (match3) {
    const month = parseInt(match3[1]) - 1;
    const day = parseInt(match3[2]);
    const year = parseInt(match3[3]);
    if (month >= 0 && month < 12 && day >= 1 && day <= 31) {
      return new Date(year, month, day);
    }
  }
  
  // ✅ صيغة dd/MM/yyyy
  const match4 = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (match4) {
    return new Date(parseInt(match4[3]), parseInt(match4[2]) - 1, parseInt(match4[1]));
  }
  
  // محاولة أخيرة
  const d = new Date(s);
  return !isNaN(d) ? d : null;
}

function formatValue(val) {
  if (val === undefined || val === null) return '';
  const num = parseFloat(val);
  if (isNaN(num)) return val;
  if (num === 0) return '';
  return num;
}

function formatNonZero(val) {
  if (val === undefined || val === null) return '';
  const num = parseFloat(val);
  if (isNaN(num)) return '';
  if (num === 0) return '';
  return num;
}

async function loadAndPopulateAssignments(dateISO) {
    if (isLoadingAssignments) {
        console.log('⚠️ Already loading assignments, skipping...');
        return;
    }
    
    // ✅ إذا كان dateISO بصيغة YYYY-MM-DD، حوله إلى dd/MMM/yyyy
    let formattedDate = dateISO;
    if (dateISO && dateISO.match(/^\d{4}-\d{2}-\d{2}$/)) {
        const parts = dateISO.split('-');
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        formattedDate = `${parseInt(parts[2])}/${months[parseInt(parts[1]) - 1]}/${parts[0]}`;
    }
    
    if (lastLoadedDate === formattedDate && currentAssignments) {
        console.log('📦 Using cached assignments for date:', formattedDate);
        updateSelectionBadges();
        return;
    }
    
    isLoadingAssignments = true;
    
    try {
        const assignments = await gas('getDailyAssignments', { 
            date: formattedDate,
            centerName: currentUser?.centerName 
        });
        
        if (assignments?.success && assignments.data) {
            currentAssignments = assignments.data;
            selectedBeachInstructors = assignments.data.beachInstructors || [];
            selectedBoats = assignments.data.boats || [];
            boatInstructorsMap = assignments.data.boatInstructorsMap || {};
            selectedVehicles = assignments.data.vehicles || [];
            
            // ✅ إضافة قراءة boatTripMap
            if (assignments.data.boatTripMap) {
                currentAssignments.boatTripMap = assignments.data.boatTripMap;
            }
            
            console.log('✅ Loaded from server:', {
                beach: selectedBeachInstructors.length,
                boats: selectedBoats.length,
                vehicles: selectedVehicles.length,
                boatTripMap: currentAssignments.boatTripMap || {}
            });
        } else {
            // ✅ هذا هو المكان الصحيح لـ else
            currentAssignments = null;
            selectedBeachInstructors = [];
            selectedBoats = [];
            boatInstructorsMap = {};
            selectedVehicles = [];
        }
        
        lastLoadedDate = dateISO;
        updateSelectionBadges();
        
    } catch(e) {
        console.error('❌ loadAndPopulateAssignments error:', e);
        selectedBeachInstructors = [];
        selectedBoats = [];
        boatInstructorsMap = {};
        selectedVehicles = [];
        updateSelectionBadges();
    } finally {
        isLoadingAssignments = false;
    }
}

async function openAssignVehicles(voucherNo) {
    const invoice = filteredInvoices.find(i => i.voucherNo === voucherNo);
    if (!invoice) return;

    if (selectedVehicles.length === 0) {
        showToast('⚠️ اختر السيارات أولاً من زر 🚗 Vehicles', 'error');
        return;
    }

    currentAssignVoucher = voucherNo;
    const currentDate = getCurrentDateISO();
    const tripName = invoice.trip || '';

    const adults = parseInt(invoice.sgl) || 0;
    const children = parseInt(invoice.dbl) || 0;
    const infants = parseInt(invoice.trpl) || 0;
    const totalPass = adults + children;

    // ✅ تصفية السيارات حسب الرحلة فقط
    const vehicleTripMap = currentAssignments?.vehicleTripMap || {};
    
    // ✅ السيارات المرتبطة بالرحلة الحالية
    let relevantVehicleIds = selectedVehicles.filter(vId => {
        const assignedTrip = vehicleTripMap[vId];
        return !assignedTrip || assignedTrip === tripName;
    });

    // ✅ إذا لم يتم العثور على سيارات مرتبطة، استخدم جميع السيارات المختارة مع تحذير
    if (relevantVehicleIds.length === 0) {
        console.log(`⚠️ No vehicles assigned to trip: ${tripName}, showing all selected vehicles`);
        relevantVehicleIds = selectedVehicles;
        showToast(`⚠️ لا توجد سيارات مرتبطة برحلة: ${tripName}`, 'warning');
    }

    // ✅ إزالة التكرارات
    relevantVehicleIds = [...new Set(relevantVehicleIds)];

    // ✅ جلب السيارات المحفوظة في الفاتورة
    let savedVehicles = [];
    try { savedVehicles = JSON.parse(invoice.VehiclesUsed || '[]'); } catch(e) {}

    // ✅ إضافة السيارات المحفوظة في الفاتورة (إذا لم تكن موجودة)

        if (sv.vehicleId && !relevantVehicleIds.includes(sv.vehicleId)) {

// ✅ دالة مساعدة لربط الأحداث في Assign Vehicles
function attachVehicleAssignmentEvents() {
  // ✅ دالة لحساب المقاعد المتاحة ديناميكياً
  function updateAvailableSeats(vehicleId) {
    const goInput = document.querySelector(`.assign-go[data-id="${vehicleId}"]`);
    const returnInput = document.querySelector(`.assign-return[data-id="${vehicleId}"]`);
    const goValue = parseInt(goInput?.value) || 0;
    const returnValue = parseInt(returnInput?.value) || 0;
    
    // الحصول على السعة القصوى للسيارة
    const row = goInput?.closest('tr');
    const capacityCell = row?.querySelector('td:nth-child(2)');
    const capacity = parseInt(capacityCell?.textContent) || 0;
    
    // الحصول على القيم الأصلية (المحجوزة من فواتير أخرى)
    const originalMaxGo = parseInt(goInput?.getAttribute('data-original-max')) || capacity;
    const originalMaxReturn = parseInt(returnInput?.getAttribute('data-original-max')) || capacity;
    
    // حساب المقاعد المتاحة الجديدة
    const availableGo = Math.max(0, originalMaxGo - goValue);
    const availableReturn = Math.max(0, originalMaxReturn - returnValue);
    
    // تحديث النص المعروض للمقاعد المتاحة
    const goAvailableDiv = goInput?.closest('td')?.querySelector('.available-text');
    const returnAvailableDiv = returnInput?.closest('td')?.querySelector('.available-text');
    
    if (goAvailableDiv) {
      goAvailableDiv.innerHTML = `(🟢 ${availableGo} available)`;
      goAvailableDiv.style.color = availableGo > 0 ? 'green' : 'red';
    }
    if (returnAvailableDiv) {
      returnAvailableDiv.innerHTML = `(🟢 ${availableReturn} available)`;
      returnAvailableDiv.style.color = availableReturn > 0 ? 'green' : 'red';
    }
    
    // ✅ تحديث الحد الأقصى لحقول Go و Return ديناميكياً
    if (goInput) {
      goInput.max = originalMaxGo;
    }
    if (returnInput) {
      returnInput.max = originalMaxReturn;
    }
    
    // ✅ التحقق من عدم تجاوز القيم الحد الأقصى
    if (goValue > originalMaxGo) {
      goInput.value = originalMaxGo;
      showToast(`⚠️ Maximum Go trips for this vehicle is ${originalMaxGo}`, 'warning');
    }
    if (returnValue > originalMaxReturn) {
      returnInput.value = originalMaxReturn;
      showToast(`⚠️ Maximum Return trips for this vehicle is ${originalMaxReturn}`, 'warning');
    }
  }
  
  // ✅ مستمع لتغيير حقل Go
  document.querySelectorAll('#assignVehiclesModal .assign-go').forEach(input => {
    const newInput = input.cloneNode(true);
    input.parentNode.replaceChild(newInput, input);
    
    newInput.addEventListener('input', (e) => {
      updateAvailableSeats(e.target.dataset.id);
    });
  });
  
  // ✅ مستمع لتغيير حقل Return
  document.querySelectorAll('#assignVehiclesModal .assign-return').forEach(input => {
    const newInput = input.cloneNode(true);
    input.parentNode.replaceChild(newInput, input);
    
    newInput.addEventListener('input', (e) => {
      updateAvailableSeats(e.target.dataset.id);
    });
  });
  
  // ✅ مستمع لتغيير Checkbox (تحديد/إلغاء تحديد السيارة)
  document.querySelectorAll('#assignVehiclesModal .assign-select').forEach(cb => {
    const newCb = cb.cloneNode(true);
    cb.parentNode.replaceChild(newCb, cb);
    
    newCb.addEventListener('change', (e) => {
      const vehicleId = e.target.dataset.id;
      const goInput = document.querySelector(`.assign-go[data-id="${vehicleId}"]`);
      const returnInput = document.querySelector(`.assign-return[data-id="${vehicleId}"]`);
      const adultInput = document.querySelector(`.assign-adult[data-id="${vehicleId}"]`);
      const childInput = document.querySelector(`.assign-child[data-id="${vehicleId}"]`);
      const infantInput = document.querySelector(`.assign-infant[data-id="${vehicleId}"]`);
      
      const disabled = !e.target.checked;
      if (goInput) goInput.disabled = disabled;
      if (returnInput) returnInput.disabled = disabled;
      if (adultInput) adultInput.disabled = disabled;
      if (childInput) childInput.disabled = disabled;
      if (infantInput) infantInput.disabled = disabled;
    });
  });
}

// ✅ دالة تصنيف النشاط إلى نوع المدرب المناسب
function classifyActivity(activityName) {
  const lower = activityName.toLowerCase();
  
  // 1 Intro (مفرد)
  if (lower === '1 intro' || lower === 'intro' || lower === 'sgl intro' || lower === '*1 intro' || lower === 'intro diver') {
    return { type: 'single_intro', column: 'extra', multiplier: 1, display: '1 Intro' };
  }
  
  // 2 Intro (مزدوج)
  if (lower === '2 intro' || lower === 'dbl intro' || lower === '*2 intro') {
    return { type: 'double_intro', column: 'extra', multiplier: 2, display: '2 Intro' };
  }
  
  // Diver
  if (lower === 'diver' || lower === 'fun diver' || lower === '1 diver' || lower === 'diving') {
    return { type: 'diver', column: 'sgl', multiplier: 1, display: 'Diver' };
  }
  
  // Course
  if (lower === 'course' || lower === 'owd course' || lower === 'aowd course' || lower === 'course diver') {
    return { type: 'course', column: 'dbl', multiplier: 1, display: 'Course' };
  }
  
  // Check Dive (C.D.)
  if (lower === 'check dive' || lower === 'cd' || lower === 'c.d.' || lower === 'c. d.' || lower === 'c d') {
    return { type: 'check_dive', column: 'sgl', multiplier: 1, display: 'C.D.' };
  }
  
  // Scuba Review (S.R.)
  if (lower === 'scuba review' || lower === 'sr' || lower === 's.r.' || lower === 's r') {
    return { type: 'scuba_review', column: 'dbl', multiplier: 1, display: 'S.R.' };
  }
  
  return null;
}

  document.querySelectorAll('#assignInstructorsModal .assign-select:checked').forEach(cb => {
    const instructorId = cb.getAttribute('data-id');
    const instructorActivities = [];  // ✅ غير الاسم من 'activities' إلى 'instructorActivities'

    for (let i = 0; i < activityItems.length; i++) {
      const qty = parseInt(document.querySelector(`.assign-activity[data-instructor="${instructorId}"][data-activity-index="${i}"]`).value) || 0;
      if (qty > 0) {
        const mapping = activityMapping[i];
        instructorActivities.push({
          activityName: activityItems[i],
          displayName: mapping?.display || activityItems[i],
          quantity: qty,
          multiplier: mapping?.multiplier || 1,
          column: mapping?.column || 'extra'
        });
      }
    }
    
    if (instructorActivities.length > 0) {
      const instructor = cachedInstructors.find(i => i.id === instructorId);
      selectedRows.push({
        instructorId: instructorId,
        instructorName: instructor?.name || instructorId,
        activities: instructorActivities
      });
    }
  });
  
  if (selectedRows.length === 0) {
    showToast('⚠️ Please select at least one instructor', 'error');
    return;
  }
  
  if (saveBtn) {
    saveBtn.disabled = true;
    saveBtn.textContent = '⏳ Saving...';
  }
  
  try {
    const result = await gas('assignInstructorsToInvoice', {
      voucherNo: currentAssignVoucher,
      instructorsData: JSON.stringify(selectedRows),
      centerName: currentUser?.centerName
    });
    
    if (result && result.success) {
      updateLocalInvoice(currentAssignVoucher, 'InstructorsExecution', JSON.stringify(selectedRows));
      renderTable();
      showToast(`✅ Saved ${selectedRows.length} instructors`, 'success');
      closeModal('assignInstructorsModal');
    } else {
      showToast('❌ Failed to save: ' + (result.message || 'Unknown error'), 'error');
    }
  } catch(e) {
    showToast('❌ Error: ' + e.message, 'error');
  } finally {
    if (saveBtn) {
      saveBtn.disabled = false;
      saveBtn.textContent = '✅ Assign';
    }
  }
}

  function renderSummary() {
  const trips = {};
  
  if (!filteredInvoices || filteredInvoices.length === 0) {
    const summarySec = document.getElementById('summarySec');
    if (summarySec) summarySec.style.display = 'none';
    return;
  }
  
  filteredInvoices.forEach(inv => {
    const sgl = parseInt(inv.Sgl) || parseInt(inv.sgl) || 0;
    const dbl = parseInt(inv.Dbl) || parseInt(inv.dbl) || 0;
    const trpl = parseInt(inv.Trpl) || parseInt(inv.trpl) || 0;
    const extra = parseInt(inv.Extra) || parseInt(inv.extra) || 0;
    
    if (sgl === 0 && dbl === 0 && trpl === 0 && extra === 0) return;
    
    const tripName = (inv.Trip || inv.trip || 'Unknown').trim();
    if (!trips[tripName]) {
      trips[tripName] = { bookings: 0, activities: {} };
    }
    trips[tripName].bookings++;
    
    const activitiesText = (inv.ActivitiesText || inv.activitiesText || '').toString().trim();
    if (activitiesText) {
      activitiesText.split('|').forEach(part => {
        const match = part.trim().match(/^(.+?)×(\d+(\.\d+)?)$/);
        if (match) {
          const activityName = match[1].trim();
          const quantity = parseFloat(match[2]) || 0;
          trips[tripName].activities[activityName] = (trips[tripName].activities[activityName] || 0) + quantity;
        }
      });
    } else {
      if (sgl > 0) trips[tripName].activities['Adult'] = (trips[tripName].activities['Adult'] || 0) + sgl;
      if (dbl > 0) trips[tripName].activities['Child'] = (trips[tripName].activities['Child'] || 0) + dbl;
      if (trpl > 0) trips[tripName].activities['Infant'] = (trips[tripName].activities['Infant'] || 0) + trpl;
      if (extra > 0) trips[tripName].activities['Intro'] = (trips[tripName].activities['Intro'] || 0) + extra;
    }
  });
  
  if (Object.keys(trips).length === 0) {
    const summarySec = document.getElementById('summarySec');
    if (summarySec) summarySec.style.display = 'none';
    return;
  }
  
  let rows = '';
  Object.entries(trips).sort((a, b) => b[1].bookings - a[1].bookings).forEach(([tripName, info]) => {
    const sortedActivities = Object.entries(info.activities).sort((a, b) => b[1] - a[1]);
    const activitiesStr = sortedActivities
      .map(([act, qty]) => `${act}×${Number.isInteger(qty) ? qty : qty.toFixed(1)}`)
      .join(' | ');
    
    rows += `<tr>
      <td><strong>${escapeHtml(tripName)}</strong></td>
      <td style="text-align:center"><span style="background:var(--navy);color:var(--gold);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700">${info.bookings}</span></td>
      <td class="acts-cell" style="white-space:normal; word-break:break-word;">${escapeHtml(activitiesStr || '—')}</span></td>
    </tr>`;
  });
  
   
  let summaryHtml = `
    <div class="summary-sec" id="summarySec" style="margin-top:16px; padding:14px 20px; background:white; border-top:2px solid var(--border); overflow-x:auto;">
      <div class="summary-title" style="font-size:13px; font-weight:700; color:var(--navy); margin-bottom:8px; text-align:center;">🗺️ Trips Summary</div>
      <div style="overflow-x:auto;">
        <table class="summary-table" style="width:100%; border-collapse:collapse; font-size:12px; margin:0 auto;">
          <thead>
            <tr style="background:var(--navy2); color:var(--gold);">
              <th style="padding:10px 8px; text-align:center; width:28%;">Trip</th>
              <th style="padding:10px 8px; text-align:center; width:15%;">Bookings</th>
              <th style="padding:10px 8px; text-align:center; width:57%;">Activities</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
  
  // ✅ التعديل: إضافة الملخص قبل الـ Pagination وليس بعد الجدول مباشرة
  let existingSummary = document.getElementById('summarySec');
  if (existingSummary) {
    existingSummary.outerHTML = summaryHtml;
  } else {
    // ✅ إضافة الملخص بعد الـ Pagination (مكان مناسب)
    const pagination = document.getElementById('pagination');
    if (pagination) {
      pagination.insertAdjacentHTML('beforebegin', summaryHtml);
    }
  }
}

        );

            v.isActive === true && v.usageType === 'passengers' && v.capacity > 0
        );

            showToast('⚠️ No passenger vehicles available', 'error');

                date: currentDate,

                savedRecords = result.data;

            console.warn('Failed to load vehicle records:', e);

        `;

// متغير عام لتخزين صفوف السيارات
let vehicleTripRows = [];

function addVehicleTripRow() {
  const newIndex = vehicleTripRows.length;
  vehicleTripRows.push({ vehicleId: '', tripName: '', goCount: 0, returnCount: 0 });
  
  const passengerVehicles = cachedVehicles.filter(v => 
    v.isActive === true && v.usageType === 'passengers' && v.capacity > 0
  );
  const currentDate = getCurrentDateISO();
  const tripsOnDate = [...new Set(filteredInvoices.map(inv => inv.trip).filter(t => t))];
  
  const container = document.getElementById('vehicleRowsContainer');
  const newRowHTML = generateVehicleTripRow(newIndex, '', '', 0, 0, passengerVehicles, tripsOnDate);
  container.insertAdjacentHTML('beforeend', newRowHTML);
  attachVehicleTripEvents(newIndex);
}

function removeVehicleTripRow(index) {
  vehicleTripRows.splice(index, 1);
  rebuildVehicleTripRows();
}

function rebuildVehicleTripRows() {
  const passengerVehicles = cachedVehicles.filter(v => 
    v.isActive === true && v.usageType === 'passengers' && v.capacity > 0
  );
  const tripsOnDate = [...new Set(filteredInvoices.map(inv => inv.trip).filter(t => t))];
  
  let html = '';
  for (let i = 0; i < vehicleTripRows.length; i++) {
    const row = vehicleTripRows[i];
    html += generateVehicleTripRow(i, row.vehicleId, row.tripName, row.goCount, row.returnCount, passengerVehicles, tripsOnDate);
  }
  
  if (vehicleTripRows.length === 0) {
    html += generateVehicleTripRow(0, '', '', 0, 0, passengerVehicles, tripsOnDate);
  }
  
  document.getElementById('vehicleRowsContainer').innerHTML = html;
  
  for (let i = 0; i < vehicleTripRows.length; i++) {
    attachVehicleTripEvents(i);
  }
  if (vehicleTripRows.length === 0) attachVehicleTripEvents(0);
}

function attachVehicleTripEvents(index) {
  const vehicleSelect = document.querySelector(`.vehicle-select[data-row="${index}"]`);
  const tripSelect = document.querySelector(`.trip-select[data-row="${index}"]`);
  const goInput = document.querySelector(`.go-count[data-row="${index}"]`);
  const returnInput = document.querySelector(`.return-count[data-row="${index}"]`);
  
  if (vehicleSelect) {
    vehicleSelect.onchange = () => {
      if (!vehicleTripRows[index]) vehicleTripRows[index] = {};
      vehicleTripRows[index].vehicleId = vehicleSelect.value;
    };
  }
  if (tripSelect) {
    tripSelect.onchange = () => {
      if (!vehicleTripRows[index]) vehicleTripRows[index] = {};
      vehicleTripRows[index].tripName = tripSelect.value;
    };
  }
  if (goInput) {
    goInput.oninput = () => {
      if (!vehicleTripRows[index]) vehicleTripRows[index] = {};
      vehicleTripRows[index].goCount = parseInt(goInput.value) || 0;
    };
  }
  if (returnInput) {
    returnInput.oninput = () => {
      if (!vehicleTripRows[index]) vehicleTripRows[index] = {};
      vehicleTripRows[index].returnCount = parseInt(returnInput.value) || 0;
    };
  }
}

async function saveAllVehicleTripRows() {
    const saveBtn = document.querySelector('#vehiclesModal .btn-primary');
    if (saveBtn?.disabled) return;
    const currentDate = getCurrentDateISO();
    if (!currentDate) { showToast('اختر تاريخاً أولاً', 'error'); return; }

    const rows = document.querySelectorAll('.vehicle-trip-row');
    const records = [];
    const selectedVehicleIds = [];
    const vehicleTripMapNew = {};

    rows.forEach(row => {
        const vehicleId = row.querySelector('.vehicle-select')?.value || '';
        const tripName = row.querySelector('.trip-select')?.value || '';
        const goCount = parseInt(row.querySelector('.go-count')?.value) || 0;
        const returnCount = parseInt(row.querySelector('.return-count')?.value) || 0;
        if (vehicleId && tripName && (goCount > 0 || returnCount > 0)) {
            records.push({ vehicleId, tripName, goCount, returnCount });
            if (!selectedVehicleIds.includes(vehicleId)) selectedVehicleIds.push(vehicleId);
            vehicleTripMapNew[vehicleId] = tripName;  // ✅ حفظ الرحلة لكل سيارة
        }
    });

    if (records.length === 0) { showToast('⚠️ اختر سيارة ورحلة وأدخل أرقاماً', 'error'); return; }
    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '⏳ جاري الحفظ...'; }

    try {
        const result = await gas('saveVehicleTripRecords', { 
            date: currentDate, 
            records: JSON.stringify(records), 
            centerName: currentUser?.centerName 
        });
        
        if (result?.success) {
            selectedVehicles = selectedVehicleIds;
            if (!currentAssignments) currentAssignments = {};
            currentAssignments.vehicleTripMap = vehicleTripMapNew;  // ✅ حفظ الخريطة
            currentAssignments.vehicles = selectedVehicles;
            
            // ✅ حفظ في DailyAssignments
            await gas('saveDailyAssignments', {
                date: currentDate,
                data: JSON.stringify(currentAssignments),
                centerName: currentUser?.centerName
            });
            
            updateSelectionBadges();
            await loadAndPopulateAssignments(currentDate);
            showToast(`✅ تم حفظ ${records.length} سيارة`, 'success');
            closeModal('vehiclesModal');
        } else showToast('❌ فشل الحفظ: ' + (result?.message || ''), 'error');
    } catch(e) { showToast('خطأ: ' + e.message, 'error'); }
    finally { if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '✅ حفظ الكل'; } }
}

async function createUpsell() {

  for (const row of rows) {

    const qtyInput = row.querySelector('.upsell-quantity');
    
    const price = parseFloat(priceInput?.value) || 0;

    if (qty > 0 && price > 0) {
      items.push({
        name: activityName,
        quantity: qty,
        price: price
      });
    }
  }
  
  if (items.length === 0) {
    showToast('Please select at least one activity', 'error');
    return;
  }
  
  const instructorId = document.getElementById('sellingInstructor')?.value;

    visaGBP: parseFloat(document.getElementById('visaGBP')?.value) || 0,
    visaLE: parseFloat(document.getElementById('visaLE')?.value) || 0
  };
  
  if (saveBtn) {
    saveBtn.disabled = true;
    saveBtn.textContent = '⏳ Creating...';
  }
  
  showToast('جاري إنشاء فاتورة UpSell...', 'info');
  
  try {
    const result = await gas('createUpSellInvoice', {
      originalVoucherNo: currentUpsellVoucher,
      upSellItems: JSON.stringify(items),
      upSellAmounts: JSON.stringify(payments),
      instructorId: instructorId,
      centerName: currentUser?.centerName,
      currency: currentUpsellCurrency

    if (result?.success) {

      const userConfirmed = await showConfirmDialog(

    } else {

    }

    showToast('Error: ' + e.message, 'error');
  } finally {
    if (saveBtn) {

// ✅ دالة تحديث المبلغ المتبقي مع أسعار الصرف (مثل SalesInvoice.html)
function formatPrice(value) {
  if (value === null || value === undefined) return '0';
  let num = parseFloat(value);
  if (isNaN(num)) num = 0;
  return num.toString();
}

function getCurrencySymbol(currency) {
  const symbols = { 'USD': '$', 'EUR': '€', 'GBP': '£', 'LE': 'LE' };
  return symbols[currency] || currency;
}

let cachedExchangeRates = null;

async function getExchangeRates() {
  if (cachedExchangeRates) return cachedExchangeRates;
  
  try {
    const result = await gas('getLatestExchangeRates');
    if (result && result.success) {
      cachedExchangeRates = {
        USD: 1,
        EUR: result.rates?.EUR || result.eur_rate || 1,
        GBP: result.rates?.GBP || result.gbp_rate || 1,
        LE: result.rates?.LE || result.le_rate || 1
      };
    } else {
      // قيم افتراضية في حالة فشل الجلب
      cachedExchangeRates = { USD: 1, EUR: 1.05, GBP: 1.25, LE: 0.05 };
    }
  } catch(e) {
    console.warn('Failed to fetch exchange rates:', e);
    cachedExchangeRates = { USD: 1, EUR: 1.05, GBP: 1.25, LE: 0.05 };
  }
  
  return cachedExchangeRates;
}

async function getRate(currency) {
  const rates = await getExchangeRates();
  return rates[currency] || 1;
}

function updateUpsellRowTotal(element) {
  const row = element.closest('tr');
  const priceInput = row.querySelector('.upsell-price');
  const qtyInput = row.querySelector('.upsell-quantity');
  const totalCell = row.querySelector('.upsell-row-total');
  
  // ✅ احفظ القيمة الحالية قبل المعالجة
  let price = parseFloat(priceInput.value);
  let qty = parseFloat(qtyInput.value);
  
  if (isNaN(price)) {
    price = 0;
  }
  if (isNaN(qty)) {
    qty = 0;
  }
  
  const total = price * qty;
  
  // ✅ تحديث Total فقط (لا تلمس حقول Price و Quantity)
  totalCell.textContent = total === 0 ? '' : total.toFixed(2);
  
  updateRemainingWithRates();
}
  
async function updateUpsellCurrencyWithRates() {
  const newCurrency = document.getElementById('upsellCurrency')?.value;
  if (!newCurrency) return;
  currentUpsellCurrency = newCurrency;
  
  const rates = await getExchangeRates();
  const rate = rates[newCurrency] || 1;
  const symbol = getCurrencySymbol(newCurrency);
  
  // تحديث رؤوس الأعمدة
  const priceHeader = document.querySelector('#upsellModal table thead tr th:nth-child(2)');
  const totalHeader = document.querySelector('#upsellModal table thead tr th:nth-child(4)');
  if (priceHeader) priceHeader.innerHTML = `Price (${symbol})`;
  if (totalHeader) totalHeader.innerHTML = `Total (${symbol})`;
  
  // تحديث الأسعار
  const rows = document.querySelectorAll('#upsellModal tbody tr');
  for (const row of rows) {
    const priceInput = row.querySelector('.upsell-price');
    const totalCell = row.querySelector('.upsell-row-total');
    const qtyCell = row.cells[2];
    
    const originalPriceUSD = parseFloat(priceInput?.getAttribute('data-usd')) || 0;
    const qty = parseFloat(qtyCell?.textContent) || 0;
    
    const newPrice = originalPriceUSD * rate;
    if (priceInput) {
      priceInput.value = newPrice > 0 ? newPrice.toFixed(2) : '';
      if (!priceInput.hasAttribute('data-usd')) {
        priceInput.setAttribute('data-usd', originalPriceUSD);
      }
    }
    if (totalCell) {
     const rowTotal = newPrice * qty;
totalCell.textContent = rowTotal > 0 ? rowTotal.toFixed(2) : '';
    }
  }
  
  await updateRemainingWithRates();
}
async function updateRemainingWithRates() {
  // 1️⃣ حساب إجمالي الأنشطة بالعملة المختارة
  let totalInSaleCurrency = 0;
  const rows = document.querySelectorAll('#upsellModal tbody tr');
 
 for (const row of rows) {
  const priceInput = row.querySelector('.upsell-price');
  const qtyInput = row.querySelector('.upsell-quantity');
  
  // ✅ إذا كان الحقل فارغاً، اعتبر القيمة 0
  const price = priceInput?.value === '' ? 0 : parseFloat(priceInput?.value) || 0;
  const qty = qtyInput?.value === '' ? 0 : parseFloat(qtyInput?.value) || 0;
  totalInSaleCurrency += price * qty;
}
        
    
  // 2️⃣ جلب أسعار الصرف من الخادم (بدون قيم افتراضية)
  let rates = null;
  try {
   const result = await gas('getLatestExchangeRates', { centerName: currentUser?.centerName });
    console.log('💰 Exchange rates from server:', result);
    
    if (result && result.bUSD) {
      rates = {
        USD: result.bUSD,
        EUR: result.bEUR,
        GBP: result.bGBP,
        LE: result.bLE || 1
      };
    }
  } catch(e) {
    console.error('Failed to fetch exchange rates:', e);
  }
  
  // ❌ إذا لم تنجح في جلب الأسعار، لا تحسب المتبقي
  if (!rates) {
    console.warn('⚠️ No exchange rates available, skipping calculation');
    document.getElementById('remainingAmount').textContent = '?';
    return;
  }
  
  console.log('✅ Using rates from server:', rates);
  
  const saleCurrency = currentUpsellCurrency || 'USD';
  const saleRateToLE = rates[saleCurrency];
  
  // ❌ إذا كانت العملة غير موجودة في الأسعار
  if (!saleRateToLE) {
    console.warn(`⚠️ Exchange rate for ${saleCurrency} not found`);
    document.getElementById('remainingAmount').textContent = '?';
    return;
  }
  
  // 3️⃣ تحويل الإجمالي إلى جنيه
  const totalInLE = totalInSaleCurrency * saleRateToLE;
  
  // 4️⃣ جمع المدفوعات وتحويلها إلى جنيه
  let paidInLE = 0;
  
  const getValue = (id) => {
  const el = document.getElementById(id);
  if (!el) return 0;
  let val = parseFloat(el.value);
  return isNaN(val) ? 0 : val;
};
  
  paidInLE += getValue('cashUSD') * rates.USD;
  paidInLE += getValue('cashEUR') * rates.EUR;
  paidInLE += getValue('cashGBP') * rates.GBP;
  paidInLE += getValue('cashLE') * rates.LE;
  paidInLE += getValue('visaUSD') * rates.USD;
  paidInLE += getValue('visaEUR') * rates.EUR;
  paidInLE += getValue('visaGBP') * rates.GBP;
  paidInLE += getValue('visaLE') * rates.LE;
  
  // 5️⃣ حساب المتبقي
  const remainingInLE = totalInLE - paidInLE;
  const remainingInSaleCurrency = remainingInLE / saleRateToLE;
  
  // 6️⃣ تحديث الواجهة
  document.getElementById('totalAmount').textContent = totalInSaleCurrency.toFixed(2);
  document.getElementById('remainingAmount').textContent = remainingInSaleCurrency > 0 ? remainingInSaleCurrency.toFixed(2) : '0.00';
  document.getElementById('totalCurrency').textContent = getCurrencySymbol(saleCurrency);
  document.getElementById('remainingCurrency').textContent = getCurrencySymbol(saleCurrency);
  
  const createBtn = document.getElementById('createUpsellBtn');
 if (createBtn) createBtn.disabled = false;  // الزر دائماً مفعل
}
  function calculateTotalInBaseCurrency() {
  let total = 0;
  const rows = document.querySelectorAll('#upsellModal tbody tr');
  rows.forEach(row => {
    const priceCell = row.cells[1];
    const qtyCell = row.cells[2];
    if (priceCell && qtyCell) {
      const price = parseFloat(priceCell.textContent) || 0;
      const qty = parseFloat(qtyCell.textContent) || 0;
      total += price * qty;
    }
  });
  return total;
}

      // طريقة بديلة: تحميل CSV مباشرة
      const blob = new Blob([result.csvData], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.href = url;
      link.setAttribute('download', `invoices_${new Date().toISOString().split('T')[0]}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      showToast('✅ تم التصدير بنجاح', 'success');
    } else {
      showToast('❌ فشل التصدير', 'error');
    }
  } catch(e) {
    showToast('خطأ: ' + e.message, 'error');
  }

async function saveBeachInstructorsV2() {
    // ✅ منع الضغط المتكرر والاستدعاءات المتزامنة
    if (isSavingBeach) {
        console.log('⚠️ Save already in progress, ignoring...');
        return;
    }
    
    const saveBtn = document.querySelector('#beachInstructorsModal .btn-primary');
    if (saveBtn && saveBtn.disabled) {
        console.log('⚠️ Save button disabled, ignoring...');
        return;
    }
    
    const selected = [];
    document.querySelectorAll('#beachInstructorsList .instructor-checkbox:checked').forEach(cb => {
        selected.push(cb.value);
    });
    
    const currentDate = getCurrentDateISO();
    if (!currentDate) {
        showToast('Please select a date first', 'error');
        return;
    }
    
    // ✅ التحقق من عدم وجود المدرب في المراكب (يجب أن يكون هنا قبل الحفظ)
    const allBoatInstructors = [];
    for (const instructors of Object.values(boatInstructorsMap)) {
        if (Array.isArray(instructors)) {
            allBoatInstructors.push(...instructors);
        } else if (instructors) {
            allBoatInstructors.push(instructors);
        }
    }
    
    const duplicateInBoats = selected.filter(id => allBoatInstructors.includes(id));
    if (duplicateInBoats.length > 0) {
        const duplicateNames = duplicateInBoats.map(id => {
            const inst = cachedInstructors.find(i => i.id === id);
            return inst?.name || id;
        }).join(', ');
        showToast(`⚠️ Cannot assign same instructor to beach and boat: ${duplicateNames}`, 'error');
        return;
    }
    
    isSavingBeach = true;
    
    if (saveBtn) {
        saveBtn.disabled = true;
        saveBtn.textContent = '⏳ Saving...';
    }
    
    showToast('Saving beach instructors...', 'info');
    
    const assignments = currentAssignments || {};
    assignments.beachInstructors = selected;
    
    try {
        // ✅ تنفيذ العمليات بالتوازي
        const deletePromise = gas('deleteInstructorDailyLogsByType', {
            date: currentDate,
            assignmentType: 'Beach',
            centerName: currentUser?.centerName
        });
        
        const savePromise = gas('saveDailyAssignments', {
            date: currentDate,
            data: JSON.stringify(assignments),
            centerName: currentUser?.centerName
        });
        
        await Promise.all([deletePromise, savePromise]);
        
        selectedBeachInstructors = selected;
        currentAssignments = assignments;
        updateSelectionBadges();
        
        // ✅ تسجيل المدربين بالتوازي
        const logPromises = selected.map(instructorId => {
            const instructor = cachedInstructors.find(i => i.id === instructorId);
            if (instructor) {
                return gas('assignInstructorToDailyLog', {
                    date: currentDate,
                    instructorId: instructorId,
                    instructorName: instructor.name,
                    assignmentType: 'Beach',
                    boatId: '',
                    boatName: '',
                    centerName: currentUser?.centerName
                });
            }
            return null;
        }).filter(p => p !== null);
        
        if (logPromises.length > 0) {
            await Promise.all(logPromises);
        }
        
        // ✅ إعادة تحميل التعيينات
        await loadAndPopulateAssignments(currentDate);
        await loadLogisticsData(currentDate);
        renderTable();
        
        showToast(`✅ Saved ${selected.length} beach instructors`, 'success');
        closeModal('beachInstructorsModal');
        
    } catch(e) {
        showToast('Error: ' + e.message, 'error');
    } finally {
        isSavingBeach = false;
        if (saveBtn) {
            saveBtn.disabled = false;
            saveBtn.textContent = '✅ Save';
        }
    }
}

async function loadBranches() {
  if (!currentUser) return;
  
  const branchAccessTypes = ['Owner', 'Accountant', 'FinancialManager'];
  if (!branchAccessTypes.includes(currentUser.type)) return;
  
  const branchSelector = document.getElementById('branchSelector');
  if (branchSelector) branchSelector.style.display = 'inline-block';
  
  try {
    let branches = [];
    
    if (currentUser.centerId) {
      const result = await gas('getBranchesByCenterId', { centerId: currentUser.centerId });
      if (result && Array.isArray(result)) {
        branches = result;
      } else if (result && result.success && Array.isArray(result.data)) {
        branches = result.data;
      }
    }
    
    const select = document.getElementById('branchSelect');
    if (!select) return;
    
    select.innerHTML = '<option value="">🌍 جميع الفروع</option>';
    
    if (branches.length > 0) {
      branches.forEach(branch => {
        select.innerHTML += `<option value="${escapeHtml(branch.id)}">${escapeHtml(branch.name)}</option>`;
      });
    }
    
    window.branchesList = branches;
    
    // ✅ إزالة المستمع القديم قبل إضافة مستمع جديد
    const newSelect = select.cloneNode(true);
    select.parentNode.replaceChild(newSelect, select);
    
    newSelect.addEventListener('change', async (e) => {
      const branchId = e.target.value;
      const selectedBranch = window.branchesList.find(b => b.id === branchId);
      
      if (branchId && selectedBranch) {
        currentUser.branchName = selectedBranch.name;
        currentUser.branchId = branchId;
        sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
        showToast(`✅ تم التبديل إلى ${selectedBranch.name}`, 'success');
      } else {
        delete currentUser.branchName;
        delete currentUser.branchId;
        sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
        showToast('🌍 تم التبديل إلى جميع الفروع', 'success');
      }
      
      // ✅ إعادة تحميل الفواتير مع الفرع الجديد
      lastFilterParams = '';
      invoicesLoaded = false;
      await loadInvoices();
      applyFilters();
    });
  } catch(e) {
    console.warn('loadBranches error:', e);
  }

async function getTotalBookedSeatsForVehicle(vehicleId, currentDate, tripName, excludeVoucher) {
  let totalGo = 0;
  let totalReturn = 0;
  
  // البحث في جميع الفواتير (allInvoices) عن نفس التاريخ ونفس الرحلة
  for (const inv of allInvoices) {
    const invDate = formatDateDDMMMYYYY(inv.activeDate);
    const invTrip = inv.trip;
    const invVoucher = inv.voucherNo;
    
    if (invDate === currentDate && invTrip === tripName && invVoucher !== excludeVoucher) {
      let vehiclesData = [];
      try {
        vehiclesData = JSON.parse(inv.VehiclesUsed || '[]');
      } catch(e) {}
      
      for (const v of vehiclesData) {
        if (v.vehicleId === vehicleId) {
          totalGo += v.goCount || 0;
          totalReturn += v.returnCount || 0;
        }
      }
    }
  }
  
  return { goSeats: totalGo, returnSeats: totalReturn };
}
  async function getCachedData(fetchFunction, key) {
  const now = Date.now();
  if (lastFetchTime && (now - lastFetchTime) < CACHE_DURATION) {
    if (key === 'boats' && cachedBoatsList) return cachedBoatsList;
    if (key === 'vehicles' && cachedVehiclesList) return cachedVehiclesList;
    if (key === 'instructors' && cachedInstructorsList) return cachedInstructorsList;
  }
  
  const data = await fetchFunction();
  if (key === 'boats') cachedBoatsList = data;
  if (key === 'vehicles') cachedVehiclesList = data;
  if (key === 'instructors') cachedInstructorsList = data;
  lastFetchTime = now;
  
  return data;
}

      const badge = document.getElementById('selectedLogisticsBadge');
      if (badge) badge.textContent = '0';
    }
  } catch(e) {
    console.warn('refreshLogisticsBadge error:', e);
  }
}

// INITIALIZATION
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
  // ✅ تطبيق الثيم الموحد
  if (typeof Theme !== 'undefined' && Theme.applyToPage) {
    Theme.applyToPage();
  }
  Theme.setPageTitle('مدير الحركة');
  
  // ✅ استخدام Session.checkValidity() من session.js
  if (!Session.checkValidity()) {
    return;
  }
  
  // ✅ استخدام Session.getUser() من session.js
  currentUser = Session.getUser();
  if (!currentUser) {
    location.href = 'index.html';
    return;
  }

  // ✅ التصحيح: استخدام currentUser مباشرة (لا حاجة لـ sessionStorage)
  try {
    console.log('✅ Current user loaded:', currentUser.name, 'Type:', currentUser.type);
    
    // ✅ تحميل أسماء رحلات Diving أولاً
    await loadDivingTripNames();
    console.log('✅ Diving trips loaded:', divingTripNames);
    
    await loadBranches();
    document.getElementById('userNameDisplay').textContent = currentUser.name || 'User';
    clearVehicleSeatsCache();

    const today = new Date();
    const todayISO = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    const fromDateInput = document.getElementById('filterFromDate');
    const toDateInput = document.getElementById('filterToDate');
    if (fromDateInput && !fromDateInput.value) fromDateInput.value = todayISO;
    if (toDateInput && !toDateInput.value) toDateInput.value = todayISO;
    
    showToast('جاري تحميل الفواتير...', 'info');
    await loadInvoices();
    renderTable(); 
    
    // ✅ تحميل التعيينات لليوم الحالي (مرة واحدة فقط)
   // في DOMContentLoaded
const currentDate = getCurrentDateISO();
if (currentDate) {
    await loadAndPopulateAssignments(currentDate);
    await loadLogisticsData(currentDate); // ✅ تحميل اللوجستيات
    console.log('✅ Assignments loaded for date:', currentDate);
    updateSelectionBadges();
}
    
  } catch(e) { 
    console.error('❌ Initialization error:', e); 
    window.location.href = 'index.html'; 
  }
});
