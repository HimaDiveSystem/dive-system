<script>

const GAS_URL = 'https://script.google.com/macros/s/AKfycbwC1BRoLAJthZqxWTYyMUSjPNNGfCI0BjTfhE7ZiVx67rUP__OKAj0vlwD1-RUCOMSE/exec';
const DASH = { Admin: 'Dashboard.html', Owner: 'OwnerDashboard.html', Sales: 'SalesDashboard.html', Accountant: 'AccountantDashboard.html', OperationsManager: 'OperationAccess.html', OperationsSupervisor: 'OperationAccess.html' };

const BOAT_TRIPS = [
  'Private Boat (max 10 persons)',
  'Ras Mohamed Boat',
  'Local Boat',
  'Tiran Island By Boat',
  'Boat Trip Half Day'
];

let sortDirection = 'asc';

let selectedVehicles = [];
let selectedBoats = [];           // Array of boat IDs
let boatInstructorsMap = {};      // { boatId: [instructorId1, instructorId2] }
let currentAssignments = null;    // Loaded assignments for current date

// Cached data
let cachedInstructors = null;
let cachedVehicles = null;
let cachedBoats = null;

let currentUpsellVoucher = null;
let currentUpsellInvoice = null;
let currentUpsellTripItems = [];
let pendingTimeVoucher = null;

// ============================================================
// JSONP REQUEST
// ============================================================
function jsonpRequest(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    if (currentUser?.centerName) params.centerName = currentUser.centerName;
    if (currentUser?.centerId) params.centerId = currentUser.centerId;
    params.action = action;
    params.callback = cbName;
    const qs = Object.entries(params).map(([k, v]) => k + '=' + encodeURIComponent(String(v ?? ''))).join('&');
    const url = GAS_URL + '?' + qs;
    const script = document.createElement('script');
    const timeout = setTimeout(() => { cleanup(); reject(new Error('Request timeout')); }, 60000);
    const cleanup = () => { clearTimeout(timeout); delete window[cbName]; script.remove(); };
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('Network error')); };
    script.src = url;
    document.head.appendChild(script);
  });
}

function gas(action, params = {}) {
  return jsonpRequest(action, params);
}

// ============================================================

function showToast(msg, type) {
  const toast = document.createElement('div');
  toast.className = `toast toast-${type} show`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function formatDateDDMMMYYYY(date) {
  if (!date) return '';
  const d = new Date(date);
  if (isNaN(d)) return date;
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return String(d.getDate()).padStart(2, '0') + '/' + months[d.getMonth()] + '/' + d.getFullYear();
}

function formatDateISO(date) {
  if (!date) return '';
  const d = new Date(date);
  if (isNaN(d)) return '';
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function parseDateFromString(dateStr) {
  if (!dateStr) return null;
  if (dateStr instanceof Date && !isNaN(dateStr)) return dateStr;
  const s = dateStr.toString().trim();
  const match = s.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (match) {
    const months = { Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11 };
    return new Date(parseInt(match[3]), months[match[2]], parseInt(match[1]));
  }
  const isoMatch = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (isoMatch) return new Date(parseInt(isoMatch[1]), parseInt(isoMatch[2]) - 1, parseInt(isoMatch[3]));
  const d = new Date(s);
  return !isNaN(d) ? d : null;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function formatValue(val) {
  if (val === undefined || val === null) return '';
  const num = parseFloat(val);
  if (isNaN(num)) return val;
  if (num === 0) return '';
  return num;
}

  const fromDate = document.getElementById('filterFromDate').value;
  const toDate = document.getElementById('filterToDate').value;
  if (fromDate && fromDate === toDate) return fromDate;
  return null;
}

function isSingleDateRange() {
  const fromDate = document.getElementById('filterFromDate').value;
  const toDate = document.getElementById('filterToDate').value;
  return fromDate && fromDate === toDate;
}

function updateSelectionButtonsState() {
  const isSingle = isSingleDateRange();
  const btns = ['btnInstructors', 'btnBoats', 'btnVehicles'];
  btns.forEach(id => {
    const btn = document.getElementById(id);
    if (btn) {
      if (isSingle) btn.classList.remove('disabled');
      else btn.classList.add('disabled');
    }
  });
}

function getRestColor(restValue) {
  if (restValue === undefined || restValue === null) return 'var(--blue)';
  const num = parseFloat(restValue);
  if (isNaN(num)) return 'var(--blue)';
  if (num > 0) return '#dc2626';
  if (num === 0) return '#16a34a';
  return 'var(--blue)';
}

// ============================================================
// SORTING
// ============================================================
function setSort(col) {
  if (sortColumn === col) {
    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
  } else {
    sortColumn = col;
    sortDirection = 'asc';
  }
  doSort();
  renderTable();
  renderPagination();
}

function getSortIcon(col) {
  if (sortColumn !== col) return '⇅';
  return sortDirection === 'asc' ? '↑' : '↓';
}

function doSort() {
  filteredInvoices.sort((a, b) => {
    let aVal = a[sortColumn];
    let bVal = b[sortColumn];
    if (aVal === undefined) aVal = '';
    if (bVal === undefined) bVal = '';
    if (sortColumn === 'Rest') {
      aVal = parseFloat(aVal) || 0;
      bVal = parseFloat(bVal) || 0;
    } else if (sortColumn === 'ActiveDate' || sortColumn === 'IssueDate') {
      aVal = parseDateFromString(aVal)?.getTime() || 0;
      bVal = parseDateFromString(bVal)?.getTime() || 0;
    } else {
      aVal = String(aVal).toLowerCase();
      bVal = String(bVal).toLowerCase();
    }
    if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
    if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
    return 0;
  });
}

function changePageSize() {
  const select = document.getElementById('pageSizeSelect');
  pageSize = parseInt(select.value);
  if (pageSize === -1) pageSize = filteredInvoices.length || 9999;
  currentPage = 1;
  renderTable();
  renderPagination();
}

// TRIP FILTER
// ============================================================
function initTripFilter() {
  const select = document.getElementById('filterTrip');
  select.innerHTML = '';
  uniqueTrips.forEach(trip => {
    const option = document.createElement('option');
    option.value = trip;
    option.textContent = trip;
    select.appendChild(option);
  });

  choicesInstance = new Choices(select, {
    removeItemButton: true,

    placeholderValue: 'اختر الرحلات...',
    searchEnabled: true,
    searchChoices: true,
    shouldSort: false,
    itemSelectText: '',
    noResultsText: 'لا توجد نتائج',
    noChoicesText: 'لا توجد رحلات'
  });
}

// ============================================================
// LOAD ASSIGNMENTS FOR A DATE
// ============================================================
async function loadAssignmentsForDate(dateISO) {
  if (!dateISO) return null;
  try {
    const result = await gas('getDailyAssignments', { date: dateISO });
    if (result && result.success) {
      return result.data;
    }
  } catch(e) {
    console.warn('Could not load assignments:', e);
  }
  return null;
}

async function saveAssignmentsForDate(dateISO, assignments) {
  if (!dateISO) return false;
  try {
    await gas('saveDailyAssignments', { date: dateISO, data: JSON.stringify(assignments) });
    return true;
  } catch(e) {
    showToast('Error saving assignments: ' + e.message, 'error');
    return false;
  }
}

// ============================================================
// LOAD INVOICES
// ============================================================
async function loadInvoices() {
  try {
    const result = await jsonpRequest('getAllInvoices', { 
      includeCollection: 'true',
      centerName: currentUser?.centerName
    });
    
    if (Array.isArray(result)) {
      allInvoices = result.filter(inv => {
        const state = (inv.State || inv.state || '').toLowerCase();
        return state === 'confirmed' || state === 'pending';
      });
      
      const tripSet = new Set();
      allInvoices.forEach(inv => {
        const trip = inv.Trip || inv.trip;
        if (trip) tripSet.add(trip);
      });
      uniqueTrips = Array.from(tripSet).sort();
      
      initTripFilter();
      applyFilters();
    } else {
      showToast('Failed to load invoices', 'error');
    }
  } catch(e) {
    console.error('loadInvoices error:', e);
    showToast('Connection error: ' + e.message, 'error');
  }
}

function applyFilters() {
  const fromDate = document.getElementById('filterFromDate').value;
  const toDate = document.getElementById('filterToDate').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();
  const state = document.getElementById('filterState').value;
  const selectedTrips = choicesInstance ? choicesInstance.getValue(true) : [];
  
  let fromDateObj = null;
  let toDateObj = null;
  
  if (fromDate) {
    fromDateObj = new Date(fromDate);
    fromDateObj.setHours(0, 0, 0, 0);
  }
  if (toDate) {
    toDateObj = new Date(toDate);
    toDateObj.setHours(23, 59, 59, 999);
  }
  
  filteredInvoices = allInvoices.filter(inv => {
    const activeDate = inv.ActiveDate || inv.activeDate || '';
    const parsedDate = parseDateFromString(activeDate);
    
    if (fromDateObj && parsedDate && parsedDate < fromDateObj) return false;
    if (toDateObj && parsedDate && parsedDate > toDateObj) return false;
    if (state && (inv.State || inv.state || '').toLowerCase() !== state) return false;
    if (selectedTrips.length > 0 && !selectedTrips.includes(inv.Trip || inv.trip)) return false;
    
    if (search) {
      const voucher = (inv.VoucherNo || inv.voucherNo || '').toLowerCase();
      const guest = (inv.GuestName || inv.guestName || '').toLowerCase();
      if (!voucher.includes(search) && !guest.includes(search)) return false;
    }
    
    return true;
  });
  
  doSort();
  currentPage = 1;
  renderTable();
  renderPagination();
  updateSelectionButtonsState();
  
  // Load assignments for the current date
  const currentDate = getCurrentDateISO();
  if (currentDate) {
    loadAndPopulateAssignments(currentDate);
  }
}

async function loadAndPopulateAssignments(dateISO) {
  const assignments = await loadAssignmentsForDate(dateISO);
  if (assignments) {
    currentAssignments = assignments;
    selectedBeachInstructors = assignments.beachInstructors || [];
    selectedBoats = assignments.boats || [];
    boatInstructorsMap = assignments.boatInstructorsMap || {};
    selectedVehicles = assignments.vehicles || [];
  } else {
    currentAssignments = null;
    selectedBeachInstructors = [];
    selectedBoats = [];
    boatInstructorsMap = {};
    selectedVehicles = [];
  }
  updateSelectionBadges();
}

function resetFilters() {
  document.getElementById('filterFromDate').value = '';
  document.getElementById('filterToDate').value = '';
  document.getElementById('filterSearch').value = '';
  document.getElementById('filterState').value = '';
  if (choicesInstance) choicesInstance.removeActiveItems();
  applyFilters();
}

function onDateChange() {
  const currentDate = getCurrentDateISO();
  if (currentDate) {
    loadAndPopulateAssignments(currentDate);
  } else {
    selectedBeachInstructors = [];
    selectedBoats = [];
    boatInstructorsMap = {};
    selectedVehicles = [];
    updateSelectionBadges();
  }
  applyFilters();
}

function renderPagination() {
  const totalPages = Math.ceil(filteredInvoices.length / pageSize);
  if (totalPages <= 1) {
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  let html = '';
  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="gotoPage(${i})">${i}</button>`;
  }
  document.getElementById('pagination').innerHTML = html;
}

function gotoPage(page) {
  currentPage = page;
  renderTable();
}

async function loadBoatsWithInstructors() {
  try {
    let boats = cachedBoats;
    if (!boats) {
      boats = await gas('getBoats');
      cachedBoats = boats;
    }
    let instructors = cachedInstructors;
    if (!instructors) {
      instructors = await gas('getInstructors');
      cachedInstructors = instructors;
    }
    
    if (!Array.isArray(boats)) boats = [];
    if (!Array.isArray(instructors)) instructors = [];
    
    let html = '';
    for (const boat of boats) {
      const isBoatSelected = selectedBoats.includes(boat.id);
      const selectedInstructorsForBoat = boatInstructorsMap[boat.id] || [];
      
      html += `
        <div class="boat-card">
          <div class="boat-card-header">
            <input type="checkbox" class="boat-select" data-id="${boat.id}" data-name="${escapeHtml(boat.name)}" ${isBoatSelected ? 'checked' : ''} onchange="toggleBoatSelection('${boat.id}')">
            <span style="margin-left:8px;">⛵ ${escapeHtml(boat.name)} (Capacity: ${boat.capacity || 0})</span>
          </div>
          <div id="boat-instructors-${boat.id}" style="margin-top:8px; padding-left:24px; ${isBoatSelected ? '' : 'display:none;'}">
            <div style="font-size:11px; font-weight:700; margin-bottom:6px;">👨‍🏫 Select Instructors for this boat:</div>
            <div class="selection-list" style="max-height:200px;">
      `;
      
      for (const inst of instructors) {
        const isSelected = selectedInstructorsForBoat.includes(inst.id);
        html += `
          <div class="selection-item" onclick="toggleBoatInstructor('${boat.id}', '${inst.id}')">
            <input type="checkbox" class="boat-instructor-checkbox-${boat.id}" data-id="${inst.id}" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleBoatInstructor('${boat.id}', '${inst.id}')">
            <div class="info"><div class="name">${escapeHtml(inst.name)}</div></div>
          </div>
        `;
      }
      
      html += `
            </div>
          </div>
        </div>
      `;
    }
    
    document.getElementById('boatsSelectionContainer').innerHTML = html || '<div>No boats found</div>';
    
  } catch(e) {
    showToast('Error loading boats: ' + e.message, 'error');
  }
}

function toggleBoatSelection(boatId) {
  const checkbox = document.querySelector(`.boat-select[data-id="${boatId}"]`);
  const isSelected = checkbox.checked;
  const instructorsDiv = document.getElementById(`boat-instructors-${boatId}`);
  
  if (isSelected) {
    if (!selectedBoats.includes(boatId)) selectedBoats.push(boatId);
    if (instructorsDiv) instructorsDiv.style.display = 'block';
  } else {
    const index = selectedBoats.indexOf(boatId);
    if (index !== -1) selectedBoats.splice(index, 1);
    if (instructorsDiv) instructorsDiv.style.display = 'none';
    // Remove all instructors for this boat
    delete boatInstructorsMap[boatId];
  }
}

function toggleBoatInstructor(boatId, instructorId) {
  if (!boatInstructorsMap[boatId]) boatInstructorsMap[boatId] = [];
  const index = boatInstructorsMap[boatId].indexOf(instructorId);
  if (index === -1) {
    // Check if instructor already assigned to another boat
    let alreadyAssigned = false;
    let assignedBoat = null;
    for (const [bid, instructors] of Object.entries(boatInstructorsMap)) {
      if (bid !== boatId && instructors.includes(instructorId)) {
        alreadyAssigned = true;
        assignedBoat = bid;
        break;
      }
    }
    if (alreadyAssigned) {
      showToast(`⚠️ Instructor already assigned to another boat in the same day!`, 'error');
      return;
    }
    boatInstructorsMap[boatId].push(instructorId);
  } else {
    boatInstructorsMap[boatId].splice(index, 1);
  }
  // Refresh the UI for this boat
  const container = document.getElementById(`boat-instructors-${boatId}`);
  if (container) {
    const checkboxes = container.querySelectorAll(`input[type="checkbox"]`);
    checkboxes.forEach(cb => {
      const instId = cb.getAttribute('data-id');
      if (instId) {
        cb.checked = boatInstructorsMap[boatId]?.includes(instId) || false;
      }
    });
  }
}

  const currentDate = getCurrentDateISO();
  if (!currentDate) {
    showToast('Please select a single date first', 'error');
    return;
  }
  
  const assignments = currentAssignments || {};
  assignments.boats = selectedBoats;
  assignments.boatInstructorsMap = boatInstructorsMap;
  
  if (await saveAssignmentsForDate(currentDate, assignments)) {
    currentAssignments = assignments;
    showToast(`Saved ${selectedBoats.length} boats with instructors`, 'success');
    closeModal('boatsModal');
  }
}

function openBoatsModal() {
  if (!isSingleDateRange()) {

    return;
  }
  loadBoatsWithInstructors();
  openModal('boatsModal');
}

async function saveInvoiceInstructorAssignment() {
  const invoice = currentAssignInvoice;
  const requiredIntro = parseInt(invoice.Extra || 0);
  const requiredCourse = parseInt(invoice.Dbl || 0);
  const requiredDiver = parseInt(invoice.Sgl || 0);
  
  let totalIntro = 0, totalCourse = 0, totalDiver = 0;
  const assignments = [];
  
  const checkboxes = document.querySelectorAll('.invoice-instructor-checkbox:checked');
  for (const cb of checkboxes) {
    const instId = cb.getAttribute('data-id');
    const intro = parseInt(document.getElementById(`invoice_intro_${instId}`).value) || 0;
    const course = parseInt(document.getElementById(`invoice_course_${instId}`).value) || 0;
    const diver = parseInt(document.getElementById(`invoice_diver_${instId}`).value) || 0;
    totalIntro += intro;
    totalCourse += course;
    totalDiver += diver;
    if (intro > 0 || course > 0 || diver > 0) {
      assignments.push({ instructorId: instId, intro, course, diver });
    }
  }
  
  if (totalIntro !== requiredIntro || totalCourse !== requiredCourse || totalDiver !== requiredDiver) {
    showToast(`Mismatch: Intro ${totalIntro}/${requiredIntro}, Course ${totalCourse}/${requiredCourse}, Diver ${totalDiver}/${requiredDiver}`, 'error');
    return;
  }
  
  try {
    await gas('updateInvoiceFieldV2', {
      voucherNo: currentAssignVoucher,
      field: 'InstructorsExecution',
      value: JSON.stringify(assignments),
      centerName: currentUser?.centerName
    });
    showToast(`Assigned ${assignments.length} instructors`, 'success');
    closeModal('assignInstructorsModal');
    await loadInvoices();
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

          <div class="payment-card"><label>Visa EUR</label><input type="number" id="upsellVisaEUR" step="0.01" value="0"></div>

function updateUpsellTotal(idx) {
  const qty = parseInt(document.getElementById(`upsell_qty_${idx}`)?.value) || 0;
  const price = parseFloat(document.getElementById(`upsell_price_${idx}`)?.value) || 0;
  const total = qty * price;
  const totalCell = document.getElementById(`upsell_total_${idx}`);
  if (totalCell) totalCell.textContent = total.toFixed(2);
}

async function saveUpsell() {
  const items = [];
  for (let i = 0; i < currentUpsellTripItems.length; i++) {
    const qty = parseInt(document.getElementById(`upsell_qty_${i}`)?.value) || 0;
    const price = parseFloat(document.getElementById(`upsell_price_${i}`)?.value) || 0;
    if (qty > 0 && price > 0) {
      items.push({ name: currentUpsellTripItems[i].name, quantity: qty, price, position: i + 1 });
    }
  }
  if (items.length === 0) { showToast('Please select at least one upsell item with price', 'error'); return; }
  
  const instructorId = document.getElementById('upsellInstructor')?.value;
  if (!instructorId) { showToast('Please select selling instructor', 'error'); return; }
  
  const amounts = {
    cashUSD: parseFloat(document.getElementById('upsellCashUSD')?.value) || 0,
    cashEUR: parseFloat(document.getElementById('upsellCashEUR')?.value) || 0,
    cashGBP: parseFloat(document.getElementById('upsellCashGBP')?.value) || 0,
    cashLE: parseFloat(document.getElementById('upsellCashLE')?.value) || 0,
    visaUSD: parseFloat(document.getElementById('upsellVisaUSD')?.value) || 0,
    visaEUR: parseFloat(document.getElementById('upsellVisaEUR')?.value) || 0,
    visaGBP: parseFloat(document.getElementById('upsellVisaGBP')?.value) || 0,
    visaLE: parseFloat(document.getElementById('upsellVisaLE')?.value) || 0
  };
  const totalAmount = Object.values(amounts).reduce((a,b)=>a+b,0);
  if (totalAmount === 0) { showToast('Please enter payment amounts', 'error'); return; }
  
  const upsellData = [{ instructorId, items, totalAmount, payments: amounts }];
  try {
    const result = await gas('createUpSellInvoice', {
      originalVoucherNo: currentUpsellVoucher,
      upSellItems: JSON.stringify(items),
      upSellAmounts: JSON.stringify(amounts),
      instructorId,
      upsellData: JSON.stringify(upsellData)
    });
    if (result?.success) {
      await gas('updateInvoiceFieldV2', {
        voucherNo: currentUpsellVoucher,
        field: 'InstructorsUpSell',
        value: JSON.stringify(upsellData),
        centerName: currentUser?.centerName
      });
      showToast(`UpSell invoice created: ${result.voucherNo}`, 'success');
      closeModal('upsellModal');
      await loadInvoices();
    } else { showToast(result?.message || 'Failed', 'error'); }
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

      voucherNo: pendingTimeVoucher,
      field: 'Time',
      value: newTime,
      centerName: currentUser?.centerName
    });
    const invoice = allInvoices.find(i => (i.VoucherNo || i.voucherNo) === pendingTimeVoucher);
    if (invoice) {
      invoice.Time = newTime;
      invoice.time = newTime;
    }
    renderTable();
    showToast(`تم تحديث الوقت إلى ${newTime}`, 'success');
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
  closeModal('timeModal');
  pendingTimeVoucher = null;
}

// ============================================================
// HELPER FUNCTIONS
// ============================================================
async function getVehicleById(id) {
  const vehicles = await gas('getVehicles');
  if (Array.isArray(vehicles)) return vehicles.find(v => v.id === id);
  return null;
}

async function getBoatById(id) {
  const boats = await gas('getBoats');
  if (Array.isArray(boats)) return boats.find(b => b.id === id);
  return null;
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function exportToExcel() { showToast('Export feature coming soon', 'info'); }

// ============================================================
// INITIALIZATION
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
  const ud = sessionStorage.getItem('currentUser');
  if (!ud) { window.location.href = 'index.html'; return; }
  try {
    currentUser = JSON.parse(ud);
    document.getElementById('userNameDisplay').textContent = currentUser.name || 'User';
    
    const [instructors, vehicles, boats] = await Promise.all([
      gas('getInstructors'),
      gas('getVehicles'),
      gas('getBoats')
    ]);
    cachedInstructors = instructors;
    cachedVehicles = vehicles;
    cachedBoats = boats;
    
    await loadInvoices();
    updateSelectionButtonsState();
  } catch(e) { window.location.href = 'index.html'; }
});
</script>
