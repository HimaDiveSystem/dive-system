<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Operations Access - Assign Instructors & Vehicles</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0f1f3d;
      --navy2: #1a3260;
      --gold: #f5c842;
      --gold2: #e6b800;
      --blue: #2563eb;
      --blue-lt: #3b82f6;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #ea580c;
      --purple: #7c3aed;
      --bg: #f0f4f8;
      --card: #fff;
      --border: #dde4f0;
      --text: #1a2540;
      --text-lt: #5a6a8a;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-500: #64748b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    /* ========== HEADER & NAVIGATION ========== */
    .header {
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      color: white;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 3px 16px rgba(15,31,61,.25);
    }
    .header h2 { color: var(--gold); font-size: 18px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .user-chip { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); border-radius: 40px; padding: 4px 12px; color: white; font-size: 12px; font-weight: 600; }
    .back-btn { background: transparent; border: 2px solid rgba(255,255,255,.3); color: white; padding: 4px 12px; border-radius: 40px; cursor: pointer; font-weight: 700; font-size: 12px; }
    .back-btn:hover { border-color: var(--gold); color: var(--gold); }
    
    /* ========== SELECTION BAR ========== */
    .selection-bar {
      background: white;
      border-bottom: 2px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      position: sticky;
      top: 60px;
      z-index: 199;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .selection-btn {
      background: var(--navy);
      color: var(--gold);
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .selection-btn.disabled { opacity: 0.5; pointer-events: none; }
    .selection-badge {
      background: var(--gold);
      color: var(--navy);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 700;
      margin-left: 8px;
    }
    .reset-selection {
      background: #f1f5f9;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 40px;
      font-size: 11px;
      cursor: pointer;
    }
    
    /* ========== FILTER BAR ========== */
    .filter-bar {
      background: white;
      border-bottom: 2px solid var(--border);
      padding: 10px 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
      position: sticky;
      top: 120px;
      z-index: 198;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .filter-group label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-lt);
      text-transform: uppercase;
    }
    .filter-group input, 
    .filter-group select {
      padding: 6px 10px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-family: 'Cairo', sans-serif;
      background: white;
      min-width: 140px;
    }
    .btn-go, .btn-reset, .export-btn {
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      border: none;
    }
    .btn-go { background: var(--navy); color: var(--gold); }
    .btn-reset { background: #f1f5f9; border: 1px solid var(--border); }
    .export-btn { background: var(--green); color: white; }
    
    /* ========== TABLE STYLES (Desktop) ========== */
    .tbl-wrap {
      overflow-x: auto;
      position: relative;
      max-height: calc(100vh - 310px);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      min-width: 1400px;
    }
    th, td {
      padding: 8px 5px;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    th {
      background: var(--navy);
      color: var(--gold);
      font-weight: 700;
      cursor: pointer;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .action-buttons {
      display: flex;
      flex-direction: row;
      gap: 4px;
      justify-content: center;
      align-items: center;
    }
    .action-btn {
      background: var(--blue-lt);
      color: white;
      border: none;
      padding: 4px 6px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      min-width: 32px;
    }
    .action-btn.upsell { background: var(--orange); }
    .action-btn.instructor { background: var(--green); }
    .action-btn.vehicle { background: var(--purple); }
    .action-btn.boat { background: var(--blue); }
    .action-btn.disabled { opacity: 0.5; pointer-events: none; }
    .status-pending { background: #fef9c3; color: #854d0e; padding: 2px 8px; border-radius: 20px; display: inline-block; font-size: 10px; }
    .status-confirmed { background: #dcfce7; color: #166534; padding: 2px 8px; border-radius: 20px; display: inline-block; font-size: 10px; }
    .rest-pos { color: #dc2626; font-weight: bold; cursor: pointer; }
    .rest-zero { color: #16a34a; font-weight: bold; }
    .pagination {
      display: flex;
      justify-content: center;
      gap: 5px;
      padding: 12px;
      background: white;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .page-btn {
      padding: 4px 9px;
      border: 1px solid var(--border);
      background: white;
      border-radius: 14px;
      cursor: pointer;
      font-size: 11px;
    }
    .page-btn.active { background: var(--navy); color: var(--gold); }
    
    /* ========== CARD STYLES (Mobile) ========== */
    .cards-container {
      display: none;
      flex-direction: column;
      gap: 16px;
      padding: 16px;
    }
    .invoice-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .card-header {
      background: var(--navy);
      color: var(--gold);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .card-voucher {
      font-weight: 700;
      font-size: 14px;
    }
    .card-rest {
      background: var(--gold);
      color: var(--navy);
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 12px;
    }
    .card-body {
      padding: 12px 16px;
    }
    .card-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--gray-100);
      flex-wrap: wrap;
      gap: 8px;
    }
    .card-label {
      font-weight: 700;
      color: var(--navy);
      font-size: 11px;
      min-width: 100px;
    }
    .card-value {
      font-size: 12px;
      color: var(--text);
      flex: 1;
      text-align: left;
    }
    .card-activities {
      background: var(--gray-50);
      padding: 8px;
      border-radius: 8px;
      margin-top: 8px;
    }
    .card-activities span {
      display: inline-block;
      background: var(--gray-200);
      padding: 2px 6px;
      border-radius: 12px;
      font-size: 10px;
      margin: 2px;
    }
    .card-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      padding: 12px 16px;
      background: var(--gray-50);
      border-top: 1px solid var(--border);
    }
    .card-action-btn {
      background: var(--blue-lt);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .card-action-btn.upsell { background: var(--orange); }
    .card-action-btn.instructor { background: var(--green); }
    .card-action-btn.vehicle { background: var(--purple); }
    .card-action-btn.boat { background: var(--blue); }
    
    /* ========== RESPONSIVE BREAKPOINT ========== */
    @media (max-width: 768px) {
      .tbl-wrap { display: none; }
      .cards-container { display: flex; }
      .selection-bar { flex-direction: column; align-items: stretch; }
      .filter-bar { flex-direction: column; align-items: stretch; }
      .filter-group { width: 100%; }
      .filter-group input, .filter-group select { width: 100%; min-width: auto; }
    }
    
    /* ========== MODAL STYLES ========== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: white;
      width: 90%;
      max-width: 950px;
      max-height: 85vh;
      overflow-y: auto;
      border-radius: 20px;
      padding: 20px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--gold);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }
    .close-modal {
      font-size: 28px;
      cursor: pointer;
      color: var(--gray-500);
      background: none;
      border: none;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 30px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-primary { background: var(--navy); color: var(--gold); }
    .btn-secondary { background: var(--gray-200); color: var(--text); }
    .btn-success { background: var(--green); color: white; }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      color: white;
      z-index: 9999;
      transform: translateY(50px);
      opacity: 0;
      transition: 0.35s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast-success { background: var(--green); }
    .toast-error { background: var(--red); }
    .loader { text-align: center; padding: 50px; color: var(--text-lt); }
    .spinner {
      width: 32px;
      height: 32px;
      border: 4px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .badge-vehicle, .badge-boat, .badge-instructor {
      display: inline-block;
      background: var(--purple);
      color: white;
      padding: 2px 6px;
      border-radius: 12px;
      font-size: 9px;
      margin: 1px;
      cursor: pointer;
    }
    .badge-boat { background: var(--blue); }
    .badge-instructor { background: var(--green); }
  </style>
</head>
<body>

<div class="header">

<!-- Modals -->
<div id="assignVehiclesModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>🚗 Assign Vehicles</h3><button class="close-modal" onclick="closeModal('assignVehiclesModal')">×</button></div><div id="assignVehiclesContent"></div></div></div>

<script>
// ============================================================
// CONFIGURATION & GLOBALS
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwC1BRoLAJthZqxWTYyMUSjPNNGfCI0BjTfhE7ZiVx67rUP__OKAj0vlwD1-RUCOMSE/exec';
const DASH = { Admin: 'Dashboard.html', Owner: 'OwnerDashboard.html', Sales: 'SalesDashboard.html', Accountant: 'AccountantDashboard.html', OperationsManager: 'OperationAccess.html', OperationsSupervisor: 'OperationAccess.html' };

const BOAT_TRIPS = ['Private Boat (max 10 persons)', 'Ras Mohamed Boat', 'Local Boat', 'Tiran Island By Boat', 'Boat Trip Half Day'];

let currentUser = null;
let allInvoices = [];
let filteredInvoices = [];
let currentPage = 1;
let pageSize = 30;
let sortColumn = 'activeDate';
let sortDirection = 'asc';
let uniqueTrips = [];

let selectedBeachInstructors = [];
let selectedVehicles = [];
let selectedBoats = [];
let boatInstructorsMap = {};
let currentAssignments = null;

let cachedInstructors = [];
let cachedVehicles = [];
let cachedBoats = [];

let currentAssignVoucher = null;
let currentAssignInvoice = null;

let preloadedData = { logisticsRecords: {}, vehicleTripRecords: {}, dailyAssignments: {} };
let dataLoaded = false;
let invoicesLoaded = false;
let lastFilterParams = {};

// ============================================================
// JSONP REQUEST
// ============================================================
function jsonpRequest(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    if (currentUser?.centerName) params.centerName = currentUser.centerName;
    if (currentUser?.centerId) params.centerId = currentUser.centerId;
    params.action = action;
    params.callback = cbName;
    const qs = Object.entries(params).map(([k, v]) => k + '=' + encodeURIComponent(String(v ?? ''))).join('&');
    const url = GAS_URL + '?' + qs;
    const script = document.createElement('script');
    const timeout = setTimeout(() => { cleanup(); reject(new Error('Request timeout')); }, 30000);
    const cleanup = () => { clearTimeout(timeout); delete window[cbName]; script.remove(); };
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('Network error')); };
    script.src = url;
    document.head.appendChild(script);
  });
}

function gas(action, params = {}) {
  return new Promise((resolve, reject) => {
    const timeoutId = setTimeout(() => reject(new Error('Request timeout')), 30000);
    jsonpRequest(action, params).then(resolve).catch(reject).finally(() => clearTimeout(timeoutId));
  });
}

// ============================================================
// UTILITIES
// ============================================================
function showToast(msg, type) {
  const toast = document.createElement('div');
  toast.className = `toast toast-${type} show`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function formatDateDDMMMYYYY(date) {
  if (!date) return '';
  const d = new Date(date);
  if (isNaN(d)) return date;
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return `${String(d.getDate()).padStart(2, '0')}/${months[d.getMonth()]}/${d.getFullYear()}`;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function goBack() {
  window.location.href = DASH[currentUser?.type || 'Admin'] || 'Dashboard.html';
}

function getCurrentDateISO() {
  const fromDate = document.getElementById('filterFromDate').value;
  const toDate = document.getElementById('filterToDate').value;
  if (fromDate && fromDate === toDate) {
    const parts = fromDate.split('-');
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    return `${parts[2]}/${months[parseInt(parts[1]) - 1]}/${parts[0]}`;
  }
  return null;
}

function isSingleDateRange() {
  const fromDate = document.getElementById('filterFromDate').value;
  const toDate = document.getElementById('filterToDate').value;
  return fromDate && fromDate === toDate;
}

function updateSelectionButtonsState() {
  const isSingle = isSingleDateRange();
  ['btnInstructors', 'btnBoats', 'btnVehicles', 'btnLogisticsVehicles'].forEach(id => {
    const btn = document.getElementById(id);
    if (btn) isSingle ? btn.classList.remove('disabled') : btn.classList.add('disabled');
  });
}

function updateSelectionBadges() {
  document.getElementById('selectedInstructorsBadge').textContent = selectedBeachInstructors.length;
  document.getElementById('selectedBoatsBadge').textContent = selectedBoats.length;
  document.getElementById('selectedVehiclesBadge').textContent = selectedVehicles.length;
  const badge = document.getElementById('selectedLogisticsBadge');
  if (badge) badge.textContent = preloadedData.logisticsRecords?.length || 0;
}

// ============================================================
// LOAD INVOICES
// ============================================================
async function loadInvoices() {
  if (invoicesLoaded && allInvoices.length > 0) {
    console.log('📦 استخدام البيانات المخزنة (${allInvoices.length} فاتورة)');
    applyFilters();
    return;
  }
  
  try {
    showToast('جاري تحميل البيانات...', 'info');
    
    const fromDate = document.getElementById('filterFromDate').value;
    const toDate = document.getElementById('filterToDate').value;
    const isSingleDate = fromDate && fromDate === toDate;
    
    let result;
    
    // ✅ إذا كان هناك نطاق تواريخ محدد، استخدم getInvoicesByDate
    if (fromDate && toDate) {
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const fromParts = fromDate.split('-');
      const toParts = toDate.split('-');
      const fromFormatted = `${fromParts[2]}/${months[parseInt(fromParts[1]) - 1]}/${fromParts[0]}`;
      const toFormatted = `${toParts[2]}/${months[parseInt(toParts[1]) - 1]}/${toParts[0]}`;
      
      if (isSingleDate) {
        // تاريخ واحد
        result = await gas('getInvoicesByDate', { 
          dateStr: fromFormatted,
          centerName: currentUser?.centerName
        });
      } else {
        // نطاق تواريخ - نستخدم getAllInvoices ثم نفلتر محلياً
        result = await gas('getAllInvoices', { 
          includeCollection: 'true',
          centerName: currentUser?.centerName
        });
      }
    } else {
      // لا يوجد تواريخ محددة - جلب كل الفواتير
      result = await gas('getAllInvoices', { 
        includeCollection: 'true',
        centerName: currentUser?.centerName
      });
    }
    
    if (Array.isArray(result)) {
      allInvoices = result.filter(inv => {
        const state = (inv.State || inv.state || '').toLowerCase();
        return state === 'confirmed' || state === 'pending';
      });
      
      invoicesLoaded = true;
      
      const tripSet = new Set();
      allInvoices.forEach(inv => { 
        const trip = inv.Trip || inv.trip;
        if (trip) tripSet.add(trip); 
      });
      uniqueTrips = Array.from(tripSet).sort();
      
      initTripFilter();
      applyFilters();
      showToast(`تم تحميل ${allInvoices.length} فاتورة`, 'success');
    }
  } catch(e) {
    console.error('loadInvoices error:', e);
    showToast('Connection error: ' + e.message, 'error');
  }
}

function initTripFilter() {
  const select = document.getElementById('filterTrip');
  select.innerHTML = '<option value="">All Trips</option>';
  uniqueTrips.forEach(trip => {
    const option = document.createElement('option');
    option.value = trip;
    option.textContent = trip;
    select.appendChild(option);
  });
  select.addEventListener('change', applyFilters);
}

function getSelectedTrips() {
  const select = document.getElementById('filterTrip');
  const selected = [];
  for (let i = 0; i < select.options.length; i++) {
    if (select.options[i].selected && select.options[i].value !== '') selected.push(select.options[i].value);
  }
  const hasAllTrips = Array.from(select.options).some(opt => opt.selected && opt.value === '');
  return hasAllTrips || selected.length === 0 ? [] : selected;
}


function applyFilters() {
  const fromDate = document.getElementById('filterFromDate').value;
  const toDate = document.getElementById('filterToDate').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();
  const state = document.getElementById('filterState').value;
  const selectedTrips = getSelectedTrips();
  const currentParams = JSON.stringify({ fromDate, toDate, search, state, selectedTrips });
  if (currentParams === lastFilterParams && filteredInvoices.length > 0) return;
  lastFilterParams = currentParams;
  
  let fromDateObj = null, toDateObj = null;
  if (fromDate) { fromDateObj = new Date(fromDate); fromDateObj.setHours(0,0,0,0); }
  if (toDate) { toDateObj = new Date(toDate); toDateObj.setHours(23,59,59,999); }
  
  filteredInvoices = [];
  for (let inv of allInvoices) {
    const activeDate = inv.activeDate || '';
    const parsedDate = parseDateFromString(activeDate);
    if (fromDateObj && parsedDate && parsedDate < fromDateObj) continue;
    if (toDateObj && parsedDate && parsedDate > toDateObj) continue;
    if (state && (inv.state || '').toLowerCase() !== state) continue;
    if (selectedTrips.length > 0 && !selectedTrips.includes(inv.trip)) continue;
    if (search) {
      const voucher = (inv.voucherNo || '').toLowerCase();
      const guest = (inv.guestName || '').toLowerCase();
      if (!voucher.includes(search) && !guest.includes(search)) continue;
    }
    filteredInvoices.push(inv);
  }
  doSort();
  currentPage = 1;
  renderTableAndCards();
  renderPagination();
  updateSelectionButtonsState();
  const currentDate = getCurrentDateISO();
  if (currentDate) loadAndPopulateAssignments(currentDate);
}

function doSort() {
  filteredInvoices.sort((a,b) => {
    let aVal = a[sortColumn], bVal = b[sortColumn];
    if (aVal === undefined) aVal = '';
    if (bVal === undefined) bVal = '';
    if (sortColumn === 'rest') { aVal = parseFloat(aVal) || 0; bVal = parseFloat(bVal) || 0; }
    else if (sortColumn === 'activeDate' || sortColumn === 'issueDate') {
      aVal = parseDateFromString(aVal)?.getTime() || 0;
      bVal = parseDateFromString(bVal)?.getTime() || 0;
    } else { aVal = String(aVal).toLowerCase(); bVal = String(bVal).toLowerCase(); }
    if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
    if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
    return 0;
  });
}

function setSort(col) {
  if (sortColumn === col) sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
  else { sortColumn = col; sortDirection = 'asc'; }
  doSort();
  renderTableAndCards();
  renderPagination();
}

function getSortIcon(col) { return sortColumn !== col ? '⇅' : (sortDirection === 'asc' ? '↑' : '↓'); }

function changePageSize() {
  const select = document.getElementById('pageSizeSelect');
  pageSize = parseInt(select.value);
  if (pageSize === -1) pageSize = filteredInvoices.length || 9999;
  currentPage = 1;
  renderTableAndCards();
  renderPagination();
}

function gotoPage(page) { currentPage = page; renderTableAndCards(); renderPagination(); }

function renderPagination() {
  const totalPages = Math.ceil(filteredInvoices.length / pageSize);
  if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  let html = '';
  for (let i = 1; i <= totalPages; i++) html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="gotoPage(${i})">${i}</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function formatRest(restValue, currencySymbol) {
  const num = parseFloat(restValue);
  if (isNaN(num)) return escapeHtml(String(restValue));
  if (num <= 0) return '<span class="rest-zero">✓ Paid</span>';
  return `<span class="rest-pos">${num.toFixed(2)} ${escapeHtml(currencySymbol)}</span>`;
}

function parseDateFromString(dateStr) {
  if (!dateStr) return null;
  if (dateStr instanceof Date && !isNaN(dateStr)) return dateStr;
  const s = dateStr.toString().trim();
  const match = s.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (match) {
    const months = { Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11 };
    return new Date(parseInt(match[3]), months[match[2]], parseInt(match[1]));
  }
  const d = new Date(s);
  return !isNaN(d) ? d : null;
}

function formatValue(val) {
  if (val === undefined || val === null) return '';
  const num = parseFloat(val);
  if (isNaN(num)) return val;
  if (num === 0) return '';
  return num;
}

async function loadAndPopulateAssignments(dateISO) {
  const assignments = await gas('getDailyAssignments', { date: dateISO });
  if (assignments?.success && assignments.data) {
    currentAssignments = assignments.data;
    selectedBeachInstructors = assignments.data.beachInstructors || [];
    selectedBoats = assignments.data.boats || [];
    boatInstructorsMap = assignments.data.boatInstructorsMap || {};
    selectedVehicles = assignments.data.vehicles || [];
  } else {
    currentAssignments = null;
    selectedBeachInstructors = [];
    selectedBoats = [];
    boatInstructorsMap = {};
    selectedVehicles = [];
  }
  updateSelectionBadges();
}

async function openAssignVehicles(voucherNo) {
  const invoice = filteredInvoices.find(i => i.voucherNo === voucherNo);
  if (!invoice) return;
  if (selectedVehicles.length === 0) { showToast('اختر السيارات أولاً من زر السيارات', 'error'); return; }
  
  currentAssignVoucher = voucherNo;
  currentAssignInvoice = invoice;
  const currentDate = getCurrentDateISO();
  const tripName = invoice.trip || '';
  
  let savedVehicles = [];
  try { savedVehicles = JSON.parse(invoice.VehiclesUsed || '[]'); } catch(e) {}
  
  let vehiclesHtml = `<div class="summary-box"><strong>📊 Invoice Summary:</strong><br>Trip: ${escapeHtml(tripName)}<br>Total Passengers: ${(parseInt(invoice.sgl)||0)+(parseInt(invoice.dbl)||0)+(parseInt(invoice.trpl)||0)}</div>
    <div style="overflow-x:auto;"><table style="width:100%;"><thead><tr style="background:var(--navy);color:var(--gold);"><th>Vehicle</th><th>Capacity</th><th>🔄 Go</th><th>🔙 Return</th><th>Adult</th><th>Child</th><th>Infant</th><th>Select</th></tr></thead><tbody>`;
  
  for (const vehId of selectedVehicles) {
    const vehicle = cachedVehicles.find(v => v.id === vehId);
    if (!vehicle) continue;
    const capacity = vehicle.capacity || 0;
    const saved = savedVehicles.find(v => v.vehicleId === vehId);
    const savedGo = saved?.goCount || 0;
    const savedReturn = saved?.returnCount || 0;
    const savedAdult = saved?.adults || 0;
    const savedChild = saved?.children || 0;
    const savedInfant = saved?.infants || 0;
    
    const bookedResult = await gas('getVehicleBookedSeatsForTrip', { date: currentDate, tripName, vehicleId: vehId, excludeVoucher: voucherNo, centerName: currentUser?.centerName });
    const availableGo = Math.max(0, capacity - (bookedResult.goSeats||0) - savedGo);

  function renderSummary() {
  const trips = {};
  
  if (!filteredInvoices || filteredInvoices.length === 0) {
    const summarySec = document.getElementById('summarySec');
    if (summarySec) summarySec.style.display = 'none';
    return;
  }
  
  filteredInvoices.forEach(inv => {
    const sgl = parseInt(inv.Sgl) || parseInt(inv.sgl) || 0;
    const dbl = parseInt(inv.Dbl) || parseInt(inv.dbl) || 0;
    const trpl = parseInt(inv.Trpl) || parseInt(inv.trpl) || 0;
    const extra = parseInt(inv.Extra) || parseInt(inv.extra) || 0;
    
    if (sgl === 0 && dbl === 0 && trpl === 0 && extra === 0) return;
    
    const tripName = (inv.Trip || inv.trip || 'Unknown').trim();
    if (!trips[tripName]) {
      trips[tripName] = { bookings: 0, activities: {} };
    }
    trips[tripName].bookings++;
    
    const activitiesText = (inv.ActivitiesText || inv.activitiesText || '').toString().trim();
    if (activitiesText) {
      activitiesText.split('|').forEach(part => {
        const match = part.trim().match(/^(.+?)×(\d+(\.\d+)?)$/);
        if (match) {
          const activityName = match[1].trim();
          const quantity = parseFloat(match[2]) || 0;
          trips[tripName].activities[activityName] = (trips[tripName].activities[activityName] || 0) + quantity;
        }
      });
    } else {
      if (sgl > 0) trips[tripName].activities['Adult'] = (trips[tripName].activities['Adult'] || 0) + sgl;
      if (dbl > 0) trips[tripName].activities['Child'] = (trips[tripName].activities['Child'] || 0) + dbl;
      if (trpl > 0) trips[tripName].activities['Infant'] = (trips[tripName].activities['Infant'] || 0) + trpl;
      if (extra > 0) trips[tripName].activities['Intro'] = (trips[tripName].activities['Intro'] || 0) + extra;
    }
  });
  
  if (Object.keys(trips).length === 0) {
    const summarySec = document.getElementById('summarySec');
    if (summarySec) summarySec.style.display = 'none';
    return;
  }
  
  let rows = '';
  Object.entries(trips).sort((a, b) => b[1].bookings - a[1].bookings).forEach(([tripName, info]) => {
    const sortedActivities = Object.entries(info.activities).sort((a, b) => b[1] - a[1]);
    const activitiesStr = sortedActivities
      .map(([act, qty]) => `${act}×${Number.isInteger(qty) ? qty : qty.toFixed(1)}`)
      .join(' | ');
    
    rows += `<tr>
      <td><strong>${escapeHtml(tripName)}</strong></td>
      <td style="text-align:center"><span style="background:var(--navy);color:var(--gold);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700">${info.bookings}</span></td>
      <td class="acts-cell" style="white-space:normal; word-break:break-word;">${escapeHtml(activitiesStr || '—')}</span></td>
    </tr>`;
  });
  
  let summaryHtml = `
    <div class="summary-sec" id="summarySec" style="margin-top:16px; padding:14px 20px; background:white; border-top:2px solid var(--border); overflow-x:auto;">
      <div class="summary-title" style="font-size:13px; font-weight:700; color:var(--navy); margin-bottom:8px; text-align:center;">🗺️ Trips Summary</div>
      <div style="overflow-x:auto;">
        <table class="summary-table" style="width:100%; border-collapse:collapse; font-size:12px; margin:0 auto;">
          <thead>
            <tr style="background:var(--navy2); color:var(--gold);">
              <th style="padding:10px 8px; text-align:center; width:28%;">Trip</th>
              <th style="padding:10px 8px; text-align:center; width:15%;">Bookings</th>
              <th style="padding:10px 8px; text-align:center; width:57%;">Activities</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
  
  // ✅ تحديث العنصر الموجود بدلاً من حذفه وإعادة إنشائه
  let existingSummary = document.getElementById('summarySec');
  if (existingSummary) {
    existingSummary.outerHTML = summaryHtml;
  } else {
    const tblWrap = document.querySelector('.tbl-wrap');
    if (tblWrap) {
      tblWrap.insertAdjacentHTML('afterend', summaryHtml);
    }
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  const ud = sessionStorage.getItem('currentUser');
  if (!ud) { window.location.href = 'index.html'; return; }
  try {
    currentUser = JSON.parse(ud);
    document.getElementById('userNameDisplay').textContent = currentUser.name || 'User';
    const today = new Date();
    const todayISO = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    const fromDateInput = document.getElementById('filterFromDate');
    const toDateInput = document.getElementById('filterToDate');
    if (fromDateInput && !fromDateInput.value) fromDateInput.value = todayISO;
    if (toDateInput && !toDateInput.value) toDateInput.value = todayISO;
    showToast('جاري تحميل الفواتير...', 'info');
    await loadInvoices();
    renderTableAndCards();
    setTimeout(async () => {
      try {
        const [instructors, vehicles, boats] = await Promise.all([gas('getInstructors'), gas('getVehicles'), gas('getBoats')]);
        cachedInstructors = instructors;
        cachedVehicles = vehicles;
        cachedBoats = boats;
      } catch(e) { console.warn(e); }
    }, 500);
    if (fromDateInput.value && toDateInput.value && fromDateInput.value === toDateInput.value) {
      setTimeout(() => loadAndPopulateAssignments(fromDateInput.value), 1000);
    }
    updateSelectionButtonsState();
  } catch(e) { console.error(e); window.location.href = 'index.html'; }
});
