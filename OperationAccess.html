<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">

  <meta name="theme-color" content="#1e2b4f">

  <style>
:root {
  --navy: #0f1f3d;
  --navy2: #1a3260;
  --gold: #f5c842;
  --gold2: #e6b800;
  --blue: #2563eb;
  --blue-lt: #3b82f6;
  --green: #16a34a;
  --red: #dc2626;
  --orange: #ea580c;
  --purple: #7c3aed;
  --bg: #f0f4f8;
  --card: #fff;
  --border: #dde4f0;
  --text: #1a2540;
  --text-lt: #5a6a8a;
  --gray-50: #f8fafc;
  --gray-100: #f1f5f9;
  --gray-200: #e2e8f0;
  --gray-500: #64748b;
  --header-bg-start: #0f1f3d;
  --header-bg-end: #1a3260;
  --selection-btn-bg: #0f1f3d;
  --selection-btn-text: #f5c842;
  --selection-badge-bg: #f5c842;
  --selection-badge-text: #0f1f3d;
  --table-header-bg: #0f1f3d;
  --table-header-text: #f5c842;
  --modal-header-border: #f5c842;
  --card-header-bg: #0f1f3d;
  --card-header-text: #f5c842;
  --pagination-active-bg: #0f1f3d;
  --pagination-active-text: #f5c842;
}
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
.header {
  background: linear-gradient(135deg, var(--header-bg-start), var(--header-bg-end));
  color: white; padding: 12px 16px; display: flex; justify-content: space-between;
  align-items: center; flex-wrap: wrap; gap: 10px; position: sticky; top: 0;
  z-index: 200; box-shadow: 0 3px 16px rgba(15,31,61,.25);
}
    .header h2 { color: var(--gold); font-size: 18px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .user-chip { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); border-radius: 40px; padding: 4px 12px; color: white; font-size: 12px; font-weight: 600; }
.back-btn { background: transparent; border: 2px solid rgba(255,255,255,.3); color: white; padding: 4px 12px; border-radius: 40px; cursor: pointer; font-weight: 700; font-size: 12px; transition: all 0.3s ease; }
.back-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(245,200,66,0.1); }

    .selection-bar { background: white; border-bottom: 2px solid var(--border); padding: 12px 16px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; position: sticky; top: 60px; z-index: 199; box-shadow: 0 2px 8px rgba(0,0,0,.05); }
.selection-btn { background: var(--selection-btn-bg); color: var(--selection-btn-text); border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; font-weight: 700; font-size: 12px; display: inline-flex; align-items: center; gap: 8px; transition: all 0.3s ease; }
.selection-btn:hover:not(.disabled) { background: #1a3260; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(15,31,61,0.3); }
.selection-badge { background: var(--selection-badge-bg); color: var(--selection-badge-text); border-radius: 20px; padding: 2px 8px; font-size: 10px; font-weight: 700; margin-left: 8px; }
.reset-selection { background: #f1f5f9; color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 40px; font-size: 11px; cursor: pointer; }

    .filter-bar { background: white; border-bottom: 2px solid var(--border); padding: 10px 16px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; position: sticky; top: 120px; z-index: 198; }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-group label { font-size: 10px; font-weight: 700; color: var(--text-lt); text-transform: uppercase; }
    .filter-group input, .filter-group select { padding: 6px 10px; border: 2px solid var(--border); border-radius: 8px; font-size: 12px; font-family: 'Cairo', sans-serif; background: white; min-width: 140px; }
    .btn-go, .btn-reset, .export-btn { padding: 6px 16px; border-radius: 20px; cursor: pointer; font-weight: 700; font-size: 12px; border: none; }
    .btn-go { background: var(--navy); color: var(--gold); }
    .btn-reset { background: #f1f5f9; border: 1px solid var(--border); }
    .export-btn { background: var(--green); color: white; }

    .tbl-wrap { overflow-x: auto; position: relative; max-height: calc(100vh - 310px); }
    table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 1400px; }
    th, td { padding: 8px 5px; white-space: nowrap; border-bottom: 1px solid var(--border); }
th { background: var(--table-header-bg); color: var(--table-header-text); font-weight: 700; cursor: pointer; position: sticky; top: 0; z-index: 10; transition: background 0.2s ease; }
th:hover { background: #1a3260; }

    .action-buttons { display: flex; flex-direction: row; gap: 4px; justify-content: center; align-items: center; }
    .action-btn { background: var(--blue-lt); color: white; border: none; padding: 4px 6px; border-radius: 8px; cursor: pointer; font-size: 10px; font-weight: 600; min-width: 32px; transition: all 0.2s ease; }
    .action-btn:hover:not(.disabled) { transform: scale(1.1); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .action-btn.upsell { background: var(--orange); }
    .action-btn.instructor { background: var(--green); }
    .action-btn.vehicle { background: var(--purple); }
    .action-btn.boat { background: var(--blue); }
    .action-btn.disabled { opacity: 0.5; pointer-events: none; }
    .status-pending { background: #fef9c3; color: #854d0e; padding: 2px 8px; border-radius: 20px; display: inline-block; font-size: 10px; }
    .status-confirmed { background: #dcfce7; color: #166534; padding: 2px 8px; border-radius: 20px; display: inline-block; font-size: 10px; }
    .rest-pos { color: #dc2626; font-weight: bold; cursor: pointer; }
    .rest-zero { color: #16a34a; font-weight: bold; }
    .pagination { display: flex; justify-content: center; gap: 5px; padding: 12px; background: white; border-top: 1px solid var(--border); flex-wrap: wrap; }
    .page-btn { padding: 4px 9px; border: 1px solid var(--border); background: white; border-radius: 14px; cursor: pointer; font-size: 11px; }
    .page-btn.active { background: var(--pagination-active-bg); color: var(--pagination-active-text); font-weight: 700; }

    /* ========== MODAL ========== */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 10000; }
    .modal.open { display: flex; }
    .modal-content { background: white; width: 90%; max-width: 950px; max-height: 85vh; overflow-y: auto; border-radius: 20px; padding: 20px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--modal-header-border); padding-bottom: 12px; margin-bottom: 16px; }
.modal-header h3 { color: var(--navy); font-weight: 900; }
    .close-modal { font-size: 28px; cursor: pointer; color: var(--gray-500); background: none; border: none; }
    .modal-content table { width: 100%; min-width: auto; font-size: 12px; border-collapse: collapse; }
    .modal-content th, .modal-content td { padding: 8px 6px; white-space: nowrap; border-bottom: 1px solid var(--border); }
    .modal-content th { background: var(--navy); color: var(--gold); font-weight: 700; font-size: 11px; }

    /* ========== SEAT PROGRESS BAR ========== */
    .seat-bar-wrap { width: 80px; height: 8px; background: #e2e8f0; border-radius: 4px; margin: 3px auto; overflow: hidden; }
    .seat-bar-fill { height: 100%; border-radius: 4px; background: var(--green); transition: width 0.3s; }
    .seat-bar-fill.warn { background: var(--orange); }
    .seat-bar-fill.full { background: var(--red); }
    .seat-count-text { font-size: 10px; font-weight: 700; text-align: center; }
    .seat-available { color: var(--green); }
    .seat-warn { color: var(--orange); }
    .seat-full { color: var(--red); }

    /* ========== CUMULATIVE SUMMARY BOX ========== */
    .cumulative-box {
      background: linear-gradient(135deg, #0f1f3d, #1a3260);
      color: white; border-radius: 12px; padding: 14px 18px; margin-bottom: 14px;
      font-size: 12px; line-height: 1.8;
    }
    .cumulative-box .cb-title { color: var(--gold); font-weight: 900; font-size: 13px; margin-bottom: 8px; }
    .cumulative-box .cb-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
    .cumulative-box .cb-item { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 6px 12px; text-align: center; min-width: 80px; }
    .cumulative-box .cb-item .cb-val { font-size: 16px; font-weight: 900; color: var(--gold); }
    .cumulative-box .cb-item .cb-label { font-size: 9px; opacity: 0.8; }

    .btn { padding: 10px 20px; border: none; border-radius: 30px; font-weight: 700; font-size: 12px; cursor: pointer; }
    .btn-primary { background: var(--navy); color: var(--gold); }
    .btn-secondary { background: var(--gray-200); color: var(--text); }
    .btn-success { background: var(--green); color: white; }

    .toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 16px; border-radius: 10px; font-size: 12px; font-weight: 600; color: white; z-index: 9999; transform: translateY(50px); opacity: 0; transition: 0.35s; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast-success { background: var(--green); }
    .toast-error { background: var(--red); }
    .toast-info { background: var(--blue); }

    .loader { text-align: center; padding: 50px; color: var(--text-lt); }
    .spinner { width: 32px; height: 32px; border: 4px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .badge-vehicle, .badge-boat, .badge-instructor { display: inline-block; background: var(--purple); color: white; padding: 2px 6px; border-radius: 12px; font-size: 9px; margin: 1px; cursor: pointer; }
    .badge-boat { background: var(--blue); }
    .badge-instructor { background: var(--green); }

    @media (max-width: 768px) {
      .tbl-wrap { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      table { font-size: 9px; min-width: 1200px; }
      th, td { padding: 4px 3px; }
      .action-btn { padding: 2px 4px; font-size: 8px; min-width: 24px; }
      .filter-bar { flex-direction: row; flex-wrap: wrap; align-items: center; gap: 6px; padding: 8px 12px; }
      .filter-group { width: auto; flex: 1; min-width: 100px; }
      .filter-group input, .filter-group select { width: 100%; min-width: auto; font-size: 10px; padding: 4px 6px; }
      .modal-content { width: 98%; padding: 10px; }
    }
  </style>
</head>
<body>

<!-- Modals -->

<script>
// ============================================================
// GLOBALS
// ============================================================
const BOAT_TRIPS = ['Private Boat (max 10 persons)', 'Ras Mohamed Boat', 'Local Boat', 'Tiran Island By Boat', 'Boat Trip Half Day'];

let currentUser = null;
let allInvoices = [];
let filteredInvoices = [];
let currentPage = 1;
let pageSize = 30;
let sortColumn = 'activeDate';
let sortDirection = 'asc';
let uniqueTrips = [];

let selectedBeachInstructors = [];
let selectedVehicles = [];
let selectedBoats = [];
let boatInstructorsMap = {};
let currentAssignments = null;

let cachedInstructors = [];
let cachedVehicles = [];
let cachedBoats = [];

let currentAssignVoucher = null;
let currentAssignInvoice = null;

let preloadedData = { logisticsRecords: [], vehicleTripRecords: [], dailyAssignments: {} };
let dataLoaded = false;
let invoicesLoaded = false;
let lastFilterParams = {};

let isLoadingInvoices = false;
let isLoadingAssignments = false;
let lastLoadedDate = null;
let divingTripNames = [];

// ============================================================
// CUMULATIVE SEAT TRACKER
// ============================================================
let vehicleSeatsUsed = {};
let boatSeatsUsed = {};

function buildCumulativeSeats() {
  vehicleSeatsUsed = {};
  boatSeatsUsed = {};

  for (const inv of allInvoices) {
    const date = inv.activeDate || '';
    const trip = inv.trip || '';

    // سيارات
    let vData = [];
    try { vData = JSON.parse(inv.VehiclesUsed || '[]'); } catch(e) {}
    for (const v of vData) {
      if (!vehicleSeatsUsed[date]) vehicleSeatsUsed[date] = {};
      if (!vehicleSeatsUsed[date][v.vehicleId]) vehicleSeatsUsed[date][v.vehicleId] = {};
      if (!vehicleSeatsUsed[date][v.vehicleId][trip]) vehicleSeatsUsed[date][v.vehicleId][trip] = { go: 0, ret: 0 };
      vehicleSeatsUsed[date][v.vehicleId][trip].go += parseInt(v.goCount) || 0;
      vehicleSeatsUsed[date][v.vehicleId][trip].ret += parseInt(v.returnCount) || 0;
    }

    // مراكب
    let bData = [];
    try { bData = JSON.parse(inv.BoatsUsed || '[]'); } catch(e) {}
    for (const b of bData) {
      if (!boatSeatsUsed[date]) boatSeatsUsed[date] = {};
      if (!boatSeatsUsed[date][b.boatId]) boatSeatsUsed[date][b.boatId] = {};
      if (!boatSeatsUsed[date][b.boatId][trip]) boatSeatsUsed[date][b.boatId][trip] = { adults: 0, children: 0, infants: 0 };
      boatSeatsUsed[date][b.boatId][trip].adults += parseInt(b.adults) || 0;
      boatSeatsUsed[date][b.boatId][trip].children += parseInt(b.children) || 0;
      boatSeatsUsed[date][b.boatId][trip].infants += parseInt(b.infants) || 0;
    }
  }
}

function getVehicleUsedSeats(date, vehicleId, tripName, excludeVoucher) {
  let go = 0, ret = 0;
  for (const inv of allInvoices) {
    if (inv.voucherNo === excludeVoucher) continue;
    if ((inv.activeDate || '') !== date) continue;
    if ((inv.trip || '') !== tripName) continue;
    let vData = [];
    try { vData = JSON.parse(inv.VehiclesUsed || '[]'); } catch(e) {}
    for (const v of vData) {
      if (v.vehicleId === vehicleId) {
        go += parseInt(v.goCount) || 0;
        ret += parseInt(v.returnCount) || 0;
      }
    }
  }
  return { go, ret };
}

function getBoatUsedSeats(date, boatId, tripName, excludeVoucher) {
  let adults = 0, children = 0, infants = 0;
  for (const inv of allInvoices) {
    if (inv.voucherNo === excludeVoucher) continue;
    if ((inv.activeDate || '') !== date) continue;
    if ((inv.trip || '') !== tripName) continue;
    let bData = [];
    try { bData = JSON.parse(inv.BoatsUsed || '[]'); } catch(e) {}
    for (const b of bData) {
      if (b.boatId === boatId) {
        adults += parseInt(b.adults) || 0;
        children += parseInt(b.children) || 0;
        infants += parseInt(b.infants) || 0;
      }
    }
  }
  return { adults, children, infants, total: adults + children + infants };
}

// ============================================================
// SESSION CHECK
// ============================================================
if (!Session.checkValidity()) {
  throw new Error('جلسة غير صالحة');
}

// ============================================================
// JSONP / GAS
// ============================================================
function jsonpRequest(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    if (currentUser?.centerName) params.centerName = currentUser.centerName;
    if (currentUser?.centerId) params.centerId = currentUser.centerId;
    params.action = action;
    params.callback = cbName;
    const qs = Object.entries(params).map(([k, v]) => k + '=' + encodeURIComponent(String(v ?? ''))).join('&');
    const script = document.createElement('script');
    const timeout = setTimeout(() => { cleanup(); reject(new Error('Request timeout')); }, 30000);
    const cleanup = () => { clearTimeout(timeout); delete window[cbName]; script.remove(); };
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('Network error')); };
    script.src = CONFIG.GAS_URL + '?' + qs;
    document.head.appendChild(script);
  });
}

function gas(action, params = {}) {
  return new Promise((resolve, reject) => {
    const timeoutId = setTimeout(() => reject(new Error('Request timeout')), 60000);
    jsonpRequest(action, params).then(resolve).catch(reject).finally(() => clearTimeout(timeoutId));
  });
}

let activeToast = null;
function showToast(msg, type = 'info') {
  if (activeToast) { activeToast.remove(); activeToast = null; }
  const toast = document.createElement('div');
  toast.className = `toast toast-${type} show`;

  document.body.appendChild(toast);
  activeToast = toast;
  setTimeout(() => { if (toast && toast.remove) { toast.remove(); if (activeToast === toast) activeToast = null; } }, 3000);
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function formatValue(val) {
  if (val === undefined || val === null) return '';
  const num = parseFloat(val);
  if (isNaN(num)) return val;
  if (num === 0) return '';
  return num;
}

const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

function isoToTxt(iso) {
  if (!iso) return '';
  const parts = iso.split('-');
  if (parts.length !== 3) return '';
  return String(parseInt(parts[2])).padStart(2, '0') + '/' + MONTHS[parseInt(parts[1]) - 1] + '/' + parts[0];
}

function txtToISO(txt) {
  if (!txt) return '';
  const match = txt.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (!match) return '';
  const day = match[1].padStart(2, '0');
  const monthIndex = MONTHS.findIndex(m => m.toLowerCase() === match[2].toLowerCase());
  if (monthIndex === -1) return '';
  return match[3] + '-' + String(monthIndex + 1).padStart(2, '0') + '-' + day;
}

function isValidDateTxt(txt) {
  return /^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(txt || '');
}

function parseDateFromString(dateStr) {
  if (!dateStr) return null;
  if (dateStr instanceof Date && !isNaN(dateStr)) return dateStr;
  const s = dateStr.toString().trim();
  const m1 = s.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (m1) { const mi = MONTHS.findIndex(m => m.toLowerCase() === m1[2].toLowerCase()); return mi >= 0 ? new Date(parseInt(m1[3]), mi, parseInt(m1[1])) : null; }
  const m2 = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m2) return new Date(parseInt(m2[1]), parseInt(m2[2]) - 1, parseInt(m2[3]));
  const m3 = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (m3) { const mo = parseInt(m3[1]) - 1; const d = parseInt(m3[2]); if (mo >= 0 && mo < 12) return new Date(parseInt(m3[3]), mo, d); }
  const d = new Date(s);
  return !isNaN(d) ? d : null;
}

function formatDateDDMMMYYYY(date) {
  if (!date) return '';
  if (typeof date === 'string' && date.match(/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/)) return date;
  if (typeof date === 'string' && date.match(/^\d{4}-\d{2}-\d{2}$/)) return isoToTxt(date);
  const d = date instanceof Date ? date : parseDateFromString(date);
  if (!d || isNaN(d)) return String(date);
  return String(d.getDate()).padStart(2, '0') + '/' + MONTHS[d.getMonth()] + '/' + d.getFullYear();
}

function openCalendar(w) {

    hiddenInput.focus();

  try { hiddenInput.style.cssText = 'position:fixed;top:-200px;left:-200px;opacity:0;width:1px;height:1px;pointer-events:auto;z-index:9999;display:block;'; hiddenInput.showPicker(); } catch(e) { hiddenInput.click(); }
  hiddenInput.addEventListener('change', function onChange() { const val = hiddenInput.value; if (val) { textInput.value = isoToTxt(val); onDateTextChange(); } hiddenInput.style.cssText = 'display:none;'; hiddenInput.removeEventListener('change', onChange); });

function onDateTextChange() {

function onDateBlur(w) {
  setTimeout(() => {
    const txtInput = document.getElementById('filter' + w + 'DateTxt');

  }, 200);
}

function seatBar(used, capacity) {
  const pct = capacity > 0 ? Math.min(100, Math.round(used / capacity * 100)) : 0;
  const cls = pct >= 100 ? 'full' : pct >= 75 ? 'warn' : '';
  const avail = Math.max(0, capacity - used);
  const textCls = pct >= 100 ? 'seat-full' : pct >= 75 ? 'seat-warn' : 'seat-available';
  return `<div class="seat-bar-wrap"><div class="seat-bar-fill ${cls}" style="width:${pct}%"></div></div>
          <div class="seat-count-text ${textCls}">${avail} free / ${capacity}</div>`;
}

async function loadDivingTripNames() {
  try {
    const response = await gas('getTripDefinitions', { centerName: currentUser?.centerName || '' });
    const tripDefs = response?.data || [];
    if (Array.isArray(tripDefs) && tripDefs.length > 0) {
      divingTripNames = tripDefs.filter(t => (t.Category || '').toLowerCase() === 'diving').map(t => t.TripName).filter(Boolean);
    } else divingTripNames = [];
  } catch(e) { divingTripNames = []; }
  return divingTripNames;
}

function isDivingTrip(tripName) {
  if (!tripName) return false;
  if (divingTripNames.length > 0) return divingTripNames.includes(tripName);
  const fullAccess = ['Admin', 'Owner', 'Accountant', 'FinancialManager'];
  if (fullAccess.includes(currentUser?.type)) return true;
  const keywords = ['diving', 'dive', 'scuba', 'snorkel', 'intro', 'diver', 'course'];
  return keywords.some(k => tripName.toLowerCase().includes(k));
}

async function loadInvoices() {
  if (isLoadingInvoices) return;
  if (invoicesLoaded && allInvoices.length > 0) { applyFilters(); return; }
  isLoadingInvoices = true;
  try {
    showToast('جاري تحميل البيانات...', 'info');
    if (divingTripNames.length === 0) await loadDivingTripNames();

    const fromHidden = document.getElementById('filterFromDateHidden')?.value || '';
    const toHidden = document.getElementById('filterToDateHidden')?.value || '';
    const isSingleDate = fromHidden && fromHidden === toHidden;

    let result;
    if (isSingleDate) {
      const parts = fromHidden.split('-');
      const formattedDate = `${parts[2]}/${MONTHS[parseInt(parts[1]) - 1]}/${parts[0]}`;
      result = await gas('getInvoicesByDate', { dateStr: formattedDate, centerName: currentUser?.centerName });
    } else {
      result = await gas('getAllInvoices', { includeCollection: 'true', centerName: currentUser?.centerName });
    }

    if (Array.isArray(result)) {
      let invoices = result.filter(inv => ['confirmed', 'pending'].includes((inv.State || inv.state || '').toLowerCase()));
      invoices = invoices.filter(inv => isDivingTrip(inv.Trip || inv.trip || ''));
      // normalize field names
      allInvoices = invoices.map(inv => ({
        ...inv,
        voucherNo: inv.voucherNo || inv.VoucherNo || '',
        trip: inv.trip || inv.Trip || '',
        activeDate: inv.activeDate || inv.ActiveDate || '',
        issueDate: inv.issueDate || inv.IssueDate || '',
        state: (inv.state || inv.State || '').toLowerCase(),
        guestName: inv.guestName || inv.GuestName || '',
        hotel: inv.hotel || inv.Hotel || '',
        roomNo: inv.roomNo || inv.RoomNo || '',
        nationality: inv.nationality || inv.Nationality || '',
        contactNo: inv.contactNo || inv.ContactNo || '',
        supplier: inv.supplier || inv.Supplier || '',
        customer: inv.customer || inv.Customer || '',
        notes: inv.notes || inv.Notes || '',
        sgl: inv.sgl || inv.Sgl || 0,
        dbl: inv.dbl || inv.Dbl || 0,
        trpl: inv.trpl || inv.Trpl || 0,
        extra: inv.extra || inv.Extra || 0,
        camel: inv.camel || inv.Camel || 0,
        dinner: inv.dinner || inv.Dinner || 0,
        vipDinner: inv.vipDinner || inv.VipDinner || 0,
        starGazing: inv.starGazing || inv.StarGazing || 0,
        privateTrip: inv.privateTrip || inv.PrivateTrip || 0,
        privateTransfer: inv.privateTransfer || inv.PrivateTransfer || 0,
        rest: inv.rest || inv.Rest || 0,
        invoiceCurrency: inv.invoiceCurrency || inv.InvoiceCurrency || 'LE',
        time: inv.time || inv.Time || '',
        VehiclesUsed: inv.VehiclesUsed || inv.vehiclesUsed || '[]',
        BoatsUsed: inv.BoatsUsed || inv.boatsUsed || '[]',
        InstructorsExecution: inv.InstructorsExecution || inv.instructorsExecution || '[]',
      }));
      invoicesLoaded = true;
      buildCumulativeSeats();
      const tripSet = new Set();
      allInvoices.forEach(inv => { if (inv.trip) tripSet.add(inv.trip); });
      uniqueTrips = Array.from(tripSet).sort();
      initTripFilter();
      applyFilters();
      showToast(`✅ تم تحميل ${allInvoices.length} فاتورة`, 'success');
    }
  } catch(e) {
    showToast('خطأ في التحميل: ' + e.message, 'error');
    allInvoices = [];
  } finally { isLoadingInvoices = false; }
}

let lastFilterParams2 = '';

function initTripFilter() {
  const select = document.getElementById('filterTrip');
  select.innerHTML = '<option value="">All Trips</option>';
  uniqueTrips.forEach(trip => {
    const option = document.createElement('option');
    option.value = trip; option.textContent = trip;
    select.appendChild(option);
  });
  select.addEventListener('change', applyFilters);
}

function getSelectedTrips() {
  const select = document.getElementById('filterTrip');
  const selected = [];
  for (let i = 0; i < select.options.length; i++) {
    if (select.options[i].selected && select.options[i].value !== '') selected.push(select.options[i].value);
  }
  const hasAll = Array.from(select.options).some(o => o.selected && o.value === '');
  return (hasAll || selected.length === 0) ? [] : selected;
}

function applyFilters() {
  const fromHidden = document.getElementById('filterFromDateHidden')?.value || '';
  const toHidden = document.getElementById('filterToDateHidden')?.value || '';
  let fromDateObj = null, toDateObj = null;
  if (fromHidden) { const p = fromHidden.split('-'); fromDateObj = new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2])); fromDateObj.setHours(0,0,0,0); }
  if (toHidden) { const p = toHidden.split('-'); toDateObj = new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2])); toDateObj.setHours(23,59,59,999); }

  const search = document.getElementById('filterSearch').value.toLowerCase();
  const state = document.getElementById('filterState').value;
  const selectedTrips = getSelectedTrips();

  const currentParams = JSON.stringify({ fromHidden, toHidden, search, state, selectedTrips });
  if (currentParams === lastFilterParams2 && filteredInvoices.length > 0) return;
  lastFilterParams2 = currentParams;

  filteredInvoices = allInvoices.filter(inv => {
    const activeDateObj = parseDateFromString(inv.activeDate);
    if (activeDateObj) { activeDateObj.setHours(0,0,0,0); }
    if (fromDateObj && activeDateObj && activeDateObj < fromDateObj) return false;
    if (toDateObj && activeDateObj && activeDateObj > toDateObj) return false;
    if (state && inv.state !== state) return false;
    if (selectedTrips.length > 0 && !selectedTrips.includes(inv.trip)) return false;
    if (search) {
      if (!inv.voucherNo.toLowerCase().includes(search) && !(inv.guestName || '').toLowerCase().includes(search)) return false;
    }
    return true;
  });

  doSort();
  currentPage = 1;
  renderTable();
  renderPagination();
  updateSelectionButtonsState();

  const currentDate = getCurrentDateISO();
  if (currentDate) loadAndPopulateAssignments(currentDate);
}

function doSort() {
  filteredInvoices.sort((a, b) => {
    let aVal = a[sortColumn], bVal = b[sortColumn];
    if (aVal === undefined) aVal = ''; if (bVal === undefined) bVal = '';
    if (sortColumn === 'rest') { aVal = parseFloat(aVal) || 0; bVal = parseFloat(bVal) || 0; }
    else if (sortColumn === 'activeDate' || sortColumn === 'issueDate') { aVal = parseDateFromString(aVal)?.getTime() || 0; bVal = parseDateFromString(bVal)?.getTime() || 0; }
    else { aVal = String(aVal).toLowerCase(); bVal = String(bVal).toLowerCase(); }
    if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
    if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
    return 0;
  });
}

function setSort(col) {
  if (sortColumn === col) sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
  else { sortColumn = col; sortDirection = 'asc'; }
  doSort(); renderTable(); renderPagination();
}

function getSortIcon(col) { return sortColumn !== col ? '⇅' : (sortDirection === 'asc' ? '↑' : '↓'); }

function gotoPage(page) { currentPage = page; renderTable(); renderPagination(); }

function renderPagination() {
  const totalPages = Math.ceil(filteredInvoices.length / pageSize);
  if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  let html = '';
  for (let i = 1; i <= totalPages; i++) html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="gotoPage(${i})">${i}</button>`;
  document.getElementById('pagination').innerHTML = html;
}

async function openAssignVehicles(voucherNo) {
  const invoice = filteredInvoices.find(i => i.voucherNo === voucherNo);
  if (!invoice) return;

  if (selectedVehicles.length === 0) {
    showToast('⚠️ اختر السيارات أولاً من زر 🚗 Vehicles', 'error');
    return;
  }

  currentAssignVoucher = voucherNo;
  currentAssignInvoice = invoice;

  const tripName = invoice.trip;
  const activeDate = invoice.activeDate;
  const adults = parseInt(invoice.sgl) || 0;
  const children = parseInt(invoice.dbl) || 0;
  const infants = parseInt(invoice.trpl) || 0;
  const totalPass = adults + children;

  let relevantVehicleIds = [...selectedVehicles];

  // ✅ جلب سجلات VehicleTripRecords لإضافة أي سيارات مفقودة
  try {
    const res = await gas('getVehicleTripRecords', { date: activeDate, centerName: currentUser?.centerName });
    if (res?.success && Array.isArray(res.data)) {
      const forThisTrip = res.data.filter(r => (r.TripName || r.tripName) === tripName);
      for (const r of forThisTrip) {
        const vId = r.VehicleID || r.vehicleId;
        if (vId && !relevantVehicleIds.includes(vId)) relevantVehicleIds.push(vId);
      }
    }
  } catch(e) { console.warn('VehicleTripRecords load failed:', e); }

  // ✅ إضافة السيارات المحفوظة في الفاتورة
  let savedVehicles = [];
  try { savedVehicles = JSON.parse(invoice.VehiclesUsed || '[]'); } catch(e) {}
  for (const sv of savedVehicles) {
    if (sv.vehicleId && !relevantVehicleIds.includes(sv.vehicleId)) relevantVehicleIds.push(sv.vehicleId);
  }

  // ✅ إذا لم توجد سيارات، استخدم جميع السيارات المختارة
  if (relevantVehicleIds.length === 0) relevantVehicleIds = selectedVehicles;

  // ✅ إزالة التكرارات
  relevantVehicleIds = [...new Set(relevantVehicleIds)];

  document.getElementById('assignVehiclesContent').innerHTML = '<div class="loader"><div class="spinner"></div>جاري التحميل...</div>';
  openModal('assignVehiclesModal');

  // حساب الأماكن لكل سيارة
  const rows = [];
  for (const vehId of relevantVehicleIds) {
    const vehicle = cachedVehicles.find(v => v.id === vehId);
    if (!vehicle) continue;
    const capacity = parseInt(vehicle.capacity) || 0;
    const used = getVehicleUsedSeats(activeDate, vehId, tripName, voucherNo);
    const saved = savedVehicles.find(v => v.vehicleId === vehId) || {};
    rows.push({ vehicle, capacity, usedGo: used.go, usedRet: used.ret, saved });
  }

  if (rows.length === 0) {

      <div class="cumulative-box"><div class="cb-title">⚠️ لا توجد سيارات مرتبطة برحلة: ${escapeHtml(tripName)}</div>

      <div style="text-align:right;margin-top:12px;"><button class="btn btn-secondary" onclick="closeModal('assignVehiclesModal')">إغلاق</button></div>`;
    return;
  }

  // بناء ملخص تراكمي لكل السيارات في هذه الرحلة واليوم
  let cumulativeGoTotal = 0, cumulativeRetTotal = 0, cumulativeCapTotal = 0;
  rows.forEach(r => { cumulativeGoTotal += r.usedGo; cumulativeRetTotal += r.usedRet; cumulativeCapTotal += r.capacity; });

  let html = `
    <div class="cumulative-box">
      <div class="cb-title">📊 ملخص الفاتورة — ${escapeHtml(tripName)}</div>

        <br>📋 إجمالي الركاب: <strong>${totalPass}</strong>
      </div>
      <div class="cb-title" style="font-size:11px;margin-bottom:6px;">إجمالي تراكمي لهذه الرحلة واليوم (بدون هذه الفاتورة):</div>
      <div class="cb-row">
        <div class="cb-item"><div class="cb-val">${cumulativeGoTotal}</div><div class="cb-label">🔄 ذهاب مشغول</div></div>
        <div class="cb-item"><div class="cb-val">${cumulativeRetTotal}</div><div class="cb-label">🔙 عودة مشغولة</div></div>
        <div class="cb-item"><div class="cb-val">${cumulativeCapTotal}</div><div class="cb-label">🚗 إجمالي طاقة</div></div>
        <div class="cb-item"><div class="cb-val" style="color:#4ade80">${Math.max(0, cumulativeCapTotal - cumulativeGoTotal)}</div><div class="cb-label">🟢 ذهاب شاغر</div></div>

      </div>
    </div>

      <table style="width:100%;font-size:12px;border-collapse:collapse;">

            <th>🚗 السيارة</th>
            <th>🎫 طاقة</th>
            <th>🔄 ذهاب مشغول</th>
            <th>🔙 عودة مشغولة</th>
            <th>🟢 ذهاب شاغر</th>
            <th>🟢 عودة شاغرة</th>
            <th>📌 ذهاب (هذه الفاتورة)</th>
            <th>📌 عودة (هذه الفاتورة)</th>
            <th>👤 بالغ</th>
            <th>👶 طفل</th>
            <th>🍼 رضيع</th>
            <th>☑️</th>
          </tr>
        </thead>
        <tbody>
  `;

  for (const { vehicle, capacity, usedGo, usedRet, saved } of rows) {
    const availGo = Math.max(0, capacity - usedGo);
    const availRet = Math.max(0, capacity - usedRet);
    const defGo = saved.goCount !== undefined ? saved.goCount : Math.min(totalPass, availGo);
    const defRet = saved.returnCount !== undefined ? saved.returnCount : Math.min(totalPass, availRet);
    const defA = saved.adults !== undefined ? saved.adults : adults;
    const defC = saved.children !== undefined ? saved.children : children;
    const defI = saved.infants !== undefined ? saved.infants : infants;
    const isChecked = saved.goCount !== undefined || saved.returnCount !== undefined;

    const goBarPct = capacity > 0 ? Math.min(100, Math.round(usedGo / capacity * 100)) : 0;
    const retBarPct = capacity > 0 ? Math.min(100, Math.round(usedRet / capacity * 100)) : 0;
    const goCls = goBarPct >= 100 ? 'full' : goBarPct >= 75 ? 'warn' : '';
    const retCls = retBarPct >= 100 ? 'full' : retBarPct >= 75 ? 'warn' : '';
    const goAvailCls = availGo === 0 ? 'seat-full' : availGo <= 2 ? 'seat-warn' : 'seat-available';
    const retAvailCls = availRet === 0 ? 'seat-full' : availRet <= 2 ? 'seat-warn' : 'seat-available';

    html += `
      <tr>
        <td style="background:var(--navy);color:var(--gold);font-weight:700;padding:8px;">
          <strong>${escapeHtml(vehicle.licensePlate || vehicle.id)}</strong><br>
          <span style="font-size:9px;opacity:0.8;">🧑‍✈️ ${escapeHtml(vehicle.driverName || '—')}</span><br>
          <span style="font-size:9px;opacity:0.6;">${escapeHtml(vehicle.id)}</span>

        <td style="text-align:center;font-weight:700">${capacity}</td>
        <td style="text-align:center">
          <div class="seat-bar-wrap"><div class="seat-bar-fill ${goCls}" style="width:${goBarPct}%"></div></div>
          <div class="seat-count-text">${usedGo} / ${capacity}</div>
        </td>
        <td style="text-align:center">
          <div class="seat-bar-wrap"><div class="seat-bar-fill ${retCls}" style="width:${retBarPct}%"></div></div>
          <div class="seat-count-text">${usedRet} / ${capacity}</div>
        </td>
        <td style="text-align:center"><span class="${goAvailCls}" style="font-weight:700;font-size:13px;">${availGo}</span></td>
        <td style="text-align:center"><span class="${retAvailCls}" style="font-weight:700;font-size:13px;">${availRet}</span></td>
        <td style="text-align:center">

  html += `
        </tbody>
      </table>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border);">

  `;

  document.getElementById('assignVehiclesContent').innerHTML = html;
}

// تحديث الأماكن الشاغرة لحظياً عند تغيير حقل الذهاب
function onVehicleGoChange(vehicleId, input) {
  const capacity = parseInt(input.dataset.capacity) || 0;
  const usedGo = parseInt(input.dataset.usedGo) || 0;
  const entered = parseInt(input.value) || 0;
  const remaining = Math.max(0, capacity - usedGo - entered);
  const el = document.getElementById('go-avail-' + vehicleId);
  if (el) {
    el.textContent = `→ ${remaining} شاغر`;
    el.className = 'seat-count-text ' + (remaining === 0 ? 'seat-full' : remaining <= 2 ? 'seat-warn' : 'seat-available');
  }
}

function onVehicleRetChange(vehicleId, input) {
  const capacity = parseInt(input.dataset.capacity) || 0;
  const usedRet = parseInt(input.dataset.usedRet) || 0;
  const entered = parseInt(input.value) || 0;
  const remaining = Math.max(0, capacity - usedRet - entered);
  const el = document.getElementById('ret-avail-' + vehicleId);
  if (el) {
    el.textContent = `→ ${remaining} شاغر`;
    el.className = 'seat-count-text ' + (remaining === 0 ? 'seat-full' : remaining <= 2 ? 'seat-warn' : 'seat-available');
  }
}

async function saveVehicleAssignment() {
  const saveBtn = document.querySelector('#assignVehiclesModal .btn-primary');
  if (saveBtn?.disabled) return;

  let selectedVehiclesData = [];
  document.querySelectorAll('#assignVehiclesModal .assign-select:checked').forEach(cb => {
    const vehId = cb.getAttribute('data-id');
    const goCount = parseInt(document.querySelector(`.assign-go[data-id="${vehId}"]`)?.value) || 0;
    const returnCount = parseInt(document.querySelector(`.assign-return[data-id="${vehId}"]`)?.value) || 0;
    const adult = parseInt(document.querySelector(`.assign-adult[data-id="${vehId}"]`)?.value) || 0;
    const child = parseInt(document.querySelector(`.assign-child[data-id="${vehId}"]`)?.value) || 0;
    const infant = parseInt(document.querySelector(`.assign-infant[data-id="${vehId}"]`)?.value) || 0;
    const vehicle = cachedVehicles.find(v => v.id === vehId);
    selectedVehiclesData.push({ vehicleId: vehId, licensePlate: vehicle?.licensePlate || '', driverName: vehicle?.driverName || '', goCount, returnCount, adults: adult, children: child, infants: infant, totalSeats: adult + child });
  });

  if (selectedVehiclesData.length === 0) { showToast('⚠️ اختر سيارة واحدة على الأقل', 'error'); return; }
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '⏳ جاري الحفظ...'; }

  try {
    const result = await gas('assignVehiclesToInvoice', { voucherNo: currentAssignVoucher, vehiclesData: JSON.stringify(selectedVehiclesData), centerName: currentUser?.centerName });
    if (result?.success) {
      updateLocalInvoice(currentAssignVoucher, 'VehiclesUsed', JSON.stringify(selectedVehiclesData));
      buildCumulativeSeats();
      renderTable();
      showToast('✅ تم حفظ تخصيص السيارات', 'success');
      closeModal('assignVehiclesModal');
    } else showToast('❌ فشل الحفظ: ' + (result?.message || ''), 'error');
  } catch(e) { showToast('❌ خطأ: ' + e.message, 'error'); }
  finally { if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '✅ حفظ التخصيص'; } }
}

async function saveBoatAssignment() {
  const saveBtn = document.querySelector('#assignBoatsModal .btn-primary');
  if (saveBtn?.disabled) return;

  let selectedBoatsData = [];
  document.querySelectorAll('#assignBoatsModal .assign-select:checked').forEach(cb => {
    const boatId = cb.getAttribute('data-id');
    const adult = parseInt(document.querySelector(`.assign-adult[data-id="${boatId}"]`)?.value) || 0;
    const child = parseInt(document.querySelector(`.assign-child[data-id="${boatId}"]`)?.value) || 0;
    const infant = parseInt(document.querySelector(`.assign-infant[data-id="${boatId}"]`)?.value) || 0;
    const boat = cachedBoats.find(b => b.id === boatId);
    selectedBoatsData.push({ boatId, boatName: boat?.name || '', adults: adult, children: child, infants: infant, totalSeats: adult + child + infant });
  });

  if (selectedBoatsData.length === 0) { showToast('⚠️ اختر مركباً واحداً على الأقل', 'error'); return; }
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '⏳ جاري الحفظ...'; }

  try {
    const result = await gas('assignBoatsToInvoice', { voucherNo: currentAssignVoucher, boatsData: JSON.stringify(selectedBoatsData), centerName: currentUser?.centerName });
    if (result?.success) {
      updateLocalInvoice(currentAssignVoucher, 'BoatsUsed', JSON.stringify(selectedBoatsData));
      buildCumulativeSeats();
      renderTable();
      showToast('✅ تم حفظ تخصيص المراكب', 'success');
      closeModal('assignBoatsModal');
    } else showToast('❌ فشل الحفظ: ' + (result?.message || ''), 'error');
  } catch(e) { showToast('❌ خطأ: ' + e.message, 'error'); }
  finally { if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '✅ حفظ التخصيص'; } }
}

function classifyActivity(activityName) {
  const lower = activityName.toLowerCase();
  if (['1 intro','intro','sgl intro','*1 intro','intro diver'].includes(lower)) return { type: 'single_intro', column: 'extra', multiplier: 1, display: '1 Intro' };
  if (['2 intro','dbl intro','*2 intro'].includes(lower)) return { type: 'double_intro', column: 'extra', multiplier: 2, display: '2 Intro' };
  if (['diver','fun diver','1 diver','diving'].includes(lower)) return { type: 'diver', column: 'sgl', multiplier: 1, display: 'Diver' };
  if (['course','owd course','aowd course','course diver'].includes(lower)) return { type: 'course', column: 'dbl', multiplier: 1, display: 'Course' };
  if (['check dive','cd','c.d.','c. d.','c d'].includes(lower)) return { type: 'check_dive', column: 'sgl', multiplier: 1, display: 'C.D.' };
  if (['scuba review','sr','s.r.','s r'].includes(lower)) return { type: 'scuba_review', column: 'dbl', multiplier: 1, display: 'S.R.' };
  return null;
}

async function openAssignInstructors(voucherNo) {
  const invoice = filteredInvoices.find(i => i.voucherNo === voucherNo);
  if (!invoice) return;
  currentAssignVoucher = voucherNo;
  currentAssignInvoice = invoice;

  const adults = parseInt(invoice.sgl) || 0;
  const children = parseInt(invoice.dbl) || 0;
  const infants = parseInt(invoice.trpl) || 0;

  let assignedBoats = [];
  try { assignedBoats = JSON.parse(invoice.BoatsUsed || '[]'); } catch(e) {}
  const boatIds = assignedBoats.map(b => b.boatId);
  const hasBoat = boatIds.length > 0;

  let relevantInstructorIds = new Set();
  if (hasBoat) {
    for (const boatId of boatIds) {
      const instructors = boatInstructorsMap[boatId];
      if (instructors) (Array.isArray(instructors) ? instructors : [instructors]).forEach(id => relevantInstructorIds.add(id));
    }
  } else {
    relevantInstructorIds = new Set(selectedBeachInstructors);
  }

  let instructors = cachedInstructors;
  if (!instructors.length) {
    instructors = await gas('getInstructors', { centerName: currentUser?.centerName });
    cachedInstructors = instructors;
  }

  const relevantInstructors = instructors.filter(inst => relevantInstructorIds.has(inst.id));
  if (relevantInstructorIds.size === 0) { showToast('⚠️ لا يوجد مدربون متاحون', 'error'); return; }

  const excludedKeywords = ['adult', 'child', 'inf', 'infant'];
  let activityItems = [], activityMapping = [];
  try {
    const tripDef = await gas('getTripDefinition', { tripName: invoice.trip });
    if (tripDef?.items && Array.isArray(tripDef.items)) {
      for (const item of tripDef.items) {
        if (excludedKeywords.some(k => (item || '').toLowerCase() === k)) continue;
        const classified = classifyActivity(item);
        if (classified && !activityMapping.find(a => a.display === classified.display)) {
          activityMapping.push(classified); activityItems.push(classified.display);
        } else if (!classified && item?.trim()) {
          activityItems.push(item);
          activityMapping.push({ type: item.toLowerCase().replace(/ /g, '_'), column: 'extra', multiplier: 1, display: item });
        }
      }
    }
  } catch(e) {}

  if (activityItems.length === 0) {
    activityItems = ['1 Intro', '2 Intro', 'Diver', 'C.D.', 'S.R.'];
    activityMapping = [
      { type: 'single_intro', column: 'extra', multiplier: 1, display: '1 Intro' },
      { type: 'double_intro', column: 'extra', multiplier: 2, display: '2 Intro' },
      { type: 'diver', column: 'sgl', multiplier: 1, display: 'Diver' },
      { type: 'check_dive', column: 'sgl', multiplier: 1, display: 'C.D.' },

    rowsHtml += `<td style="text-align:center;padding:8px;"><input type="checkbox" class="assign-select" data-id="${instId}" style="width:18px;height:18px;cursor:pointer;"></td></tr>`;
  }

  const boatNames = boatIds.map(id => cachedBoats.find(b => b.id === id)?.name || id).join(', ');

  const instructorsHtml = `
    <div class="cumulative-box">
      <div class="cb-title">📊 بيانات الفاتورة</div>
      ${hasBoat ? `<div>⛵ المراكب: <strong>${escapeHtml(boatNames)}</strong></div>` : `<div>🏖️ مدربو الشاطئ</div>`}

      <div>👤 بالغ: <strong>${adults}</strong> &nbsp;|&nbsp; 👶 أطفال: <strong>${children}</strong> &nbsp;|&nbsp; 🍼 رضع: <strong>${infants}</strong></div>
    </div>
    <div style="overflow-x:auto;max-height:400px;">
      <table style="width:100%;font-size:12px;border-collapse:collapse;">
        <thead><tr style="background:var(--navy);color:var(--gold);">${headersHtml}</tr></thead>
        <tbody>${rowsHtml}</tbody>

      <button class="btn btn-secondary" onclick="closeModal('assignInstructorsModal')">إلغاء</button>

  document.getElementById('assignInstructorsContent').innerHTML = instructorsHtml;

async function saveInstructorAssignmentV3(activityItems, activityMapping) {
  const saveBtn = document.querySelector('#assignInstructorsModal .btn-primary');
  if (saveBtn?.disabled) return;

  let selectedRows = [];
  document.querySelectorAll('#assignInstructorsModal .assign-select:checked').forEach(cb => {
    const instructorId = cb.getAttribute('data-id');
    const instructorActivities = [];
    for (let i = 0; i < activityItems.length; i++) {
      const qty = parseInt(document.querySelector(`.assign-activity[data-instructor="${instructorId}"][data-activity-index="${i}"]`)?.value) || 0;
      if (qty > 0) {
        const mapping = activityMapping[i];
        instructorActivities.push({ activityName: activityItems[i], displayName: mapping?.display || activityItems[i], quantity: qty, multiplier: mapping?.multiplier || 1, column: mapping?.column || 'extra' });
      }
    }
    if (instructorActivities.length > 0) {
      const instructor = cachedInstructors.find(i => i.id === instructorId);
      selectedRows.push({ instructorId, instructorName: instructor?.name || instructorId, activities: instructorActivities });
    }
  });

  if (selectedRows.length === 0) { showToast('⚠️ اختر مدرباً واحداً على الأقل', 'error'); return; }
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '⏳ جاري الحفظ...'; }

  try {
    const result = await gas('assignInstructorsToInvoice', { voucherNo: currentAssignVoucher, instructorsData: JSON.stringify(selectedRows), centerName: currentUser?.centerName });
    if (result?.success) {
      updateLocalInvoice(currentAssignVoucher, 'InstructorsExecution', JSON.stringify(selectedRows));
      renderTable();
      showToast(`✅ تم حفظ ${selectedRows.length} مدرب`, 'success');
      closeModal('assignInstructorsModal');
    } else showToast('❌ فشل الحفظ: ' + (result?.message || ''), 'error');
  } catch(e) { showToast('❌ خطأ: ' + e.message, 'error'); }
  finally { if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '✅ حفظ'; } }
}

let isSavingBeach = false, isSavingBoats = false;

async function loadAndPopulateAssignments(dateISO) {
  if (isLoadingAssignments) return;
  let formattedDate = dateISO;
  if (dateISO?.match(/^\d{4}-\d{2}-\d{2}$/)) {
    const p = dateISO.split('-');
    formattedDate = `${parseInt(p[2])}/${MONTHS[parseInt(p[1]) - 1]}/${p[0]}`;
  }
  if (lastLoadedDate === formattedDate && currentAssignments) { updateSelectionBadges(); return; }
  isLoadingAssignments = true;
  try {
    const assignments = await gas('getDailyAssignments', { date: formattedDate, centerName: currentUser?.centerName });
    if (assignments?.success && assignments.data) {
      currentAssignments = assignments.data;
      selectedBeachInstructors = assignments.data.beachInstructors || [];
      selectedBoats = assignments.data.boats || [];
      boatInstructorsMap = assignments.data.boatInstructorsMap || {};
      selectedVehicles = assignments.data.vehicles || [];
    } else {
      currentAssignments = null;
      selectedBeachInstructors = []; selectedBoats = []; boatInstructorsMap = {}; selectedVehicles = [];
    }
    lastLoadedDate = dateISO;
    updateSelectionBadges();
  } catch(e) {
    selectedBeachInstructors = []; selectedBoats = []; boatInstructorsMap = {}; selectedVehicles = [];
    updateSelectionBadges();
  } finally { isLoadingAssignments = false; }
}

function generateVehicleTripRow(index, selectedVehicleId, selectedTrip, goCount, returnCount, vehicles, trips) {
  const goVal = goCount > 0 ? goCount : '';
  const retVal = returnCount > 0 ? returnCount : '';
  return `
    <div class="vehicle-trip-row" data-row-index="${index}" style="display:flex;gap:8px;align-items:center;padding:8px;background:var(--gray-50);border-radius:8px;flex-wrap:wrap;">
      <div style="flex:2;min-width:140px;">
        <select class="vehicle-select" data-row="${index}" style="width:100%;padding:6px;border-radius:6px;border:1px solid var(--border);font-size:11px;">
          <option value="">-- اختر السيارة --</option>
          ${vehicles.map(v => `<option value="${v.id}" ${selectedVehicleId === v.id ? 'selected' : ''}>${escapeHtml(v.licensePlate)} (${v.capacity} مقعد)</option>`).join('')}
        </select>
      </div>
      <div style="flex:2;min-width:120px;">
        <select class="trip-select" data-row="${index}" style="width:100%;padding:6px;border-radius:6px;border:1px solid var(--border);font-size:11px;">
          <option value="">-- اختر الرحلة --</option>
          ${trips.map(t => `<option value="${escapeHtml(t)}" ${selectedTrip === t ? 'selected' : ''}>${escapeHtml(t)}</option>`).join('')}
        </select>
      </div>
      <div style="flex:1;min-width:65px;">
        <input type="number" class="go-count" data-row="${index}" value="${goVal}" min="0" placeholder="ذهاب" style="width:100%;padding:5px;text-align:center;border-radius:6px;border:1px solid var(--border);font-size:11px;">
      </div>
      <div style="flex:1;min-width:65px;">
        <input type="number" class="return-count" data-row="${index}" value="${retVal}" min="0" placeholder="عودة" style="width:100%;padding:5px;text-align:center;border-radius:6px;border:1px solid var(--border);font-size:11px;">
      </div>
      <div><button class="btn btn-secondary" onclick="removeVehicleTripRow(${index})" style="padding:4px 8px;font-size:11px;background:var(--red);color:white;">🗑️</button></div>
    </div>
  `;
}

function attachVehicleTripEvents(index) {
  const vehicleSelect = document.querySelector(`.vehicle-select[data-row="${index}"]`);
  const tripSelect = document.querySelector(`.trip-select[data-row="${index}"]`);
  const goInput = document.querySelector(`.go-count[data-row="${index}"]`);
  const returnInput = document.querySelector(`.return-count[data-row="${index}"]`);
  if (vehicleSelect) vehicleSelect.onchange = () => { if (!vehicleTripRows[index]) vehicleTripRows[index] = {}; vehicleTripRows[index].vehicleId = vehicleSelect.value; };
  if (tripSelect) tripSelect.onchange = () => { if (!vehicleTripRows[index]) vehicleTripRows[index] = {}; vehicleTripRows[index].tripName = tripSelect.value; };
  if (goInput) goInput.oninput = () => { if (!vehicleTripRows[index]) vehicleTripRows[index] = {}; vehicleTripRows[index].goCount = parseInt(goInput.value) || 0; };
  if (returnInput) returnInput.oninput = () => { if (!vehicleTripRows[index]) vehicleTripRows[index] = {}; vehicleTripRows[index].returnCount = parseInt(returnInput.value) || 0; };
}

function addVehicleTripRow() {
  const newIndex = vehicleTripRows.length;
  vehicleTripRows.push({ vehicleId: '', tripName: '', goCount: 0, returnCount: 0 });
  const passengerVehicles = cachedVehicles.filter(v => v.isActive === true && v.usageType === 'passengers' && v.capacity > 0);
  const tripsOnDate = [...new Set(filteredInvoices.map(inv => inv.trip).filter(t => t))];
  const container = document.getElementById('vehicleRowsContainer');
  container.insertAdjacentHTML('beforeend', generateVehicleTripRow(newIndex, '', '', 0, 0, passengerVehicles, tripsOnDate));
  attachVehicleTripEvents(newIndex);
}

function removeVehicleTripRow(index) {
  vehicleTripRows.splice(index, 1);
  const passengerVehicles = cachedVehicles.filter(v => v.isActive === true && v.usageType === 'passengers' && v.capacity > 0);
  const tripsOnDate = [...new Set(filteredInvoices.map(inv => inv.trip).filter(t => t))];
  let html = '';
  vehicleTripRows.forEach((row, i) => { html += generateVehicleTripRow(i, row.vehicleId, row.tripName, row.goCount, row.returnCount, passengerVehicles, tripsOnDate); });
  if (vehicleTripRows.length === 0) html += generateVehicleTripRow(0, '', '', 0, 0, passengerVehicles, tripsOnDate);
  document.getElementById('vehicleRowsContainer').innerHTML = html;
  for (let i = 0; i < vehicleTripRows.length; i++) attachVehicleTripEvents(i);
}

async function saveAllVehicleTripRows() {
  const saveBtn = document.querySelector('#vehiclesModal .btn-primary');
  if (saveBtn?.disabled) return;
  const currentDate = getCurrentDateISO();
  if (!currentDate) { showToast('اختر تاريخاً أولاً', 'error'); return; }

  const rows = document.querySelectorAll('.vehicle-trip-row');
  const records = [];
  const selectedVehicleIds = [];
  const vehicleTripMapNew = {};

  rows.forEach(row => {
    const vehicleId = row.querySelector('.vehicle-select')?.value || '';
    const tripName = row.querySelector('.trip-select')?.value || '';
    const goCount = parseInt(row.querySelector('.go-count')?.value) || 0;
    const returnCount = parseInt(row.querySelector('.return-count')?.value) || 0;
    if (vehicleId && tripName && (goCount > 0 || returnCount > 0)) {
      records.push({ vehicleId, tripName, goCount, returnCount });
      if (!selectedVehicleIds.includes(vehicleId)) selectedVehicleIds.push(vehicleId);
      vehicleTripMapNew[vehicleId] = tripName;
    }
  });

  if (records.length === 0) { showToast('⚠️ اختر سيارة ورحلة وأدخل أرقاماً', 'error'); return; }
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '⏳ جاري الحفظ...'; }

  try {
    const result = await gas('saveVehicleTripRecords', { date: currentDate, records: JSON.stringify(records), centerName: currentUser?.centerName });
    if (result?.success) {
      selectedVehicles = selectedVehicleIds;
      if (!currentAssignments) currentAssignments = {};
      currentAssignments.vehicleTripMap = vehicleTripMapNew;
      currentAssignments.vehicles = selectedVehicles;
      updateSelectionBadges();
      await loadAndPopulateAssignments(currentDate);
      showToast(`✅ تم حفظ ${records.length} سيارة`, 'success');
      closeModal('vehiclesModal');
    } else showToast('❌ فشل الحفظ: ' + (result?.message || ''), 'error');
  } catch(e) { showToast('خطأ: ' + e.message, 'error'); }
  finally { if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '✅ حفظ الكل'; } }
}

      });

async function saveBoatsAndInstructorsV2() {
  if (isSavingBoats) return;
  const saveBtn = document.querySelector('#boatsModal .btn-primary');
  if (saveBtn?.disabled) return;
  const currentDate = getCurrentDateISO();
  if (!currentDate) { showToast('اختر تاريخاً أولاً', 'error'); return; }

  const selectedBoatsList = [], instructorsMap = {}, boatTripMap = {};
  document.querySelectorAll('#boatsModal .boat-checkbox:checked').forEach(cb => {
    const boatId = cb.dataset.id;
    selectedBoatsList.push(boatId);
    const tripSelect = document.querySelector(`.boat-trip-select[data-boat="${boatId}"]`);
    if (tripSelect?.value) boatTripMap[boatId] = tripSelect.value;
    const instructors = [];
    document.querySelectorAll(`.boat-instructor-cb[data-boat="${boatId}"]:checked`).forEach(c => instructors.push(c.dataset.instructor));
    if (instructors.length > 0) instructorsMap[boatId] = instructors;
  });

  isSavingBoats = true;
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '⏳ جاري الحفظ...'; }
  showToast('جاري الحفظ...', 'info');

  const currentBeachInstructors = currentAssignments?.beachInstructors || selectedBeachInstructors || [];
  const assignments = { beachInstructors: currentBeachInstructors, boats: selectedBoatsList, boatInstructorsMap: instructorsMap, boatTripMap };

  try {
    await Promise.all([
      gas('deleteInstructorDailyLogsByType', { date: currentDate, assignmentType: 'Boat', centerName: currentUser?.centerName }),
      gas('saveDailyAssignments', { date: currentDate, data: JSON.stringify(assignments), centerName: currentUser?.centerName })
    ]);
    selectedBoats = selectedBoatsList;
    boatInstructorsMap = instructorsMap;
    currentAssignments = assignments;

    const logPromises = [];
    for (const [boatId, instructors] of Object.entries(instructorsMap)) {
      const boat = cachedBoats.find(b => b.id === boatId);
      for (const instructorId of instructors) {
        const instructor = cachedInstructors.find(i => i.id === instructorId);
        if (instructor) logPromises.push(gas('assignInstructorToDailyLog', { date: currentDate, instructorId, instructorName: instructor.name, assignmentType: 'Boat', boatId, boatName: boat?.name || '', centerName: currentUser?.centerName }));
      }
    }
    if (logPromises.length > 0) await Promise.all(logPromises);

    await loadAndPopulateAssignments(currentDate);
    updateSelectionBadges();
    showToast(`✅ تم حفظ ${selectedBoatsList.length} مركب`, 'success');
    closeModal('boatsModal');
  } catch(e) { showToast('خطأ: ' + e.message, 'error'); }
  finally { isSavingBoats = false; if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '✅ حفظ الكل'; } }
}

        <input type="checkbox" class="instructor-checkbox" value="${inst.id}" ${selectedBeachInstructors.includes(inst.id) ? 'checked' : ''} style="width:16px;height:16px;cursor:pointer;">
        <div style="font-size:13px;font-weight:500;">👨‍🏫 ${escapeHtml(inst.name)}</div>
      </div>`;
    }
    if (availableInstructors.length === 0) html += '<div style="padding:20px;text-align:center;font-size:12px;">⚠️ لا يوجد مدربون متاحون</div>';

    html += `
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);">
        <button class="btn btn-secondary" onclick="closeModal('beachInstructorsModal')" style="padding:6px 16px;font-size:12px;">إلغاء</button>
        <button class="btn btn-primary" onclick="saveBeachInstructorsV2()" style="padding:6px 16px;font-size:12px;">✅ حفظ</button>
      </div>
    `;
    document.getElementById('beachInstructorsList').innerHTML = html;
    setTimeout(() => {
      document.getElementById('selectAllInstructors')?.addEventListener('change', e => {
        document.querySelectorAll('#instructorsListContainer .instructor-checkbox').forEach(cb => { cb.checked = e.target.checked; });
      });
    }, 50);
  } catch(e) { showToast('خطأ: ' + e.message, 'error'); }
}

async function saveBeachInstructorsV2() {
  if (isSavingBeach) return;
  const saveBtn = document.querySelector('#beachInstructorsModal .btn-primary');
  if (saveBtn?.disabled) return;
  const selected = [];
  document.querySelectorAll('#beachInstructorsList .instructor-checkbox:checked').forEach(cb => selected.push(cb.value));
  const currentDate = getCurrentDateISO();
  if (!currentDate) { showToast('اختر تاريخاً أولاً', 'error'); return; }

  isSavingBeach = true;
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '⏳ جاري الحفظ...'; }
  const assignments = { ...(currentAssignments || {}), beachInstructors: selected };
  try {
    await Promise.all([
      gas('deleteInstructorDailyLogsByType', { date: currentDate, assignmentType: 'Beach', centerName: currentUser?.centerName }),
      gas('saveDailyAssignments', { date: currentDate, data: JSON.stringify(assignments), centerName: currentUser?.centerName })
    ]);
    selectedBeachInstructors = selected;
    currentAssignments = assignments;
    const logPromises = selected.map(instructorId => {
      const instructor = cachedInstructors.find(i => i.id === instructorId);
      if (instructor) return gas('assignInstructorToDailyLog', { date: currentDate, instructorId, instructorName: instructor.name, assignmentType: 'Beach', boatId: '', boatName: '', centerName: currentUser?.centerName });
      return null;
    }).filter(Boolean);
    if (logPromises.length > 0) await Promise.all(logPromises);
    await loadAndPopulateAssignments(currentDate);
    updateSelectionBadges();
    showToast(`✅ تم حفظ ${selected.length} مدرب شاطئ`, 'success');
    closeModal('beachInstructorsModal');
  } catch(e) { showToast('خطأ: ' + e.message, 'error'); }
  finally { isSavingBeach = false; if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '✅ حفظ'; } }
}

// ============================================================
// LOGISTICS
// ============================================================
let tempLogisticsRows = [];

function generateLogisticsRowHTML(index, selectedVehicleId, selectedTrip, goCount, returnCount, vehicles, trips) {
  const goVal = goCount > 0 ? goCount : '';
  const retVal = returnCount > 0 ? returnCount : '';
  return `
    <div class="logistics-row" data-row-index="${index}" style="display:flex;gap:8px;align-items:center;margin-bottom:10px;padding:8px;background:var(--gray-50);border-radius:8px;flex-wrap:wrap;">
      <select class="logistics-vehicle-select" data-row="${index}" style="flex:2;min-width:140px;padding:6px;border-radius:6px;border:1px solid var(--border);font-size:11px;">
        <option value="">-- اختر السيارة --</option>
        ${vehicles.map(v => `<option value="${v.id}" ${selectedVehicleId === v.id ? 'selected' : ''}>${escapeHtml(v.licensePlate)}</option>`).join('')}
      </select>
      <select class="logistics-trip-select" data-row="${index}" style="flex:2;min-width:120px;padding:6px;border-radius:6px;border:1px solid var(--border);font-size:11px;">
        <option value="">-- اختر الرحلة --</option>
        ${trips.map(t => `<option value="${escapeHtml(t)}" ${selectedTrip === t ? 'selected' : ''}>${escapeHtml(t)}</option>`).join('')}
      </select>
      <input type="number" class="logistics-go-count" data-row="${index}" value="${goVal}" min="0" placeholder="ذهاب" style="flex:1;min-width:65px;padding:6px;text-align:center;border-radius:6px;border:1px solid var(--border);font-size:11px;">
      <input type="number" class="logistics-return-count" data-row="${index}" value="${retVal}" min="0" placeholder="عودة" style="flex:1;min-width:65px;padding:6px;text-align:center;border-radius:6px;border:1px solid var(--border);font-size:11px;">
      <button class="btn btn-secondary" onclick="removeLogisticsRow(${index})" style="padding:4px 8px;font-size:11px;background:var(--red);color:white;">🗑️</button>
    </div>
  `;
}

async function openLogisticsVehicles() {
  const currentDate = getCurrentDateISO();
  if (!currentDate) { showToast('اختر تاريخاً محدداً أولاً', 'error'); return; }
  const tripsOnDate = [...new Set(filteredInvoices.map(inv => inv.trip).filter(t => t))];
  if (tripsOnDate.length === 0) { showToast('لا توجد رحلات في هذا التاريخ', 'error'); return; }
  if (!cachedVehicles.length) { const v = await gas('getVehicles', { centerName: currentUser?.centerName }); cachedVehicles = Array.isArray(v) ? v : []; }
  const luggageVehicles = cachedVehicles.filter(v => v.isActive === true && v.usageType === 'luggage');
  if (luggageVehicles.length === 0) { showToast('⚠️ لا توجد سيارات شحن متاحة', 'error'); return; }
  let existingRecords = Array.isArray(preloadedData.logisticsRecords) ? preloadedData.logisticsRecords : [];
  if (existingRecords.length === 0) {
    try {
      const res = await gas('getLogisticsRecords', { date: currentDate, centerName: currentUser?.centerName });
      if (res?.success && Array.isArray(res.data)) existingRecords = res.data;
    } catch(e) {}
  }

  let html = `
    <div style="max-height:450px;overflow-y:auto;">
      <div style="margin-bottom:12px;padding:8px;background:var(--gray-100);border-radius:8px;font-size:12px;">
        <strong>📅 التاريخ:</strong> ${currentDate}<br>
        <strong>🚌 الرحلات:</strong> ${tripsOnDate.join(', ')}
      </div>
      <div id="logisticsRowsContainer" style="display:flex;flex-direction:column;gap:6px;">
  `;
  if (existingRecords.length > 0) {
    existingRecords.forEach((r, i) => { html += generateLogisticsRowHTML(i, r.VehicleID || r.vehicleId, r.TripName || r.tripName, r.GoCount || r.goCount || 0, r.ReturnCount || r.returnCount || 0, luggageVehicles, tripsOnDate); });
  } else {
    html += generateLogisticsRowHTML(0, '', '', 0, 0, luggageVehicles, tripsOnDate);
  }
  html += `
      </div>
    </div>
    <div style="display:flex;gap:10px;justify-content:space-between;margin-top:12px;">
      <button class="btn btn-success" onclick="addLogisticsRow()" style="padding:6px 12px;font-size:12px;">➕ إضافة صف</button>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary" onclick="closeModal('logisticsVehiclesModal')" style="padding:6px 16px;font-size:12px;">إلغاء</button>
        <button class="btn btn-primary" onclick="saveAllLogisticsRows()" style="padding:6px 16px;font-size:12px;">✅ حفظ الكل</button>
      </div>
    </div>
  `;
  document.getElementById('logisticsVehiclesContent').innerHTML = html;
  openModal('logisticsVehiclesModal');
  tempLogisticsRows = existingRecords.length > 0 ? [...existingRecords] : [{ vehicleId: '', tripName: '', goCount: 0, returnCount: 0 }];
}

function addLogisticsRow() {
  tempLogisticsRows.push({ vehicleId: '', tripName: '', goCount: 0, returnCount: 0 });
  const newIndex = tempLogisticsRows.length - 1;
  const luggageVehicles = cachedVehicles.filter(v => v.isActive === true && v.usageType === 'luggage');
  const tripsOnDate = [...new Set(filteredInvoices.map(inv => inv.trip).filter(t => t))];
  document.getElementById('logisticsRowsContainer').insertAdjacentHTML('beforeend', generateLogisticsRowHTML(newIndex, '', '', 0, 0, luggageVehicles, tripsOnDate));
}

function removeLogisticsRow(index) {
  const row = document.querySelector(`.logistics-row[data-row-index="${index}"]`);
  if (row) row.remove();
}

async function saveAllLogisticsRows() {
  const saveBtn = document.querySelector('#logisticsVehiclesModal .btn-primary');
  if (saveBtn?.disabled) return;
  const currentDate = getCurrentDateISO();
  if (!currentDate) { showToast('اختر تاريخاً أولاً', 'error'); return; }
  const records = [];
  document.querySelectorAll('.logistics-row').forEach(row => {
    const vehicleId = row.querySelector('.logistics-vehicle-select')?.value || '';
    const tripName = row.querySelector('.logistics-trip-select')?.value || '';
    const goCount = parseInt(row.querySelector('.logistics-go-count')?.value) || 0;
    const returnCount = parseInt(row.querySelector('.logistics-return-count')?.value) || 0;
    if (vehicleId && tripName && (goCount > 0 || returnCount > 0)) records.push({ vehicleId, tripName, goCount, returnCount });
  });
  if (records.length === 0) { showToast('⚠️ أدخل بيانات على الأقل', 'error'); return; }
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '⏳ جاري الحفظ...'; }
  try {
    const result = await gas('saveLogisticsRecords', { date: currentDate, records: JSON.stringify(records), centerName: currentUser?.centerName });
    if (result?.success) {
      preloadedData.logisticsRecords = records;
      updateSelectionBadges();
      showToast(`✅ تم حفظ ${records.length} سجل لوجستي`, 'success');
      closeModal('logisticsVehiclesModal');
    } else showToast('❌ فشل الحفظ: ' + (result?.message || ''), 'error');
  } catch(e) { showToast('خطأ: ' + e.message, 'error'); }
  finally { if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '✅ حفظ الكل'; } }
}

let currentTimeVoucher = null;
function openTimePicker(voucherNo, currentTime) {
  currentTimeVoucher = voucherNo;
  const timeInput = document.getElementById('timePickerInput');
  if (timeInput) timeInput.value = currentTime || '09:00';
  openModal('timeModal');
}
async function saveTimeUpdate() {
  if (!currentTimeVoucher) { closeModal('timeModal'); return; }
  const newTime = document.getElementById('timePickerInput').value;
  if (!newTime) { showToast('اختر وقتاً', 'error'); return; }
  try {
    const result = await gas('updateInvoiceTime', { voucherNo: currentTimeVoucher, time: newTime, centerName: currentUser?.centerName });
    if (result?.success) {
      for (let inv of allInvoices) { if (inv.voucherNo === currentTimeVoucher) { inv.time = newTime; break; } }
      renderTable();
      showToast('✅ تم تحديث الوقت', 'success');
      closeModal('timeModal');
    } else showToast('❌ فشل التحديث', 'error');
  } catch(e) { showToast('خطأ: ' + e.message, 'error'); }
}

function updateLocalInvoice(voucherNo, field, value) {
  [allInvoices, filteredInvoices].forEach(arr => {
    const inv = arr.find(i => i.voucherNo === voucherNo);
    if (inv) inv[field] = value;
  });
}

async function resetAllSelections() {
  if (!confirm('هل أنت متأكد من مسح جميع الاختيارات؟')) return;
  const currentDate = getCurrentDateISO();
  if (!currentDate) { showToast('اختر تاريخاً أولاً', 'error'); return; }
  try {
    await gas('resetDailyAssignments', { date: currentDate, centerName: currentUser?.centerName });
    selectedBeachInstructors = []; selectedVehicles = []; selectedBoats = []; boatInstructorsMap = {};
    preloadedData.logisticsRecords = [];
    updateSelectionBadges();
    showToast('✅ تم مسح جميع الاختيارات', 'success');
  } catch(e) { showToast('خطأ: ' + e.message, 'error'); }
}

async function forceRefresh() {
  showToast('جاري التحديث...', 'info');
  lastFilterParams2 = '';
  invoicesLoaded = false;
  await loadInvoices();
  showToast('✅ تم التحديث', 'success');
}

function resetFilters() {
  const today = new Date();
  const todayISO = today.toISOString().split('T')[0];
  document.getElementById('filterFromDateTxt').value = isoToTxt(todayISO);
  document.getElementById('filterToDateTxt').value = isoToTxt(todayISO);
  document.getElementById('filterFromDateHidden').value = todayISO;
  document.getElementById('filterToDateHidden').value = todayISO;
  document.getElementById('filterSearch').value = '';
  document.getElementById('filterState').value = '';
  const select = document.getElementById('filterTrip');
  for (let i = 0; i < select.options.length; i++) select.options[i].selected = false;
  lastFilterParams2 = '';
  filteredInvoices = [...allInvoices];
  doSort(); currentPage = 1; renderTable(); renderPagination(); updateSelectionButtonsState();
}

async function exportToExcel() { showToast('ميزة التصدير قيد التطوير', 'info'); }
function openReportsPage() { window.location.href = 'https://himadivesystem.github.io/dive-system/Reports.html'; }

function openModal(id) {
  const modal = document.getElementById(id);
  if (modal) { modal.style.display = 'flex'; modal.classList.add('open'); document.body.style.overflow = 'hidden'; }
}
function closeModal(id) {
  const modal = document.getElementById(id);
  if (modal) { modal.style.display = 'none'; modal.classList.remove('open'); document.body.style.overflow = ''; }
}

async function loadBranches() {
  if (!currentUser) return;
  const branchAccessTypes = ['Owner', 'Accountant', 'FinancialManager'];
  if (!branchAccessTypes.includes(currentUser.type)) return;
  const branchSelector = document.getElementById('branchSelector');
  if (branchSelector) branchSelector.style.display = 'inline-block';
  try {
    let branches = [];
    if (currentUser.centerId) {
      const result = await gas('getBranchesByCenterId', { centerId: currentUser.centerId });
      if (Array.isArray(result)) branches = result;
      else if (result?.success && Array.isArray(result.data)) branches = result.data;
    }
    const select = document.getElementById('branchSelect');
    if (!select) return;
    select.innerHTML = '<option value="">🌍 جميع الفروع</option>';
    branches.forEach(branch => { select.innerHTML += `<option value="${escapeHtml(branch.id)}">${escapeHtml(branch.name)}</option>`; });
    window.branchesList = branches;
    select.addEventListener('change', async () => {
      lastFilterParams2 = ''; invoicesLoaded = false;
      await loadInvoices(); applyFilters();
    });
  } catch(e) {}
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
  if (typeof Theme !== 'undefined' && Theme.applyToPage) Theme.applyToPage();
  if (typeof Theme !== 'undefined' && Theme.setPageTitle) Theme.setPageTitle('مدير الحركة');

  if (!Session.checkValidity()) return;
  currentUser = Session.getUser();
  if (!currentUser) { location.href = 'index.html'; return; }

  try {
    await loadDivingTripNames();
    await loadBranches();
    document.getElementById('userNameDisplay').textContent = currentUser.name || 'User';

    const today = new Date();
    const todayISO = today.toISOString().split('T')[0];
    document.getElementById('filterFromDateTxt').value = isoToTxt(todayISO);
    document.getElementById('filterToDateTxt').value = isoToTxt(todayISO);
    document.getElementById('filterFromDateHidden').value = todayISO;
    document.getElementById('filterToDateHidden').value = todayISO;

    await loadInvoices();
    const currentDate = getCurrentDateISO();
    if (currentDate) {
      await loadAndPopulateAssignments(currentDate);
      if (!cachedVehicles.length) { const v = await gas('getVehicles', { centerName: currentUser?.centerName }); cachedVehicles = Array.isArray(v) ? v : []; }
      if (!cachedBoats.length) { const b = await gas('getBoats', { centerName: currentUser?.centerName }); cachedBoats = Array.isArray(b) ? b : []; }
      if (!cachedInstructors.length) { const inst = await gas('getInstructors', { centerName: currentUser?.centerName }); cachedInstructors = Array.isArray(inst) ? inst : []; }
    }
  } catch(e) { console.error('Init error:', e); window.location.href = 'index.html'; }
});
