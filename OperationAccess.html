<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Operations Access - Assign Instructors & Vehicles</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0f1f3d;
      --navy2: #1a3260;
      --gold: #f5c842;
      --gold2: #e6b800;
      --blue: #2563eb;
      --blue-lt: #3b82f6;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #ea580c;
      --purple: #7c3aed;
      --bg: #f0f4f8;
      --card: #fff;
      --border: #dde4f0;
      --text: #1a2540;
      --text-lt: #5a6a8a;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-500: #64748b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    /* ========== HEADER & NAVIGATION ========== */
    .header {
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      color: white;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 3px 16px rgba(15,31,61,.25);
    }
    .header h2 { color: var(--gold); font-size: 18px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .user-chip { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); border-radius: 40px; padding: 4px 12px; color: white; font-size: 12px; font-weight: 600; }
    .back-btn { background: transparent; border: 2px solid rgba(255,255,255,.3); color: white; padding: 4px 12px; border-radius: 40px; cursor: pointer; font-weight: 700; font-size: 12px; }
    .back-btn:hover { border-color: var(--gold); color: var(--gold); }
    
    /* ========== SELECTION BAR ========== */
    .selection-bar {
      background: white;
      border-bottom: 2px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      position: sticky;
      top: 60px;
      z-index: 199;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .selection-btn {
      background: var(--navy);
      color: var(--gold);
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .selection-btn.disabled { opacity: 0.5; pointer-events: none; }
    .selection-badge {
      background: var(--gold);
      color: var(--navy);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 700;
      margin-left: 8px;
    }
    .reset-selection {
      background: #f1f5f9;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 40px;
      font-size: 11px;
      cursor: pointer;
    }
    
    /* ========== FILTER BAR ========== */
    .filter-bar {
      background: white;
      border-bottom: 2px solid var(--border);
      padding: 10px 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
      position: sticky;
      top: 120px;
      z-index: 198;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .filter-group label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-lt);
      text-transform: uppercase;
    }
    .filter-group input, 
    .filter-group select {
      padding: 6px 10px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-family: 'Cairo', sans-serif;
      background: white;
      min-width: 140px;
    }
    .btn-go, .btn-reset, .export-btn {
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      border: none;
    }
    .btn-go { background: var(--navy); color: var(--gold); }
    .btn-reset { background: #f1f5f9; border: 1px solid var(--border); }
    .export-btn { background: var(--green); color: white; }
    
    /* ========== TABLE STYLES (Desktop) ========== */
    .tbl-wrap {
      overflow-x: auto;
      position: relative;
      max-height: calc(100vh - 310px);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      min-width: 1400px;
    }
    th, td {
      padding: 8px 5px;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    th {
      background: var(--navy);
      color: var(--gold);
      font-weight: 700;
      cursor: pointer;
      position: sticky;
      top: 0;
      z-index: 10;
      text-shadow: 0 0 2px rgba(0,0,0,0.3);
    }
    .action-buttons {
      display: flex;
      flex-direction: row;
      gap: 4px;
      justify-content: center;
      align-items: center;
    }
    .action-btn {
      background: var(--blue-lt);
      color: white;
      border: none;
      padding: 4px 6px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      min-width: 32px;
    }
    .action-btn.upsell { background: var(--orange); }
    .action-btn.instructor { background: var(--green); }
    .action-btn.vehicle { background: var(--purple); }
    .action-btn.boat { background: var(--blue); }
    .action-btn.disabled { opacity: 0.5; pointer-events: none; }
    .status-pending { background: #fef9c3; color: #854d0e; padding: 2px 8px; border-radius: 20px; display: inline-block; font-size: 10px; }
    .status-confirmed { background: #dcfce7; color: #166534; padding: 2px 8px; border-radius: 20px; display: inline-block; font-size: 10px; }
    .rest-pos { color: #dc2626; font-weight: bold; cursor: pointer; }
    .rest-zero { color: #16a34a; font-weight: bold; }
    .pagination {
      display: flex;
      justify-content: center;
      gap: 5px;
      padding: 12px;
      background: white;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .page-btn {
      padding: 4px 9px;
      border: 1px solid var(--border);
      background: white;
      border-radius: 14px;
      cursor: pointer;
      font-size: 11px;
    }
    .page-btn.active { background: var(--navy); color: var(--gold); }
    
    /* ========== CARD STYLES (Mobile) ========== */
    .cards-container {
      display: none;
      flex-direction: column;
      gap: 16px;
      padding: 16px;
    }
    .invoice-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .card-header {
      background: var(--navy);
      color: var(--gold);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .card-voucher {
      font-weight: 700;
      font-size: 14px;
    }
    .card-rest {
      background: var(--gold);
      color: var(--navy);
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 12px;
    }
    .card-body {
      padding: 12px 16px;
    }
    .card-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--gray-100);
      flex-wrap: wrap;
      gap: 8px;
    }
    .card-label {
      font-weight: 700;
      color: var(--navy);
      font-size: 11px;
      min-width: 100px;
    }
    .card-value {
      font-size: 12px;
      color: var(--text);
      flex: 1;
      text-align: left;
    }
    .card-activities {
      background: var(--gray-50);
      padding: 8px;
      border-radius: 8px;
      margin-top: 8px;
    }
    .card-activities span {
      display: inline-block;
      background: var(--gray-200);
      padding: 2px 6px;
      border-radius: 12px;
      font-size: 10px;
      margin: 2px;
    }
    .card-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      padding: 12px 16px;
      background: var(--gray-50);
      border-top: 1px solid var(--border);
    }
    .card-action-btn {
      background: var(--blue-lt);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .card-action-btn.upsell { background: var(--orange); }
    .card-action-btn.instructor { background: var(--green); }
    .card-action-btn.vehicle { background: var(--purple); }
    .card-action-btn.boat { background: var(--blue); }
    
    /* ========== RESPONSIVE BREAKPOINT ========== */
    @media (max-width: 768px) {
      .tbl-wrap {
        display: block;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .cards-container {
        display: none;
      }
      table {
        font-size: 9px;
        min-width: 1200px;
      }
      th, td {
        padding: 4px 3px;
      }
      .action-btn {
        padding: 2px 4px;
        font-size: 8px;
        min-width: 24px;
      }
      .selection-bar { 
        flex-direction: row; 
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
      }
      .selection-btn {
        padding: 4px 8px;
        font-size: 10px;
      }
      .filter-bar { 
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
      }
      .filter-group { 
        width: auto;
        flex: 1;
        min-width: 100px;
      }
      .filter-group input, 
      .filter-group select { 
        width: 100%; 
        min-width: auto;
        font-size: 10px;
        padding: 4px 6px;
      }
      .btn-go, .btn-reset, .export-btn {
        padding: 4px 10px;
        font-size: 10px;
      }
    }
    
    /* ========== MODAL STYLES ========== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .modal.open {
      display: flex;
    }
    .modal-content {
      background: white;
      width: 90%;
      max-width: 950px;
      max-height: 85vh;
      overflow-y: auto;
      border-radius: 20px;
      padding: 20px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--gold);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }
    .close-modal {
      font-size: 28px;
      cursor: pointer;
      color: var(--gray-500);
      background: none;
      border: none;
    }
    
    /* تحسين الجداول داخل النوافذ */
    .modal-content table {
      width: 100%;
      min-width: auto;
      font-size: 12px;
      border-collapse: collapse;
    }
    .modal-content th,
    .modal-content td {
      padding: 8px 6px;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    .modal-content th {
      background: var(--navy);
      color: var(--gold);
      font-weight: 700;
      font-size: 11px;
    }
    .modal-content input[type="number"],
    .modal-content input[type="text"],
    .modal-content select {
      width: 60px;
      padding: 4px;
      text-align: center;
      font-size: 11px;
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    .modal-content td:first-child,
    .modal-content th:first-child {
      position: sticky;
      left: 0;
      background: var(--navy);
      z-index: 1;
    }
    .modal-content .assign-go,
    .modal-content .assign-return,
    .modal-content .assign-adult,
    .modal-content .assign-child,
    .modal-content .assign-infant {
      width: 55px;
      text-align: center;
    }
    .modal-content input[value="0"] {
      color: transparent;
    }
    
    @media (max-width: 768px) {
      .modal-content {
        width: 98%;
        padding: 10px;
      }
      .modal-content input[type="number"] {
        width: 45px;
      }
      .modal-content table {
        font-size: 10px;
      }
      .modal-content th,
      .modal-content td {
        padding: 4px 3px;
      }
    }
    .modal {
  transition: none !important;
}

.modal-content {
  animation: none !important;
}
    /* الأزرار العامة */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 30px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-primary { background: var(--navy); color: var(--gold); }
    .btn-secondary { background: var(--gray-200); color: var(--text); }
    .btn-success { background: var(--green); color: white; }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      color: white;
      z-index: 9999;
      transform: translateY(50px);
      opacity: 0;
      transition: 0.35s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast-success { background: var(--green); }
    .toast-error { background: var(--red); }
    
    /* Loader */
    .loader { text-align: center; padding: 50px; color: var(--text-lt); }
    .spinner {
      width: 32px;
      height: 32px;
      border: 4px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Badges */
    .badge-vehicle, .badge-boat, .badge-instructor {
      display: inline-block;
      background: var(--purple);
      color: white;
      padding: 2px 6px;
      border-radius: 12px;
      font-size: 9px;
      margin: 1px;
      cursor: pointer;
    }
    .badge-boat { background: var(--blue); }
    .badge-instructor { background: var(--green); }
    /* إصلاح رؤية أرقام المدفوعات */
.pay-cell input {
  background: white !important;
  color: #1e293b !important;
  border: 1px solid #cbd5e1 !important;
  border-radius: 6px !important;
  padding: 6px !important;
  font-size: 12px !important;
}

.pay-cell input:focus {
  outline: none;
  border-color: #3b82f6 !important;
  box-shadow: 0 0 0 2px rgba(59,130,246,0.2) !important;
}
    /* إصلاحات عامة */
    th, td {
      font-size: 11px;
      white-space: nowrap;
    }
    /* منع التمرير الأفقي في مودال UpSell */
#upsellModal .modal-container {
  max-width: 650px;
  width: 95%;
  overflow-x: hidden;
}

#upsellModal table {
  min-width: auto !important;
  width: 100%;
  table-layout: fixed;
}

#upsellModal th,
#upsellModal td {
  white-space: nowrap;
  overflow-x: auto;
}

#upsellModal th:first-child,
#upsellModal td:first-child {
  width: 35%;
}

#upsellModal th:nth-child(2),
#upsellModal td:nth-child(2) {
  width: 25%;
}

#upsellModal th:nth-child(3),
#upsellModal td:nth-child(3) {
  width: 20%;
}

#upsellModal th:last-child,
#upsellModal td:last-child {
  width: 20%;
}

/* إخفاء الأصفار في حقول UpSell */
#upsellModal .upsell-price,
#upsellModal .upsell-quantity {
  color: #1e293b;
  background: white;
}

/* إخفاء placeholder الأصفار */
#upsellModal .upsell-price::-webkit-inner-spin-button,
#upsellModal .upsell-price::-webkit-outer-spin-button,
#upsellModal .upsell-quantity::-webkit-inner-spin-button,
#upsellModal .upsell-quantity::-webkit-outer-spin-button {
  opacity: 0.5;
}

/* منع ظهور 0 عند التركيز */
#upsellModal .upsell-price:focus,
#upsellModal .upsell-quantity:focus {
  outline: none;
  border-color: #3b82f6;
}
    input[type="number"]:placeholder-shown,
    input[type="number"][value="0"],
    input[type="number"][value="0.00"],
    input[type="number"][value="0"]::placeholder {
      color: transparent;
    }
    input[type="number"][value]:not([value="0"]):not([value="0.00"]) {
      color: var(--text);
    }
    * {
      font-family: 'Cairo', sans-serif;
    }
    .assign-go, .assign-return, .assign-adult, .assign-child, .assign-infant {
      width: 50px !important;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="header">
  <h2>🎯 Operations Access</h2>
  <div class="header-right">
    <!-- قائمة اختيار الفرع (للمالك ومدير الحسابات والمدير المالي فقط) -->
<div id="branchSelector" style="display: none; margin-left: 10px;">
  <select id="branchSelect" style="background: var(--gold); color: var(--navy); border: none; border-radius: 20px; padding: 4px 12px; font-weight: bold;">
    <option value="">🌍 اختر الفرع</option>
  </select>
</div>
    <span class="user-chip" id="userNameDisplay"></span>
    <button class="back-btn" onclick="goBack()">← Back</button>
  </div>
</div>

<div class="selection-bar" id="selectionBar">
  <button class="selection-btn" id="btnInstructors" onclick="openBeachInstructorsModal()">👨‍🏫 Beach Instructors <span id="selectedInstructorsBadge" class="selection-badge">0</span></button>
  <button class="selection-btn" id="btnBoats" onclick="openBoatsModal()">⛵ Boats <span id="selectedBoatsBadge" class="selection-badge">0</span></button>
  <button class="selection-btn" id="btnVehicles" onclick="openVehiclesModal()">🚗 Vehicles <span id="selectedVehiclesBadge" class="selection-badge">0</span></button>
  <button class="selection-btn" id="btnLogisticsVehicles" onclick="openLogisticsVehicles()">🚛 Logistics <span id="selectedLogisticsBadge" class="selection-badge">0</span></button>
  <button class="reset-selection" onclick="resetAllSelections()">🗑️ Clear All</button>
</div>

<div class="filter-bar">
  <div class="filter-group"><label>📅 From Date</label><input type="date" id="filterFromDate" onchange="onDateChange()"></div>
  <div class="filter-group"><label>📅 To Date</label><input type="date" id="filterToDate" onchange="onDateChange()"></div>
  <div class="filter-group"><label>🚌 Trip</label><select id="filterTrip" multiple size="1"><option value="">All Trips</option></select></div>
  <div class="filter-group"><label>🔍 Search</label><input type="text" id="filterSearch" placeholder="Voucher / Guest"></div>
  <div class="filter-group"><label>📌 Status</label><select id="filterState"><option value="">All</option><option value="pending">Pending</option><option value="confirmed">Confirmed</option></select></div>
  <button class="btn-go" onclick="applyFilters()">Apply</button>
  <button class="btn-reset" onclick="resetFilters()">Reset</button>
  <button class="btn-reset" onclick="forceRefresh()" style="background:var(--orange);">🔄 Force Refresh</button>
  <button class="export-btn" onclick="exportToExcel()">📊 Export</button>
</div>

<!-- Desktop Table -->
<div class="tbl-wrap">
  <div id="tblCont"><div class="loader"><div class="spinner"></div>Loading...</div></div>
</div>

<!-- Mobile Cards -->
<div id="cardsContainer" class="cards-container"></div>

<div class="pagination" id="pagination"></div>

<!-- Modals -->
<div id="assignVehiclesModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>🚗 Assign Vehicles</h3><button class="close-modal" onclick="closeModal('assignVehiclesModal')">×</button></div><div id="assignVehiclesContent"></div></div></div>
<div id="assignBoatsModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>⛵ Assign Boats</h3><button class="close-modal" onclick="closeModal('assignBoatsModal')">×</button></div><div id="assignBoatsContent"></div></div></div>
<div id="assignInstructorsModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>👨‍🏫 Assign Instructors</h3><button class="close-modal" onclick="closeModal('assignInstructorsModal')">×</button></div><div id="assignInstructorsContent"></div></div></div>
<div id="beachInstructorsModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>🏖️ Beach Instructors</h3><button class="close-modal" onclick="closeModal('beachInstructorsModal')">×</button></div><div id="beachInstructorsList"></div></div></div>
<div id="boatsModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>⛵ Select Boats</h3><button class="close-modal" onclick="closeModal('boatsModal')">×</button></div><div id="boatsSelectionContainer"></div></div></div>
<div id="vehiclesModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>🚗 Choose Vehicles</h3><button class="close-modal" onclick="closeModal('vehiclesModal')">×</button></div><div id="vehiclesList"></div></div></div>

async function loadDivingTripNames() {
  try {
    const tripDefs = await gas('getTripDefinitions', { centerName: currentUser?.centerName });
    
    if (tripDefs && Array.isArray(tripDefs) && tripDefs.length > 0) {

        .filter(trip => {
          const category = (trip.Category || '').toLowerCase();
          return category === 'diving';
        })
        .map(trip => trip.TripName);
      
      console.log(`✅ تم تحميل ${divingTripNames.length} رحلة Diving من الخادم:`, divingTripNames);
    } else {
      // ✅ إذا لم تنجح من الخادم، استخدم البحث بالكلمات المفتاحية

  }

// دالة للتحقق مما إذا كانت الرحلة من نوع Diving

  console.warn(`⚠️ divingTripNames not loaded yet, filtering out: ${tripName}`);

}

// ============================================================
// JSONP REQUEST
// ============================================================
function jsonpRequest(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    if (currentUser?.centerName) params.centerName = currentUser.centerName;
    if (currentUser?.centerId) params.centerId = currentUser.centerId;
    params.action = action;
    params.callback = cbName;
    const qs = Object.entries(params).map(([k, v]) => k + '=' + encodeURIComponent(String(v ?? ''))).join('&');
    const url = GAS_URL + '?' + qs;
    const script = document.createElement('script');
    const timeout = setTimeout(() => { cleanup(); reject(new Error('Request timeout')); }, 30000);
    const cleanup = () => { clearTimeout(timeout); delete window[cbName]; script.remove(); };
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('Network error')); };
    script.src = url;
    document.head.appendChild(script);
  });
}

function gas(action, params = {}) {
  return new Promise((resolve, reject) => {
    const timeoutId = setTimeout(() => reject(new Error('Request timeout')), 60000);  // ✅ 60 ثانية
    jsonpRequest(action, params).then(resolve).catch(reject).finally(() => clearTimeout(timeoutId));
  });
}

let activeToast = null;

function showToast(msg, type) {
  // ✅ إزالة التوست السابق إذا كان موجوداً
  if (activeToast) {
    activeToast.remove();
    activeToast = null;
  }
  
  const toast = document.createElement('div');
  toast.className = `toast toast-${type} show`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  activeToast = toast;
  
  setTimeout(() => {
    if (toast && toast.remove) {
      toast.remove();
      if (activeToast === toast) activeToast = null;
    }
  }, 3000);
}

function formatDateDDMMMYYYY(date) {
  if (!date) return '';
  const d = new Date(date);
  if (isNaN(d)) return date;
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return `${String(d.getDate()).padStart(2, '0')}/${months[d.getMonth()]}/${d.getFullYear()}`;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

async function loadInvoices() {
  // ✅ منع التكرار
  if (isLoadingInvoices) {
    console.log('⚠️ loadInvoices already in progress, skipping...');
    return;
  }
  
  console.log('🟢 loadInvoices started');
  console.log('📊 divingTripNames length:', divingTripNames.length);
  
  if (invoicesLoaded && allInvoices.length > 0) {
    console.log(`📦 استخدام البيانات المخزنة (${allInvoices.length} فاتورة)`);
    applyFilters();
    return;
  }
  
  isLoadingInvoices = true;
  
  try {
    showToast('جاري تحميل البيانات...', 'info');
    
    if (divingTripNames.length === 0) {
      console.log('🟡 Loading diving trip names...');
      await loadDivingTripNames();
      console.log('🟢 divingTripNames after load:', divingTripNames);
    }
    
    const fromDate = document.getElementById('filterFromDate').value;
    const toDate = document.getElementById('filterToDate').value;
    const isSingleDate = fromDate && fromDate === toDate;
    
    const selectedBranchId = document.getElementById('branchSelect')?.value || '';
    let selectedBranchName = '';
    if (selectedBranchId && window.branchesList) {
      const branch = window.branchesList.find(b => b.id === selectedBranchId);
      if (branch) selectedBranchName = branch.name;
    }
    
    let result = null;
    
    const fetchWithRetry = async (retryCount = 0) => {
      try {
        if (isSingleDate) {
          const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
          const parts = fromDate.split('-');
          const formattedDate = `${parts[2]}/${months[parseInt(parts[1]) - 1]}/${parts[0]}`;
          return await gas('getInvoicesByDate', { 
            dateStr: formattedDate,
            centerName: currentUser?.centerName
          });
        } else {
          return await gas('getAllInvoices', { 
            includeCollection: 'true',
            centerName: currentUser?.centerName
          });
        }
      } catch(e) {
        if (retryCount < 2) {
          console.log(`⚠️ محاولة إعادة التحميل (${retryCount + 1}/2)...`);
          await new Promise(r => setTimeout(r, 2000));
          return fetchWithRetry(retryCount + 1);
        }
        throw e;
      }
    };
    
    result = await fetchWithRetry();
    
    if (Array.isArray(result)) {
      let invoices = result.filter(inv => {
        const state = (inv.State || inv.state || '').toLowerCase();
        return state === 'confirmed' || state === 'pending';
      });
      
      if (selectedBranchName) {
        invoices = invoices.filter(inv => inv.branchName === selectedBranchName);
      }
      
      console.log('📊 Before Diving filter - invoices count:', invoices.length);
      console.log('📊 Sample trip names:', invoices.slice(0, 5).map(inv => inv.Trip || inv.trip));
      console.log('📊 divingTripNames:', divingTripNames);
      console.log('📊 User type:', currentUser?.type);
      
      invoices = invoices.filter(inv => {
        const tripName = inv.Trip || inv.trip || '';
        return isDivingTrip(tripName);
      });
      
      console.log('📊 After Diving filter - invoices count:', invoices.length);
      
      allInvoices = invoices;
      invoicesLoaded = true;
      
      const tripSet = new Set();
      allInvoices.forEach(inv => { 
        const trip = inv.Trip || inv.trip;
        if (trip) tripSet.add(trip); 
      });
      uniqueTrips = Array.from(tripSet).sort();
      
      console.log('📊 Unique trips after filter:', uniqueTrips);
      
      initTripFilter();
      applyFilters();
      showToast(`تم تحميل ${allInvoices.length} فاتورة`, 'success');
    } else {
      console.error('Result is not an array:', result);
      allInvoices = [];
    }
  } catch(e) {
    console.error('loadInvoices error:', e);
    showToast('خطأ في التحميل: ' + e.message, 'error');
    allInvoices = [];
  } finally {
    isLoadingInvoices = false;
  }
}
function initTripFilter() {
  const select = document.getElementById('filterTrip');
  select.innerHTML = '<option value="">All Trips</option>';
  
  // ✅ عرض رحلات Diving فقط في قائمة الفلتر (لجميع المستخدمين)
  let tripsToShow = uniqueTrips.filter(trip => isDivingTrip(trip));
  
  tripsToShow.forEach(trip => {
    const option = document.createElement('option');
    option.value = trip;
    option.textContent = trip;
    select.appendChild(option);
  });
  
  select.addEventListener('change', applyFilters);
}
function getSelectedTrips() {
  const select = document.getElementById('filterTrip');
  const selected = [];
  for (let i = 0; i < select.options.length; i++) {
    if (select.options[i].selected && select.options[i].value !== '') selected.push(select.options[i].value);
  }
  const hasAllTrips = Array.from(select.options).some(opt => opt.selected && opt.value === '');
  return hasAllTrips || selected.length === 0 ? [] : selected;
}


function applyFilters() {
  const fromDate = document.getElementById('filterFromDate').value;
  const toDate = document.getElementById('filterToDate').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();
  const state = document.getElementById('filterState').value;
  const selectedTrips = getSelectedTrips();
  
  // ✅ الحصول على الفرع المختار
  const selectedBranchId = document.getElementById('branchSelect')?.value || '';
  let selectedBranchName = '';
  if (selectedBranchId && window.branchesList) {
    const branch = window.branchesList.find(b => b.id === selectedBranchId);
    if (branch) selectedBranchName = branch.name;
  }
  
  const currentParams = JSON.stringify({ fromDate, toDate, search, state, selectedTrips, selectedBranchId });
  if (currentParams === lastFilterParams && filteredInvoices.length > 0) return;
  lastFilterParams = currentParams;
  
  let fromDateObj = null, toDateObj = null;
  if (fromDate) { fromDateObj = new Date(fromDate); fromDateObj.setHours(0,0,0,0); }
  if (toDate) { toDateObj = new Date(toDate); toDateObj.setHours(23,59,59,999); }
  
  filteredInvoices = [];
  for (let inv of allInvoices) {
    const activeDate = inv.activeDate || '';
    const parsedDate = parseDateFromString(activeDate);
    if (fromDateObj && parsedDate && parsedDate < fromDateObj) continue;
    if (toDateObj && parsedDate && parsedDate > toDateObj) continue;
    if (state && (inv.state || '').toLowerCase() !== state) continue;
    if (selectedTrips.length > 0 && !selectedTrips.includes(inv.trip)) continue;
    
    // ✅ تصفية حسب الفرع
    if (selectedBranchName && inv.branchName !== selectedBranchName) continue;
    
    if (search) {
      const voucher = (inv.voucherNo || '').toLowerCase();
      const guest = (inv.guestName || '').toLowerCase();
      if (!voucher.includes(search) && !guest.includes(search)) continue;
    }
    filteredInvoices.push(inv);
  }
  doSort();
  currentPage = 1;
  renderTable();
  renderPagination();
  updateSelectionButtonsState();
  const currentDate = getCurrentDateISO();
  if (currentDate) loadAndPopulateAssignments(currentDate);
}
function doSort() {
  filteredInvoices.sort((a,b) => {
    let aVal = a[sortColumn], bVal = b[sortColumn];
    if (aVal === undefined) aVal = '';
    if (bVal === undefined) bVal = '';
    if (sortColumn === 'rest') { aVal = parseFloat(aVal) || 0; bVal = parseFloat(bVal) || 0; }
    else if (sortColumn === 'activeDate' || sortColumn === 'issueDate') {
      aVal = parseDateFromString(aVal)?.getTime() || 0;
      bVal = parseDateFromString(bVal)?.getTime() || 0;
    } else { aVal = String(aVal).toLowerCase(); bVal = String(bVal).toLowerCase(); }
    if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
    if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
    return 0;
  });
}

function setSort(col) {
  if (sortColumn === col) {
    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
  } else {
    sortColumn = col;
    sortDirection = 'asc';
  }
  doSort();
  renderTable();           // ✅ تصحيح
  renderPagination();
}

function getSortIcon(col) { return sortColumn !== col ? '⇅' : (sortDirection === 'asc' ? '↑' : '↓'); }

function gotoPage(page) {

function renderPagination() {
  const totalPages = Math.ceil(filteredInvoices.length / pageSize);
  if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  let html = '';
  for (let i = 1; i <= totalPages; i++) html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="gotoPage(${i})">${i}</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function formatRest(restValue, currencySymbol) {
  const num = parseFloat(restValue);
  if (isNaN(num)) return escapeHtml(String(restValue));
  if (num <= 0) return '<span class="rest-zero">✓ Paid</span>';
  return `<span class="rest-pos">${num.toFixed(2)} ${escapeHtml(currencySymbol)}</span>`;
}

function getActivitiesFromInvoice(invoice) {

  function parseDateFromString(dateStr) {
  if (!dateStr) return null;
  if (dateStr instanceof Date && !isNaN(dateStr)) return dateStr;
  const s = dateStr.toString().trim();
  const match = s.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (match) {
    const months = { Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11 };
    return new Date(parseInt(match[3]), months[match[2]], parseInt(match[1]));
  }
  const d = new Date(s);
  return !isNaN(d) ? d : null;
}

function formatValue(val) {
  if (val === undefined || val === null) return '';
  const num = parseFloat(val);
  if (isNaN(num)) return val;
  if (num === 0) return '';
  return num;
}

function renderTable() {
  const start = (currentPage - 1) * pageSize;
  const end = Math.min(start + pageSize, filteredInvoices.length);
  const pageData = filteredInvoices.slice(start, end);
  const isSingle = isSingleDateRange();

  if (pageData.length === 0) {

function formatNonZero(val) {
  if (val === undefined || val === null) return '';
  const num = parseFloat(val);
  if (isNaN(num)) return '';
  if (num === 0) return '';
  return num;
}

async function loadAndPopulateAssignments(dateISO) {
  if (isLoadingAssignments) {
    console.log('⚠️ Already loading assignments, skipping...');
    return;
  }
  
  if (lastLoadedDate === dateISO && currentAssignments) {
    console.log('📦 Using cached assignments for date:', dateISO);
    updateSelectionBadges();
    return;
  }
  
  isLoadingAssignments = true;
  
  try {
    const assignments = await gas('getDailyAssignments', { date: dateISO, centerName: currentUser?.centerName });
    
    if (assignments?.success && assignments.data) {
      currentAssignments = assignments.data;
      selectedBeachInstructors = assignments.data.beachInstructors || [];
      selectedBoats = assignments.data.boats || [];
      boatInstructorsMap = assignments.data.boatInstructorsMap || {};
      selectedVehicles = assignments.data.vehicles || [];
      
      console.log('✅ Loaded from server:', {
        beach: selectedBeachInstructors.length,
        boats: selectedBoats.length,
        vehicles: selectedVehicles.length
      });
    } else {
      currentAssignments = null;
      selectedBeachInstructors = [];
      selectedBoats = [];
      boatInstructorsMap = {};
      selectedVehicles = [];
    }
    
    lastLoadedDate = dateISO;
    updateSelectionBadges();
  } catch(e) {
    console.error('❌ loadAndPopulateAssignments error:', e);
    selectedBeachInstructors = [];
    selectedBoats = [];
    boatInstructorsMap = {};
    selectedVehicles = [];
    updateSelectionBadges();
  } finally {
    isLoadingAssignments = false;
  }
}
  async function loadLogisticsData(dateISO) {

  try {
    const result = await gas('getLogisticsRecords', { 
      date: dateISO,
      centerName: currentUser?.centerName 
    });
    
    if (result?.success && Array.isArray(result.data)) {

  }
  
  updateSelectionBadges();
}
async function openAssignVehicles(voucherNo) {
  const invoice = filteredInvoices.find(i => i.voucherNo === voucherNo);
  if (!invoice) return;
  if (selectedVehicles.length === 0) { 
    showToast('اختر السيارات أولاً من زر السيارات', 'error'); 
    return; 
  }
  
  currentAssignVoucher = voucherNo;
  currentAssignInvoice = invoice;
  const currentDate = getCurrentDateISO();
  const tripName = invoice.trip || '';
  
  // ✅ حساب تفاصيل الركاب من الفاتورة
  const adults = parseInt(invoice.sgl) || 0;
  const children = parseInt(invoice.dbl) || 0;
  const infants = parseInt(invoice.trpl) || 0;
  const totalPassengers = adults + children;
  
  let savedVehicles = [];
  try { savedVehicles = JSON.parse(invoice.VehiclesUsed || '[]'); } catch(e) {}
  
  // ✅ دالة لحساب المقاعد المحجوزة من فواتير أخرى
  async function getTotalBookedSeatsForVehicle(vehicleId, currentDate, tripName, excludeVoucher) {
    let totalGo = 0;
    let totalReturn = 0;
    
    for (const inv of allInvoices) {
      const invDate = formatDateDDMMMYYYY(inv.activeDate);
      const invTrip = inv.trip;
      const invVoucher = inv.voucherNo;
      
      if (invDate === currentDate && invTrip === tripName && invVoucher !== excludeVoucher) {
        let vehiclesData = [];
        try {
          vehiclesData = JSON.parse(inv.VehiclesUsed || '[]');
        } catch(e) {}
        
        for (const v of vehiclesData) {
          if (v.vehicleId === vehicleId) {
            totalGo += v.goCount || 0;
            totalReturn += v.returnCount || 0;
          }
        }
      }
    }
    
    return { goSeats: totalGo, returnSeats: totalReturn };
  }
  
  // ✅ عرض شاشة تحميل
  document.getElementById('assignVehiclesContent').innerHTML = '<div class="loader"><div class="spinner"></div>جاري تحميل البيانات...</div>';
  openModal('assignVehiclesModal');
  
  // ✅ جلب جميع البيانات بالتوازي مع التخزين المؤقت
  const fetchPromises = [];
  for (const vehId of selectedVehicles) {
    const vehicle = cachedVehicles.find(v => v.id === vehId);
    if (!vehicle) continue;
    
    const saved = savedVehicles.find(v => v.vehicleId === vehId);
    const savedGo = saved?.goCount || 0;
    const savedReturn = saved?.returnCount || 0;
    const savedAdult = saved?.adults || 0;
    const savedChild = saved?.children || 0;
    const savedInfant = saved?.infants || 0;
    
    // ✅ التخزين المؤقت للنتائج من API
    const cacheKey = `${currentDate}|${tripName}|${vehId}`;
    let bookedResult = cachedVehicleSeats[cacheKey];
    if (!bookedResult) {
      bookedResult = await gas('getVehicleBookedSeatsForTrip', { 
        date: currentDate, 
        tripName, 
        vehicleId: vehId, 
        excludeVoucher: voucherNo, 
        centerName: currentUser?.centerName 
      });
      cachedVehicleSeats[cacheKey] = bookedResult;
    }
    
    // ✅ الحصول على الحجوزات من الفواتير الأخرى (بما فيها الفواتير المحفوظة)
    const otherBookings = await getTotalBookedSeatsForVehicle(vehId, currentDate, tripName, voucherNo);
    
    // ✅ إجمالي المقاعد المحجوزة = من API + من الفواتير الأخرى
    const totalBookedGo = (bookedResult.goSeats || 0) + otherBookings.goSeats;
    const totalBookedReturn = (bookedResult.returnSeats || 0) + otherBookings.returnSeats;
    
    fetchPromises.push(Promise.resolve({
      vehicle,
      capacity: vehicle.capacity || 0,
      savedGo, savedReturn, savedAdult, savedChild, savedInfant,
      totalBookedGo,
      totalBookedReturn
    }));
  }
  
  const results = await Promise.all(fetchPromises);
  
  // ✅ بناء HTML
  let vehiclesHtml = `
    <div class="summary-box" style="margin-bottom: 12px; padding: 12px; background: var(--navy); color: white; border-radius: 8px;">
      <strong>📊 Invoice Summary:</strong><br>
      Trip: ${escapeHtml(tripName)}<br>
      👤 Adults: ${adults} | 👶 Children: ${children} | 🍼 Infants: ${infants}<br>
      <span style="font-size: 11px; opacity: 0.8;">💡 Total passengers needing seats: ${totalPassengers}</span>
    </div>
    <div style="overflow-x:auto; max-height: 450px;">
      <table style="width: 100%; font-size: 12px; border-collapse: collapse;">
        <thead>
          <tr style="background: var(--navy); color: var(--gold);">
            <th style="padding: 8px;">Vehicle</th>
            <th style="padding: 8px;">Cap.</th>
            <th style="padding: 8px;">🔄 Go<br><span style="font-size: 9px;">(Available)</span></th>
            <th style="padding: 8px;">🔙 Ret.<br><span style="font-size: 9px;">(Available)</span></th>
            <th style="padding: 8px;">👤 A</th>
            <th style="padding: 8px;">👶 C</th>
            <th style="padding: 8px;">🍼 I</th>
            <th style="padding: 8px;">Sel</th>
           </tr>
        </thead>
        <tbody>
  `;
  
  for (const res of results) {
    const { vehicle, capacity, savedGo, savedReturn, savedAdult, savedChild, savedInfant, totalBookedGo, totalBookedReturn } = res;
    
    const defaultAdultQty = savedAdult > 0 ? savedAdult : adults;
    const defaultChildQty = savedChild > 0 ? savedChild : children;
    const defaultInfantQty = savedInfant;
    const defaultGoValue = savedGo > 0 ? savedGo : totalPassengers;
    const defaultReturnValue = savedReturn > 0 ? savedReturn : totalPassengers;
    
    // ✅ الحد الأقصى لكل حقل (السعة - إجمالي المحجوز)
    const maxGoValue = Math.max(0, capacity - totalBookedGo);
    const maxReturnValue = Math.max(0, capacity - totalBookedReturn);
    
    // ✅ المقاعد المتاحة بعد إضافة القيم الحالية
    const availableGo = Math.max(0, maxGoValue - defaultGoValue);
    const availableReturn = Math.max(0, maxReturnValue - defaultReturnValue);
    
    const isChecked = (savedGo > 0 || savedReturn > 0 || savedAdult > 0 || savedChild > 0);
    
    vehiclesHtml += `
      <tr>
        <td style="padding: 8px; background: var(--navy); color: var(--gold); font-weight: bold;">
          <strong>${escapeHtml(vehicle.licensePlate)}</strong><br>
          <span style="font-size: 9px;">🚗 ${escapeHtml(vehicle.driverName || 'No driver')}</span>
          <div style="font-size: 8px; color: #aaa;">ID: ${vehicle.id}</div>
        </td>
        <td style="text-align: center; padding: 8px; background: var(--gray-50); font-weight: bold;">${capacity}</td>
        <td style="text-align: center; padding: 8px;">
          <input type="number" class="assign-go" data-id="${vehicle.id}" 
                 value="${defaultGoValue}" 
                 min="0" max="${maxGoValue}" 
                 data-original-max="${maxGoValue}"
                 style="width: 60px; text-align: center; padding: 4px; border-radius: 4px; border: 1px solid var(--border);">
          <div class="available-text" style="font-size: 9px; color: ${availableGo > 0 ? 'green' : 'red'};">(🟢 ${availableGo} available)</div>
        </td>
        <td style="text-align: center; padding: 8px;">
          <input type="number" class="assign-return" data-id="${vehicle.id}" 
                 value="${defaultReturnValue}" 
                 min="0" max="${maxReturnValue}" 
                 data-original-max="${maxReturnValue}"
                 style="width: 60px; text-align: center; padding: 4px; border-radius: 4px; border: 1px solid var(--border);">
          <div class="available-text" style="font-size: 9px; color: ${availableReturn > 0 ? 'green' : 'red'};">(🟢 ${availableReturn} available)</div>
        </td>
        <td style="text-align: center; padding: 8px;">
          <input type="number" class="assign-adult" data-id="${vehicle.id}" 
                 value="${defaultAdultQty || ''}" 
                 min="0" max="${adults}" 
                 style="width: 55px; text-align: center; padding: 4px;">
        </td>
        <td style="text-align: center; padding: 8px;">
          <input type="number" class="assign-child" data-id="${vehicle.id}" 
                 value="${defaultChildQty || ''}" 
                 min="0" max="${children}" 
                 style="width: 55px; text-align: center; padding: 4px;">

          <input type="number" class="assign-infant" data-id="${vehicle.id}" 
                 value="${defaultInfantQty || ''}" 
                 min="0" max="${infants}" 
                 style="width: 55px; text-align: center; padding: 4px;">
        </td>
        <td style="text-align: center; padding: 8px;">
          <input type="checkbox" class="assign-select" data-id="${vehicle.id}" 
                 ${isChecked ? 'checked' : ''} 
                 style="width: 18px; height: 18px;">
        </td>
      </tr>
    `;
  }
  
  vehiclesHtml += `
        </tbody>
      </table>

    <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border);">
      <button class="btn btn-secondary" onclick="closeModal('assignVehiclesModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveVehicleAssignment()">✅ Assign</button>
    </div>
  `;
  
  document.getElementById('assignVehiclesContent').innerHTML = vehiclesHtml;
  attachVehicleAssignmentEvents();
}

  function updateAvailableSeats(vehicleId) {
    const goInput = document.querySelector(`.assign-go[data-id="${vehicleId}"]`);

    // الحصول على السعة القصوى للسيارة
    const row = goInput?.closest('tr');
    const capacityCell = row?.querySelector('td:nth-child(2)');
    const capacity = parseInt(capacityCell?.textContent) || 0;
    
    // الحصول على القيم الأصلية (المحجوزة من فواتير أخرى)
    const originalMaxGo = parseInt(goInput?.getAttribute('data-original-max')) || capacity;
    const originalMaxReturn = parseInt(returnInput?.getAttribute('data-original-max')) || capacity;
    
    // حساب المقاعد المتاحة الجديدة
    const availableGo = Math.max(0, originalMaxGo - goValue);
    const availableReturn = Math.max(0, originalMaxReturn - returnValue);
    
    // تحديث النص المعروض للمقاعد المتاحة
    const goAvailableDiv = goInput?.closest('td')?.querySelector('.available-text');
    const returnAvailableDiv = returnInput?.closest('td')?.querySelector('.available-text');
    
    if (goAvailableDiv) {
      goAvailableDiv.innerHTML = `(🟢 ${availableGo} available)`;
      goAvailableDiv.style.color = availableGo > 0 ? 'green' : 'red';
    }
    if (returnAvailableDiv) {
      returnAvailableDiv.innerHTML = `(🟢 ${availableReturn} available)`;
      returnAvailableDiv.style.color = availableReturn > 0 ? 'green' : 'red';
    }
    
    // ✅ تحديث الحد الأقصى لحقول Go و Return ديناميكياً
    if (goInput) {
      goInput.max = originalMaxGo;
    }
    if (returnInput) {
      returnInput.max = originalMaxReturn;
    }
    
    // ✅ التحقق من عدم تجاوز القيم الحد الأقصى
    if (goValue > originalMaxGo) {
      goInput.value = originalMaxGo;
      showToast(`⚠️ Maximum Go trips for this vehicle is ${originalMaxGo}`, 'warning');
    }
    if (returnValue > originalMaxReturn) {
      returnInput.value = originalMaxReturn;
      showToast(`⚠️ Maximum Return trips for this vehicle is ${originalMaxReturn}`, 'warning');
    }
  }
  
  // ✅ مستمع لتغيير حقل Go
  document.querySelectorAll('#assignVehiclesModal .assign-go').forEach(input => {
    const newInput = input.cloneNode(true);
    input.parentNode.replaceChild(newInput, input);
    
    newInput.addEventListener('input', (e) => {
      updateAvailableSeats(e.target.dataset.id);
    });
  });
  
  // ✅ مستمع لتغيير حقل Return
  document.querySelectorAll('#assignVehiclesModal .assign-return').forEach(input => {
    const newInput = input.cloneNode(true);
    input.parentNode.replaceChild(newInput, input);
    
    newInput.addEventListener('input', (e) => {
      updateAvailableSeats(e.target.dataset.id);
    });
  });
  
  // ✅ مستمع لتغيير Checkbox (تحديد/إلغاء تحديد السيارة)
  document.querySelectorAll('#assignVehiclesModal .assign-select').forEach(cb => {
    const newCb = cb.cloneNode(true);
    cb.parentNode.replaceChild(newCb, cb);
    
    newCb.addEventListener('change', (e) => {
      const vehicleId = e.target.dataset.id;
      const goInput = document.querySelector(`.assign-go[data-id="${vehicleId}"]`);
      const returnInput = document.querySelector(`.assign-return[data-id="${vehicleId}"]`);
      const adultInput = document.querySelector(`.assign-adult[data-id="${vehicleId}"]`);
      const childInput = document.querySelector(`.assign-child[data-id="${vehicleId}"]`);
      const infantInput = document.querySelector(`.assign-infant[data-id="${vehicleId}"]`);
      
      const disabled = !e.target.checked;
      if (goInput) goInput.disabled = disabled;
      if (returnInput) returnInput.disabled = disabled;
      if (adultInput) adultInput.disabled = disabled;
      if (childInput) childInput.disabled = disabled;
      if (infantInput) infantInput.disabled = disabled;
    });
  });
}

// ✅ دالة تصنيف النشاط إلى نوع المدرب المناسب
function classifyActivity(activityName) {
  const lower = activityName.toLowerCase();
  
  // 1 Intro (مفرد)
  if (lower === '1 intro' || lower === 'intro' || lower === 'sgl intro' || lower === '*1 intro' || lower === 'intro diver') {
    return { type: 'single_intro', column: 'extra', multiplier: 1, display: '1 Intro' };
  }
  
  // 2 Intro (مزدوج)
  if (lower === '2 intro' || lower === 'dbl intro' || lower === '*2 intro') {
    return { type: 'double_intro', column: 'extra', multiplier: 2, display: '2 Intro' };
  }
  
  // Diver
  if (lower === 'diver' || lower === 'fun diver' || lower === '1 diver' || lower === 'diving') {
    return { type: 'diver', column: 'sgl', multiplier: 1, display: 'Diver' };
  }
  
  // Course
  if (lower === 'course' || lower === 'owd course' || lower === 'aowd course' || lower === 'course diver') {
    return { type: 'course', column: 'dbl', multiplier: 1, display: 'Course' };
  }
  
  // Check Dive (C.D.)
  if (lower === 'check dive' || lower === 'cd' || lower === 'c.d.' || lower === 'c. d.' || lower === 'c d') {
    return { type: 'check_dive', column: 'sgl', multiplier: 1, display: 'C.D.' };
  }
  
  // Scuba Review (S.R.)
  if (lower === 'scuba review' || lower === 'sr' || lower === 's.r.' || lower === 's r') {
    return { type: 'scuba_review', column: 'dbl', multiplier: 1, display: 'S.R.' };
  }
  
  return null;
}

    const course = parseInt(document.querySelector(`.assign-course[data-id="${instId}"]`).value) || 0;
    const intro = parseInt(document.querySelector(`.assign-intro[data-id="${instId}"]`).value) || 0;
    if (diver+course+intro === 0) return;
    selectedRows.push({ instructorId: instId, diver, course, intro });
  });
  if (selectedRows.length === 0) { showToast('⚠️ اختر مدرب', 'error'); return; }
  const result = await gas('assignInstructorsToInvoice', { voucherNo: currentAssignVoucher, instructorsData: JSON.stringify(selectedRows), centerName: currentUser?.centerName });
  if (result?.success) { updateLocalInvoice(currentAssignVoucher, 'InstructorsExecution', JSON.stringify(selectedRows)); renderTable(); }
  else showToast('❌ فشل الحفظ', 'error');
}


function updateLocalInvoice(voucherNo, field, value) {
  for (let arr of [allInvoices, filteredInvoices]) {
    for (let inv of arr) {
      if (inv.voucherNo === voucherNo || inv.VoucherNo === voucherNo) { inv[field] = value; break; }
    }
  }
}

  function renderSummary() {
  const trips = {};
  
  if (!filteredInvoices || filteredInvoices.length === 0) {
    const summarySec = document.getElementById('summarySec');
    if (summarySec) summarySec.style.display = 'none';
    return;
  }
  
  filteredInvoices.forEach(inv => {
    const sgl = parseInt(inv.Sgl) || parseInt(inv.sgl) || 0;
    const dbl = parseInt(inv.Dbl) || parseInt(inv.dbl) || 0;
    const trpl = parseInt(inv.Trpl) || parseInt(inv.trpl) || 0;
    const extra = parseInt(inv.Extra) || parseInt(inv.extra) || 0;
    
    if (sgl === 0 && dbl === 0 && trpl === 0 && extra === 0) return;
    
    const tripName = (inv.Trip || inv.trip || 'Unknown').trim();
    if (!trips[tripName]) {
      trips[tripName] = { bookings: 0, activities: {} };
    }
    trips[tripName].bookings++;
    
    const activitiesText = (inv.ActivitiesText || inv.activitiesText || '').toString().trim();
    if (activitiesText) {
      activitiesText.split('|').forEach(part => {
        const match = part.trim().match(/^(.+?)×(\d+(\.\d+)?)$/);
        if (match) {
          const activityName = match[1].trim();
          const quantity = parseFloat(match[2]) || 0;
          trips[tripName].activities[activityName] = (trips[tripName].activities[activityName] || 0) + quantity;
        }
      });
    } else {
      if (sgl > 0) trips[tripName].activities['Adult'] = (trips[tripName].activities['Adult'] || 0) + sgl;
      if (dbl > 0) trips[tripName].activities['Child'] = (trips[tripName].activities['Child'] || 0) + dbl;
      if (trpl > 0) trips[tripName].activities['Infant'] = (trips[tripName].activities['Infant'] || 0) + trpl;
      if (extra > 0) trips[tripName].activities['Intro'] = (trips[tripName].activities['Intro'] || 0) + extra;
    }
  });
  
  if (Object.keys(trips).length === 0) {
    const summarySec = document.getElementById('summarySec');
    if (summarySec) summarySec.style.display = 'none';
    return;
  }
  
  let rows = '';
  Object.entries(trips).sort((a, b) => b[1].bookings - a[1].bookings).forEach(([tripName, info]) => {
    const sortedActivities = Object.entries(info.activities).sort((a, b) => b[1] - a[1]);
    const activitiesStr = sortedActivities
      .map(([act, qty]) => `${act}×${Number.isInteger(qty) ? qty : qty.toFixed(1)}`)
      .join(' | ');
    
    rows += `<tr>
      <td><strong>${escapeHtml(tripName)}</strong></td>
      <td style="text-align:center"><span style="background:var(--navy);color:var(--gold);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700">${info.bookings}</span></td>
      <td class="acts-cell" style="white-space:normal; word-break:break-word;">${escapeHtml(activitiesStr || '—')}</span></td>
    </tr>`;
  });
  
   
  let summaryHtml = `
    <div class="summary-sec" id="summarySec" style="margin-top:16px; padding:14px 20px; background:white; border-top:2px solid var(--border); overflow-x:auto;">
      <div class="summary-title" style="font-size:13px; font-weight:700; color:var(--navy); margin-bottom:8px; text-align:center;">🗺️ Trips Summary</div>
      <div style="overflow-x:auto;">
        <table class="summary-table" style="width:100%; border-collapse:collapse; font-size:12px; margin:0 auto;">
          <thead>
            <tr style="background:var(--navy2); color:var(--gold);">
              <th style="padding:10px 8px; text-align:center; width:28%;">Trip</th>
              <th style="padding:10px 8px; text-align:center; width:15%;">Bookings</th>
              <th style="padding:10px 8px; text-align:center; width:57%;">Activities</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
  
  // ✅ التعديل: إضافة الملخص قبل الـ Pagination وليس بعد الجدول مباشرة
  let existingSummary = document.getElementById('summarySec');
  if (existingSummary) {
    existingSummary.outerHTML = summaryHtml;
  } else {
    // ✅ إضافة الملخص بعد الـ Pagination (مكان مناسب)
    const pagination = document.getElementById('pagination');
    if (pagination) {
      pagination.insertAdjacentHTML('beforebegin', summaryHtml);
    }
  }
}

// دالة توليد صف السيارة مع حقول Go/Return
function generateVehicleTripRow(index, selectedVehicleId, selectedTrip, goCount, returnCount, vehicles, trips) {
  const goVal = (goCount > 0) ? goCount : '';
  const returnVal = (returnCount > 0) ? returnCount : '';
  
  return `
    <div class="vehicle-trip-row" data-row-index="${index}" style="display: flex; gap: 8px; align-items: center; padding: 8px; background: var(--gray-50); border-radius: 8px; flex-wrap: wrap;">
      <div style="flex: 2; min-width: 130px;">
        <select class="vehicle-select" data-row="${index}" style="width: 100%; padding: 6px; border-radius: 6px; border: 1px solid var(--border); font-size: 11px;">
          <option value="">-- Select Vehicle --</option>
          ${vehicles.map(v => `<option value="${v.id}" ${selectedVehicleId === v.id ? 'selected' : ''}>${escapeHtml(v.licensePlate)} (${v.capacity} seats)</option>`).join('')}
        </select>
      </div>
      <div style="flex: 2; min-width: 120px;">
        <select class="trip-select" data-row="${index}" style="width: 100%; padding: 6px; border-radius: 6px; border: 1px solid var(--border); font-size: 11px;">
          <option value="">-- Select Trip --</option>
          ${trips.map(t => `<option value="${escapeHtml(t)}" ${selectedTrip === t ? 'selected' : ''}>${escapeHtml(t)}</option>`).join('')}
        </select>
      </div>
      <div style="flex: 1; min-width: 60px;">
        <input type="number" class="go-count" data-row="${index}" value="${goVal}" min="0" placeholder="Go" style="width: 100%; padding: 5px; text-align: center; border-radius: 6px; border: 1px solid var(--border); font-size: 11px;">
      </div>
      <div style="flex: 1; min-width: 60px;">
        <input type="number" class="return-count" data-row="${index}" value="${returnVal}" min="0" placeholder="Return" style="width: 100%; padding: 5px; text-align: center; border-radius: 6px; border: 1px solid var(--border); font-size: 11px;">
      </div>
      <div style="flex: 0;">
        <button class="btn btn-danger" onclick="removeVehicleTripRow(${index})" style="padding: 4px 8px; font-size: 11px;">🗑️</button>
      </div>
    </div>
  `;
}

// متغير عام لتخزين صفوف السيارات
let vehicleTripRows = [];

function addVehicleTripRow() {
  const newIndex = vehicleTripRows.length;
  vehicleTripRows.push({ vehicleId: '', tripName: '', goCount: 0, returnCount: 0 });
  
  const passengerVehicles = cachedVehicles.filter(v => 
    v.isActive === true && v.usageType === 'passengers' && v.capacity > 0
  );
  const currentDate = getCurrentDateISO();
  const tripsOnDate = [...new Set(filteredInvoices.map(inv => inv.trip).filter(t => t))];
  
  const container = document.getElementById('vehicleRowsContainer');
  const newRowHTML = generateVehicleTripRow(newIndex, '', '', 0, 0, passengerVehicles, tripsOnDate);
  container.insertAdjacentHTML('beforeend', newRowHTML);
  attachVehicleTripEvents(newIndex);
}

function removeVehicleTripRow(index) {
  vehicleTripRows.splice(index, 1);
  rebuildVehicleTripRows();
}

function rebuildVehicleTripRows() {
  const passengerVehicles = cachedVehicles.filter(v => 
    v.isActive === true && v.usageType === 'passengers' && v.capacity > 0
  );
  const tripsOnDate = [...new Set(filteredInvoices.map(inv => inv.trip).filter(t => t))];
  
  let html = '';
  for (let i = 0; i < vehicleTripRows.length; i++) {
    const row = vehicleTripRows[i];
    html += generateVehicleTripRow(i, row.vehicleId, row.tripName, row.goCount, row.returnCount, passengerVehicles, tripsOnDate);
  }
  
  if (vehicleTripRows.length === 0) {
    html += generateVehicleTripRow(0, '', '', 0, 0, passengerVehicles, tripsOnDate);
  }
  
  document.getElementById('vehicleRowsContainer').innerHTML = html;
  
  for (let i = 0; i < vehicleTripRows.length; i++) {
    attachVehicleTripEvents(i);
  }
  if (vehicleTripRows.length === 0) attachVehicleTripEvents(0);
}

function attachVehicleTripEvents(index) {
  const vehicleSelect = document.querySelector(`.vehicle-select[data-row="${index}"]`);
  const tripSelect = document.querySelector(`.trip-select[data-row="${index}"]`);
  const goInput = document.querySelector(`.go-count[data-row="${index}"]`);
  const returnInput = document.querySelector(`.return-count[data-row="${index}"]`);
  
  if (vehicleSelect) {
    vehicleSelect.onchange = () => {
      if (!vehicleTripRows[index]) vehicleTripRows[index] = {};
      vehicleTripRows[index].vehicleId = vehicleSelect.value;
    };
  }
  if (tripSelect) {
    tripSelect.onchange = () => {
      if (!vehicleTripRows[index]) vehicleTripRows[index] = {};
      vehicleTripRows[index].tripName = tripSelect.value;
    };
  }
  if (goInput) {
    goInput.oninput = () => {
      if (!vehicleTripRows[index]) vehicleTripRows[index] = {};
      vehicleTripRows[index].goCount = parseInt(goInput.value) || 0;
    };
  }
  if (returnInput) {
    returnInput.oninput = () => {
      if (!vehicleTripRows[index]) vehicleTripRows[index] = {};
      vehicleTripRows[index].returnCount = parseInt(returnInput.value) || 0;
    };
  }
}

async function saveAllVehicleTripRows() {
  const saveBtn = document.querySelector('#vehiclesModal .btn-primary');
  if (saveBtn && saveBtn.disabled) {
    console.log('⚠️ Save already in progress, ignoring...');
    return;
  }
  
  const currentDate = getCurrentDateISO();
  if (!currentDate) {
    showToast('Please select a date first', 'error');
    return;
  }
  
  const rows = document.querySelectorAll('.vehicle-trip-row');
  const records = [];
  const selectedVehicleIds = [];
  
  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    const vehicleSelect = row.querySelector('.vehicle-select');
    const tripSelect = row.querySelector('.trip-select');
    const goInput = row.querySelector('.go-count');
    const returnInput = row.querySelector('.return-count');
    
    const vehicleId = vehicleSelect ? vehicleSelect.value : '';
    const tripName = tripSelect ? tripSelect.value : '';
    const goCount = parseInt(goInput ? goInput.value : 0) || 0;
    const returnCount = parseInt(returnInput ? returnInput.value : 0) || 0;
    
    if (vehicleId && tripName && (goCount > 0 || returnCount > 0)) {
      records.push({ vehicleId, tripName, goCount, returnCount });
      if (!selectedVehicleIds.includes(vehicleId)) {
        selectedVehicleIds.push(vehicleId);
      }
    }
  }
  
  if (records.length === 0) {
    showToast('⚠️ Please select at least one vehicle and trip', 'error');
    return;
  }
  
  if (saveBtn) {
    saveBtn.disabled = true;
    saveBtn.textContent = '⏳ Saving...';
  }
  
  showToast('Saving vehicle trips...', 'info');
  
  try {
    const result = await gas('saveVehicleTripRecords', {
      date: currentDate,
      records: JSON.stringify(records),
      centerName: currentUser?.centerName
    });
    
    if (result && result.success) {
      selectedVehicles = selectedVehicleIds;
      updateSelectionBadges();
      showToast(`✅ Saved ${records.length} vehicle trips`, 'success');
      closeModal('vehiclesModal');
    } else {
      showToast('❌ Failed to save: ' + (result.message || 'Unknown error'), 'error');
    }
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  } finally {
    if (saveBtn) {
      saveBtn.disabled = false;
      saveBtn.textContent = '✅ Save All';
    }
  }
}

async function createUpsell() {
  const saveBtn = document.getElementById('createUpsellBtn');
  if (saveBtn && saveBtn.disabled) return;
  
  // ✅ خريطة الحفظ لكل نشاط
  const items = [];
  const rows = document.querySelectorAll('#upsellModal tbody tr');
  
  for (const row of rows) {
    const activityName = row.cells[0].textContent;
    const priceInput = row.querySelector('.upsell-price');
    const qtyInput = row.querySelector('.upsell-quantity');
    
    const price = parseFloat(priceInput?.value) || 0;
    const qty = parseInt(qtyInput?.value) || 0;
    
    if (qty > 0 && price > 0) {
      // ✅ تحديد العمود المناسب في Invoices
      let invoiceColumn = '';
      switch(activityName) {
        case '1 Intro': invoiceColumn = 'K'; break;  // sgl في الكود
        case '2 Intro': invoiceColumn = 'L'; break;  // dbl
        case 'Diver': invoiceColumn = 'M'; break;    // trpl
        case 'C.D.': invoiceColumn = 'N'; break;     // extra
        case 'S.R.': invoiceColumn = 'O'; break;     // camel
        default: invoiceColumn = 'K';
      }
      
      items.push({
        name: activityName,
        quantity: qty,
        price: price,
        invoiceColumn: invoiceColumn  // ✅ العمود المطلوب للحفظ
      });
    }
  }
  
  if (items.length === 0) {
    showToast('Please select at least one activity', 'error');
    return;
  }
  
  const instructorId = document.getElementById('sellingInstructor')?.value;
  if (!instructorId) {
    showToast('Please select selling instructor', 'error');
    return;
  }
  
  // جمع المدفوعات
  const payments = {
    cashUSD: parseFloat(document.getElementById('cashUSD')?.value) || 0,
    cashEUR: parseFloat(document.getElementById('cashEUR')?.value) || 0,
    cashGBP: parseFloat(document.getElementById('cashGBP')?.value) || 0,
    cashLE: parseFloat(document.getElementById('cashLE')?.value) || 0,
    visaUSD: parseFloat(document.getElementById('visaUSD')?.value) || 0,
    visaEUR: parseFloat(document.getElementById('visaEUR')?.value) || 0,
    visaGBP: parseFloat(document.getElementById('visaGBP')?.value) || 0,
    visaLE: parseFloat(document.getElementById('visaLE')?.value) || 0
  };
  
  if (saveBtn) {
    saveBtn.disabled = true;
    saveBtn.textContent = '⏳ Creating...';
  }
  
  showToast('Creating Upsell invoice...', 'info');
  
  try {
    const result = await gas('createUpSellInvoice', {
      originalVoucherNo: currentUpsellVoucher,
      upSellItems: JSON.stringify(items),
      upSellAmounts: JSON.stringify(payments),
      instructorId: instructorId,
      centerName: currentUser?.centerName,
      currency: currentUpsellCurrency
    });
    
    if (result?.success) {
      showToast(`✅ Upsell invoice created: ${result.voucherNo}`, 'success');
      closeUpsellModal();
      await loadInvoices();
      renderTable();
    } else {
      showToast('❌ Failed to create Upsell: ' + (result?.message || 'Unknown error'), 'error');
    }
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  } finally {
    if (saveBtn) {
      saveBtn.disabled = false;
      saveBtn.textContent = 'Create UpSell';
    }
  }
}

function formatPrice(value) {
  if (value === null || value === undefined) return '0';
  let num = parseFloat(value);
  if (isNaN(num)) num = 0;
  return num.toString();
}

function getCurrencySymbol(currency) {
  const symbols = { 'USD': '$', 'EUR': '€', 'GBP': '£', 'LE': 'LE' };
  return symbols[currency] || currency;
}

let cachedExchangeRates = null;

async function getExchangeRates() {
  if (cachedExchangeRates) return cachedExchangeRates;
  
  try {
    const result = await gas('getLatestExchangeRates');
    if (result && result.success) {
      cachedExchangeRates = {
        USD: 1,
        EUR: result.rates?.EUR || result.eur_rate || 1,
        GBP: result.rates?.GBP || result.gbp_rate || 1,
        LE: result.rates?.LE || result.le_rate || 1
      };
    } else {
      // قيم افتراضية في حالة فشل الجلب
      cachedExchangeRates = { USD: 1, EUR: 1.05, GBP: 1.25, LE: 0.05 };
    }
  } catch(e) {
    console.warn('Failed to fetch exchange rates:', e);
    cachedExchangeRates = { USD: 1, EUR: 1.05, GBP: 1.25, LE: 0.05 };
  }
  
  return cachedExchangeRates;
}

async function getRate(currency) {
  const rates = await getExchangeRates();
  return rates[currency] || 1;
}

}
async function updateRemainingWithRates() {
  // 1️⃣ حساب إجمالي الأنشطة بالعملة المختارة
  let totalInSaleCurrency = 0;
  const rows = document.querySelectorAll('#upsellModal tbody tr');
 
 for (const row of rows) {
  const priceInput = row.querySelector('.upsell-price');
  const qtyInput = row.querySelector('.upsell-quantity');
  
  // ✅ إذا كان الحقل فارغاً، اعتبر القيمة 0
  const price = priceInput?.value === '' ? 0 : parseFloat(priceInput?.value) || 0;
  const qty = qtyInput?.value === '' ? 0 : parseFloat(qtyInput?.value) || 0;
  totalInSaleCurrency += price * qty;
}
        
    
  // 2️⃣ جلب أسعار الصرف من الخادم (بدون قيم افتراضية)
  let rates = null;
  try {
   const result = await gas('getLatestExchangeRates', { centerName: currentUser?.centerName });
    console.log('💰 Exchange rates from server:', result);
    
    if (result && result.bUSD) {
      rates = {
        USD: result.bUSD,
        EUR: result.bEUR,
        GBP: result.bGBP,
        LE: result.bLE || 1
      };
    }
  } catch(e) {
    console.error('Failed to fetch exchange rates:', e);
  }
  
  // ❌ إذا لم تنجح في جلب الأسعار، لا تحسب المتبقي
  if (!rates) {
    console.warn('⚠️ No exchange rates available, skipping calculation');
    document.getElementById('remainingAmount').textContent = '?';
    return;
  }
  
  console.log('✅ Using rates from server:', rates);
  
  const saleCurrency = currentUpsellCurrency || 'USD';
  const saleRateToLE = rates[saleCurrency];
  
  // ❌ إذا كانت العملة غير موجودة في الأسعار
  if (!saleRateToLE) {
    console.warn(`⚠️ Exchange rate for ${saleCurrency} not found`);
    document.getElementById('remainingAmount').textContent = '?';
    return;
  }
  
  // 3️⃣ تحويل الإجمالي إلى جنيه
  const totalInLE = totalInSaleCurrency * saleRateToLE;
  
  // 4️⃣ جمع المدفوعات وتحويلها إلى جنيه
  let paidInLE = 0;
  
  const getValue = (id) => {
  const el = document.getElementById(id);
  if (!el) return 0;
  let val = parseFloat(el.value);
  return isNaN(val) ? 0 : val;
};
  
  paidInLE += getValue('cashUSD') * rates.USD;
  paidInLE += getValue('cashEUR') * rates.EUR;
  paidInLE += getValue('cashGBP') * rates.GBP;
  paidInLE += getValue('cashLE') * rates.LE;
  paidInLE += getValue('visaUSD') * rates.USD;
  paidInLE += getValue('visaEUR') * rates.EUR;
  paidInLE += getValue('visaGBP') * rates.GBP;
  paidInLE += getValue('visaLE') * rates.LE;
  
  // 5️⃣ حساب المتبقي
  const remainingInLE = totalInLE - paidInLE;
  const remainingInSaleCurrency = remainingInLE / saleRateToLE;
  
  // 6️⃣ تحديث الواجهة
  document.getElementById('totalAmount').textContent = totalInSaleCurrency.toFixed(2);
  document.getElementById('remainingAmount').textContent = remainingInSaleCurrency > 0 ? remainingInSaleCurrency.toFixed(2) : '0.00';
  document.getElementById('totalCurrency').textContent = getCurrencySymbol(saleCurrency);
  document.getElementById('remainingCurrency').textContent = getCurrencySymbol(saleCurrency);
  
  const createBtn = document.getElementById('createUpsellBtn');
  if (createBtn) createBtn.disabled = remainingInSaleCurrency > 0.01;
}

async function loadBranches() {
  if (!currentUser) return;
  
  const branchAccessTypes = ['Owner', 'Accountant', 'FinancialManager'];
  if (!branchAccessTypes.includes(currentUser.type)) return;
  
  const branchSelector = document.getElementById('branchSelector');
  if (branchSelector) branchSelector.style.display = 'inline-block';
  
  try {
    let branches = [];
    
    if (currentUser.centerId) {
      const result = await gas('getBranchesByCenterId', { centerId: currentUser.centerId });
      if (result && Array.isArray(result)) {
        branches = result;
      } else if (result && result.success && Array.isArray(result.data)) {
        branches = result.data;
      }
    }
    
    const select = document.getElementById('branchSelect');
    if (!select) return;
    
    select.innerHTML = '<option value="">🌍 جميع الفروع</option>';
    
    if (branches.length > 0) {
      branches.forEach(branch => {
        select.innerHTML += `<option value="${escapeHtml(branch.id)}">${escapeHtml(branch.name)}</option>`;
      });
    }
    
    window.branchesList = branches;
    
    // ✅ إزالة المستمع القديم قبل إضافة مستمع جديد
    const newSelect = select.cloneNode(true);
    select.parentNode.replaceChild(newSelect, select);
    
    newSelect.addEventListener('change', async (e) => {
      const branchId = e.target.value;
      const selectedBranch = window.branchesList.find(b => b.id === branchId);
      
      if (branchId && selectedBranch) {
        currentUser.branchName = selectedBranch.name;
        currentUser.branchId = branchId;
        sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
        showToast(`✅ تم التبديل إلى ${selectedBranch.name}`, 'success');
      } else {
        delete currentUser.branchName;
        delete currentUser.branchId;
        sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
        showToast('🌍 تم التبديل إلى جميع الفروع', 'success');
      }
      
      // ✅ إعادة تحميل الفواتير مع الفرع الجديد
      lastFilterParams = '';
      invoicesLoaded = false;
      await loadInvoices();
      applyFilters();
    });
  } catch(e) {
    console.warn('loadBranches error:', e);
  }
}

async function saveAllLogisticsRows() {

    const tripSelect = row.querySelector('.logistics-trip-select');
    const goInput = row.querySelector('.logistics-go-count');
    const returnInput = row.querySelector('.logistics-return-count');
    
    const vehicleId = vehicleSelect ? vehicleSelect.value : '';
    const tripName = tripSelect ? tripSelect.value : '';
    const goCount = parseInt(goInput ? goInput.value : 0) || 0;
    const returnCount = parseInt(returnInput ? returnInput.value : 0) || 0;

  // ✅ تعطيل الزر وتغيير النص

  }
  
  showToast('Saving logistics records...', 'info');

      date: currentDate,
      records: JSON.stringify(records),

  function attachLogisticsRowEvents(index) {

  const goInput = document.querySelector(`.logistics-go-count[data-row="${index}"]`);
  const returnInput = document.querySelector(`.logistics-return-count[data-row="${index}"]`);
  
  if (vehicleSelect) {
    vehicleSelect.onchange = () => {
      if (!tempLogisticsRows[index]) tempLogisticsRows[index] = {};
      tempLogisticsRows[index].vehicleId = vehicleSelect.value;
    };
  }
  if (tripSelect) {
    tripSelect.onchange = () => {
      if (!tempLogisticsRows[index]) tempLogisticsRows[index] = {};
      tempLogisticsRows[index].tripName = tripSelect.value;
    };
  }
  if (goInput) {
    goInput.oninput = () => {
      if (!tempLogisticsRows[index]) tempLogisticsRows[index] = {};
      tempLogisticsRows[index].goCount = parseInt(goInput.value) || 0;
    };
  }
  if (returnInput) {
    returnInput.oninput = () => {
      if (!tempLogisticsRows[index]) tempLogisticsRows[index] = {};
      tempLogisticsRows[index].returnCount = parseInt(returnInput.value) || 0;
    };
  }

  function addLogisticsRow() {

  isSavingBoats = true;
  
  if (saveBtn) {
    saveBtn.disabled = true;
    saveBtn.textContent = '⏳ Saving...';
  }
  
  showToast('Saving boats and instructors...', 'info');
  
  const currentBeachInstructors = currentAssignments?.beachInstructors || selectedBeachInstructors || [];
  
  const assignments = {
    beachInstructors: currentBeachInstructors,
    boats: selectedBoatsList,
    boatInstructorsMap: instructorsMap
  };
  
  try {
    const deletePromise = gas('deleteInstructorDailyLogsByType', {
      date: currentDate,
      assignmentType: 'Boat',
      centerName: currentUser?.centerName
    });
    
    const savePromise = gas('saveDailyAssignments', {
      date: currentDate,
      data: JSON.stringify(assignments),
      centerName: currentUser?.centerName
    });
    
    await Promise.all([deletePromise, savePromise]);
    
    selectedBoats = selectedBoatsList;
    boatInstructorsMap = instructorsMap;
    currentAssignments = assignments;
    
    const logPromises = [];
    for (const [boatId, instructors] of Object.entries(instructorsMap)) {
      const boat = cachedBoats.find(b => b.id === boatId);
      const boatName = boat?.name || boatId;
      for (const instructorId of instructors) {
        const instructor = cachedInstructors.find(i => i.id === instructorId);
        if (instructor) {
          logPromises.push(gas('assignInstructorToDailyLog', {
            date: currentDate,
            instructorId: instructorId,
            instructorName: instructor.name,
            assignmentType: 'Boat',
            boatId: boatId,
            boatName: boatName,
            centerName: currentUser?.centerName
          }));
        }
      }
    }
    
    if (logPromises.length > 0) {
      await Promise.all(logPromises);
    }
    
    updateSelectionBadges();
    showToast(`✅ Saved ${selectedBoatsList.length} boats with ${Object.values(instructorsMap).flat().length} instructors`, 'success');
    closeModal('boatsModal');
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  } finally {
    isSavingBoats = false;
    if (saveBtn) {
      saveBtn.disabled = false;
      saveBtn.textContent = '✅ Save All';
    }
  }
}
  // ✅ حساب المقاعد المحجوزة من السيارات المختارة في فواتير أخرى (نفس التاريخ ونفس الرحلة)
async function getTotalBookedSeatsForVehicle(vehicleId, currentDate, tripName, excludeVoucher) {
  let totalGo = 0;
  let totalReturn = 0;
  
  // البحث في جميع الفواتير (allInvoices) عن نفس التاريخ ونفس الرحلة
  for (const inv of allInvoices) {
    const invDate = formatDateDDMMMYYYY(inv.activeDate);
    const invTrip = inv.trip;
    const invVoucher = inv.voucherNo;
    
    if (invDate === currentDate && invTrip === tripName && invVoucher !== excludeVoucher) {
      let vehiclesData = [];
      try {
        vehiclesData = JSON.parse(inv.VehiclesUsed || '[]');
      } catch(e) {}
      
      for (const v of vehiclesData) {
        if (v.vehicleId === vehicleId) {
          totalGo += v.goCount || 0;
          totalReturn += v.returnCount || 0;
        }
      }
    }
  }
  
  return { goSeats: totalGo, returnSeats: totalReturn };
}
  async function getCachedData(fetchFunction, key) {
  const now = Date.now();
  if (lastFetchTime && (now - lastFetchTime) < CACHE_DURATION) {
    if (key === 'boats' && cachedBoatsList) return cachedBoatsList;
    if (key === 'vehicles' && cachedVehiclesList) return cachedVehiclesList;
    if (key === 'instructors' && cachedInstructorsList) return cachedInstructorsList;
  }
  
  const data = await fetchFunction();
  if (key === 'boats') cachedBoatsList = data;
  if (key === 'vehicles') cachedVehiclesList = data;
  if (key === 'instructors') cachedInstructorsList = data;
  lastFetchTime = now;
  
  return data;
}
async function saveBoatsAndInstructors() {
  const selectedBoatsList = [];
  const instructorsMap = {};
  
  document.querySelectorAll('#boatsModal .boat-checkbox:checked').forEach(cb => {
    const boatId = cb.dataset.id;
    selectedBoatsList.push(boatId);
    
    const instructorSelect = document.querySelector(`.boat-instructor-select[data-id="${boatId}"]`);
    if (instructorSelect && instructorSelect.value) {
      // ✅ دعم اختيار متعدد (إذا كان select يسمح بـ multiple)
      if (instructorSelect.multiple) {
        instructorsMap[boatId] = Array.from(instructorSelect.selectedOptions).map(opt => opt.value);
      } else {
        instructorsMap[boatId] = [instructorSelect.value];
      }
    } else {
      // احتفظ بالمدربين السابقين إذا لم يتم تغييرهم
      instructorsMap[boatId] = boatInstructorsMap[boatId] || [];
    }
  });
  
  const currentDate = getCurrentDateISO();
  if (!currentDate) {
    showToast('الرجاء اختيار تاريخ أولاً', 'error');
    return;
  }
  
  selectedBoats = selectedBoatsList;
  boatInstructorsMap = instructorsMap;
  updateSelectionBadges();
  
  // ✅ حفظ في الخادم
  const assignments = currentAssignments || {};
  assignments.boats = selectedBoats;
  assignments.boatInstructorsMap = boatInstructorsMap;
  
  try {
    const result = await gas('saveDailyAssignments', {
      date: currentDate,
      data: JSON.stringify(assignments),
      centerName: currentUser?.centerName
    });
    
    if (result && result.success !== false) {
      currentAssignments = assignments;
      showToast(`✅ تم حفظ ${selectedBoatsList.length} مركب`, 'success');
    } else {
      showToast('⚠️ تم الحفظ محلياً فقط (خطأ في الخادم)', 'warning');
    }
  } catch(e) {
    console.warn('saveBoatsAndInstructors error:', e);
    showToast('تم الحفظ محلياً فقط', 'info');
  }
  
  closeModal('boatsModal');
}
// دوال إزالة الصفوف
function removeVehicleRow(index) {
  const row = document.querySelector(`.vehicle-row[data-row-index="${index}"]`);
  if (row) {
    row.remove();
    // ✅ إعادة ترقيم الصفوف المتبقية
    const remainingRows = document.querySelectorAll('.vehicle-row');
    remainingRows.forEach((row, newIndex) => {
      row.setAttribute('data-row-index', newIndex);
      // تحديث المعرفات داخل الصف
      row.querySelectorAll('[data-row]').forEach(el => {
        el.setAttribute('data-row', newIndex);
      });
    });
  }
}

async function onDateChange() {
  const fromDate = document.getElementById('filterFromDate').value;
  const toDate = document.getElementById('filterToDate').value;
  
  if (!fromDate && !toDate) return;
  
  // مسح التخزين المؤقت
  clearVehicleSeatsCache();
  
  lastFilterParams = '';
  invoicesLoaded = false;
  
  showToast('جاري تحميل الفواتير...', 'info');
  
  await loadInvoices();
  
  if (fromDate && toDate && fromDate === toDate) {
    await loadAndPopulateAssignments(fromDate);
    await loadLogisticsData(fromDate);
    await refreshLogisticsBadge();
  } else {
    selectedBeachInstructors = [];
    selectedBoats = [];
    selectedVehicles = [];
    preloadedData.logisticsRecords = [];
    updateSelectionBadges();
  }
  
  applyFilters();
  renderTable();
  renderPagination();
  updateSelectionButtonsState();
}

function clearVehicleSeatsCache() {
  cachedVehicleSeats = {};
  cachedBoatSeats = {};

async function refreshLogisticsBadge() {
  const currentDate = getCurrentDateISO();
  if (!currentDate) return;
  
  try {
    const result = await gas('getLogisticsRecords', { 
      date: currentDate,
      centerName: currentUser?.centerName 
    });
    
    if (result?.success && result.data) {
      preloadedData.logisticsRecords = result.data;
      const badge = document.getElementById('selectedLogisticsBadge');
      if (badge) badge.textContent = result.data.length;
    } else {
      preloadedData.logisticsRecords = [];
      const badge = document.getElementById('selectedLogisticsBadge');
      if (badge) badge.textContent = '0';
    }
  } catch(e) {
    console.warn('refreshLogisticsBadge error:', e);
  }
}
