<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة الحضور والغياب</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:20px; }
    select, input { padding:6px 10px; margin:4px; font-size:14px; }
    table { border-collapse: collapse; width:100%; margin-top:20px; }
    th, td { border:1px solid #aaa; padding:6px; text-align:center; }
    th { background:#0284c7; color:white; }
    input.text-box { width:50px; text-align:center; }
    #loading { display:none; }
  </style>
</head>
<body>

<h2>إدارة الحضور والغياب</h2>

<label>السنة:</label>
<select id="yearSelect"></select>

<label>الشهر:</label>
<select id="monthSelect"></select>

<button onclick="nextStep()">التالي</button>
<br><br>

<label>اختر اليوم:</label>
<input type="date" id="dayInput" disabled>
<button onclick="loadAttendance()">تحميل قائمة الحضور</button>

<div id="loading">جاري التحميل...</div>

<table id="attendanceTable">
  <thead>
    <tr id="headerRow">
      <th>الرصيد</th>
      <th>الموظف</th>
      <th>المسمى الوظيفي</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbygznz2Q9GyNuHdpP3WAdt_PPtCmcIb-4CozLXAGoA1Y_smleOLIRjp59upbwDPf35h/exec";

// تعبئة كومبو بوكس السنة والشهر
(function init() {
  const yearSelect = document.getElementById('yearSelect');
  const monthSelect = document.getElementById('monthSelect');
  const currentYear = new Date().getFullYear();
  for(let y=currentYear-1; y<=currentYear+1; y++){
    const opt = document.createElement('option'); opt.value=opt.text=y; yearSelect.add(opt);
  }
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  months.forEach((m,i)=>{ const opt=document.createElement('option'); opt.value=i+1; opt.text=m; monthSelect.add(opt); });
})();

function nextStep(){
  const year = document.getElementById('yearSelect').value;
  const month = document.getElementById('monthSelect').value;
  if(!year || !month){ alert("اختر السنة والشهر"); return; }

  setLoading(true);
  // تخزين السنة والشهر في B1 وB2
  fetch(`${WEB_APP_URL}?action=setYearMonth&year=${year}&month=${month}`)
    .then(res=>res.json())
    .then(data=>{
      if(data.success){
        document.getElementById('dayInput').disabled = false;
        alert("تم تخزين السنة والشهر بنجاح، اختر اليوم الآن");
      } else alert("فشل التخزين");
    })
    .finally(()=>setLoading(false));
}

function loadAttendance(){
  const day = document.getElementById('dayInput').value;
  if(!day){ alert("اختر اليوم"); return; }
  setLoading(true);

  fetch(`${WEB_APP_URL}?action=getAttendance&date=${day}`)
    .then(res=>res.json())
    .then(data=>{
      const tbody = document.querySelector('#attendanceTable tbody');
      tbody.innerHTML="";
      data.forEach(emp=>{
        const tr = document.createElement('tr');

        // تكست بوكس الرصيد من العمود ZZZ
        const tdBalance = document.createElement('td');
        const inputBalance = document.createElement('input');
        inputBalance.className="text-box";
        inputBalance.value = emp.balance;
        tdBalance.appendChild(inputBalance);
        tr.appendChild(tdBalance);

        const tdName = document.createElement('td'); tdName.textContent=emp.name; tr.appendChild(tdName);
        const tdPos = document.createElement('td'); tdPos.textContent=emp.position; tr.appendChild(tdPos);

        // إضافة الأيام
        emp.days.forEach(dayText=>{
          const td = document.createElement('td'); td.textContent = dayText; tr.appendChild(td);
        });

        tbody.appendChild(tr);
      });

      // تحديث الهيدر إذا لزم
      const headerRow = document.getElementById('headerRow');
      while(headerRow.cells.length>3) headerRow.deleteCell(-1);
      if(data.length>0){
        data[0].days.forEach((_,i)=>{
          const th = document.createElement('th'); th.textContent = i+1;
          headerRow.appendChild(th);
        });
      }
    })
    .finally(()=>setLoading(false));
}

function setLoading(show){ document.getElementById('loading').style.display = show?"block":"none"; }

</script>
</body>
</html>
