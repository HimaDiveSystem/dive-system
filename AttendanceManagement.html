<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة الحضور</title>

<style>
body{
font-family:Arial;
background:#0f172a;
margin:0;
padding:30px;
color:#111;
}

.container{
background:white;
border-radius:15px;
padding:25px;
max-width:1100px;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h2{
margin-top:0;
text-align:center;
}

.controls{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

select,input,button{
padding:8px 12px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
background:#0284c7;
color:white;
cursor:pointer;
border:none;
}

button:hover{
background:#0369a1;
}

.backBtn{
background:#475569;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#0284c7;
color:white;
}

.dayInput{
width:90px;
text-align:center;
border-radius:6px;
border:1px solid #ccc;
padding:5px;
}
</style>
</head>

<body>

<div class="container">

<h2>إدارة الحضور</h2>

<div class="controls">

<select id="yearSelect"></select>

<select id="monthSelect"></select>

<button id="pickBtn">اختيار الشهر</button>

<input type="date" id="dateInput">

<button class="backBtn" onclick="goBack()">العودة للوحة المحاسب</button>

</div>

<table id="table">

<thead>
<tr>
<th>الرصيد</th>
<th>الاسم</th>
<th>الوظيفة</th>
<th>الحالة</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

const GAS_URL='https://script.google.com/macros/s/AKfycbyOHyFno2HN64uPMC3d9TJgpx70_2byz0WYhbU5A6ZZQkS45zRFlbFZcFvHjjQHyIlv/exec';

const yearSelect=document.getElementById("yearSelect");
const monthSelect=document.getElementById("monthSelect");
const dateInput=document.getElementById("dateInput");
const tableBody=document.querySelector("#table tbody");

const currentYear=new Date().getFullYear();

for(let y=currentYear-5;y<=currentYear+5;y++){
let opt=document.createElement("option");
opt.value=y;
opt.textContent=y;
yearSelect.appendChild(opt);
}

const months=["يناير","فبراير","مارس","ابريل","مايو","يونيو","يوليو","اغسطس","سبتمبر","اكتوبر","نوفمبر","ديسمبر"];

months.forEach((m,i)=>{
let opt=document.createElement("option");
opt.value=i+1;
opt.textContent=m;
monthSelect.appendChild(opt);
});

function jsonp(url,callback){

const cb="cb_"+Date.now();

window[cb]=function(data){
delete window[cb];
script.remove();
callback(data);
};

const script=document.createElement("script");
script.src=url+"&callback="+cb;
document.body.appendChild(script);

}

document.getElementById("pickBtn").onclick=function(){

const year=yearSelect.value;
const month=monthSelect.value;

jsonp(`${GAS_URL}?action=setYearMonth&year=${year}&month=${month}`,function(res){

if(res.success){
alert("تم حفظ الشهر");
}else{
alert("فشل الحفظ");
}

});

};

dateInput.addEventListener("change",function(){

loadAttendance(this.value);

});

function loadAttendance(date){

jsonp(`${GAS_URL}?action=getAttendance&date=${date}`,function(data){

renderTable(data);

});

}

function renderTable(data){

tableBody.innerHTML="";

data.forEach(emp=>{

const tr=document.createElement("tr");

const balanceTd=document.createElement("td");
balanceTd.textContent=emp.balance;

const nameTd=document.createElement("td");
nameTd.textContent=emp.name;

const posTd=document.createElement("td");
posTd.textContent=emp.position;

const dayTd=document.createElement("td");

const input=document.createElement("input");
input.className="dayInput";
input.value=emp.days[0]||"";

colorInput(input);

input.onchange=function(){

colorInput(this);

saveDay(emp.name,dateInput.value,this.value);

};

dayTd.appendChild(input);

tr.appendChild(balanceTd);
tr.appendChild(nameTd);
tr.appendChild(posTd);
tr.appendChild(dayTd);

tableBody.appendChild(tr);

});

}

function saveDay(name,date,value){

jsonp(`${GAS_URL}?action=saveAttendanceDay&employee=${encodeURIComponent(name)}&date=${date}&value=${encodeURIComponent(value)}`,function(res){

if(!res.success){
console.log("فشل الحفظ");
}

});

}

function colorInput(input){

const v=input.value.trim();

if(v=="حضور") input.style.background="#bbf7d0";
else if(v=="غياب") input.style.background="#fecaca";
else if(v=="إجازة") input.style.background="#fed7aa";
else input.style.background="white";

}

function goBack(){

window.location.href="accountantDashboard.html";

}

</script>

</body>
</html>
