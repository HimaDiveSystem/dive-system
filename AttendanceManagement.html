<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>سجل الحضور والغياب</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
    body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px;}
    .container{max-width:1100px;margin:0 auto;background:white;border-radius:30px;box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden;}
    .header{background:linear-gradient(135deg,#1e2b4f,#152238);color:white;padding:18px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
    .header h2{color:#ffd966;font-size:20px;display:flex;align-items:center;gap:8px;}
    .header-right{display:flex;align-items:center;gap:10px;}
    .user-badge{background:rgba(255,255,255,0.1);border:1px solid #ffd966;color:white;padding:7px 16px;border-radius:40px;font-size:13px;}
    .back-btn{background:#ffd966;color:#1e2b4f;border:none;padding:7px 18px;border-radius:40px;cursor:pointer;font-weight:700;font-size:13px;}
    .logout-btn{background:#e74c3c;color:white;border:none;padding:7px 16px;border-radius:40px;cursor:pointer;font-weight:600;font-size:13px;}
    .content{padding:24px;}
    .date-bar{background:#f0f4fa;border-radius:16px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
    .date-bar label{font-weight:700;color:#1e2b4f;font-size:14px;}
    .date-bar input[type=date]{padding:9px 14px;border:2px solid #d0ddeb;border-radius:12px;font-size:14px;color:#1e2b4f;}
    .date-bar input[type=date]:focus{outline:none;border-color:#1e2b4f;}
    .btn-load{background:#1e2b4f;color:white;border:none;padding:9px 22px;border-radius:40px;cursor:pointer;font-weight:700;font-size:13px;}
    .btn-load:hover{background:#2a4f8c;}
    .btn-save{background:#27ae60;color:white;border:none;padding:9px 22px;border-radius:40px;cursor:pointer;font-weight:700;font-size:13px;}
    .btn-save:hover{background:#219a52;}
    .btn-save:disabled{background:#95a5a6;cursor:not-allowed;}
    .date-status{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;}
    .date-new{background:#fff3cd;color:#856404;}
    .date-exists{background:#d1f2eb;color:#0e6655;}
    .quick-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px;padding:12px 16px;background:#f8f9fa;border-radius:14px;}
    .quick-bar span{font-size:13px;font-weight:700;color:#1e2b4f;}
    .qbtn{padding:6px 14px;border:none;border-radius:20px;cursor:pointer;font-size:12px;font-weight:700;}
    .qbtn-green{background:#d5f5e3;color:#1e8449;}
    .qbtn-green:hover{background:#27ae60;color:white;}
    .qbtn-red{background:#fde8e8;color:#c0392b;}
    .qbtn-red:hover{background:#e74c3c;color:white;}
    .qbtn-blue{background:#d6eaf8;color:#1a5276;}
    .qbtn-blue:hover{background:#3498db;color:white;}
    .qbtn-orange{background:#fef3cd;color:#b7770d;}
    .qbtn-orange:hover{background:#f39c12;color:white;}
    .table-wrap{overflow-x:auto;border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,0.08);}
    table{width:100%;border-collapse:collapse;background:white;}
    thead th{background:#1e2b4f;color:#ffd966;padding:13px 12px;text-align:right;font-size:13px;white-space:nowrap;}
    tbody td{padding:10px 12px;border-bottom:1px solid #e9f0fa;font-size:13px;vertical-align:middle;}
    tbody tr:last-child td{border-bottom:none;}
    tbody tr:hover{background:#f5f9ff;}
    .emp-serial{font-weight:700;color:#1e2b4f;font-size:12px;}
    .emp-name{font-weight:600;color:#2c3e50;}
    .emp-pos{font-size:11px;color:#95a5a6;}
    .status-group{display:flex;gap:5px;flex-wrap:wrap;}
    .sb{padding:5px 11px;border:2px solid #dee2e6;border-radius:20px;cursor:pointer;font-size:11px;font-weight:700;background:#f8f9fa;color:#6c757d;white-space:nowrap;transition:.15s;}
    .sb:hover{opacity:.8;}
    .sb-حضور.active{background:#27ae60!important;color:white!important;border-color:#27ae60!important;}
    .sb-غياب.active{background:#e74c3c!important;color:white!important;border-color:#e74c3c!important;}
    .sb-اجازة.active{background:#3498db!important;color:white!important;border-color:#3498db!important;}
    .sb-نصف.active{background:#f39c12!important;color:white!important;border-color:#f39c12!important;}
    .sb-بدون.active{background:#8e44ad!important;color:white!important;border-color:#8e44ad!important;}
    .sb-يوم2.active{background:#c0392b!important;color:white!important;border-color:#c0392b!important;}
    .summary-bar{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px;}
    .sum-card{flex:1;min-width:90px;background:#f0f4fa;border-radius:12px;padding:12px;text-align:center;border-top:3px solid #1e2b4f;}
    .sum-num{font-size:22px;font-weight:700;color:#1e2b4f;}
    .sum-lbl{font-size:11px;color:#6c757d;margin-top:3px;}
    .toast{position:fixed;bottom:20px;right:20px;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;color:white;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2);transform:translateY(50px);opacity:0;transition:.35s;}
    .toast.show{transform:translateY(0);opacity:1;}
    .toast-success{background:#27ae60;}
    .toast-error{background:#e74c3c;}
    .toast-info{background:#3498db;}
    .loader{border:4px solid #f3f3f3;border-top:4px solid #1e2b4f;border-radius:50%;width:36px;height:36px;animation:spin 1s linear infinite;margin:40px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .empty-msg{text-align:center;padding:50px;color:#95a5a6;font-size:14px;line-height:2;}
    @media(max-width:600px){.status-group{flex-wrap:wrap;}.sb{font-size:10px;padding:4px 7px;}.date-bar{flex-direction:column;align-items:flex-start;}}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>📅 سجل الحضور والغياب</h2>
    <div class="header-right">
      <span class="user-badge" id="userBadge">—</span>
      <button class="back-btn" onclick="goBack()">🔙 العودة</button>
      <button class="logout-btn" onclick="doLogout()">خروج</button>
    </div>
  </div>

  <div class="content">
    <div class="date-bar">
      <label>📆 تاريخ الحضور:</label>
      <input type="date" id="attDate">
      <button class="btn-load" onclick="loadDate()">📋 تحميل</button>
      <span id="dateStatus" class="date-status" style="display:none;"></span>
    </div>

    <div class="quick-bar" id="quickBar" style="display:none;">
      <span>تعبئة سريعة:</span>
      <button class="qbtn qbtn-green"  onclick="fillAll('حضور')">✅ الكل حضور</button>
      <button class="qbtn qbtn-red"    onclick="fillAll('غياب')">❌ الكل غياب</button>
      <button class="qbtn qbtn-blue"   onclick="fillAll('اجازة')">🏖️ الكل إجازة</button>
      <button class="qbtn qbtn-orange" onclick="fillAll('نصف يوم')">½ الكل نصف يوم</button>
      <div style="margin-right:auto;">
        <button class="btn-save" id="saveBtn" onclick="saveAttendance()">💾 حفظ الحضور</button>
      </div>
    </div>

    <div id="tableArea">
      <div class="empty-msg">اختر تاريخاً واضغط <b>تحميل</b> لبدء تسجيل الحضور</div>
    </div>

    <div class="summary-bar" id="summaryBar" style="display:none;">
      <div class="sum-card" style="border-color:#27ae60"><div class="sum-num" id="sPresent">0</div><div class="sum-lbl">حضور + إجازة</div></div>
      <div class="sum-card" style="border-color:#e74c3c"><div class="sum-num" id="sAbsent">0</div><div class="sum-lbl">غياب</div></div>
      <div class="sum-card" style="border-color:#f39c12"><div class="sum-num" id="sHalf">0</div><div class="sum-lbl">نصف يوم</div></div>
      <div class="sum-card" style="border-color:#8e44ad"><div class="sum-num" id="sUnauth">0</div><div class="sum-lbl">غياب بدون إذن</div></div>
      <div class="sum-card" style="border-color:#95a5a6"><div class="sum-num" id="sNone">0</div><div class="sum-lbl">لم يُسجَّل</div></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbxeRvm1tQs494dCVgw_lKUcbstGbnbNtdlIa7guPEIOkBFsiLuslbx-nEwqFsQt1AQT/exec';

let currentUser = null;
let employees   = [];
let statusMap   = {};
let currentDate = '';

// الحالات وأوزانها
const STATUSES = [
  { key:'حضور',             cls:'حضور',  label:'✅ حضور'       },
  { key:'غياب',             cls:'غياب',  label:'❌ غياب'       },
  { key:'اجازة',            cls:'اجازة', label:'🏖️ إجازة'      },
  { key:'نصف يوم',          cls:'نصف',   label:'½ نصف يوم'    },
  { key:'غياب بدون اذن',   cls:'بدون',  label:'⛔ بدون إذن'   },
  { key:'غياب يوم بيومين', cls:'يوم2',  label:'🔴 يوم×2'      }
];

// ══ JSONP ══
function jsonp(action, params={}) {
  return new Promise((res, rej) => {
    const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*99999);
    params.action = action; params.callback = cb;
    const qs = Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(String(v??''))).join('&');
    const sc = document.createElement('script');
    const to = setTimeout(()=>{delete window[cb];sc.remove();rej(new Error('Timeout (25s)'));},25000);
    window[cb] = d=>{clearTimeout(to);delete window[cb];sc.remove();res(d);};
    sc.onerror = ()=>{clearTimeout(to);delete window[cb];sc.remove();rej(new Error('خطأ في الاتصال'));};
    sc.src = GAS+'?'+qs;
    document.head.appendChild(sc);
  });
}

// ══ INIT ══
document.addEventListener('DOMContentLoaded', () => {
  const ud = sessionStorage.getItem('currentUser');
  if (!ud) {
    document.querySelector('.content').innerHTML =
      '<div class="empty-msg"><h3 style="color:#e74c3c">يرجى تسجيل الدخول أولاً</h3>' +
      '<button class="btn-load" style="margin:16px auto 0;display:block;" onclick="location.href=\'AccountantDashboard.html\'">العودة للوحة التحكم</button></div>';
    return;
  }
  try { currentUser = JSON.parse(ud); } catch(e) { location.href='AccountantDashboard.html'; return; }
  document.getElementById('userBadge').textContent = currentUser.name || '—';

  // اليوم الحالي
  const t = new Date();
  document.getElementById('attDate').value =
    t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
});

// ══ LOAD DATE ══
async function loadDate() {
  const dv = document.getElementById('attDate').value;
  if (!dv) { showToast('اختر تاريخاً أولاً','error'); return; }
  currentDate = dv;
  statusMap   = {};
  document.getElementById('tableArea').innerHTML    = '<div class="loader"></div>';
  document.getElementById('quickBar').style.display = 'none';
  document.getElementById('summaryBar').style.display = 'none';
  document.getElementById('dateStatus').style.display = 'none';

  try {
    const r = await jsonp('getOrCreateAttendanceDate', { dateStr: dv });
    if (!r || !r.success) throw new Error(r?.message || 'فشل التحميل');

    employees = r.employees || [];
    if (r.existingData) Object.assign(statusMap, r.existingData);

    // حالة التاريخ
    const ds = document.getElementById('dateStatus');
    ds.style.display = 'inline-block';
    ds.className = 'date-status ' + (r.isNew ? 'date-new' : 'date-exists');
    ds.textContent  = r.isNew ? '🆕 تاريخ جديد' : '✏️ بيانات موجودة — تعديل';

    if (!employees.length) {
      document.getElementById('tableArea').innerHTML =
        '<div class="empty-msg">⚠️ لا يوجد موظفون في سجل Working_Days<br>' +
        '<small>تأكد من إضافة الموظفين عبر صفحة إدارة الموظفين</small></div>';
      return;
    }

    renderTable();
    document.getElementById('quickBar').style.display   = 'flex';
    document.getElementById('summaryBar').style.display = 'flex';
    updateSummary();
    showToast('تم تحميل ' + employees.length + ' موظف', 'info');

  } catch(e) {
    document.getElementById('tableArea').innerHTML =
      '<div class="empty-msg" style="color:#e74c3c;">❌ ' + e.message + '</div>';
    showToast(e.message, 'error');
  }
}

// ══ RENDER ══
function renderTable() {
  let html = '<div class="table-wrap"><table>' +
    '<thead><tr><th>#</th><th>الرقم</th><th>الاسم</th><th>الوظيفة</th><th>الحالة</th></tr></thead><tbody>';

  employees.forEach((emp, i) => {
    const cur = statusMap[emp.serial] || '';
    const btns = STATUSES.map(s =>
      '<button class="sb sb-' + s.cls + ' ' + (cur===s.key ? 'active' : '') + '" ' +
      'onclick="setStatus(\'' + emp.serial.replace(/'/g,"\\'") + '\',\'' + s.key + '\')">' +
      s.label + '</button>'
    ).join('');

    // لون الصف حسب الحالة
    const rowColor = cur==='حضور'||cur==='اجازة' ? 'background:#f0fff4;'
                   : cur==='غياب'||cur==='غياب بدون اذن'||cur==='غياب يوم بيومين' ? 'background:#fff5f5;'
                   : cur==='نصف يوم' ? 'background:#fffbf0;' : '';

    html += '<tr id="row_' + emp.serial + '" style="' + rowColor + '">' +
      '<td style="color:#95a5a6;font-size:12px;">' + (i+1) + '</td>' +
      '<td><span class="emp-serial">' + (emp.serial||'—') + '</span></td>' +
      '<td><span class="emp-name">' + (emp.name||'—') + '</span></td>' +
      '<td><span class="emp-pos">' + (emp.position||'—') + '</span></td>' +
      '<td><div class="status-group">' + btns + '</div></td>' +
    '</tr>';
  });

  html += '</tbody></table></div>';
  document.getElementById('tableArea').innerHTML = html;
}

// ══ SET STATUS ══
function setStatus(serial, status) {
  if (statusMap[serial] === status) {
    delete statusMap[serial]; // toggle off
  } else {
    statusMap[serial] = status;
  }
  // إعادة رسم الصف فقط
  const cur = statusMap[serial] || '';
  const row = document.getElementById('row_' + serial);
  if (!row) return;

  // تحديث أزرار الصف
  const btns = row.querySelectorAll('.sb');
  STATUSES.forEach((s, i) => {
    if (!btns[i]) return;
    btns[i].classList.toggle('active', cur===s.key);
  });

  // تحديث لون الصف
  row.style.background = cur==='حضور'||cur==='اجازة' ? '#f0fff4'
    : cur==='غياب'||cur==='غياب بدون اذن'||cur==='غياب يوم بيومين' ? '#fff5f5'
    : cur==='نصف يوم' ? '#fffbf0' : '';

  updateSummary();
}

// ══ FILL ALL ══
function fillAll(status) {
  employees.forEach(e => { statusMap[e.serial] = status; });
  renderTable();
  updateSummary();
}

// ══ SUMMARY ══
function updateSummary() {
  let present=0,absent=0,half=0,unauth=0,none=0;
  employees.forEach(e => {
    const s = statusMap[e.serial] || '';
    if (s==='حضور'||s==='اجازة') present++;
    else if (s==='غياب') absent++;
    else if (s==='نصف يوم') half++;
    else if (s==='غياب بدون اذن'||s==='غياب يوم بيومين') unauth++;
    else none++;
  });
  document.getElementById('sPresent').textContent = present;
  document.getElementById('sAbsent').textContent  = absent;
  document.getElementById('sHalf').textContent    = half;
  document.getElementById('sUnauth').textContent  = unauth;
  document.getElementById('sNone').textContent    = none;
}

// ══ SAVE ══
async function saveAttendance() {
  if (!currentDate) { showToast('لم يُحدَّد تاريخ','error'); return; }
  if (!employees.length) { showToast('لا يوجد موظفون','error'); return; }

  const unset = employees.filter(e => !statusMap[e.serial]);
  if (unset.length) {
    const names = unset.slice(0,3).map(e=>e.name).join('، ') + (unset.length>3?' ...':'');
    if (!confirm(unset.length + ' موظف لم يُسجَّل حضورهم:\n' + names + '\n\nهل تريد الحفظ بدونهم؟')) return;
  }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '⏳ جاري الحفظ...';

  try {
    const entries = employees
      .filter(e => statusMap[e.serial])
      .map(e => ({ serial:e.serial, status:statusMap[e.serial] }));

    const r = await jsonp('saveAttendance', {
      dateStr: currentDate,
      entries: JSON.stringify(entries)
    });

    if (r && r.success) {
      showToast('✅ تم حفظ حضور ' + r.saved + ' موظف', 'success');
      await loadDate(); // إعادة تحميل للتأكيد
    } else {
      showToast('❌ ' + (r?.message || 'فشل الحفظ'), 'error');
    }
  } catch(e) {
    showToast('❌ ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '💾 حفظ الحضور';
  }
}

// ══ HELPERS ══
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast-' + (type||'success') + ' show';
  setTimeout(() => t.className = 'toast', 3500);
}
function goBack()   { window.location.href = 'AccountantDashboard.html'; }
function doLogout() {
  if (confirm('هل تريد تسجيل الخروج؟')) {
    sessionStorage.removeItem('currentUser');
    window.location.href = 'index.html';
  }
}
</script>
</body>
</html>
