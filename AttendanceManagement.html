<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>إدارة الحضور والغياب - لوحة المحاسب</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background:#0b1a2e; color:#0b1a2e;
      height:100vh; display:flex; justify-content:center; align-items:flex-start;
      padding-top:40px;
    }
    .container {
      width:95%; max-width:1200px;
      background:rgba(255,255,255,0.95); backdrop-filter:blur(8px);
      padding:30px 40px; border-radius:24px;
      box-shadow:0 15px 30px rgba(0,0,0,0.25);
    }
    h2 { text-align:center; margin-bottom:25px; font-size:28px; }
    .controls { display:flex; gap:20px; flex-wrap:wrap; margin-bottom:25px; align-items:center; }
    .controls select, .controls input { padding:10px 14px; font-size:16px; border-radius:12px; border:1px solid #cbd5e1; }
    .controls button { padding:10px 25px; font-size:16px; border:none; border-radius:12px; background:#0284c7; color:white; cursor:pointer; transition:.2s; }
    .controls button:hover { background:#0f2b4b; }
    table { width:100%; border-collapse:collapse; margin-top:15px; }
    th, td { border:1px solid #cbd5e1; padding:8px 10px; text-align:center; font-size:14px; }
    th { background:#0284c7; color:white; }
    td input { width:100%; padding:6px 8px; border-radius:8px; border:1px solid #cbd5e1; text-align:center; }
    .back-btn { margin-bottom:15px; display:inline-block; background:#0f2b4b; color:white; padding:8px 16px; border-radius:12px; text-decoration:none; }
    .back-btn:hover { background:#0284c7; }
  </style>
</head>
<body>

<div class="container">

  <a href="Dashboard.html" class="back-btn">عودة إلى لوحة المحاسب</a>

  <h2>إدارة الحضور والغياب</h2>

  <div class="controls">
    <select id="yearSelect"></select>
    <select id="monthSelect"></select>
    <button id="pickDateBtn">اختيار اليوم</button>
    <input type="date" id="dayInput" style="display:none;">
  </div>

  <table id="attendanceTable">
    <thead>
      <tr>
        <th>رصيد الموظف</th>
        <th>الاسم</th>
        <th>الوظيفة</th>
        <th>الحضور / الغياب / الإجازة</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script>
  const WEB_APP_URL = "YOUR_WEB_APP_URL";
  const SHEET_NAME = "Working_Days";

  const yearSelect = document.getElementById('yearSelect');
  const monthSelect = document.getElementById('monthSelect');
  const pickDateBtn = document.getElementById('pickDateBtn');
  const dayInput = document.getElementById('dayInput');
  const tbody = document.querySelector('#attendanceTable tbody');

  // تعبئة كومبو بوكس السنوات والشهور
  const currentYear = new Date().getFullYear();
  for(let y=currentYear-5;y<=currentYear+1;y++) { const opt = document.createElement('option'); opt.value=y; opt.text=y; yearSelect.appendChild(opt);}
  ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'].forEach((m,i)=>{ const opt=document.createElement('option'); opt.value=i+1; opt.text=m; monthSelect.appendChild(opt);});

  pickDateBtn.addEventListener('click',()=>{
    // حفظ السنة والشهر في الشيت
    fetch(`${WEB_APP_URL}?action=setYearMonth&year=${yearSelect.value}&month=${monthSelect.value}`)
      .then(r=>r.json()).then(res=>{
        if(res.success){
          dayInput.style.display='inline';
          dayInput.value = '';
          dayInput.focus();
        } else { alert('فشل تخزين السنة والشهر'); }
      });
  });

  dayInput.addEventListener('change',()=> loadAttendance(dayInput.value));

  async function loadAttendance(dateStr){
    tbody.innerHTML='';
    if(!dateStr) return;
    const res = await fetch(`${WEB_APP_URL}?action=getAttendance&date=${dateStr}`);
    const data = await res.json();
    data.forEach(emp=>{
      const tr = document.createElement('tr');

      // رصيد الموظف
      const balanceTd = document.createElement('td');
      const balanceInput = document.createElement('input');
      balanceInput.value = emp.balance;
      balanceInput.readOnly = true;
      balanceInput.style.backgroundColor='#e2e8f0';
      balanceTd.appendChild(balanceInput);
      tr.appendChild(balanceTd);

      // الاسم
      const nameTd = document.createElement('td');
      nameTd.textContent = emp.name;
      tr.appendChild(nameTd);

      // الوظيفة
      const posTd = document.createElement('td');
      posTd.textContent = emp.position;
      tr.appendChild(posTd);

      // حالة اليوم
      const dayTd = document.createElement('td');
      const dayInputBox = document.createElement('input');
      dayInputBox.value = emp.days[0]||'';
      setDayColor(dayInputBox);
      dayInputBox.addEventListener('change',()=>{
        setDayColor(dayInputBox);
        fetch(`${WEB_APP_URL}?action=saveAttendanceDay&employee=${encodeURIComponent(emp.name)}&date=${dateStr}&value=${encodeURIComponent(dayInputBox.value)}`)
          .then(r=>r.json())
          .then(res=>{ if(!res.success) console.error('فشل الحفظ'); })
          .catch(e=>console.error('خطأ:',e));
      });
      dayTd.appendChild(dayInputBox);
      tr.appendChild(dayTd);

      tbody.appendChild(tr);
    });
  }

  function setDayColor(input){
    const val = input.value.trim();
    if(val==='حضور') input.style.backgroundColor='#b6f0b6';
    else if(val==='غياب') input.style.backgroundColor='#f0b6b6';
    else if(val==='إجازة') input.style.backgroundColor='#f0e2b6';
    else input.style.backgroundColor='white';
  }
</script>

</body>
</html>
