<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>سجل الحضور والغياب</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');

    :root {
      --navy:    #0f1e3c;
      --navy2:   #1a2f5a;
      --gold:    #f0b429;
      --gold2:   #ffd166;
      --green:   #06d6a0;
      --red:     #ef233c;
      --blue:    #4361ee;
      --orange:  #fb8500;
      --purple:  #7b2d8b;
      --bg:      #f0f4ff;
      --white:   #ffffff;
      --card:    #ffffff;
      --border:  #dce4f5;
      --text:    #1a2f5a;
      --muted:   #7b8db0;
      --radius:  16px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Cairo',sans-serif;
      background: linear-gradient(140deg,#0f1e3c 0%,#1a3a6e 50%,#0f2d5a 100%);
      min-height:100vh; padding:0 0 60px;
      color: var(--text);
    }

    /* ═══════════════════ HEADER ═══════════════════ */
    .top-bar {
      background: linear-gradient(90deg, var(--navy) 0%, var(--navy2) 100%);
      border-bottom: 2px solid var(--gold);
      padding: 14px 28px;
      display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
    }
    .top-bar-left { display:flex; align-items:center; gap:16px; }
    .logo-icon { font-size:28px; }
    .top-title { color:var(--gold); font-size:18px; font-weight:900; letter-spacing:1px; }
    .top-meta { display:flex; gap:14px; flex-wrap:wrap; align-items:center; }
    .meta-pill {
      background:rgba(255,255,255,0.07); border:1px solid rgba(255,209,70,0.25);
      color:#c8d8f8; padding:5px 14px; border-radius:40px; font-size:12px;
      display:flex; align-items:center; gap:6px;
    }
    .meta-pill b { color:var(--gold2); }
    .back-btn {
      background: var(--gold); color: var(--navy);
      border:none; padding:8px 20px; border-radius:40px;
      font-family:'Cairo',sans-serif; font-weight:700; font-size:13px;
      cursor:pointer; transition:.2s; white-space:nowrap;
    }
    .back-btn:hover { background:var(--gold2); transform:translateY(-1px); }

    /* ═══════════════════ MAIN CARD ═══════════════════ */
    .main-wrap { max-width:920px; margin:30px auto; padding:0 16px; }

    .section-card {
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      overflow:hidden;
      margin-bottom:20px;
    }
    .section-head {
      background: linear-gradient(90deg,var(--navy) 0%,var(--navy2) 100%);
      padding:16px 24px;
      display:flex; align-items:center; gap:12px;
    }
    .section-head .ico { font-size:22px; }
    .section-head h3 { color:var(--gold); font-size:16px; font-weight:700; }
    .section-body { padding:24px; }

    /* ═══════════════════ STEP 1: الشهر والسنة ═══════════════════ */
    .step-row { display:flex; gap:16px; flex-wrap:wrap; align-items:flex-end; }
    .fgroup { flex:1; min-width:140px; }
    .fgroup label { display:block; color:var(--muted); font-size:12px; font-weight:600; margin-bottom:7px; }
    .fgroup select, .fgroup input {
      width:100%; padding:11px 14px;
      border:2px solid var(--border); border-radius:12px;
      font-family:'Cairo',sans-serif; font-size:14px; font-weight:600; color:var(--navy);
      background:var(--bg); transition:.18s; outline:none;
      appearance:none; -webkit-appearance:none;
    }
    .fgroup select:focus, .fgroup input:focus { border-color:var(--blue); background:white; }
    .select-wrap { position:relative; }
    .select-wrap::after {
      content:'▾'; position:absolute; left:12px; top:50%; transform:translateY(-50%);
      color:var(--muted); pointer-events:none; font-size:14px;
    }
    .confirm-btn {
      background: linear-gradient(135deg,var(--blue),#2941c9);
      color:white; border:none; padding:11px 28px; border-radius:12px;
      font-family:'Cairo',sans-serif; font-weight:700; font-size:14px;
      cursor:pointer; transition:.2s; white-space:nowrap; align-self:flex-end;
    }
    .confirm-btn:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(67,97,238,.4); }
    .confirm-btn:disabled { opacity:.5; cursor:default; transform:none; }

    /* ═══════════════════ STEP 2: التاريخ ═══════════════════ */
    .date-section { display:none; }
    .date-input-row { display:flex; gap:14px; align-items:flex-end; flex-wrap:wrap; }
    .date-status-badge {
      padding:7px 16px; border-radius:40px; font-size:12px; font-weight:700;
      display:inline-flex; align-items:center; gap:6px;
    }
    .badge-new { background:#e8f5e9; color:#2e7d32; border:1px solid #a5d6a7; }
    .badge-exists { background:#fff3e0; color:#e65100; border:1px solid #ffcc80; }

    /* ═══════════════════ ATTENDANCE LIST ═══════════════════ */
    .att-list { display:none; }
    .att-list-inner { display:flex; flex-direction:column; gap:12px; margin-top:4px; }

    .att-row {
      background:var(--bg); border:2px solid var(--border);
      border-radius:16px; padding:16px 18px;
      transition:.2s;
    }
    .att-row:hover { border-color:#b0c4f8; }
    .att-row.locked { background:#f8fff8; border-color:#b2dfdb; }

    .att-top { display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:12px; }
    .emp-serial-badge {
      background:var(--navy); color:var(--gold);
      font-size:11px; font-weight:700; padding:4px 12px; border-radius:40px;
      min-width:80px; text-align:center; white-space:nowrap;
    }
    .emp-name-select {
      flex:1; min-width:160px; padding:9px 12px;
      border:2px solid var(--border); border-radius:10px;
      font-family:'Cairo',sans-serif; font-size:13px; font-weight:600; color:var(--navy);
      background:white; outline:none; cursor:pointer;
    }
    .emp-name-select:focus { border-color:var(--blue); }

    /* حالات الحضور */
    .status-chips { display:flex; gap:8px; flex-wrap:wrap; }
    .chip {
      display:flex; align-items:center; gap:6px;
      padding:6px 14px; border-radius:40px; border:2px solid transparent;
      cursor:pointer; font-family:'Cairo',sans-serif; font-size:12px; font-weight:700;
      transition:.15s; user-select:none;
    }
    .chip input[type=checkbox] { display:none; }
    .chip-present  { background:#e8f5e9; color:#1b5e20; border-color:#a5d6a7; }
    .chip-absent   { background:#fce4ec; color:#880e4f; border-color:#f48fb1; }
    .chip-leave    { background:#e3f2fd; color:#0d47a1; border-color:#90caf9; }
    .chip-unauth   { background:#fff3e0; color:#bf360c; border-color:#ffcc80; }
    .chip-double   { background:#f3e5f5; color:#4a148c; border-color:#ce93d8; }
    .chip-half     { background:#e0f7fa; color:#004d40; border-color:#80deea; }
    .chip-quarter  { background:#f9fbe7; color:#33691e; border-color:#c5e1a5; }

    .chip.active { transform:scale(1.05); box-shadow:0 2px 12px rgba(0,0,0,0.12); }
    .chip-present.active  { background:#1b5e20; color:white; border-color:#1b5e20; }
    .chip-absent.active   { background:#880e4f; color:white; border-color:#880e4f; }
    .chip-leave.active    { background:#0d47a1; color:white; border-color:#0d47a1; }
    .chip-unauth.active   { background:#bf360c; color:white; border-color:#bf360c; }
    .chip-double.active   { background:#4a148c; color:white; border-color:#4a148c; }
    .chip-half.active     { background:#004d40; color:white; border-color:#004d40; }
    .chip-quarter.active  { background:#33691e; color:white; border-color:#33691e; }

    /* إجمالي الموظف */
    .emp-total-row {
      margin-top:10px; display:flex; align-items:center; gap:10px;
      font-size:12px; color:var(--muted); font-weight:600;
    }
    .total-val {
      background:var(--navy); color:var(--gold2);
      padding:3px 14px; border-radius:40px; font-size:13px; font-weight:700;
    }

    /* زر إضافة موظف */
    .add-emp-btn {
      display:flex; align-items:center; gap:8px;
      background: linear-gradient(135deg,var(--green),#04a87e);
      color:white; border:none; padding:12px 22px; border-radius:12px;
      font-family:'Cairo',sans-serif; font-weight:700; font-size:14px;
      cursor:pointer; transition:.2s; margin-top:10px; width:fit-content;
    }
    .add-emp-btn:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(6,214,160,.4); }

    /* ═══════════════════ SUMMARY ═══════════════════ */
    .summary-bar {
      background: linear-gradient(90deg,var(--navy) 0%,var(--navy2) 100%);
      border-radius:16px; padding:16px 24px;
      display:flex; gap:20px; flex-wrap:wrap; align-items:center;
      color:white; margin-top:16px;
    }
    .sum-item { text-align:center; }
    .sum-num { font-size:22px; font-weight:900; color:var(--gold2); }
    .sum-lbl { font-size:11px; color:#a0b4d8; margin-top:2px; }
    .sum-div { width:1px; background:rgba(255,255,255,0.15); height:40px; }

    /* ═══════════════════ SAVE BTN ═══════════════════ */
    .save-section { display:none; justify-content:center; margin-top:6px; }
    .save-btn {
      background: linear-gradient(135deg,#f0b429,#e09010);
      color:var(--navy); border:none; padding:14px 50px; border-radius:50px;
      font-family:'Cairo',sans-serif; font-weight:900; font-size:16px;
      cursor:pointer; transition:.2s; letter-spacing:.5px;
      box-shadow:0 4px 20px rgba(240,180,41,.4);
    }
    .save-btn:hover { transform:translateY(-3px); box-shadow:0 8px 28px rgba(240,180,41,.5); }
    .save-btn:disabled { opacity:.5; cursor:default; transform:none; }

    /* ═══════════════════ TOAST ═══════════════════ */
    .toast {
      position:fixed; bottom:24px; right:24px; z-index:9999;
      padding:12px 22px; border-radius:14px; font-family:'Cairo',sans-serif;
      font-size:13px; font-weight:700; color:white;
      box-shadow:0 6px 24px rgba(0,0,0,0.2);
      transform:translateY(80px); opacity:0; transition:.35s;
      display:flex; align-items:center; gap:10px; max-width:320px;
    }
    .toast.show { transform:translateY(0); opacity:1; }
    .toast-success { background:#1b5e20; }
    .toast-error   { background:#b71c1c; }
    .toast-info    { background:#0d47a1; }

    /* ═══════════════════ LOADER ═══════════════════ */
    .loader-ring {
      width:32px; height:32px; border:4px solid rgba(67,97,238,.15);
      border-top-color:var(--blue); border-radius:50%;
      animation:spin .8s linear infinite; margin:0 auto;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    @media(max-width:600px) {
      .step-row { flex-direction:column; }
      .top-meta { display:none; }
      .status-chips { gap:6px; }
      .chip { font-size:11px; padding:5px 10px; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="top-bar-left">
    <span class="logo-icon">📋</span>
    <span class="top-title">سجل الحضور والغياب</span>
  </div>
  <div class="top-meta">
    <div class="meta-pill">👤 <b id="topUser">—</b></div>
    <div class="meta-pill">🏢 <b id="topCenter">—</b></div>
    <div class="meta-pill">🔖 <b id="topBranch">—</b></div>
  </div>
  <button class="back-btn" onclick="goBack()">🔙 العودة</button>
</div>

<div class="main-wrap">

  <!-- ══ STEP 1: الشهر والسنة ══ -->
  <div class="section-card">
    <div class="section-head">
      <span class="ico">📅</span>
      <h3>اختيار فترة المحاسبة</h3>
    </div>
    <div class="section-body">
      <div class="step-row">
        <div class="fgroup">
          <label>📆 الشهر</label>
          <div class="select-wrap">
            <select id="selMonth">
              <option value="">— اختر الشهر —</option>
              <option value="Jan">يناير — Jan</option>
              <option value="Feb">فبراير — Feb</option>
              <option value="Mar">مارس — Mar</option>
              <option value="Apr">أبريل — Apr</option>
              <option value="May">مايو — May</option>
              <option value="Jun">يونيو — Jun</option>
              <option value="Jul">يوليو — Jul</option>
              <option value="Aug">أغسطس — Aug</option>
              <option value="Sep">سبتمبر — Sep</option>
              <option value="Oct">أكتوبر — Oct</option>
              <option value="Nov">نوفمبر — Nov</option>
              <option value="Dec">ديسمبر — Dec</option>
            </select>
          </div>
        </div>
        <div class="fgroup">
          <label>🗓️ السنة</label>
          <div class="select-wrap">
            <select id="selYear"></select>
          </div>
        </div>
        <button class="confirm-btn" onclick="confirmPeriod()">✔ تأكيد الفترة</button>
      </div>
    </div>
  </div>

  <!-- ══ STEP 2: التاريخ ══ -->
  <div class="section-card date-section" id="dateSection">
    <div class="section-head">
      <span class="ico">🗓️</span>
      <h3 id="dateHeadTxt">تسجيل يوم حضور</h3>
    </div>
    <div class="section-body">
      <div class="date-input-row">
        <div class="fgroup" style="max-width:220px;">
          <label>📌 التاريخ</label>
          <input type="date" id="inputDate" onchange="onDateChange()">
        </div>
        <div id="dateBadge"></div>
        <button class="confirm-btn" id="loadDateBtn" onclick="loadDate()" style="display:none;">
          🔍 تحميل / فتح التاريخ
        </button>
      </div>
    </div>
  </div>

  <!-- ══ STEP 3: قائمة الحضور ══ -->
  <div class="section-card att-list" id="attSection">
    <div class="section-head">
      <span class="ico">👥</span>
      <h3 id="attHeadTxt">تسجيل الحضور</h3>
    </div>
    <div class="section-body">
      <div class="att-list-inner" id="attListInner"></div>
      <button class="add-emp-btn" id="addEmpBtn" onclick="addEmpRow()">➕ إضافة موظف</button>

      <!-- ملخص اليوم -->
      <div class="summary-bar" id="summaryBar" style="display:none;">
        <div class="sum-item"><div class="sum-num" id="sumTotal">0</div><div class="sum-lbl">إجمالي الموظفين</div></div>
        <div class="sum-div"></div>
        <div class="sum-item"><div class="sum-num" id="sumPresent">0</div><div class="sum-lbl">حضور كامل</div></div>
        <div class="sum-div"></div>
        <div class="sum-item"><div class="sum-num" id="sumHalf">0</div><div class="sum-lbl">نصف يوم</div></div>
        <div class="sum-div"></div>
        <div class="sum-item"><div class="sum-num" id="sumAbsent">0</div><div class="sum-lbl">غياب</div></div>
        <div class="sum-div"></div>
        <div class="sum-item"><div class="sum-num" id="sumLeave">0</div><div class="sum-lbl">إجازة</div></div>
      </div>
    </div>
  </div>

  <!-- زر الحفظ -->
  <div class="save-section" id="saveSection">
    <button class="save-btn" id="saveBtn" onclick="saveAll()">💾 حفظ كل التسجيلات</button>
  </div>

</div><!-- /main-wrap -->

<div class="toast" id="toast"></div>

<!-- ═══════════════════════════════════ SCRIPT ═══════════════════════════════════ -->
<script>
const GAS = 'https://script.google.com/macros/s/AKfycbyOHyFno2HN64uPMC3d9TJgpx70_2byz0WYhbU5A6ZZQkS45zRFlbFZcFvHjjQHyIlv/exec';

// قيم الحالات
const STATUS_VALUES = {
  'حضور':              1,
  'غياب':              0,
  'اجازة':             1,
  'غياب بدون اذن':    -1,
  'غياب يوم بيومين':  -2,
  'نصف يوم':           0.5,
  'ربع يوم':           0.25
};
const STATUS_KEYS = Object.keys(STATUS_VALUES);
const STATUS_CLASS = {
  'حضور':             'chip-present',
  'غياب':             'chip-absent',
  'اجازة':            'chip-leave',
  'غياب بدون اذن':   'chip-unauth',
  'غياب يوم بيومين': 'chip-double',
  'نصف يوم':          'chip-half',
  'ربع يوم':          'chip-quarter'
};

let currentUser = null;
let allEmployees = [];   // [{serial, name, position}]
let currentMonth = '';   // Jan, Feb...
let currentYear  = '';   // 2025
let currentDate  = '';   // 2025-06-21
let dateExists   = false;
let dateColData  = {};   // {serial: status}  عند تحميل تاريخ موجود
let empTotals    = {};   // {serial: total}   من عمود ZZZ
let rowCounter   = 0;

// ══ INIT ══
document.addEventListener('DOMContentLoaded', () => {
  // سنوات
  const yr = new Date().getFullYear();
  const sel = document.getElementById('selYear');
  for (let y = yr - 1; y <= yr + 1; y++) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    if (y === yr) o.selected = true;
    sel.appendChild(o);
  }
  // تاريخ اليوم
  const today = new Date();
  document.getElementById('inputDate').value = toDateInput(today);

  // الشهر الحالي
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('selMonth').value = months[today.getMonth()];

  // session
  const ud = sessionStorage.getItem('currentUser');
  if (ud) {
    try {
      currentUser = JSON.parse(ud);
      document.getElementById('topUser').textContent   = currentUser.name       || '—';
      document.getElementById('topCenter').textContent = currentUser.centerName || '—';
      document.getElementById('topBranch').textContent = currentUser.branchName || '—';
    } catch(e) {}
  }
});

// ══ JSONP ══
function jsonpRequest(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    params.action = action; params.callback = cb;
    const qs = Object.entries(params).map(([k,v]) => k+'='+encodeURIComponent(String(v??''))).join('&');
    const sc = document.createElement('script');
    const to = setTimeout(() => { delete window[cb]; sc.remove(); reject(new Error('Timeout')); }, 25000);
    window[cb] = d => { clearTimeout(to); delete window[cb]; sc.remove(); resolve(d); };
    sc.onerror = () => { clearTimeout(to); delete window[cb]; sc.remove(); reject(new Error('Network')); };
    sc.src = GAS + '?' + qs;
    document.head.appendChild(sc);
  });
}

// ══ STEP 1: تأكيد الفترة ══
async function confirmPeriod() {
  currentMonth = document.getElementById('selMonth').value;
  currentYear  = document.getElementById('selYear').value;
  if (!currentMonth || !currentYear) { showToast('اختر الشهر والسنة أولاً', 'error'); return; }

  document.getElementById('dateHeadTxt').textContent = 'تسجيل يوم — ' + currentMonth + ' ' + currentYear;
  document.getElementById('dateSection').style.display = 'block';
  document.getElementById('attSection').style.display  = 'none';
  document.getElementById('saveSection').style.display = 'none';
  document.getElementById('attListInner').innerHTML = '';
  rowCounter = 0;

  // تحميل قائمة الموظفين
  showToast('⏳ جاري تحميل الموظفين...', 'info');
  try {
    const res = await jsonpRequest('getEmployeesForAttendance');
    if (Array.isArray(res)) {
      allEmployees = res;
      showToast('✅ تم تحميل ' + res.length + ' موظف', 'success');
    }
  } catch(e) { showToast('تعذّر تحميل الموظفين: ' + e.message, 'error'); }

  // كتابة B1, B2 في الشيت
  try {
    await jsonpRequest('setAttendancePeriod', { month: currentMonth, year: currentYear });
  } catch(e) { console.warn('setAttendancePeriod:', e.message); }

  // تشغيل حدث تغيير التاريخ
  onDateChange();
}

// ══ STEP 2: تغيير التاريخ ══
function onDateChange() {
  const d = document.getElementById('inputDate').value;
  currentDate = d;
  if (!d || !currentMonth) { document.getElementById('loadDateBtn').style.display='none'; return; }

  const badge = document.getElementById('dateBadge');
  badge.innerHTML = '<span class="date-status-badge" id="dStatusBadge">⏳ جاري التحقق...</span>';
  document.getElementById('loadDateBtn').style.display = 'none';
  document.getElementById('attSection').style.display  = 'none';
  document.getElementById('saveSection').style.display = 'none';

  // بحث التاريخ في الشيت
  jsonpRequest('checkAttendanceDate', { date: formatDateForSheet(d) })
    .then(res => {
      if (res && res.exists) {
        dateExists = true;
        badge.innerHTML = '<span class="date-status-badge badge-exists">📂 ' + formatDateForSheet(d) + ' موجود — سيتم تحميل البيانات</span>';
        dateColData = res.colData || {};
        empTotals   = res.totals  || {};
      } else {
        dateExists = false;
        dateColData = {};
        empTotals   = {};
        badge.innerHTML = '<span class="date-status-badge badge-new">✨ ' + formatDateForSheet(d) + ' — يوم جديد</span>';
      }
      document.getElementById('loadDateBtn').style.display = 'inline-flex';
    })
    .catch(() => {
      badge.innerHTML = '<span class="date-status-badge badge-new">🆕 يوم جديد</span>';
      dateExists = false;
      document.getElementById('loadDateBtn').style.display = 'inline-flex';
    });
}

// ══ تحميل / فتح التاريخ ══
function loadDate() {
  document.getElementById('attSection').style.display = 'block';
  document.getElementById('attListInner').innerHTML   = '';
  document.getElementById('summaryBar').style.display = 'none';
  document.getElementById('saveSection').style.display = 'none';
  rowCounter = 0;

  document.getElementById('attHeadTxt').textContent =
    (dateExists ? '✏️ تعديل ' : '➕ إضافة ') + 'حضور — ' + formatDateForSheet(currentDate);

  if (dateExists) {
    // عرض الموظفين المسجّلين
    const registeredSerials = Object.keys(dateColData).filter(s => dateColData[s] !== '' && dateColData[s] !== undefined);
    if (registeredSerials.length === 0) {
      addEmpRow();
    } else {
      registeredSerials.forEach(serial => {
        const emp = allEmployees.find(e => e.serial === serial);
        if (emp) addEmpRow(emp, dateColData[serial]);
      });
      updateSummary();
    }
  } else {
    addEmpRow();
  }

  document.getElementById('saveSection').style.display = 'flex';
  document.getElementById('addEmpBtn').style.display   = 'flex';
}

// ══ إضافة صف موظف ══
function addEmpRow(preEmp = null, preStatus = null) {
  rowCounter++;
  const id = 'row_' + rowCounter;
  const div = document.createElement('div');
  div.className = 'att-row';
  div.id = id;

  const serialBadgeId = 'serial_' + id;
  const selectId      = 'empSel_' + id;
  const chipsId       = 'chips_' + id;
  const totalId       = 'total_' + id;

  div.innerHTML = `
    <div class="att-top">
      <div class="emp-serial-badge" id="${serialBadgeId}">—</div>
      <select class="emp-name-select" id="${selectId}" onchange="onEmpSelect('${id}')">
        <option value="">— اختر الموظف —</option>
        ${allEmployees.map(e => `<option value="${e.serial}" data-name="${e.name}">${e.name} (${e.serial})</option>`).join('')}
      </select>
    </div>
    <div class="status-chips" id="${chipsId}" style="display:none;">
      ${STATUS_KEYS.map(s => `
        <label class="chip ${STATUS_CLASS[s]}" id="chip_${id}_${s.replace(/\s+/g,'_')}">
          <input type="checkbox" value="${s}" onchange="onChipChange('${id}','${s}')">
          ${statusIcon(s)} ${s}
        </label>
      `).join('')}
    </div>
    <div class="emp-total-row" id="totalRow_${id}" style="display:none;">
      <span>📊 إجمالي الشهر (${currentMonth} ${currentYear}):</span>
      <span class="total-val" id="${totalId}">0</span>
    </div>
  `;

  document.getElementById('attListInner').appendChild(div);

  // تحميل مسبق
  if (preEmp) {
    document.getElementById(selectId).value = preEmp.serial;
    document.getElementById(serialBadgeId).textContent = preEmp.serial;
    document.getElementById(chipsId).style.display = 'flex';
    document.getElementById('totalRow_' + id).style.display = 'flex';
    document.getElementById(totalId).textContent = empTotals[preEmp.serial] ?? '—';

    if (preStatus !== null && preStatus !== '') {
      // إيجاد الحالة المقابلة للقيمة
      const statusName = valueToStatus(preStatus);
      if (statusName) {
        const chipEl = document.getElementById('chip_' + id + '_' + statusName.replace(/\s+/g,'_'));
        if (chipEl) {
          chipEl.querySelector('input').checked = true;
          chipEl.classList.add('active');
          hideOtherChips(id, statusName);
        }
      }
    }
  }
}

// ══ اختيار موظف ══
function onEmpSelect(rowId) {
  const sel   = document.getElementById('empSel_' + rowId);
  const serial = sel.value;
  document.getElementById('serial_' + rowId).textContent = serial || '—';
  const chips = document.getElementById('chips_' + rowId);

  if (serial) {
    chips.style.display = 'flex';
    // إعادة تعيين الشرائح
    chips.querySelectorAll('input[type=checkbox]').forEach(cb => {
      cb.checked = false;
      cb.closest('.chip').classList.remove('active');
      cb.closest('.chip').style.display = 'inline-flex';
    });
    // تحميل إجمالي الشهر
    document.getElementById('totalRow_' + rowId).style.display = 'flex';
    document.getElementById('total_' + rowId).textContent = empTotals[serial] ?? '⏳';
    if (!empTotals[serial] && empTotals[serial] !== 0) {
      loadEmpTotal(serial, rowId);
    }
  } else {
    chips.style.display = 'none';
    document.getElementById('serial_' + rowId).textContent = '—';
    document.getElementById('totalRow_' + rowId).style.display = 'none';
  }
}

// ══ تغيير الشريحة (checkbox) ══
function onChipChange(rowId, status) {
  const chipId  = 'chip_' + rowId + '_' + status.replace(/\s+/g,'_');
  const chipEl  = document.getElementById(chipId);
  const checked = chipEl.querySelector('input').checked;

  if (checked) {
    chipEl.classList.add('active');
    hideOtherChips(rowId, status);
    // حفظ فوري
    saveOnEntry(rowId, status);
  } else {
    // إلغاء → عرض كل الشرائح + مسح القيمة
    chipEl.classList.remove('active');
    showAllChips(rowId);
    saveOnEntry(rowId, null);
  }
  updateSummary();
  reloadTotal(rowId);
}

function hideOtherChips(rowId, activeStatus) {
  const chips = document.getElementById('chips_' + rowId);
  chips.querySelectorAll('.chip').forEach(ch => {
    const val = ch.querySelector('input').value;
    ch.style.display = (val === activeStatus) ? 'inline-flex' : 'none';
  });
}

function showAllChips(rowId) {
  const chips = document.getElementById('chips_' + rowId);
  chips.querySelectorAll('.chip').forEach(ch => {
    ch.style.display = 'inline-flex';
    ch.classList.remove('active');
    ch.querySelector('input').checked = false;
  });
}

// ══ حفظ فوري لمدخل واحد ══
async function saveOnEntry(rowId, status) {
  const serial = document.getElementById('empSel_' + rowId)?.value;
  if (!serial || !currentDate) return;
  const val = status !== null ? STATUS_VALUES[status] : '';
  try {
    await jsonpRequest('setAttendanceEntry', {
      serial:    serial,
      date:      formatDateForSheet(currentDate),
      month:     currentMonth,
      year:      currentYear,
      value:     val,
      status:    status || ''
    });
  } catch(e) { console.warn('saveOnEntry:', e.message); }
}

// ══ حفظ الكل ══
async function saveAll() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '⏳ جاري الحفظ...';

  const rows = document.querySelectorAll('.att-row');
  const entries = [];

  rows.forEach(row => {
    const rowId  = row.id;
    const serial = document.getElementById('empSel_' + rowId)?.value;
    if (!serial) return;
    const activeChip = row.querySelector('.chip input:checked');
    const status = activeChip ? activeChip.value : null;
    const val    = status !== null ? STATUS_VALUES[status] : '';
    entries.push({ serial, status: status || '', value: val });
  });

  if (!entries.length) {
    showToast('لا توجد بيانات لحفظها', 'error');
    btn.disabled = false; btn.textContent = '💾 حفظ كل التسجيلات';
    return;
  }

  try {
    const res = await jsonpRequest('saveAttendanceDay', {
      date:    formatDateForSheet(currentDate),
      month:   currentMonth,
      year:    currentYear,
      entries: JSON.stringify(entries)
    });
    if (res && res.success) {
      showToast('✅ تم الحفظ بنجاح', 'success');
      empTotals = res.totals || empTotals;
      updateAllTotals();
    } else {
      showToast('❌ ' + (res?.message || 'فشل الحفظ'), 'error');
    }
  } catch(e) {
    showToast('❌ خطأ: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '💾 حفظ كل التسجيلات';
  }
}

// ══ إعادة تحميل إجمالي موظف ══
async function loadEmpTotal(serial, rowId) {
  try {
    const res = await jsonpRequest('getEmployeeMonthTotal', {
      serial: serial, month: currentMonth, year: currentYear
    });
    const val = res?.total ?? 0;
    empTotals[serial] = val;
    document.getElementById('total_' + rowId).textContent = val;
  } catch(e) {}
}

function reloadTotal(rowId) {
  const serial = document.getElementById('empSel_' + rowId)?.value;
  if (serial) loadEmpTotal(serial, rowId);
}

function updateAllTotals() {
  document.querySelectorAll('.att-row').forEach(row => {
    const serial = document.getElementById('empSel_' + row.id)?.value;
    if (serial && empTotals[serial] !== undefined) {
      document.getElementById('total_' + row.id).textContent = empTotals[serial];
    }
  });
}

// ══ ملخص اليوم ══
function updateSummary() {
  let total=0, present=0, half=0, absent=0, leave=0;
  document.querySelectorAll('.att-row').forEach(row => {
    const serial = document.getElementById('empSel_' + row.id)?.value;
    if (!serial) return;
    total++;
    const activeChip = row.querySelector('.chip input:checked');
    if (!activeChip) return;
    const st = activeChip.value;
    if (st === 'حضور')    present++;
    if (st === 'نصف يوم' || st === 'ربع يوم') half++;
    if (st === 'غياب')    absent++;
    if (st === 'اجازة')   leave++;
  });
  document.getElementById('summaryBar').style.display = total ? 'flex' : 'none';
  document.getElementById('sumTotal').textContent   = total;
  document.getElementById('sumPresent').textContent = present;
  document.getElementById('sumHalf').textContent    = half;
  document.getElementById('sumAbsent').textContent  = absent;
  document.getElementById('sumLeave').textContent   = leave;
}

// ══ مساعدات ══
function formatDateForSheet(d) {
  // 2025-06-21 → 21-6-2025
  if (!d) return '';
  const parts = d.split('-');
  if (parts.length !== 3) return d;
  return parseInt(parts[2]) + '-' + parseInt(parts[1]) + '-' + parts[0];
}

function toDateInput(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function valueToStatus(val) {
  const v = parseFloat(val);
  // بحث دقيق
  const found = Object.entries(STATUS_VALUES).find(([k,vv]) => vv === v && k !== 'اجازة' && k !== 'حضور');
  if (found) return found[0];
  if (v === 1)    return 'حضور';
  if (v === 0)    return 'غياب';
  if (v === 0.5)  return 'نصف يوم';
  if (v === 0.25) return 'ربع يوم';
  if (v === -1)   return 'غياب بدون اذن';
  if (v === -2)   return 'غياب يوم بيومين';
  return null;
}

function statusIcon(s) {
  const icons = {
    'حضور':'✅','غياب':'❌','اجازة':'🏖️',
    'غياب بدون اذن':'⛔','غياب يوم بيومين':'🔴',
    'نصف يوم':'🌓','ربع يوم':'🌒'
  };
  return icons[s] || '';
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast toast-' + (type||'success') + ' show';
  setTimeout(() => t.className = 'toast', 3800);
}

function goBack() { window.history.back(); }
</script>
