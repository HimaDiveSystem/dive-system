<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>🔔 التنبيهات - تعديلات الفواتير</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: linear-gradient(135deg, #1e2b4f 0%, #2c3e50 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); overflow: hidden; }
    
    .header {
      background: linear-gradient(135deg, #1e2b4f 0%, #152238 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }
    
    .header h2 {
      color: #ffd966;
      font-size: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .header h2 span {
      background: #ffd966;
      color: #1e2b4f;
      font-size: 14px;
      padding: 5px 12px;
      border-radius: 30px;
      margin-right: 10px;
    }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    
    .user-details {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.1);
      padding: 8px 20px;
      border-radius: 40px;
      border: 1px solid #ffd966;
    }
    
    .back-btn {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 8px 25px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }
    
    .back-btn:hover {
      background: #ee5253;
      transform: translateY(-2px);
    }
    
    .content { padding: 30px; }
    
    .filter-bar {
      background: #f8f9fa;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 25px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: center;
      border: 2px solid #d0ddeb;
    }
    
    .filter-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .filter-group label {
      color: #1e2b4f;
      font-weight: 600;
      font-size: 14px;
    }
    
    .filter-group select, .filter-group input {
      padding: 10px 15px;
      border: 2px solid #d0ddeb;
      border-radius: 40px;
      font-size: 14px;
      min-width: 150px;
    }
    
    .btn-filter {
      background: #1e2b4f;
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }
    
    .btn-filter:hover {
      background: #ffd966;
      color: #1e2b4f;
    }
    
    .btn-mark-read {
      background: #27ae60;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: 0.3s;
      margin-right: auto;
    }
    
    .btn-mark-read:hover {
      background: #2ecc71;
      transform: translateY(-2px);
    }
    
    .delete-options {
      display: none;
      margin-bottom: 15px;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    
    .btn-danger {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: 0.3s;
    }
    
    .btn-danger:hover {
      background: #c0392b;
      transform: translateY(-2px);
    }
    
    .btn-secondary {
      background: #e9f0fa;
      color: #1e2b4f;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: 0.3s;
    }
    
    .btn-secondary:hover {
      background: #d0ddeb;
    }
    
    .btn-delete {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    
    .btn-delete:hover {
      background: #c0392b;
    }
    
    .notification-checkbox {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #1e2b4f;
      display: none;
    }
    
    .checkbox-column {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .notifications-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .notification-card {
      background: white;
      border: 2px solid #d0ddeb;
      border-radius: 20px;
      padding: 20px;
      transition: 0.3s;
      position: relative;
      cursor: pointer;
    }
    
    .notification-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(30,43,79,0.15);
    }
    
    .notification-card.unread {
      border-right: 8px solid #ffd966;
      background: #fffbf0;
    }
    
    .notification-card.read {
      opacity: 0.8;
    }
    
    .notification-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .notification-title {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .notification-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    
    .icon-edit { background: #fff3cd; color: #856404; }
    .icon-price { background: #d4edda; color: #155724; }
    .icon-cancel { background: #f8d7da; color: #721c24; }
    
    .voucher-badge {
      background: #1e2b4f;
      color: #ffd966;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 700;
    }
    
    .notification-time {
      color: #6c757d;
      font-size: 12px;
    }
    
    .notification-body {
      margin: 10px 0 15px 50px;
    }
    
    .invoice-details {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 15px;
      margin: 15px 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }
    
    .detail-item {
      text-align: center;
    }
    
    .detail-label {
      color: #6c757d;
      font-size: 11px;
      margin-bottom: 5px;
    }
    
    .detail-value {
      font-size: 16px;
      font-weight: 700;
      color: #1e2b4f;
    }
    
    .detail-value small {
      font-size: 11px;
      color: #ffd966;
      margin-right: 3px;
    }
    
    .change-highlight {
      background: #ffd966;
      padding: 2px 8px;
      border-radius: 15px;
      color: #1e2b4f;
      font-size: 12px;
      font-weight: 600;
    }
    
    .notification-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #e9f0fa;
    }
    
    .user-info-small {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #6c757d;
      font-size: 12px;
    }
    
    .notification-actions {
      display: flex;
      gap: 10px;
    }
    
    .btn-small {
      padding: 5px 12px;
      border: none;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    
    .btn-view {
      background: #3498db;
      color: white;
    }
    
    .btn-view:hover {
      background: #2980b9;
    }
    
    .btn-mark {
      background: #e9f0fa;
      color: #1e2b4f;
    }
    
    .btn-mark:hover {
      background: #d0ddeb;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6c757d;
    }
    
    .empty-icon {
      font-size: 80px;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #1e2b4f;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 50px auto;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    .modal-content {
      background: white;
      width: 90%;
      max-width: 600px;
      border-radius: 30px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    
    .modal-actions {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 25px;
    }
    
    @media (max-width: 768px) {
      .filter-bar { flex-direction: column; align-items: stretch; }
      .btn-mark-read { margin-right: 0; }
      .notification-header { flex-direction: column; align-items: flex-start; }
      .invoice-details { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>🔔 التنبيهات <span id="unreadCount">0</span></h2>
    <div class="user-info">
      <div class="user-details">
        <span id="userNameDisplay"></span>
      </div>
      <button class="back-btn" onclick="goBack()">🔙 الرجوع</button>
    </div>
  </div>
  
  <div class="content">
    <div class="filter-bar">
      <div class="filter-group">
        <label>📅 الفترة:</label>
        <select id="periodFilter">
          <option value="today">اليوم</option>
          <option value="week">آخر أسبوع</option>
          <option value="month">آخر شهر</option>
          <option value="all">كل التنبيهات</option>
        </select>
      </div>
      <div class="filter-group">
        <label>🔍 حالة القراءة:</label>
        <select id="readFilter">
          <option value="all">الكل</option>
          <option value="unread">غير مقروءة</option>
          <option value="read">مقروءة</option>
        </select>
      </div>
      <button class="btn-filter" onclick="loadNotifications()">تصفية</button>
      <button class="btn-mark-read" onclick="markAllAsRead()">📌 تحديد الكل كمقروء</button>
      <button class="btn-danger" onclick="showDeleteOptions()">🗑️ حذف</button>
    </div>
    
    <div id="deleteOptions" class="delete-options">
      <button class="btn-danger" onclick="deleteSelected()">🗑️ حذف المحدد</button>
      <button class="btn-danger" onclick="deleteAll()">🗑️ حذف الكل</button>
      <button class="btn-secondary" onclick="hideDeleteOptions()">إلغاء</button>
    </div>
    
    <div id="notificationsContainer">
      <div class="loader"></div>
    </div>
  </div>
</div>

<div class="modal" id="detailsModal">
  <div class="modal-content">
    <div style="font-size: 40px; margin-bottom: 15px;" id="modalIcon">✏️</div>
    <h3 style="color:#1e2b4f; margin-bottom: 15px;" id="modalTitle">تفاصيل التعديل</h3>
    <div id="modalContent" style="text-align: right; max-height: 400px; overflow-y: auto; margin-bottom: 20px;"></div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="closeModal()">إغلاق</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyBfwHQQoHb9E2bq0l-u6FLMD2XFKu_d8rZuJLnIq5iko82Bn93Emki6-cvDF_XOyRp/exec';
let currentUser = null;
let notifications = [];
let filteredNotifications = [];
let deleteMode = false;

// دالة لتنظيف الوقت
function cleanTime(timeStr) {
  if (!timeStr) return '';
  const match = String(timeStr).match(/(\d{1,2}):(\d{2})(?::(\d{2}))?/);
  if (match) return `${match[1].padStart(2,'0')}:${match[2]}`;
  return timeStr.toString().substring(0,5);
}

// ============ التهيئة ============
document.addEventListener('DOMContentLoaded', () => {
  const userData = sessionStorage.getItem('currentUser');
  if (!userData) {
    window.location.href = 'index.html';
    return;
  }
  
  try {
    currentUser = JSON.parse(userData);
    document.getElementById('userNameDisplay').textContent = currentUser.name || 'صاحب مركز';
    
    if (currentUser.type !== 'Owner' && currentUser.type !== 'Admin') {
      window.location.href = 'index.html';
      return;
    }
  } catch (e) {
    window.location.href = 'index.html';
    return;
  }
  
  loadNotifications();
});

// ============ جلب التنبيهات ============
async function loadNotifications() {
  const container = document.getElementById('notificationsContainer');
  container.innerHTML = '<div class="loader"></div>';
  
  try {
    const response = await fetch(`${GAS_URL}?action=getAllInvoicesEdit`);
    const data = await response.json();
    
    if (data && Array.isArray(data)) {
      notifications = data.sort((a, b) => {
        return new Date(b.editDate) - new Date(a.editDate);
      });
      
      // للتشخيص - اعرض أول تنبيه في الكونسول
      if (notifications.length > 0) {
        console.log('📊 أول تنبيه:', notifications[0]);
        console.log('📊 originalData:', notifications[0].originalData);
        console.log('📊 editedData:', notifications[0].editedData);
      }
    } else {
      notifications = [];
    }
    
    applyFilters();
  } catch (error) {
    console.error('خطأ في جلب التنبيهات:', error);
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">❌</div>
        <h3>فشل تحميل التنبيهات</h3>
        <p>يرجى المحاولة مرة أخرى</p>
        <button class="btn-filter" onclick="loadNotifications()" style="margin-top:20px;">إعادة المحاولة</button>
      </div>
    `;
  }
}

// ============ تطبيق الفلاتر ============
function applyFilters() {
  const period = document.getElementById('periodFilter').value;
  const readFilter = document.getElementById('readFilter').value;
  const now = new Date();
  
  filteredNotifications = notifications.filter(notif => {
    if (period !== 'all') {
      const notifDate = new Date(notif.editDate);
      const diffDays = Math.floor((now - notifDate) / (1000 * 60 * 60 * 24));
      
      if (period === 'today' && diffDays > 0) return false;
      if (period === 'week' && diffDays > 7) return false;
      if (period === 'month' && diffDays > 30) return false;
    }
    
    if (readFilter === 'unread' && notif.isRead) return false;
    if (readFilter === 'read' && !notif.isRead) return false;
    
    return true;
  });
  
  updateUnreadCount();
  renderNotifications();
}

// ============ تحديث عداد غير المقروء ============
function updateUnreadCount() {
  const unread = notifications.filter(n => !n.isRead).length;
  document.getElementById('unreadCount').textContent = unread;
}

// ============ عرض التنبيهات ============
function renderNotifications() {
  const container = document.getElementById('notificationsContainer');
  
  if (filteredNotifications.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔔</div>
        <h3>لا توجد تنبيهات</h3>
        <p>سوف تظهر هنا التعديلات التي تتم على الفواتير</p>
      </div>
    `;
    return;
  }
  
  let html = '<div class="notifications-list">';
  
  filteredNotifications.forEach(notif => {
    const isUnread = !notif.isRead;
    const editDate = new Date(notif.editDate);
    const timeStr = editDate.toLocaleDateString('ar-EG') + ' ' + editDate.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    
    // استخراج البيانات من الكائنات المحفوظة
    const original = notif.originalData || {};
    const edited = notif.editedData || {};
    const currency = edited.invoiceCurrency || original.invoiceCurrency || '$';
    
    // تنظيف الوقت للعرض
    const oldTime = cleanTime(original.time || '');
    const newTime = cleanTime(edited.time || '');
    
    // تحديد نوع التعديل
    let icon = '✏️';
    let iconClass = 'icon-edit';
    let title = 'تعديل فاتورة';
    
    if (notif.editSummary && notif.editSummary.includes('خصم')) {
      icon = '💰';
      iconClass = 'icon-price';
    }
    
    html += `
      <div class="notification-card ${isUnread ? 'unread' : 'read'}" onclick="viewNotification('${notif.editId}')">
        <div class="notification-header">
          <div class="checkbox-column">
            <input type="checkbox" class="notification-checkbox" data-id="${notif.editId}" onclick="event.stopPropagation()">
            <div class="notification-title">
              <div class="notification-icon ${iconClass}">${icon}</div>
              <div>
                <strong>${title}</strong>
                <span class="voucher-badge">${notif.voucherNo}</span>
              </div>
            </div>
          </div>
          <div class="notification-time">${timeStr}</div>
        </div>
        
        <div class="notification-body">
          <p>${notif.editSummary || 'تم تعديل بيانات الفاتورة'}</p>
          ${oldTime || newTime ? `<div style="font-size:12px; color:#666; margin-top:5px;">⏰ الوقت: ${oldTime || '—'} → ${newTime || '—'}</div>` : ''}
        </div>
        
        <div class="invoice-details">
          <div class="detail-item">
            <div class="detail-label">إجمالي الفاتورة قبل</div>
            <div class="detail-value">${(original.actualPrice || 0).toFixed(2)} <small>${currency}</small></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">إجمالي الفاتورة بعد</div>
            <div class="detail-value">${(edited.actualPrice || 0).toFixed(2)} <small>${currency}</small></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">المدفوع قبل</div>
            <div class="detail-value">${(original.paymentPrice || 0).toFixed(2)} <small>${currency}</small></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">المدفوع بعد</div>
            <div class="detail-value">${(edited.paymentPrice || 0).toFixed(2)} <small>${currency}</small></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">الخصم قبل</div>
            <div class="detail-value">${(original.discount || 0).toFixed(2)} <small>${currency}</small></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">الخصم بعد</div>
            <div class="detail-value">${(edited.discount || 0).toFixed(2)} <small>${currency}</small></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">المتبقي قبل</div>
            <div class="detail-value">${(original.rest || 0).toFixed(2)} <small>${currency}</small></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">المتبقي بعد</div>
            <div class="detail-value">${(edited.rest || 0).toFixed(2)} <small>${currency}</small></div>
          </div>
        </div>
        
        <div class="notification-footer">
          <div class="user-info-small">
            <span>👤 ${notif.userName || 'غير معروف'}</span>
          </div>
          <div class="notification-actions">
            ${!notif.isRead ? `<button class="btn-small btn-mark" onclick="event.stopPropagation(); markAsRead('${notif.editId}')">📌 تحديد كمقروء</button>` : ''}
            <button class="btn-small btn-view" onclick="event.stopPropagation(); viewFullDetails('${notif.editId}')">🔍 عرض التفاصيل</button>
            <button class="btn-small btn-delete" onclick="event.stopPropagation(); deleteSingle('${notif.editId}')">🗑️ حذف</button>
          </div>
        </div>
      </div>
    `;
  });
  
  html += '</div>';
  container.innerHTML = html;
  
  document.querySelectorAll('.notification-checkbox').forEach(cb => {
    cb.style.display = deleteMode ? 'block' : 'none';
  });
}

// ============ إظهار خيارات الحذف ============
function showDeleteOptions() {
  deleteMode = true;
  document.getElementById('deleteOptions').style.display = 'flex';
  document.querySelectorAll('.notification-checkbox').forEach(cb => {
    cb.style.display = 'block';
  });
}

function hideDeleteOptions() {
  deleteMode = false;
  document.getElementById('deleteOptions').style.display = 'none';
  document.querySelectorAll('.notification-checkbox').forEach(cb => {
    cb.style.display = 'none';
    cb.checked = false;
  });
}

// ============ حذف التنبيهات ============
async function deleteSelected() {
  const selected = [];
  document.querySelectorAll('.notification-checkbox:checked').forEach(cb => {
    selected.push(cb.dataset.id);
  });
  
  if (selected.length === 0) {
    alert('❌ لم تختار أي تنبيهات للحذف');
    return;
  }
  
  if (confirm(`هل أنت متأكد من حذف ${selected.length} تنبيه؟`)) {
    try {
      for (const id of selected) {
        await fetch(`${GAS_URL}?action=deleteNotification&editId=${id}`);
      }
      alert(`✅ تم حذف ${selected.length} تنبيه بنجاح`);
      hideDeleteOptions();
      loadNotifications();
    } catch (error) {
      console.error('خطأ في الحذف:', error);
      alert('❌ فشل حذف التنبيهات');
    }
  }
}

async function deleteSingle(editId) {
  if (confirm('هل أنت متأكد من حذف هذا التنبيه؟')) {
    try {
      await fetch(`${GAS_URL}?action=deleteNotification&editId=${editId}`);
      loadNotifications();
    } catch (error) {
      console.error('خطأ في الحذف:', error);
      alert('❌ فشل حذف التنبيه');
    }
  }
}

async function deleteAll() {
  if (confirm('هل أنت متأكد من حذف جميع التنبيهات؟')) {
    try {
      const response = await fetch(`${GAS_URL}?action=deleteAllNotifications`);
      const result = await response.json();
      if (result.success) {
        alert(`✅ تم حذف جميع التنبيهات بنجاح`);
        hideDeleteOptions();
        loadNotifications();
      }
    } catch (error) {
      console.error('خطأ:', error);
      alert('❌ فشل حذف التنبيهات');
    }
  }
}

// ============ تحديد كمقروء ============
async function markAsRead(editId) {
  try {
    await fetch(`${GAS_URL}?action=markNotificationAsRead&editId=${editId}`);
    const notif = notifications.find(n => n.editId === editId);
    if (notif) notif.isRead = true;
    applyFilters();
  } catch (error) {
    console.error('خطأ:', error);
  }
}

async function markAllAsRead() {
  try {
    const unreadIds = notifications.filter(n => !n.isRead).map(n => n.editId);
    for (const id of unreadIds) {
      await fetch(`${GAS_URL}?action=markNotificationAsRead&editId=${id}`);
      const notif = notifications.find(n => n.editId === id);
      if (notif) notif.isRead = true;
    }
    applyFilters();
  } catch (error) {
    console.error('خطأ:', error);
  }
}

// ============ عرض التفاصيل ============
async function viewFullDetails(editId) {
  try {
    const response = await fetch(`${GAS_URL}?action=getInvoiceEditDetails&editId=${editId}`);
    const details = await response.json();
    
    let content = '<div style="text-align:right;">';
    
    if (details.originalParsed) {
      content += '<h4 style="color:#1e2b4f; margin:15px 0 10px;">البيانات قبل التعديل</h4>';
      content += '<pre style="background:#f8f9fa; padding:10px; border-radius:10px; font-size:12px;">' + JSON.stringify(details.originalParsed, null, 2) + '</pre>';
    }
    
    if (details.editedParsed) {
      content += '<h4 style="color:#1e2b4f; margin:15px 0 10px;">البيانات بعد التعديل</h4>';
      content += '<pre style="background:#f8f9fa; padding:10px; border-radius:10px; font-size:12px;">' + JSON.stringify(details.editedParsed, null, 2) + '</pre>';
    }
    
    if (details.editSummary) {
      content += '<h4 style="color:#1e2b4f; margin:15px 0 10px;">ملخص التعديل</h4>';
      content += '<p style="background:#fff3cd; padding:10px; border-radius:10px;">' + details.editSummary + '</p>';
    }
    
    content += '</div>';
    
    document.getElementById('modalIcon').textContent = '📋';
    document.getElementById('modalTitle').textContent = 'تفاصيل التعديل';
    document.getElementById('modalContent').innerHTML = content;
    document.getElementById('detailsModal').style.display = 'flex';
    
  } catch (error) {
    console.error('خطأ:', error);
  }
}

async function viewNotification(editId) {
  if (deleteMode) return;
  await markAsRead(editId);
}

function closeModal() {
  document.getElementById('detailsModal').style.display = 'none';
}

function goBack() {
  const pages = {
    Admin: 'Dashboard.html',
    Owner: 'OwnerDashboard.html',
    Sales: 'SalesDashboard.html',
    Accountant: 'AccountantDashboard.html'
  };
  window.location.href = pages[currentUser?.type] || 'OwnerDashboard.html';
}

// تعريف الدوال العامة
window.loadNotifications = loadNotifications;
window.markAsRead = markAsRead;
window.markAllAsRead = markAllAsRead;
window.viewFullDetails = viewFullDetails;
window.viewNotification = viewNotification;
window.closeModal = closeModal;
window.goBack = goBack;
window.showDeleteOptions = showDeleteOptions;
window.hideDeleteOptions = hideDeleteOptions;
window.deleteSelected = deleteSelected;
window.deleteAll = deleteAll;
window.deleteSingle = deleteSingle;
</script>
