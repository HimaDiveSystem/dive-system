<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Bookings Today - Diving Centers Management</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
    .header { background: linear-gradient(135deg, #1e2b4f 0%, #152238 100%); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
    .header h2 { color: #ffd966; font-size: 24px; display: flex; align-items: center; gap: 10px; }
    .user-info { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .user-name { background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 40px; border: 1px solid #ffd966; }
    .goBack-btn { background: #ff6b6b; color: white; border: none; padding: 8px 25px; border-radius: 40px; cursor: pointer; font-weight: 600; transition: 0.3s; }
    .goBack-btn:hover { background: #ee5253; transform: translateY(-2px); }
    .filter-section { background: #f8f9fa; padding: 20px 30px; border-bottom: 2px solid #dee2e6; }
    .filter-row { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
    .filter-group { flex: 1; min-width: 150px; }
    .filter-group label { display: block; font-size: 12px; color: #1e2b4f; font-weight: 600; margin-bottom: 5px; }
    .filter-group input, .filter-group select { width: 100%; padding: 10px; border: 2px solid #e9f0fa; border-radius: 15px; font-size: 14px; }
    .date-spin { display: flex; gap: 5px; margin-top: 5px; }
    .spin-btn { flex: 1; padding: 5px; border: none; border-radius: 10px; background: #1e2b4f; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .spin-btn:hover { background: #ffd966; color: #1e2b4f; }
    .filter-actions { display: flex; gap: 10px; align-items: center; }
    .btn-primary { background: #1e2b4f; color: white; border: none; padding: 10px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    .btn-primary:hover { background: #ffd966; color: #1e2b4f; }
    .table-container { padding: 20px 30px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 15px; }
    th { background: #1e2b4f; color: #ffd966; padding: 12px 5px; font-weight: 600; cursor: pointer; position: relative; white-space: nowrap; }
    th:hover { background: #2a3a60; }
    th .sort-icon { margin-left: 5px; font-size: 12px; }
    td { padding: 8px 5px; border-bottom: 1px solid #e9f0fa; color: #2c3e50; white-space: nowrap; }
    tr:hover { background: #f5f9ff; }
    .activities-cell { max-width: 200px; white-space: normal; word-break: break-word; }
    .pax-cell { max-width: 80px; white-space: normal; }
    .action-buttons { display: flex; gap: 5px; justify-content: center; }
    .action-btn { padding: 4px 8px; border: none; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; color: white; }
    .edit-btn { background: #3498db; } .delete-btn { background: #e74c3c; }
    .whatsapp-btn { background: #25D366; } .print-btn { background: #95a5a6; }
    .edit-btn:hover { background: #2980b9; } .delete-btn:hover { background: #c0392b; }
    .whatsapp-btn:hover { background: #128C7E; } .print-btn:hover { background: #7f8c8d; }
    .pagination { display: flex; justify-content: center; gap: 10px; padding: 20px 30px; flex-wrap: wrap; }
    .page-btn { padding: 6px 12px; border: 1px solid #dee2e6; background: white; border-radius: 20px; cursor: pointer; font-size: 13px; }
    .page-btn.active { background: #1e2b4f; color: #ffd966; border-color: #1e2b4f; }
    .no-data { text-align: center; padding: 50px; color: #6c757d; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1e2b4f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
    @media (max-width: 768px) { .filter-row { flex-direction: column; } .filter-actions { width: 100%; } .table-container { padding: 10px; } }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>📅 Bookings Today</h2>
    <div class="user-info">
      <span class="user-name" id="userNameDisplay"></span>
      <button class="goBack-btn" onclick="goBack()">الرجوع</button>
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-row">
      <div class="filter-group">
        <label>From Date (Active Date)</label>
        <input type="date" id="filterDateFrom">
        <div class="date-spin">
          <button class="spin-btn" onclick="adjustDate('filterDateFrom', -1)">▼ -1</button>
          <button class="spin-btn" onclick="adjustDate('filterDateFrom', 1)">▲ +1</button>
        </div>
      </div>
      <div class="filter-group">
        <label>To Date (Active Date)</label>
        <input type="date" id="filterDateTo">
        <div class="date-spin">
          <button class="spin-btn" onclick="adjustDate('filterDateTo', -1)">▼ -1</button>
          <button class="spin-btn" onclick="adjustDate('filterDateTo', 1)">▲ +1</button>
        </div>
      </div>
      <div class="filter-group">
        <label>Search</label>
        <input type="text" id="filterText" placeholder="Voucher, Guest, Trip...">
      </div>
      <div class="filter-actions">
        <button class="btn-primary" onclick="applyFilters()">Apply</button>
        <button class="btn-primary" onclick="resetFilters()">Reset</button>
      </div>
    </div>
  </div>

  <div class="table-container" id="tableContainer">
    <div style="text-align: center; padding: 50px;">Loading bookings...</div>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<!-- Alert Modal -->
<div id="customAlertModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:9999;">
  <div style="background:white;width:400px;border-radius:30px;padding:30px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.3);">
    <div style="font-size:50px;margin-bottom:20px;">ℹ️</div>
    <h3 style="color:#1e2b4f;margin-bottom:20px;" id="alertMessage"></h3>
    <button class="btn-primary" id="alertOk">OK</button>
  </div>
</div>

<script>
  // ✅ رابط الـ API
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbyEXU9rrScCGTOcksiONNNznJ6vG0fdi4mA5CIbpXYmohsH2MFp4dqF8bQuSqm57c36/exec';

  // ✅ خريطة الصفحات للرجوع
  const DASHBOARD_PAGES = {
    Admin:      'Dashboard.html',
    Owner:      'OwnerDashboard.html',
    Sales:      'SalesDashboard.html',
    Accountant: 'AccountantDashboard.html'
  };

  const allowedUserTypes = ['Admin', 'Owner', 'Sales', 'Accountant', 'FinancialManager', 'CenterManager', 'BranchManager'];

  let currentUser = null;
  window.allInvoices = [];
  window.filteredInvoices = [];
  let currentPage = 1;
  const pageSize = 20;
  let sortColumn = 'issueDate';
  let sortDirection = 'desc';

  // ✅ goBack يستخدم window.location.href
  function goBack() {
    const page = DASHBOARD_PAGES[currentUser?.type] || 'Dashboard.html';
    window.location.href = page;
  }

  function getUserFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const userParam = params.get('user');
    if (userParam) {
      try { return JSON.parse(decodeURIComponent(userParam)); } catch(e) { return null; }
    }
    return null;
  }

  // ✅ جلب الفواتير عبر fetch بدل google.script.run
  function loadInvoices() {
    document.getElementById('tableContainer').innerHTML = '<div class="loader"></div>';
    fetch(GAS_URL + '?action=getAllInvoices')
      .then(r => r.json())
      .then(function(invoices) {
        if (invoices && Array.isArray(invoices)) {
          const userBranch = currentUser?.branchName;
          const userType   = currentUser?.type;
          if (userBranch && userType !== 'Admin' && userType !== 'Owner') {
            window.allInvoices = invoices.filter(inv => inv.branchName === userBranch);
          } else {
            window.allInvoices = invoices;
          }
          window.filteredInvoices = [...window.allInvoices];
          sortData(sortColumn, sortDirection);
          renderTable();
        } else {
          window.allInvoices = [];
          window.filteredInvoices = [];
          document.getElementById('tableContainer').innerHTML = '<div class="no-data">لا توجد بيانات</div>';
        }
      })
      .catch(function(error) {
        document.getElementById('tableContainer').innerHTML = `<div class="no-data">Error loading data: ${error.message}</div>`;
      });
  }

  // ── ترتيب البيانات ──
  function sortData(column, direction) {
    window.filteredInvoices.sort((a, b) => {
      let valA = a[column] !== undefined ? a[column] : '';
      let valB = b[column] !== undefined ? b[column] : '';
      if (column === 'issueDate' || column === 'activeDate') {
        const parseDate = str => {
          if (!str) return 0;
          const [day, month, year] = str.split('/');
          return new Date(`${month} ${day}, ${year}`).getTime();
        };
        valA = parseDate(valA); valB = parseDate(valB);
      } else if (['rest','cashUSD','cashEUR','cashGBP','cashLE','visaUSD','visaEUR','visaGBP','visaLE','discount','adultCount','childCount','infantCount'].includes(column)) {
        valA = parseFloat(valA)||0; valB = parseFloat(valB)||0;
      } else {
        valA = valA.toString().toLowerCase(); valB = valB.toString().toLowerCase();
      }
      if (valA < valB) return direction === 'asc' ? -1 : 1;
      if (valA > valB) return direction === 'asc' ? 1 : -1;
      return 0;
    });
  }

  // ── فلترة ──
  function applyFilters() {
    const fromDate   = document.getElementById('filterDateFrom').value;
    const toDate     = document.getElementById('filterDateTo').value;
    const searchText = document.getElementById('filterText').value.toLowerCase();
    if (!window.allInvoices || !window.allInvoices.length) return;

    function parseInvDate(str) {
      if (!str) return null;
      const [day, mon, year] = str.split('/');
      return new Date(`${mon} ${day}, ${year}`).getTime();
    }
    const fromTime = fromDate ? new Date(fromDate).getTime() : null;
    const toTime   = toDate   ? new Date(toDate).setHours(23,59,59,999) : null;

    window.filteredInvoices = window.allInvoices.filter(inv => {
      const invTime = parseInvDate(inv.activeDate);
      let match = true;
      if (fromTime && invTime) match = match && invTime >= fromTime;
      if (toTime   && invTime) match = match && invTime <= toTime;
      if (searchText) {
        const s = `${inv.voucherNo||''} ${inv.guestName||''} ${inv.trip||''} ${inv.salesName||''} ${inv.contactNo||''}`.toLowerCase();
        match = match && s.includes(searchText);
      }
      return match;
    });
    currentPage = 1;
    renderTable();
  }

  function resetFilters() {
    document.getElementById('filterDateFrom').value = '';
    document.getElementById('filterDateTo').value   = '';
    document.getElementById('filterText').value     = '';
    window.filteredInvoices = [...window.allInvoices];
    sortData(sortColumn, sortDirection);
    renderTable();
  }

  function adjustDate(inputId, delta) {
    const input = document.getElementById(inputId);
    const base  = input.value ? new Date(input.value) : new Date();
    base.setDate(base.getDate() + delta);
    input.value = base.toISOString().split('T')[0];
    applyFilters();
  }

  // ── تنسيق ──
  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr);
      return `${d.getDate().toString().padStart(2,'0')}/${d.toLocaleString('en',{month:'short'})}/${d.getFullYear()}`;
    } catch { return dateStr; }
  }

  function formatTime(timeStr) {
    if (!timeStr) return '';
    if (typeof timeStr === 'string') {
      const m = timeStr.match(/(\d{2}):(\d{2})/);
      if (m) return `${m[1]}:${m[2]}`;
    }
    return timeStr;
  }

  function buildPaxText(inv) {
    return `A:${inv.adultCount||0} C:${inv.childCount||0} I:${inv.infantCount||0}`;
  }

  function formatRestWithCurrency(inv) {
    const rest = inv.rest || 0;
    const cur  = inv.invoiceCurrency || '';
    if (rest === 0) return '0';
    return `<span style="color:#e74c3c;font-weight:bold;">${rest} ${cur}</span>`;
  }

  // ── عرض الجدول ──
  function renderTable() {
    const container = document.getElementById('tableContainer');
    if (!window.filteredInvoices.length) {
      container.innerHTML = '<div class="no-data">No bookings found</div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }
    const start    = (currentPage - 1) * pageSize;
    const pageData = window.filteredInvoices.slice(start, start + pageSize);

    const cols = [
      ['rest','Rest'],['voucherNo','Voucher'],['activeDate','Active Date'],
      ['salesName','Sales'],['time','Time'],['trip','Trip'],
      [null,'Activities'],
      ['cashUSD','$'],['cashEUR','€'],['cashGBP','£'],['cashLE','LE'],
      ['visaUSD','V$'],['visaEUR','V€'],['visaGBP','V£'],['visaLE','VLE'],
      ['hotel','Hotel'],['roomNo','Room'],['nationality','Nationality'],
      ['guestName','Guest'],['contactNo','Contact'],['notes','Notes'],
      ['supplier','Supplier'],['customer','Customer'],['state','State'],
      ['invoiceCurrency','Currency'],['branchName','Branch'],['discount','Discount'],
      [null,'Pax'],[null,'Actions']
    ];

    let html = `<table><thead><tr>`;
    cols.forEach(([col, label]) => {
      if (col) {
        const icon = sortColumn === col ? (sortDirection === 'asc' ? '↑' : '↓') : '';
        html += `<th onclick="setSort('${col}')">${label} <span class="sort-icon">${icon}</span></th>`;
      } else {
        html += `<th>${label}</th>`;
      }
    });
    html += `</tr></thead><tbody>`;

    pageData.forEach(inv => {
      html += `<tr>
        <td>${formatRestWithCurrency(inv)}</td>
        <td>${inv.voucherNo||''}</td>
        <td>${formatDate(inv.activeDate)}</td>
        <td>${inv.salesName||''}</td>
        <td>${formatTime(inv.time)}</td>
        <td>${inv.trip||''}</td>
        <td class="activities-cell">${inv.activitiesText||''}</td>
        <td>${inv.cashUSD??0}</td><td>${inv.cashEUR??0}</td>
        <td>${inv.cashGBP??0}</td><td>${inv.cashLE??0}</td>
        <td>${inv.visaUSD??0}</td><td>${inv.visaEUR??0}</td>
        <td>${inv.visaGBP??0}</td><td>${inv.visaLE??0}</td>
        <td>${inv.hotel||''}</td><td>${inv.roomNo||''}</td>
        <td>${inv.nationality||''}</td><td>${inv.guestName||''}</td>
        <td>${inv.contactNo||''}</td><td>${inv.notes||''}</td>
        <td>${inv.supplier||''}</td><td>${inv.customer||''}</td>
        <td>${inv.state||''}</td><td>${inv.invoiceCurrency||''}</td>
        <td>${inv.branchName||''}</td><td>${inv.discount??0}</td>
        <td class="pax-cell">${buildPaxText(inv)}</td>
        <td>
          <div class="action-buttons">
            <button class="action-btn edit-btn"    onclick="editInvoice('${inv.id}')">Edit</button>
            <button class="action-btn delete-btn"  onclick="deleteInvoice('${inv.id}')">Del</button>
            ${inv.pdfUrl ? `<a href="${inv.pdfUrl}" target="_blank" class="action-btn whatsapp-btn">PDF</a>` : ''}
            <button class="action-btn print-btn"   onclick="printInvoice('${inv.id}')">Print</button>
          </div>
        </td>
      </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
    renderPagination();
  }

  function renderPagination() {
    const totalPages = Math.ceil(window.filteredInvoices.length / pageSize);
    const delta = 3;
    let pages = [];
    if (currentPage > delta + 1) { pages.push(1); if (currentPage > delta + 2) pages.push('...'); }
    for (let i = Math.max(1, currentPage - delta); i <= Math.min(totalPages, currentPage + delta); i++) pages.push(i);
    if (currentPage < totalPages - delta) { if (currentPage < totalPages - delta - 1) pages.push('...'); pages.push(totalPages); }
    document.getElementById('pagination').innerHTML = pages.map(p =>
      p === '...' ? `<span>...</span>` : `<button class="page-btn ${p===currentPage?'active':''}" onclick="goToPage(${p})">${p}</button>`
    ).join('');
  }

  function goToPage(page)   { currentPage = page; renderTable(); }
  function setSort(column)  {
    sortDirection = sortColumn === column ? (sortDirection === 'asc' ? 'desc' : 'asc') : 'asc';
    sortColumn = column;
    sortData(sortColumn, sortDirection);
    renderTable();
  }

  function editInvoice(id)   { showAlert('Edit invoice - تحت التطوير'); }
  function deleteInvoice(id) { if (confirm('Are you sure you want to delete this invoice?')) showAlert('Delete - تحت التطوير'); }
  function printInvoice(id)  { showAlert('Print - تحت التطوير'); }

  function showAlert(message) {
    const modal = document.getElementById('customAlertModal');
    document.getElementById('alertMessage').innerText = message;
    modal.style.display = 'flex';
    const okBtn = document.getElementById('alertOk');
    const handler = () => { modal.style.display = 'none'; okBtn.removeEventListener('click', handler); };
    okBtn.addEventListener('click', handler);
  }

  // ==================== التحميل الأولي ====================
  document.addEventListener('DOMContentLoaded', function() {
    let userData = sessionStorage.getItem('currentUser');
    if (!userData) {
      const urlUser = getUserFromUrl();
      if (urlUser) { userData = JSON.stringify(urlUser); sessionStorage.setItem('currentUser', userData); }
    }
    if (!userData) { window.location.href = 'index.html'; return; }

    try {
      currentUser = JSON.parse(userData);
      document.getElementById('userNameDisplay').textContent = currentUser.name || 'User';
      if (!allowedUserTypes.includes(currentUser.type)) {
        showAlert('You do not have permission to view this page.');
        setTimeout(() => window.location.href = 'Dashboard.html', 2000);
        return;
      }
    } catch(e) { window.location.href = 'index.html'; return; }

    loadInvoices();
  });

  window.applyFilters  = applyFilters;
  window.resetFilters  = resetFilters;
  window.adjustDate    = adjustDate;
  window.goToPage      = goToPage;
  window.setSort       = setSort;
  window.editInvoice   = editInvoice;
  window.deleteInvoice = deleteInvoice;
  window.printInvoice  = printInvoice;
  window.goBack        = goBack;
  window.showAlert     = showAlert;
</script>
</body>
</html>
