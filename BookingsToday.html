<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Bookings Today - Diving Centers Management</title>
  <style>
    /* نفس الـ style القديم - احتفظ به كما هو */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #1e2b4f 0%, #152238 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .header h2 {
      color: #ffd966;
      font-size: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .user-name {
      background: rgba(255,255,255,0.1);
      padding: 8px 20px;
      border-radius: 40px;
      border: 1px solid #ffd966;
    }

    .goBack-btn {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 8px 25px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    .goBack-btn:hover {
      background: #ee5253;
      transform: translateY(-2px);
    }

    .filter-section {
      background: #f8f9fa;
      padding: 20px 30px;
      border-bottom: 2px solid #dee2e6;
    }

    .filter-row {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .filter-group {
      flex: 1;
      min-width: 150px;
    }

    .filter-group label {
      display: block;
      font-size: 12px;
      color: #1e2b4f;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .filter-group input,
    .filter-group select {
      width: 100%;
      padding: 10px;
      border: 2px solid #e9f0fa;
      border-radius: 15px;
      font-size: 14px;
    }
    .date-spin {
      display: flex;
      gap: 5px;
      margin-top: 5px;
    }

    .spin-btn {
      flex: 1;
      padding: 5px;
      border: none;
      border-radius: 10px;
      background: #1e2b4f;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .spin-btn:hover {
      background: #ffd966;
      color: #1e2b4f;
    }

    .filter-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn-primary {
      background: #1e2b4f;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-primary:hover {
      background: #ffd966;
      color: #1e2b4f;
    }

    .table-container {
      padding: 20px 30px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
    }

    th {
      background: #1e2b4f;
      color: #ffd966;
      padding: 12px 5px;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      white-space: nowrap;
    }

    th:hover {
      background: #2a3a60;
    }

    th .sort-icon {
      margin-left: 5px;
      font-size: 12px;
    }

    td {
      padding: 8px 5px;
      border-bottom: 1px solid #e9f0fa;
      color: #2c3e50;
      white-space: nowrap;
    }

    tr:hover {
      background: #f5f9ff;
    }

    .activities-cell {
      max-width: 200px;
      white-space: normal;
      word-break: break-word;
    }

    .pax-cell {
      max-width: 80px;
      white-space: normal;
    }

    .action-buttons {
      display: flex;
      gap: 5px;
      justify-content: center;
    }

    .action-btn {
      padding: 4px 8px;
      border: none;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      color: white;
    }

    .edit-btn { background: #3498db; }
    .delete-btn { background: #e74c3c; }
    .whatsapp-btn { background: #25D366; }
    .print-btn { background: #95a5a6; }

    .edit-btn:hover { background: #2980b9; }
    .delete-btn:hover { background: #c0392b; }
    .whatsapp-btn:hover { background: #128C7E; }
    .print-btn:hover { background: #7f8c8d; }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 20px 30px;
    }

    .page-btn {
      padding: 6px 12px;
      border: 1px solid #dee2e6;
      background: white;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
    }

    .page-btn.active {
      background: #1e2b4f;
      color: #ffd966;
      border-color: #1e2b4f;
    }

    .no-data {
      text-align: center;
      padding: 50px;
      color: #6c757d;
    }

    @media (max-width: 768px) {
      .filter-row { flex-direction: column; }
      .filter-actions { width: 100%; }
      .table-container { padding: 10px; }
    }
    
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    body {
        background-color: #f5f5f5;
        padding: 20px;
    }
    
    /* ... كل الـ CSS القديم بتاعك ... */
    
    /* 🔥 ضيف الكود الجديد هنا 🔥 */
    .loader {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #1e2b4f;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
    }
    
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    /* ---------------------------- */

  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>📅 Bookings Today</h2>
    <div class="user-info">
      <span class="user-name" id="userNameDisplay"></span>
      <button class="goBack-btn" onclick="window.goBack()">الرجوع</button>
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-row">
      <div class="filter-group">
        <label>From Date (Issue Date)</label>
        <input type="date" id="filterDateFrom">
        <div class="date-spin">
          <button class="spin-btn" onclick="window.adjustDate('filterDateFrom', -1)">▼ -1</button>
          <button class="spin-btn" onclick="window.adjustDate('filterDateFrom', 1)">▲ +1</button>
        </div>
      </div>
      <div class="filter-group">
        <label>To Date (Issue Date)</label>
        <input type="date" id="filterDateTo">
        <div class="date-spin">
          <button class="spin-btn" onclick="window.adjustDate('filterDateTo', -1)">▼ -1</button>
          <button class="spin-btn" onclick="window.adjustDate('filterDateTo', 1)">▲ +1</button>
        </div>
      </div>
      <div class="filter-group">
        <label>Search</label>
        <input type="text" id="filterText" placeholder="Voucher, Guest, Trip...">
      </div>
      <div class="filter-actions">
        <button class="btn-primary" onclick="window.applyFilters()">Apply</button>
        <button class="btn-primary" onclick="window.resetFilters()">Reset</button>
      </div>
    </div>
  </div>

  <div class="table-container" id="tableContainer">
    <div style="text-align: center; padding: 50px;">Loading bookings...</div>
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<!-- مودال مخصص للرسائل -->
<div id="customAlertModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 9999;">
  <div style="background: white; width: 400px; border-radius: 30px; padding: 30px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3);">
    <div style="font-size: 50px; margin-bottom: 20px;">ℹ️</div>
    <h3 style="color: #1e2b4f; margin-bottom: 20px;" id="alertMessage"></h3>
    <button class="btn-primary" id="alertOk">OK</button>
  </div>
</div>

<script>
  if (typeof google === 'undefined') {
    alert('❌ خطأ: لم يتم تحميل بيئة Google Apps Script. تأكد من فتح الصفحة عبر الرابط الصحيح.');
    throw new Error('GAS environment missing');
}
  // ==================== المتغيرات العامة ====================
  let APP_BASE_URL = null;
  let currentUser = null;
  window.allInvoices = [];
  window.filteredInvoices = []; 
  let currentPage = 1;
  let pageSize = 20;
  let sortColumn = 'issueDate';
  let sortDirection = 'desc';

  // ==================== دالة جلب الرابط من السيرفر ====================
  function fetchAppUrl() {
    return new Promise((resolve) => {
      google.script.run
        .withSuccessHandler(url => {
          APP_BASE_URL = url;
          console.log('✅ APP_BASE_URL:', APP_BASE_URL);
          resolve(url);
        })
        .withFailureHandler(error => {
          console.error('❌ فشل جلب الرابط:', error);
          APP_BASE_URL = window.location.origin + window.location.pathname;
          console.log('⚠️ استخدام رابط Fallback:', APP_BASE_URL);
          resolve(APP_BASE_URL);
        })
        .getAppUrl();
    });
  }

  // قائمة أنواع المستخدمين المسموح لهم بهذه الصفحة
  const allowedUserTypes = ['Admin', 'Owner', 'Sales', 'Accountant', 'FinancialManager', 'CenterManager', 'BranchManager'];

  // ==================== جلب بيانات المستخدم من الرابط ====================
  function getUserFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const userParam = params.get('user');
    if (userParam) {
      try {
        return JSON.parse(decodeURIComponent(userParam));
      } catch (e) {
        console.error('خطأ في فك تشفير المستخدم:', e);
        return null;
      }
    }
    return null;
  }

  // ==================== جلب الفواتير ====================
  // ==================== جلب الفواتير ====================
function loadInvoices() {
    document.getElementById('tableContainer').innerHTML = '<div class="loader"></div>';
    google.script.run
        .withSuccessHandler(function(invoices) {
            console.log('📥 الفواتير المستلمة:', invoices);

            if (invoices && Array.isArray(invoices)) {
                const userBranch = currentUser?.branchName;
                const userType = currentUser?.type;

                if (userBranch && userType !== 'Admin' && userType !== 'Owner') {
                    window.allInvoices = invoices.filter(inv => inv.branchName === userBranch);
                    console.log(`🔍 مستخدم عادي - عرض فواتير الفرع "${userBranch}":`, window.allInvoices.length);
                } else {
                    window.allInvoices = invoices;
                    console.log('👑 أدمن/مالك - عرض كل الفواتير:', window.allInvoices.length);
                }

                window.filteredInvoices = [...window.allInvoices];

                sortData(sortColumn, sortDirection);
                renderTable();
            } else {
                console.error('❌ invoices مش مصفوفة:', invoices);
                window.allInvoices = [];
                window.filteredInvoices = [];
                document.getElementById('tableContainer').innerHTML = '<div class="no-data">لا توجد بيانات أو خطأ في تحميلها</div>';
            }
        })
        .withFailureHandler(function(error) {
            console.error('❌ فشل تحميل الفواتير:', error);
            document.getElementById('tableContainer').innerHTML = `<div class="no-data">Error loading data: ${error.message}</div>`;
        })
        .getAllInvoices();
}

// ==================== ترتيب البيانات ====================
function sortData(column, direction) {
    window.filteredInvoices.sort((a, b) => {
        let valA = a[column] !== undefined ? a[column] : '';
        let valB = b[column] !== undefined ? b[column] : '';

        if (column === 'issueDate' || column === 'activeDate') {
            const parseDate = (str) => {
                if (!str) return 0;
                const [day, month, year] = str.split('/');
                return new Date(`${month} ${day}, ${year}`).getTime();
            };
            valA = parseDate(valA);
            valB = parseDate(valB);
        } else if (['rest', 'cashUSD', 'cashEUR', 'cashGBP', 'cashLE', 'visaUSD', 'visaEUR', 'visaGBP', 'visaLE', 'discount', 'adultCount', 'childCount', 'infantCount'].includes(column)) {
            valA = parseFloat(valA) || 0;
            valB = parseFloat(valB) || 0;
        } else {
            valA = valA.toString().toLowerCase();
            valB = valB.toString().toLowerCase();
        }

        if (valA < valB) return direction === 'asc' ? -1 : 1;
        if (valA > valB) return direction === 'asc' ? 1 : -1;
        return 0;
    });
}

// ==================== تطبيق الفلاتر ====================
function applyFilters() {
    const fromDate = document.getElementById('filterDateFrom').value;
    const toDate = document.getElementById('filterDateTo').value;
    const searchText = document.getElementById('filterText').value.toLowerCase();

    if (!window.allInvoices || window.allInvoices.length === 0) {
        console.warn("⚠️ لا توجد فواتير للفلترة");
        return;
    }

    const fromTime = fromDate ? new Date(fromDate).getTime() : null;
    const toTime = toDate ? new Date(toDate).setHours(23, 59, 59, 999) : null;

    window.filteredInvoices = window.allInvoices.filter(inv => {
        const invTime = inv.issueDate ? new Date(inv.issueDate).getTime() : null;
        let match = true;

        if (fromTime && invTime) match = match && invTime >= fromTime;
        if (toTime && invTime) match = match && invTime <= toTime;

        if (searchText) {
            const searchable = `${inv.voucherNo || ''} ${inv.guestName || ''} ${inv.trip || ''} ${inv.salesName || ''} ${inv.contactNo || ''}`.toLowerCase();
            match = match && searchable.includes(searchText);
        }
        return match;
    });

    console.log("🔍 filteredInvoices بعد الفلترة:", window.filteredInvoices.length);
    currentPage = 1;
    renderTable();
}

// ==================== إعادة تعيين الفلاتر ====================
function resetFilters() {
    document.getElementById('filterDateFrom').value = '';
    document.getElementById('filterDateTo').value = '';
    document.getElementById('filterText').value = '';
    window.filteredInvoices = [...window.allInvoices];
    sortData(sortColumn, sortDirection);
    renderTable();
}
  // ==================== تنسيق التاريخ ====================
  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr);
      const day = d.getDate().toString().padStart(2, '0');
      const month = d.toLocaleString('en', { month: 'short' });
      const year = d.getFullYear();
      return `${day}/${month}/${year}`;
    } catch {
      return dateStr;
    }
  }

  // ==================== تنسيق الوقت ====================
  function formatTime(timeStr) {
    if (!timeStr) return '';
    if (timeStr instanceof Date) {
      const hours = timeStr.getHours().toString().padStart(2, '0');
      const minutes = timeStr.getMinutes().toString().padStart(2, '0');
      return `${hours}:${minutes}`;
    }
    if (typeof timeStr === 'string') {
      const match = timeStr.match(/(\d{2}):(\d{2}):(\d{2})/);
      if (match) return `${match[1]}:${match[2]}`;
    }
    return timeStr;
  }

  // ==================== بناء نص الأفراد ====================
  function buildPaxText(invoice) {
    const adult = invoice.adultCount || 0;
    const child = invoice.childCount || 0;
    const infant = invoice.infantCount || 0;
    return `A:${adult} C:${child} I:${infant}`;
  }

  // ==================== ترتيب البيانات ====================
  function sortData(column, direction) {
    window.filteredInvoices.sort((a, b) => {
        let valA = a[column] !== undefined ? a[column] : '';
        let valB = b[column] !== undefined ? b[column] : '';

        if (column === 'issueDate' || column === 'activeDate') {
            const parseDate = (str) => {
                if (!str) return 0;
                const [day, month, year] = str.split('/');
                return new Date(`${month} ${day}, ${year}`).getTime();
            };
            valA = parseDate(valA);
            valB = parseDate(valB);
        }
        else if (['rest', 'cashUSD', 'cashEUR', 'cashGBP', 'cashLE', 'visaUSD', 'visaEUR', 'visaGBP', 'visaLE', 'discount', 'adultCount', 'childCount', 'infantCount'].includes(column)) {
            valA = parseFloat(valA) || 0;
            valB = parseFloat(valB) || 0;
        } 
        else {
            valA = valA.toString().toLowerCase();
            valB = valB.toString().toLowerCase();
        }

        if (valA < valB) return direction === 'asc' ? -1 : 1;
        if (valA > valB) return direction === 'asc' ? 1 : -1;
        return 0;
    });
}

  // ==================== دمج Rest مع العملة ====================
  function formatRestWithCurrency(invoice) {
    const rest = invoice.rest || 0;
    const currency = invoice.invoiceCurrency || '';
    if (rest === 0) return '0';
    return `<span style="color: #e74c3c; font-weight: bold;">${rest} ${currency}</span>`;
  }

  // ==================== تطبيق الفلاتر ====================
  function applyFilters() {
    const fromDate = document.getElementById('filterDateFrom').value;
    const toDate = document.getElementById('filterDateTo').value;
    const searchText = document.getElementById('filterText').value.toLowerCase();

    if (!window.allInvoices || window.allInvoices.length === 0) {
        console.warn("⚠️ لا توجد فواتير للفلترة");
        return;
    }

    function convertToInvFormat(dateStr) {
      if (!dateStr) return null;
      const [year, month, day] = dateStr.split('-');
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const monthName = months[parseInt(month) - 1];
      return `${day}/${monthName}/${year}`;
    }

    // دالة مساعدة لتحويل التاريخ لمقارنة زمنية
function parseInvDate(str) {
        if (!str) return null;
        const [day, mon, year] = str.split('/');
        return new Date(`${mon} ${day}, ${year}`).getTime();
    }

    const fromTime = fromDate ? new Date(fromDate).getTime() : null;
    const toTime = toDate ? new Date(toDate).setHours(23, 59, 59, 999) : null;

    window.filteredInvoices = window.allInvoices.filter(inv => {
        const invTime = parseInvDate(inv.issueDate);
        let match = true;

        if (fromTime && invTime) match = match && invTime >= fromTime;
        if (toTime && invTime) match = match && invTime <= toTime;
        
        if (searchText) {
            const searchable = `${inv.voucherNo || ''} ${inv.guestName || ''} ${inv.trip || ''} ${inv.salesName || ''} ${inv.contactNo || ''}`.toLowerCase();
            match = match && searchable.includes(searchText);
        }
        return match;
    });

    console.log("🔍 filteredInvoices بعد الفلترة:", window.filteredInvoices.length);
    currentPage = 1;
    renderTable();
}

  function resetFilters() {
    document.getElementById('filterDateFrom').value = '';
    document.getElementById('filterDateTo').value = '';
    document.getElementById('filterText').value = '';
    filteredInvoices = [...allInvoices];
    sortData(sortColumn, sortDirection);
    renderTable();
  }

  function adjustDate(inputId, delta) {
    const input = document.getElementById(inputId);
    if (!input.value) {
      const today = new Date();
      const year = today.getFullYear();
      const month = (today.getMonth() + 1).toString().padStart(2, '0');
      const day = today.getDate().toString().padStart(2, '0');
      input.value = `${year}-${month}-${day}`;
    } else {
      const date = new Date(input.value);
      date.setDate(date.getDate() + delta);
      const year = date.getFullYear();
      const month = (date.getMonth() + 1).toString().padStart(2, '0');
      const day = date.getDate().toString().padStart(2, '0');
      input.value = `${year}-${month}-${day}`;
    }
    applyFilters();
  }

  // ==================== عرض الجدول ====================
  function renderTable() {
    console.log('🔍 renderTable - عدد الفواتير:', filteredInvoices.length);
    const container = document.getElementById('tableContainer');
    if (!filteredInvoices.length) {
      container.innerHTML = '<div class="no-data">No bookings found</div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    const start = (currentPage - 1) * pageSize;
    const end = start + pageSize;
    const pageData = filteredInvoices.slice(start, end);

    let html = `
      <table>
        <thead>
          <tr>
            <th onclick="window.setSort('rest')">Rest <span class="sort-icon">${sortColumn === 'rest' ? (sortDirection === 'asc' ? '↑' : '↓') : ''}</span></th>
            <th onclick="window.setSort('voucherNo')">Voucher <span class="sort-icon">${sortColumn === 'voucherNo' ? (sortDirection === 'asc' ? '↑' : '↓') : ''}</span></th>
            <th onclick="window.setSort('activeDate')">Active Date <span class="sort-icon">${sortColumn === 'activeDate' ? (sortDirection === 'asc' ? '↑' : '↓') : ''}</span></th>
            <th onclick="window.setSort('salesName')">Sales <span class="sort-icon">${sortColumn === 'salesName' ? (sortDirection === 'asc' ? '↑' : '↓') : ''}</span></th>
            <th onclick="window.setSort('time')">Time <span class="sort-icon">${sortColumn === 'time' ? (sortDirection === 'asc' ? '↑' : '↓') : ''}</span></th>
            <th onclick="window.setSort('trip')">Trip <span class="sort-icon">${sortColumn === 'trip' ? (sortDirection === 'asc' ? '↑' : '↓') : ''}</span></th>
            <th>Activities</th>
            <th onclick="window.setSort('cashUSD')">$ <span class="sort-icon">${sortColumn === 'cashUSD' ? (sortDirection === 'asc' ? '↑' : '↓') : ''}</span></th>
            <th onclick="window.setSort('cashEUR')">€ <span class="sort-icon">${sortColumn === 'cashEUR' ? (sortDirection === 'asc' ? '↑' : '↓') : ''}</span></th>

  function renderPagination() {
  const totalPages = Math.ceil(filteredInvoices.length / pageSize);
  const current = currentPage;
  const delta = 3; // عدد الصفحات قبل وبعد
  
  let pages = [];
  
  // الصفحات الأولى
  if (current > delta + 1) {
    pages.push(1);
    if (current > delta + 2) pages.push('...');
  }
  
  // الصفحات حول الحالية
  for (let i = Math.max(1, current - delta); i <= Math.min(totalPages, current + delta); i++) {
    pages.push(i);
  }
  
  // الصفحات الأخيرة
  if (current < totalPages - delta) {
    if (current < totalPages - delta - 1) pages.push('...');
    pages.push(totalPages);
  }
  
  let html = '';
  pages.forEach(page => {
    if (page === '...') {
      html += `<span class="page-dots">...</span>`;
    } else {
      html += `<button class="page-btn ${page === current ? 'active' : ''}" onclick="window.goToPage(${page})">${page}</button>`;
    }
  });
  
  document.getElementById('pagination').innerHTML = html;
}
