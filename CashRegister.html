<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Daily Cash Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0f1f3d;--navy2:#1a3260;--gold:#f5c842;--gold2:#e6b800;
      --blue:#2563eb;--blue-lt:#dbeafe;--green:#16a34a;--green-lt:#dcfce7;
      --red:#dc2626;--red-lt:#fee2e2;--orange:#ea580c;--purple:#7c3aed;
      --bg:#f0f4f8;--card:#fff;--border:#dde4f0;--text:#1a2540;--text-lt:#5a6a8a;
      --radius:16px;--radius-sm:10px;
      --shadow:0 4px 24px rgba(15,31,61,.10);--shadow-lg:0 8px 40px rgba(15,31,61,.16);
      --ticker-h:42px;--header-h:60px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    /* ══ HEADER ══ */
    .header{
      background:linear-gradient(135deg,var(--navy),var(--navy2));
      padding:13px 22px;display:flex;justify-content:space-between;align-items:center;
      position:sticky;top:0;z-index:100;box-shadow:var(--shadow-lg);
    }
    .header-left{display:flex;align-items:center;gap:10px;}
    .header-left h2{color:var(--gold);font-size:18px;font-weight:900;display:flex;align-items:center;gap:8px;}
    .header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:40px;padding:4px 13px;color:white;font-size:12px;font-weight:600;}
    .branch-chip{background:rgba(245,200,66,.2);border:1px solid rgba(245,200,66,.4);border-radius:40px;padding:4px 13px;color:var(--gold);font-size:12px;font-weight:700;}
    .back-btn{background:transparent;border:2px solid rgba(255,255,255,.3);color:white;padding:4px 13px;border-radius:40px;cursor:pointer;font-weight:700;font-size:12px;font-family:'Cairo',sans-serif;transition:all .2s;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}

    /* ══ PAGE ══ */
    .page{max-width:1200px;margin:0 auto;padding:20px 16px 50px;}

    /* ══ DATE BAR ══ */
    .date-bar{
      background:var(--card);border-radius:var(--radius);border:1px solid var(--border);
      box-shadow:var(--shadow);padding:16px 20px;margin-bottom:18px;
      display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    }
    .date-bar label{font-size:13px;font-weight:700;color:var(--text-lt);white-space:nowrap;}
    .date-input-wrap{display:flex;align-items:center;gap:6px;}
    .date-text-fc{padding:8px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:'Cairo',sans-serif;color:var(--text);background:white;height:42px;width:150px;transition:border-color .2s;}
    .date-text-fc:focus{border-color:var(--blue);outline:none;}
    .cal-btn{padding:8px 11px;background:var(--navy);color:var(--gold);border:none;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;height:42px;}
    .cal-btn:hover{background:var(--navy2);}
    .date-native{position:fixed;opacity:0;width:0;height:0;pointer-events:none;z-index:-1;}
    .date-native.vis{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);opacity:1;width:auto;height:auto;pointer-events:auto;z-index:1000;background:white;padding:10px;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.3);}
    .spin-row{display:flex;gap:4px;}
    .spin-btn{padding:3px 8px;border:none;border-radius:6px;background:var(--navy);color:white;font-size:10px;font-weight:700;cursor:pointer;height:42px;}
    .spin-btn:hover{background:var(--gold);color:var(--navy);}
    .load-btn{padding:8px 22px;background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);border:none;border-radius:40px;font-weight:800;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;height:42px;transition:all .2s;display:flex;align-items:center;gap:6px;}
    .load-btn:hover{transform:translateY(-1px);}
    .branch-sel{padding:8px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Cairo',sans-serif;color:var(--text);background:white;height:42px;cursor:pointer;-webkit-appearance:none;appearance:none;min-width:160px;}
    .branch-sel:focus{border-color:var(--blue);outline:none;}

    /* ══ SECTION CARD ══ */
    .section-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;}
    .section-head{padding:12px 18px;display:flex;align-items:center;gap:8px;justify-content:space-between;}
    .section-head h3{font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px;}
    .section-head .badge{background:rgba(255,255,255,.2);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;}
    .invoices-head{background:linear-gradient(90deg,#1a3260,#2563eb);}
    .invoices-head h3{color:#bfdbfe;}
    .invoices-head .badge{color:white;}
    .revenues-head{background:linear-gradient(90deg,#14532d,#16a34a);}
    .revenues-head h3{color:#bbf7d0;}
    .revenues-head .badge{color:white;}
    .total-income-head{background:linear-gradient(90deg,#7c3aed,#9333ea);}
    .total-income-head h3{color:#ede9fe;}
    .total-income-head .badge{color:white;}
    .expenses-head{background:linear-gradient(90deg,#7f1d1d,#dc2626);}
    .expenses-head h3{color:#fecaca;}
    .expenses-head .badge{color:white;}
    .balance-head{background:linear-gradient(90deg,#0f1f3d,#1a3260);}
    .balance-head h3{color:var(--gold);}
    .balance-head .badge{color:var(--gold);}
    .section-body{padding:16px;}

    /* ══ CURRENCY GRID (8 cols) ══ */
    .cur-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;}
    .cur-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
    .cur-label{font-size:10px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.4px;}
    .cur-val{
      width:100%;padding:8px 6px;border:2px solid var(--border);border-radius:var(--radius-sm);
      font-size:14px;font-weight:700;text-align:center;font-family:'Tajawal',monospace;
      background:#fafbfd;color:var(--text);
    }
    .cur-val.positive{border-color:var(--green);background:var(--green-lt);color:#166534;}
    .cur-val.negative{border-color:var(--red);background:var(--red-lt);color:#991b1b;}
    .cur-val.zero{border-color:var(--border);background:#f8fafc;color:var(--text-lt);}
    .cur-flag{font-size:16px;}

    /* ── Currency header labels ── */
    .cur-headers{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;margin-bottom:6px;padding:0 16px;}
    .cur-header-cell{display:flex;flex-direction:column;align-items:center;gap:2px;}
    .cur-header-cell .flag{font-size:18px;}
    .cur-header-cell .code{font-size:10px;font-weight:800;color:var(--text-lt);text-transform:uppercase;}

    /* ══ CASH COUNTER SECTION ══ */
    .counter-grid{display:grid;grid-template-columns:1fr;gap:14px;}
    .counter-row{
      background:#fafbfd;border:1px solid var(--border);border-radius:var(--radius-sm);
      padding:14px;display:grid;gap:10px;
    }
    .counter-row-header{
      display:flex;align-items:center;gap:12px;margin-bottom:8px;
      padding-bottom:8px;border-bottom:2px dashed var(--border);flex-wrap:wrap;
    }
    .currency-flag-big{font-size:26px;}
    .currency-name{font-size:15px;font-weight:800;color:var(--navy);}
    .cr-summary{display:flex;align-items:center;gap:14px;margin-right:auto;flex-wrap:wrap;}
    .cr-sum-box{
      display:flex;flex-direction:column;align-items:center;
      background:white;border:2px solid var(--border);border-radius:var(--radius-sm);
      padding:6px 14px;min-width:120px;
    }
    .cr-sum-box label{font-size:9px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
    .cr-sum-box .val{font-size:16px;font-weight:900;font-family:'Tajawal',monospace;}
    .cr-sum-box.system .val{color:var(--blue);}
    .cr-sum-box.actual .val{color:var(--green);}
    .cr-sum-box.diff.surplus .val{color:var(--green);}
    .cr-sum-box.diff.deficit .val{color:var(--red);}
    .cr-sum-box.diff.zero .val{color:var(--text-lt);}

    /* denomination inputs */
    .denom-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;align-items:end;}
    .denom-cell{display:flex;flex-direction:column;align-items:center;gap:4px;}
    .denom-label{
      background:var(--navy);color:var(--gold);padding:3px 8px;border-radius:20px;
      font-size:11px;font-weight:800;font-family:'Tajawal',monospace;white-space:nowrap;
    }
    .denom-input{
      width:100%;padding:7px 4px;border:2px solid var(--border);border-radius:var(--radius-sm);
      font-size:15px;font-weight:700;text-align:center;font-family:'Tajawal',monospace;
      background:white;color:var(--text);transition:border-color .2s;
    }
    .denom-input:focus{border-color:var(--blue);outline:none;}
    .denom-subtotal{font-size:10px;font-weight:600;color:var(--text-lt);min-height:14px;}

    /* ══ LOADING ══ */
    .spinner{width:32px;height:32px;border:4px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .load-state{text-align:center;padding:30px;color:var(--text-lt);font-size:13px;}

    /* ══ TOTALS HIGHLIGHT ══ */
    .total-row-highlight{background:linear-gradient(135deg,#eff6ff,#dbeafe);border-radius:var(--radius-sm);padding:12px 16px;display:grid;grid-template-columns:repeat(8,1fr);gap:10px;margin-top:10px;}
    .total-cell{text-align:center;}
    .total-cell .tc-label{font-size:9px;font-weight:700;color:var(--text-lt);text-transform:uppercase;}
    .total-cell .tc-val{font-size:13px;font-weight:900;color:var(--navy);font-family:'Tajawal',monospace;}

    /* ══ BALANCE CUMULATIVE ══ */
    .balance-note{font-size:11px;color:var(--text-lt);margin-top:8px;text-align:center;font-style:italic;}

    /* ══ Responsive ══ */
    @media(max-width:900px){
      .cur-grid,.cur-headers{grid-template-columns:repeat(4,1fr);}
      .denom-grid{grid-template-columns:repeat(4,1fr);}
      .total-row-highlight{grid-template-columns:repeat(4,1fr);}
    }
    @media(max-width:560px){
      .cur-grid,.cur-headers{grid-template-columns:repeat(2,1fr);}
      .denom-grid{grid-template-columns:repeat(2,1fr);}
      .total-row-highlight{grid-template-columns:repeat(2,1fr);}
      .cr-summary{width:100%;}
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h2>💰 Daily Cash Register</h2>
  </div>
  <div class="header-right">
    <span class="user-chip" id="userChip">...</span>
    <span class="branch-chip" id="branchChip" style="display:none"></span>
    <button class="back-btn" onclick="goBack()">← Back</button>
  </div>
</div>

<div class="page">

  <!-- ══ DATE BAR ══ -->
  <div class="date-bar">
    <label>📅 Select Date:</label>
    <div class="date-input-wrap">
      <input type="text" class="date-text-fc" id="dateTxt" placeholder="dd/MMM/yyyy" oninput="onDateTxt()" onblur="onDateBlur()">
      <button class="cal-btn" onclick="openDatePick()">📅</button>
      <input type="date" class="date-native" id="dateNat" onchange="onNatPick()">
    </div>
    <div class="spin-row">
      <button class="spin-btn" onclick="spinDate(-1)">◀</button>
      <button class="spin-btn" onclick="spinDate(1)">▶</button>
    </div>
    <!-- Branch selector (Owner only) -->
    <div id="branchSelWrap" style="display:none">
      <select class="branch-sel" id="branchSel" onchange="loadData()">
        <option value="">🏢 All Branches</option>
      </select>
    </div>
    <button class="load-btn" onclick="loadData()">🔄 Load Data</button>
  </div>

  <!-- ══ CONTENT ══ -->
  <div id="mainContent"><div class="load-state"><div class="spinner"></div><br>Select a date to load cash data...</div></div>

</div>

<script>
/* ════════════════════════════════════════════
   CONFIG & GLOBALS
════════════════════════════════════════════ */
const GAS_URL='https://script.google.com/macros/s/AKfycbyBfwHQQoHb9E2bq0l-u6FLMD2XFKu_d8rZuJLnIq5iko82Bn93Emki6-cvDF_XOyRp/exec';
const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DASH={Admin:'Dashboard.html',Owner:'OwnerDashboard.html',Sales:'SalesDashboard.html',Accountant:'AccountantDashboard.html'};

// Currency config — 8 columns: USD, EUR, GBP, LE, VisaUSD, VisaEUR, VisaGBP, VisaLE
const CURRENCIES=[
  {key:'USD',  flag:'🇺🇸', label:'Cash $'},
  {key:'EUR',  flag:'🇪🇺', label:'Cash €'},
  {key:'GBP',  flag:'🇬🇧', label:'Cash £'},
  {key:'LE',   flag:'🇪🇬', label:'Cash LE'},
  {key:'VUSD', flag:'💳',  label:'Visa $'},
  {key:'VEUR', flag:'💳',  label:'Visa €'},
  {key:'VGBP', flag:'💳',  label:'Visa £'},
  {key:'VLE',  flag:'💳',  label:'Visa LE'},
];

// Denominations for cash currencies (LE, USD, EUR, GBP)
const CASH_CURRENCIES=[
  {key:'USD', flag:'🇺🇸', name:'US Dollar $', color:'#16a34a',
   denoms:[1,2,5,10,20,50,100,200]},
  {key:'EUR', flag:'🇪🇺', name:'Euro €',      color:'#2563eb',
   denoms:[1,2,5,10,20,50,100,200]},
  {key:'GBP', flag:'🇬🇧', name:'British Pound £', color:'#7c3aed',
   denoms:[1,2,5,10,20,50,100,200]},
  {key:'LE',  flag:'🇪🇬', name:'Egyptian Pound LE', color:'#ea580c',
   denoms:[1,5,10,20,50,100,200,0]}, // 0 = hidden slot
];

let currentUser=null;
let currentDateISO='';
let allInvoices=[],allRevenues=[],allExpenses=[],cashSumDates=[];
let systemTotals={invoices:{},revenues:{},expenses:{},balance:{}};
let branchesList=[];

/* ════════════════════════════════════════════
   DATE HELPERS
════════════════════════════════════════════ */
function isoToTxt(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return`${d.padStart(2,'0')}/${MN[+m-1]}/${y}`;}
function txtToISO(t){if(!t)return'';const m=t.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);if(!m)return'';const mi=MN.findIndex(x=>x.toLowerCase()===m[2].toLowerCase());if(mi===-1)return'';return`${m[3]}-${String(mi+1).padStart(2,'0')}-${m[1].padStart(2,'0')}`;}
function todayISO(){return new Date().toISOString().split('T')[0];}
function openDatePick(){const n=document.getElementById('dateNat');n.classList.add('vis');try{n.showPicker();n.focus();}catch{n.click();}}
function onNatPick(){const iso=document.getElementById('dateNat').value;if(!iso)return;currentDateISO=iso;document.getElementById('dateTxt').value=isoToTxt(iso);setTimeout(()=>document.getElementById('dateNat').classList.remove('vis'),100);loadData();}
function onDateTxt(){const v=document.getElementById('dateTxt').value.trim();if(/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(v)){const iso=txtToISO(v);if(iso){currentDateISO=iso;document.getElementById('dateNat').value=iso;}}}
function onDateBlur(){const v=document.getElementById('dateTxt').value.trim();if(!v||!/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(v)){document.getElementById('dateTxt').value=isoToTxt(currentDateISO||todayISO());}}
function spinDate(d){if(!currentDateISO)currentDateISO=todayISO();const dt=new Date(currentDateISO);dt.setDate(dt.getDate()+d);currentDateISO=dt.toISOString().split('T')[0];document.getElementById('dateTxt').value=isoToTxt(currentDateISO);document.getElementById('dateNat').value=currentDateISO;loadData();}
document.addEventListener('click',e=>{if(!e.target.closest('.date-input-wrap')&&!e.target.closest('.date-native'))document.getElementById('dateNat').classList.remove('vis');});

/* ════════════════════════════════════════════
   PARSE CASH_SUM DATE FORMAT (matches "08/Mar/2026" or "8/Jan/26" etc.)
════════════════════════════════════════════ */
function parseCashDate(s){if(!s)return'';s=String(s).trim();// try dd/MMM/yyyy or dd/MMM/yy
const m=s.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{2,4})$/);if(m){const mi=MN.findIndex(x=>x.toLowerCase()===m[2].toLowerCase());if(mi===-1)return'';let y=+m[3];if(y<100)y+=2000;return`${y}-${String(mi+1).padStart(2,'0')}-${m[1].padStart(2,'0')}`;}return'';}

/* ════════════════════════════════════════════
   GAS API
════════════════════════════════════════════ */
async function callGAS(action,params={}){
  const url=new URL(GAS_URL);url.searchParams.set('action',action);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,String(v??'')));
  const r=await fetch(url.toString(),{redirect:'follow'});if(!r.ok)throw new Error('HTTP '+r.status);return r.json();
}

/* ════════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════════ */
function goBack(){window.location.href=DASH[currentUser?.type]||'AccountantDashboard.html';}

/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded',async()=>{
  let ud=sessionStorage.getItem('currentUser');
  if(!ud){const p=new URLSearchParams(location.search).get('user');if(p){ud=decodeURIComponent(p);sessionStorage.setItem('currentUser',ud);}}
  if(!ud){location.href='index.html';return;}
  try{currentUser=JSON.parse(ud);}catch{location.href='index.html';return;}

  document.getElementById('userChip').textContent=currentUser.name||'User';
  const isOwner=currentUser.type==='Owner'||currentUser.type==='Admin';

  if(isOwner){
    document.getElementById('branchSelWrap').style.display='block';
    loadBranchList();
  }else{
    const bc=document.getElementById('branchChip');
    bc.textContent='📍 '+currentUser.branchName;bc.style.display='';
  }

  // Default = today
  currentDateISO=todayISO();
  document.getElementById('dateTxt').value=isoToTxt(currentDateISO);
  document.getElementById('dateNat').value=currentDateISO;

  // Preload all data once
  await prefetchAll();
  loadData();
});

async function loadBranchList(){
  try{
    const data=await callGAS('getBranchesByCenter',{centerId:currentUser.centerId||''});
    branchesList=Array.isArray(data)?data:(data.branches||[]);
    const sel=document.getElementById('branchSel');
    branchesList.forEach(b=>{const o=document.createElement('option');o.value=b.name||b;o.textContent=b.name||b;sel.appendChild(o);});
  }catch(e){console.warn('branches:',e);}
}

/* ════════════════════════════════════════════
   PREFETCH ALL DATA (single load, filter client-side)
════════════════════════════════════════════ */
async function prefetchAll(){
  document.getElementById('mainContent').innerHTML='<div class="load-state"><div class="spinner"></div><br>Loading data from server...</div>';
  try{
    const [inv,rev,exp,csd]=await Promise.all([
      callGAS('getAllInvoices'),
      callGAS('getAllRevenues'),
      callGAS('getAllExpenses'),
      callGAS('getCashSumDates'),
    ]);
    allInvoices=Array.isArray(inv)?inv:[];
    allRevenues=Array.isArray(rev)?rev:[];
    allExpenses=Array.isArray(exp)?exp:[];
    cashSumDates=Array.isArray(csd)?csd:[];
  }catch(e){
    document.getElementById('mainContent').innerHTML=`<div class="load-state">⚠️ Failed to load data: ${e.message}</div>`;
  }
}

/* ════════════════════════════════════════════
   LOAD DATA FOR SELECTED DATE
════════════════════════════════════════════ */
function loadData(){
  if(!currentDateISO){document.getElementById('mainContent').innerHTML='<div class="load-state">Please select a date</div>';return;}
  const selBranch=document.getElementById('branchSel')?.value||'';
  const userBranch=currentUser?.branchName||'';
  const isOwner=currentUser?.type==='Owner'||currentUser?.type==='Admin';

  /* Branch filter function */
  const branchMatch=(inv)=>{
    if(isOwner){if(!selBranch)return true;return inv.branchName===selBranch;}
    return inv.branchName===userBranch;
  };

  /* ── Filter invoices by issueDate (Column C = index 2) ── */
  const dayInv=allInvoices.filter(inv=>{
    const d=isoFromInvoiceDate(inv.issueDate);return d===currentDateISO&&branchMatch(inv);
  });

  /* ── Filter revenues by date (Column A = index 0) ── */
  const dayRev=allRevenues.filter(r=>{
    const d=isoFromInvoiceDate(r.date||r.Date);return d===currentDateISO&&branchMatch(r);
  });

  /* ── Filter expenses by date (Column A = index 0) ── */
  const dayExp=allExpenses.filter(e=>{
    const d=isoFromInvoiceDate(e.date||e.Date);return d===currentDateISO&&branchMatch(e);
  });

  /* ── Aggregate currency columns ── */
  const invTotals=sumCurrencies(dayInv,'invoice');
  const revTotals=sumCurrencies(dayRev,'revenue');
  const expTotals=sumCurrencies(dayExp,'expense');

  /* ── Total Income = Invoices + Revenues ── */
  const incTotals={};
  CURRENCIES.forEach(c=>{incTotals[c.key]=roundTwo((invTotals[c.key]||0)+(revTotals[c.key]||0));});

  /* ── Balance = TotalIncome - Expenses ── */
  const balTotals={};
  CURRENCIES.forEach(c=>{balTotals[c.key]=roundTwo((incTotals[c.key]||0)-(expTotals[c.key]||0));});

  systemTotals={invoices:invTotals,revenues:revTotals,income:incTotals,expenses:expTotals,balance:balTotals};

  renderPage(dayInv.length,dayRev.length,dayExp.length);
}

/* ════════════════════════════════════════════
   DATE PARSING FROM VARIOUS FORMATS
════════════════════════════════════════════ */
function isoFromInvoiceDate(s){
  if(!s)return'';
  s=String(s).trim();
  // dd/MMM/yyyy
  const m1=s.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{2,4})$/);
  if(m1){const mi=MN.findIndex(x=>x.toLowerCase()===m1[2].toLowerCase());if(mi===-1)return'';let y=+m1[3];if(y<100)y+=2000;return`${y}-${String(mi+1).padStart(2,'0')}-${m1[1].padStart(2,'0')}`;}
  // yyyy-MM-dd
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  // MM/dd/yyyy or dd/MM/yyyy
  const m2=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m2)return`${m2[3]}-${m2[2].padStart(2,'0')}-${m2[1].padStart(2,'0')}`;
  return'';
}

/* ════════════════════════════════════════════
   SUM CURRENCIES
   Invoice sheet: cashUSD, cashEUR, cashGBP, cashLE, visaUSD, visaEUR, visaGBP, visaLE
   Revenue/Expense sheet: USD(C), EUR(D), GBP(E), LE(F), VisaUSD(G), VisaEUR(H), VisaGBP(I), VisaLE(J)
════════════════════════════════════════════ */
function sumCurrencies(rows,type){
  const r={USD:0,EUR:0,GBP:0,LE:0,VUSD:0,VEUR:0,VGBP:0,VLE:0};
  rows.forEach(row=>{
    if(type==='invoice'){
      r.USD +=parseFloat(row.cashUSD)||0;
      r.EUR +=parseFloat(row.cashEUR)||0;
      r.GBP +=parseFloat(row.cashGBP)||0;
      r.LE  +=parseFloat(row.cashLE) ||0;
      r.VUSD+=parseFloat(row.visaUSD)||0;
      r.VEUR+=parseFloat(row.visaEUR)||0;
      r.VGBP+=parseFloat(row.visaGBP)||0;
      r.VLE +=parseFloat(row.visaLE) ||0;
    }else{
      // Revenue/Expense: fields USD, EUR, GBP, LE, VisaUSD, VisaEUR, VisaGBP, VisaLE
      r.USD +=parseFloat(row.USD||row['$']||row.cashUSD)||0;
      r.EUR +=parseFloat(row.EUR||row['€']||row.cashEUR)||0;
      r.GBP +=parseFloat(row.GBP||row['£']||row.cashGBP)||0;
      r.LE  +=parseFloat(row.LE ||row.cashLE)||0;
      r.VUSD+=parseFloat(row.VisaUSD||row.visaUSD||row['Visa$'])||0;
      r.VEUR+=parseFloat(row.VisaEUR||row.visaEUR||row['Visa€'])||0;
      r.VGBP+=parseFloat(row.VisaGBP||row.visaGBP||row['Visa£'])||0;
      r.VLE +=parseFloat(row.VisaLE ||row.visaLE ||row['VisaLE'])||0;
    }
  });
  Object.keys(r).forEach(k=>r[k]=roundTwo(r[k]));
  return r;
}

function roundTwo(n){return Math.round((n+Number.EPSILON)*100)/100;}
function fmtNum(n){if(!n||n===0)return'—';return n.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});}

/* ════════════════════════════════════════════
   RENDER PAGE
════════════════════════════════════════════ */
function renderPage(invCount,revCount,expCount){
  const dt=isoToTxt(currentDateISO);
  document.getElementById('mainContent').innerHTML=`

  <!-- ══ Currency Header ══ -->
  <div class="cur-headers">
    ${CURRENCIES.map(c=>`<div class="cur-header-cell"><span class="flag">${c.flag}</span><span class="code">${c.label}</span></div>`).join('')}
  </div>

  <!-- ══ INVOICES ══ -->
  <div class="section-card">
    <div class="section-head invoices-head">
      <h3>🧾 Invoices (Issue Date: ${dt})</h3>
      <span class="badge">${invCount} invoices</span>
    </div>
    <div class="section-body">
      <div class="cur-grid">${renderCurRow('invoices')}</div>
    </div>
  </div>

  <!-- ══ OTHER REVENUES ══ -->
  <div class="section-card">
    <div class="section-head revenues-head">
      <h3>💵 Other Revenues</h3>
      <span class="badge">${revCount} entries</span>
    </div>
    <div class="section-body">
      <div class="cur-grid">${renderCurRow('revenues')}</div>
    </div>
  </div>

  <!-- ══ TOTAL INCOME ══ -->
  <div class="section-card">
    <div class="section-head total-income-head">
      <h3>📈 Total Income (Invoices + Revenues)</h3>
      <span class="badge">= Invoices + Revenue</span>
    </div>
    <div class="section-body">
      <div class="cur-grid">${renderCurRow('income')}</div>
    </div>
  </div>

  <!-- ══ EXPENSES ══ -->
  <div class="section-card">
    <div class="section-head expenses-head">
      <h3>📉 Expenses</h3>
      <span class="badge">${expCount} entries</span>
    </div>
    <div class="section-body">
      <div class="cur-grid">${renderCurRow('expenses')}</div>
    </div>
  </div>

  <!-- ══ DAILY BALANCE ══ -->
  <div class="section-card">
    <div class="section-head balance-head">
      <h3>💰 Daily Cash Balance (Income − Expenses)</h3>
      <span class="badge">Net Balance</span>
    </div>
    <div class="section-body">
      <div class="cur-grid">${renderCurRow('balance')}</div>
      <div class="balance-note">※ This is today's net cash movement. Cumulative balance is tracked in Cash_Sum sheet columns Z:AG</div>
    </div>
  </div>

  <!-- ══ PHYSICAL CASH COUNTER ══ -->
  <div class="section-card">
    <div class="section-head" style="background:linear-gradient(90deg,#0f172a,#1e293b)">
      <h3 style="color:#f1f5f9;font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px">🏧 Physical Cash Count & Verification</h3>
      <span style="background:rgba(255,255,255,.15);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;color:#f1f5f9">Count denominations → auto-total</span>
    </div>
    <div class="section-body">
      <div class="counter-grid" id="counterGrid"></div>
    </div>
  </div>
  `;

  // Build cash counter
  buildCounters();
}

/* ════════════════════════════════════════════
   RENDER CURRENCY ROW
════════════════════════════════════════════ */
function renderCurRow(section){
  const totals=systemTotals[section]||{};
  return CURRENCIES.map(c=>{
    const v=totals[c.key]||0;
    const cls=v>0?'positive':v<0?'negative':'zero';
    return`<div class="cur-col">
      <div class="cur-val ${cls}">${v!==0?fmtNum(v):'—'}</div>
    </div>`;
  }).join('');
}

/* ════════════════════════════════════════════
   BUILD CASH COUNTER (per currency)
════════════════════════════════════════════ */
function buildCounters(){
  const grid=document.getElementById('counterGrid');if(!grid)return;
  grid.innerHTML=CASH_CURRENCIES.map(cur=>{
    const sysVal=systemTotals.balance[cur.key]||0;
    const denoms=cur.denoms.filter(d=>d>0);
    const denomHtml=denoms.map((d,i)=>`
      <div class="denom-cell">
        <div class="denom-label">${d}</div>
        <input type="number" class="denom-input" id="${cur.key}_d${d}" min="0" placeholder="0"
          oninput="calcCurrency('${cur.key}')" onfocus="this.value=''">
        <div class="denom-subtotal" id="${cur.key}_sub${d}"></div>
      </div>`).join('');

    // Fill remaining slots
    const slots=8;const filledSlots=denoms.length;const emptySlots=slots-filledSlots;
    const emptyHtml=Array(emptySlots).fill('<div class="denom-cell"></div>').join('');

    return`<div class="counter-row" style="border-left:4px solid ${cur.color}">
      <div class="counter-row-header">
        <span class="currency-flag-big">${cur.flag}</span>
        <span class="currency-name" style="color:${cur.color}">${cur.name}</span>
        <div class="cr-summary">
          <div class="cr-sum-box system">
            <label>System Balance</label>
            <div class="val" id="${cur.key}_sys">${sysVal?fmtNum(sysVal):'—'}</div>
          </div>
          <div class="cr-sum-box actual">
            <label>Actual Count</label>
            <div class="val" id="${cur.key}_actual">—</div>
          </div>
          <div class="cr-sum-box diff zero" id="${cur.key}_diffBox">
            <label>Difference</label>
            <div class="val" id="${cur.key}_diff">—</div>
          </div>
        </div>
      </div>
      <div class="denom-grid">${denomHtml}${emptyHtml}</div>
    </div>`;
  }).join('');
}

/* ════════════════════════════════════════════
   CALCULATE CURRENCY TOTALS
════════════════════════════════════════════ */
function calcCurrency(curKey){
  const cur=CASH_CURRENCIES.find(c=>c.key===curKey);if(!cur)return;
  let total=0;
  cur.denoms.filter(d=>d>0).forEach(d=>{
    const inp=document.getElementById(`${curKey}_d${d}`);
    const qty=parseFloat(inp?.value)||0;
    const subtotal=qty*d;total+=subtotal;
    const sub=document.getElementById(`${curKey}_sub${d}`);
    if(sub)sub.textContent=subtotal>0?'= '+subtotal.toLocaleString('en'):'';
  });
  total=roundTwo(total);

  // Update actual
  const actEl=document.getElementById(`${curKey}_actual`);
  if(actEl)actEl.textContent=total>0?fmtNum(total):'—';

  // Compute difference
  const sysVal=systemTotals.balance?.[curKey]||0;
  const diff=roundTwo(total-sysVal);
  const diffEl=document.getElementById(`${curKey}_diff`);
  const diffBox=document.getElementById(`${curKey}_diffBox`);

  if(!actEl||actEl.textContent==='—'){if(diffEl)diffEl.textContent='—';if(diffBox)diffBox.className='cr-sum-box diff zero';return;}
  if(diff===0){
    if(diffEl)diffEl.textContent='✓ Balanced';
    if(diffBox)diffBox.className='cr-sum-box diff zero';
  }else if(diff>0){
    if(diffEl)diffEl.textContent=`+ ${fmtNum(diff)} Surplus`;
    if(diffBox)diffBox.className='cr-sum-box diff surplus';
  }else{
    if(diffEl)diffEl.textContent=`- ${fmtNum(Math.abs(diff))} Deficit`;
    if(diffBox)diffBox.className='cr-sum-box diff deficit';
  }
}
</script>
