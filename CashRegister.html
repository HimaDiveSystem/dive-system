<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Daily Cash Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0f1f3d;--navy2:#1a3260;--gold:#f5c842;--gold2:#e6b800;
      --blue:#2563eb;--blue-lt:#dbeafe;
      --green:#16a34a;--green-lt:#dcfce7;
      --red:#dc2626;--red-lt:#fee2e2;
      --orange:#ea580c;--purple:#7c3aed;
      --bg:#f0f4f8;--card:#fff;--border:#dde4f0;
      --text:#1a2540;--text-lt:#5a6a8a;
      --radius:16px;--radius-sm:10px;
      --shadow:0 4px 24px rgba(15,31,61,.10);
      --shadow-lg:0 8px 40px rgba(15,31,61,.16);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    .header{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:13px 22px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-lg);}
    .header-left{display:flex;align-items:center;gap:10px;}
    .header-left h2{color:var(--gold);font-size:18px;font-weight:900;display:flex;align-items:center;gap:8px;}
    .header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:40px;padding:4px 13px;color:white;font-size:12px;font-weight:600;}
    .branch-chip{background:rgba(245,200,66,.2);border:1px solid rgba(245,200,66,.4);border-radius:40px;padding:4px 13px;color:var(--gold);font-size:12px;font-weight:700;}
    .back-btn{background:transparent;border:2px solid rgba(255,255,255,.3);color:white;padding:4px 13px;border-radius:40px;cursor:pointer;font-weight:700;font-size:12px;font-family:'Cairo',sans-serif;transition:all .2s;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}
    /* تجميد الرأس - يتحرك يميناً ويساراً فقط */
.header {
  position: sticky;
  top: 0;
  left: 0;
  right: 0;
  width: 100%;
  overflow-x: auto;
  white-space: nowrap;
  z-index: 100;
}

/* السماح بالتمرير الأفقي للمحتوى */
.page {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

/* تأكد من أن الجداول لا تتجاوز الشاشة */
.cur-headers, .cur-grid, .denom-grid {
  min-width: 600px;
}
    .page{max-width:1200px;margin:0 auto;padding:20px 16px 60px;}

    .date-bar{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .date-bar label{font-size:13px;font-weight:700;color:var(--text-lt);white-space:nowrap;}
    .date-input-wrap{display:flex;align-items:center;gap:5px;}
    .date-text-fc{padding:7px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:'Cairo',sans-serif;color:var(--text);background:white;height:40px;width:148px;transition:border-color .2s;}
    .date-text-fc:focus{border-color:var(--blue);outline:none;}
    .cal-btn{padding:7px 10px;background:var(--navy);color:var(--gold);border:none;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;height:40px;}
    .cal-btn:hover{background:var(--navy2);}
    .date-native{position:fixed;opacity:0;width:0;height:0;pointer-events:none;z-index:-1;}
    .date-native.vis{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);opacity:1;width:auto;height:auto;pointer-events:auto;z-index:1000;background:white;padding:10px;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.3);}
    .spin-row{display:flex;gap:3px;}
    .spin-btn{padding:3px 8px;border:none;border-radius:6px;background:var(--navy);color:white;font-size:11px;font-weight:700;cursor:pointer;height:40px;}
    .spin-btn:hover{background:var(--gold);color:var(--navy);}
    .branch-sel{padding:7px 10px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Cairo',sans-serif;color:var(--text);background:white;height:40px;cursor:pointer;-webkit-appearance:none;appearance:none;min-width:160px;}
    .branch-sel:focus{border-color:var(--blue);outline:none;}
    .load-btn{padding:7px 20px;background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);border:none;border-radius:40px;font-weight:800;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;height:40px;transition:all .2s;display:flex;align-items:center;gap:5px;}
    .load-btn:hover{transform:translateY(-1px);}
    .save-status{font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px;display:none;align-items:center;gap:5px;}
    .save-status.saved{background:var(--green-lt);color:#166534;display:inline-flex;}
    .save-status.unsaved{background:#fef9c3;color:#854d0e;display:inline-flex;}

    .cur-headers{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;margin-bottom:6px;padding:0 16px;}
    .cur-header-cell{display:flex;flex-direction:column;align-items:center;gap:2px;}
    .cur-header-cell .flag{font-size:18px;}
    .cur-header-cell .code{font-size:10px;font-weight:800;color:var(--text-lt);text-transform:uppercase;}

    .section-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:14px;overflow:hidden;}
    .section-head{padding:11px 16px;display:flex;align-items:center;gap:8px;justify-content:space-between;}
    .section-head h3{font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px;}
    .sh-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;}
    .sh-inv{background:linear-gradient(90deg,#1a3260,#2563eb);}
    .sh-inv h3{color:#bfdbfe;}.sh-inv .sh-badge{color:white;}
    .sh-rev{background:linear-gradient(90deg,#14532d,#16a34a);}
    .sh-rev h3{color:#bbf7d0;}.sh-rev .sh-badge{color:white;}
    .sh-tin{background:linear-gradient(90deg,#7c3aed,#9333ea);}
    .sh-tin h3{color:#ede9fe;}.sh-tin .sh-badge{color:white;}
    .sh-exp{background:linear-gradient(90deg,#7f1d1d,#dc2626);}
    .sh-exp h3{color:#fecaca;}.sh-exp .sh-badge{color:white;}
    .sh-bal{background:linear-gradient(90deg,#0f1f3d,#1e3a5f);}
    .sh-bal h3{color:var(--gold);}.sh-bal .sh-badge{color:var(--gold);}
    .sh-cnt{background:linear-gradient(90deg,#0f172a,#1e293b);}
    .sh-cnt h3{color:#f1f5f9;}.sh-cnt .sh-badge{color:#94a3b8;}
    .section-body{padding:14px;}

    .cur-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;}
    .cur-col{display:flex;flex-direction:column;align-items:center;gap:3px;}
    .cur-val{width:100%;padding:8px 4px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-weight:700;text-align:center;font-family:'Tajawal',monospace;background:#fafbfd;color:var(--text);}
    .cur-val.pos{border-color:var(--green);background:var(--green-lt);color:#166534;}
    .cur-val.neg{border-color:var(--red);background:var(--red-lt);color:#991b1b;}
    .cur-val.zer{background:#f8fafc;color:var(--text-lt);}
    .balance-note{font-size:11px;color:var(--text-lt);margin-top:8px;text-align:center;font-style:italic;}

    .counter-grid{display:grid;grid-template-columns:1fr;gap:14px;}
    .counter-row{background:#fafbfd;border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;border-left-width:5px;}
    .crh{display:flex;align-items:center;gap:12px;padding-bottom:10px;border-bottom:2px dashed var(--border);flex-wrap:wrap;margin-bottom:12px;}
    .cur-flag-big{font-size:26px;}
    .cur-name{font-size:15px;font-weight:800;}
    .cr-summary{display:flex;align-items:center;gap:10px;margin-right:auto;flex-wrap:wrap;}
    .sum-box{display:flex;flex-direction:column;align-items:center;background:white;border:2px solid var(--border);border-radius:var(--radius-sm);padding:5px 12px;min-width:115px;}
    .sum-box label{font-size:9px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;}
    .sum-box .sv{font-size:15px;font-weight:900;font-family:'Tajawal',monospace;}
    .sum-box.sys .sv{color:var(--blue);}
    .sum-box.act .sv{color:var(--green);}
    .sum-box.dif.surp .sv{color:var(--green);}
    .sum-box.dif.defi .sv{color:var(--red);}
    .sum-box.dif.zero .sv{color:var(--text-lt);}
    .denom-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;align-items:end;}
    .denom-cell{display:flex;flex-direction:column;align-items:center;gap:3px;}
    .d-label{background:var(--navy);color:var(--gold);padding:3px 8px;border-radius:20px;font-size:11px;font-weight:800;font-family:'Tajawal',monospace;white-space:nowrap;}
    .d-input{width:100%;padding:6px 2px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-weight:700;text-align:center;font-family:'Tajawal',monospace;background:white;color:var(--text);transition:border-color .2s;}
    .d-input:focus{border-color:var(--blue);outline:none;}
    .d-input.has-val{border-color:var(--blue);background:var(--blue-lt);}
    .d-sub{font-size:9px;font-weight:600;color:var(--text-lt);min-height:13px;text-align:center;}

    .counter-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-top:16px;padding-top:14px;border-top:2px dashed var(--border);}
    .counter-notes{flex:1;padding:8px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Cairo',sans-serif;color:var(--text);background:white;resize:none;min-width:200px;}
    .counter-notes:focus{border-color:var(--blue);outline:none;}
    .save-count-btn{padding:10px 26px;background:linear-gradient(135deg,var(--green),#15803d);color:white;border:none;border-radius:40px;font-weight:800;font-size:14px;cursor:pointer;font-family:'Cairo',sans-serif;box-shadow:0 4px 14px rgba(22,163,74,.3);transition:all .2s;display:flex;align-items:center;gap:7px;}
    .save-count-btn:hover{transform:translateY(-2px);}
    .save-count-btn:disabled{opacity:.55;cursor:not-allowed;transform:none;}
    .save-info{font-size:11px;color:var(--text-lt);}

    .spinner{width:32px;height:32px;border:4px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .load-state{text-align:center;padding:30px;color:var(--text-lt);font-size:13px;}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f1f3d;color:white;padding:10px 24px;border-radius:40px;font-size:13px;font-weight:700;font-family:'Cairo',sans-serif;box-shadow:0 6px 20px rgba(0,0,0,.3);z-index:99999;opacity:0;transition:opacity .3s;pointer-events:none;}
    .toast.show{opacity:1;}
    .toast.success{background:linear-gradient(135deg,#16a34a,#15803d);}
    .toast.error{background:linear-gradient(135deg,#dc2626,#b91c1c);}
    .toast.info{background:linear-gradient(135deg,#2563eb,#1d4ed8);}

    @media(max-width:900px){
      .cur-headers,.cur-grid,.denom-grid{grid-template-columns:repeat(4,1fr);}
    }
    @media(max-width:560px){
      .cur-headers,.cur-grid,.denom-grid{grid-template-columns:repeat(2,1fr);}
      .cr-summary{width:100%;}
    }
    /* مؤشر تحميل محسّن */
.load-state {
  position: relative;
  min-height: 200px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.load-state .spinner {
  width: 48px;
  height: 48px;
  border: 4px solid #e2e8f0;
  border-top-color: #1a3260;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}

.load-state .loading-text {
  font-size: 14px;
  color: #1a3260;
  font-weight: 600;
}

.load-state .loading-hint {
  font-size: 11px;
  color: #94a3b8;
  margin-top: 8px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h2>💰 Daily Cash Register</h2>
  </div>
  <div class="header-right">
    <span class="user-chip" id="userChip">...</span>
    <span class="branch-chip" id="branchChip" style="display:none"></span>
    <span class="save-status" id="saveStatus"></span>
    <button class="back-btn" onclick="goBack()">← Back</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="page">
  <div class="date-bar">
    <label>📅 Date:</label>
    <div class="date-input-wrap">
      <input type="text" class="date-text-fc" id="dateTxt" placeholder="dd/MMM/yyyy" oninput="onDateTxt()" onblur="onDateBlur()">
      <button class="cal-btn" onclick="openDatePick()">📅</button>
      <input type="date" class="date-native" id="dateNat" onchange="onNatPick()">
    </div>
    <div class="spin-row">
      <button class="spin-btn" onclick="spinDate(-1)" title="Previous day">◀</button>
      <button class="spin-btn" onclick="spinDate(1)"  title="Next day">▶</button>
    </div>
     <div class="last-date-info" style="display:flex; align-items:center; gap:8px; margin-right:auto;">
    <span style="font-size:11px; color:#64748b;">📅 آخر تاريخ في الخزينة:</span>
    <span id="lastCashDate" style="font-weight:700; color:#1e2b4f; background:#f1f5f9; padding:4px 12px; border-radius:20px;">—</span>
  </div>
    <div id="branchSelWrap" style="display:none">
      <select class="branch-sel" id="branchSel" onchange="onBranchChange()">
        <option value="">-- اختر فرع --</option>
      </select>
    </div>
      </div>

  <div id="mainContent">
    <div class="load-state"><div class="spinner"></div><br>Select a date to load cash data...</div>
  </div>
</div>

<script>
// ⚠️ قم بتحديث هذا الرابط إلى رابط التطبيق المنشور الجديد ⚠️
 const GAS_URL='https://script.google.com/macros/s/AKfycbzjv8iFYX6vm_3hsbKEHWRLRhFoGISm6TSQcDINgkkff14yjpoBY-rYGCqJFlpF5u3g/exec';
const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DASH={Admin:'Dashboard.html',Owner:'OwnerDashboard.html',Sales:'SalesDashboard.html',Accountant:'AccountantDashboard.html'};

const CURRENCIES=[
  {key:'USD',  flag:'🇺🇸', label:'Cash $'},
  {key:'EUR',  flag:'🇪🇺', label:'Cash €'},
  {key:'GBP',  flag:'🇬🇧', label:'Cash £'},
  {key:'LE',   flag:'🇪🇬', label:'Cash LE'},
  {key:'VUSD', flag:'💳',  label:'Visa $'},
  {key:'VEUR', flag:'💳',  label:'Visa €'},
  {key:'VGBP', flag:'💳',  label:'Visa £'},
  {key:'VLE',  flag:'💳',  label:'Visa LE'},
];

const CASH_CURS = [
  {key:'USD', flag:'🇺🇸', name:'US Dollar $',       color:'#16a34a', denoms:[1,2,5,10,20,50,100,200]},
  {key:'EUR', flag:'🇪🇺', name:'Euro €',             color:'#2563eb', denoms:[1,2,5,10,20,50,100,200]},
  {key:'GBP', flag:'🇬🇧', name:'British Pound £',    color:'#7c3aed', denoms:[1,2,5,10,20,50,100,200]},
  {key:'LE',  flag:'🇪🇬', name:'Egyptian Pound LE',  color:'#ea580c', denoms:[1,5,10,20,50,100,200]}
];

let currentUser=null;
let currentDateISO='';
let allInvoices=[],allRevenues=[],allExpenses=[];
let allBranches=[];
let selectedBranch='';
let canViewAllBranches=false;
let systemTotals={invoices:{},revenues:{},income:{},expenses:{},balance:{},accumulatedBalance:{}};
let savedCountData=null;
let hasChanges=false;
let lastCashDateStr = '';  // آخر تاريخ في شيت Cash_Sum
  // إعدادات التخزين المؤقت
let dataCache = {
  invoices: {},   // { "dd/MMM/yyyy": [...] }
  revenues: {},   // { "dd/MMM/yyyy": [...] }
  expenses: {},   // { "dd/MMM/yyyy": [...] }
  range: { startDate: null, endDate: null }
};
let isDataLoaded = false;
const CACHE_DAYS_RANGE = 10; // 10 أيام قبل و 10 أيام بعد
  
function toDDMMMYYYY(dateStr) {
  if(!dateStr) return '';
  if(/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(dateStr)) return dateStr;
  if(/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
    const [year, month, day] = dateStr.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const monthName = months[parseInt(month) - 1];
    return `${parseInt(day)}/${monthName}/${year}`;
  }
  return dateStr;
}

function getTodayDDMMMYYYY() {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const today = new Date();
  const day = String(today.getDate()).padStart(2, '0');
  const month = months[today.getMonth()];
  const year = today.getFullYear();
  return `${day}/${month}/${year}`;
}

function initCurrentDate() {
  currentDateISO = getTodayDDMMMYYYY();
  document.getElementById('dateTxt').value = currentDateISO;
  document.getElementById('dateNat').value = '';
}

function openDatePick(){const n=document.getElementById('dateNat');n.classList.add('vis');try{n.showPicker();n.focus();}catch{n.click();}}
// في onNatPick() - استبدل updateCashSumAndReload() بـ loadData()
function onNatPick() {
  const natDate = document.getElementById('dateNat').value;
  if (natDate) {
    const [year, month, day] = natDate.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const monthName = months[parseInt(month) - 1];
    currentDateISO = `${day}/${monthName}/${year}`;
    document.getElementById('dateTxt').value = currentDateISO;
    document.getElementById('dateNat').classList.remove('vis');
    loadData();  // ✅ تغيير: loadData() بدلاً من updateCashSumAndReload()
  }
}
async function getLastCashDate() {
  try {
    console.log('🔍 getLastCashDate called, centerName:', currentUser?.centerName);
    const result = await callGAS('getLastCashDateFromCenter', { 
      centerName: currentUser?.centerName 
    });
    console.log('📡 getLastCashDateFromCenter response:', result);
    
    if (result?.success && result.lastDate) {
      lastCashDateStr = result.lastDate;
      document.getElementById('lastCashDate').textContent = lastCashDateStr;
      console.log('✅ Last cash date updated to:', lastCashDateStr);
      return lastCashDateStr;
    } else {
      console.warn('⚠️ No last date found, message:', result?.message);
      document.getElementById('lastCashDate').textContent = '—';
      return null;
    }
  } catch(e) {
    console.error('❌ getLastCashDate error:', e);
    document.getElementById('lastCashDate').textContent = 'خطأ';
    return null;
  }
}
// في spinDate() - استبدل updateCashSumAndReload() بـ loadData()
function spinDate(d) {
  if (!currentDateISO) {
    currentDateISO = getTodayDDMMMYYYY();
  }
  // بعد تعيين currentDateISO
if (lastCashDateStr && isDateAfterLastCashDate(currentDateISO)) {
  showDateWarning(currentDateISO);
  return;
}
  const match = currentDateISO.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (match) {
    const day = parseInt(match[1]);
    const month = match[2];
    const year = parseInt(match[3]);
    const months = {'Jan':0,'Feb':1,'Mar':2,'Apr':3,'May':4,'Jun':5,'Jul':6,'Aug':7,'Sep':8,'Oct':9,'Nov':10,'Dec':11};
    const dateObj = new Date(year, months[month], day);
    dateObj.setDate(dateObj.getDate() + d);
    const newDay = String(dateObj.getDate()).padStart(2, '0');
    const newMonth = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][dateObj.getMonth()];
    const newYear = dateObj.getFullYear();
    currentDateISO = `${newDay}/${newMonth}/${newYear}`;
    document.getElementById('dateTxt').value = currentDateISO;
    loadData();  // ✅ تغيير: loadData() بدلاً من updateCashSumAndReload()
  }
}
function isDateAfterLastCashDate(dateToCheck) {
  if (!lastCashDateStr || !dateToCheck) return false;
  
  // تحويل إلى كائنات Date للمقارنة
  const checkDate = new Date(dateToCheck);
  const lastDate = new Date(lastCashDateStr);
  
  if (isNaN(checkDate) || isNaN(lastDate)) return false;
  
  return checkDate > lastDate;
}
  function showDateWarning(targetDate) {
  // إزالة أي modal موجود مسبقاً
  const existingModal = document.getElementById('cashDateWarningModal');
  if (existingModal) existingModal.remove();
  
  const overlay = document.createElement('div');

async function callGAS(action, params = {}) {
  const url = new URL(GAS_URL);
  url.searchParams.set('action', action);
  // إضافة centerId و centerName من المستخدم الحالي
  if (currentUser) {
    if (!params.centerId && currentUser.centerId) params.centerId = currentUser.centerId;
    if (!params.centerName && currentUser.centerName) params.centerName = currentUser.centerName;
  }
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v ?? '')));
  const response = await fetch(url.toString(), { mode: 'cors' });
  if (!response.ok) throw new Error('HTTP ' + response.status);
  return response.json();
}

function formatDateForCache(date) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const day = String(date.getDate()).padStart(2, '0');
  const month = months[date.getMonth()];
  const year = date.getFullYear();
  return `${day}/${month}/${year}`;
}

function sumCur(rows,type){
  const r={USD:0,EUR:0,GBP:0,LE:0,VUSD:0,VEUR:0,VGBP:0,VLE:0};
  rows.forEach(row=>{
    if(type==='invoice'){
      r.USD += parseFloat(row.cashUSD)||0; r.EUR += parseFloat(row.cashEUR)||0;
      r.GBP += parseFloat(row.cashGBP)||0; r.LE  += parseFloat(row.cashLE)||0;
      r.VUSD+= parseFloat(row.visaUSD)||0; r.VEUR+= parseFloat(row.visaEUR)||0;
      r.VGBP+= parseFloat(row.visaGBP)||0; r.VLE += parseFloat(row.visaLE)||0;
    }else{
      r.USD += parseFloat(row.USD||row['$']||row.cashUSD)||0;
      r.EUR += parseFloat(row.EUR||row['€']||row.cashEUR)||0;
      r.GBP += parseFloat(row.GBP||row['£']||row.cashGBP)||0;
      r.LE  += parseFloat(row.LE||row.cashLE)||0;
      r.VUSD+= parseFloat(row.VisaUSD||row.visaUSD||row['Visa$'])||0;
      r.VEUR+= parseFloat(row.VisaEUR||row.visaEUR||row['Visa€'])||0;
      r.VGBP+= parseFloat(row.VisaGBP||row.visaGBP||row['Visa£'])||0;
      r.VLE += parseFloat(row.VisaLE||row.visaLE||row['VisaLE'])||0;
    }
  });
  Object.keys(r).forEach(k=>r[k]=roundTwo(r[k]));return r;
}

async function expandCacheAroundDate(targetDateStr, branchName) {
  // تحويل التاريخ إلى كائن Date
  const targetDate = parseDateFromDDMMMYYYY(targetDateStr);
  if (!targetDate) return;
  
  // حساب النطاق الجديد (5 أيام قبل + 5 أيام بعد)
  const newStartDate = new Date(targetDate);
  newStartDate.setDate(targetDate.getDate() - 5);
  
  const newEndDate = new Date(targetDate);
  newEndDate.setDate(targetDate.getDate() + 5);
  
  const newStartStr = formatDateForCache(newStartDate);
  const newEndStr = formatDateForCache(newEndDate);
  
  // التحقق مما إذا كان النطاق الجديد داخل النطاق الحالي
  const currentStart = dataCache.range.startDate;
  const currentEnd = dataCache.range.endDate;
  
  if (currentStart && currentEnd && 
      isDateInRange(newStartStr, currentStart, currentEnd) &&
      isDateInRange(newEndStr, currentStart, currentEnd)) {
    console.log('📦 النطاق المطلوب موجود بالفعل في Cache');
    return;
  }
  
  console.log(`🔄 توسيع النطاق إلى: ${newStartStr} → ${newEndStr}`);
  
  try {
    const result = await callGAS('fetchCashDataInRange', {
      startDate: newStartStr,
      endDate: newEndStr,
      branchName: branchName,
      centerName: currentUser?.centerName || ''
    });
    
    if (result?.success) {
      // دمج البيانات الجديدة مع البيانات الموجودة
      dataCache.invoices = { ...dataCache.invoices, ...(result.invoices || {}) };
      dataCache.revenues = { ...dataCache.revenues, ...(result.revenues || {}) };
      dataCache.expenses = { ...dataCache.expenses, ...(result.expenses || {}) };
      dataCache.range.startDate = newStartStr;
      dataCache.range.endDate = newEndStr;
      isDataLoaded = true;
      console.log('✅ تم توسيع Cache بنجاح');
    }
  } catch(e) {
    console.error('❌ فشل توسيع Cache:', e);
  }
}

// ✅ تحديث نطاق Cache عند إضافة تاريخ جديد
function updateCacheRange(newDateStr) {
  if (!dataCache.range.startDate && !dataCache.range.endDate) {
    dataCache.range.startDate = newDateStr;
    dataCache.range.endDate = newDateStr;
    return;
  }
  
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthMap = {'Jan':0,'Feb':1,'Mar':2,'Apr':3,'May':4,'Jun':5,'Jul':6,'Aug':7,'Sep':8,'Oct':9,'Nov':10,'Dec':11};
  
  const parseDate = (d) => {
    const m = d.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
    if (!m) return null;
    return new Date(parseInt(m[3]), monthMap[m[2]], parseInt(m[1]));
  };
  
  const currentStart = parseDate(dataCache.range.startDate);
  const currentEnd = parseDate(dataCache.range.endDate);
  const newDate = parseDate(newDateStr);
  
  if (!currentStart || !currentEnd || !newDate) return;
  
  // توسيع النطاق إذا كان التاريخ الجديد خارج النطاق الحالي
  if (newDate < currentStart) {
    dataCache.range.startDate = newDateStr;
  }
  if (newDate > currentEnd) {
    dataCache.range.endDate = newDateStr;
  }
}

// ✅ تحويل dd/MMM/yyyy إلى كائن Date
function parseDateFromDDMMMYYYY(dateStr) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthMap = {'Jan':0,'Feb':1,'Mar':2,'Apr':3,'May':4,'Jun':5,'Jul':6,'Aug':7,'Sep':8,'Oct':9,'Nov':10,'Dec':11};
  const m = dateStr.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (!m) return null;
  return new Date(parseInt(m[3]), monthMap[m[2]], parseInt(m[1]));
}
function isDateInRange(dateStr, startStr, endStr) {
  if (!startStr || !endStr) return false;
  
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthMap = {'Jan':0,'Feb':1,'Mar':2,'Apr':3,'May':4,'Jun':5,'Jul':6,'Aug':7,'Sep':8,'Oct':9,'Nov':10,'Dec':11};
  
  const parseDate = (d) => {
    const m = d.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
    if (!m) return null;
    return new Date(parseInt(m[3]), monthMap[m[2]], parseInt(m[1]));
  };
  
  const target = parseDate(dateStr);
  const start = parseDate(startStr);
  const end = parseDate(endStr);
  
  if (!target || !start || !end) return false;
  return target >= start && target <= end;
}

    <div class="section-card"><div class="section-head sh-cnt"><h3>🏧 Physical Cash Count & Verification</h3><span class="sh-badge" id="lastSaveLabel">Not saved yet</span></div><div class="section-body"><div class="counter-grid" id="counterGrid"></div><div class="counter-footer"><textarea class="counter-notes" id="countNotes" rows="2" placeholder="Notes about cash count..."></textarea><div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px"><div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end"><button class="save-count-btn" id="saveCountBtn" onclick="saveCashCount()">💾 Save Count to Sheet</button><button class="save-count-btn" id="clearCountBtn" onclick="resetCounters()" style="background:#7c3aed;">🗑️ مسح الحقول</button></div><div class="save-info" id="saveInfo"></div></div></div></div></div>

function curRow(section){
  const t=systemTotals[section]||{};
  return CURRENCIES.map(c=>{const v=t[c.key]||0;const cls=v>0?'pos':v<0?'neg':'zer';return`<div class="cur-col"><div class="cur-val ${cls}">${v!==0?fmtN(v):'—'}</div></div>`;}).join('');
}

function buildCounters(){
  const grid=document.getElementById('counterGrid');if(!grid)return;
  grid.innerHTML=CASH_CURS.map(cur=>{
    const sysVal=systemTotals.balance[cur.key]||0;
    const denomHtml=cur.denoms.map(d=>d?`<div class="denom-cell"><div class="d-label">${d}</div><input type="number" class="d-input" id="${cur.key}_d${d}" min="0" placeholder="0" oninput="calcCur('${cur.key}');markUnsaved()" onfocus="this.select()"><div class="d-sub" id="${cur.key}_s${d}"></div></div>`:'<div class="denom-cell"></div>').join('');
    return`<div class="counter-row" style="border-left-color:${cur.color}"><div class="crh"><span class="cur-flag-big">${cur.flag}</span><span class="cur-name" style="color:${cur.color}">${cur.name}</span><div class="cr-summary"><div class="sum-box sys"><label>System Balance</label><div class="sv" id="${cur.key}_sys">${sysVal?fmtN(sysVal):'—'}</div></div><div class="sum-box act"><label>Actual Count</label><div class="sv" id="${cur.key}_act">—</div></div><div class="sum-box dif zero" id="${cur.key}_difBox"><label>Difference</label><div class="sv" id="${cur.key}_dif">—</div></div></div></div><div class="denom-grid">${denomHtml}</div></div>`;
  }).join('');
}

function calcCur(curKey){
  const cur=CASH_CURS.find(c=>c.key===curKey);if(!cur)return;
  let total=0;
  cur.denoms.forEach(d=>{
    if(!d)return;
    const inp=document.getElementById(`${cur.key}_d${d}`);
    const qty=parseFloat(inp?.value)||0;
    const sub=qty*d;total+=sub;
    inp?.classList.toggle('has-val',qty>0);
    const sel=document.getElementById(`${cur.key}_s${d}`);
    if(sel)sel.textContent=sub>0?'= '+sub.toLocaleString('en'):'';
  });
  total=roundTwo(total);
  const actEl=document.getElementById(`${curKey}_act`);
  if(actEl)actEl.textContent=total>0?fmtN(total):'—';
  const sysVal=systemTotals.balance?.[curKey]||0;
  const diff=roundTwo(total-sysVal);
  const dEl=document.getElementById(`${curKey}_dif`);
  const dBox=document.getElementById(`${curKey}_difBox`);
  if(!total){if(dEl)dEl.textContent='—';if(dBox)dBox.className='sum-box dif zero';return;}
  if(diff===0){if(dEl)dEl.textContent='✓ Balanced';if(dBox)dBox.className='sum-box dif zero';}
  else if(diff>0){if(dEl)dEl.textContent=`+${fmtN(diff)} Surplus`;if(dBox)dBox.className='sum-box dif surp';}
  else{if(dEl)dEl.textContent=`−${fmtN(Math.abs(diff))} Deficit`;if(dBox)dBox.className='sum-box dif defi';}
}

function resetCounters(){
  // ✅ هذه الدالة تُستخدم فقط لمسح الحقول يدوياً
  CASH_CURS.forEach(function(cur) {
    cur.denoms.forEach(function(d) {
      if (!d) return;
      var inp = document.getElementById(cur.key + '_d' + d);
      if (inp) {
        inp.value = '';
        inp.classList.remove('has-val');
      }
      var sub = document.getElementById(cur.key + '_s' + d);
      if (sub) sub.textContent = '';
    });
    var actEl = document.getElementById(cur.key + '_act');
    if (actEl) actEl.textContent = '—';
    var dEl = document.getElementById(cur.key + '_dif');
    if (dEl) dEl.textContent = '—';
    var dBox = document.getElementById(cur.key + '_difBox');
    if (dBox) dBox.className = 'sum-box dif zero';
  });
  var notes = document.getElementById('countNotes');
  if (notes) notes.value = '';
}

function fillCountFromSaved(savedData){
  if (!savedData) return;
  
  if (savedData.notes){
    var n = document.getElementById('countNotes');
    if (n) n.value = savedData.notes;
  }
  
  if (savedData.denominations){
    CASH_CURS.forEach(function(cur) {
      var denData = savedData.denominations[cur.key] || {};
      cur.denoms.forEach(function(d) {
        if (!d) return;
        var inp = document.getElementById(cur.key + '_d' + d);
        if (inp && denData[d] !== undefined && denData[d] !== 0) {
          inp.value = denData[d];
          inp.classList.add('has-val');
        } else if (inp) {
          inp.value = '';
          inp.classList.remove('has-val');
        }
      });
      calcCur(cur.key);
    });
  }
  
  if (savedData.savedAt){
    var lbl = document.getElementById('lastSaveLabel');
    if (lbl) {
      var t = new Date(savedData.savedAt).toLocaleTimeString('en', {hour:'2-digit', minute:'2-digit'});
      lbl.textContent = '✅ Last saved: ' + t;
    }
  }
}
  
function markUnsaved(){
  hasChanges=true;
  markSavedStatus();
}

function markSavedStatus(){
  const ss=document.getElementById('saveStatus');
  if(hasChanges){
    ss.className='save-status unsaved';
    ss.textContent='⚠️ Unsaved changes';
  }else{
    ss.className='save-status saved';
    ss.textContent='✅ Saved';
  }
  const lbl=document.getElementById('lastSaveLabel');
  if(lbl){
    if(savedCountData && savedCountData.savedAt){
      const t=new Date(savedCountData.savedAt).toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
      lbl.textContent=`✅ Last saved: ${t}`;
    }else{
      lbl.textContent='Not saved yet for this date';
    }
  }
}

function collectCountData(){
  // ✅ استخدام const بدلاً من var للتأكد من النطاق
  const out = {
    dateISO: currentDateISO,
    branchName: selectedBranch || currentUser?.branchName || '',
    notes: document.getElementById('countNotes')?.value || '',
    savedBy: currentUser?.name || '',
    savedAt: new Date().toISOString(),
    denominations: {},
    totals: {},
    systemBalance: {},
    difference: {},
  };
  
  // ✅ استخدام CASH_CURS المحدد عالمياً
  for (var c = 0; c < CASH_CURS.length; c++) {
    var cur = CASH_CURS[c];
    var denData = {};
    var total = 0;
    
    // جمع الفئات
    for (var d = 0; d < cur.denoms.length; d++) {
      var denomValue = cur.denoms[d];
      if (denomValue === null) continue;
      
      var inputId = cur.key + '_d' + denomValue;
      var inputEl = document.getElementById(inputId);
      var qty = parseFloat(inputEl?.value) || 0;
      
      if (qty > 0) {
        denData[denomValue] = qty;
      }
      total += qty * denomValue;
    }
    
    out.denominations[cur.key] = denData;
    out.totals[cur.key] = roundTwo(total);
    out.systemBalance[cur.key] = systemTotals.balance?.[cur.key] || 0;
    out.difference[cur.key] = roundTwo(total - (systemTotals.balance?.[cur.key] || 0));
  }
  
  console.log('📊 collectCountData - denominations:', out.denominations);
  return out;
}
  function hasCountChanges(saved, current){
  if(!saved) return true;
  if(saved.notes !== current.notes) return true;
  for(const cur of CASH_CURS){
    const savedDenoms=saved.denominations[cur.key]||{};
    const currentDenoms=current.denominations[cur.key]||{};
    const allDenoms=[...new Set([...Object.keys(savedDenoms),...Object.keys(currentDenoms)])];
    for(const d of allDenoms){
      if((savedDenoms[d]||0) !== (currentDenoms[d]||0)) return true;
    }
  }
  return false;
}

async function saveCashCount(){
  const btn=document.getElementById('saveCountBtn');if(btn)btn.disabled=true;
  const currentData=collectCountData();
  if(!hasCountChanges(savedCountData,currentData)){
    showToast('⚠️ No changes detected. Nothing to save.','info');
    if(btn)btn.disabled=false;
    return;
  }
  showToast('💾 Saving to Cash_Count sheet...','info',10000);
  try{
    const result = await callGAS('saveCashCount', currentData);
    if(result?.success){
      savedCountData=currentData;
      hasChanges=false;
      markSavedStatus();
      showToast('✅ Cash count saved successfully!','success');
    }else{
      showToast('❌ Save failed: '+(result?.message||''),'error');
    }
  }catch(e){
    showToast('❌ Error: '+e.message,'error');
  }finally{
    if(btn)btn.disabled=false;
  }
}

async function loadSavedCount(){
  try {
    var branchToUse = selectedBranch || currentUser?.branchName || '';
    if (!branchToUse) return;
    
    var res = await callGAS('getCashCount', {
      dateISO: currentDateISO,
      branchName: branchToUse,
    });
    
    if (res?.found && res.data) {
      savedCountData = res.data;
      fillCountFromSaved(savedCountData);
      hasChanges = false;
      markSavedStatus();
      var si = document.getElementById('saveInfo');
      if (si) si.textContent = 'Saved by: ' + (res.data.savedBy || '') + ' at ' + (res.data.savedAt || '');
    } else {
      savedCountData = null;
      // ✅ لا تقم بمسح العدادات هنا - فقط اترك الحقول فارغة
      // resetCounters();  // ❌ تعليق هذا السطر
      hasChanges = false;
      markSavedStatus();
      var si = document.getElementById('saveInfo');
      if (si) si.textContent = '';
    }
  } catch(e) {
    console.error('❌ loadSavedCount error:', e);
    savedCountData = null;
  }
}
