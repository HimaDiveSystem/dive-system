    body {

    .sidebar {
      width: 280px;

    .menu-item {

      overflow-y: auto;

    }

    .top-bar {

    .user-info {

    .user-name {

    .logout-btn {

      padding: 10px 25px;
      border-radius: 40px;

      font-size: 15px;
      transition: all 0.3s;

      align-items: center;
      gap: 8px;
    }

    .logout-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(238, 82, 83, 0.4);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: white;
      border-radius: 25px;
      padding: 25px 15px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0, 40, 80, 0.1);
      transition: transform 0.3s, box-shadow 0.3s;
      border: 1px solid #e6f0fa;
      cursor: pointer;
    }

    .stat-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 35px rgba(0, 40, 80, 0.15);
    }

    .stat-icon {
      font-size: 45px;

    }

    .stat-label {

    }

    .stat-value {

    }

    .content-area {
      background: white;

      padding: 30px;

      border: 1px solid #e6f0fa;
    }

    .content-header {
      display: flex;

    }

    .content-header h2 {

    .btn-primary {

      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;

    .btn-primary:hover {

    }

    .btn-secondary {
      background: #e9f0fa;
      color: #1e2b4f;

      padding: 10px 20px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;

    .form-row {

      .form-row { grid-template-columns: 1fr; }

    }
  </style>
</head>

  <!-- المودالات (تم حذفها للاختصار) -->

  <div id="customConfirmModal" class="modal" style="display: none;">
    <div style="background: white; width: 400px; border-radius: 30px; padding: 30px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3);">
      <div style="font-size: 50px; margin-bottom: 20px;">❓</div>
      <h3 style="color: #1e2b4f; margin-bottom: 20px;" id="confirmMessage">&#1607;&#1604; &#1571;&#1606;&#1578; &#1605;&#1578;&#1571;&#1603;&#1583; &#1605;&#1606; &#1578;&#1587;&#1580;&#1610;&#1604; &#1575;&#1604;&#1582;&#1585;&#1608;&#1580;&#1567;</h3>
      <div style="display: flex; gap: 15px; justify-content: center;">
        <button id="confirmOk" class="btn-primary" style="background: #e74c3c;">&#1606;&#1593;&#1605;</button>
        <button id="confirmCancel" class="btn-secondary">&#1573;&#1604;&#1594;&#1575;&#1569;</button>
      </div>

  <div id="customAlertModal" class="modal" style="display: none;">
    <div style="background: white; width: 400px; border-radius: 30px; padding: 30px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3);">
      <div style="font-size: 50px; margin-bottom: 20px;">ℹ️</div>
      <h3 style="color: #1e2b4f; margin-bottom: 20px;" id="alertMessage"></h3>
      <button id="alertOk" class="btn-primary">&#1605;&#1608;&#1575;&#1601;&#1602;</button>
    </div>
  </div>

  <script>
    (function() {
      "use strict";
      
      console.log("🚀 Dashboard بدأ التحميل");

      // ==================== المتغيرات العامة ====================
      let centers = [];
      let branches = [];
      let staff = [];
      let currentUser = null;
      
      // رابط Code.gs
      const scriptUrl = 'https://script.google.com/macros/s/AKfycbxLzFOU8R0-Mnsw3FrWZ5JjehU6VoepqlLkDo39dP2gAxF8PqOi7XpxMXrZQVBaQo27/exec';

      // ==================== دوال مساعدة ====================
      function showConfirm(message, onConfirm) {
        const modal = document.getElementById('customConfirmModal');
        document.getElementById('confirmMessage').innerText = message;
        modal.style.display = 'flex';
        
        const okBtn = document.getElementById('confirmOk');
        const cancelBtn = document.getElementById('confirmCancel');
        
        const okHandler = function() {
          modal.style.display = 'none';
          onConfirm();
          okBtn.removeEventListener('click', okHandler);
          cancelBtn.removeEventListener('click', cancelHandler);
        };
        
        const cancelHandler = function() {
          modal.style.display = 'none';
          okBtn.removeEventListener('click', okHandler);
          cancelBtn.removeEventListener('click', cancelHandler);
        };
        
        okBtn.addEventListener('click', okHandler);
        cancelBtn.addEventListener('click', cancelHandler);
      }

      function showAlert(message) {
        const modal = document.getElementById('customAlertModal');
        document.getElementById('alertMessage').innerText = message;
        modal.style.display = 'flex';
        
        const okBtn = document.getElementById('alertOk');
        const okHandler = function() {
          modal.style.display = 'none';
          okBtn.removeEventListener('click', okHandler);
        };
        
        okBtn.addEventListener('click', okHandler);
      }

      function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
      }

      function parseDate(dateValue) {
        if (!dateValue) return null;
        if (typeof dateValue === 'string') {
          if (dateValue.includes('/')) {
            const parts = dateValue.split('/');
            if (parts.length === 3) {
              return new Date(parts[2], parts[1] - 1, parts[0]);
            }
          } else if (dateValue.includes('-')) {
            return new Date(dateValue);
          }
        }
        return new Date(dateValue);
      }

      function getDaysLeft(endDateStr) {
        if (!endDateStr) return { days: null, status: 'unknown', text: '&#1594;&#1610;&#1585; &#1605;&#1581;&#1583;&#1583;' };
        
        const endDate = parseDate(endDateStr);
        if (!endDate || isNaN(endDate.getTime())) {
          return { days: null, status: 'unknown', text: '&#1578;&#1575;&#1585;&#1610;&#1582; &#1594;&#1610;&#1585; &#1589;&#1575;&#1604;&#1581;' };
        }
        
        endDate.setHours(0, 0, 0, 0);
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const diffDays = Math.ceil((endDate - today) / (1000 * 60 * 60 * 24));
        
        let status, text;
        if (diffDays < 0) { status = 'expired'; text = '&#1605;&#1606;&#1578;&#1607;&#1610;'; }
        else if (diffDays <= 3) { status = 'critical'; text = `&#1610;&#1606;&#1578;&#1607;&#1610; &#1582;&#1604;&#1575;&#1604; ${diffDays} &#1571;&#1610;&#1575;&#1605;`; }
        else if (diffDays <= 7) { status = 'warning'; text = `&#1610;&#1606;&#1578;&#1607;&#1610; &#1582;&#1604;&#1575;&#1604; ${diffDays} &#1571;&#1610;&#1575;&#1605;`; }
        else { status = 'active'; text = `${diffDays} &#1610;&#1608;&#1605; &#1605;&#1578;&#1576;&#1602;&#1610;`; }
        
        return { days: diffDays, status, text };
      }

      // ==================== تحميل الإحصائيات ====================
      function loadStatsFromServer() {
        fetch(scriptUrl + '?action=getCentersCount')
          .then(response => response.json())
          .then(count => {
            document.getElementById('activeCentersCount').textContent = count || 0;
          })
          .catch(error => console.error('خطأ في تحميل إحصائيات المراكز:', error));
        
        fetch(scriptUrl + '?action=getBranchesCount')
          .then(response => response.json())
          .then(count => {
            document.getElementById('activeBranchesCount').textContent = count || 0;
          })
          .catch(error => console.error('خطأ في تحميل إحصائيات الفروع:', error));
        
        fetch(scriptUrl + '?action=getUsersCount')
          .then(response => response.json())
          .then(count => {
            document.getElementById('staffCount').textContent = count || 0;
          })
          .catch(error => console.error('خطأ في تحميل إحصائيات المستخدمين:', error));
        
        fetch(scriptUrl + '?action=getCriticalCount')
          .then(response => response.json())
          .then(count => {
            document.getElementById('criticalCount').textContent = count || 0;
          })
          .catch(error => console.error('خطأ في تحميل إحصائيات الحرجة:', error));
        
        fetch(scriptUrl + '?action=getWarningCount')
          .then(response => response.json())
          .then(count => {
            document.getElementById('warningCount').textContent = count || 0;
          })
          .catch(error => console.error('خطأ في تحميل إحصائيات التحذير:', error));

          showAlert('&#1582;&#1591;&#1571; &#1601;&#1610; &#1575;&#1604;&#1575;&#1578;&#1589;&#1575;&#1604;: ' + error.message);
        });
      }

      function deleteBranch(branchId) {
        showConfirm('&#1607;&#1604; &#1571;&#1606;&#1578; &#1605;&#1578;&#1571;&#1603;&#1583; &#1605;&#1606; &#1581;&#1584;&#1601; &#1607;&#1584;&#1575; &#1575;&#1604;&#1601;&#1585;&#1593;&#1567;', function() {
          fetch(scriptUrl + '?action=deleteBranch&branchId=' + encodeURIComponent(branchId))
            .then(response => response.json())
            .then(response => {
              if (response.success) {
                loadBranches();
                loadStatsFromServer();
                showAlert(response.message);
              } else {
                showAlert('&#1582;&#1591;&#1571;: ' + response.message);
              }
            })
            .catch(error => {
              showAlert('&#1582;&#1591;&#1571; &#1601;&#1610; &#1575;&#1604;&#1575;&#1578;&#1589;&#1575;&#1604;: ' + error.message);
            });
        });
      }

      function toggleBranchStatus(branchId) {
        showConfirm('&#1607;&#1604; &#1571;&#1606;&#1578; &#1605;&#1578;&#1571;&#1603;&#1583; &#1605;&#1606; &#1578;&#1594;&#1610;&#1610;&#1585; &#1581;&#1575;&#1604;&#1577; &#1607;&#1584;&#1575; &#1575;&#1604;&#1601;&#1585;&#1593;&#1567;', function() {
          fetch(scriptUrl + '?action=toggleBranchStatus&branchId=' + encodeURIComponent(branchId))
            .then(response => response.json())
            .then(response => {
              if (response.success) {
                loadBranches();
                loadStatsFromServer();
              } else {
                showAlert('&#1582;&#1591;&#1571;: ' + response.message);
              }
            })
            .catch(error => {
              showAlert('&#1582;&#1591;&#1571; &#1601;&#1610; &#1575;&#1604;&#1575;&#1578;&#1589;&#1575;&#1604;: ' + error.message);
            });
        });
      }

      // ==================== دوال الموظفين ====================
      function loadStaff() {
        document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
        document.querySelector('.menu-item[data-action="loadStaff"]').classList.add('active');
        
        fetch(scriptUrl + '?action=getAllUsersData')
          .then(response => response.json())
          .then(data => {
            displayStaff(data);
          })
          .catch(error => {
            console.error(error);
            showAlert('&#1601;&#1588;&#1604; &#1578;&#1581;&#1605;&#1610;&#1604; &#1575;&#1604;&#1605;&#1608;&#1592;&#1601;&#1610;&#1606;');
          });
      }

      function displayStaff(staffData) {
        staff = staffData;
        
        let html = `
          <div class="content-area">
            <div class="content-header">
              <h2>👥 &#1573;&#1583;&#1575;&#1585;&#1577; &#1575;&#1604;&#1605;&#1608;&#1592;&#1601;&#1610;&#1606;</h2>
              <button class="btn-primary" id="addUserBtn">
                <span>➕</span> &#1573;&#1590;&#1575;&#1601;&#1577; &#1605;&#1608;&#1592;&#1601; &#1580;&#1583;&#1610;&#1583;
              </button>
            </div>
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>&#1575;&#1604;&#1575;&#1587;&#1605;</th>
                    <th>&#1575;&#1604;&#1605;&#1585;&#1603;&#1586;</th>
                    <th>&#1575;&#1604;&#1601;&#1585;&#1593;</th>
                    <th>&#1575;&#1604;&#1583;&#1608;&#1585;</th>
                    <th>&#1575;&#1604;&#1580;&#1608;&#1575;&#1604;</th>
                    <th>&#1575;&#1604;&#1581;&#1575;&#1604;&#1577;</th>
                    <th>&#1575;&#1604;&#1573;&#1580;&#1585;&#1575;&#1569;&#1575;&#1578;</th>
                  </tr>
                </thead>
                <tbody>
        `;

        staffData.forEach(user => {
          const statusClass = user.isActive ? 'status-active' : 'status-inactive';
          const statusText = user.isActive ? '&#1606;&#1588;&#1591;' : '&#1594;&#1610;&#1585; &#1606;&#1588;&#1591;';
          
          html += `
            <tr data-user-id="${user.id}">
              <td><strong>${user.name || ''}</strong></td>
              <td>${user.centerName || ''}</td>
              <td>${user.branchName || '&#1575;&#1604;&#1605;&#1585;&#1603;&#1586; &#1575;&#1604;&#1585;&#1574;&#1610;&#1587;&#1610;'}</td>
              <td>${user.type || '&#1605;&#1608;&#1592;&#1601;'}</td>
              <td>${user.phone || '-'}</td>
              <td>
                <span class="status-badge ${statusClass}">
                  ${statusText}
                </span>
              </td>
              <td>
                <div class="action-buttons">
                  <button class="action-btn view" data-action="viewUser" data-id="${user.id}">&#1593;&#1585;&#1590;</button>
                  <button class="action-btn edit" data-action="editUser" data-id="${user.id}">&#1578;&#1593;&#1583;&#1610;&#1604;</button>
                  <button class="action-btn delete" data-action="deleteUser" data-id="${user.id}">&#1581;&#1584;&#1601;</button>
                </div>
              </td>
            </tr>
          `;
        });

        html += `
                </tbody>
              </table>
            </div>
          </div>
        `;

        document.getElementById('contentArea').innerHTML = html;
        
        document.getElementById('addUserBtn').addEventListener('click', openAddUserModal);
        
        document.querySelectorAll('[data-action="viewUser"]').forEach(btn => {
          btn.addEventListener('click', (e) => viewUser(e.target.dataset.id));
        });
        
        document.querySelectorAll('[data-action="editUser"]').forEach(btn => {
          btn.addEventListener('click', (e) => openEditUserModal(e.target.dataset.id));
        });
        
        document.querySelectorAll('[data-action="deleteUser"]').forEach(btn => {
          btn.addEventListener('click', (e) => deleteUser(e.target.dataset.id));
        });
      }

      function openAddUserModal() {
        document.getElementById('userModalTitle').textContent = '➕ &#1573;&#1590;&#1575;&#1601;&#1577; &#1605;&#1608;&#1592;&#1601; &#1580;&#1583;&#1610;&#1583;';
        document.getElementById('userForm').reset();
        document.getElementById('userId').value = '';
        document.getElementById('userHistoryMessage').style.display = 'none';
        document.getElementById('leavingReasonGroup').style.display = 'none';
        
        const centerSelect = document.getElementById('userCenterId');
        centerSelect.innerHTML = '<option value="">&#1575;&#1582;&#1578;&#1585; &#1575;&#1604;&#1605;&#1585;&#1603;&#1586;...</option>';
        centers.forEach(center => {
          centerSelect.innerHTML += `<option value="${center.id}">${center.name}</option>`;
        });
        
        document.getElementById('userBranchId').innerHTML = '<option value="">&#1575;&#1604;&#1605;&#1585;&#1603;&#1586; &#1575;&#1604;&#1585;&#1574;&#1610;&#1587;&#1610;</option>';
        document.getElementById('userModal').style.display = 'flex';
      }

      function openEditUserModal(userId) {
        const user = staff.find(u => u.id === userId);
        if (!user) return;

        document.getElementById('userModalTitle').textContent = '✏️ &#1578;&#1593;&#1583;&#1610;&#1604; &#1575;&#1604;&#1605;&#1608;&#1592;&#1601;';
        document.getElementById('userId').value = user.id;
        
        const centerSelect = document.getElementById('userCenterId');
        centerSelect.innerHTML = '<option value="">&#1575;&#1582;&#1578;&#1585; &#1575;&#1604;&#1605;&#1585;&#1603;&#1586;...</option>';
        centers.forEach(center => {
          centerSelect.innerHTML += `<option value="${center.id}" ${center.id === user.centerId ? 'selected' : ''}>${center.name}</option>`;
        });
        
        loadBranchesForCenter(user.centerId, user.branchId);
        
        document.getElementById('userPhone').value = user.phone || '';
        document.getElementById('userFullName').value = user.name || '';
        document.getElementById('userEmail').value = user.email || '';
        document.getElementById('userRole').value = user.type || 'employee';
        document.getElementById('userStatus').value = user.isActive ? 'active' : 'inactive';
        
        document.getElementById('userModal').style.display = 'flex';
      }

      function viewUser(userId) {
        const user = staff.find(u => u.id === userId);
        if (!user) return;

        const detailsDiv = document.getElementById('userDetails');
        detailsDiv.innerHTML = `
          <p><strong>&#1575;&#1604;&#1575;&#1587;&#1605;:</strong> ${user.name || ''}</p>
          <p><strong>&#1575;&#1604;&#1605;&#1585;&#1603;&#1586;:</strong> ${user.centerName || ''}</p>
          <p><strong>&#1575;&#1604;&#1601;&#1585;&#1593;:</strong> ${user.branchName || '&#1575;&#1604;&#1605;&#1585;&#1603;&#1586; &#1575;&#1604;&#1585;&#1574;&#1610;&#1587;&#1610;'}</p>
          <p><strong>&#1575;&#1604;&#1583;&#1608;&#1585;:</strong> ${user.type || '&#1605;&#1608;&#1592;&#1601;'}</p>
          <p><strong>&#1575;&#1604;&#1580;&#1608;&#1575;&#1604;:</strong> ${user.phone || ''}</p>
          <p><strong>&#1575;&#1604;&#1576;&#1585;&#1610;&#1583;:</strong> ${user.email || ''}</p>
          <p><strong>&#1575;&#1604;&#1581;&#1575;&#1604;&#1577;:</strong> ${user.isActive ? '&#1606;&#1588;&#1591;' : '&#1594;&#1610;&#1585; &#1606;&#1588;&#1591;'}</p>
        `;
        document.getElementById('viewUserModal').style.display = 'flex';
      }

      function loadBranchesForCenter(centerId, selectedBranchId = '') {
        if (!centerId) return;
        
        fetch(scriptUrl + '?action=getBranchesByCenter&centerId=' + encodeURIComponent(centerId))
          .then(response => response.json())
          .then(branchesData => {
            const select = document.getElementById('userBranchId');
            select.innerHTML = '<option value="">&#1575;&#1604;&#1605;&#1585;&#1603;&#1586; &#1575;&#1604;&#1585;&#1574;&#1610;&#1587;&#1610;</option>';
            branchesData.forEach(branch => {
              select.innerHTML += `<option value="${branch.id}" ${branch.id === selectedBranchId ? 'selected' : ''}>${branch.name}</option>`;
            });
          })
          .catch(error => {
            console.error('&#1582;&#1591;&#1571; &#1601;&#1610; &#1578;&#1581;&#1605;&#1610;&#1604; &#1575;&#1604;&#1601;&#1585;&#1608;&#1593;:', error);
          });
      }

      function saveUser(event) {
        event.preventDefault();
        
        const userData = {
          id: document.getElementById('userId').value || '',
          centerId: document.getElementById('userCenterId').value,
          branchId: document.getElementById('userBranchId').value || '',
          phone: document.getElementById('userPhone').value,
          name: document.getElementById('userFullName').value,
          email: document.getElementById('userEmail').value,
          type: document.getElementById('userRole').value,
          isActive: document.getElementById('userStatus').value === 'active'
        };

        if (!userData.centerId) {
          showAlert('&#1575;&#1604;&#1585;&#1580;&#1575;&#1569; &#1575;&#1582;&#1578;&#1610;&#1575;&#1585; &#1575;&#1604;&#1605;&#1585;&#1603;&#1586;');
          return;
        }

        if (!userData.phone.startsWith('0')) {
          showAlert('&#1585;&#1602;&#1605; &#1575;&#1604;&#1607;&#1575;&#1578;&#1601; &#1610;&#1580;&#1576; &#1571;&#1606; &#1610;&#1576;&#1583;&#1571; &#1576; 0');
          return;
        }

        const saveBtn = event.target;
        const originalText = saveBtn.textContent;
        saveBtn.textContent = '⏳ &#1580;&#1575;&#1585;&#1610; &#1575;&#1604;&#1581;&#1601;&#1592;...';
        saveBtn.disabled = true;

        const action = userData.id ? 'updateUser' : 'addNewUser';

        fetch(scriptUrl + '?action=' + action, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(userData)
        })
        .then(response => response.json())
        .then(response => {
          saveBtn.textContent = originalText;
          saveBtn.disabled = false;
          
          if (response.success) {
            closeModal('userModal');
            loadStaff();
            loadStatsFromServer();
            showAlert(response.message);
          } else {
            showAlert('&#1582;&#1591;&#1571;: ' + response.message);
          }
        })
        .catch(error => {
          saveBtn.textContent = originalText;
          saveBtn.disabled = false;
          showAlert('&#1582;&#1591;&#1571; &#1601;&#1610; &#1575;&#1604;&#1575;&#1578;&#1589;&#1575;&#1604;: ' + error.message);
        });
      }

      function deleteUser(userId) {
        showConfirm('&#1607;&#1604; &#1571;&#1606;&#1578; &#1605;&#1578;&#1571;&#1603;&#1583; &#1605;&#1606; &#1581;&#1584;&#1601; &#1607;&#1584;&#1575; &#1575;&#1604;&#1605;&#1608;&#1592;&#1601;&#1567;', function() {
          fetch(scriptUrl + '?action=deleteUser&userId=' + encodeURIComponent(userId))
            .then(response => response.json())
            .then(response => {
              if (response.success) {
                loadStaff();
                loadStatsFromServer();
                showAlert(response.message);
              } else {
                showAlert('&#1582;&#1591;&#1571;: ' + response.message);
              }
            })
            .catch(error => {
              showAlert('&#1582;&#1591;&#1571; &#1601;&#1610; &#1575;&#1604;&#1575;&#1578;&#1589;&#1575;&#1604;: ' + error.message);
            });
        });
      }

      function searchUserByPhone(phone) {
        if (phone.length < 10) return;
        
        fetch(scriptUrl + '?action=findUserByPhone&phone=' + encodeURIComponent(phone))
          .then(response => response.json())
          .then(user => {
            if (user) {
              document.getElementById('userHistoryMessage').style.display = 'flex';
              document.getElementById('historyMessageText').textContent = `✅ &#1578;&#1605; &#1575;&#1604;&#1593;&#1579;&#1608;&#1585; &#1593;&#1604;&#1609; &#1605;&#1587;&#1578;&#1582;&#1583;&#1605; &#1587;&#1575;&#1576;&#1602;: ${user.name}`;
              document.getElementById('userFullName').value = user.name || '';
              document.getElementById('userEmail').value = user.email || '';
              document.getElementById('userPhone').value = user.phone || '';
            }
          })
          .catch(error => {
            console.error('&#1582;&#1591;&#1571; &#1601;&#1610; &#1575;&#1604;&#1576;&#1581;&#1579;:', error);
          });
      }

      function validatePhoneNumber(input) {
        let value = input.value.replace(/[^0-9]/g, '');
        if (value && !value.startsWith('0')) {
          input.value = '0' + value;
        } else {
          input.value = value;
        }
      }

      function toggleLeavingReason(status) {
        const reasonGroup = document.getElementById('leavingReasonGroup');
        reasonGroup.style.display = status === 'left' ? 'block' : 'none';
      }

      // ==================== دوال تقارير الاشتراكات ====================
      function showCriticalExpiring() {
        const criticalCenters = centers.filter(c => {
          if (!c.subscriptionEnd || c.status !== 'Active') return false;
          const daysInfo = getDaysLeft(c.subscriptionEnd);
          return daysInfo.days <= 3 && daysInfo.days >= 0;
        });
        displaySubscriptionReport(criticalCenters, '&#1575;&#1604;&#1605;&#1585;&#1575;&#1603;&#1586; &#1575;&#1604;&#1581;&#1585;&#1580;&#1577; (3 &#1571;&#1610;&#1575;&#1605; &#1571;&#1608; &#1571;&#1602;&#1604;)');
      }

      function showWarningExpiring() {
        const warningCenters = centers.filter(c => {
          if (!c.subscriptionEnd || c.status !== 'Active') return false;
          const daysInfo = getDaysLeft(c.subscriptionEnd);
          return daysInfo.days > 3 && daysInfo.days <= 7;
        });
        displaySubscriptionReport(warningCenters, '&#1575;&#1604;&#1605;&#1585;&#1575;&#1603;&#1586; &#1575;&#1604;&#1578;&#1581;&#1584;&#1610;&#1585;&#1610;&#1577; (4-7 &#1571;&#1610;&#1575;&#1605;)');
      }

      function showExpiringReport() {
        const expiringCenters = centers.filter(c => {
          if (!c.subscriptionEnd || c.status !== 'Active') return false;
          const daysInfo = getDaysLeft(c.subscriptionEnd);
          return daysInfo.days <= 7;
        });
        displaySubscriptionReport(expiringCenters, '&#1578;&#1602;&#1585;&#1610;&#1585; &#1575;&#1604;&#1575;&#1588;&#1578;&#1585;&#1575;&#1603;&#1575;&#1578; &#1575;&#1604;&#1605;&#1606;&#1578;&#1607;&#1610;&#1577; &#1608;&#1575;&#1604;&#1602;&#1585;&#1610;&#1576;&#1577;');
      }

      function displaySubscriptionReport(centersList, title) {
        document.getElementById('subscriptionModalTitle').textContent = title;
        
        let html = '<table><tr><th>&#1575;&#1604;&#1605;&#1585;&#1603;&#1586;</th><th>&#1578;&#1575;&#1585;&#1610;&#1582; &#1575;&#1604;&#1575;&#1606;&#1578;&#1607;&#1575;&#1569;</th><th>&#1575;&#1604;&#1571;&#1610;&#1575;&#1605; &#1575;&#1604;&#1605;&#1578;&#1576;&#1602;&#1610;&#1577;</th></tr>';
        centersList.forEach(c => {
          const daysInfo = getDaysLeft(c.subscriptionEnd);
          html += `<tr>
            <td>${c.name}</td>
            <td>${c.subscriptionEnd}</td>
            <td>${daysInfo.text}</td>
          </tr>`;
        });
        html += '</table>';
        document.getElementById('subscriptionList').innerHTML = html;
        document.getElementById('subscriptionModal').style.display = 'flex';
      }

      function logout() {
        showConfirm('&#1607;&#1604; &#1571;&#1606;&#1578; &#1605;&#1578;&#1571;&#1603;&#1583; &#1605;&#1606; &#1578;&#1587;&#1580;&#1610;&#1604; &#1575;&#1604;&#1582;&#1585;&#1608;&#1580;&#1567;', function() {
          sessionStorage.removeItem('tempUserId');
          sessionStorage.removeItem('currentUser');
          sessionStorage.removeItem('userPermissions');
          window.top.location.href = 'Login.html';
        });
      }

      function loadActivitiesCheckboxes(selectedActivities = []) {
        fetch(scriptUrl + '?action=getAllActivities')
          .then(response => response.json())
          .then(activities => {
            const container = document.getElementById('activitiesCheckboxes');
            if (!container) return;
            
            let html = '';
            activities.forEach(act => {
              if (!act.status) return;
              
              let selectedArray = selectedActivities;
              if (typeof selectedActivities === 'string') {
                selectedArray = selectedActivities.split(',').map(s => s.trim());
              }
              
              const checked = selectedArray.includes(act.name) ? 'checked' : '';
              html += `
                <label style="display: flex; align-items: center; gap: 5px; background: white; padding: 8px 15px; border-radius: 30px; border: 1px solid #1e2b4f; cursor: pointer;">
                  <input type="checkbox" value="${act.name}" ${checked} style="width: 18px; height: 18px; cursor: pointer;">
                  <span style="color: #1e2b4f; font-weight: 500;">${act.name}</span>
                </label>
              `;
            });
            container.innerHTML = html;
          })
          .catch(error => {
            console.error('&#1582;&#1591;&#1571; &#1601;&#1610; &#1578;&#1581;&#1605;&#1610;&#1604; &#1575;&#1604;&#1571;&#1606;&#1588;&#1591;&#1577;:', error);
          });
      }

      function openPage(pageName) {
        const baseUrl = window.location.origin + window.location.pathname;
        window.top.location.href = baseUrl.replace('Dashboard.html', pageName + '.html');
      }

      // ==================== ربط الأحداث ====================
      document.addEventListener('DOMContentLoaded', function() {
        console.log("📌 DOMContentLoaded تم التفعيل");
        
        // ربط القائمة الجانبية
        document.querySelectorAll('.menu-item[data-section]').forEach(item => {
          item.addEventListener('click', () => showSection(item.dataset.section));
        });
        
        document.querySelectorAll('.menu-item[data-action]').forEach(item => {
          const action = item.dataset.action;
          if (action === 'loadCenters') item.addEventListener('click', loadCenters);
          else if (action === 'loadBranches') item.addEventListener('click', loadBranches);
          else if (action === 'loadStaff') item.addEventListener('click', loadStaff);
          else if (action === 'showExpiringReport') item.addEventListener('click', showExpiringReport);
        });
        
        document.querySelectorAll('.menu-item[data-page]').forEach(item => {
          item.addEventListener('click', () => openPage(item.dataset.page));
        });
        
        // ربط بطاقات الإحصائيات
        document.querySelectorAll('.stat-card[data-action]').forEach(card => {
          const action = card.dataset.action;
          if (action === 'loadCenters') card.addEventListener('click', loadCenters);
          else if (action === 'loadBranches') card.addEventListener('click', loadBranches);
          else if (action === 'loadStaff') card.addEventListener('click', loadStaff);
          else if (action === 'showCriticalExpiring') card.addEventListener('click', showCriticalExpiring);
          else if (action === 'showWarningExpiring') card.addEventListener('click', showWarningExpiring);
        });
        
        // ربط زر الخروج
        document.getElementById('logoutBtn').addEventListener('click', logout);
        
        // تحميل البيانات الأولية
        loadStatsFromServer();
        loadAllData();
        showSection('welcome');
      });

    })();
  </script>
</body>
</html>
