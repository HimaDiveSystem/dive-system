<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>My Bookings - Diving Centers Management</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
    .header { background: linear-gradient(135deg, #1e2b4f 0%, #152238 100%); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
    .header h2 { color: #ffd966; font-size: 24px; display: flex; align-items: center; gap: 10px; }
    .user-info { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .user-name { background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 40px; border: 1px solid #ffd966; }
    .back-btn { background: #ff6b6b; color: white; border: none; padding: 8px 25px; border-radius: 40px; cursor: pointer; font-weight: 600; transition: 0.3s; }
    .back-btn:hover { background: #ee5253; transform: translateY(-2px); }
    .status-header { display: flex; gap: 15px; padding: 15px 30px; background: #f8f9fa; border-bottom: 2px solid #dee2e6; }
    .status-btn { padding: 10px 25px; border: none; border-radius: 30px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 14px; }
    .status-btn.pending { background: #fff3e0; color: #f57c00; }
    .status-btn.pending.active { background: #f57c00; color: white; }
    .status-btn.cancel { background: #ffebee; color: #d32f2f; }
    .status-btn.cancel.active { background: #d32f2f; color: white; }
    .status-btn.confirmed { background: #e8f5e8; color: #2e7d32; }
    .status-btn.confirmed.active { background: #2e7d32; color: white; }
    .filter-section { background: #f8f9fa; padding: 20px 30px; border-bottom: 2px solid #dee2e6; }
    .filter-row { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
    .filter-group { flex: 1; min-width: 160px; }
    .filter-group label { display: block; font-size: 12px; color: #1e2b4f; font-weight: 600; margin-bottom: 5px; }
    .filter-group input, .filter-group select { width: 100%; padding: 10px; border: 2px solid #e9f0fa; border-radius: 15px; font-size: 14px; }
    .filter-group input:focus, .filter-group select:focus { outline: none; border-color: #1e2b4f; }
    .filter-actions { display: flex; gap: 10px; align-items: center; }
    .btn-primary { background: #1e2b4f; color: white; border: none; padding: 10px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    .btn-primary:hover { background: #ffd966; color: #1e2b4f; }
    .btn-reset { background: #6c757d; color: white; border: none; padding: 10px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    .btn-reset:hover { background: #5a6268; }
    .table-container { padding: 20px 30px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #1e2b4f; color: #ffd966; padding: 10px 5px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    th:hover { background: #2a3a60; }
    th .sort-icon { margin-left: 4px; font-size: 11px; }
    td { padding: 7px 5px; border-bottom: 1px solid #e9f0fa; color: #2c3e50; white-space: nowrap; }
    tr:hover { background: #f5f9ff; }
    .activities-cell { max-width: 200px; white-space: normal; word-break: break-word; }
    .pax-cell { max-width: 80px; white-space: normal; }
    .totals-row td { background: #eaf2ff; font-weight: 700; color: #1e2b4f; border-top: 2px solid #1e2b4f; }
    .totals-label { font-size: 12px; color: #666; }
    .st-pending   { display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:700; background:#fff3cd; color:#856404; }
    .st-confirmed { display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:700; background:#d1e7dd; color:#0f5132; }
    .st-cancel    { display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:700; background:#f8d7da; color:#842029; }
    .summary-section { padding: 0 30px 30px; }
    .summary-title { font-size: 16px; font-weight: 700; color: #1e2b4f; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .summary-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .summary-table th { background: #2a3a60; color: #ffd966; padding: 9px 12px; text-align: left; }
    .summary-table td { padding: 8px 12px; border-bottom: 1px solid #e9f0fa; }
    .badge { display: inline-block; background: #1e2b4f; color: #ffd966; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 700; }
    .action-buttons { display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }
    .action-btn { padding: 4px 8px; border: none; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; color: white; text-decoration: none; display: inline-flex; align-items: center; gap: 2px; }
    .print-btn  { background: #e67e22; } .print-btn:hover  { background: #d35400; }
    .print-na   { background: #bdc3c7; cursor: default; }
    .pagination { display: flex; justify-content: center; gap: 10px; padding: 10px 30px 20px; flex-wrap: wrap; }
    .page-btn { padding: 6px 12px; border: 1px solid #dee2e6; background: white; border-radius: 20px; cursor: pointer; font-size: 13px; }
    .page-btn.active { background: #1e2b4f; color: #ffd966; border-color: #1e2b4f; }
    .no-data { text-align: center; padding: 50px; color: #6c757d; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1e2b4f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
    .count-badge { background: #1e2b4f; color: #ffd966; border-radius: 20px; padding: 2px 8px; font-size: 12px; margin-left: 8px; }
    .status-title { font-size: 18px; font-weight: 700; color: #1e2b4f; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
    @media (max-width: 768px) { .filter-row { flex-direction: column; } .filter-actions { width: 100%; } .table-container { padding: 10px; } }
    .print-btn-large {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #e67e22;
  color: white;
  padding: 8px 12px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: 600;
  transition: 0.3s;
  min-width: 70px;
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 8px rgba(230, 126, 34, 0.3);
}

.print-btn-large:hover {
  background: #d35400;
  transform: translateY(-3px);
  box-shadow: 0 6px 12px rgba(230, 126, 34, 0.4);
}

.print-btn-large.disabled {
  background: #bdc3c7;
  box-shadow: none;
  cursor: default;
  opacity: 0.7;
}

.print-btn-large.disabled:hover {
  transform: none;
  background: #bdc3c7;
}

.action-buttons {
  display: flex;
  gap: 8px;
  justify-content: center;
  align-items: center;
}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>📋 My Bookings</h2>
    <div class="user-info">
      <span class="user-name" id="userNameDisplay"></span>
      <button class="back-btn" onclick="goBack()">🔙 الرجوع</button>
    </div>
  </div>

  <div class="status-header">
    <button class="status-btn pending" onclick="loadBookings('pending')" id="pendingBtn">⏳ Pending</button>
    <button class="status-btn confirmed" onclick="loadBookings('confirmed')" id="confirmedBtn">✅ Done</button>
    <button class="status-btn cancel" onclick="loadBookings('cancel')" id="cancelBtn">❌ Canceled</button>
  </div>

  <div class="filter-section">
    <div class="filter-row">
      <!-- From Date -->
      <div class="filter-group">
        <label>From Date</label>
        <input type="date" id="filterDateFrom" onchange="applyFilters()">
      </div>

      <!-- To Date -->
      <div class="filter-group">
        <label>To Date</label>
        <input type="date" id="filterDateTo" onchange="applyFilters()">
      </div>

      <!-- Search -->
      <div class="filter-group">
        <label>Search</label>
        <input type="text" id="filterText" placeholder="Voucher, Guest, Trip..." onkeyup="applyFilters()">
      </div>

      <div class="filter-actions">
        <button class="btn-primary" onclick="applyFilters()">Apply</button>
        <button class="btn-reset" onclick="resetFilters()">Reset</button>
      </div>
    </div>
  </div>

  <div class="status-title" id="statusTitle">
    <span id="currentStatusLabel">Pending Bookings</span>
    <span class="count-badge" id="totalCount">0</span>
  </div>

  <div class="table-container" id="tableContainer">
    <div class="loader"></div>
  </div>
  
  <div class="pagination" id="pagination"></div>

  <div class="summary-section" id="summarySection" style="display:none;">
    <div class="summary-title">📊 Trips Summary</div>
    <div style="overflow-x:auto;">
      <table class="summary-table" id="summaryTable"></table>
    </div>
  </div>
</div>

<div id="customAlertModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:9999;">
  <div style="background:white;width:400px;border-radius:30px;padding:30px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.3);">
    <div style="font-size:50px;margin-bottom:20px;">ℹ️</div>
    <h3 style="color:#1e2b4f;margin-bottom:20px;" id="alertMessage"></h3>
    <button class="btn-primary" id="alertOk">OK</button>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwX_BUpZUxhOKB-BtjykeE2lSTjlfXORGWhwoh6aJo_JYwCL6vnZjxc5r4mj7qPIcyt/exec';
const MONTHS  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let currentUser = null;
let allInvoices = [];
let filteredInvoices = [];
let currentStatus = 'pending'; // pending, confirmed, cancel
let currentPage = 1;
const pageSize = 20;
let sortColumn = 'activeDate';
let sortDirection = 'asc';

const DASHBOARD_PAGES = {
  Admin: 'Dashboard.html',
  Owner: 'OwnerDashboard.html',
  Sales: 'SalesDashboard.html',
  Accountant: 'AccountantDashboard.html'
};

// دوال التاريخ
function isoToDDMMM(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${d.padStart(2,'0')}/${MONTHS[Number(m)-1]}/${y}`;
}

function dddmmmToISO(text) {
  if (!text) return '';
  const m = text.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (!m) return '';
  const day = m[1].padStart(2,'0');
  const monthIndex = MONTHS.findIndex(x => x.toLowerCase() === m[2].toLowerCase());
  if (monthIndex === -1) return '';
  const month = String(monthIndex + 1).padStart(2,'0');
  return `${m[3]}-${month}-${day}`;
}

function parseDDMMMYYYY(str) {
  if (!str) return null;
  if (str instanceof Date) return str.getTime();
  const s = String(str).trim();
  const m = s.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})/);
  if (m) {
    const idx = MONTHS.findIndex(mn => mn.toLowerCase() === m[2].toLowerCase());
    if (idx !== -1) return new Date(m[3], idx, m[1]).getTime();
  }
  const d = new Date(s);
  if (!isNaN(d)) return d.getTime();
  return null;
}

function goBack() {
  window.location.href = DASHBOARD_PAGES[currentUser?.type] || 'SalesDashboard.html';
}

// تحميل الفواتير حسب الحالة من الرابط
function loadBookings(status) {
  currentStatus = status;
  currentPage = 1;
  
  // تحديث شكل الأزرار
  document.querySelectorAll('.status-btn').forEach(btn => btn.classList.remove('active'));
  if (status === 'pending') document.getElementById('pendingBtn').classList.add('active');
  else if (status === 'confirmed') document.getElementById('confirmedBtn').classList.add('active');
  else if (status === 'cancel') document.getElementById('cancelBtn').classList.add('active');
  
  // تحديث العنوان
  const titles = {
    pending: '⏳ Pending Bookings',
    confirmed: '✅ Done Bookings',
    cancel: '❌ Canceled Bookings'
  };
  document.getElementById('currentStatusLabel').textContent = titles[status];
  
  // تصفية الفواتير حسب الحالة والمستخدم
  filterByStatus();
}

function filterByStatus() {
  if (!currentUser) return;
  
  // تصفية حسب الحالة ورقم السيلز (SalesID = USR003)
  filteredInvoices = allInvoices.filter(inv => {
    const invStatus = (inv.state || '').trim().toLowerCase();
    const matchesStatus = invStatus === currentStatus;
    const matchesSales = inv.salesId === currentUser.id; // تأكد من تطابق معرف السيلز
    
    return matchesStatus && matchesSales;
  });
  
  document.getElementById('totalCount').textContent = filteredInvoices.length;
  sortData(sortColumn, sortDirection);
  renderTable();
  buildTripsSummary(filteredInvoices);
}

// تحميل كل الفواتير
function loadInvoices() {
  document.getElementById('tableContainer').innerHTML = '<div class="loader"></div>';
  
  fetch(GAS_URL + '?action=getAllInvoices')
    .then(r => r.json())
    .then(invoices => {
      if (!Array.isArray(invoices)) invoices = [];
      allInvoices = invoices;
      filterByStatus();
    })
    .catch(err => {
      document.getElementById('tableContainer').innerHTML = `<div class="no-data">Error: ${err.message}</div>`;
    });
}

// تطبيق فلتر التاريخ والنص
function applyFilters() {
  const fromDate = document.getElementById('filterDateFrom').value;
  const toDate = document.getElementById('filterDateTo').value;
  const searchText = document.getElementById('filterText').value.toLowerCase().trim();
  
  let fromTs = null, toTs = null;
  if (fromDate) {
    const [fy,fm,fd] = fromDate.split('-').map(Number);
    fromTs = new Date(fy,fm-1,fd).getTime();
  }
  if (toDate) {
    const [ty,tm,td] = toDate.split('-').map(Number);
    toTs = new Date(ty,tm-1,td,23,59,59,999).getTime();
  }
  
  // فلترة من allInvoices حسب الحالة والمستخدم أولاً
  let tempFiltered = allInvoices.filter(inv => {
    const invStatus = (inv.state || '').trim().toLowerCase();
    return invStatus === currentStatus && inv.salesId === currentUser.id;
  });
  
  // ثم تطبيق فلتر التاريخ والنص
  filteredInvoices = tempFiltered.filter(inv => {
    const ts = parseDDMMMYYYY(inv.activeDate);
    if (fromTs !== null && (ts === null || ts < fromTs)) return false;
    if (toTs !== null && (ts === null || ts > toTs)) return false;
    
    if (searchText) {
      const s = [inv.voucherNo, inv.guestName, inv.trip, inv.hotel, inv.contactNo]
        .map(x => x || '').join(' ').toLowerCase();
      if (!s.includes(searchText)) return false;
    }
    return true;
  });
  
  document.getElementById('totalCount').textContent = filteredInvoices.length;
  currentPage = 1;
  sortData(sortColumn, sortDirection);
  renderTable();
  buildTripsSummary(filteredInvoices);
}

function resetFilters() {
  document.getElementById('filterDateFrom').value = '';
  document.getElementById('filterDateTo').value = '';
  document.getElementById('filterText').value = '';
  filterByStatus();
}

// دوال الترتيب
const NUM_COLS = ['rest', 'cashUSD', 'cashEUR', 'cashGBP', 'cashLE', 'visaUSD', 'visaEUR', 'visaGBP', 'visaLE', 'discount', 'adultCount', 'childCount', 'infantCount'];
const DATE_COLS = ['issueDate', 'activeDate'];

function sortData(col, dir) {
  filteredInvoices.sort((a, b) => {
    let va = a[col] ?? '', vb = b[col] ?? '';
    if (DATE_COLS.includes(col)) {
      va = parseDDMMMYYYY(va) ?? 0;
      vb = parseDDMMMYYYY(vb) ?? 0;
    } else if (NUM_COLS.includes(col)) {
      va = parseFloat(va) || 0;
      vb = parseFloat(vb) || 0;
    } else {
      va = String(va).toLowerCase();
      vb = String(vb).toLowerCase();
    }
    return va < vb ? (dir === 'asc' ? -1 : 1) : va > vb ? (dir === 'asc' ? 1 : -1) : 0;
  });
}

function setSort(col) {
  sortDirection = sortColumn === col ? (sortDirection === 'asc' ? 'desc' : 'asc') : 'asc';
  sortColumn = col;
  sortData(sortColumn, sortDirection);
  renderTable();
}

// دوال التنسيق
function fmtDate(str) {
  if (!str) return '';
  if (/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(str)) return str;
  try {
    const d = new Date(str);
    return `${String(d.getDate()).padStart(2,'0')}/${MONTHS[d.getMonth()]}/${d.getFullYear()}`;
  } catch { return str; }
}

function fmtTime(t) {
  if (!t) return '';
  const m = String(t).match(/(\d{1,2}):(\d{2})/);
  return m ? `${m[1].padStart(2,'0')}:${m[2]}` : String(t).substring(0,5);
}

function fmtRest(inv) {
  const r = Number(inv.rest) || 0;
  if (!r) return '<span style="color:#27ae60;font-weight:bold;">✓</span>';
  return `<span style="color:#e74c3c;font-weight:bold;">${r} ${inv.invoiceCurrency || ''}</span>`;
}

function fmtState(s) {
  const v = (s || '').trim().toLowerCase();
  if (v === 'confirmed') return '<span class="st-confirmed">✅ Confirmed</span>';
  if (v === 'pending') return '<span class="st-pending">⏳ Pending</span>';
  if (v === 'cancel') return '<span class="st-cancel">❌ Cancel</span>';
  return s ? `<span class="st-other">${s}</span>` : '';
}

function buildPax(inv) {
  return `A:${inv.adultCount || 0} C:${inv.childCount || 0} I:${inv.infantCount || 0}`;
}

function buildTotalsRow(data) {
  const sum = (key) => data.reduce((acc, inv) => acc + (Number(inv[key]) || 0), 0);
  const fmt = (v) => v ? v.toFixed(2).replace(/\.00$/, '') : '0';
  return `<tr class="totals-row">
    <td><span class="totals-label">TOTAL</span></td>
    <td colspan="6" style="text-align:center;font-size:12px;">${data.length} invoice(s)</td>
    <td>${fmt(sum('cashUSD'))}</td>
    <td>${fmt(sum('cashEUR'))}</td>
    <td>${fmt(sum('cashGBP'))}</td>
    <td>${fmt(sum('cashLE'))}</td>
    <td>${fmt(sum('visaUSD'))}</td>
    <td>${fmt(sum('visaEUR'))}</td>
    <td>${fmt(sum('visaGBP'))}</td>
    <td>${fmt(sum('visaLE'))}</td>
    <td colspan="12"></td>
    <td>${fmt(sum('discount'))}</td>
    <td></td><td></td>
  </tr>`;
}

function parseActivities(text) {
  const result = {};
  if (!text) return result;
  if (text.includes('×')) {
    text.split('|').forEach(part => {
      const m = part.trim().match(/^(.+?)×(\d+(\.\d+)?)$/);
      if (m) {
        const name = m[1].trim();
        result[name] = (result[name] || 0) + (parseFloat(m[2]) || 0);
      }
    });
    return result;
  }
  const key = text.trim();
  if (key) result[key] = (result[key] || 0) + 1;
  return result;
}

function buildTripsSummary(data) {
  const trips = {};
  data.forEach(inv => {
    const trip = (inv.trip || '(Unknown)').trim();
    if (!trips[trip]) trips[trip] = { bookings: 0, activities: {} };
    trips[trip].bookings++;
    const acts = parseActivities(inv.activitiesText || inv.activities || '');
    Object.entries(acts).forEach(([k, v]) => {
      trips[trip].activities[k] = (trips[trip].activities[k] || 0) + v;
    });
  });

  if (!Object.keys(trips).length || data.length === 0) {
    document.getElementById('summarySection').style.display = 'none';
    return;
  }

  let rows = '';
  Object.entries(trips)
    .sort((a, b) => b[1].bookings - a[1].bookings)
    .forEach(([tripName, info]) => {
      const actsText = Object.entries(info.activities)
        .map(([k, v]) => `${k}×${Number.isInteger(v) ? v : v.toFixed(1)}`)
        .join(' | ') || '—';
      rows += `<tr>
        <td><strong>${tripName}</strong></td>
        <td style="text-align:center;"><span class="badge">${info.bookings}</span></td>
        <td>${actsText}</td>
      </tr>`;
    });

  document.getElementById('summaryTable').innerHTML = `
    <thead><tr>
      <th>Trip Name</th>
      <th style="text-align:center;">Bookings</th>
      <th>Activities Total</th>
    </tr></thead>
    <tbody>${rows}</tbody>`;
  document.getElementById('summarySection').style.display = 'block';
}

// عرض الجدول
function renderTable() {
  const container = document.getElementById('tableContainer');
  if (filteredInvoices.length === 0) {
    container.innerHTML = '<div class="no-data">No bookings found</div>';
    document.getElementById('pagination').innerHTML = '';
    document.getElementById('summarySection').style.display = 'none';
    return;
  }

  const start = (currentPage - 1) * pageSize;
  const pageData = filteredInvoices.slice(start, start + pageSize);

  const cols = [
    ['rest', 'Rest'],
    ['voucherNo', 'Voucher'],
    ['issueDate', 'Issue Date'],
    ['activeDate', 'Active Date'],
    ['time', 'Time'],
    ['trip', 'Trip'],
    ['activitiesText', 'Activities'],
    ['cashUSD', '$'],
    ['cashEUR', '€'],
    ['cashGBP', '£'],
    ['cashLE', 'LE'],
    ['visaUSD', 'V$'],
    ['visaEUR', 'V€'],
    ['visaGBP', 'V£'],
    ['visaLE', 'VLE'],
    ['hotel', 'Hotel'],
    ['roomNo', 'Room'],
    ['nationality', 'Nat.'],
    ['guestName', 'Guest'],
    ['contactNo', 'Contact'],
    ['notes', 'Notes'],
    ['state', 'Status'],
    ['invoiceCurrency', 'Cur.'],
    ['branchName', 'Branch'],
    ['discount', 'Disc.'],
    [null, 'Pax'],
    [null, 'Actions']
  ];

  let html = '<table><thead><tr>';
  cols.forEach(([col, label]) => {
    if (col) {
      const ic = sortColumn === col ? (sortDirection === 'asc' ? ' ↑' : ' ↓') : '';
      html += `<th onclick="setSort('${col}')">${label}<span class="sort-icon">${ic}</span></th>`;
    } else {
      html += `<th>${label}</th>`;
    }
  });
  html += '</tr></thead><tbody>';

  pageData.forEach(inv => {
  const printBtn = (inv.pdfLink && inv.pdfLink.startsWith('http'))
  ? `<a href="${inv.pdfLink}" target="_blank" class="print-btn-large" title="Open PDF">
      <span style="font-size:20px;">🖨️</span>
      <span style="font-size:12px;">PDF</span>
    </a>`
  : `<div class="print-btn-large disabled" title="No PDF">
      <span style="font-size:20px;">📄</span>
      <span style="font-size:12px;">No PDF</span>
    </div>`;
    
    html += `<tr>
      <td>${fmtRest(inv)}</td>
      <td>${inv.voucherNo || ''}</td>
      <td>${fmtDate(inv.issueDate)}</td>
      <td>${fmtDate(inv.activeDate)}</td>
      <td>${fmtTime(inv.time)}</td>
      <td>${inv.trip || ''}</td>
      <td class="activities-cell">${inv.activitiesText || ''}</td>
      <td>${inv.cashUSD || 0}</td>
      <td>${inv.cashEUR || 0}</td>
      <td>${inv.cashGBP || 0}</td>
      <td>${inv.cashLE || 0}</td>
      <td>${inv.visaUSD || 0}</td>
      <td>${inv.visaEUR || 0}</td>
      <td>${inv.visaGBP || 0}</td>
      <td>${inv.visaLE || 0}</td>
      <td>${inv.hotel || ''}</td>
      <td>${inv.roomNo || ''}</td>
      <td>${inv.nationality || ''}</td>
      <td>${inv.guestName || ''}</td>
      <td>${inv.contactNo || ''}</td>
      <td>${inv.notes || ''}</td>
      <td>${fmtState(inv.state)}</td>
      <td>${inv.invoiceCurrency || ''}</td>
      <td>${inv.branchName || ''}</td>
      <td>${inv.discount || 0}</td>
      <td class="pax-cell">${buildPax(inv)}</td>
     <td><div class="action-buttons" style="justify-content:center;">
  ${printBtn}
</div></td>
    </tr>`;
  });

  html += buildTotalsRow(filteredInvoices);
  html += '</tbody></table>';
  container.innerHTML = html;
  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filteredInvoices.length / pageSize);
  const delta = 3;
  let pages = [];
  if (currentPage > delta + 1) { pages.push(1); if (currentPage > delta + 2) pages.push('...'); }
  for (let i = Math.max(1, currentPage - delta); i <= Math.min(total, currentPage + delta); i++) pages.push(i);
  if (currentPage < total - delta) { if (currentPage < total - delta - 1) pages.push('...'); pages.push(total); }
  
  document.getElementById('pagination').innerHTML = pages.map(p =>
    p === '...' ? `<span style="padding:6px 4px;">…</span>`
      : `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`
  ).join('');
}

function goToPage(p) { currentPage = p; renderTable(); }

function editInvoice(id) { showAlert('Edit invoice - تحت التطوير'); }
function deleteInvoice(id) { if (confirm('Are you sure?')) showAlert('Delete - تحت التطوير'); }

function showAlert(msg) {
  const modal = document.getElementById('customAlertModal');
  document.getElementById('alertMessage').innerText = msg;
  modal.style.display = 'flex';
  document.getElementById('alertOk').onclick = () => modal.style.display = 'none';
}

// التهيئة
document.addEventListener('DOMContentLoaded', () => {
  // الحصول على بيانات المستخدم من الرابط أو sessionStorage
  let userData = sessionStorage.getItem('currentUser');
  if (!userData) {
    const params = new URLSearchParams(window.location.search);
    const userParam = params.get('user');
    if (userParam) {
      userData = decodeURIComponent(userParam);
      sessionStorage.setItem('currentUser', userData);
    }
  }
  
  if (!userData) {
    window.location.href = 'index.html';
    return;
  }
  
  try {
    currentUser = JSON.parse(userData);
    document.getElementById('userNameDisplay').textContent = currentUser.name || 'Sales Rep';
    
    // التحقق من نوع المستخدم
    if (!['Admin', 'Owner', 'Sales'].includes(currentUser.type)) {
      showAlert('You do not have permission to view this page.');
      setTimeout(() => window.location.href = 'Dashboard.html', 2000);
      return;
    }
    
    // الحصول على الحالة من الرابط
    const params = new URLSearchParams(window.location.search);
    const status = params.get('status') || 'pending';
    
    // تفعيل الزر المناسب
    loadBookings(status);
    
    // تحميل الفواتير
    loadInvoices();
  } catch (e) {
    console.error(e);
    window.location.href = 'index.html';
  }
});

// دوال عامة
window.loadBookings = loadBookings;
window.applyFilters = applyFilters;
window.resetFilters = resetFilters;
window.setSort = setSort;
window.goToPage = goToPage;
window.editInvoice = editInvoice;
window.deleteInvoice = deleteInvoice;
window.goBack = goBack;
</script>
