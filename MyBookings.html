<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>My Bookings</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0f1f3d;--navy2:#1a3260;--gold:#f5c842;--gold2:#e6b800;
      --blue:#2563eb;--blue-lt:#3b82f6;--green:#16a34a;--red:#dc2626;--orange:#ea580c;
      --bg:#f0f4f8;--card:#fff;--border:#dde4f0;--text:#1a2540;--text-lt:#5a6a8a;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

    /* ── Header ── */
    .header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;padding:12px 22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 3px 16px rgba(15,31,61,.25);}
    .header h2{color:var(--gold);font-size:18px;font-weight:900;}
    .header-right{display:flex;align-items:center;gap:8px;}
    .user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:40px;padding:4px 13px;color:white;font-size:12px;font-weight:600;}
    .back-btn{background:transparent;border:2px solid rgba(255,255,255,.3);color:white;padding:4px 13px;border-radius:40px;cursor:pointer;font-weight:700;font-size:12px;font-family:'Cairo',sans-serif;transition:all .2s;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}

    /* ── Status Tabs ── */
    .status-tabs{background:white;border-bottom:2px solid var(--border);padding:10px 20px;display:flex;gap:8px;position:sticky;top:52px;z-index:99;flex-wrap:wrap;}
    .tab-btn{padding:7px 18px;border:2px solid var(--border);border-radius:40px;font-weight:700;font-size:12px;cursor:pointer;font-family:'Cairo',sans-serif;transition:all .2s;background:white;color:var(--text-lt);}
    .tab-btn:hover{border-color:var(--navy);}
    .tab-btn.all.active{background:#e0e7ff;border-color:#4f46e5;color:#1e3a8a;}
    .tab-btn.refund.active{background:#fef3c7;border-color:#d97706;color:#92400e;}
    .tab-btn.pending.active{background:#fef9c3;border-color:#f59e0b;color:#854d0e;}
    .tab-btn.confirmed.active{background:#dcfce7;border-color:#16a34a;color:#166534;}
    .tab-btn.cancel.active{background:#fee2e2;border-color:#dc2626;color:#991b1b;}
    .cnt-badge{background:var(--navy);color:var(--gold);border-radius:20px;padding:1px 8px;font-size:10px;margin-left:5px;}

    /* ── Filter Bar (Date picker with +1/-1) ── */
    .filter-bar{background:#f8fafc;border-bottom:1px solid var(--border);padding:8px 20px;}
    .filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;}
    .fg{display:flex;flex-direction:column;gap:3px;}
    .fg label{font-size:10px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.4px;}
    .fc{padding:6px 10px;border:2px solid var(--border);border-radius:8px;font-size:12px;font-family:'Cairo',sans-serif;color:var(--text);background:white;height:34px;transition:border-color .2s;}
    .fc:focus{border-color:var(--blue);outline:none;}
    .dw{display:flex;gap:3px;align-items:center;}
    .dw input[type="text"]{flex:1;min-width:96px;}
    .cal-btn{padding:5px 7px;background:var(--navy);color:var(--gold);border:none;border-radius:6px;font-size:11px;cursor:pointer;height:34px;}
    .cal-btn:hover{background:var(--navy2);}
    .date-native{position:fixed;opacity:0;width:0;height:0;pointer-events:none;z-index:-1;}
    .date-native.vis{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);opacity:1;width:auto;height:auto;pointer-events:auto;z-index:1000;background:white;padding:10px;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.3);}
    .spin-row{display:flex;gap:3px;margin-top:2px;}
    .spin-btn{flex:1;padding:2px;border:none;border-radius:5px;background:var(--navy);color:white;font-size:9px;font-weight:700;cursor:pointer;}
    .spin-btn:hover{background:var(--gold);color:var(--navy);}
    .err-msg{font-size:9px;color:var(--red);min-height:10px;}
    
    .fbtns{display:flex;gap:5px;align-items:flex-end;}
    .fbtn{padding:6px 14px;border:none;border-radius:20px;font-weight:700;font-size:11px;cursor:pointer;font-family:'Cairo',sans-serif;height:34px;}
    .fbtn-go{background:var(--navy);color:var(--gold);}
    .fbtn-rs{background:#f1f5f9;color:var(--text);}
    .search-fc{min-width:160px;}

    /* ── Table ── */
    .tbl-wrap{flex:1;overflow:auto;}
    table{width:100%;border-collapse:collapse;font-size:11px;min-width:1800px;}
    thead{position:sticky;top:0;z-index:80;}
    thead th{background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);padding:10px 6px;font-weight:700;cursor:pointer;white-space:nowrap;border-right:1px solid rgba(255,255,255,.08);font-size:11px;box-shadow:0 2px 6px rgba(0,0,0,.12);}
    thead th:hover{background:rgba(255,255,255,.08);}
    tbody tr:hover td{background:#f0f6ff;}
    td{padding:6px 5px;border-bottom:1px solid #eef2f9;color:var(--text);white-space:nowrap;background:white;font-size:11px;}
    .amt{text-align:right;font-family:monospace;}
    .acts-cell{max-width:190px;white-space:normal;word-break:break-word;line-height:1.3;}
    .rest-pos{color:var(--red);font-weight:700;}
    .rest-zero{color:var(--green);font-weight:700;}
    .st-pending{display:inline-block;padding:2px 7px;border-radius:12px;font-size:10px;font-weight:700;background:#fef9c3;color:#854d0e;}
    .st-confirmed{display:inline-block;padding:2px 7px;border-radius:12px;font-size:10px;font-weight:700;background:#dcfce7;color:#166534;}
    .st-cancel{display:inline-block;padding:2px 7px;border-radius:12px;font-size:10px;font-weight:700;background:#fee2e2;color:#991b1b;}
    .st-refund{display:inline-block;padding:2px 7px;border-radius:12px;font-size:10px;font-weight:700;background:#fef3c7;color:#92400e;}

    /* Totals */
    .totals-row td{background:#dbeafe;color:var(--navy);border-top:2px solid var(--navy);border-bottom:2px solid var(--navy);position:sticky;bottom:0;z-index:70;padding:8px 5px;font-size:11px;}
    .tl{font-size:9px;color:#475569;display:block;margin-bottom:1px;}
    .tv{font-size:12px;font-weight:800;color:var(--navy);}

    /* PDF btn */
    .pdf-btn-big{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;background:var(--orange);color:white;padding:6px 10px;border-radius:24px;text-decoration:none;font-weight:700;min-width:56px;border:none;cursor:pointer;box-shadow:0 3px 8px rgba(234,88,12,.3);transition:all .2s;font-size:11px;}
    .pdf-btn-big:hover{background:#c2410c;transform:translateY(-2px);}
    .pdf-na{background:#cbd5e1;cursor:default;box-shadow:none;}

    /* Pagination */
    .pagination{display:flex;justify-content:center;gap:5px;padding:12px;background:white;border-top:1px solid var(--border);flex-wrap:wrap;}
    .page-btn{padding:4px 9px;border:1px solid var(--border);background:white;border-radius:14px;cursor:pointer;font-size:11px;font-family:'Cairo',sans-serif;}
    .page-btn.active{background:var(--navy);color:var(--gold);border-color:var(--navy);}

    /* Summary */
    .summary-sec{padding:14px 20px;background:white;border-top:2px solid var(--border);}
    .summary-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:8px;}
    .summary-table{width:100%;border-collapse:collapse;font-size:12px;}
    .summary-table th{background:var(--navy2);color:var(--gold);padding:7px 10px;text-align:left;}
    .summary-table td{padding:6px 10px;border-bottom:1px solid var(--border);}
    .badge{display:inline-block;background:var(--navy);color:var(--gold);border-radius:20px;padding:1px 8px;font-size:10px;font-weight:700;}

    /* States */
    .loader-wrap{text-align:center;padding:50px;color:var(--text-lt);}
    .spinner{width:32px;height:32px;border:4px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .no-data{text-align:center;padding:40px;color:var(--text-lt);font-size:13px;}
    .a-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:9999;}
    .a-modal.open{display:flex;}
    .a-box{background:white;width:90%;max-width:340px;border-radius:20px;padding:24px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.3);}
    .a-btn{padding:9px 22px;border:none;border-radius:30px;background:var(--navy);color:var(--gold);font-weight:700;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;}
    @media(max-width:640px){.filter-row{flex-direction:column;}.fbtns{width:100%;}}
  </style>
</head>
<body>
<div class="header">
  <h2>📋 My Bookings</h2>
  <div class="header-right">
    <span class="user-chip" id="userNameDisplay"></span>
    <button class="back-btn" onclick="goBack()">← Back</button>
  </div>
</div>

<div class="status-tabs">
  <button class="tab-btn all" id="tabAll" onclick="switchTab('all')">📊 ALL <span class="cnt-badge" id="cntAll">0</span></button>
  <button class="tab-btn pending" id="tabPending" onclick="switchTab('pending')">⏳ Pending <span class="cnt-badge" id="cntPending">0</span></button>
  <button class="tab-btn confirmed" id="tabConfirmed" onclick="switchTab('confirmed')">✅ Done <span class="cnt-badge" id="cntConfirmed">0</span></button>
  <button class="tab-btn cancel" id="tabCancel" onclick="switchTab('cancel')">❌ Canceled <span class="cnt-badge" id="cntCancel">0</span></button>
  <button class="tab-btn refund" id="tabRefund" onclick="switchTab('refund')">💰 Refund <span class="cnt-badge" id="cntRefund">0</span></button>
</div>

<div class="filter-bar">
  <div class="filter-row">
    <div class="fg"><label>Branch</label>
      <select class="fc" id="fBranch" onchange="apply()">
        <option value="">📍 All Branches</option>
      </select>
    </div>
    
    <!-- From Date with Picker and +/- -->
    <div class="fg">
      <label>From Date</label>
      <div class="dw">
        <input type="text" class="fc" id="fFromTxt" placeholder="dd/MMM/yyyy" oninput="onTxt('From')" onblur="onBlur('From')" onclick="hideAll()">
        <button class="cal-btn" onclick="openPick('From')">📅</button>
        <input type="date" class="date-native" id="fFromNat" onchange="onNat('From')">
      </div>
      <div class="spin-row"><button class="spin-btn" onclick="spin('From',-1)">-1</button><button class="spin-btn" onclick="spin('From',1)">+1</button></div>
      <div class="err-msg" id="errFrom"></div>
    </div>
    
    <!-- To Date with Picker and +/- -->
    <div class="fg">
      <label>To Date</label>
      <div class="dw">
        <input type="text" class="fc" id="fToTxt" placeholder="dd/MMM/yyyy" oninput="onTxt('To')" onblur="onBlur('To')" onclick="hideAll()">
        <button class="cal-btn" onclick="openPick('To')">📅</button>
        <input type="date" class="date-native" id="fToNat" onchange="onNat('To')">
      </div>
      <div class="spin-row"><button class="spin-btn" onclick="spin('To',-1)">-1</button><button class="spin-btn" onclick="spin('To',1)">+1</button></div>
      <div class="err-msg" id="errTo"></div>
    </div>

    <div class="fg"><label>Search</label>
      <input type="text" class="fc search-fc" id="fSearch" placeholder="Voucher, Guest, Trip..." oninput="debounce()">
    </div>
    <div class="fbtns">
      <button class="fbtn fbtn-go" onclick="apply()">Apply</button>
      <button class="fbtn fbtn-rs" onclick="reset()">Reset</button>
    </div>
  </div>
</div>

<div class="tbl-wrap" id="tblWrap">
  <div id="tblCont"><div class="loader-wrap"><div class="spinner"></div>Loading...</div></div>
</div>
<div class="pagination" id="pagination"></div>
<div class="summary-sec" id="summarySec" style="display:none">
  <div class="summary-title">📊 Trips Summary</div>
  <div style="overflow-x:auto"><table class="summary-table" id="summaryTbl"></table></div>
</div>

<div id="alertModal" class="a-modal">
  <div class="a-box"><div style="font-size:40px;margin-bottom:10px" id="aIcon">ℹ️</div><div style="color:var(--navy);font-size:14px;font-weight:700;margin-bottom:16px" id="aMsg"></div><button class="a-btn" onclick="closeAlert()">OK</button></div>
</div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbzjv8iFYX6vm_3hsbKEHWRLRhFoGISm6TSQcDINgkkff14yjpoBY-rYGCqJFlpF5u3g/exec';
const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DASH={Admin:'Dashboard.html',Owner:'OwnerDashboard.html',Sales:'SalesDashboard.html',Accountant:'AccountantDashboard.html'};
let currentUser=null,allInv=[],filtInv=[];
let curStatus='all',pg=1;const PS=20;
let sortCol='activeDate',sortDir='asc';
let ftimer=null;

// ==================== Date Helpers (Copied from working file) ====================
function fmtDDMMMYYYY(s) {
  if (!s) return '';
  if (/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(s)) return s;
  let d = new Date(s);
  if (isNaN(d.getTime())) return s;
  return String(d.getDate()).padStart(2,'0') + '/' + MN[d.getMonth()] + '/' + d.getFullYear();
}
function isoToTxt(iso) { if (!iso) return ''; const [y,m,d] = iso.split('-'); return String(d).padStart(2,'0') + '/' + MN[+m-1] + '/' + y; }
function txtToISO(t) { if (!t) return ''; const m = t.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/); if (!m) return ''; const mi = MN.findIndex(x => x.toLowerCase() === m[2].toLowerCase()); if (mi === -1) return ''; return `${m[3]}-${String(mi+1).padStart(2,'0')}-${m[1].padStart(2,'0')}`; }
function parseDt(s) { if (!s) return null; const d = new Date(s); return isNaN(d) ? null : d.getTime(); }

function hideAll() { ['From','To'].forEach(w => { const e = document.getElementById('f'+w+'Nat'); if (e) e.classList.remove('vis'); }); }
function openPick(w) { hideAll(); const n = document.getElementById('f'+w+'Nat'); n.classList.add('vis'); try { n.showPicker(); n.focus(); } catch { n.click(); } }
function onNat(w) { const iso = document.getElementById('f'+w+'Nat').value; if (!iso) return; document.getElementById('f'+w+'Txt').value = isoToTxt(iso); setTimeout(() => document.getElementById('f'+w+'Nat').classList.remove('vis'), 100); valDates(); apply(); }
function onTxt(w) { const v = document.getElementById('f'+w+'Txt').value.trim(); if (/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(v)) { const iso = txtToISO(v); if (iso) { document.getElementById('f'+w+'Nat').value = iso; valDates(); apply(); } } }
function onBlur(w) { setTimeout(() => { const v = document.getElementById('f'+w+'Txt').value.trim(); if (!v) { document.getElementById('f'+w+'Nat').value = ''; valDates(); apply(); return; } if (!/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(v)) { document.getElementById('f'+w+'Txt').value = ''; document.getElementById('f'+w+'Nat').value = ''; valDates(); apply(); } }, 200); }
function spin(w, d) { const n = document.getElementById('f'+w+'Nat'); let iso = n.value; if (!iso) { const today = new Date(); iso = today.toISOString().split('T')[0]; } const dt = new Date(iso); dt.setDate(dt.getDate() + d); iso = dt.toISOString().split('T')[0]; n.value = iso; document.getElementById('f'+w+'Txt').value = isoToTxt(iso); valDates(); apply(); }
function valDates() { const f = document.getElementById('fFromNat').value, t = document.getElementById('fToNat').value; const eT = document.getElementById('errTo'); eT.textContent = ''; if (f && t && t < f) { eT.textContent = '⚠️ To ≥ From required'; return false; } return true; }
document.addEventListener('click', e => { if (!e.target.closest('.dw') && !e.target.closest('.date-native')) hideAll(); });

// ==================== Core Logic ====================
function showAlert(m,i='ℹ️'){document.getElementById('aMsg').textContent=m;document.getElementById('aIcon').textContent=i;document.getElementById('alertModal').classList.add('open');}
function closeAlert(){document.getElementById('alertModal').classList.remove('open');}
function goBack(){window.location.href=DASH[currentUser?.type]||'SalesDashboard.html';}

function switchTab(status){
  curStatus=status;pg=1;
  ['all','pending','confirmed','cancel','refund'].forEach(s=>{
    const id='tab'+s.charAt(0).toUpperCase()+s.slice(1);
    const tb=document.getElementById(id);
    if(tb){
      tb.classList.remove('active');
      if(s===status)tb.classList.add('active');
    }
  });
  apply();
}

function debounce(){clearTimeout(ftimer);ftimer=setTimeout(apply,300);}

function loadInv() {
  document.getElementById('tblCont').innerHTML='<div class="loader-wrap"><div class="spinner"></div>Loading...</div>';
  const centerName=currentUser?.centerName||'';
  fetch(GAS_URL+'?action=getAllInvoices&centerName='+encodeURIComponent(centerName))
    .then(r=>r.json()).then(data=>{
      if(!Array.isArray(data))data=[];
      allInv=data.filter(inv=>inv.salesId===currentUser?.id);
      
      // Normalize dates to DD/MMM/YYYY for display & comparison
      allInv.forEach(inv => {
        if (inv.activeDate) inv.activeDate = fmtDDMMMYYYY(inv.activeDate);
        if (inv.issueDate) inv.issueDate = fmtDDMMMYYYY(inv.issueDate);
      });

      const counts={all:allInv.length,pending:0,confirmed:0,cancel:0,refund:0};
      allInv.forEach(inv=>{const s=(inv.state||'').toLowerCase();if(s==='pending')counts.pending++;else if(s==='confirmed')counts.confirmed++;else if(s==='cancel')counts.cancel++;else if(s==='refund')counts.refund++;});
      document.getElementById('cntAll').textContent=counts.all;
      document.getElementById('cntPending').textContent=counts.pending;
      document.getElementById('cntConfirmed').textContent=counts.confirmed;
      document.getElementById('cntCancel').textContent=counts.cancel;
      document.getElementById('cntRefund').textContent=counts.refund;
      loadBranchesFilter();
      apply();
    }).catch(e=>{document.getElementById('tblCont').innerHTML='<div class="no-data">Error: '+e.message+'</div>';});
}

function apply(){
  if(!valDates())return;
  const fISO = document.getElementById('fFromNat').value;
  const tISO = document.getElementById('fToNat').value;
  const q = document.getElementById('fSearch').value.toLowerCase().trim();
  const selectedBranch = document.getElementById('fBranch')?.value||'';
  
  let fTs=null,tTs=null;
  if(fISO){const[y,m,d]=fISO.split('-').map(Number);fTs=new Date(y,m-1,d).getTime();}
  if(tISO){const[y,m,d]=tISO.split('-').map(Number);tTs=new Date(y,m-1,d,23,59,59,999).getTime();}
  
  filtInv = allInv.filter(inv=>{
    const state=(inv.state||'').toLowerCase();
    if(curStatus!=='all'&&state!==curStatus)return false;
    if(selectedBranch&&inv.branchName!==selectedBranch)return false;
    
    const ts = parseDt(inv.activeDate);
    if(fTs!==null&&(ts===null||ts<fTs))return false;
    if(tTs!==null&&(ts===null||ts>tTs))return false;
    
    if(q){const s=[inv.voucherNo,inv.guestName,inv.trip,inv.hotel,inv.contactNo].map(x=>x||'').join(' ').toLowerCase();if(!s.includes(q))return false;}
    return true;
  });
  updateCountsFromFiltered();
  pg=1;
  doSort();
  renderAll();
}

function updateCountsFromFiltered(){
  const counts={all:filtInv.length,pending:0,confirmed:0,cancel:0,refund:0};
  filtInv.forEach(inv=>{const s=(inv.state||'').toLowerCase();if(s==='pending')counts.pending++;else if(s==='confirmed')counts.confirmed++;else if(s==='cancel')counts.cancel++;else if(s==='refund')counts.refund++;});
  document.getElementById('cntAll').textContent=counts.all;
  document.getElementById('cntPending').textContent=counts.pending;
  document.getElementById('cntConfirmed').textContent=counts.confirmed;
  document.getElementById('cntCancel').textContent=counts.cancel;
  document.getElementById('cntRefund').textContent=counts.refund;
}

function loadBranchesFilter(){
  // If user is Accountant, only show their branch and disable selection
  if (currentUser?.type === 'Accountant') {
    const select = document.getElementById('fBranch');
    if (select) {
      select.innerHTML = `<option value="${currentUser.branchName || 'Main Branch'}">🏢 ${currentUser.branchName || 'Main Branch'}</option>`;
      select.disabled = true;
    }
    return;
  }
  
  const branches = [...new Set(allInv.map(inv => inv.branchName).filter(b => b))];
  const select = document.getElementById('fBranch');
  if (select && branches.length) {
    const currentValue = select.value;
    select.innerHTML = '<option value="">📍 All Branches</option>' + 
      branches.map(b => `<option value="${b}">🏢 ${b}</option>`).join('');
    if (currentValue) select.value = currentValue;
  }
}

function reset(){
  document.getElementById('fFromTxt').value = '';
  document.getElementById('fToTxt').value = '';
  document.getElementById('fFromNat').value = '';
  document.getElementById('fToNat').value = '';
  document.getElementById('fSearch').value = '';
  document.getElementById('fBranch').value = '';
  document.getElementById('errTo').textContent = '';
  curStatus = 'all';
  document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.remove('active'));
  document.getElementById('tabAll').classList.add('active');
  apply();
}

const NUM_C=['rest','cashUSD','cashEUR','cashGBP','cashLE','visaUSD','visaEUR','visaGBP','visaLE','discount'];
const DT_C=['issueDate','activeDate'];
function doSort(){filtInv.sort((a,b)=>{let va=a[sortCol]??'',vb=b[sortCol]??'';if(DT_C.includes(sortCol)){va=parseDt(va)??0;vb=parseDt(vb)??0;}else if(NUM_C.includes(sortCol)){va=parseFloat(va)||0;vb=parseFloat(vb)||0;}else{va=String(va).toLowerCase();vb=String(vb).toLowerCase();}return va<vb?(sortDir==='asc'?-1:1):va>vb?(sortDir==='asc'?1:-1):0;});}
function setSort(col){sortDir=sortCol===col?(sortDir==='asc'?'desc':'asc'):'asc';sortCol=col;doSort();renderAll();}
function fmtDate(s){if(!s)return'';return s;}
function fmtTime(t){if(!t)return'';const m=String(t).match(/(\d{1,2}):(\d{2})/);return m?`${m[1].padStart(2,'0')}:${m[2]}`:String(t).substring(0,5);}
function fmtRest(inv){const r=parseFloat(inv.rest)||0;const c=inv.invoiceCurrency||'';if(r===0)return'<span class="rest-zero">✓</span>';return'<span class="rest-pos">'+r+' '+c+'</span>';}
function fmtSt(s){const v=(s||'').trim().toLowerCase();if(v==='refund')return'<span class="st-refund">💰 Refund</span>';if(v==='confirmed')return'<span class="st-confirmed">✅ Confirmed</span>';if(v==='pending')return'<span class="st-pending">⏳ Pending</span>';if(v==='cancel')return'<span class="st-cancel">❌ Cancel</span>';return s||'';}
function fmtPax(inv){return'A:'+(inv.adultCount||0)+' C:'+(inv.childCount||0)+' I:'+(inv.infantCount||0);}

function buildTotals(data){const s=k=>data.reduce((a,i)=>a+(Number(i[k])||0),0);const f=v=>v?v.toFixed(2).replace(/\.00$/,''):'0';return'<tr class="totals-row"><td><span class="tl">Total</span><span class="tv">'+data.length+'</span></td><td colspan="5" style="text-align:center"><span class="tv">'+data.length+' invoices</span></td><td class="amt"><span class="tl">$</span><span class="tv">'+f(s('cashUSD'))+'</span></td><td class="amt"><span class="tl">€</span><span class="tv">'+f(s('cashEUR'))+'</span></td><td class="amt"><span class="tl">£</span><span class="tv">'+f(s('cashGBP'))+'</span></td><td class="amt"><span class="tl">LE</span><span class="tv">'+f(s('cashLE'))+'</span></td><td class="amt"><span class="tl">V$</span><span class="tv">'+f(s('visaUSD'))+'</span></td><td class="amt"><span class="tl">V€</span><span class="tv">'+f(s('visaEUR'))+'</span></td><td class="amt"><span class="tl">V£</span><span class="tv">'+f(s('visaGBP'))+'</span></td><td class="amt"><span class="tl">VLE</span><span class="tv">'+f(s('visaLE'))+'</span></td><td colspan="9"></td><td class="amt"><span class="tl">Disc.</span><span class="tv">'+f(s('discount'))+'</span></td><td colspan="2"></td></tr>';}

function buildSummary(data){const trips={};data.forEach(inv=>{const tn=(inv.trip||'Unknown').trim();if(!trips[tn])trips[tn]={b:0,acts:{}};trips[tn].b++;(inv.activitiesText||'').split('|').forEach(p=>{const m=p.trim().match(/^(.+?)×(\d+(\.\d+)?)$/);if(m){const n=m[1].trim();trips[tn].acts[n]=(trips[tn].acts[n]||0)+(parseFloat(m[2])||0);}});});if(!Object.keys(trips).length||!data.length){document.getElementById('summarySec').style.display='none';return;}let rows='';Object.entries(trips).sort((a,b)=>b[1].b-a[1].b).forEach(([tn,info])=>{const at=Object.entries(info.acts).map(([k,v])=>k+'×'+(Number.isInteger(v)?v:v.toFixed(1))).join(' | ')||'—';rows+='<tr><td><strong>'+tn+'</strong></td><td style="text-align:center"><span class="badge">'+info.b+'</span></td><td>'+at+'</td></tr>';});document.getElementById('summaryTbl').innerHTML='<thead><tr><th>Trip</th><th style="text-align:center">Bookings</th><th>Activities</th></tr></thead><tbody>'+rows+'</tbody>';document.getElementById('summarySec').style.display='block';}

function renderAll(){renderTable();buildSummary(filtInv);}
function renderTable(){
  const cont=document.getElementById('tblCont');
  if(!filtInv.length){cont.innerHTML='<div class="no-data">No bookings found</div>';document.getElementById('pagination').innerHTML='';document.getElementById('summarySec').style.display='none';return;}
  const start=(pg-1)*PS,pdata=filtInv.slice(start,start+PS);
  const cols=[['rest','Rest'],['voucherNo','Voucher'],['issueDate','Issue Date'],['activeDate','Active Date'],['time','Time'],['trip','Trip'],['activitiesText','Activities'],['cashUSD','$'],['cashEUR','€'],['cashGBP','£'],['cashLE','LE'],['visaUSD','V$'],['visaEUR','V€'],['visaGBP','V£'],['visaLE','VLE'],['hotel','Hotel'],['roomNo','Room'],['nationality','Nat.'],['guestName','Guest'],['contactNo','Contact'],['notes','Notes'],['state','Status'],['invoiceCurrency','Cur.'],['branchName','Branch'],['discount','Disc.'],[null,'Pax'],[null,'PDF']];
  let h='<td><thead><tr>';
  cols.forEach(([c,l])=>{const ic=c&&sortCol===c?(sortDir==='asc'?' ↑':' ↓'):'';h+=c?'<th onclick="setSort(\''+c+'\')">'+l+ic+'</th>':'<th>'+l+'</th>';});
  h+='</tr></thead><tbody>';
  pdata.forEach(inv=>{
    const pdf=(inv.invoicePdf&&inv.invoicePdf.startsWith('http'))?'<a href="'+inv.invoicePdf+'" target="_blank" class="pdf-btn-big"><span style="font-size:18px">🖨️</span>PDF</a>':'<div class="pdf-btn-big pdf-na"><span style="font-size:18px">📄</span>N/A</div>';
    h+='<tr><td>'+fmtRest(inv)+'</td><td>'+inv.voucherNo+'</td><td>'+fmtDate(inv.issueDate)+'</td><td>'+fmtDate(inv.activeDate)+'</td><td>'+fmtTime(inv.time)+'</td><td>'+inv.trip+'</td><td class="acts-cell">'+inv.activitiesText+'</td><td class="amt">'+(inv.cashUSD||0)+'</td><td class="amt">'+(inv.cashEUR||0)+'</td><td class="amt">'+(inv.cashGBP||0)+'</td><td class="amt">'+(inv.cashLE||0)+'</td><td class="amt">'+(inv.visaUSD||0)+'</td><td class="amt">'+(inv.visaEUR||0)+'</td><td class="amt">'+(inv.visaGBP||0)+'</td><td class="amt">'+(inv.visaLE||0)+'</td><td>'+inv.hotel+'</td><td>'+inv.roomNo+'</td><td>'+inv.nationality+'</td><td>'+inv.guestName+'</td><td>'+inv.contactNo+'</td><td>'+inv.notes+'</td><td>'+fmtSt(inv.state)+'</td><td>'+inv.invoiceCurrency+'</td><td>'+inv.branchName+'</td><td class="amt">'+inv.discount+'</td><td>'+fmtPax(inv)+'</td><td style="text-align:center">'+pdf+'</td></tr>';
  });
  h+=buildTotals(filtInv)+'</tbody></table>';
  cont.innerHTML=h;renderPag();
}
function renderPag(){const total=Math.ceil(filtInv.length/PS);let pages=[];if(pg>4){pages.push(1);if(pg>5)pages.push('...');}for(let i=Math.max(1,pg-3);i<=Math.min(total,pg+3);i++)pages.push(i);if(pg<total-3){if(pg<total-4)pages.push('...');pages.push(total);}document.getElementById('pagination').innerHTML=pages.map(p=>p==='...'?'<span style="padding:4px">…</span>':'<button class="page-btn '+(p===pg?'active':'')+'" onclick="gotoPage('+p+')">'+p+'</button>').join('');}
function gotoPage(p){pg=p;renderTable();}

document.addEventListener('DOMContentLoaded',()=>{
  let ud=sessionStorage.getItem('currentUser');
  if(!ud){const p=new URLSearchParams(location.search).get('user');if(p){ud=decodeURIComponent(p);sessionStorage.setItem('currentUser',ud);}}
  if(!ud){location.href='index.html';return;}
  try{currentUser=JSON.parse(ud);}catch{location.href='index.html';return;}
  document.getElementById('userNameDisplay').textContent=currentUser.name||'User';
  if(!['Admin','Owner','Sales','Accountant'].includes(currentUser.type)){showAlert('No permission','❌');setTimeout(()=>location.href='Dashboard.html',2000);return;}
  
  // Set default date range (Today)
  const todayISO = new Date().toISOString().split('T')[0];
  document.getElementById('fFromNat').value = todayISO;
  document.getElementById('fFromTxt').value = isoToTxt(todayISO);
  document.getElementById('fToNat').value = todayISO;
  document.getElementById('fToTxt').value = isoToTxt(todayISO);
  
  switchTab('all');
  loadInv();
});
</script>
</body>
