<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Operations Reports - Analysis</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0f1f3d;
      --navy2: #1a3260;
      --gold: #f5c842;
      --bg: #f0f4f8;
      --border: #dde4f0;
      --text: #1a2540;
      --gray-100: #f1f5f9;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); }
    
    .header {
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      color: white;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .header h2 { color: var(--gold); font-size: 18px; }
    .back-btn {
      background: transparent;
      border: 2px solid rgba(255,255,255,.3);
      color: white;
      padding: 6px 16px;
      border-radius: 40px;
      cursor: pointer;
    }
    
    .tabs {
      display: flex;
      gap: 4px;
      background: white;
      padding: 8px 16px;
      border-bottom: 2px solid var(--border);
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 8px 20px;
      border: none;
      background: var(--gray-100);
      cursor: pointer;
      border-radius: 30px;
      font-weight: 600;
    }
    .tab-btn.active {
      background: var(--navy);
      color: var(--gold);
    }
    
    .filter-bar {
      background: white;
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
      border-bottom: 1px solid var(--border);
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .filter-group label {
      font-size: 10px;
      font-weight: 700;
      color: #64748b;
    }
    .filter-group input, .filter-group select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      min-width: 130px;
    }
    .license-warning {
  background-color: #fef3c7;
  color: #d97706;
  font-weight: bold;
  border-radius: 4px;
}
    .btn-go, .btn-reset, .export-btn {
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      border: none;
    }
    .btn-go { background: var(--navy); color: var(--gold); }
    .btn-reset { background: var(--gray-100); border: 1px solid var(--border); }
    .export-btn { background: #16a34a; color: white; }
    
    .tbl-wrap {
      overflow-x: auto;
      padding: 16px;
      max-height: calc(100vh - 320px);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      min-width: 800px;
      background: white;
      border-radius: 12px;
      overflow: hidden;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    th {
      background: var(--navy);
      color: var(--gold);
      font-weight: 700;
      position: sticky;
      top: 0;
    }
    .loader { text-align: center; padding: 50px; }
    .spinner {
      width: 32px;
      height: 32px;
      border: 4px solid var(--border);
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .summary-card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin: 0 16px 16px 16px;
    }
    .summary-grid {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .summary-item {
      background: var(--gray-100);
      padding: 10px 16px;
      border-radius: 8px;
      min-width: 120px;
      text-align: center;
    }
    .summary-item .value {
      font-size: 20px;
      font-weight: 700;
      color: var(--navy);
    }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 12px;
      color: white;
      z-index: 1000;
    }
    .toast-success { background: #16a34a; }
    .toast-error { background: #dc2626; }
  </style>
</head>

<div id="summaryContainer" class="summary-card" style="display: none;"></div>
<div class="tbl-wrap" id="reportContainer"><div class="loader"><div class="spinner"></div>Loading...</div></div>

<script>
// ============================================================
// CONFIGURATION - تعمل مع GitHub Pages و Apps Script
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzjv8iFYX6vm_3hsbKEHWRLRhFoGISm6TSQcDINgkkff14yjpoBY-rYGCqJFlpF5u3g/exec';
let currentUser = null;
let currentTab = 'vehicles';
let allInvoices = [];

// ============================================================
// UTILITIES
// ============================================================
function showToast(msg, type) {
  let toast = document.querySelector('.toast');
  if (toast) toast.remove();
  toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function formatDateDDMMMYYYY(date) {
  if (!date) return '';
  const d = new Date(date);
  if (isNaN(d)) return date;
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return `${String(d.getDate()).padStart(2, '0')}/${months[d.getMonth()]}/${d.getFullYear()}`;
}

function parseDateFromString(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  return !isNaN(d) ? d : null;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function goBack() {
  window.history.back();
}

// ============================================================
// GET USER FROM URL (من OperationAccess)
// ============================================================
function getUserFromUrl() {
  const urlParams = new URLSearchParams(window.location.search);
  const userData = urlParams.get('user');
  if (userData) {
    try {
      return JSON.parse(decodeURIComponent(userData));
    } catch(e) {}
  }
  return null;
}

// ============================================================
// JSONP REQUEST (للاتصال بـ Apps Script من GitHub Pages)
// ============================================================
function jsonpRequest(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    if (currentUser?.centerName) params.centerName = currentUser.centerName;
    if (currentUser?.centerId) params.centerId = currentUser.centerId;
    params.action = action;
    params.callback = cbName;
    const qs = Object.entries(params).map(([k, v]) => k + '=' + encodeURIComponent(String(v ?? ''))).join('&');
    const url = GAS_URL + '?' + qs;
    const script = document.createElement('script');
    const timeout = setTimeout(() => { cleanup(); reject(new Error('Request timeout')); }, 30000);
    const cleanup = () => { clearTimeout(timeout); delete window[cbName]; script.remove(); };
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('Network error')); };
    script.src = url;
    document.head.appendChild(script);
  });
}

function gas(action, params = {}) {
  return jsonpRequest(action, params);
}

// ============================================================
// LOAD DATA
// ============================================================
async function loadInvoices() {
  try {
    const result = await gas('getAllInvoices', { includeCollection: 'true' });
    if (Array.isArray(result)) {
      allInvoices = result.filter(inv => {
        const state = (inv.State || inv.state || '').toLowerCase();
        return state === 'confirmed' || state === 'pending';
      });
      console.log(`✅ Loaded ${allInvoices.length} invoices`);
      return true;
    }
    return false;
  } catch(e) {
    console.error('loadInvoices error:', e);
    return false;
  }
}

async function getVehicleTripRecords(fromDate, toDate) {
  try {
    const result = await gas('getVehicleTripRecords', { fromDate, toDate });
    if (result?.success && Array.isArray(result.data)) return result.data;
    if (Array.isArray(result)) return result;
    return [];
  } catch(e) {
    console.error('getVehicleTripRecords error:', e);
    return [];
  }
}

async function getLogisticsRecords(fromDate, toDate) {
  try {
    const result = await gas('getLogisticsRecords', { fromDate, toDate });
    if (result?.success && Array.isArray(result.data)) return result.data;
    if (Array.isArray(result)) return result;
    return [];
  } catch(e) {
    console.error('getLogisticsRecords error:', e);
    return [];
  }
}

async function getVehicles() {
  try {
    const result = await gas('getVehicles');
    console.log('📊 getVehicles result:', result);
    if (Array.isArray(result)) {
      console.log('📊 Vehicles count:', result.length);
      if (result.length > 0) {
        console.log('📊 First vehicle sample:', {
          id: result[0].id,
          Type: result[0].Type,
          LicensePlate: result[0].LicensePlate,
          MonthlyFixedCost: result[0].MonthlyFixedCost
        });
      }
      return result;
    }
    return [];
  } catch(e) {
    console.error('getVehicles error:', e);
    return [];
  }
}
// ============================================================
// UPDATE SUMMARY FUNCTION
// ============================================================
function updateSummary(data, tab) {
  const summaryDiv = document.getElementById('summaryContainer');
  if (!data || !data.length) {
    summaryDiv.style.display = 'none';
    return;
  }
  
  summaryDiv.style.display = 'block';
  
  let totalRecords = data.length;
  let totalPassengers = 0;
  let totalTrips = 0;
  let totalCost = 0;
  
  if (tab === 'vehicles') {
    totalTrips = data.reduce((sum, r) => sum + (r.goCount + r.returnCount), 0);
    totalPassengers = data.reduce((sum, r) => sum + (r.totalPassengers || 0), 0);
    summaryDiv.innerHTML = `
      <div class="summary-title">📊 Summary</div>
      <div class="summary-grid">
        <div class="summary-item"><div class="label">Total Records</div><div class="value">${totalRecords}</div></div>
        <div class="summary-item"><div class="label">Total Vehicle Trips</div><div class="value">${totalTrips}</div></div>
        <div class="summary-item"><div class="label">Total Passengers</div><div class="value">${totalPassengers}</div></div>
      </div>
    `;
  } 
  else if (tab === 'logistics') {
    totalTrips = data.reduce((sum, r) => sum + (r.goCount + r.returnCount), 0);
    summaryDiv.innerHTML = `
      <div class="summary-title">📊 Summary</div>
      <div class="summary-grid">
        <div class="summary-item"><div class="label">Total Records</div><div class="value">${totalRecords}</div></div>
        <div class="summary-item"><div class="label">Total Logistics Trips</div><div class="value">${totalTrips}</div></div>
      </div>
    `;
  }
  else if (tab === 'cost') {
    totalCost = data.reduce((sum, r) => sum + (r.dailyCost || 0), 0);
    summaryDiv.innerHTML = `
      <div class="summary-title">📊 Summary</div>
      <div class="summary-grid">
        <div class="summary-item"><div class="label">Total Records</div><div class="value">${totalRecords}</div></div>
        <div class="summary-item"><div class="label">Total Daily Cost</div><div class="value">${totalCost.toFixed(2)}</div></div>
      </div>
    `;
  }
  else {
    summaryDiv.style.display = 'none';
  }
}
function getVehicleLicensePlate(vehicleId, vehicles) {
  const vehicle = vehicles.find(v => v.id === vehicleId);
  return vehicle?.licensePlate || vehicleId;
}

function calculatePassengerCount(invoice) {
  const adults = parseInt(invoice.sgl) || 0;
  const children = parseInt(invoice.dbl) || 0;
  const infants = parseInt(invoice.trpl) || 0;
  return { adults, children, infants, total: adults + children + infants };
}

// ============================================================
// VEHICLES REPORT
// ============================================================
async function generateVehiclesReport(invoices, fromDate, toDate, vehicles) {
  const tripRecords = await getVehicleTripRecords(fromDate, toDate);
  const vehiclesMap = new Map();
  
  for (const record of tripRecords) {
    const date = record.Date || record.date || '';
    const tripName = record.TripName || record.tripName || '';
    const vehicleId = record.VehicleID || record.vehicleId || '';
    const goCount = parseInt(record.GoCount || record.goCount || 0);
    const returnCount = parseInt(record.ReturnCount || record.returnCount || 0);
    if (!vehicleId) continue;
    const licensePlate = getVehicleLicensePlate(vehicleId, vehicles);
    const key = `${vehicleId}|${date}|${tripName}`;
    if (!vehiclesMap.has(key)) {
      vehiclesMap.set(key, { vehicleId, licensePlate, date, tripName, goCount: 0, returnCount: 0, adults: 0, children: 0, infants: 0, totalPassengers: 0, invoices: [] });
    }
    const record_data = vehiclesMap.get(key);
    record_data.goCount += goCount;
    record_data.returnCount += returnCount;
  }
  
  for (const inv of invoices) {
    const date = inv.activeDate || inv.ActiveDate || '';
    const tripName = inv.trip || inv.Trip || '';
    let vehiclesData = [];
    try { vehiclesData = JSON.parse(inv.VehiclesUsed || '[]'); } catch(e) {}
    for (const v of vehiclesData) {
      if (!v.vehicleId) continue;
      const key = `${v.vehicleId}|${date}|${tripName}`;
      if (vehiclesMap.has(key)) {
        const record = vehiclesMap.get(key);
        const passengers = calculatePassengerCount(inv);
        record.adults += passengers.adults;
        record.children += passengers.children;
        record.infants += passengers.infants;
        record.totalPassengers += passengers.total;
        if (!record.invoices.includes(inv.voucherNo)) record.invoices.push(inv.voucherNo);
      }
    }
  }
  
  return Array.from(vehiclesMap.values()).sort((a,b) => (parseDateFromString(a.date)?.getTime()||0) - (parseDateFromString(b.date)?.getTime()||0));
}
// ============================================================
// DAILY COST REPORT FUNCTIONS
// ============================================================

/**
 * حساب التكلفة اليومية للسيارة حسب القاعدة:
 * - إذا Go == Return: التكلفة = Go × RoundTripRate
 * - إذا Go > Return: التكلفة = Return × RoundTripRate + (Go - Return) × OneWayRate
 * - إذا Return > Go: التكلفة = Go × RoundTripRate + (Return - Go) × OneWayRate
 */
function calculateDailyCost(goCount, returnCount, roundTripRate, oneWayRate) {
  if (goCount === 0 && returnCount === 0) return 0;
  
  if (goCount === returnCount) {
    return goCount * roundTripRate;
  } else if (goCount > returnCount) {
    return returnCount * roundTripRate + (goCount - returnCount) * oneWayRate;
  } else {
    return goCount * roundTripRate + (returnCount - goCount) * oneWayRate;
  }
}

/**
 * حساب عدد أيام الشهر (للسيارات الإيجارية الشهرية)
 */
function getDaysInMonth(dateStr) {
  const date = new Date(dateStr);
  if (isNaN(date)) return 30;
  const year = date.getFullYear();
  const month = date.getMonth();
  return new Date(year, month + 1, 0).getDate();
}

/**
 * حساب التكلفة اليومية للسيارة الإيجارية الشهرية
 */
function calculateMonthlyRentalDailyCost(monthlyCost, dateStr) {
  const daysInMonth = getDaysInMonth(dateStr);
  return monthlyCost / daysInMonth;
}

/**
 * حساب الرصيد التراكمي لكل سيارة
 */
function calculateAccumulatedBalance(costData) {
  // costData: array of { vehicleId, date, dailyCost }
  const balanceMap = new Map(); // key: vehicleId, value: running total
  const result = [];
  
  // ترتيب حسب التاريخ أولاً
  costData.sort((a, b) => {
    const dateA = new Date(a.date);
    const dateB = new Date(b.date);
    return dateA - dateB;
  });
  
  for (const item of costData) {
    const vehicleId = item.vehicleId;
    const currentBalance = balanceMap.get(vehicleId) || 0;
    const newBalance = currentBalance + item.dailyCost;
    balanceMap.set(vehicleId, newBalance);
    result.push({
      ...item,
      accumulatedBalance: newBalance
    });
  }
  
  return result;
}

/**
 * جلب بيانات التكلفة اليومية
 */
async function generateDailyCostReport(fromDate, toDate) {
  // 1. جلب بيانات السيارات
  const vehicles = await getVehicles();
  if (!vehicles.length) {
    console.warn('No vehicles found');
    return [];
  }
  
  console.log('📊 Vehicles loaded:', vehicles.length);
  console.log('📊 First vehicle:', vehicles[0]);
  
  // 2. جلب بيانات التشغيلات
  const tripRecords = await getVehicleTripRecords(fromDate, toDate);
  console.log('📊 Trip records:', tripRecords.length);
  
  // 3. جلب بيانات سيارات العدّة (Logistics)
  const logisticsRecords = await getLogisticsRecords(fromDate, toDate);
  console.log('📊 Logistics records:', logisticsRecords.length);
  
  // 4. دمج جميع التشغيلات
  const allOperations = [...tripRecords, ...logisticsRecords];
  console.log('📊 Total operations:', allOperations.length);
  
  // 5. معالجة البيانات
  const costData = [];
  const vehicleMap = new Map();
  
  for (const vehicle of vehicles) {
    vehicleMap.set(vehicle.id, vehicle);
  }
  
  for (const op of allOperations) {
    const date = op.Date || op.date || '';
    const vehicleId = op.VehicleID || op.vehicleId || '';
    const goCount = parseInt(op.GoCount || op.goCount || 0);
    const returnCount = parseInt(op.ReturnCount || op.returnCount || 0);
    
    if (!date || !vehicleId) continue;
    if (goCount === 0 && returnCount === 0) continue;
    
    const vehicle = vehicleMap.get(vehicleId);
    if (!vehicle) {
      console.warn(`Vehicle not found: ${vehicleId}`);
      continue;
    }
    
    // تحديد نوع السيارة (مراعاة حالة الأحرف)
    const vehicleType = vehicle.Type || vehicle.type || 'owned';
    const usageType = vehicle.UsageType || vehicle.usageType || 'passengers';
    const monthlyCost = parseFloat(vehicle.MonthlyFixedCost || vehicle.monthlyFixedCost || 0);
    const dailyRate = parseFloat(vehicle.DailyRate || vehicle.dailyRate || 0);
    const roundTripRate = parseFloat(vehicle.RoundTripRate || vehicle.roundTripRate || 0);
    const oneWayRate = parseFloat(vehicle.OneWayRate || vehicle.oneWayRate || 0);
    
    let costSystem = '';
    let dailyCost = 0;
    let calculationMethod = '';
    
    // ✅ التصحيح: التحقق من نوع السيارة بشكل صحيح
    const isRental = (vehicleType === 'rental' || vehicleType === 'Rental');
    const isMonthlyRental = isRental && monthlyCost > 0 && usageType !== 'luggage';
    const isDailyRental = isRental && dailyRate > 0 && !isMonthlyRental;
    
    if (isMonthlyRental) {
      // سيارة إيجار شهري
      costSystem = 'إيجار شهري';
      dailyCost = calculateMonthlyRentalDailyCost(monthlyCost, date);
      calculationMethod = `${monthlyCost} ÷ ${getDaysInMonth(date)} = ${dailyCost.toFixed(2)}`;
      console.log(`💰 ${vehicleId}: Monthly rental - daily cost = ${dailyCost}`);
    } 
    else if (isDailyRental) {
      // سيارة إيجار يومي
      costSystem = 'إيجار يومي';
      dailyCost = dailyRate;
      calculationMethod = `سعر اليوم = ${dailyRate}`;
      console.log(`💰 ${vehicleId}: Daily rental - cost = ${dailyCost}`);
    }
    else {
      // سيارة تشغيلات
      costSystem = 'نظام التشغيلات';
      dailyCost = calculateDailyCost(goCount, returnCount, roundTripRate, oneWayRate);
      if (goCount === returnCount) {
        calculationMethod = `${goCount} × ${roundTripRate} = ${dailyCost}`;
      } else if (goCount > returnCount) {
        calculationMethod = `${returnCount} × ${roundTripRate} + ${goCount - returnCount} × ${oneWayRate} = ${dailyCost}`;
      } else {
        calculationMethod = `${goCount} × ${roundTripRate} + ${returnCount - goCount} × ${oneWayRate} = ${dailyCost}`;
      }
      console.log(`💰 ${vehicleId}: Trip-based - cost = ${dailyCost} (Go:${goCount}, Return:${returnCount})`);
    }
    
    // التحقق من صلاحية الرخصة
    let licenseStatus = '🟢 سارية';
    let licenseWarning = false;
    const licenseExpiry = vehicle.LicenseExpiry || vehicle.licenseExpiry;
    if (licenseExpiry) {
      const expiryDate = new Date(licenseExpiry);
      const today = new Date();
      const daysUntilExpiry = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));
      if (daysUntilExpiry <= 30 && daysUntilExpiry > 0) {
        licenseStatus = `🟡 تنتهي بعد ${daysUntilExpiry} يوم`;
        licenseWarning = true;
      } else if (daysUntilExpiry <= 0) {
        licenseStatus = '🔴 منتهية';
        licenseWarning = true;
      }
    }
    
    costData.push({
      date: formatDateDDMMMYYYY(date),
      dateObj: new Date(date),
      vehicleId: vehicleId,
      licensePlate: vehicle.LicensePlate || vehicle.licensePlate || vehicleId,
      type: vehicleType,
      usageType: usageType,
      driverName: vehicle.DriverName || vehicle.driverName || '—',
      monthlyFixedCost: monthlyCost,
      roundTripRate: roundTripRate,
      oneWayRate: oneWayRate,
      goCount: goCount,
      returnCount: returnCount,
      costSystem: costSystem,
      dailyCost: dailyCost,
      calculationMethod: calculationMethod,
      licenseStatus: licenseStatus,
      licenseWarning: licenseWarning,
      licenseExpiry: licenseExpiry || '—'
    });
  }
  
  console.log('📊 Cost data prepared:', costData.length);
  
  // حساب الرصيد التراكمي
  const resultWithBalance = calculateAccumulatedBalance(costData);
  
  // ترتيب حسب التاريخ ثم حسب التكلفة اليومية (تنازلياً)
  resultWithBalance.sort((a, b) => {
    const dateCompare = a.dateObj - b.dateObj;
    if (dateCompare !== 0) return dateCompare;
    return b.dailyCost - a.dailyCost;
  });
  
  return resultWithBalance;
}

async function generateLogisticsReport(fromDate, toDate, vehicles) {
  const records = await getLogisticsRecords(fromDate, toDate);
  const logisticsMap = new Map();
  for (const record of records) {
    const date = record.Date || record.date || '';
    const tripName = record.TripName || record.tripName || '';
    const vehicleId = record.VehicleID || record.vehicleId || '';
    const goCount = parseInt(record.GoCount || record.goCount || 0);
    const returnCount = parseInt(record.ReturnCount || record.returnCount || 0);
    if (!vehicleId) continue;
    const licensePlate = getVehicleLicensePlate(vehicleId, vehicles);
    const key = `${vehicleId}|${date}|${tripName}`;
    if (!logisticsMap.has(key)) {
      logisticsMap.set(key, { vehicleId, licensePlate, date, tripName, goCount: 0, returnCount: 0 });
    }
    const record_data = logisticsMap.get(key);
    record_data.goCount += goCount;
    record_data.returnCount += returnCount;
  }
  return Array.from(logisticsMap.values()).sort((a,b) => (parseDateFromString(a.date)?.getTime()||0) - (parseDateFromString(b.date)?.getTime()||0));
}

async function loadReport() {
  const container = document.getElementById('reportContainer');
  container.innerHTML = '<div class="loader"><div class="spinner"></div>Loading data...</div>';
  
  const fromDate = document.getElementById('filterFromDate').value;
  const toDate = document.getElementById('filterToDate').value;
  const vehicles = await getVehicles();
  let reportData = [];
  let html = '';
  
  try {
    // تقرير السيارات (ركاب)
    if (currentTab === 'vehicles') {
      reportData = await generateVehiclesReport(allInvoices, fromDate, toDate, vehicles);
      html = renderVehiclesTable(reportData);
      document.getElementById('vehicleFilterGroup').style.display = 'flex';
    }
    // تقرير سيارات العدّة (Logistics)
    else if (currentTab === 'logistics') {
      reportData = await generateLogisticsReport(fromDate, toDate, vehicles);
      html = renderLogisticsTable(reportData);
      document.getElementById('vehicleFilterGroup').style.display = 'flex';
    }
    // تقرير التكلفة اليومية
    else if (currentTab === 'cost') {
      reportData = await generateDailyCostReport(fromDate, toDate);
      html = renderDailyCostTable(reportData);
      document.getElementById('vehicleFilterGroup').style.display = 'flex';
    }
    // تقرير المراكب
    else if (currentTab === 'boats') {
      reportData = await generateBoatsReport(allInvoices);
      html = renderBoatsTable(reportData);
      document.getElementById('vehicleFilterGroup').style.display = 'none';
    }
    // تقرير المدربين
    else if (currentTab === 'instructors') {
      reportData = await generateInstructorsReport(allInvoices);
      html = renderInstructorsTable(reportData);
      document.getElementById('vehicleFilterGroup').style.display = 'none';
    }
    // تقرير العملاء
    else if (currentTab === 'customers') {
      reportData = await generateCustomersReport(allInvoices);
      html = renderCustomersTable(reportData);
      document.getElementById('vehicleFilterGroup').style.display = 'none';
    }
    // تبويب غير معروف
    else {
      html = '<div class="loader">⚠️ Unknown report type: ' + escapeHtml(currentTab) + '</div>';
      document.getElementById('vehicleFilterGroup').style.display = 'none';
    }
    
    container.innerHTML = html;
    
    // ✅ تحديث الملخص (بعد التأكد من وجود reportData)
    if (reportData && reportData.length > 0) {
      updateSummary(reportData, currentTab);
    } else {
      document.getElementById('summaryContainer').style.display = 'none';
    }
    
  } catch(e) {
    console.error('loadReport error:', e);
    container.innerHTML = `<div class="loader">❌ Error: ${escapeHtml(e.message)}</div>`;
    document.getElementById('summaryContainer').style.display = 'none';
  }
}
  
function resetFilters() {
  const today = new Date();
  const weekAgo = new Date();
  weekAgo.setDate(today.getDate() - 7);
  document.getElementById('filterFromDate').value = `${weekAgo.getFullYear()}-${String(weekAgo.getMonth()+1).padStart(2,'0')}-${String(weekAgo.getDate()).padStart(2,'0')}`;
  document.getElementById('filterToDate').value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

async function generateInstructorsReport(invoices) {
  const instructorsMap = new Map();
  
  for (const inv of invoices) {
    const date = inv.activeDate || inv.ActiveDate || '';
    const tripName = inv.trip || inv.Trip || '';
    
    let execInstructors = [];
    try { execInstructors = JSON.parse(inv.InstructorsExecution || '[]'); } catch(e) {}
    
    for (const inst of execInstructors) {
      if (!inst.instructorId) continue;
      
      if (!instructorsMap.has(inst.instructorId)) {
        instructorsMap.set(inst.instructorId, {
          instructorId: inst.instructorId,
          name: inst.instructorName || inst.instructorId,
          activities: [],
          upSellTotal: 0,
          upSellCount: 0
        });
      }
      
      const instructor = instructorsMap.get(inst.instructorId);
      
      if (inst.activities && inst.activities.length > 0) {
        for (const act of inst.activities) {
          instructor.activities.push({
            date: date,
            tripName: tripName,
            activityName: act.displayName || act.activityName,
            quantity: act.quantity || 0,
            voucherNo: inv.voucherNo
          });
        }
      } else {
        if (inst.diver) instructor.activities.push({ date, tripName, activityName: 'Diver', quantity: inst.diver, voucherNo: inv.voucherNo });
        if (inst.course) instructor.activities.push({ date, tripName, activityName: 'Course', quantity: inst.course, voucherNo: inv.voucherNo });
        if (inst.intro) instructor.activities.push({ date, tripName, activityName: 'Intro', quantity: inst.intro, voucherNo: inv.voucherNo });
      }
    }
    
    let upSellData = [];
    try { upSellData = JSON.parse(inv.InstructorsUpSell || '[]'); } catch(e) {}
    
    for (const upsell of upSellData) {
      if (upsell.instructorId) {
        if (!instructorsMap.has(upsell.instructorId)) {
          instructorsMap.set(upsell.instructorId, {
            instructorId: upsell.instructorId,
            name: upsell.instructorName || upsell.instructorId,
            activities: [],
            upSellTotal: 0,
            upSellCount: 0
          });
        }
        const instructor = instructorsMap.get(upsell.instructorId);
        instructor.upSellTotal += upsell.totalAmount || 0;
        instructor.upSellCount++;
      }
    }
  }
  
  const reportData = [];
  for (const instructor of instructorsMap.values()) {
    for (const activity of instructor.activities) {
      reportData.push({
        instructorId: instructor.instructorId,
        instructorName: instructor.name,
        date: activity.date,
        tripName: activity.tripName,
        activityName: activity.activityName,
        quantity: activity.quantity,
        voucherNo: activity.voucherNo,
        upSellTotal: instructor.upSellTotal,
        upSellCount: instructor.upSellCount
      });
    }
    if (instructor.activities.length === 0 && instructor.upSellTotal > 0) {
      reportData.push({
        instructorId: instructor.instructorId,
        instructorName: instructor.name,
        date: '—',
        tripName: '—',
        activityName: '💰 UpSell Only',
        quantity: 0,
        voucherNo: '',
        upSellTotal: instructor.upSellTotal,
        upSellCount: instructor.upSellCount
      });
    }
  }
  
  reportData.sort((a, b) => {
    const dateA = parseDateFromString(a.date)?.getTime() || 0;
    const dateB = parseDateFromString(b.date)?.getTime() || 0;
    return dateB - dateA;
  });
  
  return reportData;
}

async function generateBoatsReport(invoices) {
  const boatsMap = new Map();
  
  for (const inv of invoices) {

    const tripName = inv.trip || inv.Trip || '';
    let boatsData = [];

    for (const b of boatsData) {

      const passengers = calculatePassengerCount(inv);
      const key = `${b.boatId}|${date}|${tripName}`;
      
      if (!boatsMap.has(key)) {
        boatsMap.set(key, {
          boatId: b.boatId,
          boatName: b.boatName || b.boatId,
          date: date,
          tripName: tripName,
          adults: 0,
          children: 0,
          infants: 0,
          totalPassengers: 0,
          invoices: []
        });
      }
      const record = boatsMap.get(key);
      record.adults += passengers.adults;
      record.children += passengers.children;
      record.infants += passengers.infants;
      record.totalPassengers += passengers.total;
      if (!record.invoices.includes(inv.voucherNo)) record.invoices.push(inv.voucherNo);
    }
  }
  
  const reportData = Array.from(boatsMap.values());
  reportData.sort((a, b) => {
    const dateA = parseDateFromString(a.date)?.getTime() || 0;
    const dateB = parseDateFromString(b.date)?.getTime() || 0;
    return dateA - dateB;
  });
  
  return reportData;

document.addEventListener('DOMContentLoaded', async () => {
  let user = getUserFromUrl();
  if (!user) {
    const storedUser = localStorage.getItem('currentUser');
    if (storedUser) try { user = JSON.parse(storedUser); } catch(e) {}
  }
  if (!user) {
    const sessionUser = sessionStorage.getItem('currentUser');
    if (sessionUser) try { user = JSON.parse(sessionUser); } catch(e) {}
  }
  if (!user) {
    showToast('⚠️ Please login first', 'error');
    document.getElementById('reportContainer').innerHTML = '<div class="loader">❌ Please login from OperationAccess first</div>';
    document.getElementById('centerName').textContent = 'Not logged in';
    return;
  }
  currentUser = user;
  document.getElementById('centerName').textContent = currentUser.centerName || currentUser.name || '';
  const today = new Date();
  const weekAgo = new Date();
  weekAgo.setDate(today.getDate() - 7);
  document.getElementById('filterFromDate').value = `${weekAgo.getFullYear()}-${String(weekAgo.getMonth()+1).padStart(2,'0')}-${String(weekAgo.getDate()).padStart(2,'0')}`;
  document.getElementById('filterToDate').value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  await loadInvoices();
  await loadReport();
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTab = btn.dataset.tab;
      loadReport();
    });
  });
});
</script>
</body>
</html>
