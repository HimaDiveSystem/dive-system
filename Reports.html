<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Operations Reports - Analysis</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0f1f3d;
      --navy2: #1a3260;
      --gold: #f5c842;
      --gold2: #e6b800;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #ea580c;
      --purple: #7c3aed;
      --bg: #f0f4f8;
      --card: #fff;
      --border: #dde4f0;
      --text: #1a2540;
      --text-lt: #5a6a8a;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-500: #64748b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    .header {
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      color: white;
      padding: 12px 20px;
      display: flex;
    justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h2 { color: var(--gold); font-size: 20px; font-weight: 900; }
    .back-btn {
      background: transparent;
      border: 2px solid rgba(255,255,255,.3);
      color: white;
      padding: 6px 16px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 700;
    }
    .back-btn:hover { border-color: var(--gold); color: var(--gold); }
    
    .tabs {
      display: flex;
      gap: 4px;
      background: white;
      padding: 8px 16px;
      border-bottom: 2px solid var(--border);
      flex-wrap: wrap;
      position: sticky;
      top: 60px;
      z-index: 99;
    }
    .tab-btn {
      padding: 8px 20px;
      border: none;
      background: var(--gray-100);
      cursor: pointer;
      border-radius: 30px;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--navy);
      color: var(--gold);
    }
    
    .filter-bar {
      background: white;
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 110px;
      z-index: 98;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .filter-group label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-lt);
      text-transform: uppercase;
    }
    .filter-group input, .filter-group select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-family: 'Cairo', sans-serif;
      min-width: 130px;
      background: white;
    }
    .filter-group input:focus, .filter-group select:focus {
      outline: none;
      border-color: var(--blue);
    }
    .btn-go, .btn-reset, .export-btn {
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      border: none;
    }
    .btn-go { background: var(--navy); color: var(--gold); }
    .btn-reset { background: var(--gray-200); border: 1px solid var(--border); }
    .export-btn { background: var(--green); color: white; }
    
    .tbl-wrap {
      overflow-x: auto;
      padding: 16px;
      max-height: calc(100vh - 280px);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      min-width: 1000px;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    th {
      background: var(--navy);
      color: var(--gold);
      font-weight: 700;
      position: sticky;
      top: 0;
    }
    tr:hover { background: var(--gray-50); }
    
    .loader { text-align: center; padding: 50px; color: var(--text-lt); }
    .spinner {
      width: 32px;
      height: 32px;
      border: 4px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .summary-card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin: 0 16px 16px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
    }
    .summary-title {
      font-weight: 700;
      font-size: 14px;
      color: var(--navy);
      margin-bottom: 12px;
      border-right: 4px solid var(--gold);
      padding-right: 12px;
    }
    .summary-grid {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .summary-item {
      background: var(--gray-50);
      padding: 10px 16px;
      border-radius: 8px;
      min-width: 120px;
      text-align: center;
    }
    .summary-item .label {
      font-size: 10px;
      color: var(--text-lt);
    }
    .summary-item .value {
      font-size: 20px;
      font-weight: 700;
      color: var(--navy);
    }
    
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      color: white;
      z-index: 1000;
      transform: translateY(50px);
      opacity: 0;
      transition: 0.3s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast-success { background: var(--green); }
    .toast-error { background: var(--red); }
    .toast-info { background: var(--blue); }
    
    @media (max-width: 768px) {
      th, td { padding: 6px 4px; font-size: 10px; }
      .filter-group input, .filter-group select { min-width: 100px; font-size: 10px; }
      .summary-item .value { font-size: 16px; }
    }
    
    /* تنسيق البحث التلقائي */
    .search-highlight {
      background-color: var(--gold);
      color: var(--navy);
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="header">
  <h2>📊 Operations Reports - <span id="centerName">Loading...</span></h2>
  <button class="back-btn" onclick="goBack()">← Back</button>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="vehicles">🚗 Vehicles Report</button>
  <button class="tab-btn" data-tab="boats">⛵ Boats Report</button>
  <button class="tab-btn" data-tab="instructors">👨‍🏫 Instructors Report</button>
  <button class="tab-btn" data-tab="customers">👥 Customers Report</button>
</div>

<div class="filter-bar">
  <div class="filter-group">
    <label>📅 From Date</label>
    <input type="date" id="filterFromDate" onchange="onFilterChange()">
  </div>
  <div class="filter-group">
    <label>📅 To Date</label>
    <input type="date" id="filterToDate" onchange="onFilterChange()">
  </div>
  <div class="filter-group">
    <label>🚌 Trip</label>
    <select id="filterTrip" onchange="onFilterChange()">
      <option value="">All Trips</option>
    </select>
  </div>
  <div class="filter-group" id="vehicleFilterGroup" style="display: none;">
    <label>🚗 Vehicle</label>
    <select id="filterVehicle" onchange="onFilterChange()">
      <option value="">All Vehicles</option>
    </select>
  </div>
  <div class="filter-group">
    <label>🔍 Search</label>
    <input type="text" id="filterSearch" placeholder="Voucher / Guest / Vehicle" oninput="onSearchInput()">
  </div>
  <button class="btn-go" onclick="loadReport()">📊 Show Report</button>
  <button class="btn-reset" onclick="resetFilters()">Reset</button>
  <button class="export-btn" onclick="exportToExcel()">📎 Export Excel</button>
</div>

<div id="summaryContainer" class="summary-card" style="display: none;"></div>

<div class="tbl-wrap" id="reportContainer">
  <div class="loader"><div class="spinner"></div>Loading reports...</div>
</div>

<script>
// ============================================================
// CONFIGURATION
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzjv8iFYX6vm_3hsbKEHWRLRhFoGISm6TSQcDINgkkff14yjpoBY-rYGCqJFlpF5u3g/exec';
let currentUser = null;
let currentTab = 'vehicles';
let allInvoices = [];
let filteredInvoices = [];
let uniqueTrips = [];
let uniqueVehicles = [];
let cachedVehicles = [];

// ============================================================
// UTILITIES
// ============================================================
function showToast(msg, type) {
  let toast = document.querySelector('.toast');
  if (toast) toast.remove();
  toast = document.createElement('div');
  toast.className = `toast toast-${type} show`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function jsonpRequest(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    if (currentUser?.centerName) params.centerName = currentUser.centerName;
    if (currentUser?.centerId) params.centerId = currentUser.centerId;
    params.action = action;
    params.callback = cbName;
    const qs = Object.entries(params).map(([k, v]) => k + '=' + encodeURIComponent(String(v ?? ''))).join('&');
    const url = GAS_URL + '?' + qs;
    const script = document.createElement('script');
    const timeout = setTimeout(() => { cleanup(); reject(new Error('Request timeout')); }, 45000);
    const cleanup = () => { clearTimeout(timeout); delete window[cbName]; script.remove(); };
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('Network error')); };
    script.src = url;
    document.head.appendChild(script);
  });
}

function gas(action, params = {}) {
  return jsonpRequest(action, params);
}

function formatDateDDMMMYYYY(date) {
  if (!date) return '';
  const d = new Date(date);
  if (isNaN(d)) return date;
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return `${String(d.getDate()).padStart(2, '0')}/${months[d.getMonth()]}/${d.getFullYear()}`;
}

function parseDateFromString(dateStr) {
  if (!dateStr) return null;
  if (dateStr instanceof Date && !isNaN(dateStr)) return dateStr;
  const s = dateStr.toString().trim();
  const match = s.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
  if (match) {
    const months = { Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11 };
    return new Date(parseInt(match[3]), months[match[2]], parseInt(match[1]));
  }
  const d = new Date(s);
  return !isNaN(d) ? d : null;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function goBack() {
  if (window.history.length > 1) window.history.back();
  else window.location.href = 'Dashboard.html';
}

// ============================================================
// PASSENGER COUNT CALCULATION (CORRECTED)
// ============================================================
function calculatePassengerCount(invoice) {
  const activitiesText = invoice.activitiesText || '';
  const hasAdultChildInfant = /adult|child|infant/i.test(activitiesText);
  
  if (hasAdultChildInfant) {
    // استخراج الأعداد من النص
    const adultMatch = activitiesText.match(/adult[×x](\d+)/i);
    const childMatch = activitiesText.match(/child[×x](\d+)/i);
    const infantMatch = activitiesText.match(/infant[×x](\d+)/i);
    
    const adults = adultMatch ? parseInt(adultMatch[1]) : 0;
    const children = childMatch ? parseInt(childMatch[1]) : 0;
    const infants = infantMatch ? parseInt(infantMatch[1]) : 0;
    
    return { adults, children, infants, total: adults + children + infants };
  } else {
    // نشاط غوص عادي: كل عمود يمثل عدد أفراد حقيقي (ليس فيه ضرب)
    const adults = parseInt(invoice.sgl) || 0;
    const children = parseInt(invoice.dbl) || 0;
    const infants = parseInt(invoice.trpl) || 0;
    
    return { adults, children, infants, total: adults + children + infants };
  }
}

// ============================================================
// LOAD INVOICES AND VEHICLES
// ============================================================
async function loadInvoices() {
  try {
    showToast('جاري تحميل الفواتير...', 'info');
    
    const result = await gas('getAllInvoices', { includeCollection: 'true', centerName: currentUser?.centerName });
    
    if (Array.isArray(result)) {
      allInvoices = result.filter(inv => {
        const state = (inv.State || inv.state || '').toLowerCase();
        return state === 'confirmed' || state === 'pending';
      });
      
      console.log(`✅ Loaded ${allInvoices.length} invoices`);
      return true;
    }
    return false;
  } catch(e) {
    console.error('loadInvoices error:', e);
    showToast('Error loading invoices: ' + e.message, 'error');
    return false;
  }
}

async function loadVehicles() {
  try {
    const result = await gas('getVehicles', { centerName: currentUser?.centerName });
    if (Array.isArray(result)) {
      cachedVehicles = result;
      console.log(`✅ Loaded ${cachedVehicles.length} vehicles`);
      
      // تحديث قائمة السيارات في الفلتر
      uniqueVehicles = cachedVehicles.filter(v => v.isActive).map(v => ({
        id: v.id,
        licensePlate: v.licensePlate || v.id
      }));
      
      const vehicleSelect = document.getElementById('filterVehicle');
      if (vehicleSelect) {
        vehicleSelect.innerHTML = '<option value="">All Vehicles</option>';
        uniqueVehicles.forEach(v => {
          const option = document.createElement('option');
          option.value = v.id;
          option.textContent = `${v.licensePlate} (${v.id})`;
          vehicleSelect.appendChild(option);
        });
      }
    }
  } catch(e) {
    console.warn('loadVehicles error:', e);
  }
}

function getVehicleLicensePlate(vehicleId) {
  const vehicle = cachedVehicles.find(v => v.id === vehicleId);
  return vehicle?.licensePlate || vehicleId;
}

// ============================================================
// FILTER FUNCTIONS
// ============================================================
function applyDateFilters() {
  const fromDate = document.getElementById('filterFromDate').value;
  const toDate = document.getElementById('filterToDate').value;
  const selectedTrip = document.getElementById('filterTrip').value;
  const selectedVehicle = document.getElementById('filterVehicle')?.value || '';
  const searchText = document.getElementById('filterSearch').value.toLowerCase();
  
  let fromDateObj = null, toDateObj = null;
  if (fromDate) { fromDateObj = new Date(fromDate); fromDateObj.setHours(0,0,0,0); }
  if (toDate) { toDateObj = new Date(toDate); toDateObj.setHours(23,59,59,999); }
  
  let filtered = [...allInvoices];
  
  // فلترة حسب التاريخ
  filtered = filtered.filter(inv => {
    const activeDate = inv.activeDate || inv.ActiveDate || '';
    const parsedDate = parseDateFromString(activeDate);
    if (fromDateObj && parsedDate && parsedDate < fromDateObj) return false;
    if (toDateObj && parsedDate && parsedDate > toDateObj) return false;
    return true;
  });
  
  // فلترة حسب الرحلة
  if (selectedTrip) {
    filtered = filtered.filter(inv => (inv.trip || inv.Trip) === selectedTrip);
  }
  
  // فلترة حسب البحث
  if (searchText) {
    filtered = filtered.filter(inv => {
      const voucher = (inv.voucherNo || '').toLowerCase();
      const guest = (inv.guestName || '').toLowerCase();
      return voucher.includes(searchText) || guest.includes(searchText);
    });
  }
  
  // تحديث قائمة الرحلات المتاحة (للفلتر)
  updateTripFilter(filtered);
  
  // فلترة حسب السيارة (لتقرير السيارات فقط)
  if (currentTab === 'vehicles' && selectedVehicle) {
    filtered = filtered.filter(inv => {
      let vehiclesData = [];
      try { vehiclesData = JSON.parse(inv.VehiclesUsed || '[]'); } catch(e) {}
      return vehiclesData.some(v => v.vehicleId === selectedVehicle);
    });
  }
  
  return filtered;
}

function updateTripFilter(invoices) {
  const tripsSet = new Set();
  invoices.forEach(inv => {
    const trip = inv.trip || inv.Trip;
    if (trip) tripsSet.add(trip);
  });
  
  const sortedTrips = Array.from(tripsSet).sort();
  const tripSelect = document.getElementById('filterTrip');
  const currentValue = tripSelect.value;
  
  tripSelect.innerHTML = '<option value="">All Trips</option>';
  sortedTrips.forEach(trip => {
    const option = document.createElement('option');
    option.value = trip;
    option.textContent = trip;
    if (currentValue === trip) option.selected = true;
    tripSelect.appendChild(option);
  });
}

function onFilterChange() {
  // سيتم تحديث البيانات عند الضغط على Show Report
}

function onSearchInput() {
  // بحث تلقائي أثناء الكتابة
  clearTimeout(window.searchTimeout);
  window.searchTimeout = setTimeout(() => {
    loadReport();
  }, 500);
}

async function loadReport() {
  const container = document.getElementById('reportContainer');
  container.innerHTML = '<div class="loader"><div class="spinner"></div>Loading report data...</div>';
  
  filteredInvoices = applyDateFilters();
  
  if (filteredInvoices.length === 0) {
    container.innerHTML = '<div class="loader">⚠️ No invoices found for selected period</div>';
    document.getElementById('summaryContainer').style.display = 'none';
    return;
  }
  
  let reportData = [];
  let html = '';
  
  try {
    if (currentTab === 'vehicles') {
      reportData = await generateVehiclesReport(filteredInvoices);
      html = renderVehiclesTable(reportData);
      document.getElementById('vehicleFilterGroup').style.display = 'flex';
    } else if (currentTab === 'boats') {
      reportData = await generateBoatsReport(filteredInvoices);
      html = renderBoatsTable(reportData);
      document.getElementById('vehicleFilterGroup').style.display = 'none';
    } else if (currentTab === 'instructors') {
      reportData = await generateInstructorsReport(filteredInvoices);
      html = renderInstructorsTable(reportData);
      document.getElementById('vehicleFilterGroup').style.display = 'none';
    } else if (currentTab === 'customers') {
      reportData = await generateCustomersReport(filteredInvoices);
      html = renderCustomersTable(reportData);
      document.getElementById('vehicleFilterGroup').style.display = 'none';
    }
    
    updateSummary(reportData, currentTab);
    container.innerHTML = html;
    
  } catch(e) {
    console.error('loadReport error:', e);
    container.innerHTML = `<div class="loader">❌ Error: ${e.message}</div>`;
  }
}

// ============================================================
// VEHICLES REPORT (CORRECTED)
// ============================================================
async function generateVehiclesReport(invoices) {
  const vehiclesMap = new Map();
  
  for (const inv of invoices) {
    const date = inv.activeDate || inv.ActiveDate || '';
    const tripName = inv.trip || inv.Trip || '';
    let vehiclesData = [];
    try {
      vehiclesData = JSON.parse(inv.VehiclesUsed || '[]');
    } catch(e) {}
    
    for (const v of vehiclesData) {
      if (!v.vehicleId) continue;
      
      const licensePlate = getVehicleLicensePlate(v.vehicleId);
      const passengers = calculatePassengerCount(inv);
      
      const key = `${v.vehicleId}|${date}|${tripName}`;
      if (!vehiclesMap.has(key)) {
        vehiclesMap.set(key, {
          vehicleId: v.vehicleId,
          licensePlate: licensePlate,
          date: date,
          tripName: tripName,
          goCount: 0,
          returnCount: 0,
          adults: 0,
          children: 0,
          infants: 0,
          totalPassengers: 0,
          invoices: []
        });
      }
      
      const record = vehiclesMap.get(key);
      record.goCount += v.goCount || 0;
      record.returnCount += v.returnCount || 0;
      record.adults += passengers.adults;
      record.children += passengers.children;
      record.infants += passengers.infants;
      record.totalPassengers += passengers.total;
      if (!record.invoices.includes(inv.voucherNo)) {
        record.invoices.push(inv.voucherNo);
      }
    }
  }
  
  const reportData = Array.from(vehiclesMap.values());
  reportData.sort((a, b) => {
    const dateA = parseDateFromString(a.date)?.getTime() || 0;
    const dateB = parseDateFromString(b.date)?.getTime() || 0;
    return dateA - dateB;
  });
  
  return reportData;
}

function renderVehiclesTable(data) {
  if (!data.length) {
    return '<div class="loader">🚫 No vehicle data found for selected period</div>';
  }
  
  let html = `</table>
    <thead>
      <tr>
        <th>Date</th><th>Vehicle ID</th><th>License Plate</th><th>Trip</th>
        <th>🔄 Go</th><th>🔙 Return</th><th>Total Trips</th>
        <th>👤 Adults</th><th>👶 Children</th><th>🍼 Infants</th><th>Total Pax</th>
        <th>Invoices</th>
      </tr>
    </thead>
    <tbody>
  `;
  
  let totalGo = 0, totalReturn = 0, totalTrips = 0, totalAdults = 0, totalChildren = 0, totalInfants = 0, totalPassengers = 0;
  
  for (const row of data) {
    totalGo += row.goCount;
    totalReturn += row.returnCount;
    totalTrips += (row.goCount + row.returnCount);
    totalAdults += row.adults;
    totalChildren += row.children;
    totalInfants += row.infants;
    totalPassengers += row.totalPassengers;
    
    html += `<tr>
      <td>${escapeHtml(row.date)}</td>
      <td>${escapeHtml(row.vehicleId)}</td>
      <td><strong>${escapeHtml(row.licensePlate)}</strong></td>
      <td>${escapeHtml(row.tripName)}</td>
      <td>${row.goCount || '—'}</td>
      <td>${row.returnCount || '—'}</td>
      <td><strong>${row.goCount + row.returnCount}</strong></td>
      <td>${row.adults || '—'}</td>
      <td>${row.children || '—'}</td>
      <td>${row.infants || '—'}</td>
      <td><strong>${row.totalPassengers}</strong></td>
      <td style="font-size:9px;">${escapeHtml(row.invoices.join(', '))}</td>
    </tr>`;
  }
  
  html += `<tr style="background: var(--gray-100); font-weight: bold;">
    <td colspan="4">TOTAL</td>
    <td>${totalGo}</td><td>${totalReturn}</td><td>${totalTrips}</td>
    <td>${totalAdults}</td><td>${totalChildren}</td><td>${totalInfants}</td>
    <td>${totalPassengers}</td><td></td>
  </tr>`;
  
  html += '</tbody>}</div>';
  return html;
}

// ============================================================
// BOATS REPORT
// ============================================================
async function generateBoatsReport(invoices) {
  const boatsMap = new Map();
  
  for (const inv of invoices) {
    const date = inv.activeDate || inv.ActiveDate || '';
    const tripName = inv.trip || inv.Trip || '';
    let boatsData = [];
    try {
      boatsData = JSON.parse(inv.BoatsUsed || '[]');
    } catch(e) {}
    
    for (const b of boatsData) {
      if (!b.boatId) continue;
      
      const passengers = calculatePassengerCount(inv);
      
      const key = `${b.boatId}|${date}|${tripName}`;
      if (!boatsMap.has(key)) {
        boatsMap.set(key, {
          boatId: b.boatId,
          boatName: b.boatName || b.boatId,
          date: date,
          tripName: tripName,
          adults: 0,
          children: 0,
          infants: 0,
          totalPassengers: 0,
          invoices: []
        });
      }
      
      const record = boatsMap.get(key);
      record.adults += passengers.adults;
      record.children += passengers.children;
      record.infants += passengers.infants;
      record.totalPassengers += passengers.total;
      if (!record.invoices.includes(inv.voucherNo)) {
        record.invoices.push(inv.voucherNo);
      }
    }
  }
  
  const reportData = Array.from(boatsMap.values());
  reportData.sort((a, b) => {
    const dateA = parseDateFromString(a.date)?.getTime() || 0;
    const dateB = parseDateFromString(b.date)?.getTime() || 0;
    return dateA - dateB;
  });
  
  return reportData;
}

function renderBoatsTable(data) {
  if (!data.length) {
    return '<div class="loader">🚫 No boat data found for selected period</div>';
  }
  
  let html = `<table>
    <thead><tr>
      <th>Date</th><th>Boat ID</th><th>Boat Name</th><th>Trip</th>
      <th>👤 Adults</th><th>👶 Children</th><th>🍼 Infants</th><th>Total Pax</th>
      <th>Invoices</th>
    </tr></thead><tbody>
  `;
  
  let totalAdults = 0, totalChildren = 0, totalInfants = 0, totalPassengers = 0;
  
  for (const row of data) {
    totalAdults += row.adults;
    totalChildren += row.children;
    totalInfants += row.infants;
    totalPassengers += row.totalPassengers;
    
    html += `<tr>
      <td>${escapeHtml(row.date)}</td>
      <td>${escapeHtml(row.boatId)}</td>
      <td><strong>${escapeHtml(row.boatName)}</strong></td>
      <td>${escapeHtml(row.tripName)}</td>
      <td>${row.adults || '—'}</td>
      <td>${row.children || '—'}</td>
      <td>${row.infants || '—'}</td>
      <td><strong>${row.totalPassengers}</strong></td>
      <td style="font-size:9px;">${escapeHtml(row.invoices.join(', '))}</td>
    </tr>`;
  }
  
  html += `<tr style="background: var(--gray-100); font-weight: bold;">
    <td colspan="4">TOTAL</td>
    <td>${totalAdults}</td><td>${totalChildren}</td><td>${totalInfants}</td>
    <td>${totalPassengers}</td><td></td>
  </tr></tbody></table>`;
  
  return html;
}

// ============================================================
// INSTRUCTORS REPORT
// ============================================================
async function generateInstructorsReport(invoices) {
  const instructorsMap = new Map();
  
  for (const inv of invoices) {
    const date = inv.activeDate || inv.ActiveDate || '';
    const tripName = inv.trip || inv.Trip || '';
    
    // قراءة المدربين المنفذين
    let execInstructors = [];
    try {
      execInstructors = JSON.parse(inv.InstructorsExecution || '[]');
    } catch(e) {}
    
    for (const inst of execInstructors) {
      if (!inst.instructorId) continue;
      
      if (!instructorsMap.has(inst.instructorId)) {
        instructorsMap.set(inst.instructorId, {
          instructorId: inst.instructorId,
          name: inst.instructorName || inst.instructorId,
          activities: [],
          upSellTotal: 0,
          upSellCount: 0
        });
      }
      
      const instructor = instructorsMap.get(inst.instructorId);
      
      if (inst.activities && inst.activities.length > 0) {
        for (const act of inst.activities) {
          instructor.activities.push({
            date: date,
            tripName: tripName,
            activityName: act.displayName || act.activityName,
            quantity: act.quantity || 0,
            voucherNo: inv.voucherNo
          });
        }
      } else {
        // صيغة قديمة
        const activities = [
          { name: 'Diver', qty: inst.diver || 0 },
          { name: 'Course', qty: inst.course || 0 },
          { name: 'Intro', qty: inst.intro || 0 }
        ];
        for (const act of activities) {
          if (act.qty > 0) {
            instructor.activities.push({
              date: date,
              tripName: tripName,
              activityName: act.name,
              quantity: act.qty,
              voucherNo: inv.voucherNo
            });
          }
        }
      }
    }
    
    // قراءة UpSell
    let upSellData = [];
    try {
      upSellData = JSON.parse(inv.InstructorsUpSell || '[]');
    } catch(e) {}
    
    for (const upsell of upSellData) {
      if (upsell.instructorId) {
        if (!instructorsMap.has(upsell.instructorId)) {
          instructorsMap.set(upsell.instructorId, {
            instructorId: upsell.instructorId,
            name: upsell.instructorName || upsell.instructorId,
            activities: [],
            upSellTotal: 0,
            upSellCount: 0
          });
        }
        const instructor = instructorsMap.get(upsell.instructorId);
        instructor.upSellTotal += upsell.totalAmount || 0;
        instructor.upSellCount++;
      }
    }
  }
  
  const reportData = [];
  for (const instructor of instructorsMap.values()) {
    for (const activity of instructor.activities) {
      reportData.push({
        instructorId: instructor.instructorId,
        instructorName: instructor.name,
        date: activity.date,
        tripName: activity.tripName,
        activityName: activity.activityName,
        quantity: activity.quantity,
        voucherNo: activity.voucherNo,
        upSellTotal: instructor.upSellTotal,
        upSellCount: instructor.upSellCount
      });
    }
    if (instructor.activities.length === 0 && instructor.upSellTotal > 0) {
      reportData.push({
        instructorId: instructor.instructorId,
        instructorName: instructor.name,
        date: '—',
        tripName: '—',
        activityName: '💰 UpSell Only',
        quantity: 0,
        voucherNo: '',
        upSellTotal: instructor.upSellTotal,
        upSellCount: instructor.upSellCount
      });
    }
  }
  
  reportData.sort((a, b) => {
    const dateA = parseDateFromString(a.date)?.getTime() || 0;
    const dateB = parseDateFromString(b.date)?.getTime() || 0;
    return dateB - dateA;
  });
  
  return reportData;
}

function renderInstructorsTable(data) {
  if (!data.length) {
    return '<div class="loader">🚫 No instructor data found for selected period</div>';
  }
  
  let html = `<table>
    <thead><tr>
      <th>Date</th><th>Instructor</th><th>Trip</th>
      <th>Activity</th><th>Quantity</th>
      <th>💰 UpSell Total</th><th>UpSell Count</th>
      <th>Voucher</th>
    </tr></thead><tbody>
  `;
  
  let totalUpSell = 0;
  
  for (const row of data) {
    totalUpSell += row.upSellTotal;
    
    html += `<tr>
      <td>${escapeHtml(row.date)}</td>
      <td><strong>${escapeHtml(row.instructorName)}</strong><br><span style="font-size:9px;">${escapeHtml(row.instructorId)}</span></td>
      <td>${escapeHtml(row.tripName)}</td>
      <td>${escapeHtml(row.activityName)}</td>
      <td>${row.quantity || '—'}</td>
      <td style="color: var(--green); font-weight: bold;">${row.upSellTotal > 0 ? row.upSellTotal.toFixed(2) : '—'}</td>
      <td>${row.upSellCount || '—'}</td>
      <td style="font-size:9px;">${escapeHtml(row.voucherNo)}</td>
    </tr>`;
  }
  
  html += `<tr style="background: var(--gray-100); font-weight: bold;">
    <td colspan="5">TOTAL UpSell</td>
    <td>${totalUpSell.toFixed(2)}</td><td colspan="2"></td>
  </tr></tbody></table>`;
  
  return html;
}

// ============================================================
// CUSTOMERS REPORT
// ============================================================
async function generateCustomersReport(invoices) {
  const reportData = [];
  
  for (const inv of invoices) {
    const date = inv.activeDate || inv.ActiveDate || '';
    const tripName = inv.trip || inv.Trip || '';
    const passengers = calculatePassengerCount(inv);
    
    // جمع الأنشطة الإضافية
    const extras = [];
    if (parseInt(inv.extra) > 0) extras.push(`Extra:${inv.extra}`);
    if (parseInt(inv.camel) > 0) extras.push(`Camel:${inv.camel}`);
    if (parseInt(inv.dinner) > 0) extras.push(`Dinner:${inv.dinner}`);
    if (parseInt(inv.vipDinner) > 0) extras.push(`VIP:${inv.vipDinner}`);
    if (parseInt(inv.starGazing) > 0) extras.push(`Star:${inv.starGazing}`);
    if (parseInt(inv.privateTrip) > 0) extras.push(`Private Trip:${inv.privateTrip}`);
    if (parseInt(inv.privateTransfer) > 0) extras.push(`Private Transfer:${inv.privateTransfer}`);
    
    reportData.push({
      date: date,
      tripName: tripName,
      voucherNo: inv.voucherNo || '',
      guestName: inv.guestName || '',
      nationality: inv.nationality || '',
      hotel: inv.hotel || '',
      roomNo: inv.roomNo || '',
      contactNo: inv.contactNo || '',
      adults: passengers.adults,
      children: passengers.children,
      infants: passengers.infants,
      totalPassengers: passengers.total,
      extras: extras.join(', ')
    });
  }
  
  reportData.sort((a, b) => {
    const dateA = parseDateFromString(a.date)?.getTime() || 0;
    const dateB = parseDateFromString(b.date)?.getTime() || 0;
    return dateA - dateB;
  });
  
  return reportData;
}

// ============================================================
// SUMMARY & UTILITIES
// ============================================================
function updateSummary(data, tab) {
  const summaryDiv = document.getElementById('summaryContainer');
  if (!data.length) {
    summaryDiv.style.display = 'none';
    return;
  }
  
  summaryDiv.style.display = 'block';
  
  let totalRecords = data.length;
  let totalPassengers = 0;
  let totalTrips = 0;
  let totalUpSell = 0;
  
  if (tab === 'vehicles') {
    totalPassengers = data.reduce((sum, r) => sum + (r.totalPassengers || 0), 0);
    totalTrips = data.reduce((sum, r) => sum + (r.goCount + r.returnCount), 0);
    summaryDiv.innerHTML = `
      <div class="summary-title">📊 Summary</div>
      <div class="summary-grid">
        <div class="summary-item"><div class="label">Total Records</div><div class="value">${totalRecords}</div></div>
        <div class="summary-item"><div class="label">Total Vehicle Trips</div><div class="value">${totalTrips}</div></div>
        <div class="summary-item"><div class="label">Total Passengers</div><div class="value">${totalPassengers}</div></div>
      </div>
    `;
  } else if (tab === 'boats') {
    totalPassengers = data.reduce((sum, r) => sum + (r.totalPassengers || 0), 0);
    summaryDiv.innerHTML = `
      <div class="summary-title">📊 Summary</div>
      <div class="summary-grid">
        <div class="summary-item"><div class="label">Total Boat Trips</div><div class="value">${totalRecords}</div></div>
        <div class="summary-item"><div class="label">Total Passengers</div><div class="value">${totalPassengers}</div></div>
      </div>
    `;
  } else if (tab === 'instructors') {
    totalUpSell = data.reduce((sum, r) => sum + (r.upSellTotal || 0), 0);
    const uniqueInstructors = new Set(data.map(r => r.instructorId)).size;
    summaryDiv.innerHTML = `
      <div class="summary-title">📊 Summary</div>
      <div class="summary-grid">
        <div class="summary-item"><div class="label">Unique Instructors</div><div class="value">${uniqueInstructors}</div></div>
        <div class="summary-item"><div class="label">Total Activities</div><div class="value">${totalRecords}</div></div>
        <div class="summary-item"><div class="label">Total UpSell</div><div class="value">${totalUpSell.toFixed(2)}</div></div>
      </div>
    `;
  } else if (tab === 'customers') {
    totalPassengers = data.reduce((sum, r) => sum + (r.totalPassengers || 0), 0);
    summaryDiv.innerHTML = `
      <div class="summary-title">📊 Summary</div>
      <div class="summary-grid">
        <div class="summary-item"><div class="label">Total Bookings</div><div class="value">${totalRecords}</div></div>
        <div class="summary-item"><div class="label">Total Passengers</div><div class="value">${totalPassengers}</div></div>
      </div>
    `;
  }
}

function resetFilters() {
  const today = new Date();
  const weekAgo = new Date();
  weekAgo.setDate(today.getDate() - 7);
  
  document.getElementById('filterFromDate').value = `${weekAgo.getFullYear()}-${String(weekAgo.getMonth()+1).padStart(2,'0')}-${String(weekAgo.getDate()).padStart(2,'0')}`;
  document.getElementById('filterToDate').value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  document.getElementById('filterTrip').value = '';
  if (document.getElementById('filterVehicle')) document.getElementById('filterVehicle').value = '';
  document.getElementById('filterSearch').value = '';
  
  loadReport();
}

async function exportToExcel() {
  showToast('Preparing Excel export...', 'info');
  
  try {
    const result = await gas('exportReportToExcel', {
      reportType: currentTab,
      data: JSON.stringify(currentTab === 'vehicles' ? await generateVehiclesReport(filteredInvoices) : 
                           currentTab === 'boats' ? await generateBoatsReport(filteredInvoices) :
                           currentTab === 'instructors' ? await generateInstructorsReport(filteredInvoices) :
                           await generateCustomersReport(filteredInvoices)),
      fromDate: document.getElementById('filterFromDate').value,
      toDate: document.getElementById('filterToDate').value,
      centerName: currentUser?.centerName
    });
    
    if (result?.success && result.downloadUrl) {
      window.open(result.downloadUrl, '_blank');
      showToast('✅ Export completed', 'success');
    } else if (result?.csvData) {
      const blob = new Blob([result.csvData], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.href = url;
      link.setAttribute('download', `${currentTab}_report_${new Date().toISOString().split('T')[0]}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      showToast('✅ Export completed', 'success');
    } else {
      showToast('❌ Export failed', 'error');
    }
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }
}

// ============================================================
// INITIALIZATION
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
  // جلب بيانات المستخدم من localStorage
  const storedUser = localStorage.getItem('currentUser');
  if (storedUser) {
    try {
      currentUser = JSON.parse(storedUser);
      document.getElementById('centerName').textContent = currentUser.centerName || currentUser.name || '';
    } catch(e) {}
  }
  
  if (!currentUser) {
    // محاولة جلب من sessionStorage
    const sessionUser = sessionStorage.getItem('currentUser');
    if (sessionUser) {
      try {
        currentUser = JSON.parse(sessionUser);
        document.getElementById('centerName').textContent = currentUser.centerName || currentUser.name || '';
      } catch(e) {}
    }
  }
  
  if (!currentUser) {
    showToast('⚠️ Please login first', 'error');
    setTimeout(() => {
      window.location.href = 'https://script.google.com/macros/s/AKfycbzjv8iFYX6vm_3hsbKEHWRLRhFoGISm6TSQcDINgkkff14yjpoBY-rYGCqJFlpF5u3g/exec?page=Login';
    }, 1500);
    return;
  }
  
  // تعيين التواريخ الافتراضية (آخر 7 أيام)
  const today = new Date();
  const weekAgo = new Date();
  weekAgo.setDate(today.getDate() - 7);
  
  document.getElementById('filterFromDate').value = `${weekAgo.getFullYear()}-${String(weekAgo.getMonth()+1).padStart(2,'0')}-${String(weekAgo.getDate()).padStart(2,'0')}`;
  document.getElementById('filterToDate').value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  
  await loadVehicles();
  await loadInvoices();
  await loadReport();
  
  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTab = btn.dataset.tab;
      loadReport();
    });
  });
});
