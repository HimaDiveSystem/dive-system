<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes, viewport-fit=cover">
  <title>Package Invoice - Diving Package</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0f1f3d;--navy2:#1a3260;--gold:#f5c842;--gold2:#e6b800;
      --blue:#2563eb;--blue-lt:#3b82f6;--green:#16a34a;--red:#dc2626;
      --bg:#f0f4f8;--card:#fff;--border:#dde4f0;--text:#1a2540;--text-lt:#5a6a8a;
      --radius:16px;--radius-sm:10px;
      --shadow:0 4px 24px rgba(15,31,61,.10);--shadow-lg:0 8px 40px rgba(15,31,61,.16);
      --ticker-h:42px;--header-h:60px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;width:100%;overflow-x:hidden;}
    #stickyTop{position:fixed;top:0;left:0;right:0;z-index:1000;width:100%;overflow:hidden;background:linear-gradient(90deg,#07111f,#0f1f3d);}
    #stickyTop::-webkit-scrollbar{height:3px;}
    #stickyTop::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px;}
    .ticker-bar{height:var(--ticker-h);background:linear-gradient(90deg,#07111f,#0f1f3d 50%,#07111f);border-bottom:2px solid var(--gold);display:flex;align-items:center;width:100%;overflow:hidden;}
    .ticker-label{flex-shrink:0;background:var(--gold);color:var(--navy);font-weight:900;font-size:11px;padding:0 12px;height:100%;display:flex;align-items:center;gap:5px;}
    .ticker-track{flex:1;overflow:hidden;display:inline-block;}
    .ticker-inner{display:inline-flex;align-items:center;white-space:nowrap;animation:tick 22s linear infinite;will-change:transform;}
    .ticker-inner:hover{animation-play-state:paused;}
    @keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    .ticker-item{display:inline-flex;align-items:center;gap:5px;padding:0 16px;color:#cbd5e1;font-size:12px;font-weight:600;border-right:1px solid rgba(255,255,255,.1);}
    .ticker-item .rl{color:#94a3b8;font-size:10px;}
    .ticker-item .rv{color:var(--gold);font-weight:900;font-size:13px;font-family:'Tajawal',monospace;}
    .ticker-item .rt{background:rgba(245,200,66,.15);border:1px solid rgba(245,200,66,.3);color:var(--gold);font-size:9px;padding:1px 5px;border-radius:20px;}
    .ticker-sep{display:inline-flex;align-items:center;padding:0 8px;color:rgba(245,200,66,.35);font-size:16px;}
    .ticker-date{flex-shrink:0;color:#64748b;font-size:10px;padding:0 12px;}
    .header{height:var(--header-h);background:linear-gradient(135deg,var(--navy),var(--navy2));display:flex;justify-content:space-between;align-items:center;padding:0 20px;width:100%;overflow:hidden;}
    .header-title{display:inline-flex;align-items:center;gap:8px;color:var(--gold);font-size:18px;font-weight:900;flex-shrink:0;}
    .header-title .icon{background:rgba(245,200,66,.15);border:1px solid rgba(245,200,66,.25);border-radius:8px;padding:4px 7px;font-size:16px;}
    .header-right{display:flex;align-items:center;gap:8px;flex-shrink:0;min-width:0;}
    .user-chip{min-width:0;overflow:hidden;}
    .user-chip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px;}
    .user-chip{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:40px;padding:4px 12px;color:white;font-size:12px;font-weight:600;flex-shrink:0;}
    .avatar{width:26px;height:26px;background:var(--gold);color:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;}
    .meta-pill{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#94a3b8;font-size:10px;padding:2px 8px;border-radius:20px;flex-shrink:0;}
    .back-btn{background:transparent;border:2px solid rgba(255,255,255,.28);color:white;padding:5px 14px;border-radius:40px;cursor:pointer;font-weight:700;font-size:12px;font-family:'Cairo',sans-serif;transition:all .2s;flex-shrink:0;margin-left:0;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}
    .page{padding-top:calc(var(--ticker-h) + var(--header-h) + 18px);padding-bottom:50px;width:100%;max-width:1200px;margin:0 auto;padding-left:15px;padding-right:15px;min-height:100vh;}
    .fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
    .fgroup{display:flex;flex-direction:column;gap:5px;position:relative;}
    .fgroup label{font-size:11px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px;}
    .fgroup label.req::after{content:' *';color:var(--red);}
    @media (max-width: 480px) {
  .phone-row {
    flex-direction: column !important;
    align-items: stretch !important;
    gap: 8px !important;
  }
  .phone-code {
    width: 100% !important;
  }
}
    .fc{padding:9px 13px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:'Cairo',sans-serif;color:var(--text);background:#fafbfd;width:100%;height:43px;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;appearance:none;}
    .fc:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);outline:none;background:white;}
    .fc::placeholder{color:#b0bac9;}
    select.fc{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='13' height='13' viewBox='0 0 24 24' fill='none' stroke='%235a6a8a' stroke-width='2.5'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:left 11px center;padding-left:33px;}
    .day-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;}
    .day-header{background:linear-gradient(90deg,var(--navy),var(--navy2));padding:12px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .day-header .day-title{color:var(--gold);font-size:14px;font-weight:800;}
    .day-header .day-subtotal{margin-left:auto;background:rgba(245,200,66,.2);padding:4px 12px;border-radius:30px;color:var(--gold);font-weight:700;font-size:13px;}
    .day-body{padding:15px;}
    .day-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:15px;}
    .trip-table{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border);margin-top:12px;}
    .trip-table table{width:100%;border-collapse:collapse;}
    .trip-table thead th{background:linear-gradient(90deg,var(--navy),var(--navy2));color:var(--gold);padding:10px 11px;font-size:11px;font-weight:700;text-align:center;text-transform:uppercase;letter-spacing:.3px;}
    .trip-table thead th:first-child{text-align:left;}
    .trip-table tbody tr:hover{background:#f8faff;}
    .trip-table td{padding:9px 11px;border-bottom:1px solid #f0f4f8;font-size:13px;vertical-align:middle;}
    .trip-table td:not(:first-child){text-align:center;}
    .trip-table input[type="number"]{width:70px;padding:5px;border:2px solid var(--border);border-radius:8px;text-align:center;font-size:14px;font-weight:700;font-family:'Cairo',sans-serif;background:#fafbfd;}
    .trip-table input[type="number"]:focus{border-color:var(--blue);outline:none;}
    .trip-table input[readonly]{background:#f0f4f8;color:var(--text-lt);}
    .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
    .card-head{padding:11px 18px;background:linear-gradient(90deg,var(--navy),var(--navy2));display:flex;align-items:center;gap:8px;}
    .card-head h3{color:var(--gold);font-size:14px;font-weight:800;letter-spacing:.2px;}
    .ch-icon{background:rgba(245,200,66,.2);border-radius:7px;padding:3px 6px;font-size:13px;}
    .card-body{padding:15px;}
    .time-btn-display{width:100%;height:43px;padding:9px 13px;border:2px solid var(--border);border-radius:var(--radius-sm);background:#fafbfd;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:14px;font-family:'Cairo',sans-serif;color:var(--text);transition:border-color .2s;}
    .time-btn-display:hover{border-color:var(--blue);}
    .time-btn-display .ph{color:#b0bac9;}
    .totals-strip{display:flex;justify-content:space-around;align-items:center;flex-wrap:wrap;gap:14px;padding:16px;border-bottom:2px dashed var(--border);}
    .total-tile{text-align:center;}
    .total-tile .tl{font-size:10px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
    .total-tile .tv{font-size:32px;font-weight:900;color:var(--navy);line-height:1;}
    .total-tile .tc{font-size:13px;color:var(--gold2);font-weight:700;margin-left:3px;}
    .total-tile input{width:110px;padding:7px;border:2px solid var(--border);border-radius:11px;text-align:center;font-size:14px;font-weight:700;font-family:'Cairo',sans-serif;background:white;}
    .total-tile input:focus{border-color:var(--blue);outline:none;}
    .pay-grp-lbl{padding:5px 16px 2px;font-size:10px;font-weight:800;color:var(--text-lt);text-transform:uppercase;letter-spacing:.7px;}
    .pay-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px 15px;}
    .pay-cell{background:white;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;transition:box-shadow .2s;}
    .pay-cell:focus-within{box-shadow:0 0 0 2px var(--blue);border-color:var(--blue);}
    .pay-cell label{display:block;font-size:10px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px;}
    .pay-cell input{width:100%;border:none;background:transparent;text-align:center;font-size:14px;font-weight:700;font-family:'Cairo',sans-serif;color:var(--text);outline:none;}
    .rest-strip{padding:14px 16px;border-top:2px dashed var(--border);display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;}
    .rest-big{font-size:36px;font-weight:900;color:var(--navy);}
    .rest-cur{font-size:16px;font-weight:700;color:var(--gold2);}
    .rest-lbl{font-size:10px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px;}
    .sig-btn{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:white;border:none;padding:11px 26px;border-radius:40px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;box-shadow:0 4px 14px rgba(124,58,237,.3);transition:all .2s;}
    .sig-btn:hover{transform:translateY(-2px);}
    .sig-preview{margin-top:10px;display:none;border:2px dashed var(--border);border-radius:11px;padding:8px;background:#fafbfd;}
    .sig-preview img{max-height:70px;max-width:100%;border-radius:5px;}
    .action-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding-top:4px;}
    .btn{padding:12px 26px;border:none;border-radius:40px;font-weight:800;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;display:flex;align-items:center;gap:6px;transition:all .2s;}
    .btn:hover{transform:translateY(-2px);}
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none;}
    .btn-save{background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);box-shadow:0 4px 14px rgba(15,31,61,.3);}
    .btn-clear{background:#f1f5f9;color:var(--text);}
    .btn-new{background:linear-gradient(135deg,var(--green),#15803d);color:white;box-shadow:0 4px 14px rgba(22,163,74,.3);}
    .warn-bar{background:#fffbeb;border:2px solid #f59e0b;border-radius:var(--radius-sm);padding:11px 14px;color:#92400e;font-weight:600;font-size:12px;margin-bottom:14px;text-align:center;}
    .err-bar{background:#fef2f2;border:2px solid var(--red);border-radius:var(--radius-sm);padding:12px 14px;color:#7f1d1d;font-weight:600;font-size:12px;margin-bottom:14px;text-align:center;}
    .session-badge{background:linear-gradient(135deg,#eff6ff,#dbeafe);border:2px solid var(--blue-lt);border-radius:var(--radius);padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-weight:700;color:var(--navy);flex-wrap:wrap;}
    .session-badge .cnt{background:var(--blue);color:white;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px);}
    .modal.open{display:flex;}
    .modal-box{background:white;width:90%;max-width:500px;border-radius:22px;padding:26px;text-align:center;box-shadow:0 25px 50px rgba(0,0,0,.3);}
    .modal-icon{font-size:44px;margin-bottom:10px;}
    .modal-msg{color:var(--navy);font-size:15px;font-weight:700;margin-bottom:18px;white-space:pre-wrap;line-height:1.6;}
    .modal-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
    .sig-canvas{border:2px solid var(--border);border-radius:11px;background:white;width:100%;height:180px;cursor:crosshair;touch-action:none;margin:12px 0;}
    .sig-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
    .pdf-ov{display:none;position:fixed;inset:0;background:rgba(10,22,40,.88);z-index:99999;align-items:center;justify-content:center;flex-direction:column;gap:18px;backdrop-filter:blur(4px);}
    .pdf-ov.show{display:flex;}
    .pdf-spin{width:60px;height:60px;border:5px solid rgba(255,255,255,.15);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
    .pdf-ov p{color:white;font-size:16px;font-weight:700;text-align:center;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .clock-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);align-items:center;justify-content:center;z-index:10000;backdrop-filter:blur(6px);}
    .clock-modal.open{display:flex;}
    .clock-box{background:white;width:90%;max-width:340px;border-radius:28px;overflow:hidden;box-shadow:0 30px 70px rgba(0,0,0,.5);}
    .ck-head{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:18px 20px;text-align:center;}
    .ck-head-title{color:var(--gold);font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;opacity:.8;}
    .ck-time-big{font-size:56px;font-weight:900;color:white;letter-spacing:4px;font-family:'Tajawal',monospace;line-height:1;margin-bottom:12px;}
    .ck-mode-row{display:flex;justify-content:center;gap:8px;}
    .ck-mode-pill{padding:4px 18px;border-radius:20px;font-size:12px;font-weight:700;font-family:'Cairo',sans-serif;border:2px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;}
    .ck-mode-pill.active{background:var(--gold);color:var(--navy);border-color:var(--gold);}
    .ck-face-wrap{padding:18px;background:#f5f7fb;display:flex;justify-content:center;align-items:center;}
    .ck-svg-wrap{width:230px;height:230px;cursor:crosshair;position:relative;}
    .ck-svg-wrap svg{width:100%;height:100%;display:block;}
    .ck-foot{display:flex;gap:8px;padding:14px 16px;background:white;border-top:1px solid var(--border);}
    .ck-btn{flex:1;padding:11px;border:none;border-radius:40px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;transition:all .2s;}
    .ck-btn:hover{transform:translateY(-1px);}
    .ck-clear{background:#f1f5f9;color:var(--text);}
    .ck-cancel{background:#fee2e2;color:var(--red);}
    .ck-set{background:linear-gradient(135deg,var(--green),#15803d);color:white;box-shadow:0 3px 10px rgba(22,163,74,.3);}
    .trip-loading{display:flex;align-items:center;gap:8px;padding:12px;color:var(--text-lt);font-size:13px;}
    .trip-loading-spin{width:18px;height:18px;border:2.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;flex-shrink:0;}
    .rate-error{background:#fef2f2;border:2px solid var(--red);border-radius:var(--radius-sm);padding:8px 12px;color:#7f1d1d;font-size:12px;margin-top:8px;}
    .hotel-row{display:grid;grid-template-columns:1fr 90px 68px 68px 68px;gap:11px;align-items:end;margin-top:12px;}
    @media(max-width:680px){.hotel-row{grid-template-columns:1fr 80px 62px 62px 62px;}}
    @media(max-width:480px){.hotel-row{grid-template-columns:1fr 70px 58px 58px 58px;}}
    .compact-num{padding:9px 5px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:'Cairo',sans-serif;font-weight:700;color:var(--text);background:#fafbfd;width:100%;height:43px;text-align:center;}
    .compact-num:focus{border-color:var(--blue);outline:none;background:white;}
    .persons-row{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:8px;}
    .ac-wrap{position:relative;flex:1;}
    .ac-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:white;border:2px solid var(--blue);border-radius:var(--radius-sm);box-shadow:0 8px 24px rgba(15,31,61,.18);max-height:190px;overflow-y:auto;z-index:600;display:none;}
    .ac-drop.open{display:block;}
    .ac-item{padding:8px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);}
    .ac-item:hover{background:#f0f4ff;}
    .ac-item .ac-n{font-weight:700;color:var(--navy);}
    .ac-item .ac-s{font-size:11px;color:var(--text-lt);}
    /* تحسين عرض حقول العميل على الموبايل */
@media (max-width: 680px) {
  /* الصف الأول */
  .customer-row1 {
    grid-template-columns: 1fr !important;
    gap: 10px !important;
  }
  /* الصف الثاني */
  .customer-row2 {
    grid-template-columns: 1fr !important;
    gap: 10px !important;
  }
  /* الصف الثالث */
  .customer-row3 {
    grid-template-columns: 1fr 1fr !important;
    gap: 10px !important;
  }
}

@media (max-width: 480px) {
  .customer-row3 {
    grid-template-columns: 1fr !important;
  }
}
    @media(max-width:680px){.pay-grid{grid-template-columns:repeat(2,1fr);}:root{--ticker-h:36px;--header-h:54px;}}
  </style>
</head>
<body>

<div id="stickyTop">
  <div class="ticker-bar">
    <div class="ticker-label">💱 أسعار الصرف</div>
    <div class="ticker-track"><div class="ticker-inner" id="tickerInner"><span class="ticker-item" style="color:#475569">⏳ جاري التحميل...</span></div></div>
    <div class="ticker-date" id="tickerDate"></div>
  </div>
  <div class="header">
    <div class="header-right" style="margin-left:0">
      <button class="back-btn" onclick="goBack()">← Back</button>
    </div>
    <div class="header-right">
      <div class="user-chip"><div class="avatar" id="userAvatar">?</div><span id="userNameDisplay">...</span></div>
      <span class="meta-pill" id="centerDisplay" style="display:none"></span>
      <span class="meta-pill" id="branchDisplay" style="display:none"></span>
    </div>
  </div>
</div>

<div class="page"><div id="mainContent"></div></div>

// ============================================
// 1. الدوال الأساسية (gas, gasWithSig)
// ============================================

function gas(action, params = {}) {
  const u = new URL(GAS);
  u.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => {
    if (v === undefined || v === null || v === '') return;
    if (k === 'signatureData' || k === 'sigPart1' || k === 'sigPart2') return;
    if (typeof v === 'object') {
      u.searchParams.set(k, JSON.stringify(v));
    } else {
      u.searchParams.set(k, String(v));
    }
  });
  return fetch(u.toString(), { method: 'GET', redirect: 'follow' })
    .then(r => r.json())
    .catch(err => { console.error(`❌ ${action} failed:`, err); throw err; });
}

async function gasWithSig(action, params) {
  const sigData = params.signatureData || '';
  const baseParams = { ...params };
  delete baseParams.signatureData;
  if (!sigData || !sigData.startsWith('data:image')) {
    return gas(action, baseParams);
  }
  const u = new URL(GAS);
  u.searchParams.set('action', action);
  Object.entries(baseParams).forEach(([k, v]) => {
    if (v !== undefined && v !== null && v !== '') {
      if (typeof v === 'object') {
        u.searchParams.set(k, JSON.stringify(v));
      } else {
        u.searchParams.set(k, String(v));
      }
    }
  });
  u.searchParams.set('signatureData', sigData);
  return fetch(u.toString(), { method: 'GET', redirect: 'follow' })
    .then(r => r.json())
    .catch(err => { console.error('❌ savePackageInvoice failed:', err); throw err; });
}

async function getRate(dateStr, centerName) {
  if (!dateStr) return C.rate || null;
  
  // ✅ التحقق من cache
  if (C.rateByDate[dateStr]) return C.rateByDate[dateStr];
  
  try {
    // ✅ محاولة جلب سعر الصرف من الخادم
    const r = await gas('getExchangeRate', { 
      dateStr, 
      centerName: centerName || currentUser?.centerName 
    });
    
    if (r && r.cash) {
      // ✅ تخزين في cache
      C.rateByDate[dateStr] = r;
      return r;
    }
    
    // ✅ إذا لم يتم العثور على سعر، محاولة استخدام سعر اليوم الحالي
    if (C.rate) {
      console.log(`⚠️ لم يتم العثور على سعر صرف لتاريخ ${dateStr}، استخدام سعر اليوم الحالي`);
      return C.rate;
    }
    
    return null;
  } catch (e) { 
    console.warn('❌ rate fetch error:', e); 
    return C.rate || null;
  }
}

async function validateExchangeRateForDate(dateStr) {
  // ✅ التحقق من وجود التاريخ
  if (!dateStr) {
    return { valid: false, message: '⚠️ التاريخ مطلوب' };
  }
  
  // ✅ جلب سعر الصرف
  const r = await getRate(dateStr, currentUser?.centerName);
  
  // ✅ التحقق من صحة السعر
  if (!r) {
    return { 
      valid: false, 
      message: `⚠️ لا يوجد سعر صرف لتاريخ ${dateStr}. يرجى إضافة سعر الصرف أولاً.` 
    };
  }
  
  if (!r.cash) {
    return { 
      valid: false, 
      message: `⚠️ بيانات سعر الصرف غير مكتملة لتاريخ ${dateStr}` 
    };
  }
  
  if (r.cash.USD === undefined || r.cash.USD === 0) {
    return { 
      valid: false, 
      message: `⚠️ سعر صرف الدولار غير صحيح لتاريخ ${dateStr}` 
    };
  }
  
  return { valid: true };
}

let phoneSearchTimeout = null, nameSearchTimeout = null;

function onPhoneInput() {
  const phoneVal = document.getElementById('phoneNumber').value.replace(/\D/g, '');
  if (phoneSearchTimeout) clearTimeout(phoneSearchTimeout);
  if (phoneVal.length < 3) { closeAC('acPhoneDrop'); return; }
  phoneSearchTimeout = setTimeout(() => {
    const filtered = C.customers.filter(c => c.phone && c.phone.includes(phoneVal)).slice(0, 6);
    renderAC('acPhoneDrop', filtered);
  }, 100);
}

function onNameInput() {
  const nameVal = (document.getElementById('guestName').value || '').trim().toLowerCase();
  if (nameSearchTimeout) clearTimeout(nameSearchTimeout);
  if (nameVal.length < 2) { closeAC('acNameDrop'); return; }
  nameSearchTimeout = setTimeout(() => {
    const filtered = C.customers.filter(c => c.name && c.name.toLowerCase().includes(nameVal)).slice(0, 6);
    renderAC('acNameDrop', filtered);
  }, 100);
}

function renderAC(id, hits) {
  const d = document.getElementById(id);
  if (!d) return;
  if (!hits.length) { d.classList.remove('open'); d.innerHTML = ''; return; }
  d._hits = hits;
  d.innerHTML = hits.map((c, i) => `<div class="ac-item" onclick="acPick('${id}', ${i})"><span class="ac-n">${esc(c.name) || '—'}</span><span class="ac-s">📞 ${c.phone || ''} ${c.hotel ? '🏨 ' + c.hotel : ''}</span></div>`).join('');
  d.classList.add('open');
}

function acPick(id, i) {
  const d = document.getElementById(id);
  if (!d || !d._hits) return;
  const c = d._hits[i];
  if (!c) return;
  if (c.name) document.getElementById('guestName').value = c.name;
  if (c.nationality) document.getElementById('nationality').value = c.nationality;
  if (c.hotel) document.getElementById('hotel').value = c.hotel;
  if (c.roomNo) document.getElementById('roomNo').value = c.roomNo;
  const code = document.getElementById('phoneCode');
  const num = document.getElementById('phoneNumber');
  if (c.phone && num) {
    let cleanPhone = c.phone.replace(/^(00|\+)/, '');
    num.value = cleanPhone;
    code.value = '+';
  }
  closeAC('acPhoneDrop');
  closeAC('acNameDrop');
}

function closeAC(id) {
  const d = document.getElementById(id);
  if (d) { d.classList.remove('open'); d.innerHTML = ''; }
}

document.addEventListener('click', e => {

function onPackageDaysChange() {
  const days = parseInt(document.getElementById('packageDays').value);
  if (isNaN(days) || days < 2) {
    showAlert('عدد الأيام يجب أن يكون من 2 إلى 15', '⚠️');
    document.getElementById('packageDays').value = 3;
    packageDaysCount = 3;
  } else if (days > 15) {
    showAlert('الحد الأقصى 15 يوم', '⚠️');
    document.getElementById('packageDays').value = 15;
    packageDaysCount = 15;
  } else {
    packageDaysCount = days;
  }
  buildDaysUI();
}

function buildDaysUI() {
  const container = document.getElementById('daysContainer');
  if (!container) return;
  
  let html = '';
  for (let i = 0; i < packageDaysCount; i++) {
    const dayNum = i + 1;
    const day = dayData[i] || { 
      date: '', 
      time: '', 
      tripName: '', 
      tripDef: [], 
      tripPrices: [], 
      items: []  // ✅ مصفوفة فارغة بدون أصفار
    };
    
    html += `
      <div class="day-card" id="dayCard_${i}">
        <div class="day-header">
          <span class="day-title">🏝️ Day ${dayNum}</span>
          <span class="day-subtotal" id="daySubtotal_${i}">0.00</span>
        </div>
        <div class="day-body">
          <div class="day-row">
            <div class="fgroup"><label class="req">Execution Date</label><input type="date" class="fc" id="dayDate_${i}" onchange="onDayDateChange(${i})"></div>
            <div class="fgroup"><label class="req">Departure Time</label><input type="hidden" id="dayTime_${i}"><button type="button" class="time-btn-display" onclick="openClockModalForDay(${i})"><span id="dayTimeDisplay_${i}" class="ph">Select time...</span><span style="font-size:18px">🕐</span></button></div>
            <div class="fgroup"><label class="req">Trip Name</label><input type="text" class="fc" id="dayTrip_${i}" list="tripsList" placeholder="Select diving trip" onchange="loadTripForDay(${i})"></div>
          </div>
          <div id="dayTripItems_${i}" class="trip-table" style="display:none"></div>
          <div id="dayRateError_${i}" class="rate-error" style="display:none"></div>
        </div>
      </div>
    `;
  }
  container.innerHTML = html;
  
  for (let i = 0; i < packageDaysCount; i++) {
    if (dayData[i]) {
      const day = dayData[i];
      const dateEl = document.getElementById(`dayDate_${i}`);
      if (dateEl && day.date) dateEl.value = day.date;
      const timeEl = document.getElementById(`dayTime_${i}`);
      if (timeEl && day.time) timeEl.value = day.time;
      const timeDisplay = document.getElementById(`dayTimeDisplay_${i}`);
      if (timeDisplay && day.time) { timeDisplay.textContent = day.time; timeDisplay.classList.remove('ph'); }
      const tripEl = document.getElementById(`dayTrip_${i}`);
      if (tripEl && day.tripName) tripEl.value = day.tripName;
      if (day.tripDef && day.tripDef.length) {
        renderTripTableForDay(i, day.tripDef, day.tripPrices, day.items);
      }
    }
  }
  
  scheduleTotalCalc();
}
async function onDayDateChange(dayIndex) {
  const date = document.getElementById(`dayDate_${dayIndex}`).value;
  if (!date) return;
  
  const rateCheck = await validateExchangeRateForDate(date);
  const rateErrorDiv = document.getElementById(`dayRateError_${dayIndex}`);
  if (!rateCheck.valid) {
    if (rateErrorDiv) {
      rateErrorDiv.style.display = 'block';
      rateErrorDiv.textContent = rateCheck.message;
    }
    showAlert(rateCheck.message, '⚠️');
    document.getElementById(`dayDate_${dayIndex}`).value = '';
    return;
  }
  if (rateErrorDiv) rateErrorDiv.style.display = 'none';
  
  if (!dayData[dayIndex]) dayData[dayIndex] = {};
  dayData[dayIndex].date = date;
  
  await getRate(date, currentUser?.centerName);
  scheduleTotalCalc();
}

let currentClockDayIndex = null;

function openClockModalForDay(dayIndex) {
  currentClockDayIndex = dayIndex;
  openClockModal();
}

async function loadTripForDay(dayIndex) {
  const tripName = document.getElementById(`dayTrip_${dayIndex}`).value?.trim();
  const date = document.getElementById(`dayDate_${dayIndex}`).value;
  const currency = document.getElementById('invoiceCurrency').value;
  
  if (!tripName || !currency || !date) {
    document.getElementById(`dayTripItems_${dayIndex}`).style.display = 'none';
    return;
  }
  
  const rateCheck = await validateExchangeRateForDate(date);
  if (!rateCheck.valid) {
    showAlert(rateCheck.message, '⚠️');
    return;
  }
  
  const key = tripName + '|' + currency + '|' + currentUser?.centerName;
  
  if (C.trips[key]) {
    applyTripToDay(dayIndex, C.trips[key]);
    return;
  }
  
  const container = document.getElementById(`dayTripItems_${dayIndex}`);
  container.style.display = 'block';
  container.innerHTML = `<div class="trip-loading"><div class="trip-loading-spin"></div>Loading trip data...</div>`;
  
  try {
    const d = await gas('getTripData', {
      tripName: tripName,
      currency: currency,
      centerName: currentUser?.centerName
    });
    
    if (!d || !d.items || !d.items.length) {
      container.innerHTML = '';
      container.style.display = 'none';
      showAlert('Trip not found: ' + tripName, '⚠️');
      return;
    }
    C.trips[key] = d;
    applyTripToDay(dayIndex, d);
  } catch (e) {
    container.innerHTML = '';
    container.style.display = 'none';
    showAlert('Error loading trip: ' + e.message, '❌');
  }
}
function applyTripToDay(dayIndex, tripData) {
  if (!dayData[dayIndex]) dayData[dayIndex] = {};
  dayData[dayIndex].tripDef = tripData.items;
  dayData[dayIndex].tripPrices = tripData.prices || [];
  dayData[dayIndex].tripName = tripData.name;
  
  // ✅ تهيئة savedItems كمصفوفة فارغة (بدون أصفار)
  if (!dayData[dayIndex].items) {
    dayData[dayIndex].items = new Array(tripData.items.length).fill('');
  }
  
  renderTripTableForDay(dayIndex, tripData.items, tripData.prices || [], dayData[dayIndex].items);
}

function renderTripTableForDay(dayIndex, items, prices, savedItems) {
  if (!items || !items.length) return;
  
  let rows = '';
  let hasAnyItems = false;
  
  for (let i = 0; i < items.length; i++) {
    // ✅ جعل القيمة الافتراضية فارغة بدلاً من 0
    const qty = (savedItems && savedItems[i] && savedItems[i] > 0) ? savedItems[i] : '';
    const priceValue = prices[i] || 0;
    const total = (qty && qty > 0) ? qty * priceValue : 0;
    
    rows += `
      <tr>
        <td style="font-weight:600">${esc(items[i])}</td>
        <td><input type="number" id="dayQty_${dayIndex}_${i}" min="0" placeholder="0" value="${qty}" oninput="onDayQtyChange(${dayIndex}, ${i})" style="text-align:center;"></td>
        <td><input type="number" id="dayPrice_${dayIndex}_${i}" value="${priceValue}" readonly style="text-align:center;"></td>
        <td><input type="number" id="dayTotal_${dayIndex}_${i}" value="${total.toFixed(2)}" readonly style="text-align:center;"></td>
      </tr>
    `;
    
    if (qty && qty > 0) hasAnyItems = true;
  }
  
  const container = document.getElementById(`dayTripItems_${dayIndex}`);
  container.style.display = 'block';
  container.innerHTML = `
    <table style="width:100%;border-collapse:collapse;">
      <thead><tr><th style="text-align:left;padding-left:14px">Activity</th><th>QTY</th><th>Price</th><th>Total</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${!hasAnyItems ? '<div style="font-size:11px; color:#94a3b8; text-align:center; padding:8px;">💡 Enter quantities above to add items</div>' : ''}
  `;
  
  updateDaySubtotal(dayIndex);
}
function onDayQtyChange(dayIndex, itemIndex) {
  // ✅ قراءة القيمة، إذا كانت فارغة أو NaN اعتبرها 0
  let qtyRaw = document.getElementById(`dayQty_${dayIndex}_${itemIndex}`).value;
  let qty = (qtyRaw === '' || qtyRaw === null) ? 0 : parseFloat(qtyRaw) || 0;
  
  const price = parseFloat(document.getElementById(`dayPrice_${dayIndex}_${itemIndex}`).value) || 0;
  const total = qty * price;
  document.getElementById(`dayTotal_${dayIndex}_${itemIndex}`).value = total.toFixed(2);
  
  if (!dayData[dayIndex]) dayData[dayIndex] = {};
  if (!dayData[dayIndex].items) dayData[dayIndex].items = [];
  dayData[dayIndex].items[itemIndex] = qty;
  
  updateDaySubtotal(dayIndex);
  scheduleTotalCalc();
}

function updateDaySubtotal(dayIndex) {
  let total = 0;
  let i = 0;
  while (document.getElementById(`dayTotal_${dayIndex}_${i}`)) {
    total += parseFloat(document.getElementById(`dayTotal_${dayIndex}_${i}`).value) || 0;
    i++;
  }
  const subtotalSpan = document.getElementById(`daySubtotal_${dayIndex}`);
  if (subtotalSpan) subtotalSpan.textContent = total.toFixed(2);
  
  if (!dayData[dayIndex]) dayData[dayIndex] = {};
  dayData[dayIndex].subtotal = total;
}

function calculatePackageTotal() {
  let total = 0;
  for (let i = 0; i < packageDaysCount; i++) {
    if (dayData[i] && dayData[i].subtotal) total += dayData[i].subtotal;
  }
  return total;
}

let _ct = null;
function scheduleTotalCalc() {
  clearTimeout(_ct);
  _ct = setTimeout(updateAllCalc, 200);
}

async function updateAllCalc() {
  const currency = document.getElementById('invoiceCurrency')?.value || '';
  const discount = parseFloat(document.getElementById('discount')?.value) || 0;
  const total = calculatePackageTotal();
  
  const afterDiscount = Math.max(0, total - discount);
  
  // ✅ حساب المدفوعات باستخدام أسعار الصرف لكل يوم
  const ratesByDate = {};
  for (let i = 0; i < packageDaysCount; i++) {
    if (dayData[i] && dayData[i].date) {
      ratesByDate[dayData[i].date] = await getRate(dayData[i].date, currentUser?.centerName);
    }
  }
  
  // ✅ حساب المدفوعات مع تمرير centerName
  const paid = await calculateTotalPaidInCurrency(currency, ratesByDate, currentUser?.centerName);
  const rest = Math.max(0, afterDiscount - paid);
  
  // ✅ تحديث العناصر
  const totalEl = document.getElementById('displayTotalPrice');

async function calculateTotalPaidInCurrency(currency, ratesByDate, centerName) {
  // ✅ قراءة المدفوعات من الواجهة
  const cU = parseFloat(document.getElementById('cashUSD')?.value) || 0;
  const cE = parseFloat(document.getElementById('cashEUR')?.value) || 0;
  const cG = parseFloat(document.getElementById('cashGBP')?.value) || 0;
  const cL = parseFloat(document.getElementById('cashLE')?.value) || 0;
  const vU = parseFloat(document.getElementById('visaUSD')?.value) || 0;
  const vE = parseFloat(document.getElementById('visaEUR')?.value) || 0;
  const vG = parseFloat(document.getElementById('visaGBP')?.value) || 0;
  const vL = parseFloat(document.getElementById('visaLE')?.value) || 0;
  
  // ✅ حساب إجمالي المدفوعات بالعملة الأصلية
  const totalPayments = cU + cE + cG + cL + vU + vE + vG + vL;
  
  // ✅ إذا كانت المدفوعات صفر، ارجع 0
  if (totalPayments === 0) return 0;
  
  // ✅ إذا لم تكن هناك أسعار صرف، استخدم المبالغ كما هي
  if (!ratesByDate || Object.keys(ratesByDate).length === 0) {
    return totalPayments;
  }
  
  // ✅ استخدام أول يوم في الباكيدج للحصول على سعر الصرف
  const firstDate = Object.keys(ratesByDate)[0];
  let rate = ratesByDate[firstDate];
  
  // ✅ إذا لم يكن هناك سعر صرف، حاول جلب أحدث سعر
  if (!rate) {
    rate = await getRate(firstDate, centerName);
  }
  
  if (!rate) return totalPayments;
  
  // ✅ استخدام rate.cash و rate.visa مباشرة (بدون rateFields)
  const cashRates = rate.cash || {};
  const visaRates = rate.visa || {};
  
  // ✅ تحويل جميع المدفوعات إلى LE (نفس منطق الخادم)
  const LE = (cU * (cashRates.USD || 1)) + 
             (cE * (cashRates.EUR || 1)) + 
             (cG * (cashRates.GBP || 1)) + 
             cL +
             (vU * (visaRates.USD || cashRates.USD || 1)) + 
             (vE * (visaRates.EUR || cashRates.EUR || 1)) + 
             (vG * (visaRates.GBP || cashRates.GBP || 1)) + 
             (vL * (visaRates.LE || 1));
  
  // ✅ تحويل من LE إلى العملة المطلوبة (نفس منطق الخادم)
  let result = 0;
  if (currency === '$') {
    result = LE / (cashRates.USD || 1);
  } else if (currency === '€') {
    result = LE / (cashRates.EUR || 1);
  } else if (currency === '£') {
    result = LE / (cashRates.GBP || 1);
  } else {
    result = LE;
  }
  
  // ✅ تقريب النتيجة إلى منزلتين عشريتين
  return R2(result);
}
async function collectPackageData() {
  const phoneRaw = document.getElementById('phoneNumber')?.value || '';
  const phoneDigits = phoneRaw.replace(/\D/g, '');
  const fullPhone = '00' + phoneDigits;
  
  const currency = document.getElementById('invoiceCurrency')?.value || '';
  const discount = parseFloat(document.getElementById('discount')?.value) || 0;
  const cU = parseFloat(document.getElementById('cashUSD')?.value) || 0;
  const cE = parseFloat(document.getElementById('cashEUR')?.value) || 0;
  const cG = parseFloat(document.getElementById('cashGBP')?.value) || 0;
  const cL = parseFloat(document.getElementById('cashLE')?.value) || 0;
  const vU = parseFloat(document.getElementById('visaUSD')?.value) || 0;
  const vE = parseFloat(document.getElementById('visaEUR')?.value) || 0;
  const vG = parseFloat(document.getElementById('visaGBP')?.value) || 0;
  const vL = parseFloat(document.getElementById('visaLE')?.value) || 0;
  
  // ✅ حساب إجمالي الباكيدج (مجموع إجماليات الأيام)
  const total = calculatePackageTotal();
  
  // ✅ جلب أسعار الصرف لكل يوم
  const ratesByDate = {};
  for (let i = 0; i < packageDaysCount; i++) {
    if (dayData[i] && dayData[i].date) {
      ratesByDate[dayData[i].date] = await getRate(dayData[i].date, currentUser?.centerName);
    }
  }
  
  // ✅ حساب المدفوعات مع تمرير centerName
  const paid = await calculateTotalPaidInCurrency(currency, ratesByDate, currentUser?.centerName);
  
  // ✅ حساب المبلغ بعد الخصم والمتبقي
  const totalAfterDiscount = Math.max(0, total - discount);
  const rest = Math.max(0, totalAfterDiscount - paid);
  
  // ✅ بناء بيانات الأيام
  const days = [];
  for (let i = 0; i < packageDaysCount; i++) {
    const day = dayData[i] || {};
    const items = [];
    const tripDef = day.tripDef || [];
    for (let j = 0; j < tripDef.length; j++) {
      const qty = (day.items && day.items[j]) ? day.items[j] : 0;
      const price = (day.tripPrices && day.tripPrices[j]) ? day.tripPrices[j] : 0;
      if (qty > 0) {
        items.push({ 
          name: tripDef[j], 
          quantity: qty, 
          price: price, 
          total: qty * price 
        });
      }
    }
    days.push({
      dayIndex: i + 1,
      date: day.date || '',
      time: day.time || '',
      tripName: day.tripName || '',
      items: items,
      subtotal: day.subtotal || 0  // ✅ إجمالي اليوم بدون خصم
    });
  }
  
  // ✅ إرجاع البيانات كاملة
  return {
    salesId: currentUser?.id || '',
    salesName: currentUser?.name || '',
    centerName: currentUser?.centerName || '',
    branchName: currentUser?.branchName || '',
    guestName: document.getElementById('guestName')?.value || '',
    nationality: document.getElementById('nationality')?.value || '',
    contactNo: fullPhone,
    hotel: document.getElementById('hotel')?.value || '',
    roomNo: document.getElementById('roomNo')?.value || '',
    invoiceCurrency: currency,
    notes: document.getElementById('notes')?.value || '',
    discount: discount,
    totalAmount: total,
    totalAfterDiscount: totalAfterDiscount,  // ✅ إضافة المبلغ بعد الخصم
    paymentPrice: paid,
    rest: rest,
    cashUSD: cU, cashEUR: cE, cashGBP: cG, cashLE: cL,
    visaUSD: vU, visaEUR: vE, visaGBP: vG, visaLE: vL,
    signatureData: signatureData || '',
    packageDays: packageDaysCount,
    packageData: days,
    ratesByDate: ratesByDate
  };
}
  
async function validatePackage() {
  const inv = await collectPackageData();
  
  // ✅ التحقق من اسم العميل
  if (!inv.guestName || inv.guestName.trim() === '') {
    showAlert('⚠️ الرجاء إدخال اسم العميل', '⚠️');
    return null;
  }
  
  // ✅ التحقق من رقم الهاتف (محسن)
  const phoneDigits = inv.contactNo.replace(/\D/g, '');
  if (phoneDigits.length < 8) {
    showAlert('⚠️ الرجاء إدخال رقم هاتف صحيح (10 أرقام على الأقل)', '⚠️');
    return null;
  }
  
  // ✅ التحقق من الجنسية
  if (!inv.nationality || inv.nationality.trim() === '') {
    showAlert('⚠️ الرجاء إدخال الجنسية', '⚠️');
    return null;
  }
  
  // ✅ التحقق من الفندق
  if (!inv.hotel || inv.hotel.trim() === '') {
    showAlert('⚠️ الرجاء إدخال الفندق', '⚠️');
    return null;
  }
  
  // ✅ التحقق من عملة الفاتورة
  if (!inv.invoiceCurrency || inv.invoiceCurrency.trim() === '') {
    showAlert('⚠️ الرجاء اختيار عملة الفاتورة', '⚠️');
    return null;
  }
  
  // ✅ التحقق من أيام الباكيدج
  for (let i = 0; i < inv.packageDays; i++) {
    const day = inv.packageData[i];
    
    if (!day.date || day.date.trim() === '') {
      showAlert(`⚠️ الرجاء إدخال تاريخ اليوم ${i+1}`, '⚠️');
      return null;
    }
    
    if (!day.time || day.time.trim() === '') {
      showAlert(`⚠️ الرجاء إدخال وقت اليوم ${i+1}`, '⚠️');
      return null;
    }
    
    if (!day.tripName || day.tripName.trim() === '') {
      showAlert(`⚠️ الرجاء اختيار رحلة اليوم ${i+1}`, '⚠️');
      return null;
    }
    
    if (day.items.length === 0) {
      showAlert(`⚠️ الرجاء إدخال بنود الرحلة لليوم ${i+1}`, '⚠️');
      return null;
    }
    
    // ✅ التحقق من سعر الصرف لكل يوم
    const rateCheck = await validateExchangeRateForDate(day.date);
    if (!rateCheck.valid) {
      showAlert(rateCheck.message, '⚠️');
      return null;
    }
  }
  
  // ✅ التحقق من وجود مبلغ إجمالي
  if (inv.totalAmount === 0) {
    showAlert('⚠️ إجمالي الفاتورة لا يمكن أن يكون صفراً. الرجاء إضافة بنود.', '⚠️');
    return null;
  }
  
  // ✅ التحقق من المدفوعات لا تتجاوز الإجمالي
  const totalAfterDiscount = inv.totalAmount - inv.discount;
  if (inv.paymentPrice > totalAfterDiscount) {
    showAlert(`⚠️ المدفوعات (${inv.paymentPrice.toFixed(2)} ${inv.invoiceCurrency}) تتجاوز الإجمالي بعد الخصم (${totalAfterDiscount.toFixed(2)} ${inv.invoiceCurrency})`, '⚠️');
    return null;
  }
  
  return inv;
}

async function savePackageInvoice() {
  try {
    setBtns(true);
    showPDFOv('💾 جاري حفظ الفواتير...');
    
    const formData = await validatePackage();
    if (!formData) {
      hidePDFOv();
      setBtns(false);
      return;
    }
    
    formData.signatureData = signatureData || '';
    
    // ✅ حساب الإجماليات بشكل صحيح
    const total = formData.totalAmount || 0;
    const discount = formData.discount || 0;
    const totalAfterDiscount = Math.max(0, total - discount);
    
    // ✅ حساب المدفوعات
    const paid = formData.paymentPrice || 0;
    const remaining = Math.max(0, totalAfterDiscount - paid);
    
    // ✅ التحقق من صحة المدفوعات
    if (paid > totalAfterDiscount) {
      hidePDFOv();
      setBtns(false);
      showAlert(`⚠️ المدفوعات (${paid.toFixed(2)} ${formData.invoiceCurrency}) تتجاوز إجمالي الباكيدج بعد الخصم (${totalAfterDiscount.toFixed(2)} ${formData.invoiceCurrency})`, '⚠️');

    }
    
    // ✅ إضافة centerName إلى formData للتأكد من استخدامه في الخادم
    formData.centerName = currentUser?.centerName || formData.centerName;
    
    // ✅ حفظ البيانات مع تمرير centerName
    const saveResult = await gasWithSig('savePackageInvoice', formData);
    if (!saveResult?.success) throw new Error(saveResult?.message || 'فشل الحفظ');

  saveResult.currency || formData.invoiceCurrency
);
            
    } else {
      showAlert('تم الحفظ ولكن فشل إنشاء PDF', '⚠️');
    }
    
  } catch (err) {

  function cleanPhoneForWhatsApp(phone) {
  if (!phone) return '';
  
  // ✅ إزالة جميع المسافات والرموز غير الرقمية ما عدا +
  let cleaned = phone.toString().replace(/\s/g, '').replace(/[^0-9+]/g, '');
  
  // ✅ إذا كان الرقم يبدأ بـ 00، استبدلها بـ +
  if (cleaned.startsWith('00')) {
    cleaned = '+' + cleaned.substring(2);
  }
  // ✅ إذا كان الرقم يبدأ بـ 0، أضف +20 (مصر)
  else if (cleaned.startsWith('0') && cleaned.length > 1) {
    cleaned = '+20' + cleaned.substring(1);
  }
  // ✅ إذا كان الرقم يبدأ بـ 20 فقط (بدون +)، أضف +
  else if (cleaned.startsWith('20') && !cleaned.startsWith('+')) {
    cleaned = '+' + cleaned;
  }
  // ✅ إذا كان الرقم لا يبدأ بـ +، أضف +
  else if (!cleaned.startsWith('+')) {
    cleaned = '+' + cleaned;
  }
  
  // ✅ إزالة أي تكرار لـ 20 (مثل +20 201066329217 -> +201066329217)
  if (cleaned.startsWith('+2020')) {
    cleaned = '+20' + cleaned.substring(4);
  }
  
  // ✅ التحقق من صحة الرقم المصري (يجب أن يكون +20 + 10 أرقام)
  const withoutPlus = cleaned.replace('+', '');
  if (withoutPlus.startsWith('20') && withoutPlus.length === 12) {
    return cleaned;
  }
  
  // ✅ إذا كان الرقم 11 رقم ويبدأ بـ 01 (مصر)
  const digitsOnly = phone.replace(/\D/g, '');
  if (digitsOnly.length === 11 && digitsOnly.startsWith('01')) {
    return '+20' + digitsOnly.substring(1);
  }
  
  return cleaned;
}

async function sharePackageWhatsApp(packageId) {

async function loadExchangeRates() {
  try {
    console.log('📡 جاري تحميل أسعار الصرف...');
    const rates = await gas('getLatestExchangeRates', { centerName: currentUser?.centerName });
    if (rates) {
      C.rate = rates;
      
      const items = [
        { lbl: 'USD $', v: rates.bUSD || rates.sUSD || 50 },
        { lbl: 'EUR €', v: rates.bEUR || rates.sEUR || 55 },
        { lbl: 'GBP £', v: rates.bGBP || rates.sGBP || 60 }
      ].filter(x => x.v && +x.v > 0);
      
      const tickerItems = items.map(it => {
        const val = +it.v;
        const display = Number.isInteger(val) ? val.toString() : val.toFixed(2);
        return `<span class="ticker-item"><span class="rl">${it.lbl}</span><span class="rv">${display}</span></span>`;
      });
      const h = tickerItems.join('<span class="ticker-sep">◆</span>');
      const tickerInner = document.getElementById('tickerInner');
      if (tickerInner) tickerInner.innerHTML = h + '<span class="ticker-sep" style="padding:0 20px"></span>' + h;
      
      const rawDate = rates.date || '';
      let displayDate = rawDate;
      if (rawDate && (rawDate.includes('T') || rawDate.match(/^\d{4}-\d{2}-\d{2}/))) {
        try {
          const d = new Date(rawDate);
          if (!isNaN(d)) {
            const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            displayDate = String(d.getDate()).padStart(2,'0') + '/' + MN[d.getMonth()] + '/' + d.getFullYear();
          }
        } catch(e) {}
      }
      const tickerDate = document.getElementById('tickerDate');
      if (tickerDate) tickerDate.textContent = '📅 ' + displayDate;
      
      console.log('✅ تم تحميل أسعار الصرف');
    }
  } catch(e) { console.error('❌ فشل تحميل أسعار الصرف:', e); }
}

let ckHour = null, ckMin = null, ckMode = 'hour';
const CX = 115, CY = 115;

function buildClockFace() {
  const tg = document.getElementById('ckTicks'), ng = document.getElementById('ckNums');
  if (!tg || !ng || tg.children.length) return;
  for (let i = 0; i < 60; i++) {
    const a = (i * 6 - 90) * Math.PI / 180, maj = i % 5 === 0, r1 = maj ? 96 : 103, r2 = 109;
    const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    ln.setAttribute('x1', CX + r1 * Math.cos(a));
    ln.setAttribute('y1', CY + r1 * Math.sin(a));
    ln.setAttribute('x2', CX + r2 * Math.cos(a));
    ln.setAttribute('y2', CY + r2 * Math.sin(a));
    ln.setAttribute('stroke', maj ? '#0f1f3d' : '#c5cfe0');
    ln.setAttribute('stroke-width', maj ? '2.5' : '1');
    tg.appendChild(ln);
  }
  for (let i = 1; i <= 12; i++) {
    const a = (i * 30 - 90) * Math.PI / 180;
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', CX + 82 * Math.cos(a));
    t.setAttribute('y', CY + 82 * Math.sin(a));
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('dominant-baseline', 'central');
    t.setAttribute('font-size', '14');
    t.setAttribute('font-weight', '700');
    t.setAttribute('fill', '#1a2540');
    t.setAttribute('font-family', 'Cairo,sans-serif');
    t.textContent = i;
    ng.appendChild(t);
  }
  for (let i = 1; i <= 12; i++) {
    const a = (i * 30 - 90) * Math.PI / 180;
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', CX + 54 * Math.cos(a));
    t.setAttribute('y', CY + 54 * Math.sin(a));
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('dominant-baseline', 'central');
    t.setAttribute('font-size', '9');
    t.setAttribute('font-weight', '600');
    t.setAttribute('fill', '#94a3b8');
    t.setAttribute('font-family', 'Cairo,sans-serif');
    t.textContent = (i + 12) % 24 || 12;
    ng.appendChild(t);
  }
}

function updateHands() {
  const h = ckHour !== null ? ckHour : 0, m = ckMin !== null ? ckMin : 0;
  const ha = ((h % 12) * 30 + (m * 0.5) - 90) * Math.PI / 180;
  const ma = (m * 6 - 90) * Math.PI / 180;
  const hx = CX + 50 * Math.cos(ha), hy = CY + 50 * Math.sin(ha);
  const mx = CX + 68 * Math.cos(ma), my = CY + 68 * Math.sin(ma);
  const hh = document.getElementById('ckHandH');
  if (hh) { hh.setAttribute('x2', hx); hh.setAttribute('y2', hy); }
  const hm = document.getElementById('ckHandM');
  if (hm) { hm.setAttribute('x2', mx); hm.setAttribute('y2', my); }
  const dot = document.getElementById('ckDot');
  if (dot) {
    if (ckMode === 'hour' && ckHour !== null) {
      dot.setAttribute('cx', hx); dot.setAttribute('cy', hy); dot.setAttribute('opacity', '1');
    } else if (ckMode === 'minute' && ckMin !== null) {
      dot.setAttribute('cx', mx); dot.setAttribute('cy', my); dot.setAttribute('opacity', '1');
    } else {
      dot.setAttribute('opacity', '0');
    }
  }
  const hs = ckHour !== null ? (ckHour < 10 ? '0' + ckHour : '' + ckHour) : '--';
  const ms = ckMin !== null ? (ckMin < 10 ? '0' + ckMin : '' + ckMin) : '--';
  const hEl = document.getElementById('ckH'), mEl = document.getElementById('ckM');
  if (hEl) { hEl.textContent = hs; hEl.style.color = ckMode === 'hour' ? 'var(--gold)' : 'white'; }
  if (mEl) { mEl.textContent = ms; mEl.style.color = ckMode === 'minute' ? 'var(--gold)' : 'white'; }
}

function openClockModal() {
  buildClockFace();
  ckHour = null; ckMin = null;
  ckMode = 'hour';
  document.getElementById('modeHour').classList.add('active');
  document.getElementById('modeMin').classList.remove('active');
  updateHands();
  document.getElementById('clockModal').classList.add('open');
  bindClockTouch();
}

function closeClockModal() {
  document.getElementById('clockModal').classList.remove('open');
}

function clearClock() {
  ckHour = null; ckMin = null;
  updateHands();
}

function setClockMode(m) {
  ckMode = m;
  document.getElementById('modeHour').classList.toggle('active', m === 'hour');
  document.getElementById('modeMin').classList.toggle('active', m === 'minute');
  updateHands();
}

function bindClockTouch() {
  const wrap = document.getElementById('ckWrap');
  if (!wrap) return;
  const nw = wrap.cloneNode(true);
  wrap.parentNode.replaceChild(nw, wrap);
  nw.addEventListener('click', onClockClick);
  nw.addEventListener('touchend', e => {
    e.preventDefault();
    onClockClick(e.changedTouches[0]);
  }, { passive: false });
}

function onClockClick(e) {
  const wrap = document.getElementById('ckWrap');
  if (!wrap) return;
  const rect = wrap.getBoundingClientRect();
  const sx = ((e.clientX || e.pageX) - rect.left) * (230 / rect.width);
  const sy = ((e.clientY || e.pageY) - rect.top) * (230 / rect.height);
  const dx = sx - CX, dy = sy - CY;
  let angle = Math.atan2(dy, dx) * (180 / Math.PI) + 90;
  if (angle < 0) angle += 360;
  if (ckMode === 'hour') {
    let h = Math.round(angle / 30) % 12;
    if (h === 0) h = 12;
    if (Math.sqrt(dx * dx + dy * dy) < 65) h = (h === 12 ? 0 : h) + 12;
    ckHour = h % 24;
    ckMode = 'minute';
    document.getElementById('modeHour').classList.remove('active');
    document.getElementById('modeMin').classList.add('active');
  } else {
    ckMin = Math.round(angle / 6) % 60;
  }
  updateHands();
}

function confirmClock() {
  if (ckHour === null || ckMin === null) {
    showAlert('الرجاء اختيار الساعة والدقيقة', '⚠️');
    return;
  }
  const t = (ckHour < 10 ? '0' + ckHour : '' + ckHour) + ':' + (ckMin < 10 ? '0' + ckMin : '' + ckMin);
  
  if (currentClockDayIndex !== null) {
    const timeInput = document.getElementById(`dayTime_${currentClockDayIndex}`);
    const timeDisplay = document.getElementById(`dayTimeDisplay_${currentClockDayIndex}`);
    if (timeInput) {
      timeInput.value = t;
      // ✅ ✅ ✅ فرض قيمة النص مباشرة
      timeInput.setAttribute('value', t);
    }
    if (timeDisplay) { 
      timeDisplay.textContent = t; 
      timeDisplay.classList.remove('ph'); 
    }
    if (!dayData[currentClockDayIndex]) dayData[currentClockDayIndex] = {};
    dayData[currentClockDayIndex].time = t;
    scheduleTotalCalc();
  }
  closeClockModal();
}
// ============================================
// 10. دوال التوقيع (Signature)
// ============================================

let sigCanvas = null, sigCtx = null, isDrawing = false, lastX = 0, lastY = 0;

function openSigModal() {
  document.getElementById('signatureModal').classList.add('open');
  sigCanvas = document.getElementById('signatureCanvas');
  sigCtx = sigCanvas.getContext('2d');
  sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
  sigCtx.strokeStyle = '#0f1f3d';
  sigCtx.lineWidth = 2.5;
  sigCtx.lineCap = 'round';
  sigCtx.lineJoin = 'round';
  sigCanvas.addEventListener('touchstart', tStart, { passive: false });
  sigCanvas.addEventListener('touchmove', tMove, { passive: false });
  sigCanvas.addEventListener('touchend', () => isDrawing = false);
  sigCanvas.addEventListener('mousedown', mDown);
  sigCanvas.addEventListener('mousemove', mMove);
  sigCanvas.addEventListener('mouseup', () => isDrawing = false);
  sigCanvas.addEventListener('mouseleave', () => isDrawing = false);
}

function closeSigModal() {
  document.getElementById('signatureModal').classList.remove('open');
}

function clearSigCanvas() {
  if (sigCtx) sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
}

function confirmSignature() {
  if (!sigCanvas) return;
  const tempCanvas = document.createElement('canvas');
  const ctx = tempCanvas.getContext('2d');
  tempCanvas.width = 200;
  tempCanvas.height = 80;
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, 200, 80);
  ctx.drawImage(sigCanvas, 0, 0, sigCanvas.width, sigCanvas.height, 0, 0, 200, 80);
  signatureData = tempCanvas.toDataURL('image/jpeg', 0.4);
  const sp = document.getElementById('sigPreview');
  if (sp) {
    sp.style.display = 'block';
    sp.innerHTML = `<img src="${signatureData}" alt="Signature" style="max-width:150px; border:1px solid #ccc;">`;
  }
  closeSigModal();
}

function getPos(c, e) {
  const r = c.getBoundingClientRect();
  return { x: (e.clientX - r.left) * (c.width / r.width), y: (e.clientY - r.top) * (c.height / r.height) };
}

function mDown(e) {
  isDrawing = true;
  const p = getPos(sigCanvas, e);
  lastX = p.x; lastY = p.y;
}

function mMove(e) {
  if (!isDrawing) return;
  const p = getPos(sigCanvas, e);
  sigCtx.beginPath();
  sigCtx.moveTo(lastX, lastY);
  sigCtx.lineTo(p.x, p.y);
  sigCtx.stroke();
  lastX = p.x; lastY = p.y;
}

function tStart(e) {
  e.preventDefault();
  const t = e.touches[0];
  const p = getPos(sigCanvas, t);
  isDrawing = true;
  lastX = p.x; lastY = p.y;
}

function tMove(e) {
  e.preventDefault();
  if (!isDrawing) return;
  const t = e.touches[0];
  const p = getPos(sigCanvas, t);
  sigCtx.beginPath();
  sigCtx.moveTo(lastX, lastY);
  sigCtx.lineTo(p.x, p.y);
  sigCtx.stroke();
  lastX = p.x; lastY = p.y;
}

// ============================================
// 11. DOMContentLoaded - التشغيل النهائي
// ============================================

document.addEventListener('DOMContentLoaded', async () => {
  // 1. استعادة بيانات المستخدم
  let ud = sessionStorage.getItem('currentUser');
  if (!ud) {
    const p = new URLSearchParams(location.search).get('user');
    if (p) {
      ud = decodeURIComponent(p);
      sessionStorage.setItem('currentUser', ud);
    }
  }
  if (!ud) {
    location.href = 'index.html';
    return;
  }
  try {
    currentUser = JSON.parse(ud);
  } catch {
    location.href = 'index.html';
    return;
  }

  // 2. عرض معلومات المستخدم
  document.getElementById('userNameDisplay').textContent = currentUser.name || 'User';
  document.getElementById('userAvatar').textContent = (currentUser.name || 'U')[0].toUpperCase();
  if (currentUser.centerName) {
    const e = document.getElementById('centerDisplay');
    e.textContent = '🏢 ' + currentUser.centerName;
    e.style.display = '';
  }
  if (currentUser.branchName) {
    const e = document.getElementById('branchDisplay');
    e.textContent = '📍 ' + currentUser.branchName;
    e.style.display = '';
  }
  sessionPackages = [];

  // 3. عرض النموذج الرئيسي
  renderForm();

  // 4. تحميل جميع البيانات
  await loadAllData();
});
</script>
