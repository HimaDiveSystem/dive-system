<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>سجل حضوري</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px;}
.container{max-width:860px;margin:0 auto;background:white;border-radius:30px;box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden;}
.header{background:linear-gradient(135deg,#1e2b4f,#152238);color:white;padding:18px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.header h2{color:#ffd966;font-size:20px;display:flex;align-items:center;gap:8px;}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.user-badge{background:rgba(255,255,255,0.1);border:1px solid #ffd966;color:white;padding:7px 16px;border-radius:40px;font-size:13px;}
.back-btn{background:#ffd966;color:#1e2b4f;border:none;padding:7px 18px;border-radius:40px;cursor:pointer;font-weight:700;font-size:13px;}
.back-btn:hover{background:#f0c020;}
.info-bar{background:#f0f4fa;padding:12px 28px;display:flex;gap:20px;flex-wrap:wrap;border-bottom:1px solid #e0e8f0;}
.info-item{display:flex;align-items:center;gap:6px;font-size:13px;color:#5a6a8a;}
.info-item strong{color:#1e2b4f;}
.content{padding:24px;}
.period-card{background:#f8f9fa;border-radius:16px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap;}
.period-group label{font-size:12px;font-weight:700;color:#5a6a8a;margin-bottom:6px;display:block;}
.sel-wrap{position:relative;}
.sel-wrap select{padding:10px 36px 10px 14px;border:2px solid #d0ddeb;border-radius:12px;font-size:14px;font-weight:700;color:#1e2b4f;background:white;cursor:pointer;appearance:none;min-width:130px;}
.sel-wrap::after{content:'▾';position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#1e2b4f;pointer-events:none;}
.sel-wrap select:focus{outline:none;border-color:#1e2b4f;box-shadow:0 0 0 3px rgba(30,43,79,.1);}
.btn-load{background:#1e2b4f;color:#ffd966;border:none;padding:10px 26px;border-radius:12px;cursor:pointer;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;transition:.2s;white-space:nowrap;}
.btn-load:hover{background:#2a4f8c;}
.btn-load:disabled{background:#95a5a6;color:white;cursor:not-allowed;}
.summary-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.sbadge{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:30px;font-size:13px;font-weight:700;border:2px solid;}
.sb-P{background:#eafaf1;border-color:#27ae60;color:#1e8449;}
.sb-A{background:#fdf2f8;border-color:#e74c3c;color:#c0392b;}
.sb-L{background:#eaf4fb;border-color:#2980b9;color:#1a5276;}
.sb-H{background:#fef9e7;border-color:#f39c12;color:#9a6b00;}
.sb-U{background:#f5eef8;border-color:#8e44ad;color:#6c3483;}
.sb-D{background:#fce4ec;border-color:#c0392b;color:#922b21;}
.sb-T{background:#1e2b4f;border-color:#1e2b4f;color:#ffd966;}
.table-wrap{border-radius:14px;overflow:hidden;border:1px solid #e0e8f0;}
table{width:100%;border-collapse:collapse;}
thead tr{background:#1e2b4f;}
thead th{color:#ffd966;padding:13px 18px;font-size:13px;font-weight:700;text-align:right;}
tbody tr{border-bottom:1px solid #f0f4fa;transition:.15s;}
tbody tr:hover{background:#f8f9fb;}
tbody tr:last-child{border-bottom:none;}
td{padding:12px 18px;font-size:14px;color:#2c3e50;}
td.date-col{font-weight:700;color:#1e2b4f;white-space:nowrap;}
td.day-col{font-size:12px;color:#888;width:90px;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:30px;font-size:12px;font-weight:700;}
.chip-P{background:#eafaf1;color:#1e8449;}
.chip-A{background:#fdf2f8;color:#c0392b;}
.chip-L{background:#eaf4fb;color:#1a5276;}
.chip-H{background:#fef9e7;color:#9a6b00;}
.chip-U{background:#f5eef8;color:#6c3483;}
.chip-D{background:#fce4ec;color:#922b21;}
.empty{text-align:center;padding:50px 20px;color:#aaa;}
.empty-icon{font-size:48px;display:block;margin-bottom:14px;}
.loader{width:18px;height:18px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e2b4f;color:white;padding:12px 24px;border-radius:40px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:.35s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{background:#27ae60;}.toast.error{background:#e74c3c;}
@media(max-width:600px){.period-card{flex-direction:column;}.btn-load{justify-content:center;}.summary-row{gap:8px;}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>📋 سجل حضوري</h2>
    <div class="header-right">
      <span class="user-badge" id="userBadge">—</span>
      <button class="back-btn" onclick="goBack()">🔙 رجوع</button>
    </div>
  </div>
  <div class="info-bar">
    <div class="info-item">👤 الموظف: <strong id="infoName">—</strong></div>
    <div class="info-item">🆔 الرقم: <strong id="infoSerial">—</strong></div>
    <div class="info-item">🏢 المركز: <strong id="infoCenter">—</strong></div>
    <div class="info-item">🏬 الفرع: <strong id="infoBranch">—</strong></div>
  </div>
  <div class="content">
    <div class="period-card">
      <div class="period-group">
        <label>الشهر</label>
        <div class="sel-wrap">
          <select id="selMonth">
            <option value="Jan">يناير</option><option value="Feb">فبراير</option>
            <option value="Mar">مارس</option><option value="Apr">أبريل</option>
            <option value="May">مايو</option><option value="Jun">يونيو</option>
            <option value="Jul">يوليو</option><option value="Aug">أغسطس</option>
            <option value="Sep">سبتمبر</option><option value="Oct">أكتوبر</option>
            <option value="Nov">نوفمبر</option><option value="Dec">ديسمبر</option>
          </select>
        </div>
      </div>
      <div class="period-group">
        <label>السنة</label>
        <div class="sel-wrap"><select id="selYear"></select></div>
      </div>
      <button class="btn-load" id="btnLoad" onclick="loadMyAttendance()">🔍 عرض السجل</button>
    </div>
    <div class="summary-row" id="summaryRow" style="display:none;"></div>
    <div id="tableArea">
      <div class="empty"><span class="empty-icon">📅</span><p>اختر الشهر والسنة ثم اضغط "عرض السجل"</p></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const GAS = 'https://script.google.com/macros/s/AKfycbwe1Q9pjAJRk9CfWsK5YGjD5uVAbJkMhAVgw6akKkFIR9sz15V78C88Vs5dumKE-SwF/exec';
const DASH = {Admin:'Dashboard.html',Owner:'OwnerDashboard.html',Sales:'SalesDashboard.html',Accountant:'AccountantDashboard.html'};
const MN_KEYS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MN_AR  =['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const DAYS_AR=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const STATUSES=[
  {key:'حضور',          chip:'P',icon:'✅'},
  {key:'غياب',          chip:'A',icon:'❌'},
  {key:'إجازة',         chip:'L',icon:'🏖️'},
  {key:'نصف يوم',       chip:'H',icon:'½'},
  {key:'غياب بدون إذن', chip:'U',icon:'⛔'},
  {key:'غياب يوم بيومين',chip:'D',icon:'🔴'},
];

let currentUser=null, mySerial='';

function jsonp(action,params={}){
  return new Promise((res,rej)=>{
    const cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*99999);
    params.action=action;params.callback=cb;
    const qs=Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(String(v??''))).join('&');
    const sc=document.createElement('script');
    const to=setTimeout(()=>{delete window[cb];sc.remove();rej(new Error('انتهت مهلة الاتصال'));},30000);
    window[cb]=d=>{clearTimeout(to);delete window[cb];sc.remove();res(d);};
    sc.onerror=()=>{clearTimeout(to);delete window[cb];sc.remove();rej(new Error('خطأ في الاتصال'));};
    sc.src=GAS+'?'+qs;document.head.appendChild(sc);
  });
}

function showToast(msg,type='info'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),3200);
}

function goBack(){window.location.href=DASH[currentUser?.type]||'Dashboard.html';}

// تحويل YYYY-MM-DD → Date بدون timezone
function parseDS(ds){
  const p=ds.split('-');
  return p.length===3?new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])):null;
}

// تنسيق YYYY-MM-DD → DD شهر YYYY
function fmtDate(ds){
  const dt=parseDS(ds);if(!dt)return ds;
  return dt.getDate().toString().padStart(2,'0')+' '+MN_AR[dt.getMonth()]+' '+dt.getFullYear();
}

document.addEventListener('DOMContentLoaded',()=>{
  const ud=sessionStorage.getItem('currentUser');
  if(!ud){location.href='index.html';return;}
  try{currentUser=JSON.parse(ud);}catch(e){location.href='index.html';return;}

  mySerial=currentUser.id||'';
  document.getElementById('userBadge').textContent=currentUser.name||'—';
  document.getElementById('infoName').textContent=currentUser.name||'—';
  document.getElementById('infoSerial').textContent=mySerial||'—';
  document.getElementById('infoCenter').textContent=currentUser.centerName||'—';
  document.getElementById('infoBranch').textContent=currentUser.branchName||'—';

  const now=new Date();
  const ySel=document.getElementById('selYear');
  for(let y=now.getFullYear()+1;y>=2020;y--){
    const o=document.createElement('option');
    o.value=y;o.textContent=y;
    if(y===now.getFullYear())o.selected=true;
    ySel.appendChild(o);
  }
  document.getElementById('selMonth').value=MN_KEYS[now.getMonth()];
});

async function loadMyAttendance(){
  if(!mySerial){showToast('⚠️ الرقم الوظيفي غير موجود','error');return;}
  const month=document.getElementById('selMonth').value;
  const year =document.getElementById('selYear').value;
  const btn  =document.getElementById('btnLoad');
  btn.disabled=true;
  btn.innerHTML='<span class="loader"></span> جاري التحميل...';

  try{
    const r=await jsonp('getMonthlyAttendance',{month,year});
    if(!r||!r.success) throw new Error(r?.message||'فشل التحميل');

    // البحث عن الموظف بالـ serial
    const emp=(r.employees||[]).find(e=>e.serial===mySerial);
    if(!emp){
      document.getElementById('summaryRow').style.display='none';
      document.getElementById('tableArea').innerHTML=`
        <div class="empty">
          <span class="empty-icon">🔍</span>
          <p>الرقم الوظيفي <strong>${mySerial}</strong> غير موجود في سجل الحضور</p>
          <small style="color:#aaa;display:block;margin-top:8px;">تأكد من إضافتك في شيت Working_Days</small>
        </div>`;
      showToast('الرقم الوظيفي غير موجود في الشيت','error');
      return;
    }

    const myData=(r.data||{})[mySerial]||{};
    const dates=(r.dates||[]).sort((a,b)=>new Date(a)-new Date(b));

    if(!dates.length){
      document.getElementById('summaryRow').style.display='none';
      document.getElementById('tableArea').innerHTML=`
        <div class="empty"><span class="empty-icon">📭</span>
        <p>لا توجد بيانات لـ ${MN_AR[MN_KEYS.indexOf(month)]} ${year}</p></div>`;
      showToast('لا توجد بيانات لهذه الفترة','info');
      return;
    }

    // ── ملخص الحالات ──
    const counts={};
    STATUSES.forEach(s=>{counts[s.key]=0;});
    dates.forEach(d=>{const st=myData[d];if(st&&counts[st]!==undefined)counts[st]++;});
    const balance=parseFloat((r.balanceMap||{})[mySerial])||0;

    const summaryRow=document.getElementById('summaryRow');
    summaryRow.style.display='flex';
    summaryRow.innerHTML=
      STATUSES.filter(s=>counts[s.key]>0)
        .map(s=>`<div class="sbadge sb-${s.chip}">${s.icon} ${s.key}: <strong>${counts[s.key]}</strong></div>`)
        .join('')+
      `<div class="sbadge sb-T">⚖️ الرصيد: <strong>${balance}</strong></div>`;

    // ── الجدول ──
    const rows=dates.map(ds=>{
      const dt=parseDS(ds);
      const dayName=dt?DAYS_AR[dt.getDay()]:'';
      const st=myData[ds];
      const stObj=STATUSES.find(s=>s.key===st);
      const chip=st
        ?`<span class="chip chip-${stObj?.chip||'A'}">${stObj?.icon||''} ${st}</span>`
        :`<span style="color:#ccc;font-size:12px;">—</span>`;
      return`<tr><td class="date-col">${fmtDate(ds)}</td><td class="day-col">${dayName}</td><td>${chip}</td></tr>`;
    }).join('');

    document.getElementById('tableArea').innerHTML=`
      <div class="table-wrap">
        <table>
          <thead><tr><th>📅 التاريخ</th><th>اليوم</th><th>الحالة</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;

    showToast(`✅ ${dates.length} يوم مسجّل`,'success');

  }catch(e){
    showToast('❌ '+e.message,'error');
    document.getElementById('tableArea').innerHTML=`<div class="empty"><span class="empty-icon">⚠️</span><p>${e.message}</p></div>`;
  }finally{
    btn.disabled=false;
    btn.innerHTML='🔍 عرض السجل';
  }
}
</script>
</body>
</html>
