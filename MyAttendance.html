<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>سجل حضوري</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script src="ui.js"></script>
  <script src="config.js"></script>
  <script src="session.js"></script>
  
  <style>
    /* ✅ متغيرات الثيم الموحد */
    :root {
      --navy: #0f1f3d;
      --navy2: #1a3260;
      --gold: #f5c842;
      --gold2: #e6b800;
      --blue: #2563eb;
      --blue-lt: #3b82f6;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #ea580c;
      --purple: #7c3aed;
      --bg: #f0f4f8;
      --card: #fff;
      --border: #dde4f0;
      --text: #1a2540;
      --text-lt: #5a6a8a;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-500: #64748b;
      --header-bg-start: #0f1f3d;
      --header-bg-end: #1a3260;
      --table-header-bg: #0f1f3d;
      --table-header-text: #f5c842;
      --modal-header-border: #f5c842;
      --card-header-bg: #0f1f3d;
      --card-header-text: #f5c842;
      --pagination-active-bg: #0f1f3d;
      --pagination-active-text: #f5c842;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Cairo', sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      min-height: 100vh; 
      padding: 20px;
    }
    
    .container {
      max-width: 860px;
      margin: 0 auto;
      background: white;
      border-radius: 28px;
      box-shadow: 0 8px 40px rgba(15,31,61,0.15);
      overflow: hidden;
    }
    
    /* ========== HEADER ========== */
    .header {
      background: linear-gradient(135deg, var(--header-bg-start), var(--header-bg-end));
      color: white;
      padding: 18px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header h2 {
      color: var(--gold);
      font-size: 20px;
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .user-badge {
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--gold);
      color: white;
      padding: 7px 16px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 600;
    }
    .back-btn {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
      padding: 7px 18px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      font-family: 'Cairo', sans-serif;
      transition: all 0.2s;
    }
    .back-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }
    
    /* ========== INFO BAR ========== */
    .info-bar {
      background: var(--gray-50);
      padding: 12px 28px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .info-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-lt);
    }
    .info-item strong {
      color: var(--navy);
    }
    
    /* ========== CONTENT ========== */
    .content { padding: 24px; }
    
    /* ========== PERIOD CARD ========== */
    .period-card {
      background: var(--gray-50);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 20px;
      display: flex;
      align-items: flex-end;
      gap: 16px;
      flex-wrap: wrap;
    }
    .period-group label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-lt);
      margin-bottom: 6px;
      display: block;
    }
    .sel-wrap {
      position: relative;
    }
    .sel-wrap select {
      padding: 10px 36px 10px 14px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      background: white;
      cursor: pointer;
      appearance: none;
      min-width: 130px;
      font-family: 'Cairo', sans-serif;
    }
    .sel-wrap::after {
      content: '▾';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text);
      pointer-events: none;
    }
    .sel-wrap select:focus {
      outline: none;
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(15,31,61,0.1);
    }
    
    /* ========== BUTTONS ========== */
    .btn-load {
      background: var(--navy);
      color: var(--gold);
      border: none;
      padding: 10px 26px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      font-family: 'Cairo', sans-serif;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-load:hover {
      background: var(--navy2);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(15,31,61,0.2);
    }
    .btn-load:disabled {
      background: var(--gray-500);
      color: white;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    /* ========== SUMMARY BADGES ========== */
    .summary-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .sbadge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 700;
      border: 2px solid;
    }
    .sb-P { background: #eafaf1; border-color: #27ae60; color: #1e8449; }
    .sb-A { background: #fdf2f8; border-color: #e74c3c; color: #c0392b; }
    .sb-L { background: #eaf4fb; border-color: #2980b9; color: #1a5276; }
    .sb-H { background: #fef9e7; border-color: #f39c12; color: #9a6b00; }
    .sb-U { background: #f5eef8; border-color: #8e44ad; color: #6c3483; }
    .sb-D { background: #fce4ec; border-color: #c0392b; color: #922b21; }
    .sb-T { background: var(--navy); border-color: var(--navy); color: var(--gold); }
    
    /* ========== TABLE ========== */
    .table-wrap {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead tr {
      background: var(--table-header-bg);
    }
    thead th {
      color: var(--table-header-text);
      padding: 13px 18px;
      font-size: 13px;
      font-weight: 700;
      text-align: right;
    }
    tbody tr {
      border-bottom: 1px solid var(--gray-100);
      transition: all 0.15s;
    }
    tbody tr:hover {
      background: var(--gray-50);
    }
    tbody tr:last-child {
      border-bottom: none;
    }
    td {
      padding: 12px 18px;
      font-size: 14px;
      color: var(--text);
    }
    td.date-col {
      font-weight: 700;
      color: var(--navy);
      white-space: nowrap;
    }
    td.day-col {
      font-size: 12px;
      color: var(--text-lt);
      width: 90px;
    }
    
    /* ========== CHIPS ========== */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 14px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 700;
    }
    .chip-P { background: #eafaf1; color: #1e8449; }
    .chip-A { background: #fdf2f8; color: #c0392b; }
    .chip-L { background: #eaf4fb; color: #1a5276; }
    .chip-H { background: #fef9e7; color: #9a6b00; }
    .chip-U { background: #f5eef8; color: #6c3483; }
    .chip-D { background: #fce4ec; color: #922b21; }
    
    /* ========== EMPTY STATE ========== */
    .empty {
      text-align: center;
      padding: 50px 20px;
      color: var(--text-lt);
    }
    .empty-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 14px;
    }
    
    /* ========== LOADER ========== */
    .loader {
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* ========== TOAST ========== */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--navy);
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Cairo', sans-serif;
      z-index: 9999;
      opacity: 0;
      transition: all 0.35s;
      pointer-events: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.success { background: var(--green); }
    .toast.error { background: var(--red); }
    .toast.info { background: var(--blue); }
    
    /* ========== RESPONSIVE ========== */
    @media (max-width: 600px) {
      .period-card {
        flex-direction: column;
        align-items: stretch;
      }
      .btn-load {
        justify-content: center;
        width: 100%;
      }
      .summary-row {
        gap: 8px;
      }
      .sbadge {
        font-size: 11px;
        padding: 6px 12px;
      }
      .header {
        padding: 14px 18px;
      }
      .header h2 {
        font-size: 16px;
      }
      .content {
        padding: 16px;
      }
      .info-bar {
        padding: 10px 16px;
        gap: 10px;
      }
      .info-item {
        font-size: 11px;
      }
      td {
        padding: 8px 12px;
        font-size: 12px;
      }
      thead th {
        padding: 10px 12px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>📋 سجل حضوري</h2>
    <div class="header-right">
      <span class="user-badge" id="userBadge">—</span>
      <button class="back-btn" onclick="goBack()">← Back</button>
    </div>
  </div>
  
  <div class="info-bar">
    <div class="info-item">👤 الموظف: <strong id="infoName">—</strong></div>
    <div class="info-item">🆔 الرقم: <strong id="infoSerial">—</strong></div>
    <div class="info-item">🏢 المركز: <strong id="infoCenter">—</strong></div>
    <div class="info-item">🏬 الفرع: <strong id="infoBranch">—</strong></div>
  </div>
  
  <div class="content">
    <div class="period-card">
      <div class="period-group">
        <label>📅 الشهر</label>
        <div class="sel-wrap">
          <select id="selMonth">
            <option value="Jan">يناير</option>
            <option value="Feb">فبراير</option>
            <option value="Mar">مارس</option>
            <option value="Apr">أبريل</option>
            <option value="May">مايو</option>
            <option value="Jun">يونيو</option>
            <option value="Jul">يوليو</option>
            <option value="Aug">أغسطس</option>
            <option value="Sep">سبتمبر</option>
            <option value="Oct">أكتوبر</option>
            <option value="Nov">نوفمبر</option>
            <option value="Dec">ديسمبر</option>
          </select>
        </div>
      </div>
      <div class="period-group">
        <label>📆 السنة</label>
        <div class="sel-wrap">
          <select id="selYear"></select>
        </div>
      </div>
      <button class="btn-load" id="btnLoad" onclick="loadMyAttendance()">🔍 عرض السجل</button>
    </div>
    
    <div class="summary-row" id="summaryRow" style="display:none;"></div>
    
    <div id="tableArea">
      <div class="empty">
        <span class="empty-icon">📅</span>
        <p>اختر الشهر والسنة ثم اضغط "عرض السجل"</p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// ✅ CONFIGURATION
// ============================================================
const DASH = CONFIG.DASHBOARD_PAGES || { Admin:'Dashboard.html', Owner:'OwnerDashboard.html', Sales:'SalesDashboard.html', Accountant:'AccountantDashboard.html' };
const MN_KEYS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MN_AR = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const DAYS_AR = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const STATUSES = [
  { key:'حضور', chip:'P', icon:'✅' },
  { key:'غياب', chip:'A', icon:'❌' },
  { key:'إجازة', chip:'L', icon:'🏖️' },
  { key:'نصف يوم', chip:'H', icon:'½' },
  { key:'غياب بدون إذن', chip:'U', icon:'⛔' },
  { key:'غياب يوم بيومين', chip:'D', icon:'🔴' },
];

let currentUser = null;
let targetSerial = null;
let isAccountant = false;

// ============================================================
// ✅ JSONP REQUEST (موحد مع الملفات الأخرى)
// ============================================================
function jsonpRequest(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    if (currentUser?.centerName) params.centerName = currentUser.centerName;
    if (currentUser?.centerId) params.centerId = currentUser.centerId;
    params.action = action;
    params.callback = cbName;
    const qs = Object.entries(params).map(([k, v]) => k + '=' + encodeURIComponent(String(v ?? ''))).join('&');
    const url = CONFIG.GAS_URL + '?' + qs;
    const script = document.createElement('script');
    const timeout = setTimeout(() => { cleanup(); reject(new Error('Request timeout')); }, 30000);
    const cleanup = () => { clearTimeout(timeout); delete window[cbName]; script.remove(); };
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('Network error')); };
    script.src = url;
    document.head.appendChild(script);
  });
}

function gas(action, params = {}) {
  return new Promise((resolve, reject) => {
    const timeoutId = setTimeout(() => reject(new Error('Request timeout')), 60000);
    jsonpRequest(action, params).then(resolve).catch(reject).finally(() => clearTimeout(timeoutId));
  });
}

// ============================================================
// ✅ UTILITIES
// ============================================================
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(t._toastTimer);
  t._toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

function goBack() {
  if (currentUser) {
    Session.save(currentUser);
  }
  window.location.href = DASH[currentUser?.type] || 'Dashboard.html';
}

function getUrlParameter(name) {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(name);
}

function parseDS(ds) {
  const p = ds.split('-');
  return p.length === 3 ? new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2])) : null;
}

function fmtDate(ds) {
  const dt = parseDS(ds);
  if (!dt) return ds;
  return dt.getDate().toString().padStart(2, '0') + ' ' + MN_AR[dt.getMonth()] + ' ' + dt.getFullYear();
}

// ============================================================
// ✅ LOAD EMPLOYEE INFO (من ملف المركز)
// ============================================================
async function loadEmployeeInfo() {
  if (!targetSerial) return;
  try {
    // ✅ استخدام ملف المركز المنفصل
    const employees = await gas('getEmployeesByCenter', {
      centerId: currentUser.centerId,
      centerName: currentUser.centerName
    });
    
    const emp = employees.find(e => e.serial === targetSerial);
    if (emp) {
      document.getElementById('infoName').textContent = emp.name || '—';
      document.getElementById('infoSerial').textContent = targetSerial;
      document.getElementById('infoCenter').textContent = emp.centerName || currentUser.centerName || '—';
      document.getElementById('infoBranch').textContent = emp.branchName || currentUser.branchName || '—';
    } else {
      // ✅ محاولة جلب من الملف الرئيسي كـ Fallback
      const all = await gas('getAllEmployees');
      const empFallback = all.find(e => e.serial === targetSerial);
      if (empFallback) {
        document.getElementById('infoName').textContent = empFallback.name || '—';
        document.getElementById('infoSerial').textContent = targetSerial;
        document.getElementById('infoCenter').textContent = empFallback.centerName || currentUser.centerName || '—';
        document.getElementById('infoBranch').textContent = empFallback.branchName || currentUser.branchName || '—';
      }
    }
  } catch(e) {
    console.warn('loadEmployeeInfo error:', e);
  }
}

// ============================================================
// ✅ GET MONTHLY ATTENDANCE (من ملف المركز)
// ============================================================
async function loadMyAttendance() {
  const serialToUse = targetSerial || currentUser?.id || '';
  if (!serialToUse) {
    showToast('⚠️ الرقم الوظيفي غير موجود', 'error');
    return;
  }

  const month = document.getElementById('selMonth').value;
  const year = document.getElementById('selYear').value;
  const btn = document.getElementById('btnLoad');
  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span> جاري التحميل...';

  try {
    // ✅ ✅ ✅ استخدام ملف المركز المنفصل
    const result = await gas('getMonthlyAttendance', {
      month: month,
      year: year,
      centerId: currentUser.centerId,
      centerName: currentUser.centerName
    });
    
    console.log('📊 getMonthlyAttendance result:', result);

    if (!result || !result.success) {
      throw new Error(result?.message || 'فشل التحميل');
    }

    const employees = result.employees || [];
    const emp = employees.find(e => e.serial === serialToUse);
    
    if (!emp) {
      document.getElementById('summaryRow').style.display = 'none';
      document.getElementById('tableArea').innerHTML = `
        <div class="empty">
          <span class="empty-icon">🔍</span>
          <p>الرقم الوظيفي <strong>${serialToUse}</strong> غير موجود في سجل الحضور</p>
          <small style="color:#aaa;display:block;margin-top:8px;">تأكد من إضافته في شيت Working_Days</small>
        </div>`;
      showToast('الرقم الوظيفي غير موجود في الشيت', 'error');
      return;
    }

    const myData = (result.data || {})[serialToUse] || {};
    const dates = (result.dates || []).sort((a, b) => new Date(a) - new Date(b));

    if (!dates.length) {
      document.getElementById('summaryRow').style.display = 'none';
      document.getElementById('tableArea').innerHTML = `
        <div class="empty">
          <span class="empty-icon">📭</span>
          <p>لا توجد بيانات لـ ${MN_AR[MN_KEYS.indexOf(month)]} ${year}</p>
        </div>`;
      showToast('لا توجد بيانات لهذه الفترة', 'info');
      return;
    }

    // ✅ حساب الإحصائيات
    const counts = {};
    STATUSES.forEach(s => { counts[s.key] = 0; });
    dates.forEach(d => {
      const st = myData[d];
      if (st && counts[st] !== undefined) counts[st]++;
    });
    const balance = parseFloat((result.balanceMap || {})[serialToUse]) || 0;

    // ✅ عرض الملخص
    const summaryRow = document.getElementById('summaryRow');
    summaryRow.style.display = 'flex';
    summaryRow.innerHTML = 
      STATUSES.filter(s => counts[s.key] > 0)
        .map(s => `<div class="sbadge sb-${s.chip}">${s.icon} ${s.key}: <strong>${counts[s.key]}</strong></div>`)
        .join('') +
      `<div class="sbadge sb-T">⚖️ الرصيد: <strong>${balance}</strong></div>`;

    // ✅ عرض الجدول
    const rows = dates.map(ds => {
      const dt = parseDS(ds);
      const dayName = dt ? DAYS_AR[dt.getDay()] : '';
      const st = myData[ds];
      const stObj = STATUSES.find(s => s.key === st);
      const chip = st ? `<span class="chip chip-${stObj?.chip || 'A'}">${stObj?.icon || ''} ${st}</span>`
                      : `<span style="color:#ccc;font-size:12px;">—</span>`;
      return `<tr><td class="date-col">${fmtDate(ds)}</td><td class="day-col">${dayName}</td><td>${chip}</td></tr>`;
    }).join('');

    document.getElementById('tableArea').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>📅 التاريخ</th><th>اليوم</th><th>الحالة</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
      
    showToast(`✅ ${dates.length} يوم مسجّل`, 'success');

  } catch(e) {
    console.error('❌ loadMyAttendance error:', e);
    showToast('❌ ' + e.message, 'error');
    document.getElementById('tableArea').innerHTML = `
      <div class="empty">
        <span class="empty-icon">⚠️</span>
        <p>${e.message}</p>
      </div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🔍 عرض السجل';
  }
}

// ============================================================
// ✅ INITIALIZATION
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
  // ✅ تطبيق الثيم الموحد
  if (typeof Theme !== 'undefined' && Theme.applyToPage) {
    Theme.applyToPage();
    Theme.setPageTitle('سجل حضوري');
  }
  
  // ✅ استخدام Session.checkValidity()
  if (!Session.checkValidity()) {
    location.href = 'index.html';
    return;
  }
  
  // ✅ استخدام Session.getUser()
  currentUser = Session.getUser();
  if (!currentUser) {
    location.href = 'index.html';
    return;
  }
  
  document.getElementById('userBadge').textContent = currentUser.name || '—';
  
  isAccountant = (currentUser.type === 'Accountant');
  const urlSerial = getUrlParameter('serial');

  // ✅ تحديد الرقم الوظيفي المستهدف
  if (urlSerial && isAccountant) {
    targetSerial = urlSerial;
    // التحقق من صلاحية المحاسب
    try {
      const employees = await gas('getEmployeesByCenter', {
        centerId: currentUser.centerId,
        centerName: currentUser.centerName
      });
      const targetEmp = employees.find(e => e.serial === urlSerial);
      if (targetEmp && targetEmp.centerId === currentUser.centerId) {
        // مسموح
      } else {
        showToast('⚠️ ليس لديك صلاحية لعرض بيانات هذا الموظف', 'error');
        targetSerial = currentUser.id || '';
      }
    } catch(e) {
      showToast('خطأ في التحقق من الصلاحيات', 'error');
    }
  } else {
    targetSerial = currentUser.id || '';
  }

  // ✅ عرض معلومات الموظف
  await loadEmployeeInfo();
  
  if (!urlSerial || !isAccountant) {
    document.getElementById('infoName').textContent = currentUser.name || '—';
    document.getElementById('infoSerial').textContent = targetSerial || '—';
    document.getElementById('infoCenter').textContent = currentUser.centerName || '—';
    document.getElementById('infoBranch').textContent = currentUser.branchName || '—';
  }

  // ✅ ملء قائمة السنوات
  const now = new Date();
  const ySel = document.getElementById('selYear');
  for (let y = now.getFullYear() + 1; y >= 2020; y--) {
    const o = document.createElement('option');
    o.value = y;
    o.textContent = y;
    if (y === now.getFullYear()) o.selected = true;
    ySel.appendChild(o);
  }
  document.getElementById('selMonth').value = MN_KEYS[now.getMonth()];
});
</script>
</body>
</html>
