<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>سجل حضوري</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px;}
.container{max-width:900px;margin:0 auto;background:white;border-radius:30px;box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden;}

/* ── Header ── */
.header{background:linear-gradient(135deg,#1e2b4f,#152238);color:white;padding:18px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.header h2{color:#ffd966;font-size:20px;display:flex;align-items:center;gap:8px;}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.user-badge{background:rgba(255,255,255,0.1);border:1px solid #ffd966;color:white;padding:7px 16px;border-radius:40px;font-size:13px;}
.back-btn{background:#ffd966;color:#1e2b4f;border:none;padding:7px 18px;border-radius:40px;cursor:pointer;font-weight:700;font-size:13px;}
.back-btn:hover{background:#f0c020;}

/* ── Info Bar ── */
.info-bar{background:#f0f4fa;padding:14px 28px;display:flex;gap:24px;flex-wrap:wrap;align-items:center;border-bottom:1px solid #e0e8f0;}
.info-item{display:flex;align-items:center;gap:8px;font-size:13px;color:#5a6a8a;}
.info-item strong{color:#1e2b4f;font-size:14px;}

/* ── Content ── */
.content{padding:28px;}

/* ── Period Selector ── */
.period-card{background:#f8f9fa;border-radius:18px;padding:22px 24px;margin-bottom:24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.period-card label{font-size:13px;font-weight:700;color:#5a6a8a;margin-bottom:6px;display:block;}
.period-group{display:flex;flex-direction:column;}
.sel-wrap{position:relative;}
.sel-wrap select{padding:11px 38px 11px 16px;border:2px solid #d0ddeb;border-radius:12px;font-size:14px;font-weight:700;color:#1e2b4f;background:white;cursor:pointer;appearance:none;min-width:140px;}
.sel-wrap::after{content:'▾';position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#1e2b4f;pointer-events:none;font-size:13px;}
.sel-wrap select:focus{outline:none;border-color:#1e2b4f;box-shadow:0 0 0 3px rgba(30,43,79,.1);}
.btn-load{background:#1e2b4f;color:#ffd966;border:none;padding:11px 28px;border-radius:12px;cursor:pointer;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;margin-top:22px;transition:.2s;}
.btn-load:hover{background:#2a4f8c;}
.btn-load:disabled{background:#95a5a6;color:white;cursor:not-allowed;}

/* ── Summary Badges ── */
.summary-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px;}
.summary-badge{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:40px;font-size:13px;font-weight:700;border:2px solid;}
.sb-present{background:#eafaf1;border-color:#27ae60;color:#1e8449;}
.sb-absent{background:#fdf2f8;border-color:#e74c3c;color:#c0392b;}
.sb-leave{background:#eaf4fb;border-color:#2980b9;color:#1a5276;}
.sb-half{background:#fef9e7;border-color:#f39c12;color:#9a6b00;}
.sb-unauth{background:#fdf2f8;border-color:#8e44ad;color:#6c3483;}
.sb-double{background:#fce4ec;border-color:#c0392b;color:#922b21;}
.sb-total{background:#1e2b4f;border-color:#1e2b4f;color:#ffd966;margin-right:auto;}

/* ── Table ── */
.table-wrap{border-radius:16px;overflow:hidden;border:1px solid #e0e8f0;}
table{width:100%;border-collapse:collapse;}
thead tr{background:#1e2b4f;}
thead th{color:#ffd966;padding:14px 18px;font-size:13px;font-weight:700;text-align:right;}
tbody tr{border-bottom:1px solid #f0f4fa;transition:.15s;}
tbody tr:hover{background:#f8f9fb;}
tbody tr:last-child{border-bottom:none;}
td{padding:13px 18px;font-size:14px;color:#2c3e50;}
td.date-col{font-weight:700;color:#1e2b4f;white-space:nowrap;}
td.day-col{font-size:12px;color:#7f8c8d;}

/* ── Status Chips ── */
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:30px;font-size:12px;font-weight:700;}
.chip-P{background:#eafaf1;color:#1e8449;}
.chip-A{background:#fdf2f8;color:#c0392b;}
.chip-L{background:#eaf4fb;color:#1a5276;}
.chip-H{background:#fef9e7;color:#9a6b00;}
.chip-U{background:#f5eef8;color:#6c3483;}
.chip-D{background:#fce4ec;color:#922b21;}

/* ── Empty / Loading ── */
.empty{text-align:center;padding:60px 20px;color:#aaa;}
.empty-icon{font-size:52px;display:block;margin-bottom:16px;}
.loader{width:20px;height:20px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Toast ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e2b4f;color:white;padding:12px 24px;border-radius:40px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:.35s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{background:#27ae60;}
.toast.error{background:#e74c3c;}

@media(max-width:600px){
  .period-card{flex-direction:column;align-items:stretch;}
  .btn-load{justify-content:center;}
  .summary-row{gap:8px;}
  .summary-badge{font-size:12px;padding:8px 12px;}
}
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h2>📋 سجل حضوري</h2>
    <div class="header-right">
      <span class="user-badge" id="userBadge">—</span>
      <button class="back-btn" onclick="goBack()">🔙 رجوع</button>
    </div>
  </div>

  <!-- Info Bar -->
  <div class="info-bar">
    <div class="info-item">👤 <span>الموظف:</span> <strong id="infoName">—</strong></div>
    <div class="info-item">🏢 <span>المركز:</span> <strong id="infoCenter">—</strong></div>
    <div class="info-item">🏬 <span>الفرع:</span> <strong id="infoBranch">—</strong></div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Period Selector -->
    <div class="period-card">
      <div class="period-group">
        <label>الشهر</label>
        <div class="sel-wrap">
          <select id="selMonth">
            <option value="Jan">يناير</option>
            <option value="Feb">فبراير</option>
            <option value="Mar">مارس</option>
            <option value="Apr">أبريل</option>
            <option value="May">مايو</option>
            <option value="Jun">يونيو</option>
            <option value="Jul">يوليو</option>
            <option value="Aug">أغسطس</option>
            <option value="Sep">سبتمبر</option>
            <option value="Oct">أكتوبر</option>
            <option value="Nov">نوفمبر</option>
            <option value="Dec">ديسمبر</option>
          </select>
        </div>
      </div>
      <div class="period-group">
        <label>السنة</label>
        <div class="sel-wrap">
          <select id="selYear"></select>
        </div>
      </div>
      <button class="btn-load" id="btnLoad" onclick="loadMyAttendance()">
        🔍 عرض السجل
      </button>
    </div>

    <!-- Summary -->
    <div class="summary-row" id="summaryRow" style="display:none;"></div>

    <!-- Table -->
    <div id="tableArea">
      <div class="empty">
        <span class="empty-icon">📅</span>
        <p>اختر الشهر والسنة ثم اضغط "عرض السجل"</p>
      </div>
    </div>

  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbyIROtu-OMKccUAgyn4eSMiXi4eSNfQVIkHg9hhlepZoLd4v3XbGO5E9UAETdPZ0TxC/exec';
const DASH = {Admin:'Dashboard.html',Owner:'OwnerDashboard.html',Sales:'SalesDashboard.html',Accountant:'AccountantDashboard.html'};
const MN_KEYS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MN_AR   = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const DAYS_AR  = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

const STATUSES = [
  {key:'حضور',          chip:'P', icon:'✅', label:'حضور'},
  {key:'غياب',          chip:'A', icon:'❌', label:'غياب'},
  {key:'إجازة',         chip:'L', icon:'🏖️', label:'إجازة'},
  {key:'نصف يوم',       chip:'H', icon:'½',  label:'نصف يوم'},
  {key:'غياب بدون إذن', chip:'U', icon:'⛔', label:'غياب بدون إذن'},
  {key:'غياب يوم بيومين',chip:'D',icon:'🔴', label:'غياب يوم×2'},
];

let currentUser = null;
let mySerial    = '';

// ── JSONP ──
function jsonp(action, params={}){
  return new Promise((res,rej)=>{
    const cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*99999);
    params.action=action; params.callback=cb;
    const qs=Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(String(v??''))).join('&');
    const sc=document.createElement('script');
    const to=setTimeout(()=>{delete window[cb];sc.remove();rej(new Error('انتهت مهلة الاتصال'));},30000);
    window[cb]=d=>{clearTimeout(to);delete window[cb];sc.remove();res(d);};
    sc.onerror=()=>{clearTimeout(to);delete window[cb];sc.remove();rej(new Error('خطأ في الاتصال'));};
    sc.src=GAS+'?'+qs;
    document.head.appendChild(sc);
  });
}

// ── Toast ──
function showToast(msg,type='info'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ── Init ──
document.addEventListener('DOMContentLoaded',()=>{
  const ud=sessionStorage.getItem('currentUser');
  if(!ud){ location.href='index.html'; return; }
  try{ currentUser=JSON.parse(ud); }catch(e){ location.href='index.html'; return; }

  // معرفة الـ serial من الـ id
  mySerial = currentUser.id || '';

  document.getElementById('userBadge').textContent = currentUser.name || '—';
  document.getElementById('infoName').textContent   = currentUser.name || '—';
  document.getElementById('infoCenter').textContent = currentUser.centerName || '—';
  document.getElementById('infoBranch').textContent = currentUser.branchName || '—';

  // ملء السنوات
  const now = new Date();
  const yearSel = document.getElementById('selYear');
  for(let y=now.getFullYear()+1; y>=2020; y--){
    const o=document.createElement('option');
    o.value=y; o.textContent=y;
    if(y===now.getFullYear()) o.selected=true;
    yearSel.appendChild(o);
  }

  // تحديد الشهر الحالي
  document.getElementById('selMonth').value = MN_KEYS[now.getMonth()];
});

// ── goBack ──
function goBack(){ window.location.href = DASH[currentUser?.type]||'Dashboard.html'; }

// ── تحويل D-M-YYYY → Date ──
function parseSheetDate(label){
  const p=label.split('-');
  if(p.length!==3) return null;
  return new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
}

// ── تنسيق التاريخ للعرض ──
function formatDate(label){
  const dt=parseSheetDate(label);
  if(!dt) return label;
  const d=dt.getDate().toString().padStart(2,'0');
  const m=MN_AR[dt.getMonth()];
  const y=dt.getFullYear();
  return d+' '+m+' '+y;
}

// ── تحميل السجل ──
async function loadMyAttendance(){
  if(!mySerial){
    showToast('⚠️ لم يتم التعرف على الرقم الوظيفي','error');
    return;
  }
  const month = document.getElementById('selMonth').value;
  const year  = document.getElementById('selYear').value;
  const btn   = document.getElementById('btnLoad');
  btn.disabled=true;
  btn.innerHTML='<span class="loader"></span> جاري التحميل...';

  try{
    const r = await jsonp('getMonthlyAttendance',{month, year});
    if(!r||!r.success) throw new Error(r?.message||'فشل التحميل');

    // البحث عن الموظف الحالي
    const emp = (r.employees||[]).find(e=>e.serial===mySerial);
    if(!emp){
      showToast('⚠️ الرقم الوظيفي غير موجود في شيت الحضور','error');
      document.getElementById('tableArea').innerHTML=`
        <div class="empty">
          <span class="empty-icon">🔍</span>
          <p>الرقم الوظيفي <strong>${mySerial}</strong> غير موجود في سجل الحضور</p>
          <small style="color:#aaa;margin-top:8px;display:block;">تأكد من إضافتك في شيت Working_Days</small>
        </div>`;
      document.getElementById('summaryRow').style.display='none';
      return;
    }

    const myData = (r.data||{})[mySerial] || {};
    const dates  = (r.dates||[]).sort((a,b)=>new Date(a)-new Date(b));

    if(!dates.length){
      document.getElementById('tableArea').innerHTML=`
        <div class="empty">
          <span class="empty-icon">📭</span>
          <p>لا توجد بيانات حضور لـ ${MN_AR[MN_KEYS.indexOf(month)]} ${year}</p>
        </div>`;
      document.getElementById('summaryRow').style.display='none';
      showToast('لا توجد بيانات لهذه الفترة','info');
      return;
    }

    // ── بناء ملخص الحالات ──
    const counts = {};
    STATUSES.forEach(s=>{ counts[s.key]=0; });
    dates.forEach(d=>{
      const st = myData[d];
      if(st && counts[st]!==undefined) counts[st]++;
    });

    // ── عرض الملخص ──
    const chipMap = {
      'حضور':'sb-present','غياب':'sb-absent','إجازة':'sb-leave',
      'نصف يوم':'sb-half','غياب بدون إذن':'sb-unauth','غياب يوم بيومين':'sb-double'
    };
    const summaryRow = document.getElementById('summaryRow');
    summaryRow.style.display='flex';
    const balance = (r.balanceMap||{})[mySerial] || 0;
    summaryRow.innerHTML = STATUSES
      .filter(s=>counts[s.key]>0)
      .map(s=>`<div class="summary-badge ${chipMap[s.key]}">${s.icon} ${s.label}: <strong>${counts[s.key]}</strong></div>`)
      .join('') +
      `<div class="summary-badge sb-total">⚖️ الرصيد: <strong>${balance}</strong></div>`;

    // ── بناء الجدول ──
    const rows = dates.map(dateStr=>{
      const dt = parseSheetDate(dateStr);
      const dayName = dt ? DAYS_AR[dt.getDay()] : '';
      const st = myData[dateStr];
      const stObj = STATUSES.find(s=>s.key===st);
      const chip = st
        ? `<span class="chip chip-${stObj?.chip||'A'}">${stObj?.icon||''} ${st}</span>`
        : `<span style="color:#ccc;font-size:12px;">—</span>`;

      return `<tr>
        <td class="date-col">${formatDate(dateStr)}</td>
        <td class="day-col">${dayName}</td>
        <td>${chip}</td>
      </tr>`;
    }).join('');

    document.getElementById('tableArea').innerHTML=`
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>📅 التاريخ</th>
              <th>اليوم</th>
              <th>الحالة</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;

    showToast(`✅ ${dates.length} يوم مسجّل`,'success');

  }catch(e){
    showToast('❌ '+e.message,'error');
    document.getElementById('tableArea').innerHTML=`
      <div class="empty">
        <span class="empty-icon">⚠️</span>
        <p>${e.message}</p>
      </div>`;
  }finally{
    btn.disabled=false;
    btn.innerHTML='🔍 عرض السجل';
  }
}
</script>
</body>
</html>
