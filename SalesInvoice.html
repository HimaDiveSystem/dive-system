<!-- 
  PATCH FOR SalesInvoice.html
  Replace ONLY the stickyTop div and its CSS variables section.
  Everything else (form, scripts, modals) stays exactly the same.
-->

<!-- ══════════════════════════════════════════
     REPLACE THIS CSS in the <style> block:
     (find the :root section and these variables)
     ══════════════════════════════════════════ -->
<!--
  Change these two CSS variables:
    --ticker-h:42px;   →  --ticker-h:38px;
    --header-h:60px;   →  --header-h:52px;

  Also in the @media(max-width:680px) section:
    --ticker-h:36px;   (keep as is)
-->

<!-- ══════════════════════════════════════════
     REPLACE THE ENTIRE stickyTop div with:
     ══════════════════════════════════════════ -->
<div id="stickyTop">

  <!-- Ticker bar: rates on right, scrolling left, Back button on far left -->
  <div class="ticker-bar">
    <!-- Back button on far LEFT -->
    <button class="back-btn" onclick="goBack()"
      style="flex-shrink:0;margin:0 10px;padding:3px 12px;border:2px solid rgba(255,255,255,.3);background:transparent;color:white;border-radius:40px;cursor:pointer;font-weight:700;font-size:11px;font-family:'Cairo',sans-serif;white-space:nowrap;transition:all .2s;"
      onmouseover="this.style.borderColor='#f5c842';this.style.color='#f5c842'"
      onmouseout="this.style.borderColor='rgba(255,255,255,.3)';this.style.color='white'">
      ← Back
    </button>

    <!-- Label -->
    <div class="ticker-label">💱 LIVE</div>

    <!-- Scrolling track -->
    <div class="ticker-track" style="overflow:hidden;flex:1;">
      <div class="ticker-inner" id="tickerInner">
        <span class="ticker-item" style="color:#475569">⏳ Loading...</span>
      </div>
    </div>

    <!-- Date on far right -->
    <div class="ticker-date" id="tickerDate"></div>
  </div>

  <!-- Header bar: user info only (no title, no back btn here) -->
  <div class="header" style="justify-content:flex-end;">
    <div class="header-right">
      <div class="user-chip">
        <div class="avatar" id="userAvatar">?</div>
        <span id="userNameDisplay">...</span>
      </div>
      <span class="meta-pill" id="centerDisplay" style="display:none"></span>
      <span class="meta-pill" id="branchDisplay" style="display:none"></span>
    </div>
  </div>

</div>

<!-- ══════════════════════════════════════════
     IN THE JAVASCRIPT — replace the ticker fill section:
     Find the gas('getLatestExchangeRates') block and 
     replace the ticker items line with:
     ══════════════════════════════════════════ -->
<!--
  FIND this section inside gas('getLatestExchangeRates').then(r => { ... }):

    const items = [
      {lbl:'USD Cash',v:r.sUSD,t:'CASH'},{lbl:'EUR Cash',v:r.sEUR,t:'CASH'},
      {lbl:'GBP Cash',v:r.sGBP,t:'CASH'},{lbl:'USD Visa',v:r.sVUSD,t:'VISA'},
      {lbl:'EUR Visa',v:r.sVEUR,t:'VISA'},{lbl:'GBP Visa',v:r.sVGBP,t:'VISA'},
    ].filter(x=>x.v&&+x.v>0);

  REPLACE WITH (cash rates only, no visa):

    const items = [
      {lbl:'USD $', v: r.sUSD},
      {lbl:'EUR €', v: r.sEUR},
      {lbl:'GBP £', v: r.sGBP},
    ].filter(x => x.v && +x.v > 0);

  AND replace the ticker html line:
    const h=items.map(it=>`<span class="ticker-item">...`).join('');

  WITH:
    const h = items.map(it =>
      `<span class="ticker-item">
        <span class="rl">${it.lbl}</span>
        <span class="rv">${(+it.v).toFixed(4)}</span>
      </span><span class="ticker-sep">◆</span>`
    ).join('');
    document.getElementById('tickerInner').innerHTML = h + h;
    document.getElementById('tickerDate').textContent = '📅 ' + (r.date || '');
-->

<!-- ══════════════════════════════════════════
     CSS ADDITIONS — add to <style> block:
     (these fix the back button in ticker)
     ══════════════════════════════════════════ -->
<style>
/* Remove the header back-btn since it's now in ticker */
.header .back-btn { display: none !important; }

/* Ensure ticker-bar is flex and allows back btn */
.ticker-bar {
  display: flex !important;
  align-items: center;
  height: var(--ticker-h);
}

/* Keep header right-aligned only */  
.header {
  justify-content: flex-end !important;
}
</style>
