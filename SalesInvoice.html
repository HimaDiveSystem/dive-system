<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes, viewport-fit=cover">
  <title>Edit Invoice | تعديل الفاتورة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #0f1f3d; --primary-dark: #1a3260; --primary-light: #2a4a7a;
      --accent: #f5c842; --accent-dark: #e6b800;
      --success: #16a34a; --success-dark: #15803d;
      --danger: #dc2626; --danger-dark: #b91c1c;
      --warning: #f59e0b; --info: #3b82f6;
      --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
      --gray-300: #cbd5e1; --gray-400: #94a3b8; --gray-500: #64748b;
      --gray-600: #475569; --gray-700: #334155; --gray-800: #1e293b;
      --border: #e2e8f0;
      --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --radius: 16px; --radius-sm: 10px;
    }
    body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #f0f4f8 0%, #e6edf4 100%); color: var(--gray-800); min-height: 100vh; }

    /* Header */
    .header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-lg); }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-left h2 { color: var(--accent); font-size: 1.25rem; font-weight: 800; }
    .voucher-badge { background: var(--accent); color: var(--primary); padding: 4px 16px; border-radius: 40px; font-weight: 800; font-size: 0.875rem; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .user-chip { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); border-radius: 40px; padding: 6px 16px; font-size: 0.8125rem; font-weight: 600; }
    .back-btn { background: transparent; border: 1px solid rgba(255,255,255,.3); color: white; padding: 6px 18px; border-radius: 40px; cursor: pointer; font-weight: 600; font-size: 0.8125rem; transition: all .2s; }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Container */
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 20px 48px; }

    /* Cards */
    .card { background: white; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 20px; overflow: hidden; }
    .card-header { padding: 14px 20px; background: linear-gradient(90deg, var(--primary), var(--primary-dark)); display: flex; align-items: center; gap: 10px; }
    .card-header h3 { color: var(--accent); font-size: 0.875rem; font-weight: 800; }
    .card-header .icon { background: rgba(245,200,66,.2); border-radius: 8px; padding: 4px 8px; font-size: .875rem; }
    .card-body { padding: 20px; }

    /* Forms */
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: .6875rem; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: .5px; }
    input, select, textarea { padding: 10px 14px; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: .875rem; font-family: 'Cairo', sans-serif; color: var(--gray-800); background: var(--gray-50); transition: all .2s; width: 100%; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--info); box-shadow: 0 0 0 3px rgba(59,130,246,.1); background: white; }
    input[readonly], input:disabled, select:disabled, textarea:disabled { background: var(--gray-100); color: var(--gray-500); cursor: default; opacity: .7; }
    input[type="number"] { text-align: center; }

    /* Hotel Row */
    .hotel-row { display: grid; grid-template-columns: 1fr 90px 70px 70px 70px; gap: 12px; margin-bottom: 16px; }

    /* Trip Table */
    .trip-table { overflow-x: auto; border-radius: 12px; border: 1px solid var(--gray-200); margin-top: 12px; }
    .trip-table table { width: 100%; border-collapse: collapse; font-size: .8125rem; }
    .trip-table th { background: linear-gradient(90deg, var(--primary), var(--primary-dark)); color: var(--accent); padding: 10px 12px; font-weight: 700; text-align: center; }
    .trip-table th:first-child { text-align: left; }
    .trip-table td { padding: 10px 12px; border-bottom: 1px solid var(--gray-100); text-align: center; }
    .trip-table td:first-child { text-align: left; font-weight: 600; }
    .trip-table input { width: 70px; padding: 6px; text-align: center; font-weight: 600; }

    /* Payment */
    .payment-section { background: linear-gradient(135deg, #fafbff, #f5f7fa); border-radius: 12px; margin-top: 8px; }
    .payment-label { padding: 12px 16px 4px; font-size: .6875rem; font-weight: 800; color: var(--gray-500); text-transform: uppercase; letter-spacing: .7px; }
    .payment-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 8px 16px 16px; }
    .payment-card { background: white; border: 1px solid var(--gray-200); border-radius: 12px; padding: 10px 8px; text-align: center; transition: all .2s; }
    .payment-card:focus-within { border-color: var(--info); box-shadow: 0 0 0 2px rgba(59,130,246,.2); }
    .payment-card label { display: block; font-size: .625rem; font-weight: 700; color: var(--gray-500); margin-bottom: 6px; }
    .payment-card input { width: 100%; border: none; background: transparent; text-align: center; font-size: .875rem; font-weight: 700; padding: 4px; }
    .payment-card input:focus { box-shadow: none; }
    .payment-card input:disabled { background: transparent; }

    /* Totals Strip */
    .totals-strip { display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; gap: 16px; padding: 16px 20px; background: white; border-bottom: 1px dashed var(--gray-200); }
    .total-item { text-align: center; }
    .total-item .label { font-size: .625rem; font-weight: 700; color: var(--gray-500); text-transform: uppercase; margin-bottom: 4px; }
    .total-item .value { font-size: 1.75rem; font-weight: 900; color: var(--primary); line-height: 1.2; }
    .total-item .currency { font-size: .75rem; color: var(--accent-dark); font-weight: 700; }
    .total-item input { width: 110px; padding: 6px 10px; text-align: center; font-weight: 700; font-size: .875rem; }

    /* Badges */
    .warning-bar { background: #fffbeb; border: 1px solid var(--warning); border-radius: 12px; padding: 12px 16px; color: #b45309; font-weight: 600; font-size: .8125rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .warning-bar.info { background: #eff6ff; border-color: var(--info); color: #1e40af; }
    .warning-bar.success { background: #f0fdf4; border-color: var(--success); color: #166534; }

    /* Buttons */
    .action-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 24px; }
    .btn { padding: 12px 28px; border: none; border-radius: 40px; font-weight: 800; font-size: .8125rem; cursor: pointer; font-family: 'Cairo', sans-serif; display: inline-flex; align-items: center; gap: 8px; transition: all .2s; }
    .btn:hover { transform: translateY(-2px); }
    .btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: var(--accent); box-shadow: var(--shadow); }
    .btn-success { background: linear-gradient(135deg, var(--success), var(--success-dark)); color: white; }
    .btn-warning { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
    .btn-danger { background: #fee2e2; color: var(--danger); }

    /* Modal */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
    .modal.open { display: flex; }
    .modal-content { background: white; width: 90%; max-width: 540px; border-radius: 24px; padding: 28px; box-shadow: var(--shadow-lg); animation: modalPop .25s ease; max-height: 90vh; overflow-y: auto; }
    @keyframes modalPop { from { transform: scale(.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-icon { font-size: 3rem; text-align: center; margin-bottom: 12px; }
    .modal-message { color: var(--gray-800); font-size: .9375rem; font-weight: 700; margin-bottom: 20px; line-height: 1.5; text-align: center; white-space: pre-wrap; }
    .modal-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }

    /* Collection modal specifics */
    .coll-rest-display { text-align: center; margin-bottom: 20px; padding: 16px; background: linear-gradient(135deg, #f0fdf4, #dcfce7); border-radius: 14px; border: 1px solid #86efac; }
    .coll-rest-display .big { font-size: 2.25rem; font-weight: 900; color: var(--primary); line-height: 1.2; }
    .coll-rest-display .sub { font-size: .75rem; color: var(--gray-500); font-weight: 600; text-transform: uppercase; margin-top: 4px; }

    .coll-total-bar { background: #f1f5f9; border-radius: 12px; padding: 12px 16px; text-align: center; margin: 8px 0 4px; }
    .coll-total-bar .tv { font-size: 1.5rem; font-weight: 900; color: var(--success); margin-left: 8px; }

    .new-rest-bar { background: white; border: 2px solid var(--gray-200); border-radius: 12px; padding: 12px 16px; text-align: center; margin: 4px 0 8px; transition: border-color .2s; }
    .new-rest-bar.positive { border-color: #fbbf24; background: #fffbeb; }
    .new-rest-bar.zero { border-color: var(--success); background: #f0fdf4; }
    .new-rest-bar .nrv { font-size: 1.5rem; font-weight: 900; color: var(--primary); }

    /* Transfer checkbox row */
    .transfer-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; }
    .transfer-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .transfer-row label { font-size: .875rem; font-weight: 600; color: var(--gray-700); cursor: pointer; }

    /* Loader */
    .loader-container { text-align: center; padding: 60px; color: var(--gray-500); }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--gray-200); border-top-color: var(--info); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* PDF Overlay */
    .pdf-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 1100; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
    .pdf-overlay.show { display: flex; }
    .pdf-spinner { width: 56px; height: 56px; border: 4px solid rgba(255,255,255,.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }

    @media (max-width: 640px) {
      .payment-grid { grid-template-columns: repeat(2, 1fr); }
      .hotel-row { grid-template-columns: 1fr 80px 62px 62px 62px; }
      .container { padding: 16px; }
      .card-body { padding: 16px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h2>✏️ تعديل الفاتورة</h2>
    <span class="voucher-badge" id="voucherDisplay">---</span>
  </div>
  <div class="header-right">
    <span class="user-chip" id="userNameDisplay">...</span>
    <button class="back-btn" onclick="goBack()">← خروج</button>
  </div>
</div>

<div class="container" id="mainContainer">
  <div class="loader-container" id="loaderState">
    <div class="spinner"></div>
    <div>جاري تحميل بيانات الفاتورة...</div>
  </div>
  <div id="formContent" style="display:none;"></div>
</div>

<!-- Collection Modal -->
<div id="collectionModal" class="modal">
  <div class="modal-content" id="collectionModalContent"></div>
</div>

<!-- Alert Modal -->
<div id="alertModal" class="modal">
  <div class="modal-content">
    <div class="modal-icon" id="alertIcon">ℹ️</div>
    <div class="modal-message" id="alertMsg"></div>
    <div class="modal-buttons" id="alertBtns">
      <button class="btn btn-primary" onclick="closeAlert()">موافق</button>
    </div>
  </div>
</div>

<!-- PDF Overlay -->
<div id="pdfOverlay" class="pdf-overlay">
  <div class="pdf-spinner"></div>
  <p id="pdfMsg" style="color:white;">جاري المعالجة...</p>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════ */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwe1Q9pjAJRk9CfWsK5YGjD5uVAbJkMhAVgw6akKkFIR9sz15V78C88Vs5dumKE-SwF/exec';
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DASH = { Admin:'Dashboard.html', Owner:'OwnerDashboard.html', Sales:'SalesDashboard.html', Accountant:'AccountantDashboard.html', Customer:'CustomerDashboard.html' };

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
let currentUser = null;
let currentInvoice = null;
let originalInvoice = null;
let openFrom = 'today';
let tripDefinitions = [];
let allSuppliersCustomers = [];
let exRatesCache = {};

// تحديد ما إذا كانت IssueDate = اليوم (للتحكم في منطق التحصيل والمدفوعات)
let isIssuedToday = false;

/* ═══════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════ */
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function R2(n) { return Math.round((n + Number.EPSILON) * 100) / 100; }
function dV(v) { const n = Number(v); return (n === 0 || isNaN(n)) ? '' : n; }
function formatDate(d) { return `${String(d.getDate()).padStart(2,'0')}/${MONTHS[d.getMonth()]}/${d.getFullYear()}`; }
function parseDate(str) {
  if (!str) return null;
  const p = str.split('/');
  if (p.length === 3) { const mi = MONTHS.findIndex(m => m.toLowerCase() === p[1].toLowerCase()); if (mi !== -1) return new Date(+p[2], mi, +p[0]); }
  // YYYY-MM-DD
  const m = str.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  return null;
}
function dateToInput(s) { const d = parseDate(s); if (!d) return ''; return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function timeToInput(t) { if (!t) return ''; const m = String(t).match(/(\d{1,2}):(\d{2})/); return m ? `${m[1].padStart(2,'0')}:${m[2]}` : String(t).substring(0,5); }
function todayDate() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function isDateToday(dateStr) {
  const d = parseDate(dateStr);
  if (!d) return false;
  d.setHours(0,0,0,0);
  const t = todayDate();
  return d.getTime() === t.getTime();
}

function showAlert(msg, icon='ℹ️', btns=null) {
  document.getElementById('alertMsg').textContent = msg;
  document.getElementById('alertIcon').textContent = icon;
  document.getElementById('alertBtns').innerHTML = btns || '<button class="btn btn-primary" onclick="closeAlert()">موافق</button>';
  document.getElementById('alertModal').classList.add('open');
}
function closeAlert() { document.getElementById('alertModal').classList.remove('open'); }
function showPDF(m) { document.getElementById('pdfMsg').textContent = m; document.getElementById('pdfOverlay').classList.add('show'); }
function hidePDF() { document.getElementById('pdfOverlay').classList.remove('show'); }
function goBack() {
  const returnUrl = sessionStorage.getItem('returnUrl');
  if (returnUrl) location.href = returnUrl;
  else location.href = DASH[currentUser?.type] || 'Dashboard.html';
}

async function gas(action, params={}) {
  const url = new URL(GAS_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, String(v??'')));
  const res = await fetch(url.toString(), { redirect: 'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

/* ═══════════════════════════════════════════════════════
   EXCHANGE RATES
═══════════════════════════════════════════════════════ */
async function getRate(dateStr) {
  if (!dateStr) return null;
  if (exRatesCache[dateStr]) return exRatesCache[dateStr];
  try {
    const r = await gas('getExchangeRate', { dateStr });
    if (r) { exRatesCache[dateStr] = r; return r; }
  } catch(e) {}
  return null;
}

/**
 * يُرجع {cash:{USD,EUR,GBP}, visa:{USD,EUR,GBP,LE}}
 * يدعم كلا الشكلين: getExchangeRate (cash/visa) و getLatestExchangeRates (sUSD…)
 */
function rateFields(r) {
  if (!r) return null;
  if (r.cash) return r;
  return {
    cash: { USD: +r.sUSD||47.5, EUR: +r.sEUR||50.25, GBP: +r.sGBP||60 },
    visa: { USD: +r.sVUSD||46.3, EUR: +r.sVEUR||49, GBP: +r.sVGBP||58.5, LE: +r.sVLE||0.975 }
  };
}

/**
 * يحسب المبلغ المدفوع بعملة الفاتورة من تفاصيل العملات وأسعار الصرف.
 * هذه هي نفس الدالة المستخدمة في SalesInvoice.
 */
async function calcPaidInCurrency(currency, cU, cE, cG, cL, vU, vE, vG, vL, dateStr) {
  const raw = dateStr ? await getRate(dateStr) : null;
  const r = rateFields(raw);
  if (r) {
    const LE = cU*r.cash.USD + cE*r.cash.EUR + cG*r.cash.GBP + cL
             + vU*r.visa.USD + vE*r.visa.EUR + vG*r.visa.GBP + vL*(r.visa.LE||0.975);
    if (currency === '$') return R2(LE / r.cash.USD);
    if (currency === '€') return R2(LE / r.cash.EUR);
    if (currency === '£') return R2(LE / r.cash.GBP);
    return R2(LE);
  }
  // Fallback: مباشرة
  if (currency === '$') return R2(cU + vU);
  if (currency === '€') return R2(cE + vE);
  if (currency === '£') return R2(cG + vG);
  return R2(cL + vL);
}

/* ═══════════════════════════════════════════════════════
   LOAD TRIPS & SUPPLIERS
═══════════════════════════════════════════════════════ */
async function loadSuppliersAndTrips() {
  try {
    const [suppliers, trips] = await Promise.all([
      gas('getAllSuppliersCustomers'),
      gas('getAllTrips')
    ]);
    allSuppliersCustomers = Array.isArray(suppliers) ? suppliers : [];
    tripDefinitions = Array.isArray(trips) ? trips : [];
  } catch(e) { console.warn(e); }
}
function getTripCategory(tripName) { return (tripDefinitions.find(t => t.name === tripName) || {}).category || ''; }
function getCustomersByCategory(cat) { return allSuppliersCustomers.filter(c => c.customerType==='Customer' && c.category===cat && c.status===true); }
function getSuppliersByCategory(cat) { return allSuppliersCustomers.filter(s => s.customerType==='Supplier' && s.category===cat && s.status===true); }

/* ═══════════════════════════════════════════════════════
   UPDATE TOTALS (on the main form)
═══════════════════════════════════════════════════════ */
async function updateTotals() {
  const currency = document.getElementById('invoiceCurrency')?.value;
  const dateStr = document.getElementById('activeDate')?.value;
  let actual = 0;
  for (let i = 0; i < 20; i++) {
    const tot = document.getElementById(`total_${i}`);
    if (tot) actual += parseFloat(tot.value) || 0;
  }
  const disc = parseFloat(document.getElementById('discount')?.value) || 0;
  const cU = parseFloat(document.getElementById('cashUSD')?.value) || 0;
  const cE = parseFloat(document.getElementById('cashEUR')?.value) || 0;
  const cG = parseFloat(document.getElementById('cashGBP')?.value) || 0;
  const cL = parseFloat(document.getElementById('cashLE')?.value) || 0;
  const vU = parseFloat(document.getElementById('visaUSD')?.value) || 0;
  const vE = parseFloat(document.getElementById('visaEUR')?.value) || 0;
  const vG = parseFloat(document.getElementById('visaGBP')?.value) || 0;
  const vL = parseFloat(document.getElementById('visaLE')?.value) || 0;
  const paid = await calcPaidInCurrency(currency, cU, cE, cG, cL, vU, vE, vG, vL, dateStr);
  const rest = R2(actual - disc - paid);
  if (document.getElementById('displayActualPrice')) document.getElementById('displayActualPrice').textContent = actual.toFixed(2);
  if (document.getElementById('displayPaymentPrice')) document.getElementById('displayPaymentPrice').textContent = paid.toFixed(2);
  if (document.getElementById('displayRest')) document.getElementById('displayRest').textContent = rest.toFixed(2);
}

function updateItemTotal(idx, price) {
  const qty = parseFloat(document.getElementById(`qty_${idx}`)?.value) || 0;
  const tot = document.getElementById(`total_${idx}`);
  if (tot) tot.value = (qty * price).toFixed(2);
  updateTotals();
}

function parseActivities(text) {
  const res = [];
  if (!text) return res;
  text.split('|').forEach(p => {
    const m = p.trim().match(/^(.+?)×(\d+(\.\d+)?)$/);
    if (m) res.push({ name: m[1].trim(), qty: parseFloat(m[2]) || 0 });
  });
  return res;
}

/* ═══════════════════════════════════════════════════════
   COLLECTION MODAL
   ─────────────────────────────────────────────────────
   منطق التحصيل:
   - isIssuedToday = true  → تعديل مباشر على الفاتورة الأصلية (جمع المبالغ)
   - isIssuedToday = false → إنشاء صف جديد (فاتورة تحصيل Collection)
═══════════════════════════════════════════════════════ */
async function openCollectionModal() {
  if (!currentInvoice) return;

  // حساب المبلغ المتبقي الحقيقي من واجهة المستخدم (بعد أي تعديلات)
  const displayRest = parseFloat(document.getElementById('displayRest')?.textContent) || 0;
  const currency = document.getElementById('invoiceCurrency')?.value || currentInvoice.invoiceCurrency || '$';

// ────── حساب إجمالي المحصل وتحديث "المتبقي الجديد" ──────
async function updateCollPreview() {
  const currency = document.getElementById('invoiceCurrency')?.value || currentInvoice?.invoiceCurrency || '$';
  const dateStr = document.getElementById('activeDate')?.value;
  const displayRest = parseFloat(document.getElementById('displayRest')?.textContent) || 0;

  const cU = parseFloat(document.getElementById('collUSD')?.value) || 0;
  const cE = parseFloat(document.getElementById('collEUR')?.value) || 0;
  const cG = parseFloat(document.getElementById('collGBP')?.value) || 0;
  const cL = parseFloat(document.getElementById('collLE')?.value) || 0;
  const vU = parseFloat(document.getElementById('collVisaUSD')?.value) || 0;
  const vE = parseFloat(document.getElementById('collVisaEUR')?.value) || 0;
  const vG = parseFloat(document.getElementById('collVisaGBP')?.value) || 0;
  const vL = parseFloat(document.getElementById('collVisaLE')?.value) || 0;

  // إجمالي مدفوع = 0 إذا لم يتم إدخال شيء
  const hasAny = (cU+cE+cG+cL+vU+vE+vG+vL) > 0;
  if (!hasAny) {
    const td = document.getElementById('collTotalDisplay');
    if (td) td.textContent = '0.00';
    const nr = document.getElementById('newRestDisplay');
    if (nr) nr.textContent = '—';
    const bar = document.getElementById('newRestBar');
    if (bar) { bar.classList.remove('positive','zero'); }
    const btn = document.getElementById('collSubmitBtn');
    if (btn) btn.disabled = true;
    return;
  }

  const collected = await calcPaidInCurrency(currency, cU, cE, cG, cL, vU, vE, vG, vL, dateStr);
  const newRest = R2(displayRest - collected);

  // عرض الإجمالي
  const td = document.getElementById('collTotalDisplay');
  if (td) td.textContent = collected.toFixed(2);

  // عرض المتبقي الجديد
  const nr = document.getElementById('newRestDisplay');
  const bar = document.getElementById('newRestBar');
  if (nr && bar) {
    const safeRest = Math.max(0, newRest);
    nr.textContent = safeRest.toFixed(2);
    bar.classList.toggle('positive', safeRest > 0.01);
    bar.classList.toggle('zero', safeRest <= 0.01);
  }

  // تفعيل زر التأكيد إذا المحصول > 0 ولا يتجاوز المتبقي
  const btn = document.getElementById('collSubmitBtn');
  if (btn) btn.disabled = (collected <= 0 || collected > displayRest + 0.01);
}

function closeCollectionModal() { document.getElementById('collectionModal').classList.remove('open'); }

// ────── تنفيذ التحصيل ──────
async function submitCollection() {
  const currency = document.getElementById('invoiceCurrency')?.value || currentInvoice.invoiceCurrency;
  const dateStr = document.getElementById('activeDate')?.value;
  const displayRest = parseFloat(document.getElementById('displayRest')?.textContent) || 0;

  const cU = parseFloat(document.getElementById('collUSD')?.value) || 0;
  const cE = parseFloat(document.getElementById('collEUR')?.value) || 0;
  const cG = parseFloat(document.getElementById('collGBP')?.value) || 0;
  const cL = parseFloat(document.getElementById('collLE')?.value) || 0;
  const vU = parseFloat(document.getElementById('collVisaUSD')?.value) || 0;
  const vE = parseFloat(document.getElementById('collVisaEUR')?.value) || 0;
  const vG = parseFloat(document.getElementById('collVisaGBP')?.value) || 0;
  const vL = parseFloat(document.getElementById('collVisaLE')?.value) || 0;

  const collected = await calcPaidInCurrency(currency, cU, cE, cG, cL, vU, vE, vG, vL, dateStr);
  if (collected <= 0) { showAlert('الرجاء إدخال مبلغ تحصيل صحيح', '⚠️'); return; }
  if (collected > displayRest + 0.01) { showAlert(`المبلغ المحصل (${collected.toFixed(2)}) يتجاوز المتبقي (${displayRest.toFixed(2)})`, '⚠️'); return; }

  const newRest = Math.max(0, R2(displayRest - collected));
  const transferred = document.getElementById('collTransferred')?.checked ? 'Yes' : 'No';
  const notes = document.getElementById('collNotes')?.value || '';
  const hasCash = (cU+cE+cG+cL) > 0;
  const hasVisa = (vU+vE+vG+vL) > 0;
  const paymentMethod = (hasCash && hasVisa) ? 'Mixed' : (hasCash ? 'Cash' : (hasVisa ? 'Visa' : 'Mixed'));

  closeCollectionModal();
  showPDF('جاري حفظ التحصيل...');

  try {
    if (isIssuedToday) {
      // ─── الحالة 1: IssueDate = اليوم → تعديل مباشر (جمع المبالغ) ───
      await submitCollectionSameDay(cU, cE, cG, cL, vU, vE, vG, vL, newRest, collected, notes, transferred, paymentMethod);
    } else {
      // ─── الحالة 2: IssueDate < اليوم → صف جديد ───
      await submitCollectionNewRow(cU, cE, cG, cL, vU, vE, vG, vL, newRest, collected, notes, transferred, paymentMethod);
    }
  } catch(err) {
    hidePDF();
    showAlert('خطأ: ' + err.message, '❌');
  }
}

/**
 * الحالة 1: IssueDate = اليوم
 * يقرأ المدفوعات الحالية من الشيت ويضيف إليها، ثم يحدث الفاتورة الأصلية.
 */
async function submitCollectionSameDay(cU, cE, cG, cL, vU, vE, vG, vL, newRest, collected, notes, transferred, paymentMethod) {
  // قراءة المدفوعات الحالية من الفاتورة المحملة
  const origCashUSD = parseFloat(currentInvoice.cashUSD) || 0;
  const origCashEUR = parseFloat(currentInvoice.cashEUR) || 0;
  const origCashGBP = parseFloat(currentInvoice.cashGBP) || 0;
  const origCashLE  = parseFloat(currentInvoice.cashLE)  || 0;
  const origVisaUSD = parseFloat(currentInvoice.visaUSD) || 0;
  const origVisaEUR = parseFloat(currentInvoice.visaEUR) || 0;
  const origVisaGBP = parseFloat(currentInvoice.visaGBP) || 0;
  const origVisaLE  = parseFloat(currentInvoice.visaLE)  || 0;

  // جمع المبالغ
  const newCashUSD = origCashUSD + cU;
  const newCashEUR = origCashEUR + cE;
  const newCashGBP = origCashGBP + cG;
  const newCashLE  = origCashLE  + cL;
  const newVisaUSD = origVisaUSD + vU;
  const newVisaEUR = origVisaEUR + vE;
  const newVisaGBP = origVisaGBP + vG;
  const newVisaLE  = origVisaLE  + vL;

  // إعادة حساب paymentPrice
  const currency = document.getElementById('invoiceCurrency')?.value || currentInvoice.invoiceCurrency;
  const dateStr = document.getElementById('activeDate')?.value;
  const newPaid = await calcPaidInCurrency(currency, newCashUSD, newCashEUR, newCashGBP, newCashLE, newVisaUSD, newVisaEUR, newVisaGBP, newVisaLE, dateStr);
  const actualPrice = parseFloat(document.getElementById('displayActualPrice')?.textContent) || currentInvoice.actualPrice || 0;
  const disc = parseFloat(document.getElementById('discount')?.value) || 0;
  const finalRest = R2(actualPrice - disc - newPaid);

  // تجميع البيانات الكاملة للتحديث (كل بيانات النموذج + المدفوعات الجديدة)
  const editedData = await collectEditedData();
  editedData.cashUSD = newCashUSD;
  editedData.cashEUR = newCashEUR;
  editedData.cashGBP = newCashGBP;
  editedData.cashLE  = newCashLE;
  editedData.visaUSD = newVisaUSD;
  editedData.visaEUR = newVisaEUR;
  editedData.visaGBP = newVisaGBP;
  editedData.visaLE  = newVisaLE;
  editedData.paymentPrice = newPaid;
  editedData.rest = finalRest;
  // إضافة بيانات التحصيل للتتبع في ملاحظات التعديل
  editedData.notes = (editedData.notes ? editedData.notes + ' | ' : '') + `[تحصيل ${collected.toFixed(2)} ${currency} - ${new Date().toLocaleDateString('ar')}]` + (notes ? ` (${notes})` : '');
  editedData.transferredToTreasury = transferred;
  editedData.collectedBy = currentUser?.id || '';
  editedData.collectedByName = currentUser?.name || '';
  editedData.paymentMethod = paymentMethod;

  const upd = await gas('updateInvoice', editedData);
  if (!upd?.success) throw new Error(upd?.message || 'فشل التحديث');

  // حفظ سجل تعديل
  const summary = `تحصيل ${collected.toFixed(2)} ${currency} [${paymentMethod}] - تسليم خزينة: ${transferred}`;
  await gas('copyInvoiceToEdit', {
    originalData: JSON.stringify(originalInvoice),
    editedData: JSON.stringify(editedData),
    userId: currentUser?.id || '',
    editSummary: summary
  }).catch(()=>{});

  // تجديد PDF
  showPDF('📄 جاري تحديث PDF...');
  const pdf = await gas('saveAndGenerateSinglePDF', { voucherNo: editedData.voucherNo });
  hidePDF();

  // تحديث الواجهة
  currentInvoice.cashUSD = newCashUSD; currentInvoice.cashEUR = newCashEUR;
  currentInvoice.cashGBP = newCashGBP; currentInvoice.cashLE  = newCashLE;
  currentInvoice.visaUSD = newVisaUSD; currentInvoice.visaEUR = newVisaEUR;
  currentInvoice.visaGBP = newVisaGBP; currentInvoice.visaLE  = newVisaLE;
  currentInvoice.rest = finalRest;

  const pdfBtn = pdf?.success ? `<a href="${pdf.url}" target="_blank" class="btn btn-primary" style="text-decoration:none;">📄 فتح PDF</a>` : '';
  showAlert(
    `✅ تم تحصيل ${collected.toFixed(2)} ${currency}\nالمتبقي الجديد: ${finalRest.toFixed(2)} ${currency}\nتسليم الخزينة: ${transferred}`,
    '✅',
    pdfBtn + `<button class="btn btn-primary" onclick="location.reload()">🔄 تحديث</button><button class="btn btn-primary" onclick="goBack()">رجوع</button>`
  );
}

/**
 * الحالة 2: IssueDate < اليوم
 * ينشئ صفاً جديداً في شيت Invoices كفاتورة تحصيل (Collection)
 * بدون بنود، مع جميع بيانات التتبع.
 */
async function submitCollectionNewRow(cU, cE, cG, cL, vU, vE, vG, vL, newRest, collected, notes, transferred, paymentMethod) {
  const collectionData = {
    parentVoucherNo:      currentInvoice.voucherNo,
    activeDate:           currentInvoice.activeDate,
    salesId:              currentInvoice.salesId,
    time:                 currentInvoice.time,
    trip:                 currentInvoice.trip,       // ← اسم الرحلة مهم للإيرادات
    hotel:                currentInvoice.hotel,
    roomNo:               currentInvoice.roomNo,
    nationality:          currentInvoice.nationality,
    guestName:            currentInvoice.guestName,
    contactNo:            currentInvoice.contactNo,
    supplier:             currentInvoice.supplier,
    customer:             currentInvoice.customer,
    state:                currentInvoice.state,
    invoiceCurrency:      currentInvoice.invoiceCurrency,
    centerName:           currentInvoice.centerName,
    branchName:           currentInvoice.branchName,
    salesName:            currentInvoice.salesName,  // ← اسم السيلز للعمولة
    cashUSD: cU, cashEUR: cE, cashGBP: cG, cashLE: cL,
    visaUSD: vU, visaEUR: vE, visaGBP: vG, visaLE: vL,
    discount: 0,
    notes: notes,
    collectedBy:          currentUser?.id || '',
    collectedByName:      currentUser?.name || '',
    paymentMethod:        paymentMethod,
    transferredToTreasury: transferred,
    rest: newRest
  };

  const result = await gas('createCollectionInvoice', collectionData);
  hidePDF();

  if (!result?.success) throw new Error(result?.message || 'فشل إنشاء فاتورة التحصيل');

  // تحديث المتبقي في الفاتورة الأصلية (Rest فقط — بدون تعديل المدفوعات)
  // هذا يتم من خلال updateOriginalInvoicePayments في Code.gs تلقائياً
  // لكن نحدّث الواجهة
  currentInvoice.rest = newRest;

  showAlert(
    `✅ تم إنشاء سند التحصيل: ${result.voucherNo}\nالمبلغ: ${collected.toFixed(2)} ${currentInvoice.invoiceCurrency}\nالمتبقي الجديد: ${newRest.toFixed(2)}\nتسليم الخزينة: ${transferred}`,
    '✅',
    `<button class="btn btn-primary" onclick="location.reload()">🔄 تحديث</button><button class="btn btn-primary" onclick="goBack()">رجوع</button>`
  );
}

async function loadInvoice() {
  const params = new URLSearchParams(location.search);
  const voucherNo = params.get('voucherNo');
  openFrom = params.get('from') || 'today';
  if (!voucherNo) { showAlert('رقم الفاتورة غير موجود', '❌', '<button class="btn btn-primary" onclick="goBack()">رجوع</button>'); return; }

  showPDF('جاري التحميل...');
  try {
    await loadSuppliersAndTrips();
    const allInv = await gas('getAllInvoices');
    const invoices = Array.isArray(allInv) ? allInv : [];
    currentInvoice = invoices.find(i => i.voucherNo === voucherNo);
    if (!currentInvoice) throw new Error('الفاتورة غير موجودة');

            </div>
          </div>
          <div class="form-group"><label>اسم الرحلة</label>
            <select id="tripName" onchange="changeTrip()">${tripsOpts}</select>
          </div>
          <div class="trip-table">
            <table>
              <thead><tr><th>البند</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead>
              <tbody id="itemsBody">${tRows}</tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- المدفوعات والإجماليات -->
      <div class="card">
        <div class="card-header"><span class="icon">💰</span><h3>المدفوعات والإجماليات</h3></div>
        <div class="totals-strip">
          <div class="total-item">
            <div class="label">الخصم</div>
            <input type="number" id="discount" min="0" step="0.01" value="${dV(currentInvoice.discount)}" oninput="updateTotals()">
          </div>
          <div class="total-item">
            <div class="label">إجمالي الفاتورة</div>
            <div class="value" id="displayActualPrice">${(currentInvoice.actualPrice||0).toFixed(2)}</div>
            <div class="currency">${currentInvoice.invoiceCurrency||''}</div>
          </div>
          <div class="total-item">
            <div class="label">المدفوع</div>
            <div class="value" id="displayPaymentPrice">${(currentInvoice.paymentPrice||0).toFixed(2)}</div>
            <div class="currency">${currentInvoice.invoiceCurrency||''}</div>
          </div>
          <div class="total-item">
            <div class="label">المتبقي</div>
            <div class="value" id="displayRest">${restVal.toFixed(2)}</div>
            <div class="currency">${currentInvoice.invoiceCurrency||''}</div>
          </div>
        </div>

        <!-- تحذير إذا كانت المدفوعات معطّلة -->
        ${!canEditPayments ? `<div style="padding:10px 16px 0;"><div class="warning-bar" style="margin-bottom:0;font-size:.75rem;">🔒 تعديل المدفوعات محظور لهذه الفاتورة. استخدم زر "💰 تحصيل دفعة" لإضافة مدفوعات جديدة.</div></div>` : ''}

        <div class="payment-section">
          <div class="payment-label">💵 كاش</div>
          <div class="payment-grid">
            <div class="payment-card"><label>USD $</label><input type="number" id="cashUSD" step="0.01" value="${dV(currentInvoice.cashUSD)}" oninput="updateTotals()" ${disPayments}></div>
            <div class="payment-card"><label>EUR €</label><input type="number" id="cashEUR" step="0.01" value="${dV(currentInvoice.cashEUR)}" oninput="updateTotals()" ${disPayments}></div>
            <div class="payment-card"><label>GBP £</label><input type="number" id="cashGBP" step="0.01" value="${dV(currentInvoice.cashGBP)}" oninput="updateTotals()" ${disPayments}></div>
            <div class="payment-card"><label>EGP LE</label><input type="number" id="cashLE" step="0.01" value="${dV(currentInvoice.cashLE)}" oninput="updateTotals()" ${disPayments}></div>
          </div>
          <div class="payment-label">💳 فيزا / بطاقة</div>
          <div class="payment-grid">
            <div class="payment-card"><label>Visa $</label><input type="number" id="visaUSD" step="0.01" value="${dV(currentInvoice.visaUSD)}" oninput="updateTotals()" ${disPayments}></div>
            <div class="payment-card"><label>Visa €</label><input type="number" id="visaEUR" step="0.01" value="${dV(currentInvoice.visaEUR)}" oninput="updateTotals()" ${disPayments}></div>
            <div class="payment-card"><label>Visa £</label><input type="number" id="visaGBP" step="0.01" value="${dV(currentInvoice.visaGBP)}" oninput="updateTotals()" ${disPayments}></div>
            <div class="payment-card"><label>Visa LE</label><input type="number" id="visaLE" step="0.01" value="${dV(currentInvoice.visaLE)}" oninput="updateTotals()" ${disPayments}></div>
          </div>
        </div>
        <div class="card-body" style="padding-top:0">
          <div class="form-group"><label>ملاحظات</label><textarea id="notes" rows="2">${esc(currentInvoice.notes)}</textarea></div>
        </div>
      </div>

      <!-- معلومات إضافية -->
      <div class="card">
        <div class="card-header"><span class="icon">🏢</span><h3>معلومات إضافية</h3></div>
        <div class="card-body">
          <div class="form-grid">
            <div class="form-group"><label>المنفذ</label><select id="supplier">${supOpts}</select></div>
            <div class="form-group"><label>العميل</label><select id="customer">${custOpts}</select></div>
            <div class="form-group"><label>الحالة</label>
              <select id="state">
                <option value="pending" ${currentInvoice.state==='pending'?'selected':''}>⏳ قيد الانتظار</option>
                <option value="Confirmed" ${(currentInvoice.state==='Confirmed'||currentInvoice.state==='confirmed')?'selected':''}>✅ مؤكد</option>
                <option value="cancel" ${currentInvoice.state==='cancel'?'selected':''}>❌ ملغي</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- أزرار الإجراءات -->
      <div class="action-buttons">
        <button class="btn btn-success" id="collectionBtn" ${restVal <= 0 ? 'disabled' : ''} onclick="openCollectionModal()">
          💰 تحصيل دفعة ${!isIssuedToday ? '(سند جديد)' : '(تعديل مباشر)'}
        </button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveChanges()">💾 حفظ التعديلات</button>
        <button class="btn btn-danger" onclick="cancelEdit()">❌ إلغاء</button>
      </div>
    `;

    document.getElementById('loaderState').style.display = 'none';
    document.getElementById('formContent').style.display = 'block';
    document.getElementById('formContent').innerHTML = formHtml;

    await updateTotals();

    // ─── دالة تغيير الرحلة ───
    window.changeTrip = async function() {
      const newTrip = document.getElementById('tripName')?.value;
      const currency = document.getElementById('invoiceCurrency')?.value;
      if (!newTrip || !currency) return;
      const newCategory = getTripCategory(newTrip);
      const supS = document.getElementById('supplier');
      const cusS = document.getElementById('customer');
      const newS = getSuppliersByCategory(newCategory);
      const newC = getCustomersByCategory(newCategory);
      if (supS) supS.innerHTML = '<option value="">-- اختر --</option>' + newS.map(s => `<option value="${esc(s.customerName)}">${esc(s.customerName)}</option>`).join('');
      if (cusS) cusS.innerHTML = '<option value="">-- اختر --</option>' + newC.map(c => `<option value="${esc(c.customerName)}">${esc(c.customerName)}</option>`).join('');
      const nd = await gas('getTripData', { tripName: newTrip, currency });
      if (nd?.items) {
        const rows = nd.items.map((name, i) => `<tr>
          <td style="font-weight:600">${esc(name)}</td>
          <td><input type="number" id="qty_${i}" min="0" placeholder="0" oninput="updateItemTotal(${i}, ${nd.prices?.[i]||0})"></td>
          <td><input type="number" id="price_${i}" value="${nd.prices?.[i]||0}" readonly></td>
          <td><input type="number" id="total_${i}" value="0" readonly></td>
        </tr>`).join('');
        document.getElementById('itemsBody').innerHTML = rows;
      }
      await updateTotals();
    };

  } catch(err) {
    hidePDF();
    showAlert('خطأ: ' + err.message, '❌', '<button class="btn btn-primary" onclick="goBack()">رجوع</button>');
    document.getElementById('loaderState').style.display = 'none';
  } finally { hidePDF(); }
}

/* ═══════════════════════════════════════════════════════
   COLLECT FORM DATA
═══════════════════════════════════════════════════════ */
async function collectEditedData() {
  const currency = document.getElementById('invoiceCurrency')?.value;
  const activeDateInput = document.getElementById('activeDate')?.value;
  let activeDate = '';
  if (activeDateInput) { const d = new Date(activeDateInput); activeDate = formatDate(d); }

  // بنود الرحلة
  const items = [];
  for (let i = 0; i < 20; i++) {
    const qEl = document.getElementById(`qty_${i}`);
    if (qEl) {
      const qty = parseFloat(qEl.value) || 0;
      const nameEl = document.querySelector(`#itemsBody tr:nth-child(${i+1}) td:first-child`);
      if (qty > 0 && nameEl) items.push(`${nameEl.textContent}×${qty}`);
    }
  }

  let actualPrice = 0;
  for (let i = 0; i < 20; i++) { const t = document.getElementById(`total_${i}`); if (t) actualPrice += parseFloat(t.value) || 0; }

  const disc = parseFloat(document.getElementById('discount')?.value) || 0;
  const cU = parseFloat(document.getElementById('cashUSD')?.value) || 0;
  const cE = parseFloat(document.getElementById('cashEUR')?.value) || 0;
  const cG = parseFloat(document.getElementById('cashGBP')?.value) || 0;
  const cL = parseFloat(document.getElementById('cashLE')?.value) || 0;
  const vU = parseFloat(document.getElementById('visaUSD')?.value) || 0;
  const vE = parseFloat(document.getElementById('visaEUR')?.value) || 0;
  const vG = parseFloat(document.getElementById('visaGBP')?.value) || 0;
  const vL = parseFloat(document.getElementById('visaLE')?.value) || 0;

  const dateStr = document.getElementById('activeDate')?.value;
  const paid = await calcPaidInCurrency(currency, cU, cE, cG, cL, vU, vE, vG, vL, dateStr);
  const rest = R2(actualPrice - disc - paid);

  return {
    voucherNo:        currentInvoice.voucherNo,
    issueDate:        currentInvoice.issueDate,
    activeDate,
    time:             document.getElementById('tripTime')?.value || '',
    contactNo:        document.getElementById('contactNo')?.value || '',
    guestName:        document.getElementById('guestName')?.value || '',
    nationality:      document.getElementById('nationality')?.value || '',
    hotel:            document.getElementById('hotel')?.value || '',
    roomNo:           document.getElementById('roomNo')?.value || '',
    trip:             document.getElementById('tripName')?.value || '',
    invoiceCurrency:  currency || '',
    adultCount:       parseInt(document.getElementById('adultCount')?.value) || 0,
    childCount:       parseInt(document.getElementById('childCount')?.value) || 0,
    infantCount:      parseInt(document.getElementById('infantCount')?.value) || 0,
    cashUSD: cU, cashEUR: cE, cashGBP: cG, cashLE: cL,
    visaUSD: vU, visaEUR: vE, visaGBP: vG, visaLE: vL,
    actualPrice, paymentPrice: paid, discount: disc, rest,
    activitiesText:   items.join(' | '),
    supplier:         document.getElementById('supplier')?.value || '',
    customer:         document.getElementById('customer')?.value || '',
    state:            document.getElementById('state')?.value || 'pending',
    notes:            document.getElementById('notes')?.value || '',
    salesId:          currentInvoice.salesId,
    centerName:       currentInvoice.centerName,
    branchName:       currentInvoice.branchName,
    salesName:        currentInvoice.salesName,
    cost:             currentInvoice.cost || ''
  };
}

/* ═══════════════════════════════════════════════════════
   SAVE CHANGES
═══════════════════════════════════════════════════════ */
async function saveChanges() {
  const editedData = await collectEditedData();
  showPDF('💾 جاري الحفظ...');
  try {
    const upd = await gas('updateInvoice', editedData);
    if (!upd?.success) throw new Error(upd?.message || 'فشل التحديث');

    // ملخص التعديلات
    const summary = buildSummary(originalInvoice, editedData);
    await gas('copyInvoiceToEdit', {
      originalData: JSON.stringify(originalInvoice),
      editedData: JSON.stringify(editedData),
      userId: currentUser?.id || '',
      editSummary: summary
    }).catch(()=>{});

    showPDF('📄 جاري إنشاء PDF...');
    const pdf = await gas('saveAndGenerateSinglePDF', { voucherNo: editedData.voucherNo });
    hidePDF();

    const pdfBtn = pdf?.success
      ? `<a href="${pdf.url}" target="_blank" class="btn btn-primary" style="text-decoration:none;">📄 فتح PDF</a>`
      : '';
    showAlert('✅ تم حفظ التعديلات بنجاح', '✅',
      pdfBtn + `<button class="btn btn-primary" onclick="goBack()">رجوع</button>`);
  } catch(err) {
    hidePDF();
    showAlert('خطأ: ' + err.message, '❌');
  }
}

function buildSummary(orig, edited) {
  const cur = edited.invoiceCurrency || '$';
  const changes = [];
  if ((orig.actualPrice||0) !== (edited.actualPrice||0)) changes.push(`💰 الإجمالي: ${orig.actualPrice} → ${edited.actualPrice} ${cur}`);
  if ((orig.discount||0) !== (edited.discount||0)) changes.push(`🏷️ الخصم: ${orig.discount} → ${edited.discount} ${cur}`);
  if (orig.state !== edited.state) changes.push(`📌 الحالة: ${orig.state} → ${edited.state}`);
  if (orig.trip !== edited.trip) changes.push(`🏝️ الرحلة: ${orig.trip} → ${edited.trip}`);
  const ot = timeToInput(orig.time||''), et = timeToInput(edited.time||'');
  if (ot !== et) changes.push(`⏰ الوقت: ${ot} → ${et}`);
  return changes.length ? changes.join(' | ') : 'تعديلات عامة';
}

function cancelEdit() { if (confirm('إلغاء التعديلات والعودة؟')) goBack(); }

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  let ud = sessionStorage.getItem('currentUser');
  if (!ud) { const p = new URLSearchParams(location.search).get('user'); if (p) { ud = decodeURIComponent(p); sessionStorage.setItem('currentUser', ud); } }
  if (!ud) { location.href = 'index.html'; return; }
  try { currentUser = JSON.parse(ud); } catch { location.href = 'index.html'; return; }
  if (!sessionStorage.getItem('returnUrl') && document.referrer) sessionStorage.setItem('returnUrl', document.referrer);
  loadInvoice();
});

// globals
window.goBack = goBack;
window.closeAlert = closeAlert;
window.updateTotals = updateTotals;
window.updateItemTotal = updateItemTotal;
window.openCollectionModal = openCollectionModal;
window.closeCollectionModal = closeCollectionModal;
window.updateCollPreview = updateCollPreview;
window.submitCollection = submitCollection;
window.saveChanges = saveChanges;
window.cancelEdit = cancelEdit;
window.changeTrip = function(){};
</script>
