<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Sales Invoice</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:      #0f1f3d;
      --navy2:     #1a3260;
      --gold:      #f5c842;
      --gold2:     #e6b800;
      --blue:      #2563eb;
      --blue-lt:   #3b82f6;
      --green:     #16a34a;
      --red:       #dc2626;
      --bg:        #f0f4f8;
      --card:      #ffffff;
      --border:    #dde4f0;
      --text:      #1a2540;
      --text-lt:   #5a6a8a;
      --radius:    16px;
      --radius-sm: 10px;
      --shadow:    0 4px 24px rgba(15,31,61,.10);
      --shadow-lg: 0 8px 40px rgba(15,31,61,.16);
      --ticker-h:  44px;
      --header-h:  64px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Cairo',sans-serif;
      background: var(--bg);
      min-height:100vh;
      color: var(--text);
      overflow-x: hidden;
    }

    /* ══════════════════════════════════════════
       STICKY WRAPPER — the two frozen bars
    ══════════════════════════════════════════ */
    #stickyTop {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
    }

    /* ── Exchange Rate Ticker ── */
    .ticker-bar {
      height: var(--ticker-h);
      background: linear-gradient(90deg, #0a1628 0%, #152447 50%, #0a1628 100%);
      border-bottom: 2px solid var(--gold);
      display: flex;
      align-items: center;
      overflow: hidden;
      user-select: none;
    }
    .ticker-label {
      flex-shrink: 0;
      background: var(--gold);
      color: var(--navy);
      font-weight: 900;
      font-size: 12px;
      padding: 0 14px;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: .5px;
      z-index: 2;
    }
    .ticker-label::after {
      content: '';
      position: absolute;
      right: -10px;
      top: 0;
      width: 0;
      height: 0;
      border-top: 22px solid transparent;
      border-bottom: 22px solid transparent;
      border-left: 10px solid var(--gold);
    }
    .ticker-track {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .ticker-inner {
      display: flex;
      align-items: center;
      gap: 0;
      white-space: nowrap;
      animation: ticker-scroll 35s linear infinite;
    }
    .ticker-inner:hover { animation-play-state: paused; }
    @keyframes ticker-scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 18px;
      color: #cbd5e1;
      font-size: 12.5px;
      font-weight: 600;
      border-right: 1px solid rgba(255,255,255,.12);
    }
    .ticker-item .rate-label { color: #94a3b8; font-size: 11px; }
    .ticker-item .rate-val {
      color: var(--gold);
      font-weight: 900;
      font-size: 14px;
      font-family: 'Tajawal', monospace;
    }
    .ticker-item .rate-type {
      background: rgba(245,200,66,.15);
      border: 1px solid rgba(245,200,66,.3);
      color: var(--gold);
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 20px;
    }
    .ticker-sep {
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      color: rgba(245,200,66,.4);
      font-size: 18px;
    }
    .ticker-date {
      flex-shrink: 0;
      color: #64748b;
      font-size: 11px;
      padding: 0 14px;
      white-space: nowrap;
    }

    /* ── Main Header ── */
    .header {
      height: var(--header-h);
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      box-shadow: var(--shadow-lg);
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--gold);
      font-size: 20px;
      font-weight: 900;
      letter-spacing: .3px;
    }
    .header-title .icon {
      background: rgba(245,200,66,.15);
      border: 1px solid rgba(245,200,66,.3);
      border-radius: 10px;
      padding: 5px 8px;
      font-size: 18px;
    }
    .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: nowrap; }
    .user-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 40px;
      padding: 5px 14px;
      color: white;
      font-size: 13px;
      font-weight: 600;
    }
    .user-chip .avatar {
      width: 28px; height: 28px;
      background: var(--gold);
      color: var(--navy);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 900;
    }
    .meta-pill {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      color: #94a3b8;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .back-btn {
      background: transparent;
      border: 2px solid rgba(255,255,255,.3);
      color: white;
      padding: 6px 16px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      font-family: 'Cairo', sans-serif;
      transition: all .2s;
    }
    .back-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(245,200,66,.08); }

    /* ══════════════════════════════════════════
       PAGE CONTENT — padded below fixed bars
    ══════════════════════════════════════════ */
    .page-content {
      padding-top: calc(var(--ticker-h) + var(--header-h) + 24px);
      padding-bottom: 60px;
      max-width: 900px;
      margin: 0 auto;
      padding-left: 20px;
      padding-right: 20px;
    }

    /* ── Session Badge ── */
    .session-badge {
      background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
      border: 2px solid var(--blue-lt);
      border-radius: var(--radius);
      padding: 12px 18px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      color: var(--navy);
      flex-wrap: wrap;
      box-shadow: 0 2px 8px rgba(37,99,235,.1);
      animation: slide-in .3s ease;
    }
    @keyframes slide-in { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    .session-badge .count {
      background: var(--blue);
      color: white;
      border-radius: 50%;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(37,99,235,.4);
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      overflow: hidden;
    }
    .card-header {
      padding: 14px 20px;
      background: linear-gradient(90deg, var(--navy) 0%, var(--navy2) 100%);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-header h3 {
      color: var(--gold);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: .3px;
    }
    .card-header .ch-icon {
      background: rgba(245,200,66,.2);
      border-radius: 8px;
      padding: 4px 7px;
      font-size: 15px;
    }
    .card-body { padding: 20px; }

    /* ── Form ── */
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-lt);
      text-transform: uppercase;
      letter-spacing: .6px;
    }
    .form-group label.req::after { content: ' *'; color: var(--red); }
    .fc {
      padding: 10px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: 'Cairo', sans-serif;
      color: var(--text);
      background: #fafbfd;
      width: 100%;
      height: 44px;
      transition: border-color .2s, box-shadow .2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .fc:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,.12); outline: none; background: white; }
    .fc::placeholder { color: #b0bac9; }
    select.fc {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%235a6a8a' stroke-width='2.5'><polyline points='6 9 12 15 18 9'/></svg>");
      background-repeat: no-repeat;
      background-position: left 12px center;
      padding-left: 36px;
    }
    input[list].fc {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%235a6a8a' stroke-width='2.5'><polyline points='6 9 12 15 18 9'/></svg>");
      background-repeat: no-repeat;
      background-position: left 12px center;
      padding-left: 36px;
    }
    textarea.fc { height: auto; resize: vertical; }

    /* ── Phone Group ── */
    .phone-row { display: flex; gap: 8px; align-items: center; }
    .phone-code { width: 86px; flex-shrink: 0; }
    .phone-loader {
      width: 20px; height: 20px;
      border: 2.5px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: none; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Counts ── */
    .counts-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 4px; }
    .count-box {
      background: linear-gradient(135deg, #f8faff 0%, #f0f4fc 100%);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 10px;
      text-align: center;
      transition: border-color .2s;
    }
    .count-box:focus-within { border-color: var(--blue); }
    .count-box label { display: block; font-size: 11px; font-weight: 700; color: var(--text-lt); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .count-box input { width: 100%; border: none; background: transparent; text-align: center; font-size: 20px; font-weight: 900; color: var(--navy); font-family: 'Cairo', sans-serif; outline: none; }

    /* ── Time Picker ── */
    .time-display {
      width: 100%; height: 44px;
      padding: 10px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: #fafbfd;
      cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 14px;
      font-family: 'Cairo', sans-serif;
      color: var(--text);
      transition: border-color .2s;
    }
    .time-display:hover { border-color: var(--blue); }
    .time-display .placeholder { color: #b0bac9; }
    .time-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      align-items: center; justify-content: center;
      z-index: 10000; backdrop-filter: blur(6px);
    }
    .time-modal.open { display: flex; }
    .time-modal-box {
      background: white;
      width: 90%; max-width: 460px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,.4);
      animation: pop-up .3s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes pop-up { from{transform:scale(.85);opacity:0} to{transform:scale(1);opacity:1} }
    .tm-head {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
      padding: 20px;
      text-align: center;
    }
    .tm-head h3 { color: var(--gold); font-size: 16px; margin-bottom: 8px; }
    .tm-big { font-size: 50px; font-weight: 900; color: white; letter-spacing: 6px; font-family:'Tajawal',monospace; }
    .tm-cols { display: flex; padding: 16px; background: #f8faff; gap: 10px; height: 280px; }
    .tm-col {
      flex: 1; background: white;
      border-radius: 14px; overflow: hidden;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }
    .tm-col-title {
      background: #f0f4fa;
      padding: 8px;
      text-align: center;
      font-weight: 700;
      font-size: 12px;
      color: var(--navy);
      border-bottom: 2px solid var(--gold);
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .tm-scroll { flex: 1; overflow-y: auto; padding: 8px; scrollbar-width: thin; scrollbar-color: var(--gold) #f0f4fa; }
    .tm-scroll::-webkit-scrollbar { width: 5px; }
    .tm-scroll::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    .tm-item {
      padding: 10px;
      text-align: center;
      cursor: pointer;
      border-radius: 25px;
      margin: 3px 0;
      font-weight: 700;
      color: var(--navy);
      font-size: 14px;
      transition: all .15s;
    }
    .tm-item:hover { background: rgba(245,200,66,.2); }
    .tm-item.selected { background: var(--navy); color: var(--gold); box-shadow: 0 3px 10px rgba(15,31,61,.3); }
    .tm-sep { display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; color: var(--navy); width: 28px; }
    .tm-foot { display: flex; padding: 16px; gap: 8px; background: white; border-top: 1px solid var(--border); }
    .tm-btn {
      flex: 1; padding: 12px;
      border: none; border-radius: 40px;
      font-weight: 700; font-size: 13px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      transition: all .2s;
    }
    .tm-btn:hover { transform: translateY(-1px); }
    .tm-btn-clear { background: #f1f5f9; color: var(--text); }
    .tm-btn-cancel { background: #fee2e2; color: var(--red); }
    .tm-btn-set { background: linear-gradient(135deg, var(--green) 0%, #15803d 100%); color: white; box-shadow: 0 3px 10px rgba(22,163,74,.3); }

    /* ── Trip Table ── */
    .trip-table { overflow-x: auto; border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .trip-table table { width: 100%; border-collapse: collapse; }
    .trip-table thead th {
      background: linear-gradient(90deg, var(--navy) 0%, var(--navy2) 100%);
      color: var(--gold);
      padding: 11px 12px;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      letter-spacing: .4px;
      text-transform: uppercase;
    }
    .trip-table thead th:first-child { text-align: left; border-radius: 0; }
    .trip-table tbody tr { transition: background .15s; }
    .trip-table tbody tr:hover { background: #f8faff; }
    .trip-table td { padding: 10px 12px; border-bottom: 1px solid #f0f4f8; font-size: 13px; vertical-align: middle; }
    .trip-table td:not(:first-child) { text-align: center; }
    .trip-table input[type="number"] {
      width: 76px; padding: 6px; border: 2px solid var(--border);
      border-radius: 8px; text-align: center; font-size: 14px; font-weight: 700;
      font-family: 'Cairo', sans-serif; background: #fafbfd;
      transition: border-color .2s;
    }
    .trip-table input[type="number"]:focus { border-color: var(--blue); outline: none; }
    .trip-table input[readonly] { background: #f0f4f8; color: var(--text-lt); }
    .trip-table .total-row-table td {
      background: linear-gradient(90deg, #f0f4f8, #e8f0fb);
      font-weight: 800; font-size: 14px;
    }

    /* ── Calc Section ── */
    .calc-card { background: linear-gradient(135deg, #fafbff 0%, #f0f4fa 100%); }
    .totals-strip {
      display: flex; justify-content: space-around; align-items: center;
      flex-wrap: wrap; gap: 16px;
      padding: 20px;
      border-bottom: 2px dashed var(--border);
    }
    .total-tile { text-align: center; }
    .total-tile .tl { font-size: 11px; font-weight: 700; color: var(--text-lt); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .total-tile .tv { font-size: 36px; font-weight: 900; color: var(--navy); line-height: 1; }
    .total-tile .tc { font-size: 14px; color: var(--gold2); font-weight: 700; margin-left: 3px; }
    .total-tile input {
      width: 120px; padding: 8px;
      border: 2px solid var(--border); border-radius: 12px;
      text-align: center; font-size: 15px; font-weight: 700;
      font-family: 'Cairo', sans-serif; background: white;
      transition: border-color .2s;
    }
    .total-tile input:focus { border-color: var(--blue); outline: none; }
    .payment-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 16px 20px; }
    .pay-cell {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 10px;
      text-align: center;
      transition: box-shadow .2s;
    }
    .pay-cell:focus-within { box-shadow: 0 0 0 2px var(--blue); border-color: var(--blue); }
    .pay-cell label {
      display: block; font-size: 11px; font-weight: 700;
      color: var(--text-lt); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 7px;
    }
    .pay-cell input {
      width: 100%; border: none; background: transparent;
      text-align: center; font-size: 15px; font-weight: 700;
      font-family: 'Cairo', sans-serif; color: var(--text); outline: none;
    }
    .pay-group-label {
      padding: 6px 20px 2px;
      font-size: 11px; font-weight: 800;
      color: var(--text-lt); text-transform: uppercase; letter-spacing: .8px;
    }
    .rest-strip {
      padding: 16px 20px;
      border-top: 2px dashed var(--border);
      display: flex;
      align-items: center; justify-content: center; gap: 16px;
      flex-wrap: wrap;
    }
    .rest-big { font-size: 40px; font-weight: 900; color: var(--navy); }
    .rest-cur { font-size: 18px; font-weight: 700; color: var(--gold2); }
    .rest-label { font-size: 12px; font-weight: 700; color: var(--text-lt); text-transform: uppercase; letter-spacing: .6px; }

    /* ── Signature ── */
    .sig-area { text-align: center; padding: 10px 0; }
    .sig-btn {
      background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
      color: white; border: none; padding: 12px 28px;
      border-radius: 40px; font-weight: 700; font-size: 14px;
      cursor: pointer; font-family: 'Cairo', sans-serif;
      box-shadow: 0 4px 14px rgba(124,58,237,.35);
      transition: all .2s;
    }
    .sig-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(124,58,237,.5); }
    .sig-preview {
      margin-top: 12px; display: none;
      border: 2px dashed var(--border); border-radius: 12px;
      padding: 10px; background: #fafbfd;
    }
    .sig-preview img { max-height: 80px; max-width: 100%; border-radius: 6px; }

    /* ── Actions ── */
    .action-row {
      display: flex; gap: 12px; justify-content: center;
      flex-wrap: wrap; padding-top: 4px;
    }
    .btn {
      padding: 13px 28px; border: none; border-radius: 40px;
      font-weight: 800; font-size: 14px;
      cursor: pointer; font-family: 'Cairo', sans-serif;
      display: flex; align-items: center; gap: 7px;
      transition: all .2s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .btn-save {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
      color: var(--gold);
      box-shadow: 0 4px 16px rgba(15,31,61,.35);
    }
    .btn-clear { background: #f1f5f9; color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .btn-new {
      background: linear-gradient(135deg, var(--green) 0%, #15803d 100%);
      color: white;
      box-shadow: 0 4px 16px rgba(22,163,74,.35);
    }

    /* ── Alerts ── */
    .warn-bar {
      background: #fffbeb; border: 2px solid #f59e0b;
      border-radius: var(--radius-sm); padding: 12px 16px;
      color: #92400e; font-weight: 600; font-size: 13px;
      margin-bottom: 16px; text-align: center;
      animation: slide-in .3s ease;
    }
    .err-bar {
      background: #fef2f2; border: 2px solid var(--red);
      border-radius: var(--radius-sm); padding: 14px 16px;
      color: #7f1d1d; font-weight: 600; font-size: 13px;
      margin-bottom: 16px; text-align: center;
    }

    /* ── Generic Modal ── */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(4px); }
    .modal.open { display: flex; }
    .modal-box {
      background: white; width: 90%; max-width: 520px;
      border-radius: 24px; padding: 28px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,.3);
      animation: pop-up .25s ease;
    }
    .modal-icon { font-size: 48px; margin-bottom: 12px; }
    .modal-msg { color: var(--navy); font-size: 16px; font-weight: 700; margin-bottom: 20px; white-space: pre-wrap; line-height: 1.6; }
    .modal-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .sig-canvas {
      border: 2px solid var(--border); border-radius: 12px;
      background: white; width: 100%; height: 190px;
      cursor: crosshair; touch-action: none; margin: 14px 0;
    }
    .sig-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

    /* ── PDF Overlay ── */
    .pdf-ov {
      display: none; position: fixed; inset: 0;
      background: rgba(10,22,40,.88);
      z-index: 99999; align-items: center; justify-content: center;
      flex-direction: column; gap: 20px; backdrop-filter: blur(4px);
    }
    .pdf-ov.show { display: flex; }
    .pdf-spinner {
      width: 64px; height: 64px;

    /* ── Loading ── */
    .loading-state { padding: 60px; text-align: center; color: var(--text-lt); font-size: 16px; }

    /* ── Responsive ── */
    @media(max-width:768px) {

      .tm-big { font-size: 38px; }

      .payment-grid { grid-template-columns: 1fr; }
      .total-tile .tv { font-size: 28px; }
      .header-title { font-size: 16px; }
      .meta-pill { display: none; }
    }
  </style>
</head>
<body>

<!-- Alert Modal -->

<script>
/* ══════════════════════════════════════════════════════
   CONFIG & GLOBALS
══════════════════════════════════════════════════════ */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyBfwHQQoHb9E2bq0l-u6FLMD2XFKu_d8rZuJLnIq5iko82Bn93Emki6-cvDF_XOyRp/exec';

let currentUser         = null;
let currentTripDef      = null;
let currentTripPrices   = [];
let currentTripCategory = '';
let currentTripHasCost  = false;
let signatureData       = null;
let sessionVouchers     = [];
let exchangeRatesCache  = {};

const cache = { trips:null, nationalities:null, hotels:null };

let sigCanvas=null, sigCtx=null, isDrawing=false, lastX=0, lastY=0;

function roundTwo(n){ return Math.round((n + Number.EPSILON)*100)/100; }

/* ── Keep Alive ── */
let kaTimer;
function startKA(){
  kaTimer = setInterval(()=>{
    sessionStorage.setItem('lastActivity', Date.now().toString());
    fetch(GAS_URL+'?action=keepAlive&t='+Date.now(),{method:'HEAD',mode:'no-cors'}).catch(()=>{});
  }, 60000);
  document.addEventListener('visibilitychange',()=>{
    if(!document.hidden){
      const la = sessionStorage.getItem('lastActivity');
      if(la && Date.now()-parseInt(la) > 3600000){
        sessionStorage.removeItem('currentUser');
        location.href='index.html';
      }
    }
  });
}
function stopKA(){ clearInterval(kaTimer); }

/* ══════════════════════════════════════════════════════
   EXCHANGE RATE TICKER
══════════════════════════════════════════════════════ */
async function loadTicker(){
  try{
    const rates = await callGAS('getAllExchangeRatesNew');
    if(!rates || !rates.length) return;

    // أخذ أحدث سجل (آخر عنصر في المصفوفة)
    const latest = rates[rates.length - 1];
    const date   = latest.date || '';

    const items = [
      { label:'USD Cash',  val: latest.bUSD,  type:'CASH' },
      { label:'EUR Cash',  val: latest.bEUR,  type:'CASH' },
      { label:'GBP Cash',  val: latest.bGBP,  type:'CASH' },
      { label:'USD Visa',  val: latest.bVUSD, type:'VISA' },
      { label:'EUR Visa',  val: latest.bVEUR, type:'VISA' },
      { label:'GBP Visa',  val: latest.bVGBP, type:'VISA' },
      { label:'Visa LE',   val: latest.bVLE,  type:'VISA' },
    ].filter(x => x.val && parseFloat(x.val) > 0);

    const buildHtml = () => items.map(it => `
      <span class="ticker-item">
        <span class="rate-label">${it.label}</span>
        <span class="rate-val">${parseFloat(it.val).toFixed(4)}</span>
        <span class="rate-type">${it.type}</span>
      </span>
      <span class="ticker-sep">◆</span>
    `).join('');

    // نكرر المحتوى مرتين لضمان استمرارية الحركة
    document.getElementById('tickerInner').innerHTML = buildHtml() + buildHtml();
    document.getElementById('tickerDate').textContent = '📅 ' + date;
  }catch(e){
    console.warn('Ticker error:',e);
  }
}

/* ══════════════════════════════════════════════════════
   API CALL
══════════════════════════════════════════════════════ */
async function callGAS(action, params={}){
  const url = new URL(GAS_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k,v])=>{ if(k!=='signatureData') url.searchParams.set(k, String(v??'')); });
  const res = await fetch(url.toString(), {redirect:'follow'});
  if(!res.ok) throw new Error('HTTP '+res.status);
  return res.json();
}

function uploadSignature(voucherNo, sigData){
  if(!sigData||!sigData.startsWith('data:image')) return Promise.resolve();
  return new Promise(resolve=>{
    const xhr = new XMLHttpRequest();
    xhr.open('POST', GAS_URL, true);
    xhr.setRequestHeader('Content-Type','text/plain');
    xhr.onload=xhr.onerror=xhr.ontimeout=()=>resolve();
    xhr.timeout = 35000;
    xhr.send(JSON.stringify({action:'saveSignature',voucherNo,sig:sigData}));
  });
}

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', async ()=>{
  let ud = sessionStorage.getItem('currentUser');
  if(!ud){ const p=new URLSearchParams(location.search),u=p.get('user'); if(u){ud=decodeURIComponent(u);sessionStorage.setItem('currentUser',ud);} }
  if(!ud){ location.href='index.html'; return; }
  try{ currentUser=JSON.parse(ud); }catch(e){ location.href='index.html'; return; }

  displayUserInfo();
  sessionVouchers = [];
  startKA();
  loadTicker();

  callGAS('clearInvoicePDFSheet').catch(()=>{});
  callGAS('updateNationArrange').catch(()=>{});

  checkExchangeRates();
});

window.addEventListener('beforeunload', stopKA);

function displayUserInfo(){
  if(!currentUser) return;
  const name = currentUser.name||'User';
  document.getElementById('userNameDisplay').textContent = name;
  document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
  if(currentUser.centerName){
    document.getElementById('centerDisplay').textContent = '🏢 '+currentUser.centerName;
    document.getElementById('centerDisplay').style.display='';
  }
  if(currentUser.branchName){
    document.getElementById('branchDisplay').textContent = '📍 '+currentUser.branchName;
    document.getElementById('branchDisplay').style.display='';
  }
}

function goBack(){
  stopKA();
  const p={Admin:'Dashboard.html',Owner:'OwnerDashboard.html',Sales:'SalesDashboard.html',Accountant:'AccountantDashboard.html'};
  location.href = p[currentUser?.type]||'SalesDashboard.html';
}

/* ══════════════════════════════════════════════════════
   MODALS
══════════════════════════════════════════════════════ */
function showPDFOv(msg){ document.getElementById('pdfMsg').textContent=msg||'⏳ Creating invoice...'; document.getElementById('pdfOverlay').classList.add('show'); }
function hidePDFOv(){ document.getElementById('pdfOverlay').classList.remove('show'); }

function showAlert(msg,icon,btnHtml){
  document.getElementById('alertMsg').textContent=msg;
  document.getElementById('alertIcon').textContent=icon||'ℹ️';
  document.getElementById('alertBtns').innerHTML=btnHtml||'<button class="btn btn-save" onclick="closeAlert()">OK</button>';
  document.getElementById('alertModal').classList.add('open');
}
function closeAlert(){ document.getElementById('alertModal').classList.remove('open'); }

function showPDFsModal(links){
  const linksHtml = links.map(v=>
    `<a href="${v.url}" target="_blank" rel="noopener"
       style="display:block;background:linear-gradient(135deg,#16a34a,#15803d);color:white;padding:9px 20px;border-radius:30px;font-weight:700;font-size:13px;text-decoration:none;margin:4px auto;width:fit-content;box-shadow:0 3px 10px rgba(22,163,74,.3)">
       📄 ${v.voucherNo}</a>`
  ).join('');
  showAlert(
    links.length>1 ? `✅ تم حفظ ${links.length} فواتير` : `✅ تم حفظ الفاتورة`,
    '✅',
    linksHtml + `<button class="btn btn-save" onclick="closeAlert()" style="margin-top:10px">OK</button>`
  );
}

/* ══════════════════════════════════════════════════════
   SESSION BADGE
══════════════════════════════════════════════════════ */
function updateSessionBadge(){
  let badge = document.getElementById('sessionBadge');
  if(!sessionVouchers.length){ if(badge) badge.remove(); return; }
  if(!badge){
    badge = document.createElement('div');
    badge.id = 'sessionBadge';
    badge.className = 'session-badge';
    const c = document.getElementById('mainContent');
    c.insertBefore(badge, c.firstChild);
  }
  const links = sessionVouchers.map(v=>
    `<a href="${v.url}" target="_blank" rel="noopener"
       style="color:var(--blue);font-weight:700;text-decoration:none;font-size:12px">📄 ${v.voucherNo}</a>`
  ).join(' ');
  badge.innerHTML = `<span class="count">${sessionVouchers.length}</span>
    <strong>${sessionVouchers.length} booking(s) saved</strong>
    <span style="flex:1;display:flex;gap:8px;flex-wrap:wrap;align-items:center">${links}</span>
    <span style="font-size:11px;color:var(--green)">✅ Press Save to finish session</span>`;
}

/* ══════════════════════════════════════════════════════
   TIME PICKER
══════════════════════════════════════════════════════ */
function openTimePicker(){
  document.getElementById('timePickerModal').classList.add('open');
  buildTimeScrolls();
  const cur = document.getElementById('tripTime').value;
  if(cur){ const [h,m]=cur.split(':'); selectTI('hour',h); selectTI('minute',m); }
}
function closeTimePicker(){ document.getElementById('timePickerModal').classList.remove('open'); }

function buildTimeScrolls(){
  const hS=document.getElementById('hourScroll'), mS=document.getElementById('minuteScroll');
  if(!hS||hS.children.length) return;
  for(let i=0;i<24;i++){const v=(i<10?'0':'')+i; hS.insertAdjacentHTML('beforeend',`<div class="tm-item" onclick="selectTI('hour','${v}')">${v}</div>`);}
  for(let i=0;i<60;i++){const v=(i<10?'0':'')+i; mS.insertAdjacentHTML('beforeend',`<div class="tm-item" onclick="selectTI('minute','${v}')">${v}</div>`);}
}
function selectTI(type,val){
  document.querySelectorAll(`#${type}Scroll .tm-item`).forEach(e=>e.classList.remove('selected'));
  const el = [...document.querySelectorAll(`#${type}Scroll .tm-item`)].find(e=>e.textContent===val);
  if(el){ el.classList.add('selected'); el.scrollIntoView({block:'center',behavior:'smooth'}); }
  updateTimeDsp();
}
function updateTimeDsp(){
  const h=document.querySelector('#hourScroll .tm-item.selected'), m=document.querySelector('#minuteScroll .tm-item.selected');
  document.getElementById('selectedTimeDisplay').textContent = (h?h.textContent:'--')+':'+(m?m.textContent:'--');
}
function confirmTimeSelection(){
  const h=document.querySelector('#hourScroll .tm-item.selected'), m=document.querySelector('#minuteScroll .tm-item.selected');
  if(!h||!m){ showAlert('Please select both hour and minute','⚠️'); return; }
  const t=h.textContent+':'+m.textContent;
  document.getElementById('tripTime').value=t;
  document.getElementById('timeDisplay').innerHTML=`<span>${t}</span><span style="color:#94a3b8;font-size:12px">🕐</span>`;
  closeTimePicker();
  onTripFieldChange();
}
function clearTimeSelection(){
  document.querySelectorAll('.tm-item').forEach(e=>e.classList.remove('selected'));
  document.getElementById('selectedTimeDisplay').textContent='--:--';
}

/* ══════════════════════════════════════════════════════
   EXCHANGE RATE CHECK
══════════════════════════════════════════════════════ */
async function checkExchangeRates(){
  try{
    const r = await callGAS('checkExchangeRateStatus');
    if(r?.status==='block'){
      document.getElementById('mainContent').innerHTML=`
        <div class="err-bar">⛔ ${r.message}<br>Please update exchange rates first.</div>
        <div style="text-align:center"><button class="btn btn-clear" onclick="goBack()">← Back</button></div>`;
    } else {
      showInvoiceForm();
      if(r?.status==='warning'){
        const w=document.createElement('div'); w.className='warn-bar'; w.textContent='⚠️ '+(r.message||'');
        document.getElementById('mainContent').insertBefore(w, document.getElementById('mainContent').firstChild);
      }
    }
  }catch(e){
    console.error(e);
    document.getElementById('mainContent').innerHTML=`
      <div class="warn-bar">⚠️ API connection failed — ${e.message}</div>`;
    setTimeout(()=>showInvoiceForm(), 2500);
  }
}

══════════════════════════════════════════════════════ */

      <button class="btn btn-save"  id="btnSave"       onclick="saveInvoice()">💾 Save Invoice</button>
      <button class="btn btn-clear" id="btnClear"      onclick="clearForm()">🔄 Clear All</button>
      <button class="btn btn-new"   id="btnNewBooking" onclick="newBooking()">➕ New Booking</button>
    </div>`;

  updateSessionBadge();
  loadDropdowns();
}

/* ══════════════════════════════════════════════════════
   DROPDOWNS (cached)
══════════════════════════════════════════════════════ */
async function loadDropdowns(){
  const [nats, hotels, trips] = await Promise.all([
    cache.nationalities ? Promise.resolve(cache.nationalities) : callGAS('getNationalities'),
    cache.hotels        ? Promise.resolve(cache.hotels)        : callGAS('getHotels'),
    cache.trips         ? Promise.resolve(cache.trips)         : callGAS('getUniqueTrips')
  ]).catch(()=>[null,null,null]) || [null,null,null];

  if(nats)   { cache.nationalities=nats;   fillList('nationalitiesList', nats); }
  if(hotels) { cache.hotels=hotels;         fillList('hotelsList', hotels); }
  if(trips)  { cache.trips=trips;           fillTripList(trips); }
}
function fillList(id, arr){ const dl=document.getElementById(id); if(!dl) return; dl.innerHTML=(arr||[]).map(v=>`<option value="${v}">`).join(''); }
function fillTripList(list){ const dl=document.getElementById('tripsList'); if(!dl) return; dl.innerHTML=(list||[]).map(t=>`<option value="${t.name||t}">`).join(''); }

/* ══════════════════════════════════════════════════════
   CUSTOMER SEARCH (debounced — single JSONP call)
══════════════════════════════════════════════════════ */
let srTimer=null;
function searchCustDelayed(){ clearTimeout(srTimer); srTimer=setTimeout(searchCust, 700); }
async function searchCust(){
  const phone=(document.getElementById('phoneCode').value+document.getElementById('phoneNumber').value).replace(/\s+/g,'');
  if(!phone || phone.replace(/\D/g,'').length < 8) return;
  const ldr=document.getElementById('phoneLoader'); if(ldr) ldr.style.display='block';
  try{
    const d = await callGAS('searchCustomerByPhone', {phone});
    if(d?.name){
      document.getElementById('guestName').value   = d.name||'';
      document.getElementById('nationality').value = d.nationality||'';
      document.getElementById('hotel').value       = d.hotel||'';
      document.getElementById('roomNo').value      = d.roomNo||'';
    }
  }catch(e){ console.warn('search:', e); }
  finally{ if(ldr) ldr.style.display='none'; }
}

/* ══════════════════════════════════════════════════════
   TRIP SELECTION (single cached call)
══════════════════════════════════════════════════════ */
const tripCache = {};

function onTripFieldChange(){
  const date=document.getElementById('activeDate')?.value;
  const time=document.getElementById('tripTime')?.value;
  const cur =document.getElementById('invoiceCurrency')?.value;
  const cont=document.getElementById('tripSelectionContainer');
  if(date&&time&&cur){
    cont.style.display='block';
    const tn=document.getElementById('tripName')?.value?.trim();
    if(tn) loadTripData(tn, cur);
  } else {
    cont.style.display='none';
    resetTrip();
  }
}
function onTripNameInput(){ resetTrip(); document.getElementById('tripItemsContainer').innerHTML=''; }
function resetTrip(){ currentTripDef=[]; currentTripPrices=[]; currentTripCategory=''; currentTripHasCost=false; }

async function loadTripData(tripName, currency){
  if(!tripName) return;
  currency = currency || document.getElementById('invoiceCurrency')?.value;
  if(!currency) return;
  const key = tripName+'|'+currency;
  if(tripCache[key]){
    applyTripData(tripCache[key]); return;
  }
  try{
    const d = await callGAS('getTripData', {tripName, currency});
    if(!d||!d.items||!d.items.length){ showAlert('Trip not found: '+tripName,'⚠️'); return; }
    tripCache[key] = d;
    applyTripData(d);
  }catch(e){ showAlert('Error: '+e.message,'❌'); }
}
function applyTripData(d){
  currentTripDef      = d.items;
  currentTripPrices   = d.prices   || [];
  currentTripCategory = d.category || '';
  currentTripHasCost  = d.hasCost  === true;
  renderTripTable();
}
function loadTripDef(){
  const tn = document.getElementById('tripName')?.value?.trim();
  const cur= document.getElementById('invoiceCurrency')?.value;
  if(tn) loadTripData(tn, cur);
}

function renderTripTable(){
  if(!currentTripDef||!currentTripDef.length) return;
  let rows='';
  for(let i=0;i<currentTripDef.length;i++){
    if(!currentTripDef[i]) continue;
    rows+=`<tr>
      <td style="font-weight:600">${currentTripDef[i]}</td>
      <td><input type="number" id="qty_${i}" min="0" placeholder="0" oninput="calcRow(${i})" value="0" onfocus="this.value=''"></td>
      <td><input type="number" id="price_${i}" value="${currentTripPrices[i]||0}" readonly></td>
      <td><input type="number" id="total_${i}" value="0" readonly></td>
    </tr>`;
  }
  document.getElementById('tripItemsContainer').innerHTML=`
    <div class="trip-table"><table>
      <thead><tr><th style="text-align:left;padding-left:16px">Item</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
  setTimeout(()=>{ updateAllCalc(); }, 50);
}

/* ══════════════════════════════════════════════════════
   CALCULATIONS
══════════════════════════════════════════════════════ */
function calcRow(i){
  const price = parseFloat(document.getElementById(`price_${i}`)?.value)||0;
  const qty   = parseFloat(document.getElementById(`qty_${i}`)?.value)  ||0;
  document.getElementById(`total_${i}`).value = (qty*price).toFixed(2);
  updateAllCalc();
}

function calcInvoiceTotal(){
  let t=0, i=0;
  while(document.getElementById(`total_${i}`)){ t += parseFloat(document.getElementById(`total_${i}`).value)||0; i++; }
  return t;
}

async function getExRateForDate(dateStr){
  if(!dateStr) return null;
  if(exchangeRatesCache[dateStr]) return exchangeRatesCache[dateStr];
  try{
    const r = await callGAS('getExchangeRate',{dateStr});
    if(r){ exchangeRatesCache[dateStr]=r; return r; }
  }catch(e){ console.warn('rate err:',e); }
  return null;
}

async function updateAllCalc(){
  const actual   = calcInvoiceTotal();
  const currency = document.getElementById('invoiceCurrency')?.value||'';
  const dateStr  = document.getElementById('activeDate')?.value;

  // actualPrice display
  const apEl = document.getElementById('displayActualPrice'); if(apEl) apEl.textContent = actual.toFixed(2);
  const cpEl = document.getElementById('actualPriceCurrency'); if(cpEl) cpEl.textContent = currency;

  const discount = parseFloat(document.getElementById('discount')?.value)||0;
  const cashUSD  = parseFloat(document.getElementById('cashUSD')?.value)||0;
  const cashEUR  = parseFloat(document.getElementById('cashEUR')?.value)||0;
  const cashGBP  = parseFloat(document.getElementById('cashGBP')?.value)||0;
  const cashLE   = parseFloat(document.getElementById('cashLE')?.value) ||0;
  const visaUSD  = parseFloat(document.getElementById('visaUSD')?.value)||0;
  const visaEUR  = parseFloat(document.getElementById('visaEUR')?.value)||0;
  const visaGBP  = parseFloat(document.getElementById('visaGBP')?.value)||0;
  const visaLE   = parseFloat(document.getElementById('visaLE')?.value) ||0;

  let paid = 0;
  if(dateStr){
    const rates = await getExRateForDate(dateStr);
    if(rates){
      const LE = cashUSD*(rates.cash?.USD||47.5) + cashEUR*(rates.cash?.EUR||50.25) + cashGBP*(rates.cash?.GBP||60) + cashLE
               + visaUSD*(rates.visa?.USD||46.3) + visaEUR*(rates.visa?.EUR||49) + visaGBP*(rates.visa?.GBP||58.5) + visaLE*(rates.visa?.LE||0.975);
      if(currency==='$')       paid = roundTwo(LE/(rates.cash?.USD||47.5));
      else if(currency==='€')  paid = roundTwo(LE/(rates.cash?.EUR||50.25));
      else if(currency==='£')  paid = roundTwo(LE/(rates.cash?.GBP||60));
      else                     paid = roundTwo(LE);
    } else {
      paid = directPaid(currency, cashUSD, cashEUR, cashGBP, cashLE, visaUSD, visaEUR, visaGBP, visaLE);
    }
  } else {
    paid = directPaid(currency, cashUSD, cashEUR, cashGBP, cashLE, visaUSD, visaEUR, visaGBP, visaLE);
  }

  const rest = roundTwo(actual - discount - paid);
  const rEl = document.getElementById('displayRest'); if(rEl) rEl.textContent = rest.toFixed(2);
  const rcEl = document.getElementById('restCurrency'); if(rcEl) rcEl.textContent = currency;
}

function directPaid(cur, cU,cE,cG,cL, vU,vE,vG,vL){
  if(cur==='$') return cU+vU;
  if(cur==='€') return cE+vE;
  if(cur==='£') return cG+vG;
  return cL+vL;
}

/* ══════════════════════════════════════════════════════
   COLLECT & VALIDATE
══════════════════════════════════════════════════════ */
async function collectData(){
  const phone=(document.getElementById('phoneCode').value+document.getElementById('phoneNumber').value).replace(/\s+/g,'');
  const currency=document.getElementById('invoiceCurrency')?.value||'';
  const dateStr=document.getElementById('activeDate')?.value;

  let acts=[]; let i=0;
  while(document.getElementById(`qty_${i}`)){
    const q=parseFloat(document.getElementById(`qty_${i}`).value)||0;
    if(q>0&&currentTripDef&&currentTripDef[i]) acts.push(`${currentTripDef[i]}×${q}`);
    i++;
  }
  const items=[]; for(let j=0;j<10;j++){ const e=document.getElementById(`qty_${j}`); items[j]=e?(parseFloat(e.value)||0):0; }

  let actualPrice=0;
  for(let j=0;j<10;j++) if(items[j]>0&&currentTripPrices&&currentTripPrices[j]) actualPrice+=items[j]*currentTripPrices[j];

  const cashUSD=parseFloat(document.getElementById('cashUSD')?.value)||0;
  const cashEUR=parseFloat(document.getElementById('cashEUR')?.value)||0;
  const cashGBP=parseFloat(document.getElementById('cashGBP')?.value)||0;
  const cashLE =parseFloat(document.getElementById('cashLE')?.value) ||0;
  const visaUSD=parseFloat(document.getElementById('visaUSD')?.value)||0;
  const visaEUR=parseFloat(document.getElementById('visaEUR')?.value)||0;
  const visaGBP=parseFloat(document.getElementById('visaGBP')?.value)||0;
  const visaLE =parseFloat(document.getElementById('visaLE')?.value) ||0;
  const discount=parseFloat(document.getElementById('discount')?.value)||0;

  let paid=0;
  if(dateStr){ const r=await getExRateForDate(dateStr); if(r){
    const LE=cashUSD*(r.cash?.USD||47.5)+cashEUR*(r.cash?.EUR||50.25)+cashGBP*(r.cash?.GBP||60)+cashLE+visaUSD*(r.visa?.USD||46.3)+visaEUR*(r.visa?.EUR||49)+visaGBP*(r.visa?.GBP||58.5)+visaLE*(r.visa?.LE||0.975);
    if(currency==='$')      paid=roundTwo(LE/(r.cash?.USD||47.5));
    else if(currency==='€') paid=roundTwo(LE/(r.cash?.EUR||50.25));
    else if(currency==='£') paid=roundTwo(LE/(r.cash?.GBP||60));
    else                    paid=roundTwo(LE);
  } else paid=directPaid(currency,cashUSD,cashEUR,cashGBP,cashLE,visaUSD,visaEUR,visaGBP,visaLE);
  } else paid=directPaid(currency,cashUSD,cashEUR,cashGBP,cashLE,visaUSD,visaEUR,visaGBP,visaLE);

  const rest=roundTwo(actualPrice-discount-paid);

  return {
    salesId:currentUser?.id||'', salesName:currentUser?.name||'',
    centerName:currentUser?.centerName||'', branchName:currentUser?.branchName||'',
    guestName:document.getElementById('guestName')?.value||'',
    nationality:document.getElementById('nationality')?.value||'',
    contactNo:phone, hotel:document.getElementById('hotel')?.value||'',
    roomNo:document.getElementById('roomNo')?.value||'',
    activeDate:dateStr,
    time:document.getElementById('tripTime')?.value||'',
    trip:document.getElementById('tripName')?.value||'',
    invoiceCurrency:currency,
    item0:items[0],item1:items[1],item2:items[2],item3:items[3],item4:items[4],
    item5:items[5],item6:items[6],item7:items[7],item8:items[8],item9:items[9],
    cashUSD,cashEUR,cashGBP,cashLE,visaUSD,visaEUR,visaGBP,visaLE,
    notes:document.getElementById('notes')?.value||'',
    discount, actualPrice, paymentPrice:paid, rest,
    adultCount:parseInt(document.getElementById('adultCount')?.value)||0,
    childCount:parseInt(document.getElementById('childCount')?.value)||0,
    infantCount:parseInt(document.getElementById('infantCount')?.value)||0,
    activitiesText:acts.join(' | '),
    signatureData:signatureData||'', cost:currentTripHasCost, state:'pending'
  };
}

async function validate(){
  const inv=await collectData();
  if(!inv.guestName)       { showAlert('Please enter Guest Name','⚠️'); return null; }
  if(!inv.contactNo)       { showAlert('Please enter Phone Number','⚠️'); return null; }
  if(!inv.nationality)     { showAlert('Please enter Nationality','⚠️'); return null; }
  if(!inv.hotel)           { showAlert('Please enter Hotel','⚠️'); return null; }
  if(!inv.activeDate)      { showAlert('Please enter Active Date','⚠️'); return null; }
  if(!inv.time)            { showAlert('Please select Time','⚠️'); return null; }
  if(!inv.invoiceCurrency) { showAlert('Please select Invoice Currency','⚠️'); return null; }
  if(!inv.trip)            { showAlert('Please select Trip Name','⚠️'); return null; }
  return inv;
}

function setBtns(d){ ['btnSave','btnNewBooking','btnClear'].forEach(id=>{ const e=document.getElementById(id); if(e) e.disabled=d; }); }

/* ══════════════════════════════════════════════════════
   SAVE & PDF
══════════════════════════════════════════════════════ */
async function saveInvoice(){
  const inv=await validate(); if(!inv) return;
  setBtns(true);
  try{
    const res=await saveAndGeneratePDF(inv);
    if(res){
      const all=[...sessionVouchers,{voucherNo:res.voucherNo,url:res.url}];
      sessionVouchers=[];
      clearFormFull();
      showPDFsModal(all);
    }
  }catch(err){ hidePDFOv(); showAlert('Error: '+err.message,'❌'); }
  finally{ setBtns(false); }
}

async function newBooking(){
  const inv=await validate(); if(!inv) return;
  setBtns(true);
  try{
    const res=await saveAndGeneratePDF(inv);
    if(res){
      sessionVouchers.push({voucherNo:res.voucherNo,url:res.url});
      updateSessionBadge();
      clearFormPartial();
      showAlert(`✅ Saved ${res.voucherNo}\n${sessionVouchers.length} booking(s) in session\n\nEnter the next booking or press Save to finish.`,'✅');
    }
  }catch(err){ hidePDFOv(); showAlert('Error: '+err.message,'❌'); }
  finally{ setBtns(false); }
}

async function saveAndGeneratePDF(inv){
  showPDFOv('🧹 Preparing...');
  await callGAS('clearInvoicePDFSheet');
  showPDFOv('💾 Saving invoice...');
  const save=await callGAS('saveInvoice',inv);
  if(!save?.success) throw new Error(save?.message||'Save failed');
  const voucherNo=save.voucherNo;
  if(signatureData){ showPDFOv('✍️ Uploading signature...'); await uploadSignature(voucherNo,signatureData); }
  showPDFOv('📄 Generating PDF...');
  const pdf=await callGAS('saveAndGenerateSinglePDF',{voucherNo});
  hidePDFOv();
  if(!pdf?.success){ showAlert('Saved but PDF failed: '+(pdf?.message||''),'⚠️'); return null; }
  return {voucherNo, url:pdf.url};
}

/* ══════════════════════════════════════════════════════
   CLEAR FORM
══════════════════════════════════════════════════════ */
function clearFormFull(){
  signatureData=null; resetTrip();
  ['phoneNumber','guestName','nationality','hotel','roomNo',
   'adultCount','childCount','infantCount','activeDate',
   'invoiceCurrency','notes','discount','tripName'].forEach(id=>{ const e=document.getElementById(id); if(e) e.value=''; });
  document.getElementById('tripItemsContainer').innerHTML='';
  document.getElementById('tripSelectionContainer').style.display='none';
  const sp=document.getElementById('sigPreview'); if(sp){sp.style.display='none';sp.innerHTML='';}
  ['displayActualPrice','displayRest'].forEach(id=>{ const e=document.getElementById(id); if(e) e.textContent='0.00'; });
  ['cashUSD','cashEUR','cashGBP','cashLE','visaUSD','visaEUR','visaGBP','visaLE'].forEach(id=>{ const e=document.getElementById(id); if(e) e.value=''; });
  document.getElementById('tripTime').value='';
  document.getElementById('timeDisplay').innerHTML='<span class="placeholder">Select time</span><span style="color:#94a3b8;font-size:16px">🕐</span>';
  updateSessionBadge();
}

function clearFormPartial(){
  resetTrip();
  ['activeDate','notes','discount','tripName'].forEach(id=>{ const e=document.getElementById(id); if(e) e.value=''; });
  document.getElementById('tripItemsContainer').innerHTML='';
  document.getElementById('tripSelectionContainer').style.display='none';
  document.getElementById('tripTime').value='';
  document.getElementById('timeDisplay').innerHTML='<span class="placeholder">Select time</span><span style="color:#94a3b8;font-size:16px">🕐</span>';
  if(signatureData){
    const sp=document.getElementById('sigPreview');
    if(sp){sp.style.display='block';sp.innerHTML=`<img src="${signatureData}" alt="Signature">`;}
  }
  ['displayActualPrice','displayRest'].forEach(id=>{ const e=document.getElementById(id); if(e) e.textContent='0.00'; });
  ['cashUSD','cashEUR','cashGBP','cashLE','visaUSD','visaEUR','visaGBP','visaLE'].forEach(id=>{ const e=document.getElementById(id); if(e) e.value=''; });
}

function clearForm(){
  if(sessionVouchers.length>0){
    showAlert(
      `Warning: ${sessionVouchers.length} booking(s) in session.\nClear form only or cancel entire session?`,
      '⚠️',
      `<button class="btn btn-clear" onclick="clearFormPartial();closeAlert()">Clear Form Only</button>
       <button class="btn btn-save"  onclick="cancelSession()">Cancel Session</button>`
    );
  } else clearFormFull();
}

function cancelSession(){ sessionVouchers=[]; clearFormFull(); closeAlert(); }

/* ══════════════════════════════════════════════════════
   SIGNATURE
══════════════════════════════════════════════════════ */
function openSigModal(){
  document.getElementById('signatureModal').classList.add('open');
  sigCanvas=document.getElementById('signatureCanvas');
  sigCtx=sigCanvas.getContext('2d');
  sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height);
  sigCtx.strokeStyle='#0f1f3d'; sigCtx.lineWidth=2.5; sigCtx.lineCap='round'; sigCtx.lineJoin='round';
  sigCanvas.addEventListener('touchstart',tStart,{passive:false});
  sigCanvas.addEventListener('touchmove',tMove,{passive:false});
  sigCanvas.addEventListener('touchend',()=>isDrawing=false);
  sigCanvas.addEventListener('mousedown',mDown);
  sigCanvas.addEventListener('mousemove',mMove);
  sigCanvas.addEventListener('mouseup',()=>isDrawing=false);
  sigCanvas.addEventListener('mouseleave',()=>isDrawing=false);
}
function closeSigModal(){ document.getElementById('signatureModal').classList.remove('open'); }
function clearSigCanvas(){ if(sigCtx) sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height); }
function confirmSignature(){
  if(!sigCanvas) return;
  signatureData=sigCanvas.toDataURL('image/png');
  const sp=document.getElementById('sigPreview');
  if(sp){sp.style.display='block';sp.innerHTML=`<img src="${signatureData}" alt="Signature">`;}
  closeSigModal();
}
function getPos(c,e){ const r=c.getBoundingClientRect(); return{x:(e.clientX-r.left)*(c.width/r.width),y:(e.clientY-r.top)*(c.height/r.height)}; }
function mDown(e){ isDrawing=true; const p=getPos(sigCanvas,e); lastX=p.x; lastY=p.y; }
function mMove(e){ if(!isDrawing)return; const p=getPos(sigCanvas,e); sigCtx.beginPath(); sigCtx.moveTo(lastX,lastY); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); lastX=p.x; lastY=p.y; }
function tStart(e){ e.preventDefault(); const t=e.touches[0]; const p=getPos(sigCanvas,t); isDrawing=true; lastX=p.x; lastY=p.y; }
function tMove(e){ e.preventDefault(); if(!isDrawing)return; const t=e.touches[0]; const p=getPos(sigCanvas,t); sigCtx.beginPath(); sigCtx.moveTo(lastX,lastY); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); lastX=p.x; lastY=p.y; }
</script>
