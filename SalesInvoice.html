<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes, viewport-fit=cover">
  <title>Sales Invoice</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0f1f3d;--navy2:#1a3260;--gold:#f5c842;--gold2:#e6b800;
      --blue:#2563eb;--blue-lt:#3b82f6;--green:#16a34a;--red:#dc2626;
      --bg:#f0f4f8;--card:#fff;--border:#dde4f0;--text:#1a2540;--text-lt:#5a6a8a;
      --radius:16px;--radius-sm:10px;
      --shadow:0 4px 24px rgba(15,31,61,.10);--shadow-lg:0 8px 40px rgba(15,31,61,.16);
      --ticker-h:42px;--header-h:60px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;width:100%;overflow-x:hidden;}
    #stickyTop{position:fixed;top:0;left:0;right:0;z-index:1000;width:100%;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;white-space:nowrap;background:linear-gradient(90deg,#07111f,#0f1f3d);}
    #stickyTop::-webkit-scrollbar{height:3px;}
    #stickyTop::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px;}
    .ticker-bar{height:var(--ticker-h);background:linear-gradient(90deg,#07111f,#0f1f3d 50%,#07111f);border-bottom:2px solid var(--gold);display:inline-flex;align-items:center;min-width:100%;white-space:nowrap;}
    .ticker-label{flex-shrink:0;background:var(--gold);color:var(--navy);font-weight:900;font-size:11px;padding:0 12px;height:100%;display:flex;align-items:center;gap:5px;}
    .ticker-track{flex:1;overflow:hidden;display:inline-block;}
    .ticker-inner{display:inline-flex;align-items:center;white-space:nowrap;animation:tick 22s linear infinite;will-change:transform;}
    .ticker-inner:hover{animation-play-state:paused;}
    @keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    .ticker-item{display:inline-flex;align-items:center;gap:5px;padding:0 16px;color:#cbd5e1;font-size:12px;font-weight:600;border-right:1px solid rgba(255,255,255,.1);}
    .ticker-item .rl{color:#94a3b8;font-size:10px;}
    .ticker-item .rv{color:var(--gold);font-weight:900;font-size:13px;font-family:'Tajawal',monospace;}
    .ticker-item .rt{background:rgba(245,200,66,.15);border:1px solid rgba(245,200,66,.3);color:var(--gold);font-size:9px;padding:1px 5px;border-radius:20px;}
    .ticker-sep{display:inline-flex;align-items:center;padding:0 8px;color:rgba(245,200,66,.35);font-size:16px;}
    .ticker-date{flex-shrink:0;color:#64748b;font-size:10px;padding:0 12px;}
    .header{height:var(--header-h);background:linear-gradient(135deg,var(--navy),var(--navy2));display:inline-flex;justify-content:space-between;align-items:center;padding:0 20px;min-width:100%;white-space:nowrap;}
    .header-title{display:inline-flex;align-items:center;gap:8px;color:var(--gold);font-size:18px;font-weight:900;flex-shrink:0;}
    .header-title .icon{background:rgba(245,200,66,.15);border:1px solid rgba(245,200,66,.25);border-radius:8px;padding:4px 7px;font-size:16px;}
    .header-right{display:inline-flex;align-items:center;gap:8px;flex-shrink:0;margin-left:auto;}
    .user-chip{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:40px;padding:4px 12px;color:white;font-size:12px;font-weight:600;flex-shrink:0;}
    .avatar{width:26px;height:26px;background:var(--gold);color:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;}
    .meta-pill{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#94a3b8;font-size:10px;padding:2px 8px;border-radius:20px;flex-shrink:0;}
    .back-btn{background:transparent;border:2px solid rgba(255,255,255,.28);color:white;padding:5px 14px;border-radius:40px;cursor:pointer;font-weight:700;font-size:12px;font-family:'Cairo',sans-serif;transition:all .2s;flex-shrink:0;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}
    .page{padding-top:calc(var(--ticker-h) + var(--header-h) + 18px);padding-bottom:50px;width:100%;max-width:1100px;margin:0 auto;padding-left:15px;padding-right:15px;min-height:100vh;}
    .hotel-row{display:grid;grid-template-columns:1fr 90px 68px 68px 68px;gap:11px;align-items:end;margin-top:12px;}
    @media(max-width:680px){.hotel-row{grid-template-columns:1fr 80px 62px 62px 62px;}}
    @media(max-width:480px){.hotel-row{grid-template-columns:1fr 70px 58px 58px 58px;}}
    .compact-num{padding:9px 5px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:'Cairo',sans-serif;font-weight:700;color:var(--text);background:#fafbfd;width:100%;height:43px;text-align:center;transition:border-color .2s;-webkit-appearance:none;appearance:none;}
    .compact-num:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);outline:none;background:white;}
    .compact-num::placeholder{color:#b0bac9;font-weight:400;}
    .fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
    .fgroup{display:flex;flex-direction:column;gap:5px;position:relative;}
    .fgroup label{font-size:11px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px;}
    .fgroup label.req::after{content:' *';color:var(--red);}
    .fc{padding:9px 13px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:'Cairo',sans-serif;color:var(--text);background:#fafbfd;width:100%;height:43px;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;appearance:none;}
    .fc:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);outline:none;background:white;}
    .fc::placeholder{color:#b0bac9;}
    select.fc{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='13' height='13' viewBox='0 0 24 24' fill='none' stroke='%235a6a8a' stroke-width='2.5'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:left 11px center;padding-left:33px;}
    input[list].fc{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='13' height='13' viewBox='0 0 24 24' fill='none' stroke='%235a6a8a' stroke-width='2.5'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:left 11px center;padding-left:33px;}
    textarea.fc{height:auto;resize:vertical;}
    .phone-row{display:flex;gap:7px;align-items:center;}
    .phone-code{width:78px;flex-shrink:0;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .ac-wrap{position:relative;flex:1;}
    .ac-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:white;border:2px solid var(--blue);border-radius:var(--radius-sm);box-shadow:0 8px 24px rgba(15,31,61,.18);max-height:190px;overflow-y:auto;z-index:600;display:none;}
    .ac-drop.open{display:block;}
    .ac-item{padding:8px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s;display:flex;flex-direction:column;gap:2px;}
    .ac-item:last-child{border-bottom:none;}
    .ac-item:hover{background:#f0f4ff;}
    .ac-item .ac-n{font-weight:700;color:var(--navy);}
    .ac-item .ac-s{font-size:11px;color:var(--text-lt);}
    .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
    .card-head{padding:11px 18px;background:linear-gradient(90deg,var(--navy),var(--navy2));display:flex;align-items:center;gap:8px;}
    .card-head h3{color:var(--gold);font-size:14px;font-weight:800;letter-spacing:.2px;}
    .ch-icon{background:rgba(245,200,66,.2);border-radius:7px;padding:3px 6px;font-size:13px;}
    .card-body{padding:15px;}
    .time-btn-display{width:100%;height:43px;padding:9px 13px;border:2px solid var(--border);border-radius:var(--radius-sm);background:#fafbfd;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:14px;font-family:'Cairo',sans-serif;color:var(--text);transition:border-color .2s;}
    .time-btn-display:hover{border-color:var(--blue);}
    .time-btn-display .ph{color:#b0bac9;}
    .trip-table{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border);}
    .trip-table table{width:100%;border-collapse:collapse;}
    .trip-table thead th{background:linear-gradient(90deg,var(--navy),var(--navy2));color:var(--gold);padding:10px 11px;font-size:11px;font-weight:700;text-align:center;text-transform:uppercase;letter-spacing:.3px;}
    .trip-table thead th:first-child{text-align:left;}
    .trip-table tbody tr:hover{background:#f8faff;}
    .trip-table td{padding:9px 11px;border-bottom:1px solid #f0f4f8;font-size:13px;vertical-align:middle;}
    .trip-table td:not(:first-child){text-align:center;}
    .trip-table input[type="number"]{width:70px;padding:5px;border:2px solid var(--border);border-radius:8px;text-align:center;font-size:14px;font-weight:700;font-family:'Cairo',sans-serif;background:#fafbfd;transition:border-color .2s;}
    .trip-table input[type="number"]:focus{border-color:var(--blue);outline:none;}
    .trip-table input[readonly]{background:#f0f4f8;color:var(--text-lt);}
    .calc-card{background:linear-gradient(135deg,#fafbff,#f0f4fa);}
    .totals-strip{display:flex;justify-content:space-around;align-items:center;flex-wrap:wrap;gap:14px;padding:16px;border-bottom:2px dashed var(--border);}
    .total-tile{text-align:center;}
    .total-tile .tl{font-size:10px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
    .total-tile .tv{font-size:32px;font-weight:900;color:var(--navy);line-height:1;}
    .total-tile .tc{font-size:13px;color:var(--gold2);font-weight:700;margin-left:3px;}
    .total-tile input{width:110px;padding:7px;border:2px solid var(--border);border-radius:11px;text-align:center;font-size:14px;font-weight:700;font-family:'Cairo',sans-serif;background:white;transition:border-color .2s;}
    .total-tile input:focus{border-color:var(--blue);outline:none;}
    .pay-grp-lbl{padding:5px 16px 2px;font-size:10px;font-weight:800;color:var(--text-lt);text-transform:uppercase;letter-spacing:.7px;}
    .pay-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px 15px;}
    .pay-cell{background:white;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;transition:box-shadow .2s;}
    .pay-cell:focus-within{box-shadow:0 0 0 2px var(--blue);border-color:var(--blue);}
    .pay-cell label{display:block;font-size:10px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px;}
    .pay-cell input{width:100%;border:none;background:transparent;text-align:center;font-size:14px;font-weight:700;font-family:'Cairo',sans-serif;color:var(--text);outline:none;}
    .rest-strip{padding:14px 16px;border-top:2px dashed var(--border);display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;}
    .rest-big{font-size:36px;font-weight:900;color:var(--navy);}
    .rest-cur{font-size:16px;font-weight:700;color:var(--gold2);}
    .rest-lbl{font-size:10px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px;}
    .sig-btn{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:white;border:none;padding:11px 26px;border-radius:40px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;box-shadow:0 4px 14px rgba(124,58,237,.3);transition:all .2s;}
    .sig-btn:hover{transform:translateY(-2px);}
    .sig-preview{margin-top:10px;display:none;border:2px dashed var(--border);border-radius:11px;padding:8px;background:#fafbfd;}
    .sig-preview img{max-height:70px;max-width:100%;border-radius:5px;}
    .action-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding-top:4px;}
    .btn{padding:12px 26px;border:none;border-radius:40px;font-weight:800;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;display:flex;align-items:center;gap:6px;transition:all .2s;}
    .btn:hover{transform:translateY(-2px);}
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none;}
    .btn-save{background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);box-shadow:0 4px 14px rgba(15,31,61,.3);}
    .btn-clear{background:#f1f5f9;color:var(--text);}
    .btn-new{background:linear-gradient(135deg,var(--green),#15803d);color:white;box-shadow:0 4px 14px rgba(22,163,74,.3);}
    .warn-bar{background:#fffbeb;border:2px solid #f59e0b;border-radius:var(--radius-sm);padding:11px 14px;color:#92400e;font-weight:600;font-size:12px;margin-bottom:14px;text-align:center;}
    .err-bar{background:#fef2f2;border:2px solid var(--red);border-radius:var(--radius-sm);padding:12px 14px;color:#7f1d1d;font-weight:600;font-size:12px;margin-bottom:14px;text-align:center;}
    .session-badge{background:linear-gradient(135deg,#eff6ff,#dbeafe);border:2px solid var(--blue-lt);border-radius:var(--radius);padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-weight:700;color:var(--navy);flex-wrap:wrap;animation:slide-in .3s ease;}
    @keyframes slide-in{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    .session-badge .cnt{background:var(--blue);color:white;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px);}
    .modal.open{display:flex;}
    .modal-box{background:white;width:90%;max-width:500px;border-radius:22px;padding:26px;text-align:center;box-shadow:0 25px 50px rgba(0,0,0,.3);animation:pop .25s ease;}
    .modal-icon{font-size:44px;margin-bottom:10px;}
    .modal-msg{color:var(--navy);font-size:15px;font-weight:700;margin-bottom:18px;white-space:pre-wrap;line-height:1.6;}
    .modal-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
    .sig-canvas{border:2px solid var(--border);border-radius:11px;background:white;width:100%;height:180px;cursor:crosshair;touch-action:none;margin:12px 0;}
    .sig-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
    .pdf-ov{display:none;position:fixed;inset:0;background:rgba(10,22,40,.88);z-index:99999;align-items:center;justify-content:center;flex-direction:column;gap:18px;backdrop-filter:blur(4px);}
    .pdf-ov.show{display:flex;}
    .pdf-spin{width:60px;height:60px;border:5px solid rgba(255,255,255,.15);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
    .pdf-ov p{color:white;font-size:16px;font-weight:700;text-align:center;}
    .clock-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);align-items:center;justify-content:center;z-index:10000;backdrop-filter:blur(6px);}
    .clock-modal.open{display:flex;}
    .clock-box{background:white;width:90%;max-width:340px;border-radius:28px;overflow:hidden;box-shadow:0 30px 70px rgba(0,0,0,.5);animation:pop .3s cubic-bezier(.34,1.56,.64,1);}
    .ck-head{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:18px 20px;text-align:center;}
    .ck-head-title{color:var(--gold);font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;opacity:.8;}
    .ck-time-big{font-size:56px;font-weight:900;color:white;letter-spacing:4px;font-family:'Tajawal',monospace;line-height:1;margin-bottom:12px;}
    .ck-mode-row{display:flex;justify-content:center;gap:8px;}
    .ck-mode-pill{padding:4px 18px;border-radius:20px;font-size:12px;font-weight:700;font-family:'Cairo',sans-serif;border:2px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;}
    .ck-mode-pill.active{background:var(--gold);color:var(--navy);border-color:var(--gold);}
    .ck-face-wrap{padding:18px;background:#f5f7fb;display:flex;justify-content:center;align-items:center;}
    .ck-svg-wrap{width:230px;height:230px;cursor:crosshair;position:relative;}
    .ck-svg-wrap svg{width:100%;height:100%;display:block;-webkit-tap-highlight-color:transparent;}
    .ck-foot{display:flex;gap:8px;padding:14px 16px;background:white;border-top:1px solid var(--border);}
    .ck-btn{flex:1;padding:11px;border:none;border-radius:40px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;transition:all .2s;}
    .ck-btn:hover{transform:translateY(-1px);}
    .ck-clear{background:#f1f5f9;color:var(--text);}
    .ck-cancel{background:#fee2e2;color:var(--red);}
    .ck-set{background:linear-gradient(135deg,var(--green),#15803d);color:white;box-shadow:0 3px 10px rgba(22,163,74,.3);}
    /* trip loading indicator */
    .trip-loading{display:flex;align-items:center;gap:8px;padding:12px;color:var(--text-lt);font-size:13px;}
    .trip-loading-spin{width:18px;height:18px;border:2.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;flex-shrink:0;}
    @keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
    @media(max-width:680px){
      .pay-grid{grid-template-columns:repeat(2,1fr);}
      :root{--ticker-h:36px;--header-h:54px;}
      .ck-svg-wrap{width:200px;height:200px;}
      .ck-time-big{font-size:44px;}
    }
  </style>
</head>
<body>

<div id="stickyTop">
  <div class="ticker-bar">
    <div class="ticker-label">💱 LIVE RATES</div>
    <div class="ticker-track"><div class="ticker-inner" id="tickerInner"><span class="ticker-item" style="color:#475569">⏳ Loading rates...</span></div></div>
    <div class="ticker-date" id="tickerDate"></div>
  </div>
  <div class="header">
    <div class="header-title"><span class="icon">🧾</span>Sales Invoice</div>
    <div class="header-right">
      <div class="user-chip"><div class="avatar" id="userAvatar">?</div><span id="userNameDisplay">...</span></div>
      <span class="meta-pill" id="centerDisplay" style="display:none"></span>
      <span class="meta-pill" id="branchDisplay" style="display:none"></span>
      <button class="back-btn" onclick="goBack()">← Back</button>
    </div>
  </div>
</div>

<div class="page"><div id="mainContent"></div></div>

<div class="pdf-ov" id="pdfOverlay"><div class="pdf-spin"></div><p id="pdfMsg">⏳ Creating...</p></div>
<div id="signatureModal" class="modal"><div class="modal-box"><div class="modal-icon">✍️</div><div class="modal-msg">Customer Signature</div><canvas id="signatureCanvas" class="sig-canvas" width="440" height="180"></canvas><div class="sig-actions"><button class="btn btn-new" onclick="confirmSignature()">✅ Confirm</button><button class="btn btn-clear" onclick="clearSigCanvas()">🔄 Clear</button><button class="btn btn-clear" onclick="closeSigModal()">❌ Cancel</button></div></div></div>
<div id="clockModal" class="clock-modal"><div class="clock-box"><div class="ck-head"><div class="ck-head-title">SELECT TIME</div><div class="ck-time-big" id="ckDisplay"><span id="ckH">--</span>:<span id="ckM">--</span></div><div class="ck-mode-row"><button class="ck-mode-pill active" id="modeHour" onclick="setClockMode('hour')">HOUR</button><button class="ck-mode-pill" id="modeMin" onclick="setClockMode('minute')">MINUTE</button></div></div><div class="ck-face-wrap"><div class="ck-svg-wrap" id="ckWrap"><svg id="ckSVG" viewBox="0 0 230 230" xmlns="http://www.w3.org/2000/svg"><circle cx="115" cy="115" r="112" fill="#eef2f8" stroke="#dde4f0" stroke-width="1.5"/><circle cx="115" cy="115" r="64" fill="rgba(37,99,235,.04)" stroke="rgba(37,99,235,.12)" stroke-width="1" stroke-dasharray="4 3"/><g id="ckTicks"></g><g id="ckNums"></g><line id="ckHandH" x1="115" y1="115" x2="115" y2="62" stroke="#0f1f3d" stroke-width="5" stroke-linecap="round"/><line id="ckHandM" x1="115" y1="115" x2="115" y2="44" stroke="#2563eb" stroke-width="3.5" stroke-linecap="round"/><circle cx="115" cy="115" r="7" fill="#0f1f3d"/><circle cx="115" cy="115" r="3" fill="#f5c842"/><circle id="ckDot" cx="115" cy="44" r="9" fill="#f5c842" opacity="0"/></svg></div></div><div class="ck-foot"><button class="ck-btn ck-clear" onclick="clearClock()">🔄 Clear</button><button class="ck-btn ck-cancel" onclick="closeClockModal()">❌ Cancel</button><button class="ck-btn ck-set" onclick="confirmClock()">✅ Set</button></div></div></div>
<div id="alertModal" class="modal"><div class="modal-box"><div class="modal-icon" id="alertIcon">ℹ️</div><div class="modal-msg" id="alertMsg"></div><div class="modal-btns" id="alertBtns"><button class="btn btn-save" onclick="closeAlert()">OK</button></div></div></div>

<script>
/* ───────────────────────────────────────────────────────────
   CONFIG
─────────────────────────────────────────────────────────── */

/* ───────────────────────────────────────────────────────────
   FETCH HELPER — single GET to GAS
─────────────────────────────────────────────────────────── */
function gas(action, params = {}) {
  const u = new URL(GAS);
  u.searchParams.set('action', action);
 
  Object.entries(params).forEach(([k, v]) => {
    if (v === undefined || v === null || v === '') return;
    // ✅ هذه الحقول لا تُرسل عبر GET (تُعالَج بشكل خاص)
    if (k === 'signatureData' || k === 'sigPart1' || k === 'sigPart2') return;
    if (typeof v === 'object') {
      u.searchParams.set(k, JSON.stringify(v));
    } else {
      u.searchParams.set(k, String(v));
    }
  });
 
  return fetch(u.toString(), { method: 'GET', redirect: 'follow' })
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .catch(err => {
      console.error(`❌ ${action} failed:`, err);
      throw err;
    });
}
  async function gasWithSig(action, params) {
  const sigData = params.signatureData || '';
  const baseParams = { ...params };
  delete baseParams.signatureData;
 
  if (!sigData || !sigData.startsWith('data:image')) {
    // لا يوجد توقيع → إرسال عادي
    return gas(action, baseParams);
  }
 
  // ✅ تقسيم التوقيع إلى جزأين
  // نحذف "data:image/png;base64," ونُرسل الـ base64 فقط مقسوماً
  const prefix = sigData.substring(0, sigData.indexOf(',') + 1); // "data:image/png;base64,"
  const b64Full = sigData.substring(sigData.indexOf(',') + 1);   // الـ base64 الصافي
 
  // نقسم في المنتصف
  const mid = Math.floor(b64Full.length / 2);
  const part1 = prefix + b64Full.substring(0, mid);  // الجزء الأول مع prefix
  const part2 = b64Full.substring(mid);               // الجزء الثاني
 
  console.log('📤 إرسال الفاتورة مع توقيع مقسم:',
    'Part1:', part1.length, 'chars |',
    'Part2:', part2.length, 'chars'
  );
 
  const u = new URL(GAS);
  u.searchParams.set('action', action);
 
  // إضافة معاملات الفاتورة
  Object.entries(baseParams).forEach(([k, v]) => {
    if (v === undefined || v === null || v === '') return;
    if (typeof v === 'object') {
      u.searchParams.set(k, JSON.stringify(v));
    } else {
      u.searchParams.set(k, String(v));
    }
  });
 
  // إضافة التوقيع المقسم
  u.searchParams.set('sigPart1', part1);
  u.searchParams.set('sigPart2', part2);
 
  const urlStr = u.toString();
  console.log('📡 saveInvoice URL length:', urlStr.length);
 
  // إذا كان الرابط أقل من 8000 حرف، أرسله مباشرة
  if (urlStr.length <= 8000) {
    return fetch(urlStr, { method: 'GET', redirect: 'follow' })
      .then(r => r.json());
  }
 
  // إذا كان أطول → أرسل الفاتورة بدون توقيع أولاً، ثم ارفع التوقيع منفصلاً
  console.warn('⚠️ URL طويل جداً، سيتم إرسال التوقيع منفصلاً');
  const saveResult = await gas(action, baseParams);
  
  if (saveResult?.success && saveResult.voucherNo) {
    // رفع التوقيع منفصلاً عبر POST
    try {
      const sigResult = await fetch(GAS, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'saveSignature',
          voucherNo: saveResult.voucherNo,
          sig: sigData
        })
      }).then(r => r.json()).catch(() => ({ success: false }));
      
      console.log('📸 نتيجة رفع التوقيع المنفصل:', sigResult);
    } catch(e) {
      console.warn('⚠️ فشل رفع التوقيع المنفصل:', e);
    }
  }
  
  return saveResult;
}
 /* ───────────────────────────────────────────────────────────
   INIT ── Zero blocking. Form renders synchronously.
   Every GAS call fires AFTER the form is already visible.
─────────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded',()=>{
  /* 1 ── resolve user (synchronous) */
  let ud=sessionStorage.getItem('currentUser');
  if(!ud){const p=new URLSearchParams(location.search).get('user');if(p){ud=decodeURIComponent(p);sessionStorage.setItem('currentUser',ud);}}
  if(!ud){location.href='index.html';return;}
  try{currentUser=JSON.parse(ud);}catch{location.href='index.html';return;}

  /* 2 ── paint header (synchronous, zero network) */
  document.getElementById('userNameDisplay').textContent=currentUser.name||'User';
  document.getElementById('userAvatar').textContent=(currentUser.name||'U')[0].toUpperCase();
  if(currentUser.centerName){const e=document.getElementById('centerDisplay');e.textContent='🏢 '+currentUser.centerName;e.style.display='';}
  if(currentUser.branchName){const e=document.getElementById('branchDisplay');e.textContent='📍 '+currentUser.branchName;e.style.display='';}
  sessionVouchers=[];

  /* 3 ── render form NOW (user sees it immediately) */
  renderForm();

  /* 4 ── ALL background tasks — nothing blocks the form ── */

  // a) Clean Invoice_PDF sheet (rows 31+) — fire and forget, invisible to user
  gas('clearInvoicePDFSheet').catch(()=>{});

  // b) Update nation arrange — fire and forget
  gas('updateNationArrange').catch(()=>{});

  // c) Latest exchange rate — ONE call, fills ticker + rate cache
  gas('getLatestExchangeRates').then(r=>{
    if(!r)return;
    C.rate=r;
    // also store under today's date key so getRate() finds it instantly
    const td=fmtDateKey(new Date());
    if(!C.rateByDate[td])C.rateByDate[td]=r;
    // fill ticker
    const items=[
      {lbl:'USD Cash',v:r.sUSD,t:'CASH'},{lbl:'EUR Cash',v:r.sEUR,t:'CASH'},
      {lbl:'GBP Cash',v:r.sGBP,t:'CASH'},{lbl:'USD Visa',v:r.sVUSD,t:'VISA'},
      {lbl:'EUR Visa',v:r.sVEUR,t:'VISA'},{lbl:'GBP Visa',v:r.sVGBP,t:'VISA'},
    ].filter(x=>x.v&&+x.v>0);
    const h=items.map(it=>`<span class="ticker-item"><span class="rl">${it.lbl}</span><span class="rv">${(+it.v).toFixed(4)}</span><span class="rt">${it.t}</span></span><span class="ticker-sep">◆</span>`).join('');
    document.getElementById('tickerInner').innerHTML=h+h;
    document.getElementById('tickerDate').textContent='📅 '+(r.date||'');
  }).catch(()=>{});

  // d) Exchange rate status — shows warning/block banner only if needed
  gas('checkExchangeRateStatus').then(r=>{
    if(!r||r.status==='ok')return;
    if(r.status==='block'){
      document.getElementById('mainContent').innerHTML=
        `<div class="err-bar">⛔ ${r.message}<br>Please update exchange rates first.</div>
         <div style="text-align:center"><button class="btn btn-clear" onclick="goBack()">← Back</button></div>`;
    }else if(r.status==='warning'){
      const w=document.createElement('div');w.className='warn-bar';w.textContent='⚠️ '+(r.message||'');
      const mc=document.getElementById('mainContent');if(mc)mc.insertBefore(w,mc.firstChild);
    }
  }).catch(()=>{});

  // e) Dropdowns — 3 independent calls, each fills its datalist on arrival
  gas('getNationalities').then(d=>{
    if(!Array.isArray(d))return;
    const dl=document.getElementById('nationalitiesList');
    if(dl)dl.innerHTML=d.map(v=>`<option value="${v}">`).join('');
  }).catch(()=>{});

  gas('getHotels').then(d=>{
    if(!Array.isArray(d))return;
    const dl=document.getElementById('hotelsList');
    if(dl)dl.innerHTML=d.map(v=>`<option value="${v}">`).join('');
  }).catch(()=>{});

  gas('getUniqueTrips').then(d=>{
    if(!Array.isArray(d))return;
    const dl=document.getElementById('tripsList');
    if(dl)dl.innerHTML=d.map(t=>`<option value="${t.name||t}">`).join('');
  }).catch(()=>{});

  // f) Customer autocomplete — lowest priority, fired last
  setTimeout(()=>{
    gas('getAllCustomersForAC').then(raw=>{
      if(!Array.isArray(raw))return;
      const map=new Map();
      raw.forEach(c=>{if(c.phone)map.set(c.phone,{phone:c.phone,name:c.name||'',nationality:c.nationality||'',hotel:c.hotel||'',roomNo:c.roomNo||''});});
      C.customers=Array.from(map.values());
    }).catch(()=>{});
  },1500);
});

/* ── Exchange rate: always from cache, fetch once per date ── */
async function getRate(dateStr){
  if(!dateStr)return C.rate||null;
  if(C.rateByDate[dateStr])return C.rateByDate[dateStr];
  try{
    const r=await gas('getExchangeRate',{dateStr});
    if(r){C.rateByDate[dateStr]=r;return r;}
  }catch(e){console.warn('rate:',e);}
  return C.rate||null; // fallback to latest
}

/* ── Payment calc: rate obj → normalised {cash,visa} ── */
function rateFields(r){
  if(!r)return null;
  // support both getLatestExchangeRates shape (sUSD…) and getExchangeRate shape (cash.USD…)
  if(r.cash)return r; // already normalised
  return{cash:{USD:+r.sUSD||47.5,EUR:+r.sEUR||50.25,GBP:+r.sGBP||60},
         visa:{USD:+r.sVUSD||46.3,EUR:+r.sVEUR||49,GBP:+r.sVGBP||58.5,LE:+r.sVLE||0.975}};
}
function directPaid(cur,cU,cE,cG,cL,vU,vE,vG,vL){if(cur==='$')return cU+vU;if(cur==='€')return cE+vE;if(cur==='£')return cG+vG;return cL+vL;}

function onTripFieldChange(){
  const date=document.getElementById('activeDate')?.value;
  const time=document.getElementById('tripTime')?.value;
  const cur=document.getElementById('invoiceCurrency')?.value;
  const cont=document.getElementById('tripSelectionContainer');
  if(date&&time&&cur){
    cont.style.display='block';
    // pre-fetch exchange rate for this date in background
    if(date&&!C.rateByDate[date])getRate(date);
    const tn=document.getElementById('tripName')?.value?.trim();
    if(tn)loadTripData(tn,cur);
  }else{cont.style.display='none';resetTrip();}
}
function onTripNameInput(){resetTrip();document.getElementById('tripItemsContainer').innerHTML='';}
function resetTrip(){tripDef=[];tripPrices=[];tripCategory='';tripHasCost=false;}
function loadTripDef(){const tn=document.getElementById('tripName')?.value?.trim();const cur=document.getElementById('invoiceCurrency')?.value;if(tn&&cur)loadTripData(tn,cur);}

async function loadTripData(tripName,currency){
  if(!tripName||!currency)return;
  const key=tripName+'|'+currency;
  // ── already cached? apply instantly ──
  if(C.trips[key]){applyTrip(C.trips[key]);return;}
  // ── show loading indicator ──
  document.getElementById('tripItemsContainer').innerHTML=
    `<div class="trip-loading"><div class="trip-loading-spin"></div>Loading trip data...</div>`;
  try{
    const d=await gas('getTripData',{tripName,currency});
    if(!d||!d.items||!d.items.length){
      document.getElementById('tripItemsContainer').innerHTML='';
      showAlert('Trip not found: '+tripName,'⚠️');return;
    }
    C.trips[key]=d;
    applyTrip(d);
  }catch(e){
    document.getElementById('tripItemsContainer').innerHTML='';
    showAlert('Error loading trip: '+e.message,'❌');
  }
}

function applyTrip(d){tripDef=d.items;tripPrices=d.prices||[];tripCategory=d.category||'';tripHasCost=d.hasCost===true;renderTripTable();}
function renderTripTable(){
  if(!tripDef||!tripDef.length)return;
  let rows='';
  for(let i=0;i<tripDef.length;i++){if(!tripDef[i])continue;rows+=`<tr><td style="font-weight:600">${tripDef[i]}</td><td><input type="number" id="qty_${i}" min="0" placeholder="0" oninput="calcRow(${i})" value="0" onfocus="this.select()"></td><td><input type="number" id="price_${i}" value="${tripPrices[i]||0}" readonly></td><td><input type="number" id="total_${i}" value="0" readonly></td></tr>`;}
  document.getElementById('tripItemsContainer').innerHTML=`<div class="trip-table"><table><thead><tr><th style="text-align:left;padding-left:14px">Item</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  scheduleCalc();
}
function calcRow(i){const p=+document.getElementById(`price_${i}`)?.value||0,q=+document.getElementById(`qty_${i}`)?.value||0;document.getElementById(`total_${i}`).value=(q*p).toFixed(2);scheduleCalc();}
function calcTotal(){let t=0,i=0;while(document.getElementById(`total_${i}`)){t+=+document.getElementById(`total_${i}`).value||0;i++;}return t;}

/* ───────────────────────────────────────────────────────────
   PAYMENT CALC — debounced 200ms, uses in-memory rate
─────────────────────────────────────────────────────────── */
let _ct=null;
function scheduleCalc(){clearTimeout(_ct);_ct=setTimeout(updateAllCalc,200);}

async function updateAllCalc(){
  const actual=calcTotal();
  const cur=document.getElementById('invoiceCurrency')?.value||'';
  const ds=document.getElementById('activeDate')?.value;
  const el=id=>document.getElementById(id);
  if(el('displayActualPrice'))el('displayActualPrice').textContent=actual.toFixed(2);
  if(el('actualPriceCurrency'))el('actualPriceCurrency').textContent=cur;
  const disc=+el('discount')?.value||0;
  const cU=+el('cashUSD')?.value||0,cE=+el('cashEUR')?.value||0,cG=+el('cashGBP')?.value||0,cL=+el('cashLE')?.value||0;
  const vU=+el('visaUSD')?.value||0,vE=+el('visaEUR')?.value||0,vG=+el('visaGBP')?.value||0,vL=+el('visaLE')?.value||0;
  let paid=0;
  const raw=ds?await getRate(ds):C.rate;
  const r=rateFields(raw);
  if(r){
    const LE=cU*r.cash.USD+cE*r.cash.EUR+cG*r.cash.GBP+cL+vU*r.visa.USD+vE*r.visa.EUR+vG*r.visa.GBP+vL*(r.visa.LE||0.975);
    if(cur==='$')paid=R2(LE/r.cash.USD);
    else if(cur==='€')paid=R2(LE/r.cash.EUR);
    else if(cur==='£')paid=R2(LE/r.cash.GBP);
    else paid=R2(LE);
  }else paid=directPaid(cur,cU,cE,cG,cL,vU,vE,vG,vL);
  const rest=R2(actual-disc-paid);
  if(el('displayRest'))el('displayRest').textContent=rest.toFixed(2);
  if(el('restCurrency'))el('restCurrency').textContent=cur;
}

}

/* ───────────────────────────────────────────────────────────
   DATA COLLECTION + VALIDATION
─────────────────────────────────────────────────────────── */
async function collectData() {
  const el = id => document.getElementById(id);
  
  // معالجة رقم الهاتف: إضافة 00 في البداية
  let phoneSign = el('phoneCode')?.value || '+';  // فقط علامة + (سيتم تجاهلها)
  let phoneNumberRaw = el('phoneNumber')?.value || '';
  let phoneNumberDigits = phoneNumberRaw.replace(/\D/g, ''); // أرقام فقط
  
  // إضافة 00 في بداية الرقم للتخزين في الشيت
  let fullPhoneForSheet = '00' + phoneNumberDigits;
  
  let acts = [], i = 0;
  while (el(`qty_${i}`)) {
    const q = +el(`qty_${i}`).value || 0;
    if (q > 0 && tripDef[i]) acts.push(`${tripDef[i]}×${q}`);
    i++;
  }
  const items = Array.from({ length: 10 }, (_, j) => +(el(`qty_${j}`)?.value) || 0);
  let actualPrice = 0;
  items.forEach((q, j) => { if (q && tripPrices[j]) actualPrice += q * tripPrices[j]; });
  const cU = +el('cashUSD')?.value || 0, cE = +el('cashEUR')?.value || 0, cG = +el('cashGBP')?.value || 0, cL = +el('cashLE')?.value || 0;
  const vU = +el('visaUSD')?.value || 0, vE = +el('visaEUR')?.value || 0, vG = +el('visaGBP')?.value || 0, vL = +el('visaLE')?.value || 0;
  const disc = +el('discount')?.value || 0;
  const cur = el('invoiceCurrency')?.value || '';
  const ds = el('activeDate')?.value;
  let paid = 0;
  const raw = ds ? await getRate(ds) : C.rate;
  const r = rateFields(raw);
  if (r) {
    const LE = cU * r.cash.USD + cE * r.cash.EUR + cG * r.cash.GBP + cL + vU * r.visa.USD + vE * r.visa.EUR + vG * r.visa.GBP + vL * (r.visa.LE || 0.975);
    if (cur === '$') paid = R2(LE / r.cash.USD);
    else if (cur === '€') paid = R2(LE / r.cash.EUR);
    else if (cur === '£') paid = R2(LE / r.cash.GBP);
    else paid = R2(LE);
  } else paid = directPaid(cur, cU, cE, cG, cL, vU, vE, vG, vL);
  
  return {
    salesId: currentUser?.id || '',
    salesName: currentUser?.name || '',
    centerName: currentUser?.centerName || '',
    branchName: currentUser?.branchName || '',
    guestName: el('guestName')?.value || '',
    nationality: el('nationality')?.value || '',
    contactNo: fullPhoneForSheet,  // ✅ الرقم مخزن بصيغة 0020...
    hotel: el('hotel')?.value || '',
    roomNo: el('roomNo')?.value || '',
    activeDate: ds,
    time: el('tripTime')?.value || '',
    trip: el('tripName')?.value || '',
    invoiceCurrency: cur,
    item0: items[0], item1: items[1], item2: items[2], item3: items[3], item4: items[4],
    item5: items[5], item6: items[6], item7: items[7], item8: items[8], item9: items[9],
    cashUSD: cU, cashEUR: cE, cashGBP: cG, cashLE: cL,
    visaUSD: vU, visaEUR: vE, visaGBP: vG, visaLE: vL,
    notes: el('notes')?.value || '',
    discount: disc,
    actualPrice: actualPrice,
    paymentPrice: paid,
    rest: R2(actualPrice - disc - paid),
    adultCount: +el('adultCount')?.value || 0,
    childCount: +el('childCount')?.value || 0,
    infantCount: +el('infantCount')?.value || 0,
    activitiesText: acts.join(' | '),
    signatureData: signatureData || '',
    cost: tripHasCost,
    state: 'pending',
  };
}
async function validate(){
  const inv=await collectData();
  if(!inv.guestName){showAlert('Please enter Guest Name','⚠️');return null;}
  if(!inv.contactNo){showAlert('Please enter Phone Number','⚠️');return null;}
  if(!inv.nationality){showAlert('Please enter Nationality','⚠️');return null;}
  if(!inv.hotel){showAlert('Please enter Hotel','⚠️');return null;}
  if(!inv.activeDate){showAlert('Please enter Active Date','⚠️');return null;}
  if(!inv.time){showAlert('Please select Time','⚠️');return null;}
  if(!inv.invoiceCurrency){showAlert('Please select Invoice Currency','⚠️');return null;}
  if(!inv.trip){showAlert('Please select Trip Name','⚠️');return null;}
  return inv;
}

/* ───────────────────────────────────────────────────────────
   SAVE + PDF
   Signature upload runs IN PARALLEL with PDF generation
─────────────────────────────────────────────────────────── */
// في SalesInvoice.html - دالة gas بسيطة
function gas(action, params = {}) {
  const u = new URL(GAS);
  u.searchParams.set('action', action);

  Object.entries(params).forEach(([k, v]) => {
    if (v !== undefined && v !== null && v !== '') {
      // ✅ تجاهل signatureData في GET
      if (k === 'signatureData') return;
      if (typeof v === 'object') {
        u.searchParams.set(k, JSON.stringify(v));
      } else {
        u.searchParams.set(k, String(v));
      }
    }
  });

  return fetch(u.toString(), { method: 'GET', redirect: 'follow' })
    .then(r => r.json())
    .catch(err => { console.error(`❌ ${action} failed:`, err); throw err; });
}

// دالة saveAndGeneratePDF المعدلة
async function saveAndGeneratePDF(inv) {
  showPDFOv('💾 Saving invoice...');
 
  // ✅ الخطوة 1: حفظ الفاتورة مع التوقيع (مقسم أو مدمج)
  const save = await gasWithSig('saveInvoice', inv);
  if (!save?.success) throw new Error(save?.message || 'Save failed');
  const voucherNo = save.voucherNo;
  const invoiceRow = save.invoiceRow || 0;
  
  console.log('✅ تم حفظ الفاتورة:', voucherNo, '| صف:', invoiceRow);
 
  // ✅ الخطوة 2: انتظار حتى يتم كتابة الرابط في الشيت
  // (saveInvoice الآن يرفع التوقيع ويكتب الرابط قبل الإرجاع)
  // لكن نضيف انتظاراً صغيراً للتأكد من اكتمال flush
  if (inv.signatureData && inv.signatureData.startsWith('data:image')) {
    showPDFOv('✍️ Finalizing signature...');
    await new Promise(r => setTimeout(r, 1500));
  }
 
  // ✅ الخطوة 3: إنشاء PDF
  showPDFOv('📄 Generating PDF...');
  const pdf = await gas('saveAndGenerateSinglePDF', { voucherNo });
  hidePDFOv();
 
  if (!pdf?.success) {
    showAlert('Saved but PDF failed: ' + (pdf?.message || ''), '⚠️');
    return null;
  }
  return { voucherNo, url: pdf.url };
}
 

async function saveInvoice(){
  const inv=await validate();if(!inv)return;setBtns(true);
  try{const res=await saveAndGeneratePDF(inv);if(res){const all=[...sessionVouchers,{voucherNo:res.voucherNo,url:res.url}];sessionVouchers=[];clearFormFull();showPDFsModal(all);}}
  catch(err){hidePDFOv();showAlert('Error: '+err.message,'❌');}finally{setBtns(false);}
}
async function newBooking(){
  const inv=await validate();if(!inv)return;setBtns(true);
  try{const res=await saveAndGeneratePDF(inv);if(res){sessionVouchers.push({voucherNo:res.voucherNo,url:res.url});updateSessionBadge();clearFormPartial();showAlert(`✅ Saved ${res.voucherNo}\n${sessionVouchers.length} booking(s) in session\n\nEnter next booking or press Save to finish.`,'✅');}}
  catch(err){hidePDFOv();showAlert('Error: '+err.message,'❌');}finally{setBtns(false);}
}

/* ───────────────────────────────────────────────────────────
   CLOCK MODAL

function buildClockFace(){
  const tg=document.getElementById('ckTicks'),ng=document.getElementById('ckNums');
  if(!tg||!ng||tg.children.length)return;
  for(let i=0;i<60;i++){const a=(i*6-90)*Math.PI/180,maj=i%5===0,r1=maj?96:103,r2=109,ln=document.createElementNS('http://www.w3.org/2000/svg','line');ln.setAttribute('x1',CX+r1*Math.cos(a));ln.setAttribute('y1',CY+r1*Math.sin(a));ln.setAttribute('x2',CX+r2*Math.cos(a));ln.setAttribute('y2',CY+r2*Math.sin(a));ln.setAttribute('stroke',maj?'#0f1f3d':'#c5cfe0');ln.setAttribute('stroke-width',maj?'2.5':'1');tg.appendChild(ln);}
  for(let i=1;i<=12;i++){const a=(i*30-90)*Math.PI/180,t=document.createElementNS('http://www.w3.org/2000/svg','text');t.setAttribute('x',CX+82*Math.cos(a));t.setAttribute('y',CY+82*Math.sin(a));t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','central');t.setAttribute('font-size','14');t.setAttribute('font-weight','700');t.setAttribute('fill','#1a2540');t.setAttribute('font-family','Cairo,sans-serif');t.textContent=i;ng.appendChild(t);}
  for(let i=1;i<=12;i++){const a=(i*30-90)*Math.PI/180,t=document.createElementNS('http://www.w3.org/2000/svg','text');t.setAttribute('x',CX+54*Math.cos(a));t.setAttribute('y',CY+54*Math.sin(a));t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','central');t.setAttribute('font-size','9');t.setAttribute('font-weight','600');t.setAttribute('fill','#94a3b8');t.setAttribute('font-family','Cairo,sans-serif');t.textContent=(i+12)%24||12;ng.appendChild(t);}
}
function updateHands(){
  const h=ckHour!==null?ckHour:0,m=ckMin!==null?ckMin:0;
  const ha=((h%12)*30+(m*.5)-90)*Math.PI/180,ma=(m*6-90)*Math.PI/180;
  const hx=CX+50*Math.cos(ha),hy=CY+50*Math.sin(ha),mx=CX+68*Math.cos(ma),my=CY+68*Math.sin(ma);
  const hh=document.getElementById('ckHandH');if(hh){hh.setAttribute('x2',hx);hh.setAttribute('y2',hy);}
  const hm=document.getElementById('ckHandM');if(hm){hm.setAttribute('x2',mx);hm.setAttribute('y2',my);}
  const dot=document.getElementById('ckDot');if(dot){if(ckMode==='hour'&&ckHour!==null){dot.setAttribute('cx',hx);dot.setAttribute('cy',hy);dot.setAttribute('opacity','1');}else if(ckMode==='minute'&&ckMin!==null){dot.setAttribute('cx',mx);dot.setAttribute('cy',my);dot.setAttribute('opacity','1');}else dot.setAttribute('opacity','0');}
  const hs=ckHour!==null?(ckHour<10?'0'+ckHour:''+ckHour):'--',ms=ckMin!==null?(ckMin<10?'0'+ckMin:''+ckMin):'--';
  const hEl=document.getElementById('ckH'),mEl=document.getElementById('ckM');
  if(hEl){hEl.textContent=hs;hEl.style.color=ckMode==='hour'?'var(--gold)':'white';}
  if(mEl){mEl.textContent=ms;mEl.style.color=ckMode==='minute'?'var(--gold)':'white';}
}
function openClockModal(){buildClockFace();const ex=document.getElementById('tripTime').value;if(ex){const[h,m]=ex.split(':');ckHour=+h;ckMin=+m;}else{ckHour=null;ckMin=null;}ckMode='hour';document.getElementById('modeHour').classList.add('active');document.getElementById('modeMin').classList.remove('active');updateHands();document.getElementById('clockModal').classList.add('open');bindClockTouch();}
function closeClockModal(){document.getElementById('clockModal').classList.remove('open');}
function clearClock(){ckHour=null;ckMin=null;updateHands();}
function confirmClock(){if(ckHour===null||ckMin===null){showAlert('Please select both hour and minute','⚠️');return;}const t=(ckHour<10?'0'+ckHour:''+ckHour)+':'+(ckMin<10?'0'+ckMin:''+ckMin);document.getElementById('tripTime').value=t;const td=document.getElementById('timeDisplayText');if(td){td.textContent=t;td.classList.remove('ph');}closeClockModal();onTripFieldChange();}
function setClockMode(m){ckMode=m;document.getElementById('modeHour').classList.toggle('active',m==='hour');document.getElementById('modeMin').classList.toggle('active',m==='minute');updateHands();}
function bindClockTouch(){const wrap=document.getElementById('ckWrap');if(!wrap)return;const nw=wrap.cloneNode(true);wrap.parentNode.replaceChild(nw,wrap);nw.addEventListener('click',onClockClick);nw.addEventListener('touchend',e=>{e.preventDefault();onClockClick(e.changedTouches[0]);},{passive:false});}
function onClockClick(e){const wrap=document.getElementById('ckWrap');if(!wrap)return;const rect=wrap.getBoundingClientRect();const sx=((e.clientX||e.pageX)-rect.left)*(230/rect.width),sy=((e.clientY||e.pageY)-rect.top)*(230/rect.height);const dx=sx-CX,dy=sy-CY,dist=Math.sqrt(dx*dx+dy*dy);let angle=Math.atan2(dy,dx)*(180/Math.PI)+90;if(angle<0)angle+=360;if(ckMode==='hour'){let h=Math.round(angle/30)%12;if(h===0)h=12;if(dist<65)h=(h===12?0:h)+12;ckHour=h%24;ckMode='minute';document.getElementById('modeHour').classList.remove('active');document.getElementById('modeMin').classList.add('active');}else{ckMin=Math.round(angle/6)%60;}updateHands();}

/* ───────────────────────────────────────────────────────────
   SIGNATURE MODAL
─────────────────────────────────────────────────────────── */
function openSigModal(){document.getElementById('signatureModal').classList.add('open');sigCanvas=document.getElementById('signatureCanvas');sigCtx=sigCanvas.getContext('2d');sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height);sigCtx.strokeStyle='#0f1f3d';sigCtx.lineWidth=2.5;sigCtx.lineCap='round';sigCtx.lineJoin='round';sigCanvas.addEventListener('touchstart',tStart,{passive:false});sigCanvas.addEventListener('touchmove',tMove,{passive:false});sigCanvas.addEventListener('touchend',()=>isDrawing=false);sigCanvas.addEventListener('mousedown',mDown);sigCanvas.addEventListener('mousemove',mMove);sigCanvas.addEventListener('mouseup',()=>isDrawing=false);sigCanvas.addEventListener('mouseleave',()=>isDrawing=false);}
function closeSigModal(){document.getElementById('signatureModal').classList.remove('open');}
function clearSigCanvas(){if(sigCtx)sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height);}
function confirmSignature(){if(!sigCanvas)return;signatureData=sigCanvas.toDataURL('image/png');const sp=document.getElementById('sigPreview');if(sp){sp.style.display='block';sp.innerHTML=`<img src="${signatureData}" alt="Signature">`;}closeSigModal();}
function getPos(c,e){const r=c.getBoundingClientRect();return{x:(e.clientX-r.left)*(c.width/r.width),y:(e.clientY-r.top)*(c.height/r.height)};}
function mDown(e){isDrawing=true;const p=getPos(sigCanvas,e);lastX=p.x;lastY=p.y;}
function mMove(e){if(!isDrawing)return;const p=getPos(sigCanvas,e);sigCtx.beginPath();sigCtx.moveTo(lastX,lastY);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();lastX=p.x;lastY=p.y;}
function tStart(e){e.preventDefault();const t=e.touches[0],p=getPos(sigCanvas,t);isDrawing=true;lastX=p.x;lastY=p.y;}
function tMove(e){e.preventDefault();if(!isDrawing)return;const t=e.touches[0],p=getPos(sigCanvas,t);sigCtx.beginPath();sigCtx.moveTo(lastX,lastY);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();lastX=p.x;lastY=p.y;}
</script>
