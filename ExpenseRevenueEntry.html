<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>المصروفات والإيرادات</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0f1f3d;--navy2:#1a3260;--gold:#f5c842;
      --blue:#2563eb;--green:#16a34a;--red:#dc2626;--orange:#ea580c;
      --bg:#f0f4f8;--card:#fff;--border:#dde4f0;--text:#1a2540;--text-lt:#5a6a8a;
      --radius:16px;--radius-sm:10px;--shadow:0 4px 24px rgba(15,31,61,.10);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    
    /* Header */
    .header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;padding:13px 22px;
      display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;
      box-shadow:0 2px 12px rgba(15,31,61,.25);flex-wrap:wrap;gap:10px;}
    .header h2{color:var(--gold);font-size:18px;font-weight:900;}
    .header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:40px;
      padding:4px 13px;color:white;font-size:12px;font-weight:600;}
    .back-btn{background:transparent;border:2px solid rgba(255,255,255,.3);color:white;padding:4px 13px;
      border-radius:40px;cursor:pointer;font-weight:700;font-size:12px;font-family:'Cairo',sans-serif;transition:all .2s;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}
    
    /* Info Bar */
    .info-bar{background:#eaf2ff;padding:8px 20px;display:flex;gap:20px;flex-wrap:wrap;border-bottom:1px solid #c8d8f0;font-size:12px;}
    .info-item{display:flex;align-items:center;gap:6px;}
    .info-label{color:var(--text-lt);font-weight:600;}
    .info-value{color:var(--navy);font-weight:700;}
    .sheet-badge{padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;color:white;}
    .badge-exp{background:var(--red);} .badge-rev{background:var(--green);}
    
    /* Type Toggle */
    .type-bar{display:flex;padding:10px 20px 0;gap:8px;}
    .tbtn{flex:1;padding:10px;border:2px solid var(--border);background:white;font-size:13px;font-weight:700;cursor:pointer;border-radius:var(--radius-sm);transition:all .2s;font-family:'Cairo',sans-serif;}
    .tbtn.exp{background:var(--red);color:white;border-color:var(--red);}
    .tbtn.rev{background:var(--green);color:white;border-color:var(--green);}
    .tbtn:not(.exp):not(.rev):hover{background:#e9ecef;}
    
    /* Edit Banner */
    .ebanner{background:#fff3cd;border-bottom:2px solid #ffc107;padding:8px 20px;display:none;align-items:center;justify-content:space-between;font-size:12px;font-weight:600;color:#856404;}
    .ebanner.show{display:flex;}
    .ecancel{background:none;border:none;cursor:pointer;color:#856404;font-size:18px;padding:0 6px;}
    
    /* Page */
    .page{max-width:1400px;margin:0 auto;padding:16px 16px 40px;}
    
    /* Cards */
    .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden;}
    .card-head{padding:12px 18px;background:linear-gradient(90deg,var(--navy),var(--navy2));display:flex;align-items:center;gap:8px;}
    .card-head h3{color:var(--gold);font-size:14px;font-weight:800;}
    .card-body{padding:16px;}
    
    /* Form Grid */
    .fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:14px;}
    .fgroup{display:flex;flex-direction:column;gap:5px;}
    .fgroup label{font-size:11px;font-weight:700;color:var(--text-lt);}
    .fc{padding:8px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:13px;
      font-family:'Cairo',sans-serif;color:var(--text);background:#fafbfd;width:100%;height:40px;}
    .fc:focus{border-color:var(--blue);outline:none;background:white;}
    .fc.err{border-color:var(--red);}
    
    /* Date Wrapper */
    .dw{display:flex;gap:6px;}
    .dw input{flex:1;}
    .calbtn{padding:6px 12px;background:var(--navy);color:var(--gold);border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-weight:600;}
    .calbtn:hover{background:var(--navy2);}
    .nat{position:fixed;left:-9999px;top:-9999px;}
    
    /* Currency Row */
    .currencies-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:8px;}
    .currency-group{background:#f8fafc;border-radius:12px;padding:10px;border:1px solid var(--border);}
    .currency-title{font-size:11px;font-weight:800;color:var(--navy);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
    .currency-title .icon{font-size:14px;}
    .currency-fields{display:flex;flex-wrap:wrap;gap:8px;}
    .cur-field{flex:1;min-width:70px;}
    .cur-field label{font-size:9px;color:var(--text-lt);display:block;margin-bottom:2px;}
    .cur-field input{padding:6px 8px;border:2px solid var(--border);border-radius:8px;font-size:12px;width:100%;}
    .cur-field input:focus{border-color:var(--blue);outline:none;}
    
    /* Buttons */
    .btn{padding:8px 20px;border:none;border-radius:40px;font-weight:700;font-size:12px;cursor:pointer;
      font-family:'Cairo',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .2s;}
    .btn:hover{transform:translateY(-1px);}
    .btn-primary{background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);}
    .btn-exp{background:var(--red);color:white;}
    .btn-rev{background:var(--green);color:white;}
    .btn-gray{background:#f1f5f9;color:var(--text);border:1px solid var(--border);}
    .btn-cash{background:var(--orange);color:white;}
    
    /* Filters Bar */
    .filters-bar{background:white;border-bottom:2px solid var(--border);padding:12px 20px;}
    .filters-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;}
    .filter-group{display:flex;flex-direction:column;gap:4px;}
    .filter-group label{font-size:10px;font-weight:700;color:var(--text-lt);}
    .filter-group input{padding:7px 10px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:12px;width:140px;}
    .filter-group input:focus{border-color:var(--blue);outline:none;}
    .search-group{flex:1;min-width:200px;}
    .search-group input{width:100%;}
    
    /* Table */
    .table-wrap{overflow-x:auto;max-height:55vh;}
    table{width:100%;border-collapse:collapse;font-size:12px;}
    thead th{background:linear-gradient(90deg,var(--navy),var(--navy2));color:var(--gold);padding:10px 6px;font-weight:700;white-space:nowrap;position:sticky;top:0;z-index:10;cursor:pointer;}
    thead th:hover{background:var(--navy2);}
    td{padding:8px 6px;border-bottom:1px solid var(--border);white-space:nowrap;}
    tr:hover{background:#f5f9ff;}
    tr.sel{background:#fff3cd;}
    .dbtn{padding:4px 10px;border:none;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;color:white;background:var(--red);}
    .dbtn:hover{background:#b91c1c;}
    .no-data{text-align:center;padding:40px;color:var(--text-lt);}
    .loader{text-align:center;padding:40px;}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    /* Totals Footer */
    .totals-footer{background:#1a3260;color:var(--gold);padding:10px 16px;display:flex;flex-wrap:wrap;gap:16px;justify-content:space-around;border-radius:0 0 var(--radius) var(--radius);font-size:12px;font-weight:700;}
    .total-item{display:flex;align-items:center;gap:6px;}
    .total-label{color:#a0b4d0;}
    .total-value{color:var(--gold);font-size:14px;}
    
    /* Combobox */
    .cbw{position:relative;}
    .cbarr{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#aaa;font-size:10px;pointer-events:none;}
    .cbdd{display:none;position:absolute;top:calc(100% + 2px);left:0;z-index:600;background:white;border:2px solid var(--navy);border-radius:10px;min-width:100%;max-width:350px;max-height:200px;overflow-y:auto;box-shadow:0 6px 20px rgba(0,0,0,0.15);}
    .cbdd.open{display:block;}
    .cbo{padding:8px 12px;cursor:pointer;font-size:12px;color:var(--text);border-bottom:1px solid var(--border);}
    .cbo:hover,.cbo.hi{background:#e9f0fa;}
    .cbo.dim{color:#aaa;font-style:italic;}
    
    /* Modal & Toast */
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;z-index:9999;}
    .modal.open{display:flex;}
    .alert-box{background:white;width:88%;max-width:360px;border-radius:22px;padding:24px;text-align:center;}
    .alert-icon{font-size:40px;margin-bottom:10px;}
    .alert-msg{color:var(--navy);font-size:14px;font-weight:600;margin-bottom:18px;}
    .toast{position:fixed;bottom:20px;right:20px;padding:10px 18px;border-radius:10px;font-size:12px;font-weight:600;color:white;z-index:9998;box-shadow:0 4px 16px rgba(0,0,0,0.2);transform:translateY(50px);opacity:0;transition:0.3s;pointer-events:none;}
    .toast.show{transform:translateY(0);opacity:1;}
    .toast-success{background:var(--green);} .toast-error{background:var(--red);} .toast-info{background:var(--blue);}
    
    @media(max-width:640px){
      .filters-row{flex-direction:column;align-items:stretch;}
      .filter-group input{width:100%;}
      .currencies-grid{grid-template-columns:1fr;}
      .totals-footer{flex-wrap:wrap;justify-content:center;}
    }
  </style>
</head>
<body>

<div class="header">
  <h2>💰 المصروفات والإيرادات</h2>
  <div class="header-right">
    <span class="user-chip" id="userChip">...</span>
    <button class="back-btn" onclick="goBack()">← خروج</button>
  </div>
</div>

<!-- Info Bar (مرة واحدة فقط) -->
<div class="info-bar">
  <div class="info-item"><span class="info-label">🏢 المركز:</span><span class="info-value" id="infoCenter">—</span></div>
  <div class="info-item"><span class="info-label">🏪 الفرع:</span><span class="info-value" id="infoBranch">—</span></div>
  <div class="info-item"><span class="info-label">👤 المستخدم:</span><span class="info-value" id="infoUser">—</span></div>
  <div class="info-item"><span class="info-label">📄 الشيت:</span><span class="sheet-badge" id="infoSheet">Expenses</span></div>
</div>

<!-- Type Bar -->
<div class="type-bar">
  <button class="tbtn exp" id="btnExp" onclick="switchType('expense')">📤 Expense — مصروف</button>
  <button class="tbtn" id="btnRev" onclick="switchType('revenue')">📥 Revenue / Funding — إيراد</button>
</div>

<!-- Edit Banner -->
<div class="ebanner" id="ebanner">
  <span>✏️ وضع التعديل — <strong id="editRowLabel">—</strong></span>
  <button class="ecancel" onclick="cancelEdit()">✕ إلغاء</button>
</div>

<div class="page">
  <!-- Form Card -->
  <div class="card">
    <div class="card-head"><span class="ch-icon">📝</span><h3>إدخال بيانات</h3></div>
    <div class="card-body">
      <!-- Row 1: Date, Month, Year -->
      <div class="fgrid">
        <div class="fgroup">
          <label>📅 التاريخ * (dd/Mmm/yyyy)</label>
          <div class="dw">
            <input type="text" class="fc" id="fDate" placeholder="23/Apr/2026" oninput="onDateType()" onblur="onDateBlur()">
            <button class="calbtn" onclick="openCal()">📅</button>
            <input type="date" class="nat" id="fDateNat" onchange="onCalPick()">
          </div>
        </div>
        <div class="fgroup">
          <label>📆 الشهر</label>
          <div class="cbw">
            <input type="text" class="fc" id="fMonth" placeholder="Apr" oninput="cbf('fMonth','MO','monthDD')" onfocus="cbo('monthDD')" onclick="cbo('monthDD')" autocomplete="off">
            <span class="cbarr">▾</span>
            <div class="cbdd" id="monthDD"></div>
          </div>
        </div>
        <div class="fgroup">
          <label>📅 السنة</label>
          <div class="cbw">
            <input type="text" class="fc" id="fYear" placeholder="2026" oninput="cbf('fYear','YR','yearDD')" onfocus="cbo('yearDD')" onclick="cbo('yearDD')" autocomplete="off">
            <span class="cbarr">▾</span>
            <div class="cbdd" id="yearDD"></div>
          </div>
        </div>
        <div class="fgroup">
          <label>📋 التفاصيل *</label>
          <div class="cbw">
            <input type="text" class="fc" id="fDetails" placeholder="اكتب أو اختر..." oninput="cbf('fDetails','DT','detailsDD')" onfocus="cbo('detailsDD')" onclick="cbo('detailsDD')" autocomplete="off">
            <span class="cbarr">▾</span>
            <div class="cbdd" id="detailsDD"></div>
          </div>
        </div>
        <div class="fgroup">
          <label>🏦 الحساب / المستفيد</label>
          <div class="cbw">
            <input type="text" class="fc" id="fAcc" placeholder="اختر..." oninput="cbf('fAcc','AC','accDD')" onfocus="cbo('accDD')" onclick="cbo('accDD')" autocomplete="off">
            <span class="cbarr">▾</span>
            <div class="cbdd" id="accDD"></div>
          </div>
        </div>
        <div class="fgroup">
          <label>🏷️ نوع الحساب</label>
          <div class="cbw">
            <input type="text" class="fc" id="fAccT" placeholder="اختر..." oninput="cbf('fAccT','AT','typeDD')" onfocus="cbo('typeDD')" onclick="cbo('typeDD')" autocomplete="off">
            <span class="cbarr">▾</span>
            <div class="cbdd" id="typeDD"></div>
          </div>
        </div>
      </div>

      <!-- Currencies -->
      <div class="currencies-grid">
        <div class="currency-group">
          <div class="currency-title"><span class="icon">💵</span> Cash نقدي</div>
          <div class="currency-fields">
            <div class="cur-field"><label>USD $</label><input type="number" id="fUSD" placeholder="0" min="0" step="0.01"></div>
            <div class="cur-field"><label>EUR €</label><input type="number" id="fEUR" placeholder="0" min="0" step="0.01"></div>
            <div class="cur-field"><label>GBP £</label><input type="number" id="fGBP" placeholder="0" min="0" step="0.01"></div>
            <div class="cur-field"><label>LE</label><input type="number" id="fLE" placeholder="0" min="0" step="0.01"></div>
          </div>
        </div>
        <div class="currency-group">
          <div class="currency-title"><span class="icon">💳</span> Visa فيزا</div>
          <div class="currency-fields">
            <div class="cur-field"><label>V$</label><input type="number" id="fVUSD" placeholder="0" min="0" step="0.01"></div>
            <div class="cur-field"><label>V€</label><input type="number" id="fVEUR" placeholder="0" min="0" step="0.01"></div>
            <div class="cur-field"><label>V£</label><input type="number" id="fVGBP" placeholder="0" min="0" step="0.01"></div>
            <div class="cur-field"><label>VLE</label><input type="number" id="fVLE" placeholder="0" min="0" step="0.01"></div>
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div style="display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap;">
        <button class="btn btn-gray" onclick="resetForm()">🔄 Reset</button>
        <button class="btn btn-exp" id="saveBtn" onclick="submitEntry()">💾 حفظ Expense</button>
        <button class="btn btn-cash" onclick="goToCashRegister()">💰 الخزينة</button>
      </div>
    </div>
  </div>

  <!-- Filters Bar (أسفل الهيدر مباشرة) -->
  <div class="filters-bar">
    <div class="filters-row">
      <div class="filter-group"><label>📅 من تاريخ</label><div class="dw"><input type="text" id="fFrom" placeholder="dd/Mmm/yyyy" oninput="frType('From')" onblur="frBlur('From')"><button class="calbtn" onclick="frCal('From')">📅</button><input type="date" class="nat" id="fFromN" onchange="frPick('From')"></div></div>
      <div class="filter-group"><label>📅 إلى تاريخ</label><div class="dw"><input type="text" id="fTo" placeholder="dd/Mmm/yyyy" oninput="frType('To')" onblur="frBlur('To')"><button class="calbtn" onclick="frCal('To')">📅</button><input type="date" class="nat" id="fToN" onchange="frPick('To')"></div></div>
      <div class="filter-group search-group"><label>🔍 بحث</label><input type="text" id="fSearch" placeholder="تفاصيل، حساب، رقم..." oninput="applyFilter()"></div>
      <button class="btn btn-gray" onclick="resetFilter()" style="padding:7px 16px;">✕ إعادة ضبط</button>
    </div>
  </div>

  <!-- Table Card -->
  <div class="card">
    <div class="card-head"><span class="ch-icon">📋</span><h3>سجل المعاملات</h3></div>
    <div class="card-body" style="padding:0;">
      <div class="table-wrap" id="tableWrap"><div class="loader"><div class="spinner"></div>جاري التحميل...</div></div>
    </div>
    <!-- Totals Footer (أسفل الجدول) -->
    <div class="totals-footer" id="totalsFooter"></div>
  </div>
</div>

<div id="alertModal" class="modal"><div class="alert-box"><div class="alert-icon" id="alertIcon">ℹ️</div><div class="alert-msg" id="alertMsg"></div><button class="btn btn-primary" onclick="closeAlert()" style="margin-top:16px;">موافق</button></div></div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIG & STATE
// ═══════════════════════════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwe1Q9pjAJRk9CfWsK5YGjD5uVAbJkMhAVgw6akKkFIR9sz15V78C88Vs5dumKE-SwF/exec';
const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const YEARS = ['2024','2025','2026','2027','2028','2029','2030'];

let currentUser = null;
let currentType = 'expense';
let allRows = [], filteredRows = [];
let sortCol = -1, sortDir = 1;
let editRowNum = -1, selectedIdx = -1;
let optionsCache = {};

// ═══════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════
function gasGet(params) {
  return new Promise((resolve, reject) => {
    const qs = Object.entries(params).map(([k,v]) => `${k}=${encodeURIComponent(v)}`).join('&');
    fetch(`${GAS_URL}?${qs}`).then(r => r.json()).then(resolve).catch(reject);
  });
}

function isoToDD(iso) { if(!iso) return ''; const [y,m,d] = iso.split('-'); return `${d.padStart(2,'0')}/${MN[parseInt(m)-1]}/${y}`; }
function ddToISO(dd) { const m = dd.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/); if(!m) return ''; const idx = MN.findIndex(x => x.toLowerCase() === m[2].toLowerCase()); return idx<0 ? '' : `${m[3]}-${String(idx+1).padStart(2,'0')}-${m[1].padStart(2,'0')}`; }
function todayISO() { return new Date().toISOString().split('T')[0]; }
function ddToTs(s) { if(!s) return null; const m = s.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})/); if(m){ const idx = MN.findIndex(x => x.toLowerCase() === m[2].toLowerCase()); if(idx>=0) return new Date(+m[3], idx, +m[1]).getTime(); } const d = new Date(s); return isNaN(d) ? null : d.getTime(); }
function fmtNum(v) { const n = parseFloat(v) || 0; return n===0 ? '' : (Number.isInteger(n) ? n.toString() : n.toFixed(2)); }

function showToast(msg, type='success'){ const t=document.getElementById('toast'); t.textContent=msg; t.className=`toast toast-${type} show`; setTimeout(()=>t.className='toast',3000); }
function showAlert(msg, icon='ℹ️'){ document.getElementById('alertIcon').textContent=icon; document.getElementById('alertMsg').textContent=msg; document.getElementById('alertModal').classList.add('open'); }
function closeAlert(){ document.getElementById('alertModal').classList.remove('open'); }

// ═══════════════════════════════════════════════════════════════════
// DATE PICKERS
// ═══════════════════════════════════════════════════════════════════
function openCal(){ const n=document.getElementById('fDateNat'); n.style.pointerEvents='auto'; try{ n.showPicker(); }catch{ n.click(); } setTimeout(()=>n.style.pointerEvents='none',2000); }
function onCalPick(){ const iso=document.getElementById('fDateNat').value; if(!iso)return; document.getElementById('fDate').value=isoToDD(iso); document.getElementById('fDate').classList.remove('err'); const[y,,m]=iso.split('-'); document.getElementById('fMonth').value=MN[+m-1]; document.getElementById('fYear').value=y; loadList(iso); }
function onDateType(){ const v=document.getElementById('fDate').value.trim(); if(/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(v)){ const iso=ddToISO(v); if(iso){ document.getElementById('fDateNat').value=iso; document.getElementById('fDate').classList.remove('err'); const[y,,m]=iso.split('-'); document.getElementById('fMonth').value=MN[+m-1]; document.getElementById('fYear').value=y; loadList(iso); } } }
function onDateBlur(){ const v=document.getElementById('fDate').value.trim(); if(v && !/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(v)) document.getElementById('fDate').classList.add('err'); }
function frCal(w){ const n=document.getElementById('f'+w+'N'); n.style.pointerEvents='auto'; try{ n.showPicker(); }catch{ n.click(); } setTimeout(()=>n.style.pointerEvents='none',2000); }
function frPick(w){ const iso=document.getElementById('f'+w+'N').value; if(!iso)return; document.getElementById('f'+w).value=isoToDD(iso); applyFilter(); }
function frType(w){ const v=document.getElementById('f'+w).value.trim(); if(/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(v)){ const iso=ddToISO(v); if(iso){ document.getElementById('f'+w+'N').value=iso; applyFilter(); } } }
function frBlur(w){ const v=document.getElementById('f'+w).value.trim(); if(v && !/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(v)) document.getElementById('f'+w).value=''; }

// ═══════════════════════════════════════════════════════════════════
// TYPE SWITCHER
// ═══════════════════════════════════════════════════════════════════
function switchType(type){
  currentType = type;
  document.getElementById('btnExp').className = 'tbtn' + (type==='expense' ? ' exp' : '');
  document.getElementById('btnRev').className = 'tbtn' + (type==='revenue' ? ' rev' : '');
  const sheetSpan = document.getElementById('infoSheet');
  const saveBtn = document.getElementById('saveBtn');
  if(type==='expense'){
    sheetSpan.textContent = 'Expenses';
    sheetSpan.className = 'sheet-badge badge-exp';
    saveBtn.textContent = '💾 حفظ Expense';
    saveBtn.className = 'btn btn-exp';
  } else {
    sheetSpan.textContent = 'Other_Revenues';
    sheetSpan.className = 'sheet-badge badge-rev';
    saveBtn.textContent = '💾 حفظ Revenue';
    saveBtn.className = 'btn btn-rev';
  }
  cancelEdit();
  loadOptions();
  const iso = document.getElementById('fDateNat').value;
  if(iso) loadList(iso);
}

// ═══════════════════════════════════════════════════════════════════
// LOAD OPTIONS
// ═══════════════════════════════════════════════════════════════════
function loadOptions(){
  const sheet = currentType==='expense' ? 'Expenses' : 'Other_Revenues';
  if(optionsCache[sheet]){ applyOptions(optionsCache[sheet]); return; }
  gasGet({action:'getSheetOptions', sheet}).then(d=>{ if(d){ optionsCache[sheet]=d; applyOptions(d); } }).catch(()=>{});
}
function applyOptions(d){
  buildDropdown('detailsDD', d.details || [], 'fDetails');
  buildDropdown('accDD', d.account || [], 'fAcc');
  buildDropdown('typeDD', d.accountType || [], 'fAccT');
}
function buildDropdown(ddId, items, inputId){
  const dd = document.getElementById(ddId);
  if(!dd) return;
  dd.innerHTML = items.map(o => `<div class="cbo" onclick="pickCB('${inputId}','${ddId}','${o.replace(/'/g, "&#39;")}')">${o}</div>`).join('');
  if(!items.length) dd.innerHTML = '<div class="cbo dim">لا توجد خيارات</div>';
}

// ═══════════════════════════════════════════════════════════════════
// COMBOBOX
// ═══════════════════════════════════════════════════════════════════
function cbf(inp, optKey, ddId){
  let items = [];
  if(optKey === 'MO') items = MN;
  else if(optKey === 'YR') items = YEARS;
  else if(optKey === 'DT') items = optionsCache[currentType==='expense'?'Expenses':'Other_Revenues']?.details || [];
  else if(optKey === 'AC') items = optionsCache[currentType==='expense'?'Expenses':'Other_Revenues']?.account || [];
  else if(optKey === 'AT') items = optionsCache[currentType==='expense'?'Expenses':'Other_Revenues']?.accountType || [];
  const val = document.getElementById(inp).value.toLowerCase();
  const filtered = items.filter(i => i.toLowerCase().includes(val));
  const dd = document.getElementById(ddId);
  if(filtered.length){
    dd.innerHTML = filtered.map(o => `<div class="cbo" onclick="pickCB('${inp}','${ddId}','${o.replace(/'/g, "&#39;")}')">${o}</div>`).join('');
  } else {
    dd.innerHTML = '<div class="cbo dim">لا توجد نتائج — يمكنك الكتابة للإضافة</div>';
  }
}
function cbo(ddId){ document.getElementById(ddId)?.classList.add('open'); }
function cbc(ddId){ setTimeout(()=>{ document.getElementById(ddId)?.classList.remove('open'); }, 200); }
function pickCB(inp, ddId, val){ document.getElementById(inp).value = val; document.getElementById(ddId).classList.remove('open'); document.getElementById(inp).classList.remove('err'); }
document.addEventListener('click', function(e){ if(!e.target.closest('.cbw')){ ['monthDD','yearDD','detailsDD','accDD','typeDD'].forEach(id=>document.getElementById(id)?.classList.remove('open')); } });

// ═══════════════════════════════════════════════════════════════════
// LOAD LIST
// ═══════════════════════════════════════════════════════════════════
function loadList(iso){
  const sheet = currentType==='expense' ? 'Expenses' : 'Other_Revenues';
  const dateTxt = isoToDD(iso);
  document.getElementById('tableWrap').innerHTML = '<div class="loader"><div class="spinner"></div>جاري التحميل...</div>';
  gasGet({action:'getExpenseRevenueRows', sheet, date:dateTxt})
    .then(data => { allRows = Array.isArray(data) ? data : []; applyFilter(); })
    .catch(err => { document.getElementById('tableWrap').innerHTML = `<div class="no-data">خطأ: ${err.message}</div>`; });
}

// ═══════════════════════════════════════════════════════════════════
// FILTER & SORT
// ═══════════════════════════════════════════════════════════════════
const COL_KEYS = ['expenseNo','date','details','usd','eur','gbp','le','vUSD','vEUR','vGBP','vLE','account','accountType','month','year','centerName','branchName'];
const NUM_COLS = ['usd','eur','gbp','le','vUSD','vEUR','vGBP','vLE'];

function applyFilter(){
  const fromVal = document.getElementById('fFrom').value.trim();
  const toVal = document.getElementById('fTo').value.trim();
  const search = document.getElementById('fSearch').value.toLowerCase().trim();
  const fromTs = fromVal ? ddToTs(fromVal) : null;
  const toTs = toVal ? ddToTs(toVal) + 86399999 : null;
  filteredRows = allRows.filter(r => {
    const ts = ddToTs(r.date);
    if(fromTs && (ts===null || ts<fromTs)) return false;
    if(toTs && (ts===null || ts>toTs)) return false;
    if(search){
      const str = [r.date,r.details,r.account,r.accountType,r.expenseNo].map(x=>x||'').join(' ').toLowerCase();
      if(!str.includes(search)) return false;
    }
    return true;
  });
  if(sortCol>=0) doSort();
  renderTable();
  renderTotals();
}
function doSort(){
  const key = COL_KEYS[sortCol];
  filteredRows.sort((a,b)=>{
    let va = a[key]??'', vb = b[key]??'';
    if(key==='date'){ va = ddToTs(va)||0; vb = ddToTs(vb)||0; }
    else if(NUM_COLS.includes(key)){ va = parseFloat(va)||0; vb = parseFloat(vb)||0; }
    else{ va = String(va).toLowerCase(); vb = String(vb).toLowerCase(); }
    return va<vb ? -sortDir : va>vb ? sortDir : 0;
  });
}
function setSort(col){
  sortDir = (sortCol===col) ? -sortDir : 1;
  sortCol = col;
  doSort();
  renderTable();
  renderTotals();
}
function resetFilter(){
  document.getElementById('fFrom').value = '';
  document.getElementById('fTo').value = '';
  document.getElementById('fSearch').value = '';
  document.getElementById('fFromN').value = '';
  document.getElementById('fToN').value = '';
  filteredRows = [...allRows];
  if(sortCol>=0) doSort();
  renderTable();
  renderTotals();
}

// ═══════════════════════════════════════════════════════════════════
// RENDER TABLE
// ═══════════════════════════════════════════════════════════════════
const HEADERS = ['رقم المعاملة','التاريخ','التفاصيل','$','€','£','LE','V$','V€','V£','VLE','الحساب','نوع الحساب','الشهر','السنة','المركز','الفرع'];
function renderTable(){
  const wrap = document.getElementById('tableWrap');
  if(!filteredRows.length){ wrap.innerHTML = '<div class="no-data">لا توجد سجلات</div>'; return; }
  let html = '<table><thead><tr>';
  HEADERS.forEach((h,i)=>{ const arrow = sortCol===i ? (sortDir===1?' ↑':' ↓') : ''; html += `<th onclick="setSort(${i})">${h}${arrow}</th>`; });
  html += '<th>حذف</th></tr></thead><tbody>';
  filteredRows.forEach((r,i)=>{
    html += `<tr class="${i===selectedIdx?'sel':''}" ondblclick="loadRow(${i})">
      <td>${r.expenseNo||'-'}</td>
      <td>${r.date||'-'}</td>
      <td style="text-align:right">${r.details||'-'}</td>
      <td>${fmtNum(r.usd)}</td><td>${fmtNum(r.eur)}</td><td>${fmtNum(r.gbp)}</td><td>${fmtNum(r.le)}</td>
      <td>${fmtNum(r.vUSD)}</td><td>${fmtNum(r.vEUR)}</td><td>${fmtNum(r.vGBP)}</td><td>${fmtNum(r.vLE)}</td>
      <td>${r.account||'-'}</td><td>${r.accountType||'-'}</td>
      <td>${r.month||'-'}</td><td>${r.year||'-'}</td>
      <td>${r.centerName||'-'}</td><td>${r.branchName||'-'}</td>
      <td><button class="dbtn" onclick="confirmDelete(${i})">🗑️</button></td>
    </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════
// RENDER TOTALS (أسفل الجدول - كل عمود تحت عموده)
// ═══════════════════════════════════════════════════════════════════
function renderTotals(){
  const sums = { usd:0, eur:0, gbp:0, le:0, vUSD:0, vEUR:0, vGBP:0, vLE:0 };
  filteredRows.forEach(r => {
    sums.usd += parseFloat(r.usd)||0;
    sums.eur += parseFloat(r.eur)||0;
    sums.gbp += parseFloat(r.gbp)||0;
    sums.le += parseFloat(r.le)||0;
    sums.vUSD += parseFloat(r.vUSD)||0;
    sums.vEUR += parseFloat(r.vEUR)||0;
    sums.vGBP += parseFloat(r.vGBP)||0;
    sums.vLE += parseFloat(r.vLE)||0;
  });
  const footer = document.getElementById('totalsFooter');
  footer.innerHTML = `
    <div class="total-item"><span class="total-label">📊 عدد السجلات:</span><span class="total-value">${filteredRows.length}</span></div>
    <div class="total-item"><span class="total-label">💰 $:</span><span class="total-value">${fmtNum(sums.usd)}</span></div>
    <div class="total-item"><span class="total-label">💰 €:</span><span class="total-value">${fmtNum(sums.eur)}</span></div>
    <div class="total-item"><span class="total-label">💰 £:</span><span class="total-value">${fmtNum(sums.gbp)}</span></div>
    <div class="total-item"><span class="total-label">💰 LE:</span><span class="total-value">${fmtNum(sums.le)}</span></div>
    <div class="total-item"><span class="total-label">💳 V$:</span><span class="total-value">${fmtNum(sums.vUSD)}</span></div>
    <div class="total-item"><span class="total-label">💳 V€:</span><span class="total-value">${fmtNum(sums.vEUR)}</span></div>
    <div class="total-item"><span class="total-label">💳 V£:</span><span class="total-value">${fmtNum(sums.vGBP)}</span></div>
    <div class="total-item"><span class="total-label">💳 VLE:</span><span class="total-value">${fmtNum(sums.vLE)}</span></div>
  `;
}

// ═══════════════════════════════════════════════════════════════════
// FORM COLLECT & VALIDATE
// ═══════════════════════════════════════════════════════════════════
function collectForm(){
  return {
    date: document.getElementById('fDate').value.trim(),
    details: document.getElementById('fDetails').value.trim(),
    usd: parseFloat(document.getElementById('fUSD').value)||0,
    eur: parseFloat(document.getElementById('fEUR').value)||0,
    gbp: parseFloat(document.getElementById('fGBP').value)||0,
    le: parseFloat(document.getElementById('fLE').value)||0,
    vUSD: parseFloat(document.getElementById('fVUSD').value)||0,
    vEUR: parseFloat(document.getElementById('fVEUR').value)||0,
    vGBP: parseFloat(document.getElementById('fVGBP').value)||0,
    vLE: parseFloat(document.getElementById('fVLE').value)||0,
    account: document.getElementById('fAcc').value.trim(),
    accountType: document.getElementById('fAccT').value.trim(),
    month: document.getElementById('fMonth').value.trim(),
    year: document.getElementById('fYear').value.trim(),
    centerName: currentUser?.centerName || '',
    branchName: currentUser?.branchName || '',
    userID: currentUser?.id || currentUser?.name || ''
  };
}
function validate(row){
  let ok = true;
  if(!row.date){ document.getElementById('fDate').classList.add('err'); ok=false; }
  else if(!/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(row.date)){ document.getElementById('fDate').classList.add('err'); showToast('التاريخ: dd/Mmm/yyyy','error'); ok=false; }
  if(!row.details){ document.getElementById('fDetails').classList.add('err'); ok=false; }
  const hasAmount = [row.usd,row.eur,row.gbp,row.le,row.vUSD,row.vEUR,row.vGBP,row.vLE].some(v=>v>0);
  if(!hasAmount){ showToast('يجب إدخال مبلغ واحد على الأقل','error'); ok=false; }
  return ok;
}
function resetForm(){
  ['fDetails','fAcc','fAccT','fUSD','fEUR','fGBP','fLE','fVUSD','fVEUR','fVGBP','fVLE'].forEach(id=>{ const el=document.getElementById(id); if(el){ el.value=''; el.classList.remove('err'); } });
  const iso = todayISO();
  document.getElementById('fDate').value = isoToDD(iso);
  document.getElementById('fDateNat').value = iso;
  const [y,,m] = iso.split('-');
  document.getElementById('fMonth').value = MN[+m-1];
  document.getElementById('fYear').value = y;
  document.getElementById('fDate').classList.remove('err');
}

// ═══════════════════════════════════════════════════════════════════
// SUBMIT (SAVE/UPDATE)
// ═══════════════════════════════════════════════════════════════════
async function submitEntry(){
  const row = collectForm();
  if(!validate(row)) return;
  const sheet = currentType==='expense' ? 'Expenses' : 'Other_Revenues';
  const isEdit = editRowNum > 0 ? '1' : '0';
  const params = {
    action:'saveExpRev', sheet, isEdit, rowNum: editRowNum>0 ? editRowNum : 0,
    date:row.date, details:row.details,
    usd:row.usd, eur:row.eur, gbp:row.gbp, le:row.le,
    vUSD:row.vUSD, vEUR:row.vEUR, vGBP:row.vGBP, vLE:row.vLE,
    account:row.account, accountType:row.accountType,
    month:row.month, year:row.year,
    centerName:row.centerName, branchName:row.branchName, userID:row.userID
  };
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '⏳ جاري الحفظ...';
  try {
    const res = await gasGet(params);
    if(res.success){
      showToast(isEdit==='1' ? '✅ تم التحديث' : '✅ تم الحفظ', 'success');
      cancelEdit();
      resetForm();
      delete optionsCache[sheet];
      const iso = document.getElementById('fDateNat').value;
      if(iso) loadList(iso);
    } else {
      showAlert(res.message || 'فشل الحفظ', '❌');
    }
  } catch(err) {
    showAlert('خطأ: '+err.message, '❌');
  } finally {
    btn.disabled = false;
    btn.textContent = currentType==='expense' ? '💾 حفظ Expense' : '💾 حفظ Revenue';
  }
}

// ═══════════════════════════════════════════════════════════════════
// EDIT & DELETE
// ═══════════════════════════════════════════════════════════════════
function loadRow(idx){
  const r = filteredRows[idx];
  if(!r) return;
  selectedIdx = idx;
  editRowNum = r._rowNum;
  const setVal = (id,val) => { const el=document.getElementById(id); if(el){ el.value=val||''; el.classList.remove('err'); } };
  setVal('fDate', r.date);
  setVal('fMonth', r.month);
  setVal('fYear', r.year);
  setVal('fDetails', r.details);
  setVal('fAcc', r.account);
  setVal('fAccT', r.accountType);
  setVal('fUSD', fmtNum(r.usd));
  setVal('fEUR', fmtNum(r.eur));
  setVal('fGBP', fmtNum(r.gbp));
  setVal('fLE', fmtNum(r.le));
  setVal('fVUSD', fmtNum(r.vUSD));
  setVal('fVEUR', fmtNum(r.vEUR));
  setVal('fVGBP', fmtNum(r.vGBP));
  setVal('fVLE', fmtNum(r.vLE));
  document.getElementById('fDateNat').value = ddToISO(r.date) || '';
  document.getElementById('editRowLabel').textContent = r.expenseNo || 'صف '+editRowNum;
  document.getElementById('ebanner').classList.add('show');
  const btn = document.getElementById('saveBtn');
  btn.textContent = currentType==='expense' ? '✏️ تحديث Expense' : '✏️ تحديث Revenue';
  renderTable();
  showToast('تم تحميل السطر للتعديل', 'info');
  window.scrollTo({top:0, behavior:'smooth'});
}
function cancelEdit(){
  selectedIdx = -1;
  editRowNum = -1;
  document.getElementById('ebanner').classList.remove('show');
  const btn = document.getElementById('saveBtn');
  btn.textContent = currentType==='expense' ? '💾 حفظ Expense' : '💾 حفظ Revenue';
  renderTable();
}
function confirmDelete(idx){
  const r = filteredRows[idx];
  if(!r) return;
  if(confirm(`هل تريد حذف: "${r.details}" - ${r.date}؟`)){
    const sheet = currentType==='expense' ? 'Expenses' : 'Other_Revenues';
    gasGet({action:'deleteExpRev', sheet, rowNum: r._rowNum})
      .then(res => {
        if(res.success){
          showToast('🗑️ تم الحذف', 'success');
          allRows = allRows.filter(x => x._rowNum !== r._rowNum);
          applyFilter();
          if(editRowNum === r._rowNum) cancelEdit();
        } else {
          showAlert(res.message || 'فشل الحذف', '❌');
        }
      }).catch(err => showAlert('خطأ: '+err.message, '❌'));
  }
}

// ═══════════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════════
function goBack(){
  const userType = currentUser?.type || 'Accountant';
  const dashboards = { Admin:'Dashboard.html', Owner:'OwnerDashboard.html', Sales:'SalesDashboard.html', Accountant:'AccountantDashboard.html', AccountantManager:'AccountantDashboard.html', FinancialManager:'AccountantDashboard.html', Customer:'index.html' };
  location.href = dashboards[userType] || 'Dashboard.html';
}
function goToCashRegister(){
  const userParam = encodeURIComponent(JSON.stringify(currentUser));
  location.href = `CashRegister.html?user=${userParam}`;
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  let ud = sessionStorage.getItem('currentUser');
  if(!ud){
    const p = new URLSearchParams(location.search).get('user');
    if(p){ ud = decodeURIComponent(p); sessionStorage.setItem('currentUser', ud); }
  }
  if(!ud){ location.href = 'index.html'; return; }
  try { currentUser = JSON.parse(ud); } catch(e){ location.href = 'index.html'; return; }
  
  document.getElementById('userChip').textContent = currentUser.name || 'User';
  document.getElementById('infoCenter').textContent = currentUser.centerName || '—';
  document.getElementById('infoBranch').textContent = currentUser.branchName || '—';
  document.getElementById('infoUser').textContent = currentUser.name || currentUser.id || '—';
  
  const iso = todayISO();
  document.getElementById('fDate').value = isoToDD(iso);
  document.getElementById('fDateNat').value = iso;
  const [y,,m] = iso.split('-');
  document.getElementById('fMonth').value = MN[+m-1];
  document.getElementById('fYear').value = y;
  
  buildDropdown('monthDD', MN, 'fMonth');
  buildDropdown('yearDD', YEARS, 'fYear');
  await loadOptions();
  loadList(iso);
});

// Expose globals
window.switchType = switchType;
window.openCal = openCal; window.onCalPick = onCalPick; window.onDateType = onDateType; window.onDateBlur = onDateBlur;
window.frCal = frCal; window.frPick = frPick; window.frType = frType; window.frBlur = frBlur;
window.cbf = cbf; window.cbo = cbo; window.cbc = cbc; window.pickCB = pickCB;
window.applyFilter = applyFilter; window.resetFilter = resetFilter; window.setSort = setSort;
window.loadRow = loadRow; window.cancelEdit = cancelEdit; window.submitEntry = submitEntry;
window.confirmDelete = confirmDelete; window.resetForm = resetForm; window.goBack = goBack;
window.goToCashRegister = goToCashRegister; window.closeAlert = closeAlert;
</script>
