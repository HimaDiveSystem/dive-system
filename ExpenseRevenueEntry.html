<!DOCTYPE html>
<html dir="ltr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>Expense & Revenue Entry</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
    body{background:#f0f4f8;min-height:100vh;}

    /* ── HEADER ── */
    .hdr{background:#0b2447;color:white;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;border-bottom:3px solid #f4c542;}
    .hdr h2{color:#fad57e;font-size:17px;display:flex;align-items:center;gap:7px;}
    .hright{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .ubadge{background:rgba(255,255,255,0.1);padding:4px 12px;border-radius:40px;border:1px solid #ffd966;color:#ffd966;font-size:11px;}
    .back-btn{background:#2a4f8c;color:white;border:1px solid #fad57e;padding:4px 14px;border-radius:40px;cursor:pointer;font-weight:600;font-size:11px;transition:0.2s;}
    .back-btn:hover{background:#fad57e;color:#0b2447;}

    /* ── TYPE BAR ── */
    .type-bar{display:flex;padding:10px 20px 0;}
    .tbtn{flex:1;padding:9px;border:2px solid #dee2e6;background:white;font-size:13px;font-weight:600;cursor:pointer;transition:0.2s;}
    .tbtn:first-child{border-radius:10px 0 0 10px;}
    .tbtn:last-child{border-radius:0 10px 10px 0;}
    .tbtn.exp{background:#e74c3c;color:white;border-color:#e74c3c;}
    .tbtn.rev{background:#27ae60;color:white;border-color:#27ae60;}
    .tbtn:not(.exp):not(.rev):hover{background:#f0f4fa;}

    /* ── TOP SECTION (sticky) ── */
    .top-sticky{position:sticky;top:0;z-index:200;background:#f0f4f8;}

    /* ── INFO STRIP ── */
    .info-strip{background:#e8edf5;padding:7px 20px;display:flex;gap:16px;flex-wrap:wrap;border-bottom:1px solid #d0d8e8;font-size:11px;align-items:center;}
    .ii{display:flex;align-items:center;gap:4px;}
    .il{color:#6c757d;font-weight:600;}
    .iv{color:#1e2b4f;font-weight:700;}
    .sbadge{padding:1px 8px;border-radius:20px;font-size:10px;font-weight:700;color:white;}
    .se{background:#e74c3c;} .sr{background:#27ae60;}

    /* ── EDIT BANNER ── */
    .ebanner{background:#fff3cd;border-bottom:2px solid #ffc107;padding:6px 20px;display:none;align-items:center;justify-content:space-between;font-size:12px;font-weight:600;color:#856404;}
    .ebanner.show{display:flex;}
    .ecancel{background:none;border:none;cursor:pointer;color:#856404;font-size:15px;padding:0 4px;}

    /* ── FORM SECTION ── */
    .form-sec{background:white;padding:12px 20px 10px;border-bottom:2px solid #dee2e6;}

    /* row layout */
    .frow{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:8px;}
    .fg{display:flex;flex-direction:column;gap:3px;}
    .fg label{font-size:10px;font-weight:700;color:#1e2b4f;white-space:nowrap;}
    .fg input,.fg select{padding:7px 9px;border:2px solid #e9f0fa;border-radius:9px;font-size:12px;color:#2c3e50;background:white;transition:border-color 0.2s;}
    .fg input:focus,.fg select:focus{outline:none;border-color:#1e2b4f;}
    .fg input.err{border-color:#e74c3c;}

    /* widths */
    .w90{width:90px;} .w110{width:110px;} .w130{width:130px;} .w160{width:160px;}
    .w200{width:200px;} .w240{width:240px;} .w300{width:300px;}
    .w70{width:70px;}

    /* date wrap */
    .dw{display:flex;gap:4px;align-items:center;}
    .dw input{flex:1;}
    .calbtn{padding:6px 8px;background:#1e2b4f;color:#ffd966;border:none;border-radius:7px;cursor:pointer;font-size:12px;}
    .calbtn:hover{background:#2a3a60;}
    .nat{position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;}

    /* combobox */
    .cbw{position:relative;}
    .cbarr{position:absolute;right:7px;top:50%;transform:translateY(-50%);color:#aaa;font-size:10px;pointer-events:none;}
    .cbdd{display:none;position:absolute;top:calc(100% + 2px);left:0;z-index:600;background:white;border:2px solid #1e2b4f;border-radius:9px;min-width:100%;max-width:380px;max-height:200px;overflow-y:auto;box-shadow:0 6px 20px rgba(0,0,0,0.15);}
    .cbdd.open{display:block;}
    .cbo{padding:7px 11px;cursor:pointer;font-size:12px;color:#2c3e50;white-space:nowrap;}
    .cbo:hover,.cbo.hi{background:#e9f0fa;}
    .cbo.dim{color:#aaa;font-style:italic;}

    /* currency row */
    .cur-row{display:flex;gap:7px;align-items:flex-end;flex-wrap:wrap;}
    .curg{display:flex;flex-direction:column;gap:2px;}
    .curg label{font-size:10px;font-weight:700;color:#1e2b4f;text-align:center;}
    .curw{position:relative;}
    .cursym{position:absolute;left:6px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;color:#aaa;pointer-events:none;}
    .curw input{padding:6px 5px 6px 20px;border:2px solid #e9f0fa;border-radius:8px;font-size:12px;color:#2c3e50;width:72px;}
    .curw input:focus{outline:none;border-color:#1e2b4f;}
    .curw.visa .cursym{color:#3498db;}
    .sep{width:1px;height:36px;background:#dee2e6;margin:0 4px;align-self:center;}
    .sec-lbl{font-size:9px;font-weight:700;color:#6c757d;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;align-self:center;padding-bottom:2px;}

    /* submit row */
    .srow{display:flex;gap:8px;padding:8px 20px;background:#f8f9fa;border-bottom:2px solid #dee2e6;}
    .sbtn{padding:8px 24px;border:none;border-radius:40px;font-size:12px;font-weight:700;cursor:pointer;transition:0.2s;}
    .sbtn.exp{background:#e74c3c;color:white;} .sbtn.exp:hover{background:#c0392b;}
    .sbtn.rev{background:#27ae60;color:white;} .sbtn.rev:hover{background:#1e8449;}
    .rbtn{padding:8px 18px;border:2px solid #dee2e6;background:white;border-radius:40px;font-size:12px;font-weight:600;cursor:pointer;color:#6c757d;}
    .rbtn:hover{border-color:#1e2b4f;color:#1e2b4f;}

    /* ── FILTERS BAR ── */
    .fbar{background:white;padding:8px 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;border-bottom:2px solid #dee2e6;}
    .fbar .fg input{padding:6px 8px;font-size:12px;}

    /* ── TOTALS STRIP ── */
    .tots{background:#eaf2ff;padding:6px 20px;display:flex;gap:12px;flex-wrap:wrap;border-bottom:1px solid #c8d8f0;font-size:11px;align-items:center;}
    .ti{display:flex;align-items:center;gap:3px;}
    .tl{color:#6c757d;font-weight:600;}
    .tv{color:#1e2b4f;font-weight:700;}
    .tc{background:#1e2b4f;color:#ffd966;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:700;}

    /* ── TABLE ── */
    .tbl-wrap{overflow:auto;height:calc(100vh - var(--top-h, 360px));}
    table{width:100%;border-collapse:collapse;font-size:12px;}
    thead th{background:#1e2b4f;color:#ffd966;padding:8px 6px;font-weight:600;cursor:pointer;white-space:nowrap;position:sticky;top:0;z-index:10;}
    thead th:hover{background:#2a3a60;}
    td{padding:6px 6px;border-bottom:1px solid #e9f0fa;color:#2c3e50;white-space:nowrap;}
    tr:hover{background:#f5f9ff;}
    tr.sel{background:#fff3cd!important;}
    .nd{text-align:center;padding:40px;color:#6c757d;font-size:13px;}
    .ld{border:4px solid #f3f3f3;border-top:4px solid #1e2b4f;border-radius:50%;width:32px;height:32px;animation:spin 1s linear infinite;margin:28px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .dbtn{padding:2px 7px;border:none;border-radius:12px;font-size:10px;font-weight:600;cursor:pointer;color:white;background:#e74c3c;}
    .dbtn:hover{background:#c0392b;}

    /* toast */
    .toast{position:fixed;bottom:20px;right:20px;padding:10px 18px;border-radius:10px;font-size:12px;font-weight:600;color:white;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2);transform:translateY(50px);opacity:0;transition:0.35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
    .toast.show{transform:translateY(0);opacity:1;}
    .tok{background:#27ae60;} .terr{background:#e74c3c;} .tinf{background:#3498db;}

    /* modal */
    .mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9998;align-items:center;justify-content:center;}
    .mov.open{display:flex;}
    .mbox{background:white;border-radius:18px;padding:24px;width:340px;text-align:center;box-shadow:0 12px 36px rgba(0,0,0,0.25);}
    .mico{font-size:40px;margin-bottom:8px;}
    .mmsg{font-size:14px;color:#1e2b4f;font-weight:600;margin-bottom:16px;line-height:1.5;}
    .mbtns{display:flex;gap:8px;justify-content:center;}
    .mok{padding:8px 22px;background:#1e2b4f;color:#ffd966;border:none;border-radius:40px;font-size:12px;font-weight:700;cursor:pointer;}
    .mno{padding:8px 18px;background:#f8f9fa;color:#6c757d;border:2px solid #dee2e6;border-radius:40px;font-size:12px;font-weight:600;cursor:pointer;}
    .hint{font-size:10px;color:#aaa;padding:3px 20px 6px;background:#f8f9fa;border-bottom:1px solid #e9f0fa;}
  </style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <h2>💰 Expense &amp; Revenue Entry</h2>
  <div class="hright">
    <span class="ubadge" id="ubadge">—</span>
    <button class="back-btn" onclick="goBack()">🔙 رجوع</button>
  </div>
</div>

<!-- TYPE BAR -->
<div class="type-bar">
  <button class="tbtn exp" id="btnExp" onclick="switchType('expense')">📤 Expense — مصروف</button>
  <button class="tbtn"     id="btnRev" onclick="switchType('revenue')">📥 Revenue / Funding — إيراد</button>
</div>

<!-- ══════════ TOP STICKY BLOCK ══════════ -->
<div class="top-sticky" id="topSticky">

  <!-- INFO -->
  <div class="info-strip">
    <div class="ii"><span class="il">Center:</span><span class="iv" id="iCenter">—</span></div>
    <div class="ii"><span class="il">Branch:</span><span class="iv" id="iBranch">—</span></div>
    <div class="ii"><span class="il">User:</span><span class="iv"   id="iUser">—</span></div>
    <div class="ii"><span class="il">Sheet:</span><span class="sbadge se" id="iSheet">Expenses</span></div>
  </div>

  <!-- EDIT BANNER -->
  <div class="ebanner" id="ebanner">
    <span>✏️ Edit mode — <strong id="eRowLbl">—</strong></span>
    <button class="ecancel" onclick="cancelEdit()" title="Cancel">✕ Cancel</button>
  </div>

  <!-- FORM ROW 1: Date · Month · Year · Details (wide) · Account · Account Type -->
  <div class="form-sec">
    <div class="frow">

      <!-- Date -->
      <div class="fg">
        <label>Date * (dd/Mmm/yyyy)</label>
        <div class="dw">
          <input type="text" class="w110" id="fDate" placeholder="09/Mar/2026"
                 oninput="onDateType()" onblur="onDateBlur()">
          <button class="calbtn" onclick="openCal()" type="button">📅</button>
          <input type="date" class="nat" id="fDateNat" onchange="onCalPick()">
        </div>
      </div>

      <!-- Month -->
      <div class="fg">
        <label>Month</label>
        <div class="cbw">
          <input type="text" class="w90" id="fMonth" placeholder="Month"
                 oninput="cbf('fMonth','MO','mDD')" onfocus="cbo('mDD')" onblur="cbc('mDD')" autocomplete="off">
          <span class="cbarr">▾</span>
          <div class="cbdd" id="mDD"></div>
        </div>
      </div>

      <!-- Year -->
      <div class="fg">
        <label>Year</label>
        <div class="cbw">
          <input type="text" class="w70" id="fYear" placeholder="Year"
                 oninput="cbf('fYear','YR','yDD')" onfocus="cbo('yDD')" onblur="cbc('yDD')" autocomplete="off">
          <span class="cbarr">▾</span>
          <div class="cbdd" id="yDD"></div>
        </div>
      </div>

      <!-- Details — wider combobox -->
      <div class="fg" style="flex:1;min-width:260px;">
        <label>Details — البيان التفصيلي *</label>
        <div class="cbw">
          <input type="text" style="width:100%;padding-right:22px;" id="fDetails"
                 placeholder="اكتب أو اختر من القائمة..."
                 oninput="cbf('fDetails','DT','dtDD')" onfocus="cbo('dtDD')" onblur="cbc('dtDD')" autocomplete="off">
          <span class="cbarr">▾</span>
          <div class="cbdd" id="dtDD" style="min-width:320px;"></div>
        </div>
      </div>

      <!-- Account -->
      <div class="fg">
        <label>Account — المستفيد</label>
        <div class="cbw">
          <input type="text" class="w130" id="fAcc"
                 oninput="cbf('fAcc','AC','acDD')" onfocus="cbo('acDD')" onblur="cbc('acDD')" autocomplete="off">
          <span class="cbarr">▾</span>
          <div class="cbdd" id="acDD"></div>
        </div>
      </div>

      <!-- Account Type -->
      <div class="fg">
        <label>Account Type</label>
        <div class="cbw">
          <input type="text" class="w110" id="fAccT"
                 oninput="cbf('fAccT','AT','atDD')" onfocus="cbo('atDD')" onblur="cbc('atDD')" autocomplete="off">
          <span class="cbarr">▾</span>
          <div class="cbdd" id="atDD"></div>
        </div>
      </div>

    </div><!-- /frow1 -->

    <!-- FORM ROW 2: Amounts -->
    <div class="frow" style="margin-bottom:0;">
      <span class="sec-lbl">Cash نقدي:</span>
      <div class="curg"><label>USD $</label><div class="curw"><span class="cursym">$</span><input type="number" id="fUSD" placeholder="0" min="0" step="0.01"></div></div>
      <div class="curg"><label>EUR €</label><div class="curw"><span class="cursym">€</span><input type="number" id="fEUR" placeholder="0" min="0" step="0.01"></div></div>
      <div class="curg"><label>GBP £</label><div class="curw"><span class="cursym">£</span><input type="number" id="fGBP" placeholder="0" min="0" step="0.01"></div></div>
      <div class="curg"><label>LE</label><div class="curw"><span class="cursym" style="font-size:8px;">LE</span><input type="number" id="fLE" placeholder="0" min="0" step="0.01"></div></div>
      <div class="sep"></div>
      <span class="sec-lbl">Visa فيزا:</span>
      <div class="curg"><label>V$</label><div class="curw visa"><span class="cursym">$</span><input type="number" id="fVUSD" placeholder="0" min="0" step="0.01"></div></div>
      <div class="curg"><label>V€</label><div class="curw visa"><span class="cursym">€</span><input type="number" id="fVEUR" placeholder="0" min="0" step="0.01"></div></div>
      <div class="curg"><label>V£</label><div class="curw visa"><span class="cursym">£</span><input type="number" id="fVGBP" placeholder="0" min="0" step="0.01"></div></div>
      <div class="curg"><label>VLE</label><div class="curw visa"><span class="cursym" style="font-size:8px;">LE</span><input type="number" id="fVLE" placeholder="0" min="0" step="0.01"></div></div>
    </div>

  </div><!-- /form-sec -->

  <!-- SUBMIT ROW -->
  <div class="srow">
    <button class="rbtn" onclick="resetForm()">🔄 Reset</button>
    <button class="sbtn exp" id="btnSave" onclick="submitEntry()">💾 Save Expense</button>
  </div>

  <!-- FILTERS BAR -->
  <div class="fbar">
    <div class="fg">
      <label>From Date</label>
      <div class="dw">
        <input type="text" class="w110" id="fFrom" placeholder="dd/Mmm/yyyy"
               oninput="frType('From')" onblur="frBlur('From')">
        <button class="calbtn" onclick="frCal('From')" type="button">📅</button>
        <input type="date" class="nat" id="fFromN" onchange="frPick('From')">
      </div>
    </div>
    <div class="fg">
      <label>To Date</label>
      <div class="dw">
        <input type="text" class="w110" id="fTo" placeholder="dd/Mmm/yyyy"
               oninput="frType('To')" onblur="frBlur('To')">
        <button class="calbtn" onclick="frCal('To')" type="button">📅</button>
        <input type="date" class="nat" id="fToN" onchange="frPick('To')">
      </div>
    </div>
    <div class="fg">
      <label>Search Text</label>
      <input type="text" class="w200" id="fSrch" placeholder="Details, Account, No..."
             oninput="applyFilter()">
    </div>
    <button class="rbtn" style="margin-bottom:1px;" onclick="resetFilter()">✕ Reset</button>
  </div>

  <!-- TOTALS -->
  <div class="tots" id="tots">
    <div class="ti"><span class="tl">Records:</span><span class="tc" id="tN">0</span></div>
    <div class="ti"><span class="tl">$</span><span class="tv" id="tUSD">0</span></div>
    <div class="ti"><span class="tl">€</span><span class="tv" id="tEUR">0</span></div>
    <div class="ti"><span class="tl">£</span><span class="tv" id="tGBP">0</span></div>
    <div class="ti"><span class="tl">LE</span><span class="tv" id="tLE">0</span></div>
    <div class="ti"><span class="tl">V$</span><span class="tv" id="tVUSD">0</span></div>
    <div class="ti"><span class="tl">V€</span><span class="tv" id="tVEUR">0</span></div>
    <div class="ti"><span class="tl">V£</span><span class="tv" id="tVGBP">0</span></div>
    <div class="ti"><span class="tl">VLE</span><span class="tv" id="tVLE">0</span></div>
  </div>

</div><!-- /top-sticky -->

<div class="hint">💡 Double-click a row to edit it</div>

<!-- TABLE -->
<div class="tbl-wrap" id="tblWrap">
  <div class="nd">Select a date above — data will load automatically</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL -->
<div class="mov" id="modal">
  <div class="mbox">
    <div class="mico" id="mIco">❓</div>
    <div class="mmsg" id="mMsg"></div>
    <div class="mbtns" id="mBtns"><button class="mok" onclick="closeModal()">OK</button></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════
const GAS = 'https://script.google.com/macros/s/AKfycbyEXU9rrScCGTOcksiONNNznJ6vG0fdi4mA5CIbpXYmohsH2MFp4dqF8bQuSqm57c36/exec';
const MN  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const YRS = ['2024','2025','2026','2027','2028','2029','2030'];
const DASH= {Admin:'Dashboard.html',Owner:'OwnerDashboard.html',Sales:'SalesDashboard.html',Accountant:'AccountantDashboard.html'};

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let CU=null, curType='expense', optC={};
let allRows=[], filtRows=[];
let sCol=-1, sDir=1;
let selIdx=-1, editRowNum=-1;
let DT=[],AC=[],AT=[];

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function isoToDD(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return`${d.padStart(2,'0')}/${MN[+m-1]}/${y}`;}
function ddToISO(t){const m=t.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);if(!m)return'';const i=MN.findIndex(x=>x.toLowerCase()===m[2].toLowerCase());return i<0?'':`${m[3]}-${String(i+1).padStart(2,'0')}-${m[1].padStart(2,'0')}`;}
function todayISO(){return new Date().toISOString().split('T')[0];}
function ddToTs(s){if(!s)return null;if(s instanceof Date)return s.getTime();const t=String(s).trim();const m=t.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})/);if(m){const i=MN.findIndex(x=>x.toLowerCase()===m[2].toLowerCase());if(i>=0)return new Date(+m[3],i,+m[1]).getTime();}const d=new Date(t);return isNaN(d)?null:d.getTime();}
function fn(v){const n=parseFloat(v)||0;return n?n.toFixed(2).replace(/\.00$/,''):'0';}

// GET helper (avoids POST CORS)
function gasGet(params){
  const qs=Object.entries(params).map(([k,v])=>`${k}=${encodeURIComponent(v)}`).join('&');
  return fetch(`${GAS}?${qs}`).then(r=>r.json());
}

// ══════════════════════════════════════════════════════
// DATE PICKERS
// ══════════════════════════════════════════════════════
function openCal(){const n=document.getElementById('fDateNat');n.style.pointerEvents='auto';try{n.showPicker();}catch{n.click();}setTimeout(()=>{n.style.pointerEvents='none';},2000);}
function onCalPick(){const iso=document.getElementById('fDateNat').value;if(!iso)return;document.getElementById('fDate').value=isoToDD(iso);document.getElementById('fDate').classList.remove('err');const[y,,m]=iso.split('-');document.getElementById('fMonth').value=MN[+m-1];document.getElementById('fYear').value=y;loadList(iso);}
function onDateType(){const v=document.getElementById('fDate').value.trim();if(/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(v)){const iso=ddToISO(v);if(iso){document.getElementById('fDateNat').value=iso;document.getElementById('fDate').classList.remove('err');const[y,,m]=iso.split('-');document.getElementById('fMonth').value=MN[+m-1];document.getElementById('fYear').value=y;loadList(iso);}}}
function onDateBlur(){const v=document.getElementById('fDate').value.trim();if(v&&!/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(v))document.getElementById('fDate').classList.add('err');}

function frCal(w){const n=document.getElementById('f'+w+'N');n.style.pointerEvents='auto';try{n.showPicker();}catch{n.click();}setTimeout(()=>{n.style.pointerEvents='none';},2000);}
function frPick(w){const iso=document.getElementById('f'+w+'N').value;if(!iso)return;document.getElementById('f'+w).value=isoToDD(iso);applyFilter();}
function frType(w){const v=document.getElementById('f'+w).value.trim();if(/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(v)){const iso=ddToISO(v);if(iso){document.getElementById('f'+w+'N').value=iso;applyFilter();}}}
function frBlur(w){const v=document.getElementById('f'+w).value.trim();if(v&&!/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(v))document.getElementById('f'+w).value='';}

// ══════════════════════════════════════════════════════
// TYPE SWITCHER
// ══════════════════════════════════════════════════════
function switchType(t){
  curType=t;
  document.getElementById('btnExp').className='tbtn'+(t==='expense'?' exp':'');
  document.getElementById('btnRev').className='tbtn'+(t==='revenue'?' rev':'');
  const sh=document.getElementById('iSheet');sh.textContent=t==='expense'?'Expenses':'Other_Revenues';sh.className='sbadge '+(t==='expense'?'se':'sr');
  const b=document.getElementById('btnSave');b.className='sbtn '+(t==='expense'?'exp':'rev');b.textContent=t==='expense'?'💾 Save Expense':'💾 Save Revenue';
  cancelEdit();
  loadOpts(t);
  const iso=document.getElementById('fDateNat').value;if(iso)loadList(iso);
}

// ══════════════════════════════════════════════════════
// LOAD OPTIONS
// ══════════════════════════════════════════════════════
function loadOpts(t){
  if(optC[t]){applyOpts(optC[t]);return;}
  const sheet=t==='expense'?'Expenses':'Other_Revenues';
  gasGet({action:'getSheetOptions',sheet}).then(d=>{if(d&&d.details){optC[t]=d;applyOpts(d);}}).catch(()=>{});
}
function applyOpts(d){DT=d.details||[];AC=d.account||[];AT=d.accountType||[];}

// ══════════════════════════════════════════════════════
// LOAD LIST
// ══════════════════════════════════════════════════════
function loadList(iso){
  const sheet=curType==='expense'?'Expenses':'Other_Revenues';
  const dateTxt=isoToDD(iso);
  document.getElementById('tblWrap').innerHTML='<div class="ld"></div>';
  gasGet({action:'getExpenseRevenueRows',sheet,date:dateTxt})
    .then(data=>{allRows=Array.isArray(data)?data:[];applyFilter();})
    .catch(err=>{document.getElementById('tblWrap').innerHTML=`<div class="nd">Error: ${err.message}</div>`;});
}

// ══════════════════════════════════════════════════════
// FILTER + SORT
// ══════════════════════════════════════════════════════
function applyFilter(){
  const ft=document.getElementById('fFrom').value.trim();
  const tt=document.getElementById('fTo').value.trim();
  const sr=document.getElementById('fSrch').value.toLowerCase().trim();
  const fTs=ft?ddToTs(ft):null;
  const tTs=tt?ddToTs(tt)+86399999:null;
  filtRows=allRows.filter(r=>{
    const ts=ddToTs(r.date);
    if(fTs!==null&&(ts===null||ts<fTs))return false;
    if(tTs!==null&&(ts===null||ts>tTs))return false;
    if(sr){const s=[r.date,r.details,r.account,r.accountType,r.expenseNo].map(x=>x||'').join(' ').toLowerCase();if(!s.includes(sr))return false;}
    return true;
  });
  if(sCol>=0)doSort(sCol,false);
  renderTable();renderTots();
}
function resetFilter(){['fFrom','fTo','fSrch'].forEach(id=>document.getElementById(id).value='');['fFromN','fToN'].forEach(id=>document.getElementById(id).value='');filtRows=[...allRows];if(sCol>=0)doSort(sCol,false);renderTable();renderTots();}

const CKEYS=['expenseNo','date','details','usd','eur','gbp','le','vUSD','vEUR','vGBP','vLE','account','accountType','month','year','centerName','branchName'];
const NCOLS=['usd','eur','gbp','le','vUSD','vEUR','vGBP','vLE'];
function setSort(i){sDir=(sCol===i)?-sDir:1;sCol=i;doSort(i,true);renderTable();renderTots();}
function doSort(i){const k=CKEYS[i];filtRows.sort((a,b)=>{let va=a[k]??'',vb=b[k]??'';if(k==='date'){va=ddToTs(va)??0;vb=ddToTs(vb)??0;}else if(NCOLS.includes(k)){va=parseFloat(va)||0;vb=parseFloat(vb)||0;}else{va=String(va).toLowerCase();vb=String(vb).toLowerCase();}return va<vb?-sDir:va>vb?sDir:0;});}

// ══════════════════════════════════════════════════════
// RENDER TABLE
// ══════════════════════════════════════════════════════
const HDRS=['Exp.No','Date','Details','$','€','£','LE','V$','V€','V£','VLE','Account','Acc.Type','Month','Year','Center','Branch'];
function renderTable(){
  const w=document.getElementById('tblWrap');
  if(!filtRows.length){w.innerHTML='<div class="nd">No records found</div>';return;}
  let h='<table><thead><tr>';
  HDRS.forEach((l,i)=>{const ic=sCol===i?(sDir===1?' ↑':' ↓'):'';h+=`<th onclick="setSort(${i})">${l}${ic}</th>`;});
  h+='<th>Del</th></tr></thead><tbody>';
  filtRows.forEach((r,i)=>{
    h+=`<tr class="${i===selIdx?'sel':''}" ondblclick="loadRow(${i})">
      <td>${r.expenseNo||''}</td><td>${r.date||''}</td><td>${r.details||''}</td>
      <td>${fn(r.usd)}</td><td>${fn(r.eur)}</td><td>${fn(r.gbp)}</td><td>${fn(r.le)}</td>
      <td>${fn(r.vUSD)}</td><td>${fn(r.vEUR)}</td><td>${fn(r.vGBP)}</td><td>${fn(r.vLE)}</td>
      <td>${r.account||''}</td><td>${r.accountType||''}</td>
      <td>${r.month||''}</td><td>${r.year||''}</td>
      <td>${r.centerName||''}</td><td>${r.branchName||''}</td>
      <td><button class="dbtn" onclick="confirmDel(${i})">🗑️</button></td>
    </tr>`;
  });
  h+='</tbody></table>';w.innerHTML=h;
}

// ══════════════════════════════════════════════════════
// TOTALS
// ══════════════════════════════════════════════════════
function renderTots(){
  const sm=k=>filtRows.reduce((a,r)=>a+(parseFloat(r[k])||0),0);
  document.getElementById('tN').textContent=filtRows.length;
  [['tUSD','usd'],['tEUR','eur'],['tGBP','gbp'],['tLE','le'],
   ['tVUSD','vUSD'],['tVEUR','vEUR'],['tVGBP','vGBP'],['tVLE','vLE']]
  .forEach(([id,k])=>document.getElementById(id).textContent=fn(sm(k)));
}

// ══════════════════════════════════════════════════════
// LOAD ROW TO FORM (double-click)
// ══════════════════════════════════════════════════════
function loadRow(i){
  const r=filtRows[i];if(!r)return;
  selIdx=i;editRowNum=r._rowNum;
  const s=(id,v)=>{const el=document.getElementById(id);el.value=v||'';el.classList.remove('err');};
  s('fDate',r.date);s('fMonth',r.month);s('fYear',r.year);
  s('fDetails',r.details);s('fAcc',r.account);s('fAccT',r.accountType);
  s('fUSD',r.usd||'');s('fEUR',r.eur||'');s('fGBP',r.gbp||'');s('fLE',r.le||'');
  s('fVUSD',r.vUSD||'');s('fVEUR',r.vEUR||'');s('fVGBP',r.vGBP||'');s('fVLE',r.vLE||'');
  document.getElementById('fDateNat').value=ddToISO(r.date||'')||'';
  document.getElementById('eRowLbl').textContent=(r.expenseNo||'Row '+editRowNum);
  document.getElementById('ebanner').classList.add('show');
  const b=document.getElementById('btnSave');b.textContent='✏️ Update '+(curType==='expense'?'Expense':'Revenue');
  renderTable();
  showToast('Row loaded — edit and save','tinf');
  window.scrollTo({top:0,behavior:'smooth'});
}
function cancelEdit(){selIdx=-1;editRowNum=-1;document.getElementById('ebanner').classList.remove('show');const b=document.getElementById('btnSave');b.textContent=curType==='expense'?'💾 Save Expense':'💾 Save Revenue';renderTable();}

// ══════════════════════════════════════════════════════
// COMBOBOX
// ══════════════════════════════════════════════════════
function bDD(ddId,opts,inpId){const v=(document.getElementById(inpId).value||'').toLowerCase();const f=opts.filter(o=>o.toLowerCase().includes(v));const dd=document.getElementById(ddId);dd.innerHTML=f.length?f.map(o=>`<div class="cbo" onmousedown="pickCB('${inpId}','${ddId}','${o.replace(/'/g,"&#39;")}')">${o}</div>`).join(''):'<div class="cbo dim">No match — type to add</div>';}
const OPT_MAP={DT:()=>DT,AC:()=>AC,AT:()=>AT,MO:()=>MN,YR:()=>YRS};
function cbf(inp,optsKey,dd){bDD(dd,OPT_MAP[optsKey](),inp);}
function cbo(dd){document.getElementById(dd).classList.add('open');}
function cbc(dd){setTimeout(()=>document.getElementById(dd).classList.remove('open'),200);}
function pickCB(inp,dd,val){document.getElementById(inp).value=val;document.getElementById(dd).classList.remove('open');document.getElementById(inp).classList.remove('err');}

// ══════════════════════════════════════════════════════
// COLLECT + VALIDATE
// ══════════════════════════════════════════════════════
function collect(){
  const g=id=>(document.getElementById(id).value||'').trim();
  const n=id=>parseFloat(document.getElementById(id).value)||0;
  return{date:g('fDate'),details:g('fDetails'),usd:n('fUSD'),eur:n('fEUR'),gbp:n('fGBP'),le:n('fLE'),
    vUSD:n('fVUSD'),vEUR:n('fVEUR'),vGBP:n('fVGBP'),vLE:n('fVLE'),
    account:g('fAcc'),accountType:g('fAccT'),month:g('fMonth'),year:g('fYear'),
    centerName:CU?.centerName||'',branchName:CU?.branchName||'',userID:CU?.id||CU?.name||''};
}
function validate(row){
  let ok=true;
  if(!row.date){document.getElementById('fDate').classList.add('err');ok=false;}
  else if(!/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/.test(row.date)){document.getElementById('fDate').classList.add('err');showToast('Date: dd/Mmm/yyyy','terr');ok=false;}
  if(!row.details){document.getElementById('fDetails').classList.add('err');ok=false;}
  if([row.usd,row.eur,row.gbp,row.le,row.vUSD,row.vEUR,row.vGBP,row.vLE].every(v=>!v)){showToast('Enter at least one amount','terr');ok=false;}
  return ok;
}

// ══════════════════════════════════════════════════════
// SUBMIT via GET (avoids CORS)
// ══════════════════════════════════════════════════════
function submitEntry(){
  const row=collect();if(!validate(row))return;
  const btn=document.getElementById('btnSave');btn.disabled=true;btn.textContent='⏳ Saving...';
  const sheet=curType==='expense'?'Expenses':'Other_Revenues';
  const isEdit=editRowNum>0?'1':'0';
  const params={
    action:'saveExpRev', sheet, isEdit, rowNum:editRowNum>0?editRowNum:0,
    date:row.date, details:row.details,
    usd:row.usd, eur:row.eur, gbp:row.gbp, le:row.le,
    vUSD:row.vUSD, vEUR:row.vEUR, vGBP:row.vGBP, vLE:row.vLE,
    account:row.account, accountType:row.accountType,
    month:row.month, year:row.year,
    centerName:row.centerName, branchName:row.branchName, userID:row.userID
  };
  gasGet(params)
    .then(res=>{
      if(res.success){
        showToast(isEdit==='1'?'✅ Updated!':'✅ Saved!','tok');
        cancelEdit();resetForm();delete optC[curType];
        const iso=document.getElementById('fDateNat').value;if(iso)loadList(iso);
      } else showModal('❌',res.message||'Save failed');
    })
    .catch(err=>showModal('❌','Error: '+err.message))
    .finally(()=>{btn.disabled=false;btn.textContent=curType==='expense'?'💾 Save Expense':'💾 Save Revenue';});
}

// ══════════════════════════════════════════════════════
// DELETE via GET
// ══════════════════════════════════════════════════════
function confirmDel(i){
  const r=filtRows[i];if(!r)return;
  showConfirm(`Delete: "${r.details||''}" — ${r.date||''}?`,()=>{
    const sheet=curType==='expense'?'Expenses':'Other_Revenues';
    gasGet({action:'deleteExpRev',sheet,rowNum:r._rowNum})
      .then(res=>{
        if(res.success){showToast('🗑️ Deleted','tok');allRows=allRows.filter(x=>x._rowNum!==r._rowNum);applyFilter();if(editRowNum===r._rowNum)cancelEdit();}
        else showModal('❌',res.message||'Delete failed');
      }).catch(err=>showModal('❌','Error: '+err.message));
  });
}

// ══════════════════════════════════════════════════════
// RESET FORM
// ══════════════════════════════════════════════════════
function resetForm(){
  ['fDetails','fAcc','fAccT','fUSD','fEUR','fGBP','fLE','fVUSD','fVEUR','fVGBP','fVLE'].forEach(id=>{const el=document.getElementById(id);el.value='';el.classList.remove('err');});
  document.getElementById('fDate').classList.remove('err');
  const iso=todayISO();
  document.getElementById('fDate').value=isoToDD(iso);document.getElementById('fDateNat').value=iso;
  const[y,,m]=iso.split('-');document.getElementById('fMonth').value=MN[+m-1];document.getElementById('fYear').value=y;
}

// ══════════════════════════════════════════════════════
// UI
// ══════════════════════════════════════════════════════
function showToast(msg,cls='tok'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${cls} show`;setTimeout(()=>{t.className='toast';},3000);}
let _cb=null;
function showModal(ico,msg){document.getElementById('mIco').textContent=ico;document.getElementById('mMsg').textContent=msg;document.getElementById('mBtns').innerHTML='<button class="mok" onclick="closeModal()">OK</button>';_cb=null;document.getElementById('modal').classList.add('open');}
function showConfirm(msg,cb){document.getElementById('mIco').textContent='❓';document.getElementById('mMsg').textContent=msg;document.getElementById('mBtns').innerHTML='<button class="mno" onclick="closeModal()">Cancel</button><button class="mok" style="background:#e74c3c;" onclick="confYes()">Delete</button>';_cb=cb;document.getElementById('modal').classList.add('open');}
function confYes(){closeModal();if(_cb)_cb();}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function goBack(){window.location.href=DASH[CU?.type]||'Dashboard.html';}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  let ud=sessionStorage.getItem('currentUser');
  if(!ud){try{const p=new URLSearchParams(window.location.search).get('user');if(p){ud=decodeURIComponent(p);sessionStorage.setItem('currentUser',ud);}}catch{}}
  if(!ud){window.location.href='index.html';return;}
  try{CU=JSON.parse(ud);}catch{window.location.href='index.html';return;}
  document.getElementById('ubadge').textContent=CU.name||'User';
  document.getElementById('iCenter').textContent=CU.centerName||'—';
  document.getElementById('iBranch').textContent=CU.branchName||'—';
  document.getElementById('iUser').textContent=CU.name||CU.id||'—';
  const iso=todayISO();
  document.getElementById('fDate').value=isoToDD(iso);document.getElementById('fDateNat').value=iso;
  const[y,,m]=iso.split('-');document.getElementById('fMonth').value=MN[+m-1];document.getElementById('fYear').value=y;
  bDD('mDD',MN,'fMonth');bDD('yDD',YRS,'fYear');
  loadOpts('expense');
  loadList(iso);
});

window.switchType=switchType;window.openCal=openCal;window.onCalPick=onCalPick;
window.onDateType=onDateType;window.onDateBlur=onDateBlur;
window.frCal=frCal;window.frPick=frPick;window.frType=frType;window.frBlur=frBlur;
window.cbf=cbf;window.cbo=cbo;window.cbc=cbc;window.pickCB=pickCB;
window.applyFilter=applyFilter;window.resetFilter=resetFilter;
window.setSort=setSort;window.loadRow=loadRow;window.cancelEdit=cancelEdit;
window.submitEntry=submitEntry;window.confirmDel=confirmDel;
window.resetForm=resetForm;window.goBack=goBack;window.closeModal=closeModal;window.confYes=confYes;
</script>
</body>
