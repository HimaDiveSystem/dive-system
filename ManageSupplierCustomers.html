<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta name="theme-color" content="#1e2b4f">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  
  <!-- ====== IMPORT CONFIG & SESSION & UI ====== -->
  <script src="ui.js"></script>
  <script src="config.js"></script>
  <script src="session.js"></script>
  
  <style>
    :root{
      --navy:#0f1f3d;--navy2:#1a3260;--gold:#f5c842;
      --blue:#2563eb;--green:#16a34a;--red:#dc2626;--orange:#ea580c;
      --bg:#f0f4f8;--card:#fff;--border:#dde4f0;--text:#1a2540;--text-lt:#5a6a8a;
      --radius:16px;--radius-sm:10px;--shadow:0 4px 24px rgba(15,31,61,.10);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    .header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;padding:13px 22px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(15,31,61,.25);}
    .header h2{color:var(--gold);font-size:18px;font-weight:900;}
    .header-right{display:flex;align-items:center;gap:8px;}
    .user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:40px;padding:4px 13px;color:white;font-size:12px;font-weight:600;}
    .back-btn{background:transparent;border:2px solid rgba(255,255,255,.3);color:white;padding:4px 13px;border-radius:40px;cursor:pointer;font-weight:700;font-size:12px;font-family:'Cairo',sans-serif;transition:all .2s;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}
    .page{max-width:1400px;margin:0 auto;padding:20px 16px 50px;}
    .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden;}
    .card-head{padding:12px 18px;background:linear-gradient(90deg,var(--navy),var(--navy2));display:flex;align-items:center;gap:8px;}
    .card-head h3{color:var(--gold);font-size:14px;font-weight:800;}
    .ch-icon{background:rgba(245,200,66,.2);border-radius:7px;padding:3px 6px;font-size:13px;}
    .card-body{padding:16px;}
    .table-wrap{overflow-x:auto;}
    .data-table{width:100%;border-collapse:collapse;font-size:13px;}
    .data-table thead th{background:#f0f4f8;color:var(--text-lt);padding:10px 12px;font-weight:700;text-align:right;border-bottom:2px solid var(--border);white-space:nowrap;}
    .data-table tbody td{padding:8px 12px;border-bottom:1px solid #f0f4f8;white-space:nowrap;}
    .data-table tbody tr:hover{background:#f8faff;cursor:pointer;}
    .data-table tbody tr.sel{background:#e6f0ff !important;}
    .badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;}
    .badge-green{background:#dcfce7;color:#166534;}
    .badge-red{background:#fee2e2;color:#991b1b;}
    .badge-blue{background:#dbeafe;color:#1e40af;}
    .badge-orange{background:#ffedd5;color:#9a3412;}
    .fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:14px;}
    .fgroup{display:flex;flex-direction:column;gap:5px;}
    .fgroup label{font-size:11px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px;}
    .fgroup label.req::after{content:' *';color:var(--red);}
    .fc{padding:8px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Cairo',sans-serif;color:var(--text);background:#fafbfd;width:100%;height:40px;transition:border-color .2s;}
    .fc:focus{border-color:var(--blue);outline:none;background:white;}
    select.fc{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='13' height='13' viewBox='0 0 24 24' fill='none' stroke='%235a6a8a' stroke-width='2.5'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:left 10px center;padding-left:30px;}
    textarea.fc{height:auto;resize:vertical;}
    .trips-box{border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;background:white;max-height:220px;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;}
    .trip-item{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:8px;cursor:pointer;transition:background .15s;}
    .trip-item:hover{background:#f0f4ff;}
    .trip-item input{width:16px;height:16px;cursor:pointer;flex-shrink:0;}
    .trip-item label{font-size:13px;font-weight:500;cursor:pointer;color:var(--text);}
    .trip-item.checked{background:#e6f0ff;}
    .sub-price-table{width:100%;border-collapse:collapse;font-size:13px;}
    .sub-price-table th,.sub-price-table td{border:1px solid var(--border);padding:8px 10px;text-align:center;}
    .sub-price-table th{background:var(--navy);color:var(--gold);font-weight:700;}
    .sub-price-table input{width:80px;text-align:center;border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:13px;font-family:'Cairo',sans-serif;}
    .sub-price-table select{width:80px;border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:12px;}
    .trip-price-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:10px;}
    .price-item{background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
    .price-item .pi-label{font-size:11px;font-weight:700;color:var(--text-lt);text-transform:uppercase;margin-bottom:6px;}
    .price-item .pi-trip{font-size:10px;color:#94a3b8;margin-bottom:4px;font-style:italic;}
    .price-item .pi-row{display:flex;gap:5px;}
    .price-item .pi-row input{flex:2;min-width:70px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;text-align:center;}
    .price-item .pi-row select{flex:1;border:1px solid var(--border);border-radius:6px;font-size:12px;padding:4px;}
    .action-btns{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
    .btn{padding:8px 20px;border:none;border-radius:40px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .2s;}
    .btn:hover{transform:translateY(-1px);}
    .btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
    .btn-navy{background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);}
    .btn-green{background:var(--green);color:white;}
    .btn-red{background:var(--red);color:white;}
    .btn-gray{background:#f1f5f9;color:var(--text);}
    .btn-orange{background:var(--orange);color:white;}
    .search-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
    .search-in{flex:1;min-width:200px;padding:8px 14px;border:2px solid var(--border);border-radius:40px;font-size:13px;font-family:'Cairo',sans-serif;}
    .filter-sel{padding:8px 12px;border:2px solid var(--border);border-radius:40px;font-size:13px;background:white;min-width:130px;}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px);}
    .modal.open{display:flex;}
    .modal-box{background:white;width:92%;max-width:900px;max-height:88vh;overflow-y:auto;border-radius:22px;padding:24px;box-shadow:0 25px 50px rgba(0,0,0,.3);animation:pop .25s ease;}
    .modal-title{color:var(--navy);font-size:16px;font-weight:900;margin-bottom:20px;text-align:center;border-bottom:2px solid var(--border);padding-bottom:12px;}
    .modal-footer{display:flex;gap:10px;justify-content:center;margin-top:20px;border-top:2px solid var(--border);padding-top:16px;}
    @keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
    .alert-box{background:white;width:88%;max-width:420px;border-radius:22px;padding:26px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.25);animation:pop .25s ease;}
    .alert-icon{font-size:40px;margin-bottom:10px;}
    .alert-msg{color:var(--navy);font-size:14px;font-weight:700;margin-bottom:18px;white-space:pre-wrap;}
    .sec-title{font-size:13px;font-weight:800;color:var(--navy);margin:16px 0 8px;display:flex;align-items:center;gap:6px;border-right:3px solid var(--gold);padding-right:8px;}
    .loader{text-align:center;padding:40px;color:var(--text-lt);}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .no-data{text-align:center;padding:40px;color:var(--text-lt);}
    .step-indicator{display:flex;gap:8px;margin-bottom:20px;justify-content:center;}
    .step{padding:5px 16px;border-radius:20px;font-size:12px;font-weight:700;background:#f0f4f8;color:var(--text-lt);}
    .step.active{background:var(--navy);color:var(--gold);}
    .step.done{background:#dcfce7;color:#166534;}
    .login-fields{background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:10px;}
    .password-wrapper{position:relative;display:flex;align-items:center;}
    .password-wrapper .fc{padding-left:40px;}
    .toggle-password{position:absolute;left:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text-lt);font-size:14px;background:none;border:none;}
    
    /* ✅ عناصر مخفية بناءً على الصلاحيات */
    .btn[data-permission] { display:inline-flex; }
    .btn[data-permission].hidden { display:none !important; }
    
    @media(max-width:640px){
      .fgrid{grid-template-columns:1fr;}
      .trip-price-grid{grid-template-columns:1fr;}
      .sub-price-table input,.sub-price-table select{width:65px;font-size:11px;}
    }
  </style>
</head>
<body>

<div class="header">
  <h2>🏢 إدارة العملاء والمنفذين</h2>
  <div class="header-right">
    <span class="user-chip" id="userChip">...</span>
    <button class="back-btn" onclick="goBack()">← العودة</button>
  </div>
</div>

<div class="page">
  <div id="mainContent"><div class="loader"><div class="spinner"></div>جاري التحميل...</div></div>
</div>

<!-- ====== FOOTER ====== -->
<div style="text-align:center;padding:10px 0 2px 0;color:#94a3b8;font-size:10px;border-top:1px solid #e2e8f0;margin-top:8px;">
  <span>© 2025 <strong style="color:#1e2b4f;">🌊 Dive System</strong> — جميع الحقوق محفوظة</span>
</div>
  
<!-- Modal الإضافة/التعديل -->
<div id="formModal" class="modal">
  <div class="modal-box">
    <div class="modal-title" id="formTitle">➕ إضافة حساب جديد</div>
    <div id="stepBar" class="step-indicator">
      <div class="step active" id="step1Ind">1. بيانات الحساب</div>
      <div class="step" id="step2Ind">2. الرحلات والأسعار</div>

  </div>

<!-- Alert Modal -->
<div id="alertModal" class="modal">
  <div class="alert-box">
    <div class="alert-icon" id="alertIcon">ℹ️</div>
    <div class="alert-msg" id="alertMsg"></div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:16px;" id="alertBtns">
      <button class="btn btn-navy" onclick="closeAlert()">موافق</button>
    </div>
  </div>

<script>
const GAS_URL = CONFIG.GAS_URL;
const DASHBOARDS = CONFIG.DASHBOARD_PAGES || {
  Admin: 'Dashboard.html',
  Owner: 'OwnerDashboard.html',
  Sales: 'SalesDashboard.html',
  Accountant: 'AccountantDashboard.html',
  Customer: 'CustomerDashboard.html'
};

// ✅ استخدام let بدلاً من const
let currentUser = null;
let loggedInUser = null;

// ✅ التحقق من صحة الجلسة
if (!Session.checkValidity()) {
  window.location.href = 'index.html';
  throw new Error('جلسة غير صالحة');
}

// ✅ جلب المستخدم الحالي
currentUser = Session.getUser();
loggedInUser = currentUser;

// ✅ التحقق من الصلاحية
if (!Session.checkPermission(['Admin', 'Accountant', 'AccountantManager', 'FinancialManager', 'Owner'])) {
  window.location.href = 'Dashboard.html';
  throw new Error('غير مصرح به');
}

// ============================================================
// ✅ دوال التحقق من الصلاحيات
// ============================================================

function checkUserPermission(permission) {
  if (!currentUser) return false;
  if (currentUser.type === 'Admin') return true;
  return (currentUser.permissions || []).includes(permission);
}

function hideElementsByPermissions() {
  const user = currentUser;
  if (!user) return;
  
  // ✅ إخفاء الأزرار حسب الصلاحيات
  document.querySelectorAll('.btn[data-permission]').forEach(el => {
    const perm = el.dataset.permission;
    if (!checkUserPermission(perm)) {
      el.classList.add('hidden');
    }
  });
}

// ============================================================
// ✅ إضافة متغيرات وإعدادات
// ============================================================

let allAccounts = [];
let selectedAccount = null;
let isEdit = false;
let formStep = 1;
let tripItems = {};
let tripsForCategory = [];
let _currentCategory = '';
let _editSheetDates = null;
let _formStep1Data = {};
let _originalFormData = null;
let directEditCustomerId = null;
window.resolveAlert = null;
let _hasDataChanges = false;
let _hasPriceChanges = false;
let _initialState = null;

// ============================================================
// ✅ دوال الاتصال
// ============================================================

function gas(action, params = {}) {
  return new Promise((resolve, reject) => {
    const callbackName = 'jsonp_callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    const url = new URL(CONFIG.GAS_URL);
    url.searchParams.set('action', action);
    url.searchParams.set('callback', callbackName);
    url.searchParams.set('_t', Date.now());
    
    // ✅ إضافة centerName تلقائياً
    if (currentUser && currentUser.centerName) {
      params.centerName = currentUser.centerName;
    }
    if (currentUser && currentUser.centerId) {
      params.centerId = currentUser.centerId;
    }
    
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v ?? '')));
    
    window[callbackName] = function(data) {
      delete window[callbackName];
      if (document.body.contains(script)) {
        document.body.removeChild(script);
      }
      resolve(data);
    };
    
    const script = document.createElement('script');
    script.src = url.toString();
    script.onerror = () => {
      delete window[callbackName];
      if (document.body.contains(script)) {
        document.body.removeChild(script);
      }
      reject(new Error('فشل الاتصال بالخادم'));
    };
    document.body.appendChild(script);
    
    setTimeout(() => {
      if (window[callbackName]) {
        delete window[callbackName];
        if (document.body.contains(script)) {
          document.body.removeChild(script);
        }
        reject(new Error('انتهى وقت الاتصال'));
      }
    }, 90000);
  });
}

async function gasPost(data) {
  const params = {};
  for (const [key, value] of Object.entries(data)) {
    if (value !== undefined && value !== null) {
      params[key] = typeof value === 'object' ? JSON.stringify(value) : String(value);
    }
  }
  return gas(data.action, params);
}

// ============================================================
// ✅ دوال مساعدة
// ============================================================

function goBack() {
  // ✅ تحديث الجلسة
  if (currentUser) {
    Session.save(currentUser);
  }
  
  const userType = currentUser?.type || 'Customer';
  const pageMap = {
    'Admin': 'Dashboard.html',
    'Owner': 'OwnerDashboard.html',
    'Accountant': 'AccountantDashboard.html',
    'AccountantManager': 'AccountantDashboard.html',
    'FinancialManager': 'AccountantDashboard.html',
    'Sales': 'SalesDashboard.html',
    'SalesManager': 'SalesDashboard.html',
    'OperationsManager': 'OperationManager.html',
    'OperationsSupervisor': 'OperationSupervisor.html',
    'Customer': 'CustomerDashboard.html'
  };
  
  const dashboardPage = pageMap[userType] || 'Dashboard.html';
  window.location.href = dashboardPage;
}

function validatePhoneNumber(phone) {
  if (!phone) {
    return { valid: false, message: 'رقم الهاتف مطلوب', digits: 0 };
  }
  
  const arabicToEnglish = {
    '٠': '0', '١': '1', '٢': '2', '٣': '3', '٤': '4',
    '٥': '5', '٦': '6', '٧': '7', '٨': '8', '٩': '9'
  };
  const clean = phone.replace(/[٠-٩]/g, (d) => arabicToEnglish[d] || d);
  const digits = clean.replace(/\D/g, '');
  
  if (digits.length === 0) {
    return { valid: false, message: 'يجب إدخال أرقام', digits: 0 };
  }
  
  if (digits.length < 10) {
    return { valid: false, message: `يجب أن يحتوي على 10 أرقام على الأقل (الآن: ${digits.length})`, digits: digits.length };
  }
  
  return { valid: true, message: 'رقم صحيح', digits: digits, clean: clean };
}

// ============================================================
// ✅ عرض الجدول (مع صلاحيات)
// ============================================================

async function loadAccounts() {
  try {
    const res = await gas('getAllSuppliersCustomers', { 
      centerName: currentUser?.centerName || '' 
    });
    allAccounts = Array.isArray(res) ? res : [];
    renderTable();
    
    if (directEditCustomerId) {
      const accountToEdit = allAccounts.find(a => a.customerId === directEditCustomerId);
      if (accountToEdit) {
        selectedAccount = accountToEdit;
        setTimeout(() => {
          openEdit();
        }, 500);
      }
    }
  } catch(e) {
    console.error('loadAccounts error:', e);
    allAccounts = [];
    renderTable();
    showAlert('فشل تحميل البيانات: ' + e.message, '❌');
  }
}

function renderTable() {
  const search = (document.getElementById('searchIn')?.value || '').toLowerCase();
  const typeF = document.getElementById('typeF')?.value || '';
  const catF  = document.getElementById('catF')?.value || '';

  const filtered = allAccounts.filter(a => {
    if (search && !(a.customerName||'').toLowerCase().includes(search)) return false;
    if (typeF && a.customerType !== typeF) return false;
    if (catF  && a.category !== catF) return false;
    return true;
  });

  const cats = [...new Set(allAccounts.map(a => a.category).filter(Boolean))].sort();
  
  // ✅ التحقق من الصلاحيات
  const canView = checkUserPermission('ViewCustomersSuppliers');
  const canAdd = checkUserPermission('AddCustomerSupplier');
  const canEdit = checkUserPermission('EditCustomerSupplier');
  const canDelete = checkUserPermission('DeleteCustomerSupplier');
  const canUpdatePrices = checkUserPermission('UpdateCustomerPrices');

  document.getElementById('mainContent').innerHTML = `
    <div class="card">
      <div class="card-head"><span class="ch-icon">🔍</span><h3>بحث وتصفية</h3></div>
      <div class="card-body">
        <div class="search-bar">
          <input type="text" id="searchIn" class="search-in" placeholder="بحث بالاسم..." oninput="renderTable()" value="${search.replace(/"/g, '&quot;')}">
          <select id="typeF" class="filter-sel" onchange="renderTable()">
            <option value="">كل الأنواع</option>
            <option value="Customer" ${typeF==='Customer'?'selected':''}>عملاء</option>
            <option value="Supplier" ${typeF==='Supplier'?'selected':''}>منفذين</option>
          </select>
          <select id="catF" class="filter-sel" onchange="renderTable()">
            <option value="">كل الأنشطة</option>
            ${cats.map(c=>`<option value="${c}" ${catF===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><span class="ch-icon">📋</span><h3>قائمة الحسابات (${filtered.length})</h3></div>
      <div class="card-body">
        <div class="action-btns">
          ${canAdd ? `<button class="btn btn-navy" data-permission="AddCustomerSupplier" onclick="openAdd()">➕ إضافة حساب</button>` : ''}
          ${canEdit ? `<button class="btn btn-green" id="editBtn" data-permission="EditCustomerSupplier" onclick="openEdit()" ${!selectedAccount?'disabled':''}>✏️ تعديل</button>` : ''}
          ${canView ? `<button class="btn btn-teal" id="viewAccountBtn" data-permission="ViewCustomersSuppliers" onclick="viewCustomerAccount()" ${!selectedAccount?'disabled':''}>📊 كشف حساب ${selectedAccount?.customerType === 'Supplier' ? 'المنفذ' : 'العميل'}</button>` : ''}
          ${canDelete ? `<button class="btn btn-red" id="delBtn" data-permission="DeleteCustomerSupplier" onclick="doDelete()" ${!selectedAccount?'disabled':''}>🗑️ حذف</button>` : ''}
          ${canUpdatePrices ? `<button class="btn btn-orange" id="priceUpdateBtn" data-permission="UpdateCustomerPrices" onclick="openPriceUpdateModal()" ${!selectedAccount?'disabled':''}>💰 تحديث الأسعار</button>` : ''}
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>المعرف</th>
                <th>الاسم</th>
                <th>النوع</th>
                <th>النشاط</th>
                <th>التواصل</th>
                <th>الهاتف</th>
                <th>البداية</th>
                <th>النهاية</th>
                <th>الحالة</th>
              </tr>
            </thead>
            <tbody>
              ${filtered.length ? filtered.map(a => `
                <tr class="${selectedAccount?.customerId===a.customerId?'sel':''}" onclick="selectRow('${a.customerId}')">
                  <td>${a.customerId||''}</td>
                  <td><strong>${(a.customerName||'').replace(/</g,'&lt;')}</strong></td>
                  <td><span class="badge ${a.customerType==='Customer'?'badge-blue':'badge-orange'}">${a.customerType==='Customer'?'عميل':'منفذ'}</span></td>
                  <td>${a.category||'-'}</td>
                  <td>${a.contactPerson||'-'}</td>
                  <td>${a.phone||'-'}</td>
                  <td>${formatDateDisplay(a.startDate)||'-'}</td>
                  <td>${formatDateDisplay(a.endDate)||'-'}</td>
                  <td><span class="badge ${a.status?'badge-green':'badge-red'}">${a.status?'نشط':'متوقف'}</span></td>
                </tr>`).join('') : `
              <tr>
                <td colspan="9" class="no-data">لا توجد بيانات</td>
              </tr>`}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
    
  // ✅ إخفاء العناصر حسب الصلاحيات
  hideElementsByPermissions();
}

function openAdd() {
  // ✅ التحقق من الصلاحية
  if (!checkUserPermission('AddCustomerSupplier')) {
    showAlert('⚠️ ليس لديك صلاحية لإضافة عميل/منفذ');
    return;
  }
  
  isEdit = false;
  selectedAccount = null;
  formStep = 1;
  tripItems = {};
  tripsForCategory = [];
  _currentCategory = '';
  _formStep1Data = {};
  directEditCustomerId = null;
  document.getElementById('formTitle').textContent = '➕ إضافة حساب جديد';
  document.getElementById('formModal').classList.add('open');
  renderStep1({ customerType: 'Customer' });
}

async function openEdit() {
  // ✅ التحقق من الصلاحية
  if (!checkUserPermission('EditCustomerSupplier')) {
    showAlert('⚠️ ليس لديك صلاحية لتعديل العميل/المنفذ');
    return;
  }
  
  if (!selectedAccount) return;
  isEdit = true;
  formStep = 1;
  tripItems = {};
  _editSheetDates = null;
  document.getElementById('formTitle').textContent = '✏️ تعديل حساب';
  document.getElementById('formModal').classList.add('open');

  document.getElementById('formContent').innerHTML = '<div class="loader"><div class="spinner"></div>جاري جلب بيانات الشيت...</div>';
  document.getElementById('formFooter').innerHTML = '';

  try {
    const datesRes = await gasPost({
      action: 'getAccountSheetDates',
      customerId: selectedAccount.customerId,
      centerName: currentUser?.centerName || ''
    });
    
    if (datesRes?.success) {
      _editSheetDates = datesRes;
      selectedAccount._sheetFirstDate = datesRes.firstDate;
      selectedAccount._sheetLastDate = datesRes.lastDate;
      selectedAccount._sheetFirstDateISO = datesRes.firstDateISO;
      selectedAccount._sheetLastDateISO = datesRes.lastDateISO;
      selectedAccount._sheetTotalDays = datesRes.totalDays;
      selectedAccount._sheetInfo = `📅 الشيت الحالي: ${datesRes.firstDate} → ${datesRes.lastDate} (${datesRes.totalDays} يوم)`;
    } else {
      selectedAccount._sheetInfo = '⚠️ لم يتم العثور على شيت للحساب';
    }

    const category = selectedAccount.category;
    if (category !== 'Submarine') {
      const catTripsRes = await gas('getTripsByCategory', { 
        category: category,
        centerName: currentUser?.centerName || ''
      });
      selectedAccount._categoryTrips = Array.isArray(catTripsRes) ? catTripsRes : [];
      
      const tripsRes = await gas('getAllTrips', {
        centerName: currentUser?.centerName || '',
        includeItems: true
      });

      if (Array.isArray(tripsRes) && tripsRes.length > 0) {
        for (const trip of tripsRes) {
          if (trip.items && trip.items.length > 0) {
            tripItems[trip.name] = trip.items;
          }
        }
      }
      
      let assignedTripsList = [];
      if (selectedAccount.assignedTrips) {
        assignedTripsList = selectedAccount.assignedTrips.split('|').filter(Boolean);
      }
      selectedAccount._existingTripsList = assignedTripsList;
      
      let savedPrices = {};
      try {
        if (selectedAccount.pricesData) {
          savedPrices = JSON.parse(selectedAccount.pricesData);
        }
      } catch(e) {
        console.warn('⚠️ فشل تحليل pricesData:', e);
      }
      selectedAccount._existingPricesData = savedPrices;
      
      selectedAccount._sheetInfo += `<br>📋 الرحلات المحددة: ${assignedTripsList.join(', ') || 'لا توجد'}`;
    }
    
    // ✅ صلاحية الدخول
    if (selectedAccount.loginEmail) {
      selectedAccount.hasSystemAccess = true;
      selectedAccount.loginEmail = selectedAccount.loginEmail;
      selectedAccount.loginPassword = selectedAccount.loginPassword || '';
    } else {
      selectedAccount.hasSystemAccess = false;
      selectedAccount.loginEmail = '';
      selectedAccount.loginPassword = '';
    }

    _formStep1Data = {
      customerName:  selectedAccount.customerName || '',
      customerType:  selectedAccount.customerType || 'Customer',
      category:      selectedAccount.category || '',
      parentCenter:  selectedAccount.parentCenter || '',
      contactPerson: selectedAccount.contactPerson || '',
      phone:         selectedAccount.phone || '',
      email:         selectedAccount.email || '',
      address:       selectedAccount.address || '',
      startDate:     formatDateForInput(selectedAccount._sheetFirstDateISO || selectedAccount.startDate || ''),
      endDate:       formatDateForInput(selectedAccount._sheetLastDateISO || selectedAccount.endDate || ''),
      paymentTerms:  selectedAccount.paymentTerms || '',
      status:        selectedAccount.status !== false ? 'true' : 'false',
      notes:         selectedAccount.notes || '',
      hasSystemAccess: selectedAccount.hasSystemAccess ? 'true' : 'false',
      loginEmail:    selectedAccount.loginEmail || '',
      loginPassword: selectedAccount.loginPassword || '',
      userCenterId: currentUser?.centerId || '',
      userBranchId: currentUser?.branchId || '',
      userCenterName: currentUser?.centerName || '',
      userBranchName: currentUser?.branchName || ''
    };

    _originalFormData = JSON.parse(JSON.stringify(_formStep1Data));

    renderStep1(selectedAccount);

    setTimeout(function() {
      updateButtonsState();
      const phoneField = document.getElementById('f_phone');
      if (phoneField && selectedAccount?.phone) {
        phoneField.value = selectedAccount.phone;
      }
      updateButtonsState();
    }, 100);

  } catch(e) {
    console.error('خطأ في openEdit:', e);
    selectedAccount._sheetInfo = '❌ فشل جلب بيانات الشيت: ' + e.message;
    showAlert('❌ فشل تحميل بيانات التعديل: ' + e.message, '❌');
    document.getElementById('formContent').innerHTML = `<div class="no-data">❌ خطأ: ${e.message}</div>`;
    document.getElementById('formFooter').innerHTML = `
      <button class="btn btn-gray" onclick="closeModal()">إغلاق</button>
    `;
  }
}

async function doDelete() {
  // ✅ التحقق من الصلاحية
  if (!checkUserPermission('DeleteCustomerSupplier')) {
    showAlert('⚠️ ليس لديك صلاحية لحذف العميل/المنفذ');
    return;
  }
  
  if (!selectedAccount) return;
  showAlert(
    `⚠️ هل تريد حذف حساب ${selectedAccount.customerName}؟\nسيتم حذف الشيت الخاص به أيضاً.`,
    '⚠️',
    `<button class="btn btn-red" id="confirmDeleteBtn" onclick="confirmDelete()">حذف نهائي</button>
     <button class="btn btn-gray" onclick="closeAlert()">إلغاء</button>`
  );
}

async function confirmDelete() {
  const confirmBtn = document.getElementById('confirmDeleteBtn');
  if (confirmBtn) {
    confirmBtn.disabled = true;
    confirmBtn.textContent = '⏳ جاري الحذف...';
  }
  
  closeAlert();
  try {
    const res = await gasPost({ 
      action: 'deleteSupplierCustomer', 
      customerId: selectedAccount.customerId,
      centerName: currentUser?.centerName || ''
    });
    if (res?.success) {
      selectedAccount = null;
      await loadAccounts();
      showAlert('✅ تم الحذف بنجاح', '✅');
    } else {
      showAlert('❌ ' + (res?.message || 'فشل الحذف'), '❌');
    }
  } catch(e) { 
    showAlert('❌ خطأ: ' + e.message, '❌'); 
  }
  
  if (confirmBtn) {
    confirmBtn.disabled = false;
    confirmBtn.textContent = 'حذف نهائي';
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  // ✅ تطبيق الثيم الموحد
  if (typeof Theme !== 'undefined' && Theme.applyToPage) {
    Theme.applyToPage();
    Theme.setPageTitle('إدارة العملاء والمنفذين');
  }
  
  // ✅ التحقق من صحة الجلسة
  if (!Session.checkValidity()) {
    window.location.href = 'index.html';
    return;
  }

  // ✅ جلب المستخدم من Session
  const user = Session.getUser();
  if (!user) {
    window.location.href = 'index.html';
    return;
  }

  // ✅ التحقق من الصلاحية
  if (!Session.checkPermission(['Admin', 'Accountant', 'AccountantManager', 'FinancialManager', 'Owner'])) {
    window.location.href = 'Dashboard.html';
    return;
  }

  // ✅ تعيين currentUser
  currentUser = user;
  loggedInUser = user;
  
  document.getElementById('userChip').textContent = currentUser?.name || 'User';
  
  const urlParams = new URLSearchParams(location.search);
  const directId = urlParams.get('customerId');
  if (directId) {
    directEditCustomerId = directId;
  }
  
  await loadAccounts();
  
  // ✅ إخفاء العناصر حسب الصلاحيات بعد التحميل
  hideElementsByPermissions();
});
