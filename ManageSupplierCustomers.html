  // ====================== دوال الاتصال ======================
function gas(action, params = {}) {
  return new Promise((resolve, reject) => {
    const callbackName = 'jsonp_callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    const url = new URL(CONFIG.GAS_URL);
    url.searchParams.set('action', action);
    url.searchParams.set('callback', callbackName);
    url.searchParams.set('_t', Date.now());
    
    // ✅ إضافة centerName تلقائياً (يتم تمريره لجميع الدوال)
    if (currentUser && currentUser.centerName) {
      params.centerName = currentUser.centerName;
    }
    if (currentUser && currentUser.centerId) {
      params.centerId = currentUser.centerId;
    }
    
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v ?? '')));
     window[callbackName] = function(data) {
      delete window[callbackName];
      if (document.body.contains(script)) {
        document.body.removeChild(script);
      }
      resolve(data);
    };
    
    const script = document.createElement('script');
    script.src = url.toString();
    script.onerror = () => {
      delete window[callbackName];
      if (document.body.contains(script)) {
        document.body.removeChild(script);
      }
      reject(new Error('فشل الاتصال بالخادم'));
    };
    document.body.appendChild(script);
    
    setTimeout(() => {
      if (window[callbackName]) {
        delete window[callbackName];
        if (document.body.contains(script)) {
          document.body.removeChild(script);
        }
        reject(new Error('انتهى وقت الاتصال'));
      }
    }, 90000);
  });
}

async function gasPost(data) {
  const params = {};
  for (const [key, value] of Object.entries(data)) {
    if (value !== undefined && value !== null) {
      params[key] = typeof value === 'object' ? JSON.stringify(value) : String(value);
    }
  }
  return gas(data.action, params);
}

// ✅ دالة موحدة للتحقق من رقم الهاتف
function validatePhoneNumber(phone) {
  if (!phone) {
    return { valid: false, message: 'رقم الهاتف مطلوب', digits: 0 };
  }
  
  // تحويل الأرقام العربية إلى إنجليزية
  const arabicToEnglish = {
    '٠': '0', '١': '1', '٢': '2', '٣': '3', '٤': '4',
    '٥': '5', '٦': '6', '٧': '7', '٨': '8', '٩': '9'
  };
  const clean = phone.replace(/[٠-٩]/g, (d) => arabicToEnglish[d] || d);
  const digits = clean.replace(/\D/g, '');
  
  if (digits.length === 0) {
    return { valid: false, message: 'يجب إدخال أرقام', digits: 0 };
  }
  
  if (digits.length < 10) {
    return { valid: false, message: `يجب أن يحتوي على 10 أرقام على الأقل (الآن: ${digits.length})`, digits: digits.length };
  }
  
  return { valid: true, message: 'رقم صحيح', digits: digits, clean: clean };
}
// ====================== تحديث حالة الأزرار ======================
// ====================== تحديث حالة الأزرار ======================
// ====================== تحديث حالة الأزرار ======================
function updateButtonsState() {
  const saveBtn = document.getElementById('saveBtn');
  const priceBtn = document.getElementById('priceUpdateBtn');
  
  // ✅ ✅ ✅ حالة الإضافة (isEdit = false)
  if (!isEdit) {
    // ✅ زر "إنشاء حساب" يكون نشطاً دائماً
    if (saveBtn) {
      saveBtn.disabled = false;
      saveBtn.style.opacity = '1';
      saveBtn.textContent = '➕ إنشاء حساب';
    }
    // ✅ زر "تحديث الأسعار" غير موجود في وضع الإضافة
    if (priceBtn) {
      priceBtn.disabled = true;
      priceBtn.style.opacity = '0.5';
    }
    return;
  }
  
  // ✅ ✅ ✅ حالة التعديل (isEdit = true)
  if (!selectedAccount) {
    if (saveBtn) {
      saveBtn.disabled = true;
      saveBtn.style.opacity = '0.5';
    }
    if (priceBtn) {
      priceBtn.disabled = true;
      priceBtn.style.opacity = '0.5';
    }
    return;
  }
  
  // ✅ تحديد التغييرات في وضع التعديل
  const dataChanged = detectDataChanges();
  const priceChanged = detectPriceChanges();
  
  // ✅ المنطق الجديد:
  // 1. إذا تغيرت البيانات (أو الرحلات) -> تفعيل زر "تحديث البيانات" فقط
  // 2. إذا تغيرت الأسعار فقط -> تفعيل زر "تحديث الأسعار" فقط
  // 3. إذا تغير الاثنان معاً -> تفعيل زر "تحديث البيانات" فقط (لأنه شامل)
  
  const hasDataChanges = dataChanged;
  const hasPriceOnlyChanges = priceChanged && !dataChanged;
  
  // ✅ زر "تحديث البيانات" - نشط عند تغيير البيانات أو الأسعار معاً
  if (saveBtn) {
    saveBtn.disabled = !hasDataChanges;
    saveBtn.style.opacity = hasDataChanges ? '1' : '0.5';
    if (hasDataChanges) {
      saveBtn.textContent = '💾 تحديث البيانات';
    }
  }
  
  // ✅ زر "تحديث الأسعار" - نشط فقط عند تغيير الأسعار ONLY
  if (priceBtn) {
    priceBtn.disabled = !hasPriceOnlyChanges;
    priceBtn.style.opacity = hasPriceOnlyChanges ? '1' : '0.5';
    if (hasPriceOnlyChanges) {
      priceBtn.textContent = '💰 تحديث الأسعار';
    }
  }
  
  console.log('🔘 updateButtonsState - isEdit:', isEdit, 'dataChanged:', dataChanged, 'priceChanged:', priceChanged, 'hasPriceOnlyChanges:', hasPriceOnlyChanges);
}

// ====================== الكشف عن تغييرات بيانات الحساب ======================
function detectDataChanges() {
  if (!isEdit || !selectedAccount || !_originalFormData) return false;

  const f = _formStep1Data;
  const o = _originalFormData;

  if ((f.customerName || '') !== (o.customerName || '')) return true;
  if ((f.customerType || '') !== (o.customerType || '')) return true;
  if ((f.category || '')     !== (o.category || '')) return true;
  if ((f.phone || '').trim() !== (o.phone || '').trim()) return true;
  if ((f.startDate || '')    !== (o.startDate || '')) return true;
  if ((f.endDate || '')      !== (o.endDate || '')) return true;
  if ((f.parentCenter || '') !== (o.parentCenter || '')) return true;
  if ((f.contactPerson || '')!== (o.contactPerson || '')) return true;
  if ((f.email || '')        !== (o.email || '')) return true;
  if ((f.address || '')      !== (o.address || '')) return true;
  if ((f.paymentTerms || '') !== (o.paymentTerms || '')) return true;
  if ((f.status || '')       !== (o.status || '')) return true;
  if ((f.notes || '')        !== (o.notes || '')) return true;

  // ✅ فحص الرحلات فقط إذا كانت شاشة الرحلات معروضة فعلياً (الخطوة 2)
  if (selectedAccount.category !== 'Submarine') {
    const tripsBox = document.getElementById('tripsBox');
    if (tripsBox) {
      const checkedTrips = [];
      tripsBox.querySelectorAll('input[type=checkbox]:checked').forEach(cb => checkedTrips.push(cb.value));
      const oldTrips = selectedAccount.assignedTrips ? selectedAccount.assignedTrips.split('|').filter(Boolean) : [];
      if (JSON.stringify([...checkedTrips].sort()) !== JSON.stringify([...oldTrips].sort())) return true;
    }
  }

  return false;
}
  
 // ====================== الكشف عن تغييرات الأسعار ======================
function detectPriceChanges() {
  if (!isEdit || !selectedAccount) return false;
  if (formStep !== 2) return false;   // ✅ الحقول غير موجودة بعد في الخطوة 1

  const cat = selectedAccount.category;
  const isSubmarine = (cat === 'Submarine');

  if (isSubmarine) {
    // ✅ التحقق من تغيير أسعار Submarine
    const savedPrices = selectedAccount._existingPricesData || {};
    for (const c of ['F', 'Aarab', 'Arab48', 'EGY']) {
      const pax = parseFloat(document.getElementById(`sp_${c}_PAX`)?.value) || 0;
      const child = parseFloat(document.getElementById(`sp_${c}_CHILD`)?.value) || 0;
      const inf = parseFloat(document.getElementById(`sp_${c}_INF`)?.value) || 0;
      const cur = document.getElementById(`sc_${c}`)?.value || 'USD';
      
      const saved = savedPrices['Submarine_' + c] || {};
      if (pax !== (saved.PAX || 0)) return true;
      if (child !== (saved.CHILD || 0)) return true;
      if (inf !== (saved.INF || 0)) return true;
      if (cur !== (saved.currency || 'USD')) return true;
    }
  } else {
    // ✅ التحقق من تغيير أسعار الرحلات العادية
    const priceInputs = document.querySelectorAll('#priceArea input[type="number"]');
    for (const input of priceInputs) {
      const id = input.id;
      if (!id || !id.startsWith('pp_')) continue;
      const key = id.substring(3);
      const newPrice = parseFloat(input.value) || 0;
      const currencySelect = document.getElementById(`pc_${key}`);
      const newCurrency = currencySelect ? currencySelect.value : 'LE';
      
      // ✅ البحث عن السعر القديم
      const savedPrices = selectedAccount._existingPricesData || {};
      let oldPrice = 0;
      let oldCurrency = 'LE';
      for (const [savedKey, savedValue] of Object.entries(savedPrices)) {
        const normalizedKey = savedKey.replace(/[^a-zA-Z0-9_]/g, '_');
        if (normalizedKey === key || savedKey.includes(key)) {
          oldPrice = savedValue.price || 0;
          oldCurrency = savedValue.currency || 'LE';
          break;
        }
      }
      
      if (newPrice !== oldPrice) return true;
      if (newCurrency !== oldCurrency) return true;
    }
  }
  
  return false;
}

function formatDateForInput(dateStr) {
  if (!dateStr) return '';
  try {
    if (dateStr.match(/^\d{4}-\d{2}-\d{2}/)) {
      return dateStr.split('T')[0];
    }
    const match = dateStr.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
    if (match) {
      const months = {Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
      return `${match[3]}-${months[match[2]]}-${match[1].padStart(2,'0')}`;
    }
    return '';
  } catch(e) {
    return '';
  }
}

function formatDateDisplay(v) {
  if (!v) return '-';
  const s = v.toString().trim();
  if (s.match(/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/)) return s;
  try { const d=new Date(s); if(!isNaN(d)){const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return String(d.getDate()).padStart(2,'0')+'/'+MN[d.getMonth()]+'/'+d.getFullYear();} } catch(e){}
  return s;
}

async function fetchTripItems(tripName) {
  if (tripItems[tripName] && tripItems[tripName].length > 0) {
    return tripItems[tripName];
  }
  try {
    // ✅ استخدام getAllTrips مع includeItems: true
    const res = await gas('getAllTrips', { 
      centerName: currentUser?.centerName || '',
      includeItems: true
    });
    
    if (Array.isArray(res)) {
      const trip = res.find(t => t.name === tripName);
      if (trip && trip.items) {
        tripItems[tripName] = trip.items;
        return trip.items;
      }
    }
    
    // ✅ Fallback: محاولة getTripDefinition
    const res2 = await gas('getTripDefinition', { 
      tripName: tripName,
      centerName: currentUser?.centerName || ''
    });
    const items = Array.isArray(res2?.items) ? res2.items.filter(Boolean) : [];
    tripItems[tripName] = items;
    return items;
  } catch(e) {
    console.error('fetchTripItems error:', e);
    tripItems[tripName] = [];
    return [];
  }
}

  console.log('📌 savedPrices keys:', Object.keys(savedPrices || {}));
  console.log('📌 savedPrices sample:', savedPrices ? Object.keys(savedPrices).slice(0, 3).map(k => ({ key: k, value: savedPrices[k] })) : 'empty');
  
  const priceTitle = document.getElementById('priceTitle');

  if (!priceArea) return;

  if (!tripNames || tripNames.length === 0) {
    if (priceTitle) priceTitle.style.display = 'none';
    priceArea.innerHTML = '';
    return;
  }

 for (const tripName of tripNames) {
  if (!tripItems[tripName]) {
    await fetchTripItems(tripName);
  }
}

  if (priceTitle) priceTitle.style.display = 'flex';

  let html = '<div class="trip-price-grid">';

  for (const tripName of tripNames) {
    const items = tripItems[tripName] || [];

      html += `<div class="price-item"><div class="pi-trip">⚠️ ${esc(tripName)}</div><div style="color:#dc2626;font-size:12px">لا توجد بنود لهذه الرحلة</div></div>`;
      continue;
    }
    hasItems = true;
    for (const item of items) {
      const key = safeid(tripName + '_' + item);

      const prevPrice = saved?.price || '';
      const prevCur = saved?.currency || 'LE';
      
      html += `<div class="price-item">
        <div class="pi-trip">${esc(tripName)}</div>
        <div class="pi-label">${esc(item)}</div>

          <select id="pc_${key}" onchange="updateButtonsState()">
            <option value="LE" ${prevCur==='LE' ?'selected':''}>LE ج</option>
            <option value="USD" ${prevCur==='USD'?'selected':''}>USD $</option>
            <option value="EUR" ${prevCur==='EUR'?'selected':''}>EUR €</option>
            <option value="GBP" ${prevCur==='GBP'?'selected':''}>GBP £</option>

  }

async function handleTripToggle(cb, tripName) {
  const div = cb.closest('.trip-item');
  if (div) div.classList.toggle('checked', cb.checked);

  if (cb.checked && !tripItems[tripName]) {
    cb.disabled = true;
    try {
      tripItems[tripName] = await fetchTripItems(tripName);
    } catch(e) { 
      tripItems[tripName] = []; 
    }
    cb.disabled = false;
  }

  await loadPriceInputs();
  updateButtonsState();
}

async function loadPriceInputs() {
  const checked = [];
  document.querySelectorAll('#tripsBox input[type=checkbox]:checked').forEach(cb => {
    checked.push(cb.value);
  });

  const priceTitle = document.getElementById('priceTitle');
  const priceArea = document.getElementById('priceArea');
  if (!priceArea) return;

  if (checked.length === 0) {
    if (priceTitle) priceTitle.style.display = 'none';
    priceArea.innerHTML = '';
    return;
  }

  await Promise.all(checked.map(async tripName => {
    if (!tripItems[tripName]) {
      try {
        tripItems[tripName] = await fetchTripItems(tripName);
      } catch(e) { 
        tripItems[tripName] = []; 
      }
    }
  }));

  if (priceTitle) priceTitle.style.display = 'flex';

  const prevValues = {};
  priceArea.querySelectorAll('input[type=number], select').forEach(el => {
    if (el.id) prevValues[el.id] = el.value;
  });

  let html = '<div class="trip-price-grid">';
  for (const tripName of checked) {
    const items = tripItems[tripName] || [];
    if (items.length === 0) {
      html += `<div class="price-item"><div class="pi-trip">${esc(tripName)}</div><div style="color:#94a3b8;font-size:12px">لا توجد بنود</div></div>`;
      continue;
    }
    for (const item of items) {
      const key = safeid(tripName + '_' + item);
      const prevPrice = prevValues['pp_' + key] || '';
      const prevCur = prevValues['pc_' + key] || 'LE';
      html += `<div class="price-item">
        <div class="pi-trip">${esc(tripName)}</div>
        <div class="pi-label">${esc(item)}</div>
        <div class="pi-row">
          <input type="number" id="pp_${key}" placeholder="0" min="0" value="${prevPrice}" oninput="updateButtonsState()">
          <select id="pc_${key}" onchange="updateButtonsState()">
            <option value="LE" ${prevCur==='LE' ?'selected':''}>LE ج</option>
            <option value="USD" ${prevCur==='USD'?'selected':''}>USD $</option>
            <option value="EUR" ${prevCur==='EUR'?'selected':''}>EUR €</option>
            <option value="GBP" ${prevCur==='GBP'?'selected':''}>GBP £</option>
          </select>
        </div>
      </div>`;
    }
  }
  html += '</div>';
  priceArea.innerHTML = html;
  updateButtonsState();
}

              <tr>
                 <td><strong>${c}</strong></td>
                 <td><input type="number" id="sp_${c}_PAX" placeholder="0" min="0" value="0" oninput="updateButtonsState()"></td>
                 <td><input type="number" id="sp_${c}_CHILD" placeholder="0" min="0" value="0" oninput="updateButtonsState()"></td>

                  <option value="GBP">GBP £</option>
                  <option value="LE">LE ج</option>
                </select></td>
               </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
 } else {
    // ✅ الرحلات المتاحة حسب النشاط
    let availableTrips = [...(selectedAccount?._categoryTrips || tripsForCategory || [])];
    
    // ✅ الرحلات المحددة للعميل
    let existingTripsList = [];
    if (isEdit && selectedAccount) {
      if (selectedAccount._existingTripsList && selectedAccount._existingTripsList.length > 0) {
        existingTripsList = selectedAccount._existingTripsList;
      } else if (selectedAccount.assignedTrips) {
        existingTripsList = selectedAccount.assignedTrips.split('|').filter(Boolean);
      }
    }
    
    // ✅ دمج القائمتين (جميع الرحلات + الرحلات المحددة)
    const allTrips = [...new Set([...availableTrips, ...existingTripsList])].sort();
    
    console.log('📋 renderStep2 - allTrips:', allTrips);
    console.log('📋 renderStep2 - existingTripsList:', existingTripsList);
    
    html = `
      <div class="sec-title">📋 اختر الرحلات المخصصة لهذا الحساب</div>
      <div class="trips-box" id="tripsBox">
        ${allTrips.length ? allTrips.map(t => {

          return `
            <div class="trip-item ${isChecked ? 'checked' : ''}" id="ti_${safeid(t)}">
              <input type="checkbox" id="tc_${safeid(t)}" value="${esc(t)}" ${isChecked ? 'checked' : ''} onchange="handleTripToggle(this,'${esc(t)}'); updateButtonsState();">
              <label for="tc_${safeid(t)}" style="cursor:pointer">${esc(t)}</label>

          `;
        }).join('') : '<div style="padding:20px;color:#94a3b8;text-align:center;">لا توجد رحلات لهذا النشاط</div>'}
      </div>
      <div class="sec-title" id="priceTitle" style="display:none">💰 أسعار البنود (لكل عميل)</div>
      <div id="priceArea"></div>`;
}
  document.getElementById('formContent').innerHTML = html;
  
  // ✅ ✅ ✅ تحديد الزر المناسب حسب وضع التعديل أو الإضافة
  let saveButtonHtml = '';
  if (isEdit) {
    // ✅ وضع التعديل: زر "تحديث البيانات"
    saveButtonHtml = `<button class="btn btn-green" id="saveBtn" onclick="doSave()" disabled>💾 تحديث البيانات</button>`;
  } else {
    // ✅ وضع الإضافة: زر "إنشاء حساب" (نشط دائماً)
    saveButtonHtml = `<button class="btn btn-green" id="saveBtn" onclick="doSave()">➕ إنشاء حساب</button>`;
  }
  
  document.getElementById('formFooter').innerHTML = `
    ${saveButtonHtml}
    ${isEdit ? '<button class="btn btn-orange" id="priceUpdateBtn" onclick="openPriceUpdateModal()" disabled>💰 تحديث الأسعار</button>' : ''}

    <button class="btn btn-gray" onclick="closeModal()">إلغاء</button>`;

  // ✅ تحميل الأسعار إذا كانت هناك رحلات محددة (في وضع التعديل فقط)
  if (!isSubmarine && isEdit && selectedAccount) {
    let prevTrips = [];
    let savedPrices = {};
    
    if (selectedAccount._existingTripsList && selectedAccount._existingTripsList.length > 0) {
      prevTrips = selectedAccount._existingTripsList;
      savedPrices = selectedAccount._existingPricesData || {};
      console.log('✅ استخدام _existingTripsList:', prevTrips);
      console.log('✅ استخدام _existingPricesData:', Object.keys(savedPrices).length, 'بند');
    } else if (selectedAccount.assignedTrips) {
      prevTrips = selectedAccount.assignedTrips.split('|').filter(Boolean);
      try {
        if (selectedAccount.pricesData) {
          savedPrices = JSON.parse(selectedAccount.pricesData);
          console.log('✅ استخدام assignedTrips:', prevTrips);
          console.log('✅ استخدام pricesData:', Object.keys(savedPrices).length, 'بند');
        }
      } catch(e) {
        console.warn('⚠️ فشل تحليل pricesData:', e);
      }
    }
    
    setTimeout(function() {
      // ✅ تحديث حالة الصناديق (checked)
      for (const t of prevTrips) {
        const el = document.getElementById(`ti_${safeid(t)}`);
        if (el) {
          el.classList.add('checked');
          const cb = el.querySelector('input[type=checkbox]');
          if (cb) cb.checked = true;
        }
      }
      
      // ✅ تحميل الأسعار
      Promise.all(prevTrips.map(async function(tripName) {
        if (!tripItems[tripName]) {
          await fetchTripItems(tripName);
        }
      })).then(function() {
        return loadPriceInputsWithValues(prevTrips, savedPrices);
      }).then(function() {
        setTimeout(function() {
          // ✅ إضافة مستمعات لأسعار الرحلات
          setupTripPriceListeners();
          updateButtonsState();
        }, 100);
      }).catch(function(err) {
        console.error('❌ خطأ في تحميل الأسعار:', err);
      });
    }, 200);
  }

  if (isSubmarine && isEdit && selectedAccount?.pricesData) {
    try {
      const savedPrices = JSON.parse(selectedAccount.pricesData);
      ['F','Aarab','Arab48','EGY'].forEach(c => {
        const p = savedPrices['Submarine_' + c];
        if (!p) return;
        const paxEl = document.getElementById(`sp_${c}_PAX`);
        const childEl = document.getElementById(`sp_${c}_CHILD`);
        const infEl = document.getElementById(`sp_${c}_INF`);
        const curEl = document.getElementById(`sc_${c}`);
        if (paxEl && p.PAX) paxEl.value = p.PAX;
        if (childEl && p.CHILD) childEl.value = p.CHILD;
        if (infEl && p.INF) infEl.value = p.INF;
        if (curEl && p.currency) curEl.value = p.currency;
      });
      setTimeout(function() {
        setupSubmarinePriceListeners();
        updateButtonsState();
      }, 200);
    } catch(e) {}
  }
  
  // ✅ تحديث حالة الأزرار بعد تحميل الأسعار
  setTimeout(function() {
    updateButtonsState();
  }, 300);
}

// ====================== التحقق من تغيير التواريخ والرحلات ======================
function detectChanges() {
  const changes = {
    datesChanged: false, tripsChanged: false,
    newStartDate: null, newEndDate: null,
    oldStartDate: null, oldEndDate: null,
    newTrips: [], oldTrips: []
  };

  if (!isEdit || !selectedAccount || !_originalFormData) return changes;

  // ✅ القراءة من _formStep1Data بدل DOM (الحقول قد لا تكون موجودة في الخطوة 2)
  const newStart = _formStep1Data.startDate || '';
  const newEnd   = _formStep1Data.endDate || '';
  const oldStart = _originalFormData.startDate || '';
  const oldEnd   = _originalFormData.endDate || '';

  changes.newStartDate = newStart;
  changes.newEndDate = newEnd;
  changes.oldStartDate = oldStart;
  changes.oldEndDate = oldEnd;

  if (newStart !== oldStart || newEnd !== oldEnd) {
    changes.datesChanged = true;
  }

  if (selectedAccount.category !== 'Submarine') {
    const checkedTrips = [];
    document.querySelectorAll('#tripsBox input[type=checkbox]:checked').forEach(cb => checkedTrips.push(cb.value));
    const oldTrips = selectedAccount.assignedTrips ? selectedAccount.assignedTrips.split('|').filter(Boolean) : [];
    changes.newTrips = checkedTrips;
    changes.oldTrips = oldTrips;
    if (JSON.stringify([...oldTrips].sort()) !== JSON.stringify([...checkedTrips].sort())) {
      changes.tripsChanged = true;
    }
  }

  return changes;
}

async function loadCurrentPricesForDate(dateISO) {
  const area = document.getElementById('priceUpdateItemsArea');
  if (!area) return;
  
  // ✅ التحقق من وجود selectedAccount
  if (!selectedAccount) {
    area.innerHTML = '<div class="no-data">⚠️ لم يتم تحديد حساب</div>';
    return;
  }
  
  if (!dateISO) {
    area.innerHTML = '<div class="no-data">الرجاء اختيار تاريخ</div>';
    return;
  }
 
  
  area.innerHTML = '<div class="loader"><div class="spinner"></div>جاري تحميل الأسعار...</div>';
  
  try {
    const sheetName = selectedAccount.customerName + '_' + selectedAccount.category + '_' + selectedAccount.customerType;
    console.log('📡 جلب البيانات من الشيت:', sheetName);
    
    // ✅ تصحيح: استخدام getAccountSheetData
    const result = await gasPost({
      action: 'getAccountSheetData',
      sheetName: sheetName,
      centerName: currentUser?.centerName || ''
    });
    
    if (!result?.success || !Array.isArray(result.data) || result.data.length < 4) {
      area.innerHTML = '<div class="no-data">لا توجد بيانات في شيت الحساب</div>';
      return;
    }
    
    // ✅ قراءة الصف 2 و 3 للحصول على هيكل الأسعار
    const headers = result.data[1] || [];
    const subHeaders = result.data[2] || [];
    
    // ✅ البحث عن بداية أعمدة الأسعار (بعد أعمدة الشهر والسنة)
    let priceStartCol = 81; // CC
    for (let j = 0; j < headers.length; j++) {
      const header = (headers[j] || '').toString().trim();
      if (header === 'السنة' || header === 'Year') {
        priceStartCol = j + 2;
        break;
      }
    }
    
    console.log('📍 priceStartCol:', priceStartCol);
    
    // ✅ تحويل dateISO إلى كائن Date للمقارنة
    const targetDate = new Date(dateISO);
    targetDate.setHours(0, 0, 0, 0);
    const targetDateString = targetDate.toISOString().split('T')[0];
    
    // ✅ البحث عن الصف الذي يطابق التاريخ
    const rows = result.data.slice(3);
    let targetRowData = null;
    let targetRowIndex = -1;
    
    for (let i = 0; i < rows.length; i++) {
      const rowDate = rows[i][0];
      let rowDateString = null;
      
      if (rowDate instanceof Date) {
        rowDateString = new Date(rowDate).toISOString().split('T')[0];
      } else if (typeof rowDate === 'string') {
        const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
        const match = rowDate.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
        if (match) {
          const d = new Date(parseInt(match[3]), months[match[2]], parseInt(match[1]));
          rowDateString = d.toISOString().split('T')[0];
        }
      }
      
      console.log(`📅 صف ${i + 4}: التاريخ = "${rowDate}" → مقارنة مع "${targetDateString}"`);
      
      if (rowDateString === targetDateString) {
        targetRowData = rows[i];
        targetRowIndex = i + 4;
        console.log('✅ تم العثور على الصف:', targetRowIndex);
        break;
      }
    }
    
    if (!targetRowData) {
      const targetDateStr = formatDateForDisplay(dateISO);
      area.innerHTML = `<div class="no-data">⚠️ لا توجد بيانات للتاريخ ${targetDateStr}</div>`;
      return;
    }
    
    // ✅ بناء HTML مع الأسعار الحالية من الشيت
    let html = '<div style="font-size:13px;font-weight:700;margin-bottom:12px;">✏️ تعديل الأسعار (من هذا التاريخ حتى نهاية الجدول)</div>';
    html += '<div class="trip-price-grid" style="grid-template-columns:repeat(auto-fill,minmax(220px,1fr));">';
    
    let currentTrip = '';
    for (let j = priceStartCol - 1; j < headers.length; j++) {
      const tripName = (headers[j] || '').toString().trim();
      const itemName = (subHeaders[j] || '').toString().trim();
      
      // تخطي الأعمدة الفارغة أو أعمدة المجاميع
      if (!tripName && !itemName) continue;
      if (tripName === 'Total' || tripName === 'المجموع' || tripName === 'الشهر' || tripName === 'السنة') continue;
      if (itemName === 'Total' || itemName === 'المجموع' || itemName === 'الشهر' || itemName === 'السنة') continue;
      
      if (tripName && tripName !== '') {
        currentTrip = tripName;
      }
      if (currentTrip && itemName && itemName !== '') {
        const cellValue = targetRowData[j] || '';
        console.log(`🔍 العمود ${j}: ${currentTrip} - ${itemName} = "${cellValue}"`);
        
        // ✅ تحليل قيمة السعر (مثال: "1100 LE" أو "1100LE")
        let currentPrice = 0;
        let currentCurrency = 'LE';
        
        const cellStr = cellValue.toString().trim();
        const match = cellStr.match(/^([\d.]+)\s*([A-Za-z$€£]*)$/);
        if (match) {
          currentPrice = parseFloat(match[1]) || 0;
          let cur = match[2].toUpperCase();
          if (cur === '$' || cur === 'USD') currentCurrency = 'USD';
          else if (cur === '€' || cur === 'EUR') currentCurrency = 'EUR';
          else if (cur === '£' || cur === 'GBP') currentCurrency = 'GBP';
          else if (cur === 'LE' || cur === 'EGP') currentCurrency = 'LE';
        } else {
          currentPrice = parseFloat(cellStr) || 0;
        }
        
        console.log(`💰 السعر المستخرج: ${currentPrice} ${currentCurrency}`);
        
        const key = currentTrip + '_' + itemName;
        html += `
          <div class="price-item">
            <div class="pi-trip">${escapeHtml(currentTrip)}</div>
            <div class="pi-label">${escapeHtml(itemName)}</div>
            <div class="pi-row">
              <input type="number" id="pp_${key}" placeholder="0" min="0" value="${currentPrice}" step="0.01" style="flex:2;">
              <select id="pc_${key}" style="flex:1;">
                <option value="LE" ${currentCurrency === 'LE' ? 'selected' : ''}>LE ج</option>
                <option value="USD" ${currentCurrency === 'USD' ? 'selected' : ''}>USD $</option>
                <option value="EUR" ${currentCurrency === 'EUR' ? 'selected' : ''}>EUR €</option>
                <option value="GBP" ${currentCurrency === 'GBP' ? 'selected' : ''}>GBP £</option>
              </select>
            </div>
          </div>
        `;
      }
    }
    html += '</div>';
    area.innerHTML = html;
    
    console.log('✅ تم تحميل الأسعار بنجاح');
} catch(e) {
    console.error('❌ loadCurrentPricesForDate error:', e);
    area.innerHTML = '<div class="no-data">خطأ في تحميل الأسعار: ' + e.message + '</div>';
  }
}

          : `تم تحديث الأسعار بنجاح في شيت الحساب "${accountName}" (${totalItems} بند)`;
      
      showCustomAlert(
        updatedRows > 0 ? '✅ تم تحديث الأسعار بنجاح' : 'ℹ️ لا توجد تغييرات',
        successMessage,
        updatedRows > 0 ? 'success' : 'info',
        function() {
          // ✅ إغلاق نافذة التعديل الرئيسية
          closeModal();
          // ✅ تحميل قائمة الحسابات
          loadAccounts();
        }
      );
      
    } else {
      // ✅ 8. معالجة الفشل
      if (modalRef) {
        modalRef.remove();
      }
      if (priceBtn) {
        priceBtn.disabled = false;
        priceBtn.textContent = '💰 تحديث الأسعار';
        priceBtn.style.opacity = '1';
      }
      
      showCustomAlert(
        '❌ فشل تحديث الأسعار', 
        result?.message || 'حدث خطأ أثناء تحديث الأسعار. يرجى المحاولة مرة أخرى.', 
        'error'
      );
    }
    
  } catch(e) {
    console.error('❌ confirmPriceUpdate error:', e);
    
    if (modalRef) {
      modalRef.remove();
    }
    
    if (priceBtn) {
      priceBtn.disabled = false;
      priceBtn.textContent = '💰 تحديث الأسعار';
      priceBtn.style.opacity = '1';
    }
    
    let errorMessage = 'حدث خطأ غير متوقع. يرجى المحاولة مرة أخرى.';
    if (e.message) {
      if (e.message.includes('timeout')) {
        errorMessage = 'انتهى وقت الاتصال. يرجى التحقق من الاتصال بالإنترنت والمحاولة مرة أخرى.';
      } else if (e.message.includes('network')) {
        errorMessage = 'فشل الاتصال بالخادم. يرجى التحقق من الاتصال بالإنترنت.';
      } else {
        errorMessage = e.message;
      }
    }
    
    showCustomAlert('❌ خطأ', errorMessage, 'error');
    
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.textContent = '💾 تطبيق الأسعار الجديدة';
      btn.style.opacity = '1';
    }
  }
}

// ====================== عرض رسالة منبثقة احترافية ======================
function showCustomAlert(title, message, type = 'info', callback = null) {
  // ✅ إزالة أي تنبيه سابق
  const existingAlert = document.querySelector('.custom-alert-overlay');
  if (existingAlert) {
    existingAlert.remove();
  }
  
  const overlay = document.createElement('div');
  overlay.className = 'custom-alert-overlay';
  overlay.style.cssText = `
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    animation: fadeIn 0.3s ease;
  `;
  
  const colors = {
    success: { border: '#16a34a', icon: '✅', bg: '#dcfce7' },
    error: { border: '#dc2626', icon: '❌', bg: '#fee2e2' },
    warning: { border: '#ea580c', icon: '⚠️', bg: '#ffedd5' },
    info: { border: '#2563eb', icon: 'ℹ️', bg: '#dbeafe' }
  };
  
  const style = colors[type] || colors.info;
  
  overlay.innerHTML = `
    <div style="
      background: white;
      border-radius: 20px;
      padding: 30px 40px;
      max-width: 450px;
      width: 90%;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
      text-align: center;
      border-top: 6px solid ${style.border};
      animation: popIn 0.3s ease;
    ">
      <div style="font-size: 48px; margin-bottom: 10px;">${style.icon}</div>
      <h3 style="color: #0f1f3d; font-size: 20px; font-weight: 900; margin-bottom: 8px;">${title}</h3>
      <p style="color: #5a6a8a; font-size: 14px; margin-bottom: 20px; line-height: 1.6;">${message}</p>
      <button id="customAlertOkBtn" style="
        background: ${style.border};
        color: white;
        border: none;
        padding: 10px 40px;
        border-radius: 40px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        font-family: 'Cairo', sans-serif;
        transition: transform 0.2s;
      " onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        موافق
      </button>
    </div>
  `;
  
  // ✅ إضافة الـ CSS للـ animations
  const styleSheet = document.createElement('style');
  styleSheet.textContent = `
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  `;
  document.head.appendChild(styleSheet);
  
  document.body.appendChild(overlay);
  
  // ✅ إغلاق عند الضغط خارج النافذة
  overlay.addEventListener('click', function(e) {
    if (e.target === this) {
      this.remove();
      if (typeof callback === 'function') {
        callback();
      }
    }
  });
  
  // ✅ زر "موافق" مع callback
  const okBtn = document.getElementById('customAlertOkBtn');
  if (okBtn) {
    okBtn.addEventListener('click', function() {
      const overlayParent = this.closest('.custom-alert-overlay');
      if (overlayParent) {
        overlayParent.remove();
      }
      if (typeof callback === 'function') {
        callback();
      }
    });
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatDateForDisplay(dateISO) {
  if (!dateISO) return '';
  // إذا كان الإدخال yyyy-mm-dd
  if (dateISO.match(/^\d{4}-\d{2}-\d{2}$/)) {
    const parts = dateISO.split('-');
    const months = { '01':'Jan', '02':'Feb', '03':'Mar', '04':'Apr', '05':'May', '06':'Jun', '07':'Jul', '08':'Aug', '09':'Sep', '10':'Oct', '11':'Nov', '12':'Dec' };
    return `${parseInt(parts[2])}/${months[parts[1]]}/${parts[0]}`;
  }
  return dateISO;
}
function updateAutoEmail() {
  const name = document.getElementById('f_name')?.value.trim();
  const emailField = document.getElementById('f_loginEmail');
  const systemAccessCheck = document.getElementById('f_hasSystemAccess');
  if (name && systemAccessCheck && systemAccessCheck.checked && emailField && !emailField.value) {
    emailField.value = generateAutoEmail(name);
  }
}

async function doDelete() {
  if (!selectedAccount) return;
  showAlert(
    `⚠️ هل تريد حذف حساب ${selectedAccount.customerName}؟\nسيتم حذف الشيت الخاص به أيضاً.`,
    '⚠️',
    `<button class="btn btn-red" id="confirmDeleteBtn" onclick="confirmDelete()">حذف نهائي</button>
     <button class="btn btn-gray" onclick="closeAlert()">إلغاء</button>`
  );
}

async function confirmDelete() {
  const confirmBtn = document.getElementById('confirmDeleteBtn');
  if (confirmBtn) {
    confirmBtn.disabled = true;
    confirmBtn.textContent = '⏳ جاري الحذف...';
  }
  
  closeAlert();
  try {
    const res = await gasPost({ 
  action: 'deleteSupplierCustomer', 
  customerId: selectedAccount.customerId,
  centerName: currentUser?.centerName || ''  // ✅ إضافة
});
    if (res?.success) {
      selectedAccount = null;
      await loadAccounts();
      showAlert('✅ تم الحذف بنجاح', '✅');
    } else {
      showAlert('❌ ' + (res?.message || 'فشل الحذف'), '❌');
    }
  } catch(e) { 
    showAlert('❌ خطأ: ' + e.message, '❌'); 
  }
  
  if (confirmBtn) {
    confirmBtn.disabled = false;
    confirmBtn.textContent = 'حذف نهائي';
  }
}
