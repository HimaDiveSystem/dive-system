<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>إدارة العملاء والمنفذين</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0f1f3d;--navy2:#1a3260;--gold:#f5c842;
      --blue:#2563eb;--green:#16a34a;--red:#dc2626;--orange:#ea580c;
      --bg:#f0f4f8;--card:#fff;--border:#dde4f0;--text:#1a2540;--text-lt:#5a6a8a;
      --radius:16px;--radius-sm:10px;--shadow:0 4px 24px rgba(15,31,61,.10);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    .header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;padding:13px 22px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(15,31,61,.25);}
    .header h2{color:var(--gold);font-size:18px;font-weight:900;}
    .header-right{display:flex;align-items:center;gap:8px;}
    .user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:40px;padding:4px 13px;color:white;font-size:12px;font-weight:600;}
    .back-btn{background:transparent;border:2px solid rgba(255,255,255,.3);color:white;padding:4px 13px;border-radius:40px;cursor:pointer;font-weight:700;font-size:12px;font-family:'Cairo',sans-serif;transition:all .2s;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}

    .page{max-width:1400px;margin:0 auto;padding:20px 16px 50px;}
    .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden;}
    .card-head{padding:12px 18px;background:linear-gradient(90deg,var(--navy),var(--navy2));display:flex;align-items:center;gap:8px;}
    .card-head h3{color:var(--gold);font-size:14px;font-weight:800;}
    .ch-icon{background:rgba(245,200,66,.2);border-radius:7px;padding:3px 6px;font-size:13px;}
    .card-body{padding:16px;}

    /* table */
    .table-wrap{overflow-x:auto;}
    .data-table{width:100%;border-collapse:collapse;font-size:13px;}
    .data-table thead th{background:#f0f4f8;color:var(--text-lt);padding:10px 12px;font-weight:700;text-align:right;border-bottom:2px solid var(--border);white-space:nowrap;}
    .data-table tbody td{padding:8px 12px;border-bottom:1px solid #f0f4f8;white-space:nowrap;}
    .data-table tbody tr:hover{background:#f8faff;cursor:pointer;}
    .data-table tbody tr.sel{background:#e6f0ff !important;}
    .badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;}
    .badge-green{background:#dcfce7;color:#166534;}
    .badge-red{background:#fee2e2;color:#991b1b;}
    .badge-blue{background:#dbeafe;color:#1e40af;}
    .badge-orange{background:#ffedd5;color:#9a3412;}

    /* form */
    .fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:14px;}
    .fgroup{display:flex;flex-direction:column;gap:5px;}
    .fgroup label{font-size:11px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px;}
    .fgroup label.req::after{content:' *';color:var(--red);}
    .fc{padding:8px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Cairo',sans-serif;color:var(--text);background:#fafbfd;width:100%;height:40px;transition:border-color .2s;}
    .fc:focus{border-color:var(--blue);outline:none;background:white;}
    select.fc{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='13' height='13' viewBox='0 0 24 24' fill='none' stroke='%235a6a8a' stroke-width='2.5'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:left 10px center;padding-left:30px;}
    textarea.fc{height:auto;resize:vertical;}

    /* trips checklist */
    .trips-box{border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;background:white;max-height:220px;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;}
    .trip-item{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:8px;cursor:pointer;transition:background .15s;}
    .trip-item:hover{background:#f0f4ff;}
    .trip-item input{width:16px;height:16px;cursor:pointer;flex-shrink:0;}
    .trip-item label{font-size:13px;font-weight:500;cursor:pointer;color:var(--text);}
    .trip-item.checked{background:#e6f0ff;}

    /* price tables */
    .sub-price-table{width:100%;border-collapse:collapse;font-size:13px;}
    .sub-price-table th,.sub-price-table td{border:1px solid var(--border);padding:8px 10px;text-align:center;}
    .sub-price-table th{background:var(--navy);color:var(--gold);font-weight:700;}
    .sub-price-table input{width:80px;text-align:center;border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:13px;font-family:'Cairo',sans-serif;}
    .sub-price-table select{width:80px;border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:12px;}

    .trip-price-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:10px;}
    .price-item{background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
    .price-item .pi-label{font-size:11px;font-weight:700;color:var(--text-lt);text-transform:uppercase;margin-bottom:6px;}
    .price-item .pi-trip{font-size:10px;color:#94a3b8;margin-bottom:4px;font-style:italic;}
    .price-item .pi-row{display:flex;gap:5px;}
    .price-item .pi-row input{flex:2;min-width:70px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;text-align:center;}
    .price-item .pi-row select{flex:1;border:1px solid var(--border);border-radius:6px;font-size:12px;padding:4px;}

    /* buttons */
    .action-btns{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
    .btn{padding:8px 20px;border:none;border-radius:40px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .2s;}
    .btn:hover{transform:translateY(-1px);}
    .btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
    .btn-navy{background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);}
    .btn-green{background:var(--green);color:white;}
    .btn-red{background:var(--red);color:white;}
    .btn-gray{background:#f1f5f9;color:var(--text);}
    .btn-orange{background:var(--orange);color:white;}

    /* search */
    .search-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
    .search-in{flex:1;min-width:200px;padding:8px 14px;border:2px solid var(--border);border-radius:40px;font-size:13px;font-family:'Cairo',sans-serif;}
    .filter-sel{padding:8px 12px;border:2px solid var(--border);border-radius:40px;font-size:13px;background:white;min-width:130px;}

    /* modal */
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px);}
    .modal.open{display:flex;}
    .modal-box{background:white;width:92%;max-width:900px;max-height:88vh;overflow-y:auto;border-radius:22px;padding:24px;box-shadow:0 25px 50px rgba(0,0,0,.3);animation:pop .25s ease;}
    .modal-title{color:var(--navy);font-size:16px;font-weight:900;margin-bottom:20px;text-align:center;border-bottom:2px solid var(--border);padding-bottom:12px;}
    .modal-footer{display:flex;gap:10px;justify-content:center;margin-top:20px;border-top:2px solid var(--border);padding-top:16px;}
    @keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}

    /* alert */
    .alert-box{background:white;width:88%;max-width:420px;border-radius:22px;padding:26px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.25);animation:pop .25s ease;}
    .alert-icon{font-size:40px;margin-bottom:10px;}
    .alert-msg{color:var(--navy);font-size:14px;font-weight:700;margin-bottom:18px;white-space:pre-wrap;}

    /* section title */
    .sec-title{font-size:13px;font-weight:800;color:var(--navy);margin:16px 0 8px;display:flex;align-items:center;gap:6px;border-right:3px solid var(--gold);padding-right:8px;}

    /* loader */
    .loader{text-align:center;padding:40px;color:var(--text-lt);}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .no-data{text-align:center;padding:40px;color:var(--text-lt);}

    .step-indicator{display:flex;gap:8px;margin-bottom:20px;justify-content:center;}
    .step{padding:5px 16px;border-radius:20px;font-size:12px;font-weight:700;background:#f0f4f8;color:var(--text-lt);}
    .step.active{background:var(--navy);color:var(--gold);}
    .step.done{background:#dcfce7;color:#166534;}

    @media(max-width:640px){
      .fgrid{grid-template-columns:1fr;}
      .trip-price-grid{grid-template-columns:1fr;}
      .sub-price-table input,.sub-price-table select{width:65px;font-size:11px;}
    }
  </style>
</head>
<body>

<div class="header">
  <h2>🏢 إدارة العملاء والمنفذين</h2>
  <div class="header-right">
    <span class="user-chip" id="userChip">...</span>
    <button class="back-btn" onclick="goBack()">← العودة</button>
  </div>
</div>

<div class="page">
  <div id="mainContent"><div class="loader"><div class="spinner"></div>جاري التحميل...</div></div>
</div>

<!-- Modal الإضافة/التعديل -->
<div id="formModal" class="modal">
  <div class="modal-box">
    <div class="modal-title" id="formTitle">➕ إضافة حساب جديد</div>
    <div id="stepBar" class="step-indicator">
      <div class="step active" id="step1Ind">1. بيانات الحساب</div>
      <div class="step" id="step2Ind">2. الرحلات والأسعار</div>
    </div>
    <div id="formContent"></div>
    <div class="modal-footer" id="formFooter"></div>
  </div>
</div>

<!-- Alert Modal -->
<div id="alertModal" class="modal">
  <div class="alert-box">
    <div class="alert-icon" id="alertIcon">ℹ️</div>
    <div class="alert-msg" id="alertMsg"></div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:16px;" id="alertBtns">
      <button class="btn btn-navy" onclick="closeAlert()">موافق</button>
    </div>
  </div>
</div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbyBfwHQQoHb9E2bq0l-u6FLMD2XFKu_d8rZuJLnIq5iko82Bn93Emki6-cvDF_XOyRp/exec';
const DASH = {Admin:'Dashboard.html',Owner:'OwnerDashboard.html',Sales:'SalesDashboard.html',Accountant:'AccountantDashboard.html'};

let currentUser = null;
let allAccounts = [];
let selectedAccount = null;
let isEdit = false;
let formStep = 1;
let tripItems = {}; // {tripName → [items]}
let tripsForCategory = []; // قائمة الرحلات حسب النشاط

// ── GAS call ──
function gas(action, params = {}) {
  const u = new URL(GAS);
  u.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => u.searchParams.set(k, String(v ?? '')));
  return fetch(u.toString(), { redirect: 'follow' }).then(r => r.json());
}
function gasPost(data) {
  return fetch(GAS, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(data),
    redirect: 'follow'
  }).then(r => r.json());
}

// ── helpers ──
function goBack() { location.href = DASH[currentUser?.type] || 'Dashboard.html'; }
function showAlert(msg, icon, btns) {
  document.getElementById('alertIcon').textContent = icon || 'ℹ️';
  document.getElementById('alertMsg').textContent = msg;
  document.getElementById('alertBtns').innerHTML = btns ||
    '<button class="btn btn-navy" onclick="closeAlert()">موافق</button>';
  document.getElementById('alertModal').classList.add('open');
}
function closeAlert() { document.getElementById('alertModal').classList.remove('open'); }

// ── Init ──
document.addEventListener('DOMContentLoaded', async () => {
  let ud = sessionStorage.getItem('currentUser');
  if (!ud) { const p = new URLSearchParams(location.search).get('user'); if (p) { ud = decodeURIComponent(p); sessionStorage.setItem('currentUser', ud); } }
  if (!ud) { location.href = 'index.html'; return; }
  try { currentUser = JSON.parse(ud); } catch { location.href = 'index.html'; return; }
  document.getElementById('userChip').textContent = currentUser.name || 'User';
  await loadAccounts();
});

// ── تحميل الحسابات ──
async function loadAccounts() {
  try {
    const res = await gas('getAllSuppliersCustomers');
    allAccounts = Array.isArray(res) ? res : [];
  } catch(e) { allAccounts = []; }
  renderTable();
}

// ── عرض الجدول ──
function renderTable() {
  const search = (document.getElementById('searchIn')?.value || '').toLowerCase();
  const typeF = document.getElementById('typeF')?.value || '';
  const catF  = document.getElementById('catF')?.value || '';

  const filtered = allAccounts.filter(a => {
    if (search && !(a.customerName||'').toLowerCase().includes(search)) return false;
    if (typeF && a.customerType !== typeF) return false;
    if (catF  && a.category !== catF) return false;
    return true;
  });

  const cats = [...new Set(allAccounts.map(a => a.category).filter(Boolean))].sort();

  document.getElementById('mainContent').innerHTML = `
    <div class="card">
      <div class="card-head"><span class="ch-icon">🔍</span><h3>بحث وتصفية</h3></div>
      <div class="card-body">
        <div class="search-bar">
          <input type="text" id="searchIn" class="search-in" placeholder="بحث بالاسم..." oninput="renderTable()" value="${search}">
          <select id="typeF" class="filter-sel" onchange="renderTable()">
            <option value="">كل الأنواع</option>
            <option value="Customer" ${typeF==='Customer'?'selected':''}>عملاء</option>
            <option value="Supplier" ${typeF==='Supplier'?'selected':''}>منفذين</option>
          </select>
          <select id="catF" class="filter-sel" onchange="renderTable()">
            <option value="">كل الأنشطة</option>
            ${cats.map(c=>`<option value="${c}" ${catF===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><span class="ch-icon">📋</span><h3>قائمة الحسابات (${filtered.length})</h3></div>
      <div class="card-body">
        <div class="action-btns">
          <button class="btn btn-navy" onclick="openAdd()">➕ إضافة حساب</button>
          <button class="btn btn-green" id="editBtn" onclick="openEdit()" ${!selectedAccount?'disabled':''}>✏️ تعديل</button>
          <button class="btn btn-red" id="delBtn" onclick="doDelete()" ${!selectedAccount?'disabled':''}>🗑️ حذف</button>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr>
              <th>المعرف</th><th>الاسم</th><th>النوع</th><th>النشاط</th><th>التواصل</th><th>الهاتف</th><th>البداية</th><th>النهاية</th><th>الحالة</th>
            </tr></thead>
            <tbody>
              ${filtered.length ? filtered.map(a => `
                <tr class="${selectedAccount?.customerId===a.customerId?'sel':''}" onclick="selectRow('${a.customerId}')">
                  <td>${a.customerId}</td>
                  <td><strong>${a.customerName}</strong></td>
                  <td><span class="badge ${a.customerType==='Customer'?'badge-blue':'badge-orange'}">${a.customerType==='Customer'?'عميل':'منفذ'}</span></td>
                  <td>${a.category||'-'}</td>
                  <td>${a.contactPerson||'-'}</td>
                  <td>${a.phone||'-'}</td>
                  <td>${a.startDate||'-'}</td>
                  <td>${a.endDate||'-'}</td>
                  <td><span class="badge ${a.status?'badge-green':'badge-red'}">${a.status?'نشط':'متوقف'}</span></td>
                </tr>`).join('') : `<tr><td colspan="9" class="no-data">لا توجد بيانات</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
}

function selectRow(id) {
  selectedAccount = allAccounts.find(a => a.customerId === id) || null;
  renderTable();
}

// ═══════════════════════════════════════════════════════════════
// MODAL - خطوتان
// ═══════════════════════════════════════════════════════════════
function openAdd() {
  isEdit = false;
  selectedAccount = null;
  formStep = 1;
  tripItems = {};
  tripsForCategory = [];
  document.getElementById('formTitle').textContent = '➕ إضافة حساب جديد';
  document.getElementById('formModal').classList.add('open');
  renderStep1({});
}

function openEdit() {
  if (!selectedAccount) return;
  isEdit = true;
  formStep = 1;
  tripItems = {};
  document.getElementById('formTitle').textContent = '✏️ تعديل حساب';
  document.getElementById('formModal').classList.add('open');
  renderStep1(selectedAccount);
}

function closeModal() {
  document.getElementById('formModal').classList.remove('open');
}

function setStepUI(step) {
  formStep = step;
  ['step1Ind','step2Ind'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'step' + (i+1 < step ? ' done' : '') + (i+1 === step ? ' active' : '');
  });
}

// ── الخطوة 1: البيانات الأساسية ──
function renderStep1(data) {
  setStepUI(1);
  const CATEGORIES = ['Submarine','Safari','Water Sports','Diving','Tourism Company','Excursions'];

  document.getElementById('formContent').innerHTML = `
    <div class="fgrid">
      <div class="fgroup"><label class="req">اسم العميل/المنفذ</label><input type="text" class="fc" id="f_name" value="${data.customerName||''}"></div>
      <div class="fgroup"><label class="req">نوع الحساب</label>
        <select class="fc" id="f_type">
          <option value="Customer" ${data.customerType==='Customer'?'selected':''}>عميل</option>
          <option value="Supplier" ${data.customerType==='Supplier'?'selected':''}>منفذ</option>
        </select>
      </div>
      <div class="fgroup"><label class="req">نوع النشاط</label>
        <select class="fc" id="f_cat">
          <option value="">-- اختر --</option>
          ${CATEGORIES.map(c=>`<option value="${c}" ${data.category===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="fgroup"><label>المركز/الشركة</label><input type="text" class="fc" id="f_parent" value="${data.parentCenter||''}"></div>
      <div class="fgroup"><label>شخص التواصل</label><input type="text" class="fc" id="f_contact" value="${data.contactPerson||''}"></div>
      <div class="fgroup"><label>الهاتف</label><input type="tel" class="fc" id="f_phone" value="${data.phone||''}"></div>
      <div class="fgroup"><label>البريد الإلكتروني</label><input type="email" class="fc" id="f_email" value="${data.email||''}"></div>
      <div class="fgroup"><label>العنوان</label><input type="text" class="fc" id="f_address" value="${data.address||''}"></div>
      <div class="fgroup"><label class="req">تاريخ البداية</label><input type="date" class="fc" id="f_start" value="${data.startDate||''}"></div>
      <div class="fgroup"><label class="req">تاريخ النهاية</label><input type="date" class="fc" id="f_end" value="${data.endDate||''}"></div>
      <div class="fgroup"><label>شروط الدفع</label><input type="text" class="fc" id="f_terms" value="${data.paymentTerms||''}"></div>
      <div class="fgroup"><label>الحالة</label>
        <select class="fc" id="f_status">
          <option value="true" ${data.status!==false?'selected':''}>نشط</option>
          <option value="false" ${data.status===false?'selected':''}>متوقف</option>
        </select>
      </div>
      <div class="fgroup" style="grid-column:1/-1"><label>ملاحظات</label><textarea class="fc" id="f_notes" rows="2">${data.notes||''}</textarea></div>
    </div>`;

  document.getElementById('formFooter').innerHTML = `
    <button class="btn btn-navy" onclick="goStep2()">التالي ← الرحلات والأسعار</button>
    <button class="btn btn-gray" onclick="closeModal()">إلغاء</button>`;
}

// ── الانتقال للخطوة 2 ──
async function goStep2() {
  const name  = document.getElementById('f_name')?.value.trim();
  const type  = document.getElementById('f_type')?.value;
  const cat   = document.getElementById('f_cat')?.value;
  const start = document.getElementById('f_start')?.value;
  const end   = document.getElementById('f_end')?.value;
  if (!name)  { showAlert('أدخل اسم العميل/المنفذ','⚠️'); return; }
  if (!cat)   { showAlert('اختر نوع النشاط','⚠️'); return; }
  if (!start) { showAlert('أدخل تاريخ البداية','⚠️'); return; }
  if (!end)   { showAlert('أدخل تاريخ النهاية','⚠️'); return; }
  if (end < start) { showAlert('تاريخ النهاية يجب أن يكون بعد تاريخ البداية','⚠️'); return; }

  // تحميل الرحلات
  document.getElementById('formContent').innerHTML = '<div class="loader"><div class="spinner"></div>جاري تحميل الرحلات...</div>';
  document.getElementById('formFooter').innerHTML = '';

  try {
    if (cat !== 'Submarine') {
      const res = await gas('getTripsByCategory', { category: cat });
      tripsForCategory = Array.isArray(res) ? res : [];
    }
  } catch(e) { tripsForCategory = []; }

  setStepUI(2);
  renderStep2(cat);
}

// ── الخطوة 2: الرحلات والأسعار ──
function renderStep2(cat) {
  const isSubmarine = (cat === 'Submarine');

  let html = '';

  if (isSubmarine) {
    // ── أسعار Submarine ──
    html = `
      <div class="sec-title">🚢 أسعار رحلات Submarine</div>
      <div style="overflow-x:auto;">
        <table class="sub-price-table">
          <thead><tr><th>الفئة</th><th>PAX</th><th>CHILD</th><th>INF</th><th>العملة</th></tr></thead>
          <tbody>
            ${['F','Aarab','Arab48','EGY'].map(cat => `
              <tr>
                <td><strong>${cat}</strong></td>
                <td><input type="number" id="sp_${cat}_PAX" placeholder="0" min="0"></td>
                <td><input type="number" id="sp_${cat}_CHILD" placeholder="0" min="0"></td>
                <td><input type="number" id="sp_${cat}_INF" placeholder="0" min="0"></td>
                <td><select id="sc_${cat}">
                  <option value="USD">USD $</option>
                  <option value="EUR">EUR €</option>
                  <option value="GBP">GBP £</option>
                  <option value="LE">LE ج</option>
                </select></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  } else {
    // ── اختيار الرحلات ──
    html = `
      <div class="sec-title">📋 اختر الرحلات المخصصة لهذا الحساب</div>
      <div class="trips-box" id="tripsBox">
        ${tripsForCategory.length ?
          tripsForCategory.map(t => `
            <div class="trip-item" id="ti_${safeid(t)}" onclick="toggleTrip(this,'${esc(t)}')">
              <input type="checkbox" id="tc_${safeid(t)}" value="${esc(t)}">
              <label for="tc_${safeid(t)}">${esc(t)}</label>
            </div>`).join('') :
          '<div style="padding:20px;color:#94a3b8;text-align:center;">لا توجد رحلات لهذا النشاط</div>'
        }
      </div>
      <div class="sec-title" id="priceTitle" style="display:none">💰 أسعار البنود (لكل عميل)</div>
      <div id="priceArea"></div>`;
  }

  document.getElementById('formContent').innerHTML = html;
  document.getElementById('formFooter').innerHTML = `
    <button class="btn btn-green" id="saveBtn" onclick="doSave()">💾 حفظ وإنشاء الشيت</button>
    <button class="btn btn-gray" onclick="goBackStep1()">← رجوع</button>
    <button class="btn btn-gray" onclick="closeModal()">إلغاء</button>`;

  // إذا كان تعديل وكان هناك رحلات مسبقة
  if (!isSubmarine && isEdit && selectedAccount?.assignedTrips) {
    const prev = selectedAccount.assignedTrips.split('|').filter(Boolean);
    prev.forEach(t => {
      const el = document.getElementById(`ti_${safeid(t)}`);
      if (el) {
        el.classList.add('checked');
        const cb = el.querySelector('input[type=checkbox]');
        if (cb) cb.checked = true;
      }
    });
    loadPriceInputs();
  }
}

function goBackStep1() {
  const data = isEdit ? selectedAccount : {};
  // حفظ القيم المدخلة
  renderStep1(data);
  // استعادة القيم
  if (document.getElementById('f_name')) {
    document.getElementById('f_name').value = isEdit ? (selectedAccount?.customerName || '') : (document.getElementById('f_name')?.value || '');
  }
}

function safeid(s) { return (s||'').replace(/[^a-zA-Z0-9]/g,'_'); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── تفعيل/إلغاء رحلة ──
async function toggleTrip(el, tripName) {
  el.classList.toggle('checked');
  const cb = el.querySelector('input[type=checkbox]');
  if (cb) cb.checked = el.classList.contains('checked');

  // جلب بنود الرحلة إن لم تكن محملة
  if (el.classList.contains('checked') && !tripItems[tripName]) {
    try {
      const res = await gas('getTripItemsByName', { tripName });
      tripItems[tripName] = Array.isArray(res) ? res : [];
    } catch(e) { tripItems[tripName] = []; }
  }

  loadPriceInputs();
}

// ── تحديث حقول الأسعار ──
function loadPriceInputs() {
  const checked = [];
  document.querySelectorAll('#tripsBox input[type=checkbox]:checked').forEach(cb => {
    checked.push(cb.value);
  });

  const priceTitle = document.getElementById('priceTitle');
  const priceArea  = document.getElementById('priceArea');
  if (!priceArea) return;

  if (checked.length === 0) {
    if (priceTitle) priceTitle.style.display = 'none';
    priceArea.innerHTML = '';
    return;
  }

  if (priceTitle) priceTitle.style.display = 'flex';

  let html = '<div class="trip-price-grid">';
  for (const tripName of checked) {
    const items = tripItems[tripName] || [];
    for (const item of items) {
      const key = safeid(tripName + '_' + item);
      html += `
        <div class="price-item">
          <div class="pi-trip">${tripName}</div>
          <div class="pi-label">${item}</div>
          <div class="pi-row">
            <input type="number" id="pp_${key}" placeholder="0" min="0">
            <select id="pc_${key}">
              <option value="USD">USD $</option>
              <option value="EUR">EUR €</option>
              <option value="GBP">GBP £</option>
              <option value="LE">LE ج</option>
            </select>
          </div>
        </div>`;
    }
  }
  html += '</div>';
  priceArea.innerHTML = html;
}

// ── جمع البيانات وحفظها ──
async function doSave() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '⏳ جاري الحفظ والإنشاء...';

  try {
    const cat = document.getElementById('f_cat')?.value ||
                (isEdit ? selectedAccount?.category : '');
    const isSubmarine = (cat === 'Submarine');

    // جمع البيانات الأساسية
    const formData = {
      customerName:  document.getElementById('f_name')?.value?.trim() || '',
      customerType:  document.getElementById('f_type')?.value || 'Supplier',
      category:      cat,
      parentCenter:  document.getElementById('f_parent')?.value?.trim() || '',
      contactPerson: document.getElementById('f_contact')?.value?.trim() || '',
      phone:         document.getElementById('f_phone')?.value?.trim() || '',
      email:         document.getElementById('f_email')?.value?.trim() || '',
      address:       document.getElementById('f_address')?.value?.trim() || '',
      startDate:     document.getElementById('f_start')?.value || '',
      endDate:       document.getElementById('f_end')?.value || '',
      paymentTerms:  document.getElementById('f_terms')?.value?.trim() || '',
      status:        document.getElementById('f_status')?.value === 'true',
      notes:         document.getElementById('f_notes')?.value?.trim() || '',
    };

    // ── جمع الرحلات والأسعار ──
    let assignedTrips = [];
    let pricesData = {};

    if (isSubmarine) {
      // أسعار Submarine
      ['F','Aarab','Arab48','EGY'].forEach(c => {
        pricesData['Submarine_' + c] = {
          PAX:   parseFloat(document.getElementById(`sp_${c}_PAX`)?.value) || 0,
          CHILD: parseFloat(document.getElementById(`sp_${c}_CHILD`)?.value) || 0,
          INF:   parseFloat(document.getElementById(`sp_${c}_INF`)?.value) || 0,
          currency: document.getElementById(`sc_${c}`)?.value || 'USD'
        };
      });
      // تحقق من وجود أسعار
      const hasPrice = Object.values(pricesData).some(p => p.PAX > 0 || p.CHILD > 0 || p.INF > 0);
      if (!hasPrice) {
        showAlert('أدخل أسعار Submarine أولاً','⚠️');
        btn.disabled = false; btn.textContent = '💾 حفظ وإنشاء الشيت';
        return;
      }
    } else {
      // رحلات عادية
      document.querySelectorAll('#tripsBox input[type=checkbox]:checked').forEach(cb => {
        assignedTrips.push(cb.value);
      });
      if (assignedTrips.length === 0) {
        showAlert('اختر رحلة واحدة على الأقل','⚠️');
        btn.disabled = false; btn.textContent = '💾 حفظ وإنشاء الشيت';
        return;
      }
      // أسعار البنود
      for (const tripName of assignedTrips) {
        const items = tripItems[tripName] || [];
        for (const item of items) {
          const key = safeid(tripName + '_' + item);
          const price = parseFloat(document.getElementById(`pp_${key}`)?.value) || 0;
          const currency = document.getElementById(`pc_${key}`)?.value || 'USD';
          if (price > 0) {
            pricesData[tripName + '_' + item] = { price, currency };
          }
        }
      }
    }

    formData.assignedTrips = assignedTrips;
    formData.pricesData = JSON.stringify(pricesData);

    let result;
    if (isEdit && selectedAccount) {
      formData.customerId = selectedAccount.customerId;
      result = await gasPost({ action: 'updateSupplierCustomer', ...formData });
    } else {
      result = await gasPost({ action: 'addSupplierCustomer', ...formData });
    }

    btn.disabled = false;
    btn.textContent = '💾 حفظ وإنشاء الشيت';

    if (result?.success) {
      closeModal();
      await loadAccounts();
      const extra = result.sheetName ? `\nتم إنشاء الشيت: ${result.sheetName}` : '';
      showAlert('✅ تم الحفظ بنجاح' + extra + (result.days ? `\nعدد الأيام: ${result.days}` : ''), '✅');
    } else {
      showAlert('❌ ' + (result?.message || 'فشل الحفظ'), '❌');
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '💾 حفظ وإنشاء الشيت';
    showAlert('❌ خطأ: ' + e.message, '❌');
  }
}

// ── حذف ──
async function doDelete() {
  if (!selectedAccount) return;
  showAlert(
    `⚠️ هل تريد حذف حساب ${selectedAccount.customerName}؟\nسيتم حذف الشيت الخاص به أيضاً.`,
    '⚠️',
    `<button class="btn btn-red" onclick="confirmDelete()">حذف نهائي</button>
     <button class="btn btn-gray" onclick="closeAlert()">إلغاء</button>`
  );
}

async function confirmDelete() {
  closeAlert();
  try {
    const res = await gasPost({ action: 'deleteSupplierCustomer', customerId: selectedAccount.customerId });
    if (res?.success) {
      selectedAccount = null;
      await loadAccounts();
      showAlert('✅ تم الحذف بنجاح', '✅');
    } else {
      showAlert('❌ ' + (res?.message || 'فشل الحذف'), '❌');
    }
  } catch(e) { showAlert('❌ خطأ: ' + e.message, '❌'); }
}

// ── expose globals ──
window.goBack=goBack; window.openAdd=openAdd; window.openEdit=openEdit;
window.selectRow=selectRow; window.renderTable=renderTable; window.closeModal=closeModal;
window.closeAlert=closeAlert; window.goStep2=goStep2; window.goBackStep1=goBackStep1;
window.toggleTrip=toggleTrip; window.doSave=doSave; window.doDelete=doDelete;
window.confirmDelete=confirmDelete; window.loadPriceInputs=loadPriceInputs;
</script>
