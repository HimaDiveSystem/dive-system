<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>إدارة العملاء والمنفذين</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0f1f3d;--navy2:#1a3260;--gold:#f5c842;
      --blue:#2563eb;--green:#16a34a;--red:#dc2626;--orange:#ea580c;
      --bg:#f0f4f8;--card:#fff;--border:#dde4f0;--text:#1a2540;--text-lt:#5a6a8a;
      --radius:16px;--radius-sm:10px;--shadow:0 4px 24px rgba(15,31,61,.10);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    .header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;padding:13px 22px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(15,31,61,.25);}
    .header h2{color:var(--gold);font-size:18px;font-weight:900;}
    .header-right{display:flex;align-items:center;gap:8px;}
    .user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:40px;padding:4px 13px;color:white;font-size:12px;font-weight:600;}
    .back-btn{background:transparent;border:2px solid rgba(255,255,255,.3);color:white;padding:4px 13px;border-radius:40px;cursor:pointer;font-weight:700;font-size:12px;font-family:'Cairo',sans-serif;transition:all .2s;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}

    .page{max-width:1400px;margin:0 auto;padding:20px 16px 50px;}
    .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden;}
    .card-head{padding:12px 18px;background:linear-gradient(90deg,var(--navy),var(--navy2));display:flex;align-items:center;gap:8px;}
    .card-head h3{color:var(--gold);font-size:14px;font-weight:800;}
    .ch-icon{background:rgba(245,200,66,.2);border-radius:7px;padding:3px 6px;font-size:13px;}
    .card-body{padding:16px;}

    .table-wrap{overflow-x:auto;}
    .data-table{width:100%;border-collapse:collapse;font-size:13px;}
    .data-table thead th{background:#f0f4f8;color:var(--text-lt);padding:10px 12px;font-weight:700;text-align:right;border-bottom:2px solid var(--border);white-space:nowrap;}
    .data-table tbody td{padding:8px 12px;border-bottom:1px solid #f0f4f8;white-space:nowrap;}
    .data-table tbody tr:hover{background:#f8faff;cursor:pointer;}
    .data-table tbody tr.sel{background:#e6f0ff !important;}
    .badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;}
    .badge-green{background:#dcfce7;color:#166534;}
    .badge-red{background:#fee2e2;color:#991b1b;}
    .badge-blue{background:#dbeafe;color:#1e40af;}
    .badge-orange{background:#ffedd5;color:#9a3412;}

    .fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:14px;}
    .fgroup{display:flex;flex-direction:column;gap:5px;}
    .fgroup label{font-size:11px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px;}
    .fgroup label.req::after{content:' *';color:var(--red);}
    .fc{padding:8px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Cairo',sans-serif;color:var(--text);background:#fafbfd;width:100%;height:40px;transition:border-color .2s;}
    .fc:focus{border-color:var(--blue);outline:none;background:white;}
    select.fc{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='13' height='13' viewBox='0 0 24 24' fill='none' stroke='%235a6a8a' stroke-width='2.5'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:left 10px center;padding-left:30px;}
    textarea.fc{height:auto;resize:vertical;}

    .trips-box{border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;background:white;max-height:220px;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;}
    .trip-item{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:8px;cursor:pointer;transition:background .15s;}
    .trip-item:hover{background:#f0f4ff;}
    .trip-item input{width:16px;height:16px;cursor:pointer;flex-shrink:0;}
    .trip-item label{font-size:13px;font-weight:500;cursor:pointer;color:var(--text);}
    .trip-item.checked{background:#e6f0ff;}

    .sub-price-table{width:100%;border-collapse:collapse;font-size:13px;}
    .sub-price-table th,.sub-price-table td{border:1px solid var(--border);padding:8px 10px;text-align:center;}
    .sub-price-table th{background:var(--navy);color:var(--gold);font-weight:700;}
    .sub-price-table input{width:80px;text-align:center;border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:13px;font-family:'Cairo',sans-serif;}
    .sub-price-table select{width:80px;border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:12px;}

    .trip-price-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:10px;}
    .price-item{background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
    .price-item .pi-label{font-size:11px;font-weight:700;color:var(--text-lt);text-transform:uppercase;margin-bottom:6px;}
    .price-item .pi-trip{font-size:10px;color:#94a3b8;margin-bottom:4px;font-style:italic;}
    .price-item .pi-row{display:flex;gap:5px;}
    .price-item .pi-row input{flex:2;min-width:70px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;text-align:center;}
    .price-item .pi-row select{flex:1;border:1px solid var(--border);border-radius:6px;font-size:12px;padding:4px;}

    .action-btns{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
    .btn{padding:8px 20px;border:none;border-radius:40px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .2s;}
    .btn:hover{transform:translateY(-1px);}
    .btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
    .btn-navy{background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);}
    .btn-green{background:var(--green);color:white;}
    .btn-red{background:var(--red);color:white;}
    .btn-gray{background:#f1f5f9;color:var(--text);}
    .btn-orange{background:var(--orange);color:white;}

    .search-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
    .search-in{flex:1;min-width:200px;padding:8px 14px;border:2px solid var(--border);border-radius:40px;font-size:13px;font-family:'Cairo',sans-serif;}
    .filter-sel{padding:8px 12px;border:2px solid var(--border);border-radius:40px;font-size:13px;background:white;min-width:130px;}

    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px);}
    .modal.open{display:flex;}
    .modal-box{background:white;width:92%;max-width:900px;max-height:88vh;overflow-y:auto;border-radius:22px;padding:24px;box-shadow:0 25px 50px rgba(0,0,0,.3);animation:pop .25s ease;}
    .modal-title{color:var(--navy);font-size:16px;font-weight:900;margin-bottom:20px;text-align:center;border-bottom:2px solid var(--border);padding-bottom:12px;}
    .modal-footer{display:flex;gap:10px;justify-content:center;margin-top:20px;border-top:2px solid var(--border);padding-top:16px;}
    @keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}

    .alert-box{background:white;width:88%;max-width:420px;border-radius:22px;padding:26px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.25);animation:pop .25s ease;}
    .alert-icon{font-size:40px;margin-bottom:10px;}
    .alert-msg{color:var(--navy);font-size:14px;font-weight:700;margin-bottom:18px;white-space:pre-wrap;}

    .sec-title{font-size:13px;font-weight:800;color:var(--navy);margin:16px 0 8px;display:flex;align-items:center;gap:6px;border-right:3px solid var(--gold);padding-right:8px;}

    .loader{text-align:center;padding:40px;color:var(--text-lt);}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .no-data{text-align:center;padding:40px;color:var(--text-lt);}

    .step-indicator{display:flex;gap:8px;margin-bottom:20px;justify-content:center;}
    .step{padding:5px 16px;border-radius:20px;font-size:12px;font-weight:700;background:#f0f4f8;color:var(--text-lt);}
    .step.active{background:var(--navy);color:var(--gold);}
    .step.done{background:#dcfce7;color:#166534;}

    @media(max-width:640px){
      .fgrid{grid-template-columns:1fr;}
      .trip-price-grid{grid-template-columns:1fr;}
      .sub-price-table input,.sub-price-table select{width:65px;font-size:11px;}
    }
  </style>
</head>
<body>

<div class="header">
  <h2>🏢 إدارة العملاء والمنفذين</h2>
  <div class="header-right">
    <span class="user-chip" id="userChip">...</span>
    <button class="back-btn" onclick="goBack()">← العودة</button>
  </div>
</div>

<div class="page">
  <div id="mainContent"><div class="loader"><div class="spinner"></div>جاري التحميل...</div></div>
</div>

<!-- Modal الإضافة/التعديل -->
<div id="formModal" class="modal">
  <div class="modal-box">
    <div class="modal-title" id="formTitle">➕ إضافة حساب جديد</div>
    <div id="stepBar" class="step-indicator">
      <div class="step active" id="step1Ind">1. بيانات الحساب</div>
      <div class="step" id="step2Ind">2. الرحلات والأسعار</div>
    </div>
    <div id="formContent"></div>
    <div class="modal-footer" id="formFooter"></div>
  </div>
</div>

<!-- Alert Modal -->
<div id="alertModal" class="modal">
  <div class="alert-box">
    <div class="alert-icon" id="alertIcon">ℹ️</div>
    <div class="alert-msg" id="alertMsg"></div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:16px;" id="alertBtns">
      <button class="btn btn-navy" onclick="closeAlert()">موافق</button>
    </div>
  </div>
</div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbwe1Q9pjAJRk9CfWsK5YGjD5uVAbJkMhAVgw6akKkFIR9sz15V78C88Vs5dumKE-SwF/exec';
const DASH = {Admin:'Dashboard.html',Owner:'OwnerDashboard.html',Sales:'SalesDashboard.html',Accountant:'AccountantDashboard.html',Customer:'CustomerDashboard.html'};

let currentUser = null;
let allAccounts = [];
let selectedAccount = null;
let isEdit = false;
let formStep = 1;
let tripItems = {};
let tripsForCategory = [];
let _currentCategory = '';
let _editSheetDates = null;
let _formStep1Data = {};

// ====================== دوال الاتصال ======================
function gas(action, params = {}) {
  return new Promise((resolve, reject) => {
    const callbackName = 'jsonp_callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    const url = new URL(GAS);
    url.searchParams.set('action', action);
    url.searchParams.set('callback', callbackName);
    url.searchParams.set('_t', Date.now());
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v ?? '')));
    
    window[callbackName] = function(data) {
      delete window[callbackName];
      if (document.body.contains(script)) {
        document.body.removeChild(script);
      }
      resolve(data);
    };
    
    const script = document.createElement('script');
    script.src = url.toString();
    script.onerror = () => {
      delete window[callbackName];
      if (document.body.contains(script)) {
        document.body.removeChild(script);
      }
      reject(new Error('فشل الاتصال بالخادم'));
    };
    document.body.appendChild(script);
    
    setTimeout(() => {
      if (window[callbackName]) {
        delete window[callbackName];
        if (document.body.contains(script)) {
          document.body.removeChild(script);
        }
        reject(new Error('انتهى وقت الاتصال'));
      }
    }, 30000);
  });
}

async function gasPost(data) {
  const params = {};
  for (const [key, value] of Object.entries(data)) {
    if (value !== undefined && value !== null) {
      params[key] = typeof value === 'object' ? JSON.stringify(value) : String(value);
    }
  }
  return gas(data.action, params);
}

// ====================== دوال مساعدة ======================
function goBack() { 
  location.href = DASH[currentUser?.type] || 'Dashboard.html'; 
}

function showAlert(msg, icon, btns) {
  document.getElementById('alertIcon').textContent = icon || 'ℹ️';
  document.getElementById('alertMsg').textContent = msg;
  document.getElementById('alertBtns').innerHTML = btns || '<button class="btn btn-navy" onclick="closeAlert()">موافق</button>';
  document.getElementById('alertModal').classList.add('open');
}

function closeAlert() { 
  document.getElementById('alertModal').classList.remove('open'); 
}

function safeid(s) { 
  return (s||'').replace(/[^a-zA-Z0-9]/g,'_'); 
}

function esc(s) { 
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); 
}

function setStepUI(step) {
  formStep = step;
  ['step1Ind','step2Ind'].forEach((id, i) => {
    const el = document.getElementById(id);
    if (el) {
      el.className = 'step' + (i+1 < step ? ' done' : '') + (i+1 === step ? ' active' : '');
    }
  });
}

function closeModal() {
  document.getElementById('formModal').classList.remove('open');
}

function formatDateForInput(dateStr) {
  if (!dateStr) return '';
  try {
    if (dateStr.match(/^\d{4}-\d{2}-\d{2}/)) {
      return dateStr.split('T')[0];
    }
    const match = dateStr.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{4})$/);
    if (match) {
      const months = {Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
      return `${match[3]}-${months[match[2]]}-${match[1].padStart(2,'0')}`;
    }
    return '';
  } catch(e) {
    return '';
  }
}

function formatDateDisplay(v) {
  if (!v) return '-';
  const s = v.toString().trim();
  if (s.match(/^\d{1,2}\/[A-Za-z]{3}\/\d{4}$/)) return s;
  try { const d=new Date(s); if(!isNaN(d)){const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return String(d.getDate()).padStart(2,'0')+'/'+MN[d.getMonth()]+'/'+d.getFullYear();} } catch(e){}
  return s;
}

// توليد إيميل تلقائي
function generateAutoEmail(name) {
  if (!name) return '';
  const cleanName = name.trim().toLowerCase().replace(/\s+/g, '.');
  return `${cleanName}@system.com`;
}

// إظهار/إخفاء حقول تسجيل الدخول
function toggleSystemAccess(show) {
  const loginFields = document.getElementById('loginFields');
  if (loginFields) {
    loginFields.style.display = show ? 'block' : 'none';
  }
  if (show && document.getElementById('f_loginEmail') && document.getElementById('f_name')) {
    const name = document.getElementById('f_name').value.trim();
    if (name && !document.getElementById('f_loginEmail').value) {
      document.getElementById('f_loginEmail').value = generateAutoEmail(name);
    }
  }
}

// تبديل إظهار كلمة المرور
function togglePasswordVisibility() {
  const pwdField = document.getElementById('f_loginPassword');
  const icon = document.getElementById('togglePwdIcon');
  if (pwdField.type === 'password') {
    pwdField.type = 'text';
    icon.textContent = '🔒';
  } else {
    pwdField.type = 'password';
    icon.textContent = '👁️';
  }
}

// تحديث الإيميل تلقائياً عند تغيير الاسم
function updateAutoEmail() {
  const name = document.getElementById('f_name')?.value.trim();
  const emailField = document.getElementById('f_loginEmail');
  const systemAccessCheck = document.getElementById('f_hasSystemAccess');
  if (name && systemAccessCheck && systemAccessCheck.checked && emailField && !emailField.value) {
    emailField.value = generateAutoEmail(name);
  }
}

// ====================== جلب بيانات الرحلات ======================
async function fetchTripItems(tripName) {
  if (tripItems[tripName] && tripItems[tripName].length > 0) {
    return tripItems[tripName];
  }
  try {
    const res = await gas('getTripDefinition', { tripName: tripName });
    const items = Array.isArray(res?.items) ? res.items.filter(Boolean) : [];
    tripItems[tripName] = items;
    return items;
  } catch(e) {
    console.error('fetchTripItems error:', e);
    tripItems[tripName] = [];
    return [];
  }
}

// ====================== عرض الجدول ======================
async function loadAccounts() {
  try {
    const res = await gas('getAllSuppliersCustomers');
    allAccounts = Array.isArray(res) ? res : [];
    renderTable();
  } catch(e) {
    console.error('loadAccounts error:', e);
    allAccounts = [];
    renderTable();
    showAlert('فشل تحميل البيانات: ' + e.message, '❌');
  }
}

function renderTable() {
  const search = (document.getElementById('searchIn')?.value || '').toLowerCase();
  const typeF = document.getElementById('typeF')?.value || '';
  const catF  = document.getElementById('catF')?.value || '';

  const filtered = allAccounts.filter(a => {
    if (search && !(a.customerName||'').toLowerCase().includes(search)) return false;
    if (typeF && a.customerType !== typeF) return false;
    if (catF  && a.category !== catF) return false;
    return true;
  });

  const cats = [...new Set(allAccounts.map(a => a.category).filter(Boolean))].sort();

  document.getElementById('mainContent').innerHTML = `
    <div class="card">
      <div class="card-head"><span class="ch-icon">🔍</span><h3>بحث وتصفية</h3></div>
      <div class="card-body">
        <div class="search-bar">
          <input type="text" id="searchIn" class="search-in" placeholder="بحث بالاسم..." oninput="renderTable()" value="${search.replace(/"/g, '&quot;')}">
          <select id="typeF" class="filter-sel" onchange="renderTable()">
            <option value="">كل الأنواع</option>
            <option value="Customer" ${typeF==='Customer'?'selected':''}>عملاء</option>
            <option value="Supplier" ${typeF==='Supplier'?'selected':''}>منفذين</option>
          </select>
          <select id="catF" class="filter-sel" onchange="renderTable()">
            <option value="">كل الأنشطة</option>
            ${cats.map(c=>`<option value="${c}" ${catF===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><span class="ch-icon">📋</span><h3>قائمة الحسابات (${filtered.length})</h3></div>
      <div class="card-body">
        <div class="action-btns">
          <button class="btn btn-navy" onclick="openAdd()">➕ إضافة حساب</button>
          <button class="btn btn-green" id="editBtn" onclick="openEdit()" ${!selectedAccount?'disabled':''}>✏️ تعديل</button>
          <button class="btn btn-red" id="delBtn" onclick="doDelete()" ${!selectedAccount?'disabled':''}>🗑️ حذف</button>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><th>المعرف</th><th>الاسم</th><th>النوع</th><th>النشاط</th><th>التواصل</th><th>الهاتف</th><th>البداية</th><th>النهاية</th><th>الحالة</th></thead>
            <tbody>
              ${filtered.length ? filtered.map(a => `
                <tr class="${selectedAccount?.customerId===a.customerId?'sel':''}" onclick="selectRow('${a.customerId}')">
                  <td>${a.customerId||''}                  
                  <td><strong>${(a.customerName||'').replace(/</g,'&lt;')}</strong>                  
                  <td><span class="badge ${a.customerType==='Customer'?'badge-blue':'badge-orange'}">${a.customerType==='Customer'?'عميل':'منفذ'}</span>                  
                  <td>${a.category||'-'}                  
                  <td>${a.contactPerson||'-'}                  
                  <td>${a.phone||'-'}                  
                  <td>${formatDateDisplay(a.startDate)||'-'}                  
                  <td>${formatDateDisplay(a.endDate)||'-'}                  
                  <td><span class="badge ${a.status?'badge-green':'badge-red'}">${a.status?'نشط':'متوقف'}</span>                  
                 </tr>`).join('') : `<tr><td colspan="9" class="no-data">لا توجد بيانات</td></tr>`}
            </tbody>
           </table>
        </div>
      </div>
    </div>`;
}

function selectRow(id) {
  selectedAccount = allAccounts.find(a => a.customerId === id) || null;
  renderTable();
}

// ====================== الخطوة 1: البيانات الأساسية ======================
function renderStep1(data) {
  setStepUI(1);
  const CATEGORIES = ['Submarine','Safari','Water Sports','Diving','Tourism Company','Excursions'];
  const startDate = formatDateForInput(data._sheetFirstDateISO || data.startDate || '');
  const endDate = formatDateForInput(data._sheetLastDateISO || data.endDate || '');
  const isCustomer = data.customerType === 'Customer';
  const hasSystemAccess = data.hasSystemAccess === true || data.hasSystemAccess === 'true';
  const loginEmail = data.loginEmail || (isCustomer && data.customerName ? generateAutoEmail(data.customerName) : '');
  const loginPassword = data.loginPassword || '';

  document.getElementById('formContent').innerHTML = `
    <div class="fgrid">
      <div class="fgroup"><label class="req">اسم العميل/المنفذ</label><input type="text" class="fc" id="f_name" value="${(data.customerName||'').replace(/"/g, '&quot;')}" oninput="updateAutoEmail()"></div>
      <div class="fgroup"><label class="req">نوع الحساب</label>
        <select class="fc" id="f_type" onchange="toggleSystemAccess(this.value === 'Customer' && document.getElementById('f_hasSystemAccess')?.checked)">

        </select>
      </div>
      <div class="fgroup"><label class="req">نوع النشاط</label>
        <select class="fc" id="f_cat">
          <option value="">-- اختر --</option>
          ${CATEGORIES.map(c=>`<option value="${c}" ${data.category===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="fgroup"><label>المركز/الشركة</label><input type="text" class="fc" id="f_parent" value="${(data.parentCenter||'').replace(/"/g, '&quot;')}"></div>
      <div class="fgroup"><label>شخص التواصل</label><input type="text" class="fc" id="f_contact" value="${(data.contactPerson||'').replace(/"/g, '&quot;')}"></div>
      <div class="fgroup"><label>الهاتف</label><input type="tel" class="fc" id="f_phone" value="${(data.phone||'').replace(/"/g, '&quot;')}"></div>
      <div class="fgroup"><label>البريد الإلكتروني</label><input type="email" class="fc" id="f_email" value="${(data.email||'').replace(/"/g, '&quot;')}"></div>
      <div class="fgroup"><label>العنوان</label><input type="text" class="fc" id="f_address" value="${(data.address||'').replace(/"/g, '&quot;')}"></div>
      <div class="fgroup"><label class="req">تاريخ البداية ${isEdit ? '<span style="font-size:10px;color:#7c3aed">(بداية تحديث الأسعار)</span>' : ''}</label>
        <input type="date" class="fc" id="f_start" value="${startDate}">
      </div>
      <div class="fgroup"><label class="req">تاريخ النهاية ${isEdit ? '<span style="font-size:10px;color:#7c3aed">(نهاية تحديث الأسعار)</span>' : ''}</label>
        <input type="date" class="fc" id="f_end" value="${endDate}">
      </div>
      <div class="fgroup"><label>شروط الدفع</label><input type="text" class="fc" id="f_terms" value="${(data.paymentTerms||'').replace(/"/g, '&quot;')}"></div>
      <div class="fgroup"><label>الحالة</label>
        <select class="fc" id="f_status">
          <option value="true" ${data.status!==false?'selected':''}>نشط</option>
          <option value="false" ${data.status===false?'selected':''}>متوقف</option>
        </select>
      </div>`;

  if (data.customerType === 'Customer' || !data.customerType) {
    document.getElementById('formContent').innerHTML += `
      <div class="fgroup" style="grid-column:1/-1">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="f_hasSystemAccess" onchange="toggleSystemAccess(this.checked)" ${hasSystemAccess ? 'checked' : ''}>
          <span style="font-size:13px;">🔐 منح العميل صلاحية الدخول للنظام</span>
        </label>
      </div>`;
  }

  document.getElementById('formContent').innerHTML += `
    <div class="fgroup" style="grid-column:1/-1"><label>ملاحظات</label><textarea class="fc" id="f_notes" rows="2">${(data.notes||'').replace(/</g,'&lt;')}</textarea></div>
    <div id="loginFields" class="login-fields" style="grid-column:1/-1; display: ${hasSystemAccess && isCustomer ? 'block' : 'none'}">
      <div style="margin-bottom:12px;"><strong>🔐 بيانات تسجيل الدخول</strong></div>
      <div class="fgrid">
        <div class="fgroup"><label>البريد الإلكتروني</label><input type="email" class="fc" id="f_loginEmail" value="${(loginEmail||'').replace(/"/g, '&quot;')}" placeholder="auto@system.com"></div>
        <div class="fgroup"><label>كلمة المرور</label>
          <div class="password-wrapper">
            <input type="password" class="fc" id="f_loginPassword" value="${(loginPassword||'').replace(/"/g, '&quot;')}" placeholder="أدخل كلمة المرور">
            <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">👁️</button>
          </div>
        </div>
      </div>
    </div>
  </div>`;

  const sheetInfoText = data._sheetInfo || '';
  const editHint = isEdit ? `<div id="editHintWrap" style="background:#f0fdf4;border:1px solid #16a34a;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#14532d;">
      <strong>✏️ وضع التعديل</strong><br>
      ${sheetInfoText ? `<span style="color:#15803d">${sheetInfoText}</span><br>` : ''}
      تاريخ البداية والنهاية يحددان <strong>نطاق تحديث الأسعار</strong> في شيت الحساب.<br>
      إذا كان تاريخ النهاية أكبر من آخر تاريخ في الشيت، سيتم إضافة أيام جديدة تلقائياً.
    </div>` : '';
  
  const existingEditHint = document.getElementById('editHintWrap');
  if (!existingEditHint && editHint) {
    const wrap = document.createElement('div');
    wrap.id = 'editHintWrap';
    wrap.innerHTML = editHint;
    document.getElementById('formContent').prepend(wrap);
  }

  document.getElementById('formFooter').innerHTML = `
    <button class="btn btn-navy" onclick="goStep2()">التالي ← الرحلات والأسعار</button>
    <button class="btn btn-gray" onclick="closeModal()">إلغاء</button>`;
}

function openAdd() {
  isEdit = false;
  selectedAccount = null;
  formStep = 1;
  tripItems = {};
  tripsForCategory = [];
  _currentCategory = '';
  _formStep1Data = {};
  document.getElementById('formTitle').textContent = '➕ إضافة حساب جديد';
  document.getElementById('formModal').classList.add('open');
  renderStep1({ customerType: 'Customer' });
}

async function openEdit() {
  if (!selectedAccount) return;
  isEdit = true;
  formStep = 1;
  tripItems = {};
  _editSheetDates = null;
  document.getElementById('formTitle').textContent = '✏️ تعديل حساب';
  document.getElementById('formModal').classList.add('open');

  document.getElementById('formContent').innerHTML = '<div class="loader"><div class="spinner"></div>جاري جلب بيانات الشيت...</div>';
  document.getElementById('formFooter').innerHTML = '';

  try {
    const datesRes = await gasPost({
      action: 'getAccountSheetDates',
      customerId: selectedAccount.customerId
    });
    console.log('نتيجة getAccountSheetDates:', datesRes);
    
    if (datesRes?.success) {
      _editSheetDates = datesRes;
      selectedAccount._sheetFirstDate = datesRes.firstDate;
      selectedAccount._sheetLastDate = datesRes.lastDate;
      selectedAccount._sheetFirstDateISO = datesRes.firstDateISO;
      selectedAccount._sheetLastDateISO = datesRes.lastDateISO;
      selectedAccount._sheetTotalDays = datesRes.totalDays;
      selectedAccount._sheetInfo = `📅 الشيت الحالي: ${datesRes.firstDate} → ${datesRes.lastDate} (${datesRes.totalDays} يوم)`;
    } else {
      selectedAccount._sheetInfo = '⚠️ لم يتم العثور على شيت للحساب';
    }
   
    const category = selectedAccount.category;
    if (category !== 'Submarine') {
      console.log('جلب الرحلات والبنود للأنشطة العادية...');
      const tripsRes = await gasPost({
        action: 'getExistingTripsAndPrices',
        customerId: selectedAccount.customerId
      });
      console.log('نتيجة getExistingTripsAndPrices:', tripsRes);
      
      if (tripsRes?.success && tripsRes.tripsData) {
        selectedAccount._existingTripsData = tripsRes.tripsData;
        selectedAccount._existingPricesData = tripsRes.pricesData || {};
        selectedAccount._existingTripsList = tripsRes.tripsData.map(t => t.name);
        
        for (const trip of tripsRes.tripsData) {
          if (!tripItems[trip.name]) {
            tripItems[trip.name] = trip.items;
          }
        }
        
        if (selectedAccount._existingTripsList.length > 0) {
          selectedAccount._sheetInfo += `<br>📋 الرحلات الموجودة: ${selectedAccount._existingTripsList.join(', ')}`;
        }
      } else {
        selectedAccount._existingTripsList = [];
        selectedAccount._existingPricesData = {};
      }
    }
    
    if (selectedAccount.loginEmail) {
      selectedAccount.hasSystemAccess = true;
      selectedAccount.loginEmail = selectedAccount.loginEmail;
      selectedAccount.loginPassword = selectedAccount.loginPassword || '';
    }
    
  } catch(e) {
    console.error('خطأ في openEdit:', e);
    selectedAccount._sheetInfo = '❌ فشل جلب بيانات الشيت: ' + e.message;
  }

  renderStep1(selectedAccount);
}

// ====================== الخطوة 2: الرحلات والأسعار ======================
async function goStep2() {
  const name  = document.getElementById('f_name')?.value.trim();
  const type  = document.getElementById('f_type')?.value;
  const cat   = document.getElementById('f_cat')?.value;
  const start = document.getElementById('f_start')?.value;
  const end   = document.getElementById('f_end')?.value;
  _currentCategory = cat;

  const hasSystemAccess = type === 'Customer' && document.getElementById('f_hasSystemAccess')?.checked === true;
  const loginEmail = hasSystemAccess ? (document.getElementById('f_loginEmail')?.value.trim() || generateAutoEmail(name)) : '';
  const loginPassword = hasSystemAccess ? (document.getElementById('f_loginPassword')?.value.trim() || '123456') : '';

  _formStep1Data = {
    customerName:  name || '',
    customerType:  type || 'Supplier',
    category:      cat,
    parentCenter:  document.getElementById('f_parent')?.value?.trim() || '',
    contactPerson: document.getElementById('f_contact')?.value?.trim()|| '',
    phone:         document.getElementById('f_phone')?.value?.trim()  || '',
    email:         document.getElementById('f_email')?.value?.trim()  || '',
    address:       document.getElementById('f_address')?.value?.trim()|| '',
    startDate:     start,
    endDate:       end,
    paymentTerms:  document.getElementById('f_terms')?.value?.trim()  || '',
    status:        document.getElementById('f_status')?.value         || 'true',
    notes:         document.getElementById('f_notes')?.value?.trim()  || '',
    hasSystemAccess: hasSystemAccess ? 'true' : 'false',
    loginEmail:    loginEmail,
    loginPassword: loginPassword,
  };
  
  if (!name)  { showAlert('أدخل اسم العميل/المنفذ','⚠️'); return; }
  if (!cat)   { showAlert('اختر نوع النشاط','⚠️'); return; }
  if (!start) { showAlert('أدخل تاريخ البداية','⚠️'); return; }
  if (!end)   { showAlert('أدخل تاريخ النهاية','⚠️'); return; }
  if (end < start) { showAlert('تاريخ النهاية يجب أن يكون بعد تاريخ البداية','⚠️'); return; }

  document.getElementById('formContent').innerHTML = '<div class="loader"><div class="spinner"></div>جاري تحميل الرحلات...</div>';
  document.getElementById('formFooter').innerHTML = '';

  try {
    if (cat !== 'Submarine') {
      const res = await gas('getTripsByCategory', { category: cat });
      tripsForCategory = Array.isArray(res) ? res : [];
    }
  } catch(e) { 
    tripsForCategory = []; 
  }

  setStepUI(2);
  renderStep2(cat);
}

function renderStep2(cat) {
  const isSubmarine = (cat === 'Submarine');

  let html = '';

  if (isSubmarine) {
    html = `
      <div class="sec-title">🚢 أسعار رحلات Submarine</div>
      <div style="overflow-x:auto;">
        <table class="sub-price-table">
          <thead><th>الفئة</th><th>PAX</th><th>CHILD</th><th>INF</th><th>العملة</th></thead>
          <tbody>
            ${['F','Aarab','Arab48','EGY'].map(c => `
              <tr>
                <td><strong>${c}</strong>                  
                  <td><input type="number" id="sp_${c}_PAX" placeholder="0" min="0" value="0">                  
                  <td><input type="number" id="sp_${c}_CHILD" placeholder="0" min="0" value="0">                  
                  <td><input type="number" id="sp_${c}_INF" placeholder="0" min="0" value="0">                  
                  <td><select id="sc_${c}">
                  <option value="USD">USD $</option>
                  <option value="EUR">EUR €</option>
                  <option value="GBP">GBP £</option>
                  <option value="LE">LE ج</option>
                </select>                  
                </tr>`).join('')}
          </tbody>
         </table>
      </div>`;
  } else {
    let availableTrips = [...tripsForCategory];
    let existingTripsList = [];
    if (isEdit && selectedAccount && selectedAccount._existingTripsList) {
      existingTripsList = selectedAccount._existingTripsList;
    } else if (isEdit && selectedAccount && selectedAccount.assignedTrips) {
      existingTripsList = selectedAccount.assignedTrips.split('|').filter(Boolean);
    }
    const allTrips = [...new Set([...availableTrips, ...existingTripsList])].sort();
    
    html = `
      <div class="sec-title">📋 اختر الرحلات المخصصة لهذا الحساب</div>
      <div class="trips-box" id="tripsBox">
        ${allTrips.length ? allTrips.map(t => `
          <div class="trip-item ${existingTripsList.includes(t) ? 'checked' : ''}" id="ti_${safeid(t)}">
            <input type="checkbox" id="tc_${safeid(t)}" value="${esc(t)}" ${existingTripsList.includes(t) ? 'checked' : ''} onchange="handleTripToggle(this,'${esc(t)}')">
            <label for="tc_${safeid(t)}" style="cursor:pointer">${esc(t)}</label>
          </div>`).join('') : '<div style="padding:20px;color:#94a3b8;text-align:center;">لا توجد رحلات لهذا النشاط</div>'}
      </div>
      <div class="sec-title" id="priceTitle" style="display:none">💰 أسعار البنود (لكل عميل)</div>
      <div id="priceArea"></div>`;
  }

  document.getElementById('formContent').innerHTML = html;
  document.getElementById('formFooter').innerHTML = `
    <button class="btn btn-green" id="saveBtn" onclick="doSave()">💾 ${isEdit ? 'تحديث البيانات' : 'حفظ وإنشاء الشيت'}</button>
    <button class="btn btn-gray" onclick="goBackStep1()">← رجوع</button>
    <button class="btn btn-gray" onclick="closeModal()">إلغاء</button>`;

  if (!isSubmarine && isEdit && selectedAccount) {
    let prevTrips = [];
    let savedPrices = {};
    
    if (selectedAccount._existingTripsList && selectedAccount._existingTripsList.length > 0) {
      prevTrips = selectedAccount._existingTripsList;
      savedPrices = selectedAccount._existingPricesData || {};
    } else if (selectedAccount.assignedTrips) {
      prevTrips = selectedAccount.assignedTrips.split('|').filter(Boolean);
      try {
        if (selectedAccount.pricesData) {
          savedPrices = JSON.parse(selectedAccount.pricesData);
        }
      } catch(e) {}
    }
    
    setTimeout(function() {
      for (const t of prevTrips) {
        const el = document.getElementById(`ti_${safeid(t)}`);
        if (el) {
          el.classList.add('checked');
          const cb = el.querySelector('input[type=checkbox]');
          if (cb) cb.checked = true;
        }
      }
      Promise.all(prevTrips.map(async function(tripName) {
        if (!tripItems[tripName]) {
          await fetchTripItems(tripName);
        }
      })).then(function() {
        return loadPriceInputsWithValues(prevTrips, savedPrices);
      }).catch(function(err) {
        console.error('خطأ في تحميل الأسعار:', err);
      });
    }, 200);
  }

  if (isSubmarine && isEdit && selectedAccount?.pricesData) {
    try {
      const savedPrices = JSON.parse(selectedAccount.pricesData);
      ['F','Aarab','Arab48','EGY'].forEach(c => {
        const p = savedPrices['Submarine_' + c];
        if (!p) return;
        const paxEl = document.getElementById(`sp_${c}_PAX`);
        const childEl = document.getElementById(`sp_${c}_CHILD`);
        const infEl = document.getElementById(`sp_${c}_INF`);
        const curEl = document.getElementById(`sc_${c}`);
        if (paxEl && p.PAX) paxEl.value = p.PAX;
        if (childEl && p.CHILD) childEl.value = p.CHILD;
        if (infEl && p.INF) infEl.value = p.INF;
        if (curEl && p.currency) curEl.value = p.currency;
      });
    } catch(e) {}
  }
}

function goBackStep1() {
  const data = isEdit ? selectedAccount : {};
  renderStep1(data);
}

async function loadPriceInputsWithValues(tripNames, savedPrices) {
  const priceTitle = document.getElementById('priceTitle');
  const priceArea = document.getElementById('priceArea');
  if (!priceArea) return;

  if (!tripNames || tripNames.length === 0) {
    if (priceTitle) priceTitle.style.display = 'none';
    priceArea.innerHTML = '';
    return;
  }

  for (const tripName of tripNames) {
    if (!tripItems[tripName]) {
      await fetchTripItems(tripName);
    }
  }

  if (priceTitle) priceTitle.style.display = 'flex';

  let html = '<div class="trip-price-grid">';
  let hasItems = false;
  
  for (const tripName of tripNames) {
    const items = tripItems[tripName] || [];
    if (items.length === 0) {
      html += `<div class="price-item"><div class="pi-trip">⚠️ ${esc(tripName)}</div><div style="color:#dc2626;font-size:12px">لا توجد بنود لهذه الرحلة</div></div>`;
      continue;
    }
    hasItems = true;
    for (const item of items) {
      const key = safeid(tripName + '_' + item);
      const rawKey = tripName + '_' + item;
      const saved = savedPrices?.[rawKey] || savedPrices?.[key] || null;
      const prevPrice = saved?.price || '';
      const prevCur = saved?.currency || 'LE';
      
      html += `<div class="price-item">
        <div class="pi-trip">${esc(tripName)}</div>
        <div class="pi-label">${esc(item)}</div>
        <div class="pi-row">
          <input type="number" id="pp_${key}" placeholder="0" min="0" value="${prevPrice}">
          <select id="pc_${key}">
            <option value="LE" ${prevCur==='LE' ?'selected':''}>LE ج</option>
            <option value="USD" ${prevCur==='USD'?'selected':''}>USD $</option>
            <option value="EUR" ${prevCur==='EUR'?'selected':''}>EUR €</option>
            <option value="GBP" ${prevCur==='GBP'?'selected':''}>GBP £</option>
          </select>
        </div>
      </div>`;
    }
  }
  html += '</div>';
  
  if (!hasItems) {
    priceArea.innerHTML = '<div style="padding:20px;text-align:center;color:#94a3b8;">لا توجد بنود للرحلات المحددة</div>';
  } else {
    priceArea.innerHTML = html;
  }
}

async function handleTripToggle(cb, tripName) {
  const div = cb.closest('.trip-item');
  if (div) div.classList.toggle('checked', cb.checked);

  if (cb.checked && !tripItems[tripName]) {
    cb.disabled = true;
    try {
      tripItems[tripName] = await fetchTripItems(tripName);
    } catch(e) { 
      tripItems[tripName] = []; 
    }
    cb.disabled = false;
  }
  await loadPriceInputs();
}

async function loadPriceInputs() {
  const checked = [];
  document.querySelectorAll('#tripsBox input[type=checkbox]:checked').forEach(cb => {
    checked.push(cb.value);
  });

  const priceTitle = document.getElementById('priceTitle');
  const priceArea = document.getElementById('priceArea');
  if (!priceArea) return;

  if (checked.length === 0) {
    if (priceTitle) priceTitle.style.display = 'none';
    priceArea.innerHTML = '';
    return;
  }

  await Promise.all(checked.map(async tripName => {
    if (!tripItems[tripName]) {
      try {
        tripItems[tripName] = await fetchTripItems(tripName);
      } catch(e) { 
        tripItems[tripName] = []; 
      }
    }
  }));

  if (priceTitle) priceTitle.style.display = 'flex';

  const prevValues = {};
  priceArea.querySelectorAll('input[type=number], select').forEach(el => {
    if (el.id) prevValues[el.id] = el.value;
  });

  let html = '<div class="trip-price-grid">';
  for (const tripName of checked) {
    const items = tripItems[tripName] || [];
    if (items.length === 0) {
      html += `<div class="price-item"><div class="pi-trip">${esc(tripName)}</div><div style="color:#94a3b8;font-size:12px">لا توجد بنود</div></div>`;
      continue;
    }
    for (const item of items) {
      const key = safeid(tripName + '_' + item);
      const prevPrice = prevValues['pp_' + key] || '';
      const prevCur = prevValues['pc_' + key] || 'LE';
      html += `<div class="price-item">
        <div class="pi-trip">${esc(tripName)}</div>
        <div class="pi-label">${esc(item)}</div>
        <div class="pi-row">
          <input type="number" id="pp_${key}" placeholder="0" min="0" value="${prevPrice}">
          <select id="pc_${key}">
            <option value="LE" ${prevCur==='LE' ?'selected':''}>LE ج</option>
            <option value="USD" ${prevCur==='USD'?'selected':''}>USD $</option>
            <option value="EUR" ${prevCur==='EUR'?'selected':''}>EUR €</option>
            <option value="GBP" ${prevCur==='GBP'?'selected':''}>GBP £</option>
          </select>
        </div>
      </div>`;
    }
  }
  html += '</div>';
  priceArea.innerHTML = html;
}

// ====================== حفظ البيانات ======================
async function doSave() {
  const btn = document.getElementById('saveBtn');
  if (btn) {
    btn.disabled = true;
    btn.textContent = '⏳ جاري الحفظ...';
  }

  try {
    const cat = _currentCategory || document.getElementById('f_cat')?.value ||
                (isEdit ? selectedAccount?.category : '');
    const isSubmarine = (cat === 'Submarine');

    const formData = {
      ..._formStep1Data,
      category: cat,
      status: _formStep1Data.status === 'true' || _formStep1Data.status === true,
    };

    let assignedTrips = [];
    let pricesData = {};

    if (isSubmarine) {
      ['F','Aarab','Arab48','EGY'].forEach(c => {
        pricesData['Submarine_' + c] = {
          PAX: parseFloat(document.getElementById(`sp_${c}_PAX`)?.value) || 0,
          CHILD: parseFloat(document.getElementById(`sp_${c}_CHILD`)?.value) || 0,
          INF: parseFloat(document.getElementById(`sp_${c}_INF`)?.value) || 0,
          currency: document.getElementById(`sc_${c}`)?.value || 'USD'
        };
      });
    } else {
      document.querySelectorAll('#tripsBox input[type=checkbox]:checked').forEach(cb => {
        assignedTrips.push(cb.value);
      });
      if (assignedTrips.length === 0 && !isEdit) {
        showAlert('اختر رحلة واحدة على الأقل','⚠️');
        if (btn) { btn.disabled = false; btn.textContent = isEdit ? 'تحديث البيانات' : 'حفظ وإنشاء الشيت'; }
        return;
      }
      for (const tripName of assignedTrips) {
        const items = tripItems[tripName] || [];
        for (const item of items) {
          const key = safeid(tripName + '_' + item);
          const price = parseFloat(document.getElementById(`pp_${key}`)?.value) || 0;
          const currency = document.getElementById(`pc_${key}`)?.value || 'LE';
          pricesData[tripName + '_' + item] = { price, currency };
        }
      }
    }

    formData.assignedTrips = assignedTrips;
    formData.pricesData = JSON.stringify(pricesData);

    let result;
    if (isEdit && selectedAccount) {
      formData.customerId = selectedAccount.customerId;
      formData.updatePricesInSheet = 'true';
      result = await gasPost({ action: 'updateSupplierCustomer', ...formData });
    } else {
      result = await gasPost({ action: 'addSupplierCustomer', ...formData });
    }

    if (btn) {
      btn.disabled = false;
      btn.textContent = isEdit ? 'تحديث البيانات' : 'حفظ وإنشاء الشيت';
    }

    if (result?.success) {
      closeModal();
      await loadAccounts();
      const extra = result.sheetName ? `\nتم ${isEdit ? 'تحديث' : 'إنشاء'} الشيت: ${result.sheetName}` : '';
      showAlert(`✅ تم ${isEdit ? 'التحديث' : 'الحفظ'} بنجاح` + extra, '✅');
    } else {
      showAlert('❌ ' + (result?.message || 'فشل الحفظ'), '❌');
    }
  } catch(e) {
    console.error('doSave error:', e);
    if (btn) {
      btn.disabled = false;
      btn.textContent = isEdit ? 'تحديث البيانات' : 'حفظ وإنشاء الشيت';
    }
    showAlert('❌ خطأ: ' + e.message, '❌');
  }
}

// ====================== حذف ======================
async function doDelete() {
  if (!selectedAccount) return;
  showAlert(`⚠️ هل تريد حذف حساب ${selectedAccount.customerName}؟\nسيتم حذف الشيت الخاص به أيضاً.`, '⚠️',
    `<button class="btn btn-red" onclick="confirmDelete()">حذف نهائي</button>
     <button class="btn btn-gray" onclick="closeAlert()">إلغاء</button>`
  );
}

async function confirmDelete() {
  closeAlert();
  try {
    const res = await gasPost({ action: 'deleteSupplierCustomer', customerId: selectedAccount.customerId });
    if (res?.success) {
      selectedAccount = null;
      await loadAccounts();
      showAlert('✅ تم الحذف بنجاح', '✅');
    } else {
      showAlert('❌ ' + (res?.message || 'فشل الحذف'), '❌');
    }
  } catch(e) { 
    showAlert('❌ خطأ: ' + e.message, '❌'); 
  }
}

// ====================== تهيئة الصفحة ======================
document.addEventListener('DOMContentLoaded', async () => {
  let ud = sessionStorage.getItem('currentUser');
  if (!ud) { 
    const p = new URLSearchParams(location.search).get('user'); 
    if (p) { 
      ud = decodeURIComponent(p); 
      sessionStorage.setItem('currentUser', ud); 
    } 
  }
  if (!ud) { location.href = 'index.html'; return; }
  try { currentUser = JSON.parse(ud); } catch(e) { location.href = 'index.html'; return; }
  document.getElementById('userChip').textContent = currentUser.name || 'User';
  await loadAccounts();
});

// ====================== دوال عامة ======================
window.goBack = goBack;
window.openAdd = openAdd;
window.openEdit = openEdit;
window.selectRow = selectRow;
window.renderTable = renderTable;
window.closeModal = closeModal;
window.closeAlert = closeAlert;
window.goStep2 = goStep2;
window.goBackStep1 = goBackStep1;
window.handleTripToggle = handleTripToggle;
window.doSave = doSave;
window.doDelete = doDelete;
window.confirmDelete = confirmDelete;
window.loadPriceInputs = loadPriceInputs;
window.toggleSystemAccess = toggleSystemAccess;
window.togglePasswordVisibility = togglePasswordVisibility;
window.updateAutoEmail = updateAutoEmail;
</script>
