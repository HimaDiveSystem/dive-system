<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>إدارة العملاء والمنفذين</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0f1f3d;--navy2:#1a3260;--gold:#f5c842;--gold2:#e6b800;
      --blue:#2563eb;--blue-lt:#3b82f6;--green:#16a34a;--red:#dc2626;
      --orange:#ea580c;--purple:#7c3aed;--teal:#0d9488;
      --bg:#f0f4f8;--card:#fff;--border:#dde4f0;--text:#1a2540;--text-lt:#5a6a8a;
      --radius:16px;--radius-sm:10px;
      --shadow:0 4px 24px rgba(15,31,61,.10);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    .header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;padding:13px 22px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(15,31,61,.25);}
    .header h2{color:var(--gold);font-size:18px;font-weight:900;display:flex;align-items:center;gap:8px;}
    .header-right{display:flex;align-items:center;gap:8px;}
    .user-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:40px;padding:4px 13px;color:white;font-size:12px;font-weight:600;}
    .back-btn{background:transparent;border:2px solid rgba(255,255,255,.3);color:white;padding:4px 13px;border-radius:40px;cursor:pointer;font-weight:700;font-size:12px;font-family:'Cairo',sans-serif;transition:all .2s;}
    .back-btn:hover{border-color:var(--gold);color:var(--gold);}

    .page{max-width:1400px;margin:0 auto;padding:20px 16px 50px;}

    .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden;}
    .card-head{padding:12px 18px;background:linear-gradient(90deg,var(--navy),var(--navy2));display:flex;align-items:center;gap:8px;}
    .card-head h3{color:var(--gold);font-size:14px;font-weight:800;}
    .ch-icon{background:rgba(245,200,66,.2);border-radius:7px;padding:3px 6px;font-size:13px;}
    .card-body{padding:16px;}

    .table-wrapper{overflow-x:auto;}
    .data-table{width:100%;border-collapse:collapse;font-size:13px;}
    .data-table thead th{background:#f0f4f8;color:var(--text-lt);padding:10px 12px;font-weight:700;text-align:right;border-bottom:2px solid var(--border);}
    .data-table tbody td{padding:8px 12px;border-bottom:1px solid #f0f4f8;}
    .data-table tbody tr:hover{background:#f8faff;cursor:pointer;}
    .status-badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;}
    .status-active{background:#dcfce7;color:#166534;}
    .status-inactive{background:#fee2e2;color:#991b1b;}

    .fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;}
    .fgroup{display:flex;flex-direction:column;gap:5px;}
    .fgroup label{font-size:11px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px;}
    .fgroup label.req::after{content:' *';color:var(--red);}
    .fc{padding:8px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Cairo',sans-serif;color:var(--text);background:#fafbfd;width:100%;height:40px;transition:border-color .2s;}
    .fc:focus{border-color:var(--blue);outline:none;background:white;}
    select.fc{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='13' height='13' viewBox='0 0 24 24' fill='none' stroke='%235a6a8a' stroke-width='2.5'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:left 10px center;padding-left:28px;}
    textarea.fc{height:auto;resize:vertical;}
    .trips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-top:8px;max-height:150px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px;}
    .trip-check{display:flex;align-items:center;gap:6px;padding:4px 0;}
    .trip-check input{width:16px;height:16px;}
    .trip-check label{font-size:12px;font-weight:400;text-transform:none;color:var(--text);}

    /* Submarine Price Table */
    .submarine-price-table{width:100%;border-collapse:collapse;margin-top:12px;}
    .submarine-price-table th,.submarine-price-table td{border:1px solid var(--border);padding:8px;text-align:center;}
    .submarine-price-table th{background:var(--navy);color:var(--gold);font-weight:700;}

    .action-btns{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
    .btn{padding:9px 20px;border:none;border-radius:40px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .2s;}
    .btn:hover{transform:translateY(-1px);}
    .btn-primary{background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);}
    .btn-green{background:var(--green);color:white;}
    .btn-orange{background:var(--orange);color:white;}
    .btn-red{background:var(--red);color:white;}
    .btn-gray{background:#f1f5f9;color:var(--text);}
    .btn-sm{padding:4px 12px;font-size:11px;}

    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px);}
    .modal.open{display:flex;}
    .modal-box{background:white;width:90%;max-width:900px;max-height:85vh;overflow-y:auto;border-radius:22px;padding:24px;box-shadow:0 25px 50px rgba(0,0,0,.3);animation:pop .25s ease;}
    .modal-icon{font-size:44px;margin-bottom:10px;text-align:center;}
    .modal-msg{color:var(--navy);font-size:15px;font-weight:700;margin-bottom:18px;text-align:center;}
    .modal-btns{display:flex;gap:10px;justify-content:center;margin-top:20px;}
    @keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}

    .search-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
    .search-input{flex:1;min-width:200px;padding:8px 12px;border:2px solid var(--border);border-radius:40px;font-size:13px;font-family:'Cairo',sans-serif;}
    .filter-select{padding:8px 12px;border:2px solid var(--border);border-radius:40px;font-size:13px;background:white;min-width:130px;}

    .selected-row{background:#e6f0ff !important;}

    .loader{text-align:center;padding:40px;color:var(--text-lt);}
    .spinner{width:32px;height:32px;border:4px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .no-data{text-align:center;padding:40px;color:var(--text-lt);}

    .price-card{background:#f8fafc;border-radius:12px;padding:12px;margin-top:12px;}
    .price-card h4{color:var(--navy);font-weight:800;margin-bottom:12px;border-right:3px solid var(--gold);padding-right:8px;}
    
    @media(max-width:680px){.fgrid{grid-template-columns:1fr;}}
  </style>
</head>
<body>

<div class="header">
  <h2>🏢 إدارة العملاء والمنفذين</h2>
  <div class="header-right">
    <span class="user-chip" id="userNameDisplay"></span>
    <button class="back-btn" onclick="goBack()">← العودة</button>
  </div>
</div>

<div class="page">
  <div id="mainContent"><div class="loader"><div class="spinner"></div>جاري التحميل...</div></div>
</div>

<!-- Modal للإضافة/التعديل -->
<div id="customerModal" class="modal">
  <div class="modal-box">
    <div class="modal-icon" id="modalIcon">➕</div>
    <div class="modal-msg" id="modalTitle">إضافة حساب جديد</div>
    <div id="modalForm"></div>
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="saveAccount()">💾 حفظ</button>
      <button class="btn btn-gray" onclick="closeModal()">❌ إلغاء</button>
    </div>
  </div>
</div>

<!-- Alert Modal -->
<div id="alertModal" class="modal">
  <div class="modal-box">
    <div class="modal-icon">ℹ️</div>
    <div class="modal-msg" id="alertMsg"></div>
    <div class="modal-btns"><button class="btn btn-primary" onclick="closeAlert()">موافق</button></div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyBfwHQQoHb9E2bq0l-u6FLMD2XFKu_d8rZuJLnIq5iko82Bn93Emki6-cvDF_XOyRp/exec';
const DASH = {Admin:'Dashboard.html', Owner:'OwnerDashboard.html', Sales:'SalesDashboard.html', Accountant:'AccountantDashboard.html'};

let currentUser = null;
let allAccounts = [];
let categoriesList = [];
let tripsList = [];
let selectedAccount = null;
let isEditMode = false;
let currentPricesData = {};

// ============ دوال أساسية ============
function showAlert(msg) {
  document.getElementById('alertMsg').textContent = msg;
  document.getElementById('alertModal').classList.add('open');
}
function closeAlert() { document.getElementById('alertModal').classList.remove('open'); }
function goBack() { window.location.href = DASH[currentUser?.type] || 'Dashboard.html'; }

async function callGAS(action, params = {}) {
  const url = new URL(GAS_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v ?? '')));
  const res = await fetch(url.toString(), { redirect: 'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ============ تحميل البيانات ============
async function loadCategories() {
  try {
    const res = await callGAS('getAllActivities');
    categoriesList = Array.isArray(res) ? res.map(a => a.name || a).filter(n => n) : [];
  } catch(e) { console.warn('loadCategories:', e); }
}

async function loadTripsByCategory(category) {
  if (!category) return [];
  try {
    const res = await callGAS('getTripsByCategory', { category });
    tripsList = Array.isArray(res) ? res : [];
    return tripsList;
  } catch(e) { console.warn('loadTripsByCategory:', e); return []; }
}

async function loadAccounts() {
  try {
    const res = await callGAS('getAllSuppliersCustomers');
    allAccounts = Array.isArray(res) ? res : [];
    renderTable();
  } catch(e) { showAlert('خطأ في تحميل البيانات: ' + e.message); }
}

// ============ جلب بنود الرحلة ============
async function getTripItemsByName(tripName) {
  try {
    const res = await callGAS('getTripItemsByName', { tripName });
    return Array.isArray(res) ? res : [];
  } catch(e) { return []; }
}

// ============ عرض أسعار البنود للرحلات العادية ============
async function renderPricesSection(selectedTrips, existingPrices = null) {
  const container = document.getElementById('pricesContainer');
  if (!container) return;
  
  if (!selectedTrips || selectedTrips.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:20px;color:#94a3b8">اختر الرحلات أولاً</div>';
    return;
  }
  
  let html = '';
  for (const tripName of selectedTrips) {
    const items = await getTripItemsByName(tripName);
    if (items && items.length) {
      html += `<div class="price-card" style="margin-bottom:16px">
        <h4>📍 ${tripName}</h4>
        <div class="fgrid">`;
      
      for (const item of items) {
        const key = `${tripName}_${item}`;
        const existingPrice = existingPrices?.[key]?.price || '';
        const existingCurrency = existingPrices?.[key]?.currency || 'USD';
        html += `
          <div class="fgroup">
            <label>${item}</label>
            <div style="display:flex;gap:5px;">
              <input type="number" class="fc" id="price_${key.replace(/[^a-zA-Z0-9]/g, '_')}" placeholder="السعر" value="${existingPrice}" style="flex:2">
              <select class="fc" id="curr_${key.replace(/[^a-zA-Z0-9]/g, '_')}" style="flex:1;width:80px">
                <option value="USD" ${existingCurrency === 'USD' ? 'selected' : ''}>USD</option>
                <option value="EUR" ${existingCurrency === 'EUR' ? 'selected' : ''}>EUR</option>
                <option value="GBP" ${existingCurrency === 'GBP' ? 'selected' : ''}>GBP</option>
                <option value="LE" ${existingCurrency === 'LE' ? 'selected' : ''}>LE</option>
              </select>
            </div>
          </div>
        `;
      }
      html += `</div></div>`;
    }
  }
  container.innerHTML = html;
}

// ============ عرض أسعار Submarine ============
function renderSubmarinePricesSection(existingPrices = null) {
  const container = document.getElementById('pricesContainer');
  if (!container) return;
  
  const categories = ['F', 'Aarab', 'Arab48', 'EGY'];
  const priceTypes = ['PAX', 'CHILD', 'INF'];
  
  let html = `
    <div class="price-card">
      <h4>🚢 أسعار رحلات Submarine</h4>
      <table class="submarine-price-table">
        <thead>
          <tr><th>الفئة</th><th>PAX</th><th>CHILD</th><th>INF</th><th>العملة</th></tr>
        </thead>
        <tbody>
  `;
  
  for (const cat of categories) {
    const key = `Submarine_${cat}`;
    const existing = existingPrices?.[key] || {};
    html += `
      <tr>
        <td>${cat}</td>
        <td><input type="number" class="fc" id="price_${key}_PAX" value="${existing.PAX || ''}" placeholder="0" style="width:80px"></td>
        <td><input type="number" class="fc" id="price_${key}_CHILD" value="${existing.CHILD || ''}" placeholder="0" style="width:80px"></td>
        <td><input type="number" class="fc" id="price_${key}_INF" value="${existing.INF || ''}" placeholder="0" style="width:80px"></td>
        <td>
          <select class="fc" id="curr_${key}" style="width:80px">
            <option value="USD" ${existing.currency === 'USD' ? 'selected' : ''}>USD</option>
            <option value="EUR" ${existing.currency === 'EUR' ? 'selected' : ''}>EUR</option>
            <option value="GBP" ${existing.currency === 'GBP' ? 'selected' : ''}>GBP</option>
            <option value="LE" ${existing.currency === 'LE' ? 'selected' : ''}>LE</option>
          </select>
        </td>
      </tr>
    `;
  }
  
  html += `</tbody></table></div>`;
  container.innerHTML = html;
}

// ============ جمع أسعار Submarine ============
function collectSubmarinePricesData() {
  const prices = {};
  const categories = ['F', 'Aarab', 'Arab48', 'EGY'];
  
  for (const cat of categories) {
    const key = `Submarine_${cat}`;
    const pax = document.getElementById(`price_${key}_PAX`);
    const child = document.getElementById(`price_${key}_CHILD`);
    const inf = document.getElementById(`price_${key}_INF`);
    const curr = document.getElementById(`curr_${key}`);
    
    if (pax && child && inf && curr) {
      prices[key] = {
        PAX: parseFloat(pax.value) || 0,
        CHILD: parseFloat(child.value) || 0,
        INF: parseFloat(inf.value) || 0,
        currency: curr.value
      };
    }
  }
  return prices;
}

// ============ جمع أسعار البنود العامة ============
function collectPricesData() {
  const prices = {};
  const container = document.getElementById('pricesContainer');
  if (!container) return prices;
  
  document.querySelectorAll('#pricesContainer input[type="number"]').forEach(input => {
    const key = input.id.replace('price_', '');
    const currSelect = document.getElementById(`curr_${key}`);
    if (currSelect) {
      prices[key] = {
        price: parseFloat(input.value) || 0,
        currency: currSelect.value
      };
    }
  });
  return prices;
}

// ============ عرض الجدول ============
function renderTable() {
  const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
  const typeFilter = document.getElementById('typeFilter')?.value || '';
  const categoryFilter = document.getElementById('categoryFilter')?.value || '';

  let filtered = allAccounts.filter(acc => {
    if (search && !acc.customerName?.toLowerCase().includes(search)) return false;
    if (typeFilter && acc.customerType !== typeFilter) return false;
    if (categoryFilter && acc.category !== categoryFilter) return false;
    return true;
  });

  const html = `
    <div class="card">
      <div class="card-head"><span class="ch-icon">🔍</span><h3>بحث وتصفية</h3></div>
      <div class="card-body">
        <div class="search-bar">
          <input type="text" id="searchInput" class="search-input" placeholder="بحث بالاسم..." oninput="renderTable()">
          <select id="typeFilter" class="filter-select" onchange="renderTable()">
            <option value="">كل الأنواع</option>
            <option value="Customer">عملاء</option>
            <option value="Supplier">منفذين</option>
          </select>
          <select id="categoryFilter" class="filter-select" onchange="renderTable()">
            <option value="">كل الأنشطة</option>
            ${categoriesList.map(c => `<option value="${c}">${c}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><span class="ch-icon">📋</span><h3>قائمة الحسابات</h3></div>
      <div class="card-body">
        <div class="action-btns">
          <button class="btn btn-primary" onclick="openAddModal()">➕ إضافة حساب جديد</button>
          <button class="btn btn-green" id="editBtn" onclick="openEditModal()" disabled>✏️ تعديل</button>
          <button class="btn btn-red" id="deleteBtn" onclick="deleteAccount()" disabled>🗑️ حذف</button>
        </div>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr><th>المعرف</th><th>الاسم</th><th>النوع</th><th>النشاط</th><th>شخص التواصل</th><th>الهاتف</th><th>الحالة</th><th>الرصيد</th>〈/th〉
            </thead>
            <tbody>
              ${filtered.length ? filtered.map(acc => `
                <tr onclick="selectAccount('${acc.customerId}')" data-id="${acc.customerId}" class="${selectedAccount?.customerId === acc.customerId ? 'selected-row' : ''}">
                  <td>${acc.customerId || ''}</td>
                  <td>${acc.customerName || ''}</td>
                  <td>${acc.customerType === 'Customer' ? 'عميل' : 'منفذ'}</td>
                  <td>${acc.category || ''}</td>
                  <td>${acc.contactPerson || ''}</td>
                  <td>${acc.phone || ''}</td>
                  <td><span class="status-badge ${acc.status ? 'status-active' : 'status-inactive'}">${acc.status ? 'نشط' : 'غير نشط'}</span></td>
                  <td>${acc.balanceUSD ? acc.balanceUSD + '$' : '-'}</td>
                 </tr>
              `).join('') : '<tr><td colspan="8" class="no-data">لا توجد بيانات</td></tr>'}
            </tbody>
           </table>
        </div>
      </div>
    </div>
  `;
  document.getElementById('mainContent').innerHTML = html;
  updateButtonsState();
}

function selectAccount(id) {
  selectedAccount = allAccounts.find(a => a.customerId === id);
  updateButtonsState();
  renderTable();
}

function updateButtonsState() {
  const hasSelected = !!selectedAccount;
  document.getElementById('editBtn').disabled = !hasSelected;
  document.getElementById('deleteBtn').disabled = !hasSelected;
}

// ============ فتح نافذة الإضافة ============
function openAddModal() {
  isEditMode = false;
  selectedAccount = null;
  currentPricesData = {};
  document.getElementById('modalTitle').textContent = '➕ إضافة حساب جديد';
  document.getElementById('modalIcon').textContent = '➕';
  renderModalForm();
  document.getElementById('customerModal').classList.add('open');
}

function openEditModal() {
  if (!selectedAccount) return;
  isEditMode = true;
  currentPricesData = {};
  document.getElementById('modalTitle').textContent = '✏️ تعديل حساب';
  document.getElementById('modalIcon').textContent = '✏️';
  renderModalForm(true);
  document.getElementById('customerModal').classList.add('open');
}

function closeModal() {
  document.getElementById('customerModal').classList.remove('open');
  selectedAccount = null;
  isEditMode = false;
  currentPricesData = {};
}

// ============ تحديث قسم الأسعار حسب نوع النشاط ============
async function updatePricesSection() {
  const category = document.getElementById('category')?.value;
  const isSubmarine = (category === 'Submarine');
  
  if (isSubmarine) {
    // عرض واجهة Submarine
    await renderSubmarinePricesSection(currentPricesData);
    const pricesCard = document.getElementById('pricesCard');
    if (pricesCard) pricesCard.style.display = 'block';
  } else {
    // عرض واجهة الرحلات العادية
    const selectedTrips = [];
    document.querySelectorAll('#tripsGrid input[type="checkbox"]:checked').forEach(cb => {
      selectedTrips.push(cb.value);
    });
    
    if (selectedTrips.length > 0) {
      await renderPricesSection(selectedTrips, currentPricesData);
      const pricesCard = document.getElementById('pricesCard');
      if (pricesCard) pricesCard.style.display = 'block';
    } else {
      const pricesCard = document.getElementById('pricesCard');
      if (pricesCard) pricesCard.style.display = 'none';
      const container = document.getElementById('pricesContainer');
      if (container) container.innerHTML = '';
    }
  }
}

// ============ عرض نموذج الإضافة/التعديل ============
async function renderModalForm(isEdit = false) {
  const data = isEdit ? selectedAccount : {};
  const isSubmarine = (data.category === 'Submarine');
  
  // جلب قائمة الرحلات حسب النشاط المختار (لغير Submarine)
  let tripsHtml = '';
  let selectedTrips = [];
  if (data.category && !isSubmarine) {
    const trips = await loadTripsByCategory(data.category);
    const assignedTrips = data.assignedTrips ? data.assignedTrips.split('|') : [];
    selectedTrips = assignedTrips;
    tripsHtml = `
      <div class="fgroup">
        <label>الرحلات المخصصة</label>
        <div class="trips-grid" id="tripsGrid">
          ${trips.map(trip => `
            <div class="trip-check">
              <input type="checkbox" id="trip_${trip.replace(/\s/g, '_')}" value="${trip}" ${assignedTrips.includes(trip) ? 'checked' : ''} onchange="updatePricesSection()">
              <label for="trip_${trip.replace(/\s/g, '_')}">${trip}</label>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  } else if (isSubmarine) {
    tripsHtml = `
      <div class="fgroup">
        <label>⚠️ رحلات Submarine</label>
        <div class="trips-grid" style="background:#f0f4f8;text-align:center;padding:12px">
          يتم استخدام قالب Master_Submarine لهذا النشاط
        </div>
      </div>
    `;
  }
  
  const systemAccessHtml = `
    <div class="fgroup">
      <label>🔐 الوصول للنظام</label>
      <label style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="hasSystemAccess" ${data.hasSystemAccess ? 'checked' : ''} onchange="toggleSystemFields()">
        <span>يسمح له باستخدام النظام (للعملاء فقط)</span>
      </label>
    </div>
    <div id="systemFields" style="display:${data.hasSystemAccess ? 'grid' : 'none'}; grid-template-columns:repeat(2,1fr); gap:12px;">
      <div class="fgroup"><label>البريد للدخول</label><input type="email" class="fc" id="loginEmail" value="${data.loginEmail || ''}"></div>
      <div class="fgroup"><label>كلمة المرور</label><input type="password" class="fc" id="loginPassword" value="${data.loginPassword || ''}"></div>
    </div>
  `;
  
  const formHtml = `
    <div class="fgrid">
      <div class="fgroup"><label class="req">اسم العميل/المنفذ</label><input type="text" class="fc" id="customerName" value="${data.customerName || ''}" required></div>
      <div class="fgroup"><label class="req">نوع الحساب</label>
        <select class="fc" id="customerType" onchange="onCustomerTypeChange()">
          <option value="Customer" ${data.customerType === 'Customer' ? 'selected' : ''}>عميل</option>
          <option value="Supplier" ${data.customerType === 'Supplier' ? 'selected' : ''}>منفذ</option>
        </select>
      </div>
      <div class="fgroup"><label class="req">نوع النشاط</label>
        <select class="fc" id="category" onchange="onCategoryChange()">
          <option value="">اختر النشاط</option>
          ${categoriesList.map(c => `<option value="${c}" ${data.category === c ? 'selected' : ''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="fgroup"><label>المركز الرئيسي</label><input type="text" class="fc" id="parentCenter" value="${data.parentCenter || ''}"></div>
      <div class="fgroup"><label>شخص التواصل</label><input type="text" class="fc" id="contactPerson" value="${data.contactPerson || ''}"></div>
      <div class="fgroup"><label>رقم الهاتف</label><input type="tel" class="fc" id="phone" value="${data.phone || ''}"></div>
      <div class="fgroup"><label>البريد الإلكتروني</label><input type="email" class="fc" id="email" value="${data.email || ''}"></div>
      <div class="fgroup"><label>العنوان</label><input type="text" class="fc" id="address" value="${data.address || ''}"></div>
      <div class="fgroup"><label>الحد الائتماني</label><input type="number" class="fc" id="creditLimit" value="${data.creditLimit || 0}"></div>
      <div class="fgroup"><label>شروط الدفع</label><input type="text" class="fc" id="paymentTerms" value="${data.paymentTerms || ''}"></div>
      <div class="fgroup"><label>تاريخ البداية</label><input type="date" class="fc" id="startDate" value="${data.startDate || ''}"></div>
      <div class="fgroup"><label>تاريخ النهاية</label><input type="date" class="fc" id="endDate" value="${data.endDate || ''}"></div>
      <div class="fgroup"><label>الحالة</label>
        <select class="fc" id="status">
          <option value="true" ${data.status ? 'selected' : ''}>نشط</option>
          <option value="false" ${!data.status ? 'selected' : ''}>غير نشط</option>
        </select>
      </div>
      <div class="fgroup"><label>ملاحظات</label><textarea class="fc" id="notes" rows="2">${data.notes || ''}</textarea></div>
    </div>
    ${tripsHtml}
    <div id="pricesCard" style="display:${(selectedTrips.length > 0 || isSubmarine) ? 'block' : 'none'}; margin-top:12px">
      <div class="card">
        <div class="card-head"><span class="ch-icon">💰</span><h3>أسعار البنود (لكل عميل)</h3></div>
        <div class="card-body" id="pricesContainer"></div>
      </div>
    </div>
    ${systemAccessHtml}
  `;
  
  document.getElementById('modalForm').innerHTML = formHtml;
  
  // عرض الأسعار حسب النوع
  if (isSubmarine) {
    if (isEdit && data.customerId) {
      try {
        const priceRes = await callGAS('getAccountPrices', { customerId: data.customerId });
        if (priceRes && priceRes.prices) {
          currentPricesData = priceRes.prices;
        }
      } catch(e) { console.warn('load prices error:', e); }
    }
    await renderSubmarinePricesSection(currentPricesData);
  } else if (selectedTrips.length > 0) {
    if (isEdit && data.customerId) {
      try {
        const priceRes = await callGAS('getAccountPrices', { customerId: data.customerId });
        if (priceRes && priceRes.prices) {
          currentPricesData = priceRes.prices;
        }
      } catch(e) { console.warn('load prices error:', e); }
    }
    await renderPricesSection(selectedTrips, currentPricesData);
  }
  
  // إضافة event listeners
  window.onCustomerTypeChange = function() {
    const type = document.getElementById('customerType').value;
    const systemFields = document.getElementById('systemFields');
    if (systemFields) {
      if (type === 'Customer') {
        systemFields.style.display = 'grid';
      } else {
        systemFields.style.display = 'none';
        document.getElementById('hasSystemAccess').checked = false;
      }
    }
  };
  
  window.onCategoryChange = async function() {
    const category = document.getElementById('category').value;
    const isSubmarineCat = (category === 'Submarine');
    
    if (category) {
      if (!isSubmarineCat) {
        const trips = await loadTripsByCategory(category);
        const tripsGrid = document.getElementById('tripsGrid');
        if (tripsGrid) {
          tripsGrid.innerHTML = trips.map(trip => `
            <div class="trip-check">
              <input type="checkbox" id="trip_${trip.replace(/\s/g, '_')}" value="${trip}" onchange="updatePricesSection()">
              <label for="trip_${trip.replace(/\s/g, '_')}">${trip}</label>
            </div>
          `).join('');
        }
      } else {
        const tripsGrid = document.getElementById('tripsGrid');
        if (tripsGrid) {
          tripsGrid.innerHTML = `
            <div style="background:#f0f4f8;text-align:center;padding:12px">
              ⚠️ يتم استخدام قالب Master_Submarine لهذا النشاط
            </div>
          `;
        }
      }
      // إخفاء قسم الأسعار مؤقتاً حتى اختيار الرحلات
      const pricesCard = document.getElementById('pricesCard');
      if (pricesCard) pricesCard.style.display = 'none';
      currentPricesData = {};
    }
  };
  
  window.toggleSystemFields = function() {
    const checked = document.getElementById('hasSystemAccess').checked;
    const systemFields = document.getElementById('systemFields');
    if (systemFields) {
      systemFields.style.display = checked ? 'grid' : 'none';
    }
  };
  
  window.updatePricesSection = updatePricesSection;
}

// ============ حفظ الحساب ============
async function saveAccount() {
  const category = document.getElementById('category')?.value;
  const isSubmarine = (category === 'Submarine');
  
  const data = {
    customerName: document.getElementById('customerName')?.value,
    customerType: document.getElementById('customerType')?.value,
    category: category,
    parentCenter: document.getElementById('parentCenter')?.value,
    contactPerson: document.getElementById('contactPerson')?.value,
    phone: document.getElementById('phone')?.value,
    email: document.getElementById('email')?.value,
    address: document.getElementById('address')?.value,
    creditLimit: parseFloat(document.getElementById('creditLimit')?.value) || 0,
    paymentTerms: document.getElementById('paymentTerms')?.value,
    startDate: document.getElementById('startDate')?.value,
    endDate: document.getElementById('endDate')?.value,
    status: document.getElementById('status')?.value === 'true',
    notes: document.getElementById('notes')?.value,
    hasSystemAccess: document.getElementById('hasSystemAccess')?.checked || false,
    loginEmail: document.getElementById('loginEmail')?.value || '',
    loginPassword: document.getElementById('loginPassword')?.value || ''
  };
  
  // جمع الرحلات المختارة (لغير Submarine)
  const assignedTrips = [];
  if (!isSubmarine && document.getElementById('tripsGrid')) {
    document.querySelectorAll('#tripsGrid input[type="checkbox"]:checked').forEach(cb => {
      assignedTrips.push(cb.value);
    });
  }
  data.assignedTrips = assignedTrips;
  
  // جمع أسعار البنود
  let pricesData = {};
  if (isSubmarine) {
    pricesData = collectSubmarinePricesData();
  } else {
    pricesData = collectPricesData();
  }
  data.pricesData = pricesData;
  
  // التحقق من الحقول المطلوبة
  if (!data.customerName) { showAlert('الرجاء إدخال اسم العميل/المنفذ'); return; }
  if (!data.category) { showAlert('الرجاء اختيار نوع النشاط'); return; }
  
  // التحقق من وجود أسعار لـ Submarine
  if (isSubmarine) {
    let hasPrices = false;
    for (const key in pricesData) {
      if (pricesData[key].PAX > 0 || pricesData[key].CHILD > 0 || pricesData[key].INF > 0) {
        hasPrices = true;
        break;
      }
    }
    if (!hasPrices) {
      showAlert('الرجاء إدخال أسعار رحلات Submarine');
      return;
    }
  } else if (assignedTrips.length === 0) {
    showAlert('الرجاء اختيار رحلة واحدة على الأقل');
    return;
  }
  
  if (data.customerType === 'Customer' && data.hasSystemAccess && (!data.loginEmail || !data.loginPassword)) {
    showAlert('الرجاء إدخال البريد وكلمة المرور للدخول');
    return;
  }
  
  try {
    let result;
    if (isEditMode && selectedAccount) {
      data.customerId = selectedAccount.customerId;
      result = await callGAS('updateSupplierCustomer', data);
    } else {
      result = await callGAS('addSupplierCustomer', data);
    }
    
    if (result?.success) {
      closeModal();
      await loadAccounts();
      showAlert(result.message || 'تم الحفظ بنجاح');
    } else {
      showAlert(result?.message || 'فشل الحفظ');
    }
  } catch(e) {
    showAlert('خطأ: ' + e.message);
  }
}

// ============ حذف الحساب ============
async function deleteAccount() {
  if (!selectedAccount) return;
  if (!confirm(`هل أنت متأكد من حذف حساب ${selectedAccount.customerName}؟`)) return;
  
  try {
    const result = await callGAS('deleteSupplierCustomer', { customerId: selectedAccount.customerId });
    if (result?.success) {
      selectedAccount = null;
      await loadAccounts();
      showAlert('تم الحذف بنجاح');
    } else {
      showAlert(result?.message || 'فشل الحذف');
    }
  } catch(e) {
    showAlert('خطأ: ' + e.message);
  }
}

// ============ تهيئة الصفحة ============
document.addEventListener('DOMContentLoaded', async () => {
  let ud = sessionStorage.getItem('currentUser');
  if (!ud) {
    const p = new URLSearchParams(location.search).get('user');
    if (p) { ud = decodeURIComponent(p); sessionStorage.setItem('currentUser', ud); }
  }
  if (!ud) { location.href = 'index.html'; return; }
  try { currentUser = JSON.parse(ud); } catch { location.href = 'index.html'; return; }
  document.getElementById('userNameDisplay').textContent = currentUser.name || 'User';
  
  await loadCategories();
  await loadAccounts();
});

window.renderTable = renderTable;
window.openAddModal = openAddModal;
window.openEditModal = openEditModal;
window.saveAccount = saveAccount;
window.deleteAccount = deleteAccount;
window.closeModal = closeModal;
window.closeAlert = closeAlert;
window.goBack = goBack;
window.selectAccount = selectAccount;
window.updatePricesSection = updatePricesSection;
window.onCategoryChange = onCategoryChange;
window.onCustomerTypeChange = onCustomerTypeChange;
window.toggleSystemFields = toggleSystemFields;
</script>
