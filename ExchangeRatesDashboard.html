<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>إدارة أسعار الصرف - نظام إدارة مراكز الغوص</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
    .header { background: linear-gradient(135deg, #1e2b4f 0%, #152238 100%); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
    .header h2 { color: #ffd966; font-size: 24px; display: flex; align-items: center; gap: 10px; }
    .user-info { display: flex; align-items: center; gap: 20px; }
    .user-name { background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 40px; border: 1px solid #ffd966; }
    .logout-btn { background: #ff6b6b; color: white; border: none; padding: 10px 25px; border-radius: 40px; cursor: pointer; font-weight: 600; transition: 0.3s; }
    .logout-btn:hover { background: #ee5253; transform: translateY(-2px); }
    .nav-tabs { display: flex; background: #f8f9fa; padding: 0 20px; border-bottom: 2px solid #dee2e6; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
    .nav-tab { padding: 15px 25px; cursor: pointer; font-weight: 600; color: #6c757d; border-bottom: 3px solid transparent; transition: 0.3s; display: inline-block; }
    .nav-tab.active { color: #1e2b4f; border-bottom-color: #ffd966; }
    .nav-tab:hover { color: #1e2b4f; }
    .content { padding: 30px; }
    .toolbar { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
    .btn-primary { background: #1e2b4f; color: white; border: none; padding: 12px 25px; border-radius: 40px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
    .btn-primary:hover { background: #ffd966; color: #1e2b4f; }
    .btn-secondary { background: #e9f0fa; color: #1e2b4f; border: none; padding: 12px 25px; border-radius: 40px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
    .btn-secondary:hover { background: #d0ddeb; }
    .date-section { background: #f8f9fa; border-radius: 20px; padding: 20px; margin-bottom: 25px; }
    .date-row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .date-label { font-weight: 600; color: #1e2b4f; min-width: 100px; }
    .date-input { flex: 1; min-width: 200px; }
    .date-input input { width: 100%; padding: 12px 15px; border: 2px solid #e9f0fa; border-radius: 15px; font-size: 16px; }
    .info-box { background: #e3f2fd; padding: 10px 15px; border-radius: 15px; color: #1976d2; font-weight: 600; }
    .rates-section { margin: 25px 0; }
    .section-title { color: #1e2b4f; font-size: 18px; font-weight: 700; margin-bottom: 15px; }
    .rates-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
    .rate-card { background: #f8f9fa; border-radius: 15px; padding: 15px; text-align: center; }
    .rate-card label { display: block; margin-bottom: 10px; color: #1e2b4f; font-weight: 600; font-size: 14px; }
    .rate-card input { width: 100%; padding: 10px; border: 2px solid #e9f0fa; border-radius: 10px; text-align: center; font-size: 16px; font-weight: 600; }
    .rate-card.readonly { background: #e9ecef; }
    .rate-card.readonly input { background: #dee2e6; color: #495057; }
    .bank-section { background: #f8f9fa; border-radius: 20px; padding: 20px; margin: 25px 0; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .bank-label { font-weight: 600; color: #1e2b4f; }
    .bank-input { width: 150px; }
    .bank-input input { width: 100%; padding: 12px; border: 2px solid #e9f0fa; border-radius: 15px; text-align: center; font-size: 16px; font-weight: 600; }
    .action-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
    .rates-table { width: 100%; border-collapse: collapse; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    .rates-table th { background: #1e2b4f; color: #ffd966; padding: 15px; font-weight: 600; }
    .rates-table td { padding: 12px; border-bottom: 1px solid #e9f0fa; text-align: center; }
    .rates-table tr:hover { background: #f5f9ff; }
    .error-message   { background: #ffebee; color: #c62828; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; font-weight: 600; }
    .success-message { background: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; font-weight: 600; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1e2b4f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0%{transform:rotate(0deg);}100%{transform:rotate(360deg);} }
    @media (max-width: 768px) { .rates-grid { grid-template-columns: repeat(2, 1fr); } .date-row { flex-direction: column; align-items: stretch; } .bank-section { flex-direction: column; align-items: stretch; } .bank-input { width: 100%; } .action-buttons { flex-direction: column; } .btn-primary, .btn-secondary { width: 100%; justify-content: center; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>💱 إدارة أسعار الصرف</h2>
      <div class="user-info">
        <span class="user-name" id="userNameDisplay"></span>
        <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
      </div>
    </div>
    <div class="nav-tabs">
      <div class="nav-tab active" id="tab-add" onclick="showTab('add',this)">➕ إضافة/تعديل</div>
      <div class="nav-tab" id="tab-view" onclick="showTab('view',this)">📋 عرض كل الأسعار</div>
      <div class="nav-tab" onclick="goBack()">🏠 العودة</div>
    </div>
    <div class="content" id="mainContent"></div>
  </div>

  <div id="customConfirmModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:9999;">
    <div style="background:white;width:400px;border-radius:30px;padding:30px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.3);">
      <div style="font-size:50px;margin-bottom:20px;">❓</div>
      <h3 style="color:#1e2b4f;margin-bottom:20px;" id="confirmMessage"></h3>
      <div style="display:flex;gap:15px;justify-content:center;">
        <button id="confirmOk" class="btn-primary" style="background:#e74c3c;">نعم</button>
        <button id="confirmCancel" class="btn-secondary">إلغاء</button>
      </div>
    </div>
  </div>

  <div id="customAlertModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:9999;">
    <div style="background:white;width:400px;border-radius:30px;padding:30px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.3);">
      <div style="font-size:50px;margin-bottom:20px;">ℹ️</div>
      <h3 style="color:#1e2b4f;margin-bottom:20px;" id="alertMessage"></h3>
      <button id="alertOk" class="btn-primary">موافق</button>
    </div>
  </div>

  <script>
    // ✅ رابط الـ API
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzMTFak2Fj9IzeTpCXukclkTWNsEGNY3dZ9RZ-A8hDb0DAY8oQsfl3gS4mPsXQdQzpG/exec';

    // ✅ خريطة الصفحات
    const DASHBOARD_PAGES = {
      Admin:     'Dashboard.html',
      Owner:     'OwnerDashboard.html',
      Sales:     'SalesDashboard.html',
      Accountant:'AccountantDashboard.html'
    };

    let currentUser = null;
    let lastExchangeDate = null;
    let currentMode = 'add';
    let selectedDate = null;

    // ── Modal helpers ──
    function showAlert(message) {
      const modal = document.getElementById('customAlertModal');
      document.getElementById('alertMessage').innerText = message;
      modal.style.display = 'flex';
      const okBtn = document.getElementById('alertOk');
      const okH = () => { modal.style.display='none'; okBtn.removeEventListener('click',okH); };
      okBtn.addEventListener('click', okH);
    }

    function showConfirm(message, onConfirm) {
      const modal = document.getElementById('customConfirmModal');
      document.getElementById('confirmMessage').innerText = message;
      modal.style.display = 'flex';
      const ok = document.getElementById('confirmOk'), cancel = document.getElementById('confirmCancel');
      const okH = () => { modal.style.display='none'; onConfirm(); ok.removeEventListener('click',okH); cancel.removeEventListener('click',cancelH); };
      const cancelH = () => { modal.style.display='none'; ok.removeEventListener('click',okH); cancel.removeEventListener('click',cancelH); };
      ok.addEventListener('click', okH); cancel.addEventListener('click', cancelH);
    }

    // ── API helper ──
    async function apiGet(action, params={}) {
      const url = new URL(GAS_URL);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k,v]) => url.searchParams.set(k,v));
      const res = await fetch(url.toString(), {redirect:'follow'});
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    }

    async function apiPost(action, data) {
      const url = new URL(GAS_URL);
      url.searchParams.set('action', action);
      const res = await fetch(url.toString(), {method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(data)});
      return res.json();
    }

    // ── تحميل آخر تاريخ ──
    async function loadLastExchangeDate() {
      try {
        const date = await apiGet('getLastExchangeDate');
        lastExchangeDate = date;
        const el = document.getElementById('lastDateDisplay');
        if (el) el.textContent = formatDate(date) || 'لا توجد بيانات';
      } catch(e) { console.error(e); }
    }

    // ── التبويبات ──
    function showTab(tab, el) {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      if (el) el.classList.add('active');
      if (tab === 'add') showAddEditForm();
      else if (tab === 'view') showAllRates();
    }

    // ── نموذج الإضافة/التعديل ──
    function showAddEditForm() {
      const content = document.getElementById('mainContent');
      content.innerHTML = `
        <div class="toolbar">
          <button class="btn-primary"   onclick="setMode('add')">➕ إضافة جديد</button>
          <button class="btn-secondary" onclick="setMode('edit')">✏️ تعديل</button>
        </div>
        <div class="date-section">
          <div class="date-row">
            <span class="date-label">التاريخ:</span>
            <div class="date-input"><input type="date" id="rateDate" onchange="loadDateData()"></div>
            <div class="info-box" id="lastDateInfo">آخر تاريخ: <span id="lastDateDisplay">جاري التحميل...</span></div>
          </div>
        </div>
        <div class="rates-section">
          <div class="section-title">💰 أسعار النقدي</div>
          <div class="rates-grid">
            <div class="rate-card"><label>USD</label><input type="number" id="cashUSD" step="0.0001" min="0" placeholder="0.00" oninput="calculateVisaRates()"></div>
            <div class="rate-card"><label>EUR</label><input type="number" id="cashEUR" step="0.0001" min="0" placeholder="0.00" oninput="calculateVisaRates()"></div>
            <div class="rate-card"><label>GBP</label><input type="number" id="cashGBP" step="0.0001" min="0" placeholder="0.00" oninput="calculateVisaRates()"></div>
            <div class="rate-card"><label>EGP</label><input type="number" id="cashLE" step="0.0001" min="0" value="1.00" readonly></div>
          </div>
          <div class="section-title">💳 أسعار الفيزا (تلقائية)</div>
          <div class="rates-grid">
            <div class="rate-card readonly"><label>Visa USD</label><input type="number" id="visaUSD" step="0.0001" readonly></div>
            <div class="rate-card readonly"><label>Visa EUR</label><input type="number" id="visaEUR" step="0.0001" readonly></div>
            <div class="rate-card readonly"><label>Visa GBP</label><input type="number" id="visaGBP" step="0.0001" readonly></div>
            <div class="rate-card readonly"><label>Visa EGP</label><input type="number" id="visaLE"  step="0.0001" readonly></div>
          </div>
        </div>
        <div class="bank-section">
          <span class="bank-label">نسبة البنك (%):</span>
          <div class="bank-input"><input type="number" id="bankPercentage" step="0.1" min="0" max="100" value="2.5" oninput="calculateVisaRates()"></div>
        </div>
        <div class="action-buttons">
          <button class="btn-primary"   onclick="saveRates()">💾 حفظ</button>
          <button class="btn-secondary" onclick="clearForm()">🔄 إعادة تعيين</button>
        </div>
        <div id="messageArea"></div>`;
      if (lastExchangeDate) {
        const el = document.getElementById('lastDateDisplay');
        if (el) el.textContent = formatDate(lastExchangeDate);
      }
    }

    function setMode(mode) {
      currentMode = mode;
      clearForm();
      if (mode === 'edit') document.getElementById('rateDate').focus();
    }

    // ✅ تحميل بيانات تاريخ محدد عبر fetch
    async function loadDateData() {
      const date = document.getElementById('rateDate').value;
      if (!date) return;
      selectedDate = date;
      try {
        const data = await apiGet('getExchangeRateByDate', { dateStr: date });
        if (data && data.cash) {
          document.getElementById('cashUSD').value = data.cash.USD || '';
          document.getElementById('cashEUR').value = data.cash.EUR || '';
          document.getElementById('cashGBP').value = data.cash.GBP || '';
          document.getElementById('bankPercentage').value = data.bankPercentage || 2.5;
          calculateVisaRates();
        } else if (currentMode === 'edit') {
          showAlert('التاريخ غير موجود. للإضافة استخدم وضع "إضافة جديد"');
          document.getElementById('rateDate').value = '';
        }
      } catch(e) { console.error(e); }
    }

    function calculateVisaRates() {
      const usd = parseFloat(document.getElementById('cashUSD')?.value) || 0;
      const eur = parseFloat(document.getElementById('cashEUR')?.value) || 0;
      const gbp = parseFloat(document.getElementById('cashGBP')?.value) || 0;
      const bankPercent = parseFloat(document.getElementById('bankPercentage')?.value) || 0;
      const factor = 1 - (bankPercent / 100);
      if (document.getElementById('visaUSD')) {
        document.getElementById('visaUSD').value = (usd * factor).toFixed(4);
        document.getElementById('visaEUR').value = (eur * factor).toFixed(4);
        document.getElementById('visaGBP').value = (gbp * factor).toFixed(4);
        document.getElementById('visaLE').value  = (1   * factor).toFixed(4);
      }
    }

    // ✅ حفظ الأسعار عبر fetch POST
    async function saveRates() {
      const date = document.getElementById('rateDate').value;
      if (!date) { showAlert('الرجاء إدخال التاريخ'); return; }
      const usd = parseFloat(document.getElementById('cashUSD').value);
      const eur = parseFloat(document.getElementById('cashEUR').value);
      const gbp = parseFloat(document.getElementById('cashGBP').value);
      const bankPercent = parseFloat(document.getElementById('bankPercentage').value) || 0;
      if (isNaN(usd) || isNaN(eur) || isNaN(gbp)) { showAlert('الرجاء إدخال جميع أسعار النقدي'); return; }

      const saveBtn = document.querySelector('.action-buttons .btn-primary');
      const originalText = saveBtn.textContent;
      saveBtn.textContent = '⏳ جاري الحفظ...'; saveBtn.disabled = true;

      try {
        const response = await apiPost('saveExchangeRates', {
          targetDate: date,
          cashRates: { USD: usd, EUR: eur, GBP: gbp, LE: 1.00 },
          bankPercentage: bankPercent,
          mode: currentMode
        });
        if (response.success) {
          showMessage('success', response.message);
          await loadLastExchangeDate();
        } else {
          showMessage('error', response.message);
        }
      } catch(e) {
        showMessage('error', 'خطأ في الاتصال: ' + e.message);
      }
      saveBtn.textContent = originalText; saveBtn.disabled = false;
    }

    // ✅ عرض كل الأسعار عبر fetch
    async function showAllRates() {
      const content = document.getElementById('mainContent');
      content.innerHTML = '<div class="loader"></div>';
      try {
        const rates = await apiGet('getAllExchangeRates');
        if (!rates || !rates.length) { content.innerHTML = '<div style="text-align:center;padding:50px;">لا توجد بيانات</div>'; return; }
        let html = `<div style="overflow-x:auto;"><table class="rates-table"><thead><tr><th>التاريخ</th><th>USD</th><th>EUR</th><th>GBP</th><th>EGP</th><th>Visa USD</th><th>Visa EUR</th><th>Visa GBP</th><th>Visa EGP</th></tr></thead><tbody>`;
        rates.forEach(row => {
          html += `<tr><td>${formatDate(row.date)}</td><td>${row.cashUSD}</td><td>${row.cashEUR}</td><td>${row.cashGBP}</td><td>${row.cashLE}</td><td>${row.visaUSD}</td><td>${row.visaEUR}</td><td>${row.visaGBP}</td><td>${row.visaLE}</td></tr>`;
        });
        html += '</tbody></table></div>';
        content.innerHTML = html;
      } catch(e) {
        content.innerHTML = '<div style="color:red;text-align:center;padding:50px;">خطأ في تحميل البيانات</div>';
      }
    }

    // ✅ goBack يستخدم window.location.href
    function goBack() {
      const page = DASHBOARD_PAGES[currentUser?.type] || 'Dashboard.html';
      window.location.href = page;
    }

    // ✅ logout يستخدم window.location.href
    function logout() {
      showConfirm('هل أنت متأكد من تسجيل الخروج؟', function() {
        sessionStorage.removeItem('currentUser');
        window.location.href = 'index.html';
      });
    }

    // ── دوال مساعدة ──
    function formatDate(dateStr) {
      if (!dateStr) return '';
      try {
        const d = new Date(dateStr);
        return `${d.getDate().toString().padStart(2,'0')}-${d.toLocaleString('en',{month:'short'})}-${d.getFullYear().toString().slice(-2)}`;
      } catch { return dateStr; }
    }

    function clearForm() {
      ['cashUSD','cashEUR','cashGBP','visaUSD','visaEUR','visaGBP','visaLE','rateDate'].forEach(id => {
        const el = document.getElementById(id); if(el) el.value = '';
      });
      const bp = document.getElementById('bankPercentage'); if(bp) bp.value = '2.5';
      const ma = document.getElementById('messageArea');    if(ma) ma.innerHTML = '';
    }

    function showMessage(type, text) {
      const messageArea = document.getElementById('messageArea');
      if (!messageArea) return;
      messageArea.innerHTML = `<div class="${type}-message">${text}</div>`;
      setTimeout(() => { if(messageArea) messageArea.innerHTML = ''; }, 5000);
    }

    function getUserFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      const userParam = urlParams.get('user');
      if (userParam) { try { return JSON.parse(decodeURIComponent(userParam)); } catch(e) { return null; } }
      return null;
    }

    // ==================== التحميل الأولي ====================
    document.addEventListener('DOMContentLoaded', async function() {
      let userData = sessionStorage.getItem('currentUser');
      if (!userData) {
        const urlUser = getUserFromUrl();
        if (urlUser) { userData = JSON.stringify(urlUser); sessionStorage.setItem('currentUser', userData); }
      }
      if (!userData) { window.location.href = 'index.html'; return; }
      try {
        currentUser = JSON.parse(userData);
        document.getElementById('userNameDisplay').textContent = currentUser.name || 'مدير النظام';
        const allowedTypes = ['Admin', 'Owner', 'FinancialManager'];
        if (!allowedTypes.includes(currentUser.type)) {
          showAlert('ليس لديك صلاحية للوصول إلى هذه الصفحة');
          setTimeout(() => window.location.href = 'Dashboard.html', 2000);
          return;
        }
      } catch(e) { window.location.href = 'index.html'; return; }

      await loadLastExchangeDate();
      showTab('add', document.getElementById('tab-add'));
    });

    window.showTab          = showTab;
    window.goBack           = goBack;
    window.logout           = logout;
    window.setMode          = setMode;
    window.loadDateData     = loadDateData;
    window.calculateVisaRates = calculateVisaRates;
    window.saveRates        = saveRates;
    window.clearForm        = clearForm;
    window.showAlert        = showAlert;
    window.showConfirm      = showConfirm;
  </script>
</body>
</html>
