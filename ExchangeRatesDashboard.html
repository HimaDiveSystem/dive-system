<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>إدارة أسعار الصرف - نظام إدارة مراكز الغوص</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 1100px; margin: 0 auto; background: white; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
    .header { background: linear-gradient(135deg, #1e2b4f 0%, #152238 100%); color: white; padding: 18px 28px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .header h2 { color: #ffd966; font-size: 22px; display: flex; align-items: center; gap: 10px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .user-badge { background: rgba(255,255,255,0.1); padding: 7px 16px; border-radius: 40px; border: 1px solid #ffd966; font-size: 13px; }
    .back-btn { background: #ffd966; color: #1e2b4f; border: none; padding: 7px 18px; border-radius: 40px; cursor: pointer; font-weight: 700; font-size: 13px; }
    .back-btn:hover { background: #f0c020; }
    .nav-tabs { display: flex; background: #f8f9fa; padding: 0 20px; border-bottom: 2px solid #dee2e6; overflow-x: auto; white-space: nowrap; }
    .nav-tab { padding: 14px 22px; cursor: pointer; font-weight: 600; color: #6c757d; border-bottom: 3px solid transparent; transition: 0.2s; display: inline-block; font-size: 14px; }
    .nav-tab.active { color: #1e2b4f; border-bottom-color: #ffd966; }
    .nav-tab:hover { color: #1e2b4f; }
    .content { padding: 26px 28px; }

    /* Date section */
    .date-section { background: #f0f4fa; border-radius: 16px; padding: 18px 22px; margin-bottom: 20px; }
    .date-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .date-label { font-weight: 700; color: #1e2b4f; font-size: 14px; }
    .date-input input[type="date"] { padding: 10px 14px; border: 2px solid #d0ddeb; border-radius: 12px; font-size: 14px; font-weight: 600; color: #1e2b4f; min-width: 180px; }
    .date-input input[type="date"]:focus { outline: none; border-color: #1e2b4f; box-shadow: 0 0 0 3px rgba(30,43,79,.1); }
    .info-box { background: #1e2b4f; color: #ffd966; padding: 7px 16px; border-radius: 30px; font-size: 13px; font-weight: 700; white-space: nowrap; }
    .date-status { padding: 7px 16px; border-radius: 30px; font-size: 13px; font-weight: 700; display: none; }
    .date-status.found     { background: #d5f5e3; color: #1e8449; display: inline-block; }
    .date-status.not-found { background: #fef9e7; color: #9a6b00; display: inline-block; }

    /* Rates */
    .rates-section { margin-bottom: 18px; }
    .section-title { font-size: 14px; font-weight: 700; padding: 9px 18px; border-radius: 30px; display: inline-block; margin-bottom: 14px; color: white; }
    .title-bank  { background: #1e2b4f; }
    .title-sales { background: #27ae60; }
    .rates-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .rate-card { background: #f8f9fa; border-radius: 14px; padding: 14px; text-align: center; }
    .rate-card label { display: block; margin-bottom: 8px; color: #1e2b4f; font-weight: 700; font-size: 13px; }
    .rate-card input { width: 100%; padding: 9px; border: 2px solid #d0ddeb; border-radius: 10px; text-align: center; font-size: 15px; font-weight: 700; color: #1e2b4f; background: white; }
    .rate-card input:focus { outline: none; border-color: #1e2b4f; }
    .rate-card.sales-card { background: #eafaf1; }
    .rate-card.sales-card input { border-color: #a9dfbf; color: #1e5e34; background: #f4fcf7; }
    .rate-card.sales-card input:focus { border-color: #27ae60; }
    .rate-card.readonly input { background: #e9ecef; color: #6c757d; border-color: #dee2e6; cursor: not-allowed; }

    /* Bank % */
    .bank-section { background: #f8f9fa; border-radius: 14px; padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .bank-label { font-weight: 700; color: #1e2b4f; font-size: 14px; }
    .bank-input input { padding: 9px 14px; border: 2px solid #d0ddeb; border-radius: 10px; text-align: center; font-size: 15px; font-weight: 700; color: #1e2b4f; width: 120px; }
    .bank-input input:focus { outline: none; border-color: #1e2b4f; }
    .calc-btn { background: #e9f0fa; color: #1e2b4f; border: none; padding: 9px 18px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 700; }
    .calc-btn:hover { background: #d0ddeb; }

    /* Buttons */
    .btn-primary   { background: #1e2b4f; color: white; border: none; padding: 11px 24px; border-radius: 40px; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 7px; }
    .btn-primary:hover { background: #ffd966; color: #1e2b4f; }
    .btn-primary:disabled { background: #95a5a6; cursor: not-allowed; color: white; }
    .btn-secondary { background: #e9f0fa; color: #1e2b4f; border: none; padding: 11px 24px; border-radius: 40px; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s; }
    .btn-secondary:hover { background: #d0ddeb; }
    .action-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 22px; flex-wrap: wrap; }

    /* Table */
    .table-outer { border-radius: 16px; overflow: hidden; border: 1px solid #e0e8f0; }
    .table-scroll { overflow-x: auto; max-height: 580px; overflow-y: auto; }
    table.rates-table { width: 100%; border-collapse: collapse; min-width: 960px; }
    table.rates-table thead { position: sticky; top: 0; z-index: 2; }
    table.rates-table thead tr:first-child th { background: #1e2b4f; color: #ffd966; padding: 11px 8px; font-size: 12px; font-weight: 700; white-space: nowrap; }
    table.rates-table thead tr:last-child  th { background: #152238; color: #aaa;    padding: 8px;    font-size: 11px; font-weight: 600; }
    table.rates-table thead th.sep-h { background: #0d1824 !important; color: #555 !important; }
    table.rates-table tbody tr { border-bottom: 1px solid #f0f4fa; }
    table.rates-table tbody tr:hover { background: #f5f9ff; }
    table.rates-table td { padding: 9px 8px; text-align: center; font-size: 12px; color: #2c3e50; }
    table.rates-table td.date-td { font-weight: 700; color: #1e2b4f; white-space: nowrap; font-size: 13px; }
    table.rates-table td.sep-td { background: #f0f4fa; color: #ccc; font-size: 10px; }

    /* Misc */
    .msg  { padding: 12px 18px; border-radius: 12px; margin-top: 16px; font-weight: 600; text-align: center; font-size: 14px; }
    .msg.success { background: #d5f5e3; color: #1e8449; }
    .msg.error   { background: #fadbd8; color: #c0392b; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1e2b4f; border-radius: 50%; width: 36px; height: 36px; animation: spin 1s linear infinite; margin: 30px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 50px; color: #aaa; }
    .divider { border: none; border-top: 1px dashed #d0ddeb; margin: 18px 0; }

    @media (max-width: 700px) {
      .rates-grid { grid-template-columns: repeat(2, 1fr); }
      .date-row, .action-buttons { flex-direction: column; align-items: stretch; }
      .btn-primary, .btn-secondary { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>💱 إدارة أسعار الصرف</h2>
    <div class="header-right">
      <span class="user-badge" id="userNameDisplay">—</span>
      <button class="back-btn" onclick="goBack()">🔙 رجوع</button>
    </div>
  </div>
  <div class="nav-tabs">
    <div class="nav-tab active" id="tab-add"  onclick="showTab('add',this)">➕ إضافة / تعديل</div>
    <div class="nav-tab"        id="tab-view" onclick="showTab('view',this)">📋 عرض كل الأسعار</div>
  </div>
  <div class="content" id="mainContent"></div>
</div>

<!-- Alert Modal -->
<div id="alertModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:9999;">
  <div style="background:white;width:360px;border-radius:22px;padding:26px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.3);">
    <div style="font-size:44px;margin-bottom:14px;">ℹ️</div>
    <p style="color:#1e2b4f;font-weight:700;margin-bottom:18px;" id="alertMsg"></p>
    <button id="alertOk" class="btn-primary" style="margin:0 auto;">موافق</button>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwe1Q9pjAJRk9CfWsK5YGjD5uVAbJkMhAVgw6akKkFIR9sz15V78C88Vs5dumKE-SwF/exec';
const DASH = { Admin:'Dashboard.html', Owner:'OwnerDashboard.html', Sales:'SalesDashboard.html', Accountant:'AccountantDashboard.html' };

let currentUser = null;
let lastDateDisplay = '...'; // للعرض فقط

// ── Alert ──
function showAlert(msg) {
  const m = document.getElementById('alertModal');
  document.getElementById('alertMsg').textContent = msg;
  m.style.display = 'flex';
  const ok = document.getElementById('alertOk');
  const h  = () => { m.style.display='none'; ok.removeEventListener('click',h); };
  ok.addEventListener('click', h);
}

// ── JSONP ──
function jsonp(action, params = {}) {
  return new Promise((res, rej) => {
    const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*99999);
    params.action = action; params.callback = cb;
    const qs = Object.entries(params).map(([k,v]) => k+'='+encodeURIComponent(String(v??''))).join('&');
    const sc = document.createElement('script');
    const to = setTimeout(() => { delete window[cb]; sc.remove(); rej(new Error('انتهت مهلة الاتصال')); }, 30000);
    window[cb] = d => { clearTimeout(to); delete window[cb]; sc.remove(); res(d); };
    sc.onerror = () => { clearTimeout(to); delete window[cb]; sc.remove(); rej(new Error('خطأ في الاتصال')); };
    sc.src = GAS_URL + '?' + qs;
    document.head.appendChild(sc);
  });
}

// ── تحويل YYYY-MM-DD → D/Mon/YYYY للإرسال للـ GAS ──
const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function toGasDate(ymd) {        // ymd = "2026-03-01"
  const [y,m,d] = ymd.split('-');
  return parseInt(d) + '/' + MN[parseInt(m)-1] + '/' + y;
}
function fmtDisplayDate(ymd) {   // "01 Mar 2026"
  if (!ymd) return '';
  const [y,m,d] = ymd.split('-');
  return d + '/' + MN[parseInt(m)-1] + '/' + y;
}

// ── goBack ──
function goBack() { window.location.href = DASH[currentUser?.type] || 'Dashboard.html'; }

// ── Tabs ──
function showTab(tab, el) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  tab === 'add' ? showAddForm() : showAllRates();
}

// ════════════════════════════════════
// نموذج الإضافة / التعديل
// ════════════════════════════════════
function showAddForm() {
  document.getElementById('mainContent').innerHTML = `
    <!-- التاريخ -->
    <div class="date-section">
      <div class="date-row">
        <span class="date-label">📅 التاريخ:</span>
        <div class="date-input">
          <input type="date" id="rateDate" onchange="onDateChange()">
        </div>
        <div class="info-box">آخر تاريخ: <span id="lastDateLbl">${lastDateDisplay}</span></div>
        <span class="date-status" id="dateStatus"></span>
      </div>
    </div>

    <!-- أسعار البنك (B:E) -->
    <div class="rates-section">
      <div class="section-title title-bank" id="bankTitle">🏦 أسعار البنك</div>
      <div class="rates-grid">
        <div class="rate-card"><label>USD $</label>
          <input type="number" id="bUSD" step="0.0001" min="0" placeholder="0.00" oninput="autoCalcBankVisa()"></div>
        <div class="rate-card"><label>EUR €</label>
          <input type="number" id="bEUR" step="0.0001" min="0" placeholder="0.00" oninput="autoCalcBankVisa()"></div>
        <div class="rate-card"><label>GBP £</label>
          <input type="number" id="bGBP" step="0.0001" min="0" placeholder="0.00" oninput="autoCalcBankVisa()"></div>
        <div class="rate-card readonly"><label>EGP ج.م</label>
          <input type="number" id="bLE" value="1.00" readonly></div>
      </div>
    </div>

    <!-- نسبة البنك -->
    <div class="bank-section">
      <span class="bank-label">نسبة البنك (%):</span>
      <div class="bank-input">
        <input type="number" id="bankPct" step="0.1" min="0" max="100" value="2.5" oninput="autoCalcBankVisa()">
      </div>
      <button class="calc-btn" onclick="autoCalcBankVisa()">🔄 احتساب فيزا البنك</button>
    </div>

    <!-- فيزا البنك (F:I) — تلقائية -->
    <div class="rates-section">
      <div class="section-title title-bank" style="opacity:.75;">💳 فيزا البنك (تلقائية)</div>
      <div class="rates-grid">
        <div class="rate-card readonly"><label>Visa USD</label>
          <input type="number" id="bVUSD" step="0.0001" readonly></div>
        <div class="rate-card readonly"><label>Visa EUR</label>
          <input type="number" id="bVEUR" step="0.0001" readonly></div>
        <div class="rate-card readonly"><label>Visa GBP</label>
          <input type="number" id="bVGBP" step="0.0001" readonly></div>
        <div class="rate-card readonly"><label>Visa EGP</label>
          <input type="number" id="bVLE"  step="0.0001" readonly></div>
      </div>
    </div>

    <hr class="divider">

    <!-- أسعار حسابات العمولة (K:N) — قابلة للتعديل -->
    <div class="rates-section">
      <div class="section-title title-sales" id="salesTitle">📊 أسعار حسابات العمولة (Sales)</div>
      <div class="rates-grid">
        <div class="rate-card sales-card"><label>Sales USD</label>
          <input type="number" id="sUSD" step="0.0001" min="0" placeholder="0.00" oninput="autoCalcSalesVisa()"></div>
        <div class="rate-card sales-card"><label>Sales EUR</label>
          <input type="number" id="sEUR" step="0.0001" min="0" placeholder="0.00" oninput="autoCalcSalesVisa()"></div>
        <div class="rate-card sales-card"><label>Sales GBP</label>
          <input type="number" id="sGBP" step="0.0001" min="0" placeholder="0.00" oninput="autoCalcSalesVisa()"></div>
        <div class="rate-card sales-card readonly"><label>Sales EGP</label>
          <input type="number" id="sLE" value="1.00" readonly></div>
      </div>
    </div>

    <!-- فيزا العمولة (O:R) — تلقائية من نسبة البنك -->
    <div class="rates-section">
      <div class="section-title title-sales" style="opacity:.75;">💳 فيزا العمولة (تلقائية)</div>
      <div class="rates-grid">
        <div class="rate-card sales-card readonly"><label>Visa Sales USD</label>
          <input type="number" id="sVUSD" step="0.0001" readonly></div>
        <div class="rate-card sales-card readonly"><label>Visa Sales EUR</label>
          <input type="number" id="sVEUR" step="0.0001" readonly></div>
        <div class="rate-card sales-card readonly"><label>Visa Sales GBP</label>
          <input type="number" id="sVGBP" step="0.0001" readonly></div>
        <div class="rate-card sales-card readonly"><label>Visa Sales EGP</label>
          <input type="number" id="sVLE"  step="0.0001" readonly></div>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-primary" id="btnSave" onclick="saveRates()">💾 حفظ</button>
      <button class="btn-secondary"            onclick="clearForm()">🔄 إعادة تعيين</button>
    </div>
    <div id="msgArea"></div>`;
}

// ── عند تغيير التاريخ ──
async function onDateChange() {
  const ymd = document.getElementById('rateDate')?.value;
  if (!ymd) return;
  const gasDate = toGasDate(ymd); // D/Mon/YYYY
  const st = document.getElementById('dateStatus');

  try {
    const r = await jsonp('getExchangeRateByDateStr', { dateStr: gasDate });
    if (r && r.found) {
      // ── تاريخ موجود → نملأ الحقول ──
      setVal('bUSD', r.bankUSD);  setVal('bEUR', r.bankEUR);
      setVal('bGBP', r.bankGBP);  setVal('bLE',  r.bankLE || 1);
      setVal('bVUSD',r.bankVUSD); setVal('bVEUR',r.bankVEUR);
      setVal('bVGBP',r.bankVGBP); setVal('bVLE', r.bankVLE);
      setVal('sUSD', r.salesUSD); setVal('sEUR', r.salesEUR);
      setVal('sGBP', r.salesGBP); setVal('sLE',  r.salesLE || 1);
      setVal('sVUSD',r.salesVUSD);setVal('sVEUR',r.salesVEUR);
      setVal('sVGBP',r.salesVGBP);setVal('sVLE', r.salesVLE);
      if (st) { st.className='date-status found'; st.textContent='✅ تاريخ موجود — سيتم التحديث'; }
    } else {
      // ── تاريخ جديد → تفريغ ──
      clearFields();
      if (st) { st.className='date-status not-found'; st.textContent='🆕 تاريخ جديد'; }
    }
  } catch(e) {
    if (st) { st.className='date-status not-found'; st.textContent='⚠️ خطأ في الاتصال'; }
  }
}

function setVal(id, v) {
  const el = document.getElementById(id);
  if (el) el.value = (v !== undefined && v !== null && v !== '') ? parseFloat(v) : '';
}

// حساب فيزا البنك تلقائياً
function autoCalcBankVisa() {
  const u = parseFloat(document.getElementById('bUSD')?.value)||0;
  const e = parseFloat(document.getElementById('bEUR')?.value)||0;
  const g = parseFloat(document.getElementById('bGBP')?.value)||0;
  const p = parseFloat(document.getElementById('bankPct')?.value)||0;
  const f = 1 - p/100;
  setVal('bVUSD', u*f); setVal('bVEUR', e*f); setVal('bVGBP', g*f); setVal('bVLE', f);
}

// حساب فيزا العمولة تلقائياً
function autoCalcSalesVisa() {
  const u = parseFloat(document.getElementById('sUSD')?.value)||0;
  const e = parseFloat(document.getElementById('sEUR')?.value)||0;
  const g = parseFloat(document.getElementById('sGBP')?.value)||0;
  const p = parseFloat(document.getElementById('bankPct')?.value)||0;
  const f = 1 - p/100;
  setVal('sVUSD', u*f); setVal('sVEUR', e*f); setVal('sVGBP', g*f); setVal('sVLE', f);
}

// ── حفظ ──
async function saveRates() {
  const ymd = document.getElementById('rateDate')?.value;
  if (!ymd) { showAlert('الرجاء اختيار التاريخ'); return; }

  const bU  = parseFloat(document.getElementById('bUSD').value);
  const bE  = parseFloat(document.getElementById('bEUR').value);
  const bG  = parseFloat(document.getElementById('bGBP').value);
  const sU  = parseFloat(document.getElementById('sUSD').value);
  const sE  = parseFloat(document.getElementById('sEUR').value);
  const sG  = parseFloat(document.getElementById('sGBP').value);

  if (isNaN(bU)||isNaN(bE)||isNaN(bG)) { showAlert('الرجاء إدخال أسعار البنك كاملة'); return; }
  if (isNaN(sU)||isNaN(sE)||isNaN(sG)) { showAlert('الرجاء إدخال أسعار العمولة كاملة'); return; }

  const pct  = parseFloat(document.getElementById('bankPct').value)||0;
  const f    = 1 - pct/100;

  const btn = document.getElementById('btnSave');
  btn.disabled = true; btn.textContent = '⏳ جاري الحفظ...';

  try {
    const r = await jsonp('saveExchangeRatesNew', {
      dateStr:  toGasDate(ymd),
      bankUSD:  bU,  bankEUR:  bE,  bankGBP:  bG,  bankLE:  1,
      bankVUSD: bU*f, bankVEUR: bE*f, bankVGBP: bG*f, bankVLE: f,
      salesUSD: sU,  salesEUR: sE,  salesGBP: sG,  salesLE: 1,
      salesVUSD:sU*f, salesVEUR:sE*f, salesVGBP:sG*f, salesVLE: f,
      bankPct:  pct
    });
    if (r && r.success) {
      showMsg('success', r.message || 'تم الحفظ بنجاح ✅');
      await loadLastDate();
    } else {
      showMsg('error', r?.message || 'فشل الحفظ');
    }
  } catch(e) { showMsg('error', 'خطأ: ' + e.message); }

  btn.disabled = false; btn.innerHTML = '💾 حفظ';
}

function clearFields() {
  ['bUSD','bEUR','bGBP','bVUSD','bVEUR','bVGBP','bVLE',
   'sUSD','sEUR','sGBP','sVUSD','sVEUR','sVGBP','sVLE'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  setVal('bLE', 1); setVal('sLE', 1);
}

function clearForm() {
  document.getElementById('rateDate').value = '';
  const st = document.getElementById('dateStatus'); if(st) st.className='date-status';
  clearFields();
  document.getElementById('msgArea').innerHTML = '';
}

function showMsg(type, text) {
  const el = document.getElementById('msgArea');
  if (!el) return;
  el.innerHTML = `<div class="msg ${type}">${text}</div>`;
  setTimeout(() => { if(el) el.innerHTML=''; }, 6000);
}

// ════════════════════════════════════
// تبويب العرض
// ════════════════════════════════════
async function showAllRates() {
  const content = document.getElementById('mainContent');
  content.innerHTML = '<div class="loader"></div>';
  try {
    const rates = await jsonp('getAllExchangeRatesNew');
    if (!rates || !rates.length) { content.innerHTML='<div class="empty">لا توجد بيانات</div>'; return; }
    let html = `<div class="table-outer"><div class="table-scroll">
      <table class="rates-table">
        <thead>
          <tr>
            <th rowspan="2" style="vertical-align:middle;">📅 التاريخ</th>
            <th colspan="4">🏦 أسعار البنك</th>
            <th colspan="4">💳 فيزا البنك</th>
            <th class="sep-h" rowspan="2">—</th>
            <th colspan="4">📊 أسعار العمولة</th>
            <th colspan="4">💳 فيزا العمولة</th>
          </tr>
          <tr>
            <th>USD</th><th>EUR</th><th>GBP</th><th>EGP</th>
            <th>V.USD</th><th>V.EUR</th><th>V.GBP</th><th>V.EGP</th>
            <th class="sep-h"></th>
            <th>USD</th><th>EUR</th><th>GBP</th><th>EGP</th>
            <th>V.USD</th><th>V.EUR</th><th>V.GBP</th><th>V.EGP</th>
          </tr>
        </thead>
        <tbody>`;
    rates.forEach(r => {
      html += `<tr>
        <td class="date-td">${r.date}</td>
        <td>${r.bUSD}</td><td>${r.bEUR}</td><td>${r.bGBP}</td><td>${r.bLE}</td>
        <td>${r.bVUSD}</td><td>${r.bVEUR}</td><td>${r.bVGBP}</td><td>${r.bVLE}</td>
        <td class="sep-td">—</td>
        <td>${r.sUSD}</td><td>${r.sEUR}</td><td>${r.sGBP}</td><td>${r.sLE}</td>
        <td>${r.sVUSD}</td><td>${r.sVEUR}</td><td>${r.sVGBP}</td><td>${r.sVLE}</td>
      </tr>`;
    });
    html += '</tbody></table></div></div>';
    content.innerHTML = html;
  } catch(e) { content.innerHTML = `<div class="empty">خطأ: ${e.message}</div>`; }
}

// ── آخر تاريخ ──
async function loadLastDate() {
  try {
    const r = await jsonp('getLastExchangeDate');
    const raw = r?.date || r || null;
    lastDateDisplay = raw || 'لا توجد بيانات';
    const el = document.getElementById('lastDateLbl');
    if (el) el.textContent = lastDateDisplay;
  } catch(e) {}
}

// ── Init ──
document.addEventListener('DOMContentLoaded', async () => {
  let ud = sessionStorage.getItem('currentUser');
  if (!ud) {
    try { const p=new URLSearchParams(location.search),u=p.get('user'); if(u){ud=decodeURIComponent(u);sessionStorage.setItem('currentUser',ud);} } catch(e){}
  }
  if (!ud) { location.href='index.html'; return; }
  try { currentUser=JSON.parse(ud); } catch(e) { location.href='index.html'; return; }
  document.getElementById('userNameDisplay').textContent = currentUser.name || '—';
  await loadLastDate();
  showTab('add', document.getElementById('tab-add'));
});
</script>
