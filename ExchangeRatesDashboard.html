<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>إدارة أسعار الصرف - نظام إدارة مراكز الغوص</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #1e2b4f 0%, #152238 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h2 {
      color: #ffd966;
      font-size: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    
    .user-name {
      background: rgba(255,255,255,0.1);
      padding: 10px 20px;
      border-radius: 40px;
      border: 1px solid #ffd966;
    }
    
    .logout-btn {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }
    
    .logout-btn:hover {
      background: #ee5253;
      transform: translateY(-2px);
    }
    
    .nav-tabs {
      display: flex;
      background: #f8f9fa;
      padding: 0 20px;
      border-bottom: 2px solid #dee2e6;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
    }
    
    .nav-tab {
      padding: 15px 25px;
      cursor: pointer;
      font-weight: 600;
      color: #6c757d;
      border-bottom: 3px solid transparent;
      transition: 0.3s;
      display: inline-block;
    }
    
    .nav-tab.active {
      color: #1e2b4f;
      border-bottom-color: #ffd966;
    }
    
    .nav-tab:hover {
      color: #1e2b4f;
    }
    
    .content {
      padding: 30px;
    }
    
    .toolbar {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    
    .btn-primary {
      background: #1e2b4f;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-primary:hover {
      background: #ffd966;
      color: #1e2b4f;
    }
    
    .btn-secondary {
      background: #e9f0fa;
      color: #1e2b4f;
      border: none;
      padding: 12px 25px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-secondary:hover {
      background: #d0ddeb;
    }
    
    .date-section {
      background: #f8f9fa;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 25px;
    }
    
    .date-row {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    
    .date-label {
      font-weight: 600;
      color: #1e2b4f;
      min-width: 100px;
    }
    
    .date-input {
      flex: 1;
      min-width: 200px;
    }
    
    .date-input input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e9f0fa;
      border-radius: 15px;
      font-size: 16px;
    }
    
    .info-box {
      background: #e3f2fd;
      padding: 10px 15px;
      border-radius: 15px;
      color: #1976d2;
      font-weight: 600;
    }
    
    .rates-section {
      margin: 25px 0;
    }
    
    .section-title {
      color: #1e2b4f;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 15px;
    }
    
    .rates-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .rate-card {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 15px;
      text-align: center;
    }
    
    .rate-card label {
      display: block;
      margin-bottom: 10px;
      color: #1e2b4f;
      font-weight: 600;
      font-size: 14px;
    }
    
    .rate-card input {
      width: 100%;
      padding: 10px;
      border: 2px solid #e9f0fa;
      border-radius: 10px;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
    }
    
    .rate-card.readonly {
      background: #e9ecef;
    }
    
    .rate-card.readonly input {
      background: #dee2e6;
      color: #495057;
    }
    
    .bank-section {
      background: #f8f9fa;
      border-radius: 20px;
      padding: 20px;
      margin: 25px 0;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    
    .bank-label {
      font-weight: 600;
      color: #1e2b4f;
    }
    
    .bank-input {
      width: 150px;
    }
    
    .bank-input input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e9f0fa;
      border-radius: 15px;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
    }
    
    .action-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 30px;
    }
    
    .rates-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }
    
    .rates-table th {
      background: #1e2b4f;
      color: #ffd966;
      padding: 15px;
      font-weight: 600;
    }
    
    .rates-table td {
      padding: 12px;
      border-bottom: 1px solid #e9f0fa;
      text-align: center;
    }
    
    .rates-table tr:hover {
      background: #f5f9ff;
    }
    
    .error-message {
      background: #ffebee;
      color: #c62828;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 20px;
      text-align: center;
      font-weight: 600;
    }
    
    .success-message {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 20px;
      text-align: center;
      font-weight: 600;
    }
    
    @media (max-width: 768px) {
      .rates-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .date-row {
        flex-direction: column;
        align-items: stretch;
      }
      
      .bank-section {
        flex-direction: column;
        align-items: stretch;
      }
      
      .bank-input {
        width: 100%;
      }
      
      .action-buttons {
        flex-direction: column;
      }
      
      .btn-primary, .btn-secondary {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>💱 إدارة أسعار الصرف</h2>
      <div class="user-info">
        <span class="user-name" id="userNameDisplay"></span>
        <button class="logout-btn" onclick="window.logout()">تسجيل الخروج</button>
      </div>
    </div>
    
    <div class="nav-tabs">
      <div class="nav-tab active" onclick="window.showTab('add',this)">➕ إضافة/تعديل</div>
      <div class="nav-tab" onclick="window.showTab('view')">📋 عرض كل الأسعار</div>
      <div class="nav-tab" onclick="window.goBack()">🏠 العودة</div>
    </div>
    
    <div class="content" id="mainContent"></div>
  </div>

  <div id="customConfirmModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 9999;">
    <div style="background: white; width: 400px; border-radius: 30px; padding: 30px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3);">
      <div style="font-size: 50px; margin-bottom: 20px;">❓</div>
      <h3 style="color: #1e2b4f; margin-bottom: 20px;" id="confirmMessage">هل أنت متأكد من تسجيل الخروج؟</h3>
      <div style="display: flex; gap: 15px; justify-content: center;">
        <button id="confirmOk" class="btn-primary" style="background: #e74c3c;">نعم</button>
        <button id="confirmCancel" class="btn-secondary">إلغاء</button>
      </div>
    </div>
  </div>

  <div id="customAlertModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 9999;">
    <div style="background: white; width: 400px; border-radius: 30px; padding: 30px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3);">
      <div style="font-size: 50px; margin-bottom: 20px;">ℹ️</div>
      <h3 style="color: #1e2b4f; margin-bottom: 20px;" id="alertMessage"></h3>
      <button id="alertOk" class="btn-primary">موافق</button>
    </div>
  </div>

  <script>
    // ==================== المتغيرات العامة ====================
    let APP_BASE_URL = null;
    let currentUser = null;
    let lastExchangeDate = null;
    let currentMode = 'add';
    let selectedDate = null;

    // ==================== دوال المودال المخصص ====================
    function showAlert(message) {
      const modal = document.getElementById('customAlertModal');
      document.getElementById('alertMessage').innerText = message;
      modal.style.display = 'flex';
      
      const okBtn = document.getElementById('alertOk');
      const okHandler = function() {
        modal.style.display = 'none';
        okBtn.removeEventListener('click', okHandler);
      };
      
      okBtn.addEventListener('click', okHandler);
    }

    function showConfirm(message, onConfirm) {
      const modal = document.getElementById('customConfirmModal');
      document.getElementById('confirmMessage').innerText = message;
      modal.style.display = 'flex';
      
      const okBtn = document.getElementById('confirmOk');
      const cancelBtn = document.getElementById('confirmCancel');
      
      const okHandler = function() {
        modal.style.display = 'none';
        onConfirm();
        okBtn.removeEventListener('click', okHandler);
        cancelBtn.removeEventListener('click', cancelHandler);
      };
      
      const cancelHandler = function() {
        modal.style.display = 'none';
        okBtn.removeEventListener('click', okHandler);
        cancelBtn.removeEventListener('click', cancelHandler);
      };
      
      okBtn.addEventListener('click', okHandler);
      cancelBtn.addEventListener('click', cancelHandler);
    }

    // ==================== دالة جلب الرابط من السيرفر ====================
    function fetchAppUrl() {
      return new Promise((resolve) => {
        google.script.run
          .withSuccessHandler(url => {
            APP_BASE_URL = url;
            console.log('✅ APP_BASE_URL:', APP_BASE_URL);
            resolve(url);
          })
          .withFailureHandler(error => {
            console.error('❌ فشل جلب الرابط:', error);
            APP_BASE_URL = window.location.origin + window.location.pathname;
            console.log('⚠️ استخدام رابط Fallback:', APP_BASE_URL);
            resolve(APP_BASE_URL);
          })
          .getAppUrl();
      });
    }

    // ==================== استخراج بيانات المستخدم من الرابط ====================
    function getUserFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      const userParam = urlParams.get('user');
      if (userParam) {
        try {
          return JSON.parse(decodeURIComponent(userParam));
        } catch (e) {
          console.error('خطأ في فك تشفير بيانات المستخدم:', e);
          return null;
        }
      }
      return null;
    }

    // ==================== دالة تحميل آخر تاريخ ====================
    function loadLastExchangeDate() {
      console.log('📡 جاري تحميل آخر تاريخ...');
      google.script.run
        .withSuccessHandler(function(date) {
          console.log('✅ آخر تاريخ:', date);
          lastExchangeDate = date;
          if (document.getElementById('lastDateDisplay')) {
            document.getElementById('lastDateDisplay').textContent = formatDate(lastExchangeDate) || 'لا توجد بيانات';
          }
        })
        .withFailureHandler(function(error) {
          console.error('❌ خطأ في تحميل آخر تاريخ:', error);
        })
        .getLastExchangeDate();
    }

    // ==================== عرض التبويبات ====================
    function showTab(tab, el) {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      if (el) el.classList.add('active');

      if (tab === 'add') {
        showAddEditForm();
      } else if (tab === 'view') {
        showAllRates();
      }
    }

    // ==================== نموذج الإضافة/التعديل ====================
    function showAddEditForm() {
      const content = document.getElementById('mainContent');
      
      content.innerHTML = `
        <div class="toolbar">
          <button class="btn-primary" onclick="setMode('add')">
            <span>➕</span> إضافة جديد
          </button>
          <button class="btn-secondary" onclick="setMode('edit')">
            <span>✏️</span> تعديل
          </button>
        </div>
        
        <div class="date-section">
          <div class="date-row">
            <span class="date-label">التاريخ:</span>
            <div class="date-input">
              <input type="date" id="rateDate" onchange="loadDateData()">
            </div>
            <div class="info-box" id="lastDateInfo">
              آخر تاريخ في الشيت: <span id="lastDateDisplay">جاري التحميل...</span>
            </div>
          </div>
        </div>
        
        <div class="rates-section">
          <div class="section-title">💰 أسعار النقدي</div>
          <div class="rates-grid" id="cashRates">
            <div class="rate-card">
              <label>USD</label>
              <input type="number" id="cashUSD" step="0.0001" min="0" placeholder="0.00">
            </div>
            <div class="rate-card">
              <label>EUR</label>
              <input type="number" id="cashEUR" step="0.0001" min="0" placeholder="0.00">
            </div>
            <div class="rate-card">
              <label>GBP</label>
              <input type="number" id="cashGBP" step="0.0001" min="0" placeholder="0.00">
            </div>
            <div class="rate-card">
              <label>EGP</label>
              <input type="number" id="cashLE" step="0.0001" min="0" value="1.00" readonly class="readonly">
            </div>
          </div>
          
          <div class="section-title">💳 أسعار الفيزا (تلقائية)</div>
          <div class="rates-grid" id="visaRates">
            <div class="rate-card readonly">
              <label>Visa USD</label>
              <input type="number" id="visaUSD" step="0.0001" readonly>
            </div>
            <div class="rate-card readonly">
              <label>Visa EUR</label>
              <input type="number" id="visaEUR" step="0.0001" readonly>
            </div>
            <div class="rate-card readonly">
              <label>Visa GBP</label>
              <input type="number" id="visaGBP" step="0.0001" readonly>
            </div>
            <div class="rate-card readonly">
              <label>Visa EGP</label>
              <input type="number" id="visaLE" step="0.0001" readonly>
            </div>
          </div>
        </div>
        
        <div class="bank-section">
          <span class="bank-label">نسبة البنك (%):</span>
          <div class="bank-input">
            <input type="number" id="bankPercentage" step="0.1" min="0" max="100" value="2.5" onchange="calculateVisaRates()">
          </div>
        </div>
        
        <div class="action-buttons">
          <button class="btn-primary" onclick="saveRates()">💾 حفظ</button>
          <button class="btn-secondary" onclick="clearForm()">🔄 إعادة تعيين</button>
        </div>
        
        <div id="messageArea"></div>
      `;
      
      document.getElementById('cashUSD').addEventListener('input', calculateVisaRates);
      document.getElementById('cashEUR').addEventListener('input', calculateVisaRates);
      document.getElementById('cashGBP').addEventListener('input', calculateVisaRates);
      
      if (lastExchangeDate) {
        document.getElementById('lastDateDisplay').textContent = formatDate(lastExchangeDate);
      }
    }

    // ==================== تعيين الوضع (إضافة/تعديل) ====================
    function setMode(mode) {
      currentMode = mode;
      clearForm();
      
      if (mode === 'add') {
        document.getElementById('rateDate').value = '';
        document.getElementById('rateDate').removeAttribute('readonly');
      } else {
        document.getElementById('rateDate').focus();
      }
    }

    // ==================== تحميل بيانات تاريخ محدد ====================
    function loadDateData() {
      const date = document.getElementById('rateDate').value;
      if (!date) return;
      
      selectedDate = date;
      
      google.script.run
        .withSuccessHandler(function(data) {
          if (data) {
            document.getElementById('cashUSD').value = data.cash.USD;
            document.getElementById('cashEUR').value = data.cash.EUR;
            document.getElementById('cashGBP').value = data.cash.GBP;
            document.getElementById('bankPercentage').value = data.bankPercentage || 2.5;
            calculateVisaRates();
          } else {
            if (currentMode === 'add') {
              // لا تفعل شيئاً
            } else {
              showAlert('التاريخ غير موجود. للإضافة استخدم وضع "إضافة جديد"');
              document.getElementById('rateDate').value = '';
            }
          }
        })
        .withFailureHandler(function(error) {
          showAlert('خطأ في تحميل البيانات: ' + error.message);
        })
        .getExchangeRateByDate(date);
    }

    // ==================== حساب أسعار الفيزا ====================
    function calculateVisaRates() {
      const usd = parseFloat(document.getElementById('cashUSD').value) || 0;
      const eur = parseFloat(document.getElementById('cashEUR').value) || 0;
      const gbp = parseFloat(document.getElementById('cashGBP').value) || 0;
      const bankPercent = parseFloat(document.getElementById('bankPercentage').value) || 0;
      
      const visaFactor = 1 - (bankPercent / 100);
      
      document.getElementById('visaUSD').value = (usd * visaFactor).toFixed(4);
      document.getElementById('visaEUR').value = (eur * visaFactor).toFixed(4);
      document.getElementById('visaGBP').value = (gbp * visaFactor).toFixed(4);
      document.getElementById('visaLE').value = (1 * visaFactor).toFixed(4);
    }

    // ==================== حفظ الأسعار ====================
    function saveRates() {
      const date = document.getElementById('rateDate').value;
      if (!date) {
        showAlert('الرجاء إدخال التاريخ');
        return;
      }
      
      const usd = parseFloat(document.getElementById('cashUSD').value);
      const eur = parseFloat(document.getElementById('cashEUR').value);
      const gbp = parseFloat(document.getElementById('cashGBP').value);
      const bankPercent = parseFloat(document.getElementById('bankPercentage').value) || 0;
      
      if (isNaN(usd) || isNaN(eur) || isNaN(gbp)) {
        showAlert('الرجاء إدخال جميع أسعار النقدي');
        return;
      }
      
      const cashRates = {
        USD: usd,
        EUR: eur,
        GBP: gbp,
        LE: 1.00
      };
      
      const data = {
        targetDate: date,
        cashRates: cashRates,
        bankPercentage: bankPercent,
        mode: currentMode
      };
      
      const saveBtn = event.target;
      const originalText = saveBtn.textContent;
      saveBtn.textContent = '⏳ جاري الحفظ...';
      saveBtn.disabled = true;
      
      google.script.run
        .withSuccessHandler(function(response) {
          saveBtn.textContent = originalText;
          saveBtn.disabled = false;
          
          if (response.success) {
            showMessage('success', response.message);
            loadLastExchangeDate();
          } else {
            showMessage('error', response.message);
          }
        })
        .withFailureHandler(function(error) {
          saveBtn.textContent = originalText;
          saveBtn.disabled = false;
          showMessage('error', 'خطأ في الاتصال: ' + error.message);
        })
        .saveExchangeRates(data);
    }

    // ==================== عرض كل الأسعار ====================
    function showAllRates() {
      const content = document.getElementById('mainContent');
      content.innerHTML = '<div style="text-align: center; padding: 50px;">جاري التحميل...</div>';
      
      google.script.run
        .withSuccessHandler(function(rates) {
          if (!rates || rates.length === 0) {
            content.innerHTML = '<div style="text-align: center; padding: 50px;">لا توجد بيانات</div>';
            return;
          }
          
          let html = `
            <div style="overflow-x: auto;">
              <table class="rates-table">
                <thead>
                  <tr>
                    <th>التاريخ</th>
                    <th>USD</th>
                    <th>EUR</th>
                    <th>GBP</th>
                    <th>EGP</th>
                    <th>Visa USD</th>
                    <th>Visa EUR</th>
                    <th>Visa GBP</th>
                    <th>Visa EGP</th>
                  </tr>
                </thead>
                <tbody>
          `;
          
          rates.forEach(row => {
            html += `
              <tr>
                <td>${formatDate(row.date)}</td>
                <td>${row.cashUSD}</td>
                <td>${row.cashEUR}</td>
                <td>${row.cashGBP}</td>
                <td>${row.cashLE}</td>
                <td>${row.visaUSD}</td>
                <td>${row.visaEUR}</td>
                <td>${row.visaGBP}</td>
                <td>${row.visaLE}</td>
              </tr>
            `;
          });
          
          html += '</tbody></table></div>';
          content.innerHTML = html;
        })
        .withFailureHandler(function(error) {
          content.innerHTML = '<div style="color: red; text-align: center; padding: 50px;">خطأ في تحميل البيانات</div>';
        })
        .getAllExchangeRates();
    }

    // ==================== العودة إلى الصفحة السابقة ====================
    function goBack() {
      if (!APP_BASE_URL) {
        fetchAppUrl().then(() => {
          window.top.location.href = APP_BASE_URL + '?page=Dashboard';
        });
        return;
      }
      
      if (document.referrer && document.referrer.includes('?page=')) {
        window.top.location.href = document.referrer;
      } else {
        let dashboardPage = 'Dashboard';
        if (currentUser.type === 'Owner') dashboardPage = 'OwnerDashboard';
        else if (currentUser.type === 'Sales') dashboardPage = 'SalesDashboard';
        else if (currentUser.type === 'Accountant') dashboardPage = 'AccountantDashboard';
        
        window.top.location.href = APP_BASE_URL + '?page=' + dashboardPage;
      }
    }

    // ==================== الخروج ====================
    function logout() {
      showConfirm('هل أنت متأكد من تسجيل الخروج؟', function() {
        sessionStorage.removeItem('currentUser');
        sessionStorage.removeItem('appUrl');
        
        if (APP_BASE_URL) {
          window.top.location.href = APP_BASE_URL + '?page=Login';
        } else {
          window.top.location.href = '?page=Login';
        }
      });
    }

    // ==================== دوال مساعدة ====================
    function formatDate(dateStr) {
      if (!dateStr) return '';
      try {
        const date = new Date(dateStr);
        const day = date.getDate().toString().padStart(2, '0');
        const month = date.toLocaleString('en', { month: 'short' });
        const year = date.getFullYear().toString().slice(-2);
        return `${day}-${month}-${year}`;
      } catch (e) {
        return dateStr;
      }
    }

    function clearForm() {
      document.getElementById('cashUSD').value = '';
      document.getElementById('cashEUR').value = '';
      document.getElementById('cashGBP').value = '';
      document.getElementById('visaUSD').value = '';
      document.getElementById('visaEUR').value = '';
      document.getElementById('visaGBP').value = '';
      document.getElementById('visaLE').value = '';
      document.getElementById('bankPercentage').value = '2.5';
      document.getElementById('rateDate').value = '';
      document.getElementById('messageArea').innerHTML = '';
    }

    function showMessage(type, text) {
      const messageArea = document.getElementById('messageArea');
      const className = type === 'success' ? 'success-message' : 'error-message';
      messageArea.innerHTML = `<div class="${className}">${text}</div>`;
      
      setTimeout(() => {
        messageArea.innerHTML = '';
      }, 5000);
    }

    // ==================== التحميل الأولي ====================
    document.addEventListener('DOMContentLoaded', async function() {
      console.log('✅ DOMContentLoaded fired');
      
      // 1️⃣ نجيب رابط التطبيق أولاً
      await fetchAppUrl();
      
      // 2️⃣ نتحقق من المستخدم
      let userData = sessionStorage.getItem('currentUser');
      
      if (!userData) {
        const urlUser = getUserFromUrl();
        if (urlUser) {
          userData = JSON.stringify(urlUser);
          sessionStorage.setItem('currentUser', userData);
        }
      }
      
      if (!userData) {
        window.top.location.href = APP_BASE_URL + '?page=Login';
        return;
      }
      
      try {
        currentUser = JSON.parse(userData);
        document.getElementById('userNameDisplay').textContent = currentUser.name || 'مدير النظام';
        
        const allowedTypes = ['Admin', 'Owner', 'FinancialManager'];
        if (!allowedTypes.includes(currentUser.type)) {
          showAlert('ليس لديك صلاحية للوصول إلى هذه الصفحة');
          window.top.location.href = APP_BASE_URL + '?page=Dashboard';
          return;
        }
      } catch (e) {
        window.top.location.href = APP_BASE_URL + '?page=Login';
        return;
      }
      
      loadLastExchangeDate();
      showTab('add');
    });

    // ==================== تصدير الدوال ====================
    window.showTab = showTab;
    window.goBack = goBack;
    window.logout = logout;
    window.setMode = setMode;
    window.loadDateData = loadDateData;
    window.saveRates = saveRates;
    window.clearForm = clearForm;
    window.showAlert = showAlert;
    window.showConfirm = showConfirm;
  </script>
</body>
</html>
