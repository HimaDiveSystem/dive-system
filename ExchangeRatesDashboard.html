<!DOCTYPE html>
<html dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <title>إدارة أسعار الصرف - نظام إدارة مراكز الغوص</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 1100px; margin: 0 auto; background: white; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }

    /* ── Header ── */
    .header { background: linear-gradient(135deg, #1e2b4f 0%, #152238 100%); color: white; padding: 18px 28px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .header h2 { color: #ffd966; font-size: 22px; display: flex; align-items: center; gap: 10px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .user-badge { background: rgba(255,255,255,0.1); padding: 7px 16px; border-radius: 40px; border: 1px solid #ffd966; font-size: 13px; }
    .back-btn { background: #ffd966; color: #1e2b4f; border: none; padding: 7px 18px; border-radius: 40px; cursor: pointer; font-weight: 700; font-size: 13px; }
    .back-btn:hover { background: #f0c020; }

    /* ── Tabs ── */
    .nav-tabs { display: flex; background: #f8f9fa; padding: 0 20px; border-bottom: 2px solid #dee2e6; overflow-x: auto; white-space: nowrap; }
    .nav-tab { padding: 14px 22px; cursor: pointer; font-weight: 600; color: #6c757d; border-bottom: 3px solid transparent; transition: 0.2s; display: inline-block; font-size: 14px; }
    .nav-tab.active { color: #1e2b4f; border-bottom-color: #ffd966; }
    .nav-tab:hover { color: #1e2b4f; }

    /* ── Content ── */
    .content { padding: 26px 28px; }

    /* ── Form cards ── */
    .date-section { background: #f0f4fa; border-radius: 16px; padding: 18px 22px; margin-bottom: 20px; }
    .date-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .date-label { font-weight: 700; color: #1e2b4f; font-size: 14px; min-width: 80px; }
    .date-input input[type="text"] { padding: 10px 14px; border: 2px solid #d0ddeb; border-radius: 12px; font-size: 14px; font-weight: 600; color: #1e2b4f; width: 180px; }
    .date-input input[type="text"]:focus { outline: none; border-color: #1e2b4f; box-shadow: 0 0 0 3px rgba(30,43,79,.1); }
    .info-box { background: #1e2b4f; color: #ffd966; padding: 7px 16px; border-radius: 30px; font-size: 13px; font-weight: 700; }
    .date-status { padding: 7px 16px; border-radius: 30px; font-size: 13px; font-weight: 700; }
    .date-status.found    { background: #d5f5e3; color: #1e8449; }
    .date-status.not-found { background: #fef9e7; color: #9a6b00; }

    /* ── Rates sections ── */
    .rates-section { margin-bottom: 20px; }
    .section-title { color: white; background: #1e2b4f; font-size: 14px; font-weight: 700; padding: 9px 18px; border-radius: 30px; display: inline-block; margin-bottom: 14px; }
    .section-title.visa-title { background: #27ae60; }
    .rates-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 4px; }
    .rate-card { background: #f8f9fa; border-radius: 14px; padding: 14px; text-align: center; }
    .rate-card label { display: block; margin-bottom: 8px; color: #1e2b4f; font-weight: 700; font-size: 13px; }
    .rate-card input { width: 100%; padding: 9px; border: 2px solid #d0ddeb; border-radius: 10px; text-align: center; font-size: 15px; font-weight: 700; color: #1e2b4f; }
    .rate-card input:focus { outline: none; border-color: #1e2b4f; }
    .rate-card.visa-card { background: #eafaf1; }
    .rate-card.visa-card input { background: #d5f5e3; border-color: #a9dfbf; color: #1e8449; }
    .rate-card.readonly input { background: #e9ecef; color: #6c757d; border-color: #dee2e6; }

    /* ── Bank section ── */
    .bank-section { background: #f8f9fa; border-radius: 14px; padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .bank-label { font-weight: 700; color: #1e2b4f; font-size: 14px; }
    .bank-input input { padding: 9px 14px; border: 2px solid #d0ddeb; border-radius: 10px; text-align: center; font-size: 15px; font-weight: 700; color: #1e2b4f; width: 120px; }
    .bank-input input:focus { outline: none; border-color: #1e2b4f; }

    /* ── Buttons ── */
    .btn-primary   { background: #1e2b4f; color: white; border: none; padding: 11px 24px; border-radius: 40px; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 7px; }
    .btn-primary:hover { background: #ffd966; color: #1e2b4f; }
    .btn-primary:disabled { background: #95a5a6; cursor: not-allowed; }
    .btn-secondary { background: #e9f0fa; color: #1e2b4f; border: none; padding: 11px 24px; border-radius: 40px; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s; }
    .btn-secondary:hover { background: #d0ddeb; }
    .action-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 22px; flex-wrap: wrap; }

    /* ── View table (sticky header) ── */
    .table-outer { border-radius: 16px; overflow: hidden; border: 1px solid #e0e8f0; }
    .table-scroll { overflow-x: auto; max-height: 560px; overflow-y: auto; }
    table.rates-table { width: 100%; border-collapse: collapse; min-width: 900px; }
    table.rates-table thead tr { background: #1e2b4f; position: sticky; top: 0; z-index: 2; }
    table.rates-table thead th { color: #ffd966; padding: 13px 10px; font-size: 12px; font-weight: 700; white-space: nowrap; }
    table.rates-table thead th.sep { background: #152238; color: #aaa; }
    table.rates-table tbody tr { border-bottom: 1px solid #f0f4fa; transition: .15s; }
    table.rates-table tbody tr:hover { background: #f5f9ff; }
    table.rates-table td { padding: 10px; text-align: center; font-size: 13px; color: #2c3e50; }
    table.rates-table td.date-td { font-weight: 700; color: #1e2b4f; white-space: nowrap; }
    table.rates-table td.sep-td { background: #f8f9fa; color: #ccc; }
    .group-label { background: #e9f0fa; color: #1e2b4f; font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 6px; display: inline-block; }

    /* ── Messages / loader ── */
    .msg { padding: 12px 18px; border-radius: 12px; margin-top: 16px; font-weight: 600; text-align: center; font-size: 14px; }
    .msg.success { background: #d5f5e3; color: #1e8449; }
    .msg.error   { background: #fadbd8; color: #c0392b; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1e2b4f; border-radius: 50%; width: 36px; height: 36px; animation: spin 1s linear infinite; margin: 30px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 50px 20px; color: #aaa; }

    @media (max-width: 700px) {
      .rates-grid { grid-template-columns: repeat(2, 1fr); }
      .date-row { flex-direction: column; align-items: stretch; }
      .action-buttons { flex-direction: column; }
      .btn-primary, .btn-secondary { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h2>💱 إدارة أسعار الصرف</h2>
    <div class="header-right">
      <span class="user-badge" id="userNameDisplay">—</span>
      <button class="back-btn" onclick="goBack()">🔙 رجوع</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="nav-tabs">
    <div class="nav-tab active" id="tab-add"  onclick="showTab('add',this)">➕ إضافة / تعديل</div>
    <div class="nav-tab"        id="tab-view" onclick="showTab('view',this)">📋 عرض كل الأسعار</div>
  </div>

  <div class="content" id="mainContent"></div>
</div>

<!-- Modals -->
<div id="customAlertModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:9999;">
  <div style="background:white;width:380px;border-radius:24px;padding:28px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.3);">
    <div style="font-size:46px;margin-bottom:16px;">ℹ️</div>
    <h3 style="color:#1e2b4f;margin-bottom:20px;" id="alertMessage"></h3>
    <button id="alertOk" class="btn-primary" style="margin:0 auto;">موافق</button>
  </div>
</div>
<div id="customConfirmModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:9999;">
  <div style="background:white;width:380px;border-radius:24px;padding:28px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.3);">
    <div style="font-size:46px;margin-bottom:16px;">❓</div>
    <h3 style="color:#1e2b4f;margin-bottom:20px;" id="confirmMessage"></h3>
    <div style="display:flex;gap:12px;justify-content:center;">
      <button id="confirmOk"     class="btn-primary" style="background:#e74c3c;">نعم</button>
      <button id="confirmCancel" class="btn-secondary">إلغاء</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyIROtu-OMKccUAgyn4eSMiXi4eSNfQVIkHg9hhlepZoLd4v3XbGO5E9UAETdPZ0TxC/exec';
const DASH = { Admin:'Dashboard.html', Owner:'OwnerDashboard.html', Sales:'SalesDashboard.html', Accountant:'AccountantDashboard.html' };

let currentUser = null;
let lastRawDate = null; // آخر تاريخ في الشيت كـ string خام

// ── Modals ──
function showAlert(msg) {
  const m = document.getElementById('customAlertModal');
  document.getElementById('alertMessage').innerText = msg;
  m.style.display = 'flex';
  const ok = document.getElementById('alertOk');
  const h = () => { m.style.display='none'; ok.removeEventListener('click',h); };
  ok.addEventListener('click', h);
}
function showConfirm(msg, cb) {
  const m = document.getElementById('customConfirmModal');
  document.getElementById('confirmMessage').innerText = msg;
  m.style.display = 'flex';
  const ok = document.getElementById('confirmOk'), cn = document.getElementById('confirmCancel');
  const okH  = () => { m.style.display='none'; cb(); ok.removeEventListener('click',okH); cn.removeEventListener('click',cnH); };
  const cnH  = () => { m.style.display='none'; ok.removeEventListener('click',okH); cn.removeEventListener('click',cnH); };
  ok.addEventListener('click', okH); cn.addEventListener('click', cnH);
}

// ── JSONP (GET) ──
function jsonp(action, params = {}) {
  return new Promise((res, rej) => {
    const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*99999);
    params.action = action; params.callback = cb;
    const qs = Object.entries(params).map(([k,v]) => k+'='+encodeURIComponent(String(v??''))).join('&');
    const sc = document.createElement('script');
    const to = setTimeout(() => { delete window[cb]; sc.remove(); rej(new Error('انتهت مهلة الاتصال')); }, 30000);
    window[cb] = d => { clearTimeout(to); delete window[cb]; sc.remove(); res(d); };
    sc.onerror = () => { clearTimeout(to); delete window[cb]; sc.remove(); rej(new Error('خطأ في الاتصال')); };
    sc.src = GAS_URL + '?' + qs;
    document.head.appendChild(sc);
  });
}

// ── تاريخ: تحويل إدخال المستخدم → D/Mon/YYYY ──
// يقبل: YYYY-MM-DD, D-M-YYYY, D/M/YYYY, D/Mon/YYYY
const MON_EN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MON_AR = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

function parseInputDate(raw) {
  if (!raw) return null;
  raw = raw.trim();
  let m;
  // YYYY-MM-DD
  m = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  // D-M-YYYY or D/M/YYYY (numeric)
  m = raw.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})$/);
  if (m) return new Date(+m[3], +m[2]-1, +m[1]);
  // D/Mon/YYYY or D-Mon-YYYY
  m = raw.match(/^(\d{1,2})[-\/]([A-Za-z]+)[-\/](\d{4})$/);
  if (m) {
    const mi = MON_EN.findIndex(x => x.toLowerCase() === m[2].toLowerCase().slice(0,3));
    if (mi >= 0) return new Date(+m[3], mi, +m[1]);
  }
  return null;
}

// تنسيق Date → D/Mon/YYYY (للعرض والإرسال للـ GAS)
function fmtDate(dt) {
  if (!dt) return '';
  return dt.getDate() + '/' + MON_EN[dt.getMonth()] + '/' + dt.getFullYear();
}
// تنسيق للعرض العربي
function fmtDateAR(dt) {
  if (!dt) return '';
  return dt.getDate().toString().padStart(2,'0') + ' ' + MON_AR[dt.getMonth()] + ' ' + dt.getFullYear();
}

// ── goBack ──
function goBack() { window.location.href = DASH[currentUser?.type] || 'Dashboard.html'; }

// ── Tabs ──
function showTab(tab, el) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  if (tab === 'add')  showAddEditForm();
  else                showAllRates();
}

// ════════════════════════════════════════════════
// تبويب الإضافة / التعديل
// ════════════════════════════════════════════════
function showAddEditForm() {
  document.getElementById('mainContent').innerHTML = `
    <div class="date-section">
      <div class="date-row">
        <span class="date-label">📅 التاريخ:</span>
        <div class="date-input">
          <input type="text" id="rateDate" placeholder="مثال: 1/Mar/2026" oninput="onDateInput()">
        </div>
        <div class="info-box">آخر تاريخ: <span id="lastDateDisplay">${lastRawDate ? formatRawDate(lastRawDate) : '...'}</span></div>
        <div class="date-status" id="dateStatus" style="display:none;"></div>
      </div>
    </div>

    <div class="rates-section">
      <div class="section-title" id="cashTitle">💰 أسعار النقدي</div>
      <div class="rates-grid">
        <div class="rate-card"><label>USD $</label><input type="number" id="cashUSD" step="0.0001" min="0" placeholder="0.00" oninput="calcVisa()"></div>
        <div class="rate-card"><label>EUR €</label><input type="number" id="cashEUR" step="0.0001" min="0" placeholder="0.00" oninput="calcVisa()"></div>
        <div class="rate-card"><label>GBP £</label><input type="number" id="cashGBP" step="0.0001" min="0" placeholder="0.00" oninput="calcVisa()"></div>
        <div class="rate-card readonly"><label>EGP ج.م</label><input type="number" id="cashLE" value="1.00" readonly></div>
      </div>
    </div>

    <div class="bank-section">
      <span class="bank-label">نسبة البنك (%):</span>
      <div class="bank-input"><input type="number" id="bankPct" step="0.1" min="0" max="100" value="2.5" oninput="calcVisa()"></div>
    </div>

    <div class="rates-section">
      <div class="section-title visa-title" id="visaTitle">💳 أسعار الفيزا (تلقائية)</div>
      <div class="rates-grid">
        <div class="rate-card visa-card"><label>Visa USD</label><input type="number" id="visaUSD" step="0.0001" readonly></div>
        <div class="rate-card visa-card"><label>Visa EUR</label><input type="number" id="visaEUR" step="0.0001" readonly></div>
        <div class="rate-card visa-card"><label>Visa GBP</label><input type="number" id="visaGBP" step="0.0001" readonly></div>
        <div class="rate-card visa-card readonly"><label>Visa EGP</label><input type="number" id="visaLE"  step="0.0001" readonly></div>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-primary"   id="btnSave"  onclick="saveRates()">💾 حفظ</button>
      <button class="btn-secondary"               onclick="clearForm()">🔄 إعادة تعيين</button>
    </div>
    <div id="msgArea"></div>`;
}

// عند تغيير التاريخ
let dateCheckTimer = null;
function onDateInput() {
  clearTimeout(dateCheckTimer);
  dateCheckTimer = setTimeout(checkDate, 600);
}

async function checkDate() {
  const raw = document.getElementById('rateDate')?.value?.trim();
  const dt  = parseInputDate(raw);
  const st  = document.getElementById('dateStatus');
  const cashTitle = document.getElementById('cashTitle');
  const visaTitle = document.getElementById('visaTitle');
  if (!dt) { if(st) st.style.display='none'; return; }

  const dateStr = fmtDate(dt); // D/Mon/YYYY للإرسال
  try {
    const r = await jsonp('getExchangeRateByDateStr', { dateStr });
    if (r && r.found) {
      // تاريخ موجود — نملأ الحقول بأسعار البنك (B:E) وأسعار حسابات العمولة (K:N)
      if (document.getElementById('cashUSD')) {
        document.getElementById('cashUSD').value = r.bankUSD ?? '';
        document.getElementById('cashEUR').value = r.bankEUR ?? '';
        document.getElementById('cashGBP').value = r.bankGBP ?? '';
        document.getElementById('visaUSD').value = r.salesUSD ?? '';
        document.getElementById('visaEUR').value = r.salesEUR ?? '';
        document.getElementById('visaGBP').value = r.salesGBP ?? '';
        document.getElementById('visaLE').value  = r.salesLE  ?? '';
      }
      if (cashTitle) cashTitle.textContent = '🏦 أسعار البنك';
      if (visaTitle) visaTitle.textContent = '📊 أسعار حسابات العمولة';
      if (st) { st.className='date-status found'; st.textContent='✅ تاريخ موجود — سيتم التحديث'; st.style.display='inline-block'; }
    } else {
      // تاريخ جديد — تفريغ الحقول
      if (cashTitle) cashTitle.textContent = '💰 أسعار النقدي';
      if (visaTitle) visaTitle.textContent = '💳 أسعار الفيزا (تلقائية)';
      if (st) { st.className='date-status not-found'; st.textContent='🆕 تاريخ جديد'; st.style.display='inline-block'; }
      calcVisa();
    }
  } catch(e) { console.error(e); }
}

function calcVisa() {
  const usd = parseFloat(document.getElementById('cashUSD')?.value) || 0;
  const eur = parseFloat(document.getElementById('cashEUR')?.value) || 0;
  const gbp = parseFloat(document.getElementById('cashGBP')?.value) || 0;
  const pct = parseFloat(document.getElementById('bankPct')?.value) || 0;
  const f   = 1 - pct / 100;
  const set = (id, v) => { const el=document.getElementById(id); if(el) el.value=v.toFixed(4); };
  // فقط نحسب الفيزا تلقائياً إذا لم يكن التاريخ موجوداً
  const st = document.getElementById('dateStatus');
  if (st && st.classList.contains('found')) return; // موجود → لا نحسب تلقائياً
  set('visaUSD', usd * f);
  set('visaEUR', eur * f);
  set('visaGBP', gbp * f);
  set('visaLE',  1   * f);
}

async function saveRates() {
  const raw = document.getElementById('rateDate')?.value?.trim();
  const dt  = parseInputDate(raw);
  if (!dt) { showAlert('الرجاء إدخال تاريخ صحيح'); return; }

  const usd = parseFloat(document.getElementById('cashUSD').value);
  const eur = parseFloat(document.getElementById('cashEUR').value);
  const gbp = parseFloat(document.getElementById('cashGBP').value);
  const pct = parseFloat(document.getElementById('bankPct').value) || 0;
  const vu  = parseFloat(document.getElementById('visaUSD').value);
  const ve  = parseFloat(document.getElementById('visaEUR').value);
  const vg  = parseFloat(document.getElementById('visaGBP').value);
  const vl  = parseFloat(document.getElementById('visaLE').value);
  if (isNaN(usd)||isNaN(eur)||isNaN(gbp)) { showAlert('الرجاء إدخال جميع أسعار الصرف'); return; }

  const btn = document.getElementById('btnSave');
  btn.disabled = true; btn.textContent = '⏳ جاري الحفظ...';

  try {
    const r = await jsonp('saveExchangeRatesNew', {
      dateStr: fmtDate(dt),
      bankUSD: usd, bankEUR: eur, bankGBP: gbp, bankLE: 1,
      bankVUSD: usd*(1-pct/100), bankVEUR: eur*(1-pct/100), bankVGBP: gbp*(1-pct/100), bankVLE: 1*(1-pct/100),
      salesUSD: vu, salesEUR: ve, salesGBP: vg, salesLE: vl,
      salesVUSD: vu, salesVEUR: ve, salesVGBP: vg, salesVLE: vl,
      bankPct: pct
    });
    if (r && r.success) {
      showMsg('success', r.message || 'تم الحفظ بنجاح');
      await loadLastDate();
    } else {
      showMsg('error', r?.message || 'فشل الحفظ');
    }
  } catch(e) { showMsg('error', 'خطأ في الاتصال: '+e.message); }
  btn.disabled = false; btn.innerHTML = '💾 حفظ';
}

function clearForm() {
  ['cashUSD','cashEUR','cashGBP','visaUSD','visaEUR','visaGBP','visaLE','rateDate'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  const bp=document.getElementById('bankPct'); if(bp) bp.value='2.5';
  const ma=document.getElementById('msgArea'); if(ma) ma.innerHTML='';
  const st=document.getElementById('dateStatus'); if(st) st.style.display='none';
  const ct=document.getElementById('cashTitle'); if(ct) ct.textContent='💰 أسعار النقدي';
  const vt=document.getElementById('visaTitle'); if(vt) vt.textContent='💳 أسعار الفيزا (تلقائية)';
}

function showMsg(type, text) {
  const el = document.getElementById('msgArea');
  if (!el) return;
  el.innerHTML = `<div class="msg ${type}">${text}</div>`;
  setTimeout(() => { if(el) el.innerHTML=''; }, 5000);
}

// ════════════════════════════════════════════════
// تبويب عرض كل الأسعار
// ════════════════════════════════════════════════
async function showAllRates() {
  const content = document.getElementById('mainContent');
  content.innerHTML = '<div class="loader"></div>';
  try {
    const rates = await jsonp('getAllExchangeRatesNew');
    if (!rates || !rates.length) {
      content.innerHTML = '<div class="empty">لا توجد بيانات</div>';
      return;
    }
    let html = `
      <div class="table-outer">
        <div class="table-scroll">
          <table class="rates-table">
            <thead>
              <tr>
                <th rowspan="2">📅 التاريخ</th>
                <th colspan="4"><span class="group-label">🏦 أسعار البنك</span></th>
                <th colspan="4"><span class="group-label">💳 فيزا البنك</span></th>
                <th class="sep">—</th>
                <th colspan="4"><span class="group-label">📊 أسعار العمولة</span></th>
                <th colspan="4"><span class="group-label">💳 فيزا العمولة</span></th>
              </tr>
              <tr>
                <th>USD</th><th>EUR</th><th>GBP</th><th>EGP</th>
                <th>V.USD</th><th>V.EUR</th><th>V.GBP</th><th>V.EGP</th>
                <th class="sep"></th>
                <th>USD</th><th>EUR</th><th>GBP</th><th>EGP</th>
                <th>V.USD</th><th>V.EUR</th><th>V.GBP</th><th>V.EGP</th>
              </tr>
            </thead>
            <tbody>`;
    rates.forEach(r => {
      html += `<tr>
        <td class="date-td">${r.date||''}</td>
        <td>${r.bUSD}</td><td>${r.bEUR}</td><td>${r.bGBP}</td><td>${r.bLE}</td>
        <td>${r.bVUSD}</td><td>${r.bVEUR}</td><td>${r.bVGBP}</td><td>${r.bVLE}</td>
        <td class="sep-td">—</td>
        <td>${r.sUSD}</td><td>${r.sEUR}</td><td>${r.sGBP}</td><td>${r.sLE}</td>
        <td>${r.sVUSD}</td><td>${r.sVEUR}</td><td>${r.sVGBP}</td><td>${r.sVLE}</td>
      </tr>`;
    });
    html += '</tbody></table></div></div>';
    content.innerHTML = html;
  } catch(e) {
    content.innerHTML = `<div class="empty">خطأ في التحميل: ${e.message}</div>`;
  }
}

// ── آخر تاريخ ──
async function loadLastDate() {
  try {
    const r = await jsonp('getLastExchangeDate');
    lastRawDate = r?.date || r || null;
    const el = document.getElementById('lastDateDisplay');
    if (el) el.textContent = lastRawDate ? formatRawDate(lastRawDate) : 'لا توجد بيانات';
  } catch(e) { console.error(e); }
}

function formatRawDate(raw) {
  if (!raw) return '';
  // raw قد يكون string من GAS
  const dt = parseInputDate(raw.toString());
  if (dt && !isNaN(dt)) return fmtDate(dt);
  return raw.toString();
}

// ── Init ──
document.addEventListener('DOMContentLoaded', async () => {
  let ud = sessionStorage.getItem('currentUser');
  if (!ud) {
    try { const p=new URLSearchParams(location.search); const u=p.get('user'); if(u){ud=decodeURIComponent(u);sessionStorage.setItem('currentUser',ud);} } catch(e){}
  }
  if (!ud) { location.href='index.html'; return; }
  try { currentUser = JSON.parse(ud); }
  catch(e) { location.href='index.html'; return; }

  document.getElementById('userNameDisplay').textContent = currentUser.name || '—';
  await loadLastDate();
  showTab('add', document.getElementById('tab-add'));
});
</script>
